<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מילה בשבת · סיכום אינטראקטיבי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Frank+Ruhl+Libre:wght@400;500;700;800&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#EBE6DB; --card:#F8F4EB; --card-2:#F2EDE1;
  --ink:#211C15; --ink-soft:#6B6153; --ink-faint:#9A9083;
  --rule:#D7CEBC; --line:#E2DACA;
  --pasuk:#8C6D2C; --mishna:#2F4C86; --gemara:#3E6BA6; --rishon:#4B7C6E;
  --shulchan:#211C15; --rama:#6A4A86; --acharon:#9A6A3A; --zman:#B0562E;
  --pesak:#8A2E3B; --gilt:#A9812F;
  --display:'Suez One','Frank Ruhl Libre',serif;
  --body:'Frank Ruhl Libre','Noto Serif Hebrew','Times New Roman',serif;
  --ui:'Heebo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{direction:rtl;background:var(--paper);color:var(--ink);
  font-family:var(--body);font-size:18px;line-height:1.72;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

header.top{border-bottom:1px solid var(--rule);background:linear-gradient(180deg,#F1ECE1,var(--paper))}
.eyebrow{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.14em;color:var(--ink-soft)}
h1.topic{font-family:var(--display);font-weight:400;font-size:clamp(34px,6vw,58px);margin:.18em 0 .1em;line-height:1.02}
.subtitle{font-family:var(--ui);color:var(--ink-soft);font-size:15px;margin:0 0 20px}
.header-inner{padding:26px 0 22px}

.grid{display:grid;grid-template-columns:250px 1fr;gap:34px;align-items:start;padding:30px 0 90px}
nav.rail{position:sticky;top:16px;font-family:var(--ui)}
.rail-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--ink-faint);margin:0 0 10px 4px}
.node{margin:1px 0}
.node .row{display:flex;align-items:stretch;gap:2px}
.node a.lbl{
  display:block;flex:1;text-decoration:none;color:var(--ink-soft);font-size:14.5px;
  padding:8px 12px;border-radius:8px;line-height:1.3;border:1px solid transparent;
  transition:background .15s,color .15s;cursor:pointer}
.node a.lbl:hover{background:var(--card-2);color:var(--ink)}
.node a.lbl.active{background:var(--card);color:var(--ink);border-color:var(--line);font-weight:600}
.node a.lbl .seif{color:var(--gilt);font-weight:700;font-size:12px;margin-inline-end:6px}
.node.group>.row>a.lbl{font-weight:600;color:var(--ink)}
.node a.lbl.accent{color:var(--pesak);font-weight:700}
.node a.lbl.accent:hover{background:#F4E9E6}
.node a.lbl.accent .accent-glyph{margin-inline-end:5px}
.caret{width:26px;border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:12px;
  border-radius:7px;display:flex;align-items:center;justify-content:center}
.caret:hover{background:var(--card-2);color:var(--ink)}
.children{margin-inline-start:14px;border-inline-start:1px solid var(--line);padding-inline-start:6px;
  overflow:hidden;transition:max-height .22s ease}
.children.collapsed{max-height:0!important}
.children a.lbl{font-size:13.5px;color:var(--ink-soft)}

main{min-width:0}

/* intro (collapsible) */
details.intro-strip{background:var(--card-2);border:1px solid var(--line);border-radius:11px;margin:0 0 20px}
details.intro-strip>summary{font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:.06em;
  color:var(--ink-soft);padding:11px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
details.intro-strip>summary::-webkit-details-marker{display:none}
details.intro-strip>summary::before{content:"▸";color:var(--gilt);transition:transform .15s}
details.intro-strip[open]>summary::before{transform:rotate(90deg)}
.intro-body{padding:2px 18px 16px;font-size:17px;color:#2c261d}
/* standalone intro page — on a distinct card, not the bare interface background */
.intro-full .intro-body{padding:20px 24px;background:linear-gradient(180deg,#f4efe4,#f1ebdd);
  border:1px solid var(--line);border-radius:13px;box-shadow:0 1px 0 #e6ddc9}
.intro-body .ib-p{margin:0 0 13px;text-align:justify}
.intro-body .ib-p:last-child{margin-bottom:0}
.intro-lead{font-family:var(--display);font-size:20px;color:var(--pasuk);margin:0 0 10px}
.intro-lead-line{margin:0 0 12px;color:#2c261d;text-align:justify}
.intro-lead-line .intro-quote{color:#4a4235}
sup.fn{color:var(--gilt);cursor:pointer;font-size:.7em;margin-inline-start:1px;font-weight:700;user-select:none}
sup.fn:hover{color:var(--pesak)}
.abbr{cursor:help}
.src-conn{font-weight:400;color:var(--ink-soft);font-size:.92em}
.src-ref{font-family:var(--ui);font-size:12.5px;font-weight:500;color:var(--ink-soft)}
.src-ref .srclink{color:var(--gemara);border-bottom-color:#c3b48f}

.sec-head{margin:0 0 4px}
.sec-kicker{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.1em;color:var(--gilt)}
h2.sec-title{font-family:var(--display);font-weight:400;font-size:clamp(26px,4vw,36px);margin:.1em 0 .3em;line-height:1.1}
.spanning{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);margin:-2px 0 10px}

.sugya{font-family:var(--ui);font-size:13.5px;color:var(--ink-soft);
  margin:2px 0 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sugya .pin{color:var(--gemara);font-weight:700}
.srclink{color:var(--gemara);font-weight:600;cursor:pointer;border-bottom:1px dashed #9db7d6}
.srclink:hover{border-bottom-style:solid}

.summary-card{background:linear-gradient(180deg,#f6efdf,#f1e8d3);border:1px solid #e2d3ad;border-radius:12px;padding:14px 18px;margin:10px 0 16px}
.summary-card .sum-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--gilt);margin-bottom:6px}
.summary-card .sum-txt{font-size:16.5px;line-height:1.72;color:#332b1c}
.summary-card .sum-txt b{font-weight:700;color:#1c1811}
.summary-card .sum-txt .term{border-bottom-color:var(--rishon)}
.sec-lead{font-family:var(--body);font-size:17.5px;line-height:1.72;color:#4a4235;border-inline-start:3px solid var(--gilt);background:transparent;padding:3px 15px;margin:8px 0 15px}
.sec-lead .lead-q{color:var(--ink);font-weight:700}
.sec-lead b{font-weight:700;color:#1c1811}
.sec-lead .term{border-bottom-color:var(--rishon)}

/* flowing reference text (no box) — for מושגים / קיצור וכד' */
.flow-block{margin:6px 0 20px}
.flow-block+.flow-block{margin-top:10px}
.flow-head{font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--gilt);
  margin:0 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.flow-body{white-space:pre-wrap;font-family:var(--body);font-size:16.5px;line-height:1.62;color:#2c261d}
.flow-body b{font-weight:700;color:#1c1811}
.t-alot{color:#B07D12;font-weight:700}    /* עלות / עמוד השחר */
.t-hanetz{color:#1C8A55;font-weight:700}   /* הנץ החמה */

/* in-page sub-heading divider (e.g. שעת הדחק, האיר פני המזרח) */
.op-subhead{margin:30px 0 10px;padding-top:16px;border-top:1px solid var(--rule);
  display:flex;align-items:baseline;gap:11px;flex-wrap:wrap}
.op-subhead .ost{font-family:var(--display);font-weight:400;font-size:21px;color:var(--ink);line-height:1.2}
.op-subhead-src{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft)}
.op-subhead-src .srclink{color:var(--gemara);font-weight:600}

.op{position:relative;background:var(--card);border:1px solid var(--line);
  border-right:4px solid var(--rule);border-radius:10px;padding:13px 18px 14px;margin:9px 0}
.op-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:3px}
.op-lbl::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.op .src{font-family:var(--ui);font-weight:700;font-size:14.5px;margin-bottom:2px}
.op .src .srclink{border-bottom:1px dashed #c3b48f}
.op .txt{margin-top:2px}
.op .txt b,.pesak b,.intro-body b{font-weight:700;color:#1c1811}

.L-pasuk{color:var(--pasuk)} .L-pasuk.op{border-right-color:var(--pasuk)}
.L-mishna{color:var(--mishna)} .L-mishna.op{border-right-color:var(--mishna)}
.L-gemara{color:var(--gemara)} .L-gemara.op{border-right-color:var(--gemara)}
.L-rishon{color:var(--rishon)} .L-rishon.op{border-right-color:var(--rishon)}
.L-acharon{color:var(--acharon)} .L-acharon.op{border-right-color:var(--acharon)}
.L-zman{color:var(--zman)} .L-zman.op{border-right-color:var(--zman)}
/* SA & RMA — the halachic spine, stronger */
.L-shulchan{color:var(--shulchan)}
.L-shulchan.op{border-right:6px solid var(--shulchan);background:#f3ebd8;box-shadow:0 1px 0 #e5dcc4}
.L-shulchan.op .src{font-size:15.5px}
.L-rama{color:var(--rama)}
.L-rama.op{border-right:6px solid var(--rama);background:#f0eaf4}
.L-rama.op .src{font-size:15.5px}

.op.under{margin-inline-start:26px;border-right-width:2px;background:color-mix(in srgb,var(--card) 55%,transparent);opacity:.94;position:relative}
.op.under::before{content:"↳";position:absolute;inset-inline-start:-20px;top:12px;color:var(--ink-faint);font-size:15px}
.op.op-collapsed{padding:0;background:var(--card-2)}
.op.op-collapsed>summary{cursor:pointer;list-style:none;padding:11px 18px;display:flex;align-items:center;gap:9px;font-family:var(--ui)}
.op.op-collapsed>summary::-webkit-details-marker{display:none}
.op.op-collapsed>summary::before{content:"▸";color:var(--ink-faint);font-size:12px;transition:transform .15s}
.op.op-collapsed[open]>summary::before{transform:rotate(90deg)}
.op.op-collapsed>summary .op-more{color:var(--ink-soft);font-family:var(--ui);font-size:13.5px;font-weight:600}
.op.op-collapsed>.src{padding:0 18px}
.op.op-collapsed>.txt{padding:2px 18px 14px}
.op.op-collapsed .op-lbl{margin-bottom:0}
.pesak{background:linear-gradient(180deg,#fbf4ee,#f7ece4);border:1px solid #e6cdbf;
  border-right:5px solid var(--pesak);border-radius:11px;padding:15px 20px;margin:16px 0 6px}
.pesak .plbl{font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);letter-spacing:.05em;
  display:flex;align-items:center;gap:7px;margin-bottom:4px}
.pesak .plbl .dia{color:var(--gilt)}
.pesak .txt{color:#2b211d;font-size:17.5px}

.term{color:var(--rishon);border-bottom:1.5px dotted var(--rishon);cursor:help;font-weight:500}
.secref{color:var(--pesak);border-bottom:1.5px dotted var(--pesak);cursor:pointer;font-weight:600;font-family:var(--ui);font-size:.92em}

/* popovers */
#pop{position:fixed;z-index:60;max-width:290px;background:var(--ink);color:#f3ede0;
  font-family:var(--ui);font-size:13.5px;line-height:1.55;padding:11px 14px;border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .12s}
#pop b{color:var(--gilt);display:block;margin-bottom:3px;font-size:13px}
#pop.on{opacity:1}
#src{position:fixed;z-index:61;width:330px;max-width:92vw;background:var(--card);color:var(--ink);
  border:1px solid var(--rule);border-radius:12px;box-shadow:0 14px 40px rgba(30,20,10,.25);
  padding:14px 16px 12px;display:none}
#src.on{display:block}
#src .sref{font-family:var(--ui);font-weight:700;font-size:13.5px;color:var(--gemara);margin-bottom:7px}
#src .stext{font-family:var(--body);font-size:16px;line-height:1.7;max-height:230px;overflow:auto;color:#2b241b}
#src .srow{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}
#src .open{font-family:var(--ui);font-weight:700;font-size:13px;text-decoration:none;color:#fff;
  background:var(--gemara);padding:7px 13px;border-radius:8px}
#src .close{font-family:var(--ui);font-size:12px;color:var(--ink-faint);background:none;border:none;cursor:pointer}

.ask{margin-top:38px;background:#1f2a24;color:#eef0ea;border-radius:16px;padding:22px 22px 20px;font-family:var(--ui)}
.ask h3{margin:0 0 3px;font-weight:700;font-size:18px}
.ask .hint{color:#a9b6ac;font-size:13.5px;margin:0 0 14px;line-height:1.5}
.ask .chips{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.ask .chip{background:#2b3a31;border:1px solid #3c4f43;color:#d7e0d6;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer}
.ask .chip:hover{background:#35473b}
.ask .row{display:flex;gap:9px}
.ask input{flex:1;background:#141b17;border:1px solid #37473d;color:#f2f4ef;border-radius:10px;
  padding:12px 14px;font-family:var(--ui);font-size:15px;direction:rtl}
.ask input:focus{outline:none;border-color:#5c7a67}
.ask button.send{background:var(--gilt);color:#20160a;border:none;border-radius:10px;padding:0 20px;
  font-family:var(--ui);font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap}
.ask button.send:disabled{opacity:.55;cursor:default}
.answer{margin-top:15px;background:#182019;border:1px solid #2e3d33;border-radius:11px;padding:15px 17px;
  font-size:15.5px;line-height:1.75;color:#e8ece6;white-space:pre-wrap;font-family:var(--body);display:none}
.answer.on{display:block}
.answer .secref{color:#e9b45a;border-bottom-color:#e9b45a}
.answer .note{font-family:var(--ui);font-size:12px;color:#8fa093;margin-top:11px;border-top:1px solid #2e3d33;padding-top:9px;white-space:normal}
.spin{display:inline-block;width:15px;height:15px;border:2px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-inline-start:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* flashcards */
.fc-sub{font-family:var(--ui);color:var(--ink-soft);font-size:14.5px;margin:0 0 16px}
.fc-filters{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:var(--ui);font-size:14px;margin-bottom:18px}
.fc-filters label{color:var(--ink-soft);font-weight:600}
.fc-filters select{font-family:var(--ui);font-size:14px;padding:6px 10px;border:1px solid var(--rule);border-radius:8px;background:var(--card);color:var(--ink);margin-inline-start:6px}
.fc-types{display:flex;gap:7px;flex-wrap:wrap}
.fc-t{font-family:var(--ui);font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--rule);background:var(--card);color:var(--ink-soft);cursor:pointer}
.fc-t.on{background:var(--ink);color:#f3ede0;border-color:var(--ink)}
.fc-start{margin-inline-start:auto;font-family:var(--ui);font-weight:700;font-size:14px;background:var(--gilt);color:#20160a;border:none;border-radius:9px;padding:9px 16px;cursor:pointer}
.fc-progress{display:flex;align-items:center;gap:12px;font-family:var(--ui);font-size:13px;color:var(--ink-soft);margin-bottom:12px}
.fc-bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.fc-bar i{display:block;height:100%;background:var(--gilt);transition:width .25s}
.fc-card{background:var(--card);border:1px solid var(--rule);border-radius:16px;min-height:210px;padding:26px 26px 30px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;cursor:pointer;box-shadow:0 4px 18px rgba(40,30,15,.06)}
.fc-card.flip{cursor:default;background:#f6f1e6}
.fc-tag{position:absolute;top:12px;inset-inline-end:14px;font-family:var(--ui);font-size:11px;font-weight:700;color:var(--gilt);letter-spacing:.05em}
.fc-face{max-width:620px}
.fc-q{font-family:var(--display);font-size:23px;line-height:1.35;color:var(--ink)}
.fc-a{font-family:var(--body);font-size:18px;line-height:1.7;color:#2b241b;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
.fc-a b{font-weight:700;color:#1c1811}
.fc-hint{font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);margin-top:18px}
.fc-jump{display:inline-block;margin-top:12px;font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);cursor:pointer;border-bottom:1.5px dotted var(--pesak)}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fc-controls button{font-family:var(--ui);font-weight:700;font-size:15px;border:none;border-radius:10px;padding:11px 22px;cursor:pointer}
.fc-flip{background:var(--ink);color:#f3ede0}
.fc-yes{background:#3f7d5f;color:#fff}
.fc-no{background:#a24b4b;color:#fff}
.fc-end{text-align:center;padding:34px;background:var(--card);border:1px solid var(--rule);border-radius:16px}
.fc-score{font-family:var(--display);font-size:28px;color:var(--ink);margin-bottom:16px}
.fc-perfect{color:var(--gilt);font-family:var(--ui);font-weight:700;margin-bottom:16px}
.fc-again,.fc-restart{font-family:var(--ui);font-weight:700;font-size:14px;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;margin:0 5px}
.fc-again{background:var(--gilt);color:#20160a}
.fc-restart{background:var(--card-2);color:var(--ink);border:1px solid var(--rule)}
.fc-empty{padding:20px;color:var(--ink-soft);font-family:var(--ui)}

footer{border-top:1px solid var(--rule);font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);padding:18px 0 40px;text-align:center}

.home-link{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--ink-soft);text-decoration:none;display:inline-block;margin-bottom:10px;border:1px solid var(--rule);border-radius:8px;padding:5px 12px;background:var(--card)}
.home-link:hover{background:var(--card-2);color:var(--ink)}
.grid.home{grid-template-columns:1fr}
.grid.home nav.rail{display:none}
.subjects{padding:8px 0 44px;display:flex;flex-direction:column;gap:16px}
.subject-head{width:100%;display:flex;align-items:center;gap:12px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:13px 18px;cursor:pointer;font-family:var(--display);font-size:23px;color:var(--ink);text-align:start}
.subject-head:hover{background:#efe9dc}
.sh-caret{color:var(--gilt);font-size:15px;transition:transform .15s}
.subject-group.collapsed .sh-caret{transform:rotate(-90deg)}
.sh-title{flex:1}
.sh-count{font-family:var(--ui);font-size:12.5px;font-weight:600;color:var(--ink-faint)}
.subject-topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:14px 4px 2px}
.subject-group.collapsed .subject-topics{display:none}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:8px 0 40px}
.topic-card{display:block;text-decoration:none;background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:20px 22px;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 10px rgba(40,30,15,.05)}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(40,30,15,.1);border-color:var(--gilt)}
.tc-eyebrow{font-family:var(--ui);font-size:11.5px;font-weight:600;letter-spacing:.08em;color:var(--gilt);margin-bottom:8px}
.tc-title{font-family:var(--display);font-size:26px;color:var(--ink);line-height:1.1;margin-bottom:12px}
.tc-meta{font-family:var(--ui);font-size:12.5px;color:var(--ink-faint)}
@media(max-width:820px){
  body{font-size:17px}
  .grid{grid-template-columns:1fr;gap:8px;padding:14px 0 70px}
  nav.rail{position:static;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:10px}
}
</style>

<script id="content" type="application/json">{"title": "סיכומי הלכה", "subtitle": "אוסף", "topics": [{"topic": {"title": "בישול", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ח", "siman": "Shulchan_Arukh,_Orach_Chayim.318", "intro": {"lead": {"t": "'תנא דידן שבק בישול סממנין ונקט סידורא דפת'", "ref": ""}, "body": "בישול אינה אחת מל\"ט אבות מלאכה, ואינה נמנית במשנת אבות המלאכה, אלא 'תנא דידן שבק בישול סממנין ונקט סידורא דפת'."}}, "sections": {"kitzur": {"title": "קיצור כלים — מדרג קלות הבישול", "seif": null, "sugya": null, "intro": "מפה תמציתית של היררכיית הכלים ומדרג קלות הבישול — לחזור אליה בכל נושא. (המושגים מקושרים גם למילון.)", "ops": [{"layer": "note", "srcRef": null, "src": "כלי ראשון שעל האש", "txt": "אסור בבישול מן התורה. (רבי לרב יצחק: לא לשפוך שמן לאמבטי שהיא כלי ראשון; ואין נותנים ביצה בצד המיחם שתתגלגל.)"}, {"layer": "note", "srcRef": null, "src": "כלי ראשון שהורד מהאש", "txt": "שו״ע (רש״י): מבשל כל עוד יד סולדת בו. מרדכי: מבשל כל עוד רותח, אף אם כבר אין יד סולדת בו. (לכו״ע תבלינים מתבשלים אף לאחר שירד מחום שהידס״ב.)"}, {"layer": "note", "srcRef": null, "src": "עירוי מכלי ראשון", "txt": "רשב״ם: אינו מבשל. ר״ת: מבשל (כדי קליפה). תוס׳ (ר״י): עירוי אף מכלי שני מבשל קלי בישול ודברים שהדחתם גמר מלאכתם. שו״ע: כר״ת — עירוי מכלי ראשון מבשל."}, {"layer": "note", "srcRef": null, "src": "כלי שני", "txt": "עפ״י פשט הסוגיה — אינו מבשל. תוס׳ (ר״י): אינו מבשל, אך אסור משום מיחזי כמבשל. יראים: כל כלי שהידס״ב אסור לבשל בו. שו״ע: לא הכריע (משנ״ב מיקל). רמ״א: מחמיר. ערוך השולחן: מחמיר רק בקלי הבישול."}, {"layer": "note", "srcRef": null, "src": "מצקת — ראשון או שני?", "txt": "שהתה בסיר — ככלי ראשון. לא: פרי חדש — כלי שני; ט״ז — רק מה שמערים עליו מכלי ראשון; שש״כ — ככלי ראשון; מנחת יצחק — כלי שני."}, {"layer": "note", "srcRef": null, "src": "מדרג קלות הבישול", "txt": "קשה בישול — רק בכלי ראשון שעל האש. רגיל — בכלי ראשון שהורד (בהידס״ב). תבלין — בכלי ראשון שהורד אף בלא הידס״ב, לא בכלי שני. קלי בישול — אף בכלי שני (תוס׳: אף בעירוי; יראים/רא״מ: אף בכלי שלישי)."}, {"layer": "note", "srcRef": null, "src": "מלח", "txt": "שו״ע (רי״ף, רמב״ם, רא״ש): אינו מתבשל אף בכלי ראשון שהורד. רמ״א: קל בישול, מתבשל אף בכלי שני. ר״ן: בכלי ראשון שעל האש — מתבשל לכו״ע."}, {"layer": "note", "srcRef": null, "src": "תה", "txt": "עלי תה אינם מבושלים בייצור. כלי ראשון/עירוי — אסור לשו״ע ולרמ״א. כלי שני: לרמ״א אסור; לשו״ע לא הוכרע (משנ״ב מיקל). ולכו״ע מותר לבשל העלים לפני שבת ולהכין תה בשבת (אין בא״ב ביבש)."}], "pesak": null}, "maase": {"title": "הגדרת מעשה הבישול (ריכוך או הקשייה)", "seif": null, "sugya": null, "intro": "מהו 'מעשה בישול' — ריכוך, הקשייה, או כל התקנת מאכל בחום?", "ops": [{"layer": "gemara", "src": "גמרא · רב פפא", "srcRef": null, "txt": "התנא עבר מ'בישול סממנין' ל'אופה' — כי הסידור במשנה הוא של מלאכות יצירת הפת (זורע, חורש, קוצר...), ואפייה היא בישול הפת.", "collapsed": true, "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "רב אחא בר רב עוירא", "srcRef": null, "txt": "הזורק סיכתא (יתד) לכבשן שתתקשה — חייב. ובסוגיה: החיוב משום שהיתד מתרככת קודם ורק אז מתקשה ('מירפא רפי והדר קמיט').", "ref": {"label": "שם", "ref": "Shabbat.74a"}}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "היתד מתרככת בחום ואז מתקשה — 'וכי רפי ברישא הוי בישולו'. בישול הוא ריכוך (ושייך אף בדברים שאינם אוכל)."}, {"layer": "rishon", "src": "רמב״ם", "srcRef": null, "txt": "'כללו של דבר: בין שריפה גוף קשה באש או שהקשה גוף רך — הרי זה חייב משום מבשל.' משמע שכל התקנת מאכל בחום נאסרת, לא רק ריכוך."}, {"layer": "acharon", "src": "משנה ברורה", "srcRef": null, "txt": "הרמב״ם אינו חולק על רש״י שעיקר בישול הוא ריכוך — אלא שבכל הקשייה ודאי יש ריכוך תחילה.", "under": true}], "pesak": null}, "shiur_mutzak": {"title": "שיעור בישול במוצק — כמאב״ד", "seif": "סעיף ב׳", "sugya": null, "intro": "מהו שיעור הבישול המחייב במאכל מוצק?", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "אין צולין בשר בצל וביצה בערב שבת אלא כדי שיצולו מבעוד יום (אסור להניחם להתבשל אלא אם יספיקו להתבשל לפני שבת).", "ref": {"label": "שבת · פרק יציאות השבת · יט ע\"ב", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "גמרא · רבי אלעזר", "srcRef": null, "txt": "שיעור הבישול — כמאכל בן דרוסאי.", "ref": {"label": "שם", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "חנניה", "srcRef": null, "txt": "כל שמבושל כמאב״ד — מותר להשהותו על גבי כירה (שכבר מבושל; אך ודאי יש חשש חיתוי).", "collapsed": true}, {"layer": "rishon", "src": "רש״י · רמב״ם", "srcRef": null, "txt": "מהו שיעור מאב״ד? רש״י: שליש בישול. רמב״ם: חצי בישול."}, {"layer": "rishon", "src": "הר״ן (קושיה ותירוץ)", "srcRef": null, "txt": "הקשה: מהסוגיה משמע שמותר להשהות מבושל כמאב״ד, ולרמב״ם (רנג,א) רק כל צרכו. ותירץ: לעניין שהייה חוששים 'שמא יחתה', והחשש בטל בכל צרכו; וכאן (בשר על הגחלים בלא קדרה) — אם יחתה ייחרך, ולכן לא חוששים.", "collapsed": true}, {"layer": "rishon", "src": "בית יוסף (ברמב״ם)", "srcRef": null, "txt": "ההיתר להשהות מבושל כמאב״ד על הגחלים — רק אם מבושל כך משני צדדיו.", "collapsed": true}, {"layer": "shulchan", "src": "שולחן ערוך · רנ״ד · (סע׳ ב׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.254.2", "txt": "כרמב״ם — שיעור מאב״ד הוא חצי בישולו; ואסור לצלות בשר בצל וביצה על הגחלים אלא כדי שיצלו משני הצדדים כמאב״ד מבעוד יום."}, {"layer": "acharon", "src": "משנה ברורה", "srcRef": null, "txt": "אף בשר גדי (שבס׳ א מותר להשהות אף שאינו כמאב״ד) — על הגחלים ממש אסור, שדואג שיתבשל מהר ויש חשש שמא יחתה.", "under": true}], "pesak": null}, "shiur_nozel": {"title": "שיעור בישול בנוזל — יד סולדת בו", "seif": "סעיף י״ד", "sugya": null, "intro": "בנוזל, האיסור מדאורייתא אינו במידת בישול אלא בדרגת חום — חום שהיד סולדת בו.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "מניח אדם קיתון מים כנגד מדורה — לא כדי שיחמו, אלא כדי שיפשירו מצינתם.", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "שמואל", "srcRef": null, "txt": "אחד שמן ואחד מים — יד סולדת בו, אסור.", "ref": {"label": "שם", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מהו 'יד סולדת בו'? כל שכריסו של תינוק נכווית בו. וכן נקט השו״ע."}, {"layer": "zman", "src": "פוסקי זמננו", "srcRef": null, "txt": "הגדרה משתנה: הדעות נעות מ־45° (הגרש״ז אויערבך) ועד 71° (הרב פיינשטיין)."}], "pesak": null}, "makor": {"title": "מקור החום — חמה ותולדותיה", "seif": "סעיף ג׳", "sugya": null, "intro": "מדאורייתא אסור לבשל באש ובתולדותיה; בחמה ותולדותיה מותר מן התורה — אך תולדות חמה נאסרו מדרבנן (אטו תולדות האש).", "ops": [{"layer": "mishna", "src": "משנה · ת״ק · רבי יוסי", "srcRef": null, "txt": "אין נותנים ביצה בצד המיחם (תולדות האש) שתתגלגל, ואין מטמינה בחול. ובתולדות חמה — נחלקו ת״ק ורבי יוסי אם מותר לשבור ביצה על בגד שהוחם בשמש.", "ref": {"label": "שבת · פרק כירה · לח ע\"ב", "ref": "Shabbat.38b"}}, {"layer": "gemara", "src": "גמרא · רב נחמן", "srcRef": null, "txt": "לכו״ע מותר בחמה ואסור באוּר. ת״ק ורבי יוסי נחלקו בתולדות חמה — ת״ק אוסר שמא יבשל בתולדות האוּר.", "ref": {"label": "שם", "ref": "Shabbat.38b"}}, {"layer": "rishon", "src": "ראשונים", "srcRef": null, "txt": "פסקו כת״ק — אסור מדרבנן לבשל בתולדות חמה."}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "בחמה מותר, שאין זו דרך בישול; ולא גוזרים אטו, שאין סיבה להתבלבל.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ג׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.3", "txt": "כת״ק — אסור לבשל בתולדות חמה (שמא יבשל בתולדות האש), ומותר בחום החמה עצמה. (וההטמנה בחול אסורה אף מבעוד יום, כמוסיף הבל.)"}, {"layer": "acharon", "src": "מהרש״ל", "srcRef": null, "txt": "אף שאסור בתולדות חמה — מותר לבשל על גג רותח, שלא יבוא ממנו לבשל בתולדות האוּר.", "collapsed": true}, {"layer": "zman", "src": "הרב עובדיה (דוד שמש)", "srcRef": null, "txt": "מים בדוד שמש הם תולדות חמה. ומיקל: פתיחת הברז גורמת כניסת מים קרים לצינורות/מיכל החמים — פסיק רישא (אינו מתכוון), ואף שניחא ליה, בדרבנן ניתן להקל. (ודוד חשמל ודאי אסור — הווי אוּר.)"}], "pesak": null}, "bab": {"title": "בישול אחר בישול", "seif": "סעיף ד׳", "sugya": null, "intro": "האם יש איסור בישול בדבר שכבר התבשל? נבחין בין יבש ללח.", "ops": [{"subhead": "יבש"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כל שבא בחמין מער״ש — שורין אותו בחמין בשבת; ומה שלא — אין שורין, אבל מותר להדיחו בחמין; חוץ מן המליח הישן וקולייס האיספנין, שהדחתן היא גמר מלאכתן.", "ref": {"label": "שבת · פרק חבית · קמה ע\"א", "ref": "Shabbat.145a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "'כגון מה?' — כגון תרנגולתא דרבי אבא. דבר שבושל מער״ש מותר לבשלו בשבת; ומה שלא — רק להפיג צינתו, ולא דבר ששטיפה מכשירתו (דגים מלוחים).", "ref": {"label": "שם", "ref": "Shabbat.145a"}}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "'בא בחמין' = בישול גמור, כל צרכו (תרנגולתא דרבי אבא)."}, {"layer": "rishon", "src": "רשב״א · רא״ש", "srcRef": null, "txt": "אפילו כמאב״ד (עפ״י רבי אלעזר בדף יט).", "under": true}, {"layer": "rishon", "src": "בית יוסף (ברמב״ם)", "srcRef": null, "txt": "כל דבר שבא בחמין בער״ש — אף שלא נתבשל; וב״י למד מתרנגולתא דרבי אבא שמדובר בדבר יבש.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ד׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.4", "txt": "כתוספות — דבר יבש שנתבשל כל צרכו מותר לשרותו בחמין בשבת. (אך אסור מדרבנן בכלי ראשון העומד על האש — מיחזי כמבשל.)"}, {"layer": "note", "srcRef": null, "src": "עיקרון (יבש)", "txt": "תבשיל יבש שהתבשל כל צרכו — לכו״ע מותר לחממו אף אם נצטנן. (וההיתר רק בכלי ראשון שהורד מהאש.)"}, {"subhead": "בלח (סע׳ ד׳)"}, {"layer": "rishon", "src": "רא״ש · סמ״ק (עפ״י רש״י)", "srcRef": null, "txt": "תבשיל שנצטנן ויש בו נוזל — שייך בו בישול אחר בישול (בלא חילוק מצטמק)."}, {"layer": "rishon", "src": "ר׳ ירוחם", "srcRef": null, "txt": "כל דבר שנצטנן (אף שבושל כ״צ) ויש בו רוטב והוא 'מצטמק ויפה לו' — שייך בו בא״ב."}, {"layer": "rishon", "src": "בית יוסף בשם ר׳ יונה", "srcRef": null, "txt": "מכלל דברי ר׳ ירוחם: תבשיל לח 'מצטמק ורע לו' — אין בו בא״ב אף אם נצטנן.", "under": true}, {"layer": "rishon", "src": "רמב״ם · רשב״א", "srcRef": null, "txt": "אין בישול אחר בישול לעולם, אפילו בלח שנצטנן."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ד׳)", "srcRef": "Shulchan  ט״ז)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.16", "txt": "כרשב״א — מותר להניח אינפאנדה כנגד האש במקום שהידס״ב, אף שהשומן שבה נימוח."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "יש לחוש ולהחמיר כספר התרומה, אך ניתן להקל במקום הצורך."}, {"layer": "lead", "srcRef": null, "txt": "מדוע התיר השו״ע אף בחום שהידס״ב? ביבש אין בא״ב, אך משנימוח השומן — יש כאן בישול בלח!", "src": "קושיה"}, {"layer": "acharon", "src": "לבוש", "srcRef": null, "txt": "יש טעות סופר בשו״ע — צריך לגרוס 'במקום שאין הידס״ב', ואסור לחמם בחום שהידס״ב.", "under": true}, {"layer": "acharon", "src": "מגן אברהם", "srcRef": null, "txt": "אין בעיה אף בהידס״ב — הולכים אחר מצב התבשיל בתחילת החימום, ואז נחשב מוצק.", "under": true}, {"layer": "acharon", "src": "בית יוסף (סיום)", "srcRef": null, "txt": "אף לתרומה מותר לחמם פשטידה שהשומן שלה אינו ניכר בעצמו אלא מתערב בקדרה — כנתינת קרח בכוס (נמחה מאליו ואין ניכר).", "collapsed": true}], "pesak": null}, "baa": {"title": "בישול אחר אפייה", "seif": "סעיף ה׳", "sugya": null, "intro": "על פניו בא״א כבא״ב במוצק (מותר) — אך מסברת היראים יש לו דין ייחודי.", "ops": [{"layer": "gemara", "src": "ברייתא · רבי יוסי", "srcRef": null, "txt": "אין יוצאים ידי חובת מצה במצה שהתבשלה (לאחר אפייתה).", "ref": {"label": "פסחים · פרק כל שעה · מא ע\"א", "ref": "Pesachim.41a"}}, {"layer": "rishon", "src": "יראים", "srcRef": null, "txt": "מכאן שיש בישול אחר אפייה — הבישול ביטל את האפייה ושינה את המצה. וכן בישול אחר צלייה."}, {"layer": "rishon", "src": "ראבי״ה", "srcRef": null, "txt": "חלק — מהות המצה לא השתנתה, רק טעמה; ולצאת י״ח מצה בעינן טעם מצה. ואין בישול אחר אפייה.", "under": true}, {"layer": "rishon", "src": "סמ״ק · סמ״ג (בדעת היראים)", "srcRef": null, "txt": "עד איזה כלי נאסרת נתינת פת? סמ״ק (רא״מ): רק כלי ראשון (בשני מותר). סמ״ג: אף כלי שני, שהלחם מקלי הבישול."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ה׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.5", "txt": "הביא היראים ב'יש אומרים' כהבנת הסמ״ג (אף כלי שני), וכתב 'ויש מי שמתיר'."}, {"layer": "rama",  "src": "ר״ת", "srcRef": null, "txt": "עירוי מכלי ראשון חשיב ככלי ראשון — ולכן מותר רק בכלי שני.", "under": true}, {"layer": "rishon", "src": "ר״י (בתוס׳)", "srcRef": null, "txt": "רק עירוי מכלי שני מותר; ושרייה בכלי שני אסורה משום מיחזי כמבשל. ורק בדבר ש'הדחתו גמר מלאכתו' (וקלי בישול) אסור אף בעירוי מכלי שני; בסתם דברים — עירוי מכלי שני אינו מבשל."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.10", "txt": "עירוי מכלי ראשון מבשל (ובס׳ יג — בישול בכלי שני)."}, {"layer": "acharon", "src": "פוסקים", "srcRef": null, "txt": "דבר שהדחתו גמר מלאכתו — אסור להדיחו אף בכלי שני, שגם בחום זה שטיפתו מכשירתו."}, {"layer": "acharon", "src": "ט״ז", "srcRef": null, "txt": "דגים מלוחים (הרינג) — מותר להדיחם רק במים צוננים, שאין בהדחתם גמר מלאכה.", "under": true}, {"layer": "acharon", "src": "אליה רבה · מחצית השקל", "srcRef": null, "txt": "מותר אף לערות מים חמים מכלי שני — שדבר שהדחתו בצוננים מכשירתו, משמע שבחמים אינה בישול.", "under": true}, {"layer": "acharon", "src": "פמ״ג · נשמת אדם", "srcRef": null, "txt": "אסרו אף במים צוננים — שכל שטיפה המכשירתו אסורה משום 'מכה בפטיש', בין חם בין קר.", "under": true}, {"layer": "acharon", "src": "ביאור הלכה", "srcRef": null, "txt": "לא שייך מכה בפטיש באוכלים (ראיה מהטמנת ביצה בחול — דרבנן); ומה שאסור בחמים משום בישול. ולכן מותר מכלי שני בחמים (כא״ר ומחצה״ש).", "under": true}, {"subhead": "מלח וקלי הבישול (סע׳ ט׳)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "האילפס והקדרה שהעבירן מרותחין (הורדו מהאש) — אסור לתת לתוכם תבלין, אבל נותנים לקערה או לתמחוי. (כלי ראשון מבשל אף שהורד; כלי שני אינו מבשל.)", "ref": {"label": "שבת · פרק כירה · מב ע\"א", "ref": "Shabbat.42a"}}, {"layer": "gemara", "src": "רב יוסף · אביי · רב נחמן", "srcRef": null, "txt": "רב יוסף: מלח כתבלין. אביי (לשון א'): מלח אינו כתבלין ומתבשל אף בכלי שני (קל בישול); רב נחמן חולק — 'צריכא מילחא בישולא כבשרא דתורא'. אביי (לשון ב'): מלח אינו מתבשל אף בכלי ראשון; ורב נחמן מסכים."}, {"layer": "rishon", "src": "רי״ף · רמב״ם · רא״ש", "srcRef": null, "txt": "כלשון השנייה — מלח קשה בבישולו, ואינו מתבשל אף בכלי ראשון (שהורד), ולכן מותר."}, {"layer": "rishon", "src": "הגהות אשרי · תוספות", "srcRef": null, "txt": "כך, אך המחמיר שלא לתת מלח אף בכלי שני — תבוא עליו הברכה.", "under": true}, {"layer": "rishon", "src": "ריטב״א", "srcRef": null, "txt": "יש להחמיר כלשון הראשונה, ולא לתת מלח אף בכלי שני (בדאורייתא — כלישנא מחמירה).", "under": true}, {"layer": "rishon", "src": "הר״ן", "srcRef": null, "txt": "הלשון המקילה רק בכלי ראשון שהורד; אך בעודו על האש — לכו״ע אף מלח (ואף בשר השור) מתבשל.", "under": true}, {"layer": "rishon", "src": "שיבולי הלקט", "srcRef": null, "txt": "עבר ונתן מלח באיסור (אף במזיד) — אין לאסור המאכל, שבטל המלח.", "collapsed": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ט׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "כרי״ף וסיעתו — מותר לתת מלח בכלי ראשון שהורד מהאש."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "יש אוסרים (כריטב״א) אף בכלי שני; ו'המחמיר תבוא עליו הברכה'. ומי שעבר ונתן מלח בכלי ראשון שעל האש — מותר לאכול (שיבולי הלקט)."}, {"layer": "acharon", "src": "משנה ברורה (סוכר)", "srcRef": null, "txt": "עדיף להחמיר בסוכר ולא לבשלו אלא בכלי שני (אף שנתבשל בייצורו)."}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "מיקל בסוכר — דינו כמלח, ולמלח קיי״ל כשו״ע שמותר אף בכלי ראשון (שהורד).", "under": true}, {"layer": "rishon", "src": "ר״ן · רמב״ם (קלי בישול)", "srcRef": null, "txt": "אין חשש לקלי בישול — מותר הכול בכלי שני.", "collapsed": true}, {"subhead": "כח החימום של כלי ראשון (סע׳ ט׳)"}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "כל עוד יד סולדת בו — דינו ככלי ראשון."}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "כל עוד לא נח מרתיחתו — אף אם כבר אין יד סולדת בו."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ט׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "כרש״י — כלי ראשון מבשל אף לאחר שהורד, כל עוד יד סולדת בו (ולכן אסור לתת בו תבלין, אך מלח מותר)."}], "pesak": null const ABBR={"מ״ב":"משנה ברורה","מג״א":"מגן אברהם","רא״ש":"רבנו אשר (הרא״ש)","רמב״ם":"רבנו משה בן מימון","רמב״ן":"רבנו משה בן נחמן","רשב״א":"רבנו שלמה בן אדרת","רשב״ם":"רבנו שמואל בן מאיר","שו״ע":"שולחן ערוך","רמ״א":"רבי משה איסרליש","ב״י":"בית יוסף","ט״ז":"טורי זהב","ש״ך":"שפתי כהן","פמ״ג":"פרי מגדים","פר״ח":"פרי חדש","א״ר":"אליה רבה","בה״ל":"ביאור הלכה","ר״ן":"רבנו נסים","ר״ח":"רבנו חננאל","ר״ת":"רבנו תם","רי״ף":"רבנו יצחק אלפסי","בה״ג":"בעל הלכות גדולות","רע״א":"רבי עקיבא איגר","ערוה״ש":"ערוך השולחן","סמ״ג":"ספר מצוות גדול","סמ״ק":"ספר מצוות קטן","תרוה״ד":"תרומת הדשן","של״ה":"שני לוחות הברית","ריו״ח":"רבי יוחנן","ת״ק":"תנא קמא","תשב״ץ":"תשב״ץ (שמעון בן צמח)","ראבי״ה":"רבי אליעזר בן יואל הלוי","דרכ״מ":"דרכי משה","רש״י":"רבי שלמה יצחקי","ר״י":"רבנו יצחק (מבעלי התוס׳)","רא״מ":"רבנו אליהו מזרחי","מהרש״ל":"מהר״ש לוריא","אג״מ":"אגרות משה","שש״כ":"שמירת שבת כהלכתה","ב״ח":"בית חדש","מהריט״ץ":"מהר״י טאיטאצאק"};

let SECTIONS={}, INTRO={lead:{t:'',url:null},body:''}, NAV=[], GLOSS={}, SEIF2ID={}, SECLIST="", CUR=null;
function deriveTopic(D){
  CUR=D; GLOSS=D.glossary||{};
  SECTIONS={};
  for(const _id in D.sections){const x=D.sections[_id];
    const o={seif:x.seif,title:x.title,sugya:x.sugya?{label:x.sugya.label,url:_full(x.sugya.ref)}:null};
    if(x.intro)o.intro=x.intro;
    if(x.flow)o.flow=x.flow;
    o.navAccent=!!x.navAccent;
    if(x.summary)o.summary=x.summary;
    o.ops=(x.ops||[]).map(p=>({L:p.layer,src:p.src,srcUrl:_full(p.srcRef),txt:p.txt,under:!!p.under,collapsed:!!p.collapsed,subhead:p.subhead,ref:p.ref?{label:p.ref.label,url:_full(p.ref.ref)}:null}));
    if(x.pesak)o.pesak=x.pesak;
    SECTIONS[_id]=o;
  }
  INTRO={lead:{t:D.topic.intro.lead.t,url:_full(D.topic.intro.lead.ref)},body:D.topic.intro.body};
  NAV=D.nav;
  SEIF2ID={}; const sl=[];
  for(const _id in SECTIONS){const s=SECTIONS[_id];
    if(s.seif){const m=(s.seif.match(/[א-ת]/g)||[]); if(m.length){SEIF2ID[m.join('')]=_id; if(m.length===1)SEIF2ID[m[0]]=_id;}}
    sl.push((s.seif?s.seif+' ':'')+'('+s.title+')');
  }
  SECLIST=sl.join(', ');
}

// ---------- text helpers ----------
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const reEsc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
// match a name whether it uses a straight quote (") or typographic gershayim (״)
const qc=s=>reEsc(s).replace(/[״"]/g,'(?:[״"]|&quot;)');
// one ordered regex (longest names first); allows a single attached Hebrew prefix (וכלבמשה)
const NAME_RE=new RegExp('(?<![א-ת])[ובכלמשה]{0,2}(?:'+
  NAMES.slice().sort((a,b)=>b.length-a.length).map(qc).join('|')+')(?![א-ת])','g');
function boldNames(t){return t.replace(NAME_RE,m=>"\x01"+m+"\x02");}
const ABBR_RE=new RegExp('(?<![א-ת])('+Object.keys(ABBR).sort((a,b)=>b.length-a.length).map(qc).join('|')+')(?![א-ת])','g');
// wrap known abbreviations in an (invisible) hover-tooltip span; input is already HTML-escaped
function abbrify(s){return s.replace(ABBR_RE,m=>{const k=m.replace(/&quot;/g,'״').replace(/"/g,'״');return ABBR[k]?'<span class="abbr" data-full="'+ABBR[k]+'">'+m+'</span>':m;});}
// render a box heading: de-emphasise the connector "בשם", then add abbreviation tooltips
function headName(s){return abbrify(esc(s).replace(/ בשם /g,' <span class="src-conn">בשם</span> '));}
function richB(x){return rich(x).replace(/\n+/g,"<br>");}
function glossify(t){
  for(const term of Object.keys(GLOSS).sort((a,b)=>b.length-a.length)){
    const i=t.indexOf(term);
    if(i>-1) t=t.slice(0,i)+"\x03"+term+"\x04"+t.slice(i+term.length);
  }
  return t;
}
function rich(raw){
  raw=String(raw).replace(/\*\*([^*]+)\*\*/g,"\x01$1\x02");   // **bold** -> bold (author emphasis)
  raw=raw.replace(/\\cite\{([^}]*)\}\{([^}]*)\}/g,(m,l,u)=>"\x0e"+l+"\x0f"+u+"\x10"); // footnote
  let t=glossify(boldNames(raw));
  t=esc(t);
  t=t.replace(/\x01/g,"<b>").replace(/\x02/g,"</b>");
  t=t.replace(/<b>([^<]*)<\/b>/g,(m,inner)=>'<b>'+abbrify(inner)+'</b>');   // abbreviation tooltips on names
  t=t.replace(/\x03([^\x04]+)\x04/g,(m,term)=>'<span class="term" data-t="'+term+'">'+term+'</span>');
  t=t.replace(/\x0e([^\x0f]*)\x0f([^\x10]*)\x10/g,(m,l,u)=>'<sup class="fn" data-ref="'+l+'" data-url="'+S+u+'">◆</sup>');
  t=t.replace(/\n/g,"<br>");                                    // preserve paragraph breaks
  return t;
}
function srclink(label,url){return '<span class="srclink" data-url="'+url+'" data-ref="'+esc(label)+'">'+esc(label)+'</span>';}

// ---------- render ----------
// flowing reference text: preserves the author's spacing/indentation (pre-wrap),
// supports **bold**, auto-bolds source names, and colour-codes the two anchor times.
function flowRich(raw){
  raw=String(raw).replace(/\*\*([^*]+)\*\*/g,"\x01$1\x02");   // **bold**
  raw=raw.replace(/(עמוד השחר|עלות השחר)/g,"\x05$1\x06");     // amber
  raw=raw.replace(/(הנץ החמה)/g,"\x0b$1\x0c");                // green
  let t=esc(boldNames(raw));
  t=t.replace(/\x01/g,"<b>").replace(/\x02/g,"</b>");
  t=t.replace(/\x05/g,'<span class="t-alot">').replace(/\x06/g,'</span>');
  t=t.replace(/\x0b/g,'<span class="t-hanetz">').replace(/\x0c/g,'</span>');
  return t;   // no \n->br: white-space:pre-wrap handles line breaks + indentation
}
function flowHTML(blocks){
  return (blocks||[]).map(b=>
    '<div class="flow-block">'+(b.head?'<div class="flow-head">'+esc(b.head)+'</div>':'')+
    '<div class="flow-body">'+flowRich(b.body||'')+'</div></div>').join('');
}
function refHTML(ref){return ref?' <span class="src-ref">('+(ref.url?srclink(ref.label,ref.url):esc(ref.label))+')</span>':'';}
function headHTML(o){       // box heading: name (with בשם/abbr tooltips) + optional (source ref)
  if(!o.src) return '';
  const name=o.srcUrl?srclink(o.src,o.srcUrl):headName(o.src);
  return '<div class="src">'+name+refHTML(o.ref)+'</div>';
}
function opHTML(o){
  if(o.subhead) return '<div class="op-subhead"><span class="ost">'+headName(o.subhead)+'</span>'+
    (o.src?'<span class="op-subhead-src">'+(o.srcUrl?srclink(o.src,o.srcUrl):headName(o.src))+refHTML(o.ref)+'</span>':refHTML(o.ref))+'</div>';
  if(o.L==='lead') return '<div class="sec-lead">'+(o.src?'<b class="lead-q">'+headName(o.src)+'</b> ':'')+richB(o.txt)+'</div>';
  const cls='op L-'+o.L+(o.under?' under':'');
  const inner=headHTML(o)+'<div class="txt">'+rich(o.txt)+'</div>';
  if(o.collapsed) return '<details class="op op-collapsed L-'+o.L+(o.under?' under':'')+'"><summary><span class="op-more">'+headName(o.src||'הרחבה')+refHTML(o.ref)+'</span></summary><div class="txt">'+rich(o.txt)+'</div></details>';
  return '<div class="'+cls+'">'+inner+'</div>';
}
function introBodyHTML(){
  const L=INTRO.lead.t?(INTRO.lead.url?srclink(INTRO.lead.t,INTRO.lead.url):'<span class="intro-quote">'+esc(INTRO.lead.t)+'</span>'):'';
  const paras=String(INTRO.body).split(/\n[ \t]*\n/).map(p=>'<p class="ib-p">'+rich(p)+'</p>').join('');
  return '<div class="intro-body">'+(L?'<p class="intro-lead-line">'+L+'</p>':'')+paras+'</div>';
}
function sectionHTML(id){
  const s=SECTIONS[id];
  let h='<details class="intro-strip"><summary>מבוא לנושא</summary>'+introBodyHTML()+'</details>';
  h+='<div class="sec-head">'+(s.seif?'<span class="sec-kicker">'+esc(s.seif)+'</span>':'')+
     '<h2 class="sec-title">'+esc(s.title)+'</h2></div>';
  if(s.intro) h+='<div class="sec-lead">'+richB(s.intro)+'</div>';
  if(s.flow) h+=flowHTML(s.flow);
  if(s.summary) h+='<div class="summary-card"><div class="sum-lbl">◆ תקציר · התפתחות ההלכה</div><div class="sum-txt">'+richB(s.summary)+'</div></div>';
  if(s.sugya) h+='<div class="sugya"><span class="pin">◆ סוגיה</span> '+srclink(s.sugya.label,s.sugya.url)+'</div>';
  h+=s.ops.map(opHTML).join('');
  if(s.pesak) h+='<div class="pesak"><div class="plbl"><span class="dia">◆</span> הלכה למעשה</div><div class="txt">'+rich(s.pesak)+'</div></div>';
  return h;
}

const main=document.getElementById('main');
function showIntro(){
  setActive('__intro');
  main.innerHTML='<div class="sec-head"><span class="sec-kicker">מבוא</span><h2 class="sec-title">'+esc(CUR.topic.title)+' — מבוא לנושא</h2></div>'+
    '<div class="intro-full">'+introBodyHTML()+'</div>'+askHTML();
  wireAsk(); main.scrollIntoView({behavior:'smooth',block:'start'});
}
function showSection(id){
  setActive(id);
  main.innerHTML=sectionHTML(id)+askHTML();
  wireAsk(); main.scrollIntoView({behavior:'smooth',block:'start'});
}

// ---------- nav tree ----------
const tree=document.getElementById('tree');
function seifChip(id){var v=(SECTIONS[id].seif||'').replace('סעיף ','');return v?'<span class="seif">'+v+'</span>':'';}
function nodeLabel(txt,seifHtml){return '<a class="lbl">'+(seifHtml||'')+txt+'</a>';}
function buildNav(){ tree.innerHTML='';
  NAV.forEach(n=>{
  const wrap=document.createElement('div'); wrap.className='node'+(n.type==='group'?' group':'');
  if(n.type==='intro'){
    wrap.innerHTML='<div class="row"><a class="lbl" data-act="intro">'+n.title+'</a></div>';
  } else if(n.type==='cards'){
    wrap.innerHTML='<div class="row"><a class="lbl" data-act="cards" style="color:var(--pesak);font-weight:700">◆ '+n.title+'</a></div>';
  } else if(n.type==='sec' && !n.children){
    wrap.innerHTML='<div class="row"><a class="lbl" data-id="'+n.id+'">'+seifChip(n.id)+SECTIONS[n.id].title+'</a></div>';
  } else {
    const title = n.type==='group'? n.title : SECTIONS[n.id].title;
    const chip  = n.type==='group'? '<span class="seif">'+n.spans.replace('סעיפים ','')+'</span>' : seifChip(n.id);
    const dataId= n.type==='group'? '' : ' data-id="'+n.id+'"';
    wrap.innerHTML='<div class="row"><button class="caret">▾</button><a class="lbl"'+dataId+'>'+chip+title+'</a></div>'+
      '<div class="children">'+n.children.map(cid=>{
        const acc=SECTIONS[cid].navAccent?' accent':'';
        const gly=SECTIONS[cid].navAccent?'<span class="accent-glyph">◇</span>':'';
        return '<div class="node"><div class="row"><a class="lbl'+acc+'" data-id="'+cid+'">'+gly+seifChip(cid)+SECTIONS[cid].title+'</a></div></div>';
      }).join('')+'</div>';
  }
  tree.appendChild(wrap);
  });
}
tree.addEventListener('click',e=>{
  const car=e.target.closest('.caret');
  if(car){const ch=car.closest('.node').querySelector('.children');const c=car.closest('.node').querySelector('.children');
    c.classList.toggle('collapsed');car.textContent=c.classList.contains('collapsed')?'▸':'▾';return;}
  const a=e.target.closest('a.lbl'); if(!a)return; e.preventDefault();
  if(a.dataset.act==='intro') showIntro();
  else if(a.dataset.act==='cards') showCards();
  else if(a.dataset.id) showSection(a.dataset.id);
});
function setActive(key){
  tree.querySelectorAll('a.lbl').forEach(a=>{
    const k=a.dataset.act==='intro'?'__intro':(a.dataset.act==='cards'?'__cards':a.dataset.id);
    a.classList.toggle('active',k===key);
  });
}
// set caret heights
function refreshChildHeights(){tree.querySelectorAll('.children').forEach(c=>{if(!c.classList.contains('collapsed'))c.style.maxHeight=c.scrollHeight+'px';});}

// ---------- glossary popover ----------
const pop=document.getElementById('pop');
function placePop(el){const r=el.getBoundingClientRect();
  pop.style.top=(r.bottom+8)+'px'; pop.style.left=Math.max(10,Math.min(r.left,window.innerWidth-300))+'px';}
function showPop(term,el){ pop.innerHTML='<b>'+term+'</b>'+GLOSS[term]; pop.classList.add('on'); placePop(el); }
function showTip(html,el){ pop.innerHTML=html; pop.classList.add('on'); placePop(el); }
// hover reveals: abbreviation full names, and footnote citations
document.addEventListener('mouseover',e=>{
  const ab=e.target.closest('.abbr'); if(ab){showTip('<b>'+esc(ab.dataset.full)+'</b>',ab);return;}
  const fn=e.target.closest('.fn'); if(fn){showTip('<b>מקור</b>'+esc(fn.dataset.ref)+' · לחצו לפתיחה בספריא ↗',fn);return;}
});
document.addEventListener('mouseout',e=>{ if(e.target.closest('.abbr')||e.target.closest('.fn')) pop.classList.remove('on'); });
// ---------- source bubble ----------
const srcBox=document.getElementById('src');
function apiUrl(u){return u.replace('https://www.sefaria.org/','https://www.sefaria.org/api/texts/')+'?context=0&commentary=0&pad=0';}
function strip(x){return String(x).replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ');}
async function openSrc(ref,url,el){
  srcBox.classList.add('on');
  srcBox.innerHTML='<div class="sref">'+esc(ref)+'</div><div class="stext">טוען מספריא<span class="spin"></span></div>'+
    '<div class="srow"><a class="open" href="'+url+'" target="_blank" rel="noopener">פתח בספריא ↗</a><button class="close">סגור</button></div>';
  const r=el.getBoundingClientRect();
  srcBox.style.top=Math.min(r.bottom+8,window.innerHeight-260)+'px';
  srcBox.style.left=Math.max(10,Math.min(r.left-140,window.innerWidth-350))+'px';
  srcBox.querySelector('.close').onclick=()=>srcBox.classList.remove('on');
  const body=srcBox.querySelector('.stext');
  if(LOCAL_TEXT[url]){body.textContent=LOCAL_TEXT[url];return;}
  try{
    const ctl=new AbortController(); const to=setTimeout(()=>ctl.abort(),4500);
    const res=await fetch(apiUrl(url),{signal:ctl.signal}); clearTimeout(to);
    const d=await res.json();
    let he=d.he!==undefined?d.he:(d.text);
    if(Array.isArray(he)) he=he.flat(Infinity).join(' ');
    he=strip(he||'').trim();
    if(he){ body.textContent = he.length>600? he.slice(0,600)+'…' : he; }
    else body.textContent='(לחצו "פתח בספריא" לצפייה במקור)';
  }catch(err){
    body.innerHTML='התצוגה המוטמעת אינה זמינה בסביבה זו — לחצו "פתח בספריא". <span style="color:var(--ink-faint)">(באתר עצמאי, ה־Linker של ספריא מציג את הטקסט בבועה אוטומטית.)</span>';
  }
}
// delegated clicks
document.addEventListener('click',e=>{
  const term=e.target.closest('.term');
  const sl=e.target.closest('.srclink');
  const sr=e.target.closest('.secref');
  const fn=e.target.closest('.fn');
  if(fn){window.open(fn.dataset.url,'_blank','noopener');e.stopPropagation();return;}
  if(term){showPop(term.dataset.t,term);e.stopPropagation();return;}
  else pop.classList.remove('on');
  if(sl){openSrc(sl.dataset.ref,sl.dataset.url,sl);e.stopPropagation();return;}
  if(sr){const id=SEIF2ID[sr.dataset.seif];if(id)showSection(id);e.stopPropagation();return;}
  if(!e.target.closest('#src')) srcBox.classList.remove('on');
});

// ---------- ask the summary ----------
// SECLIST is derived per topic in deriveTopic
function askHTML(){
  return '<div class="ask"><h3>שאלו את הסיכום</h3>'+
    '<p class="hint">המענה מבוסס על הסיכום, בסגנון תשובת מבחן — פורש את השיטות, מציין מקורות, ומפנה לסעיפים (לחיצים). אינו פסק הלכה למעשה.</p>'+
    '<div class="chips">'+
      '<span class="chip">סכם את עיקר הדין</span>'+
      '<span class="chip">מה נחלקו בו הראשונים?</span>'+
      '<span class="chip">מה ההלכה למעשה?</span>'+
    '</div>'+
    '<div class="row"><input id="q" placeholder="'+('כתבו שאלה על '+esc(CUR.topic.title)+'…')+'"><button class="send" id="ask-btn">שאל</button></div>'+
    '<div class="answer" id="ans"></div></div>';
}
function fullText(){
  let t="נושא: "+CUR.topic.title+".\n\nמבוא: "+INTRO.body+"\n\n";
  for(const id in SECTIONS){const s=SECTIONS[id];
    t+="== "+s.title+" ("+s.seif+") ==\n";
    if(s.intro)t+="מבוא: "+s.intro+"\n";
    if(s.flow)for(const b of s.flow)t+=(b.head?b.head+": ":"")+b.body+"\n";
    if(s.summary)t+="תקציר ההתפתחות: "+s.summary+"\n";
    for(const o of s.ops){ if(o.subhead){t+="— "+o.subhead+" —\n";continue;} if(o.L==='lead'){t+=o.txt+"\n";continue;} t+="["+(LAY[o.L]||'')+"] "+o.src+": "+o.txt+"\n"; }
    if(s.pesak)t+="הלכה למעשה: "+s.pesak+"\n"; t+="\n";}
  return t;
}
function linkifyRefs(text){
  let h=esc(text);
  h=h.replace(/סעיף\s*([א-י])[׳']/g,(m,l)=>SEIF2ID[l]?'<span class="secref" data-seif="'+l+'">סעיף '+l+'׳</span>':m);
  return h.replace(/\n/g,'<br>');
}
function wireAsk(){
  const btn=document.getElementById('ask-btn'),q=document.getElementById('q'),ans=document.getElementById('ans');
  if(!btn)return;
  main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{q.value=c.textContent;go();});
  btn.onclick=go; q.onkeydown=e=>{if(e.key==='Enter')go();};
  async function go(){
    const question=q.value.trim(); if(!question)return;
    btn.disabled=true; ans.classList.add('on'); ans.innerHTML='חושב<span class="spin"></span>';
    const sys="אתה עוזר לימוד לקראת מבחני ההלכה של הרבנות הראשית. לפניך סיכום על '"+CUR.topic.title+"'. ענה על סמך הסיכום, אך פעל כמומחה שמבין את החומר:\n"+
      "1. אם השאלה נוגעת לעיקרון או מקרה שנידון בסיכום — אף בניסוח שונה — יישם אותו והפנה לסעיף הרלוונטי.\n"+
      "2. הצג בקצרה את מהלך הדיון: השיטות (משנה, גמרא, ראשונים, שו״ע, רמ״א, אחרונים, פוסקי זמננו) ושמות בעליהן, בסגנון תשובת מבחן.\n"+
      "3. הפנה לסעיפים הרלוונטיים בכתיב מדויק כמו 'סעיף ה׳', כדי שהלומד יוכל לעבור אליהם.\n"+
      "4. אל תפסוק הלכה למעשה לשואל; הצג את הדיון והשיקולים. במקרים של סכנה/רפואה סייג שהדבר תלוי בהערכה רפואית ובשאלת רב.\n"+
      "5. רק אם אין בסיכום שום עיגון רלוונטי — אמור 'לא מופיע בסיכום'.\n"+
      "כתוב בעברית ברורה ותמציתית.\n\nהסעיפים בסיכום: "+SECLIST+".\n\n=== הסיכום ===\n"+fullText();
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:question}]})});
      const d=await r.json();
      const text=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      ans.innerHTML=linkifyRefs(text||"לא התקבלה תשובה.")+'<div class="note">נוצר על ידי Claude, מעוגן בסיכום זה בלבד · אינו פסק הלכה · לחצו על "סעיף X׳" למעבר</div>';
    }catch(err){
      ans.innerHTML='שגיאה בפנייה למודל. במסך זה ה־AI פעיל בתוך Claude.ai; באתר עצמאי יש לחבר נתיב־שרת משלכם.';
    }finally{btn.disabled=false;}
  }
}

// ---------- flashcards ----------
let FC=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDeck(scope,types){
  const deck=[];
  const ids=scope==='all'?Object.keys(SECTIONS):[scope];
  for(const id of ids){const s=SECTIONS[id];
    if(types.has('deot')) for(const o of s.ops){ if(o.subhead||o.L==='lead') continue; deck.push({q:s.title+' — '+o.src,a:rich(o.txt),sec:id,tag:'דעה'}); }
    if(types.has('pesak')&&s.pesak) deck.push({q:s.title+' — הלכה למעשה?',a:rich(s.pesak),sec:id,tag:'הלכה למעשה'});
  }
  if(types.has('sikum')) for(const id of ids){const s=SECTIONS[id]; if(s.summary) deck.push({q:s.title+' — תקציר ההתפתחות',a:rich(s.summary),sec:id,tag:'תקציר'});}
  if(types.has('musagim')&&scope==='all') for(const term in GLOSS) deck.push({q:'מהו: '+term+'?',a:esc(GLOSS[term]),tag:'מושג'});
  return shuffle(deck);
}
function showCards(){
  setActive('__cards');
  const opts=Object.keys(SECTIONS).map(id=>'<option value="'+id+'">'+(SECTIONS[id].seif?SECTIONS[id].seif+' · ':'')+SECTIONS[id].title+'</option>').join('');
  main.innerHTML=
    '<div class="sec-head"><span class="sec-kicker">תרגול</span><h2 class="sec-title">כרטיסיות</h2></div>'+
    '<p class="fc-sub">חזרה פעילה על החומר. בחרו מקבץ, חשפו את התשובה (לחיצה או מקש רווח), וסמנו אם ידעתם. מה שלא ידעתם חוזר בסוף.</p>'+
    '<div class="fc-filters">'+
      '<label>מקבץ:<select id="fc-scope"><option value="all">כל הנושא</option>'+opts+'</select></label>'+
      '<div class="fc-types">'+
        '<button class="fc-t on" data-t="deot">דעות פוסקים</button>'+
        '<button class="fc-t on" data-t="pesak">הלכה למעשה</button>'+
        '<button class="fc-t on" data-t="sikum">תקצירים</button>'+
        '<button class="fc-t on" data-t="musagim">מושגים</button>'+
      '</div>'+
      '<button class="fc-start" id="fc-start">בנה מקבץ ▸</button>'+
    '</div><div id="fc-stage"></div>';
  main.querySelectorAll('.fc-t').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
  document.getElementById('fc-start').onclick=startDeck;
  main.scrollIntoView({behavior:'smooth',block:'start'});
}
function startDeck(){
  const scope=document.getElementById('fc-scope').value;
  const types=new Set([...main.querySelectorAll('.fc-t.on')].map(b=>b.dataset.t));
  const deck=buildDeck(scope,types);
  const st=document.getElementById('fc-stage');
  if(!deck.length){st.innerHTML='<div class="fc-empty">לא נבחרו כרטיסים — סמנו לפחות סוג אחד.</div>';return;}
  FC={deck,idx:0,known:0,missed:[],flipped:false,total:deck.length};
  renderCard();
}
function renderCard(){
  const st=document.getElementById('fc-stage'); if(!st)return;
  if(FC.idx>=FC.deck.length){
    st.innerHTML='<div class="fc-end"><div class="fc-score">ידעת '+FC.known+' מתוך '+FC.total+'</div>'+
      (FC.missed.length?'<button class="fc-again" id="fc-review">חזור על '+FC.missed.length+' שפספסת</button>':'<div class="fc-perfect">כל הכבוד! ✦</div>')+
      '<button class="fc-restart" id="fc-restart">מקבץ חדש</button></div>';
    if(FC.missed.length)document.getElementById('fc-review').onclick=()=>{FC={deck:shuffle(FC.missed.slice()),idx:0,known:0,missed:[],flipped:false,total:FC.missed.length};renderCard();};
    document.getElementById('fc-restart').onclick=showCards;
    return;
  }
  const c=FC.deck[FC.idx];
  const jump=c.sec?'<span class="fc-jump" data-sec="'+c.sec+'">→ עבור לסעיף המלא</span>':'';
  st.innerHTML=
    '<div class="fc-progress"><div class="fc-bar"><i style="width:'+Math.round(FC.idx/FC.total*100)+'%"></i></div>'+
      '<span>כרטיס '+(FC.idx+1)+' / '+FC.total+' · ידעת '+FC.known+'</span></div>'+
    '<div class="fc-card'+(FC.flipped?' flip':'')+'" id="fc-card"><div class="fc-tag">'+c.tag+'</div>'+
      '<div class="fc-face fc-q">'+esc(c.q)+'</div>'+
      (FC.flipped?'<div class="fc-face fc-a">'+c.a+' '+jump+'</div>':'<div class="fc-hint">לחצו לחשיפת התשובה</div>')+'</div>'+
    (FC.flipped?
      '<div class="fc-controls"><button class="fc-no" id="fc-no">לא ידעתי</button><button class="fc-yes" id="fc-yes">ידעתי</button></div>':
      '<div class="fc-controls"><button class="fc-flip" id="fc-flip">הצג תשובה</button></div>');
  const card=document.getElementById('fc-card');
  const doFlip=()=>{FC.flipped=true;renderCard();};
  card.onclick=e=>{if(e.target.closest('.fc-jump'))return;if(!FC.flipped)doFlip();};
  const fb=document.getElementById('fc-flip'); if(fb)fb.onclick=doFlip;
  if(FC.flipped){
    document.getElementById('fc-yes').onclick=()=>{FC.known++;FC.idx++;FC.flipped=false;renderCard();};
    document.getElementById('fc-no').onclick=()=>{FC.missed.push(FC.deck[FC.idx]);FC.idx++;FC.flipped=false;renderCard();};
    const j=st.querySelector('.fc-jump'); if(j)j.onclick=()=>showSection(j.dataset.sec);
  }
}
document.addEventListener('keydown',e=>{
  if(!FC||!document.getElementById('fc-card'))return;
  if(e.code==='Space'&&!FC.flipped){e.preventDefault();FC.flipped=true;renderCard();}
});

function openTopic(id){
  const D=SITE.topics.find(t=>t.id===id)||SITE.topics[0];
  deriveTopic(D);
  document.querySelector('.grid').classList.remove('home');
  document.getElementById('hbrow').textContent=D.topic.eyebrow||'';
  document.getElementById('htitle').textContent=D.topic.title;
  document.title=D.topic.title+' · '+(SITE.title||'סיכומי הלכה');
  document.getElementById('home-link').style.display=SITE.topics.length>1?'inline-block':'none';
  buildNav(); showIntro();
}
function showHome(){
  document.querySelector('.grid').classList.add('home');
  tree.innerHTML='';
  document.getElementById('home-link').style.display='none';
  document.getElementById('hbrow').textContent=SITE.subtitle||'אוסף אינטראקטיבי';
  document.getElementById('htitle').textContent=SITE.title||'סיכומי הלכה';
  document.title=SITE.title||'סיכומי הלכה';
  // group topics by exam subject (מקצוע), preserving order
  const groups=[],byId={};
  SITE.topics.forEach(t=>{const s=t.subject||'כללי'; if(!byId[s]){byId[s]={subject:s,topics:[]};groups.push(byId[s]);} byId[s].topics.push(t);});
  const simanNum=t=>parseInt((t.topic.siman||'').split('.').pop())||0;
  groups.forEach(g=>g.topics.sort((a,b)=>simanNum(a)-simanNum(b)));
  const card=t=>{const n=Object.keys(t.sections).length; const eb=(t.topic.eyebrow||'').split('·').slice(-1)[0].trim();
    return '<a class="topic-card" data-topic="'+t.id+'"><div class="tc-eyebrow">'+esc(eb)+'</div>'+
      '<div class="tc-title">'+esc(t.topic.title)+'</div><div class="tc-meta">'+n+' יחידות</div></a>';};
  main.innerHTML='<div class="subjects">'+groups.map(g=>
    '<div class="subject-group collapsed">'+
      '<button class="subject-head"><span class="sh-caret">▾</span><span class="sh-title">'+esc(g.subject)+'</span><span class="sh-count">'+g.topics.length+' נושאים</span></button>'+
      '<div class="subject-topics">'+g.topics.map(card).join('')+'</div>'+
    '</div>').join('')+'</div>';
  main.querySelectorAll('.topic-card').forEach(c=>c.onclick=()=>openTopic(c.dataset.topic));
  main.querySelectorAll('.subject-head').forEach(b=>b.onclick=()=>b.closest('.subject-group').classList.toggle('collapsed'));
}
document.getElementById('home-link').onclick=e=>{e.preventDefault();showHome();};
if(SITE.topics.length===1){openTopic(SITE.topics[0].id);}else{showHome();}
</script>
