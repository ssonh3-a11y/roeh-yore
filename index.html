 אינם מוקצים מח\"כ אלא אם אינו  מקפיד עליהם ומעוניין להשתמש בהם."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "**והרמ\"א** ציין את דעת הב\"י ברמב\"ם, שניתן לטלטל סחורות אם אינו קפיד עלייהו כ\"כ ומעוניין לטלטלם."}, {"layer": "zman", "src": "והשש\"כ", "srcRef": null, "txt": "ו**השש\"כ** כתב, לגבי אוכל, שכל דבר שעומד לאכילה, ודאי לא יכול להיות מוקצה מח\"כ אף אם עומד לסחורה. שהרי וודאי שאינו מקצה אותו מדעתו לגמרי ואולי יירצה להשתמש ולאוכלו."}, {"layer": "acharon", "src": "המשנ\"ב והשש\"כ", "srcRef": null, "txt": "ולפיכך, דנו הפוסקים בדברים כגון נייר. שלדעת **המשנ\"ב והשש\"כ**, נייר אסור לטלטול אף אם אינו יקר כ\"כ כל עוד האדם מקפיד עליו וייחד לו שימוש לכתיבה בלבד."}, {"layer": "zman", "src": "הילקוט יוסף", "srcRef": null, "txt": "אולם, כתב **הילקוט יוסף**, כי כיום כאשר יש נייר בשפע, וודאי שאין מקרה בו סתם נייר נחשב כממח\"כ. ובוודאי שאין  אדם מייחדו למקום או לשימוש מסויים."}], "pesak": null}, "memhak_3": {"title": "כשמל\"א או כשמל\"ה", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "ונחלקו הפוסקים אם רק כשמל\"א יכול להיות ממח\"כ, או גם כשמל\"ה."}, {"layer": "acharon", "src": "'ברית עולם'", "srcRef": null, "txt": "ולדעת **'ברית עולם'**, אף כשמל\"ה יכול להיות כל עוד קפיד עלייהו כנ\"ל."}, {"layer": "acharon", "src": "התהילה לדוד", "srcRef": null, "txt": "אולם, לדעת **התהילה לדוד**, רק כשמל\"א יכול להחשב ממח\"כ אם קפיד עלייהו. משום שאין לו צד של היתר בשימושו, שהרי בגלל שעיקר שימושו לאיסור - נאסר לטלטול רגיל. ומאחר וגם קפיד עליהו ולא ישתמש בו לשימוש היתר כלשהו - נאסר גם לטלטול לצורך גופו ומקומו."}], "pesak": null}, "memhak_4": {"title": "גודל וכובד הכלי", "seif": null, "sugya": null, "ops": [{"layer": "shulchan", "src": "סעיף ב' בסימן ש\"ח", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.2", "txt": "נראה עפ\"י סעיף ב' בסימן ש\"ח בשו\"ע, שכתב שכלי נחשב כלי בכל גודל או כובד; ואין אלו מבטלים ממנו שם כלי.\nונראה שבא להשמיענו זאת משום שכל עוד הוא כלי שמלאכתו להיתר, וודאי שאין זה משנה אם הוא גדול או כבד."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "ולפיכך כתב שם **המשנ\"ב** דכל כלי שיש לו שימוש היתר - מותר לטלטלו. ואין אומרים שמחמת כבדותו/גודלו מקצהו מדעתו כדין ממח\"כ. אלא רק אם הוא זהיר בכך משום יקרותו. (ובגמרא דנים על קורה וכוורת. שקורה מותר, וכוורת אסור. והתוספות תירצו שכוורת אין עליה תורת כלי, ואין זה בגלל גודלה)"}], "pesak": null}, "kshmela_1": {"title": "עיקר הדין", "seif": null, "sugya": null, "ops": [{"layer": "mishna", "src": "במשנה בשבת (פ' כל הכלים)", "srcRef": null, "txt": "**במשנה בשבת (פ' כל הכלים)**\nאמרו כי נוטל אדם את הקורנס (של נפחים) לפצוע בו אגוזים ואת הקרדום לחתוך בו את הדבילה.", "ref": {"label": "שבת · פרק כל הכלים · קכב", "ref": "Shabbat.122b"}}, {"layer": "gemara", "src": "חלקו בגמרא אביי ורבה", "srcRef": null, "txt": "ולפיכך, **חלקו בגמרא אביי ורבה** בגמרא לגבי כשמל\"א. ונפסק כי כשמל\"א, על אף שעיקר שימושו אסור בשבת (משום שיש בו מלאכה וכדו'), מותר לטלטלו לצורך גופו ומקומו.\nועוד, מבואר שם בגמרא שאסור לטלטל כשמל\"א מחמה לצל (לצורך הכלי שלא יפגע).\n\t(ו**המ\"ב** כתב שאם מטלטלו גם לצורך גופו – מותר אף אם עיקר רצונו מחמה לצל)"}], "pesak": null, "intro": "הוא מוקצה מאחר ושימושו העיקרי אינו מותר בשבת (נראה כי סוג מוקצה זה הוא ראיה לטעמיו של הרמב\"ם, שהרי לדידו אחד מן הטעמים למוקצה הוא שמא מתוך עיסוק בו יבוא אדם למלאכה)."}, "kshmela_2": {"title": "מוקצה או גזרה אחרת", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "נחלקו ראשונים אם כשמל\"א אסור לטלטול משום מוקצה, או שזו גזרה אחרת משום שיש חשש שיעשה בו מלאכה"}, {"layer": "rishon", "src": "הרמב\"ן והתוס' (ורמב\"ם)", "srcRef": null, "txt": "לדעת **הרמב\"ן והתוס' (ורמב\"ם)**, גזרו על טלטולו רק כדי שלא יעבור ויעשה בו מלאכה, ואינו חשיב כמוקצה"}, {"layer": "rishon", "src": "הרשב\"א והתוס' רי\"ד", "srcRef": null, "txt": "לדעת **הרשב\"א והתוס' רי\"ד** – חשיב מוקצה ממש"}, {"layer": "note", "src": "נפק\"מ", "srcRef": null, "txt": "ונפק\"מ לעניין בסיס לדבר האסור."}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "ולפיכך כתב **ערוה\"ש** שכשמל\"ה שהוא בסיס לכשמל\"א, מותר לטלטלו רק לצורך גו\"מ"}, {"layer": "acharon", "src": "והפמ\"ג", "srcRef": null, "txt": "ו**הפמ\"ג** הסתפק בדין של כשמל\"ה שהוא בסיס לכשמל\"א. דאולי סבר עפ\"י הרמב\"ן והתוס' שאם כשמל\"א הוא אינו מוקצה ממש, אלא גזרה אחרת - מותר לטלטל את הבסיס לו בכל גווני.", "under": true}], "pesak": null}, "kshmela_3": {"title": "מלאכת דרבנן", "seif": null, "sugya": null, "ops": [{"layer": "acharon", "src": "הבה\"ל", "srcRef": null, "txt": "ו**הבה\"ל** כתב שאפילו אם מלאכתו האסורה היא מדרבנן נחשב כשמל\"א"}, {"layer": "acharon", "src": "הפמ\"ג בשם הלבוש", "srcRef": null, "txt": "ו**הפמ\"ג** הביא בשם **הלבוש** שסבר שמותר"}, {"layer": "zman", "src": "שש\"כ", "srcRef": null, "txt": "**שש\"כ** נוטה לאסור"}], "pesak": null}, "kshmela_4": {"title": "עיקר ורוב שימוש", "seif": null, "sugya": null, "ops": [{"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "לדעת ה**משנ\"ב**, כל עוד עיקר ורוב השימוש של הכלי הוא למלאכת איסור – נחשב כשמל\"א ואין לטלטלו אלא לצורך גו\"מ."}, {"layer": "zman", "src": "שש\"כ", "srcRef": null, "txt": "אולם, נראה שאם עיקר שימושו רוב הזמן הוא להיתר, רוב הפוסקים (**שש\"כ** לדוג') מתייחסים אליו ככשמל\"ה ומותר לטלטלו בכל גווני (כגון שעון שיש בו סטופר חשמלי)"}, {"layer": "zman", "src": "שש\"כ (הערה)", "srcRef": null, "txt": "(שש\"כ - כל סוגי השעונים - מעורר, יד, שעון כיס - מותר לטלטלם אפילו אם יש להם בטרייה, אך רק כל עוד הם עובדים. ברגע שהם לא עובדים הם מוקצה מחמת גופו (כי אין לו שימוש ואינו כלי).\nשעון זהב, אפילו אם הפסיק לפעול, יש לו שימוש של תכשיט.\nבהערה מביא ששמע **מהגרש\"ז** שהיתר זה הוא משום שאפילו אם יש זמן שמלאכתו לאיסור, רוב הזמן הוא להיתר, ולכן מותר)", "collapsed": true}], "pesak": null}, "kshmela_5": {"title": "בטלטול לצורך מקומו", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "+האם כאשר מטלטלים כשמל\"א לצורך מקומו בהיתר, יש לעוזבו מיד כשמפנה את המקום בו היה מעוניין, או שיכול להניח היכן שיירצה?"}, {"layer": "rishon", "src": "הרב המגיד, תוספות", "srcRef": null, "txt": "**הרב המגיד, תוספות** – לאן שיירצה (עפ\"י רב יצחק בגמרא)"}, {"layer": "shulchan", "src": "השו\"ע בסעיף ג'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.3", "txt": "וכן כתב **השו\"ע בסעיף ג**'."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "+ואם הרים אדם כשמל\"א לשם שימוש בו (באיסור) בשוגג,"}, {"layer": "acharon", "src": "המג\"א", "srcRef": null, "txt": "  סבר **המג\"א** שמותר לו בדיעבד לשאתו ולהניחו לאן שיירצה כדין טלטול לצורך גו\"מ.", "under": true}, {"layer": "acharon", "src": "הגר\"א", "srcRef": null, "txt": "  ו**הגר\"א** סבר להחמיר ויניחו מיד.", "under": true}], "pesak": null}, "kshmela_6": {"title": "אם יש לו כשמל\"ה", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "נחלקו הפוסקים אם מה שמותר לטלטל כשמל\"א לצורך גו\"מ הוא רק כשאין לו כשמל\"ה, או אף כשיש לו."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "**המשנ\"ב** כתב (עפ\"י מה שבגמרא בפרקנו (כל הכלים) בדברי רבי אלעזר לגבי מקלות), שמותר רק כשאין לו כשמל\"ה."}, {"layer": "acharon", "src": "התוספת שבת", "srcRef": null, "txt": "אולם לדעת **התוספת שבת**, מותר אף כשיש לו כשמל\"ה לטלטל כשמל\"א לצורך גו\"מ"}, {"layer": "zman", "src": "הרב פיינשטיין (אג\"מ)", "srcRef": null, "txt": "ו**הרב פיינשטיין** כתב **באג\"מ**, שאם אין לו כשמל\"ה זמין, לא צריך לחזר. וכן כתב השש\"כ בהערות"}], "pesak": null}, "gufo_1": {"title": "הגדרה ועיקר הדין", "seif": null, "sugya": null, "ops": [{"layer": "rama", "src": "רמ\"א · ש\"ח ז' (עפ\"י המרדכי)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.7", "txt": "**רמ\"א, ש\"ח ז' עפ\"י המרדכי**:\n\"כל דבר שאינו כלי כלל, אסור לטלטלו אפילו לצורך גופו, כ\"ש לצורך מקומו\""}, {"layer": "lead", "src": null, "srcRef": null, "txt": "מוקצה מחמת גופו הוא עצם שאינו כלי, ואינו ראוי למאכל אדם או בהמה, ואין לו שימוש. כגון אבנים, עצים וכדומה. ואסור לטלטלו אפילו לצורך גופו ומקומו (וכן בפרקנו 'כל הכלים'; דמבואר שם שאסור לטלטל בקעת -חתיכת עץ- משום שאין עליה תורת כלי; דהיתר זה הוא רק בכשמל\"א)\nואפילו אם ראוי לכסות בו, כל עוד אין עליו תורת כלי - אסור לטלטלו (ודווקא בשברי כלים שראוי לכסות בהם מותר; כיוון שהיו כלי).\nלפיכך, אם מוכח שעצם הוא כלי/אוכל ויש לו שימוש (היתר) - מותר לטלטלו, והוא אינו מוקצה יותר."}, {"layer": "note", "src": "הפניות", "srcRef": null, "txt": "[ש\"ח:כ-כד, כה(ב), כח, לח; שי:ה; שיא:ח(ד)]"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "הפקעת מוקצה מתורת מוקצה (לפני שבת), יכולה להיעשות ע\"י חשיבה או ע\"י מעשה. ומתי משתמשים בחשיבה ומתי במעשה? נראה שזה תלוי במצב וסוג המוקצה (ובכך, כנראה, נעוץ ההבדל שבין חריות הדקל לאבנים)."}], "pesak": null}, "gufo_2": {"title": "שברי כלים", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "מותר לטלטל רק דבר שהוא כלי. וכלי חשיב דבר שראוי למלאכה או שימוש כלשהם, אבל לכסות בו – לא נחשב. אולם, אם כלי נשבר (חלקו או כולו), מותר לטלטל את השבר בין אם נשבר בשבת ובין אם נשבר בחול; כל עוד ראוי לשימוש כלשהו (מעין מלאכה), כגון לכסות בו כלי (כי מאחר והיה כלי בעבר- יש עליו עוד תורת כלי).\nוזה אף אם אין כלי בנמצא שראוי השבר לכסותו (רבא). אבל אם זרק לפני שבת את השבר – אסור לטלטלו (ברייתא שם)."}, {"layer": "note", "src": "קריאה חלופית (ב\"י)", "srcRef": null, "txt": "אולם, אם נסבור שהשו\"ע נקט כתירוצו על הטור בב\"י – נחלק בין חול לשבת.\nואם נשבר בחול מותר לטלטול בכל גווני (כל עוד ראוי לשימוש כלשהו). אך אם נשבר בשבת, יהיה מותר רק אם נשבר כל הכלי, ולא רק חתיכה ממנו. דאז הווי נולד. שסוף סוף נולד כלי חדש."}, {"layer": "acharon", "src": "המ\"ב והמג\"א ובדרכ\"מ", "srcRef": null, "txt": "אך **המ\"ב והמג\"א ובדרכ\"מ** סוברים דבאמת אין הבדל בין שבת לחול לעניין זה ומותר בכל גווני. ולדידם החילוק בין 'נשבר חלק' ל'נשבר כולו' אינו קיים."}, {"layer": "acharon", "src": "הט\"ז והב\"ח", "srcRef": null, "txt": "ולדעת **הט\"ז והב\"ח**, אם נשבר בשבת במקום שאין בו כלי אותו ראוי השבר לכסות – הווי מוקצה."}, {"subsubhead": "בבלי שבת מו (פרק כירה) – טלטול כלי"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מאי טעמא שרי לטלטולי שרגא דנפטא? משום דחזי לכסויי.\nומעתה יהא מותר לטלטל כל דבר שראוי לכסות בו, כגון אבנים וצרורות!\nהא על הנר איכא תורת כלי; על הצרורות אין תורת כלי.", "ref": {"label": "שבת · פרק כירה · מו", "ref": "Shabbat.46a"}}, {"subsubhead": "דף קכד (כל הכלים) – ת\"ק ור' יהודה: שבר כלי הראוי למלאכה"}, {"layer": "mishna", "src": "משנה · ת\"ק", "srcRef": null, "txt": "**משנה**:\nכל הכלים הניטלים בשבת - שבריהם גם נטלים.\nולדעת **ת\"ק** - בלבד שיהיו ראויים למלאכה כלשהי. (שברי ערבה - לכסות את פי החבית; שברי זכוכית - לכסות את פי הפך)", "ref": {"label": "שבת · פרק כל הכלים · קכד", "ref": "Shabbat.124a"}}, {"layer": "gemara", "src": "ר' יהודה", "srcRef": null, "txt": "לדעת **ר' יהודה** – צריך שיהיו ראויים למלאכתם (שברי ערבה לצוק לתוכם עיסה; שברי זכוכית - לצוק לתוכם שמן)"}, {"layer": "gemara", "src": "גמרא · שמואל", "srcRef": null, "txt": "**ובגמרא**:\n**שמואל** מעמיד את המחלוקת של ת\"ק ור' יהודה באם נשברו הכלים בשבת. שלדעת ר' יהודה נחשב כנולד בשבת; שהרי נולד כלי עם שימוש חדש. אבל אם נשברו בחול - יודה ר' יהודה שאפילו אם ראויים למלאכה כלשהי שמותר לטלטל את השברים בשבת; שהרי היו מוכנים לכך מער\"ש."}, {"layer": "rishon", "src": "רי\"ף רמב\"ם ורא\"ש", "srcRef": null, "txt": "ו**רי\"ף רמב\"ם ורא\"ש** פסקו כת\"ק, שמותר לטלטל אפילו אם נשבר בשבת ואפילו אם ראוי רק לכיסוי. ולא אמרינן שמכיוון שעמד קודם לכן לשימוש אחר הווי נולד."}, {"layer": "shulchan", "src": "שו\"ע · (סע' ו')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.6", "txt": "וכן נקט ב**שו\"ע בסעיף ו'**, שכל כלי שנשבר - אפילו בשבת - מותר לטלטל את השבר כל עוד ראוי לכיסוי (ראוי לשום מלאכה)."}, {"subsubhead": "שמואל, רב נחמן ורבא – אם יש כלי בסביבה שאותו השבר יכסה"}, {"layer": "gemara", "src": "שמואל · רב נחמן · רבא", "srcRef": null, "txt": "**שמואל**: שבר חרס מותר לטלטלו בחצר אבל לא בכרמלית\n**רב נחמן**: אפילו בכרמלית מותר לטלטלו\n**רבא**: אפילו ברשות הרבים"}, {"layer": "note", "src": "ביאור", "srcRef": null, "txt": "ומתבאר דלפי **שמואל** מותר רק בחצר, משום שיש שם כלים שאותם יכסה השבר, ואזי יהיה עליו תורת כלי.\nול**רב נחמן** סגי כרמלית משום שעוברים שם אנשים (שהרי זה לא רה\"ר), וראוי לכסות בו רוק\nול**רבא** מותר לטלטלו אף ברשות הרבים, מכח זה שראוי לשימוש וכיסוי כלים שבחצר"}, {"layer": "rishon", "src": "הרי\"ף ורא\"ש", "srcRef": null, "txt": "ופסקו **הרי\"ף ורא\"ש** לקולא כרבא. דמותר לטלטל שבר כלי אף אם ברה\"ר שאין שם כלי לכסותו."}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "וכן נקט **הטור**.\nאולם, הטור כתב דווקא 'כלי שנשבר ביום חול'. וזה תמוה, שהרי פסק כ**ת\"ק** שמותר אף אם נשבר בשבת (כל עוד חזי למלאכה כלשהי)!"}, {"layer": "acharon", "src": "הב\"י", "srcRef": null, "txt": "ו**הב\"י** תירץ שמה שכתב 'שנשבר בחול', הוא בכלי שנשברה ממנו חתיכה, לעומת כלי שנשבר כולו. לפיכך כלי שנשברה ממנו חתיכה אם נשבר בשבת הווי נולד (כלי חדש) ואסור לטלטלו (ובכך מודה ת\"ק לר' יהודה).", "under": true}, {"layer": "acharon", "src": "והב\"ח והט\"ז", "srcRef": null, "txt": "**והב\"ח והט\"ז** תירצו, שכוונת הטור היא דווקא אם נשברו בשבת ברה\"ר, שאז לא נחשבים שראויים לשימוש כלשהו (ולא אמרינן שבגלל שראוי לכיסוי כלים בחצר מותר לטלטול אף ברה\"ר; משום שלא נשבר בחצר אלא ברה\"ר)", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע' ז')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.7", "txt": "ב**שו\"ע בסעיף ז' (ש\"ח)** כתב, שמותר לטלטל בשבת חתיכת חרס שנשבר ביום חול אם ראויה לכסות בה כלי; אפילו אם אין כלי בנמצא שראוי לכסותו בו (רבא).\nוכתב שזה דווקא בשברי חרס, משום שהיו כלי לפני שבירתם. אבל צרורות ואבנים לא מהני שיכול לכסות בהם.\nוכתב גם עפ\"י **ברייתא**, שאם זרק את השבר לאשפה מבעוד יום – על אף שנשבר בחול, גילה דעתו שאין לו שימוש ראוי, ואסור לטלטלו. (אבל אם זרקה בשבת - מותר לטלטלו עוד)."}, {"layer": "note", "src": "קריאת השו\"ע (ב\"י)", "srcRef": null, "txt": "וממה שכתב כמו לשון הטור 'חתיכת חרס שנשברה **בחול**', נראה שסובר כתירוצו, שמדובר כאן בכשנשברה הכלי כולו; ולא חתיכה ממנו. (ואם נשברת חתיכה מהכלי בשבת - אסור משום נולד)"}, {"layer": "acharon", "src": "המ\"ב והמג\"א", "srcRef": null, "txt": "אולם לדעת **המ\"ב והמג\"א**, ציין השו\"ע בלשונו 'בחול' רק כדי להשמיע את הדין שאם זרק השבר לפח מבעו\"י נחשב מוקצה. אבל חוץ מזה אין הבדל בין שבת לחול.", "under": true}, {"layer": "rama", "src": "הרמ\"א (בדרכי משה)", "srcRef": null, "txt": "וכך גם דעת הרמ\"א (**בדרכי משה**), דאין הבדל בין נשבר הכלי כולו לנשברה חתיכה; ובכל גווני מותר לטלטל שבר כלי שנשבר בשבת אם ראוי לכיסוי.", "under": true}, {"layer": "note", "src": "סיכום", "srcRef": null, "txt": "לפיכך, מותר לטלטל שבר כלי בין אם נשבר בשבת, ובין נשבר בחול; כל עוד ראוי לכסות בו כלי, אף אם אין כלי בנמצא (ברה\"ר). אבל אם זרק לפני שבת את השבר – אסור לטלטלו.\nאולם, אם נסבור שהשו\"ע נקט כתירוצו על הטור בב\"י – נחלק בין חול לשבת.\nדאם נשבר בחול מותר לטלטול בכל גווני (אם ראוי לשימוש כלשהו). אך אם נשבר בשבת, יהיה מותר רק אם נשבר כל הכלי, ולא רק חתיכה ממנו. דאז הווי נולד.\nאך **המ\"ב והמג\"א ובדרכ\"מ** סוברים דבאמת אין הבדל בין שבת לחול לעניין זה ומותר בכל גווני."}], "pesak": null}, "gufo_3": {"title": "דלתות ובניין", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "דלתות של כלים שנתפרקו מהם, דינם דומה לשברי כלים. שברי כלים מותר לטלטל אף אם נשברו בשבת כל עוד ראויים לשימוש כלשהו (כיסוי), מאחר ובאו מתורת כלי. וכן הדין לגבי דלתות של כלים המותרים לטלטול."}, {"layer": "acharon", "src": "המשנ\"ב · המאירי", "srcRef": null, "txt": "ולדעת **המשנ\"ב**, דלתות כלי, דינם קל יותר, ואף אם אינם ראויים לשימוש כלשהו ככיסוי מותר לטלטלם (בין נשברו בשבת ובין בחול). זאת מאחר והן ראויות להתחבר חזרה לכלי, אזי יש עליהן תורת כלי טפי (עפ\"י לשון **הגמרא** 'דמוכנין הן ע\"ג אביהן')\nולדעת **המאירי**, דלתות הכלים הן בדיוק כמו שאר שברי כלים ומותר לטלטלן רק כאשר הן ראויות לשימוש כלשהו (כיסוי)."}, {"layer": "acharon", "src": "הנו\"כים (בה\"ל, משנ\"ב, מג\"א)", "srcRef": null, "txt": "+ו**הנו\"כים (בה\"ל, משנ\"ב, מג\"א)** כתבו, שדלתות של בית וכן כל דבר המחובר לקרקע (כגון לול תרנגולים) – אסור לטלטלם. ואף אם נשברו בחול. דאין עליהם תורת כלי; אלא שיש להתקינם לשם כלי מבעוד יום (כדין אבנים)."}, {"layer": "shulchan", "src": "השו\"ע בסעיף ט'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.9", "txt": "+ולגבי פירוק הדלתות של הכלים, כתב **השו\"ע בסעיף ט'** עפ\"י ברייתא בפרקנו שמותר לפרקה אבל לא להחזירה; משום שיש בכך שמא יתקע (לרש\"י משום מכה בפטיש ולא בונה, דאין בניין וסתירה בכלים). ואין בעיה בפירוק משום שאין בניין וסתירה בכלים (וקשה לנו, דהרי דעת השו\"ע ב-שי\"ד היא שאין בניין וסתירה בכלים גרועים, כהרא\"ש והתוס')."}, {"layer": "acharon", "src": "קושיא מסעיף טז' / השש\"כ", "srcRef": null, "txt": "וקשה **בסעיף טז'**, שם פסק **השו\"ע** עפ\"י הפוסקים שאסור לטלטל כירה שנפלה אחת מרגליה, שמא יתקע. והרי וודאי עוד ראויה לשימוש, וגם על החזרת דלת כלים חיישינן שמא יתקע ומותר לטלטלה! (ונלענ\"ד דיש להגיד שההבדל הוא בין דבר שבקל יכולים לתקנו, לבין דבר שאין זה קל לתקנו. דאם אין קל לתקנו - כדלת - לא חיישינן שמא יתקע ומתירים לטלטל. וכן כתב **השש\"כ**)"}, {"layer": "mishna", "src": "משנה (כל הכלים, קכב)", "srcRef": null, "txt": "**משנה בפרקנו (כל הכלים, קכב)**\nכל הכלים שניטלים בשבת, דלתותיהם שיצאו מהם גם ניטלים, אעפ\"י שנתפרקו", "ref": {"label": "שבת · פרק כל הכלים · קכב", "ref": "Shabbat.122b"}}, {"layer": "shulchan", "src": "שו\"ע · (סע' ח')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.8", "txt": "וכן פסק **השו\"ע בסעיף ח'**: כל הכלים הנטלים בשבת בהיתר, דלתותיהם שנתפרקו – בין בחול בין בשבת – מותר לטלטלם"}, {"layer": "acharon", "src": "המאירי", "srcRef": null, "txt": "דעת **המאירי** שדינן של דלתות כשאר שברי כלים, ומותר רק אם ראויים למלאכה אחרת", "under": true}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "דעת **המשנ\"ב**, שמאחר והדלתות 'מוכנין ע\"ג אביהן', אף אם אין הם ראויים למלאכה כלל - מותר לטלטלם.", "under": true}, {"layer": "note", "src": "יישום — משקפיים שנשבר להם הקנה", "srcRef": null, "txt": "משקפיים שנשבר להם הקנה: יש לדון על שברי כלים, להתייחס לנפק\"מ האפשרית בין שבת לחול (א. ב\"י  ב. ט\"ז וב\"ח) ולנפק\"מ בין חתיכה אחת לכל המשקפיים (גם בתירוץ הב\"י את הטור שם), לשאול אם ראוי לכסות בו, להתייחס לדלתות כלים דבסעיף ח' (שלפי המשנ\"ב אף אם אינם ראויים לתשמיש אחר, מכח כך שמוכנין הן ע\"ג אביהן מותר לטלטלן), להתייחס לכך שאסור לחבר שמא ייתקע"}], "pesak": null}, "gufo_4": {"title": "כסויי קרקעות", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "כסויי קרקעות, דינם כביכול ככסויי ודלתות כלים. אולם, מאחר והם כי cRef": null, "txt": "והראשונים נחלקו מה הם כלים 'דחברינהו בארעא' לדעת הרי\"ף:"}, {"layer": "rishon", "src": "רא\"ש ורי\"ף (בהבנת הרא\"ש)", "srcRef": null, "txt": "**רא\"ש** ו**רי\"ף** **בהבנת הרא\"ש** (ט\"ס ברי\"ף): מחובר לקרקע\nופוסקים כדעת ר' יוסי, שמותר לטלטל כיסויים של כלים המחוברים לקרקע אף בלא בית אחיזה."}, {"layer": "rishon", "src": "רמב\"ם ורי\"ף (בהבנת הר\"ן)", "srcRef": null, "txt": "**רמב\"ם** ו**רי\"ף בהבנת הר\"ן**: קבור בקרקע\nופוסקים כדעת ת\"ק, שכלים הקבורים בקרקע, אסור לטלטל את הכיסויים שלהם אלא אם יש להם בית אחיזה."}, {"layer": "note", "src": "סיכום ביניים", "srcRef": null, "txt": "כך שלדעת הרא\"ש, מותר לטלטל כיסויים של כלים המחוברים לקרקע אף בלא ידית (תנור)\nולדעת הרמב\"ם והר\"ן, אין לטלטל כיסויים של כלים הקבורים בקרקע ללא ידית (חביות טמונות)"}, {"layer": "shulchan", "src": "השו\"ע (כרמב\"ם והבנת הר\"ן)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.10", "txt": "בלאגן גדול.\nבכל מקרה, **השו\"ע** נקט כדעת הרמב\"ם והבנת הר\"ן ברי\"ף. וכתב שחביות הקבורות בקרקע, אסור לטלטל את הכיסויים שלהן בשבת משום שמחזי כבונה."}, {"layer": "rishon", "src": "הטור (כרא\"ש)", "srcRef": null, "txt": "ו**הטור** פסק כדעת הרא\"ש והבנתו ברי\"ף, ולפיכך כתב שמותר לטלטל כיסוי של תנור המחובר לקרקע אפילו בלי בית אחיזה (דבהכי פסקינן כר' יוסי)"}, {"layer": "note", "src": "סיכום — אין נפק\"מ להלכה", "srcRef": null, "txt": "ונראה דאין נפק\"מ להלכה. וכי לכו\"ע:\nכיסויי קרקעות – צריך ידית אחיזה\nכיסויי כלים הקבורים בקרקע – צריך ידית אחיזה (לרמב\"ם ור\"ן – עפ\"י ת\"ק דאסר)\nכיסויי כלים המחוברים לקרקע – לא צריך ידית אחיזה (לרא\"ש – עפ\"י ר' יוסי שהתיר)\nכיסויי שאר כלים (חופשיים) – לא צריך ידית אחיזה"}, {"layer": "zman", "src": "השש\"כ", "srcRef": null, "txt": "ולפיכך, כתב **השש\"כ** שאסור להוציא מכסה של פתח ניקוז בבית אלא אם יש לו בית אחיזה (ונחשב ככיסוי קרקע)."}], "pesak": null}, "gufo_5": {"title": "בעלי חיים", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "בעיקרון, בסוגיות והפוסקים מתייחסים לחיות כמוקצה מחמת גופו, ואסור לטלטלם; מאחר ואין להם שימוש."}, {"layer": "mishna", "src": "משנה (מפנין, קכח)", "srcRef": null, "txt": "**בסוגיה קכח (מפנין)**\n**במשנה**:\nדוחין את התרנגולת כדי שתכנס\nובהמות אפילו מדדין", "ref": {"label": "שבת · פרק מפנין · קכח", "ref": "Shabbat.128b"}}, {"layer": "gemara", "src": "גמרא · אביי · ברייתא", "srcRef": null, "txt": "ו**בגמרא**, סבר **אביי** דהטעם לזה הוא דמקפיא לנפשיה\nהיינו, שעלולה להגביה את עצמה מהקרקע, ונמצא שהאדם מטלטלה\nוזה עפ\" ה**ברייתא**: אין עוקרין בהמה חיה ועוף.\nועוד **בברייתא** בדף מג: כופין את הסל בפני האפרוחין, אבל אסור להזיזו\nמכאן שחיה היא מוקצה"}, {"layer": "note", "src": "ביאור", "srcRef": null, "txt": "כלומר, שמותר לדדות חיות ולסייע להן במגע ממש בהליכתן משום שאין בכך טלטולן.\nאבל בתרנגולין יש חשש, משום שאם יגיביהו עצמן קצת – יצא שהאדם טלטל אותן."}, {"layer": "shulchan", "src": "השו\"ע בסעיף לט'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.39", "txt": "ו**השו\"ע** **בסעיף לט**' כתב עפ\"י זה (בלשון הברייתא): שאסור לטלטל בהמה חיה ועוף."}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "**והמשנ\"ב** כתב הטעם לזה, דהם בכלל מוקצה כעצים ואבנים דהא לא חזו לשימוש"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "הפוסקים דנו אם חיה בכל זאת יהיה מותר לטלטלה"}, {"layer": "note", "src": "דיון (ונלענ\"ד)", "srcRef": null, "txt": "ומאחר והם מוקצים כעצים ואבנים, ניראלי שיש לדון באפשרות  לייחדם לשימוש ע\"י מחשבה או מעשה בעלמא. ואולי אפשר להגיד שליטוף של החיה ביומיום וודאי 'מכשירה' ומפקיעה מתורת מוקצה. ונראה דאף ניתן להגיד כדעת הר\"ן (ס' כב'-כג'), שלדבר שאורחיה בו - אפשר לייחדו אף במחשבה ואף לאותה שבת."}, {"layer": "acharon", "src": "המהרש\"ל (הביאו הט\"ז)", "srcRef": null, "txt": "**המהרש\"ל** סבר דתרנגולי ביתו מותר לטלטלה (הביאו הט\"ז)"}, {"layer": "acharon", "src": "והט\"ז", "srcRef": null, "txt": "**והט\"ז** דחאו, וסבר שאין לטלטל בע\"ח כלל"}, {"layer": "acharon", "src": "בעל ההלכות קטנות", "srcRef": null, "txt": "ו**בעל ההלכות קטנות** כתב שמותר לטלטל בע\"ח כשראוי לצחק בו תינוק"}, {"layer": "acharon", "src": "הקצות", "srcRef": null, "txt": "ו**הקצות** התיר לטלטל אקווריום משום שהוא משמש לנוי (אבל את הדגים עצמם לא)."}, {"layer": "zman", "src": "פניני הלכה (הרב מלמד) · הרב פיינשטיין", "srcRef": null, "txt": "ו**בפניני** **הלכה**, כתב הרב מלמד שחיות מחמד אשר עומדים לשעשוע במשך כל השבוע – מותרים לטלול גם בשבת. וכן כתב **הרב פיינשטיין**"}], "pesak": null}, "gufo_6": {"title": "אוכל", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "אוכל הוא כמובן לא מוקצה. מאחר ועומד לשימוש של אכילה.\nואבן הבוחן לכך, האם דבר עומד למאכל כלשהו: כלב (סע' לא') או כל חיה מצויה (סע' כט').\nואם אין הדבר ראוי למאכל חיה המצויה, אלא שראוי לחיה שאינה מצויה, אך הוא מגדלה בביתו – מותר לו לטלטלו (גם, כט').\nלפיכך, במקרים מסוימים עולה השאלה האם דבר מה נחשב כראוי לאכילת חיה או לא."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ודבר שאינו עומד בד\"כ למאכל בהמה, אלא לעיתים רחוקות ובשעת דחק - אעפ\"י שראוי לכך קצת - אסור לטלטלו משום שבסתמו אינו עומד לשם כך (כגון גרעיני תמרים. וזה כדין התקנת מוקצה לשימוש)."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ולפיכך, כל אוכל הראוי לאכילה מותר לטלטלו. ואפילו אם מניחו להבשיל מאליו וכד' - מותר עד הבשלתו; משום שראוי לאכילה ככה.\nאבל **גרוגרות וצימוקים**, חריגים הם, מאחר ואין הם עומדים לאכילה עד שיתייבשו מאליהם; והרי מקצה דעתו מהם משום שוודאי יסריחו; **וגם** דחאם בידיים (ואינם דומים לנר, שעל אף שדלק בבין השמשות, הרי מצפה לו שייכבה, ולא אסוחי דעתו לגמרי)."}, {"layer": "note", "src": "שני תנאים להקצאה", "srcRef": null, "txt": "אז יש שני תנאים להקצאת דבר:\n1) שלא יהא ראוי לאכילה/שימוש כך שיקצה אותו מדעתו לגמרי (דלא חזי)\n2) שיידחהו בידיים\n\t(רש\"י ושו\"ע: מודה ר' שמעון בגרוגרות וצימוקים דאיכא תרתי; **לא חזו**, **ודחייה בידים**)"}, {"subsubhead": "בשר ודגים טפלים (ש\"ח, סע' לא-לב)"}, {"layer": "gemara", "src": "גמרא בדף קכח · רב הונא ורב חסדא", "srcRef": null, "txt": " עפ\"י ה**גמרא בדף קכח** מסכימים רב הונא ורב חסדא:\n\t**דג מליח** – מותר\n\t**דג תפל**\t- אסור\n\t**בשר מליח** - מותר\n\t**בשר תפל** – רב הונא מתיר; רב חסדא אוסר", "ref": {"label": "שבת · פרק מפנין · קכח", "ref": "Shabbat.128a"}}, {"layer": "shulchan", "src": "שו\"ע (כרב הונא)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.31", "txt": "ו**שו\"ע** נקט כרב הונא שמותר לטלטל בשר תפל משום שראוי לכלבים"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "**מג\"א**: רק בשר רך ראוי לאכילה. בשר קשה לא. (אפילו שראוי לכלבים - לא עומד לשם כך)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "**ט\"ז**: בשר קשה ראוי לכלב, ולכן מותר לטלטל."}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "**משנ\"ב**: ראוי להחמיר כמג\"א, ניתן להקל בשעת צורך כט\"ז"}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "והרב עובדיה סבר עפ\"י דעת הט\"ז, דמותר לטלטל בשר קפוא (ג"}, {"subsubhead": "פסולת (עצמות וקליפין. ש\"ח, כו', כט')"}, {"layer": "gemara", "src": "מחלוקת ב\"ש וב\"ה (קמ\"ג · פ' נוטל)", "srcRef": null, "txt": "**מחלוקת ב\"ש וב\"ה בדף קמ\"ג (פ' נוטל)**\n**ב\"ש** – מקלים להורידם מהשולחן בידיים ולזרוק  (ר' שמעון)\n**ב\"ה** – סוברים שאין לגעת, אלא ינערם (ר' יהודה)\nרב נחמן סובר שיש בלבול, שהרי קיי\"ל שב\"ה כר' שמעון וב\"ש כר' יהודה);\nועוד, כתב **רש\"י** שאין אנו סומכים על משנתנו כמות שהיא, אלא שהיא מוחלפת.", "ref": {"label": "שבת · פרק נוטל · קמג", "ref": "Shabbat.143a"}}, {"layer": "shulchan", "src": "רר\"ר / השו\"ע בש\"ח כו'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.27", "txt": "**רר\"ר** פוסקים לפיכך להקל, שמותר לזרוק אפילו בידיים, משום שראויים למאכל כלב.\nוכן **השו\"ע בש\"ח כו'**. \t[ולדעת הר\"ן, אם נתפרקו מער\"ש, אפילו שראוי למאכל כלב – אסור. ותמהים עליו]"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ולפיכך, דבר שאינו ראוי אפילו למאכל בהמה/כלב, מנערים מן הטבלא. ואין היא נעשית בסיס לדבר האסור, משום שלא היה עליו בבין השמשות. דאין מוקצה לחצי שבת. (וגם הווי בסיס לדבר איסור והיתר שדבר האיסור בטל בחשיבותו לדבר ההיתר (לחם וכו'); ובוודאי שגם לא היה בדעתו שיהיה שם בשבת)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ומצד טלטול הפסולת כמוקצה, אין לפנותה בידיים (כשאינו חזי אפילו לכלב כנ\"ל), אבל מותר לטלטלה מן הצד (לצורך הדבר המותר; השולחן), ע\"י ניעור המפה או השולחן או ע\"י סכין."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "ואם צבר הרבה פסולת עד שנחשב גרף של רעי, מותר לו לטלטלו אפילו בידו (מפני כבוד הבריות)\nוכ\"כ **המשנ\"ב**"}, {"layer": "shulchan", "src": "השו\"ע בסעיף כט'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.29", "txt": "ו**בסעיף כט'**, **השו\"ע** כתב שעל הדבר להיות ראוי למאכל חיה המצויה אצל רוב בני אדם. (זאת, עפ\"י **משנה ב-קכו**, שלא מטלטלין לוף, משום שאינו ראוי אפילו לבהמה; ולרשב\"ג מותר משום שראוי לעורבים; ועשה השו\"ע פשרה בין ת\"ק לרשב\"ג, דוודאי סברו שניהם שרק חיה מצויה מהני לכך)"}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "וחיה שאינה מצויה, אך אדם בעלים שלה ומגדלה בביתו – מותר (עפ\"י הסוגיה).\nו**המשנ\"ב** כתב, שחיה שמגדלים עשירים בביתם, לא חשיב מצוי."}], "pesak": null}, "gufo_7": {"title": "התקנת מוקצה לשימוש", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "הפקעת מוקצה מתורת מוקצה (לפני שבת), יכולה להיעשות ע\"י חשיבה או ע\"י מעשה. ומתי משתמשים בחשיבה ומתי במעשה? נראה שזה תלוי במצב וסוג המוקצה (ובכך, כנראה, נעוץ ההבדל שבין חריות הדקל לאבנים. דחריות הינם כלים כבר, רק שמלאכתם לאיסור)."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "כך, חבילי זרדים וקש (ס' כח'), כאשר בסתם הם עומדים להסקה וכדומה, על אף שהם ראויים למאכל בהמה, מאחר ואין הם עומדים למאכל - מוקצים. לכן, יש להתקינם למאכל בהמה (פשט משנה, קכו, מפנים). אבל אם סתמן עומדים למאכל - אין צורך להתקינם."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אולם, אבני בניין שנותרו בצד, אף ללא חשיבה ומעשה כלל 'חזי למזגא עלייהו'. כלומר, שבסתם, בד\"כ מתייחסים ללבני בניין שנותרו כדבר הראוי לישיבה, ולכן אין צורך בהכנה נוספת; וכבר נחשבים כלי. אולם, אם סידר אותן זה על זה בצורה כזו שגילה דעתו שאין להן שימוש יותר, אינם נחשבים עוד לכלי, אלא למוקצה מחמת גופו (ש\"ח: יז')"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "איך אפשר להכשיר מוקצה לשימוש היתר?"}, {"layer": "note", "src": "סיכום הדין (עפ\"י השו\"ע, ס' כ-כד)", "srcRef": null, "txt": "סעיפים כ-כד עוסקים בשאלה הזאת. כאשר בסופו של חשבון, עפ\"י השו\"ע:\n**1)** דבר שעומד לשימוש כלשהו האסור, מספיק שיישב עליו בעלמא, או שיחשוב/או יעשה בו מעשה. (רר\"ר ור\"ן, ס' כ')\n**2)** **א.** דבר שאינו עומד לשימוש כלל (אבנים), לא מספיקה חשיבה, ויש לעשות בו גם מעשה (רמב\"ם, ס' כא)\n**ב.** אם מתקין את הדבר לשימוש שאורחיה לשימוש בו, אפשר אף להסתפק בחשיבה לאותה שבת (ר\"ן, ס' כב-כג)\n**ג.** אבל אם מתקינים את הדבר לשימוש שלא אורחיה בו, יש לחשוב ולייחדה לשימוש בו לעולם  (כנ\"ל)\n(וכמובן שגם מעשה מהני, כנ\"ל)"}, {"subsubhead": "חריות הדקל (דף נ · במה טומנין · ש\"ח:כ') / נדבך של אבנים (דף קכה · כל הכלים · ש\"ח:כא')"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "חריות הדקל שקצצן בער\"ש הם מוקצה ואסורים בטלטול. כיצד מפקיעים מהם תורת מוקצה?"}, {"layer": "gemara", "src": "מחלוקת אמוראים · רב · שמואל · רב אסי", "srcRef": null, "txt": "**מחלוקת אמוראים** איזה תקון צריך לזה\n**רב**: אמר דבעינן דוקא מעשה בפועל ממש (יקשור הענפים מבעוד יום)\n**שמואל**: אמר דסגי גם במחשבה (היינו שיחשוב מבעוד יום לישב עליהם למחר)\n**רב אסי**: כשישב עליהם מבעוד יום, אף בלא מעשה ובלא מחשבה", "ref": {"label": "שבת · פרק במה טומנין · נ", "ref": "Shabbat.50a"}}, {"layer": "rishon", "src": "הרי\"ף רא\"ש והרמב\"ם · הר\"ש הזקן", "srcRef": null, "txt": "ופסקו **הרי\"ף רא\"ש והרמב\"ם** דסגי בישיבה בלבד (רב אסי)\nוכן פסק **הר\"ש הזקן בתוס'**"}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "אבל **ר\"ת** סבר כדעת רב, שצריך בהן מעשה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "האם שיטת רב אסי היא בהכרח קולא (ואז וודאי שאפשר גם במחשבה/מעשה)?"}, {"layer": "rishon", "src": "ר\"ן (רא\"ש רמב\"ם ורב האי\"ג)", "srcRef": null, "txt": "**ר\"ן (רא\"ש רמב\"ם ורב האי\"ג)**: וודאי שלרב אסי, מועילה גם מחשבה או מעשה; אלא שמסתפק בישיבה בעלמא\t        (ויש מקום לעיין ברמב\"ם, שע\"א שציין שמעשה מועיל, לא ציין מחשבה)", "under": true}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "**רמב\"ן**: דווקא ישיבה מועילה. ולא מחשבה או מעשה.", "under": true}, {"layer": "shulchan", "src": "שו\"ע (כרב אסי)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.20", "txt": "**שו\"ע** נקט כרב אסי, עפ\"י דעת ר\"ש ורר\"ר שמספיק שישב מעט מבעו\"י; וסבר כסיעת הר\"ן, שגם מעשה/מחשבה מהני.", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "נדבך של אבנים — מעשה ברב ותלמידיו, שראו נדבך של אבנים. ונחלקו אמוראים איזו הכנה הצריכם כדי שיוכלו לשבת עליהם בשבת:"}, {"layer": "gemara", "src": "ר' חנינא · ר' אמי · רב אסי", "srcRef": null, "txt": "**ר' חנינא**: חשיבה\n**ר' אמי**: סידור (מעשה)\n**רב אסי**: שפשוף (מעשה)", "ref": {"label": "שבת · פרק כל הכלים · קכה", "ref": "Shabbat.125b"}}, {"layer": "acharon", "src": "הרי\"ף / הב\"י / הרמב\"ם", "srcRef": null, "txt": "**הרי\"ף** השמיט את הקטע של נדבך, ונראה שסבר דאין הבדל בין אבנים לחריות, ובשניהם מספיק חשיבה או ישיבה. אבל **הב\"י** סבר שהוא כן מחלק, וכתב כי דעתו כהרמב\"ם לקמן.\n**הרמב\"ם** החמיר בנדבך אבנים וכתב שצריך גם מחשבה וגם מעשה. וכן הב\"י"}, {"layer": "acharon", "src": "הרב המגיד", "srcRef": null, "txt": "ו**הרב המגיד** תירץ ברמב\"ם, שזה בגלל שחריות הדקל לעיתים עומדים לישיבה, וזה תלוי במחשבה לשם מה קצצם. לכן, אם קצצן במחשבה לשריפה - צריך רק 'לתקן' את המחשבה ולהמירן לשם ישיבה.\nאבל נדבך אבנים, לא נעשה בו שום מעשה מעולם, ואין עליו תורת כלי. לכן צריך **גם** מעשה **וגם** מחשבה."}, {"layer": "acharon", "src": "וכתב המג\"א", "srcRef": null, "txt": "**וכתב המג\"א** שלפיכך, עצים שלנו העומדים רק לשריפה, ולא המחשבה אסרה אותם, אין מחשבה מתקנתם, וצריכים גם מעשה.", "under": true}, {"layer": "shulchan", "src": "והשו\"ע (כרמב\"ם)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.21", "txt": "**והשו\"ע** פסק כדעת הרמב\"ם, וכתב שצריך גם סידור של האבנים לישיבה, ולא סגי שחשב עליהם", "under": true}, {"layer": "acharon", "src": "המרדכי והרמ\"א", "srcRef": null, "txt": "אבל **המרדכי והרמ\"א** סברו, דאין הבדל בין חריות לאבנים, ובשניהם מהני מחשבה מער\"ש"}, {"layer": "shulchan", "src": "ובסעיף כב' — ייחוד וחשיבה אף באבנים", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.22", "txt": "**ובסעיף כב'**, דן השו\"ע על ייחוד וחשיבה לשימוש המותרים אף באבנים."}, {"layer": "rishon", "src": "הר\"ן", "srcRef": null, "txt": "**הר\"ן** סבר, שלמרות שאבנים לא מועיל בהן חשיבה אלא צריך גם מעשה, אם מייחדן לשימוש שדרך הוא להשתמש בהן – מועילה חשיבה (ואפילו לשבת אחת). וזה ההבדל בין חריות לאבנים, שחריות מספיק להן חשיבה, משום שחשיב שם לדבר שאורחיה לעשות בהן. בעוד אבנים – לא אורחיה לישב עליהם (אבל אם ייחדם לדבר שכן אורחיה בהם, כגון לפצוע אגוזים  סגי אפילו חשיבה)"}, {"layer": "rishon", "src": "אבל הרשב\"א", "srcRef": null, "txt": "אבל **הרשב\"א** סבר שצריך שייחדה לזמן מרובה, ולא רק שבת אחת."}, {"layer": "shulchan", "src": "והשו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.22", "txt": "ו**השו\"ע** סבר ונקט תחילה לפי **הר\"ן**, וכתב שאסור לכסות פי החבית באבן אף אם חשב עליה מבעוד יום, אלא אם ייחדה לכך לעולם משום שאין זה דרכה לכסות פי החבית. **אבל** אם ייחדה לשם דבר שאורחיה בה, כגון פציעת אגוזים – מועיל ומותר לטלטלם.\nולאחמ\"כ, הביא את בי\"א את דעת **הרשב\"א** שבכל מקרה צריך ייחוד לאורך זמן."}], "pesak": null}, "mius_1": {"title": "עיקר הדין ופסק", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "מחלוקת ר' שמעון ור' יהודה (דף מד)", "srcRef": null, "txt": "מחלוקת ר' שמעון ור' יהודה בדף מד. לר' יהודה אסור מוקצה מחמת מיאוס, ולר' שמעון אין;\nלפיכך,במשנה שם (משנת ר' יהודה): נר חדש מותר (דאינו הוקצה לשימוש איסור) ונר ישן אסור\nדהוא מוקצה מחמת מיאוס.", "ref": {"label": "שבת · פרק כירה · מד", "ref": "Shabbat.44a"}}, {"layer": "gemara", "src": "דף קנ\"ז · מחלוקת רב אחא ורבינא", "srcRef": null, "txt": "וב**דף קנ\"ז**, **מחלוקת רב אחא ורבינא**, דחד סבר שכל השבת כולה כר' שמעון חוץ ממוקצה מחמת איסור. וחד סבר דכל השבת כולה כר' שמעון חוץ ממוקצה מחמת מיאוס", "ref": {"label": "שבת · פרק מי שהחשיך · קנז", "ref": "Shabbat.157a"}}, {"layer": "rishon", "src": "הרי\"ף והרא\"ש", "srcRef": null, "txt": "ונקטו **הרי\"ף והרא\"ש**, דהלכה כדעת המקל (בכל מקום שנחלקו רב אחא ורבינא הלכה כמקל)\nהיינו, שמוקצה מחמת מיאוס כר' שמעון, ומוקצה מחמת איסור כר' יהודה."}, {"layer": "shulchan", "src": "השו\"ע בש\"י א'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.310.1", "txt": "וכן נקט **השו\"ע בש\"י א'**"}, {"layer": "shulchan", "src": "שם — עץ שתולין בו דגים", "srcRef": "Shulchan_Arukh,_Orach_Chayim.310.1", "txt": "**שם** כתב גם להתיר עץ שתולין בו דגים, משום שהוא מוקצה מחמת מיאוס"}, {"layer": "gemara", "src": "הגמרא בפ' תולין · רב", "srcRef": null, "txt": "זאת, עפ\"י **הגמרא בפ' תולין**.\nדשם **רב** סבר שהעץ של דג אסור, ונחלקו **הראשונים** משום מה אסר", "ref": {"label": "שבת · פרק תולין · קמא", "ref": "Shabbat.141a"}}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "לדעת **התוספות**: אין עליו תורת כלי (בעוד עץ של בשר יש עליו תורת כלי)"}, {"layer": "rishon", "src": "הרי\"ף והרא\"ש", "srcRef": null, "txt": "ו**הרי\"ף והרא\"ש**: סברו שרב אסר בגלל שהוא מאוס\nולפיכך לשיטתם, מותר לטלטל עץ של דג, מאחר והוא מוקצה מחמת מיאוס וזה קיי\"ל כר' שמעון"}, {"layer": "shulchan", "src": "השו\"ע (סוף סע' א' של ש\"י)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.310.1", "txt": "וכן נקט **השו\"ע** בסוף **סע' א' של ש\"י** כדעת הרי\"ף והרא\"ש, שמותר לטלטלו כי הווי ממ\"מ וקיי\"ל לגביו כר' שמעון"}], "pesak": null}, "mius_2": {"title": "גרף של רעי", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "על אף שקיי\"ל שמוקצה מחמת מיאוס מותר לטלטלו, כר' שמעון, דבר שמאיס הרבה – אסור לטלטל; משום שהוא כמוקצה מחמת גופו.\nומדין גרף של רעי אנו למדים כי אף דבר המאיס הרבה מותר לטלטל במקום שיש בו כבוד הבריות (אך אם אין בכך כבוד הבריות – אסור. כגון כשאין אנשים)\nונראה כי גם הרעי וגם הגרף מאוסים הרבה. ולכן, לאחר ששופך את הגרף של רעי, אין היתר להחזירו מאחר וכבר אין בכך כבוד הבריות.\nאבל אם נותן לתוכו מים – מותר **לצורך**, והווי כטלטול אגב דבר המותר (אבל רק בגלל הצורך. שהרי 'לא אמרו ככר אלא גבי מת ותינוק')"}, {"layer": "gemara", "src": "שמואל · רב אשי (ביצה · שבת קכא)", "srcRef": null, "txt": "הדיון בו הוא ב**ביצה** ו**אצלנו בשבת (קכא)**.\nשם, מימרא של **שמואל**: מותר לטלטל רעי ע\"י הגרף (הכלי), אבל הוא גופו – לא.\nאבל הביאו שם בשם **רב אשי**, שמותר אפילו את הדבר המאוס עצמו (אצל רב אשי: עכבר בזנבו)\nוכל זה דווקא במקום שיש בו אנשים, משום כבוד הבריות, כגון חצר.\nומתבאר גם בגמרא, שרק להוציא מותר, אבל להחזיר – לא (כבר לא שייך כבוד הבריות)\nאלא רק אם נותן לתוכו מים.", "ref": {"label": "שבת · פרק נוטל · קכא", "ref": "Shabbat.121b"}}, {"layer": "rishon", "src": "ר' ירוחם והרשב\"א", "srcRef": null, "txt": "ו**ר' ירוחם והרשב\"א** סברו שזה דווקא אם מחזירו לצורך, אבל אסור להחזירו אם חס על הכלי; משום שאין סתם הנחת דבר היתר על מוקצה מתירה לטלטלו, כי 'לא אמרו ככר אלא גבי מת'. (ולמרות שהמים יהיו מאוסים גם - חזי לבהמה)", "under": true}, {"layer": "rishon", "src": "מהר\"י אבוהב (עפ\"י הרא\"ש)", "srcRef": null, "txt": "אבל **מהר\"י אבוהב** (עפ\"י **הרא\"ש**), סבר שהחזרת הגרף הותרה 'משום התחלתו'. כי אם לא יותר להחזיר את הכלי, יימנעו מהוצאתו מלכתחילה. ונמצא שנפגע כבוד השבת. ולכן מותר אף לא לצורך", "under": true}, {"layer": "shulchan", "src": "השו\"ע בש\"ח סעיף לד'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.34", "txt": "ו**השו\"ע** **בש\"ח סעיף לד'** כתב את הדין של היתר טלטול גרף דבר המאיס הרבה כל עוד שייך בזה כבוד הבריות (כגון בחצר)"}, {"layer": "shulchan", "src": "ובסעיף לה' · והמשנ\"ב", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.35", "txt": "וב**סעיף לה',** כתב את דין הגמרות, שמותר להוציא גרף של רעי, אבל להחזירו - מותר רק עם מים  (ונראה לי שלא הכריע בין ר' ירוחם למהר\"י אבוהב)\n\tו**המשנ\"ב** כתב שסבר כדעת המהרי\"א, מאחר ולא ציין שהחזרה מותרת רק לצורך"}, {"layer": "acharon", "src": "הבה\"ל", "srcRef": null, "txt": "ולפיכך **הבה\"ל** סבר שמותר לטלטל סיר/קדרה מלוכלים (על אף שמעיקר הדין היא כשמל\"א)"}, {"subsubhead": "אין עושין גרף של רעי לכתחילה"}, {"layer": "gemara", "src": "סוגיה בביצה · אביי · רבה", "srcRef": null, "txt": "ב**סוגיה שם בביצה**\nמובא סיפור של **אביי**, שהיה לו טפטוף בגג שנפל על הרחיים העשויים טיט שלו.\nו**רבה** אמר לו שיביא מיטה, ואז יהיה מותר לטלטל את הריחיים; משום שעשויים מטיט ומסריחים; וליד המיטה נחשב מקום כבוד בריות\nאבל **אביי** הקשה עליו שאין עושין גרף של רעי לכתחילה"}, {"layer": "rishon", "src": "והרמב\"ם", "srcRef": null, "txt": "ו**הרמב\"ם** סבר שרבה מודה לאביי. ולפיכך, אין לשים כלי מתחת לדליפה של מים שאינם ראויים לרחיצה, משום שאין עושין גרף של רעי לכתחילה (אבל בדיעבד מותר כנ\"ל)"}, {"layer": "rishon", "src": "הטור (של\"ח)", "srcRef": null, "txt": "אבל **הטור**(של\"ח) סבר שמותר"}, {"layer": "shulchan", "src": "השו\"ע בסימן של\"ח, וכאן בסעיף לו'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.36", "txt": "ו**השו\"ע בסימן של\"ח, וכאן בסעיף לו',** פסק כהרמב\"ם שאין עושין גרף של רעי לכתחילה"}, {"layer": "acharon", "src": "הבה\"ל", "srcRef": null, "txt": "ו**הבה\"ל** כתב דזה משום ביטול כלי מהיכנו\nוכתב גם, שמה שאנחנו נוהגים ליטול ידיים לתוך כלי בבוקר למרות שאין הם ראויים לרחיצה או שתיית בהמה זה כדעת הטור; וגם, שאין זה נחשב באמת 'לא ראויים', וזה לא דומה למי דליפה או מי רגליים."}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "**והמשנ\"ב** כתב שמה שמותר לטלטלו בדיעבד, הוא אם הגרף של רעי נמצא במקום שהוא קבוע בו, דאז מאיס עליו ומותר להוציאו משום כבודו כנ\"ל"}], "pesak": null}, "basis_1": {"title": "מקורות", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "קמב · פ' נוטל", "srcRef": null, "txt": "**קמב, (פ' נוטל)** – ההיתר לטלטל בסל\"ה אם שכח\n**משנה**: האבן שעל פי החבית - מטה על צידה והיא נופלת ..\nמעות שעל הכר - נוער את הכר והן נופלות\n**גמרא**: **רב הונא** אומר שכל ההיתר לנער את הבסיס ולטלטלו, הוא רק אם המוקצה שם בשכחה. אבל אם הניח - נעשה בסיס לדבר האסור.", "ref": {"label": "שבת · פרק נוטל · קמב", "ref": "Shabbat.142b"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "לפיכך, דין בסיס לדבר האסור הוא רק אם דבר מוקצה היה על דבר ההיתר בבינה\"ש מדעת.\nואם המוקצה הונח (איכשהו) על הדבר המותר אחרי בינה\"ש, הוא מותר, דקיי\"ל שאין מוקצה לחצי שבת."}, {"layer": "gemara", "src": "גמרא מד · פ' כירה", "srcRef": null, "txt": "וכן ב**גמרא מד (פ' כירה):**\nאמר **רב יהודה אמר רב**:\nמטה שיחדה למעות: הניח עליה מעות - אסור לטלטלה. לא הניח עליה מעות - מותר לטלטלה.\nלא יחדה למעות: יש עליה מעות - אסור לטלטלה. אין עליה מעות - מותר לטלטלה, **והוא שלא היו עליה בין השמשות**.", "ref": {"label": "שבת · פרק כירה · מד", "ref": "Shabbat.44a"}}, {"layer": "note", "src": "ביאור", "srcRef": null, "txt": "כלומר, אם לא היו על המיטה מעות בבינה\"ש – מתחשבים רק במצב הנוכחי. ואסור לטלטל כל עוד המעות עליה. אבל ברגע שירדו – מותר.\nבעוד שאם המעות היו עליה בבינה\"ש – מה שנחשב 'הנחה', ולא סתם 'יש עליה מעות' – גם לאחר שירדו ממנה אסור לטלטל את מיטה.\n(אז בבינה\"ש יש לנו: הניח/לא הניח (שכח); ולאחר בינה\"ש: יש מעות/אין מעות)"}, {"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "ולפיכך כתב **הרמב\"ם**, שאם היה בבינה\"ש מוקצה על דבר היתר על שיהיה שם כנ\"ל, אפילו אם הורד/נפל – אסור לטלטל את הבסיס בכל השבת, דמיגו דאיתקצאי בבינה\"ש אתקצאי לכולי יומא"}, {"layer": "note", "src": "הרמ\"א והב\"י", "srcRef": null, "txt": "(והביאו **הרמ\"א** בש\"ט, ד. ובסעיף ש\"י, הביא **הב\"י** דאין מוקצה לחצי שבת. וזה מוכח הן מהסוגיה הנ\"ל עם המיטה והמעות, וגם מהא דתנן שכופין את הסל בשביל האפרוחין ומותר לטלטלו לאחר שירדו, על אף שהיה מוקצה בזמן הזה)"}], "pesak": null, "intro": "דבר מוקצה שהיה מונח על דבר שאינו מוקצה בבינה\"ש – הופך אותו לבסיס לדבר האסור, ואין לטלטלו גם אם הדבר המוקצה ירד מעליו. בעצם, 'בסיס לדבר האסור' אינו מוקצה בפני עצמו. אלא שהדיון בבסיס הוא דיון איך מותר לטלטל מוקצה כשיש איתו דבר היתר (טלטול מן הצד); ומאחר וקיימ\"ל כר' יהודה ד'מיגו דאיתקצאי' – הדיון רלוונטי גם לאחר שהמוקצה ירד, ודינו של הבסיס שהיה אסור בטלטול בבינה\"ש בגלל דבר האיסור שעליו נמשך לכל היום."}, "basis_2": {"title": "תנאים", "seif": null, "sugya": null, "ops": [{"layer": "note", "src": "תנאי 1 — הנחה מדעת", "srcRef": null, "txt": "**1)** שהמוקצה יונח מדעת, ולא משכחה (לפי רב הונא, קמב)\nוכן בשו\"ע (ש\"ט, ד).\n\nדעות מסוימות על מקרים שלא נחשבים הנחה:\n- הנחה במשך השבוע\n   **תרומת הדשן**: כל הנחה שלפני יום שישי (ער\"ש) נחשבת כשכחה\n- שיניח בטוב ובמסודר, ולא באקראי\n   בב\"י הביא שיש מי שלמד מרש\"י שרק אם הניח במסודר, ולא בדחיסה ובאקראי כמו שעושים כשאין מקום. **והמג\"א** צידד בשיטה זו (דוג': בשר קפוא על גלידה בגלל שאין מקום)\n- הנחה של אדם אחר נחשבת שכחה (**אור זרוע, רמ\"א ש\"ט ד, ושש\"כ**)\n   דאין אדם אוסר של חברו שלא מדעתו\n   **והמשנ\"ב** סייג, שאם היה לחברו נוח בזה, ב\"ז נחשב"}, {"layer": "note", "src": "תנאי 2 — על דעת שיהיה שם", "srcRef": null, "txt": "**2) רש\"י**: שיונח על דעת שיהיה שם בבינה\"ש.\n**תוספות (ר\"ת) ובעל התרומה**: על דעת שיהיה שם כל השבת\n**שו\"ע (ש\"ט ד')**: מביא את רש\"י ואז את ר\"ת והתרומה כיש אומרים\n**משנ\"ב**: במקום הפסד יש לסמוך על ר\"ת והתרומה\n- דוגמא: טמן בדבר מוקצה (גיזי צמר), והרי היה בדעתו להורידו בהמשך השבת."}, {"layer": "note", "src": "תנאי 3 — שהבסיס ישמש את המוקצה", "srcRef": null, "txt": "**3)** שהבסיס ישמש את המוקצה\nנלמד מהסוגיה עם הפוגלא (צנון). שם, פוגלא שטמנה בעפר מותר להוציאה אף על פי שמטלטל בכך את העפר, דהווי טלטול מן הצד לצורך דבר המותר.\nו**בעל המאור** סובר מכך, שעל אף שהפוגלא מתחת לעפר, העפר משמש את הפוגלא, ולא להיפך. דההטמנה שלו צורך הצנון היא.\n**והכלבו** כתב (באופן דומה), שאין אוכל נעשה בסיס לדבר האסור (כי וודאי שתמיד האוכל יהיה העיקר)\n**והשו\"ע** כתב בשי\"א עפ\"י הסוגיה שמותר להוציא הצנון מן העפר ע\"י משיכתו, דהווי טלטול מן הצד לצורך דבר המותר.\n**והרמ\"א** הביא את דעת הכלבו, שאפילו אם הניחו את הפוגלא על דעת שיהיה שם בבינה\"ש ואפילו לכל השבת – לא נאסר, דאין אוכלין נעשין בסיס לדבר האסור.\n(ויש להגיד כן לעניין הטמנה בדבר מוקצה (גיזי צמר), שוודאי שאין התבשיל משמש את המוקצה)"}, {"layer": "note", "src": "תנאי 4 — על עיקר הבסיס (מוּכני)", "srcRef": null, "txt": "**4)** שהמוקצה יהיה על עיקר הבסיס (מוּכני)\nמהסוגיה על המוכני, שהוא גלגל העגלה; דהוא טפל לעגלה.\nמכאן, סברו **בתוספות (ר\"י)**, שאם יש עליו מעות, מותר לטלטל את העגלה אפילו עם המעות ואפילו אם הונחו שם על דעת שיישארו בשבת כנ\"ל, משום שהגלגל טפל לעגלה ואינו העיקר שלה.\nוכן **תרומה\"ד**; והביאו הב\"י בש\"ט (אולם, בגד עם מעות בכיס, על אף שאינו העיקר – אסור ללבוש שמא יצא עמו לרשות הרבים; והרי הווי משוי)\nוהביא כן **הרמ\"א בש\"י, ז**\n**והמג\"א** סבר דאם אפשר לנער את המוקצה מן הבסיס – יש לנער, ועל אף שהוא טפל ומעיקר הדין מותר לטלטלו עם המוקצה\nאבל אם הבסיס יכול לעמוד ככלי לכשעצמו, כגון מגירה שבשולחן, חשיב עיקר, ולא טפל; ואסור."}, {"layer": "note", "src": "תנאי 5 — שהמוקצה יהיה בעל חשיבות", "srcRef": null, "txt": "**5)** שהמוקצה יהיה בעל חשיבות (**משנ\"ב**, עפ\"י חיי אדם: 'דאין אדם מבטל כליו בשביל כמה מעות')"}, {"layer": "note", "src": "תנאי 6 — בסיס לאיסור והיתר החשוב יותר", "srcRef": null, "txt": "**6)** בסיס לדבר האסור והמותר וחשוב יותר - מותר\nזה עפ\"י **הגמרא**, דמותר לטלטל כנונא (מחתה) אגב קיטמא (אפר), אף על גב דאיכא עליה שברי עצים\nומ**התוספות** משמע שמדובר כשהדבר המותר חשוב מן הדבר האסור\nוכן כתב **השו\"ע ב-ש\"י ח'-ט'**, שכלי שיש עליו דבר האסור ודבר המותר - מותר לטלטלו. כגון שדבר המותר חשוב יותר מן האסור. **והמשנ\"ב**: אם לכל העולם ההיתר חשוב יותר, ולדידיה אינו חשוב, אזלינן בתר דידיה וה\"ה איפכא"}, {"layer": "note", "src": "תנאי 7 — כשהמוקצה הוא כשמל\"א", "srcRef": null, "txt": "**7)** כשהמוקצה הוא כשמל\"א\n**הפמ\"ג** נסתפק אם בסיס לכלי שמלאכתו לאיסור אסור לטלטול מחמה לצל כמוהו, או שמותר לטלטלו לגמרי.\nו**'התהלה לדוד'** סבר להחמיר דחשיב הבסל\"ה ככשמל\"א. וכן כתב **ערוה\"ש**"}], "pesak": null}, "ner": {"title": "נר", "seif": "סימן רע\"ט", "sugya": null, "ops": [{"subhead": "נר שהיה כבוי מער\"ש"}, {"layer": "mishna", "src": "סוגיה מד · משנה", "srcRef": null, "txt": "**סוגיה מד**\n**במשנה**: מותר לטלטל נר חדש, אבל לא ישן (למרות ששניהם אינם דולקים).", "ref": {"label": "שבת · פרק כירה · מד", "ref": "Shabbat.44a"}}, {"layer": "gemara", "src": "ובגמרא", "srcRef": null, "txt": "**ובגמרא**: מבואר דזו משנת ר' יהודה, וכי נר ישן אסור משום שהוא מוקצה מחמת מיאוס, מאחר וכבר דלק. ונר חדש - מותר. (דאינו הוקצה לשימוש איסור)"}, {"subhead": "נכבה במהלך השבת"}, {"layer": "gemara", "src": "ר' שמעון · ר' יהודה", "srcRef": null, "txt": "ל**ר' שמעון** מותר כל נר שאינו דולק כרגע, גם אם נכבה במהלך השבת; דלדידו אין מיגו דבינה\"ש. ולכן, על אף שדלק בבינה\"ש - מותר.\nאבל ל**ר' יהודה** מוקצה דבינה\"ש אסור. ולדידו רק אם לא דלק בבינה\"ש והוא חדש (שאינו מחמת מיאוס) – מותר."}, {"layer": "shulchan", "src": "להלכה (ש\"י, א', ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.310.1", "txt": "ולהלכה, עפ\"י **מחלוקת רב אחא ורבינא בדף קנז**, נפסק (ש\"י, א',ג'):\nכר' יהודה למיגו דאיתקצאי שאסור.\nכר' שמעון למוקצה מחמת מיאוס."}, {"layer": "note", "src": "סיכום סוגי הנר", "srcRef": null, "txt": "לכן: נר שדלק בבינה\"ש יהיה אסור אפילו אם כבה (אך נראה לקמן עפ\"י המ\"מ דמותר אם התנה)\n        נר ישן מותר למרות שהוא מאיס, משום דקיי\"ל כר' שמעון במוקצה מחמת מיאוס\n           וכן, כל נר שהוא מאוס (ואפילו של נפטא)\n        נר חדש, מותר אפילו לר' יהודה (דהוא כלי שמלאכתו להיתר. דעדיין לא ייחדו לשם הדלקה. וכנראה שהנר המדובר בגמרא אינו נר ממש, שבימינו הוא ופמוטות וודאי אינם כלי ובטח שלא להיתר. אלא שהיה סתם כלי ככל הכלים,והיו נותנים בו שמן ופתילה וכד'. וכ\"כ ערוה\"ש)"}, {"layer": "acharon", "src": "המשנ\"ב · הא\"ר", "srcRef": null, "txt": "ולדעת **המשנ\"ב**, נר כבוי הוא כשמל\"א; ומותר רק לצורך גופו ומקומו\nולדעת **הא\"ר**, רק אם הדליק בו פעם אחת, שאז ייחדו למלאכת איסור. ואם לא – הווי כשמל\"ה"}, {"layer": "acharon", "src": "המג\"א והפמ\"ג", "srcRef": null, "txt": "ו**המג\"א והפמ\"ג** ועוד, סברו שאף אם הוא ישן ונחשב מאוס נחשב כשמל\"א ומותר רק לצורך גו\"מ"}, {"subhead": "נכבה במהלך השבת והתנהו לשימוש"}, {"layer": "rishon", "src": "לרב המגיד והר\"ן", "srcRef": null, "txt": "ו**לרב המגיד והר\"ן**, דבר שיהא מוקצה לבין השמשות, בהתניה מראש אפשר להסתמך על כך שהדבר האסור יהפוך למותר במהלך השבת (אם עשוי לקרות), ולכשיקרה - מותר לטלטלו\n(זאת מתוך הבנה שעניין מיגו דאיתקצא הוא שדבר שהיה מוקצה בבין השמשות נאסר לכל השבת משום שזה הביא את האדם להקצותו מדעתו לגמרי; משום דלא חזי)"}, {"layer": "rishon", "src": "והרשב\"ץ", "srcRef": null, "txt": "ו**הרשב\"ץ** כתב שמיגו דאיתקצאי, הוא רק בדבר שהוא מוקצה מצד עצמו, אבל הנר עצמו הוא רק בסיס לשלהבת"}, {"layer": "rishon", "src": "והאגור", "srcRef": null, "txt": "ו**האגור** סבר דנר דשנכבה במהלך השבת הוא כלי שמלאכתו לאיסור, ומותר לטלטלו לצורך גופו ומקומו", "under": true}, {"layer": "rishon", "src": "מהרא\"ש ור' ירוחם", "srcRef": null, "txt": "אבל מ**הרא\"ש ור' ירוחם**, וודאי משמע שאין הוא כשמל\"א, ובבין השמשות היה אסור לטלטלו אף לצורך גו\"מ, ולכן כך גם לאחר שכבה", "under": true}, {"layer": "shulchan", "src": "השו\"ע ברע\"ט ס' א' (כרמב\"ם)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.279.1", "txt": "**השו\"ע ברע\"ט ס' א'** פוסק כרמב\"ם (שהנר אסור לטלטול גם אחרי שכבה, אם לא התנה. ובכך מכריע כרבי יהודה)"}, {"layer": "shulchan", "src": "ובסעיף ב'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.279.2", "txt": "ו**בסעיף ב**', כתב עפ\"י הרא\"ש ור' ירוחם, שאין הנר נחשב כשמל\"א (ולא כדעת האגור) אלא ממ\"ג"}, {"layer": "shulchan", "src": "אבל בסעיף ד' (כרב המגיד) · הט\"ז", "srcRef": "Shulchan_Arukh,_Orach_Chayim.279.4", "txt": "אבל, **בסעיף ד'** פסק עפ\"י הרב המגיד, שמותר לטלטלו אם היה בדעתו מער\"ש לטלטלו כשייכבה. וכן דעת **הט\"ז**. ומשום דחזי לכיבויי"}, {"layer": "acharon", "src": "והמג\"א", "srcRef": null, "txt": "ו**המג\"א** כתב דהדין הנ\"ל מהני רק בנר, אבל בשאר בסיס לדבר האסור לא מועיל התניה משום שאינו עשוי להיות מותר (רק נר עשוי לכבות)"}, {"subhead": "ע\"י כיכר או תינוק"}, {"layer": "rishon", "src": "תשובות הגאונים · הכל בו · חכמי צרפת", "srcRef": null, "txt": "ב**תשובות הגאונים** כתוב שאין לטלטל המנורה בין לצורך גופה בין לצורך מקומה ואפילו על ידי ככר או תינוק, שלא אמרו ככר או תינוק אלא למת בלבד.\nגם **הכל בו** הסכים לזה.\nו ציין שקצת **חכמי צרפת** התירו בזה אם הונח הכיכר מבעוד יום, אבל הוא דחה דבריהם."}, {"layer": "rishon", "src": "הריב\"ש", "srcRef": null, "txt": "וכן ה**ריב\"ש** בתשובה כתב להתיר אם נתן את הכיכר מבעוד יום, אבל הדגיש שצריך שהלחם יהיה חשוב יותר מן השמן (בסיס לדבר האסור והמותר החשוב יותר)"}, {"layer": "shulchan", "src": "שו\"ע ב-רעט ג' · הט\"ז והמג\"א", "srcRef": "Shulchan_Arukh,_Orach_Chayim.279.3", "txt": "**שו\"ע ב-רעט ג'** אסר כדעת הגאונים. והביא שיש המתירים כדעת הריב\"ש (אם היה מבעוד יום), ושאין לסמוך עליהם. (וכן כתבו **הט\"ז והמג\"א**, דהרי וודאי שהשמן והאש חשוב יותר תמיד)\n\tכלומר, לשו\"ע אסור לטלטל נר דולק אף ע\"י כיכר ואפילו הונחה עליו מבעוד יום"}, {"subhead": "נר שהודלק לחולה בהיתר ונכבה"}, {"layer": "rishon", "src": "הרשב\"א", "srcRef": null, "txt": "**הרשב\"א** כתב שמאחר ובבינה\"ש היה מותר (דהרי היה כבוי בבינה\"ש והודלק בתוך השבת), אינו מוקצה מבינה\"ש ומותר לטלטלו לאחר שכבה. דאין מוקצה לחצי שבת."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אבל אם דלק בבינה\"ש, אפילו שהיה זה בעבור החולה/יולדת שאין שייך להם מוקצה – הוה מוקצה לשאר השבת. שהרי מאחר והיה נר דולק בבינה\"ש, אסור להדליק עוד נר (דחויה)."}, {"layer": "shulchan", "src": "וכ\"כ בשו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.279.4", "txt": "וכ\"כ **בשו\"ע**: נר שהדליקו בשבת לחיה ולחולה וילדה החיה ונתרפא החולה, מותר לטלטלו אם כבה.\nוה\"ה למדליק בשבת בשוגג וכבה, שמותר לטלטלו."}], "pesak": null}, "met": {"title": "מת", "seif": "סימן שי\"א · א׳, ב׳, ה׳", "sugya": null, "ops": [{"subhead": "באותה הרשות"}, {"layer": "gemara", "src": "בגמרא מג · פרק כירה", "srcRef": null, "txt": "**בגמרא מג פרק כירה**\n- אסור לטלטל מת שהוא מוקצה מחמת גופו\n- מותר ע\"י כיכר או תינוק מפני כבוד הבריות\n\nאם אין כיכר או תינוק, מותר בטלטול מן הצד? (כגון ע\"י מיטה) — **מחלוקת רב ושמואל**\nחד אמר, טלטול מן הצד לאו שמיה טלטול, ומותר\nחד אמר, טלטול מן הצד שמיה טלטול, ואסור\n\nובמקרה של שריפה התיר **ר' יהודה בן לקיש** לטלטלו, משום שאדם בהול על מתו, ואם לא יותר לו לטלטל – יכבה את השרפה", "ref": {"label": "שבת · פרק כירה · מג", "ref": "Shabbat.43b"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "הראשונים חלקו אם ריב\"ל מתיר בשריפה טלטול גמור של המת, או רק טלטול מן הצד"}, {"layer": "rishon", "src": "הרי\"ף", "srcRef": null, "txt": "**הרי\"ף** סבר שמה שריב\"ל התיר במקרה של שריפה, הוא רק בטלטול מן הצד", "under": true}, {"layer": "rishon", "src": "רש\"י הרא\"ש והרמב\"ם", "srcRef": null, "txt": "**ורש\"י הרא\"ש והרמב\"ם** סברו שהתיר (כפשט הגמרא) טלטול גמור", "under": true}, {"layer": "note", "src": "סדר עדיפויות", "srcRef": null, "txt": "(ובכל מקרה, אפילו בשריפה עדיף אם אפשר: ע\"י ככר או תינוק ← מן הצד ← טלטול גמור)\n(ולמרות שטלטול מן הצד לצורך המוקצה גם אסור, כאן מדובר בשריפה ואדם בהול וכו')"}, {"layer": "shulchan", "src": "ובשו\"ע (כרמב\"ם והרא\"ש)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.311.1", "txt": "**ובשו\"ע** נקט לפי הרמב\"ם והרא\"ש:\nמת בשריפה – אם יש לו כיכר או תינוק, מטלטל על ידיהם\nאם אין לו, יטלטלו מן הצד ע\"י מיטה וכד'\nאם אין לו, יטלטלו טלטול גמור\nמת בחמה – יכול ע\"י כיכר או תינוק. ואם אין לו – לא יטלטלו מן הצד או טלטול גמור\n(משום דזה לא מקרה שריפה ולא מתירים. ורק טלטול ע\"י תינוק או ככר התירו מפני כבוד הבריות. אבל כל מה שהתירו מן הצד או טלטול גמור - הוא רק כדי שלא יכבה את השריפה)"}, {"layer": "note", "src": "סיכום", "srcRef": null, "txt": "אז בעצם אנחנו מעדיפים לטלטל בהיתר, ע\"י הנחת דבר מותר על המוקצה. כאן, הותר לטלטל מת ע\"י דבר היתר (כל דבר היתר) מפני כבוד הבריות. אבל לא הותר טלטול מן הצד או טלטול גמור אלא רק בשריפה, מפני שאדם בהול על מתו יכבה אותה. וטלטול מן הצד מותר רק לצורך דבר המותר."}, {"subhead": "מרשות לרשות"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "כל מה שדנו לעיל, הוא בטלטול המת באותה הרשות. ובסעיף ב' התייחס השו\"ע להוצאתו לכרמלית או רשות הרבים.\nובוודאי שהדין קל יותר בטלטול באותה הרשות. אלא שלמרות זאת, הרמב\"ן סבר דאין מוציאין ע\"י ככר או תינוק. אבל לא בגלל שהדין קל יותר בהוצאת המת מרשות לרשות. אלא בגלל שרצו למעט בהוצאה (של התינוק או הככר)."}, {"layer": "gemara", "src": "בגמרא · רב נחמן בר יצחק", "srcRef": null, "txt": "**בגמרא** מסופר על מת שהיה מוטל ברשות היחיד, **ורב נחמן בר יצחק** התיר לטלטלו לכרמלית, מפני כבוד הבריות, אשר דוחה את איסור ההוצאה (מדרבנן)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "**הראשונים** חלקו למי כבוד הבריות כאן. למת, או לנמצאים בבית?"}, {"layer": "rishon", "src": "רש\"י טור", "srcRef": null, "txt": "**רש\"י טור**: כבוד המת", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "**רמב\"ם**: כבודם של האנשים", "under": true}, {"layer": "note", "src": "נפק\"מ", "srcRef": null, "txt": "והנפק\"מ, דלדעת **הרמב\"ם** מותר להוציאו רק כשהוא מסריח ומתבזים ממנו הבריות. ולשיטת **רש\"י והטור**, מותר אף אם הוא פשוט מוטל בביזיון בחמה וכד'."}, {"layer": "shulchan", "src": "והשו\"ע (כרמב\"ם)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.311.2", "txt": "**והשו\"ע** נקט בזה כדעת הרמב\"ם, וכתב שמת המסריח בבית והחיים מתבזים בו, מותר להוציאו לכרמלית. וכן, שאם יכולים לצאת מהמקום ואין חייב להוציאו – אין לטלטלו (דסבר כרמב\"ם)"}, {"layer": "rama", "src": "והרמ\"א (יש אומרים כרש\"י)", "srcRef": null, "txt": "**והרמ\"א** הביא שיש אומרים כדעת רש\"י ('אפילו עוד לא הסריח מוציאים')"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "האם גם כאן מוציאים ע\"י ככר או תינוק?"}, {"layer": "rishon", "src": "רש\"י וטור", "srcRef": null, "txt": "**רש\"י וטור**: ע\"י כיכר/תינוק. (דעדיף שיטלטלו אגב היתר)", "under": true}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "**רמב\"ן**: ללא ככר/תינוק, כדי למעט בהוצאה (רק הוצאת המת הותרה מפני כבוד הבריות)", "under": true}, {"layer": "rishon", "src": "והרמב\"ן (לרה\"ר)", "srcRef": null, "txt": "**והרמב\"ן** סבר גם שאפשר להוציא את המת אף לרשות הרבים, מכיוון שהוצאה היא משאצ\"ל"}, {"layer": "shulchan", "src": "והשו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.311.2", "txt": "**והשו\"ע** הביא את שיטת רש\"י-טור תחילה, ולאחמ\"כ הביא את דעת הרמב\"ן שאין לטלטל ע\"י כיכר/תינוק. וכתב גם שיש מי סבר (רמב\"ן) שאפשר לטלטלו אף לרה\"ר"}, {"layer": "gemara", "src": "בגמרא · פ' נוטל · ר' יוחנן / רב אשי", "srcRef": null, "txt": "**בגמרא (פ' נוטל)**\nהתיר **ר' יוחנן** לטלטל כל מוקצה בכך שיניחו כיכר או תינוק\nו**רב אשי** סבר דלא אמרינן ככר או תינוק אלא למת בלבד", "ref": {"label": "שבת · פרק נוטל · קמב", "ref": "Shabbat.142b"}}, {"layer": "note", "src": "הערה — כשמל\"א ע\"י דבר היתר", "srcRef": null, "txt": "[אלא שנראה שכלי שמלאכתו לאיסור, מותר יהיה לטלטלו (אפילו מחמה לצל) ע\"י דבר היתר בו (מהא דאמר אביי לרבה, שמטלטלין מדוכה אגב השום שבה; דאז מוכח עליו שימוש היתר)]"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מפה: חלוקת הסימנים ועבודת הב\"י"}, {"type": "group", "title": "יסודות", "spans": "ש\"ח–שי\"א", "children": ["yesodot_1", "yesodot_2", "yesodot_3", "yesodot_4"]}, {"type": "group", "title": "מוקצה מחמת חסרון כיס", "spans": "ש\"ח · א׳", "children": ["memhak_1", "memhak_2", "memhak_3", "memhak_4"]}, {"type": "group", "title": "כלי שמלאכתו לאיסור", "spans": "ש\"ח · ג׳", "children": ["kshmela_1", "kshmela_2", "kshmela_3", "kshmela_4", "kshmela_5", "kshmela_6"]}, {"type": "group", "title": "מוקצה מחמת גופו", "spans": "ש\"ח", "children": ["gufo_1", "gufo_2", "gufo_3", "gufo_4", "gufo_5", "gufo_6", "gufo_7"]}, {"type": "group", "title": "מוקצה מחמת מיאוס", "spans": "ש\"י · ש\"ח", "children": ["mius_1", "mius_2"]}, {"type": "sec", "id": "ner"}, {"type": "group", "title": "בסיס לדבר האסור", "spans": "ש\"ט · ש\"י", "children": ["basis_1", "basis_2"]}, {"type": "sec", "id": "met"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"מוקצה מחמת חסרון כיס": " — כלי שאדם מקפיד עליו (מחמת יוקרו או חשיבותו) שלא לעשות בו שימוש שאינו ייעודו; אסור בטלטול לגמרי, אף לצורך גופו ומקומו.", "כלי שמלאכתו לאיסור": " — כלי שעיקר שימושו אסור בשבת; מותר לטלטלו לצורך גופו ומקומו בלבד.", "כלי שמלאכתו להיתר": " — כלי שעיקר שימושו מותר בשבת; מותר לטלטלו בכל אופן (אף מחמה לצל).", "מוקצה מחמת גופו": " — דבר שאינו כלי ואינו ראוי לאכילה, ואין לו שימוש (אבנים, עצים); אסור בטלטול אף לצורך גופו ומקומו.", "מוקצה מחמת מיאוס": " — דבר מאוס; קיי\"ל כר' שמעון שמותר לטלטלו (אך דבר המאוס הרבה כמוקצה מחמת גופו).", "בסיס לדבר האסור": " — כלי היתר שהונח עליו מוקצה מדעת בבין השמשות; נאסר בטלטול לכל השבת מדין מיגו דאיתקצאי.", "גרף של רעי": " — כלי (או הדבר עצמו) המאוס הרבה, שהותר לטלטלו מפני כבוד הבריות במקום שיש בו אנשים.", "מיגו דאיתקצאי": " — הואיל והוקצה בבין השמשות, הוקצה לכל היום; ולכן הבסיס נאסר גם לאחר שהמוקצה ירד ממנו.", "טלטול מן הצד": " — הזזת המוקצה שלא ע\"י נגיעת ידיו ישירות (כגון ע\"י ניעור/הטיה); מותר רק לצורך דבר המותר.", "טלטול בגופו": " — הזזת המוקצה באמצעות גופו (לא בידיו), כגון קש שעל המטה מנענעו בגופו; מותר."}, "subject": "שבת", "id": "muktzeh"}]}</script>

const NAME_RE=new RegExp('(?<![א-ת])[ובכלמשה]{0,2}(?:'+
  NAMES.slice().sort((a,b)=>b.length-a.length).map(qc).join('|')+')(?![א-ת])','g');

const BY_CTX=/(?:כלי|הכלי|בכלי|שהכלי|כשהכלי|לכלי|אינו|שאינו|שאינה|אינה|בן|בבן|לא)\s*$/;
function boldNames(t){return t.replace(NAME_RE,(m,offset,str)=>{
  if(/^[ובכלמשה]{0,2}ב(?:["״]|&quot;)י$/.test(m) && BY_CTX.test(str.slice(0,offset))) return m; // בן-יומו: leave plain

const ABBR_RE=new RegExp('(?<![א-ת])([והבכלמשד]{0,2})('+Object.keys(ABBR).sort((a,b)=>b.length-a.length).map(qc).join('|')+')(?![א-ת])','g');

function abbrify(s){return s.replace(ABBR_RE,(m,pre,core)=>{const k=core.replace(/&quot;/g,'״').replace(/"/g,'״');return ABBR[k]?'<span class="abbr" data-full="'+ABBR[k]+'">'+m+'</span>':m;});}

function glossify(t){
  for(const term of Object.keys(GLOSS).sort((a,b)=>b.length-a.length)){

function rich(raw){
  raw=String(raw).replace(/\*\*([^*]+)\*\*/g,"\x01$1\x02");   // **bold** -> bold (author emphasis)
  raw=raw.replace(/~~([^~]+)~~/g,"\x0b$1\x0c");               // ~~dim~~ -> de-emphasised (author's grey text)
  raw=raw.replace(/\\note\{([^}]*)\}/g,(m,t)=>"\x11"+t+"\x12");            // text-only footnote (author's own note)
  raw=raw.replace(/\\cite\{([^}]*)\}\{([^}]*)\}/g,(m,l,u)=>"\x0e"+l+"\x0f"+u+"\x10"); // footnote
  let t=glossify(boldNames(raw));

  t=t.replace(/\x03([^\x04]+)\x04/g,(m,term)=>'<span class="term" data-t="'+term+'">'+term+'</span>');

}

// flowing reference text: preserves the author's spacing/indentation (pre-wrap),
// supports **bold**, auto-bolds source names, and colour-codes the two anchor times.
function flowRich(raw){
  raw=String(raw).replace(/\*\*([^*]+)\*\*/g,"\x01$1\x02");   // **bold**
  raw=raw.replace(/(עמוד השחר|עלות השחר)/g,"\x05$1\x06");     // amber

  t=t.replace(/\x05/g,'<span class="t-alot">').replace(/\x06/g,'</span>');
  t=t.replace(/\x07/g,'<span class="t-hanetz">').replace(/\x08/g,'</span>');
  t=t.replace(/\x03([^\x04]+)\x04/g,(m,term)=>'<span class="term" data-t="'+term+'">'+term+'</span>');

    return '<button class="pg-cell '+cls+'" data-goto="'+sid+'">'+(cls==='pg-prev'?arrow+label:label+arrow)+'</button>';
  };
  return '<nav class="pager">'+cell(prev,prevRole||'הסעיף הקודם','pg-prev')+cell(next,nextRole||'הסעיף הבא','pg-next')+'</nav>';
}
function pagerHTML(id){
  const i=SECORDER.indexOf(id); if(i<0) return '';
  return pagerCells(i>0?SECORDER[i-1]:null, i<SECORDER.length-1?SECORDER[i+1]:null);
}
function introPagerHTML(){ return SECORDER.length?pagerCells(null,SECORDER[0],null,'הסעיף הראשון'):''; }

function sectionHTML(id){
  const s=SECTIONS[id];
  let h='<details class="intro-strip"><summary>מבוא לנושא</summary>'+introBodyHTML()+'</details>';
  h+='<div class="sec-head">'+(s.seif?'<span class="sec-kicker">'+esc(s.seif)+'</span>':'')+
     '<h2 class="sec-title">'+esc(s.title)+'</h2></div>';
  if(s.intro) h+='<div class="sec-lead">'+richB(s.intro)+'</div>';
  if(s.flow) h+=flowHTML(s.flow);
  if(s.summary) h+='<div class="summary-card"><div class="sum-lbl">◆ תקציר · התפתחות ההלכה</div><div class="sum-txt">'+richB(s.summary)+'</div></div>';
  if(s.sugya) h+='<div class="sugya"><span class="pin">◆ סוגיה</span> '+srclink(s.sugya.label,s.sugya.url)+'</div>';
  h+=s.ops.map(opHTML).join('');
  if(s.pesak) h+='<div class="pesak"><div class="plbl"><span class="dia">◆</span> הלכה למעשה</div><div class="txt">'+rich(s.pesak)+'</div></div>';
  return h;
}

const srcBox=document.getElementById('src');
function apiUrl(u){return u.replace('https://www.sefaria.org/','https://www.sefaria.org/api/texts/')+'?context=0&commentary=0&pad=0';}
function strip(x){return String(x).replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ');}
async function openSrc(ref,url,el){
  srcBox.classList.add('on');
  srcBox.innerHTML='<div class="sref">'+esc(ref)+'</div><div class="stext">טוען מספריא<span class="spin"></span></div>'+
    '<div class="srow"><a class="open" href="'+url+'" target="_blank" rel="noopener">פתח בספריא ↗</a><button class="close">סגור</button></div>';
  const r=el.getBoundingClientRect();
  srcBox.style.top=Math.min(r.bottom+8,window.innerHeight-260)+'px';
  srcBox.style.left=Math.max(10,Math.min(r.left-140,window.innerWidth-350))+'px';
  srcBox.querySelector('.close').onclick=()=>srcBox.classList.remove('on');
  const body=srcBox.querySelector('.stext');
  if(LOCAL_TEXT[url]){body.textContent=LOCAL_TEXT[url];return;}
  try{
    const ctl=new AbortController(); const to=setTimeout(()=>ctl.abort(),4500);
    const res=await fetch(apiUrl(url),{signal:ctl.signal}); clearTimeout(to);
    const d=await res.json();
    let he=d.he!==undefined?d.he:(d.text);
    if(Array.isArray(he)) he=he.flat(Infinity).join(' ');
    he=strip(he||'').trim();
    if(he){ body.textContent = he.length>600? he.slice(0,600)+'…' : he; }
    else body.textContent='(לחצו "פתח בספריא" לצפייה במקור)';
  }catch(err){
    body.innerHTML='התצוגה המוטמעת אינה זמינה בסביבה זו — לחצו "פתח בספריא". <span style="color:var(--ink-faint)">(באתר עצמאי, ה־Linker של ספריא מציג את הטקסט בבועה אוטומטית.)</span>';
  }
}

// ---------- ask the summary ----------
// SECLIST is derived per topic in deriveTopic
function askHTML(){
  return '<div class="ask"><h3>שאלו את הסיכום</h3>'+
    '<p class="hint">המענה מבוסס על הסיכום, בסגנון תשובת מבחן — פורש את השיטות, מציין מקורות, ומפנה לסעיפים (לחיצים). אינו פסק הלכה למעשה.</p>'+
    '<div class="chips">'+
      '<span class="chip">סכם את עיקר הדין</span>'+
      '<span class="chip">מה נחלקו בו הראשונים?</span>'+
      '<span class="chip">מה ההלכה למעשה?</span>'+
    '</div>'+
    '<div class="row"><input id="q" placeholder="'+('כתבו שאלה על '+esc(CUR.topic.title)+'…')+'"><button class="send" id="ask-btn">שאל</button></div>'+
    '<div class="answer" id="ans"></div></div>';
}
function fullText(){
  let t="נושא: "+CUR.topic.title+".\n\nמבוא: "+INTRO.body+"\n\n";
  for(const id in SECTIONS){const s=SECTIONS[id];
    t+="== "+s.title+" ("+s.seif+") ==\n";
    if(s.intro)t+="מבוא: "+s.intro+"\n";
    if(s.flow)for(const b of s.flow)t+=(b.head?b.head+": ":"")+b.body+"\n";
    if(s.summary)t+="תקציר ההתפתחות: "+s.summary+"\n";
    for(const o of s.ops){ if(o.subhead){t+="— "+o.subhead+" —\n";continue;} if(o.L==='lead'){t+=o.txt+"\n";continue;} t+="["+(LAY[o.L]||'')+"] "+o.src+": "+o.txt+"\n"; }
    if(s.pesak)t+="הלכה למעשה: "+s.pesak+"\n"; t+="\n";}
  return t;
}
function linkifyRefs(text){
  let h=esc(text);
  h=h.replace(/סעיף\s*([א-י])[׳']/g,(m,l)=>SEIF2ID[l]?'<span class="secref" data-seif="'+l+'">סעיף '+l+'׳</span>':m);
  return h.replace(/\n/g,'<br>');
}
function wireAsk(){
  const btn=document.getElementById('ask-btn'),q=document.getElementById('q'),ans=document.getElementById('ans');
  if(!btn)return;
  main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{q.value=c.textContent;go();});
  btn.onclick=go; q.onkeydown=e=>{if(e.key==='Enter')go();};
  async function go(){
    const question=q.value.trim(); if(!question)return;
    btn.disabled=true; ans.classList.add('on'); ans.innerHTML='חושב<span class="spin"></span>';
    const sys="אתה עוזר לימוד לקראת מבחני ההלכה של הרבנות הראשית. לפניך סיכום על '"+CUR.topic.title+"'. ענה על סמך הסיכום, אך פעל כמומחה שמבין את החומר:\n"+
      "1. אם השאלה נוגעת לעיקרון או מקרה שנידון בסיכום — אף בניסוח שונה — יישם אותו והפנה לסעיף הרלוונטי.\n"+
      "2. הצג בקצרה את מהלך הדיון: השיטות (משנה, גמרא, ראשונים, שו״ע, רמ״א, אחרונים, פוסקי זמננו) ושמות בעליהן, בסגנון תשובת מבחן.\n"+
      "3. הפנה לסעיפים הרלוונטיים בכתיב מדויק כמו 'סעיף ה׳', כדי שהלומד יוכל לעבור אליהם.\n"+
      "4. אל תפסוק הלכה למעשה לשואל; הצג את הדיון והשיקולים. במקרים של סכנה/רפואה סייג שהדבר תלוי בהערכה רפואית ובשאלת רב.\n"+
      "5. רק אם אין בסיכום שום עיגון רלוונטי — אמור 'לא מופיע בסיכום'.\n"+
      "כתוב בעברית ברורה ותמציתית.\n\nהסעיפים בסיכום: "+SECLIST+".\n\n=== הסיכום ===\n"+fullText();
    try{
      const r=await fetch(API_BASE+"/api/ask",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:question}]})});
      const d=await r.json();
      const text=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      ans.innerHTML=linkifyRefs(text||"לא התקבלה תשובה.")+'<div class="note">נוצר על ידי Gemini, מעוגן בסיכום זה בלבד · אינו פסק הלכה · לחצו על "סעיף X׳" למעבר</div>';
    }catch(err){
      ans.innerHTML='שגיאה בפנייה למודל. ודאו שהגדרתם את כתובת ה-Vercel ב-API_BASE, ושהמפתח GEMINI_API_KEY מוגדר ב-Vercel.';
    }finally{btn.disabled=false;}
  }
}

// ---------- flashcards ----------
let FC=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDeck(scope,types){
  const deck=[];
  const ids=scope==='all'?Object.keys(SECTIONS):[scope];
  for(const id of ids){const s=SECTIONS[id];
    if(types.has('deot')) for(const o of s.ops){ if(o.subhead||o.L==='lead') continue; deck.push({q:s.title+' — '+o.src,a:rich(o.txt),sec:id,tag:'דעה'}); }
    if(types.has('pesak')&&s.pesak) deck.push({q:s.title+' — הלכה למעשה?',a:rich(s.pesak),sec:id,tag:'הלכה למעשה'});
  }
  if(types.has('sikum')) for(const id of ids){const s=SECTIONS[id]; if(s.summary) deck.push({q:s.title+' — תקציר ההתפתחות',a:rich(s.summary),sec:id,tag:'תקציר'});}
  if(types.has('musagim')&&scope==='all') for(const term in GLOSS) deck.push({q:'מהו: '+term+'?',a:esc(GLOSS[term]),tag:'מושג'});
  return shuffle(deck);
}
function showCards(){
  setActive('__cards');
  const opts=Object.keys(SECTIONS).map(id=>'<option value="'+id+'">'+(SECTIONS[id].seif?SECTIONS[id].seif+' · ':'')+SECTIONS[id].title+'</option>').join('');
  main.innerHTML=
    '<div class="sec-head"><span class="sec-kicker">תרגול</span><h2 class="sec-title">כרטיסיות</h2></div>'+
    '<p class="fc-sub">חזרה פעילה על החומר. בחרו מקבץ, חשפו את התשובה (לחיצה או מקש רווח), וסמנו אם ידעתם. מה שלא ידעתם חוזר בסוף.</p>'+
    '<div class="fc-filters">'+
      '<label>מקבץ:<select id="fc-scope"><option value="all">כל הנושא</option>'+opts+'</select></label>'+
      '<div class="fc-types">'+
        '<button class="fc-t on" data-t="deot">דעות פוסקים</button>'+
        '<button class="fc-t on" data-t="pesak">הלכה למעשה</button>'+
        '<button class="fc-t on" data-t="sikum">תקצירים</button>'+
        '<button class="fc-t on" data-t="musagim">מושגים</button>'+
      '</div>'+
      '<button class="fc-start" id="fc-start">בנה מקבץ ▸</button>'+
    '</div><div id="fc-stage"></div>';
  main.querySelectorAll('.fc-t').forEach(b=>b.onclick=()=>b.classList.toggle('on'));
  document.getElementById('fc-start').onclick=startDeck;
  main.scrollIntoView({behavior:'smooth',block:'start'});
}
function startDeck(){
  const scope=document.getElementById('fc-scope').value;
  const types=new Set([...main.querySelectorAll('.fc-t.on')].map(b=>b.dataset.t));
  const deck=buildDeck(scope,types);
  const st=document.getElementById('fc-stage');
  if(!deck.length){st.innerHTML='<div class="fc-empty">לא נבחרו כרטיסים — סמנו לפחות סוג אחד.</div>';return;}
  FC={deck,idx:0,known:0,missed:[],flipped:false,total:deck.length};
  renderCard();
}
function renderCard(){
  const st=document.getElementById('fc-stage'); if(!st)return;
  if(FC.idx>=FC.deck.length){
    st.innerHTML='<div class="fc-end"><div class="fc-score">ידעת '+FC.known+' מתוך '+FC.total+'</div>'+
      (FC.missed.length?'<button class="fc-again" id="fc-review">חזור על '+FC.missed.length+' שפספסת</button>':'<div class="fc-perfect">כל הכבוד! ✦</div>')+
      '<button class="fc-restart" id="fc-restart">מקבץ חדש</button></div>';
    if(FC.missed.length)document.getElementById('fc-review').onclick=()=>{FC={deck:shuffle(FC.missed.slice()),idx:0,known:0,missed:[],flipped:false,total:FC.missed.length};renderCard();};
    document.getElementById('fc-restart').onclick=showCards;
    return;
  }
  const c=FC.deck[FC.idx];
  const jump=c.sec?'<span class="fc-jump" data-sec="'+c.sec+'">→ עבור לסעיף המלא</span>':'';
  st.innerHTML=
    '<div class="fc-progress"><div class="fc-bar"><i style="width:'+Math.round(FC.idx/FC.total*100)+'%"></i></div>'+
      '<span>כרטיס '+(FC.idx+1)+' / '+FC.total+' · ידעת '+FC.known+'</span></div>'+
    '<div class="fc-card'+(FC.flipped?' flip':'')+'" id="fc-card"><div class="fc-tag">'+c.tag+'</div>'+
      '<div class="fc-face fc-q">'+esc(c.q)+'</div>'+
      (FC.flipped?'<div class="fc-face fc-a">'+c.a+' '+jump+'</div>':'<div class="fc-hint">לחצו לחשיפת התשובה</div>')+'</div>'+
    (FC.flipped?
      '<div class="fc-controls"><button class="fc-no" id="fc-no">לא ידעתי</button><button class="fc-yes" id="fc-yes">ידעתי</button></div>':
      '<div class="fc-controls"><button class="fc-flip" id="fc-flip">הצג תשובה</button></div>');
  const card=document.getElementById('fc-card');
  const doFlip=()=>{FC.flipped=true;renderCard();};
  card.onclick=e=>{if(e.target.closest('.fc-jump'))return;if(!FC.flipped)doFlip();};
  const fb=document.getElementById('fc-flip'); if(fb)fb.onclick=doFlip;
  if(FC.flipped){
    document.getElementById('fc-yes').onclick=()=>{FC.known++;FC.idx++;FC.flipped=false;renderCard();};
    document.getElementById('fc-no').onclick=()=>{FC.missed.push(FC.deck[FC.idx]);FC.idx++;FC.flipped=false;renderCard();};
    const j=st.querySelector('.fc-jump'); if(j)j.onclick=()=>showSection(j.dataset.sec);
  }
}
document.addEventListener('keydown',e=>{
  if(!FC||!document.getElementById('fc-card'))return;
  if(e.code==='Space'&&!FC.flipped){e.preventDefault();FC.flipped=true;renderCard();}
});

function _simanNum(t){return parseInt((t.topic.siman||'').split('.').pop())||0;}
function _simanLabel(t){
  const eb=(t.topic.eyebrow||'').split('·').map(s=>s.trim());
  let sim=eb.length?eb[eb.length-1]:'';
  sim=sim.replace(/^סימנים\s+/,'סי׳ ').replace(/^סימן\s+/,'סי׳ ').replace("(סע' ","(");
  return sim;
}
function buildTopicbar(){
  const bar=document.getElementById('topicbar'); if(!bar||!CUR) return;
  const subj=CUR.subject||'כללי';
  const sibs=SITE.topics.filter(t=>(t.subject||'כללי')===subj).sort((a,b)=>_simanNum(a)-_simanNum(b));
  const idx=sibs.findIndex(t=>t.id===CUR.id);
  const cur=sibs[idx]||CUR;
  // subjects in home order (first appearance)
  const subjOrder=[]; SITE.topics.forEach(t=>{const s=t.subject||'כללי'; if(!subjOrder.includes(s))subjOrder.push(s);});
  const subjItems=subjOrder.map(s=>'<button class="tb-subj-item'+(s===subj?' cur':'')+'" data-gotosubject="'+esc(s)+'">'+esc(s)+'</button>').join('');
  const curLbl='<span class="tb-sim">'+esc(_simanLabel(cur))+'</span><span class="tb-ttl">'+esc(cur.topic.title)+'</span>';
  const items=sibs.map(t=>'<button class="tb-dd-item'+(t.id===CUR.id?' cur':'')+'" data-gototopic="'+t.id+'">'+
      '<span class="tb-sim">'+esc(_simanLabel(t))+'</span><span class="tb-ttl">'+esc(t.topic.title)+'</span></button>').join('');
  bar.innerHTML='<button class="tb-collapse" title="הסתרה/הצגה" aria-label="הסתרה/הצגה">'+(TBCOLLAPSED?'▾':'▴')+'</button>'+
    '<div class="tb-subjdd">'+
      '<button class="tb-subj" id="tb-subjbtn" title="החלפת מקצוע">'+esc(subj)+'<span class="tb-subj-caret">▾</span></button>'+
      '<div class="tb-subj-panel" id="tb-subjpanel" hidden>'+subjItems+'</div>'+
    '</div>'+
    '<span class="tb-mini">'+esc(cur.topic.title)+'</span>'+
    '<div class="tb-topic">'+
      '<div class="tb-dd">'+
        '<button class="tb-dd-btn" id="tb-ddbtn" aria-haspopup="listbox">'+curLbl+'<span class="tb-dd-caret">▾</span></button>'+
        '<div class="tb-dd-panel" id="tb-ddpanel" hidden>'+items+'</div>'+
      '</div>'+
    '</div><div class="tb-sec" id="tb-sec"></div>';
  bar.classList.toggle('tb-collapsed',TBCOLLAPSED);
  bar.style.display='flex';
}
function updateTopicbarSection(id){
  const host=document.getElementById('tb-sec'); if(!host) return;
  const i=SECORDER.indexOf(id), prev=i>0?SECORDER[i-1]:null, next=i<SECORDER.length-1?SECORDER[i+1]:null;
  const cell=(sid,cls,arrow)=>{ if(!sid) return '<span class="tbs-cell tbs-empty"></span>';
    const s=SECTIONS[sid], seif=(s.seif||'').replace('סעיפים ','').replace('סעיף ','');
    const lbl='<span class="tbs-name">'+esc(s.title)+(seif?' · '+seif:'')+'</span>', ar='<span class="tbs-arrow">'+arrow+'</span>';
    return '<button class="tbs-cell '+cls+'" data-goto="'+sid+'">'+(cls==='tbs-prev'?ar+lbl:lbl+ar)+'</button>'; };
  host.innerHTML=cell(prev,'tbs-prev','›')+cell(next,'tbs-next','‹');
}
function openTopic(id){
  const D=SITE.topics.find(t=>t.id===id)||SITE.topics[0];
  deriveTopic(D);
  document.querySelector('.grid').classList.remove('home');
  document.getElementById('hbrow').textContent=D.topic.eyebrow||'';
  document.getElementById('htitle').textContent=D.topic.title;
  document.title=D.topic.title+' · '+(SITE.title||'סיכומי הלכה');
  document.getElementById('home-link').style.display=SITE.topics.length>1?'inline-block':'none';
  buildNav(); showIntro(); buildTopicbar();
}
function showHome(){
  document.querySelector('.grid').classList.add('home');
  tree.innerHTML='';
  document.getElementById('home-link').style.display='none';
  {const _tb=document.getElementById('topicbar'); if(_tb)_tb.style.display='none';}
  document.getElementById('hbrow').textContent=SITE.subtitle||'אוסף אינטראקטיבי';
  document.getElementById('htitle').textContent=SITE.title||'סיכומי הלכה';
  document.title=SITE.title||'סיכומי הלכה';
  // group topics by exam subject (מקצוע), preserving order
  const groups=[],byId={};
  SITE.topics.forEach(t=>{const s=t.subject||'כללי'; if(!byId[s]){byId[s]={subject:s,topics:[]};groups.push(byId[s]);} byId[s].topics.push(t);});
  const simanNum=t=>parseInt((t.topic.siman||'').split('.').pop())||0;
  groups.forEach(g=>g.topics.sort((a,b)=>simanNum(a)-simanNum(b)));
  const card=t=>{const n=Object.keys(t.sections).length; const eb=(t.topic.eyebrow||'').split('·').slice(-1)[0].trim();
    return '<a class="topic-card" data-topic="'+t.id+'"><div class="tc-eyebrow">'+esc(eb)+'</div>'+
      '<div class="tc-title">'+esc(t.topic.title)+'</div><div class="tc-meta">'+n+' יחידות</div></a>';};
  main.innerHTML='<div class="subjects">'+groups.map(g=>
    '<div class="subject-group collapsed">'+
      '<button class="subject-head"><span class="sh-caret">▾</span><span class="sh-title">'+esc(g.subject)+'</span><span class="sh-count">'+g.topics.length+' נושאים</span></button>'+
      '<div class="subject-topics">'+g.topics.map(card).join('')+'</div>'+
    '</div>').join('')+'</div>';
  main.querySelectorAll('.topic-card').forEach(c=>c.onclick=()=>openTopic(c.dataset.topic));
  main.querySelectorAll('.subject-head').forEach(b=>b.onclick=()=>b.closest('.subject-group').classList.toggle('collapsed'));
}
document.getElementById('home-link').onclick=e=>{e.preventDefault();showHome();};
if(SITE.topics.length===1){openTopic(SITE.topics[0].id);}else{showHome();}
</script>
