קורקבן אמנם מסתפקים בהשוואה והתאמה ע\"י מראה, אך בכבש ובשאר דברים צריך גם צורה וגם מראה", "under": true}], "pesak": null}, "min-ikar": {"title": "דבר שבמניין (בגלל חשיבותו)", "seif": "סעיף א׳", "sugya": null, "intro": "ראינו בסימן ק' כי אחד מן המושגים המרכזיים שמגדירים את חה\"ל הוא 'דבר שבמניין'. כך, לפי הסוגיה בחולין דבר שבמניין הווי חה\"ל, בעוד בסוגיה בע\"ז רק דבר שהוא גם דבר שבמניין וגם איסורו איסור הנאה חשיב חה\"ל. ולהלכה רוב הראשונים (מלבד הרי\"ף) והשו\"ע הסכימו כי גם דברים שהם רק במניין חשובים הם, והווי חה\"ל בפני אורחים. אם כן מה קורה בסעיפים הללו? האם אנו באים להגדיר את דבר שבמניין באופן נפרד לחה\"ל?", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "הרא\"ש תולה את עיקר החשיבות של דבר במושג זה, דהיינו, בדברים שדרכם להמנות (עפ\"י ר' מאיר לקמן), וכי לפיכך נמדוד אם חתיכה ראויה להתכבד בפני אורחים.\n\nאך נראה ששאר הראשונים שהשו\"ע מאמץ להלכה ב ק\"א, ג' לא רואים כך את הדברים, ומבחינתם יש לבחון לא רק את עניין הספירה והעצמאיות של החתיכה, כי אם גם לשאול 'האם הדבר באמת ראוי להתכבד בפני אורחים? האם אגיש את החתיכה לאורח כמו שהיא עכשיו?'.\n\nאולם כאן, השו\"ע מייצר לנו תת-קטגוריה נוספת לדברים שאינם בטלים: דבר שדרכו לימנות בגלל חשיבותו. הוא מבהיר לנו כי העניין הוא החשיבות, ולא כל דבר שבמניין (כחכמים, ולא כר' מאיר ולא כהרא\"ש). ועל אף שאין זה כהרא\"ש, זה בוודאי מתקרב לשיטתו."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אך הרמ\"א פוסק כאן כדעת ר' יוחנן והפוסקים הסוברים כמוהו (כל דבר שמונים אותו תמיד)\nהט\"ז, הש\"ך ומהרש\"ל אף סוברים להחמיר יותר כדעת הראשונים הסוברים כר\"ל (דבר שמונים לעיתים)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "זו הרחבה לדברים שאינם בטלים, ונכנסים לקטגוריה זו דברים נוספים, שאינם נכנסים לקטגוריית חה\"ל. כך למשל הטור-שו\"ע מביאים כדוגמא בעל-חיים, אשר מוכח בזבחים שהם חשובים ולא בטלים: \nלפני שחיטתו חשיב דבר חשוב שבמניין, אך לא חה\"ל (שהרי הוא שלם וכו'), ולאחר שחיטתו אין בו חשיבות בע\"ח, אך דווקא יכול להיות חה\"ל (תלוי לדעת מי)."}, {"layer": "mishna", "src": "משנה ערלה (פ\"ג, ו'-ח')", "srcRef": null, "txt": "מחלוקת ר' מאיר וחכמים לגבי חבילי תלתן. \nר' מאיר – את שדרכו למנות מקדש  \nחכמים – בטלים. ולדעתם רק שש דברים נחשבים חשובים (אגוזי פרך, רמוני בדן וכו')\nר' עקיבא – מוסיף לחם של בעל הבית", "ref": {"label": "משנה ערלה · פרק ג׳ (ו׳-ח׳)", "ref": "Mishnah_Orlah.3.6"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "כלומר, לפי ר' מאיר נגיד שכל שדרכו למנות אוסר אפילו באלף"}, {"layer": "note", "src": "הבנת פניני הלכה והב\"י", "srcRef": null, "txt": "פניני הלכה מבין שההבדל בין חכמים לר' מאיר הוא שלחכמים הרשימה היא גם דברים שבמניין, אבל שהסיבה שמוכרים אותם במניין היא בגלל חשיבותם. אבל דברים שרגילים למוכרם במניין לצורך חישוב מחירם ולא מפני חשיבותם – לא נחשבים. כ\"כ בערוה\"ש.\n\nובב\"י באמת כתב שאין הרשימה באה להוציא את כל הדברים, אלא להדגים מה הווי חשוב+במניין, ולהוציא את דברי ר' מאיר, שהם רק במניין. וכן משמע בדעת הרמב\"ם לקמן, וכן בערוה\"ש", "expandable": true}, {"layer": "gemara", "src": "גמרא (ביצה · פ' קמא)", "srcRef": null, "txt": "ר' יוחנן וריש לקיש חולקים בדעת ר' מאיר, מה פירוש 'שדרכו למנות'\nר' יוחנן: דברים שתמיד סופרים אותם\nריש לקיש: אפילו דברים שרק לפעמים סופרים אותם (דוגמתי: תפוחים. על אף שבד\"כ במשקל,\n \t\t\t\t\t\tלפעמים פשוט רוצים לקנות מס' מסויים) ", "ref": {"label": "ביצה · ג ע\"ב", "ref": "Beitzah.3b"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "כדעת מי במשנה פוסקים?"}, {"layer": "rishon", "src": "ר\"י, רי\"ו, סמ\"ג", "srcRef": null, "txt": "כר' יוחנן בר' מאיר (מוכח שכר' מאיר משום שנחלקו אמוראים בדעתו)"}, {"layer": "rishon", "src": "ס' התרומה, או\"ה", "srcRef": null, "txt": "כריש לקיש בר' מאיר"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "כר' עקיבא וחכמים. הוא מסביר שכל הרשימה שלו (ושל חכמים) הם דברים חשובים. לכן, כל דבר שהוא חשוב אוסר ואינו בטל. אבל כל זה הוא שאלה של זמן ומקום מה נחשב חשוב (ואלו שברשימה הם דוגמא)."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.110.1", "txt": "+פוסק בעיקר כלשון הרמב\"ם (כ\"כ ש\"ך). כל דבר חשוב  שהוא במניין אוסר בכל שהוא. אבל שאר שדרכם לימנות - לא. ומביא את הרשימה שבדעת ר' עקיבא במשנה. \n+מביא שגם בע\"ח חשובים ואינם בטלים (גם זה בלשון הרמב\"ם, עפ\"י רב אשי בזבחים)"}, {"layer": "rama", "src": "רמ\"א · (סע׳ א')", "srcRef": null, "txt": "+י\"א דכל דבר שבמניין שדרכו למנותו תמיד. וכן דעתו. (ר\"י, רי\"ו, ר' יוחנן)\n+כל הדין הזה שדבר חשוב לא בטיל זה מדרבנן, לכן בספק מקלים (רמב\"ם)"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז, מהרש\"ל", "srcRef": null, "txt": "סוברים להחמיר כתרומה"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אך במקום הפסד אפשר 'להקל' כרמ\"א וכר' יוחנן", "under": true}, {"layer": "zman", "src": "מר\"ן עובדיה", "srcRef": null, "txt": "לספרדים בזמן הזה העיקר כדעת השו\"ע (רמב\"ם); ולכן, אף ביצה בטלה \n \tמשום שאינה חשובה, ועל אף שתמיד נמכרת במניין"}], "pesak": null}, "min-bitul": {"title": "ביטול חשיבות דבר שבמניין", "seif": "סעיף ב׳", "sugya": null, "intro": "בדומה לחה\"ל ובריה שראינו בס' ק\"א, ס' ו', גם דבר שבמניין אשר מאבד מחשיבותו - בטל כשאר כל איסורים. וגם כאן, מגדירים הטור-שו\"ע דזה דווקא בשוגג, כמו בסי' צ\"ט, דנפסק שם כהרשב\"א כדעת ר\"י גבי קנס במזיד במעשה שבת.", "ops": [{"layer": "rishon", "src": "רשב\"א (ת\"ה)", "srcRef": null, "txt": "דבר שבטל חשיבותו חוזר ובטל ברוב או בשישים כשאר איסורים. אבל דווקא בשוגג.\nוזה גם במשנה בערלה: נתפצעו האגוזים, נפרדו הרמונים – יעלו באחד ומאתים."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.110.2", "txt": "בעלי חיים שנתערבו באחרים – לאחר שנשחטו בטלה חשיבותה (רשב\"א"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "עפ\"י האו\"ה, כותב שזה דווקא בב\"ח קטנים, שלאחר שחיטתם לא חשיבי חה\"ל (ולפיכך משמע שלשיטתו אינו מבדיל בין דבר שבמניין לחה\"ל)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הרמ\"א מדבר על חה\"ל. אבל משום דבר שבמניין - אפילו בע\"ח גדולים בטלים אחר שחיטתם", "under": true}], "pesak": null}, "dashilm-ikar": {"title": "סוגיות ועיקר הדין", "seif": "סעיף א׳", "sugya": null, "intro": "דבר שיש לו מתירין דינו דומה לשאר דברים חשובים, וגם הוא אינו בטל אפילו באלף אם נתערב. \nהמקור לדינו הוא ממרחב די גדול של סוגיות בש\"ס, ולענ\"ד הקדום שביניהם הוא רבי שמעון, בברייתא בנדרים.", "ops": [{"layer": "note", "src": "הגדרתו והתנאים לו", "srcRef": null, "txt": "   1) דבר שבוודאי יותר מעצמו מתישהו, או לחלופין, שהתרתו באופן אקטיבי לא תגרור הפסד (רשב\"א,\n \t\t\t\t\t\t\t\t\t  שו\"ע ביש מי שאומר)\n   2) כשיוּתר הדבר הוא בהכרח עוד יהיה כשיר לאכילה ולא יתקלקל (רשב\"א, שו\"ע ביש מי שאומר)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אולם, דשיל\"מ דומה בעיקר הדין לדברים חשובים, אך במספר דברים דינו שונה:"}, {"layer": "note", "src": "שלושה הבדלים מדברים חשובים", "srcRef": null, "txt": "   1) הוא לא באמת חשוב, ודינו רק זהה לדברים חשובים שאינם בטלים. והטעם לדינו: מאחר וניתן\n      לאוכלו בהיתר גמור, אין סיבה לאוכלו בהיותו איסור (אפילו בביטול. ביטול הוא רק בדיעבד) (רש\"י)\n   2) דינו חל רק בתערובת של מין במינו (הראשונים ושו\"ע. לבד מהראבי\"ה; ומשמע בירושלמי נד')\n   3) על אף שגם בו וגם בשאר דברים חשובים הדין חל גם לגבי איסורי דרבנן, בדשיל\"מ מחמירים גם\n      בספק דרבנן (כגון ביצה שספק אי נולדה ביו\"ט) (ב\"י סובר דזה פשוט בברייתא בריש ביצה. וכן בשו\"ע)"}, {"subsubhead": "סוגיות"}, {"layer": "gemara", "src": "ברייתא · נדרים נח", "srcRef": null, "txt": "רבי שמעון: כל דבר שיש לו מתירים – לא נתנו בו חכמים שיעור (ולא בטל אפילו באלף) \nכל דבר שאין לו מתירים – נתנו בו חכמים שיעור (ובטל כרגיל בנ\"ט/ברוב/שישים) ", "ref": {"label": "נדרים · פרק הנודר מן הירק · נח ע\"א", "ref": "Nedarim.58a"}}, {"layer": "gemara", "src": "גמרא · ביצה ג", "srcRef": null, "txt": "ביצה שספק אם נולדה ביו\"ט אם בחול –הווי דבר שיש לו מתירין ולכן לא תתבטל באפילו באלף ", "ref": {"label": "ביצה · ג ע\"א", "ref": "Beitzah.3a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "ואף על גב דמדאורייתא חד בתרי בטיל - אחמור רבנן, הואיל ויש לו מתירין לאחר זמן - לא יאכלנו באיסור על ידי ביטול.", "under": true}, {"layer": "gemara", "src": "גמרא · ביצה לח", "srcRef": null, "txt": "איסורא - בטיל, ממונא - לא בטיל. וטעמא מאי? \nאביי אמר: גזרה שמא תעשה עיסה בשותפות, \nרבא אמר: תבלין לטעמא עבידי, וטעמא לא בטיל.\nרב אשי: משום דהוי ליה דבר שיש לו מתירין, וכל דבר שיש לו מתירין - אפילו באלף לא בטיל.", "ref": {"label": "ביצה · לח ע\"א", "ref": "Beitzah.38a"}}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "דבר שיש לו מתירים, רק במין במינו שייך שאינו בטל אפילו באלף\n \t\tאבל במין בשאינו מינו – אוסר רק בנותן טעם]", "under": true}, {"layer": "gemara", "src": "גמרא · ע\"ז עג (טבל)", "srcRef": null, "txt": "ר' יוחנן וריש לקיש: כל איסורים שבתורה – בין במינו בין שלא במינו אוסרים בנותן טעם\n     אבל טבל ויין נסך – רק שלא במינו אוסר בנ\"ט; במינו – במשהו\nוהטעם לכך: כהיתירו כך איסורו (כמו שטבל מספיק חשוב כדי להתיר בהפרשה, כך מספיק חשוב כדי לאסור)", "ref": {"label": "עבודה זרה · עג ע\"א", "ref": "Avodah_Zarah.73a"}}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.1", "txt": "מביא את עיקר דין דשיל\"מ עפ\"י הסוגיות: דשיל\"מ כגון ביצה שנולדה ביו\"ט, אינה בטלה אפילו באלף"}, {"subhead": "הטעם לדין"}, {"layer": "rishon", "src": "רש\"י (דשיל\"מ)", "srcRef": null, "txt": "מאחר שאפשר להתירו לאחר זמן, עדיף לאוכלו בהיתר ולא באיסור (והביאו הט\"ז)"}, {"layer": "note", "src": "טבל — הטעם לדינו", "srcRef": null, "txt": "בגמרא בע\"ז: 'כהיתירו כך איסורו' \nירושלמי: דבר שיש לו מתירין\nהתוס': מתרצים לגבי טבל ששני הטעמים נצרכים, משום שאם הבעלים לא בעיר, אז דשיל\"מ לא תופס"}, {"subhead": "ספק דרבנן"}, {"layer": "rishon", "src": "הב\"י והתוספות", "srcRef": null, "txt": "בסוגיה בריש ביצה סוברים שפשוט בברייתא שאפילו ספק נולדה ביו\"ט אוסרת התערובת"}, {"layer": "rishon", "src": "הרב המגיד", "srcRef": null, "txt": "יש מי שהורה שכולן מותרות בספקה נולדה ביו\"ט"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.1", "txt": "כותב שאפילו בספק דרבנן נקטינן שאסור (מאחר וגם בספק יש לו מתירים)"}, {"layer": "acharon", "src": "ט\"ז, ש\"ך", "srcRef": null, "txt": "מה שמחמירים בספק דרבנן הוא חומר בדשיל\"מ על פני שאר דברים חשובים, אשר\n \t\t   בהם מקילים בספק דרבנן", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מכיוון שיש מי שהורה להתיר, אפשר לסמוך אדעתו במקום צורך גדול", "under": true}, {"subhead": "מין במינו — מין בשאינו מינו"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "נראה שלרוב הדעות הדין הוא דווקא במין במינו, אבל במין בשאינו מינו – בטיל בנ\"ט (בשישים).\nאך הראבי\"ה (הטור מביאו 'אבי העזרי') סובר שגם בשאינו מינו שייך דשיל\"מ\nבסוגיות עצמן, למיטב ידיעתי, אין חילוק בדין בין מין במינו לשאינו במינו בדשיל\"מ, ורק בסוגיה על טבל יש חילוק כזה. זה מביא לשתי שיטות בזה (שלא נ\"ל שיש בהן נפק\"מ):"}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "בסוגיה בביצה (רב אשי) מחלקים בין מין במינו לשאינו במינו. לפיכך, הם מתקשים בסוגיה של טבל, שהרי שם נאמר טעם אחר 'כהיתרו כך איסורו'. לכן נדחקים לומר שטבל ספציפית שייך בו שני הטעמים."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "באמת מעיקר הדין, דבר שיש לו מתירין – בין במינו בין שאינו במינו אוסר במשהו. אבל בגלל שטבל הוא בעצם גם דבר שיש לו מתירין, שהרי אפשר לתקנו, וטבל רק במינו אוסר במשהו בגלל 'כהיתירו כך איסורו', לכן סובר שגם בדבר שיש לו מתירין בשאינו מינו יאסור רק בנ\"ט, כדי שלא יהיה דבר שיש לו מתירין חמור מטבל."}, {"layer": "rishon", "src": "רי\"ו", "srcRef": null, "txt": "זה מפורש בירושלמי נדרים (פ\"ו,ה\"ד)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.1", "txt": "סובר כדעת רוב הראשונים שדין דשיל\"מ הוא דווקא במין במינו"}, {"subsubhead": "למה בדשיל\"מ מקלים במין בשאינו מינו?"}, {"layer": "acharon", "src": "ש\"ך (טעם האו\"ה)", "srcRef": null, "txt": "  \t\tכי בשונה משאר דברים חשובים (בריה,חה\"ל וכו'), ההחמרה בדשיל\"מ אינה בגלל\n \t\tחשיבותו, אלא בגלל שניתן להתירו בלא ביטול בתערובת. אבל אם הוא מתערב בשלא\n \t\tבמינו – אין זה ממש נקרא שמבטלים אותו בתערובת, כי הרי השם של התערובת יהיה\n \t\tלפי מה שנתערב בו שהרי הווי מין בשאינו מינו, וזה כאילו הוא ממש אינו בכל מקרה."}, {"layer": "acharon", "src": "ט\"ז (וטעם הר\"ן)", "srcRef": null, "txt": "טעם זה לא מספק. וטעם הר\"ן:\n\t\tזה נעוץ במחלוקת ר' יהודה וחכמים לגבי מין במינו בכללי. \n \t\tלר' יהודה, יש להחמיר במין במינו בגלל שמין מחזק את טעם מינו, כאשר במין בשאינו\n \t\tמינו הוא מחלישו. \n \t\tאבל חכמים סוברים שיש להתיר אף מין במינו, משום שאינם דומים זה לזה.\n \t\tובדשיל\"מ מודים חכמים לר' יהודה."}, {"layer": "note", "src": "לפי הרמב\"ם", "srcRef": null, "txt": "\t[נזכור שלפי הרמב\"ם שפרטנו לעיל, מקלים בדשיל\"מ רק בגלל טבל, וכדי שלא יהיה חמור ממנו"}, {"subsubhead": "בהגדרת מין במינו (רמ\"א)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "משמע בסוגיה בביצה לח שכל דבר שצריך זה לזה, כמו מים ומלח בעיסה – חשוב מין במינו"}, {"layer": "rishon", "src": "ש\"ד, הגהות ש\"ד בשם מהרא\"י (בדרכ\"מ א')", "srcRef": null, "txt": "אם הכניסו ביצה אסורה לתבשיל כדי ללבּנו, או לתרנגולת  – חשוב מין במינו"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "דברי ההגהות ש\"ד הם עפ\"י סברת הב\"י, דהיינו, 'דבר שצריך זה לזה'", "under": true}, {"layer": "rama", "src": "רמ\"א · (סע׳ א')", "srcRef": null, "txt": "מביא דברי הגש\"ד ומהרא\"י.\nונראה כן בשו\"ע או\"ח תקי\"ג. שם גם מפרט דזהו משום שהוסיפו הביצה לשם המראה והטעם"}, {"layer": "acharon", "src": "מג\"א (או\"ח תקי\"ג)", "srcRef": null, "txt": "משמע מהשו\"ע שאם ניכר רק בטעם – אינו נחשב מין במינו, ובטל", "under": true}, {"layer": "acharon", "src": "ש\"ך (ג')", "srcRef": null, "txt": "כאן כדי לקבוע אי הוי מין במינו - הולכים אחר השם, ולא אחר הטעם"}], "pesak": null}, "dashilm-tnaim": {"title": "תנאים נוספים", "seif": "סעיפים ב׳-ד׳", "sugya": null, "intro": null, "ops": [{"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "דבר שיש לו מתירין – דווקא אם בוודאי יבוא ההיתר או האדם יכול להתירו בלא הפסד"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "הטור קיצר בזה לשון הרשב\"א, ובתנאי השני כתב רק 'יכול להתירו')", "under": true}, {"layer": "rishon", "src": "ר\"ש מפליזא בשם ר\"ת", "srcRef": null, "txt": "אם כשיוּתר הדבר הוא כבר לא יהיה כשיר לאכילה ויתקלקל – לא חשיב דשיל\"מ (כ\"כ רשב\"א)\nדבר שיחזור לאיסורו מאליו (כמו חמץ) – לא חשיב דשיל\"מ (אך הרמב\"ם כפי שראינו, סובר שחמץ כן)"}, {"layer": "rishon", "src": "ריו\"ח", "srcRef": null, "txt": "דבר שלמישו מסוים אין לו דרך היתר (כגון המבשל בשבת במזיד, שהתבשיל אסור לו לעולמים) – לא חשיב דשיל\"מ"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב', ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.2", "txt": "+ יש מי שאומר שדשיל\"מ הוא רק אם היתרו יבוא בכל מקרה או אם אפשר להתירו בלא הפסד (רשב\"א)\n+ יש מי שאומר שדשיל\"מ הוא רק אם היתרו הוא בלא קלקול (רש\"מ בשם ר\"ת, רשב\"א)"}, {"layer": "rama", "src": "רמ\"א · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.4", "txt": "כל שאמרנו שדשיל\"מ אינו בטל זה רק אם האיסור בעין או שיש לו ממשות (הבנתו בטור או\"ח תקי\"ג)  ואם רק טעמו ישנו - בטל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "סובר שגם טעם חשיב בהכי. וכל הכוונה שבמין בשאינו מינו – אפילו בטעם בטל", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tוכן, רק אם אסור מחמת עצמו (בתה\"ד)"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז", "srcRef": null, "txt": "זה רק בחה\"ל. ומוכח שכן בתה\"ד. וגם לפי הטעם שדשיל\"מ לא בטל לא שייך\n          לחלק בזה (כי סוף סוף, הווי איסור, ולא רצו חז\"ל שנאכלו אם יבוא להיתר)", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tוכן, אם היה ניכר עוד קודם שנתערב (או\"ה בשם סמ\"ג)"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז", "srcRef": null, "txt": "מביאים כדוגמא יין שהענבים שבו נסחטו עוד במהלך השבת", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tדבר שיש לו היתר, אך ישוב להיאסר (כמו חמץ) לא מקרי דשיל\"מ (רש\"מ)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tדבר שלא לכולם יש לו דרך היתר, כגון, דבר שבושל במזיד בשבת, לא מקרי דשיל\"מ (ריו\"ח) "}, {"subhead": "כלי טרף שהתערבב במותרים (ג')"}, {"layer": "rishon", "src": "הרשב\"א", "srcRef": null, "txt": "עפ\"י מה שכתב בהגדרת דשיל\"מ - שאם יבוא ההיתר מאליו או האדם יכול להתירו בלא הפסד – אם כלי שבלע איסור התערבב בכלי כשרים ואינו ניכר – בטל ברוב (למרות שאפשר להגעילו, משום שההיתר לא יבוא מאליו, וצריך להוציא כסף כדי להתירו)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.3", "txt": "פוסק כן."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא את הנימוק של הרשב\"א (שצריך להוציא עליו הוצאות להגעילו)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מביא מספר חולקים על פסק זה של הרשב\"א- \n \tמהרי\"ל סובר שדווקא כשההפסד הוא מרובה. וכאן בהגעלה, ההפסד לא מרובה\n\tוהש\"ך מוסיף גם שמדובר כאן בדבר שהיתרו יבוא, כגון, אם נמתין שלא יהיה בן יומו"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "חושש גם לאוסרים. ולכן כדי להכשיר את כל הכלים מספק", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "group", "title": "ק׳ · בריה", "spans": "סעיפים א׳-ד׳", "children": ["bria-hagdara", "bria-heter", "bria-marak", "bria-tolaim"]}, {"type": "group", "title": "ק\"א · חתיכה הראויה להתכבד", "spans": "סעיפים א׳-ט׳", "children": ["chal-yesod", "chal-hagdara", "chal-bitul", "chal-tref"]}, {"type": "group", "title": "ק\"י · דבר שבמניין", "spans": "סעיפים א׳-ב׳", "children": ["min-ikar", "min-bitul"]}, {"type": "group", "title": "ק\"ב · דבר שיש לו מתירין", "spans": "סעיפים א׳-ד׳", "children": ["dashilm-ikar", "dashilm-tnaim"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"בריה": "דבר בעל חשיבות עצמאית ללא קשר לשיעור (למשל נמלה, גיד הנשה, עוף טמא) — אינו בטל אפילו באלף.", "חה\"ל": "חתיכה הראויה להתכבד — חתיכת איסור שלמה שראוי להגישה לאורח; מחמת חשיבותה אינה בטלה.", "דבר שבמניין": "דבר שמחמת חשיבותו נמנה אחד-אחד (ולא נשקל); מחמת כך אינו בטל.", "דשיל\"מ": "דבר שיש לו מתירין — דבר שיהיה מותר לאחר זמן (כגון ביצה שנולדה ביו\"ט), ולכן אינו בטל אפילו באלף.", "נטל\"פ": "נותן טעם לפגם — טעם שפוגם את התבשיל; אינו אוסר.", "מין במינו": "תערובת של איסור והיתר מאותו המין; בדשיל\"מ דווקא בה אינו בטל.", "שדרכו להימנות": "דבר שנהוג למנותו (בגלל חשיבותו) — הקריטריון המרכזי לאי-ביטול.", "הדרא דכנתא": "מעיים המלופפים על שומן ה'כנתא'.", "קורקבן": "קיבת השרירים של העוף/בהמה; נחשב מבני המעיים שאינם ראויים להתכבד.", "טבל": "פירות שלא הופרשו מהם תרומות ומעשרות; במינו אוסר במשהו ('כהיתירו כך איסורו')."}, "subject": "איסור והיתר", "id": "batelim"}, {"topic": {"title": "ביטול ברוב (יבש ביבש)", "eyebrow": "מבחני הרבנות · איסור והיתר · סימן ק\"ט", "siman": "Shulchan_Arukh,_Yoreh_De'ah.109", "intro": {"lead": {"t": "", "ref": ""}, "body": "בסימן צ\"ח עסקנו בשאלה מהי תערובת אסורה, וענינו במושג **טעם כעיקר**. סימן זה עוסק במקרה שבו **אין טעם** — ואז פועלים לפי כללי **ביטול ברוב**, שגם מגדירים מתי דבר אינו ניכר בממשותו.\n\nכאן נלמד את יסוד דין הרוב (מן הפסוק \"אחרי רבים להטות\"), את דין **יבש ביבש** (שבו האיסור בטל ברוב ממש), את **חלוקת הדין** לפי מין במינו/בשאינו מינו ויבש/לח, ואת דין **בישול** התערובת שהתבטלה."}}, "sections": {"mavo": {"title": "מבוא – יסודות לדין רוב", "seif": null, "sugya": null, "ops": [{"layer": "prose", "src": null, "srcRef": null, "txt": "בסימן צ\"ח עסקנו בשאלה: מהי תערובת אסורה? מתי אמרינן על איסור והיתר שהתערבו, וכן על בשר וחלב שנתערבו, שבפנינו תערובת אסורה? על השאלה הזו ענינו באמצעות המושג 'טעם כעיקר' \\ref{ברייתא דפסחים מד}{Pesachim.44a}. בעקבות מושג זה, עמדנו גם על שני סוגים כלליים של תערובות: מין במינו ומין בשאינו מינו, כאשר בראשון הטעם כביכול אינו מורגש, בעוד בזה האחרון הטעם מורגש. אולם, ראינו שרק מן התורה אמרינן שמין במינו לא צריך ביטול טעם, ובעקבות ר' יוחנן ור\"ל\\note{יש לציין שבסוגייה בה מנוסחת עמדת ר' יוחנן ור\"ל, היא העמדה המקלה, בעוד רב ושמואל רואים באי היכולת לחוש טעם במין במינו סיבה לאסור תערובת מעין זו בכל שהוא.}, רוב הראשונים והטוש\"ע פוסקים שמדרבנן, גם במין במינו משתמשים בקריטריון של טעם; ומאחר וא\"א לחושו – משערים ב-60."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "בהמשך, ראינו כי לצידו של הטעם יש לאיסור/מאכל רובד נוסף של קיום: **ממשות** (פלוגתא דאביי ור' יוחנן גבי טעמו וממשו). אולם, נראה כי הקו המרכזי בפסיקת הראשונים והשו\"ע הוא כי הטעם הוא העיקר, וגם ללא הממשות אסור מן התורה. אך המסורת האשכנזית היא שגם ממשות האיסור בלא טעם בעייתית, ואין לאכול דבר איסור שניכר וניתן להוציאו גם אם טעמו התבטל ב-60 (**האו\"ה**, וכ\"פ **רמ\"א**)."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "ומה קורה כאשר אין טעם (ולפחות לאשכנזים: גם לא ניכרת ממשות)? בכך אנו באים לסימן ק\"ט. כאשר אין טעם אנו פועלים עפ\"י כללי **ביטול ברוב** (אשר בעצם גם מגדירים מתי דבר אינו ניכר בממשות). (למשל, על מין במינו שראינו כי רק מדרבנן צריך 60, אמרינן עליו שמהתורה הוא בטל ברוב.)"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "כללי רוב עולים בש\"ס בצורות רבות ומשונות. מן **המשנה במכשירין** מנוסח במפורש הכלל \\ul{'הולכין אחר הרוב'}. בגמרא ב\\ref{חולין (פ' קמא)}{Chullin.11a} מלמדים כי היסוד לכלל זה הוא בפסוק \\ul{'אחרי רבים להטות'} (שמות כג). ובה עולה חלוקה בין שני סוגי רוב: **רובא דאיתא קמן** ו**רובא דליתיה קמן**."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "החלוקה הזו פחות משנה לסימן הזה (אולי לסימן ק\"י, בתשע חנויות וכו'), לכן רק נציין כי הגמרא מסתפקת בכך שהפסוק הוא מקור לרוב במקרים של רובא דאיתא קמן, אבל לא ברובא דליתיה קמן, ובהמשך מנסה למצוא הסבר הולם למקור זה גם לרובא דליתיה קמן.", "expandable": true}, {"layer": "prose", "src": null, "srcRef": null, "txt": "אפשר לשבור את הראש שעות בניסיון להבין את ההיגיון של ביטול ברוב. אבל נ\"ל שיש לומר שכאשר אנו מדברים על ביטול ברוב ורובא דאיתא קמן, הכלל שהולכים אחר הרוב אינו כלל הסתברותי או סטטיסטי, אלא **מציאותי** (לעומת רודל\"ק, שהוא באמת כלל סטטיסטי להכרעת ספק. ולכן הגמרא מעקמת פה כששני סוגי הרוב נלמדים מאותו פסוק)."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "לפיכך, הרא\"ש אצלנו סובר ש'חד בתרי בטל ונהפך איסור להיות היתר'. זה נלמד מן הפסוק 'אחרי רבים להטות' במובן שדינו של המיעוט נעשה כזה של הרוב, בעצמו ממש. הדבר דומה ומושפע מן הצורה שבה בני אדם מכנים דברים. למשל: שדה ירוק עם מעט פרחים סגולים פה ושם — אנו נקרא לשדה 'שדה ירוק' מבלי להתייחס לפרחים, מפני שהם בטלים ברוב השדה ואין עניין להתייחס אליהם."}, {"layer": "mishna", "src": "משנה מכשירין", "srcRef": null, "txt": "הכלל: \\ul{הולכין אחר הרוב}. במחצה על מחצה – להחמיר.", "ref": {"label": "משנה מכשירין · ב", "ref": "Mishnah_Makhshirin.2.11"}}, {"layer": "gemara", "src": "חולין יא · פ' קמא", "srcRef": null, "txt": "מנא הא מילתא שאמרו רבנן - זיל בתר רובא? \\ul{'אחרי רבים להטות'} (שמות כג).\nזהו נימוק שתופס לרובא דאיתא קמן, אבל לרובא דליתא קמן?", "ref": {"label": "חולין · יא", "ref": "Chullin.11a"}}, {"layer": "prose", "src": "הרחבה — מבנה הסוגיה בחולין", "srcRef": null, "txt": "כאן מביאה הסוגיה ניסיון להבין מאיזו סיטואציה למדים שגם ברובא דליתיה קמן אזלינן בתר רובא — ע\"י מספר מקרים, כאשר את רובם דוחים בטענה שיש פתרון אחר לבעיה (שאינו 'אזלינן בתר רובא'). **המבנה הקבוע:**\n - סיטואציה בפסוקים שבה כדי לקיים את האמור צריך להגיד שהולכים אחר הרוב.\n - דלמא?: ערעור על כך שבאמת צריך להגיד את זה כדי לקיים את הסיטואציה.\n - הוכחה שבוודאי צריך להגיד שהולכים אחר הרוב כדי...\nומסיימים בכך שהביאו את הדוגמא על שחיטה, ואמרו שאיפה שאפשר – נבדוק, ואיפה שלא - לא.", "expandable": true}, {"layer": "rishon", "src": "רש\"י שם", "srcRef": null, "txt": "אלא ודאי הלכה למשה מסיני הא \\ul{דסמכינן ארובא אפילו היכא דאפשר [לבדוק]}. ו'אחרי רבים להטות' משמע בין רובא דאיתיה קמן בין רובא דליתיה קמן (!!)."}], "pesak": null}, "yavesh_1": {"title": "קיצור כללים ושיעורים", "seif": null, "sugya": null, "ops": [{"layer": "prose", "src": null, "srcRef": null, "txt": "**קיצור כללים ומושגים:**\n**מין במינו:** על פניו אין טעם, אך בכל זאת 'טעם כעיקר' (ר' יוחנן ור\"ל). לפיכך משערים ב-60.\n **ש\"ך** (כאן): צריך ללכת לפי הטעם (ולא השם), שהרי זה מה שאוסר בסופו של דבר (והגדיל לומר דסתמא דמילתא שבני אדם משתמשים בשמות שונים לדברים שטעמם שונה).\n**יבש ביבש:** כל דבר שעומד בעצמו (**ב\"י**: ואעפ\"י שהוא מבושל במים או משהו)."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "**החלוקה המשולשת:**\n מין במינו + יבש ביבש – בטל ברוב אפילו מדרבנן\n רק אחד מהם – אסור מדרבנן (לפי **ר\"ן**, וכ\"כ ב\"י)\n שניהם – אסור מן התורה"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "ממקומות שונים בש\"ס עולים שיעורים שונים של ביטול: בשישים, במאה, ובמאתיים. כל סוגיה וכל מקרה יהיו אבן בוחן לראשונים ולב\"י לנסות לנסח באילו מקרים ומדוע תקנו חכמים שלא יהיה ביטול ברוב (אלא בשיעור אחר)."}, {"layer": "rishon", "src": "תוספות · רא\"ש · רשב\"א · ר\"ן", "srcRef": null, "txt": "לרוב הראשונים מוסכם שביטול ברוב תקף אפילו מדרבנן, ורק במקרים מסוימים תקנו ביטול בשיעור גדול יותר. זה עולה מן **הסוגיה בחולין ק'** (פ' ג\"ה): מהא דחתיכה הראויה להתכבד אינה בטלה ברוב, משמע ששאר דברים שאינם חה\"ל – בטלים ברוב. וכן הלכה.", "ref": {"label": "חולין · ק", "ref": "Chullin.100a"}}, {"layer": "rishon", "src": "ראב\"ד · רמב\"ם · רש\"י", "srcRef": null, "txt": "ל**ראב\"ד**, **רמב\"ם ורש\"י**: הביטול הוא רק מדאורייתא, ומדרבנן הצריכו 60 בכל גווני.", "under": true}, {"layer": "rishon", "src": "רשב\"א · תרומה · ר\"ן", "srcRef": null, "txt": "והדעה הראשונה (שביטול ברוב ממש, אפילו מדרבנן) היא \\ul{דווקא ביבש ביבש}, אבל לא בלח (**רשב\"א**); וכן \\ul{דווקא בתערובת של מין במינו} (**תרומה**, **ר\"ן**).", "under": true}, {"subsubhead": "שיעורי הביטול בש\"ס"}, {"layer": "mishna", "src": "משנה ערלה", "srcRef": null, "txt": "התרומה ותרומת מעשר של דמאי, החלה והביכורים – עולים באחד ומאה. הערלה וכלאי הכרם – עולים באחד ומאתיים. וב**זבחים** משמע שתערובות קודש לא בטלים אפילו באלף.", "ref": {"label": "משנה ערלה · ב", "ref": "Mishnah_Orlah.2.1"}}, {"layer": "gemara", "src": "גמרא בבא מציעא · פ' הזהב", "srcRef": null, "txt": "מסקנתא דסוגיה – מעשר שני בטל ברוב. (**ר\"ן ורשב\"א** מוכיחים מזה שהביטול ברוב במעשר שני הוא גם מדרבנן, שהרי דנים שם גם על תרומה ששיעורה ב-100, מה שבוודאי שיעור דרבנן הוא. ואז משמע שגם שאר האיסורים הבטלים ברוב הווי כפשוטו.)", "ref": {"label": "בבא מציעא · נג", "ref": "Bava_Metzia.53a"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "מן התורה ביטול ברוב, אפילו חד בתרי. גזרו חכמים שיהיה אסור עד 'שיאבד הדבר האסור מעוצם מיעוטו', ובכל דבר השיעור שונה לכך (60/100/200)."}, {"layer": "note", "src": "ר\"ן", "srcRef": null, "txt": "הסיבה שמדרבנן מצריכים שישים בחלק מהאיסורים היא בכגון שהטעם נבלל ונבלע ומתפשט בכל. אבל כשאין כן, כמו ב**יבש ביבש** למשל, מסתפקים בביטול ברוב אפילו מדרבנן."}], "pesak": null}, "yavesh_2": {"title": "עיון הב\"י", "seif": null, "sugya": null, "intro": "האם ישנו ביטול ברוב המותר ממש אפילו מדרבנן? בכך דן הב\"י, ומברר את גדרי היבש והמין.", "ops": [{"layer": "acharon", "src": "ב\"י · חולין ק'", "srcRef": null, "txt": "מ**הסוגיה בחולין ק'** משמע שיש ביטול ברוב. שם שואלים על חה\"ל למה לא בטלה ברוב? משמע מכך ששאר הדברים כן בטלים ברוב. (וכן משמע בסוגיות נוספות.)"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "**ראב\"ד**: אין הכוונה רוב ממש. אולי רק מן התורה, אבל מדרבנן צריך 60 (וכן משמע מ**רש\"י ורמב\"ם**)."}, {"layer": "rishon", "src": "תוספות רא\"ש · רשב\"א · ר\"ן", "srcRef": null, "txt": "**תוספות רא\"ש**, **רשב\"א**, **ר\"ן**: הכוונה רוב ממש, ואפילו מדרבנן (הרשב\"א והר\"ן מביאים ראיה מבב\"מ).", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אז כל איסור בטל ברוב?"}, {"layer": "rishon", "src": "רשב\"א (ועוד)", "srcRef": null, "txt": "**רשב\"א** (ועוד): \\ul{ביבש ביבש דווקא} (רוב הראשונים הסכימו לזה)."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: יבש = כל דבר שעומד בעצמו (ואעפ\"י שהוא מבושל במים או משהו. והראיה: בסוגיה ההיא בחולין ק' גבי חה\"ל מקשים על חתיכה ש\\ul{נתבשלה} עם שאר חתיכות שתתבטל ברוב)."}, {"layer": "rishon", "src": "תרומה · ר\"ן", "srcRef": null, "txt": "**תרומה, ר\"ן**: ודווקא מין במינו (דהיינו: מין במינו + יבש ביבש – בטל ברוב), אבל בשאינו מינו – ב-60.", "under": true}, {"layer": "prose", "src": null, "srcRef": null, "txt": "**פירוט הר\"ן** (מובא גם בטבלה להלן): מדאורייתא אפילו לח בלח בטל (במינו); רבנן לא החמירו ביבש משום שאי אפשר לבוא בו לכדי איסור ולבשל לכתחילה. לח בלח + בשאינו מינו – אסור מן התורה ונותן טעם. לכן במין בשאינו מינו, אפילו יבש ביבש, גזרינן כי חיישינן שמא יבוא לבשלם יחד וייתן טעם, וזה כבר איסור תורה."}], "pesak": null}, "yavesh_3": {"title": "האכילה בפועל", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "רא\"ש · טור", "srcRef": null, "txt": "אם התרחש ביטול ברוב, כגון של 1 ב-2, מותר לאכול את כל השלושה, \\ul{ואפילו יחד}. זאת משום שאנו למדים מ'אחרי רבים להטות' שאפילו האיסור הופך להיתר (!) (ולא משום ספיקא, כדסובר ר\"י)."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "**רשב\"א**: יש לאכלן אחת אחת (וכשעושה כן, בכל אחד שניגש לאכול אומר 'זהו של היתר', ואפילו כשמגיע לאחרון אומר 'של איסור כבר הלך לו, וזה של היתר הוא'. \\ul{וזו בדיוק הסיבה שמותר ביבש ביבש ולא בלח, כי לח אי אפשר לאכול אחד אחד}).", "under": true}, {"layer": "rishon", "src": "סמ\"ג", "srcRef": null, "txt": "**סמ\"ג**: אפילו אם יאכלן אחת אחת, לא יעשה זאת אדם אחד, שנמצא שבוודאי אוכל איסור.", "under": true}, {"layer": "rishon", "src": "מוהר\"ם · הגש\"ד", "srcRef": null, "txt": "**מוהר\"ם**: היה נותן חתיכה אחת לגוי. **הגהות ש\"ד (תרוה\"ד)** סבר שמהר\"ם עשה כן מפני שהחמיר.", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.109.1", "txt": "חתיכה שאינה חה\"ל, שנתערבה מין במינו + יבש ביבש, בטלה ברוב (עפ\"י **חולין, ראשונים, ר\"ן**). ואדם אחד יכול לאכול את כולן, אבל אחת אחת (**רשב\"א**); ויש מי שאוסר לאכלם אדם אחד (**סמ\"ג**)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "(מוסיף בין השורות את דיוקו של הב\"י דכל דין הביטול הזה הוא הודות לכך שהאיסור אינו נבלל והוא עומד בפני עצמו (יבש); אך מאידך, אינו מכירו, משום שמעורב עם אחרים.)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: האיסור עצמו עומד, אלא שהוא מעורב באחרים. (\\ul{המתח: ההיתר נקנה הודות לכך שהאיסור נהפך לחלק מהכלל של ההיתר, לעומת הדרישה שהוא לא יתערבב. האיסור הולך לאיבוד בתוך ההיתר}.)"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "**ההיגיון לדעתי:** אי-הערבוב והנפרדות הנדרשים אמורים להעיד על אי-נתינת טעם. אי-ההכרה היא הסיבה שבגינה האיסור בטל ברוב ונהפך לחלק מן ההיתר (וכטעם הרשב\"א)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: לפי הרשב\"א, הסיבה שמותר רק אם עומד בפני עצמו היא משום שאז על כל חתיכה שאוכל יכול להגיד שהיא של היתר (משא\"כ בדברים הנבללים). לפיכך הש\"ך סובר שכל עוד אתה לא אוכל הכל בבת-אחת – זה בסדר, ומותר גם לאכול שניים ואחד/להפך.", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "**ערוה\"ש**: חולק על סברת הש\"ך ברשב\"א. מותר לאכול רק אחד אחד.", "under": true}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "**ב\"ח**: קמח חשיב לח בלח מפני שהוא נבלל ומתערבב כנ\"ל (ונ\"ל שלפי טעם הרשב\"א הוא צודק).", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.109.1", "txt": "לכתחילה יש לנהוג שלא יאכלם אדם אחד (**סמ\"ג**); ויש מחמירין להשליך חתיכה אחת או לתתה לגוי, אבל זו חומרא (**מוהר\"ם**). ואם התערובת היא מין בשאינו מינו – צריך 60 (**ר\"ן, תרומה**), ואפילו אם האיסור מדרבנן (תימא לש\"ך וגם לי)."}], "pesak": null}, "yavesh_4": {"title": "חלוקת הדין ולמעשה", "seif": null, "sugya": null, "ops": [{"layer": "prose", "src": null, "srcRef": null, "txt": "**חלוקת הדין** (עפ\"י הר\"ן; מביאו הב\"י וגם הש\"ך. התימא היא לגבי פסיקת הרמ\"א):"}, {"table": {"align": "center", "title": "חלוקת הדין", "cornerColor": "#F4EFE3", "cols": ["מין במינו", "מין בשאינו מינו"], "colColors": ["#E2EFD9", "#FFCDCD"], "rows": [{"head": "יבש ביבש", "headColor": "#E2EFD9", "cells": ["מדאורייתא: בטל ברוב\nמדרבנן: בטל ברוב", "מדאורייתא: בטל ברוב\nמדרבנן: גזרו מפני לח. 60"], "cellColors": ["#F2F8EE", "#FFFFEB"]}, {"head": "לח בלח /\nיבש בלח", "headColor": "#FFCDCD", "cells": ["מדאורייתא: בטל ברוב\nמדרבנן: גזרו אטו מבשא\"מ. 60 (רא\"ש)", "מדאורייתא: נותן טעם (אסור)\nצריך 60 לבטל"], "cellColors": ["#FFFFEB", "#FFE5E5"]}]}}, {"layer": "prose", "src": null, "srcRef": null, "txt": "\\ul{לגבי מין במינו}: מאחר ומן התורה אפילו לח בלח בטל ברוב, לא גזרו רבנן ביבש ביבש, כי אין חשש שיבוא לעבור על דין תורה.\n\\ul{מין בשאינו מינו}: לח בלח כבר נותן טעם מן התורה. לכן, ביבש ביבש גזרו מדרבנן שביטולו בשישים, שמא יבשל לח בלח."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "כל האמור פשוט לגבי דברים שהאיסור לאוכלם הוא מן התורה. אבל לגבי \\ul{דברים שאסור לאוכלם מדרבנן}, **הש\"ך** סבר שפשוט מהר\"ן שבמקרים בהם יש רק קריטריון אחד (יבש+אינו מינו / לח+מינו) – בטל ברוב, דהרי אין חשש שיבוא לעבור על איסור תורה, ואין גזירה על גזירה (תרי דרבנן) (והסכים לדעתו **הפר\"ח**)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "אז מדוע ברמ\"א כתב 'אין חילוק בכל זה בין אם האיסור מדרבנן או מדאורייתא'? **הש\"ך** מתרץ (די דחוק): דבריו קאי על זה שצריך רוב ממש, ולא מסתפקים במחצה."}, {"subhead": "למעשה"}, {"layer": "zman", "src": "פניני הלכה", "srcRef": null, "txt": "הרב מלמד כותב כי במין במינו יבש ביבש החמירו חכמים כאשר יש חומרה יתירה, כגון בפירות תרומה. לפיכך, בפועל מועטים הם המקרים של ביטול ברוב אפילו חד בתרי, והם:\n • בשר טרף שהתערב בחתיכות כשר\n • חתיכת חלב שהתערבה בחתיכות שומן\nואפילו אלו פחות מצויים, משום שנוהגים היום לזרוק חלקים אסורים שלא נועדו לאכילה, ולא לסמוך על ביטול ברוב."}], "pesak": null}, "bishul": {"title": "בישול התערובת היבשה שהתבטלה", "seif": "ב׳", "sugya": null, "intro": "התערובת היבשה שנתבטלה ברוב – בושלה. מה דינה?", "ops": [{"layer": "rishon", "src": "רשב\"א · ר\"ן", "srcRef": null, "txt": "בבישול כבר צריך 60, כי הוא נתן טעם."}, {"subsubhead": "פירוט הרשב\"א"}, {"layer": "rishon", "src": "רשב\"א · תורת הבית", "srcRef": null, "txt": "**בתורת הבית**: כל חתיכה כשלעצמה מותרת כמו קודם; הרוטב צריך 60 (כי הוא לח).\n**בשו\"ת**: השואל הקשה עליו – שהרי כל חתיכה מקבלת טעם איסור מן הרוטב. מודה שטעה. **והתיקון**: אסור לאכלן אפילו אחת אחת, מפני שהרוטב אסור כנ\"ל ונבלע בחתיכות. וכותב כי אולי אם מבשל חצי מהחתיכות בכל צד של הקדרה – מותר, שאז על כל חצי שאוכל יכול לומר שהאיסור בחצי השני."}, {"layer": "acharon", "src": "הגש\"ד", "srcRef": null, "txt": "**הגש\"ד**: פשוט שגם לשיטת הסמ\"ג הנ\"ל הרוטב אסור מן התורה.", "under": true}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "**רא\"ש**: מחלק על בסיס ידיעה: אם ידע שהתבטל ביבש - מותר (כי אז הכל נהפך היתר ממילא, לכן גם הרוטב היתר); אם לא ידע שהתבטל ביבש – צריך 60 (למרות שאינו באמת מקבל טעם, גזרה אטו בשאינו מינו)."}, {"layer": "rishon", "src": "רא\"ה (מביאו ר\"ן)", "srcRef": null, "txt": "**רא\"ה** (מביאו **ר\"ן**): אפשר להוסיף ולהרבות לפני הבישול שיהיה 60 בשעת הבישול, ואין בזה משום ביטול איסור לכתחילה (משום שכל אחד בפני עצמו מותר).", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.109.2", "txt": "אם בישל תערובת יבש שנתבטלה - אסורה, אלא אם יש בה 60 כנגד האיסור (**רשב\"א המתוקן** ו**ר\"ן**). ואפשר לרבות על התערובת עוד קודם הבישול כדי שיהיה 60 (**הרא\"ה**)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: לפי מה שהרשב\"א סבר שאולי אם מפרידים מותר, סובר שאפשר לבשלן בשתי קדרות שונות, בלי הוספה של היתר, ולאכול כולן אחת אחת. (אני אומר: זו אסורה.)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא ביש אומרים את דעת **הרא\"ש** שמחלק בידיעה, ושיש לסמוך על דעתם במקום הפסד."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "mavo"}, {"type": "group", "title": "יבש ביבש (א')", "spans": "א׳", "children": ["yavesh_1", "yavesh_2", "yavesh_3", "yavesh_4"]}, {"type": "sec", "id": "bishul"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"ביטול ברוב": " — כשאין טעם, האיסור בטל כשההיתר רוב; ביבש-ביבש מין-במינו האיסור \"נהפך להיתר\" ממש (מ\"אחרי רבים להטות\").", "יבש ביבש": " — תערובת של פריטים מוצקים העומדים בעצמם (אף אם בושלו במים), להבדיל מלח שנבלל.", "רובא דאיתא קמן": " — רוב הנמצא לפנינו (כלל מציאותי, לא סטטיסטי) — כמו תערובת יבשה שרובה היתר.", "רובא דליתא קמן": " — רוב שאינו לפנינו (כלל סטטיסטי להכרעת ספק); רלוונטי יותר לסימן ק\"י.", "חד בתרי": " — אחד (איסור) בתוך שניים (היתר); היחס המינימלי שבו האיסור בטל ברוב.", "חה\"ל (חתיכה הראויה להתכבד)": " — חתיכה חשובה שאינה בטלה ברוב; מכלל זה למדים ששאר דברים כן בטלים ברוב.", "עולה באחד ומאה / ומאתיים": " — שיעורי ביטול מיוחדים: תרומה/חלה/ביכורים ב-100, ערלה/כלאי הכרם ב-200.", "טעם כעיקר": " — יסוד מסימן צ\"ח: טעם האיסור אוסר כאילו האיסור עצמו; סימן ק\"ט עוסק במקרה שבו אין טעם."}, "subject": "איסור והיתר", "recommendedOrder": 4, "id": "bitulberov"}, {"topic": {"title": "תערובות ונ\"ט", "eyebrow": "מבחני הרבנות · איסור והיתר · סימן צ\"ח", "siman": "Shulchan_Arukh,_Yoreh_De'ah.98", "intro": {"lead": {"t": "", "ref": ""}, "body": "סימן צ\"ח עוסק בלב ליבה של סוגיית הכשרות: **תערובת**. השאלה המרכזית היא מה נחשב בשר וחלב (או איסור והיתר) של ממש — כלומר, מתי אנו מתייחסים לתערובת כאסורה. התשובה התנאית: **טעם כעיקר** — כל תערובת מותרת כל עוד טעמו של האיסור אינו מורגש.\n\nלצד עקרון זה נבחנים החילוקים היסודיים: **טעם מול ממשות**, **מין במינו מול מין בשאינו מינו**, **יבש ביבש מול לח בלח**, ודרכי הביטול (**ביטול ברוב**, **ביטול בשישים**, **טעימת גוי**)."}}, "sections": {"mahi": {"title": "מהי תערובת? סיכום מפורט", "seif": null, "sugya": null, "ops": [{"layer": "prose", "src": null, "srcRef": null, "txt": "סימן צ\"ח עוסק בלב ליבה של סוגיית הכשרות: תערובת. מדובר בהגדרות יסוד המיישמות את הציוויים מן הפסוקים ומסימנים אחרים (כגון פ\"ז-פ\"ט). כך, \"לא תבשל גדי בחלב אמו\" בסימנים פ\"ז-פ\"ט עובר תהליך שעיקרו בהגדרת בשר והגדרת חלב כשלעצמם (כלומר, איזה בשר ואיזה חלב אסור לאכול יחד, מה דאורייתא ומה דרבנן, באיזה איסור בכל שילוב – בישול/אכילה/הנאה וכו'), ובסימן הזה השאלה העיקרית היא מה נחשב בשר **ו**חלב; כלומר, מתי אנחנו מתייחסים לתערובת של בשר וחלב כבשר וחלב של ממש? מתי אנחנו אומרים שהבשר התערב בחלב? מה מגדיר זאת? (כמובן שהשאלות דומות כמעט לגמרי כאשר מדובר בתערובת של איסור והיתר).\\note{ההבדל המעניין בין תערובת בשר בחלב (שהיא תערובת של שני דברים שכשלעצמם מותרים) לשאר תערובות עיקרו בהגדרת חנ\"נ ומחלוקת ר\"ת ור' אפרים שם. זו עולה מפעם לפעם לאורך סימני החומר.}"}, {"subhead": "טעם כעיקר – בנותן טעם"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "התשובה התנאית לשאלות האחרונות שהעלנו היא **טעם כעיקר**. לפיכך, כאשר טעם של חלב מורגש בבשר – אנו אומרים כי יש בפנינו תערובת בשר בחלב שהיא אסורה. הדבר נכון גם לגבי תערובת של איסור והיתר.\nלפיכך, כל תערובת שהיא תהיה מותרת כל עוד טעמו של האחד לא מורגש."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "המקור לכלל זה הוא מן הציווי על נזיר למנוע עצמו מיין וענבים, כאשר בתוך כך מתייחסים הפסוקים גם למים ששרו בהם ענבים: \"מִיַּיִן וְשֵׁכָר יַזִּיר חֹמֶץ יַיִן וְחֹמֶץ שֵׁכָר לֹא יִשְׁתֶּה **וְכָל־מִשְׁרַת עֲנָבִים** לֹא יִשְׁתֶּה וַעֲנָבִים לַחִים וִיבֵשִׁים לֹא יֹאכֵל\". וכך לומדים ב\\ref{ספרי במדבר}{Sifrei_Bamidbar.23} (פר' נשא) כי הוספה זו של משרת ענבים לציווי מלמדת שטעם כעיקר (שהרי המים אינם ענבים, אלא שיש בהם טעם הענבים). \"ומכאן אתה דן לכל איסורים שבתורה\" שטעם כעיקר (ולא רק בנזיר).\nב\\ref{פסחים מד}{Pesachim.44a} (פ' אלו עוברין) מביאה גם הסוגיה לימוד זה (או לפחות דומה לו)."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "יש לציין כי הגמרא מציגה בשם **ר' עקיבא** אלטרנטיבה ללימוד הזה מן הפסוקים, לפיה יש ללמוד ממשרת כי **היתר מצטרף לאיסור**. בהתאם לכך, מציעה הגמרא כי את הלימוד של טעם כעיקר ניתן לעשות ממקום אחר: בשר בחלב.\\note{זוהי, כביכול, שיטת רבי עקיבא. שווה להאריך ולעיין בפנים. הדבר נוגע עמוקות בשאלות של דרכי הלימוד והמתודה של הגמרא. לדעתי (וכך העלינו בשיחתנו אני והרב אורי), אין באמת שיטת ר' עקיבא בדיוק כך. נלענ\"ד כי היא מכירה מסורת/שמועה לפיה ר' עקיבא נשען על 'משרת' כדי ללמוד כי היתר מצטרף לאיסור. בעקבות כך, בצורה אופיינית לגמרא, היא מזהה בכך התנגשות וסתירה לאפשרות הראשית ללמוד ממשרת את 'טעם כעיקר'. לפיכך, היא מציעה כי מאחר ומפסוק זה ר' עקיבא לומד 'היתר מצטרף לאיסור', את 'טעם כעיקר' הוא לומד ממקום אחר: איסור בשר בחלב. הסיבה שאנו 'מאשימים' את הגמרא בעיצוב של ר' עקיבא כרצונה היא העובדה שבאופן יחסי, הלימוד של ספרי (הלא הוא מדבי ר' ישמעאל) את טעם כעיקר ממשרת הוא די משכנע, ויכול להיות שהוא אף מתבקש (מה שניתן לכנות 'מדרש הלכה יוצר'). לכן, אין זה סביר ללמוד את 'טעם כעיקר' ממקום אחר.}\n**להלכה**, נפסקו דברי **ר' יוחנן בפסחים מד** שאין היתר מצטרף לאיסור, אלא רק לענייני נזיר. אבל טעם כעיקר – אמרינן בכל התורה (ובכל מקרה, אין עניינם של שני כללים זה לזה, ואין ביניהם תלות. וכ\"כ ערוה\"ש)."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "הראשונים נחלקו אם כלל זה הוא מדאורייתא או מדרבנן; ונפק\"מ לעניין ספק.\n**רש\"י, רמב\"ם** – דרבנן; **ר\"ת, רשב\"א, רא\"ש, טור** – דאורייתא (ראיה: תורה ציוותה בגיעולי כלים).\nהרמב\"ם סבר כך כשיש רק טעם. אבל טעמו **ו**ממשו כשיעור - דאורייתא. **ב\"י** מעמיד כך גם את רש\"י."}, {"subhead": "טעם לעומת ממשות"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "על פניו, אם אכן 'טעם כעיקר' - ממשותו הפיזית של האיסור שהתערב בהיתר אינה רלוונטית כלל. אלא שאצל האמוראים מופיע חילוק בין שני סוגים של תערובות: 'טעמו וממשו' ו'טעמו ולא ממשו'.\nמדברי **ר' אבהו ר' יוחנן** (ע\"ז פ' השוכר) עולה כי טיבו של החילוק בין השניים הוא בין דאורייתא לרבנן, וכך: טעמו וממשו – לוקין על אכילתו; טעמו ללא ממשו – אסור אך אין לוקין על אכילתו.\n**אביי** (חולין ק\"ח) חולק וסובר שגם טעמו ולא ממשו – דאורייתא."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "אם כן, נראה שהראשונים הסוברים כי טעם כעיקר הוא דרבנן (רמב\"ם, רש\"י), בעצם פוסקים כר' יוחנן ופשוט סוברים זאת לגבי טעם ולא ממש, אך טעמו וממשו אסור מן התורה (וכ\"כ **ב\"י** ו**ערוה\"ש**; ולפי זה נתאים דשאר הראשונים פוסקים כאביי. ונראה שגם ה**שו\"ע** נקט כמותם).\\note{לפי רש\"י והרמב\"ם צ\"ל שכל הלימוד של מִשרת הוא אסמכתא בעלמא. והעובדה שזה נלמד גם מנזיר וגם מגיעולי כלים מחזקת את זה שמדובר באסמכתא, שהרי הוה שני כתובין הבאים כאחד ואין מלמדים. וגם: מהתורה איסור בטל ברוב.}"}, {"subhead": "מהגדרת ממשות"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "**דבר שיש לו ממשות אך אבד בתערובת ואינו ניכר בעין**: החתיכות – מותרות אם חתיכת האיסור בטלה ברוב; הרוטב - בנ\"ט (**משנה פ' ג\"ה**; ב\"י מביא ב-צ\"ב, ג').\n**דבר שנימוח**: פשוט מתייחסים לממשותו כאילו אינה, ומתחשבים רק בטעם (רמב\"ם לפחות).\n**דבר שלא נימוח והוצא**: עדיין משערים ב-60 כנגד כולו, משום שאי אפשר לשער כמה טעם יצא ממנו (זה נאמר **בפ' ג\"ה** גבי כחל, ו**הרשב\"א והתרומה** למדו זאת לכל דבר. וכ\"פ **השו\"ע (ד')**).\n**ממשות ולא טעם** – על אף שטעם כעיקר, וכביכול משמע שממשות בלא טעם אינה חשובה, נקטו האשכנזים שיש להוציא הממשות (וכגון שאיסור התערב בהיתר, ויש 60 כנגדו, אם הוא שלם וניתן להוציאו - עושים כן) (**או\"ה**, **רמ\"א ד'**)."}, {"subhead": "סוגי תערובות: מין במינו/בשאינו מינו; יבש ביבש/לח בלח"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "טעם כעיקר, וכאשר לא מורגש הטעם – אין איסור. נקודת הנחה מציאותית-הלכתית הרלוונטית לכך (שלמיטב הבנתי מוסכמת לכל) היא ההבדל היסודי בין שני סוגי תערובות: מין במינו ומין בשאינו מינו.\nלפיכך, בתערובת של מאכלים איסור והיתר שהם מאותו מין, טעם האיסור אינו מורגש, מפני שטעמם זהה. לעומת זאת, בתערובת מאכלים שאינם מאותו מין, הטעם מורגש.\nחלוקה נוספת בין סוגי תערובת מתייחסת לסמיכות המאכלים: יבש ביבש לעומת לח בלח (או לח ביבש). דין תערובת של לח חמור יותר מאשר תערובת של יבש, מאחר והמאכלים נבללים זה בזה."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "אם כן, אלו ארבעת סוגי התערובות ודינם:\n    **יבש ביבש – מין במינו:** בטל ברוב\n    **יבש ביבש – מין בשאינו מינו:** אסור מדרבנן ובטל ב-60\n    **לח בלח – מין במינו:** אסור מדרבנן ובטל ב-60\n    **לח בלח – מין בשאינו מינו:** אסור מהתורה ובטל ב-60\n(פירוט המקורות והדיון על חלוקות אלו וארבעת סוגי התערובות הוא בסימן ק\"ט).\\note{הדיון רחב יותר בהגדרות אלו מתרחש בק\"ט, ושם הטבלה המסכמת את כלל סוגי התערובות. ועיין בדעת הש\"ך גבי מין במינו שהולכים אחר הטעם ולא השם.}"}, {"subhead": "ביטול בשישים, ביטול ברוב וטעימת גוי"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "יש שני אופנים בהם ביטול בשישים מופיע: כשיש טעם איסור מורגש (מין בשאינו מינו), וכשאין טעם איסור מורגש (מין במינו).\n\\ul{כשטעם איסור מורגש}: שיערו חכמים כי כל טעם יתבטל ולא יורגש עוד כאשר האיסור המעורב ביחס של אחד לשישים של היתר. על פניו, כל עוד ניתן לטעום ולהיווכח בקיומו/חסרונו של הטעם – נקבע לפיו; אלא שמאחר ולרוב אנו מדברים על תערובות שבטעימתן מסתכנים באכילת איסור – תקנו חכמים שיעור זה כחלופה (אבל בתרומה שהתערבה בחולין למשל, ניתן להביא לכהן שייטעם אם טעם התרומה ניכר).\nאחת הדרכים להתמודדות עם אי-היכולת לטעום היא **גוי**. ונחלקו על כך להלכה הראשונים והשו\"ע-רמ\"א: לשו\"ע ניתן להיעזר בגוי מומחה (קפילא), או בגוי הדיוט המסיח לפי תומו; אך לרמ\"א אין סומכין אגוי בזמן הזה, וצריך לשער בשישים."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "\\ul{כשאין טעם איסור מורגש}: על אף שבתערובת של מין במינו הטעם אינו מורגש, אין פירוש הדבר כי תהיה מותרת. ותקנו חז\"ל שיש לבטל את האיסור בשישים. אולם, בשונה ממין בשאינו מינו, מאחר ולא ניתן לעמוד כאן על הטעם, אין השיעור חלופה, אלא גזרת חכמים שמא יבואו לעשות כן במין בשאינו מינו (שבו יש טעם). כך לפחות לפי הרא\"ש. אבל להבנתי, יסוד הדבר במחלוקת רב ושמואל עם ר' יוחנן ור\"ל אם מין במינו אוסר במשהו או בנ\"ט. ואזי ביטול ב-60 במין במינו הוא חלופה לשיעור נ\"ט שסוברים ר' יוחנן ור\"ל, מכורח העובדה שאי אפשר להבחין בטעם."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "**ואיך כל אלו מתבטאים להלכה ואצל השו\"ע?** השמועה בשם **רבא** מסכמת בתמציתיות את עקרון נ\"ט ויישומו בסוגי התערובות: כולל הפסיקה כר' יוחנן ור\"ל במין במינו, ותערובת שאי אפשר לטעום אותה בגלל איסור:\n    אמור רבנן – בטעמא\n    אמור רבנן – בקפילא\n    אמור רבנן – בשישים\nכלומר: **טעם כעיקר**; ובמין בשאינו מינו, כאשר ניתן להרגיש טעם אך א\"א מצד איסור – נעזרים ב**קפילא**; וכאשר אין קפילא, משערים ב**שישים** כי אמור; ובמין במינו גם אמרינן בנ\"ט (ר' יוחנן ור\"ל), אך משערין בשישים כי א\"א להרגישו.\\note{לפיכך מסתבר, כי בדברים המסורים בשם רבא: \"אמור רבנן ב-60... ולפיכך מין במינו דליכא למיקם אטעמא\", יש העדפה ברורה לר' יוחנן ולר\"ל כי ניתן לבטל מין במינו. אולם באמת יש להקשות מדוע 'טעם' הוא הקריטריון ולא חשבו על קריטריון חלופי. שימוש בקריטריון שאינו רלוונטי בד\"כ משמש לגזירת חכמים שמא, וכמו שנימקתי לעיל. ונ\"ל כי כיוון למחשבה ניתן למצוא בדיון בק\"ט, בהבדל שבין תערובת יבש ללח.}"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "ועל גבי מימרת רבא בונה הש\"ע את דבריו בסעיף א':"}, {"layer": "shulchan", "src": "שו\"ע (א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.1", "txt": "טעם כעיקר דאורייתא. אך מתי בטל – חילק בין מין במינו/שלא במינו:\n  מין בשאינו מינו – מן התורה צריך ביטול ב-60\n  מין במינו – מן התורה בטל ברוב. מדרבנן צריך 60"}], "pesak": null}, "taam_1": {"title": "טעם כעיקר (א')", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "במדבר · נשא", "srcRef": null, "txt": "**במדבר**, **נשא**:\nמִיַּיִן וְשֵׁכָר יַזִּיר, חֹמֶץ יַיִן וְחֹמֶץ שֵׁכָר לֹא יִשְׁתֶּה\n**וְכָל־מִשְׁרַת עֲנָבִים לֹא יִשְׁתֶּה**\nוַעֲנָבִים לַחִים וִיבֵשִׁים לֹא יֹאכֵל", "ref": {"label": "במדבר · נשא · ו", "ref": "Numbers.6.3"}}, {"layer": "gemara", "src": "פסחים מד (פ' אלו עוברין)", "srcRef": null, "txt": "**ברייתא:** משרת - ליתן טעם כעיקר [ולא ללמדנו שהיתר מצטרף לאיסור]\nכלומר: דין משרת ענבים, שגם הוא אסור על נזיר כענבים, בא ללמדנו שנותן טעם כעיקר; והגמרא לומדת שטעם כעיקר אמרינן בכל איסורים שבתורה.\n[**ר' עקיבא** – לומד מ'משרת' שהיתר מצטרף לאיסור - מים ששרה בהם ענבים (והוציאם) מצטרפים לאסור עם ענבים בכשיעור.\n**חכמים** – לומדים מ'משרת' שנותן טעם כעיקר – מים ששרה בהם ענבים והוציאם אוסרים בכשיעור (אפילו ללא צירוף של ענבים אסורים ממש)]", "ref": {"label": "פסחים · מד", "ref": "Pesachim.44a"}}, {"subhead": "בנ\"ט – כיצד?"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "**רש\"י**: אם אפשר לטעום – לא מתבטל כל עוד יש טעם (גם אם יש 60); כל שאי אפשר לטעום (אי משום דהוי מין במינו, אי משום שהוי איסור) – בטל ב-60.\nכלומר: תמיד צריך שישים (גם אם אין טעם). וכשאפשר לטעום (ע\"י גוי) – צריך לוודא שאין טעם."}, {"layer": "rishon", "src": "רמב\"ם · ב\"י", "srcRef": null, "txt": "**רמב\"ם**, **ב\"י**: 'טעם כעיקר' לקולא ולחומרא (אם אין טעם – לא צריך 60; אם יש 60 – בוודאי אין טעם).", "under": true}, {"layer": "shulchan", "src": "שו\"ע (א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.1", "txt": "**שו\"ע (א')** פסק כרמב\"ם (מהא דנקט יטעמנו עכו\"ם: אם אומר שאין בו טעם חלב - מותר. ולא הצריך 60)."}, {"layer": "note", "src": "הערה", "srcRef": null, "txt": "(המחלוקת אם 'טעם כעיקר' מהתורה או מדברי חכמים מפורטת בסעיף מין במינו/בשאינו מינו)."}], "pesak": null}, "taam_2": {"title": "טעימת גוי (א')", "seif": null, "sugya": null, "intro": "הפתרון של טעימת תערובת ע\"י גוי מופיע בגמרא ב'מימרת רבא', ואף כמה שורות קודם לכן כאשר שואלים את ר' יוחנן לגבי כילכית שבאלפס בשר. השאלה שמעסיקה אותנו היא האם גוי נאמן בתשובתו (או שמא נחשוש שיישקר).", "ops": [{"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "**רשב\"א**: קפילא יכול לטעום גם אם לא מסל\"ת; הדיוט רק אם מסל\"ת."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "**רמב\"ם**: אפילו הדיוט יכול לטעום.", "under": true}, {"layer": "acharon", "src": "רא\"ש לפי ב\"י", "srcRef": null, "txt": "**רא\"ש** לפי **ב\"י**: העיקר שיסיח לפי תומו.", "under": true}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: מצרף כל אלו כדי לפסוק."}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.1", "txt": "**שו\"ע**: הדיוט – רק אם מסל\"ת; קפילא – אפילו לא מסל\"ת."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: אין גוי נאמן באיסורי תורה, אך מאחר ואח\"כ יטעם הישראל – לא ישקר, ולכן נאמן בזה.", "under": true}, {"layer": "rama", "src": "אגור · רמ\"א", "srcRef": null, "txt": "**אגור, רמ\"א**: גוי אינו נאמן לעולם."}, {"layer": "prose", "src": "סיכום שיטות הראשונים", "srcRef": null, "txt": "**רשב\"א**: קפילא – תמיד; שאר בני אדם – רק אם מסיחים לפי תומם.\n**תוס'**: סמכינן אקפילא (לא משקר כדי לא להפסיד אומנותו).\n**ר\"ן**: גוי שאינו קפילא – לא סמכינן, משום דגוי משקר.\n**רש\"י**: ישראל תמיד נאמן.\n**רמב\"ם**: אפילו גוי שאינו קפילא, ונראה שסובר אפילו אם אינו מסיח לפי תומו.\n**רא\"ש** לפי **טור**: רק קפילא – רק לפי תומו (ולא יודיעוהו); **ט\"ז** מצדד בכך. **רא\"ש** לפי **ב\"י**: אין הוא מחמיר בהכרח שצריך דוקא קפילא (אלא רק שאם מביאים קפילא, צריך שיהא מסיח לפי תומו).\n**אגור**: לא סמכינן אגוי שיטעם כלל."}, {"layer": "acharon", "src": "ב\"י (א')", "srcRef": null, "txt": "**ב\"י (א')**: \"ונראה לי שמאחר שהרמב\"ם מיקל בדבר יש לסמוך על סברת התוספות והרשב\"א והר\"ן דלא מצרכי בקפילא שיהא מסיח לפי תומו, ובנכרי דלאו קפילא סמכינן ארמב\"ם והרשב\"א דשרו ביה, והרא\"ש לא אשכחן דפליג; ומיהו נראה שצריך שיהיה מסיח לפי תומו כיון דלאו קפילא הוא\".\nאם כן: קפילא - אפילו שלא לפי תומו; לא קפילא – מסיח לפי תומו."}, {"layer": "shulchan", "src": "שו\"ע (צח, א)", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.1", "txt": "**שו\"ע (צח, א)**: נראה שפסק לפיכך על סתם גוי (שאינו קפילא) שצריך שלא ידע שסומכין עליו (מסיח לפי תומו)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: היאך מאמינים לגוי? הרי פסק השו\"ע בס' ב' שמין בשאינו מינו אם נותן טעם – דאורייתא, ובבבא בתרא נקטינן גוי שאינו מסיח לפי תומו אינו נאמן באיסור תורה. ומתרץ שבמין בשאינו מינו קפילא נאמן, משום שאפשר לעמוד על הטעם בעצמנו, לכן לא ישקר.", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "**ט\"ז**: לישראל מותר לטעום בלשונו (גבי בשר שאין ידוע אי מלוח אי לא), אבל כאן טעימה בלשון לא מספיקה.", "under": true}, {"layer": "acharon", "src": "נו\"ב", "srcRef": null, "txt": "**נו\"ב**: כתב ד**הצ\"צ** לא התיר אלא טעימה בלשון, ומסיק דאף טעימה בלשון אינה מותרת כי אם באיסור פגום ולא בכל איסורי דרבנן.", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: אגור (לא סמכינן אגוי בזמן הזה, משערינן ב-60 הכל)."}, {"layer": "acharon", "src": "עט\"ז · לבוש", "srcRef": null, "txt": "**עט\"ז, לבוש**: לא סמכינן גם על ישראל (כגון כהן שיכול לטעום תרומה).", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: חולק על עט\"ז. וודאי שמדברי הרמ\"א משמע שהבעיה היא רק באמון בגוי, וישראל נאמן תמיד.", "under": true}], "pesak": null}, "taam_3": {"title": "ממשות (ד')", "seif": null, "sugya": null, "ops": [{"subhead": "טעמו ולא ממשו"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "ראינו כי נחלקו אביי ור' יוחנן אם טעם כעיקר מדאורייתא גם ללא ממשו (אביי) או רק עם ממשו (ר' יוחנן); וכן בראשונים. ונראה כי דעת השו\"ע כאביי והראשונים דכוותיה. הדבר ניכר גם מהשאלה הבאה: איסור שנתבשל עם היתר, ולאחר מכן שלפו את האיסור וזרקו אותו – האם יהיה אסור מדרבנן או מדאורייתא? השו\"ע סובר שצריך לשער בשישים, למרות שהוצאנו את ממשות האיסור, וזה מעיד שטעם כעיקר מן התורה."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "אך \\ul{עיקר סע' ד'} אינו בשאלת דאורייתא/דרבנן, אלא בשאלה: כנגד מה צריך לשער ב-60? כנגד כל האיסור, או רק כנגד הטעם שיצא ממנו? על פניו התשובה ברורה, שהרי טעם כעיקר. אלא שאנו למדים כי לא ניתן לשער כמה טעם יצא מן המאכל, ולכן משערים כנגד כל ממשותו (**רשב\"א**, וכ\"פ **שו\"ע**); ולפיכך, גם כאשר מוציאים את ממשות האיסור - משערים ב-60 כנגד כולה.\nהדבר נכון גם לכלי שבלוע בטעם בשר/חלב/איסור: כאשר הוא פולט, מאחר ואין אנו יודעים בכמה טעם הוא בלוע, אנו משערים כנגד כל הכלי (גם **רשב\"א**, וכ\"פ **ש\"ע**). לפיכך, אם מדובר בכלי שהוכנס לתבשיל ובכך פלט – וכגון כף – אנו משערים כנגד חלק הכלי שנכנס לתבשיל."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "האם ישנו מקרה שבו כן נוכל לשער כמה טעם נפלט? נראה כי בכלים חדשים, שעדיין אינם בלועים בטעם, יש לנו מצע נקי שיאפשר לחשב כמה ייפלטו (אם נדע כמה ייבלעו). וכך, אם משתמשים בכף חדשה לכמות x של חלב, ולאחמ\"כ תוחבים אותה לקדרת בשר – ניתן לשער ב-60 כנגד x, ולא כנגד כל חלק הכף שנתחב (גם **רשב\"א**, וכ\"פ **שו\"ע (ה') ורמ\"א**. אך השו\"ע מביא בי\"א גם את דעת הרמב\"ן, שלא מחלק בין כלי חדש לישן).\nשאר הדיון לגבי שיעור בליעת כלים – ובו גם דעת ר' פרץ גבי כף של מתכת - נמצא ב**צ\"ד**."}, {"subhead": "ממשו ולא טעמו"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "על אף שטעם כעיקר, סבר **האו\"ה** שאם מכירים את האיסור שנפל לתערובת – יש להוציאו. וכן פסק **הרמ\"א (ד')**."}, {"subsubhead": "שיעור כנגד הממשות – בסוגיה בפ' גיד הנשה"}, {"layer": "gemara", "src": "פ' גיד הנשה · כחל", "srcRef": null, "txt": "**בסוגיה בפ' גיד הנשה**, גבי כחל, שמשערינן בדידיה (ולא במאי דנפק מיניה).", "ref": {"label": "חולין · פרק גיד הנשה", "ref": "Chullin.97b"}}, {"layer": "rishon", "src": "ארחות חיים", "srcRef": null, "txt": "**ארחות חיים**: במה שדומה לכחל – משערינן במאי דנפק מיניה; כחל – משערינן בדידיה."}, {"layer": "rishon", "src": "רשב\"א · בעל התרומה", "srcRef": null, "txt": "**רשב\"א, בעל התרומה**: בכל דבר משערים כנגד כולו! כי א\"א לדעת כמה יצא ממנו. וכל זה אפילו באיסורי דרבנן.", "under": true}, {"layer": "shulchan", "src": "שו\"ע (ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.4", "txt": "**שו\"ע (ד')**: איסור שהתבשל עם היתר – צריך לשער בשישים כנגד כל האיסור אפילו אם הוציאו אותו שלם (**רשב\"א**)."}, {"subsubhead": "כף/קדירה טרפה"}, {"layer": "rishon", "src": "רשב\"א · רמב\"ן · תוס'", "srcRef": null, "txt": "**רשב\"א, רמב\"ן, תוס'**: צריך לשער בשישים ביחס לכף."}, {"layer": "rishon", "src": "הראב\"ד", "srcRef": null, "txt": "**הראב\"ד**: מחלק בין כלי שיכול לחזור להיתרו לכלי שלא יכול. ורק אם אינו יכול לחזור להיתרו – מתייחסים אליו כאיסור גמור ומשערים את התבשיל ב-60 ביחס אליו; אבל אם יכול לחזור להיתרו – אומדין כמה איסור יצא מן הכף, וביחס אליו צריך 60.", "under": true}, {"layer": "acharon", "src": "מרדכי בשם ראבי\"ה", "srcRef": null, "txt": "**מרדכי** בשם **ראבי\"ה**: היאך משערים ששים נגד כל הכלי האסור? ממלאים כלי גדול מלא מים ויתן הקדרה האסורה תוך אותו כלי, והמים היוצאים [הן הן שיעור] דופני הקדרה, וישער בהיתר כנגד אותם המים."}, {"layer": "rishon", "src": "ר' פרץ", "srcRef": null, "txt": "**ר' פרץ**: החמיר בכף של מתכת להצריך 60 כנגד כולו (אפילו לא הכניס כולו), משום דחם מקצתו חם כולו.", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.4", "txt": "**שו\"ע**: נראה שפסק כסיעת התוס', והביא שיש מחמירים כר' פרץ."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**:\n+ כל מה שאמרינן שצריך 60 כנגד הכלי הבלוע איסור, זה רק אם בלע ע\"י אש, ולא ע\"י מליחה. אם ע\"י מליחה – צריך לשער רק כדי קליפה.\n+ ונוהגים שלא כר' פרץ.\n+ אם אפשר – צריך להוציא את האיסור, ועל אף שהוא בכל מקרה בטל בשישים. ואפילו אם נפל חלב לתבשיל – יש להוציאו ע\"י שפיכה של מים קרים, ואזי החלב יקפא ויהא אפשר להוציאו (**מרדכי**).\n+ איסור שהוציאוהו ונפל שוב לאותה קדירה – צריך לבטלו בשישים (ולא בכמות כפולה של 120)."}, {"subsubhead": "סעיף ה' – כלי חדש מול ישן"}, {"layer": "rishon", "src": "טור עפ\"י רשב\"א", "srcRef": null, "txt": "**טור**, עפ\"י **רשב\"א**: סעיף ד' דינו כן משום שאין אנו יודעים כמה איסור נבלע בכלי. אך אם מדובר בכלי חדש, ואנו יודעים בדיוק כמה נבלע (כגון כף חדשה ששם בה חלב ומתחבה לתבשיל בשר)? אזי אפשר להסתפק ב-60 כנגד הכמות שיודעים שבלע (כזית). אבל אם כלי משומש שאין יודעין כמה בלע – צריך לשער ב-60 כנגד **כל** הכף."}, {"layer": "rishon", "src": "רמב\"ן · ר\"ן", "srcRef": null, "txt": "**רמב\"ן, ר\"ן**: בין בכף חדשה בין בישנה ידעינן מה בדיוק בלע, ורק לפי זה צריך לשער.", "under": true}, {"layer": "acharon", "src": "רמ\"א בדרכ\"מ", "srcRef": null, "txt": "**רמ\"א בדרכ\"מ**: כלי ישן = כלי שנאסר ע\"י בליעה (ע\"י אש) (**או\"ה**). כלי עץ מנוקב – לכתחילה אסור לאכול בו רותח, אבל בדיעבד מותר ולא צריך לשער ב-60 (כי מנוקב). כלי חרס מנוקב – אעפ\"י שמנוקב, צריך 60, ולא די בכדי קליפה."}, {"layer": "shulchan", "src": "שו\"ע (ה')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.5", "txt": "**שו\"ע (ה')**: פוסק כרשב\"א, ומביא ביש אומרים את דעת הרמב\"ן והר\"ן. אך נראה מלשונו ומדבריו בב\"י (וכן פי' הט\"ז), שדורש שני תנאים לאסור – בין יומו + נ\"נ."}, {"layer": "prose", "src": null, "srcRef": null, "txt": "ונראה שגם **הרמ\"א** סבר כרשב\"א, והביא את חילוקו של המרדכי (לעיל ס' ד) גבי הכלי בחרס (ולדידו רק בחרס יש חילוק בין חדש לישן)."}, {"layer": "acharon", "src": "ט\"ז · ש\"ך", "srcRef": null, "txt": "**ט\"ז**: לטור – כלי חדש = שאינו בן יומו (וכך גם ישן שאינו בן יומו חשיב חדש לעניין זה). ויש 'מחלוקת' בין הב\"י והטור איך למד הרשב\"א.\n**ש\"ך**: \"...המרדכי כתב דבדבר שיש לו הגעלה לא אמרינן ביה חנ\"נ כיון דאפשר להפריד האיסור משם ע\"י הגעלה\".", "expandable": true}], "pesak": null}, "min_1": {"title": "יסודות ומבוא", "seif": null, "sugya": null, "ops": [{"layer": "prose", "src": null, "srcRef": null, "txt": "כל מושגי היסוד של תערובות מוגדרים באופן מעורבב לאורך הסימן. הגדרת מין במינו ומין בשאינו מינו מתרחשת בין סעיפים א'-ג', כאשר החלק הארי עולה בסעיפים ב'-ג', בעוד מסעיף א' רק מגיעה החלוקה הבסיסית בין השניים. עוד רלוונטית העובדה היסודית הנידונה בסע' א' כי טעם כעיקר. כאן נבחן זאת נוכח החלוקה שבין מין במינו למבשא\"מ (ר' יוחנן ור\"ל - רב ושמואל), ואת שאלת הדאורייתא/דרבנן.\nכלל הדברים ייבחנו דרך הפסיקה במקרה של ספק: תערובת לפנינו/שנשפכה שאי אפשר לשערה. הנושאים הנבחנים:\n• טעם כעיקר במין בשאינו מינו – דאורייתא או דרבנן (רש\"י ורמב\"ם מול שאר הראשונים)\n• מין במינו – טעם כעיקר או במשהו (ר' יוחנן ור\"ל - רב ושמואל)\n• טעם כעיקר שבמין במינו – דרבנן (ר\"ת)\n• מה נחשב ספק?"}, {"subhead": "טעם כעיקר במין בשאינו מינו"}, {"layer": "gemara", "src": "ר' אבהו ר' יוחנן (ע\"ז סז)", "srcRef": null, "txt": "**ר' אבהו ר' יוחנן (ע\"ז סז)**: טעם לבד - לא לוקין; טעמו וממשו - לוקין.", "ref": {"label": "עבודה זרה · סז", "ref": "Avodah_Zarah.67a"}}, {"layer": "gemara", "src": "אביי (חולין קח · כל הבשר)", "srcRef": null, "txt": "**אביי (חולין קח, כל הבשר)**: אף טעמו ולא ממשו - דאורייתא.", "ref": {"label": "חולין · קח", "ref": "Chullin.108a"}}, {"layer": "rishon", "src": "רש\"י · רמב\"ם", "srcRef": null, "txt": "**רש\"י ורמב\"ם**: טעמו - דרבנן; טעמו וממשו - דאורייתא (וכ\"כ ב\"י וערוה\"ש בדעת רש\"י). (כר' יוחנן)"}, {"layer": "rishon", "src": "רשב\"א · רא\"ש · ר\"ת · טור", "srcRef": null, "txt": "**רשב\"א**, **רא\"ש**, **ר\"ת**, **טור**: טעמו - דאורייתא. (כאביי)", "under": true}, {"layer": "shulchan", "src": "שו\"ע (ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.2", "txt": "**שו\"ע (ב')**: מין בשאינו מינו שנתערב ונשפך כך שאי אפשר לשערו, אפילו אם יודעים שהיה רובו היתר – אסור (כלומר, \\ul{דאורייתא}. ונראה שאפשר להכריע עפ\"י סע' ד', שם השו\"ע פוסק שגם ללא ממשות המאכל צריך לשער ב-60)."}, {"subhead": "מין במינו"}, {"layer": "gemara", "src": "גמרא מנחות · ע\"ז", "srcRef": null, "txt": "**גמרא מנחות**: **רבי יהודה**: \"ולקח מדם הפר ומדם השעיר\" – מכאן למין במינו שאינו בטל. **חכמים**: מין במינו כן בטל.\n**בעבודה זרה (פ' השוכר)** מובאת מחלוקת אמוראים: מין בשאינו מינו - לכו\"ע אוסר רק בנותן טעם; מין במינו - **רב ושמואל** אוסר בכל שהוא (כר' יהודה), ו**ר' יוחנן ור\"ל** בנותן טעם כמו מבשא\"מ, ורק בטבל ויין נסך בכל שהוא.\nכלומר (יבש/לח): לר' יוחנן ור\"ל מין במינו יבש ביבש בטל ברוב; לח בלח ב-60 (מדרבנן, גזרו אטו מבשא\"מ. מהתורה בטל ברוב).", "ref": {"label": "עבודה זרה · פרק השוכר", "ref": "Avodah_Zarah.66a"}}, {"layer": "rishon", "src": "ראשונים", "srcRef": null, "txt": "**רש\"י, רי\"ף**: כרב ושמואל (בכלשהו). **ר\"ת**, **רי\"ף לפי רא\"ש**, **רמב\"ם והמון ראשונים**: כר' יוחנן (בנ\"ט)."}, {"layer": "rishon", "src": "טור · שו\"ע (א')", "srcRef": null, "txt": "**טור ושו\"ע (א')**: כרוב הראשונים - ר' יוחנן - בנ\"ט. ולפיכך, מאחר וא\"א לשער טעם במין במינו - משערינן ב-60."}, {"layer": "gemara", "src": "רבא בזבחים", "srcRef": null, "txt": "**רבא בזבחים**: אמור רבנן – מבשא\"מ בטעמא; אמור רבנן – מין במינו ברובא.", "ref": {"label": "זבחים · עח", "ref": "Zevachim.78a"}}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "**ר\"ת**: נ\"ט שבמין במינו - מדרבנן; מדאורייתא – בטל ברוב (מהתורה כר' יוחנן; מדרבנן כרבא).", "under": true}, {"layer": "shulchan", "src": "שו\"ע (ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.2", "txt": "**שו\"ע (ב')**: מין במינו שנתערב ונשפך ואין יכולין לשערו, אם יודעים שרובו היתר – מותר (כי ספק דרבנן לקולא)."}], "pesak": null}, "min_2": {"title": "בהגדרת מין במינו/שאינו מינו (רמ\"א ב')", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "האגור", "srcRef": null, "txt": "**האגור**: הולכים אחר השם ולא אחר הטעם."}, {"layer": "rama", "src": "רמ\"א (ב')", "srcRef": null, "txt": "**רמ\"א (ב')**: פסק כן."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: חולק. שהרי כל מה שאסרינן מין בשאינו מינו הוא משום דאפשר לטעום, אז וודאי שהטעם קובע.", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "**ט\"ז**: מנסה לומר ברמ\"א שגם זה שהוא אומר שהולכים אחר השם, כוונתו בטעם.", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "**ערוה\"ש**: התקשה בכך והפך עולמות כדי להבין את דעת הרמ\"א, והציע: זה רק לחומרא — מין במינו שדומים בטעם אבל שונים בשם חשיב מבשא\"מ; ומבשא\"מ (שונים בטעם) אבל דומים בשם – עדיין חשיב מבשא\"מ.", "expandable": true}], "pesak": null}, "min_3": {"title": "דין מין במינו/מבשא\"מ (ב'-ג')", "seif": null, "sugya": null, "ops": [{"subsubhead": "מין במינו"}, {"layer": "gemara", "src": "גמרא מנחות", "srcRef": null, "txt": "**תנן** התם: דם שנתערב בדם בהמה או בדם חיה – רואין אותו כאילו הוא מים. אך בפסוקים, דם פר ודם שעיר מעורבים מתייחסים אליהם בנפרד, ולא שנתבטלו.\nו**רבי יהודה** סבר מכאן: מין במינו אינו בטל. אך ל**חכמים** (מסיקה הגמרא): מין במינו בטל.", "ref": {"label": "מנחות · כב", "ref": "Menachot.22b"}}, {"layer": "gemara", "src": "גמרא ע\"ז (פ' השוכר את הפועל)", "srcRef": null, "txt": "**רב ושמואל**: כל איסורין שבתורה: שלא במינו – בנותן טעם; מין במינו - כל שהוא.\n**ר' יוחנן ור\"ל**: רק טבל ויין נסך מין במינו בכל שהוא; אבל שאר האיסורים - גם מין במינו וגם מין בשאינו מינו - רק בנותן טעם.", "ref": {"label": "עבודה זרה · פרק השוכר", "ref": "Avodah_Zarah.73a"}}, {"layer": "rishon", "src": "רי\"ף", "srcRef": null, "txt": "**רי\"ף**: יש גאונים שפסקו כר' יוחנן (עפ\"י הכלל); ויש שסברו כרב ושמואל (על אף הכלל), ורי\"ף לצידם."}, {"layer": "rishon", "src": "ר\"ת · רא\"ש · רמב\"ם", "srcRef": null, "txt": "**ר\"ת, רא\"ש, רמב\"ם**: כר' יוחנן. והרא\"ש כתב גם ששמע שהרי\"ף חזר בו. והב\"י הביא שכן הסכימו רוב הראשונים.", "under": true}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "**טור**: גם מין במינו – בטל רק ב-60 (כביכול, על אף שאין טעם)."}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "**ר\"ת**: מין במינו, בגלל שאין נותן טעם – מן התורה בטל ברוב; מדרבנן, ב-60.", "under": true}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: מין במינו שכתב הטור שבטל ב-60 – כר\"ת (דרבנן), ולא כרש\"י. ל**רש\"י** – מין במינו לא בטל כלל (אפילו ב-1000) (כר' יהודה בפ' כל הבשר קט)."}, {"subsubhead": "ספק (ס' ב'-ג')"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "מחלוקת הראשונים בשאלה אם 'טעם כעיקר' מדרבנן או מן התורה, יש בה נפק\"מ לעניין ספק. זאת, מתבטא גם בהבדל שבין מין במינו למין בשאינו מינו."}, {"layer": "shulchan", "src": "מין במינו שנפל", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.2", "txt": "\\ul{אם נתערב מין במינו ונפל}, ויודעים רק שהיה רוב (אבל לא אם היה 60): אמרינן שהווי דרבנן (**כר\"ת**) – וספק דרבנן להקל (מדאורייתא בטל ברוב, ורק מדרבנן צריך 60). וב**שו\"ע (ב')** פסק כן."}, {"layer": "shulchan", "src": "מין בשאינו מינו שנפל", "srcRef": null, "txt": "\\ul{אם נתערב מין בשאינו מינו}: אפילו אם יודעים שרובו היתר – אסור (גם **ר\"ת**).\n**ט\"ז**: מחמירין בזה בגלל שאפשר לחוש טעם האיסור.\n**ש\"ך**: ומה לגבי עוף וחלב שהם מדרבנן (סי' פ\"ז)? יוצא כאן מעין אבסורד! או\"ה מנסה לומר שבכל זאת בכגון מבשא\"מ דאורייתא. ש\"ך עצמו סובר שהווי דרבנן \\ul{וספיקא לקולא}.\n**ערוה\"ש**: פסק גם להקל בדרבנן מבשא\"מ."}, {"layer": "shulchan", "src": "גם ממינו וגם שאינו מינו", "srcRef": null, "txt": "\\ul{אם נתערב בתבשיל גם דבר ממינו וגם דבר שאינו מינו}: הולכין להקל, כאילו מדובר במין במינו – ומותר (כהעמדתו לקולא ברשב\"א).\n**ש\"ך**: מקשה – היאך רואים את שאינו מינו כאילו אינו? הרי סוף סוף הווי נ\"ט.\n**ט\"ז**: סובר להקל (אם המינו גובר במידה ניכרת)."}, {"subsubhead": "בהגדרת ספק (ג')"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "מדברי הרשב\"א ור' פרץ עולה דיוק של הגדרת מקרה הספק, ומה לא מקרי ספק."}, {"layer": "rishon", "src": "רשב\"א · א\"ח בשם ר' פרץ", "srcRef": null, "txt": "רק אם נשפך התבשיל לפני ששיערו כולו כראוי חשיב ספק. אבל אם פשוט לא יודעים טכנית לשער את האומדן – לא אמרינן ספק דרבנן לקולא."}, {"layer": "shulchan", "src": "שו\"ע (ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.3", "txt": "**שו\"ע (ג')**: פסק כן (רק תערובת שנשפכה חשיב ספק; תערובת שלפנינו אך מסופקים/לא יכולים לאמוד – לא)."}, {"layer": "rishon", "src": "הר\"ן", "srcRef": null, "txt": "נימוק לכך: אם לכל דבר שאנשים לא יודעים לשער נתייחס כספק, יהיו כל האיסורים בספק.", "under": true}], "pesak": null}, "beitzim": {"title": "ביצים", "seif": "ז׳", "sugya": null, "intro": "(עיקרו בסימן פ\"ו).", "ops": [{"layer": "gemara", "src": "פ' גיד הנשה", "srcRef": null, "txt": "מ**הגמרא בפ' גיד הנשה**: משמע שביצים צריך לבטל בשישים ו**אחת**.", "ref": {"label": "חולין · פרק גיד הנשה", "ref": "Chullin.98a"}}, {"layer": "rishon", "src": "רשב\"א · תוס' · רא\"ש · ר\"ן", "srcRef": null, "txt": "**רשב\"א**, **תוס'**, **רא\"ש**, **ר\"ן**: משמע מהסוגיה דהכא במאי עסקינן – אפרוח. אבל לא אפרוח – לא."}, {"layer": "rishon", "src": "רשב\"א · ר\"ן (עפ\"י הירושלמי)", "srcRef": null, "txt": "**רשב\"א ור\"ן** (עפ\"י **הירושלמי**): חילקו בין קלופות ל-לא קלופות, ומחמירינן בשאינן קלופות, דקלופה צריכה שיעור."}, {"layer": "rishon", "src": "רמב\"ן · רמב\"ם", "srcRef": null, "txt": "**רמב\"ן ורמב\"ם**: נראה שלא חילקו כך.", "under": true}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: נראה לחוש לדעת הירושלמי.", "under": true}, {"subsubhead": "למה הצריכו 61?"}, {"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "**הרמב\"ם**: משום שאפרוח הוא בריה, עשו בה סימן היכר להצריך 61."}, {"layer": "rishon", "src": "רמב\"ן · רא\"ש · ר\"ן · טור", "srcRef": null, "txt": "**רמב\"ן**, **רא\"ש**, **ר\"ן, טור**: לא כל הביצים באותו הגודל, אז 61 ביצים לא יבטלוה.", "under": true}, {"layer": "acharon", "src": "רשב\"א (על הרמב\"ם)", "srcRef": null, "txt": "**רשב\"א (על הרמב\"ם)**: לא באנו לבטל את הביצה עצמה, אלא רק פליטה (וכן נראה דסבר הב\"י)."}, {"layer": "prose", "src": "נפק\"מ בין הרמב\"ם לרמב\"ן", "srcRef": null, "txt": "**נפק\"מ 1:** לרמב\"ם, דין ה-61 שייך גם אם ה-61 הוא ביצים וגם אם הוא תבשיל; לרמב\"ן, הדין לא שייך בתבשיל, כי הבעיה שלו היא בגודלי הביצים.\n**נפק\"מ 2 (קולא לרמב\"ם):** ביצה טרופה אסורה שנתערבה עם ביצים אחרות - לרמב\"ם צריכה רק 60, משום שאינה נחשבת בריה עוד; אבל לרמב\"ן בוודאי יהא צריך עדיין 61 (כל עוד הביטול הוא עם ביצים)."}, {"layer": "shulchan", "src": "שו\"ע (פ\"ו · צ\"ח)", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.7", "txt": "**שו\"ע** (בסימן פ\"ו ובסימן צ\"ח):\n+ פוסק כגמרא שצריך 61.\n+ כדעת הרשב\"א שמבטלים **פליטתה** (ולא את הביצה עצמה).\n+ לא ניכר מלשונו במפורש אם מכריע כרמב\"ם או רמב\"ן, אבל ממה שהקשה הרשב\"א על הרמב\"ם, ומלשון הב\"י שם, נראה שמאחר שהלך השו\"ע כדעת הרשב\"א – סבר כדעת הרמב\"ן."}, {"subhead": "כחל ושיעורי ביטול (ח')"}, {"layer": "prose", "src": null, "srcRef": null, "txt": "**סעיף ח'** – כחל, ואילו איסורים בטלים ב-60."}, {"layer": "shulchan", "src": "טור · שו\"ע (ח')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.8", "txt": "כאן פוסק שכחל בטל ב-59."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "**רמב\"ם**: כל איסורי דרבנן (ככחל) בטלים בחמישים ותשע."}, {"layer": "rishon", "src": "רשב\"א · טור", "srcRef": null, "txt": "**רשב\"א, טור**: כל האיסורים (בין תורה בין דרבנן) בטלים ב-60, ורק כחל ב-59.", "under": true}, {"layer": "acharon", "src": "ב\"י · שו\"ע", "srcRef": null, "txt": "**ב\"י, שו\"ע**: נראה כרשב\"א."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.98.8", "txt": "**רמ\"א**:\n+ מביא עפ\"י הטור שכל האיסורים הנוהגים בזמן הזה מתבטלים בשישים (שלא כרמב\"ם), חוץ מחמץ בפסח ויין נסך.\n+ איסור הנותן טעם באותה קדירה והוא אסור מצד עצמו - אינו בטל, ואפילו באלף."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: לפיכך תבלין ומלח שעשויים לתת טעם, אינם בטלים אפילו באלף.", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "**ט\"ז**: מעלה שאלה לגבי 'עבידי לטעמא' שברמ\"א (כששמים משהו בשביל הטעם שלו): מדוע שומן של איסור בטל ב-60? הרי נותנים אותו כדי שייתן טעם. מביא שלדעת האו\"ה רק דבר חריף כמלח ותבלין אינו בטל, אבל שומן ושאר נותני טעם – לא אוסרים; והט\"ז סובר שמשמע בלשון הרמ\"א שכן סבר (רק חריף כתבלין ומלח).\n+ מביא עפ\"י ה**או\"ה**, שדבר שאסור מצד עצמו – אינו בטל בשישים. ו**הב\"י** כתב בסימן קי\"ב, דהוא הדין אף בדברים שאסורים מדרבנן.", "expandable": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "mahi"}, {"type": "group", "title": "טעם וממשות", "spans": "א׳ · ד׳", "children": ["taam_1", "taam_2", "taam_3"]}, {"type": "group", "title": "מין במינו / בשאינו מינו", "spans": "א׳–ג׳", "children": ["min_1", "min_2", "min_3"]}, {"type": "sec", "id": "beitzim"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"טעם כעיקר": " — כלל יסוד: טעם האיסור הבלוע בהיתר אוסר כאילו היה האיסור עצמו; כל תערובת מותרת כל עוד טעם האיסור אינו מורגש.", "מין במינו": " — תערובת של איסור והיתר מאותו מין (טעם זהה), שבה אי אפשר להבחין בטעם האיסור.", "מין בשאינו מינו": " — תערובת של מאכלים שאינם מאותו מין, שבה טעם האיסור מורגש.", "ביטול בשישים": " — שיעור שבו האיסור מתבטל: יחס של 1 ל-60 של היתר (כחלופה לטעימה, או כגזרת חכמים).", "ביטול ברוב": " — ביטול האיסור כשההיתר רוב; חל בעיקר ביבש ביבש מין במינו.", "קפילא": " — טבּח/מומחה גוי שנאמן לטעום את התערובת ולומר אם יש בה טעם איסור.", "מסיח לפי תומו": " — אמירת הגוי שלא מדעת שסומכים עליו — ואז נאמן, שכן אינו משקר.", "נ\"ט (נותן טעם)": " — מצב שבו האיסור נותן טעם בהיתר; אז אינו בטל אלא בשישים.", "טעמו וממשו": " — תערובת שבה גם טעם האיסור וגם ממשותו קיימים; לוקין עליה (דאורייתא לכו\"ע).", "טעמו ולא ממשו": " — טעם האיסור בלבד ללא ממשות; נחלקו אביי ור' יוחנן אם דאורייתא."}, "subject": "איסור והיתר", "recommendedOrder": 3, "id": "taarovot"}, {"topic": {"title": "מוקצה", "eyebrow": "מבחני הרבנות · הלכות שבת · סימנים ש\"ח–שי\"א", "siman": "Shulchan_Arukh,_Orach_Chayim.308", "intro": {"lead": {"t": "", "ref": ""}, "body": "**חלוקת הב\"י**\nסימנים ש\"ח-שי\"א בשו\"ע מוקדשים לעיסוק במוקצה ובטלטולו. אולם, לא לחינם הנושא מחולק לארבעה סימנים. אלא כל סימן מתרכז בשאלה אחרת.\n**סימן ש\"ח**: טלטול כלים ואוכל ומה נקרא כלי.\nמותר לטלטל כלים ואוכל. ור' יהודה ור' שמעון מסכימים על זה. לכן אין בש\"ח התעסקות במוקצה באמת. פשוט כשבמקרה מסוים דבר אינו נחשב כלי, יש בדיקה מאיזו סיבה אסור לטלטלו, ואיך כן יהיה מותר. בכל המקרים האלו, מודה ר\"ש לר\"י.\nוהם:\n**ממח\"כ (מפורש בסוגיה בדף קנז. במחלוקת רב אחא ורבינא. ופשוט ממשנת כל הכלים)\nממ\"ג (לומדים מהסוגיה של מוכני שיש עליה מעות)\nכשמל\"א (דאי לא תימא הכי, קשיא הלכתא אהלכתא)**\n\n**סימנים ש\"ט-ש\"י**: מחלוקת ר' שמעון ור' יהודה על מוקצה\nמאחר ור' שמעון 'מודה' על כל המוקצה שהוזכר לעיל, המחלוקת שעולה כאן היא על:\n**מוקצה מחמת איסור** (מחלוקת רב אחא ורבינא ב-קנז. וקיי\"ל כר' יהודה שיש מוקצה מחמת איסור. אבל 'הא דאין מוקצה לר\"ש באוכל אלא בגרוגרות וצמוקים, דוקא בתלוש; אבל במידי דמחובר אפילו לר\"ש הוי מוקצה')\n**בסיס לדבר האסור** (מהא דקיי\"ל כר' יהודה דיש מוקצה דבינה\"ש)\n**מוקצה מחמת מיאוס** (קיי\"ל כר' שמעון שמותר)\n\n**עבודת הב\"י — י\"ג מקרים שהותר לטלטל מוקצה מחמת גופו**\n\n**קבוצה א' – ראויים לשימוש ונחשבים כלים**\n**הא'** [הפיכת מוקצה לכלי על ידי חשיבה]\nיש דברים שמותר לטלטלם על ידי מחשבה כמו חריות של דקל ונסרים של אומן וחבילי קש ועצים שהתקינן למאכל בהמה ולבנים שנשארו מהבנין:\n**הב'** יש דברים שצריכים הכנסה ויחוד מקום כמו שאמרו (שבת נ.) מכניס אדם מלא קופתו עפר ועושה בה צרכיו והוא שייחד לו קרן זוית:\n**הג'** [הפיכת מוקצה לכלי ע\"י מעשה]\nיש דברים שצריכים שפשוף או למוד כמו שאמרו בגמרא (שבת קכה:) על נדבך של אבנים ואף על פי שלא הזכיר רבינו זה אני אזכירנו בע\"ה (סה. ד\"ה חריות):\n**הד'** כיסוי בור ודות ניטלים אם יש להם בית אחיזה:\n**הי\"ב** התירו לטלטל שברי כלים אף על פי דדמו לצרורות ובלבד שיהו עושין מעין מלאכה:\n\n**קבוצה ב' – מקום צורך גדול**\n[צורך בית הכסא וכבוד הבריות]\n**הה'** התירו לטלטל אבנים מקורזלות לצורך בית הכסא:\n**הו'** התירו לטלטל גרף של רעי כלומר כלי המיוחד לרעי ואין בו רעי מותר לטלטלו על ידי מים שנותן בו:\n**הי'** [גרף של רעי]\nהתירו לטלטל גרף של רעי כלומר הרעי עצמו מותר לטלטלו בין על ידי כלי בין שלא על ידי כלי:\n[מת. מפני הדליקה, וע\"י כיכר/תינוק]\n**הז'** התירו לטלטל המת מפני הדליקה:\n**הח'** התירו לטלטל המת מפני החמה על ידי ככר או תינוק:\n[היזק ברה\"ר]\n**הט'** התירו לטלטל קוץ המונח במקום שרבים דורסים בו כדי שלא יזוקו:\n\n**קבוצה ג' – באופן עקיף (בגופו, מן הצד, ניעור בסיס)**\n**הי\"א** התירו לטלטל קליפי אגוזים על ידי שמסלק הטבלא ונוערה וענין סילוק זה יתבאר לקמן (סה: ד\"ה ומ\"ש ופרורין):\n**הי\"ג** [בגופו או מן הצד]\nהתירו לטלטל האיסור בגופו שלא בנענוע ידיו כדתנן (שבת קמא.) קש שעל המטה מנענעו בגופו, אבל אם על ידי נענוע ידיו מטלטל האיסור ואפילו אם אינו נוגע בו זה נקרא טלטול מן הצד ואסור כל שהוא צריך לדבר האסור:\n\n**היתרים של בסיס לדבר האסור**\nכלי שמלאכתו להיתר שמונח עליו אחד מהדברים המוקצים מחמת גופם כגון חבית שיש עליה אבן וכר שיש עליו מעות יש בו גם כן דרכי היתר ומספרם ה':\n**דוגמא 1 - שלא הונח מדעת**\n**הא'** אם לא הונחו שם מדעת אלא ששכחם שם מותר להטות החבית כדי שתפול האבן ולנער הכר והמעות נופלות דטלטול מן הצד לצורך דבר המותר שרי\nומטעם זה צנון שטמנו בקרקע אם מקצת עליו מגולות נוטלו אף על פי שבנטילתו מזיז עפר ממקומו וכן פגה שטמנה בתבן מותר לתחוב בה מחט וליטלה:\n**הב'** אם היתה חבית זו בין החביות שאינו יכול להטותה או שהיה צריך למקום החבית והכר מגביהן כמו שהן עם האבן והמעות עליהם ומניחם במקום אחר כיון שלא הונחו שם מדעת:\n**דוגמא 2 - נעשה חלק מהכלי**\n**הד'** אבן שבקרויה שממלאין בה מים אם היא מהודקת מותר לטלטלה עם האבן מפני שהיא כדופן וכן כלכלה נקובה ונסתם הנקב באבן מותר לטלטלה עם האבן מזה הטעם:\n**דוגמא 3 - בסיס לדבר האסור ולדבר המותר שחשוב יותר**\n**הג'** אם יש ביד בנו שיש לו געגועין עליו אבן מותר ליטלו והאבן בידו ודוקא אבן אבל דינר לא:\n**הה'** כלי שמלאכתו להיתר שיש בו דבר איסור ודבר היתר ואי אפשר לנערם כגון כלכלה שיש בה אבן ופירות רטובים שאם ינערם יפסדו מותר לטלטלם וכן כנונא אגב קיטמא אף על גב דאיכא עליה שברי עצים משום דאי אפשר למינקט קיטמא לחודיה אפילו אי שדי ליה מכנונא והוא שדבר המותר חשוב מדבר האסור והוא שצריך לגוף דבר המותר או למקום הכלכלה והכנונא. ואחר שהצעתי לפניך כל זה אבוא לבאר דברי רבינו ואז תבין יראת יי' ודעת קדושים תמצא:"}}, "sections": {"yesodot_1": {"title": "מקור (דאורייתא/דרבנן)", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "רבה במסכת ביצה", "srcRef": null, "txt": "**רבה במסכת ביצה**, סבר שמוקצה הוא דאורייתא, ולמד זאת מן הפסוקים על ליקוט המן בשמות, שלפיהם עמ\"י 'הכינו את אשר הביאו'. לפיכך סבר שכל דבר שניטל בשבת צריך להיות מוכן לכך מער\"ש. ולפיכך כתב רש\"י שמה שנשאל במסכת פסחים אם מוקצה דאורייתא הוא..."}, {"layer": "rishon", "src": "רוב הראשונים", "srcRef": null, "txt": "אולם, **רוב הראשונים** לא מקבלים עמדה זו, וסוברים שהפסוקים בשמות הם רק אסמכתא בעלמא. ואת המקור למוקצה הם למדים מן הפסוקים **בנחמיה** (וכך **בברייתא** במסכתנו). וכן, **בירושלמי** הביא רבי אבהו (ברייתא המופיעה גם בבבלי דידן) שבתחילה היו כל הכלים ניטלים בשבת ומותרים לטלטול. אולם, מאחר ונחשדו להיות מחללים שבת בעקבות כך (כגון בכלי שמלאכתו לאיסור), נאסרו בטלטול כל הכלים, מלבד מספר כלים שהיו ככה\"נ נחוצים ממש;\nמקצוע של דבילה (סכין שחותכין בו דבלים)\nזוהמא לסטרן (כף שמסלקים בה הלכלוך מן הקדרה)\nסכין קטנה שע\"ג השולחן (ללחם ובשר)\nולאחמ\"כ חזרו והתירו וחזרו והתירו;  עד ש'בימי נחמיה בן חכליה נשנתה' המשנה בנ\"ל דבפרקנו: כל  הכלים ניטלין בשבת חוץ מן המסר הגדול ויתד המחרשה"}, {"layer": "gemara", "src": "ובגמרא", "srcRef": null, "txt": "**ובגמרא** מבואר שאלו כלים שאדם חס עליהם וקפיד עלייהו ומייחד להם מקום.\nועוד, מבואר בגמרא שם דהוא הדין לגבי סכינא דאשכבתא. וכן קורנס של בשמים (אולם קורנס של נפחים הוא כלי שמלאכתו לאיסור, משום שהוא ראוי לפצוע בו אגוזים ולכן ניתן לטלטלו לצורך גופו ומקומו)."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ולגבי סכינא דאשכבתא, נחלקו ראשונים מהו."}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "ולדעת **רש\"י**, הוא סכין של קצבים. (ומשום שהוא יקר וקפיד עלייהו כנ\"ל מייחד לו מקום ואין רצונו להשתמש בו לשום דבר אחר)"}, {"layer": "rishon", "src": "הרא\"ש", "srcRef": null, "txt": "ולדעת **הרא\"ש**, הוא סכין של מילה."}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "ולדעת **התוספות** סכין של שחיטה"}, {"layer": "note", "src": "סיכום", "srcRef": null, "txt": "וכל הני, הם מוקצה מחמת חסרון כיס ואסור לטלטלם כלל אפילו לצורך גופו ומקומו (אלא אם מטלטלם בגופו או מן הצד)"}], "pesak": null}, "yesodot_2": {"title": "טעמים", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "**רמב\"ם**\n1) שלא יהיו מתעסקים בכלי מלאכה ויבואו לעבור באיסור\n2) שמאחר ואנשים בטלו ממלאכה בשבת, יבואו לחפש במה להתעסק ונמצא ואין שבת\n3) שהיו אנשים שהיו בטלים בימות השבוע מעשייה ומלאכה, ולא ניכר בשביתתם ששבת. והרי בשבת הזהירו הנביאים שלא יהא הילוכך בשבת כהילוכך בחול"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "**ראב\"ד**\nשמא יטלטל מרשות לרשות (הוצאה)"}, {"layer": "acharon", "src": "מ\"מ", "srcRef": null, "txt": "**מ\"מ**\nהרמב\"ם מודה לראב\"ד, אלא שבתחילה היו אסורים מטעמו של הראב\"ד ולאחמ\"כ נצרכו הטעמים הנוספים של הרמב\"ם"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "נפק\"מ בין הטעמים"}, {"layer": "rishon", "src": "ולפי דעת הראב\"ד", "srcRef": null, "txt": "ולפי דעת הראב\"ד, וודאי שיהיה מותר לטלטל ביו\"ט מוקצה, משום שאין שייך בו איסור הוצאה מרשות לרשות"}, {"layer": "rishon", "src": "לדעת הרמב\"ם", "srcRef": null, "txt": "לדעת הרמב\"ם שייך וודאי גם ביו\"ט טפי, שהרי נמצינו שבתים ממלאכה אף בו."}], "pesak": null}, "yesodot_3": {"title": "היתרים", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "טלטול בגופו --"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "טלטול מן הצד --"}, {"layer": "acharon", "src": "מרדכי, רי\"ו, רמ\"א / מג\"א", "srcRef": null, "txt": "מותר לנגוע במוקצה (**ש\"ח מב**) ובלבד שלא ינענעו (**מרדכי, רי\"ו**, **רמ\"א**).\nו**המג\"א** כתב שנגיעה שלצורך המוקצה אסורה (עפ\"י גמרא שדנה על נר)"}, {"layer": "rishon", "src": "י\"א / הרא\"ש", "srcRef": null, "txt": "י\"א שכשמל\"א מותר לטלטל ע\"י דבר היתר שעליו, אפילו מחמה לצל. (ש\"ח ה; **הרא\"ש**).\nולשאר סוברים שרק מת ניתן לטלטל כך; וע\"י הנחת כיכר/תינוק.\nאולם, לכו\"ע \\ul{אם יש שם דבר המיועד לו} (כדין מדוכה שיש בה שום שבגמרא) מותר, משום שהווי כבסיס לדבר המותר (כמו שקדרה מתבטלת ביחס לתבשיל)"}], "pesak": null}, "yesodot_4": {"title": "סוגיות מרכזיות", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "ר' יהודה סובר שיש מוקצה ור' שמעון סובר שאין מוקצה 'אלא גרוגרות וצימוקים (שדחאם בידיים)\nאבל מתבאר כי ר' שמעון 'מודה' לר' יהודה בכל מיני מקרים וסוגים של מוקצה.\nבמחח\"כ, מחמת מיאוס, ומחמת איסור:"}, {"layer": "gemara", "src": "רב אחא ורבינא", "srcRef": null, "txt": "פליגי בה **רב אחא ורבינא**.\nחד אמר: כל השבת כולה כר' שמעון שאין מוקצה (אלא גרוגרות וצימוקים)\n\\ul{חוץ ממוקצה מחמת איסור}, שאז כר' יהודה\nחד אמר: כל השבת כולה כר' שמעון שאין מוקצה (אלא גרוגרות וצימוקים)\n\\ul{חוץ ממוקצה מחמת מיאוס}, שאז כר' יהודה\n\nאבל מוקצה מחח\"כ אפילו ר' שמעון מודה (דתנן, כל הכלים ניטלים בשבת חוץ מן המסר הגדול..)", "ref": {"label": "שבת · פרק מי שהחשיך · קנז", "ref": "Shabbat.157a"}}, {"layer": "shulchan", "src": "בטושו\"ע (ש\"י: א', ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.310.1", "txt": "מכאן גם נפסק כדעת המקל ברי\"ף וברא\"ש (בכל מקום שנחלקו רב אחא ורבינא הלכה כמקל)\nוכן **בטושו\"ע** (**ש\"י: א,ג'**), פסקו ש\\ul{קיי\"ל כר' שמעון במוקצה מחמת מיאוס שמותר}\nושקיי\"ל כר' יהודה שמוקצה מחמת איסור כר' יהודה שאסור\nומוקצה מחח\"כ נאמר לנו שר' שמעון מודה (הוסק כן עפ\"י המשנה בכל הכלים)"}], "pesak": null}, "memhak_1": {"title": "עיקר הדין ודוגמאות", "seif": null, "sugya": null, "ops": [{"subsubhead": "דוגמאות"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "מסר הגדול (במשנה כל הכלים)\nיתד המחרשה (במשנה כל הכלים)\nסכינא דאשכבתא (אביי, בסוגייה. 3 דעות ראשונים. מילה, שחיטה, קצבים)\nחרבא דאושכפי (סכין הרצענים; אביי, בסוגיה)\nקורנס של בשמים (בסוגיה)\nעורות יבשים של אומן (מותר) (ש\"ח, כה')\nנסרים של אומן (ש\"ח, כו')"}, {"layer": "rishon", "src": "המשנה בקכג · ר'
