ות מכשיעור (גריס ופחות) — תולים.", "under": true}, {"layer": "rama", "src": "דרכ\"מ, רמ\"א (קצו, י)", "srcRef": null, "txt": "הדרכ\"מ מקשה מאוד על חומרת הראשונים, אך מסיק ברמ\"א: טוב להחמיר בג' הימים הראשונים של ז' נקיים שלא לתלות כתמים, אלא רק כך: כתמים כגריס ופחות (בכינה); כתמים יותר מכגריס — רק במכה המוציאה דם (לא במכה שאינה מוציאה דם)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "בשלושת הימים הראשונים לא תולים כלל — גם לא במכה שמוציאה דם. רק מה שהב\"ח התיר אפשר לתלות (מכה שיוצא ממנה דם תמיד), שאל\"כ אי אפשר לספור ז' נקיים.", "under": true}, {"layer": "zman", "src": "טהרת הבית", "srcRef": null, "txt": "דוחה את החומרא לגמרי.", "under": true}, {"layer": "acharon", "src": "חתם סופר", "srcRef": null, "txt": "אם בדקה 3 פעמים (בוקר וערב) — יכולה להתחיל לתלות כתמיה (מטרת החומרא: להשיג מעין חזקת טהרה וודאות שנקייה, ובכך תושג).", "under": true}, {"layer": "note", "src": "קולות נוספות בחומרת ג' הימים", "srcRef": null, "txt": "**רואה את הכתם אחרי** (**תפארת צבי**): החומרא רק אם רואה את הכתם בג' הימים הראשונים; אם רואה אחריהם — אין חוששים שמא הגיע בהם. **יושבת ז' נקיים בעקבות כתם** (**פת\"ש בשם דגמ\"ר**): אשה שיושבת ז' נקיים על כתם שמצאה, ואז רואה כתם בג' הראשונים — אפשר להקל ולתלות. **כתם על בגד צבעוני** (**חמדת שלמה, מעיל צדקה**): החומרא אינה חלה על בגדים צבעוניים; ו**פת\"ש** נראה שמחמיר גם בזה."}, {"subhead": "לדמות כתם כתנאי לתלייה (ל)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "בכל סוגי התליות שבסימן, אין צריך לנסות 'לדמות' בראש האם הכתם דומה למה שהתעסקה בו — השאלה רק אם במחשבה ראשונית זה הגיוני או בבירור לא הגיוני. אם הכתם שחור והתעסקה באדום — ברור שאי אפשר לתלות (וראה כג-כד); אך אם אותו צבע — אינה צריכה להתחיל להיזכר בגודל וכד'."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "הסיפור של ר' עקיבא במשנה שטיהר מכה של אשה — עשה כן בלי שראה כלל את הכתם."}, {"layer": "rishon", "src": "רשב\"א בשם י\"א", "srcRef": null, "txt": "צריך להשוות ולדמות את הכתם לגורם התלייה; אך אי אפשר, שהרי אפילו כשהמראות לפנינו אין אנו יודעים להבחין בין מראה למראה (כבסי' קפח) — ולכן אי אפשר לתלות כתם כלל.", "under": true}, {"layer": "rishon", "src": "רשב\"א, טור", "srcRef": null, "txt": "חולק: בסתם אפשר לתלות כתם בדבר בלי לדמות בינו לבין גורם התלייה. רק במקרים חד-משמעיים — כמו \\ul{לתלות אדום בשחור} או \\ul{כתם מרובה בדבר מועט} — אי אפשר לתלות (ראיה מר' עקיבא, שטיהר על ידי תלייה במכה בלי לבקש לראות)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.30", "txt": "כשאשה מוצאת כתם, כדי לתלותו אינה צריכה לדמותו לדבר שתולה בו. כשהדברים דומים ברמה של ספק — תולים להקל; רק כשאין ספק באופן מוגזם — אי אפשר להקל. (הטעם: טענת הי\"א יש בה אמת בדמים — אך דין כתמים קל יותר כי הם מדרבנן, ובהם תולים אפילו כשאינם לפנינו.)"}], "pesak": null}, "makom": {"title": "מקום הכתם על הגוף והבגד", "seif": "סעיפים י״א-י״ד, י״ז, ל״ב", "sugya": null, "navAccent": "", "intro": "בסעיף ו' נפסק שאין הבדל בשיעור בין כתם על הבשר לכתם על הבגד (ובי\"א דעת הרמב\"ם להחמיר על הגוף סמוך לערווה). כאן מתברר הכלל: \"לא בכל מקום שיימצא כתם טמאה, אלא במקום שאפשר שבא שם מן המקור\". שני מוקדים: (א) פירוט המקומות בגוף ובחלוק שסביר שדם מגיע אליהם (מן המשנה, נוסח הטור); (ב) פלג גוף עליון/תחתון — היחס שבין המשנה לתא שמע, שהגמרא מגשרת עליו.", "ops": [{"layer": "mishna", "src": "משנה (נדה נז)", "srcRef": null, "txt": "\\ul{הרואה כתם על בשרה}: כנגד בית התורפה — טמאה; שלא כנגד בית התורפה — טהורה; על עקבה ועל ראש גודלה — טמאה; על שוקה ועל פרסותיה: מבפנים — טמאה, מבחוץ — טהורה; ועל הצדדין מכאן ומכאן — טהורה. \\ul{הרואה כתם על החלוק}: מן החגור ולמטה — טמאה; מן החגור ולמעלה — טהורה; על בית יד של החלוק: אם מגיע כנגד בית התורפה — טמאה, ואם לאו — טהורה; היתה פושטתו ומתכסה בו בלילה: כל מקום שנמצא בו כתם — טמאה, מפני שהוא חוזר. וכן בפוליוס.", "ref": {"label": "נדה נז · פ' הרואה כתם", "ref": "Niddah.57"}}, {"layer": "shulchan", "src": "טור, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.11", "txt": "מטמאים כתם רק אם נמצא על מקום המעיד כי הדם הגיע אליו מן המקור (ניסוח הטור, מבוסס על המשנה) — המשך הניסיון להיאחז בכל עדות סבירה לכך שהכתם לא הגיע מן המקור."}, {"subhead": "חלקי הגוף — על הבשר (יא)"}, {"layer": "note", "src": "סיכום האיברים (עפ\"י המשנה, גמרא וראשונים)", "srcRef": null, "txt": "על העקב — טמאה (שמא נגעה בישיבה). חוץ השוק — טהורה (לא יגיע לשם). חוץ כף הרגל — טהורה. פנים השוק — טמאה (יכול לטפטף משם). פנים כף הרגל — טמאה. אגודלי כף הרגל — טמאה (**רמב\"ם, ש\"ע**: 'פנים' = כל המקומות שכשמצמידים רגליים). גב כף היד — טמאה (ידיים עסקניות). כל מה שבאותו צד של חוץ כף הרגל והשוק (מתניים וכו') — טהורה."}, {"layer": "acharon", "src": "ט\"ז, ש\"ך", "srcRef": null, "txt": "(אגודל מול שאר האצבעות): **ט\"ז** — על שאר האצבעות אפשר להקל; **ש\"ך** — גם על שאר האצבעות טמאה.", "under": true}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "אפילו נמצא כתם על קשרי אצבעותיה (גב כף היד) — טמאה, כי הידיים עסקניות."}, {"layer": "rishon", "src": "רשב\"א בשם רבו", "srcRef": null, "txt": "כתם מטמא על היד רק אם בדקה (שזו הסיבה היחידה שתגע שם). ובשם **רמב\"ן ורמב\"ם**: לא מחלקים בברייתא — כתם על גב כף היד תמיד מטמא.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.11", "txt": "כתם דם על ידיה, אפילו על קשרי אצבעותיה — טמאה, כי הידיים עסקניות (**ברייתא**)."}, {"layer": "acharon", "src": "סדרי טהרה, חכמת אדם", "srcRef": null, "txt": "**ס\"ט**: אם אומרת שבטוחה שלא נגעה עם היד שם — נאמנת, והכתם טהור. **חכמת אדם**: אם הכתם על גב כף היד שאינו קשרי האצבעות — מקלים (אין סביר שתגיע לשם).", "under": true}, {"subhead": "על החלוק וכיסוי הראש (יג-יד, טז)"}, {"layer": "note", "src": "", "srcRef": null, "txt": "כשמדברים כאן על 'חלוק' — הכוונה \\ul{לחלוק הבדוק} (רשב\"א וש\"ע בסע' לט); כתם על חלוק שאינו בדוק — טהור תמיד. **הרב עובדיה (טהרת הבית)**: בימינו כל בגד שכובס נחשב חלוק הבדוק. הדין הבסיסי של כתם על החלוק עולה ביא-יב; כאן (יג-יד) שני דיונים ספציפיים: שרוול החלוק, ודין החלוק כשאינה לובשתו בלילה אלא מתכסה בו."}, {"layer": "mishna", "src": "משנתנו", "srcRef": null, "txt": "על בית יד של החלוק (שרוול): אם הכתם במקום שיכולה להגיע איתו לבית התורפה — טמאה; אם במקום שלא יכולה להגיע — טהורה."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אפילו אם היכולת להגיע לבית התורפה היא רק על ידי שחייה מרובה — טמאה; אבל מקום שאפילו במאמץ רב לא תגיע — לא חוששים (ולא נאמר שנגעה באיבר עם יד שנייה ואז בשרוול, שאין מחזיקין טומאה ממקום למקום)."}, {"layer": "shulchan", "src": "טור, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.13", "txt": "(יג): כתם על שרוול החלוק — רק אם הוא בחלק שיכול להגיע לבית התורפה, ואפילו על ידי מאמץ רב (**עפ\"י המשנה והרשב\"א**)."}, {"layer": "mishna", "src": "משנתנו", "srcRef": null, "txt": "פשטה את החלוק והתכסתה בו כשמיכה בלילה — אם נמצא עליו כתם, נטמאת בכל מקום (כי כשהחלוק משמש שמיכה הוא זז, ואין המיקום מעיד). וכן באפליון."}, {"layer": "rishon", "src": "רמב\"ם, רשב\"א", "srcRef": null, "txt": "מהו 'אפליון'? **רמב\"ם**: חגורה. **רשב\"א**: בגד שנשים מכסות בו הראש בלילה ('מעפורת') — ואף שמשמש רק לכיסוי הראש, דינו כחלוק ומטמא בכל מקום. **ב\"י**: רק אם הכיסוי אינו מהודק (שאז יכול ליפול בשינה ולהגיע לשם).", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.14", "txt": "\\ul{חלוק שלא לבשה} אלא התכסתה בו בלילה, וכן \\ul{חגורה} שישנה איתה, וכן \\ul{כיסוי ראש שאינו מהודק} שישנה איתו — לא משנה היכן נמצא הכתם, טמאה (**משנה + רשב\"א + דיוק הב\"י**). (וכיצד תדע שהכיסוי מהודק? כשתקום בבוקר ועדיין מהודק.)"}, {"layer": "rishon", "src": "רשב\"א בת\"ה", "srcRef": null, "txt": "כשישנה עם החלוק כשמיכה יש בכך גם קולא — אפשר לתלות את מקור הכתם אף במכה שאינה סמוכה למקומו (כמכה שבכתף), כי החלוק זז בשנתה. וכ\"פ **ש\"ע**: תולה בכל מכה שיש לה, ואף במכה שבלבישה רגילה אין סבירות שיגיע ממנה דם למקום הכתם (כגון מהכתף לירך)."}, {"subhead": "פלג גוף עליון/תחתון — בשר/חלוק (יא-יב, יז)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "יש פער בין המשנה (הקריטריון: ביחס לחגור) לתא שמע (הקריטריון: לפי בשר/חלוק), והגמרא מגשרת. חשוב: מקום שנקבע בו על כתם באזור הבשר שהוא טמא — פירושו שגם אי אפשר לתלותו בשום דבר חוץ מבשיעור (סע' ו) ובמכה (סע' יח), כי דין כתם על הבשר חמור יותר. מה שהש\"ע נקט בסע' ו כרשב\"א — לעניין שיעור גודל בלבד; אבל לתלות בדברים אחרים אי אפשר (מתחת/מעל לחגור + נזדקרה)."}, {"layer": "gemara", "src": "תא שמע", "srcRef": null, "txt": "כתם \\ul{על בשרה} — טמא; כתם \\ul{על חלוקה} — טהור. הגמרא מקשה: מדוע יש ספק בבשר/חלוק, הרי המשנה קובעת לפי המקום בגוף? ומסיקה: יש מקרים שרואה מן החגור ולמטה וטהורה, ומן החגור ולמעלה וטמאה.", "ref": {"label": "נדה נט · פ' הרואה כתם", "ref": "Niddah.59"}}, {"layer": "note", "src": "מתי מתהפך הדין?", "srcRef": null, "txt": "מן החגור ולמטה תהיה \\ul{טהורה} — אם נמצא על החלוק + עברה בשוק של טבחים. מן החגור ולמעלה תהיה \\ul{טמאה} — אם נמצא על הבשר + הזדקרה כגדי (שאז יש הסבר איך הגיע דם למעלה)."}, {"layer": "lead", "src": "", "srcRef": null, "txt": "על חלק מהדברים יש מחלוקת ראשונים, וכך בטבלה:"}, {"layer": "table", "table": {"title": "", "cols": ["על בשרה\n(כי אז משמע שהדם הגיע מהבשר)", "על חלוקה"], "cornerColor": "#D9D9D9", "colColors": ["#F6C6C7", "#E5FFDD"], "align": "center", "rows": [{"head": "מן החגור ולמטה\n(מקרה בסיס – טמאה. \nחריגות – טהורה)", "headColor": "#FBE4D5", "cells": ["טמאה", "אם עברה בשוק של טבחים -\nטהורה  \n(אפילו אם נמצא על פנים החלוק)\n(כי רק אז סביר לומר שהדם הגיע מבחוץ)"]}, {"head": "מן החגור ולמעלה\n(מקרה בסיס – טהורה. \nחריגות – טמאה)", "headColor": "#E2EFD9", "cells": ["אם הזדקרה - \nטמאה\n(רק אז סביר לומר שהדם ב\"ז הגיע מבפנים)", "טהורה\nרמב\"ם: אם נזדקרה טמאה\n[רשב\"א: אף אם נזדקרה טהורה(ש\"ע)"]}]}}, {"layer": "rishon", "src": "רמב\"ן, רשב\"א", "srcRef": null, "txt": "(נמצא על חלוקה + בשרה): מבחינת הדין 'על בשרה + חלוקה' = כ'על בשרה' לעניין הטומאה — אבל כן יכולה לתלות. לכן אם עברה בשוק של טבחים / נתעסקה בכתמים — אפילו למטה מן החגור טהורה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.12", "txt": "כתם על בשרה וגם על חלוקה — אם יש במה לתלות, תולה וטהורה (לא משנה למטה או למעלה מן החגור + הגביהה) (**רשב\"א, רמב\"ן**); לעומת כתם על החלוק למעלה מן החגור — שאינה צריכה כלל לתלות."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.11", "txt": "(מכה): אם יש מכה שהגיוני שדם הכתם הגיע ממנה — תולה במכה, אף אם המכה על הבשר ולפי הטבלה טמאה (**משנה, רשב\"א, גמרא**). (מכה שהתגלעה — סע' יח.)"}, {"subsubhead": "כתמים על שני חלקי הגוף (יז)"}, {"layer": "gemara", "src": "ברייתא, תוספתא", "srcRef": null, "txt": "היו עליה טיפי דמים למטה וטיפי דמים למעלה — תולה [את התחתון] בעליון עד כגריס. (**תוספתא** שמביא הרא\"ש): שני כתמים אחד למעלה ואחד למטה — אף שהתחתון גדול והעליון קטן, תולין התחתון בעליון עד כגריס, שאני אומר: ממקום שבא העליון בא התחתון.", "ref": {"label": "נדה נט · פ' הרואה כתם", "ref": "Niddah.59"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "'טיפי דמים למטה' = קטנים; 'למעלה' = גדולים.", "under": true}, {"layer": "rishon", "src": "תוס', רא\"ש", "srcRef": null, "txt": "'למטה' = בחלק התחתון של החלוק; 'למעלה' = בחלק העליון. ועניין הדין: תולים את הכתם העליון שבא שלא מגופה, ולא משנה גודלו — אם \\ul{העליון גדול מכגריס} תולים ואומרים שכמו שהעליון בא מעלמא כך התחתון; אבל \\ul{אם אין העליון גדול מכגריס} — לא תולים את התחתון ממקום אחר וחוששים לו.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.17", "txt": "עפ\"י תוס' והרא\"ש."}, {"subhead": "דם שנמצא על האריג (לב)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "הסעיף שונה מעט משאר החטיבה (שמבררת יסודות ראשוניים של מיקום הכתם), אך שייך אליה על אף איזוטריות הדין."}, {"layer": "gemara", "src": "ר' ינאי", "srcRef": null, "txt": "אשה שמצאה דם על אריג שעבדה עליו — תחזרי על מלאכתך ונבדוק אם ייתכן שהאריג הגיע לאותו מקום (המקור), ומשם הכתם."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "נטמאת רק אם הבגד שעליו נמצא הכתם היה בוודאות נקי מלפני כן.", "under": true}, {"layer": "shulchan", "src": "טור, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.32", "txt": "אשה שהיתה אורגת ונמצא כתם על האריג — \\ul{על דבר שהיה בדוק לה מתחילה} תחזור להתעסק כשעשתה: אם נראה שכשעובדת הנקודה של הכתם יכולה להגיע למקור — טמאה, ואם לא — טהורה (**גמרא, רשב\"א**)."}], "pesak": null}, "maka": {"title": "תלייה במכה", "seif": "סעיף י״ח", "sugya": null, "navAccent": "", "intro": "מכה שיכולה להגלע ולהוציא דם היא אחד ממקורות התלייה המובהקים — ואף מתירה כתם על הבשר. כאן מתבררים גבולות הסבירות של התלייה, וההבדל שבין תליית כתם במכה לבין תליית דם (בהרגשה) במכה.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "תולה בכל דבר שיכולה לתלות… אם יש בה מכה והיא יכולה להגלע ולהוציא דם — תולה. **ר' עקיבא**: אשה שראתה כתם ויש לה מכה, אף שהמכה כבר חייתה — טיהר את האשה.", "ref": {"label": "נדה נח · פ' הרואה כתם", "ref": "Niddah.58"}}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "מכה שאף שחייתה יכולה להגלע = כשיש קרום חום והמכה יבשה, אלא שאומרים שייתכן שנפתחה בלי ששמה לב."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.18", "txt": "כתם על בשרה (למטה מן החגור / למעלה + הזדקרה) אינה תולה, אלא אם כן יש לה מכה שהגיוני שהדם ממנה."}, {"layer": "acharon", "src": "חמודי דניאל", "srcRef": null, "txt": "(דימום מהאף): אשה שמדממת לפעמים מהאף — תולה בזה את הכתם, אם הוא במקום שיכול להגיע אליו הדימום, ומכה קלה באף עלולה לגרום דימום.", "under": true}, {"layer": "lead", "src": "", "srcRef": null, "txt": "**גבולות ההגיון** — הש\"ע פסק כרשב\"א שתולים כתם במכה שסביר מבחינת מיקומה שהדם טפטף ממנה; הראב\"ד מציג הרחבה של סבירות כזו:"}, {"layer": "rishon", "src": "ראב\"ד, ש\"ע", "srcRef": null, "txt": "אם מצאה כתם בשיפולי בגדה מאחורה ויש לה מכה מקדימה — תולה, כי אולי שיפולי הבגד שמאחורה הגיעו למכה כשישבה. (**רמב\"ם**: 'אין מחזיקים דם ממקום למקום… בין בגופה בין בחלוקה'; **ב\"י** רואה בכך סתירה אפשרית לראב\"ד.)"}, {"layer": "rishon", "src": "רשב\"א, רמב\"ן", "srcRef": null, "txt": "(נימוק לפסק הראב\"ד; ראינו בסע' יד): עפ\"י המשנה — אם פושטת את בגדה ללכת לישון, תולה בכתם הנמצא עליו בכל מקום, כי הבגד זז ויכול להגיע לכל מקום.", "under": true}, {"subhead": "תליית כתם במכה לעומת תליית דם במכה"}, {"layer": "rishon", "src": "תרומה, מרדכי", "srcRef": null, "txt": "כדי לתלות \\ul{דם} המגיע בשעת וסתה במכה — צריך ודאות שהמכה מוציאה דם (סי' קפז); אבל ב\\ul{כתם} הדין קל יותר: תולה במכה שהיתה במקום, אפילו בשעת וסתה, ואפילו בלא ודאות שהמכה מוציאה דם."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.18", "txt": "בשונה מדם (ראייה בהרגשה) — בכתמים פשוט יותר לתלות במכה."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "אפשר לתלות כתם במכה אפילו בשעת חשש לוסת ואפילו אם אין ידוע שהמכה מוציאה דם.", "under": true}], "pesak": null}, "anashim": {"title": "תלייה באנשים אחרים", "seif": "סעיפים י״ט-כ׳", "sugya": null, "navAccent": "", "intro": "האשה תולה כתם לא רק במקורות שלה, אלא גם בבני אדם הבאים איתה במגע — בנה, בעלה, ואף נשים אחרות — כשיש עליהם סימני דם. ובסופו: תלייה של ראיית דם (לא כתם) בדם שהאיש מוציא.", "ops": [{"subhead": "תליית כתם באחרים (יט)"}, {"layer": "mishna", "src": "משנתנו", "srcRef": null, "txt": "תולה הכתם בכל מה שאפשר… בבנה ובבעלה."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "דהיינו, בגלל שהאשה ובנה ובעלה תמיד נוגעים זה בזה ובבגדי זה. ומאין יהיה להם דם? אם התעסקו בכתמים, שחטו, יש לאחד מהם מכה וכד' (וכ\"כ **רמב\"ם**)."}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "אבל אם אין להם בעצמם סימני דם — ודאי אי אפשר לתלות.", "under": true}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "אם מדובר בדבר שיכול ללכלך אותה ולא אותם — כגון שהאב שחט וזה השפריץ עליה — כן תולה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.19", "txt": "אשה תולה בבנה ובבעלה בדברים שאפשר לתלות, כשם שתולה בעצמה (**משנה, רשב\"א**); אבל אם היו עסוקים בדם ואין עליהם סימני דם — אינה תולה."}, {"layer": "rama", "src": "דרכ\"מ בשם מרדכי, רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.19", "txt": "הדין נכון לא רק בבנה/בעלה אלא בכל הבא איתה במגע. **רמ\"א**: אם שכבה במטה עם נשים שיש להן מכות בגופן — תולה בהן כשם שתולה בבנה ובעלה."}, {"layer": "acharon", "src": "ש\"ך, סדרי טהרה", "srcRef": null, "txt": "**ש\"ך**: לשון הש\"ס והפוסקים דווקא בבנה ובעלה, שסביר שתגע בהם. **ס\"ט**: אפילו נמצא על בשרה יכולה לתלות בבנה/בעלה — אך אם אין להם סימני דם, לא.", "under": true}, {"subhead": "תליית ראיית דם (כ)"}, {"layer": "note", "src": "", "srcRef": null, "txt": "דין זה שייך גם לדיני 'רואה מחמת תשמיש' (סי' קפז)."}, {"layer": "rishon", "src": "שו\"ת הרשב\"א", "srcRef": null, "txt": "נשאל על מי שמדמם מפי האבר, ואחר תשמיש \\ul{בדקה אשתו בעד} (ולא כתם) ומצאה דם — וענה: אין אומרים שראתה מחמת תשמיש, אלא תולים בדם שהאיש מוציא (עפ\"י כלל המשנה שתולה בבנה ובבעלה)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.20", "txt": "מי שיוצא לו דם מפתח האבר, ובשעת תשמיש מצאה אשתו דם — תולה את הראייה בדם שלו."}, {"layer": "acharon", "src": "מהרי\"ט, נו\"ב", "srcRef": null, "txt": "**מהרי\"ט**: אף אם הדם נמצא רק יומיים אחרי התשמיש — תולים (זרע הגבר נשאר בגוף). **נו\"ב**: אם האיש רואה דם מהאבר רק כשנותן שתן — אי אפשר לתלות בזה רמ\"ת.", "under": true}], "pesak": null}, "ktam-bktam": {"title": "תליית כתם בכתם (בצבעים שונים)", "seif": "סעיפים כ״ג-כ״ד", "sugya": null, "navAccent": "", "intro": "האם אפשר לתלות כתם שנמצא בכתם אחר טהור — גם כשצבעיהם שונים? הסוגיה נחלקת לשתי לשונות, ונפסק כ'נתעסקה בתרנגולת': תולים כתם בצבע אחד בגורם רב-גוני (כתרנגולת), אך לא נתעסקה בצבע אחד ונמצא צבע שני.", "ops": [{"layer": "lead", "src": "", "srcRef": null, "txt": "(שווה להיזכר בדיון על תליית כתם תחתון בעליון, סע' יז.)"}, {"layer": "gemara", "src": "רבא (לשנא קמא)", "srcRef": null, "txt": "נמצא עליה כתם אחד טהור — תולה בו כמה כתמים בצבעים שונים. **מיתיבי**: נתעסקה באדום — אין תולה בו שחור! תירוץ: 'נתעסקה שאני' (אם נתעסקה בכתמים — אין תולים כתם בצבע אחד בכתם בצבע אחר, כי אם התעסקה באדום, כיצד נאמר שגם השחור משם).", "ref": {"label": "נדה נט · פ' הרואה כתם", "ref": "Niddah.59"}}, {"layer": "gemara", "src": "רבא (לשנא בתרא)", "srcRef": null, "txt": "\\ul{נתעסקה} במין אחד — תולה בו כתמים מכמה מינים. **מיתיבי**: נתעסקה באדום — אין תולה בו שחור! תירוץ: נתעסקה בתרנגולת ('מין אחד' = תרנגולת; 'כמה מינים' = הצבעים שיש באיבריה).", "ref": {"label": "נדה נט · פ' הרואה כתם", "ref": "Niddah.59"}}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "(פירוש הלשנא קמא, לשון תו\"ה בהיר יותר): רבא מדבר כשלא בדקה אח\"כ (ואז תולים אדום בשחור/להפך); הברייתא — כשכן בדקה אח\"כ.", "under": true}, {"layer": "rishon", "src": "ר\"ח, רא\"ש, רמב\"ם, רמב\"ן", "srcRef": null, "txt": "פוסקים רק כלשנא בתרא."}, {"layer": "rishon", "src": "רשב\"א, ראב\"ד", "srcRef": null, "txt": "גם כלשנא קמא וגם כלשנא בתרא (אלו שתי מימרות, לא שתי לשונות למימרא אחת). נפק\"מ לרואה כתמים בצבעים שונים בעליון ובתחתון: לר\"ח טמאה, לרשב\"א טהורה. אבל כתמים למעלה ולמטה \\ul{באותו צבע} — ר\"ח יודה.", "under": true}, {"layer": "note", "src": "", "srcRef": null, "txt": "הברייתא זהה בשתי הלשונות; רק מימרת רבא והתירוץ שונים. פסיקת הש\"ע פירושה לדחות את תירוץ הלשנא קמא ולקבל את תירוץ הלשנא בתרא."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.23", "txt": "נתעסקה בדבר אדום ומצאה כתם שחור (או להפך) — אינה תולה. נתעסקה בתרנגולת ומצאה כתם — תולה בה אדום, שחור וכרכומי (צבעי איברי התרנגולת) (**תירוץ הלשנא בתרא, כר\"ח ורא\"ש**)."}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "(גוונים דומים): ר' מאיר תלה כתם אדום בגוון שרף שקמה שמצאה אשה, בכתם שהתעסקה בו בגוון קילור אדום (גוונים דומים, אך לא זהים — ובכל זאת תלה)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.24", "txt": "נתעסקה בדבר בגוון אדום ומצאה כתם בגוון אחר של אדום — תולה את הכתם בדבר (**כברייתא**)."}], "pesak": null}, "atzma": {"title": "תלייה בעצמה (בעבר)", "seif": "סעיפים מ״ד-מ״ו", "sugya": null, "navAccent": "", "intro": "אשה יכולה לתלות כתם שנמצא כעת על חלוקה בזמן עבר שבו לבשה אותו — ימי נדתה, או ימים שהיתה מסולקת דמים (עיבור/הנקה) — ובלבד שלא בדקה את הבגד בינתיים. סעיף מו מוסיף את אלמנט הכביסה, ומברר מתי כתם על בגד שכובס עדיין ניתן לתלייה.", "ops": [{"subhead": "לבשה בימי נדתה (מד)"}, {"layer": "rishon", "src": "רא\"ש, רשב\"א ועוד", "srcRef": null, "txt": "אשה שהיתה נדה ולבשה אז חלוק, ולאחר זמן לובשת את אותו החלוק ומוצאת כתם — תולה שהכתם הגיע באותו זמן שהיתה נדה."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.44", "txt": "פסק כן — וכעת טהורה."}, {"layer": "note", "src": "", "srcRef": null, "txt": "הכל בתנאי שלא בדקה את הבגד בין הלבישה בזמן הנדה לעכשיו; אם בדקה והבגד היה נקי — אי אפשר לתלות כך (וכן בהתאם בסע' הבא)."}, {"subhead": "לבשה קודם שהיתה מעוברת (מה)"}, {"layer": "rishon", "src": "ריו\"ח", "srcRef": null, "txt": "מי שלבשה חלוק לפני שנכנסה להריון, ואחר שנכנסה לבשה אותו (בלי שבדקה) ומצאה כתם — תולה שהגיע מהלבישה בימים שלא היתה בהריון. וכן בימי הנקתה (שניהם מסולקות דמים)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.45", "txt": "פוסק כן."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.45", "txt": "כנ\"ל בזקנה, ביחס לחלוק שלבשה בימי צעירותה (שהיתה רואה)."}, {"subhead": "בגד שכובס (מו)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "סעיף מו הוא במובן מסוים המשך לתלייה בעצמה: הרשב\"א מתרגם את סוגיית הכביסה למקרה — מי שלבשה חלוק בימי נדתה, ואח\"כ כובס, ובימי טהרתה לבשה אותו ונמצא עליו כתם. אף שהחלוק בדוק (ולכן יכול לאסור) נוסף אלמנט הכביסה. מן הגמרא מתברר שהכביסה 'משתווה' לבדיקה לא מפני הכיבוס עצמו אלא מפני שבשעתו בודקים את הבגד."}, {"layer": "mishna", "src": "משנה (נו)", "srcRef": null, "txt": "משמע שכיבוס בגד שווה ערך לבדיקתו."}, {"layer": "gemara", "src": "א\"ר מאיר", "srcRef": null, "txt": "מפני מה אמרו שכיבוס הבגד שווה לבדיקה — מפני שחזקת בנות ישראל בודקות חלוקיהן בשעת כיבוסן (הבדיקה מטהרת, לא הכיבוס). **ר' אחא**: מצאה כתם על בגד שיצא מהכביסה — תחזור ותכבסנו. **רבי**: אינו דומה כתם שלאחר הכיבוס לכתם שלפניו, שזה מקדיר וזה מגליד. ש\"מ חזקתו בדוק.", "ref": {"label": "נדה נו · פ' הרואה כתם", "ref": "Niddah.56"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.46", "txt": "(האם כתם חדש או ישן): אם אחר הכביסה הכתם עבה כגליד — ודאי חדש (הגיע אחר הכביסה); אם הקדיר ואינו עבה עוד — ודאי ישן (מלפני הכביסה) (**רב אחא ורבי, רשב\"א**). כלומר אפשר לשער אם הכתם ישן מימי נדתה — ואז תולה בו."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "(מי המכבס): מאחר שהבדיקה (לא הכיבוס) היא שמטהרת — משנה מי המכבס. ישראלית מכבסת — בודקת (ומנקה), אלא אם אמרה בפירוש שלא בדקה; גויה או שפחה — אינה בודקת.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.46", "txt": "אם גויה או שפחה כיבסו — מניחים שלא בדקו וניקו, ולכן כתם שעליו ניתן לתלות שהוא מלפני הכביסה (וכן אם ישראלית כיבסה ואמרה בפירוש שלא בדקה)."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "(מסקנה): ניתן לתלות כתם שנמצא על בגד שכובס בימי נדתה — אם כובס בידי גויה/שפחה, או בידי ישראלית שאמרה שלא בדקה, או אם ניכר שהכתם הקדיר ונחלש (עבר כביסה). אך אם אינה בקיאה לזהות אם הקדיר — מחמירה. וכן פוסק **הש\"ע**."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "רק כשהחלוק לא בפנינו נוקטים כר' מאיר וחוששים מי בדקה; ועל חזקת הרשב\"א שבנות ישראל בודקות אף חלוקי חברותיהן — היום לא נוהגת.", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מעמיד הכל בכיבוס: 'אשה בודקת' = אם מוצאת כתם היא עושה מאמץ לנקותו; חלוק הבדוק נקי כי ניקתה אותו.", "under": true}, {"layer": "zman", "src": "שבט הלוי", "srcRef": null, "txt": "כיום, מאחר שהכביסה יסודית מאוד, יש להפוך את מסקנת הסוגיה: לא 'מי כיבס' אלא 'האם כובס'.", "under": true}, {"layer": "zman", "src": "דרכי טהרה", "srcRef": null, "txt": "מחלק בין בגד נקי לבגד בדוק: בגד שעבר כביסה אינו חשוב בדוק, שמא יתלכלך בייבוש וכד'.", "under": true}], "pesak": null}, "safek": {"title": "ספק אם יש במה לתלות; עיר שיש בה חזירים", "seif": "סעיף כ״ב", "sugya": null, "navAccent": "", "intro": "מה הדין כשיש ספק אם בכלל התרחשה סיטואציית התלייה? הכלל: ספק אם עברה בשוק טבחים — אינה תולה. אך יש מצבים שברירת המחדל הפוכה (עיר שיש בה חזירים), שבהם תולה תמיד אלא אם ודאי שלא התלכלכה.", "ops": [{"layer": "mishna", "src": "המשנה", "srcRef": null, "txt": "אשה תולה כתם בכל דבר שיכולה לתלות."}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "עברה בשוק של טבחים: ספק ניתז עליה ספק לא ניתז — תולה; ספק עברה ספק לא עברה — טמאה. (עברה בוודאי אך ספק אם התיז — תולה; ספק אם עברה כלל — לא תולה.)"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "בסיטואציות מסוימות ההפך הוא הנכון: ברירת המחדל שתולה, כי הנחת היסוד שהתלכלכה — כמו במקום שיש הרבה טבחים בכל פינה, ובעיר של חזירים. ואז אף אם ספק אם התלכלכה מחזיר/טבח — תולה."}, {"layer": "rishon", "src": "מ\"מ", "srcRef": null, "txt": "ורק אם יש ודאות שלא התלכלכה — אינה תולה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.22", "txt": "אשה שספק אם עברה בשוק של טבחים — אינה תולה (וכן בכל מצב שספק אם יש לה במה לתלות). אבל אם יש הרבה טבחים, כך שאם עברה ודאי נתלכלכה — אף אם ספק אם היתה שם, תולה."}, {"subhead": "עיר שיש בה חזירים (אין בזה פסק בש\"ע)"}, {"layer": "gemara", "src": "רב אשי", "srcRef": null, "txt": "עיר שיש בה חזירים — לא חוששים לכתמים. **רשב\"א**: כי החזירים מצויים באשפות, אוכלים נבלות ומתלכלכים בדם, ואולי מהם הגיע הכתם."}, {"layer": "rishon", "src": "תוס', רא\"ש", "srcRef": null, "txt": "\\ul{אין קולא זו נוהגת היום} — חזירים לא מתיזים דם; אולי בזמן חז\"ל היו מצויים כל כך עד שהתיזו.", "under": true}, {"layer": "rishon", "src": "רב נחמן (ב\"י), רא\"ש", "srcRef": null, "txt": "'דוקרת (עיר) — כעיר שיש בה חזירים דמיא'. **רא\"ש**: לפיכך אין זה תלוי אם יש חזירים בעיר, שהרי ייתכן שאין בה נבלות ואשפתות — הכל לפי המציאות."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "פסק פשט מימרת רב אשי: עיר שיש בה חזירים — תולה בהם ואינה מטמאה. **מ\"מ**: לפי מה שכתב עם הרשב\"א בברירת המחדל — אם יודעת בוודאות שלא נגע בה חזיר, אינה תולה.", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "עושה טרנספורמציה לדברי התוס': \\ul{דין עיר של חזירים אינו רלוונטי היום}, כי החזירים אינם מסתובבים אלא באסם/בבתים. [הש\"ע לא התייחס.]", "under": true}], "pesak": null}, "chaverot": {"title": "תלייה בחברות (בגד משותף, מרחב משותף)", "seif": "סעיפים כ״ה, מ׳-מ״ג, מ״ז-נ״ג, ט״ו", "sugya": null, "navAccent": "", "intro": "סעיפים אלו עוסקים בתלייה בחברה — לא מפני שנגעה בה (יט-כ), אלא משימוש משותף בבגד, השאלת בגד, שינה באותה מיטה או ישיבה על ספסל. בדינים של כמה נשים שחלקו מרחב/בגד, אין זו כל כך תלייה של כתם אחת בשנייה, אלא קביעה מי טמאה ומי טהורה. משמעותי שמדובר בכתם שעל הבגד — שדינו קל מכתם על הבשר, וקל יותר לתלותו (יא-יד).", "ops": [{"subhead": "שתי נשים שנתעסקו בציפור (כה)"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "שתי נשים שנתעסקו בציפור אחת שיש בה סלע דם, ונמצא על כל אחת סלע דם — טמאות (כלומר: אינן יכולות לתלות).", "ref": {"label": "נדה · פ' הרואה כתם", "ref": "Niddah.59"}}, {"layer": "shulchan", "src": "טור, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.25", "txt": "פוסק כן."}, {"layer": "acharon", "src": "ב\"י, ש\"ך (נקה\"כ), ט\"ז", "srcRef": null, "txt": "**ב\"י, ש\"ך**: רק אם באות לחכם ביחד — טמאות; אחת אחר השנייה — טהורות. **ט\"ז**: גם בזו אחר זו — טמאות.", "under": true}, {"subhead": "תלייה בחלוק שהושאל (מ-מג, מז)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "העיקרון הנבחן: 'האם מקלקלים את המקולקלת' — תולים כתם במי שחזקתה טמאה בכל מקרה; אך כששתיהן במעמד שווה (שתיהן טהורות/טמאות) אין מקום לתלות ('מאי חזית לטמא זו ולטהר זו'). ואגב כך: בדיקת אדם אחר את החלוק מועילה להחשיבו בדוק. (הכל בחלוק הבדוק.)"}, {"layer": "shulchan", "src": "רשב\"א (עפ\"י ברייתא), ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.40", "txt": "אשה שבדקה חלוקה ולבשתו ובפשיטתו היתה טהורה, ואז השאילתו לחברתה — אם יימצא כתם, המשאילה טהורה והשואלת טמאה. (א. בדיקת הבעלים מחשיבתו בדוק; ב. השואלת אינה יכולה לטעון שאינה מאמינה שהיה נקי.)"}, {"subsubhead": "השאילה לנכרית או לנדה (מא)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "השאילה חלוקה לנכרית או לנדה — הרי זו תולה בה.", "ref": {"label": "נדה נט · פ' האשה", "ref": "Niddah.59b"}}, {"layer": "rishon", "src": "רשב\"א, רמב\"ם, טור", "srcRef": null, "txt": "**רשב\"א**: בעלת החלוק בדקה ולבשה ואז השאילה לנדה/נכרית — תולה בהן (כבסע' מ). **רמב\"ם, טור**: אף אם אח\"כ לבשה בעלת החלוק שוב.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.41", "txt": "תולה כתם שנמצא על בגד שלה שהשאילה (אחר שבדקתו) לנדה/נכרית — ואף אם נמצא אחר שהחברה החזירתו ובעלת הבגד לבשתו שוב (**רמב\"ם**). **ש\"ך**: אבל כשהשאילה לחברה \\ul{טהורה} — אינה תולה בה, ושתיהן טמאות."}, {"layer": "note", "src": "איזו נכרית?", "srcRef": null, "txt": "**רב** בגמרא: 'נכרית' = הרואה, שהיא כנדה ישראלית. **רשב\"א, רש\"י, מ\"מ**: נכרית שהגיע זמנה לראות. **ב\"י ברמב\"ם**: רק נכרית שהיא נדה בזמן ההשאלה. **ש\"ע**: נכרית שראויה לראות וראתה פעם אחת, אף שאינה נדה עכשיו (**רשב\"א, רש\"י**)."}, {"subsubhead": "דמויות בעלות פוטנציאל חלקי (מב)"}, {"layer": "gemara", "src": "רשב\"ג / רבי (ברייתא)", "srcRef": null, "txt": "(שומרת יום כנגד יום / סופרת ז' נקיים): **רשב\"ג** — המשאילה חלוקה לשומרת יום ביום השני שלה או לסופרת ז' נקיים ומצאה כתם — תולה בה (היא מתוקנת, וחברתה מקולקלת). **רבי** — לא תולה, שתיהן מקולקלות (שהרי יכולה לטבול ונחשבת כטהורה).", "ref": {"label": "נדה ס · פ' האשה", "ref": "Niddah.60"}}, {"layer": "rishon", "src": "רשב\"א, ראב\"ד, רמב\"ן / רמב\"ם", "srcRef": null, "txt": "**רשב\"א, ראב\"ד, רמב\"ן**: כרשב\"ג. **רמב\"ם**: כרבי. (להלכה אין היום שומרת יום כנגד יום, ולכן הש\"ע מתייחס רק לסופרת ז' נקיים.)", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.42", "txt": "השאילה חלוק בדוק לחברתה הסופרת ז' נקיים ונמצא כתם — תולה בחברתה. **משנה למלך**: אין תולין בסופרת ז' שלא טבלה (נחשבת טהורה אף שלא טבלה)."}, {"layer": "note", "src": "יושבת על דם טוהר / קטנה ונערה", "srcRef": null, "txt": "**רבי ורשב\"ג** מסכימים שהמשאלת חלוק ליושבת על דם טוהר או לבתולה שדמיה טהורין — תולה בהן (יש דם בפועל). **רמב\"ן**: היום אין יושבת על דם טוהר, ולכן אין תולין בה. **ראב\"ד וש\"ע**: תולים אף בזמן הזה (הן החמירו על עצמן רק שלא להיבעל, לא למנוע מחברותיהן לתלות). וכן תולה בקטנה שנשאת ובנערה שבתוך ד' לילות (מוחזקות מעיינות פתוחים, ומעיקר דין תורה טהורות)."}, {"subsubhead": "מי שטמאה משום כתם (מג)"}, {"layer": "gemara", "src": "ר' יוחנן / ר' יהודה בר ליואי", "srcRef": null, "txt": "'מהו לתלות כתם בכתם?' — אין תולין. מה טעם? לפי שאין תולין.", "ref": {"label": "נדה ס · פ' האשה", "ref": "Niddah.60"}}, {"layer": "shulchan", "src": "רשב\"א, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.43", "txt": "המשאילה חלוק למי שיש לה כתם — אינה תולה בה, ושתיהן טמאות (בין שנטמאה מכתם קודם ההשאלה, בין שראתה כתם נוסף אחר שהחזירה). הטעם: בעלת הכתם עצמה אינה יודעת בבירור שהכתם ממנה. **ערוה\"ש**: כי טומאת כתם היא טומאת ספק, ואין להשוותה לתלייה בטומאת ודאי."}, {"subsubhead": "כשהחלוק הושאל לאחר כביסה (מז)"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.47", "txt": "אשה שלבשה בגד, כיבסתו והשאילתו לחברתה — אם אחר לבישת החברה נמצא כתם, מאחר שכובס מניחים שהוא של החברה, והיא טמאה ובעלת החלוק טהורה. אבל אם ניכר שהכתם הקדיר ודהה — הוא מלפני הכביסה, שייך לבעלת החלוק (היא טמאה והחברה טהורה) (**עפ\"י רשב\"א וסוגיית נו**)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "אם אינה בקיאה להבחין אם הכתם הקדיר — שתיהן טמאות, שאין לאחת יתרון על חברתה.", "under": true}, {"subhead": "כמה נשים שחלקו מרחב (מח-נג)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "כשנמצא כתם על חלוק/ספסל/מיטה שכמה נשים חלקו, ואין אינדיקציה למצב בין לבין — האם ניתן לשייך את הכתם למישהי? התשובה: כן, אם הכללים (מיקום ביחס לחגור, סע' יא-יב; הפרשי גובה; ראויה יותר לראות) מאפשרים שיוך. אם לא — כולן טמאות (או טהורות) בהתאם."}, {"layer": "shulchan", "src": "רשב\"א, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.48", "txt": "שתי נשים שלבשו חלוק בדוק אחד ונמצא כתם: מעל החגור של שתיהן — שתיהן טהורות; מתחת לחגור של שתיהן — שתיהן טמאות. ואם אחת גבוהה ואחת נמוכה, והכתם מעל חגור הנמוכה ומתחת חגור הגבוהה — הגבוהה טמאה והנמוכה טהורה (תולים בגבוהה). ואם כל אחת פשטה החלוק בלילה — שתיהן טמאות."}, {"layer": "shulchan", "src": "ר' ירוחם, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.15", "txt": "(סע' טו): שתי נשים טהורות שכיסו ראשן בחלוק אחד ונמצא עליו כתם — שתיהן טמאות. **ערוה\"ש**: הדין נוהג ביום ובלילה."}, {"subsubhead": "שלוש נשים בחלוק/ספסל (מט)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "3 נשים שלבשו חלוק אחד או ישבו על ספסל אחד ונמצא עליו דם — כולן טמאות (אין סיבה לתלות באחת יותר מבאחרת)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.49", "txt": "3 נשים שלבשו חלוק/ישבו על ספסל אחת אחר השנייה ונמצא כתם — כולן טמאות, ובלבד שכולן ראויות לראות באותה מידה; אחרת תולין בזו שראויה יותר (**ב\"י**). [ואם הספסל של אבן — אינו מטמא, כסע' י.]"}, {"layer": "acharon", "src": "ט\"ז, ערוה\"ש / ש\"ך", "srcRef": null, "txt": "**ט\"ז, ערוה\"ש**: לא משנה אם באו לשאול יחד או בנפרד. **ש\"ך**: חולק — אם באו זו אחר זו אפשר לטמא רק אחת (כסע' כה).", "under": true}, {"subsubhead": "שלוש נשים שישנו יחד (נ-נב)"}, {"layer": "mishna", "src": "שתי משניות", "srcRef": null, "txt": "3 נשים שישנו על מטה אחת ונמצא דם מתחת לאחת: (א) כולן טמאות; (ב) מתחת לאמצעית — כולן טמאות, מתחת לפנימית/חיצונית — היא והאמצעית טמאות והקצה השני טהורה. הגמרא מיישבת: משנה א 'משולבות', משנה ב לא."}, {"layer": "rishon", "src": "רש\"י, רא\"ש / רשב\"א, טור", "srcRef": null, "txt": "מהו 'משולבות'? **רש\"י, רא\"ש**: תכופות ודבוקות. **רשב\"א, טור**: רגליהן מעורבבות כסולם.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.50", "txt": "(נ): משולבות ברגליהן — כולן טמאות; לא משולבות — לפי מתחת למי נמצא (אמצעית → כולן; פנימית/חיצונית → היא והאמצעית). אך אם הדם על הסדין — כולן טמאות בכל מקרה (הסדין זז) (**ראב\"ד**)."}, {"layer": "acharon", "src": "מהרש\"ל, ש\"ך, ט\"ז", "srcRef": null, "txt": "אף על הסדין התחתון כולן טמאות תמיד (גם הוא זז). **ט\"ז**: ההבדל שבמשנה השנייה קיים רק כשהדם על הכסת שמתחת לסדין או על המטה עצמה (שאינם זזים).", "under": true}, {"layer": "mishna", "src": "משנה (נא)", "srcRef": null, "txt": "בדקה אחת ונמצאת טהורה — היא טהורה והשתיים טמאות; בדקו שתיים וטהורות — הן טהורות והשלישית טמאה; בדקו שלושתן וטהורות — כולן טמאות (חזרנו לשוויון)."}, {"layer": "gemara", "src": "רב יהודה בשם רב", "srcRef": null, "txt": "רק אם הבדיקות נעשו בתוך שיעור וסת — דין המשך המשנה רלוונטי."}, {"layer": "rishon", "src": "רמב\"ן / רא\"ש / רז\"ה", "srcRef": null, "txt": "**רמב\"ן**: תולים בבדיקה רק בתוך שיעור וסת. **רא\"ש**: אף לאחר שיעור וסת. **רז\"ה**: תוצאה טמאה מועילה רק בשיעור וסת, תוצאה טהורה — אף לאחר זמן.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.51", "txt": "(נא): כדין המשנה — ובלבד שהבדיקות בתוך שיעור וסת; ואם לא, הדין נשאר כשהיה (**רמב\"ן**)."}, {"layer": "shulchan", "src": "ש\"ע (עפ\"י משנה, ברייתא, ראב\"ד)", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.52", "txt": "(נב): כשאחת ראויה לראות יותר מן האחרת (מדרג: מעוברת תולה בשאינה מעוברת וכו') — תולין בזו שראויה יותר. ואם אפשר לתלות באחת עפ\"י סע' יט (נתעסקה בכתמים / יש לה מכה) — מטהר גם אותה וגם את האחרות (**ראב\"ד**)."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "מטמאין את שלושתן דווקא כשישנות (תנועה לא-מודעת מטשטשת), או כשאין גבולות במיטה אף בערותן. אבל אם ערות ואחת אומרת 'ברי לי' שהיתה בסיטואציה טהורה — נשארת טהורה.", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "מקשה כיצד 'ברי' מועיל; ומחמיר שאם ה'ברי' נאמר זמן רב אחר שכיבתן — אינה נאמנת.", "under": true}], "pesak": null}, "ein-bmah": {"title": "כשאין במה לתלות — בדיקת שבעה סמנין", "seif": "סעיף ל״א", "sugya": null, "navAccent": "", "intro": "אשה שמצאה כתם שאין ברור אם הוא דם, ואין במה לתלותו — השלב הבא הוא בירור 'מדעי': בחינת תגובת הכתם לשבעה חומרים. בראשונים נחלקו בשתי נקודות: דין האשה עד הבדיקה, ותוקף הבדיקה. למעשה קובע הש\"ע שאין אנו בקיאים בבדיקה זו, ולכן אינה רלוונטית הלכה למעשה.", "ops": [{"layer": "mishna", "src": "משנה (פ' האשה)", "srcRef": null, "txt": "שבעה סמנין מעבירין על הכתם (לדעת אם הוא דם): רוק תפל, ומי גריסין, ומי רגלים, ונתר, ובורית, קמוניא ואשלג. העבירן עליו ונשאר — סתם צבע; נמחה — דם.", "ref": {"label": "נדה סא · פ' האשה", "ref": "Niddah.61"}}, {"layer": "lead", "src": "", "srcRef": null, "txt": "שתי מחלוקות ראשונים: (א) דין האשה עד שתיבדק; (ב) תוקף הבדיקה לטהר אשה לבעלה."}, {"layer": "rishon", "src": "רשב\"א, מ\"מ (ברמב\"ם)", "srcRef": null, "txt": "(עד הבדיקה): אסורה עד שתיבדק (כן מבינים מן המשנה). ובשם **רשב\"א ברמב\"ם**: מותרת עד שתיבדק. **ב\"י**: מאחר שאין כאן מחלוקת גדולה — אסורה עד שתיבדק."}, {"layer": "rishon", "src": "רמב\"ן / רמב\"ם, רשב\"א, מ\"מ", "srcRef": null, "txt": "(תוקף הבדיקה): **רמב\"ן** — אין תוקף לבדיקה (המשנה בטהרות בלבד). **רמב\"ם, רשב\"א, מ\"מ** — יש תוקף. **ב\"י**: אין לנו בקיאות בבדיקה כיום, ולכן דין הבדיקה נעקר.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.31", "txt": "אשה שמצאה כתם ואין ברור אם דם, ואין במה לתלות — תיבדק בשבעה סמנין. אבל היום אין אנו בקיאים בסמנים ובזהותם, ולכן אין עושים בדיקה זו (**ב\"י**)."}, {"layer": "zman", "src": "שבט הלוי, תורת השלמים", "srcRef": null, "txt": "**שבט הלוי**: האשה טמאה עד שתיבדק כי זהו מוצא אחרון. **תורת השלמים**: מאחר שאין משתמשים בסמנים — נשארים בספק ולחומרה.", "under": true}, {"layer": "note", "src": "מדע ימינו", "srcRef": null, "txt": "על פניו יש יכולת מדעית לבדוק אף עד (לא רק כתם), ואף להבחין בין דם מכה לדם מן המקור. **גר\"ח**: 'אין לדיין אלא מה שעיניו רואות' — לא מביאים זכוכית מגדלת. **ציץ אליעזר**: אין סומכים על בדיקות מדעיות, לא לקולא ולא לחומרה — רק עיני הדיין. **גרש\"ז אויערבך, בעל השש\"כ**: לכתחילה עפ\"י עיני הפוסק, ואם מסופק — יכול להסתייע בבדיקה כימית."}], "pesak": null}, "hagdara-ed": {"title": "הגדרת עד הבדוק ועד שאינו בדוק", "seif": "סעיף ל״ח", "sugya": null, "navAccent": "", "intro": "מה עניין עדי בדיקה בדיני כתמים? הרי פתחנו בכך שעד בדיקה מעורר חשש שמא הרגישה ולאו אדעתה (רש\"י), ולכן מטמא מן התורה מספק! אלא שלעיתים גם בעד שייכים דיני כתמים: (א) אף שבעד יכולה להיטמא מן התורה, יש יכולת לתלות את המראה במקרים מסוימים (לא כתלייה חופשית של כתם, אך תלייה); (ב) לעיתים המראה שעל העד נחשב ככתם לכל דבר — מטמא רק ביותר מכגריס וניתן לתלייה — כשבדקה בעד שאינו בדוק, או בעד הבדוק שלא בחנה את המראה בסמוך לבדיקה.", "ops": [{"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "\\ul{עד הבדוק}: שבדקה שהוא נקי, ומיד אחר הבדיקה השתמשה בו (השימוש סמוך לבדיקה). \\ul{עד שאינו בדוק}: השימוש נעשה שלא סמוך לבדיקה.", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "\\ul{עד הבדוק}: שנבדק שהוא נקי, ואפילו הניחתו אח\"כ במקום מוצנע (חזקת נקיות נשמרת עד שרואים בבירור שיצא ממנה). \\ul{עד שאינו בדוק}: שלא נבדק שהוא נקי."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.38", "txt": "עד הבדוק = שנבדק ולא נודע שיש בו כתם — בחזקת בדוק (**רשב\"א**)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.38", "txt": "יש 3 סוגי עדים: בין הבדוק לשאינו בדוק יש \\ul{'עד בינוני'} — שאין חזקתו בדוק אבל גם אין חזקתו מלוכלך. [ולפיו: 'שאינו בדוק' = חזקתו מלוכלך (נלקח ממקום שמצויים בו דמים, כאשפה); 'הבדוק' = חזקתו נקי, אף שהוכנס לקופסא.]"}], "pesak": null}, "ed-baduk": {"title": "דין עד הבדוק", "seif": "סעיפים ל״ג-ל״ה", "sugya": null, "navAccent": "", "intro": "עד הבדוק שווה ערך לבדיקה פנימית — אם המראה טמא, טמאה מן התורה מספק, ואף בפחות מכגריס ואף אם נמצאה עליו מאכולת. זאת כשנבחן מיד אחר השימוש או נשמר במקום המשתמר. אבל אם הונח במקום שאינו משתמר (או 'טחתו בירכה') והכתם עגול — יש מקום להקל ולדונו ככתם רגיל.", "ops": [{"subhead": "נבחן מיד / נשמר במקום המשתמר (לג)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כתם דם על עד בדיקה \\ul{מיד} — טמאים; \\ul{לאחר זמן} — טמאים מספק.", "ref": {"label": "נדה יד · פ' כל היד", "ref": "Niddah.14"}}, {"layer": "gemara", "src": "ר' זירא", "srcRef": null, "txt": "(מדוע מיד טמאים? נתלה במאכולת!) ל\"ק: אותו מקום בדוק אצל מאכולת; ל\"ב: אותו מקום דחוק אצל מאכולת. נפק\"מ במאכולת רצופה — לל\"ק אף מאכולת רצופה נאסור, לל\"ב מאכולת רצופה חריגה והכתם ממנה.", "ref": {"label": "נדה יד · פ' כל היד", "ref": "Niddah.14"}}, {"layer": "rishon", "src": "רשב\"א, מ\"מ, רמב\"ם", "srcRef": null, "txt": "כלשנא קמא: עד הבדוק \\ul{שבחנה מיד} — טמאה אף אם נמצאה על הכתם מאכולת רצופה (לעומת עד רגיל — מאכולת רצופה מטהרת)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.33", "txt": "בדקה בעד הבדוק ובחנתו מיד או הניחתו במקום המשתמר — טמאה, גם על כגריס ופחות, ואפילו נמצאה מאכולת, ולא משנה אם הדם משוך או עגול (**משנה + ל\"ק דר' זירא, לשון הרשב\"א**)."}, {"layer": "gemara", "src": "תניא (רבי / ר' חייא)", "srcRef": null, "txt": "(מקום המשתמר): בדקה \\ul{בעד שאינו בדוק} והניחתו בקופסא ולמחר מצאה דם — **רבי**: טמאה משום נדה; **ר' חייא**: טמאה משום כתם (ורבי הודה לו). **רשב\"א, טור**: אבל בעד הבדוק — יסכימו רבי ור' חייא שטמאה משום נדה. וכן פסק **ש\"ע**: מקום המשתמר (כקופסא) — כאילו בחנתו מיד.", "ref": {"label": "נדה יד · פ' כל היד", "ref": "Niddah.14"}}, {"subhead": "נבחן לאחר זמן / הונח במקום שאינו משתמר (לד-לה)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "שני מקרים: (א) הניחתו תחת הכר; (ב) 'טחתו בירכה'. בשניהם העד אינו נחשב בדוק לגמרי, ולכן אם הכתם עגול (ולא משוך) — מתייחסים אליו ככתם רגיל (שמא התלכלך מכינה: ב-א מפני שאינו משתמר, וב'טחתו בירכה' מפני שאולי היתה כינה על הירך)."}, {"layer": "mishna", "src": "ר' אליעזר בר צדוק", "srcRef": null, "txt": "(מקרה א): עד הנתון תחת הכר ונמצא עליו כתם דם — עגול: טהור; משוך: טמא.", "ref": {"label": "נדה נח · פ' הרואה כתם", "ref": "Niddah.58"}}, {"layer": "gemara", "src": "רב", "srcRef": null, "txt": "(מקרה ב): בדקה בעד הבדוק וטחתו בירכה ולמחר מצא כתם — טמאה. (רש\"י: הכתם על הירך ולא על העד; הש\"ע לא פסק כמותו בזה.)", "ref": {"label": "נדה יד · פ' כל היד", "ref": "Niddah.14"}}, {"layer": "rishon", "src": "רשב\"א, תוס' / רא\"ש, רמב\"ם", "srcRef": null, "txt": "**רשב\"א, תוס'**: אם הכתם עגול + קטן מכגריס ועוד — טהורה, בין תחת הכר בין טחתו בירכה (רק אם אחד מהקריטריונים — טמאה). **רא\"ש, רמב\"ם**: ב'טחתו בירכה' אין חילוק בין משוך לעגול — טמאה בכל מקרה (רק תחת הכר מקילים בעגול).", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.34", "txt": "(לד — תחת הכסת): כרשב\"א ותוס'; (לה — טחתו בירכה): כרשב\"א ותוס', וי\"א כרמב\"ם ורא\"ש. כלומר בשני המקרים, אם הכתם עגול + קטן מכגריס — טהורה."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.35", "txt": "העיקר כרא\"ש. **ש\"ך, ב\"ח**: חוששים לרמב\"ם והרא\"ש. **ט\"ז**: הרמב\"ם אוסר אף אם נדע בוודאות שהדם מהירך. **פת\"ש**: לשון 'למחר' אינה מדויקת — העיקר שטחתו בירכה או שהניחתו במקום שאינו משתמר לזמן מה."}, {"layer": "note", "src": "כשיש יותר מכגריס / ג' ימים ראשונים", "srcRef": null, "txt": "**ב\"י, רמ\"א**: אף אם עגול ויותר מכגריס — אם יש במה לתלות (כדין כל כתם). **ט\"ז**: אם יש לה דם מפי הטבעת — מקל אף במשוך (ואף בטחתו בירכה, אך לא בשעת וסתה); **חוו\"ד**: אף בשעת וסתה. **בג' ימים ראשונים של ז' נקיים** (רמ\"א קצו): **דגול מרבבה** — בעד לא נטהר אף בעגול ופחות מכגריס; **מעיל צדקה** — אין הבדל בין עד לכתם, מתירים בפחות מכגריס."}], "pesak": null}, "ed-eino": {"title": "דין עד שאינו בדוק", "seif": "סעיפים ל״ו-ל״ז", "sugya": null, "navAccent": "", "intro": "עד שאינו בדוק שנמצא עליו כתם — דינו ככל כתם: מטמא רק ביותר מכגריס, וניתן לתלייה, ואף אם הוכנס למקום המשתמר. ואם 'טחתו בירכה' — מקילים עוד יותר, וטהורה אף ביותר מכגריס.", "ops": [{"subhead": "עיקר דין עד שאינו בדוק (לו)"}, {"layer": "gemara", "src": "תניא (רבי / ר' חייא)", "srcRef": null, "txt": "בדקה \\ul{בעד שאינו בדוק} והניחתו בקופסא ולמחר מצאה דם — **רבי**: טמאה משום נדה; **ר' חייא**: טמאה רק בכגריס ועוד ורק משום כתם (ורבי הודה). נמצא: עד שאינו בדוק מטמא רק משום כתם (מדרבנן), אף אם נשמר, ומטמא רק ביותר מכגריס.", "ref": {"label": "נדה יד · פ' כל היד", "ref": "Niddah.14"}}, {"layer": "rishon", "src": "ר\"ח, רשב\"א / רמב\"ם", "srcRef": null, "txt": "**ר\"ח, רשב\"א**: כר' חייא — כתם על עד שאינו בדוק טמאה בכתם (רק ביותר מכגריס), ואף אם הניחה במקום שמור. **רמב\"ם**: כרבי — במקום שמור טמאה מן התורה. **רשב\"א** (בסברה): בעד שאינו בדוק — אף משוך + כגריס ועוד — טהורה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.36", "txt": "בדקה בעד שאינו בדוק ונמצא כתם — דינו ככל כתם: מטמא רק ביותר מכגריס, ואף אם הניחתו במקום המשתמר (**ר' חייא עפ\"י ר\"ח**)."}, {"layer": "rama", "src": "דרכ\"מ, רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.36", "txt": "(עד בינוני): הדין הנלמד מהברייתא הוא על \\ul{עד בינוני} (אין חזקתו בדוק ואין חזקתו מלוכלך) — כתם עליו טמאה בכגריס ועוד. אבל \\ul{עד שחזקתו מלוכלך} (ממקום שמצויים בו דמים) — טהורה אף ביותר מכגריס. **פת\"ש**: דווקא שלא בשעת חשש לוסת; בשעת וסת חוששת ביותר מכגריס."}, {"subhead": "עד שאינו בדוק + טחתו בירכה (לז)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "בעד הבדוק ראינו שטיחה בירך/הנחה במקום שאינו משתמר (עם כתם עגול) מקילה. כאן: אם טחה עד שאינו בדוק בירכה — מקילים עוד יותר, וטהורה אף ביותר מכגריס."}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "עד שאינו בדוק + טחתו בירכה = ספק ספיקא: שמא הדם הגיע לירך מעלמא (ולא מהעד), ואף אם מהעד — שמא היה עליו קודם ולא מן המקור.", "ref": {"label": "נדה יד · פ' כל היד", "ref": "Niddah.14"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.37", "txt": "בדקה בעד שאינו בדוק + טחתו בירכה ונמצא כתם — טהורה, אף אם כגריס ועוד (**רש\"י**)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.37", "txt": "כנ\"ל בעד שאינו בדוק + הניחתו במקום שיש לתלות הכתם — טהורה אף בכגריס ועוד; אבל במקום מגולה \\ul{שאין} לתלות — טמאה בכגריס ועוד."}, {"layer": "acharon", "src": "ש\"ך, כו\"פ", "srcRef": null, "txt": "**ש\"ך** (חולק על הש\"ע): הס\"ס של רש\"י אינו מטהר; מסקנתו — רק אם הכתם נמצא על הירך טהורה, אבל על העד טמאה. **כו\"פ**: אף שהס\"ס אינו טוב (משם אחד), אפשר להקל בכתם עגול (עד שאינו בדוק + טחתו בירכה + עגול — טהורה אף כגריס ועוד).", "under": true}], "pesak": null}, "chaluk-ed": {"title": "בין חלוק לעד", "seif": "סעיף ל״ט", "sugya": null, "navAccent": "", "intro": "החלוק משמש כאן להשוואה עם העד. שתי נקודות: (1) בחלוק — אף שהוא בדוק, אין הבדל בין כתם עגול למשוך, ואם אינו כגריס ועוד תולים במאכולת (חומרה שיש בעד ואין בחלוק); (2) 'חלוק' כאן = החלוק הבדוק; כתם על חלוק שאינו בדוק — טהור תמיד.", "ops": [{"layer": "shulchan", "src": "רשב\"א, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.39", "txt": "חלוק שלא נבדק קודם שנלבש — כתם עליו טהורה; חלוק שנבדק קודם שנלבש — כתם עליו טמאה."}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "(על הקושיה שהש\"ע מתיר כאן כל כתם אף כגריס ועוד, בעוד עד שאינו בדוק דינו ככתם רגיל): ברור שחלוק שאינו בדוק קל יותר — כי הוא ספק כתם רגיל, בעוד העד הוא בדיקה פנימית ממש.", "under": true}, {"subhead": "מתי חלוק נחשב בדוק?"}, {"layer": "shulchan", "src": "רשב\"א (עפ\"י ברייתא), ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.40", "txt": "(סעיף מ): אף בדיקה של אחר מחשיבה את החלוק כבדוק."}, {"layer": "note", "src": "", "srcRef": null, "txt": "(סעיף מו): תהליך הכביסה של פעם הופך בגד ל'בדוק', כי נשים בדקוהו לפני הכביסה."}, {"layer": "zman", "src": "טהרת הבית / הרב מרדכי אליהו", "srcRef": null, "txt": "הגדרת 'בדוק' בימינו — דעות לקולא ולחומרה: **הרב עובדיה (טהרת הבית)**: כל בגד שעבר כביסה נחשב חלוק הבדוק. **הרב מרדכי אליהו**: כמעט כל בגד נחשב שאינו בדוק (עשוי להתלכלך בארון).", "under": true}, {"layer": "acharon", "src": "ערוה\"ש בשם כרו\"פ", "srcRef": null, "txt": "רוב הנשים אינן בודקות חלוקיהן וסדיניהן קודם לבישה אלא לובשות כשבאו מכובסים — וא\"כ 'ליכא כאן חלוק הבדוק כלל'. **ערוה\"ש עפ\"י רשב\"א**: אף אם לא לבשו מיד אחר הכביסה אלא נשמרו במקום נקי — נחשב בדוק.", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "הקדמה"}, {"type": "group", "title": "דין כתם", "spans": "סעיפים א׳-ד׳", "children": ["hargasha", "hefsek", "ktana", "veset"]}, {"type": "sec", "id": "tnaim"}, {"type": "group", "title": "תליית כתם", "spans": "סעיפים ה׳-ל״ב", "children": ["shiur", "bgd-basar", "tzura", "pishpesh", "ikaron", "makom", "maka", "anashim", "ktam-bktam", "atzma", "safek", "chaverot", "ein-bmah"]}, {"type": "group", "title": "עד בדיקה", "spans": "סעיפים ל״ג-ל״ט", "children": ["hagdara-ed", "ed-baduk", "ed-eino", "chaluk-ed"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"כתם": "מראה דם שנמצא על הגוף/הבגד בלי שהאשה הרגישה ביציאת הדם — טומאתו מדרבנן בלבד (לא מן התורה).", "הרגשה": "תחושת יציאת הדם מן המקור; ראייה בהרגשה מטמאת מן התורה, ובלעדיה — רק כתם (מדרבנן).", "כגריס": "שיעור מינימלי לטומאת כתם — 9 עדשים (36 שערות; להרבה פוסקים כ-2 ס\"מ). פחות מ'כגריס ועוד' — תולים במאכולת.", "מאכולת": "כינה; כתם קטן (עד כגריס) תולים שהוא דם כינה, ולכן אינו מטמא.", "תלייה": "פקפוק על זהות הכתם — לייחסו למקור חיצוני (מכה, כינה, שוק טבחים, אשה אחרת) ולא לאשה.", "פשפש": "מין פרעוש; תולים בו רק אם הרגה/הריחה אחד, ועד שיעור תורמוס.", "עד הבדוק": "עד בדיקה שנבדק ונמצא נקי — כתם שנמצא עליו מטמא כבדיקה פנימית (מן התורה מספק), גם בפחות מכגריס.", "עד שאינו בדוק": "עד שלא נבדק (או שחזקתו מלוכלך) — כתם שעליו דינו ככתם רגיל (מטמא רק ביותר מכגריס, וניתן לתלייה).", "חלוק הבדוק": "בגד שנבדק (או כובס) קודם הלבישה — רק עליו חלים דיני מיקום/שיעור הכתם; חלוק שאינו בדוק — כתמו טהור תמיד.", "בית התורפה": "מקום הערווה; מקום שסביר שהגיע אליו דם מן המקור.", "הזדקרה": "התכופפה/קפצה כגדי — מצב שבו ייתכן שדם הגיע גם מעל החגור.", "נזדקרה": "כנ\"ל — התכופפה באופן שמאפשר שהדם יגיע לפלג הגוף העליון.", "מן החגור ולמטה": "פלג גוף תחתון — כתם שם (מקרה בסיס) מטמא.", "טחתו בירכה": "מרחה את העד בירך — אפשרות להקל, שמא מאכולת שעל הירך הגיעה לעד.", "מקום המשתמר": "מקום נקי (כקופסא) ששומר את העד כמות שהוא — עד בדוק שנשמר בו דינו כנבחן מיד."}, "subject": "נידה", "id": "ktamim"}, {"topic": {"title": "דברים שאינם בטלים", "eyebrow": "מבחני הרבנות · איסור והיתר · סימנים ק׳, ק\"א, ק\"ב, ק\"י", "siman": "Shulchan_Arukh,_Yoreh_De'ah.100", "intro": {"lead": {"t": "", "ref": ""}, "body": ""}}, "sections": {"bria-hagdara": {"title": "הגדרת ברייה וביטולה", "seif": "סעיף א׳", "sugya": null, "intro": "ראשית נציין שדינה של ברייה הוא שהיא אינה בטלה אפילו באלף. אבל טעמה – בטל כרגיל (בשישים). הנימוק של המקרים אליהם זה רלוונטי נמצא בסעיף ב'.", "ops": [{"subhead": "הגדרת ברייה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "הגדרתה של ברייה יסודה מתוך מחלוקתם של רבי שמעון וחכמים במשנה במכות (פ' אלו הן הלוקין).\nשם, הם חולקים על שיעור חיוב במלקות באכילת טבל, כאשר לרבי שמעון מתחייבים במלקות בכל שהוא, ולחכמים - בכזית. רבי שמעון שולף את הקלף: 'אי אתם מודים לי באוכל נמלה [שיהיה חייב במלקות]?', וחכמים עונים: 'מפני שהיא כברייתה'. \n\nובגמרא על אתר מתבאר שלשיטת חכמים ברייה היא נשמה חשובה (ולכן נמלה נחשבת, אך לא חיטה).\n\nלפיכך, נראה שבריה היא מה שחשוב כשלעצמו, על אף שהוא פחות משיעור חיוב (כך ניתן להבין מדוע בריה לא תתבטל בשום שיעור, שהרי, היא 'מחוץ למשחק' של שיעורים. כך למשל בדברי רבנן פ' ג\"ה בחולין; רבי שמעיה בנזיר). \n\nהסוגיה במכות היא לא היחידה שמתעסקת בברייה ובהגדרתה, ומן המקומות השונים בש\"ס שעוסקים בה עולות הבנות נוספות שונות להגדרתה. כך, ישנם גם 'ארכיטיפים' שונים המייצגים מודל של ברייה (ראה 'דברים הנחשבים ברייה', לקמן).\n\nלפיכך, נחלקו ראשונים בהגדרה. \n\nנראה כי המשותף לרוב ההגדרות: 'דבר בעל חשיבות עצמאית ללא קשר לשיעור'."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "דעות הראשונים והשו\"ע:"}, {"layer": "rishon", "src": "תוספות, רא\"ש", "srcRef": null, "txt": "דבר שלם, שע\"י שנחתך אובד שמו"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "א. אסור מיום שנברא   ב. מן החיים   ג. מקובץ כאחד"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.1", "txt": "נקט את כל התנאים; ואת הרשימה לקמן, בהוספת ביצה שיש בה אפרוח"}, {"layer": "note", "src": "דברים הנחשבים ברייה", "srcRef": null, "txt": "נמלה (מכות)\nגיד הנשה  (חולין צ\"ו, צ\"ט, פ' ג\"ה)\nאבר מן החי  (חולין ק\"ב, פ' ג\"ה)\nעוף טמא  (חולין ק\"ב, פ' ג\"ה)\nביצה שיש בה אפרוח (שו\"ע, )"}, {"subsubhead": "סוגיות"}, {"layer": "mishna", "src": "משנה (מכות)", "srcRef": null, "txt": "מהו שיעור שמתחייב?\n\tרבי שמעון: כל שהוא\n\tחכמים: כזית\n\tרבי שמעון: אין אתם מודים לי באוכל נמלה?\n\tחכמים: מפני שהיא כברייתה\n\tרבי שמעון: אבל גם חיטה כברייתה!", "ref": {"label": "מכות · פרק אלו הן הלוקין · יז ע\"א", "ref": "Makkot.17a"}}, {"layer": "gemara", "src": "גמרא (דף יז)", "srcRef": null, "txt": "רב ביבי בשם רבי שמעון בן לקיש: המחלוקת היא דווקא בחיטה. אבל בקמח מודה ר' שמעון לחכמים\nרבי ירמיה בשם רבי שמעון בן לקיש: המחלוקת היא גם בקמח\nולשיטת חכמים: ברייה של נמלה - נשמה חשובה, אבל של חטה לא", "ref": {"label": "מכות · פרק אלו הן הלוקין · יז ע\"א", "ref": "Makkot.17a"}}, {"layer": "gemara", "src": "נזיר", "srcRef": null, "txt": "חכמים שיערו שיעור טומאה בכעדשה. לפיכך, משמע שצריך שיעור ברייה כולה כדי לטמא/להתחייב\nרבי שמעיה: שיעור עדשה הוא רק אם אין בבריה נשמה. אם יש בבריה נשמה - אף אם קטנה מעדשה חייב", "ref": {"label": "נזיר", "ref": ""}}, {"layer": "gemara", "src": "גמרא · חולין צו", "srcRef": null, "txt": "מחלוקת גבי גיד הנשה.\nמשמע מרבנן: מתחייב בכזית גם אם לא אכל כל הגיד. אכל כולו – מתחייב גם אם אין בו כזית", "ref": {"label": "חולין · פרק גיד הנשה · צו ע\"א", "ref": "Chullin.96a"}}, {"layer": "gemara", "src": "גמרא · חולין צט", "srcRef": null, "txt": "גיד הנשה שנתבשל. וליבטול ברובא! \nבריה שאני", "ref": {"label": "חולין · פרק גיד הנשה · צט ע\"א", "ref": "Chullin.99a"}}, {"layer": "gemara", "src": "גמרא · חולין קב", "srcRef": null, "txt": "צפור טהורה: בחייה – בכל שהוא (אבר מן החי); במיתתה - בכזית \nצפור טמאה: בין בחייה בין במיתתה – בכל שהוא (משום שעוף טמא חשיב בריה.)\n\tרש\"י מקשה: הרי נבלה לא היה עליה שם נבלה כשנבראה", "ref": {"label": "חולין · פרק גיד הנשה · קב ע\"א", "ref": "Chullin.102a"}}, {"subsubhead": "שיטות הראשונים"}, {"layer": "rishon", "src": "תוספות (מכות), רא\"ש", "srcRef": null, "txt": "דבר שלם, שעל ידי שנחתך אובד שמו (כך: נבלה מקרי נבלה גם אחר חיתוכה)"}, {"layer": "rishon", "src": "ר\"ן, או\"ה", "srcRef": null, "txt": "שלושה תנאים:\n1.  כל דבר שאסור מיום שנברא (רש\"י חולין ק\"ב)  (כגון: עוף טמא;  לאפוקי: עוף טהור שנתנבל)\n2.  מן החיים (מכות)  (כגון: גיד הנשה ועוף טמא;  לאפוקי: חיטה של איסור)\n3.  מקובצת כאחת   (לאפוקי: חֶלב)"}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "מונה את ארבע הדוגמאות העולות מן הסוגיות שהן חשובות ברייה (ג\"ה, אבמ\"ה, עוף טמא, נמלה) \nונקט עפ\"י לשון התוספות שההגדרה לכל אלו היא שאם יחלק אותם – אין שמם עליהם."}, {"layer": "rishon", "src": "דרכ\"מ בשם או\"ה", "srcRef": null, "txt": "כתב שגיד הנשה של בהמה – לאו דווקא כל הגיד, אלא:\n\t\t\t\tבשור: מה שעל הכף בלבד, ברוחב ארבע אצבעות\n\t\t\t\tבשה: מה שעל הכף בלבד, ברוחב שתי אצבעות"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.1", "txt": "נקט גם את תנאַי התוספות והרא\"ש וגם את תנאֶי הר\"ן; וציין אחר כל טעם 'לאפוקי מאי' (חוץ מתנאי התוס', שם הביא נימוקם 'שאם יחלק אין שמו עליו')\nהביא את הדוגמאות מן הסוגיות: נמלה, גיד הנשה, עוף טמא, אבר מן החי\nהוסיף גם 'ביצה שיש בה אפרוח'  (ככה\"נ עפ\"י רשב\"א ברמב\"ם בסי' ק\"י)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מה שהשו\"ע מציין גם ביצה שיש בה אפרוח כדוגמא, הוא מאחר שסבר בסימן ק\"י שחשיב ברייה. והספק הוא גבי ביצה שיש בה דם. אך כאן הוא לא פירש, והדבר נתון למחלוקת. \nש\"ך סובר שמכאן משמע שביצה שיש בה דם לא הווי ברייה, שהרי כתב 'ביצת אפרוח', דייקא", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "עיקר גיד הנשה הנקרא ברייה שלמה – כף בלבד. והוא כרוחב 4 אצבעות (או\"ה)"}, {"subhead": "ביטול ברייה בתערובת"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "בסוגיה בחולין צט מפורש שגיד הנשה שנתבשל לא מתבטל ברוב משום ש'בריה שאני'\t\nומן המשנה והסוגיה בצ\"ו משמע שאם אין מכירין את הברייה בתערובת – אינה בטלה כלל; אבל אם מכירים – בטלה בשישים (והפירוט לכך בדיון הבא לקמן, גבי ברייה שנתבשלה עם היתר, סע' ב')."}, {"layer": "gemara", "src": "בבלי שבועות כא", "srcRef": null, "txt": "גבי נמלה, אמרינן שבריה שאני\nומהשוואה לנשבע המפרש 'שלא אוכל כל שהוא', משמע שלשון הפסוקים כאילו מפרשים 'לא תאכלנו בכל שהוא'", "ref": {"label": "שבועות · כא ע\"א", "ref": "Shevuot.21a"}}, {"layer": "rishon", "src": "רא\"ש, ר\"ן", "srcRef": null, "txt": "יש מי שסובר (רשב\"א, ר' שמשון) שבריה בטלה ב960. וסברתם היא מר' יוסי בר בון בירושלמי תרומה, שנראה שביטל עכבר באלף ושמשמע שם שהוא הדין אם היה 960. אך הרא\"ש דוחה זה."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "מאחר ונראה שזו דעת מיעוט – בריה אינה בטל אפילו באלף", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "וכך, פסקו הטור ושו\"ע שכל בריה - אפילו באלף לא מתבטלת"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "דין זה שברייה לא בטילה בתערובת הוא מדרבנן, אבל מן התורה היא בטילה. ונפק\"מ למקרה של ספק, שאז הווי ספק דרבנן, ויתבטל. אבל אם הספק אינו אם הווי ברייה, אלא הספק באיסור (למשל: לא בטוח שהבריה נפלה לתערובת) – לא בטל.", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מביא ראשונים וסברות נוספים לסמוך על כך שניתן לבטל בריה 960 (אולי אפילו ב60? לחזור לבדוק) בשעת דחק גדולה", "under": true}, {"subsubhead": "טעם הדין"}, {"layer": "acharon", "src": "ערוה\"ש בשם האו\"ה", "srcRef": null, "txt": "כיוון שמתחייב באכילת בריה במלקות, החמירו חכמים גם בביטולה"}], "pesak": null}, "bria-heter": {"title": "ברייה שנתבשלה עם היתר", "seif": "סעיף ב׳", "sugya": null, "intro": "על אף שברייה אינה בטלה אפילו באלף, ישנם שני יוצאי דופן בהם יש מקום לדיון בביטל מסוים:", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "\tא) רוטב התבשיל – אם יש 60 היתר כנגד הבריה – מותר הרוטב (ע\"י סינון)\n\tב) הבריה הוצאה – אם יש 60 היתר כנגד הבריה – הכל מותר"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "בכך, דינו של גיד הנשה שונה משאר הבריות. על אף שבמשנה חולין (פ' ג\"ה) נאמר שמשערין גיד בנותן טעם,\nבגמרא (שם) נפסק שאין בגידים בנותן טעם.\nלפיכך, בשני המקרים החריגים לעיל, כאשר הבריה היא גיד – לא צריך 60 כנגדו כדי להתיר הרוטב/תבשיל."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "      ולגבי השומן של גיד הנשה, נחלקו הראשונים אם דינו כג\"ה בגמרא ואינו נ\"ט, או שמא כן נ\"ט וצריך 60 כנגדו. ודעת הרוב (רש\"י, רר\"ר, טור-שו\"ע) היא שהוא כן נ\"ט, וצריך 60 כנגדו."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כאשר הרוטב מותר, זה רק ע\"י סינון משאר התבשיל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "תרשים זרימה המסכם את המקרים להלכה (טור-שו\"ע. מכירה = יודע איזו היא מבין שאר החתיכות):"}, {"layer": "table", "table": {"title": "תבשיל היתר עם בריה", "cols": ["מכירה", "לא מכירה"], "rows": [{"head": "בריה רגילה", "cells": ["זורק הבריה. אם יש 60 כנגדה – הכל מותר", "אם יש 60 כנגד הבריה – רק הרוטב מותר ע\"י סינון"]}, {"head": "גיד הנשה", "cells": ["זורק הגיד. צריך 60 כנגד השומן שלו והכל מותר", "צריך 60 כנגד השומן – רק הרוטב מותר (ע\"י סינון)"]}]}}, {"layer": "mishna", "src": "משנה · חולין צט", "srcRef": null, "txt": "משערין גיד שנתבשל בירך בנותן טעם; כבשר בלפת (כמו שבשר נותן טעם בלפת, כך צריך להיות מורגש הטעם שהגיד נותן בירך)", "ref": {"label": "חולין · פרק גיד הנשה · צט ע\"א", "ref": "Chullin.99a"}}, {"layer": "gemara", "src": "גמרא · חולין צט", "srcRef": null, "txt": "מחלוקת תנאים ואמוראים אם גידים נותנים טעם \nוהלכתא: אין בגידין בנותן טעם", "ref": {"label": "חולין · פרק גיד הנשה · צט ע\"א", "ref": "Chullin.99a"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ראשונים חולקים אם שומן גיד הנשה כגיד הנשה לעניין זה"}, {"layer": "rishon", "src": "רש\"י, רי\"ף, רמב\"ם, רא\"ש", "srcRef": null, "txt": "שומן כן נ\"ט (ומשערין ב60)"}, {"layer": "rishon", "src": "תוס' (ר\"מ)", "srcRef": null, "txt": "שומן כג\"ה ואינו נ\"ט"}, {"layer": "rishon", "src": "הרמב\"ם מנמק", "srcRef": null, "txt": "שומן הגיד הוא מדרבנן.ומאחר שמן התורה דברים בטלים ברוב, ורק מדרבנן גזרו שיהיו בטלים ב60, היינו אומרים שבגלל שיש תרי דרבנן - שייתבטל שומן הגיד ברוב. אבל מאחר וגיד הנשה הוא בריה – החמירו בשומן שבו כאיסור תורה", "expandable": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.2", "txt": "סבר כרוב הראשונים\n \tוכתב  כלשון הטור (תרשים לעיל)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "המקרים בהם הרוטב מותר בביטול ב60, זה רק לאחר שיסננו אותו משאר התבשיל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מה שצריך נגד פליטת הבריה (הן להתיר התבשיל כולו והן אם רק הרוטב), זה דווקא בבריות כמו עוף טמא. אבל בריה מאוסה – כמו נמלה – אין צריך לבטל פליטתם"}], "pesak": null}, "bria-marak": {"title": "מרק שנפלה בו בריה", "seif": "סעיף ג׳", "sugya": null, "intro": null, "ops": [{"layer": "rishon", "src": "שו\"ת הרשב\"א", "srcRef": null, "txt": "מה שצריך ביטול ב60 אחר הוצאת ברייה, זה דווקא בברייה שאינה מאוסה. אבל בריה מאוסה – הווי נטל\"פ, ואין צריך ביטול כנגדה כלל.\nלפיכך: קדרה של מרק שנפל בה בריה (בריה מאוסה) ונאבד – אסור. אבל אם מזג מהמרק לקערה ולא נמצא הבריה -  מותר."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "משמיט את העובדה שהרשב\"א דיבר דווקא בברייה מאוסה, ומביא את ההיתר ללא נימוק", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.3", "txt": "קדרה של מרק שנפל שם בריה ונאבדה – אסור הכל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "זה דווקא כשאי אפשר לסנן מן המרק את הבריה אבל אם אפשר – מותר", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "סבר שבריה מאוסה הווי נטל\"פ ויש לה עצמה ביטול ככל דבר (ושלא כשאר בריות)", "under": true}], "pesak": null}, "bria-tolaim": {"title": "ירקות מבושלים שנמצאו בהם תולעים", "seif": "סעיף ד׳", "sugya": null, "intro": null, "ops": [{"layer": "rishon", "src": "שו\"ת הרשב\"א", "srcRef": null, "txt": "ירקות שנבדקו ונמצאו בהם 3 תולעים, ולאחמ\"כ נשלקו – אסורים\nלמה? כי יש חזקה שיש תולעים, לכן צריך לבדוק את הירקות יפה. אבל בירקות מבושלים אי אפשר לבדוק  (מבולבלין).\tאבל מי השלקות מותרים – כי אפשר לסננם;  ובשר שבישל במים אלו - אפשר גם כן לנקותו ולבודקו"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.4", "txt": "ירקות מבושלים שנמצאו בהם שלוש תולעים – אסורים. אבל מי השלקות מסננם ומותרים. והבשר ירחצנו ומותר."}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "הב\"י הביא כאן רשב\"א שאומר שהחזקה היא ב-3, וכרשב\"ג (במחלוקת לעניין חזקה). אבל בסימן פ\"ד, מביא לשון רשב\"א שהחזקה היא ב-2, כרֶבי. ונראה לב\"ח להחמיר ב-2."}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "ברור שצריך לנקוט כרשב\"ג, ורק בנשואין ומילה קיי\"ל כרֶבי. וכן נראה שנקט בפ\"ד השו\"ע"}, {"subsubhead": "ופירות?"}, {"layer": "acharon", "src": "כף החיים", "srcRef": null, "txt": "אפשר לבדוק פירות גם אחרי שליקה"}], "pesak": null}, "chal-yesod": {"title": "יסודות ועיקר הדין", "seif": "סעיף א׳", "sugya": null, "intro": "ננסה לסכם:", "ops": [{"layer": "lead", "src": "ה'סתירה' בין הסוגיות", "srcRef": null, "txt": "במשנה בחולין (פ' ג\"ה) נבלה ודג טמא כדין ג\"ה באם חתיכה מהן מתבשלת עם חתיכות מותרות– אינה מתבטלת ברוב \n(ואם מכירה: מוציאה והשאר מותר בנ\"ט;  לא מכירה – כל החתיכות אסורות, והרוטב בנ\"ט) \nובגמרא: הטעם לכך שחתיכה מאלו אינה מתבטלת – דבר שדרכו להימנות (פירוט הלמ\"ד לקמן)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אך בעבודה זרה (פ' השוכר את הפועלים) \nבמשנה: רשימה של דברים שאינם בטלים\nובגמרא: הרשימה היא של דברים שהם דבר שבמניין ואסורים בהנאה "}, {"layer": "lead", "src": null, "srcRef": null, "txt": "נראה שיש בפנינו שתי סוגיות שלא עולות יפה יחד. כאשר במשנה בחולין מוזכרים דברים שבמניין ועליהם נאמר שאינם בטלים, בעוד במשנה בע\"ז הדברים שאינם מתבטלים הם דברים עם שני קריטריונים: דבר שבמניין ואסורים בהנאה.\nובגמרא שם אומרת הסוגיה שהתנא בא להוציא דברים בעלי קריטריון אחד בלבד. דהיינו: מה שבחולין. \nהראשונים (תוספות ורא\"ש) נדחקים בכך, שהרי בוודאי שגם דג טמא ונבלה שבחולין אינם בטלים. הצעות: מדובר בשני תַנַאים חולקים (תוס'); מיעוט התנא הוא רק מן הרשימה, אך אינו מתיר (רא\"ש)."}, {"layer": "rishon", "src": "הרי\"ף", "srcRef": null, "txt": "משמיט את המשנה בחולין, ולכן נ\"ל שסובר שרק מה שבע\"ז אינו מתבטל ברוב."}, {"layer": "rishon", "src": "שאר הראשונים · תוס', רא\"ש, רמב\"ם", "srcRef": null, "txt": "אוסרים גם דברים שבמניין"}, {"layer": "note", "src": "דבר שבמניין", "srcRef": null, "txt": "דבר שבמניין – שבגלל חשיבותו סופרים אותו אחד אחד, ולא במשקל"}, {"layer": "mishna", "src": "משנה · חולין ק", "srcRef": null, "txt": "כמו ג\"ה, גם חתיכת נבלה ודגים טמאים שנתבשלו עם חתיכות מותרות – \nמכירן: בנ\"ט;  לא מכירן – כל החתיכות אסורות, והרוטב בנ\"ט", "ref": {"label": "חולין · פרק גיד הנשה · ק ע\"א", "ref": "Chullin.100a"}}, {"layer": "gemara", "src": "גמרא · חולין ק", "srcRef": null, "txt": "למה חתיכה של נבלה/דגים טמאים אינה מתבטלת?\n• למ\"ד שכל דבר שישנם אנשים הנוהגים למנותו משום שהם מקפידים על חשיבותו אינו מתבטל – חתיכה גם לא תתבטל מטעם זה. כי לעיתים עשוי כל אדם למנותה, לקראת אורחים (דהיינו – חשובה)\n• למ\"ד שדווקא דבר שנמנה אינו בטל, אבל דבר שניתן במשקל/אומדן בטל – חתיכה גם לא תתבטל משום שהיא ראויה להתכבד בפני אורחים ולפיכך – היא נחשבת 'שדרכו להימנות'\nכלומר, כך או כך, משום ש'דרכן להמנות', דהיינו, בגלל חשיבותן", "ref": {"label": "חולין · פרק גיד הנשה · ק ע\"א", "ref": "Chullin.100a"}}, {"layer": "rishon", "src": "רי\"ף", "srcRef": null, "txt": "סובר שרק אם הווי גם דבר שבמניין וגם איסורו הנאה אסור (השמיט את משנת חולין)"}, {"layer": "rishon", "src": "תוס', רא\"ש רמב\"ם ורוב הראשונים", "srcRef": null, "txt": "אוסרים גם דברים שהם רק דבר שבמניין"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "לגבי דבר שהוא איסור הנאה? (זה ממש לא ברור מה הכוונה בטור)\nמשמע מהתוס' והרא\"ש שגם זה נאסר מפני שאם תתבטל – תהיה ראויה להתכבד"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.1", "txt": "חה\"ל דינה כבריה ואינה מתבטלת אפילו באלף (כסוגיה בחולין; תוס', רא\"ש ושאר פוסקים)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "ואם מדובר בחה\"ל שגם אסורה בהנאה, היא אוסרת את כל התערובת בהנאה", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "ואפילו אם היא אסורה רק מדרבנן לא בטלה (ב\"י בשם.. )"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tואם ספק אם ראויה להתכבד – אזלינן לקולא, גם אם אסורה מדאורייתא (או\"ה) "}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "זאת משום שזה שחה\"ל אינה בטלה הוא רק מדרבנן, וספק דרבנן לקולא\n\t      אבל אם החתיכה וודאי ראויה להתכבד, והספק הוא רק אם היא חה\"ל של איסור – לא בטלה", "under": true}], "pesak": null}, "chal-hagdara": {"title": "עוד בהגדרת 'חה\"ל'", "seif": "סעיפים ב׳-ה׳", "sugya": null, "intro": "הטור והשו\"ע הקדישו חלק נכבד מן הסימן לעיסוק בגדרי חה\"ל וכן, במקרים ספציפיים. זאת, בעיקר בעקבות הרא\"ש שהאריך בדבר, והביא גם מגוון דעות אשר עליהן הוא חולק.\nהשו\"ע גם ראה לנכון להוסיף ולהרחיב על כך מראשונים נוספים, וכתב לגבי איברים מסוימים כמו 'הדרא דכנתא' (מעיים המלופפים על שומן ה'כנתא'), וקורקבן (קיבת השרירים).\nובתמצות:", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "אסורה מחמת עצמה (ב') – שאותה חתיכה שהיא ראויה להתכבד, תהיה גם חתיכת איסור. ודווקא מחמת עצמה, ולא משום שבלעה מדבר מה אחר ואסַרה (רא\"ש)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "גדר 'ראויה להתכבד' (ג') – בעיקר מחלוקת הרא\"ש מול ראשונים אחרים המקלים (רשב\"א, סמ\"ק וש\"ד). נראה כי עיקרה הוא בכך שהרא\"ש סובר שעיקר ההגדרה שלפיה יש לדבר חשיבות היא 'דבר שדרכות למנות', בעוד למקלים כל עוד זה לא דבר שהייתי מגיש לאורח אס איט איז – זה לא נחשב חה\"ל."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "השו\"ע סובר להקל כאלו האחרונים, מאחר וחה\"ל הוא דרבנן, והרמ\"א חושש לרא\"ש וסיעתו, אך מחריג\n מכך מקרים בהם דברים 'מחוסרי מעשה גדול'."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הפוסק צריך לבדוק את החשיבות ומה נחשב 'מחוסר מעשה גדול' לפי הזמן והמקום, וכראות עיניו. ואם יש לו ספק בכך - הולכים להקל בגלל שהווי מדרבנן  (וכ\"כ ערוה\"ש. והוא נוטה לסיעת הרא\"ש)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "     איברים פנימיים (ד'-ה') – בגמרא בנדרים נאמר ש'בני מעיים – אוכליהם לאו אינשי'. לפיכך פסק ה\"ר\n          יהודה שבני מעיים (איברי העיכול הפנימיים), וקורקבן בפרט, אינם עשויים להתכבד. וכן בשו\"ע.\n          אך נראה שיש שסוברים שכבד, ריאה וטחול, אינם בכלל בני מעיים, והם כן עשויים להתכבד (של\"ג). "}, {"subhead": "אסורה בפני עצמה (ב')"}, {"layer": "rishon", "src": "רא\"ש (וכן נראה מהרשב\"א, ר\"ן בשם רבותינו הצרפתים, סמ\"ג)", "srcRef": null, "txt": "דין חה\"ל הוא דווקא בדברים שאסורים בפני עצמם, כמו נבלה, או בשר בחלב. אבל לא דבר שנאסר בגלל שספג טעם ממשהו אחר  (בב\"ח הוא בדיוק מקרה בו עלולים להתבלבל, ולהגיד שהחלב אסור בגלל הבשר או להפך, אבל משמע כאן מכל הפוסקים שיש להתייחס לבב\"ח כחתיכה עצמאית, משום שבבישול נעשו לגוף אחד. וכ\"כ בב\"י)"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "הטעם לכך – משום שאין האיסור שנתערב ראוי להתכבד בפני אורחים כשלעצמו", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.2", "txt": "דין חה\"ל הוא דווקא בדברים האסורים בפני עצמם, ולא בגלל דבר אחר (רא\"ש וכו')"}, {"subsubhead": "גבינת גויים"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "גבינות שמעמידים בקיבת/חלב בהמה טריפה חשיב חה\"ל."}, {"layer": "rishon", "src": "דרכ\"מ", "srcRef": null, "txt": "זה אינו. שהרי לא אסורות מחמת עצמן, אלא רק בגלל הטריפה שבלעה (כסברת הרא\"ש)", "under": true}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "עיקר כדעת האו\"ה (והראה שיש סתירה בדברי הרמ\"א בשני מקומות בתורת חטאת)", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אם הגבינה ממש נעשתה מחלב טמא/טריפה – חשיבא חה\"ל; \n \t        אם רק הועמדה ע\"י חלב טמא/טריפה – לא חשיבא חה\"ל, והווי כמו איסור בלוע"}, {"subsubhead": "בשר שלא נמלח"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "בשר שלא נמלח לא יכול להיות חה\"ל, אלא רק הדם הוא שאוסרו וחשיב בלוע"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פסק כן"}, {"subsubhead": "כדי קליפה"}, {"layer": "rama", "src": "הרמ\"א", "srcRef": null, "txt": "פסק שאם דבר נאסר רק כדי קליפה, ודאי שיכול להתבטל, שהרי הקליפה עצמה אינה ראויה להתכבד (ש\"ד)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הביא את הלחם חמודות (על הרא\"ש) שתמה, הרי כשמשהו נאסר כדי קליפה זה כי הואבולע ממשהו אחר\nרי\"ו סבר להפך.                    והש\"ך עצמו סבר להחמיר דווקא בבב\"ח, ובשאר איסורים קליפה\nחשיב כאיסור הבלוע", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מאחר והקליפה עצמה אינה ראויה להתכבד, אף בבב\"ח\n \t   ניתן להתיר. והפלתי הקל בזה.", "under": true}, {"subhead": "גדר 'ראוי להתכבד' ואיברים מסוימים (ג'-ה')"}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "הולכים אחר השם, ולא אחר המצב הנוכחי ממש. כלומר, גם אם חתכתי אותה ועתה אינה ראויה להתכבד בפני אורחים. אלא כל שהווי 'דבר שדרכו לימנות' מפני חשיבותו."}, {"layer": "rishon", "src": "ר\"ש ור\"י (הביאם הרא\"ש)", "srcRef": null, "txt": "אף תרנגולת בנוצתה או כבש שלם חשיב חה\"ל"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "חה\"ל בפני אורחים היא בהכרח בינונית. לא גדולה מדי ולא קטנה מדי (כסיעת הי\"א ברא\"ש)"}, {"layer": "rishon", "src": "סמ\"ק", "srcRef": null, "txt": "בהמה עם הצמר או עוף עם הנוצות – אין קרוי ראויה להתכבד (ופשוט שזה משתמע גם לדעת\n \tהרשב\"א. וכ\"כ ערוה\"ש)"}, {"layer": "rishon", "src": "שערי דורא", "srcRef": null, "txt": "ר\"ת התיר תרנגולת נבלה שנתערבה בכשרות משום שהייתה בנוצותיה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "העניין כאן הוא שהרא\"ש כשיטתו מבדיל בין חה\"ל ל'דבר שדרכו למנות'\n\t\t\t  ולדידו כל שדרכו למנות חשיב חה\"ל ויש לאוסרו. \n \t\t\tאבל דעת הטור-שו\"ע כאן קשה, משום שבסי' זה, משמע שנוקטים לגבי חיה\n \t\t\tדהעיקר אם הווי חה\"ל, ובסי' ק\"י משמע שנוקטים אם חשובה כבעל חי (ובק\"י\n \t\t\tאם נשחטה אינה חשובה)", "under": true}, {"layer": "rishon", "src": "דרכ\"מ", "srcRef": null, "txt": "  מהרא\"י: רגליים שלא הוסר שערן ורגליים של אווז שלא הוסר עורן – לא נחשבים חה\"ל\n\t    אבל הטלפיים של הרגליים, אי הורדתן לא גורמת לכך של יחשבו הרגליים חה\"ל"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.3", "txt": "נראה שדוחה את דעת הרא\"ש וסובר ככל המתירים שאחריו (רשב\"א, סמ\"ק, ש\"ד)\n\t    אבל כתב שיש חולקים בזה (הרא\"ש)\n\t\tובבדק הבית כתב שהקל מאחר וחה\"ל הוא מדרבנן"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "סבר שנוהגים כרא\"ש, חוץ מכל אלו, שסובר שנחשבים 'מחוסרי מעשה גדול'\n• תרנגולת בנוצתה (ר\"ת)\n• רגליים שלא הוסרו שערותיהן\n• ראש שלא הוסרו שערותיו\n• במדינות 'האלו' רגליים וראש של עופות אף אם הוסרו שערותיהם"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "גם ראש של בהמה אינו חשוב (אף אם הוסרו שערותיו). ורק ראש של עגל", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אף ראש של עגל אינו חשוב בימינו (אף אם הוסרו שערותיו). \n \t\tאבל לשון של בהמה כן חשובה, משום שאברהם כיבד בה מלאכים, ואם היא בראש\n \t\tהבהמה – חשיב חה\"ל", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כל הפוסקים כותבים שכל הדברים האלו של חשיבות תלויים בזמן והמקום, וכראות הפוסק. ואם יש לו ספק בכך – הולכים להקל בגלל שהווי מדרבנן  (וכ\"כ ערוה\"ש. והוא טורח להחזיר שהקריטריון\n \t\t\t\t\t            החשוב בזה זה דבר שדרכו להמנות)"}, {"subsubhead": "שומן הכנתא ובני מעיים (ד'-ה')"}, {"layer": "rishon", "src": "הגהות ש\"ד (תה\"ד)", "srcRef": null, "txt": "הדרא דכנתא אינו ראוי להתכבד. לא מגישים אותו. אנשים לא אוכלים שומן לבדו."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.4", "txt": "פסק כן"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "עור שומן אווז כן ראוי להתכבד"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מתקשה בכוונת הש\"ד והשו\"ע. אם הכוונה לשומן לבדו - הרי פשוט שמותר, שהרי בני\nאדם לא אוכלים שומן לבד. ואם הכוונה לשומן עם הכנתא – הוא ראויה להתכבד, שהרי עושים מהמנה מאכלים כשממלאים אותה בקמח. \nמציע: הכוונה שהשומן עם הכנתא, ללא מילוי כלל – לא ראויים להתכבד\nולגבי הרמ\"א סבר: כנראה שבימיהם היו מפשיטים כל העור ומבשלים אותו כחתיכה אחת\n \t\t   גדולה. אבל בימינו לא שייך, משום שמטגנים אותו בחתיכות קטנות ", "expandable": true}, {"layer": "rishon", "src": "ב\"י (ה') בשם ה\"ר יהודה", "srcRef": null, "txt": "הטור בסימן ק\"י הביא בשם ה\"ר יהודה:\n קורקבן (קיבת הבהמה) אינו חשיבה חה\"ל, עפ\"י המימרא בנדרים: 'בני מעיים – אוכליהם לאו אינשי'"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.5", "txt": "(גם לגבי 'שאר בני מעיים')"}, {"layer": "rishon", "src": "של\"ג", "srcRef": null, "txt": "יש שסוברים שכבד, ריאה וטחול, אינם בכלל בני מעיים, והם כן עשויים להתכבד.", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "למהרש\"ל קורקבן אווז חשיב ראוי להתכבד. ומשמע ששל תרנגולת לא"}, {"layer": "acharon", "src": "לבוש", "srcRef": null, "txt": "כבד של אווזות מפוטמות, שמלבינה מרוב שומן, חשיבה ראויה להתכבד", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "וגם כאן כמובן שייך שיקול הזמן והמקום "}], "pesak": null}, "chal-bitul": {"title": "ביטול חשיבות חה\"ל/בריה", "seif": "סעיפים ו׳-ז׳", "sugya": null, "intro": "ברגע שחה\"ל או בריה מאבדים מחשיבותם – בטלים הם כשאר כל איסורים. אזי, שייך בהם הדיון שבסימן צ\"ט, לגבי ביטול איסור. אולם, נראה כי כאן הדיון מעט שונה, שכן, כאן מעשה הביטול ושאלה הכוונה (מזיד/שוגג) לעשותו אינה בערבוב האיסור או בהוספת היתר, אלא בפגימת החשיבות מן הבריה/חה\"ל כך שתוכל להתבטל. וגם זה עפ\"י הרא\"ש, על מה שכתב לגבי בריה, והטור-שו\"ע הסיקו כן בהתאמה על חה\"ל.\n\nואכן, כמו בצ\"ט (ובדומה למעשה שבת בשי\"ח, רשב\"א-רמב\"ם-ר' יהודה), סובר רא\"ש בברייה שדווקא אם נתפרקה מחשיבותה בשוגג מתבטלת, אבל במזיד – התערובת אסורה. ודווקא למי שפירק בעבורו.\n\nובסעיף ז', הטור והשו\"ע הביאו מקרה של ספק הנוגע בדין זה. לפיו, כאשר חה\"ל/בריה שנתערבה בתערובת ואינה ניכרת, ולאחר מכן נחתכה חתיכה כלשהי ובטלה חשיבותה – אין להניח שמדובר בחה\"ל, וכל שאר החתיכות עדיין אסורות. אך החתיכה הזו מותרת (יש לכך שני צדדים, ולשניהם היא מותרת. מפורט לקמן)", "ops": [{"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "כותב עפ\"י הסוגיה במכות שבריה שנתרסקה/נחתך ממנה קצת - לא חשיבא ברייה ובטלה ברוב (תשעה נמלים שרסקן שלוקה רק משום שנצטרפו לכזית)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "ובהתאמה לגבי חה\"ל – אם נפרסה (נתפרקה), בטלה חשיבותה והיא בטלה ב60 (אגוזי פרך,\n        גיטין. וכ\"כ רשב\"א ור\"ן)"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "ואפילו אם נתבטלה החשיבות אחר שנתערבה (גבי בריה)", "under": true}, {"layer": "rishon", "src": "שערי דורא", "srcRef": null, "txt": "   יש מפרשים בדג, שגם אם נתפרק, אם רובו עדיין שלם – חשיב בריה. וזה עפ\"י אהלות, שם אמרינן\n   שהאברים אין להם שיעור.\n   ויש להם דוחים, שאומרים שזה דווקא לעניין טומאה (אבל לאכילה - לא חשיב בריה, ומתבטל)"}, {"layer": "rishon", "src": "הגהות שערי דורא (תרוה\"ד)", "srcRef": null, "txt": "   מהרא\"י: אם הוא שלם ונפל ממנו קצת ע\"י בישול – עדיין חשיב בריה \nהגהות: אבל אם נפרד ממנו קצת מגופו ושדרתו וכד', אפשר לסמוך על דעות המקלים והדוחים"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.6", "txt": "בריה או חה\"ל שנחתכה/נתפרקה – בטלה (עפ\"י הרא\"ש גבי מכות, ב\"י, רשב\"א ור\"ן)\n\t     ואפילו אם נתרסקה לאחר שנתערבה (רשב\"א)\n\t     ודווקא בשוגג. אבל במזיד – אסור למי שבעבורו רוסק (רא\"ש, כסי' צ\"ט)\n\t(ונראה שלא התייחס למה שהש\"ד והגש\"ד דנו גבי רובו שלם)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אין חילוק בין נתערבו במינם או שלא במינם (לא נראה שייך כאן. וכ\"כ ט\"ז. אלא לסי' ק\"ב, א')"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז", "srcRef": null, "txt": "דברי הרמ\"א קאי על פשט הדין של חה\"ל ובריה שאינן בטלות דאפילו באלף", "under": true}, {"layer": "acharon", "src": "ערוה\"ש, פר\"ח", "srcRef": null, "txt": "חומר בחה\"ל מבריה - אפשר להוריד ממנה חתיכה ועדיין תהיה ראויה להכתבד, ואסורה אפילו באלף. לעומת בריה, שברגע שיורדת ממנה חתיכה, לרוב הדעות כבר אינה בריה.\nוחומר בבריה מחה\"ל - שאפילו אם היא נסרחת עדיין חשיבי ברייה (השו\"ע לא כותב זאת. אלא ערוה\"ש)", "expandable": true}, {"subhead": "שוגג"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "הטור והשו\"ע (ו') כותבים לפי הרא\"ש, בדומה לצ\"ט, שדין זה הוא דווקא באם נתרסקה ונתבטלה הבריה/חה\"ל בשוגג \nואם עשה כן במזיד – אסור למבטל עצמו (אבל לאחרים מותר, אם לא עשה כן בשבילם)"}, {"layer": "rishon", "src": "האו\"ה", "srcRef": null, "txt": "סובר שגם כאן, בדומה לדעות בצ\"ט, מיקרי 'שוגג' דווקא אם נתפרקה הבריה/חה\"ל כשעוד לא נודע שנפלה לתערובת. "}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פסק שלא כמותו, וכתב שאף אם נתפרק לאחר שנודע על העירבוב"}, {"subhead": "ספק בחתיכה שבטלה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "בסעיף ז', כתבו הטור והשו\"ע עפ\"י הרא\"ש, לגבי מקרה בו נחתכה חתיכה ואין יודעים אם היא של איסור – שאם כן, הייתה ברייה/חה\"ל ועתה בטלה חשיבותה – לא משערים שאכן כך. אבל החתיכה עצמה בכל מקרה מותרת; וממאי נפשך? "}, {"layer": "note", "src": "ממאי נפשך", "srcRef": null, "txt": "   אם היא החה\"ל – אזי נתפרקה מאיסורה וכולן מותרות.  \n   אם היא לא – אזי מותרת בכל מקרה (אם מוציאה מהתערובת)."}], "pesak": null}, "chal-tref": {"title": "זיהוי טריפה אחר שנתערבה", "seif": "סעיפים ח׳-ט׳", "sugya": null, "intro": "באופן שקצת לא שייך לכאן, השו\"ע מביא כאן הלכה לעניין זיהוי טריפה שנתערבה בתערובת ואין יודעים איזו היא (אולי בגלל העיסוק בסע' ז' בחתיכה שאין יודעים אם היא החה\"ל, או לא). ", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "השו\"ע פוסק עפ\"י הגהות מיימוניות (בשם או\"ז) ותרומת הדשן, כי בתוך תערובת של תרנגולות או של כבשים, כאשר התברר כי אחד מהם טרף ואוסר את כולם (כל הקורקבנים של התרנגולות וכן הראשים של הכבשים אינם בתערובת ונמצאים בידינו, ולפיהם ניתן לדעת אם התרנגולת/כבש טריפה), ניתן לזהות ע\"י התאמת שומן הקורקבן/ראש לבעליו מי מהם הטריפה. ואז, מוציאים את הטריפה ובכך מתירים את השאר.\nזאת עפ\"י ברייתא בע\"ז, שם רשב\"ג התיר גרב מלאה חתיכות דג כאשר נמצא סימן באחד מהם. "}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "בשומן הקורקבן אמנם נסתפק בהשוואה והתאמה ע\"י מראה, אך בכבש ושאר דברים צריך גם צורה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "יש פוסקים שהקשו על לשון השו\"ע, שהרי כאן משמע שהכבש/תרנגול הווי חה\"ל, ובס' ג' פסק שלא. והתירוצים בכך שונים. כגון: כאן השו\"ע פשוט נקט כדוגמתם של ההגהות ות\"ה, אבל העיקר הוא מה שכתב 'וכן כל כיוצא בזה'. \nלדעתי: השו\"ע מדבר בס' ג' על תרנגולת בנוצותיה, וכן על כבש שהוא שלם או גדול מדי. פשוט צ\"ל שכאן מיירי בכך שאינם כנ\"ל."}, {"layer": "gemara", "src": "ברייתא · ע\"ז", "srcRef": null, "txt": "ברייתא ע\"ז: \nגוי שהביא גרב מלאה חתיכות דגים ונמצא באחת החתכיות סימן – התיר רשב\"ג את כל החתיכות. \nורב פפא: זה כי ניתן להתאים את כל החתיכות יחד (כמו פאזל) ולראות שהן שייכות זו לזו", "ref": {"label": "ברייתא · עבודה זרה", "ref": ""}}, {"layer": "rishon", "src": "הגהות מיימוניות", "srcRef": null, "txt": "רַבי (האו\"ז) התאים שומן קורקבן של תרנגולת טריפה (נקוב) לתרנגולת אחת מתוך תערובת של תרנגולות, וכך אימת שהיא הטריפה, והתיר בכך את האחרות (ככה\"נ ע\"י כך שהוציאה)."}, {"layer": "rishon", "src": "תרומה\"ד", "srcRef": null, "txt": "ניתן להתאים ראש כבש טרף לכבש אחד מתוך תערובת של כבשים ע\"י הקפת ראשו, ולהתיר האחרים."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ח'-ט')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.8", "txt": "פסק כדברי שניהם, הן לגבי תרנגולת ושומן קורקבן שלה, והן לגבי כבש וראש שלו. וכתב שכן כל כיוצא בזה."}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "בשומן ה
