אפילו במשמרת, אם הם צלולים) – אסור בסודרים משום מלבן, אבל עם יין אין בעיה (משום שסבר כר\"ת שלא שייך מלבן במשקים שאינם יין)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.10", "txt": "כתב עפ\"י זעירי (ר\"ן) שמותר לסנן במשמרת יין או מים צלולים, אך הביא בסוף גם את דעת הרמב\"ם שאסר כל סינון במשמרת, והתיר רק צלול בסודרין.\nוכתב שבסודרים מותר רק יין שאינו עכור (על פניו היה אמור כדעת הר\"ן להתיר. מ\"ב תירץ שהם עכורים לגמרי, אבל בעכורים קצת -מתיר)\nהביא את הטור שאסור מים בכל מקרה בסודר בגלל מלבן"}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "הביא את שיטות הר\"ן והב\"ח למה נחשב צלול", "under": true}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "סובר כדעת הר\"ן לעניין זה שצלול הוא מה שרוב האנשים שותים בלא להקפיד.\nאבל כתב שמי שהוא אסטניס ומקפיד על הסינון - אסור לו"}], "pesak": null}, "shaar": {"title": "שאר סעיפים והערות עליהם", "seif": null, "sugya": null, "ops": [{"subhead": "סעיף ה' – הבורר תורמוסין מפסולתיהן"}, {"layer": "shulchan", "src": "בשו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.5", "txt": "הבורר תורמוסין מתוך פסולת שלהן חייב מפני שהפסולת שלהם ממתקת אותם ונמצא בורר פסולת מתוך אוכל.\n- אז בגלל שלא מתקיים התנאי של רב המנונא (אוכל מפסולת), אסור. אבל איך? הרי אני מוציא את התורמוסים מתוך הפסולת?"}, {"layer": "acharon", "src": "המ\"ב", "srcRef": null, "txt": "התורמוס עצמו מאוד מר, ואפילו הקליפה שלו פחות מרה. לכן נחשב התורמוס פסולת לעומתה."}, {"subhead": "סעיף י\"א – סינון יין צלול בסודר"}, {"layer": "lead", "srcRef": null, "txt": "למדנו בסעיף ט' שיש בעיה עם סינון יין משמריו במשמרת משום בורר ו/או מרקד\nבסעיף י' ראינו שמותר לשפוך יין צלול למשמרת, אבל אם הוא עכור ויש בו קמחים או עובד - אסור.\nובסודר מותר אף יין עכור קצת, וק\"ו שגם יין צלול (ולרמב\"ם אסור במשמרת אף צלול, ובסודר אסור אף עכור)"}, {"layer": "gemara", "src": "רב שימי בר חייא", "srcRef": null, "txt": "ההיתר לסנן יין בסודרים הוא בתנאי שלא יעשה בה גומא (שקע)", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "shulchan", "src": "ראשונים ושו\"ע · (סע׳ י\"א)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.11", "txt": "הטעם הוא שיהיה 'שינוי', משום עובדין דחול"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מה ששו\"ע כותב שצריך שינוי ואסור לעשות גומא, הוא מדבר רק על יין עכור. כי אם הוא התיר יין צלול אפילו במשמרת ולא הצריכו לשם כך שינוי, אז וודאי שבסודר אין צורך בשינוי בשביל יין צלול.\n(מהמ\"ב משתמע שאולי סובר שבמשמרת מותר אפילו יין עכור אם עושים 'שינוי' מעובדין דחול)"}, {"subhead": "סעיף י\"ב – דין כפיפה מצרית כדין סודר. לא להגביה הכפיפה מהכלי"}, {"layer": "gemara", "src": "רב חייא בשם רב", "srcRef": null, "txt": "היתר סינון יין בכפיפה מצרית הוא בתנאי שלא יגביה הסל מקרקעית הכלי טפח.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "משום אוהל", "under": true}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "משום שינוי. עובדין דחול", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.12", "txt": "נקט בלשונו כר\"ן"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם אינו מכסה עם הכפיפה את כל חלל הכלי – לכו\"ע מותר אף להגביה טפח. כי אין לא אוהל ולא עובדין דחול."}, {"subhead": "סעיף י\"ג – מיחזי כמשמרת"}, {"layer": "gemara", "src": "רב פפא, עפ\"י רש\"י", "srcRef": null, "txt": "אסור להצמיד קשים וקיסמים לפיו של כלי ובשבת לשפוך לשם יין כדי לסנן ממנו קיסמים משום שמחזי כמשמרת.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ג)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.13", "txt": "פוסק כן"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "סובר שהשו\"ע מדבר על יין עכור דווקא; וכי ביין צלול מותר אפילו במשמרת אם מסנן רק קיסמים דקים."}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "כל זה מיירי אם מהדק את הקיסמים לפה הכלי בחוזקה. אבל אם לא מהדקם כך שהקיסמים שביין יוכלו לעבור דרכם – מותר."}, {"subhead": "עירוי (שיט, יד)"}, {"layer": "gemara", "src": "בגמרא קלט", "srcRef": null, "txt": "בבית רב פפא היו מערים יין מחבית לחבית למרות שנשארו שמרים שהם פסולת\nורב אחא מדיפתי הקשה שיש טיפות קטנות בסוף שמעורבבות עם פסולת השמרים\nרבינא מתרץ שלרב פפא הטיפות לא היו חשובות משום שהיה לו הרבה.\nאם כן, בגלל שהיין בסוף החבית מעורבב עם השמרים יש בעיה של בורר לשופכו.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "הרוקח", "srcRef": null, "txt": "הביא שמותר להגביה את החבית ולשים אותה על משהו כדי לערות יותר טוב"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ד)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.14", "txt": "העתיק דין הסוגיה וכתב שמותר לערות יין מחבית לחבית רק שצריך להיזהר לקראת הסוף כשמגיע לחלק שמעורב עם שמרים"}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "הביא את הרוקח"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אמנם מוזר דין זה. שהרי זה ברירת אוכל מתוך פסולת.\nמתרץ שהחשש המדובר הוא שהמזיגה היא לאחר זמן והביא כך המ\"ב"}, {"layer": "acharon", "src": "שו\"ע הרב", "srcRef": null, "txt": "מכיוון שמחזיק החבית בה נשארים השמרים, נחשב כאילו הוציא הפסולת מהמאכל.", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "hagdarot"}, {"type": "sec", "id": "sugya"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "tnaim"}, {"type": "sec", "id": "shnei"}, {"type": "sec", "id": "echad"}, {"type": "sec", "id": "kiluf"}, {"type": "sec", "id": "sheeino"}, {"type": "sec", "id": "lach"}, {"type": "sec", "id": "tircha"}, {"type": "sec", "id": "mishmeret"}, {"type": "sec", "id": "shaar"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"אוכל מתוך פסולת": "אחד משלושת תנאי ההיתר — לברור את הרצוי (האוכל) ולהותיר את הפסולת, ולא להפך.", "לאלתר": "לברור סמוך לאכילה, ולא לאיחסון (לאוצר). אחד משלושת התנאים.", "דרך אכילה": "בהתקיים שלושת התנאים, הברירה נחשבת חלק מדרך האכילה — ולא מלאכת ברירה.", "נפה": "כלי ניפוי דק לברירה; הבורר בו חייב.", "כברה": "כלי ברירה גס; הבורר בו חייב מן התורה.", "משמרת": "כלי או בגד לסינון משקים משמריהם.", "מרקד": "מלאכת ניפוי קמח בנפה; נידונה לצד בורר בעניין הסינון.", "ידא אריכתא": "'יד ארוכה' — כינוי לכלי אכילה (סכו\"ם) הנחשב כהמשך היד ולא ככלי ברירה.", "מלאכה שאינה צריכה לגופה": "מלאכה הנעשית שלא לצורך התוצאה הרגילה שלה; נחלקו אם הבורר בכללהּ.", "עובדין דחול": "מעשה של חול; ולכן דרשו בו 'שינוי' בשבת."}, "subject": "שבת", "id": "borer"}, {"topic": {"title": "מעשה שבת", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי\"ח (סע' א'-ב')", "siman": "Shulchan_Arukh,_Orach_Chayim.318", "intro": {"lead": {"t": "", "ref": ""}, "body": "**מבוא:**\n'מעשה שבת' הוא כינוי לכל תוצר שהוא פרי יצירה של מלאכה האסורה בשבת. לדוגמא: תבשיל שבושל בשבת באיסור. הסוגיה במסכת חולין דנה מה יהא דינו של מעשה שבת, ואם יעשה זה בשוגג או במזיד (ושוכח נחשב שוגג לעניין זה [מ\"ב])\n\n**תמצית התוכן:**\n+עיקר הבירור מתחיל במשנה, הקובעת שעל אף שהשוחט בשבת חייב, שחיטתו כשרה. \n+לאחמ\"כ, אנו פוגשים בגמרא את שלוש הדעות המרכזיות של התנאים, ואת הדיון על עמדת רב; אשר בעיקרון סבר להקל כר' מאיר, אך לעמי הארץ פסק כדעת ר' יהודה \n+הראשונים חולקים במספר עניינים:\n  מחלוקת התנאים (ר\"י ותרומה | רר\"ר וגאונים;  שו\"ע פוסק ר' יהודה)\n  מתי מותר במוצ\"ש (רש\"י | רמב\"ם ורא\"ש;  שו\"ע פוסק שמותר מיד)\n  האם הדיון חל רק על בישול או כל מלאכה (תרומה | טור;  רמ\"א מביא שבכל מלאכה)\n+הפוסקים דנים במקרים נוספים:\n  כשמבשל אדם בעבור מישהו אחר, האם דינו כמי שבישל בעצמו ואסור לעולם \n(מג\"א ומ\"ב מקלים. אור לציון סובר שבמקרי קביעות כמסעדות וכד' יש לאסור)\n  האם חל גם במלאכה מדרבנן (גר\"א, מ\"ב, חיי אדם - רק דאוריייתא | פמ\"ג – גם דרבנן)\n  בישל במזיד ונתערבב עם תבשיל מותר (מג\"א אוסר לו לעולם ולאחרים למוצ\"ש. ר\"ע מתיר)"}}, "sections": {"din": {"title": "דין מעשה שבת", "seif": "סעיף א׳", "sugya": null, "intro": null, "ops": [{"layer": "mishna", "src": "משנה · תרומות", "srcRef": null, "txt": "המבשל בשבת: מזיד- לא יאכל; שוגג- יאכל\nהנוטע: שוגג-יקיים; מזיד-יעקור", "ref": {"label": "משנה תרומות · פ\"ב", "ref": "Mishnah_Terumot.2.3"}}, {"subsubhead": "סוגיית מסכת חולין יד (פ' הכל שוחטין) — מופיעה גם בבב\"ק"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "השוחט בשבת, אעפ\"י שחייב – שחיטתו כשרה", "ref": {"label": "חולין · פרק הכל שוחטין · יד ע\"א", "ref": "Chullin.14a"}}, {"layer": "gemara", "src": "גמרא · דעות התנאים", "srcRef": null, "txt": "רבי מאיר: בשוגג – מותר בשבת לכולם; במזיד – לכולם אסור בשבת, מותר במוצ\"ש (לכולם)\nרבי יהודה: בשוגג - מותר במוצ\"ש (לכולם); במזיד – אסור לו לעולם. לאחרים מותר\nר' יוחנן הסנדלר: בשוגג - מותר במוצ\"ש לאחרים;  במזיד - אסור לעולם לכולם", "ref": {"label": "חולין · פרק הכל שוחטין · יד ע\"א", "ref": "Chullin.14a"}}, {"layer": "table", "table": {"title": "", "align": "center", "cornerColor": "#FFFFFF", "cols": ["מזיד", "שוגג"], "colColors": ["#FABF8F", "#B8CCE4"], "rows": [{"head": "ר' מאיר", "headColor": "#D6E3BC", "cells": ["אסור בשבת.\nמותר במוצ\"ש לכולם", "מותר בשבת לכולם"]}, {"head": "ר' יהודה \n– קונס במזיד לעולם", "headColor": "#FBFDA3", "cells": ["אסור לו עולמית. \nלאחרים מותר במוצ\"ש", "אסור בשבת.\nמותר במוצ\"ש לכולם"]}, {"head": "ר' יוחנן הסנדלר \n– קונס גם בשוגג לעולם", "headColor": "#F9759E", "cells": ["אסור לכולם עולמית", "אסור לו עולמית. \nלאחרים מותר במוצ\"ש"]}]}}, {"layer": "note", "src": "בין שחיטה לבישול", "srcRef": null, "txt": "בין שחיטה לבישול: אם שייך מוקצה ולא היה ראוי לכוס. נפק\"מ: השוחט (בשוגג) אסור לבריא; המבשל בשוגג מותר"}, {"layer": "rishon", "src": "רי\"ף, רמב\"ם, רא\"ש, גאונים", "srcRef": null, "txt": "פוסקים ר' יהודה"}, {"layer": "rishon", "src": "ר\"י (תוס'), בעל התרומה", "srcRef": null, "txt": "פוסק כר' מאיר"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "הטעם שפסקו כר' יהודה למרות שבעיקרון רב סבר כר' מאיר, משום שפסק כר' יהודה בעבור עמי הארץ. ואנן שכיחי לגבן עמי הארץ. שמא נזלזל בשבת. (היו משהין במזיד ואומרים 'שכחתי')"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.1", "txt": "נוקט כרוב הראשונים (רר\"ר) כר' יהודה,שמי שבישל בשבת- \nבמזיד- אסור לו לעולם ולאחרים מותר במוצש\nבשוגג- אסור לכולם בשבת, ובמוצ\"ש מותר לכולם"}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "והמשנ\"ב כתב שבמקום צורך ניתן להקל בשוגג כדעת התרומה כר' מאיר לאכול בשבת", "under": true}, {"subsubhead": "מתי מותר במוצ\"ש — מיד / בכדי שיעשו"}, {"layer": "rishon", "src": "רמב\"ם, רא\"ש, גאונים", "srcRef": null, "txt": "מיד במוצ\"ש"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "בכדי שיעשו"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.1", "txt": "נקט כרמב\"ם רא\"ש וגאונים שמותר מיד במוצ\"ש"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "(ובב\"י כתב (בשם המ\"מ שרק בדבר שעשה גוי לישראל גוזרים בכדי שיעשו. משום שעשייה של גוי יותר נוחה וקלה; אבל וודאי שלא יעבור בידיו להבא. ובכל מקרה, אם עשה לחולה – לכו\"ע מותר לבריא במוצ\"ש מיד, ולא שייך לגזור בכדי שיעשו, שהרי עשה בהיתר)", "collapsed": true}, {"subsubhead": "ההיתר — לכל מעשה שבת או רק לבישול?"}, {"layer": "rishon", "src": "טור, רמב\"ם", "srcRef": null, "txt": "כל מעשה שבת עפ\"י ר\"י"}, {"layer": "rishon", "src": "בעל התרומה", "srcRef": null, "txt": "רק בישול. אבל שאר מלאכות יהיה אסור תמיד (לכן למרות שסובר כר' מאיר שהמבשל בשוגג מותר בשבת, בהדלקת נר או שאר מלאכות אסורות – יהיה אסור)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "רמ\"א הביא את דעת הטור שכל מעשה שבת מותר (כשמותר), ולא רק בישול"}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "ובה\"ל סבר שמוכח שזה גם דעת השו\"ע ממה שפסק כדעת הר\"י", "under": true}, {"subsubhead": "בישל בעבור אדם אחר"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "פסקנו כר' יהודה שבישול במזיד יהיה אסור בעבור המבשל לעולם, ובעבור אחרים יהיה מותר במוצ\"ש, ובשוגג יהיה מותר אף לו במוצ\"ש. \nכאשר אדם בישל את התבשיל בעבור מישהו מסוים, האם אין להתייחס אליו כמי שבישל בעצמו? שהרי, הוא היה מושא הבישול. הנפק\"מ לכך תהיה שאסור יהיה לו לאכול את זה לעולם (בשבת בכל מקרה יהיה אסור לכולם)."}, {"layer": "acharon", "src": "מג\"א, א\"ר", "srcRef": null, "txt": "המג\"א והא\"ר כתבו, שעדיין ישאר דינו כאחר ויהיה לו מותר במוצ\"ש. ולא אומרים שיש לגזור שמא יגיד לאחר לבשל בשבילו, משום שאין אדם חוטא בעבור מישהו אחר."}, {"layer": "zman", "src": "אור לציון", "srcRef": null, "txt": "סבר שלמרות המג\"א והא\"ר, יש לאסור לאכול במסעדות שבישלו בעבור אחרים וכד', משום שיש בזה סיוע לעוברי עבירה.\n(אולם נלענ\"ד שיש לדון באריכות לגבי הגדרת מזיד/שוגג באשר לחילונים; באשר יש מי שיגדירם כתינוקות שנשבו וצ\"ע ואכמ\"ל)"}, {"subsubhead": "מלאכה מדרבנן"}, {"layer": "acharon", "src": "פמ\"ג / משנ\"ב, גר\"א, חיי אדם", "srcRef": null, "txt": "הפמ\"ג סובר שכן. אבל שאר הפוסקים סוברים ששייך רק בדאורייתא (משנ\"ב, גר\"א, חיי אדם). ובדרבנן יהיה כדעת ר' מאיר, ובשוגג יהיה מותר אפילו בשבת; ובמזיד יהיה מותר במוצ\"ש לכולם."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ועוד, נראה שלכל הדעות, אם יש ספק אם עבר על מלאכה או לא, אין לאסור לעולם משום שהאיסור לעולם הוא מדרבנן וספיקא דרבנן לקולא."}, {"subsubhead": "התערבב עם תבשיל מותר"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "מג\"א סובר שדין התבשיל המותר כדין התבשיל שבושל, ואסור למבשל לעולם; ולאחרים מותר במוצ\"ש"}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "הרב עובדיה סבר שמותר לאוכלו אפילו בשבת, ואין דינו כדין התבשיל שבושל בשבת"}, {"subsubhead": "דין הקדרה עצמה"}, {"layer": "acharon", "src": "מג\"א בשם הרשב\"א", "srcRef": null, "txt": "המג\"א הביא בשם הרשב\"א, שאם בישל במזיד בשבת (ודינו שאסור לו לעולם) – אף הקדרה אסורה בשימוש, מפני שהיא בלועה בדבר האסור."}], "pesak": null}, "chole": {"title": "השוחט והמבשל לחולה", "seif": "סעיף ב׳", "sugya": null, "intro": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "לגבי השוחט או המבשל לחולה שיש בו סכנה, אם מותר לאחר לאוכלו - דעות רב ורב דימי מנהרדעא הפוכות. זאת משום שטעם רב הוא לעניין מוקצה; ולפיו מותר לאכול תבשיל שבושל בשבת לחולה משום שהיה ראוי לאכילה בשבת גם לפני הבישול. לכן אין כאן מוקצה דבין השמשות. אבל בשר שישחט לחולה אסור, משום שאינו ראוי בשבת עד שתעשה הפעולה של השחיטה.\nאולם לדעת רב דימי מנהרדעא, אין פה בעיה של מוקצה. ובוודאי שהבשר הנשחט לחולה מותר לאדם אחר משום שנשחט בהיתר. והחשש היחיד הוא שמא ינצלו זאת להרבות את המלאכה בשבת תוך עשייה. לכן, בבישול יש חשש כזה, משום שתמיד יכול להרבות. אבל בשחיטה, שגם ככה שוחט כמות גדולה – אין חשש שירבה."}, {"layer": "gemara", "src": "גמרא · חולין טו · רב", "srcRef": null, "txt": "השוחט לחולה בשבת בהיתר – אסור לאחר להנות (מוקצה)\nהמבשל לחולה בשבת בהיתר – מותר לאחר לאכול (משום שראוי היה בשבת לכוס. ואינו מוקצה)", "ref": {"label": "חולין · פרק הכל שוחטין · טו ע\"א", "ref": "Chullin.15a"}}, {"layer": "gemara", "src": "רב דימי מנהרדעא", "srcRef": null, "txt": "המבשל לחולה בשבת בהיתר - אסור לבריא בשבת, גזירה שמא ירבה בשבילו\nהשוחט לחולה בהיתר – מותר לבריא לא חוששים שירבה משום שגם ככה שוחט את כל הבהמה", "ref": {"label": "חולין · פרק הכל שוחטין · טו ע\"א", "ref": "Chullin.15a"}}, {"layer": "rishon", "src": "רי\"ף, רמב\"ם, רא\"ש", "srcRef": null, "txt": "רי\"ף רמב\"ם ורא\"ש נקטו עפ\"י רב דימי מנהרדעא [שמותר למי שאינו חולה להנות מבשר שנשחט בעבור חולה, משום שאין בכך חשש שמא ירבה]"}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "והרא\"ש הסביר שהסיבה לכך שהלכה כרב דימי היא משום שעל אף שלרב יש בעיה של מוקצה מחמת איסור (בינה\"ש); קיי\"ל כר' שמעון שאין מוקצה זה אלא אם דחאו בידיים (כגון נר שהדליק עליו).", "under": true}, {"subsubhead": "האם רב ורב דימי חולקים לגמרי?"}, {"layer": "rishon", "src": "ר\"ן, רש\"י", "srcRef": null, "txt": "לדעת הר\"ן ורש\"י, גם רב דימי חושש למוקצה, ולא חלק על רב בעניין שחיטה ששייך חשש זה; אלא שהוא מדבר על חולה מבעוד יום, שאז הבהמה הנשחטת עמדה לשחיטה עוד מער\"ש."}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "נראה שהרא\"ש סובר שהם חולקים לגמרי. והכריע כרב דימי שמותר בשחיטה בכל חולה (ב\"י); ולא צריך להעמיד את דברי רב דימי בחולה מבעוד יום."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.2", "txt": "והשו\"ע נקט עפ\"י הבנתו ברא\"ש (והרמב\"ם והרי\"ף) , וכתב שגם בעבור חולה מבעוד יום וגם בעבור חולה בשבת מותר לשחוט בשבת. אבל לבשל אסור משום שחיישינן שמא ירבה.\n\tוהמ\"ב והפמ\"ג סברו, שהתבשיל מותר לבריא במוצ\"ש מיד; דלא בעינן בכך בכדי שיעשו.\tוסבר שמותר לטעום בשביל החולה אם התבשיל יפה."}, {"subsubhead": "קצירת פירות"}, {"layer": "rama", "src": "רמ\"א בשם אורחות חיים", "srcRef": null, "txt": "הרמ\"א הביא בשם האורחות חיים, שפירות שקצר בשבת בעבור החולה, שייך בהם מוקצה. והם אסורים אפילו לחולה מבעו\"י, משום שהולכים וגודלים בשבת (ואז מה שהיה ראוי לחולה מער\"ש משתנה, וכבר אינו מותר)"}, {"layer": "acharon", "src": "גר\"א, משנ\"ב", "srcRef": null, "txt": "אך לדעת הגר\"א והמשנ\"ב, אף שהמשיך לגדול – בטל האיסור שגדל בשבת, ברוב שהיה מוכן מער\"ש. לכן יהיה מותר לחולה מבעו\"י (אבל לחלה בשבת אסור)."}, {"subsubhead": "מליחת הבשר הנשחט"}, {"layer": "gemara", "src": "גמרא · שבת עה", "srcRef": null, "txt": "מליחה ועיבוד יש בהן דבר דומה (עפ\"י הגמרא ב-עה פרק כלל גדול). \nורש\"י כתב שמליחה צורך עיבוד היא. \nובגמרא אמר רבה בר רבה הונא שהממלח בשר חייב משום מעבד אך לדעת רבא אין מעבד באוכלים (וכן הלכה); אך התוספות שם כותבים שלמרות זאת, שייך איסור למלוח אוכלים בשבת משום שדומה לעיבוד עורות.", "ref": {"label": "שבת · פרק כלל גדול · עה ע\"א", "ref": "Shabbat.75a"}}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "ולפיכך, כתב בב\"י שאסור למלוח את הבשר הנשחט לחולה (למרות שפסקנו שהוא מותר אף לאדם אחר). וכך כתבו גם התוספות אצלנו (חולין)."}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "וכך כתב המשנ\"ב."}, {"subsubhead": "לחולה שאין בו סכנה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אז פסקנו שלשו\"ע מותר לאחר להנות משחיטה, אבל לא מבישול (שמא ירבה). \nומה לגבי חושאב\"ס? האם מותר לו להנות מהתבשיל או שדינו ככל אדם?"}, {"layer": "rishon", "src": "האגור", "srcRef": null, "txt": "האגור כתב שהמבשל בשבת לחולה שיש בו סכנה אסור אף לחולה שאין בו סכנה [משום שלחולה שאין בו סכנה אפשר לבשל על ידי גוי. ומאחר ועלול שלא למצוא גוי,] חיישינן שירבה בשביל החולה שאין בו סכנה (ממש כמו כל אדם)."}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.2", "txt": "וכן נקט השו\"ע בסעיף שלנו."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא ותמצית"}, {"type": "sec", "id": "din"}, {"type": "sec", "id": "chole"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"מעשה שבת": "תוצר של מלאכה שנעשתה באיסור בשבת (כגון תבשיל שבושל בשבת); נחלקו מה דינו בשבת ובמוצ\"ש.", "בכדי שיעשו": "המתנה במוצ\"ש כשיעור הזמן שהיה נדרש לעשיית המלאכה, כדי שלא יצא נשכר.", "מוקצה מחמת איסור": "דבר שהוקצה מחמת שהיה אסור בבין השמשות; לר\"ש אינו מוקצה אלא אם דחאו בידיים.", "חשאב\"ס": "חולה שאין בו סכנה.", "קונס": "קנס חכמים — איסור שהטילו כדי שלא ייצא החוטא נשכר ממעשהו."}, "subject": "שבת", "id": "maaseshabat"}, {"topic": {"title": "בישול", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ח", "siman": "Shulchan_Arukh,_Orach_Chayim.318", "intro": {"lead": {"t": "'תנא דידן שבק בישול סממנין ונקט סידורא דפת'", "ref": ""}, "body": "בישול אינה אחת מל\"ט אבות מלאכה, ואינה נמנית במשנת אבות המלאכה, אלא 'תנא דידן שבק בישול סממנין ונקט סידורא דפת'."}}, "sections": {"kitzur": {"title": "קיצור כלים — מדרג קלות הבישול", "seif": null, "sugya": null, "intro": "מפה תמציתית של היררכיית הכלים ומדרג קלות הבישול — לחזור אליה בכל נושא.", "ops": [{"layer": "note", "srcRef": null, "src": "כלי ראשון שעל האש", "txt": "כמובן אסור בבישול מן התורה (רבי שאמר לרב יצחק שלא לשפוך שמן לאמבטי משום שהיא כלי ראשון וכלי ראשון מבשל) (אין נותנין ביצה בצד המיחם בשביל שתתגלגל)"}, {"layer": "note", "srcRef": null, "src": "כלי ראשון שהורד מהאש", "txt": "**שו\"ע (רש\"י)** – כלי ראשון שהורד מהאש מבשל כל עוד הידס\"ב\n**מרדכי** – כלי ראשון שהורד מהאש מבשל כל עוד הוא רותח (אפילו אם הידס\"ב)\n(לכו\"ע תבלינים מתבשלים אף לאחר שירד מחום שהידס\"ב)"}, {"layer": "note", "srcRef": null, "src": "עירוי מכלי ראשון", "txt": "**רשב\"ם**: עירוי מכלי ראשון לא מבשל\n**ר\"ת**: עירוי מכלי ראשון מבשל\n**תוס' עפ\"י ר\"י**: עירוי מכלי שני מבשל קלי בישול ודברים שהדחתם היא גמר מלאכתם\n**שו\"ע**: ר\"ת. עירוי מכלי ראשון מבשל (ס' י- אסור לערות מכלי\"ר על תבלין)"}, {"layer": "note", "srcRef": null, "src": "כלי שני", "txt": "עפ\"י פשט הסוגיה – לא מבשל\n**מרדכי**: לא מבשל אפילו אם הידס\"ב\n**תוס' (עפ\"י ר\"י)**: כלי שני לא מבשל, אבל אסור משום מחזי כמבשל\n**יראים**: אנו לא יודעים מה קל בישול ומה לא. כל כלי שהידס\"ב – אסור לבשל כלום.\n**שו\"ע**: לא מתייחס בפירוש. משנ\"ב חושב שהוא מקל בכלי שני\n**רמ\"א**: מחמיר בכלי שני (אוסר בישול אחר אפייה אפילו בכלי שני. ס' ה')\nשיטת ביניים של **ערוך השולחן**: להחמיר בכלי שני רק בקלי הבישול"}, {"layer": "note", "srcRef": null, "src": "מצקת — כלי ראשון או כלי שני?", "txt": "אם שהתה בסיר: וודאי נחשבת כמוהו ככלי ראשון (משום שחומה נשתמר באותה צורה)\n   אם לא, מחלוקת: פרי חדש – כלי שני\n   **ט\"ז** – רק מה שמערים עליו מכלי\"ר נחשב כלי שני\n   **מ\"ב** – סתירה בדבריו.\n   **שש\"כ** מיישב: נחשבת כלי\"ר, אבל בבישול אחר אפייה נקל ככלי שני\n   **מנחת יצחק**: כלי שני"}, {"layer": "note", "srcRef": null, "src": "מדרג קלות בישול", "txt": "**תבלינים** – לא מתבשלים בכלי שני. אבל מתבשלים בכלי ראשון שהורד מהאש אף אם ירד מחום שהידס\"ב\n**קלי בישול** – מתבשלים אף בכלי שני (עפ\"י הסוגיה). תוס': מתבשלים אפילו בעירוי מכלי שני. יראים: אפילו בכלי שלישי\n**מלח** – מחלוקת אם נחשב קל בישול, או שלא מתבשל אפילו בכלי ראשון שירד מהאש. שו\"ע – רי\"ף רמבם ראש - לא מתבשל אף בכלי\"ר. רמ\"א: קל בישול ומתבשל אף בכלי שני\n   ר\"ן: בכל מקרה מתבשל בכלי ראשון שעל האש\n\nקשה בישול (רק בכלי\"ר שעל האש)\nרגיל בישול (בכלי ראשון שירד מהאש והידס\"ב)\nתבלין (בכלי\"ר שירד מהאש אפילו אין הידס\"ב)\nקלי בישול (אפילו בכלי שני. תוס': אפילו בעירוי. רא\"מ: אפילו כלי שלישי)"}, {"layer": "note", "srcRef": null, "src": "תה", "txt": "איפה הוא במדרג מבחינת קלות בישולו? במציאות, עלי תה (תיון) אינם מבושלים במהלך הייצור, ולא שייך להגיד בהם בישול אחר בישול/אפייה וכו'\nבכלי ראשון או עירוי ממנו וודאי שאסור לדעת השו\"ע (שהחשיב עירוי ככלי\"ר) והרמ\"א\nכלי שני – לפי הרמ\"א וודאי אסור. שו\"ע לא הכריע בדעתו על בישול בכלי שני, ויש שיקלו (המשנ\"ב סבר שהשו\"ע הקל בכלי שני). ערוה\"ש סבר להקל בכלי שני, ולאסור בו רק בקלי הבישול.\nהאם נחשב קלי בישול? משנ\"ב: נחשב קל בישול. ואסור אף בעירוי מכלי שני (תוס'). מנוחת אהבה: אינו נחשב קל בישול + אפשר להקל בבישול בכלי שני\nולכו\"ע יהיה מותר לבשל עלי התה לפני שבת, ואז להכינם בהם תה בהיתר בשבת משום שאין בא\"ב ביבש"}], "pesak": null}, "maase": {"title": "הגדרת מעשה הבישול (ריכוך או הקשייה)", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "אמר רב פפא שהתנא במשנה במקום להמשיך את רצף המלאכות מהמשכן ולהמשיך בבישול סממנין, עבר לאופה!\nהסוגיה עונה על כך שהסידור שם הוא של מלאכות שיוצרות לחם (הזורע החורש הקוצר וכו'). ולפיכך אפייה היא בישול הפת\nמימרת **רב אחא בר רב עוירא**: הזורק סיכתא לאתונא (יתד לכבשן. כדי שתתקשה) חייב. ובסוגיה מבואר שהחיוב הוא משום שהיתד מתרככת קודם ורק אז מתקשה (מירפא רפי והדר קמיט).", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "היתד מתרככת ע\"י חום האש ואז מתקשה, וכי רפי ברישא הוי בישולו. בישול הוא ריכוך.\nמכאן שבישול הוא בריכוך, וגם שייך בדברים שאינם אוכל."}, {"layer": "lead", "srcRef": null, "txt": "אולם, נראה כי ההתיחסות היא לא תמיד כך וכי כל התקנת דבר מאכל ע\"י חום האש נאסרת (ולא רק ריכוך). וכך כותב הרמב\"ם:"}, {"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "\"כללו של דבר בין שריפה גוף קשה באש או שהקשה גוף רך הרי זה חייב משום מבשל.\""}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "הרמב\"ם לא חולק על רש\"י שעיקר בישול הוא ריכוך, אלא שבכל הקשייה ודאי יש ריכוך.", "under": true}], "pesak": null}, "shiur_mutzak": {"title": "הגדרת שיעור בישול במוצק - כמאב\"ד", "seif": "רנ\"ד ס\"ב", "sugya": null, "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "אין צולין בשר בצל וביצה בערב שבת אלא כדי שיצולו מבעוד יום. (כלומר שאסור להניחם להתבשל אלא אם הם יספיקו להיות מבושלים לפני שבת)", "ref": {"label": "שבת · פרק יציאות השבת · יט ע\"ב", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "גמרא · רבי אלעזר", "srcRef": null, "txt": "ובגמרא מבררים - מהו השיעור של בישול?\n**רבי אלעזר** אומר: כמאכל בן דרוסאי", "ref": {"label": "שם", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "חנניא", "srcRef": null, "txt": "(וכאן מובאת גם שיטת חנניא: כל שהוא מבושל כמאב\"ד מותר להשהותו על גבי כירה. זאת משום שהוא כבר מבושל. אולם וודאי שיש חשש חיתוי)", "under": true, "collapsed": true}, {"layer": "lead", "srcRef": null, "txt": "מהו שיעור מאב\"ד?"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "שליש בישול המאכל"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "חצי בישול המאכל"}, {"layer": "rishon", "src": "והר\"ן", "srcRef": null, "txt": "התקשה בכך שמסתבר מהסוגיה שמותר להשהות דבר המבושל כמאב\"ד (שהרי צולין בשר בצל וביצה המבושלים כמאב\"ד), כאשר לשיטת הרמב\"ם לעניין שהייה (רנג, א) מותר להשהות תבשיל רק אם מבושל כל צרכו.\nומתרץ שלעניין שהייה, הרמב\"ם חושש 'שמא יחתה', והחשש מתבטל כשהמאכל מבושל כל צרכו.\nוכאן החשש לא קיים עוד כשהמאכל מבושל כמאב\"ד, משום שמדובר בבשר ובהנחתו על יד הגחלים ללא קדרה; ואז אם יחתה האדם את הגחלים הבשר יחרך, לכן לא חיישינן שיעשה זאת.\nולשיטת רש\"י זה לא קשה, שבאמת גם שם סבר הוא וסיעתו שמותר להשהות דבר המבושל כמאב\"ד גם על כירה או ליד האש.", "under": true, "collapsed": true}, {"layer": "rishon", "src": "הבית יוסף", "srcRef": null, "txt": "תירץ מהרמב\"ם שההיתר של השהיית דבר המבושל כמאב\"ד ישירות על הגחלים הוא רק אם מבושל כך משני צדדיו. אבל אם מבושל כמאב\"ד רק מצד אחד – אסור להשהותו.", "under": true, "collapsed": true}, {"layer": "shulchan", "src": "השו\"ע (רנ\"ד, ב')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.254.2", "txt": "נקט בלשונו שאסור לצלות בשר בצל וביצה על ידי גחלים אלא כדי שיצלו מבעוד יום משני הצדדים כמאב\"ד שהוא חצי בישולו. – כלומר פסק כשיטת הרמב\"ם ששיעור מאב\"ד הוא חצי; ונקט כתירוצו ברמב\"ם שאסור לצלות ללא קדירה על ידי הגחלים אלא אם יספיק לצלות שני הצדדים כמאב\"ד לפני כניסת השבת (בעוד ששהייה עם קדרה מותרת לדעת הרמב\"ם רק אם הוא מבושל כ\"צ)"}, {"layer": "acharon", "src": "המ\"ב", "srcRef": null, "txt": "כתב שמה שהשו\"ע נקט ש'אפילו הוא בשר גדי' אסור אלא אם בושל כמאב\"ד, כוונתו שלמרות ההיתר בסעיף א' של צלי ללא קדרה (שמותר להשהות בשר גדי ו/או בתנור 'שריק' בערב שבת על אף שאינו כמאב\"ד), אסור להשהות אף בשר גדי ישירות על הגחלים. זאת משום שעל הגחלים האדם דואג ומעוניין שהגדי יתבשל מהרה, אפילו אם פירוש הדבר שיחרך, ואז קיים חשש שמא יחתה (ועיין בסיכום שהייה)"}], "pesak": null}, "shiur_nozel": {"title": "הגדרת שיעור בישול בנוזל – חום שהידס\"ב", "seif": "סעיף י\"ד", "sugya": null, "intro": "הבישול האסור מדאורייתא בנוזל הוא לא במידת בישול, אלא דרגת חום. והוא חום שהיד סולדת בו.", "ops": [{"layer": "gemara", "src": "ברייתא · שמואל", "srcRef": null, "txt": "**ברייתא**: מניח אדם קיתון מים כנגד מדורה לא בשביל שיחמו, אלא כדי שיפשירו מצינתם.\nאמר רב יהודה אמר **שמואל**: אחד שמן אחד מים – יד סולדת בו אסור", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מה זה בדיוק חום שהידס\"ב? באותה הסוגיה נשאל 'היכי דמי יד סולדת? כל שכריסו של תינוק נכווית'. וכן נקט השו\"ע בלשונו.", "ref": {"label": "שם", "ref": "Shabbat.40a"}}, {"layer": "zman", "src": "פוסקי זמננו", "srcRef": null, "txt": "אך כמובן שזו הגדרה משתנה ולא חד משמעית.\nהדעות נעות החל מ-45 מעלות (גרש\"ז אוירבעך), ועד 71 מעלות (הרב פיינשטיין).\nלהלכה, יש לנקוט לחומרא לשני הכיוונים. כלומר, שאסור לחמם נוזלים לחום של 45°, ותבשיל/נוזל לא נחשב שבושל אלא אם הגיע ל71° (למשל, לעניין בישול אחר בישול בדבר לח שנצטנן)."}], "pesak": null}, "makor": {"title": "מקור החום – חמה ותולדותיה, אוּר ותולדותיו", "seif": "סעיף ג׳", "sugya": null, "intro": "מדאורייתא אסור לבשל ע\"י אש תולדות האש (נוזל-ידס\"ב, מוצק-מאב\"ד/כ\"צ)\nאבל מותר לבשל ע\"י חמה ותולדות החמה\nאולם, נאסר מדרבנן לבשל בתולדות חמה, אטו תולדות האש (כלומר שמא יבוא לבשל בתולדות האש)", "ops": [{"layer": "mishna", "src": "משנה · ת\"ק · רבי יוסי", "srcRef": null, "txt": "אין נותנים ביצה בצד המיחם (תולדות האש) בשביל שתתגלגל (תתבשל), ואסור להטמינה בחול כדי שתיצלה (בגלל הטמנה).\nולגבי תולדות חמה – נחלקו **ת\"ק** ו**רבי יוסי** אם מותר לשבור את הביצה על בגד שהתחמם מהשמש כדי שהביצה תתבשל ממנו.", "ref": {"label": "שבת · פרק כירה · לח ע\"ב", "ref": "Shabbat.38b"}}, {"layer": "gemara", "src": "גמרא · רב נחמן", "srcRef": null, "txt": "**רב נחמן** – לכל הדעות מותר בחמה, ואסור באוּר. ת\"ק ור' יוסי נחלקו על תולדות חמה. ות\"ק אסר בתולדות חמה שמא יבשל בתולדות האוּר.\nוהראשונים פסקו כתנא קמא, שאסור מדרבנן לבשל בתולדות החמה.", "ref": {"label": "שם", "ref": "Shabbat.38b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מסביר שמותר בחמה בגלל שאין בכך דרך בישול; ולא גזרינן 'אטו', משום שאין סיבה להתבלבל.", "under": true}, {"layer": "shulchan", "src": "והשו\"ע (שיח, ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.3", "txt": "פסק כדברי הגמרא בת\"ק שאסור לבשל בתולדות חמה מגזירה שמא יבשל בתולדות האש. ושמותר לבשל בחום החמה עצמה.\n(והתייחס שם גם לעניין ההטמנה בחול, שאסור אפילו מבעוד יום, משום שהוא דבר המוסיף הבל)"}, {"layer": "acharon", "src": "המהרש\"ל", "srcRef": null, "txt": "סבר שלמרות שאסור בתולדות חמה, מותר לבשל על גג רותח, משום שלא יבוא ממנו לבשל בתולדות האור.", "collapsed": true}, {"layer": "zman", "src": "דוד שמש (הרב עובדיה)", "srcRef": null, "txt": "כאשר הוא מתחמם מהשמש, הרי הוא תולדות חמה. ויש מי שסובר שאף חמה ממש, וכי הקולטים רק מנתבים את חום השמש.\nהרב עובדיה פוסק להקל, משום שחימום זה של המים הוא פסיק רישא, משום שאין האדם מתכוון לחימומם. ועל אף שהווי פ\"ר דניחא ליה, בגלל שמדובר בדרבנן – ניתן להקל.\n(ובוודאי שדוד חשמל אסור, והווי באוּר)"}], "pesak": null}, "bab": {"title": "בישול אחר בישול", "seif": "סעיף ד׳", "sugya": null, "intro": "תבשיל יבש שהתבשל כל צרכו – לכו\"ע מותר לחממו אם נצטנן\nתבשיל לח שהתבשל כל צרכו – שו\"ע: אסור לחממו אם נצטנן. רק אם עדיין רותח. רמ\"א: מקל לגבי מצור\"ל שמותר, ומצוי\"ל שעדיין לא התקרר. רמב\"ם: סובר שאין בישול אחר בישול אפילו בלח שנצטנן\n(ועל כל פנים, מה שמותר הוא רק בכלי ראשון שהורד מהאש)", "ops": [{"layer": "shulchan", "src": "שו\"ע בס' ח'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.8", "txt": "דן במיחם שעל האש אם דינו כהנחה כנגד המדורה (מותר אם נתבשל כ\"צ, ובלח אם מצור\"ל), או שדינו כהנחה ע\"ג כירה (אסור אף אם נתבשל כ\"צ ואפילו מצור\"ל - שמא יחתה). וסובר כדעה הראשונה."}, {"subhead": "יבש"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כל שבא בחמין מערב שבת, שורין אותו בחמין בשבת. וכל שלא בא בחמין, אין שורין אותו בשבת – אבל מותר להדיחו בחמין. חוץ מן המליח הישן וקולייס האיספנין, שהדחתן היא היא גמר מלאכתן", "ref": {"label": "שבת · פרק חבית · קמה ע\"א", "ref": "Shabbat.145a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "כגון מה? כגון תרנוגלתא דר' אבא\nכלומר, שדבר שבושל כבר בערב שבת מותר לבשלו בשבת. ומה שלא – מותר רק להפיג צינתו בשטיפה בחמים. אבל דברים ששטיפה זו תכשיר אותם למאכל – אסור (דגים מלוחים).", "ref": {"label": "שם", "ref": "Shabbat.145a"}}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "'בא בחמין מערב שבת' – כתבו שבישול גמור, כלומר – כל צרכו (תרנגולתא דרבי אבא)."}, {"layer": "rishon", "src": "רשב\"א ורא\"ש", "srcRef": null, "txt": "אפילו כמאב\"ד (עפ\"י מימרת רבי אליעזר בדף יט, ששיעור בישול כמאב\"ד)", "under": true}, {"layer": "rishon", "src": "הב\"י", "srcRef": null, "txt": "הבין ברמב\"ם - כל דבר שבא בחמין בער\"ש, אפילו לא נתבשל. ובב\"י לומד מתרנגולתא דר' אבא, שמדובר בדבר יבש.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.4", "txt": "ונראה בשו\"ע שפסק כתוספות, שדבר יבש שנתבשל כבר כל צרכו – מותר לשרותו בחמין בשבת\nאבל, נזכור שאסור מדרבנן להניח דבר יבש שנתבשל כ\"צ בכלי ראשון העומד על האש. מחזי כמבשל."}, {"subhead": "בלח"}, {"layer": "rishon", "src": "רא\"ש וסמ\"ק", "srcRef": null, "txt": "כתב עפ\"י רש\"י שתבשיל שנצטנן ויש בו נוזל – שייך בו בישול אחר בישול (ללא מצור\"ל/מצוי\"ל)"}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "כל דבר שנצטנן (אפילו בושל כ\"צ) ויש בו רוטב והוא מצטמק ויפה לו – שייך בו בישול אחר בישול."}, {"layer": "rishon", "src": "הב\"י בשם ר' יונה", "srcRef": null, "txt": "למד מכך – שאם התבשיל הלח מצטמק ורע לו – אין בו בישול אחר בישול אף אם נצטנן", "under": true}, {"layer": "rishon", "src": "והרמב\"ם", "srcRef": null, "txt": "סבר שאין בישול אחר בישול לעולם, אפילו בלח. וכן הרשב\"א"}, {"layer": "shulchan", "src": "השו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.4", "txt": "נקט בס' ד' כדברי הרא\"ש שתבשיל לח שבושל כ\"צ ונצטנן – יש בו משום בישול אחר בישול (ולא פירש לגבי מצור\"ל-מצוי\"ל)"}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "הגיה כיש אומרים את דברי ר' ירוחם, שדווקא אם התבשיל מצטמק ויפה לו שייך בא\"ב."}, {"layer": "acharon", "src": "והמג\"א", "srcRef": null, "txt": "כתב שדעת השו\"ע כדבריו בב\"י, שמצטמק ורע לו מותר בא\"ב. וכך כתב בדבריו בס' ח'.", "under": true}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "חלק, וסבר שהמחבר חזר בו ממה שכתב בב\"י. ובסע' ח' כתב סתם כלשון ר' ירוחם.", "under": true, "collapsed": true}, {"layer": "acharon", "src": "והט\"ז", "srcRef": null, "txt": "כתב שהטעם לסברת מצטמק ורע לו הוא שאין בכך מלאכת מחשבת, שהרי לא מעוניין בשינוי ובצימוק המתרחש בתבשיל, אלא רק בחימום (וזה מותר).", "under": true}, {"layer": "rama", "src": "רמ\"א · (ס' ט\"ו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.15", "txt": "ובס' טו' (הנחה במקום חום שהידס\"ב), כתב הרמ\"א שיש מקלים לגבי תבשיל לח, שעל אף שהתקרר מחום רתיחתו, כל עוד לא נצטנן לגמרי – מותר (במצוי\"ל. מצור\"ל מקל גם אם נצטנן לגמרי עפ\"י רי\"ו)."}, {"subsubhead": "מה נחשב 'לח'?"}, {"layer": "zman", "src": "יביע אומר", "srcRef": null, "txt": "תבשיל שיש ברובו רוטב"}, {"layer": "zman", "src": "אור לציון", "srcRef": null, "txt": "תבשיל שיש בו רוטב כלשהו"}, {"layer": "zman", "src": "הגרש\"ז והרב אלישיב", "srcRef": null, "txt": "והפוסקים פסקו שיש לרוקן הרוטב, אך אפשר להקל במעט לחות או שמן שעל התבשיל"}, {"layer": "zman", "src": "הרב פיינשטיין", "srcRef": null, "txt": "לגבי מצבי ביניים, כגון מזון שקשה להכריע אם הוא מוצק או נוזלי — כתב שכל אוכל שיעמוד במקומו בלי כלי – נחשב מוצק."}, {"subsubhead": "דבר יבש הנעשה לח (ס' ט\"ז)"}, {"layer": "lead", "srcRef": null, "txt": "מה יהיה דינו של מאכל שכרגע נחשב מוצק, אך במהלך חימומו יהפוך לנוזלי? כגון, רוטב קרוש, פשטידה.."}, {"layer": "rishon", "src": "הב\"י (ספר התרומה)", "srcRef": null, "txt": "הביא את דברי ספר התרומה שהתיחס לאינפאנדה, וכתב שאסור לחממה אפילו במרחק מהאש (כלומר, אפילו במקום שמותר להפשיר בו נוזלים), בגלל השומן שהופך לנוזל. וכתב שהטעם לזה הוא מוליד. וכמו שכתב לעניין ריסוק ברד וכו', שאסור משום מוליד."}, {"layer": "rishon", "src": "הרשב\"א והר\"ן", "srcRef": null, "txt": "אולם לגבי ריסוק (ש\"כ, ט), סברו שהאיסור לריסוק ברד הוא משום שדומה לסוחט (חשש שמא); וכך כתב כאן הב\"י.\nלפיכך, לשיטת הרשב\"א והר\"ן יהיה מותר להניחו להפשיר, משום שהחשש רלוונטי רק אם מרסק את הברד בידיים. ואף לריסוק אין חשש; שהרי הוא משום סוחט, ולא שייך סוחט בפירות שלא עומדים לסחיטה (פשטידה כמובן אינה).", "under": true}, {"layer": "shulchan", "src": "וכך, פסק השו\"ע בס' ט\"ז", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.16", "txt": "שמותר להניח אינפאנדה כנגד האש במקום שהידס\"ב, ואעפ\"י שהשומן שבה נימוח."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "כתב שיש לחשוש ולהחמיר לדעת ספר התרומה, אך שניתן להקל במקום הצורך"}, {"layer": "lead", "srcRef": null, "txt": "ויש לשאול: מדוע התיר השו\"ע אף בחום שהידס\"ב? לגבי המוצק אין בעיה, שהרי אין בא\"ב ביבש. אבל ברגע שהשומן בה נימוח, יש כאן בישול בלח!"}, {"layer": "acharon", "src": "הלבוש", "srcRef": null, "txt": "סבר שיש טעות סופר בלשון המחבר, וכי צריך לקרוא שמותר להניח.. במקום שאין הידס\"ב', ואסור לחממו בחום שהידס\"ב", "under": true}, {"layer": "acharon", "src": "המג\"א", "srcRef": null, "txt": "סבר שאין בעיה אף במקום שהידס\"ב, משום שהולכים אחר מצב התבשיל בתחילת החימום, ונחשב כמוצק", "under": true}, {"layer": "acharon", "src": "ובֶסוף הב\"י", "srcRef": null, "txt": "כתב שאף לדעת התרומה יהיה מותר לחמם פשטידה שהשומן שלה אינו ניכר בעצמו, אלא מתערבב עם שאר הקדרה; משום שדומה לנתינת קרח בכוס, המותרת לכו\"ע (משום שנמחה מאליו ואין ניכר)", "collapsed": true}], "pesak": null}, "baa": {"title": "בישול אחר אפייה", "seif": "סעיף ה׳", "sugya": null, "intro": "על פניו, דין בישול אחר אפייה אמור להיות זהה לבישול אחר בישול במוצק, המותר לכל הדעות.\nאולם, בעקבות סברא של היראים (רא\"מ) מברייתא בפסחים, יש לנו גם התייחסות הלכתית ייחודית למקרה זה של בישול אחר אפייה/צלייה, וכן, לבישולם בכלי ראשון ושני.", "ops": [{"layer": "gemara", "src": "ברייתא · רבי יוסי", "srcRef": null, "txt": "**רבי יוסי** אומר שלא יוצאים בפסח ידי חובת אכילת מצה אם אוכלים מצה שהתבשלה (לאחר אפייתה)", "ref": {"label": "פסחים · פרק כל שעה · מא ע\"א", "ref": "Pesachim.41a"}}, {"layer": "rishon", "src": "היראים", "srcRef": null, "txt": "לומד מכאן שיש בישול אחר אפייה, שהרי הבישול פעל על המצה וביטל את אפייתה, כך שהיה כאן שינוי של ממש במצה והיא כבר לא נחשבת אפויה. וכן הדין לבישול אחר צלייה."}, {"layer": "rishon", "src": "הראבי\"ה", "srcRef": null, "txt": "חלק על סברא זו, וכתב שמהות המצה לא השתנתה לגמרי, אלא שטעמה נשתנה. וכדי לצאת ידי חובת אכילת מצה בעינן טעם מצה. ולא שהוא שינה את מהות המצה. ובוודאי שלא שייך להגיד שיש בישול אחר אפייה.", "under": true}, {"layer": "rishon", "src": "סמ\"ג וסמ\"ק", "srcRef": null, "txt": "חלקו בדעת היראים על נתינת פת במרק – עד איזה כלי אסור?\n**סמ\"ק** – רק כלי ראשון אסור, אבל בשני התיר רא\"מ לתת פת\n**הסמ\"ג** – אסר נתינת פת גם בכלי שני, משום שלחם הוא מקלי הבישול"}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.5", "txt": "הביא את דעת היראים ב'יש אומרים' כהבנת הסמ\"ג (אפילו כלי שני), וכתב שיש מי שמתיר"}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "כתב ש'היש מתירים' שבלשון השו\"ע הוא על חומרת הסמ\"ג בכלי שני, כלומר שיש מי שמתירים בכלי שני כסמ\"ק, אבל לכו\"ע אסור לתת פת בכלי ראשון.\nאולם, הביא בעצמו שיש מתירים אפילו בכלי ראשון, היינו כראבי\"ה, אך סבר להחמיר כסמ\"ג"}, {"layer": "acharon", "src": "באר הגולה", "srcRef": null, "txt": "אבל לפי באר הגולה, מסתבר שסבר כי דעת ה'יש מתירים' שבלשון השו\"ע מכוון לראבי\"ה. ואז יש סברא שהשו\"ע מקל שאין בישול אחר אפייה כלל.", "under": true}, {"layer": "zman", "src": "הרב עובדיה (יחווה דעת)", "srcRef": null, "txt": "וכך גם סבר ותירץ באמצעות כך את הקושי שהעלו פוסקים ביחס לס' טו'. שם משתמע מהשו\"ע שיש בישול אחר בישול רק בנוזל, ומשמע שאין בישול אחר אפייה.", "under": true, "collapsed": true}, {"layer": "acharon", "src": "פרטים נוספים", "srcRef": null, "txt": "ובכל מקרה, לכו\"ע אין אפייה אחר אפייה, וצלייה אחר צלייה.\nוהשש\"כ סבר ששייך גם בישול אחר טיגון ולהיפך, אלא אם הטיגון עמוק.\nהבה\"ל סבר שאם נעשים על מאכל מספר תהליכים שונים – האחרון נחשב (לקולא ולחומרא)\nוהפמ\"ג חלק וסבר שכל עוד נעשה תהליך מסוים – לא שייך בו יותר (אם בושל לא שייך בישול. אם נאפה לא שייך אפייה.)", "collapsed": true}, {"subhead": "קפה"}, {"layer": "lead", "srcRef": null, "txt": "על פניו, בגלל שכבר קלוי, וקיי\"ל כשו\"ע שאין בישול אחר אפייה – מותר לבשל אף בעירוי מכלי ראשון."}, {"layer": "zman", "src": "האור לציון", "srcRef": null, "txt": "סבר שהקלייה לא נחשבת לאפייה גמורה, לכן לא נחשב בישול אחר אפייה; ואם כך יחשב כתבלין ואסור בעירוי מכלי ראשון (אפילו אינם רותחים). ואם נתייחס אליו כקל בישול - אסור לערות מים רותחים על קפה אפילו מכלי שני, אלא מכלי שלישי (כדעת רוב הפוסקים והט\"ז לעניין הדחה שהיא גמר מלאכה)."}, {"layer": "zman", "src": "אבל הרב עובדיה", "srcRef": null, "txt": "סבר שאבקת קפה ראויה לאכילה כמו שהעא, לכן אין בעירוי המים גמר מלאכה או בישול, ובגלל שקיי\"ל כשו\"ע שאין בישול אחר אפייה – מותר.\nאולם, וודאי שקפה נמס יהיה מותר לרוב הדעות, שהרי עבר בישול ביצירתו, ואין בא\"ב ביבש.\nאבל יש מי שנהגו להחמיר, בגלל שלאחר הבישול עובר גם קלייה; ולפי הבה\"ל שסובר שהתהליך האחרון הוא שנחשב – משמע שנחשב בישול אחר אפייה (כלומר כרמ\"א)."}], "pesak": null}, "hadacha": {"title": "'הדחתו היא גמר מלאכתו' וקלי הבישול", "seif": "סעיף ד׳", "sugya": null, "intro": "במשנה מלמדים אותנו שרק מה שבושל כבר בער\"ש מותר להשרותו שוב. אולם, גם מה שלא – מותר לקלחו במים חמים, חוץ מדברים שהדתחם תהיה גמר מלאכתם.\nוהראשונים דנו עד כמה נשמר חומם של מים כשמעבירים אותם מכלי לכלי, ולפיכך– האם וכיצד ניתן לשטוף דברים ששטיפתם (במים חמים) תהיה גמר מלאכתם.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כל שבא בחמין מערב שבת, שורין אותו בחמין בשבת. וכל שלא בא בחמין, אין שורין אותו בשבת – אבל מותר להדיחו בחמין. חוץ מן המליח הישן וקולייס האיספנין, שהדחתן היא היא גמר מלאכתן", "ref": {"label": "שבת · פרק חבית · קמה ע\"א", "ref": "Shabbat.145a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "פירש שמליח הישן וקולייס האיספנין פירושו דגים מלוחים"}, {"layer": "rishon", "src": "ספר הפרדס", "srcRef": null, "txt": "קולייס= דג מלוח. אבל מליח הישן הוא בשר מלוח הרבה (שלא יאכלנו ללא הדחה)", "collapsed": true}, {"subhead": "שיט' בעלי התוס' בהדחה מכלי ראשון (שיח י')"}, {"layer": "lead", "srcRef": null, "txt": "לעניין תוקף חמימות המים והיותם מבשלים, התוספות מביאים כך:"}, {"layer": "rishon", "src": "רשב\"ם", "srcRef": null, "txt": "מותר עירוי מכלי ראשון", "under": true}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "עירוי מכלי ראשון חשיב ככלי ראשון. לכן מותר רק כלי שני.", "under": true}, {"layer": "rishon", "src": "ר\"י", "srcRef": null, "txt": "ועל כך, כותבים התוס' שאולי אף לשרות בכלי שני מותר, אבל דוחים ומביאים כר\"י: רק עירוי מכלי שני, ואסורה שרייה בכלי שני משום שמחזי כמבשל (כי המים חמים)\nובֶסוף התוס', כותבים שרק בדבר שהדחתו היא גמר מלאכתו (וקלי בישול) אסור אף בעירוי כלי שני. אבל בסתם דברים – עירוי מכלי שני לא מבשל.", "under": true}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.10", "txt": "סתם בס' י' שעירוי מכלי ראשון מבשל. (ובס' יג' מתייחס לבישול בכלי שני)"}, {"layer": "acharon", "src": "הפוסקים", "srcRef": null, "txt": "לפי זה, כתבו כי דברים שהדחתם במים חמים היא גמר מלאכתם – אסור להדיחם אף בכלי שני; משום שגם בחום זה, שטיפתם תכשירם לאכילה."}, {"layer": "acharon", "src": "הט\"ז", "srcRef": null, "txt": "סבר שמותר להדיח דגים מלוחים כגון הרינג רק במים צוננים, משום שאין בהדחתו גמר מלאכתו.", "under": true}, {"layer": "acharon", "src": "הא\"ר ומחצה\"ש", "srcRef": null, "txt": "חלקו וסברו שמותר אף לערות מים חמים מכלי שני, משום שדבר שהדחתו במים צוננים תכשירו לאכילה – משמע שהדחתו במים חמים לא נחשבת בישול.", "under": true}, {"layer": "acharon", "src": "הפמ\"ג והנשמת אדם", "srcRef": null, "txt": "אסרו אף במים צוננים, משום שלדעתם דבר שהדחתו היא גמר מלאכתו – כל שטיפה שמכשירה אותו אסורה משום מכה בפטיש. ואין זה משנה אם הם חמים או קרים.", "under": true}, {"layer": "acharon", "src": "אבל הבה\"ל", "srcRef": null, "txt": "הביא שלא שייך מכה בפטיש באוכלים (וראייתו מכך שהטמנת ביצה בחול כדי שתתבשל בתולדות חמה אסורה רק מדרבנן, ואם זה היה מכה בפטיש – היתה אסור מדאורייתא) ומה שאסור הדחה בחמים הוא משום בישול. (לכן מותר מכלי שני במים חמים, כדעת הא\"ר ומחצה\"ש)", "under": true}, {"subhead": "מלח וקלי הבישול (שיח ט')"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "האילפס והקדרה שהעבירן מרותחין (הוריד מהאש) אסור לתת לתוכם תבלין בשבת, אבל נותנים לקערה או לתמחוי.\nמכאן למדים שכלי ראשון מבשל על אף שהורד מהאש; וכן, שכלי שני (הקערה/תמחוי) אינו מבשל ומותר", "ref": {"label": "שבת · פרק כירה · מב ע\"א", "ref": "Shabbat.42a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "לענייננו, בגמרא לאחמ\"כ דנים ראשונים אם מלח כתבלין, ומותר לבשלו בכלי שני (ולא בכלי ראשון שהורד מהאש) או לא.\n**רב יוסף**: מלח כתבלין\n**אביי (לשון א')**: מלח לא כתבלין, והוא מתבשל אף בכלי שני – קלי בישול\n**רב נחמן** חולק: צריכא מילחא בישולא כבשרא דתורא – המלח קשה בבישולו\n**אביי (לשון ב')**: מלח לא כתבלין, והוא לא מתבשל אף בכלי ראשון\n**רב נחמן** מסכים: צריכא מילחא בישולא כבשרא דתורא", "ref": {"label": "שם", "ref": "Shabbat.42a"}}, {"layer": "rishon", "src": "הרי\"ף, הרמב\"ם והרא\"ש", "srcRef": null, "txt": "פסקו עפ\"י הלשון השניה, שמלח קשה בבישולו, ואינו מתבשל אף בכלי ראשון ולכן מותר."}, {"layer": "rishon", "src": "הגהות אשרי והתוס'", "srcRef": null, "txt": "כתבו כך, אך הוסיפו שהמחמיר שלא לתת מלח אף בכלי שני – תבוא עליו הברכה", "under": true}, {"layer": "rishon", "src": "ריטב\"א", "srcRef": null, "txt": "כתב שיש להחמיר כלשון הראשונה, ולא לתת מלח אפילו בכלי שני (כשיש שתי לישנות בסוגייה, אם מדובר בדאורייתא – כלישנא המחמירה; אם בדרבנן – כלישנא המקילה)", "under": true}, {"layer": "rishon", "src": "הר\"ן", "srcRef": null, "txt": "הלשון המקלה נכונה רק לגבי כלי ראשון שהורד מהאש, אבל בעודו על האש לכו\"ע אסור אפילו מלח (ואפילו בשר השור יתבשל)", "under": true}, {"layer": "rishon", "src": "שיבולי הלקט", "srcRef": null, "txt": "ציין, שאם עבר אדם – אפילו במזיד – ונתן מלח באיסור, אין לאסור את המאכל משום שבטל המלח ביחס אליו.", "collapsed": true}, {"layer": "shulchan", "src": "השו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "לעניין נתינת המלח, פסק כדברי הרי\"ף וסיעתו שמותר לתת מלח בכלי ראשון שהורד מהאש."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "הביא שיש אוסרים, כריטב\"א, אפילו בכלי שני; וסיים כמו התוס' ש'המחמיר תבוא עליו הברכה'\nובסוף הדברים הביא הרמ\"א את שיבולי הלקט שמי שעבר ונתן מלח בכלי ראשון שעל האש – מותר לאכול התבשיל."}, {"layer": "acharon", "src": "המשנ\"ב (סוכר)", "srcRef": null, "txt": "ולגבי סוכר, סבר שעדיף להחמיר עמו ולא לבשלו אלא בכלי שני (על אף שנתבשל בייצורו)"}, {"layer": "zman", "src": "והרב עובדיה", "srcRef": null, "txt": "סבר להתיר, משום שוודאי שדינו כמלח, ולגבי מלח קיי\"ל כשו\"ע שמותר אף בכלי ראשון (אם הוסר מהאש)", "under": true}, {"layer": "rishon", "src": "ר\"ן, רמב\"ם", "srcRef": null, "txt": "דעות נוספות לגבי קלי הבישול: אין חשש לקלי בישול – מותר הכל בכלי שני", "collapsed": true}, {"subhead": "כח החימום של כלי ראשון (רש\"י ומרדכי)"}, {"layer": "lead", "srcRef": null, "txt": "כאמור, אנו לומדים מהמשנה גם כי כלי ראשון שהורד מהאש עדיין מבשל (בהשרייה). והרי כמובן שאין כלי ראשון שהורד מהאש מבשל תמיד. הב\"י הביא את המרדכי ורש\"י שמציעים מתי:"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כל עוד הידס\"ב – כלי ראשון"}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "כל עוד לא נח מרתיחתו. אפילו אם הידס\"ב."}, {"layer": "shulchan", "src": "השו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "נקט בס' ט' כרש\"י: כלי ראשון אפילו לאחר שהעבירוהו מעל האש מבשל, כל זמן שהיד סולדת בו. לפיכך אסור ליתן לתוכו תבלין, אבל מלח מותר ליתן לתוכו"}], "pesak": null}, "hafshara": {"title": "הפשרת נוזלים, בישול אחר בישול בלח", "seif": "סעיפים י\"ד-ט\"ו, י\"ז", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא · שמואל", "srcRef": null, "txt": "**ברייתא**: מניח אדם קיתון מים כנגד מדורה לא בשביל שיחמו, אלא כדי שיפשירו מצינתם.\nאמר רב יהודה אמר **שמואל**: אחד שמן אחד מים – יד סולדת בו אסור\nובהמשך הסוגיה, היכי דמי יד סולדת בו? כל שכריסו של תינוק נכווית.", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "lead", "srcRef": null, "txt": "אז מה בדיוק מותר עפ\"י הברייתא?"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מותר לשים את המים אפילו קרוב למדורה, רק צריך להוציאם משם לפני שיגיעו לחום שהידס\"ב", "under": true}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "אסור להניח את המים קרוב למדורה, שמא יגיעו לחום שהידס\"ב. אלא מותר להניחם רק במרחק כזה שלא יגיעו לחום שהידס\"ב אפילו אם ישכחם.\nוהדין זהה לגבי הנחה על מיחם (או כל דבר שהנחה עליו/לידו לזמן תביא לחום שהידס\"ב).", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "כל זה הוא בדבר צונן שלא נתבשל אף פעם. מכל מקום, וודאי שדבר שכבר נתבשל פעם ואח\"כ הצטנן – מותר אפילו כנגד המדורה.", "under": true}, {"layer": "rishon", "src": "המרדכי", "srcRef": null, "txt": "כתב שכמו שאסור להניח כנגד האש נוזלים כדי שיגיעו לחום שהידס\"ב, אלא רק שיפשירו – כך גם לגבי פירות הנאכלים חיים. שלמרות שהם נאכלים חיים, החימום שלהם טוב להם ונחשב כבישול. לכן, מותר רק להניחם שיפשירו, אבל לא כדי שתחממו ויתבשלו.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ד)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.14", "txt": "-מביא כתוס', שמותר להניח נוזלים להפשיר כנגד אש, אבל רחוק מספיק כדי שלא יוכלו להתחמם לחום שהידס\"ב. (ס' יז' – הנחה ע\"ג מיחם= הנחה כנגד מדורה)\n-מביא כדברי הגמרא שחום שהידס\"ב הוא חום שכירסו של תינוק נכווית בו"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא את דברי המרדכי שהדין של הנחה כנגד חום האש הוא גם לגבי פירות הנאכלים חיים, שמותר רק להפשירם אבל לא לחממם מאוד משום שנחשב כבישול"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט\"ו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.15", "txt": "-מביא שדבר שכבר התבשל כראוי אך נצטנן – מותר להניחו כנגד האש (אפילו במקום שיגיע לחום שהידס\"ב.) (משנ\"ב: אבל קרוב יותר לא, שמא יחתה).\nאולם, מוסיף שבלח אסור; שהרי סובר שיש בישול אחר בישול בלח (ועיין במחלוקת לעניין מצור\"ל ס' ד')."}, {"layer": "rama", "src": "רמ\"א · (ס' ט\"ו)", "srcRef": null, "txt": "מקל לגבי תבשיל לח, שעל אף שהתקרר מחום רתיחתו, כל עוד לא נצטנן לגמרי – מותר.\n(נפק\"מ: לשו\"ע יהיה אסור לחמם כל נוזל שירד מ71°; לרמ\"א יהיה אסור רק נוזל קר)", "under": true}, {"layer": "lead", "srcRef": null, "txt": "להלכה: מרק שהיה במקרר – אסור לחממו לחום שהידס\"ב כל הדעות, וכן, אסור להניחו במקום שיוכל להגיע לחום כזה, אלא רק להפיג את צינתו"}], "pesak": null}, "irbuv": {"title": "ערבוב מים חמים וקרים", "seif": "סעיפים י\"א-י\"ג", "sugya": null, "intro": "סעיפים יא' יב' קשורים בשתי סוגיות. הראשונה - מיחם שפינהו. והשנייה – מחלוקת ב\"ה ובית שמאי בשפיכת מים חמים לצוננים ולהיפך. הפסיקה מערבבת בין השתיים בגלל שלדעת אביי, מיחם שפינהו הוא מיחם שהורידו מהאש והמשנה מלמדת אותנו שמותר לשפוך אליו מים רותחים אם עושים זאת בכמות גדולה.", "ops": [{"layer": "note", "srcRef": null, "src": "נתינת חמים לקרים", "txt": "מותר. (**רש\"י** – תתאה גבר. **רשב\"א** – בנתינה מכלי ראשון מים לא יתחממו משום שמתערבבים. **תוס'** – רק אם המים הקרים מרובים) **מ\"ב**: שו\"ע כרשב\"א; ואז מותר גם כשהקרים מעטים\n**רמ\"א** כדעת תוס' (רק אם הקרים מרובים)"}, {"layer": "note", "srcRef": null, "src": "נתינת קרים לחמים", "txt": "**שו\"ע**: רק לכלי שני. **רמ\"א** (עפ\"י תוס'): כלי שאינו מקפיד על חומו (כדי שיישפוך הרבה)"}, {"layer": "gemara", "src": "משנה · רב אדא בר מתנה · אביי", "srcRef": null, "txt": "**משנה**: מיחם ש'פינהו', אסור לתת לתוכו מים קרים כדי שירתחו (כי אז יתבשלו), אבל מותר לתת לתוכו מים כדי שיפשירו, או לתת לתוך הכוס.\n**רב אדא בר מתנה**: מדובר במיחם שפינה ממנו את המים החמים. אסור להכניס לתוכו קצת מים קרים, כי אז הם יירתחו ויתבשלו מדפנות המיחם. אבל מותר הרבה מים קרים, שאז החום רק יפשירם. (ועל אף שיש בכך משום 'מכה בפטיש' בחיזוק הדפנות, זה דבר שאינו מתכוון וקיי\"ל כר' שמעון שמותר)\n**אביי**: מדובר במיחם שפינה אותו מן האש. אז, אסור לשפוך לתוכו קצת מים קרים, כי אז הם ייתרתחו מהמים הרותחים שבמיחם. אבל מותר לתת הרבה מים קרים כך שהם רק יפשירו. ומה שרב אדא ב\"מ אומר – אסור; משום שהמים הקרים מחזקים את הדפנות וזה 'מכה בפטיש'. וקיי\"ל כר' יהודה שדבר שאינו מתכוון אסור.", "ref": {"label": "שבת · פרק כירה · מא ע\"א", "ref": "Shabbat.41a"}}, {"layer": "mishna", "src": "ברייתא · ב\"ש · ב\"ה", "srcRef": null, "txt": "**ב\"ש**: מותר לשפוך מים חמים לקרים אבל לא קרים לחמים\n**ב\"ה**: מותר גם וגם\n**ת\"ק**: במה דברי ב\"ה אמורים? בכוס. אבל באמבטי – מודים ב\"ה לב\"ש שמותר רק חמים לקרים.\n**ר' שמעון בן מנסיא**: אוסר כב\"ש גם בכוס.", "ref": {"label": "שבת · פרק כירה · מב ע\"א", "ref": "Shabbat.42a"}}, {"layer": "rishon", "src": "רי\"ף", "srcRef": null, "txt": "פוסק כת\"ק בדעת ב\"ה – מותר מחמים לקרים ולהפך בכוס, אבל באמבטי רק חמים לקרים."}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "האמבטי היא כלי ראשון, וכלי ראשון מבשל. ולמרות שלפי משנת 'מיחם שפינהו' (אביי) מותר קרים לחמים אם הם הרבה, באמבטי מקפידים על חום המים (רחצה). לכן וודאי שכשיישפוך לתוכו קרים, לא יתן מספיק כך שיהיה בהיתר ולא יתבשלו. אז זו גזירה.", "under": true}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "גם הכוס וגם האמבטי כלי שני ובשניהם אין בישול אם שופכים קרים לחמים. אבל בגלל שמקפידים על חום האמבטי יותר, היא רותחת, והרואה יחשוב שהיא כלי ראשון; וכי השופך מים קרים אליה עושה איסור.", "under": true}, {"layer": "rishon", "src": "למה מותר חמים לקרים?", "srcRef": null, "txt": "רש\"י: תתאה גבר (המים התחתונים גוברים על העליונים. אז כשהקרים למטה – אין בישול)\nתוס': אין תתאה גבר בנוזל. מדובר כאן כשהמים הקרים מרובים, ולא ייתבשלו מהחמים. אבל אם שופך יותר מים חמים – וודאי אסור. (לפיכך צריך שיהיו הרבה קרים)\nר\"ן רשב\"א: אין תתאה גבר. אבל זה לא משנה כמה מים חמים נותנים, פשוט בגלל שבעירוי המים מתערבבים ממש, הם אף פעם לא יוכלו לחמם. (לכן אפילו במעט קרים מותר)", "collapsed": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"א-י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.12", "txt": "נקט כלשונו של רב אדא ב\"מ, שמיחם שפינה אותו ממים חמים מותר לתת לתוכו מים קרים כך שיפשירו.\nס' יא – מותר לשפוך מים חמים לאמבטי של צונן. אסור לשפוך מים צונן לאמבטי של חמים.\nס' יב – כתב שמותר לשפוך חמים לצונן (לדעת המשנ\"ב השו\"ע סובר כרשב\"א שאפילו במעט קרים אפשר), ושמותר לשפוך קרים לחמים רק אם נמצאים בכלי שני (ככה\"נ עפ\"י דעת הר\"ן)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "סבר (עפ\"י אביי) שאם ייתן הרבה מים קרים – אפשר אפילו בכלי ראשון, משום שלא יתבשלו מהחמים", "under": true}], "pesak": null}, "meicham": {"title": "מיחם על מיחם", "seif": "סעיפים ו׳-ח׳", "sugya": null, "intro": "בפשטות, אין בעיה להניח מיחם שחם כל צרכו ע\"ג מיחם מוטמן, כדי שהתחתון ישמור על חומו של העליון. אלא שאם העליון אינו חם שהידס\"ב, והתחתון יכול לחממו כך שייתבשל בדרגה זו – אסור. וכך דנו לגבי הנחת נוזלים על יד האש וע\"ג מיחם.\nאולם, אם מדובר בדבר יבש שבושל כ\"צ והצטנן, עפ\"י השו\"ע יהא מותר – וכך הדבר עומד במחלוקת פוסקים.", "ops": [{"layer": "gemara", "src": "הברייתא", "srcRef": null, "txt": "מותר להניח מיחם ע\"ג מיחם או קדרה על קדרה וכו' כדי שישמרו את חומם, אבל לא כדי שייתבשלו.\nלפיכך, כל עוד התחתון אינו יביא את העליון לחום שהידס\"ב – מותר.", "ref": {"label": "שבת · פרק במה טומנין · נא ע\"א", "ref": "Shabbat.51a"}}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "(שראינו לגבי הנחת קיתון כנגד האש), שמותר רק איפה שלא יוכל להגיע לחום שהידס\"ב. שמא יישכח.", "under": true}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "(גם לעניין קיתון) מתיר כל עוד מוריד לפני שמגיע לחום הבישול (לא נפסק להלכה)", "under": true}, {"layer": "rishon", "src": "ר' ירוחם (רנ\"ח)", "srcRef": null, "txt": "בסימן רנ\"ח הב\"י הביא את ר' ירוחם, שכתב שיש מחלוקת מפרשים:\nחלק אומרים שכל מה שמותר מיחם ע\"ג מיחם (וקדירה וכו') זה רק אם התחתון שביניהם לא על האש. חלק אומרים להיפך, ואפילו אם התחתון מונח ישר על האש – מותר.\nעוד כתב ר' ירוחם מחלוקת נוספת: סיעה אחת אומרת שהנחת מיחם ע\"ג מיחם שעל האש – כמו הנחה כנגד המדורה במקום שהידס\"ב (ובישול אחר בישול ביבש המותר שם, מותר כאן). אך לדעת סיעה אחרת – מיחם ע\"ג מיחם נחשב כהנחה ע\"ג כירה ממש, ואפילו בא\"ב אסור משום מיחזי כמבשל", "collapsed": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו׳-ח׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.8", "txt": "סעיף ו' – העתיק את דברי הברייתא\nסעיף ז' – הביא את דעות המחלוקת הראשונה ולא פירש דעתו\nסעיף ח' – הביא את דעות המחלוקת השנייה (הנחה ע\"ג מיחם שעל האש = כנגד מדורה או ע\"ג כירה) ופסק כדעה המקלה שנחשב כהנחה כנגד המדורה. ומותר בישול אחר בישול ביבש שם."}], "pesak": null}, "megis": {"title": "מגיס", "seif": "סעיף י\"ח", "sugya": null, "intro": "הגסה - ערבוב בתבשיל - אסורה מדאורייתא ונחשבת כבישול. זאת משום שפעולת הערבוב עוזרת להליך הבישול. לכן, אסור לערבב כל תבשיל שירד מהאש ואינו מבושל כל צרכו. אבל אם התבשיל כבר מבושל כל צרכו, אין בכך איסור כלל (משום שלעניין בישול אחר בישול, המידה היא כ\"צ, עפ\"י התוס' שם והשו\"ע).\nגם להוציא את האוכל עם הכף נחשב הגסה לענייין זה, ואסור בדבר שאינו מבושל כ\"צ. ואם הוא על האש – אסור אפילו אם מבושל כ\"צ.", "ops": [{"layer": "note", "srcRef": null, "src": "סיכום מצבי ההגסה", "txt": "**על האש ואינו מבושל כ\"צ** – אסור להגיס (פשט ברייתא)\n**על האש ומבושל כ\"צ** – כלבו: אסור מהתורה להגיס. מ\"מ: רק מדרבנן משום מיחזי כמבשל\n**ירד מהאש ואינו מבושל כ\"צ** – אסור להגיס (עפ\"י ר\"ן בגמרא)\n**ירד מהאש ומבושל כ\"צ** – שו\"ע מתיר. אסור למהר\"י וייל\n**הוצאה בכף** – רמב\"ם ושו\"ע סברי שנחשב הגסה (חוץ ממשנ\"ב, בכ\"צ)"}, {"layer": "gemara", "src": "ברייתא (ביצה לד)", "srcRef": null, "txt": "אחד מביא את המים, אחד מביא את האור... ואחד מגיס. כולם חייבים.\nמכאן שחייבים בהגסה משום בישול.\nאולם, הברייתא מדבר על תבשיל שעל האש. מה לגבי תבשיל שהורד ממנה?", "ref": {"label": "ביצה · פרק המביא · לד ע\"א", "ref": "Beitzah.34a"}}, {"layer": "gemara", "src": "גמרא (שבת יח)", "srcRef": null, "txt": "יורה עקורה (שהורדה מהאש) ובישלו בה סממנים – ניחוש שמא מגיס!", "ref": {"label": "שבת · פרק יציאות השבת · יח ע\"א", "ref": "Shabbat.18a"}}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "כותב שכל דבר שאינו מבושל (לשונו: מאב\"ד. אבל שו\"ע ייפסוק כ\"צ) - חייב משום מגיס אפילו הורד מהאש. אבל אם הוא מבושל כשיעור – לא שייך ומותר."}, {"layer": "rishon", "src": "כלבו (הובא בב\"י רנ\"ג)", "srcRef": null, "txt": "אם הוא על האש – אפילו מבושל כל צרכו אסור מהתורה להגיס.", "under": true}, {"layer": "rishon", "src": "הרב המגיד", "srcRef": null, "txt": "אם הוא על האש, אסור רק מדרבנן משום מחזי כמבשל", "under": true}, {"layer": "rishon", "src": "מהר\"י ווייל", "srcRef": null, "txt": "אוסר כל הגסה. אפילו בדבר המבושל כ\"צ שירד מהאש.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ח)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.18", "txt": "דבר שירד מהאש – מותר רק אם מבושל כ\"צ (ר\"ן). ואפילו הוצאה בכף נחשבת הגסה."}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אם הוא על האש ומבושל כל צרכו - מותר להוציא בכף. ולא שייך מחזי כמבשל בזה.", "under": true}, {"layer": "acharon", "src": "א\"ר", "srcRef": null, "txt": "יש לחשוש לדעת הכלבו שיש בזה איסור דאורייתא, ולא רק חשש מחזי כמבשל מדרבנן", "under": true}], "pesak": null}, "yishum": {"title": "יישום למעשה", "seif": null, "sugya": null, "intro": "אז איך נעשה בשבת למעשה?", "ops": [{"subhead": "דבר יבש שנתבשל (לסמוך – טו')"}, {"layer": "lead", "srcRef": null, "txt": "יוצא, שלפי השו\"ע דבר יבש שכבר נתבשל מותר להניח 'כנגד האש', אפילו במקום שיכול להגיע לחום שהידס\"ב. אבל לא אצל האש (אין בעיית בישול, אלא שמא יחתה בשביל החום. ההרחקה מהאש היא היכר שאסור לחתות). אצלנו זה יהיה לסמוך את המאכל לפלטה או לכירה. אבל אם אנו מבטלים את חשש החיתוי – ולרוב הפוסקים כך הוא כשמדובר בפלטה שאי אפשר לשנות את החום שלה – אז אפשר אפילו על מקור החום.\nאולם אנו כן צריכים להתמודד עם חשש מיחזי כמבשל. לדעת הרב עובדיה, בפלטה שעיקר שימושה הוא בשבת, ולא לבישול – חשש זה מתבטל מטבעו. אך אם לא נקבל סברא זו, נצטרך להניח קדרה ריקנית/מלאה (זאת עפ\"י סעיפים ג' ו-ה' בסימן רנ\"ג במחלוקת המרדכי והרשב\"א).\nאבל – עכשיו בפנינו שני מכשולים:\n1) הפמ\"ג סובר שקדרה ריקנית אסור, וכי השו\"ע פסק כמרדכי.\n2) אפילו אם נקבל את דעת המג\"א שהשו\"ע פסק כרשב\"א, וכי אין בעיה אם קדרה ריקנית – יש פוסקים שסוברים שהמרווח שבין גוף החימום שבפלטה למשטח לא נחשב כקדרה ריקנית כלל!"}, {"subhead": "דבר שלא נתבשל כלל"}, {"layer": "lead", "srcRef": null, "txt": "בס' ד דנו עפ\"י המשנה שכל שבא בחמין מער\"ש שורין אותו בחמין בשבת. ובוודאי שאסור לבשל בשבת דבר שלא בושל כלל. שהרי אין צולין בשר בצל וביצה אלא כדי שייצולו מבעוד יום, והוא כמאב\"ד (רמב\"ם – חצי וכן שו\"ע). וזה רק באור, תולדות האור ותולדות חמה. אבל מותר לבשל בשבת דבר שלא בושל בחמה.\nובוודאי שכל שטיפה במים חמים שתכשיר את המאכל שקודם לא היה נאכל – אסורה גם. שהרי הדחתו היא גמר מלאכתו.\nומה לגבי הדחה כזו מכלי שני? השאלה היא אם האיסור הוא משום בישול או מכה בפטיש. אם משום בישול, עפ\"י הפסק של השו\"ע בס' י':\nא\"ר ומחצה\"ש – מותר לשטוף במים חמים מכלי שני.\nט\"ז – גם בכלי שני אסור, אלא רק במים קרים.\nפמ\"ג – אסור אף במים קרים. משום מכה בפטיש."}, {"subhead": "דבר לח/נוזל"}, {"layer": "lead", "srcRef": null, "txt": "אם התבשל כל צרכו והתקרר – השו\"ע אוסר. רמ\"א מקל אם הנוזל מצור\"ל. לפי הרמ\"א יהיה מותר כנגד האש – סמוך לכירה, אך לא עליהם (שמא יחתה)\nאולם, ניתן להפשיר דבר לח קר אף לדעת השו\"ע (ואף מצוי\"ל לרמ\"א) בהנחתו במרחק מה ממקור החום כך שלא ייתבשל. נקודת ההנחה צריכה להיות ממקום שאין הנוזל יוכל להגיע לחום שהידס\"ב (פן נשכח אותו ויתבשל) ולעניין חום זה יש להחמיר ל45°."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "kitzur"}, {"type": "group", "title": "הגדרות היסוד", "spans": "מעשה · שיעור · מקור החום", "children": ["maase", "shiur_mutzak", "shiur_nozel", "makor"]}, {"type": "sec", "id": "bab"}, {"type": "sec", "id": "baa"}, {"type": "sec", "id": "hadacha"}, {"type": "sec", "id": "hafshara"}, {"type": "sec", "id": "irbuv"}, {"type": "sec", "id": "meicham"}, {"type": "sec", "id": "megis"}, {"type": "sec", "id": "yishum"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"יד סולדת בו": "החום שבו היד נרתעת מלגעת (כ־45°C ומעלה) — השיעור שממנו יש בישול. בקיצור: הידס״ב.", "כלי ראשון": "הכלי שהתבשל בו על האש; מבשל כל עוד יד סולדת בו, אף לאחר שהורד מן האש.", "עירוי": "שפיכת נוזל חם מכלי ראשון; לשו״ע (כר״ת) מבשל את פני הדבר כדי קליפה.", "כלי שני": "הכלי שאליו הועבר הנוזל מכלי ראשון; לפי פשט הסוגיה אינו מבשל (מלבד קלי בישול).", "כלי שלישי": "הכלי שאחרי כלי שני; מיקל עוד יותר (יש שהתירו בו אף קלי בישול).", "קלי בישול": "מאכלים המתבשלים בקלות — אף בכלי שני (ולתוס׳ אף בעירוי מכלי שני).", "תבלין": "מתבשל בכלי ראשון שהורד מהאש אף בלא יד סולדת בו, אך אינו מתבשל בכלי שני.", "מדרג קלות בישול": "סולם עד כמה מאכל מתבשל בקלות (קשה בישול ← רגיל ← תבלין ← קלי בישול), הקובע באיזה כלי נאסר בישולו.", "מצקת": "כף גדולה לשאיבת נוזל; ספק אם דינה ככלי ראשון או ככלי שני.", "מאכל בן דרוסאי": "כשליש (או כחצי) בישול — השיעור שממנו המאכל נחשב מבושל. בקיצור: מאב״ד.", "בישול אחר בישול": "האם יש איסור לחמם דבר שכבר התבשל; ביבש אין (לרוב), ובלח — מחלוקת.", "מעשה בישול": "ריכוך דבר קשה או הקשיית דבר רך על ידי חום.", "מגיס": "ערבוב תבשיל; מסייע לבישול ולכן אסור בתבשיל שאינו מבושל כל צרכו.", "מצטמק ויפה לו": "תבשיל לח שהצטמקותו משביחה אותו; רק בו סובר הרמ״א שיש בישול אחר בישול."}, "subject": "שבת", "id": "bishul"}, {"topic": {"title": "נ\"ט בר נ\"ט", "eyebrow": "מבחני הרבנות · איסור והיתר · סימן צ\"ה", "siman": "Shulchan_Arukh,_Yoreh_De'ah.95", "intro": {"lead": {"t": "", "ref": ""}, "body": "למדנו כי טעם כעיקר. בסימן זה, נראה מקרה פרטי בו נגלה כי למרות שישנו טעם, מאחר והוא נקלש, לא מתייחסים אליו. מקרה זה מתקיים בסיטואציה המכונה 'נותן טעם בר נותן טעם'; היינו, כאשר מאכל אינו נותן טעם במאכל אחר ישירות, כמו שאנו מכירים בד\"כ, אלא נותן טעם בכלי, ואזי הכלי נותן טעם במאכל האחר. או אז, טעם המאכל הראשון נקלש בדרכו למאכל האחר, וככזה – כטעם קלוש - אין בו חשיבות (ערוה\"ש)\n\nנעמוד גם על כך שיש הבדל קריטי בדיון זה בין היתר - בשר או חלב - לבין איסור. כך, להלכה נפסק כי למרות שבנתינת טעם שאינה ישירה הטעם נקלש, כאשר מדובר באיסור אנו לא מקלים בכך, ועדיין חשיב טעם כדי לאסור. ורק בטעם של היתר נקל כך (ר\"ן). זאת משום שטעם של איסור חשיבותו תמיד נוכחת."}}, "sections": {"ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳-ב׳", "sugya": null, "ops": [{"subhead": "דגים שעלו בקערה"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**רב ושמואל** – דגים שעלו בקערה של בשר.\n**רב** - אסור לאוכלם בכותח\n**שמואל** – מותר לאוכלם בכותח\nוהגמרא מנסחת שלֶ-\n   רב אסור משום שהווי נותן טעם,\n   ולשמואל מותר משום שהווי נ\"ט בר נ\"ט (הבשר בקערה והקערה בדגים)\n~~(והגמרא אומרת שסיבת עמדת רב נלמדת מכללא, ומחפשת אחר זה סיפור שממנו נלמד כן)~~\n~~חזקיה משום אביי:~~\n   ~~דגים שעלו בקערה, מותר לאוכלן בכותח~~\n   ~~צנון שחתכו בסכין שחתך בה בשר – אסור לאוכלו בכותח דאגב חורפיה בלע~~", "ref": {"label": "חולין · פרק כל הבשר · קיא ע\"ב", "ref": "Chullin.111b"}}, {"layer": "rishon", "src": "תוס' ורא\"ש", "srcRef": null, "txt": "'עלו בקערה' – הדגים רותחים והעלו אותם על קערה צוננת (וכן להפך)\nכלומר: נ\"ט בר נ\"ט דהיתרא – האוכל חם הכלי צונן/להפך; נ\"ט בר נ\"ט דאיסורא – שניהם חמים"}, {"layer": "rishon", "src": "רש\"י, תרומה", "srcRef": null, "txt": "אפילו אם שניהם חמים או בושלו יחד - מותר לאכול בחלב (כי יש פיזור טעם במים). אסור רק אם בושל עם הבשר ממש"}, {"layer": "rishon", "src": "רשב\"א, ר\"ן, ראבי\"ה רמב\"ם", "srcRef": null, "txt": "אפילו נצלו בכלי הבשרי"}, {"layer": "rishon", "src": "ריו\"ח", "srcRef": null, "txt": "1)  אם גם המאכל הפרווה וגם הכלי הבשרי חמים (בושל בכלי) –\n    א.  מותר בחלב רק אם הכלי לא ב\"י\n    ב.  אם הכלי ב\"י – מותר רק בדיעבד (כבר בושל)\n2)  חם וקר כנ\"ל (הקערה/הדגים) צריך לקלוף (כמו בצ\"א, בדין קר וחם שנגעו ממש)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "חולק בשניהם – גם אם הכלי ב\"י ואפילו לכתחילה\nחולק. שטויות. אז בשביל מה יש לנו נ\"ט בר נ\"ט? זה דין רק בנ\"ט ממש.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.1", "txt": "דגים שבושלו או נצלו בכלי בשרי נקי (שאין בו שאריות) – מותר לאוכלו בכותח (רשב\"א ר\"ן רמב\"ם)"}, {"layer": "zman", "src": "הרב מלמד", "srcRef": null, "txt": "מצדד, אבל לא בגלל נ\"ט בר נ\"ט, אלא כי כיום כלי מתכת וזכוכית נקיים אינם פולטים כלל", "under": true}, {"layer": "lead", "srcRef": null, "txt": "הרמ\"א פה עשוי לבלבל. הוא כביכול פוסק תוס' ורא\"ש, אך רק לכתחילה. ובדיעבד מתיר כדעה המקלה דרשב\"א והרמב\"ם. כלומר: אין לבשל פרווה בבשרי לכתחילה במטרה לאוכלו עם חלב, אבל מותר בדיעבד"}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.2", "txt": "לכתחילה כתוס' ורא\"ש (אין לבשל ולצלות פרווה בכלי בשרי ע\"מ לאכול עם חלב), אך בדיעבד מותר כרשב\"א (סמ\"ק)"}, {"layer": "acharon", "src": "מהרש\"ל", "srcRef": null, "txt": "אם נצלו – אפילו בדיעבד אסור עם חלב (כי אין מים)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הרמ\"א לא מתיר לאכול לכתחילה אם בדיעבד בישל, אלא רק אם כבר התערבב הפרווה עם החלב – בדיעבד מותר", "under": true}, {"subsubhead": "לכתחילה או בדיעבד?"}, {"layer": "lead", "srcRef": null, "txt": "בסוגריים ציינתי מה פירוש בדיעבד ולכתחילה, אבל רק כדי לסבר את האוזן.. יש גם בזה מחלוקת בין הפוסקים (בעיקר דעת הש\"ך על הרמ\"א)"}, {"layer": "rishon", "src": "סמ\"ק, הגהות מיימ'", "srcRef": null, "txt": "כל מה שמותר, הוא רק בדיעבד (כלומר, כבר בושל הפרווה בסיר בשרי)"}, {"layer": "rishon", "src": "תרומה", "srcRef": null, "txt": "אפילו לכתחילה (מותר לבשל את הפרווה בסיר בשרי לכתחילה כדי לאכלו עם חלב)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "נקט כדעה המקלה רק בדיעבד, שזה בעצם לפסוק סמ\"ק."}, {"layer": "rishon", "src": "הב\"י", "srcRef": null, "txt": "הביא מחלוקת זו. אבל לא הכריע בה במפורש להלכה בשו\"ע\nלשונו בשו\"ע היא די בדיעבדית \"דגים שבושלו\"\nמצד שני, על ריו\"ח (שסבר כסמ\"ק) חלק וכתב במפורש אפילו לבשל מותר (ואפילו בב\"י)"}, {"layer": "acharon", "src": "ש\"ך, כו\"פ", "srcRef": null, "txt": "שו\"ע סובר כסמ\"ק שכל הדיון הוא רק בדיעבד"}, {"layer": "acharon", "src": "בן איש חי", "srcRef": null, "txt": "אבל בכלי שאינו ב\"י מותר אפילו לכתחילה", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "שו\"ע סובר שמותר לבשל אף לכתחילה פרווה כדי לאכול עם חלב"}, {"layer": "acharon", "src": "מנחת כהן", "srcRef": null, "txt": "אסור לבשל לכתחילה ע\"מ לאכול עם חלב, וקונסים את מי שעושה כן לא לאכול עם חלב"}, {"layer": "acharon", "src": "פר\"ח", "srcRef": null, "txt": "חולק. לא קונסים ('דגים שעלו' – אפילו במזיד)", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "דעת המנחת כהן נראית; שלא להרגיל באיסור", "under": true}, {"subsubhead": "כשהכלי שבושל בו אינו ב\"י"}, {"layer": "lead", "srcRef": null, "txt": "בסוגיה עצמה אין כל חילוק בין אם הדגים עלו בכלי בן יומו לשאינו בן יומו. אך מובן כי ניתן לשלוף חילוק זה ולבחון האם נוכל לעדן את השיטות המחמירות יותר כאשר מדובר בכלי שאינו ב\"י, שהרי הווי נטל\"פ."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם הכלי שבושלו/ניצלו בו הדגים אינו ב\"י – מותר אף לכתחילה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "לשו\"ע אין חילוק, כי גם ככה מתיר (לא מדייק אם דעת השו\"ע בדיעבד או לכתחילה)", "under": true}, {"layer": "table", "table": {"title": "לאכול פרווה שבושל בכלי בשרי עם חלב", "cols": ["שו\"ע", "רמ\"א"], "rows": [{"head": "הכלי הבשרי\n**בן יומו**", "cells": ["מותר\n(לא פירש אם לכתחילה או בדיעבד)\n**ש\"ך**: דעתו בדיעבד (רק אם בושל)\n**רע\"י**: דעתו לכתחילה (מותר לבשל)", "אסור לכתחילה\nמותר בדיעבד\n**ש\"ך, ערוה\"ש**:\n   לכתחילה לרמ\"א = לערבב עם חלב\n   בדיעבד לרמ\"א = אם כבר התערב עם חלב - מותר לאכול"]}, {"head": "הכלי הבשרי\n**אינו בן יומו**", "cells": ["אין התייחסות.\nלרע\"י ק\"ו שמותר לכתחילה\n**בן איש חי**: מותר לכתחילה\nלש\"ך שסובר שבבן יומו דעת ש\"ע בדיעבד – אפשר להציע שסובר כבן איש חי", "מותר אף לכתחילה"]}]}}, {"layer": "zman", "src": "פניני הלכה", "srcRef": null, "txt": "כל הטַבלה נכונה לגבי כלי חרס ועץ / כלי מתכת זכוכית שאינם נקיים\nכלי מתכת וזכוכית נקיים כיום – אינם פולטים טעם כלל, וכל בני העדות יכולים לבשל לכתחילה פרווה בסיר בשרי (נקי) כדי לאכול עם חלב"}, {"layer": "acharon", "src": "עיון (הערת המסכם)", "srcRef": null, "txt": "בחזרה לסימן בשבט תשפ\"ב, מרגיש שדעת הש\"ך וערוה\"ש ברמ\"א לגבי מהו בדיעבד נכונה בו. ושזה מובהק מלשון האו\"ה שבדרכ\"מ. עוד ראיה להבנתם היא מכך שהוא מתיר כן בכלי שאינו בן יומו, כלומר, נטל\"פ. הרי שהוא סומך פשוט על הדין של נטל\"פ, שמותר בדיעבד.\nבנוסף, בעקבות הלימוד שלי עם החבורה את סימן צ\"ג, והניסיון להבין את סברת נ\"ט בר נ\"ט כאן, ואת המשמעות של לכתחילה ובדיעבד, נוטה יותר לדעת הרמ\"א לש\"ך להלכה. אם הבדיעבד כאן מותר, למה לאסור לכתחילה? כמו שדיברנו בסי' צ\"ג (ואני רואה שבדומה לכך אומר הרב מלמד), אכן הטעם לא משמעותי ברמה שאפשר להתירו. אלא שמאחר ויש רצון לשמור על הפרדת המטבח (ברמה מסוימת ויותר חד משמעית) – אז אוסרים לכתחילה.", "collapsed": true}, {"subsubhead": "בכלי חלבי (לא חלב ממש)"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "מה שאסור לאכול דגים שבושלו/נצלו בכלי בשרי עם חלב (תוס', רא\"ש) – חלב ממש. לאכלם בכלי חלבי מותר"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פוסק כן: מאכל פרווה שבושל בכלי בשרי - מותר לאכול בכלי חלבי"}, {"subsubhead": "בשני מאכלים"}, {"layer": "lead", "srcRef": null, "txt": "דגים שעלו בקערה זו דוגמא די ספציפית לנ\"ט בר נ\"ט: הטעם הראשון בכלי והשני במאכל (הדגים). אבל מה אם גם הטעם הראשון במאכל, ולא בכלי? האם עדיין אמרינן שהטעם נקלש?"}, {"layer": "rishon", "src": "תרומה, פמ\"ג", "srcRef": null, "txt": "נ\"ט בר נ\"ט בשני אוכלים אינו מותר"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כי הטעם לא נקלש באוכלים", "under": true}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "גם נ\"ט בר נ\"ט ע\"י שני אוכלים מותר"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אין טעם בדבריו", "under": true}], "pesak": null}, "isura": {"title": "נ\"ט בר נ\"ט דאיסורא", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "ר\"ן, רשב\"א", "srcRef": null, "txt": "(ב\"י: ונראה שדעת כל הפוסקים שווה לזה):\nמה שמתירים נ\"ט בר נ\"ט זה רק בבשר/חלב, אבל באיסור – אפילו אם יש המון נ\"ט בר נ\"טים אסור כל עוד יש טעם (כלומר, זה לא שאין טעם בנ\"ט בר נ\"ט ובגלל זה זה מותר, אלא שלמרות שיש טעם הוא מותר (!). אבל טריפה תמיד טעמה אסור. השערי דורא קורא לזה חילוק בין נ\"ט של היתרא, לנ\"ט של איסור)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "בהיתר אנו מתירים טעם שנקלש משום שאין בו חשיבות, אבל באיסור – למרות שנקלש עדיין יש בו חשיבות", "under": true}], "pesak": null}, "charif": {"title": "נ\"ט בר נ\"ט בדבר חריף", "seif": "סעיף ב׳", "sugya": null, "intro": "ראינו במקומות רבים כי חריפות מאכל מקשה על העניינים, וכך למשל בנטל\"פ, השו\"ע הביא דעת המרדכי הסובר שחריף שמתבשל בכלי שאינו בן יומו מעורר את הטעם לשבח; וכן פוסק הרמ\"א כאן על פיו. (ועיין עוד בסי' צ\"ו)\n\nבנ\"ט בר נ\"ט עולה דבר דומה, ואנו רואים כי הרמ\"א סובר עפ\"י האו\"ה שאם המאכל הפרווה שמבשלים בכלי הבשרי הוא חריף – אסור אפילו בדיעבד ('בדיעבד' – עפ\"י הטבלה לעיל, בדעת הרמ\"א)\n\nמקרה של חריף שבושל בכלי בשרי יש לבחון מבחינת שתי הקולות המרכזיות שלנו בנתינת טעם: מצד נ\"ט בר נ\"ט, ומצד נטל\"פ.", "ops": [{"layer": "acharon", "src": "דרכ\"מ · או\"ה", "srcRef": null, "txt": "בחריף לא מועיל נ\"ט בר נ\"ט"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כי החריפות הופכת את טעם הבשר לממשית יותר (מחזקת)", "under": true}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.2", "txt": "דבר חריף שבושל בכלי בשרי – אין לאוכלו עם חלב, אפילו בדיעבד"}, {"layer": "note", "srcRef": null, "src": "חריף = ?", "txt": "חריף = מאכל שרובו או כולו חריף. מאכל שיש בו תבלין חריף – לא מִקרי חריף"}, {"layer": "acharon", "src": "הערה (הש\"ך בק\"ג)", "srcRef": null, "txt": "לשים לב: הרמ\"א מדבר באם הדבר החריף בושל. הש\"ך בק\"ג, גבי נטל\"פ מחייב תנאי זה לכך שחריף בכלי שאינו ב\"י יקבל טעם לשבח. ומן המיקס שהרמ\"א עושה כאן (הוא פוסק את המרדכי מק\"ג ומדבר על בישול), אפשר לראות תימוכין לדעת הש\"ך", "collapsed": true}, {"layer": "zman", "src": "פניני הלכה (אחרי סידור שלי)", "srcRef": null, "txt": "מצד נ\"ט בר נ\"ט: רמ\"א: עפ\"י או\"ה סובר שאין נ\"ט בר נ\"ט בחריף\n  שו\"ע: מקיש מדעת השו\"ע בסכין בצ\"ו לכאן, שיסכים עם הרמ\"א והאו\"ה שאם בושל חריף פרווה – אין נ\"ט בר נ\"ט.\nמצד נטל\"פ: רמ\"א: אוסר כאן שהכלי שבושל בו החריף אינו ב\"י\nשו\"ע: מניח שהוא לא פוסק כמו המרדכי בק\"ג שחריף בקדרה שאינה ב\"י מבטל את הפגם שבטעם (בק\"ג הוא דווקא מביא אותו ביש אומרים. אז אולי בגלל צ\"ו? לבדוק.)\nלפיכך, הרמ\"א יאסור בכל מקרה לאכול עם חלב, ושו\"ע יתיר כאשר הווי נטל\"פ, היינו בקדרה שאינה ב\"י\nובקצרה:\nאם הקדרה שבושל בה החריף בת יומא: גם לרמ\"א וגם לשו\"ע אסור לאוכלו עם חלב\nאם הקדרה שבושל בה החריף אינה בת יומא: לשו\"ע מותר לאוכלו עם חלב; לרמ\"א אסור\nדעת עצמו (טוען שיש אומרים. לברר איפה): רק כאשר לא מנקים יש להחמיר בחריף. אם מנקים: דין חריף כדין סתם מאכל פרווה (כלומר, הן מצד נ\"ט בר נ\"ט, והן מצד נטל\"פ), כי אין פליטת טעם כלל, ומותר לאכול עם חלב (וי\"ל לפי מה שפוסק בעיקר דין נ\"ט בר נ\"ט, שיתיר אף לכתחילה לבשל כן)\n(אם לא בישלו - כגון סלט עם בצל או סחוג קר – נ\"ל שאפשר להקל לכו\"ע, כדעת הש\"ך בק\"ג וכדפרשתי ברמ\"א)", "collapsed": true}], "pesak": null}, "mikli": {"title": "נ\"ט בר נ\"ט מכלי לכלי", "seif": "סעיף ג׳", "sugya": null, "intro": "[סע' ד' – שעליו אין אפילו ב\"י – שמתי בסיכום על נטל\"פ]\n\nעפ\"י הדיון של נ\"ט בר נ\"ט, עלתה השאלה מה דינם של פליטות כלים בשריים/חלביים בני יומם? ומה קורה אם פליטה של חמה כלי בשרי בן יומו פוגשת פליטה חמה של כלי חלבי בן יומו (כלומר, כגון כששוטפים כלי בשרי במים רותחים בתוך כלי חלבי)?", "ops": [{"layer": "rishon", "src": "תוספות, תרומה", "srcRef": null, "txt": "קערות בשריות (שבושל בהן בשר) שהודחו במחבת חלבית בכלי ראשון,\nאם שניהם בני יומן – אסור (הווי טעם שני באיסור, והכלים פוגשים זה את זה ישירות)\nואם רק אחד בן יומו - אז שניהם מותרים"}, {"layer": "rishon", "src": "רא\"ש, רשב\"א", "srcRef": null, "txt": "אפילו אם שניהם בני יומם - מותר.\n(זה נ\"ט בר נ\"ט: הבשר נ\"ט בקערה והקערה במים, וכן לגבי החלב)\nאך צריך שיהיו שני הכלים נקיים משומן וכד'"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "וכמובן שאם יש שומן, אז במידה ויש שישים - בטל", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.3", "txt": "קערת בשר בת יומא שהודחה במחבת חלבית בת יומא במים רותחים – נ\"ט בר נ\"ט ומותר\n(רא\"ש וסיעתו)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם שני הכלים בני יומן – נאסרים; רק אחד מהם ב\"י – מותרים שניהם (תוס', תרומה)"}, {"layer": "acharon", "src": "ש\"ך על השו\"ע", "srcRef": null, "txt": "זה רק בדיעבד. אבל לכתחילה מותר רק כסיעת התרומה והתוס'."}, {"layer": "acharon", "src": "ש\"ך על הרמ\"א", "srcRef": null, "txt": "ואם יש שומן על האחד הבן יומו – עדיין מותרים שניהם"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "תמהה על כך", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "ברור שכל הדיון הוא בכגון ששני הכלים הוו כלי ראשון, אבל אם אחד מהם כלי שני – מותר לכל הדעות"}, {"subsubhead": "חום היורה הרוחצת"
