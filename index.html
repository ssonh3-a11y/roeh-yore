ן · פרק כל הבשר · קיג", "ref": "Chullin.113b"}}, {"subhead": "מצד מה אסור בהמה טמאה בחלב?"}, {"layer": "rishon", "src": "בב\"י", "srcRef": null, "txt": "**בב\"י** סבר שבהמה טמאה בחלב טהורה/להפך אינו אסור באכילה מצד בשר בחלב כלל וכמפורש במשנה. אולם, מאחר ומדובר בבהמה טמאה, אסור לאוכלה מצד מאכלות אסורות."}, {"layer": "rishon", "src": "הטור (בב\"י)", "srcRef": null, "txt": "ונראה מ**הטור** (וכ\"כ בדעתו בב\"י), שסבר שאסור מצד בשר בחלב (כלל דין בשר בהמה טהורה בחלב טמאה ולהפך עם דין בשר חיה ועוף)", "under": true}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "ו**הב\"ח** כתב, שהנפק\"מ לכך היא לעניין חתיכה נעשית נבלה וחתיכה הראויה להתכבד. שהם דינים השייכים רק לבשר בחלב (לדעת רבנו אפרים). ולפי דעת הטור, שייך גם בבשר טהורה שנפלה בחלב טמא (או להפך). אבל לפי דעת הב\"י, אין המושגים האלו חלים לגבי בשר/חלב בהמה טהורה, מאחר ואין שייך בה איסור בשר בחלב."}, {"layer": "lead", "srcRef": null, "txt": "יוצא למעשה:\nלדעת הטור, אם נפלה חתיכת בשר בהמה טהורה שנתערבבה בחלב בהמה טמאה הראויה להתכבד – אינה בטלה אפילו באלף. או, אם נתערבב חלב בהמה טמאה בחתיכת בשר במה טהורה (שאינה ראויה להתכבד) ביחס של יותר מ1/60 – היא אוסרת תבשיל בו החתיכה לא בטלה בשישים.\nולדעת הב\"י לא יאסרו."}, {"layer": "acharon", "src": "הש\"ך והט\"ז", "srcRef": null, "txt": "צידדו בדעת הב\"י (\"אין מקום לומר שרבנן גזרו שיהא איסור אכילת בשר בחלב במין א' טמא דלא מצינו זה בגמרא ולא בפוסקים כלל אלא בבשר עוף לחוד\")"}], "pesak": null}, "dagim": {"title": "דגים וחגבים", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "rishon", "src": "ר\"ן, רמב\"ם, רשב\"א", "srcRef": null, "txt": "כיוון שמותר לבשל דגים בחלב מותר גם לאכול"}, {"layer": "rishon", "src": "ר' בחיי", "srcRef": null, "txt": "דג עם חלב אסור, דג עם חמאה מותר", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "אין לאכול דגים עם חלב כן מפני הסכנה (או\"ח קעג)"}, {"layer": "acharon", "src": "דרכ\"מ, ש\"ך, ט\"ז", "srcRef": null, "txt": "לא ראיתי שנזהרים בזה. ומה שכתב בב\"י הוא רק לגבי דגים ובשר", "under": true}, {"layer": "rishon", "src": "טור עפ\"י המשנה (חולין קג)", "srcRef": null, "txt": "דגים וחגבים מותר לאכול עם חלב (ובטור או\"ח קעג, כתב שאין לאכול מפני הסכנה", "ref": {"label": "חולין · פרק כל הבשר · קג", "ref": "Chullin.103b"}}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "כתב שדגים וחגבים אין בהם איסור אפילו מדרבנן"}, {"layer": "acharon", "src": "כנה\"ג, לבוש", "srcRef": null, "txt": "צידדו להחמיר בדגים עם חלב", "under": true}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "הביא עפ\"י הפמ\"ג שבדיעבד עם בושל, מותר אפילו לאוסרים\nוכן ה**ילקו\"י**"}], "pesak": null}, "beitzim": {"title": "ביצים גמורות", "seif": "סעיף ה׳", "sugya": null, "ops": [{"layer": "note", "src": "תמונה", "srcRef": "https://daf-yomi.com/DYItemDetails.aspx?itemId=26833", "txt": ""}, {"layer": "gemara", "src": "בבלי ביצה", "srcRef": null, "txt": "ביצים גמורות מותר לאכלן בחלב.\n**רבי יעקב** אוסר עם היו מחוברות לגידין.\n**בברייתא** \\ul{מותר} לאכול מן \\ul{השלל של ביצים} (ובגמרא ורש\"י מועמדת הברייתא שלא כדעת רבי יעקב =מעורות בגידין. ואז לדעת רש\"י מעורות בגידין מותר)\n\\ul{אשכול של ביצים} – \\ul{אסור}.", "ref": {"label": "בבלי · ביצים", "ref": ""}}, {"layer": "lead", "srcRef": null, "txt": "משמע מהפוסקים שהלכה כת\"ק בברייתא"}, {"layer": "rishon", "src": "רשב\"א, ר\"ן", "srcRef": null, "txt": "ביצה גמורה היא שיש לה חלבון וחלמון (אעפ\"י שמחוברות לגידין)\nיש לה רק חלמון – אסור ונחשב בשר"}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "אינה גמורה (ואינה מותרת לאכילה) עד שתגמר קליפתה (קשה)", "under": true}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מותר אפילו אם רק נגמר החלמון ועדיין היא אדומה (שלל של ביצים המחובר באשכול), ואפילו עדיין אין חלבון"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "**רש\"י** וודאי מתכוון שהיא כבר מנותקת מהאשכול\n**הטור**: הבין את רש\"י שלא כמוני\n**רא\"ש על רש\"י**: אפילו מחובורות באשכול", "under": true}, {"layer": "rishon", "src": "מהרא\"י", "srcRef": null, "txt": "נהגו הנשים איסור אפי' אם הקליפה החיצונה קשה לגמרי. אלא \\ul{רק אם יצאה הביצה מגוף התרנגולת}.\nאבל בדיעבד אם נגמרה הקליפה אפי' בקרום לבן בלבד - סגי (ואין עליו דין בשר כלל)."}, {"subhead": "צריך להפריד?"}, {"layer": "rishon", "src": "ר' יהונתן", "srcRef": null, "txt": "אסור דווקא \\ul{בעירוב} בחלב. אבל מותר לאכול בנפרד ללא הפסק וללא קינוח פה או נטילה"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "פוסק כרשב\"א לעניין הגדרת ביצים גמורות (חלמון וחלבון) , ואסור לבשלם. וסיים בדברי ר' יהונתן שמותר לאכול אחריהם גבינה או חלב."}, {"layer": "lead", "srcRef": null, "txt": "\\ul{כלומר}: מותר לאכול אם יש רק חלמון, אבל כדי לבשל עם חלב – צריך שיהיה גם חלבון."}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "מעיקר הדין צריך לפסוק מרדכי (קליפה קשה). אבל המנהג כדעת מהרא\"י (רק אחרי שיצאה מהתרנגולת)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כתב ש'לבשל' שבלשון השו\"ע הוא בוודאי מותר (שהרי אפילו עוף ממש מותר לבשל, כס' ג'), וכוונתו לאכילה", "under": true}, {"layer": "acharon", "src": "ובשו\"ת יעב\"ץ", "srcRef": null, "txt": "כתב שכל זה רק אם הביצה הוצאה מן תרנגולת שנשחטה. אבל אם היא יצאה ממנה באופן טבעי – אפילו אם הקליפה רכה מותר.", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "ולגבי אכילת חלב \\ul{בנפרד}, כתב הש\"ך שמותר אפילו אם אכל ביצה שלא נגמר חלמון ואפילו מחוברת עוד לאשכול"}, {"layer": "acharon", "src": "ש\"ך (קושיא ותירוץ)", "srcRef": null, "txt": "הקשה ממה שבסימן פ\"ו אסור לאכול תרנגולת שהטילה ביצה (ע\"י שהכו אותה), משום אבר מן החי \\ul{אם מעורה בגידין}.\n**ותירץ** שכאן מותר אם מעורה בגידים משום שלעניין בשר בחלב בעוף שהוא \\ul{דרבנן} מקלים יותר. אבל אבר מן החי הוא דאורייתא\nאו – מעיקר הדין כל ביצה הייתה אסורה משום אבר מן החי, אלא שמהפסוקים לימדו שמותרים גמורות.", "under": true}], "pesak": null}, "shalil": {"title": "שליא, שליל וחלקים טפלים", "seif": "סעיף ז׳", "sugya": null, "ops": [{"layer": "gemara", "src": "חולין קיג · שמואל", "srcRef": null, "txt": "**שמואל**:\n'גדי' - לרבות את החֶלב,\n'גדי' - לרבות את המתה,\n'גדי' - לרבות את השליל,\n\n~~'גדי' – להוציא את הדם,~~\n'גדי' – להוציא את השליא,\n~~'גדי' – להוציא את הטמאה;~~\n\nכלומר שבבישול בחלב של אחד מהקבוצה הראשונה – מתחייב בשניים (חֶלב/נבלה/**שליל**+בשר בחלב)\nושליל הוא עובר הנמצא בבטן אמו (ומדובר בכגון שהיא מתה והוציאוהו מבטנה)", "ref": {"label": "חולין · פרק כל הבשר · קיג", "ref": "Chullin.113b"}}, {"layer": "gemara", "src": "ובדף קיד", "srcRef": null, "txt": "המבשל עצמות, גידים, קרנים או טלפיים בחלב – פטור", "ref": {"label": "חולין · פרק כל הבשר · קיד", "ref": "Chullin.114a"}}, {"layer": "shulchan", "src": "והשו\"ע", "srcRef": null, "txt": "כתב לפיכך, שהמבשל או האוכל שליל בחלב - חייב.\nאבל, המבשל או האוכל שליא/**עור**/גידים/עצמות/קרניים/טלפיים - פטור {**ש\"ך**: אבל אסור מדרבנן}\n(הרמב\"ם הוסיף עור כי סבר שהוא שווה לגידים, ונקט לפיו השו\"ע)"}], "pesak": null}, "chalav_shkedim": {"title": "חלב שקדים", "seif": "סעיף ג׳ (רמ\"א)", "sugya": null, "intro": "הבסיס לדיון כאן נמצא בעיקרו ב**סימן ס\"ו, סעיף ט'**.", "ops": [{"layer": "shulchan", "src": "השו\"ע (סימן ס\"ו)", "srcRef": null, "txt": "שם, פסק **השו\"ע** עפ\"י **רב** ב**כריתות** ש\\ul{דם דגים אסור משום מראית העין} (ושמא יבוא להחליף בדם בהמה חיה ועוף). לכן, אם ניכר שהוא של דגים - מותר (כגון אם יש בו קשקשים)\n   ~~[רמב\"ם שם פוסק בניגוד לרב שמותר דם דגים אפילו בכלי שכנסו. והרב המגיד תירץ שהוא סבר שבפשט המשנה מדובר על כגון שיש בו קשקשים. ורב מדבר בכגון שאין בו קשקשים]~~"}, {"layer": "rishon", "src": "מהרש\"ל (דרכ\"מ)", "srcRef": null, "txt": "למד מכאן לאסור אכילת בשר עוף בחלב שקדים משום מראית העין. (שמא הרואה יסבור שמותר לאכול אף עוף עם חלב בהמה/דלמא אתי לאחלופי עם חלב בהמה)"}, {"layer": "acharon", "src": "דרכ\"מ", "srcRef": null, "txt": "חולק על זה, וסובר שרק בדם שייך לאסור כן, משום שהוא אסור מדאורייתא. אבל עוף בחלב הוא מדרבנן; אז וודאי שאין לאסור כן משום מראית העין.", "under": true}, {"layer": "rama", "src": "וברמ\"א (אצלנו)", "srcRef": null, "txt": "כתב כן, שמותר אכילת עוף בחלב שקדים דהוא רק דרבנן.\nאבל בשר בהמה, שהוא מן התורה – אסור, אלא אם שם בו חתיכות שקדים (שאז ניכר שהוא חלב שקדים)"}, {"layer": "acharon", "src": "האורחות חיים והש\"ך", "srcRef": null, "txt": "סברו עפ\"י המהרש\"ל לאסור גם בעוף (אם אין חתיכות שקדים), והוכיחו שמצינו בכמה מקומות שגם בדרבנן שייך מראית העין.", "under": true}, {"layer": "acharon", "src": "והט\"ז", "srcRef": null, "txt": "סבר כמותם ש\\ul{לכתחילה} יש לשים שקדים בחלב שקדים אף באכילה עם עוף.\n\\ul{אבל בדיעבד} - אם אין לו שקדים - מותר לאכול.", "under": true}, {"layer": "acharon", "src": "והפר\"ח", "srcRef": null, "txt": "צידד ברמ\"א להקל במראית העין במקרי דרבנן", "under": true}, {"layer": "acharon", "src": "גם בפלתי", "srcRef": null, "txt": "סבר שאין לאסור בחלב שקדים כאן משום מראית העין, כי הוא לא חלב ממש, רק קוראים לו חלב (וכי נאסור בישול יין מפני שצבעו כדם?)", "under": true}], "pesak": null}, "chalav_isha": {"title": "חלב אישה", "seif": "סעיף ד׳", "sugya": null, "intro": "גם לגבי חלב דדי אישה, נעשה דיון אם יש חשש משום מראית עין של בישול בחלב.", "ops": [{"layer": "rishon", "src": "הרשב\"א", "srcRef": null, "txt": "כתב בשו\"ת שאסור לבשל בשר בחלב אשה מפני מראית העין, ואם נופל לתוך התבשיל בטל גם בלא שיעור."}, {"layer": "shulchan", "src": "והשו\"ע", "srcRef": null, "txt": "פוסק עפ\"י **הרשב\"א** לאסור משום מראית העין, אך אם נופל לתבשיל - בטל, גם בלא שיעור."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "סובר כדעתו לגבי חלב שקדים, שאין לאסור בבשר חיה ועוף משום שהוא דרבנן, ולא שייך בכך מראית העין.\nאך בבשר בהמה אכן אסור משום מראית העין,\nולגבי בשר בהמה בחלב טמאה, למרות שאסור בדרבנן - אסור לבשל לכתחילה"}, {"layer": "acharon", "src": "והש\"ך", "srcRef": null, "txt": "סבר שאין לחשוש גבי בשר/חלב טמאה, דניכר שהוא טמא ואין חשש מראית העין.", "under": true}, {"layer": "acharon", "src": "וכן סבר הט\"ז", "srcRef": null, "txt": "אך כתב שאין בידו להקל במה שהחמיר הרמ\"א", "under": true}, {"layer": "acharon", "src": "שניהם (ומהרש\"ל)", "srcRef": null, "txt": "בנוסף, כתבו **שניהם** שנפק\"מ לעניין רפואה, דלא חיישינן למראית העין ברפואה. וכן **המרהש\"ל**"}], "pesak": null}, "mei_chalav": {"title": "מי חלב ונסיובי דחלבא", "seif": "סעיפים ו׳, ח׳", "sugya": null, "intro": "האם מי חלב נחשבים כחלב ממש? בגמרא מובאות ברייתא ומשנה שנראות כסותרות בשאלה הזו, וריש לקיש נוקט שלעניין בישול בשר בחלב – מי חלב לא נחשבים חלב.", "ops": [{"layer": "gemara", "src": "גמרא חולין קיד", "srcRef": null, "txt": "**ברייתא**: המבשל בשר במי חלב פטור (ואינו חשיב כמבשל בחלב רגיל)\n**תנן**: מי חלב הרי הן כחלב.\n**ריש לקיש**: זה לעניין הכשרת קבלת טומאה (שהרי חלב הוא אחד מ-ז' משקים המכשירים לקבל טומאה. אז לעניין זה מי חלב חשיב כחלב). אבל לעניין בישול בשר בחלב מי חלב אינו כחלב.", "ref": {"label": "חולין · פרק כל הבשר · קיד", "ref": "Chullin.114a"}}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "המבשל במי חלב פטור, \\ul{איסורא מיהא איכא}. והראיה לכך היא שאסור לאכול בשר בכותח, וכותח הרי עשוי ממי חלב."}, {"layer": "rishon", "src": "והרמב\"ם", "srcRef": null, "txt": "המבשל בשר במי חלב פטור (אבל אסור)"}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "נסיובי דחלבא \\ul{אסור מדאורייתא.}\nומה שאסור מדרבנן, הוא כשהוציאו ממנו כל האוכל (הגבינה שהייתה בו)", "under": true}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "המבשל במי חלב פטור (תוספות). והביא גם דעת הרא\"ש"}, {"layer": "shulchan", "src": "השו\"ע", "srcRef": null, "txt": "**בסע' ו'**, נקט שהמבשל במי חלב פטור (כרמב\"ם והתוספות).\nו**בסע' ח'**, הביא בי\"א את דעת הרא\"ש, שנסיובי דחלבא (חלב היוצא מן הגבינה), אסור מהתורה. ורק המים המופרדים לגמרי מן הגבינה אסורים מדרבנן (הם ממש שקופים כמו מים, לעומת הנסיובי דחלבא שהוא עוד לבן במידה מה)"}, {"layer": "acharon", "src": "ובסימן פ\"א / הש\"ך", "srcRef": null, "txt": "ובסימן פ\"א, לעניין כשרות חלב בהמה, נראה שהקיש השו\"ע חלב בהמה טהורה למי החלב שלה, ודין שניהם שמותרים לאכילה.\nו**הש\"ך** הקשה על זה, שבסימן שלנו לשו\"ע יש פער בין חלב (שאסור בבישול בבשר מן התורה לבין מי חלב (שרק מדרבנן).\nותירץ שרק לעניין בשר בחלב מי חלב לא חשיב חלב. אבל לעניין אבר מן החי וכו' - נחשב.", "under": true, "collapsed": true}, {"layer": "rama", "src": "והרמ\"א (סע' ו')", "srcRef": null, "txt": "כתב לגבי שאר סוג החלב שפטור בהם בבישול, שאם נפלו לתוך קדרה – אינם אוסרים.\nאבל \\ul{מי חלב - אוסרים אם נופלים}, \\ul{כחלב ממש}."}, {"layer": "acharon", "src": "והש\"ך שם", "srcRef": null, "txt": "הביא בשם האו\"ה דלפי הרמ\"א, גם נסיובי דחלבא אוסרים, ואין דינם שונה בזה.", "under": true}], "pesak": null}, "chalav_meta_zachar": {"title": "חלב מתה וחלב זכר", "seif": "סעיף ו׳", "sugya": null, "ops": [{"layer": "gemara", "src": "בסוגיה בחולין", "srcRef": null, "txt": "בחלב אמו, ולא בחלב זכר\nבחלב אמו, ולא בחלב שחוטה", "ref": {"label": "חולין · פרק כל הבשר", "ref": ""}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "המבשל בחלב מתה או חלב זכר פטור (ואסור מדרבנן)"}, {"layer": "rishon", "src": "וכן בטור", "srcRef": null, "txt": "וכן ב**טור**"}, {"layer": "shulchan", "src": "וכן בשו\"ע", "srcRef": null, "txt": "וכן ב**שו\"ע**"}, {"layer": "acharon", "src": "ובש\"ך (ופרישה)", "srcRef": null, "txt": "הסביר (וכן בפרישה על הטור), שחלב מתה הוא החלב שיוצא *אחר* מיתתה. ואין הבדל בין אם מתה מעצמה בין אם נשחטה."}, {"layer": "rama", "src": "ולדעת הרמ\"א", "srcRef": null, "txt": "חלב זכר לא מקרי חלב כלל, ולכן אם נופל לקדירת בשר אינו אוסר\nאבל חלב מתה – אוסר.\nו**הש\"ך** סבר להדגיש, דהרמ\"א לא חולק בזה על השו\"ע, ואין הוא מתיר חלב זכר לכחילה; אלא אסור דרב'\nוהרמ\"א וודאי מדבר בחלב זכר *אדם* (ולכן גם הפער בין חלב זכר לחלב מתה)."}], "pesak": null}, "chumrot_rama": {"title": "חומרות הרמ\"א", "seif": "סעיף ו׳", "sugya": null, "ops": [{"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "+אסור לחתות אש שמתחת לקדרת גוי, כי יש סיכוי שיש שם בישול של בשר בחלב, ואז עלול לבשל בשר בחלב (אולי הכוונה שעלול גם מכאן להגיע ללהגיס בקדירה ממש)\n+מים ששטפו בהם כלי בשר, אסור לערבב אותם עם מי ששטפו בהם כלי חלב ולתת לפני בהמה (איסור הנאה)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מעמיד את זה במים רותחים דווקא, שרק אז הווי דרך בישול", "under": true}, {"layer": "note", "src": "הערה", "srcRef": null, "txt": "[ועוד כמה חומרות בשם המהריל ומהרי\"ו]", "collapsed": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "ובדיעבד אין לחוש בכל זה. ואף לכתחלה אין בזה אלא חומרות בעלמא, והמיקל לא הפסיד."}], "pesak": null}, "kiva_sugya": {"title": "פתיחה והסוגיה", "seif": "סעיפים ט׳-יא׳", "sugya": null, "intro": "בסעיפים אלו נעסוק בשלושה גורמים שונים בקיבת הבהמה (שאינם נפרדים זה מזה):\nחלב הקיבה **-** החלב שהבהמה יונקת\nמיצי הקיבה **-** מופרשים בקיבת הבהמה כדי לסייע לעיכול החלב. מיצים אלו יכולים לשמש להעמדת גבינות.\nעור הקיבה **-** הקיבה עצמה (ולא התוכן שבה). אם הבהמה עצמה נבלה (לא נשחטה כהלכה), עור זה אסור.", "ops": [{"layer": "lead", "srcRef": null, "txt": "בתוך קיבתה של הבהמה יש חלב שינקה, שהרי שם הוא מתעכל. הדיון על חלב הקיבה (**סע' ט'**) הוא בשאלה האם חלב זה נחשב חלב, או לא? כלומר, האם מותר לבשלו עם בשר, או לא?"}, {"layer": "lead", "srcRef": null, "txt": "מיצי הקיבה המופרשים בקיבה כדי לסייע לעיכול מכילים אינזימים. לכן, השתמשו במיצים אלו כדי להעמיד חלב ולהופכו לגבינה מוצקת (לאו דווקא בחלב הקיבה).\nמאחר והמיצים מעורבבים עם שאר תכולת הקיבה, אזי בחלב הקיבה גם יש מיצים. יוצא שכאשר רוצים לקחת מיצי קיבה כדי להעמיד החלב לגבינה, לוקחים את חלב הקיבה. לפיכך, הדיון הקודם – האם חלב קיבה נחשב חלב – משליך הלאה, שכן, בעבורנו מיצים = חלב קיבה. אבל החלב שוהה בתוך הקיבה, שהיא בשר! האם אין החלב הזה נעשה אסור מכך שהוא שוהה בקיבה? ומה אם עובר זמן כבישה (שהרי כבוש כמבושל)?"}, {"layer": "lead", "srcRef": null, "txt": "לכן, הדיון שנעשה בהקשר זה (**ס' י'**) הוא בשאלה: מותר לקחת את חלב הקיבה ולהשתמש בו כמעמיד לגבינה. אך האם זה נכון גם לאחר ששהה כדי כבישה, או שמלחו את הקיבה (כאשר חלב הקיבה בה)?"}, {"layer": "lead", "srcRef": null, "txt": "מרכיב נוסף בתהליך הכנת הגבינה בקיבה הוא הקיבה עצמה, המכונה 'עור הקיבה'. כדי לגבן את החלב, ניתן לקחת את חלב הקיבה מן הקיבה, ולערבב אותו עם החלב שרוצים לגבן. אך דרך נוספת שנהגו פעם (וגם כיום, בחלק מהמדינות ובעבור סוגי גבינות מסוימים) היא להניח את החלב בתוך קיבת הבהמה ולגבנו בה.\nאם בסעיף י' העובדה שחלב הקיבה שהה/נמלח בקיבה (בשר) הביאה אותנו לדון בכשרותו של חלב הקיבה, עתה **(סע' יא')** שאלה דומה עולה לגבי חלב שאין ספק כי הוא חלב: האם זה סבבה לשים חלב בתוך קיבה? האם נחשב בב\"ח?"}, {"layer": "lead", "srcRef": null, "txt": "להלכה, נפסק כי לכתחילה אין לשים חלב בתוך הקיבה (לענ\"ד, ככה\"נ, שמא יקבל טעם חלב). אך בדיעבד, אם העמידו חלב בקיבת בהמה כשרה, אם אין בגבינה טעם של בשר הקיבה – הגבינה מותרת.\nנוסף על כל זאת, קובע הרמ\"א: אם עור הקיבה נמלח ויובש והוא יבש כעץ – מותר להשתמש בו **(רמ\"א י')**."}, {"subhead": "הסוגיה", "ref": {"label": "חולין · קטז · כל הבשר", "ref": "Chullin.116a"}}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "(קבה = התוך, חלב הקיבה)\nקבת בהמת עכו\"ם וקבת נבלה - אסורה\nאם שמו חלב (כדי להכין גבינה) בעור הקיבה של בהמה כשרה – אסור אם יש בעור בנותן טעם.\nכשרה שינקה מן הטרפה - קבתה אסורה,\nטרפה שינקה מן הכשרה - קבתה מותרת, מפני שכנוס במעיה.", "ref": {"label": "חולין · פרק כל הבשר · קטז", "ref": "Chullin.116a"}}, {"layer": "gemara", "src": "גמרא · שמואל", "srcRef": null, "txt": "שמואל תני: חלב שחיטת עכו\"ם היא נבלה\nוהאמר שמואל: גבינת עכו\"ם אסורה רק משום שמעמידים אותה בקיבה. אבל החלב עצמו שבפנים - מותר\nכאן קודם חזרה כאן לאחר חזרה\n[טעמי רבי יהושע מפני מה אסור גבינות עכום\n**תחילה** (קודם חזרה) – כי העכום מערבבים את זה עם חלב קיבה של נבלה\n**לאחר מכן** (לאחר חזרה) – כי העכום מניחים את זה בקיבה של בהמת עבודה זרה]", "ref": {"label": "חולין · פרק כל הבשר · קטז", "ref": "Chullin.116a"}}, {"layer": "gemara", "src": "הלכתא", "srcRef": null, "txt": "אין מעמידין בעור קבת נבלה\nאבל מעמידין ע\"י קבת נבלה וע\"י קבת שחיטת עובד כוכבים"}], "pesak": null}, "chalav_hakiva": {"title": "חלב הקיבה", "seif": "סעיף ט׳", "sugya": null, "intro": "הדיון כאן הוא האם החלב הנמצא בקיבה נחשב חלב לעניין בישול בשר בחלב, או שלא. במשנה עולה סתירה בדין חלב קיבה של בהמה טרפה שינקה מבהמה כשרה. שכן, ברישא נקבע כי חלב קיבה של בהמה אסורה אסור גם הוא, אך בסיפא נשנה כי דין חלב קיבה כדין הבהמה שממנה נינוק החלב.\nסתירה זו מביאה את הראשונים לעסוק בעצם דינו של חלב הקיבה ולהכריע האם הוא חלב ממש (**רש\"י**; ואז הסתירה במשנה עדיין עומדת), או שהוא פרשא בעלמא (**רי\"ף ורמב\"ם**; ואז הסתירה לא ממש רלוונטית). שיטה ממצעת היא זו של **ר\"ת**, המחלק בדין החלב על בסיס מראהו ומבנהו: צלול – חלב, קרוש – פרשא בעלמא.", "ops": [{"layer": "mishna", "src": "משנה חולין קטז (כל הבשר)", "srcRef": null, "txt": "בהמה אסורה – חלב קבה שלה אסור. דין חלב קבה כדין המניקה ולא היונקת.\nקבת בהמת עכו\"ם וקבת נבלה - אסורה\nבהמה כשרה שינקה חלב מבהמה טרפה – קיבתה אסורה (שהרי החלב שינקה אסור)\nבהמה טרפה שינקה חלב מבהמה כשרה – קיבתה מותרת (שהרי החלב שינקה מותר)", "ref": {"label": "חולין · פרק כל הבשר · קטז", "ref": "Chullin.116a"}}, {"layer": "gemara", "src": "בגמרא", "srcRef": null, "txt": "מקשים: בסיפא של המשנה – קבת טרפה שינקה מכשרה – כשרה (כדין החלב שינקה)\n אבל ברישא – קבת בהמה אסורה – אסרה!\n(כלומר, יש התנגשות: האם כשטרפה יונקת מכשרה, דין הקבה (החלב הבלוע) כדין הבהמה המניקה או היונקת)", "ref": {"label": "חולין · פרק כל הבשר · קטז", "ref": "Chullin.116a"}}, {"layer": "rishon", "src": "רי\"ף, רמב\"ם", "srcRef": null, "txt": "חלב קבה תמיד מותר, כי הוא פרשא בעלמא\n(גם חלב קבה של כשרה שינקה מטרפה וגם של טרפה שינקה מכשרה – כשר. פרשא בעלמא = אינו אוכל)"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "חלב קבה הוא חלב ~~(לא הכריע בסתירת המשנה)~~"}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "מחלק: חלב צלול – נחשב חלב\nחלב קרוש – נחשב רק פירשא בעלמא"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "חלב קיבה אינו חלב, ומותר לבשלו עם חלב. גם את הצלול (**רי\"ף, רמב\"ם**)\nויש מי שאוסר (**ר\"ת**/**רש\"י**) → **ט\"ז**: הכוונה לר\"ת, ולא לרש\"י"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "נוהגין כ**ר\"ת**"}, {"layer": "acharon", "src": "ש\"ך, מהרש\"ל", "srcRef": null, "txt": "מחמירים כרש\"י (אף בקרוש) (לשון רש\"ל: \"כי מי יודע מה שיעור הקרישה\")", "under": true}], "pesak": null}, "chalav_kiva_melicha": {"title": "דין חלב הקיבה לאחר יום/מליחה", "seif": "סעיף י׳", "sugya": null, "intro": "כאמור, כדי להעמיד מחלב גבינה, היו משתמשים בחלב הקיבה, משום שיש בו מיצי קיבה. אולם, מאחר וחלב הקיבה נמצא בקיבה – שהיא בשר – עולה החשש שהוא נאסר משום בשר בחלב; שכן, שהייתו בקיבה היא ככבישה. בנוסף, בדומה לשאר חלקי בשר, גם את הקיבה היו מולחים. לפיכך, נשאל גם מה דין חלב הקיבה לאחר שמלחו את הקיבה? שהרי מליח כרותח (ואז שוב יש חשש של בשר בחלב).", "ops": [{"layer": "note", "src": "סיכום השיטות", "srcRef": null, "txt": "**לרש\"י**: החלב נאסר (בב\"ח), ואסור להעמיד על ידו\n**לרי\"ף ורמב\"ם** –\n   **ר\"ש**: מותר (לא חשיב חלב + נ\"ט בר נ\"ט)\n   **ריו\"ח**: אסור (לא הווי נ\"ט בר נ\"ט)\n**לר\"ת**: צלול – נאסר ואסור להעמיד על ידו\n   קרוש – חלב הקיבה עצמו מותר. להעמיד בו – שייכת מחלוקת ר\"ש-ריו\"ח"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "חלב הקיבה הוא חלב ממש (שיטתו לעיל). לכן:\nחלב קיבה שהיה בקיבה בזמן שמלחו אותה – נאסר (משום בב\"ח, דמליח כרותח), ואסור להעמיד בו גבינה\n(ועניין השהייה של המיצים בקיבה יותר מיום אחד הוא בסימן ק\"ה)"}, {"layer": "rishon", "src": "רי\"ף, רמב\"ם", "srcRef": null, "txt": "מחלוקת בשיטתם (עפ\"י מה שפסקו שחלב קיבה לא נחשב חלב) –\n   **ר\"ש**: חלב הקיבה מותר, ומותר להעמיד בו (נ\"ט בר נ\"ט ואפילו חלש מכך, כי הוא רק פרשא, והטעם חלש יותר)\n   **ריו\"ח**: חלב הקיבה נאסר ואין להעמיד בו גבינה גם לרי\"ף והרמב\"ם.\n   (כי למרות שחלב קיבה אינו חלב, ע\"י מליחה/כבישה מקבל החלב קיבה טעם בשר מהקיבה, והרי מערבבים אותו עם החלב שרוצים לגבן (והווי בב\"ח))\n   **ר\"ת**: צלול – אסור כרש\"י\n   קרוש – עפ\"י המחלוקת כאן"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "\\ul{לכתחילה} יש לחוש לסברת ריו\"ח ברי\"ף ורמב\"ם, ו\\ul{בדיעבד} אפשר להקל כר\"ש (אם כבר העמידו)", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.87.10", "txt": "חלב הקיבה שנמלח בקיבה, או שעמד בו יום אחד - אסור להעמיד בעזרתו גבינה (**רש\"י, וריו\"ח בר\"ר**)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "בדיעבד יתיר (כדכתב בב\"י)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם שם את החלב קיבה בחלב כדי להעמיד -\nאם החלב קיבה צלול – אוסר\nאם החלב קיבה קרוש – מותר (כשיטתו: ר\"ת: בחמוץ אסור,\n   ~~ובקרוש כר\"ש דמותר, או: כב\"י דמותר רק בדיעבד)~~"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מותר להעמיד ע\"י חלב קיבה בשרי כנ\"ל (נמלח/שהה) כך שיתבטלו ב60 בחלב שמעמיד, ולא חשיב ביטול איסור לכתחילה (לא מתכוון לבטל האיסור, אלא להעמיד הגבינה)\n~~(נ\"ל שזה רק לר\"ר, שלדידם הווי החלב קיבה בשרי. אבל לרש\"י הוא כבר נעשה טריפה. ואז להעמיד על ידו אסור אפילו שבטל ב60 (=שאין טעם), כדמפרש הרשב\"א בריש הסע' הבא)~~", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מ\"מ יש להתיר כאן בדיעבד אם חלב הקיבה שהעמיד לא נמלח, אלא שרק עבר יום ששהה בקיבה. כי בכל מקרה לש\"ע ר\"ר ועוד גם צלול נחשב כפרשא בעלמא. בנוסף, כל האיסור מן התורה הוא בבישול, ולא במליחה", "under": true}], "pesak": null}, "haamada_bakiva": {"title": "העמדת החלב בקיבה עצמה", "seif": "סעיף יא׳", "sugya": null, "intro": "[שייך בגבינות קשות] בסעיף זה, לאור הדיונים שקיימנו עד כה לגבי חלב קיבה, מתברר האם מותר לשים את החלב שרוצים לגבן בתוך הקיבה, ולבצע בה את תהליך הגיבון. ההנחה היא שהקיבה אינה יבשה כעץ (כמו שמזכיר הרמ\"א בסעיף י').\nבמהרה נקבע כי \\ul{בכל מקרה, לכתחילה אסור לגבן החלב בתוך הקיבה עצמה}. ועיקר הדיון מוסב לשאלת הבדיעבד: אם כבר גובן.", "ops": [{"layer": "lead", "srcRef": null, "txt": "דיון זה מעלה בראשונים (**רשב\"א, ר\"ן, רמב\"ם**) דיוק מעניין ומשמעותי להלכה בהבדל בין בב\"ח לשאר איסורים:\nבשר וחלב מותרים כל אחד כשלעצמו, ורק כאשר האחד נותן טעם בשני הם אסורים. לפיכך, על אף שלכתחילה אסור להעמיד חלב לכדי גבינה בתוך עור הקיבה, אם עשו כן בקיבת בהמה כשרה, הגבינה תהיה מותרת כל עוד אין בגבינה טעם בשר מן הקיבה.\nטרפה, לעומת זאת, אסורה כשלעצמה. אם גיבנו בעור קיבת בהמה אסורה, גם אם לא יהיה בגבינה טעם מבשר הקיבה, הרי שחלב הקיבה הטרפה הוא שהעמיד את החלב שלנו לכדי גבינה. כלומר, השפעתו ניכרת ומשמעותית גם בלי קשר לטעם הבשר."}, {"layer": "mishna", "src": "משנה קטז כל הבשר", "srcRef": null, "txt": "**הנחת יסוד**: בכל מקרה לכתחילה אסור להעמיד חלב ולגבנו בתוך קיבת בהמה\nהמעמיד גבינה בקיבה בכשרה – אסורה בנ\"ט (בשר הקיבה בגבינה)\nהמעמיד חלב בתוך קיבת בהמה כשרה - אם עור הקיבה נתן טעם בחלב המועמד – הגבינה אסורה", "ref": {"label": "חולין · פרק כל הבשר · קטז", "ref": "Chullin.116a"}}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "פשוט שבנ\"ט. זה כל יסוד תערובות ובב\"ח! אלא שקמ\"ל הבדל בין העמדה בקיבת כשרה לבין קיבת נבלה:\nהמעמיד גבינה בקיבת כשרה – בנותן טעם (בשר הקיבה בחלב)\n~~(כי בשר וחלב מותרים כ\"א לבדו. ורק ע\"י טעם אוסרים זא\"ז)~~\nהמעמיד גבינה בקיבת נבלה – אסור גם אם אין הקיבה נ\"ט בחלב\n~~(כי בכל זאת, המעמיד הוא חלב קיבה נבלה, ובגלל שכך יש לו חשיבות משמעותית בקיום הגבינה ללא קשר לטעם)~~"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "(בדומה לרשב\"א): אסור להעמיד גבינה בעור קיבה של בהמה (גם כשרה וגם אסורה)\nהעמיד בעור קיבת כשרה - טועם את הגבינה: יש בה טעם בשר - אסורה; אין בה טעם - מותרת\n~~מפני שהמעמיד דבר מותר הוא, שקיבת שחוטה היא, ואין כאן אלא איסור בשר בחלב ששעורו בנותן טעם.~~\nהעמיד בעור קיבת אסורה – הגבינה אסורה ~~(משום נבלה, ולא משום בב\"ח)~~"}, {"layer": "rishon", "src": "רבינו ירוחם", "srcRef": null, "txt": "גם בהעמיד בקיבת כשרה אסור אף בדיעבד", "under": true}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "גם בנבלה גם בכשרה: אם אין טעם – הגבינה מותרת", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.87.11", "txt": "פוסק רמב\"ם"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "השו\"ע כדרכו (סי' צ\"ח) יתיר לבדוק הטעם ע\"י גוי. אבל האידנא אנו לא סומכים על טעימת גוי, לכן, משערינן ב60 (עור הקיבה ביחס לחלב המועמד).", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "+מנמק הגיון הדין (כדברי **הרשב\"א בב\"י**)\n+סובר כשיטתו שהטעם שבטל רק ב60 (כשיטתו בסימן צח, דלא סומכין אטעימת גוי)"}, {"layer": "acharon", "src": "מהרש\"ל", "srcRef": null, "txt": "פסק כדעת ר\"ת", "under": true}, {"subsubhead": "'זה וזה גורם': מעמיד אסור + מעמיד מותר"}, {"layer": "rishon", "src": "רבנו ברוך", "srcRef": null, "txt": "אם העמיד גבינה ע\"י איסור כנ\"ל, אך גם ע\"י היתר – הווי 'זה וזה גורם' והגבינה מותרת"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "העמיד גבינה בקיבה של נבלה – אם יש שם גם מעמיד שהוא היתר, הגבינה מותרת (כמובן שצריך שהאסור יתבטל ב-60)\n   ~~ט\"ז: משמע ברמ\"א שאפילו אם האיסור יכל להעמיד לבד – מותר~~\n**לדידו** - רק אם האיסור לא היה יכול להעמיד לבד, אלא שההיתר עזר (משמעות 'זה וזה גורם')"}, {"subsubhead": "מקרי מעמיד בימינו"}, {"layer": "zman", "src": "חומר משמר", "srcRef": null, "txt": "**מנחת יצחק** סובר שחומר משמר אינו נחשב 'מעמיד', ואינו אוסר תערובות או מאכלים שמשתמשים בו עליהם. אבל בכל מקרה אסור להשתמש בו לכתחילה משום 'איסור ביטול איסור לכתחילה'"}, {"layer": "zman", "src": "ג'לטין", "srcRef": null, "txt": "דיון רלוונטי מאוד כיום שעולה מן הסעיפים האחרונים הוא לגבי ג'לטין. ישנם מספר שות\"ים על כך, ניתן גם להסתכל בתמצות של צוהר וכד'"}], "pesak": null}, "or_kiva_yavesh": {"title": "עור קיבה שיובש", "seif": "סעיף י׳ (רמ\"א)", "sugya": null, "ops": [{"layer": "rishon", "src": "שבלי לקט", "srcRef": null, "txt": "אם מולחים ומייבשים – הוי כעץ בעלמא ולא נחשב בשר, ומותר למלאו בחלב (הביאו ב**ב\"י**)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פוסק כן"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "וכן לגבי שאר 'בני מעיים', שאם מייבשים אותם נחשבים כעץ בעלמא\nאך מסתייג ואומר ש\\ul{אין לעשות כן לכתחילה}", "under": true}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "הביא בשם ר' עקיבא איגר, שאם 'בטל בשישים' - הש\"ך יתיר אפילו לכתחילה", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "mavo"}, {"type": "sec", "id": "bishul_hanaa"}, {"type": "sec", "id": "hagdarat_bishul"}, {"type": "group", "title": "הגדרת הבשר (א-ג, ה, ז)", "spans": "סעיפים א׳-ג׳, ה׳, ז׳", "children": ["basar_skira", "chaya_of", "tehora_temea", "dagim", "beitzim", "shalil"]}, {"type": "group", "title": "הגדרת החלב (ג-ד, ו, ח)", "spans": "סעיפים ג׳-ד׳, ו׳, ח׳", "children": ["chalav_shkedim", "chalav_isha", "mei_chalav", "chalav_meta_zachar", "chumrot_rama"]}, {"type": "group", "title": "חלב, מיצי ועור הקיבה (ט'-יא')", "spans": "סעיפים ט׳-יא׳", "children": ["kiva_sugya", "chalav_hakiva", "chalav_kiva_melicha", "haamada_bakiva", "or_kiva_yavesh"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"טעם כעיקר": "הכלל שטעם הבלוע בהיתר נחשב כאיסור עצמו; בבשר בחלב יש דין מיוחד – בלא בישול ממש אין איסור תורה אף כשמקבל טעם.", "כבוש": "מאכל ששהה בנוזל מעת לעת (24 שעות) – דינו כמבושל.", "נסיובי דחלבא": "המים הצלולים הנפרדים מן הגבינה; נחלקו אם דינם כחלב או קלים ממנו.", "מי חלב": "הנוזל שנותר לאחר הפרדת הגבינה; לריש לקיש אינו כחלב לעניין בישול בשר בחלב.", "שליל": "עובר הנמצא בבטן אמו (כשהיא מתה והוציאוהו) – הבישולו בחלב חייב.", "חלב הקיבה": "החלב שינקה הבהמה ושוהה בקיבתה; נחלקו אם הוא חלב ממש (רש\"י) או פרשא בעלמא (רי\"ף ורמב\"ם).", "מעמיד": "חומר (חלב קיבה / אנזים) שמגבן את החלב לגבינה; יש לו חשיבות מיוחדת אף כשבטל בטעם.", "זה וזה גורם": "כשגם גורם אסור וגם גורם מותר פעלו יחד להעמיד – הגבינה מותרת.", "מראית העין": "איסור מעשה שנראה כאסור מבחוץ, שמא יחשדוהו או יבוא להתיר את האסור עצמו.", "פרשא בעלמא": "פסולת/הפרשה שאינה נחשבת 'אוכל' או 'חלב'.", "חֶלב": "השומן האסור באכילה (בסגול) – להבדיל מ'חָלָב'."}, "subject": "איסור והיתר", "recommendedOrder": 1, "id": "basar-bchalav"}, {"topic": {"title": "בשר וחלב שנתערבו", "eyebrow": "מבחני הרבנות · איסור והיתר · סימן צ\"א", "siman": "Shulchan_Arukh,_Yoreh_De'ah.91", "intro": {"lead": {"t": "", "ref": ""}, "body": "בסימן צ\"ח ראינו כי עיקר עניין תערובות הוא בנתינת טעם, שהרי 'טעם כעיקר'. אלא שהדיון שם נעשה בעיקר בהדגמה על מקרי איסור והיתר. בסימן זה, נבחן מקרים של מפגש ישיר בין בשר וחלב, ונבדוק את יסודות נתינת טעם מבחינה מציאותית: מתי גורם נותן טעם בגורם אחר? ובאיזה אופן?\n\nההיבטים אליהם נתייחס מבחינת הגורמים (מעתה נחליף גורמים ב'בשר' ו'חלב'):\n● רותח או צונן (לבשר בנפרד ולחלב בנפרד)\n●מליח או תפל (כי 'מליח כרותח')\n● לח או יבש\n● מיקום: למעלה, למטה, או זה לצד זה (כמובן שאם אחד מהגורמים מעל, השני מתחת)\n● שמנה (חתיכה שמנה בולעת יותר וגם מבליעה יותר, כי השומן מפעפע)\n\n**\\ul{נשים לב}**: לאורך הדיון בסע' א'-ב',ה' – בצונן בצונן, ובמליח – אנו לא עוסקים בבשר וחלב, אלא בבשר \\ul{וגבינה}. כלומר: הדיון בהנך סעיפים הוא במאכלים \\ul{מוצקים, ולא בנוזליים}. וכאשר מזכירים לח, הכוונה היא ב\\ul{מוצק שהוא לח}, ולא בנוזל.\n\nישנו גם דיון על חלב נוזלי, והוא מתרחש בסעיף ד'. שם, יש התייחסות גם לתערובת שאחד או שניים מן הגורמים הוא רותח, ולמיקום הגורמים. וגם שם יש התייחסות לצונן בצונן. והרי שאם חלב קר נשפך על בשר מוצק, יתקן רק הבשר, ועל ידי שידיחו, כמו שנלמד בסעיף א' (האם זה אומר שהחלב מותר בלא כלום?)\n\nהדיון בבשר וחלב במובנים מסוימים ראשוני יותר מדיון באיסור והיתר. שכן, מאחר ושניהם מותרים כשלעצמם, אנו יכולים לבחון היטב את השפעתו של כל גורם על רעהו בכל מצב (כאשר אין לנו את היכולת לבחון כיצד היתר משפיע על איסור, שהרי הוא גם ככה אסור)."}}, "sections": {"kitzur": {"title": "קיצור הלכה", "seif": null, "sugya": null, "flow": [{"head": "מוצק", "body": "\\col{7030A0}{**בדיעבד**}\n**צונן בצונן** – **כשאחד או שניים לח** - הדחה במקום נגיעה  (לא משנה תתאה/עלאה)\n        **כששניהם יבש** – כלום  (**ב\"ח**)\n        **אחד שמן** – הדחה+שפשוף  (**פמ\"ג**)\n\n\\col{2E74B5}{**לכתחילה**}\n**צונן בצונן** – **שו\"ע**: אסור, אא\"כ אורחיה להדיח\n        **ט\"ז**: שעת דחק - מותר\n        **רמ\"א**: יבש+כלי לא בלוע – מותר\n        **ט\"ז**: יבש (אפילו כלי בלוע) **או** כלי לא בלוע (אפילו לח)"}, {"head": "נוזלי", "body": "        **(ערוה\"ש**: כל הדיון דתתאה/עלאה – בשניהם באותה כמות)\n**צונן בצונן** – הדחה במקום נגיעה (את המוצק)  (לא משנה תתאה/עלאה)\n**\\col{2E74B5}{צונן} עליון ב\\col{F55A29}{רותח} תחתון** – חלב על בשר/בשר על חלב – אסור הכל  (**ערוה\"ש**: אא\"כ אין טעם)\n**\\col{F55A29}{רותח} עליון ב \\col{2E74B5}{צונן} תחתון** – חלב על בשר/בשר על חלב – הבשר כדי קליפה\n        החלב – **ר\"י**: מותר בלא כלום\n        **ריב\"א**: בעי 60 כנגד כמה שנגע"}], "ops": [], "pesak": null}, "bediavad": {"title": "בדיעבד", "seif": "סעיף א׳", "sugya": null, "intro": "(הדין הוא אם נגעו. לקמן בסע' ב' נראה דלכתחילה אין היתר לעשות כן, אלא בשעת דחק)", "ops": [{"layer": "gemara", "src": "חולין קז (כל הבשר)", "srcRef": null, "txt": "**משנה**:\nצורר אדם בשר וגבינה במטפחת אחת. \\ul{ובלבד שלא יגעו זה בזה}\n**גמרא**:\n**אביי**: צונן בצונן – צריך הדחה", "ref": {"label": "חולין · פרק כל הבשר · קז", "ref": "Chullin.107b"}}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.91.1", "txt": "בשר וגבינה שנגעו זה בזה מותרים בתנאי ש\\ul{מדיח מקום נגיעתם} (ומותר לצרור אותם יחד במטפחת, ואין חשש שייגעו) **(משנה, אביי)**"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "ודוקא כשאחד מהם לח. אבל אם שניהם יבשים – אין צורך אפילו בהדחה."}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "אם אחד שמן – צריך גם שפשוף וגם הדחה"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "כל הדין של צונן בצונן הוא גם באוכל שבכלי (ולא רק שני אוכלים) (משמע גם מהעיטור לקמן)"}], "pesak": null}, "lechatchila": {"title": "לכתחילה", "seif": "סעיף ב׳", "sugya": null, "ops": [{"layer": "rishon", "src": "העיטור", "srcRef": null, "txt": "כל דבר שיזדקק להדחה (בצונן. כגון עוף קר בכלי של איסור) - אסור לכתחילה להביאו למצב שצריך הדחה. שמא בטעות ישכח ויאכל בלי הדחה.\n\\ul{אבל} זה דווקא במה שלא נוהגים לשטוף. כמו בשר מבושל. אבל בשר חי – מאחר ובוודאי ישטוף אותו שוב, מותר."}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.91.2", "txt": "אסור לגרום לצורך בהדחה, שמא ישכח להדיח לפני שיאכל\n      אבל דברים שנוהגים להדיח לפני אכילה - מותר"}, {"layer": "acharon", "src": "ט\"ז בשם תורת חטאת", "srcRef": null, "txt": "שעת הדחק כדיעבד דמי ומותר (כגון אירוח אצל גוי)"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "בכלי - אפשר פשוט להדיח הכלי"}, {"subsubhead": "שיטת הרמ\"א"}, {"layer": "rishon", "src": "דרכ\"מ", "srcRef": null, "txt": "1) \\ul{ביבש} – מותר אף לכתחילה (לומד ממצה בכלי שהיה בו חמץ)\n2) כלי שבלע איסור בחמין – אסור להשתמש צונן\n      אבל כלי שמשתמשין בו לאיסור צונן – מותר להניח היתר צונן"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "דרש את שני התנאים: במאכל יבש+כלי שלא בלע – מותר לכתחילה"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אפילו אחד מן התנאים: מאכל יבש (אפילו בלוע איסור)\n      או: מאכל לח בכלי שלא בלע"}, {"layer": "rama", "src": "רמ\"א (בקכא)", "srcRef": null, "txt": "ההיתר לשימוש בצונן לכתחילה הוא \\ul{רק בדרך עראי} (אצל גוי וכד')"}], "pesak": null}, "noz_mutzak": {"title": "נוזלי ומוצק", "seif": "סעיף ד׳", "sugya": null, "ops": [{"layer": "lead", "srcRef": null, "txt": "צונן בצונן – הדחה (ואם אחד מהם נוזל – מדיח את מה שאינו)\nצונן ברותח:\nרותח תחתון – אסור\nרותח עליון – קליפה\nבדבר שא\"א לקלוף, מחלוקת: **ר\"י**- מותר בלא מעשה (**שו\"ע**)\n**ריב\"א** - צריך שיעור שישים בנוזל כנגד איזור הקליפה"}, {"layer": "gemara", "src": "בפסחים ע\"ו (פ' כיצד צולין)", "srcRef": null, "txt": "מחלוקת רב ושמואל\n**רב**: עלאה גבר\n**שמואל**: תתאה גבר\nומובאות ברייתות כוותיה דרב שמואל\nולכן, הפוסקים מסכימים שהלכה כמותו כאן (כ\"כ ב**ב\"י**)", "ref": {"label": "פסחים · פרק כיצד צולין · עו", "ref": "Pesachim.76a"}}, {"subhead": "רותח עלאה שנפל לצונן תתאה"}, {"layer": "lead", "srcRef": null, "txt": "ברותח עלאה שנפל לצונן תחתון, למרות שתתאה גבר, קליפה מיהא בעי.\nודין זה יפה נחמד לבשר. אבל מה עושים עם החלב, שהרי הוא נוזלי ולא ניתן לקולפו!"}, {"layer": "rishon", "src": "תוספות (ר\"י)", "srcRef": null, "txt": "בשר שנפל לחלב/להפך, בגלל שא\"א לקלוף החלב – מותר בלא מעשה.\n~~[בגלל שהברייתא שם מובאת פעמיים, ובפעם השנייה מובאת לשון 'בשר שנפל לחלב', מסבירים שזה מלמד לגבי המקרה של רותח שנפל לצונן (צריך קליפה) שמאחר ומדובר בחלב ואי אפשר לקלוף – מותר גם בלא קליפה.]~~"}, {"layer": "rishon", "src": "ריב\"א", "srcRef": null, "txt": "לא כן. צריך שיעור שישים כנגד איזור הקליפה", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "~~נראה כר\"י (כ\"כ **טור** ו**ב\"י**. כי הזכיר חלב, ולא כתב שצריך לעשות בו משו מיוחד)~~", "under": true}, {"layer": "acharon", "src": "תרומת הדשן", "srcRef": null, "txt": "~~מקרה של חלב רותח בסיר, שבעבע כ\"כ עד שעלה על גדותיו ונשפך חלב רותח על בשר – חשיב כעירוי מכלי ראשון, ונאסר הבשר כדי קליפה.~~"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "~~וודאי דיבר בבשר צונן, כי אם הבשר רותח וודאי שאסור. לכן הכוונה שאוסר רק כדי קליפה (רותח עליון)~~", "under": true}, {"subhead": "צונן עלאה שנפל לרותח תתאה"}, {"layer": "acharon", "src": "הב\"י", "srcRef": null, "txt": "על אף שגם הבשר וגם החלב אסורים, אם יש בחלב שישים כנגד הבשר – החלב מותר, ובשר אסור (ועיקר הדיון בסי' צ\"ב)"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.91.4", "txt": "+צונן שנפל לרותח – אסור, משום דתתאה גבר (**שמואל**)\n+רותח שנפל לצונן – קולף הבשר\n      והחלב מותר. כולו (**ר\"י**, ושלא כריב\"א)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "מצדד בריב\"א שצריך לבטל בשישים בהכי, וסובר שכן הרמ\"א", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם לא קלף הבשר ובישלוֹ – מותר (בדיעבד)"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.91.4", "txt": "+הבשר והחלב צוננים – מדיח הבשר ומותר (נ\"ל שאפילו שא\"א לשטוף את החלב, שרי; ק\"ו מקליפה)"}], "pesak": null}, "maliach": {"title": "נגיעת בשר בחלב מליח", "seif": "סעיפים ה׳-ו׳", "sugya": null, "ops": [{"layer": "gemara", "src": "חולין קיא (פ' כל הבשר)", "srcRef": null, "txt": "**שמואל**: קערה שמלח בה בשר – אסור לאכול בה רותח (בגלל הדם)\n**רבא**: רב חיננא שהתיר בר גוזלא שנפל לכד עם כותח (אעפי שהכותח מליח)\nמשום שסבר שמה שאמר שמואל 'מליח הרי הוא כרותח', זה היכא דאינו נאכל מחמת מלחו (=שהמליח עד שאינו ראוי לאכילה)\nאבל הכותח הנ\"ל נאכל מחמת מלחו", "ref": {"label": "חולין · פרק כל הבשר · קיא", "ref": "Chullin.111b"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "היתר שנבלל עם איסור – אם המליח הוא האיסור – נאסר ההיתר (אבל אם להיפך - לא)"}, {"subhead": "ר\"ן"}, {"layer": "rishon", "src": "רא\"ה", "srcRef": null, "txt": "ובהכי מועיל קליפה"}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "לא מועיל קליפה, רק נטילת כל המקום", "under": true}, {"subhead": "המליח מבליע"}, {"layer": "lead", "srcRef": null, "txt": "אם שניהם ממולחים – שניהם נאסרים (ואין זה מונע בליעה)\nאם הבשר הוא הממולח (ומבליע) והוא שמן – כל הגבינה נאסרת, ואין מועיל לה קליפה"}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "עפ\"י מימרת חיננא בדברי שמואל\nשניהם לחים (מחמת מליחתו) – שניהם ject": "איסור והיתר", "id": "tzonen"}, {"topic": {"title": "תשלומים", "eyebrow": "מבחני הרבנות · תפילה וברכות · סימן ק\"ח", "siman": "Shulchan_Arukh,_Orach_Chayim.108", "intro": {"lead": {"t": "", "ref": ""}, "body": "מי שטעה או נאנס ולא התפלל תפילה בזמנה — משלים אותה בתפילה הסמוכה (\"מתפלל בזו שאחריה שתים\"). הדין נלמד ממימרת ר' יוחנן בברכות, והוא דווקא בשוגג או אונס; במזיד — 'מעוות לא יוכל לתקון'."}}, "sections": {"yesod": {"title": "הדין ביסודו", "seif": "סעיפים א׳-ב׳", "sugya": null, "ops": [{"layer": "gemara", "src": "גמרא · ר' יוחנן", "srcRef": null, "txt": "**ר' יוחנן**: טעה ולא התפלל שחרית– מתפלל במנחה שתים\nטעה לא התפלל מנחה – מתפלל בערבית שתים\nטעה ולא התפלל ערבית – מתפלל בשחרית שתים\nואסיקנא \\ul{לפי ר' יוחנן: בשוגג - יש תפילת תשלומים. במזיד - לא.}\nביטויים: יש תשלומים ממנחה לערבית - לא אמרינן 'עבר יומו בטל קורבנו'. מזיד – \"מעוות לא יוכל לתקון\"", "ref": {"label": "ברכות · פרק תפילת השחר · כו ע\"א", "ref": "Berakhot.26a"}}, {"layer": "rishon", "src": "טור עפ\"י הסוגיה", "srcRef": null, "txt": "קודם תפילה של עכשיו, ואז תשלומים. (בסוגיה, גבי טעה במנחה של שבת – במוצש מבדיל. עשה הפוך – לא יצא בתשלומים. בראשונה. הבדיל בשנייה – רק השנייה עלתה לו)"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.1", "txt": "טעה/נאנס ופספס תפילה - מתפלל בזו שאחריה שתים: קודם זו של עכשיו, ואח\"כ תשלומין.\nאם לא עשה בסדר זה – בזו של עכשיו - יצא.\n   התשלומין – לא יצא. ישלים (גמרא)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "חולק על עניין הסדר: כל עוד אין הבדל בתפילות (דוגמת ערבית של מוצש) - הסדר לא משנה", "under": true}, {"layer": "acharon", "src": "פר\"ח, פמ\"ג ומשנ\"ב", "srcRef": null, "txt": "אין לנו אלא דברי המחבר", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם עשה בסדר הנכון, אבל טעה בתוכן של זו של עכשיו (=ראשונה) – יצא בשתיהן"}], "pesak": null}, "bein": {"title": "בין התפילות", "seif": null, "sugya": null, "intro": "לדרכ\"מ מחד, יש עניין בהפרדה בין התפילות, וזה טעמו לסמ\"ק שפוסק
