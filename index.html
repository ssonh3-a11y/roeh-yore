yer": "rishon", "src": "י\"א (מחמירים)", "srcRef": null, "txt": "לא יעזור לה להשלים ולהמשיך לבדוק ביומיים האלו, גם אם בדקה בכל התקופה כדין. משום שבגלל שדחו את הנישואין, חלק מהבדיקות שלה לא היו טובות. לכן צריכה מחדש ז' נקיים.", "under": true}, {"layer": "rishon", "src": "י\"א (מקילים)", "srcRef": null, "txt": "אם בדקה כל התקופה כדין – אין סיבה שלא תמשיך ותבדוק עד החופה. רק אם בגלל הדחייה הפסיקה לבדוק (מתוך ייאוש), אז תצטרך להתחיל לספור 7 מחדש.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.3", "txt": "אשה שלקראת חתונתה כבר ישבה שבעה נקיים, אך מסיבה כלשהי דחו את הנשואין, אם וכאשר יחליטו מחדש ויסכימו על קיום החתונה – תצטרך שוב לשבת שבעה נקיים (מהרמ\"מ עפ\"י רשב\"ם)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "גם אם האשה המשיכה בבדיקות מיום שסיימה את ה-7 נקיים הראשונים – הבדיקות לא מועילות. צריכה להתחיל ספירה חדשה של 7 נקיים (עפ\"י הי\"א המחמירים במהרי\"ק)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "(כך מבין גם בכל הנו\"כים) מעמיד מעין שילוב בין הש\"ע (במהרמ\"מ)-ט\"ז לי\"א המקלים במהרי\"ק:\nאם דחו ועדיין לא קבעו זמן אחר (ספק ממשי שלא תהיה חתונה) – רק אז חוששים גם שלא בדקה יפה, וגם שיחזור חימוד כשייקבעו מחדש.\nאבל אם דחו לתאריך קונקרטי אחר (ואין ספק לקיום החתונה) – בוודאי שגם הקפידה על בדיקותיה, וגם לא היה חידוש חימוד. ולא צריכה שוב 7 נקיים.\nאבל אם דחו לתאריך רחוק – אז יהיה חידוש חימוד בכל מקרה. וצריכה שוב ז' נקיים."}], "pesak": null}, "mechudash": {"title": "מה ייגרום לחימוד מחודש?", "seif": null, "sugya": null, "intro": "(הדיון בפוסקים הוא המשך ישיר לדעת המהרמ\"מ ברשב\"ם ואף מדייק את ההבנה בו, שההתרגשות היא שגורמת לחימוד.) אם כבר ישבה 7 נקיים – מה ייגרום לה שוב להתרגשות וחימוד, כך שנדרוש שוב 7 נקיים?", "ops": [{"layer": "acharon", "src": "לבוש", "srcRef": null, "txt": "אפילו אם רק דוחים - צריכה שוב שבעה נקיים. (תופס שהחופה וסביב לה הם מה שמרגש. ואז ברגע שדוחים – כשייתקרב המועד החדש, תתרגש ותתחמד שוב) (ב\"ח וט\"ז כמובן חולקים)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אך ורק אם ממש מבטלים את החתונה, אז קביעה מחדש תגרום להתרגשות. הוא תופס שעצם ההכרזה-הודעה על הנישואין היא המרגשת וגורמת לחימוד. אבל אם רק דוחים קצת, או שרק צד אחד רוצה לבטל, עדיין הכלה 'סומכת דעתה' שבסוף הכל ייסתדר; לכן, כאשר הכל באמת ייסתדר, לא תתרגש כל כך. בנוסף, גם לגבי ביטול הוא סובר שרק אם שהו במצב של ביטול יום-יומיים, תצטרך שוב שבעה נקיים."}, {"layer": "acharon", "src": "ט\"ז — לשון המקור", "srcRef": null, "txt": "~~\"ע\"פ שזה נמשך יום או יומים לא מקרי זה דחיית הנשואין דהכלה דעתה סומכת תמיד באותו זמן שיתפתה החתן בכך דאי תימא דאף בזה שייך חימוד חדש כשיצא הספק מלבה ונעשה ודאי הא גם ביום הנשואין עצמו זמנין הרבה שהחתן מעקש ואומר בפירוש שלא ירצה לישאנה עד לאחר איזה שעות שנעשה שלום ביניהם וכי תצטרך הכלה לישב שבעה נקיים מחדש וזה לא נשמע ולא נראה אדרבה מעשה בכל יום שאין משגיחין בזה\"~~", "expandable": true}, {"layer": "acharon", "src": "ערוה\"ש (שיא)", "srcRef": null, "txt": "\"אם החופה היתה בדרך והכלה באה לזמן המוגבל והחתן לא בא... אם ימים שנים או שלשה לא בא לזמן המוגבל ואין ידיעה ממנו בוודאי לבה דופקה והייאוש גובר\"."}, {"layer": "acharon", "src": "ט\"ז (נוסף)", "srcRef": null, "txt": "אם החתן מבריז מהחופה, היא בוודאי בטוחה שהוא פשוט לא רוצה אותה. לכן, כשיחזרו ובסוף תגלה הכלה שהם כן מתחתנים - וודאי גורם שוב לחימוד וצריך עוד 7 נקיים."}, {"layer": "acharon", "src": "באר היטב (ס\"ק ג)", "srcRef": null, "txt": "'נתפרקה החבילה' — כאשר התפרק השידוך ושב.", "collapsed": true}, {"layer": "acharon", "src": "ערוה\"ש (יג)", "srcRef": null, "txt": "כאשר האשה מבטלת (לא החתן), ומתרצה - צריכה שוב 7 נקיים. שהרי רצתה באמת לבטל."}, {"subhead": "עוד מקרים"}, {"layer": "acharon", "src": "חתם סופר", "srcRef": null, "txt": "נשאל ע\"י רב לגבי אשה שלא פגשה את השידוך שלה. השואל סבר להחמיר שה-7 נקיים לא תופסים, מפני שאין כ\"כ חימוד כשאינה מכירה אותו (סוטה: אין יצר הרע שולט אלא במה שעיניו רואות).\nהחתם סופר עצמו סבר להתיר, ולדעתו ההרהור והחימוד הוא לא על גוף מסוים."}], "pesak": null}, "machzir": {"title": "המחזיר גרושתו", "seif": "סעיף ה׳", "sugya": null, "ops": [{"layer": "shulchan", "src": "הר\"ש בן הרשב\"ץ, ש\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.5", "txt": "המחזיר גרושתו – צריכה לשבת שבעה נקיים (מסתדר עם כל הדיון ברשב\"ם ובט\"ז בעניין 'סומכת דעתה' והתרגשות. כי איחוד מחודש כזה לאחר גירושין יוצר חימוד ותשוקה)"}], "pesak": null}, "asurim": {"title": "כשזוג אסורים אחר חופתם", "seif": "סעיף ד׳", "sugya": null, "intro": "דין מי שעבר וכנס בזמן שבעה נקיים; ומי שפרסה נדה לפני ששימשו לראשונה. העקרון שמגדיר אם ייחוד מותר או לא - האם יצרו תוקפו או לא.", "ops": [{"subhead": "מי שעבר וכנס אשה בלי שספרה 7 נקיים"}, {"layer": "lead", "srcRef": null, "txt": "לפי הדין של סע' א' אסור להתחתן עם מי שלא סיימה לספור 7 נקיים של חשש חימוד."}, {"layer": "gemara", "src": "יבמות (פ' החולץ)", "srcRef": null, "txt": "רב שנשא נשים לימים שהיה בדרדשיר. איך מסתדר עם גזרת רבא? יכול להיות שהתחתן בלי 7 נקיים? ומשמע שאולי לת\"ח יש היתר בזה.", "ref": {"label": "יבמות · פרק החולץ", "ref": "Yevamot.37b"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "ת\"ח יכול להתחתן ב-7 נקיים האלו (ב\"י: ואחרי החתונה יחיו בנפרד)"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "גם לת\"ח אסור להתחתן ב-7 נקיים האלו", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.4", "txt": "לא חילק בין ת\"ח לאדם רגיל, ונראה שאוסר לכולם להתחתן ב-7 נקיים."}, {"layer": "rishon", "src": "רשב\"א, רי\"ף, רא\"ש", "srcRef": null, "txt": "מי שעבר והתחתן (לפני שספרה 7 נקיים מהתביעה) - אסור להתייחד עמה"}, {"layer": "rishon", "src": "רשב\"א, סמ\"ג תרומה", "srcRef": null, "txt": "מה עניין הדין? הרי אינה נדה! אלא חוששים שיצרו יגבור עליו ויבוא עליה", "under": true}, {"layer": "rishon", "src": "מ\"מ ברמב\"ם", "srcRef": null, "txt": "ת\"ח שעבר וכנס: מתיר לת\"ח גם להתייחד אחר החתונה (ת\"ח יודע שאסור לבוא עליה)", "under": true}, {"layer": "rishon", "src": "ב\"י ברמב\"ם", "srcRef": null, "txt": "על אף שמתיר לת\"ח להתחתן, אסור לו להתייחד", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.4", "txt": "חתן שפשע והתחתן עם אשה בלי שסיימה לספור שבעה נקיים – אסורים להתייחד, וישן עם הגברים, והיא עם הנשים (ולא חילק בין ת\"ח לעם הארץ) (רשב\"א, רי\"ף, רא\"ש)"}, {"subhead": "מי שאשתו פרסה נדה אחר החתונה, לפני שהספיקו לשמש"}, {"layer": "gemara", "src": "ברייתא (כתובות)", "srcRef": null, "txt": "מי שפרסה אשתו נדה - הוא ישן בין הגברים והיא ישנה בין הנשים (אסור להם להתייחד)", "ref": {"label": "כתובות · פרק אף על פי", "ref": "Ketubot.61a"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "אם כבר בא עליה פעם אחת, ורק אח\"כ נטמאת – מותר להם להתייחד (ב\"י: כי אין יצרו תוקפו יותר)"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "חתן שכלתו פרסה נדה עוד לפני שהספיק לבוא עליה – אסור להם להתייחד (כברייתא, וכרמב\"ם). ומשמע שאם כבר שימשו – מותר להם להתייחד, כרמב\"ם. וכ\"כ הש\"ך"}, {"subhead": "אם הייתה טהורה, לא שמשו, ואח\"כ פרסה נדה"}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "זוג שלא שכבו לאחר שהתחתנו כמה ימים למרות שהיתה טהורה:\n**אחד מן הגדולים** – אסורים להתייחד. שהרי עדיין לא בא עליה ויצרו תוקפו.\n**חד מרבוותא** – מותרים להתייחד. אם עד עכשיו לא בא עליה למרות שיכלו - ברור שיצרו לא כ\"כ גדול.\nתרוה\"ד מצדד להקל, אך המחמיר תבוא עליו הברכה"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "י\"א שאשה שהייתה טהורה כשהתחתנו, ולא שימשו כמה ימים, ואח\"כ פרסה נדה - יכולים להתייחד ('חד מרבוותא'), והמחמיר תבוא עליו הברכה (תרוה\"ד)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "חולק. זה איסור גמור.", "under": true}, {"layer": "acharon", "src": "ש\"ך בנקה\"כ", "srcRef": null, "txt": "מצדד בתרוה\"ד והרמ\"א (אבל לא בהכרח להלכה)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "האידנא המנהג לא לשמש, אלא רק אחרי יומיים שלשה. במקרה זה, ברור שאם פרסה נדה אחרי יומיים שלשה שאסורים להתייחד (שהרי אין הטעם של 'אין יצרו תוקפו' נכון. הם לא שכבו רק בגלל המנהג). (אבל דעת הש\"ך עצמו ביחס למנהג של לא לשמש ביומיים-שלושה - מנהג שטות)"}, {"subhead": "אלמן / אלמנה (זוג שאחד מהם כבר קיים)"}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "אלמן - אין לחוש שיבוא על נדה. גם אם הוא ואשתו החדשה לא שימשו עדיין (ההתנסות מורידה את היצר)"}, {"layer": "rishon", "src": "רמ\"ה", "srcRef": null, "txt": "קצת שונה מהדיון. הוא מדבר על הדם, ולא על הנסיון והיצר (לראות ס\"ק יג)", "under": true}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "אין הבדל בין רווק לאלמן, ולא בין בתולה לאלמנה"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "ר' ירוחם"}, {"subhead": "השגחה על האסורים להתייחד"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "צריך שומרים לאחד מהם (ולא לשניהם. עפ\"י ראב\"ד ורשב\"א). אבל אם ישנים בחדרים נפרדים - לא צריכים שומרים (ב\"י ברשב\"א). וי\"א שבלילה צריך שומרים גם לחתן וגם לכלה (ראב\"ד)"}, {"subhead": "ביום לעומת לילה"}, {"layer": "rishon", "src": "ר' ירוחם, ראב\"ד", "srcRef": null, "txt": "רק בלילה אסורים להתייחד יותר מברגיל. ביום - כדין ייחוד רגיל (של שאר נשים)"}, {"layer": "rishon", "src": "רא\"ש, רז\"ה", "srcRef": null, "txt": "גם ביום וגם בלילה אסורים יותר מברגיל. הם בתקופה להוטה (עדיין לא בא עליה מאז הנישואין)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "י\"א שרק בלילה אסורים בייחוד וביום לא (ר' ירוחם, ראב\"ד); וי\"א שאסורים בייחוד ביום כמו בלילה (רא\"ש, רז\"ה). והמנהג שביום מתייחדים רק בנוכחות קטן או קטנה"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "mesulakot"}, {"type": "sec", "id": "matai"}, {"type": "sec", "id": "dachu"}, {"type": "sec", "id": "mechudash"}, {"type": "sec", "id": "machzir"}, {"type": "sec", "id": "asurim"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"דם חימוד": "דם הנגרם (לחשש חכמים) מתוך תשוקה והתרגשות לקראת הנישואין.", "תבעוה להנשא": "הציעו לה להינשא והסכימה ונקבע מועד — מכאן מתחיל חשש דם חימוד.", "נתפיסה": "נקבע מועד/הוסכם על הנישואין.", "שבעה נקיים": "שבעה ימים נקיים מדם שצריכה לספור קודם החופה.", "הפסק טהרה": "בדיקה בסוף הראייה המפסיקה את ימי הטומאה ומאפשרת תחילת ספירת הנקיים.", "מסולקות דמים": "נשים שאינן רואות דם (קטנה, זקנה, מעוברת) — ואעפ\"כ צריכות שבעה נקיים.", "סומכת בדעתה": "בטוחה שהחופה תתקיים — ביטוי מפתח במחלוקת הגורם לחימוד.", "יצרו תוקפו": "העיקרון המתיר/אוסר ייחוד — אם יצרו גובר (טרם שימשו) אסורים להתייחד.", "מכי רמו שערי באסינתא": "'משעה ששורים שעורים בעריבה' — כלומר משמתחילים בהכנות החופה."}, "subject": "נידה", "id": "dam"}, {"topic": {"title": "רואה מחמת תשמיש", "eyebrow": "מבחני הרבנות · נידה · סימן קפ\"ז", "siman": "Shulchan_Arukh,_Yoreh_De'ah.187", "intro": {"lead": {"t": "", "ref": ""}, "body": "אשה הרואה דם מחמת תשמיש שלוש פעמים רצופות – נאסרת לבעלה, מחשש שהדם דם נידה הבא מן המקור בעקבות התשמיש. לאחר שלושה בעלים – אסורה לכל, עד שתבדוק בשפופרת ומכחול.\n\nסימן זה עוסק בהגדרת הראייה האוסרת (זמן ואופן הבדיקה), בבדיקת השפופרת, בתליית הדם בסיבה אחרת (וסת, מכה, בתולים, לידה), בעקירת החזקה (רפואה, הפחדה), וב'וסת רמ\"ת' (זמן קבוע)."}}, "sections": {"ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳, י\"ב", "sugya": null, "intro": "בקצרה: אשה שראתה דם מחמת תשמיש 3 פעמים רצופות - אסורה לשמש עם אותו האיש.\nולש\"ע, רק אם האשה מבצעת את הבדיקה (ומוצאת בה דם) מיד אחר התשמיש, אבל לאחמ\"כ - כבר נגיד שאולי הדם הגיע אחר התשמיש.\nולרמ\"א כל עוד הבדיקה נעשית 'סמוך לתשמיש' - נחשבת כדי להספר.\nלרוב הפוסקים (ש\"ך, ט\"ז, חוו\"ד) הספירה היא 3 תשמישים של ראיית דם; אך לראב\"ד ותורת השלמים נאסרת רק לאחר 4 ראיות.", "ops": [{"layer": "gemara", "src": "גמרא · ברייתא", "srcRef": null, "txt": "**ברייתא**: הרואה דם מחמת תשמיש - משמשת פעם ראשונה ושניה ושלישית. מכאן ואילך - לא תשמש, עד שתתגרש ותנשא לאחר.\nניסת לאחר וראתה דם מחמת תשמיש - משמשת פעם ראשונה ושניה ושלישית, מכאן ואילך לא תשמש עד שתבדוק עצמה.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "הדין הוא רק אם ראתה 3 פעמים רצופות"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.1", "txt": "אשה שרואה דם מחמת תשמיש 3 פעמים רצופות – אסורה לבעלה, ותתגרש.. וכן הלאה עד 3 בעלים (כברייתא + רשב\"א).\nואחר 3 בעלים שנאסרה כנ\"ל - אסורה לכל העולם, אא\"כ תבדוק את עצמה בשפופרת"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "גם אם הדם נראה על עד של הבעל – נחשב לראייה האוסרת"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אבל אם הם בודקים מיד, ואצלה אין דם ואצלו יש – תולים את הדם בו, ולכן לא נספר לאסור אותה"}, {"subsubhead": "דין רמ\"ת אצל 3 בעלים"}, {"layer": "lead", "srcRef": null, "txt": "אחר כמה בעלים אנו אומרים שאשה רואה תמיד מחמת תשמיש, ונאסור עליה לשמש עם כל אדם (עד שתבדק בשפופרת)?"}, {"layer": "gemara", "src": "יבמות · רבי · רשב\"ג", "srcRef": null, "txt": "**בברייתא שלנו בנדה סו**: אחר 3 בעלים שאתם נמצאה רמ\"ת.\nביבמות מחלוקת: **רבי** – אחר 2 בעלים; **רשב\"ג** – אחר 3 בעלים.\n**סמ\"ג**: הלכה כרבי.\n**רמב\"ם, ראב\"ד** ורוב הפוסקים: כברייתא שלנו (אחר 3 בעלים)", "ref": {"label": "יבמות · פרק הבא על יבמתו", "ref": "Yevamot.64b"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "אשה שראתה מחמת תשמיש 3 פעמים רצופות, עם 3 בעלים שונים - נאסרת (לתשמיש עם כל אדם)"}, {"subhead": "האם רמ\"ת הוא וסת או חולי?"}, {"layer": "acharon", "src": "ש\"ך, נודע ביהודה", "srcRef": null, "txt": "רמ\"ת הוא וסת. ותו: וסת אונס (וסת סיבה, שהרי מעשה התשמיש גורם).\nלהגדירה כוסת אונס נותן קולא: למדנו (בקפ\"ט סע' יז) שוסת אונס אי אפשר לקבוע רק על בסיס הסיבה, אלא רק בצירוף ימים מסוימים. לכן, אם אשה רואה מחמת תשמיש אך לא לפי זמן מסוים, מספיק שתקבע וסת כלשהו - ובכך 'תעקור' את 'וסת התשמיש'."}, {"layer": "acharon", "src": "חוו\"ד, ערוה\"ש", "srcRef": null, "txt": "רמ\"ת זה לא וסת. זו מעין תופעת חולי (\"חולה ממלאה ונופצת\").\nלכן, גם אם קבעה וסת אחר - ממשיכה לחשוש למחלה."}, {"subsubhead": "נפק\"מ: כשמעוברת / מניקה"}, {"layer": "lead", "srcRef": null, "txt": "אם אשה ראתה מחמת תשמיש 3 פעמים, אך אחרי התשמיש השלישי – התעברה. האם מותרים לשמש בזמן ההריון וההנקה?"}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "אפילו אם נתעברה - אסורה (כי זה חולי, וככזה יכול לבוא גם בהריון/הנקה)"}, {"layer": "acharon", "src": "נודע ביהודה", "srcRef": null, "txt": "אם נתעברה - מותרת כשתהיה מסולקת דמים (הוכר עוברה; ימי ההנקה); אבל אח\"כ חוזרת לאיסורה"}, {"layer": "acharon", "src": "סדרי טהרה", "srcRef": null, "txt": "לא חוזרת אחר הלידה וההנקה לאיסורה. מותרת (שהרי ימי ההריון/הנקה הוכיחו שלא רמ\"ת! שהרי שימשו בהם ולא ראתה)", "under": true}, {"subhead": "דיונים נוספים"}, {"subsubhead": "רמ\"ת פעמיים, ובפעם השלישית לא בדקה"}, {"layer": "lead", "srcRef": null, "txt": "אם אשה ראתה פעמיים מחמת תשמיש, אבל אח\"כ שימשו בלי לבדוק, ואז שוב שימשו וראתה מחמת תשמיש."}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "נחשב כשלוש פעמים רצוף, ונאסרת (כי גם כשלא בדקו דיממה, אך לא ידעה)"}, {"layer": "acharon", "src": "המהרש\"ם, טהרת הבית", "srcRef": null, "txt": "לא נחשב כ-3 פעמים רצופות, ולא נאסרת לבעלה"}, {"subsubhead": "ראתה דם בשפע"}, {"layer": "acharon", "src": "נודע ביהודה", "srcRef": null, "txt": "אשה שרמ\"ת 3 פעמים ונאסרת, אלא שכשראתה - ראתה דם בשפע: אסור לה אפילו להתחתן עם אחר (מפני שההיתר להנשא עם אחר הוא ספק ספקא: שמא ראתה מהצדדים ולא מהמקור, ושמא האצבע של האיש הבא לא תהיה שווה. ואם הדם יוצא בשפע - בוודאי מן המקור)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "הטעם – שאולי עם אחר התשמיש לא ייגרום לדימום", "under": true}, {"layer": "acharon", "src": "שבות יעקב", "srcRef": null, "txt": "זקנה: מי שהפסיקה לראות דם מחמת זקנותה, ועכשיו בשעת התשמיש התחילה לראות ומרגישה כאבים – אינה צריכה בדיקת שפופרת. אין זה דם נידה אלא מכה (תולים בזקנותה)."}, {"subhead": "מה נחשב ראייה (א')"}, {"layer": "lead", "srcRef": null, "txt": "לא כל ראייה לאחר התשמיש נחשבת כראייה מחמת התשמיש, אלא רק ראייה שאנו בטוחים שקרתה בעקבות התשמיש. תנאי ראשוני הוא זמן הבדיקה: רק אם הבדיקה נעשית בסמיכות של ממש לתשמיש, נתאים בין הדם לתשמיש."}, {"layer": "gemara", "src": "גמרא · רב אשי", "srcRef": null, "txt": "**רב אשי**: אם אין עד בידה - כדי שתושיט ידה לתחת הכר/הכסת ותקח עד ותבדוק בו. אם יש עד בידה – כדי שתרד מהמיטה ותדיח פניה. שהוא אותו שיעור זמן.", "ref": {"label": "נדה · פרק כל היד · יד ע\"א", "ref": "Niddah.14a"}}, {"layer": "shulchan", "src": "ש\"ע, רמב\"ם, רשב\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.1", "txt": "כדי שתושיט ידה מתחת לכר/הכסת ותטול עד ותבדוק בו"}, {"layer": "rishon", "src": "טור, סמ\"ג", "srcRef": null, "txt": "בכדי שתרד מהמיטה ותדיח פניה"}, {"layer": "rama", "src": "רמ\"א, ראב\"ד בשם י\"א", "srcRef": null, "txt": "כל בדיקה סמוך לתשמיש (כי אנו לא בקיאין בשיעורין)"}, {"subsubhead": "סמיכות הבדיקה (הראייה)"}, {"layer": "gemara", "src": "משנה · ברייתא · גמרא", "srcRef": null, "txt": "**משנה**: נמצא על עד שלה אותיום (מיד) - טמאין וחייבין קרבן; לאחר זמן - טמאין מספק ופטורין מקרבן. איזהו אחר זמן? כדי שתרד מן המטה ותדיח פניה.\n**ר' אליעזר ברבי צדוק** (ברייתא): כדי שתושיט ידה לתחת הכר/הכסת ותקח עד ותבדוק בו.\n**רב אשי**: מבחינת הזמן זה אותו שיעור; יותר מזה – לא ייספר להחשיב כרמ\"ת.", "ref": {"label": "נדה · פרק כל היד · יד ע\"א", "ref": "Niddah.14a"}}, {"layer": "rishon", "src": "רשב\"א, רמב\"ם (ב\"י)", "srcRef": null, "txt": "כדי שתושיט ידה מתחת לכר/הכסת ותטול עד ותבדוק בו (ב\"י: זמן קצר יותר)"}, {"layer": "rishon", "src": "תרומה, סמ\"ק, סמ\"ג, טור", "srcRef": null, "txt": "בכדי שתרד מהמיטה ותדיח פניה (ב\"י: זמן ארוך יותר)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מצדד ברמ\"א והי\"א בראב\"ד. ואם בתוך השיעור בדקה ולא ראתה ואח\"כ שוב וראתה - לא נחשב שרמ\"ת."}, {"layer": "acharon", "src": "טה\"ב / דר\"ט", "srcRef": null, "txt": "טה\"ב: סמוך לסיעת הרמ\"א - עד 3 דקות. דר\"ט: אפילו אם מצאה תוך חצי שעה – נחשבת שרמ\"ת."}, {"subsubhead": "אופן הבדיקה"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "הבדיקה שצריך לעשות היא רק בדיקה חיצונית (קינוח), ולא בחורים ובסדקים.", "ref": {"label": "נדה · פרק כל היד · יד ע\"א", "ref": "Niddah.14a"}}, {"layer": "shulchan", "src": "רשב\"א, רמב\"ם, ש\"ע", "srcRef": null, "txt": "קינוח"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "גם אם מוצאים על העד של הגבר – נחשב מחמת תשמיש"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "אם מצאו על העד שלו - אפילו אחר זמן מופלג חשיב רמ\"ת (שהרי לגבר אין סיבות אחרות לראות דם, אלא רק מחמת אותו התשמיש)", "under": true}, {"subsubhead": "הראייה הראשונה (3 או 4)"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "הראייה הראשונה לא נחשבת (נאסרת אחר 4 תשמישים שבהם ראתה)"}, {"layer": "rishon", "src": "רמב\"ם, רמב\"ן, האשכול", "srcRef": null, "txt": "הראייה הראשונה נחשבת (נאסרת אחר 3 תשמישים)"}, {"layer": "acharon", "src": "החת\"ס", "srcRef": null, "txt": "אם מישהי תגיע אלינו אחר פעם/פעמיים - הפעם השלישית תאסור. בדיעבד, אשה שהגיעה לשאול כבר אחר 3 ראיות - ניתן לה פעם נוספת."}, {"subsubhead": "מיד אחר נישואים?"}, {"layer": "rishon", "src": "ר\"ח", "srcRef": null, "txt": "דין רמ\"ת הוא רק אם 3 הראיות היו ב-3 התשמישים הראשונים של הזוג. אם היה אפילו תשמיש אחד ללא ראייה - לא תיאסר."}, {"layer": "rishon", "src": "תוספות, מרדכי, רמ\"א", "srcRef": null, "txt": "דין רמ\"ת קיים תמיד, גם אם בתשמישים הראשונים לא ראתה."}, {"subhead": "האם ניתן לזוג להשאר נשואים כשהוחזקה רמ\"ת? (י\"ב)"}, {"layer": "rishon", "src": "מהרמ\"מ, רשב\"א בתשובה", "srcRef": null, "txt": "זוג שרואים מחמת תשמיש (3 פעמים) ואסורים לשמש - אסור להם להשאר יחד, מחשש שיעברו וישמשו. ודווקא בגלל שהאיסור רק דרבנן (רמ\"ת זה וסת, וחשש וסתות דרבנן) - יזלזלו וישמשו."}, {"layer": "rishon", "src": "מהרמ\"מ", "srcRef": null, "txt": "אם יש אדם שלישי (שיוסר החשש), ויהיו יחד רק בנוכחותו – יכול להשאירה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.12", "txt": "אשה שרמ\"ת 3 פעמים ונאסרה – אסור לו להשאירה (וצריכים להתגרש), אא\"כ ידאג לאדם שלישי שתמיד יהיה שם."}, {"layer": "acharon", "src": "מהר\"ם פדאווה, ערוה\"ש", "srcRef": null, "txt": "אם לא גרים יחד – לא צריך עדים (המרחק נחשב לעדים). אבל אם לא קיימו פרו ורבו – צריכים להתגרש."}, {"layer": "acharon", "src": "פת\"ש בשם רמ\"א באה\"ע", "srcRef": null, "txt": "מצד שלא קיימו פו\"ר - לא אכפת לנו, כי בזמן הזה נהגו שלא לכוף על פרייה ורבייה", "under": true}], "pesak": null}, "shfoferet": {"title": "בדיקת השפופרת", "seif": "סעיפים ב׳-ג׳", "sugya": null, "intro": "לאחר שראתה 3 פעמים מחמת תשמיש עם 3 בעלים היא נאסרת. אולם בדיקת שפופרת (שעל גבה מכחול ומוך) יכולה להתירה. הבדיקה מדמה תשמיש: אם יימצא דם על ראש המוך – הדם מן המקור, וכל תשמיש יגרום לדימום, ואסורה לכולם. אם לא – מדובר בדם מכה, ומותרת.\nהש\"ך: אם הבדיקה יוצאת טוב, מותרת אף לגבר השלישי. ורוב הראשונים: הבדיקה מועילה גם בשלבים מוקדמים (להצילה מגירושין מבעלה הראשון).", "ops": [{"subhead": "עיקר הדין (ב')"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "אשה שראתה מחמת תשמיש 3 פעמים עם 3 בעלים - אסורה לכל העולם, עד שתבדוק עם שפופרת ומכחול עם מוך. אם יימצא דם על ראש המכחול – דם מן המקור, ואסורה לאחרים. אם לא - דם מן הצדדים, ומותרת.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.2", "txt": "כתב הדין כדברי הברייתא."}, {"layer": "acharon", "src": "ריצב\"א, ש\"ך", "srcRef": null, "txt": "אם לא נמצא דם על השפופרת בכלל – גם מותרת (כי אם היה מן המקור – בוודאי היה נמצא על ראש המכחול)", "under": true}, {"subsubhead": "האם נטמאת וצריכה 7 נקיים?"}, {"layer": "acharon", "src": "מהר\"י הורוביץ", "srcRef": null, "txt": "אם נמצא על הצדדים - לא צריכה שבעה נקיים (שהרי הדם לא מהמקור)"}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "כן צריכה שבעה נקיים (כי החמירו בנות ישראל אפילו על טיפת דם כחרדל)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אם נמצא דם על צדדי השפופרת – תשמור 7 נקיים; אם לא נמצא כלל – לא צריכה"}, {"subsubhead": "בדיקה חוזרת"}, {"layer": "acharon", "src": "נודע ביהודה", "srcRef": null, "txt": "אם בדקה ויש דם - לא יעזור לבדוק שוב. אסורה."}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "זה נכון רק בבדיקה אחר הפעם השלישית של הבעל השלישי, אבל בבעל הראשון - מועיל לבדוק שוב", "under": true}, {"subhead": "חומר השפופרת (ב')"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "צריך שלא יהיה חומר שורט כמו עץ (כדי שלא תדמם בגללו), אלא שפופרת של אבר.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "של אבר (עור)"}, {"layer": "acharon", "src": "ש\"ך בשם משאת בנימין", "srcRef": null, "txt": "כל מתכת או ברזל שלא שורטים"}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "אם בדקה בשל עץ – מועיל בדיעבד אם אין דם (אז ברור שאין דם מקור, ומותרת)", "under": true}, {"subhead": "איך מבצעים? (ב')"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "מכניסה עד צוואר הרחם."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "עד מקום שהאבר מגיע"}, {"layer": "acharon", "src": "ש\"ך בשם משאת בנימין", "srcRef": null, "txt": "האשה יודעת עד איזה מקום האבר מגיע. לא צריך לחוש שלא תבדוק טוב (התורה לא נתנה למלאכי השרת)"}, {"layer": "acharon", "src": "תשובת הב\"ח", "srcRef": null, "txt": "לא להגזים. הבדיקה גם ככה קשה. איך שהנשים עושות – עושות טוב.", "under": true}, {"subhead": "תוקף הבדיקה כיום (ב\"י, רמ\"א ב')"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "האידנא לא סומכים על הבדיקה להתיר, כי אין בקיאין בה. וגם החמירו על עצמן בנות ישראל שכל דם אוסר."}, {"layer": "rishon", "src": "רא\"ש (ר\"ר)", "srcRef": null, "txt": "סומכים על הבדיקה (לא צריך להיות בקיאים; וחומרת בנות ישראל רלוונטית רק לראייה שגרתית).\n(לשונו נפלאה: \"אבל לא ניתן לכתוב בספר להורות בו לדורות הבאים, כי מצינו הרבה בתלמוד שחשו חכמים לתקנת עגונות והקלו מאד\")"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "סומכים על הבדיקה אף בזמן הזה (רא\"ש ר\"ר) — ופשוט שגם הב\"י מצדד בזה"}, {"subhead": "מתי מועיל לבצעה (ג')"}, {"layer": "gemara", "src": "גמרא · ריש לקיש · ר' יוחנן", "srcRef": null, "txt": "**ר\"ל** ל**ר' יוחנן**: ותבדוק עצמה בביאה שלישית של בעל הראשון! **ר' יוחנן**: לפי שאין כל האצבעות שוות (רש\"י: מוטב שתתגרש שלא תבוא לידי כרת).", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רש\"י (לפי רא\"ש ותוס')", "srcRef": null, "txt": "לא יכולה לבדוק בבעל הראשון. צריכה להתגרש (שלא תבוא לידי כרת)", "under": true}, {"layer": "rishon", "src": "הגהות מיימ', רא\"ש, רשב\"א, טור, ר\"ת", "srcRef": null, "txt": "מתירים לה לבדוק בבעל הראשון (ואם הבדיקה טובה - יכולה להשאר עם בעלה). נימוק המ\"מ: לשון 'תתגרש' היא אופציה, ולא ציווי."}, {"layer": "rishon", "src": "ריצב\"א", "srcRef": null, "txt": "אם היה לה צער וכאב בשעת תשמיש - משמע שאולי חולי או מכה, ואף רש\"י יתיר.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.3", "txt": "אשה הרואה מחמת תשמיש – רשאית לבדוק עצמה בשפופרת גם בבעל הראשון, אחר שלוש פעמים ששימשו וראו. ואם יוצאת מותרת – מותרת לו (רא\"ש וסיעתו)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "יש לסמוך על המקלים להתיר. ואם הרגישה כאב וצער – אפילו לדעת רש\"י (ריצב\"א)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מצדד לאסור (כי רש\"י; וכי הראב\"ד לא סומך אבדיקה בזמן הזה), אבל מסכים עם הריצב\"א להתיר אם יש כאב. ואם בדקה תחת הבעל הראשון ומצאה דם – אסורה לכולם (סמ\"ג)."}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "להתיר (מביא הרבה שו\"תים)", "under": true}], "pesak": null}, "tliya": {"title": "תליית הדם בסיבה אחרת", "seif": "סעיפים ד׳-ז׳, י\"ג", "sugya": null, "ops": [{"subhead": "תלייה בוסתה (ד')"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "אשה שבדקה אחר תשמיש ומצאה דם – אם יש לה וסת, תולה את הדם בוסת ולא בתשמיש.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "'אם יש לה וסת' – למי שיש לה וסת קבוע מחמת תשמיש (וסת מורכב, לפי זמן מסוים)"}, {"layer": "rishon", "src": "רמב\"ם, רמב\"ן", "srcRef": null, "txt": "כפשוטו: אם שימשו בזמן שהוסת הקבוע אמור להגיע, תולים בעונת הוסת ולא בתשמיש"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "שני הפירושים לא חולקים, ואין הבדל להלכה", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.4", "txt": "אשה ששמשה סמוך לזמן חשש וסתה, ולאחר התשמיש ראתה - תולין ראייתה משום וסתה, ולא אמרינן שהתשמיש גרם (עפ\"י הברייתא, רמב\"ם, אך לכו\"ע). ובסע' יא פוסק כרש\"י לגבי קביעת וסת רמ\"ת מורכב."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הפרישה אוחז החבל משני קצותיו: אם אפשר לתלות את הדם בוסת – שימשו באיסור (שהרי דין פרישה בעונת הוסת); ואם שימשו בהיתר – א\"א לתלות בוסת."}, {"subhead": "תלייה במכה (ה-ז)"}, {"subsubhead": "עיקר ההיתר (ה, ז)"}, {"layer": "gemara", "src": "ברייתא · רבי · רשב\"ג", "srcRef": null, "txt": "**ברייתא**: אם יש שם מכה - תולה את הדם במכה ולא בתשמיש. ואם הדם שרואה שונה מדם המכה – אינה תולה.\n**רבי**: נאמנת אשה לומר מכה יש לי במקור שממנה דם יוצא.\n**רשב\"ג**: דם הבא מן המקור (בין מחמת מכה בין לא) – טמא; ורבותינו העידו על דם המכה הבא מן המקור שהוא טהור.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אם יש שם מכה ודאית – אפילו אם אינה מרגישה שמשם הדם זב, תולים במכה (מוכיח מלשון התוספתא)"}, {"layer": "rishon", "src": "רשב\"א, רא\"ש", "srcRef": null, "txt": "רק אם מתברר בוודאות שהדם משונה - לא תולים (בסתם נוטים לתלות; 'כל הנשים בחזקת טהרה')"}, {"layer": "rishon", "src": "הגהות מיימ', מרדכי", "srcRef": null, "txt": "לא מספיק לדעת שיש מכה. צריכה לדעת שהדם יורד מהמכה", "under": true}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "מחלק: אם אין לה וסת קבוע - צריך לדעת בוודאות שהדימום מהמכה (או ע\"י בדיקה בחורים ובסדקים). אם יש לה וסת קבוע ואינה בזמנו - תולה במכה גם בלי וודאות."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ה', ז')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.5", "txt": "אם יש לה מכה שם - תולים במכה ולא בתשמיש. ואם דם מכתה שונה – אינה תולה (רשב\"א, רא\"ש). ובסע' ז' עפ\"י תרוה\"ד כיצד ניתן לדעת שיש מכה: אם בבדיקה מוצאת רק בצדדים ובמקום מסוים; או אם המקום שממנו הדם כואב."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם וסתה אינו קבוע: אם יש ספק אם הדם מהמקור או מהצדדים - תולים במכה (ס\"ס); אם בוודאות מהמקור - צריכה וודאות שהמכה מוציאה דם. אם וסתה קבוע (וראתה שלא בשעתו) – תולים במכה גם בלי וודאות."}, {"layer": "acharon", "src": "ש\"ך / ב\"ח / ט\"ז", "srcRef": null, "txt": "**ש\"ך**: כתרוה\"ד. **ב\"ח, ט\"ז**: כרשב\"א, אך רק בוסת קבוע. **ט\"ז**: אפשר לתלות במכה רק אם יודעת שהמכה מוציאה דם או אם מתקיימים דברי תרוה\"ד."}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "דעת הרמ\"א היא דעת עצמו; מקלים רק כשיש עוד קולא בנוסף למכה (וסת קבוע שלא בזמנו, או ס\"ס)", "under": true}, {"subsubhead": "האידנא"}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "היום אין תולים דם במכה (הדין תלוי ביכולת להבחין בין דם מכה לדם וסת, ואין אנו בקיאין)"}, {"layer": "rishon", "src": "רא\"ש, ר\"ן", "srcRef": null, "txt": "חולק: בסתם - תולים במכה; וכל אחד יכול להבחין בין דם מכה לדם וסת"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "תולים גם תולים (רא\"ש ודעימיה)"}, {"layer": "acharon", "src": "ש\"ך / ט\"ז", "srcRef": null, "txt": "האם צריך להראות לחכם? ש\"ך: לא. ט\"ז: כן."}, {"subsubhead": "תלייה במכה כשרואה ב-ז' נקיים"}, {"layer": "acharon", "src": "פת\"ש בשם דגול מרבבה", "srcRef": null, "txt": "ברמ\"ת עיקר הדין פשוט (אם קיימו יחסים היא בחזקת טהרה). אבל אם אינה בחזקת טהרה (אלא שבעה נקיים)? **נו\"ב**: ז' נקיים – חזקת טומאה. **ברית אברהם**: ז' נקיים – בחזקת טהורה."}, {"subsubhead": "בכתמים (רמ\"א ה')"}, {"layer": "rama", "src": "מרדכי, רמ\"א", "srcRef": null, "txt": "כתם (לעומת דם של ממש) אפשר לתלות במכה בכל עניין"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כתם אפשר לתלות במכה אפילו בשעת חשש לוסת ואפילו אם אין ידוע שהמכה מוציאה דם", "under": true}, {"subsubhead": "נאמנות האשה במכה (ו')"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.6", "txt": "נאמנת אשה לומר 'מכה יש לי באותו מקום (במקור) שהדם יוצא ממנה' (רבי בברייתא)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אשה נאמנת גם להגיד שהדם בכלל לא בא מן המקור (וטהורה) (מהר\"י וויל)"}, {"layer": "acharon", "src": "דגול מרבבה, חוו\"ד", "srcRef": null, "txt": "מפקפקים ברמ\"א. אפילו על דם שמהצדדים צריך לחשוש שנזל מהמקור וטמא.", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כוונת הרמ\"א: כשיש לה וסת קבוע וזה לא זמן הוסת, שאז ברי לה שלא אמור להיות דימום מן המקור", "under": true}, {"subhead": "תלייה בבתולים (י\"ג)"}, {"layer": "lead", "srcRef": null, "txt": "מן הגמרא (דף יא) והתוספתא עולה כי אשה המוצאת דם בבדיקה אחר התשמישים הראשונים לנישואיה יכולה לתלותו בבתולים. וזה כל עוד בכל תשמיש מאז נישואיהם ראתה דם; אבל אחר שישמשו פעם בלי דם בסמוך – כבר ייחשב רמ\"ת."}, {"layer": "gemara", "src": "תוספתא / ב\"י עפ\"י סמ\"ג", "srcRef": null, "txt": "**תוספתא**: בתולה דמיה טהורים, ואין בודקים אותה בשפופרת. **ב\"י עפ\"י סמ\"ג**: בתולה שרואה דם אחר התשמיש - תולים בבתולים, עד שלפחות פעם ישמשו ולא תראה (עפ\"י שמואל בדף יא).", "ref": {"label": "נדה · פרק כל היד · יא ע\"א", "ref": "Niddah.11a"}}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ י\"ג)", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.13", "txt": "בתולה שראתה דם אחר התשמיש – תולים בדם הבתולים, עד שישמשו פעם אחת בלי דם. (ואז אם יראו 3 פעמים – חשיב רמ\"ת)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אבל אם אין לה צער בשעת התשמיש – נחשב דם מחמת התשמיש (ולא בתולים, משום שבדם בתולים יש צער)"}, {"layer": "acharon", "src": "ב\"ח / ט\"ז", "srcRef": null, "txt": "**ב\"ח**: חולק על הרמ\"א; אפילו בלי צער נחשבת בתולה. **ט\"ז, משאת בנימין**: מצדדים ברמ\"א ומהר\"ם פדאווה."}, {"subsubhead": "החובה לבדוק עצמה"}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "התנאי לתלות בבתולים הוא שבדקה עצמה אחר כל תשמיש. אם לא בדקה – נחשב כאילו לא ראתה בפעם זו."}, {"layer": "acharon", "src": "טהרת הבית", "srcRef": null, "txt": "גם אם לא בדקה עצמה פעם אחת יכולה להמשיך לתלות בבתולים. רק אם בדקה ומצאה נקייה נחשב כפעם שלא ראתה.", "under": true}, {"subhead": "תלייה בלידה (רמ\"א י')"}, {"layer": "lead", "srcRef": null, "txt": "עיין בכותרת 'רמ\"ת בזמן מסוים' — שם מביא הרמ\"א את תשובת ר' יוחנן מ\"מ המציע לתלות ראייה אחר תשמיש בדם הלידה."}, {"subhead": "תלייה בדימום של הגבר (רמ\"א י\"ג, ק\"צ כ')"}, {"layer": "rama", "src": "ב\"י עפ\"י רשב\"א, רמ\"א", "srcRef": null, "txt": "אשה שאחר תשמיש מצאה דם, אך לבעלה יש דימום מהשמש - תולה בו את הדימום (לעיין בק\"צ סע' כ)"}], "pesak": null}, "akira": {"title": "עקירת חזקת רמ\"ת", "seif": "סעיפים ח׳-ט׳", "sugya": null, "intro": "שתי שאלות: הסבירות של היכולת הרפואית להירפא מהתופעה; ונאמנותו של הרופא.", "ops": [{"subhead": "היכולת להירפא מרמ\"ת (ח')"}, {"layer": "gemara", "src": "סיפור בגמרא · רבי", "srcRef": null, "txt": "אשה שהפילה חררת דם ואמר שהתרפאה.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "תרומה, סמ\"ג, סמ\"ק", "srcRef": null, "txt": "אם תרצה להוכיח שכבר לא רואה מחמת תשמיש – צריכה לעשות כן לפני שראתה 3 פעמים ונעשתה חזקה."}, {"layer": "rishon", "src": "ריצב\"א", "srcRef": null, "txt": "אם רופא יהודי אומר לה לשמש – משמשת (אפילו שיש חזקה). רופא גוי – קשה להאמינו. ואם בדקה בשפופרת ולא מצאה דם - סומכת עליו לגמרי."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ח')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.8", "txt": "לפני חזקה של שלוש ראיות – סומכת על כל רפואה. לאחר חזקה: יש מסתפקים (תרומה, סמ\"ק, סמ\"ג); יש מתיר לסמוך על רופא ישראל שאמר לה לשמש (ריצב\"א); ואם ראתה שרפואות עוזרות – סומכת אף על רופא גוי (ב\"י בריצב\"א)."}, {"layer": "acharon", "src": "שבט הלוי (בעקבות החת\"ס)", "srcRef": null, "txt": "מדרג: חזקה (וודאות) של רמ\"ת; ספק; וודאות שאינה רמ\"ת. **חתם סופר**: רופאים יכולים רק להטיל ספק (לא להביא מחזקה לוודאות). אם רופא אומר שהדימום מכה – מתערערת החזקה ומוטלת בספק, וצריך לברר.", "expandable": true}, {"subhead": "להירפא מרמ\"ת ע\"י הפחדה (ט')"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "סיפור של רבי שהורה לאבדן להפחיד אשה שרואה מחמת תשמיש; אבדן הפחידה, ונפלה ממנה חררת דם. **רבי**: התרפאה זאת.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.9", "txt": "אשה הרמ\"ת שהפחידוה ונפל ממנה חררת דם – התרפאה ומותרת לבעלה. אם ראתה עוד פעם – סימן שלא נתרפאה. אבל בזמן הזה אין מתירין רמ\"ת ע\"י הפחדה (עפ\"י רמב\"ן, ראב\"ד)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "לכתחילה לא מתירין ע\"י הפחדה, אבל בדיעבד - כן.", "under": true}], "pesak": null}, "zman": {"title": "רמ\"ת בזמן מסוים (וסת הרמ\"ת)", "seif": "סעיפים י׳-י\"א", "sugya": null, "ops": [{"subhead": "רמ\"ת בזמן קבוע אחר טבילה (י')"}, {"layer": "lead", "srcRef": null, "txt": "**רש\"י** על הברייתא (סו) מפרש: אם יש לראייה מחמת תשמיש מועד קבוע - חשיב כוסת (לקולא ולחומרא). דברי **המהרמ\"מ** הם יישום פירוש רש\"י — וסת מורכב על תשמיש. אלא שגורם הזמן פה הוא ביחס למועד הטבילה."}, {"layer": "acharon", "src": "עיון — טבילה כגורם", "srcRef": null, "txt": "בעיה של גרסאות: בחלקן גורסים שהראייה היא בליל הטבילה, ויש הנועצים את הראייה בטבילה עצמה (שהטבילה גורמת, והיא וסת המעשה). הפוסקים חולקים אם אלו וסתות הגוף או המעשה. **ערוה\"ש** סובר שלא שייך לדבר על וסת כאן כלל, אלא זה ביטוי מושאל, שהרי לדעתו רמ\"ת היא חולי; לכן חוששים לכל דבר שיכול לגרום לסימפטום (דימום), ובכללו הטבילה.", "expandable": true}, {"layer": "rishon", "src": "הגהות מיימ' בשם מהרמ\"מ", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.10", "txt": "אשה שראתה מחמת תשמיש פעם/פעמיים, על אף שלא קבעה וסת - חוששת בפעם הבאה מתשמיש בזמן הדומה (ביחס לטבילה). ואחר שפרשו ולא שימשו ביום המסוים – בפעם הבאה לא צריכים לחוש. וכ\"פ בש\"ע."}, {"layer": "acharon", "src": "מנחת יעקב", "srcRef": null, "txt": "אם ראתה ביום הטבילה 3 פעמים – תולים בטבילה, ולא מוחזקת רמ\"ת גורף אלא רק ליום הטבילה", "under": true}, {"layer": "acharon", "src": "סדרי טהרה, ערוה\"ש", "srcRef": null, "txt": "חולקים: אחרי 3 פעמים כבר נחשוש לכל זמן, ותוחזק רמ\"ת. (ובכל מקרה, היום השלישי לטבילה חשיב רחוק)", "under": true}, {"subsubhead": "הרמ\"א"}, {"layer": "rishon", "src": "רשב\"א בתשובה", "srcRef": null, "txt": "אשה שראתה מחמת תשמיש ג' פעמים - צריכים להתגרש, ולא יכולים להשאר יחד אפילו בלא תשמיש (חשש שיקלו ויעברו, ווסתות דרבנן). ואם יש אדם שלישי – יכול להשאירה."}, {"layer": "rama", "src": "רמ\"א · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.10", "txt": "אשה שראתה ג' פעמים אחר טבילתה מחמת תשמיש, כל פעם בביאה הראשונה שאחרי הטבילה – אסורה לבעלה כאילו ראתה 3 פעמים רצופות (שהרי רואה תמיד אחר טבילה, ולא יכולים להימנע)."}, {"layer": "acharon", "src": "ש\"ך, חוו\"ד", "srcRef": null, "txt": "הרמ\"א מתכוון לאסור בכל יום שהוא, ולא רק ביום הטבילה (צריכים להתגרש אא\"כ תעשה בדיקת שפופרת)"}, {"layer": "acharon", "src": "כרתי ופלתי", "srcRef": null, "txt": "חולק: איך נאסור מישהי עולמית אם היו ביאות היתר בינתיים??", "under": true}, {"layer": "acharon", "src": "באר הגולה, ט\"ז", "srcRef": null, "txt": "כוונת הרמ\"א: אפילו אם לא היו ג' פעמים רצופים ממש - אלא אם היה תשמיש שלא ראתה בו בין לבין, עדיין נחשבים הפעמים שראתה (בתשמיש הראשון שאחר הטבילה) כרצופים.", "under": true}, {"subhead": "רמ\"ת אחר לידה (רמ\"א י')"}, {"layer": "rishon", "src": "דרכ\"מ · ר\"ח", "srcRef": null, "txt": "שיוך הדם לתשמיש - רק אם לא היו בכלל ביאות ללא דם (אם היו - מוכח שלא התשמיש גורם)"}, {"layer": "rishon", "src": "תשובת ר' יוחנן ל מהרי סגל", "srcRef": null, "txt": "אשה שאחרי לידה ראתה ג' פעמים מחמת תשמיש, ואז ראתה שלא מחמת תשמיש, ומאז לא ראתה – וכך שלוש פעמים (בשלוש הריונות). **מהרי\"ל**: מחמיר. **מהרי יוחנן**: תולים בלידה (דמי לידה), ולא בתשמיש."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.10", "txt": "אם אשה הייתה בהריון ג' פעמים, ואחר כל הריון ראתה מחמת תשמיש בביאה הראשונה בלבד (או 3 פעמים אך לא מהתשמיש הראשון) – יש שכתבו להקל ולהתירה, תולים בחולשת הלידה. אבל אם מהתשמיש הראשון שאחר הלידה ראו 3 פעמים רצופים – רמ\"ת. ובכל מצב – אם שימשו ולא ראתה, הוכח שיש מציאות שאינה רמ\"ת, ומותרים (עדיף מבדיקת שפופרת)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הדגש: תשמיש ללא ראייה - אף אם נעשה באיסור - מתיר ('דעדיף מבדיקת שפופרת').", "under": true}, {"subhead": "רמ\"ת בהפלגה (י\"א)"}, {"layer": "shulchan", "src": "ש\"ע עפ\"י מהרמ\"מ", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.11", "txt": "יש וסת רמ\"ת בהפלגה: אם רואה מחמת תשמיש, ולאחר חצי שנה (למשל) רואה שוב באותה עונה – תחשוש חצי שנה נוספת לאותה עונה. ואם קבעה וסת כזו ע\"י 3 הפלגות (4 ראיות) – אסורה, אך רק בזמן ההפלגה; בשאר הזמן מותרים בלי בדיקה."}, {"subhead": "רמ\"ת בחודש (ש\"ך על י\"א)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "יש וסת רמ\"ת בחודש: אם רואה מחמת תשמיש ביום א' בחודש – חוששת מיד בחודש הבא באותו יום ועונה. וכמו כל וסת, אם לא קבעה - נשבר אחרי פעם אחת שלא ראתה. ומי שקבעה וסת רמ\"ת בהפלגה צריכה לחוש גם לוסת רמ\"ת החודש."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "shfoferet"}, {"type": "sec", "id": "tliya"}, {"type": "sec", "id": "akira"}, {"type": "sec", "id": "zman"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"רואה מחמת תשמיש": "אשה שרואה דם בעקבות התשמיש — נאסרת אחר שלוש פעמים רצופות.", "בדיקת השפופרת": "שפופרת עם מכחול ומוך המדמה תשמיש, לברר אם הדם מן המקור או מן הצדדים.", "מן המקור": "דם היוצא מן הרחם — דם נידה האוסר.", "מן הצדדים": "דם שאינו מן הרחם (כגון ממכה) — אינו אוסר.", "וסת אונס": "וסת הנקבע לפי סיבה (כגון תשמיש), הצריך צירוף זמן כדי להיקבע.", "תלייה": "ייחוס הדם לסיבה אחרת (וסת/מכה/בתולים/לידה) כדי שלא ייחשב מחמת תשמיש.", "חזקת טהרה": "ההנחה שאשה טהורה עד שיתברר אחרת — בסיס להקלות בתליית הדם.", "ס\"ס": "ספק ספיקא — שני ספקות המצטרפים להקל.", "הפלגה": "מרווח קבוע בין ראייה לראייה, שעל פיו נקבע וסת."}, "subject": "נידה", "id": "roeh"}, {"topic": {"title": "כתמים", "eyebrow": "מבחני הרבנות · נידה · סימן ק\"צ", "siman": "Shulchan_Arukh,_Yoreh_De'ah.190", "intro": {"lead": {"t": "", "ref": ""}, "body": "**ראייה בלא הרגשה: דין כתם**\nבסימן קפג ראינו כי גם כאשר אשה ראתה דם, היא לא בהכרח טמאה. ישנם קריטריונים רבים לקביעת מעמדו של המראה: מה צבעו, מהיכן הגיע, ובאיזו דרך, האם מדובר בדם מכה, ועוד (מפורט בסי' קפג). בסימן קפח נידונו התכונות השונות של המראות ובעיקר הגוונים, ואילו מהם יחשיבו את המראה כטמא ואילו יחשיבוהו כטמא.\nבסימן זה, עלינו לתת את הדעת לקביעתו המשמעותית של **שמואל** (**נדה נז**) (נפסקה בש\"ע קפג, וכאן בסע' א), לפיה אם מדובר במראה לבדו, המגיע בלי הרגשה של האשה ביציאת דם מהרחם - הרי שהוא לכל היותר יטמא מדרבנן (במידה ויענה על קריטריוני הטומאה האחרים: צבע טמא, דם מהמקור וכו'. אם לא - יהיה טהור). \\ul{זהו אפוא עניינו של הביטוי ההלכתי '}\\ul{כתם}\\ul{': מראה כתם שנמצא בלי שהאשה הרגישה ביציאת דם, ועל כן, גם אם יהיה טמא - ייטמא מדרבנן}.\nמהי הרגשה? זו שאלה טובה. בגמרא ובראשונים לא כ\"כ עסקו בזה, מלבד ליקוטים של אמירות מכמה מקומות. לא אאריך בהגדרה זו כאן, אך אציין רק כי המקובל בימינו ברוב המחוזות הוא שלא להתייחס לאפשרות של הרגשה, בגלל שאין לדעת אם מדובר בהרגשה של יציאת הדם מהמקור או לא. משום שכך, לרוב הפוסקים, כשאשה מוצאת כתם שמראהו טמא, היא נטמאת מדרבנן, ולא מן התורה. הרב מלמד מבקש להכיר ביכולת של נשים לזהות את ההרגשה של הדימום ויחד עם זאת, את הטומאה של נשים מן התורה בעת נידתן.\\note{עיקר מסקנתו למעשה: \"לפיכך, אף שההרגשה המדויקת של פתיחת הרחם ותחילת יציאת הדם קהתה מעט, כלל ההלכה לא השתנה, וכל אשה שיודעת בבירור מתוך תחושות גופה שיוצא ממנה דם וסת, נטמאת מהתורה, ואין זה משנה מצירוף של אילו תחושות היא יודעת זאת. וכל שאינה יודעת שהיא מדממת מחמת וסת, דינו של הדם שהיא רואה כדין כתם שרק בתנאים מסוימים הוא טמא\".}\nאולם, על אף שלרוב, כשאשה תראה דם ביום יום נתייחס לכך כראייה בלא הרגשה (חוץ מהרב מלמד), יש בכל זאת כמה סיטואציות יוצאות דופן בהן כן נתייחס לאפשרות של הרגשה (ולפיכך גם: של הטמאות מן התורה). מדובר במצבים בהם מלכתחילה האפשרות של האשה לשים לב להרגשה של יציאת דם וסת מוטלת בספק (**רש\"י**). הספקות הם: הרגשת עד (כאשר אשה מבצעת בדיקת טהרה באמצעות עד שמכניסה לנרתיק), הרגשת שַמש (כאשר אשה משמשת עם בעלה), והרגשת מי רגליים (כאשר אשה נותנת שתן). ב-3 הסיטואציות בנרתיק של האשה מצוי דבר מה, שבוודאי מורגש בנוכחותו הפיזית. משום שכך, עולה החשש שמא האשה הרגישה גם יציאת דם וסת, אך בגלל שבמקביל הרגישה את הגורם האחר - לא נתנה דעתה לכך.\\note{ראוי לתת את הדעת לכך שרש\"י (דף נח, ד\"ה 'דרבנן') יושב על סוגיה שמזכירה את כל המצבים האלו והקשר ביניהם לבין הרגשת הדם. אלא שהסוגיה מזכירה אותם בשביל שימוש הפוך לגמרי(!). לפיה, בסיטואציות אלו דווקא יש להקל, ולא לטמא את האשה מהתורה, משום שעל אף שהרגישה – שמא מדובר בהרגשת שמש/עד/מי רגליים.} בין המקרים האלו, נראה כי המשמעותי ביותר להלכה הוא זה של הרגשת עד. משום שבעקבותיו, יוצא כי כל פעם שאשה מבצעת בדיקה פנימית כדי לבדוק את טומאתה, אם תמצא דם (על העד) - היא נטמאת מהתורה (מספק, כאמור).\nדיני כתמים הם בדיוק ההפך מבדיקת עד. הם עוסקים במצבים בהם מראה הכתם נמצא על הבגד, הסדינים, על הגוף וכן הלאה, אך לא על העד. לפיכך, כאמור, הכתם לא יטמא מן התורה, אלא רק מדרבנן.\n\n**תליית כתם**\nלא רק העובדה שלא מדובר בטומאה מן התורה מייחדת את דיני כתמים. עובדה אחרונה זו של המצאות הכתם שלא על עד בדיקה, אלא בסביבה אחרת, קשורה גם ביסוד המרכזי של דיני כתמים: היכולת לתלות כתם. ברוב רובם של דיני כתמים בסימן נבחנת האפשרות לפקפק על עצם היות הכתם כתם דם וסת שהגיע מן האשה. כלומר, על עצם היותו מטמא (כי הוא כלל לא שייך לה; כי הוא לא דם וסת, אלא דם מכה, ועוד). בכך, סימן קצ תופס את התנאי של דם מן המקור, ופורש את מגוון האפשרויות שבהן תנאי זה יכול 'לעזור'.\\note{אמנם טהרת כתם שנמצא על דבר שלא מקבל טומא ועל בגד צבעוני אינה קשורה לתנאי של דם מן המקור. נראה שמדובר במגמה הכללית שמשמיע ר' עקיבא במשנה להקל בכתמים.} לפקפוק זה מצטרפים שאר הפרטים של הסיטואציה: הגודל של הכתם, הגורם עליו נמצא הכתם, הצורה שלו, המקום בו הסתובבה האשה, ועוד. פקפוק זה בכתם מכונה 'תליית כתם'; וכאשר יש בסיס אפשרי לערעור זהותו של הכתם, אזי נתלה אותו בדבר מה, ונגיד שממנו הגיע הכתם, ולא מן האשה.\nהיכולת לתלות בכתם מקורה במשנה (פ' הרואה כתם) הגורסת כי האשה 'תולה בכל דבר שהיא יכולה לתלות'. במשנה זו, מובא גם מעשה על ר' עקיבא, המחזק ומעודד את השימוש ביכולת זו. באומרו לתלמידיו כי 'אמרו חכמים הדבר להקל' - הוא קובע כי כל יסוד דין כתמים (לאפוקי מראייה המלווה בהרגשה) עניינו להקל. זהו אפוא, עיקרם של דיני כתמים.\\note{לטון שבדברי ר' עקיבא ראוי לצרף את עניין שיעור כתם. כתם בקוטר של 2 ס\"מ ומטה אינו מטמא, משום שתולים אותו בדם של כינה שהייתה על האשה. על אף שכבר מאות שנים זו טענה שעשויה להשמע בלתי מציאותית, יכולת תלייה זו של הכתם לא עוזבת את ההלכה. בעקבות כך, מלמד החתם סופר כי לא מדובר באמירה מציאותית, אלא זו דרכה של המערכת ההלכתית לקבוע גדרים וגבולות סבירים ובכך, לשמור על שפיות מה בתוך הים הקשה והנוקשה של הלכות נדה, ולאפשר מרחב של היתר; גם במחיר של התגמשות בשורת הדין הראשונית. וז\"ל ערוה\"ש: \"..וטעמו של דבר פירשו חז\"ל [נ\"ח ב] דאל\"כ אין לך כל אשה שתהא טהורה לבעלה, שהרי אין לך כל מטה וכל סדין שלא נמצאו בם טיפי דמים מדם מאכולת ולכן שיערו חכמים שדם מאכולת אינו יותר מכגריס.}\n\n**תנאי טומאת כתם**\nגם אם לא ניתן לתלות כתם, מתבארים בסימן כמה תנאים כדי שהוא יהיה טמא: והרב מלמד מונה **3 תנאים** לכתם עליו גזרו חכמים שיטמא גם בלא הרגשה (בלי קשר לתלייה): (1) קוטר יותר מ-2 ס\"מ; (2) על רקע לבן; (3) על דבר שמקבל טומאה. ואנחנו מוסיפים: (4) צבע; (5) חלוק הבדוק (לט)."}}, "sections": {"hargasha": {"title": "הרגשה", "seif": "סעיף א׳", "sugya": null, "navAccent": "", "intro": "סעיף א' מבסס את יסוד הסימן: ראייה בלא הרגשה — 'כתם' — טומאתה מדרבנן בלבד. כאן מתבררים גם המצבים החריגים שבהם כן נתייחס להרגשה, ודין הרגשה בלא ראייה.", "ops": [{"subhead": "ראייה בלא הרגשה (דין כתם)"}, {"layer": "gemara", "src": "שמואל", "srcRef": null, "txt": "\\ul{אשה נטמאת רק אם ראתה והרגישה שיצא לה דם}. אם רק ראתה, בלא הרגשה - לא (\"דם יהיה זובה \\ul{בבשרה}\" - עד שתרגיש בבשרה)", "ref": {"label": "נדה נז · פ' הרואה כתם", "ref": "Niddah.57"}}, {"layer": "gemara", "src": "ר' ירמיה", "srcRef": null, "txt": "בלא הרגשה - נטמאת מדרבנן.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.1", "txt": "דבר תורה: אין האשה מטמאה ולא אסורה לבעלה עד שתרגיש שיצא דם מבשרה (**שמואל**). וחכמים גזרו על כתם שנמצא בגופה או בבגדיה, שהיא טמאה, ואסורה לבעלה אפילו לא הרגישה, \\ul{ואפילו אם בדקה עצמה ומצאה טהורה} (**ר' ירמיה**)."}, {"layer": "lead", "src": "", "srcRef": null, "txt": "אם כן, כתם שנמצא על בגדה או גופה של אשה, עשוי לטמא אותה. וגם אם בבדיקה פנימית היא נמצא טהורה."}, {"subsubhead": "היחס לכתמים"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "גם דברי **ר' עקיבא** **במשנה** ו**הברייתא** (**בפ' הרואה כתם**) רלוונטיים פה."}, {"layer": "gemara", "src": "במשנה, ר' עקיבא", "srcRef": null, "txt": "'לא אמרו חכמים הדבר להחמיר אלא להקל שנאמר ואשה כי תהיה זבה דם יהיה זובה בבשרה \\ul{דם ולא כתם}\\ul{'}."}, {"layer": "gemara", "src": "ובברייתא", "srcRef": null, "txt": "לא אמרו חכמים דיני כתמים להקל, אלא להחמיר!"}, {"layer": "gemara", "src": "ורבינא (לפי רש\"י)", "srcRef": null, "txt": "מבצע הרמוניה יפה בין המשנה לברייתא: אכן, הברייתא צודקת, וחכמים אסרו כתם, ובכך החמירו על דברי תורה, ולא הקלו בהם. אך גם ר' עקיבא צודק, ובדיני כתמים עצמם חכמים לא רצו להחמיר, אלא להקל. על כן, מאחר שהם מדרבנן, ומשום שזה לא דם נדה של ממש. - תולים כתם בכל דבר שאפשר וכו'"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "כלומר, חכמים אכן אסרו גם כתם, למרות שהוא בלא הרגשה, אך ברור שבדיני כתמים עצמם יש להקל, ולא להחמיר."}, {"subsubhead": "הרגישה, אך לא יצא הדם לחוץ"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "אבל אם מרגישה את צאת הדם, אפילו אם הדם לא יצא לחוץ, אלא רק ל'בית החיצון' – נטמאת מהתורה."}, {"layer": "mishna", "src": "במשנה", "srcRef": null, "txt": "כל הנשים מתטמאות בבית החיצון, שנאמר \"דם יהיה זובה \\ul{בבשרה}\""}, {"subsubhead": "כתם על בגד"}, {"layer": "acharon", "src": "פת\"ש בשם פנים מאירות", "srcRef": null, "txt": "(אביו): רק כתם שנמצא על בגדה של אשה נחשב לעניין גזרת חכמים. כתם שנמצא על בגדו של האיש - לא נחשב כתם ולא חוששים שממנה בא (רק אם קנח האיש את האיבר ומצא – נחשב שבא ממנה)."}, {"layer": "acharon", "src": "יחיאל העליר", "srcRef": null, "txt": "יש תוספתא מפורשת נגדו, שאומרת שאם נמצא כתם על בגד של מי שישן איתה – נחשב כתם.", "under": true}, {"subhead": "הרגשה בלא ראייה"}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "אשה שהרגישה שנפתח מקורה להוציא דם, אך אח\"כ בדקה ולא מצאה – טמאה (כי בטוח יצאה לפחות טיפת דם כחרדל)"}, {"layer": "rama", "src": "דרכ\"מ", "srcRef": null, "txt": "דבריו צריכים עיון.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.1", "txt": "\\ul{יש מי שאומר} שמי שהרגישה פתיחת מקור, אבל אח\"כ כשבדקה לא מצאה כלום - טמאה."}, {"layer": "acharon", "src": "בפוסקים", "srcRef": null, "txt": "יש שסברו כתרוה\"ד (**נוב\"י, חוו\"ד**) ויש שחלקו עליו (**יעב\"ץ**)."}, {"layer": "acharon", "src": "פת\"ש, ערוה\"ש", "srcRef": null, "txt": "אם הרגישה וראתה מראה טהורה (כבסי' קפח) - אפילו לתרוה\"ד טהורה. כי זה מה שהרגישה."}, {"layer": "acharon", "src": "שב יעקב", "srcRef": null, "txt": "הרגשה אוסרת לבדה רק אם בודקת מיד ואין כתם. משום שאז אומרים שאין סיכוי שסתם הרגישה, אלא יצא דם ונאבד. אבל אם בדקה אחרה זמן – טהורה."}], "pesak": null}, "hefsek": {"title": "הפסק טהרה ושבעה נקיים על ראיית כתם", "seif": "סעיף א׳", "sugya": null, "navAccent": "", "intro": "האם ראיית כתם — כראייה רגילה — מצריכה הפסק טהרה וספירת שבעה נקיים? והאם יום מציאת הכתם עצמו נספר במניין?", "ops": [{"subhead": "האם צריך הפסק טהרה ו-ז' נקיים"}, {"layer": "gemara", "src": "ר' זירא", "srcRef": null, "txt": "שואל את **ר' אסי** אם ראיית כתם מצריכה הפסק טהרה (כשם שראייה רגילה מצריכה) או לא. בתחילה ר' אסי לא משיב, אך לאחר דיון בדברי ר\"ל ור' יוחנן נזכר: \\ul{ראיית כתם מצריכה הפסק טהרה}.", "ref": {"label": "נדה נג · פ' בא סימן", "ref": "Niddah.53"}}, {"layer": "rishon", "src": "מ\"מ בשם רשב\"א ורמב\"ן", "srcRef": null, "txt": "הרואה כתם צריכה הפסק טהרה, ולמחרת תתחיל למנות שבעה נקיים. (זה בעקבות חומרת בנות ישראל, שהחמירו על עצמן שאפילו אם רואות טיפת דם כחרדל – נחשבות כזבות [ולא רק כנידה])"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.1", "txt": "אשה צריכה הפסק טהרה ושבעה נקיים גם על כתם (כמסקנת **ר' אסי**)."}, {"subhead": "האם יום מציאת הכתם נספר"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "בכתם גדול כך שיש לחוש בו לזיבות – סופרת 7 נקיים החל מיום שאחר יום מציאת הכתם. אם אין בכתם שיעור לחוש לזיבות – גם היום של מציאת הכתם נספר ל-7."}, {"layer": "rishon", "src": "מ\"מ בשם רשב\"א ורמב\"ן", "srcRef": null, "txt": "הרואה כתם צריכה הפסק טהרה, \\ul{ולמחרת} תתחיל למנות שבעה נקיים."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.1", "txt": "יום המציאה לא נספר לשבעה נקיים (**רשב\"א רמב\"ן**)."}, {"layer": "note", "src": "בחינת הכתם", "srcRef": null, "txt": "**מקום הכתם**: לא לכל כתם מתייחסים. רק למטה מן הסינר (גמרא). **סיטואציה**: לא רואה בוודאי מגופה (אפשר לתלות במשהו חיצוני) / רואה מגופה בוודאי (אפשר לתלות במכה/שירותים)."}], "pesak": null}, "ktana": {"title": "קטנה (מתי מתחילה לחוש לכתם)", "seif": "סעיפים ב׳-ד׳", "sugya": null, "navAccent": "", "intro": "קטנה נחשבת מסולקת דמים עד שראויה לראות (גיל 12 + סימנים). מתי מתחילה לחוש לכתמים — ומה דין ראייה חוזרת ועקירת וסת.", "ops": [{"layer": "lead", "src": "", "srcRef": null, "txt": "בסימנים קפט וקפד למדנו שקטנה נחשבת מסולקת דמים עד שמתחילה להיות ראויה לראות (הגיעה לגיל 12 + הביאה סימנים). ולכן גם אם רואה דם - חוששת רק לזמן הראייה עצמה. אבל אם ראתה 3 פעמים וקבעה וסת – מתחילה לחוש לזמן הקביעה."}, {"layer": "lead", "src": "", "srcRef": null, "txt": "לגבי כתמים מחלוקת ראשונים. מוסכם כי עד שלא הגיעה לגיל - אינה חוששת לכתמים (בכלל בכלל), ורק אם קבעה וסת - מתחילה לחוש לכתמים שרואה. ואם הגיעה לגיל - יש הסוברים שחוששת לכתמים, למרות שלא הביאה סימנים (**רש\"י**); אך יש הסוברים שאינה חוששת לכתמים, אלא עד שתביא סימני בגרות, כדין חשש מראייה (**רשב\"א**). ו**הש\"ע** נקט להקל כדעה הזו. אולם ביחס למה שנלמד ב-קפט כי אם רואה 3 פעמים מתחילה לחשוש – כן הוא הדין לגבי כתמים, בלא חולק."}, {"subhead": "עיקר דין קטנה (ב)"}, {"layer": "gemara", "src": "שמואל בשם רבי חנינא בן אנטיגנוס", "srcRef": null, "txt": "כל הנשים – כתמן טמא למפרע (כלומר, כראייה). חוץ מקטנה שלא הגיע זמנה לראות (שלא חוששים לכתמים שלה כלל).", "ref": {"label": "נדה דף ה", "ref": "Niddah.5"}}, {"layer": "note", "src": "אחרי גיל 12 - האם צריך סימני בגרות?", "srcRef": null, "txt": "**רש\"י**: מספיק שהגיעה לגיל (לא צריך סימנים). **רשב\"א, מ\"מ ברמב\"ם**: צריך סימני בגרות (כדין כל חשש מראייה. כבסי' קפד ו-קפט)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.2", "txt": "כתמים מטמאים קטנה רק כשמגיע זמנה לראות. דהיינו: גיל 12 + הביאה סימנים (**רשב\"א, מ\"מ ברמב\"ם**)."}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "כתם בלא הרגשה - דרבנן. ועל קטנה לא גזרו חכמים. לפיכך, **משמע מהש\"ך**, ש\\ul{אפילו אם יודעים בוודאות שהגיע הכתם מגופה - טהורה}."}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "חולק: גזרו חכמים על כתם בלא הרגשה גם על קטנה. ואם בוודאי הגיעה מגופה - תהיה טמאה (אא\"כ יש במה לתלות).", "under": true}, {"subhead": "אם ראתה כמה פעמים דם (ב-ג)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "האם נאמר שראיית דם גורמת לקטנה להטמא מכתמים למרות שלפי ההגדרה אינה ראויה לראות?"}, {"layer": "gemara", "src": "נדה י", "srcRef": null, "txt": "ראתה דם פעם אחת, ואח\"כ (לא בסמוך) ראתה כתם - טהורה. ראתה דם פעמיים, ואח\"כ ראתה כתם – **חזקיה**: הכתם מטמא (כי אם תראה פעם נוספת - הרי זו ראייה שלישית, ונטמאת). **ר' יוחנן**: הכתם לא מטמא. טהורה (רק כשתהיה מוחזקת ע\"י 3 ראיות – יטמא). והגמרא מסיקה כר' יוחנן: קטנה שלא ראתה עדיין 3 פעמים (אפילו אם כבר ראתה פעמיים) ומצאה כתם - טהורה.", "ref": {"label": "נדה י ע\"א", "ref": "Niddah.10a"}}, {"layer": "rishon", "src": "ר\"ח, רשב\"א, רמב\"ם", "srcRef": null, "txt": "כר' יוחנן (אחרי 3 ראיות דם וסת - כתם מטמא)."}, {"layer": "rishon", "src": "רש\"י, רבותינו הצרפתים, רמב\"ן", "srcRef": null, "txt": "הראייה הראשונה לא נספרת (כי זו 'ראיית עראי'). לכן, רק אחרי שתראה 4 ראיות חוששים לכתם.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.2", "txt": "כרשב\"א (כתמים לא מטמאים לאחר 2, אלא רק אחר 3 ראיות) (ולא כרש\"י ורבותנו הצרפתים)."}, {"layer": "note", "src": "מה נחשב ראייה?", "srcRef": null, "txt": "**רב חלקיה בר טובי**: תינוקת שלא הגיע זמנה לראות, אפילו אם שופעת במשך שבעה ימים – נחשב ראייה אחת. **רב שימי בר חייא**: מדלפת אינה כשופעת (אלא כפוסקת. שנחשב שרואה כמה פעמים). ~~**רש\"י**: מדלפת=טיף אחר טף. (ב\"י: כוונת רש\"י שמטפטפת בלי הפסקות. אך אם יהיו הפסקות – יחשב ככמה ראיות)~~"}, {"layer": "rishon", "src": "ב\"י ברש\"י, רשב\"א, טור", "srcRef": null, "txt": "אם ראתה בהפסקות 3 פעמים ביום - נחשב 3 ראיות."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "רק 3 וסתות נחשבים ל-3 ראיות. (ובוודאי שלא כמה ראיות ביום אחד) ~~(רמב\"ם חזק. כל העניין בדין של 3 ראיות הוא להכניס את דין כתמים רק למי שנכנסת למחזוריות של ראייה של פוריות)~~", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.3", "txt": "אם הייתה שופעת או מטפטפת בלי הפסקה – ראייה אחת. אם הפסיקה בין ראיה לראיה, אפילו מעט – נחשב כמה ראיות. לכן, אם ראתה בהפסקות 3 פעמים ביום - מוחזקת בדמים, ואם תראה כתם – תטמא (**ב\"י ברש\"י, רשב\"א טור**). **י\"א**: רק 3 וסתות נחשבים 3 ראיות (**רמב\"ם**)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "ויש להחמיר כסיעת **רשב\"א טור**.", "under": true}, {"layer": "note", "src": "הייתה שופעת, הפסיקה מעט, וחזרה להיות שופעת", "srcRef": null, "txt": "**ב\"ח, ש\"ך**: נחשב כראייה אחת (הטור והש\"ע דברו על מזלפת, ולא על שופעת) (דחוק). **ט\"ז**: נחשב ככמה ראיות (וכפשט לשון הש\"ע)."}, {"subhead": "כשעוקרת וסת (ד)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "בסי' קפ\"ט סע' כז למדנו, כי אם קטנה שאינה ראויה לראות קובעת וסת, היא ככל הנשים; אך אם היא עוקרת וסת – היא נחשבת שוב מסולקת דמים, ולכן לא חוששת אלא לזמן ראייה (או אם תקבע שוב וסת). **הרשב\"א** קובע כאן כי הוא הדין כאן לגבי חשש כתמים: אם נעקר וסתה - חוזרת לעיקר הדין של סע' ב'. כתמים לא מטמאים אותה."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "תינוקת שלא ראתה 3 עונות – שוב לא חוששת לכתמים. אבל אם ראתה 3 ראיות – חוזרת 'למגרש של הגדולות', ושוב חוששת לכתמים."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "אפילו אם ה-3 ראיות בעונות קטנות.", "under": true}, {"layer": "rishon", "src": "רשב\"א בשם מקצת מפרשים", "srcRef": null, "txt": "קטנה - אעפ\"י שהגיע זמנה לראות – לא חוששת לכתמים (ואם יש כתם - טהור). ו**רשב\"א** עצמו: כל שהגיע זמנה לראות – אפילו לא ראתה - כתמה מטמא."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.4", "txt": "אם פסקה מלראות במשך 90 יום – לא חוששת לכתמים (כתמה טהור) (**כברייתא + רשב\"א**). תינוקת שהגיע זמנה לראות – כתמה מטמא (ככל אשה. גם בלי שתקבע וסת) (**רשב\"א ושלא כקצת מפרשים**)."}], "pesak": null}, "veset": {"title": "קביעת וסת על ידי כתמים", "seif": "סעיף נ״ד", "sugya": null, "navAccent": "", "intro": "", "ops": [{"layer": "lead", "src": "", "srcRef": null, "txt": "אין קביעת וסת על ידי כתם. רק אם מדובר בעד הבדוק (שאז מדובר בעצם בראייה שמטמאה מהתורה, כי דלמא הרגישה ולאו אדעתא). פירוט הדין נמצא בסיכום של קפט (קביעת וסתות)."}], "pesak": null}, "tnaim": {"title": "על מה נמצא הכתם? (דבר שאינו מקבל טומאה / בגד צבעוני)", "seif": "סעיף י׳", "sugya": null, "navAccent": "", "intro": "שני תנאים לטומאת כתם, שהם גם כלים לטהרו: הדבר שעליו נמצא הכתם צריך לקבל טומאה, ולהיות בגד לבן (לא צבעוני).", "ops": [{"subhead": "דבר שאינו מקבל טומאה"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "כל גזרת כתמים של חז\"ל יש לה שתי בחינות: א. לטמא את הדבר שעליו נמצא הכתם; ב. לטמא את האשה לבעלה. רבי נחמיה לומד כי מאחר ועל דבר שאינו מקבל טומאה בוודאי שהגזרה לא עובדת, והוא לא ייטמא, הרי שגם על טומאת אשה לבעלה יש להחיל את יוצא הדופן הזה. כאילו הוא רוצה לומר 'שלא תהיה אשה טמאה בזמן שהדבר שעליו נמצא הכתם טהור'."}, {"layer": "mishna", "src": "רבי נחמיה", "srcRef": null, "txt": "כל דבר שאינו מקבל טומאה - אינו מקבל כתמים (ואינו נטמא מהם). לכן: אם אשה ישבה על ספסל של אבן, או על האיצטבא של מרחץ - רבי נחמיה מטהר.", "ref": {"label": "נדה נט · פ' האשה שהיא עושה צרכיה", "ref": "Niddah.59"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מסיקים שהלכה כרבי נחמיה. [טעמו של ר' נחמיה\\note{שווה לראות את הנו\"ב קמא סי' נב שניסה לתת טעם לר' נחמיה. אולם ערוה\"ש דבק בפשטות טעם הדין והרים גבה על הנו\"ב: \"כיון דאין בהדבר טומאה לא גזרו גם על טומאת האשה לבעלה וזהו עיקר הטעם מדין זה ויש טרח ליתן טעם אחר ואינו עיקר\".}: \"ונקתה לארץ תשב\" – כיוון שישבה לארץ – נקתה]"}, {"layer": "rishon", "src": "רוב הראשונים (רמב\"ם, רא\"ש ביניהם)", "srcRef": null, "txt": "כרבי נחמיה. **ראב\"ד**: אין הלכה כרבי נחמיה."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.10", "txt": "כתם שנמצא על דבר שאינו מקבל טומאה - לא גזרו עליו, ואינו מטמא (**ר' נחמיה ורוב הראשונים**). [בין הדברים שאינם מקבלים טומאה: כלי אבן, כלי גללים, אדמה, דבר המחובר לקרקע; רמ\"א: בית הכסא שאינו מקבל טומאה; נו\"ב: גם אם המושב מקבל טומאה, היות והוא מחובר לקרקע - אינו מקבל]"}, {"layer": "acharon", "src": "סדרי טהרה", "srcRef": null, "txt": "כל עוד בסופו של דבר שעליו נמצא הכתם נטמא - גם האשה נטמאת. לכן, אם מצאה כתם על דבר שאינו מקבל טומאה, אבל מתחתיו יש דבר שמקבל טומאה, כך שהדבר התחתון מטמא את העליון ב\\ul{טומאת משא} - נטמאת.\\note{שבט הלוי (על ס\"ט): אם דבר שאינו מקובל טומא נמצא על היד (כגון, אם קנחה בטישו שהיה בידה) נטמאת (בכך בעצם עוקר כמעט את הקולא של דבר שאינו מקבל טומאה)}", "under": true}, {"layer": "acharon", "src": "נו\"ב", "srcRef": null, "txt": "גם אם דבר מקבל טומאה רק מדרבנן – חוששים לכתמים שמוצאים עליו.", "under": true}, {"subsubhead": "כלי חרס"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "כלי חרס מיוחד הוא ביכולתו להטהר. הוא יכול להטמא רק מבפנים, אבל גבּו נשאר תמיד טהור."}, {"layer": "gemara", "src": "רבי חנינא", "srcRef": null, "txt": "רבי נחמיה היה מטהר גם כשכתם היה נמצא על אחורי כלי חרס. ~~פשיטא! מהו דתימא: ליגזור גבו אטו תוכו - קמ\"ל. (=ולא גזר על החוץ משום תוכו שכן נטמא)~~"}, {"layer": "gemara", "src": "אביי", "srcRef": null, "txt": "~~מטהר היה ר' נחמיה במטלניות שאין בהן 3 על 3, דלא חזיין לא לעניים ולא לעשירים.~~", "under": true}, {"subsubhead": "נייר"}, {"layer": "acharon", "src": "נוב\"י", "srcRef": null, "txt": "נייר שעשוי מבגדים מקבל טומאה. **סד\"ט, חת\"ס**: שום נייר לא מקבל טומאה."}, {"subsubhead": "אמצעי היגיינה"}, {"layer": "zman", "src": "הרב הנקין", "srcRef": null, "txt": "תחתונית אינה מקבלת טומאה. [באורות הטהרה מביא סיכום הדעות. יוצא על מדריכות כלות שאוסרות]"}, {"subsubhead": "טומאת נגעים"}, {"layer": "acharon", "src": "ש\"ך, תורת השלמים", "srcRef": null, "txt": "(דוגמא: רצפה של בית. בית מקבל טומאת נגעים): דבר שמקבל טומאת נגעים – נחשב מקבל טומאה (וכתם שנמצא עליו - אוסר). **כרתי ופלתי, ערוה\"ש**: טומאת נגעים לא נחשבת. והכתם לא יטמא."}, {"subhead": "בגד צבעוני"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "**תנא קמא**: בגד צבוע - מטמא משום כתם. **רבי נתן בר יוסף**: בגד צבוע אינו מטמא משום כתם, שלא תקנו בגדי צבעונין לאשה אלא להקל על כתמיהן. ~~[המשך הסוגיה היפה: תקנו? מאי תקנינהו? אלא שלא הותרו בגדי צבעונין לאשה אלא להקל על כתמיהן. הותרו - מכלל דאסירי? אין, ד**תנן**: בפולמוס של אספסינוס גזרו על עטרות חתנים ועל האירוס. בקשו לגזור על בגדי צבעונין, אמרי: הא עדיפא]~~", "ref": {"label": "נדה סא · פ' האשה שהיא עושה", "ref": "Niddah.61"}}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "כתם שנמצא על בגד צבעוני - מטמא (כת\"ק). **רמב\"ם, רא\"ש, רשב\"א**: לא מטמא (כרבי נתן). **רשב\"א**: כל המחמיר בדברים אלו תבוא עליו הברכה."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.10", "txt": "כתם שנמצא על בגד צבוע טהורה (**רבי נתן**, רמב\"ם רא\"ש רשב\"א)."}, {"layer": "acharon", "src": "מעיל צדקה", "srcRef": null, "txt": "א. דין זה נאמר על \\ul{כל הצבעים}. ב. כתם שנמצא על בגד שהוא גם לבן וגם בצבע (פסים למשל), מתייחסים רק לחלק שעל הלבן. לכן, אם אין על החלק הלבן כגריס ועוד - לא אוסר. (אבל, אם הכתם נמשך לאורך שני חלקים לבנים בבגד – גם אם מפריד ביניהם חלק צבעוני, הם מצטרפים לאסור)"}, {"layer": "acharon", "src": "חוו\"ד, תפארת צבי, תשובה מאהבה", "srcRef": null, "txt": "חולקים על ב. של מעיל צדקה: גם חלק הכתם שעל הקטע הצבעוני בבגד מצטרף לשיעור הכתם.", "under": true}, {"subsubhead": "ללבוש בכוונה בגדי צבעונים"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "תקנו על נשים ללבוש בגדים צבעוניים כדי להצילה מדין הכתמים (כך קורא את רבי נתן)."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "מקשה על הרמב\"ם. ~~להבנת הב\"י, נראה שהסוגיה משנה את לשון רבי נתן הראשונית. בהתחלה משמעה שתקנו בגדי צבעונין לנשים, ואח\"כ משנה את זה רק להיתר. מציע: או שהיתה לרמב\"ם גרסא אחרת בגמרא; או שהוא מבין שהשאלה 'מאי תקנינהו' היא לא שאלה שבאה להקשות, אלא שאלה שמבקשת לחזור לסיבה של התקנה.~~", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "תלבש אשה בגדי צבעונים כדי להצילה מן הכתמים (עפ\"י רמב\"ם בהבנתו בגמרא)."}, {"layer": "acharon", "src": "עמודי כסף", "srcRef": null, "txt": "רק כדי שכלל לא תטמא. אבל בשבעה נקיים (בהם אנו רוצים לברר כי האשה אכן יוצאת מטומאתה) – לא תשים בגדים צבעוניים.", "under": true}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "ב-3 ימים הראשונים - לא תשים צבעוני; אח\"כ יכולה לשים (עפ\"י הרמ\"א ב-קצו י' שאומר שב-3 ימים הראשונים של ה-7 נקיים אין לתלות כתם).", "under": true}, {"layer": "zman", "src": "הרב הנקין", "srcRef": null, "txt": "~~תחתונית אינה מקבלת טומאה, ולכן אם אשה תראה עליה כתם לא תאסר. ולמרות זאת, מותר לשים תחתונית בשבעה נקיים (בשונה מעמודי כסף)~~", "under": true}, {"subsubhead": "תחתונים"}, {"layer": "acharon", "src": "חתם סופר", "srcRef": null, "txt": "היתר כתם בבגדים צבעוניים אינו תופס בבגד הסמוך לבשר (תחתונים). **חזון איש, טהרת הבית**: תופס גם בבגד הסמוך לבשר."}, {"subsubhead": "בגד צבעוני + חשש הרגשה"}, {"layer": "acharon", "src": "סדרי טהרה", "srcRef": null, "txt": "כתם שנמצא על בגד צבעוני לאחר ששמשה/השתינה - כבר חוששים. כי זה ספק דאורייתא."}, {"layer": "zman", "src": "טהרת הבית", "srcRef": null, "txt": "אפשר להקל גם בזה (זה שתרגיש בזמן שהשמש שם/מי רגליים - לא שכיח. לכן אין להחמיר).", "under": true}], "pesak": null}, "shiur": {"title": "שיעור גודל כתם ותלייה בכינה", "seif": "סעיפים ה׳-ח׳", "sugya": null, "navAccent": "", "intro": "בחטיבה זו מכונסות כלל הדרכים לתליית כתם. תלייה בכינה (מאכולת) מתפקדת כשיעור גודל מינימלי: כתם עד 'כגריס ועוד' — תולים בכינה, ואינו מטמא.", "ops": [{"layer": "lead", "src": "", "srcRef": null, "txt": "בחטיבה זו מכונסים כלל הדרכים האפשריות (המוזכרות בסימן זה) לתליית כתם בדבר מה אחר. תלייה בכינה מתפקדת יותר כשיעור גודל מינימלי, ולכן ראוי היה להכניסה בחטיבה של תנאים לטומאת כתם. אך הכנסתי אותה כאן מפני שהבירור ההלכתי שלה בחז\"ל ובפוסקים נעשה בשפה של תלייה."}, {"layer": "note", "src": "דירוג היכולת לתלות כתם לפי הסיטואציה", "srcRef": null, "txt": "**כתם שעל בשרה** (מן החגור ולמטה או למעלה+הזדקרה) - אפשר לתלות רק במכה או אם נתעסקה בכתמים. **על חלוק (בגד)** – למרות שעשוי להיות טמא (כגון שמתחת לחגור), אפשר לתלות בכל דבר. **כתם גם על החלוק וגם על הבשר** – אפשר לתלות בכל מה שיכולה. **על עד בדיקה בדוק (נקי) שבוחנת מיד** – שום סיכוי לתלות."}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "ותולה בכל דבר שהיא יכולה לתלות... \\ul{הרגה מאכולת - הרי זו תולה בה}.", "ref": {"label": "נדה נח · פ' הרואה כתם", "ref": "Niddah.58"}}, {"subhead": "רק אם הרגה מאכולת? (ה)"}, {"layer": "mishna", "src": "במשנה", "srcRef": null, "txt": "**ת\"ק**: רק אם הרגה מאכולת תולה בה. **רבי חנינא בן אנטיגנוס**: גם אם לא הרגה - תולה במאכולת כתם שגודלו עד כגריס של פול."}, {"layer": "rishon", "src": "רמב\"ם, רשב\"א, רא\"ש ועוד", "srcRef": null, "txt": "כר' חנינא בן אנטיגנוס."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.5", "txt": "אם כתם פחות מכגריס ועוד - תולים לומר שהוא דם כינה, גם אם לא הרגה כינה."}, {"subhead": "השיעור (ה)"}, {"layer": "gemara", "src": "רב הונא", "srcRef": null, "txt": "תולה בפחות מכגריס. **רב חסדא**: תולה עד כגריס (כולל). ~~(מחלוקת רב הונא-רב חסדא היא מחלוקת 'עד ועד בכלל')~~"}, {"layer": "rishon", "src": "רשב\"א, רא\"ש, רמב\"ם", "srcRef": null, "txt": "כרב חסדא. **תרומה**: כרב הונא."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.5", "txt": "אשה עשויה להטמא מכתם רק אם גודלו 'כגריס ועוד' (**רב חסדא, רשב\"א**). אבל אם גודלו פחות מזה (כגריס ומטה) - תולה."}, {"layer": "lead", "src": "", "srcRef": null, "txt": "(שיעור כגריס מגיע מדיני נגעים.) יש מחלוקת הפוסקים מה השיעור למעשה. להרב מן הפוסקים מדובר ב-\\ul{2 ס\"מ} (20 מ\"מ)."}, {"layer": "acharon", "src": "פת\"ש בשם יראים", "srcRef": null, "txt": "אנחנו לא בקיאים בשיעור. צריך להזהר. אם יש מעט דם, כך שיודעים שתכלס זו לא מאכולת - לא תולים. **בשמים רא\"ש**: בעקבות היראים. צריך שיהיה מוכח שזה דם מאכולת (סמיכות הדם וכד'). **פת\"ש** עצמו: ראיתי לרבותי שכולם משערים הגודל ותולים ולא חשים בדבר."}, {"layer": "note", "src": "מהו כגריס?", "srcRef": null, "txt": "**משנה נגעים**: גופה של בהרת – כגריס; מקום הגריס – תשע עדשות. **רמב\"ם, אגור בשם מהרי\"ל**: כגריס = 9 עדשים."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.5", "txt": "שעור גריס = 9 עדשים = 36 שערות (**רמב\"ם ומהרי\"ל עפ\"י משנה נגעים**)."}, {"layer": "rama", "src": "דרכ\"מ, רמ\"א", "srcRef": null, "txt": "36 שערות כמו שהן קבועות בגוף האדם.", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כוונתו בזה - כולל הרווחים שיש כשהשערות על גוף האדם. לא צריך כ-36 שערות צפופות. **סדרי טהרה**: גם אם צרור הרבה דם, בצורה כזו שאם היה פשוט לצדדים היה יותר מכגריס – משערים כמו שהוא כך. ובכל מקרה, הכל לפי ראות עיני המורה.", "under": true}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "נזדמן לה גריס גדול יותר מ-9 עדשים – תולה בו. (כי שיעור גריס של כתמים להקל. כד**ר' אבהו**). **טור**: אבל יש גודל מקסימום: גריס הגדול."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.5", "txt": "אם לאשה נזדמן כתם כגודל גריס, שהוא יותר גדול מ-9 עדשים – עדיין תולה בו (**רמב\"ן**)."}, {"layer": "acharon", "src": "חתם סופר", "srcRef": null, "txt": "~~הולך עם זה חזק. השיעור לא אמור להיות מציאותי מבחינת ההשוואה למאכולת. זו הדרך של חז\"ל לשמור על שפיות של גזרת כתמים.~~ **פניני הלכה**: כותב כחת\"ס.", "under": true}, {"subhead": "צבע דם כינה"}, {"layer": "rishon", "src": "ראב\"ד, מעיל צדקה", "srcRef": null, "txt": "דם כינה הוא אדום. לכן, אם הכתם הוא שחור - אפילו אם הוא כגריס ומטה - לא תולים."}, {"layer": "acharon", "src": "סדרי טהרה", "srcRef": null, "txt": "במקומות שמצויים פרעושים שמשאירים לכלכוך שחור - יש לתלות בהם. והכל כפי ראות עיני המורה.", "under": true}], "pesak": null}, "bgd-basar": {"title": "כתם על הבגד או על הבשר", "seif": "סעיף ו׳", "sugya": null, "navAccent": "", "intro": "האם היתר התלייה בכינה (עד כגריס) חל גם על כתם שנמצא על הבשר, או רק על הבגד?", "ops": [{"layer": "rishon", "src": "רשב\"א, ראב\"ד", "srcRef": null, "txt": "ההיתר של כתם בכגריס ופחות - גם אם הכתם על הבגד וגם אם הוא על הבשר."}, {"layer": "rishon", "src": "רמב\"ם, רא\"ש", "srcRef": null, "txt": "על הבשר – אם סמוך לבית התורפה - חוששים גם בכגריס ופחות.", "under": true}, {"layer": "rishon", "src": "מ\"מ", "srcRef": null, "txt": "~~הרמב\"ם לא סובר כמו כולם. לדעתו, בפחות מגריס מדובר בספק, ולא תולים. ו**בגמרא** מופיע שכשיש כתם ויש ספק – אם הספק בבגד: מקלים; אם הספק בבשר: מחמירים.~~ לפיכך \\ul{הרמב\"ם מחמיר בבשר} (ספק בשר להחמיר).", "under": true}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "אם נמצא גם על הבגד וגם על הבשר – מקלים. **ריו\"ח**: תמהה על הרמב\"ם. יש סוגיה מפורשת שמתירה בכתם בשיעור כגריס שעל \\ul{בשרה}.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.6", "txt": "דין השיעור בכתם - גם על כתם שנמצא על בגדה של אשה, וגם על כתם שנמצא על בשרה (**רשב\"א**). **י\"א**: כתם שעל בגד – תולין במאכולת לפי השיעור כגריס; כתם שעל הבשר – אין תולים במאכולת כלל. חוששים לכל שיעור (**רמב\"ם, רא\"ש**)."}, {"layer": "acharon", "src": "ש\"ך, מהר\"א ברודא", "srcRef": null, "txt": "יש להחמיר כרמב\"ם.", "under": true}, {"layer": "acharon", "src": "סדרי טהרה", "srcRef": null, "txt": "כותב כסברת הב\"י להלכה (ביחס לרמב\"ם והרא\"ש): אם הכתם נמצא גם על הבגד וגם על הבשר - כן תולים אותו בכינה. ומוסיף: ואפילו אם הכתם שבבגד לא כנגד הכתם שעל הגוף (כי בגדים זזים).", "under": true}], "pesak": null}, "tzura": {"title": "צורת הכתם", "seif": "סעיפים ה׳, ח׳-ט׳", "sugya": null, "navAccent": "", "intro": "האם צורת הכתם (ארוך, מרובע, טיפין-טיפין) משפיעה על השיעור ועל היכולת לתלות?", "ops": [{"layer": "lead", "src": "", "srcRef": null, "txt": "בעיקר לשונו, הש\"ע נוקט שכל כתם עד כגריס - אפשר לתלות. לא משנה מה צורתו, והאם הוא נמצא על הבשר או על הבגד. אך אם הוא כגריס ועוד - אי אפשר לתלותו. ואם צורתו משונה - אם הוא על הבשר - אין לומר שמכך מוכח שלא מדובר בדם שהגיע מן המקור; אלא רק השיעור מאפשר לתלות. ואם מדובר בכמה כתמים הסמוכים - אנו בוחנים כל אחד לפי גודלו, ולא מצרפים אותם יחד (רשב\"א בשם ר' יונה)."}, {"subsubhead": "האם אפשר להקל בשיעור של חלק מהצורות? (ה,ט)"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "(בסוף הפרק): כתם ארוך - מצטרף (כלומר, למרות שהוא לא עגול – מצרפים את כל אורכו לבחון אם שיעור כגריס)."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "כל הצורות טמאות אם הן כנגד מקום הערווה. הצורה לא מעניינת, אלא המיקום."}, {"layer": "shulchan", "src": "טור, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.9", "txt": "צורת הכתם לא משנה. גם אם הוא ארוך או מרובע – אם גדול מכגריס – טמא. (ואין מקום להגיד על סמך הצורה שלא הגיע מהגוף)"}, {"subsubhead": "כמה טיפות סמוכות (ח)"}, {"layer": "gemara", "src": "רבי ירמיה", "srcRef": null, "txt": "בעי: טיפין טיפין מהו? ובגמרא לא איפשיטא שאלתו, ולכן כביכול אזלינן לחומרא. אך מאידך: **תא שמע**: טיפין טיפין – אין מצטרפין.", "ref": {"label": "נדה נח · פ' הרואה כתם", "ref": "Niddah.58"}}, {"layer": "rishon", "src": "תוס', רשב\"א, ראב\"ד", "srcRef": null, "txt": "טיפין טיפין על חלוק – לא מצטרפין לכגריס לאסור. טיפין טיפין על הבשר – קטנים - מצטרפים לכגריס [גדולים, אך פחות מכגריס - לא מצטרפים (לא מגופה. מאכולת)]."}, {"layer": "rishon", "src": "רשב\"א בשם ר' יונה", "srcRef": null, "txt": "טיפין טיפין לא מצטרפין לאסור. גם אם הם על הבשר.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.8", "txt": "כמה כתמים קטנים סמוכים אינם מצטרפים יחד לשערם ככתם אחד (**בשם ר' יונה**). **י\"א**: רק על חלוק כתמים סמוכים לא מצטרפים. על הבשר - מצטרפים (**תוס', רשב\"א**)."}, {"layer": "acharon", "src": "חכמת אדם", "srcRef": null, "txt": "(צירוף על בגד מקומט): אם כתם נמצא על הקמטים של בגד (כך שיש מקום לחשוב שמדובר בכתם אחד, ומאז מתחו את הבגד) – בכל זאת לא מצטרפים."}, {"subsubhead": "'החסרה' מכתם הגדול מכגריס (כו-כט)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "\\ul{סעיפים כו-כח} יסודם באותה סוגיה. תחילת הסוגיה במחלוקת **ר' חנינא** ו**ר' ינאי**, המתעסקת בשאלה של כינה הנמצאת על כתם, והאם אפשר ויעזור 'לתלות' את הכתם בכינה, למרות שהכתם גדול משיעור הכינה (סעיף כח). עפ\"י **ר' ינאי והרא\"ש**, פוסק **הש\"ע** שגריס שלם יורד מן החישוב לשיעור הכתם בעקבות הכינה. סעיף כט הוא רק תת-קביעה של **הרשב\"א** כי הדין דומה גם לגבי פשפש. בסוגיה מובאת גם **שאלה של ר' ירמיה**: אם יש כתם גדול מכגריס, ויש 'קייס' לחלק ממנו – האם אפשר לתלות רק חלק? \\ul{סעיפים כו-כז} עוסקים בשאלה זו."}, {"layer": "note", "src": "כשיש כינה/פשפש (כח-כט)", "srcRef": null, "txt": "שורה תחתונה: כתם בגודל שני גריסים, שעל חציו נמצאת כינה - לא מצטרף לאסור (כי גריס אחד תולים בכינה)."}, {"layer": "gemara", "src": "ר' חנינא", "srcRef": null, "txt": "מצאה עליה כתם שגודלו כגריס ועוד, כאשר על ה'ועוד' רצופה מאכולת – טמאה (תולים במאכולת רק כאשר הכתם כגריס). **ר' ינאי**: טהורה (מאחר והמאכולת בפנינו על הכתם - אפשר לתלות בה חלק מהכתם; יוצא ששאר הכתם כבר אין בו שיעור כגריס ועוד)."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "כר' חנינא. **רא\"ש, רשב\"א רמב\"ן (למ\"מ)**: כר' ינאי. ו**הרא\"ש** מוסיף שהדין תופס עד שני גריסים (שאז מאחר ונתלה גריס אחד במאכולת, תמיד ישאר פחות משיעור כתם).", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.28", "txt": "אם אישה מצאה על בגדה כתם של שני גריסין, ועליו כינה מעוכה - טהורה (**ר' ינאי, רא\"ש**). הגריס הראשון - מהכינה. את הגריס השני - תולים בכינה אחרת (כי הוא לא בשיעור של כתם)."}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מדייק כאן יפה, כי אין מדובר בתלייה כלל, שהרי הכינה פה. אין כאן ספק, אלא ודאות.", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "(פשפש, כט): כאשר מדובר בפשפש - השיעור אינו גריס, אלא תורמוס. וכ\"פ הש\"ע."}, {"layer": "lead", "src": "", "srcRef": null, "txt": "**ע\"י תלייה של חלק מהכתם (כו-כז)** — בעקבות מחלוקת ר' חנינא ור' ינאי, שאלת **ר' ירמיה**: התעסקה בכתמים ששיעורם כגריס, ונמצא עליה כגריס ועוד - האם יכולה לתלות את הכגריס ועוד בכגריס? **תא שמע**: \\ul{נתעסקה במועט - אין תולה בו מרובה}. אך הגמרא משאירה את שאלת ר' ירמיה בצריך עיון.", "ref": {"label": "נדה נח · פ' הרואה כתם", "ref": "Niddah.58"}}, {"layer": "note", "src": "ד' מצבי ה'החסרה' (כו-כז)", "srcRef": null, "txt": "**א.** התעסקה בכגריס ונמצאו שני גריסים: **רא\"ש, טור**: אי אפשר לתלות (כברייתא); **רמב\"ם, רמב\"ן, רשב\"א בת\"ה הקצר**: אפשר. **ש\"ע**: כרמב\"ם והרשב\"א. **ב.** התעסקה בכגריס ונמצא שני גריסים ועוד: לכל הדעות א\"א לתלות וטמאה (וכן ש\"ע). **ג.** התעסקה בפחות מכגריס ונמצא כגריס ועוד: **רשב\"א**: אפשר לתלות (מפרש 'מרובה' = שני גריסין ועוד); וכן ש\"ע. **ד.** התעסקה בפחות מכגריס ונמצא כשני גריסין: **ב\"י**: יש לטהר (וכן ש\"ע); **גר\"א, ש\"ך, ט\"ז**: טעות ביד הש\"ע, כולם מטמאים."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "בקולא כללית על הברייתא: 'נתעסקה במועט אין תולה בו מרובה' - \\ul{דווקא כשהאשה יודעת בבירור שהכתם שהתעסקה בו מועט מהכתם שמצאה - לא תולה}. אבל אם לא בטוחה – תולה."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "בכל הפסקים שהביא הש\"ע - יש מחמירים ומטמאים (רא\"ש והמשתמע ממנו). אבל לגבי פסק א. - נראה שיש לסמוך על המקלים, כי בכתמים אזלינן לקולא. + אם רק יודעת שנתעסקה בכתמים, אך לא מה השיעור – מקלים ואומרים שנתעסקה בשיעור שמספיק לתלות (כפירוש **הרשב\"א**).", "under": true}], "pesak": null}, "pishpesh": {"title": "תלייה בפשפש", "seif": "סעיף ז׳", "sugya": null, "navAccent": "", "intro": "בשונה מכינה, בפשפש תולים רק אם יש סימן שהיה אחד — הרגה או הריחה — ורק עד שיעור תורמוס.", "ops": [{"layer": "lead", "src": "", "srcRef": null, "txt": "לא להתבלבל עם תלייה בכינה. בשונה מכינה (שר' חנינא בן אנטיגנוס, רוב הראשונים והש\"ע פוסקים שעד כגריס אפשר לתלות גם בלי שהרגה) — בפשפש יכולה לתלות רק אם יש סימנים לכך שהיה אחד: אם הרגה או אם יש ריח שלו. וגם אז, רק עד כתורמוס. במובן הזה, פשפש הוא כמו תלייה רגילה — נבחנת סבירות האפשרות שהדם לא ממנה. אבל בכינה, בכך שתולים גם בלי שהרגה – מדובר בשיעור מינימלי של כתם, בלי קשר לסבירות המצאות כינה."}, {"layer": "gemara", "src": "ר\"נ בר יצחק", "srcRef": null, "txt": "תולה בפשפש - ועד כתורמוס. **חכמים**: תולים בפשפש. **ר' חנינא בן אנטיגנוס**: אין תולים בפשפש.", "ref": {"label": "נדה נח · פ' הרואה כתם", "ref": "Niddah.58"}}, {"layer": "rishon", "src": "רא\"ש, טור", "srcRef": null, "txt": "תולה בפשפש רק אם הרגה או הריחה אחד. ~~(קיי\"ל כר' חנינא בן אנטיגנוס שלא תולים בפשפש. אבל אם הרגה אחד - מוכח שהכתם ממנו, ואז כן תולים [כי אז זה כמו נתעסקה בכתמים])~~"}, {"layer": "rishon", "src": "רשב\"א, ריו\"ח", "srcRef": null, "txt": "במקומות שיש פשפשים - תולים גם אם לא הרגה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.7", "txt": "אשה שיש לה כתם, והרגה פשפש או הריחה ריחו – תולה בו את הכתם, עד שיעור כתורמוס (לשון ה**טור**)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כרשב\"א (איפה שמצויים פשפשים - תולה גם אם לא הרגה).", "under": true}], "pesak": null}, "ikaron": {"title": "עקרון התלייה", "seif": "סעיפים י״ח, מ״א, ל׳", "sugya": null, "navAccent": "", "intro": "בסעיף זה מסכם הטור את העקרון של תלייה בכל דבר שאפשר, ומביא את המקרים מהגמרא (משנה וברייתא) שאפשר לתלות בהם — ומכאן גם דין תלייה במכה. בהמשך יידונו תלייה לפי מיקום הכתם בגוף/בבגד, תלייה באנשים אחרים ועוד.", "ops": [{"subhead": "היחס לכתמים (יח) — 'להקל' או 'להחמיר'?"}, {"layer": "note", "src": "", "srcRef": null, "txt": "(מובא גם לעיל, סע' א) — דברי **ר' עקיבא** במשנה ובברייתא (בפ' הרואה כתם)."}, {"layer": "mishna", "src": "ר' עקיבא", "srcRef": null, "txt": "לא אמרו חכמים הדבר להחמיר אלא להקל, שנאמר 'ואשה כי תהיה זבה דם יהיה זובה בבשרה' — \\ul{דם ולא כתם}."}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "לא אמרו חכמים דיני כתמים להקל, אלא להחמיר!", "under": true}, {"layer": "gemara", "src": "רבינא (לפי רש\"י)", "srcRef": null, "txt": "מבצע הרמוניה יפה בין המשנה לברייתא: אכן הברייתא צודקת — חכמים אסרו כתם, ובכך החמירו על דברי תורה ולא הקלו בהם. אך סוף סוף מדובר בדין דרבנן, ו\\ul{משום שכתמים דרבנן מקלים בהם ותולים כתם בכל דבר שאפשר} (ולפיכך גם ר' עקיבא צודק). [חכמים אכן אסרו גם כתם אף שהוא בלא הרגשה, אך בדיני כתמים עצמם יש להקל ולא להחמיר.]", "ref": {"label": "נדה נח · פ' הרואה כתם", "ref": "Niddah.58"}}, {"layer": "shulchan", "src": "טור, ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.18", "txt": "כיוון שכתמים דרבנן — מקלים בהם, ותולה בכל דבר שיכולה לתלות."}, {"subhead": "במה תולה (יח)"}, {"layer": "mishna", "src": "משנתנו", "srcRef": null, "txt": "ותולה בכל דבר שהיא יכולה לתלות. לכן, אם: \\ul{שחטה בהמה חיה ועוף}, או \\ul{נתעסקה בכתמים}, או \\ul{ישבה על יד מי שעסוקים בכתמים}, או \\ul{הרגה מאכולת}, או \\ul{יש בה מכה שיכולה להגלע ולהוציא דם} — תולה."}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "'נתעסקה בכתמים' ו'מכה' — אלו המקרים היחידים שאם נמצא כתם על בשרה אפשר לתלות.", "under": true}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "מונה גם את \\ul{עברה בשוק של טבחים} כמקרה שתולה בו — גם אם יש ספק אם ניתז עליה."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.18", "txt": "כיוון שכתמים דרבנן מקלים, ותולה אשה בכל דבר שיכולה לתלות (**משנה + טור**), ומפרט את כל המקרים שבמשנה ובברייתא (שחטה, עברה שוק של טבחים…). אבל אם נמצא על בשרה — אינה תולה, אלא אם כן יש לה מכה (ואפילו חייתה — אם יש סיכוי שתתגלע, ואף שיש עליה קרום עכשיו — **רשב\"א**)."}, {"layer": "note", "src": "דוגמאות נוספות לתלייה (סדרי טהרה)", "srcRef": null, "txt": "**טבק**: אשה ששאפה טבק ויצאה ליחה מהאף על בגד פשתן שלה — אפשר לתלות בו. **בגד אדום**: אם לובשת בגד אדום ומזיעה — הצבע יכול לעבור לבגד לבן שמעליו/מתחתיו. **שחטה חיה** (**חמודי דניאל**): לא שהדם השפריץ מהחיה לאזור המקור, אלא שידיה המגואלות בדם השחיטה נגעו במקור."}, {"subhead": "תליית כתם בשבעת הנקיים (מא; קצו, י)"}, {"layer": "lead", "src": "", "srcRef": null, "txt": "להלכה **הרמ\"א** פוסק שיש לחוש למחמירים ולא לתלות כתם בשבעה נקיים, אלא רק אם הוא פחות מכשיעור או במכה המוציאה דם. **הש\"ך** מחמיר אף בזה, ובין הפוסקים יש קולות, ו**הגר\"ע** התיר את החומרא לגמרי. הש\"ע לא התייחס לכך מפורשות, אך נראה שפסק כרשב\"א ודבריו בב\"י שאין חילוק בין שבעה נקיים לשאר הימים — ותמיד אפשר לתלות כתם."}, {"layer": "rishon", "src": "רשב\"א, ב\"י", "srcRef": null, "txt": "תולים כתם גם בשבעה נקיים (כשחכמים הקלו בכתמים לא חילקו בין ז' נקיים לשאר זמן)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.190.41", "txt": "(מא): פוסק כן."}, {"layer": "rishon", "src": "מרדכי, הגהות מיימ'", "srcRef": null, "txt": "3 הימים הראשונים של השבעה נקיים צריכים להיות נקיים לגמרי; לפיכך אם רואה בהם כתם — אי אפשר לתלותו כדרך שתולים כל כתם.", "under": true}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "כתם כשיעור (גריס ועוד) — לא תולים; פח
