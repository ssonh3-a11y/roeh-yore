});

// ---------- ask the summary ----------
// SECLIST is derived per topic in deriveTopic
var ASK_SCOPE='topic';
function _askStrip(x){return String(x||'').replace(/\*\*/g,'').replace(/~~/g,'')
  .replace(/\\ul\{([^}]*)\}/g,'$1').replace(/\\col\{[0-9A-Fa-f]{6}\}\{([^}]*)\}/g,'$1')
  .replace(/\\note\{([^}]*)\}/g,'$1').replace(/\\cite\{([^}]*)\}\{[^}]*\}/g,'$1')

function _askPick(q,pool,budget){
  var terms=_qterms(q).filter(function(w){return w.length>1;});
  var scored=pool.map(function(r){var hay=_norm(r.key+' '+r.txt),sc=0;
    terms.forEach(function(t){var vs=[t]; if(t.length>3&&'בהוכלמש'.indexOf(t.charAt(0))>-1)vs.push(t.slice(1));
      var best=0,inKey=false; vs.forEach(function(v){var c=hay.split(v).length-1; if(c>best)best=c; if(r.key.indexOf(v)>-1)inKey=true;});
      if(best)sc+=Math.min(best,4); if(inKey)sc+=6;});
    return {r:r,s:sc};});
  scored.sort(function(a,b){return b.s-a.s;});
  var out=[],used=0;
  for(var i=0;i<scored.length;i++){ if(scored[i].s<=0)break;
    var t=scored[i].r; if(used+t.txt.length>budget)continue;

var _STOP={'יש':1,'אם':1,'האם':1,'מה':1,'את':1,'של':1,'על':1,'כי':1,'לא':1,'הוא':1,'היא':1,
 'זה':1,'זו':1,'כן':1,'גם':1,'או':1,'אבל':1,'כדי':1,'בין':1,'עם':1,'ניתן':1,'כיצד':1,'איך':1,'מתי':1,
 'למה':1,'מדוע':1,'אין':1,'רק':1,'כל':1,'עוד':1,'אחד':1,'וכן':1,'צריך':1,'לי':1,'לו':1,'הם':1};
function _stem(w){return (w.length>3&&'בהוכלמש'.indexOf(w.charAt(0))>-1)?w.slice(1):w;}
function _qterms(q){return _norm(q).split(' ').filter(function(w){return w.length>1&&!_STOP[w];});}
function _near(a,b){return a.length>=4&&b.length>=4&&(a.indexOf(b)===0||b.indexOf(a)===0)&&Math.abs(a.length-b.length)<=2;}
function _wordHit(words,t){var ts=_stem(t),n=0;
  for(var i=0;i<words.length;i++){var w=words[i],ws=_stem(w);
    if(w===t||ws===ts||w===ts||ws===t){n+=2;continue;}
    if(_near(w,t)||_near(ws,ts)||_near(ws,t)||_near(w,ts))n+=1;}
  return n;}
function _hasTerm(hay,t){return _wordHit(String(hay).split(' '),t)>0;}
function _askPick(q,pool,budget){
  var terms=_qterms(q); if(!terms.length)return [];
  var scored=pool.map(function(r){var kw=String(r.key).split(' '),tw=_norm(r.txt).split(' '),sc=0;
    terms.forEach(function(t){var a=_wordHit(tw,t),b=_wordHit(kw,t);
      if(a)sc+=Math.min(a,4); if(b)sc+=Math.min(b*3,6);});
    return {r:r,s:sc};});
  scored.sort(function(a,b){return b.s-a.s;});
  var top=scored.length?scored[0].s:0;
  if(top<3)return [];
  var thresh=Math.max(3,Math.round(top*0.3)), out=[], used=0;
  for(var i=0;i<scored.length;i++){ if(scored[i].s<thresh)break;
    var t=scored[i].r; if(used+t.txt.length>budget)continue;
    out.push(t); used+=t.txt.length; if(out.length>=18)break;}
  return out;}

  const subjItems=subjOrder.map(s=>'<button class="tb-subj-item'+(s===subj?' cur':'')+'" data-gotosubject="'+esc(s)+'">'+esc(s)+'</button>').join('');
  const curLbl='<span class="tb-sim">'+esc(_simanLabel(cur))+'</span><span class="tb-ttl">'+esc(cur.topic.title)+'</span>';
  const items=sibs.map(t=>'<button class="tb-dd-item'+(t.id===CUR.id?' cur':'')+'" data-gototopic="'+t.id+'">'+
      '<span class="tb-sim">'+esc(_simanLabel(t))+'</span><span class="tb-ttl">'+esc(t.topic.title)+'</span></button>').join('');
  bar.innerHTML='<button class="tb-collapse" title="הסתרה/הצגה" aria-label="הסתרה/הצגה">'+(TBCOLLAPSED?'▾':'▴')+'</button>'+
    '<span class="tb-logo" id="tb-logo" title="לדף הבית" role="button" tabindex="0"></span>'+
    '<div class="tb-subjdd">'+
      '<button class="tb-subj" id="tb-subjbtn" title="החלפת מקצוע">'+esc(subj)+'<span class="tb-subj-caret">▾</span></button>'+
      '<div class="tb-subj-panel" id="tb-subjpanel" hidden>'+subjItems+'</div>'+
    '</div>'+
    '<span class="tb-mini">'+esc(cur.topic.title)+'</span>'+
    '<div class="tb-topic">'+
      '<div class="tb-dd">'+
        '<button class="tb-dd-btn" id="tb-ddbtn" aria-haspopup="listbox">'+curLbl+'<span class="tb-dd-caret">▾</span></button>'+
        '<div class="tb-dd-panel" id="tb-ddpanel" hidden>'+items+'</div>'+
      '</div>'+
    '</div><div class="tb-sec" id="tb-sec"></div>';
  bar.classList.toggle('tb-collapsed',TBCOLLAPSED);
  bar.style.display='flex';
  fillBarLogo();
}
function updateTopicbarSection(id){
  const host=document.getElementById('tb-sec'); if(!host) return;
  const i=SECORDER.indexOf(id), prev=i>0?SECORDER[i-1]:null, next=i<SECORDER.length-1?SECORDER[i+1]:null;
  const cell=(sid,cls,arrow)=>{ if(!sid) return '<span class="tbs-cell tbs-empty"></span>';
    const s=SECTIONS[sid], seif=(s.seif||'').replace('סעיפים ','').replace('סעיף ','');
    const lbl='<span class="tbs-name">'+esc(s.title)+(seif?' · '+seif:'')+'</span>', ar='<span class="tbs-arrow">'+arrow+'</span>';
    return '<button class="tbs-cell '+cls+'" data-goto="'+sid+'">'+(cls==='tbs-prev'?ar+lbl:lbl+ar)+'</button>'; };
  host.innerHTML=cell(prev,'tbs-prev','›')+cell(next,'tbs-next','‹');
}
var CHELEK={"נידה":"יורה דעה","איסור והיתר":"יורה דעה","שבת":"אורח חיים","תפילה וברכות":"אורח חיים"};
function _chelek(D){var s=D.subject||'';if(CHELEK[s])return CHELEK[s];var r=String(D.topic.siman||'');
  if(r.indexOf('Orach')>-1)return 'אורח חיים';
  if(r.indexOf('Yoreh')>-1)return 'יורה דעה';
  if(r.indexOf('Even')>-1)return 'אבן העזר';
  if(r.indexOf('Choshen')>-1)return 'חושן משפט';return '';}
function _simanOnly(D){var eb=(D.topic.eyebrow||'').split('·').map(function(x){return x.trim();});
  var last=eb.length?eb[eb.length-1]:'';var m=last.match(/סימ(?:ן|נים)\s+(.+)$/);
  return m?m[1].trim():'';}
function _plain(s){return String(s||'').replace(/\*\*/g,'').replace(/~~/g,'')
  .replace(/\\ul\{([^}]*)\}/g,'$1').replace(/\\col\{[0-9A-Fa-f]{6}\}\{([^}]*)\}/g,'$1')
  .replace(/\\note\{([^}]*)\}/g,'$1').replace(/\\cite\{([^}]*)\}\{[^}]*\}/g,'$1')
  .replace(/\\ref\{([^}]*)\}\{[^}]*\}/g,'$1').replace(/\s+/g,' ').trim();}
function _norm(s){return String(s||'').replace(/[\u05f4"\u05f3']/g,'').toLowerCase();}
var SEARCH_IDX=null;
function buildSearchIndex(){
  if(SEARCH_IDX)return SEARCH_IDX;
  var out=[];
  SITE.topics.forEach(function(T){
    var tt=T.topic.title, sim=_simanOnly(T);
    for(var sid in T.sections){var sc=T.sections[sid],parts=[];
      if(sc.intro)parts.push(sc.intro);
      (sc.flow||[]).forEach(function(b){parts.push((b.head||'')+' '+(b.body||''));});
      (sc.ops||[]).forEach(function(o){parts.push((o.src||'')+' '+(o.txt||'')+' '+(o.subhead||'')+' '+(o.subsubhead||''));});
      if(sc.pesak)parts.push(sc.pesak);
      var txt=_plain(parts.join(' '));
      out.push({tid:T.id,sid:sid,topic:tt+(sim?' ('+sim+')':''),subj:T.subject||'',
        sec:(sc.seif?sc.seif+' \u00b7 ':'')+sc.title,txt:txt,
        title:_norm(tt+' '+sc.title),hay:_norm(tt+' '+sc.title+' '+txt)});
    }
  });
  SEARCH_IDX=out;return out;
}
function _snip(txt,term){var i=_norm(txt).indexOf(term);
  if(i<0)return {pre:txt.slice(0,120)+(txt.length>120?'\u2026':''),hit:'',post:''};
  var a=Math.max(0,i-50),b=Math.min(txt.length,i+term.length+70);
  return {pre:(a?'\u2026':'')+txt.slice(a,i),hit:txt.slice(i,i+term.length),
          post:txt.slice(i+term.length,b)+(b<txt.length?'\u2026':'')};}
function runSearch(q){
  var terms=_norm(q).split(/\s+/).filter(Boolean); if(!terms.length){showHome();return;}
  var hits=buildSearchIndex().filter(function(r){return terms.every(function(t){return r.hay.indexOf(t)>-1;});});
  hits.sort(function(a,b){var f=function(r){return terms.every(function(t){return r.title.indexOf(t)>-1;})?0:1;};return f(a)-f(b);});
  document.querySelector('.grid').classList.add('home'); tree.innerHTML='';
  {var _tb=document.getElementById('topicbar'); if(_tb)_tb.style.display='none';}
  document.getElementById('home-link').style.display='none';
  {var _sn=document.getElementById('site-name'); if(_sn)_sn.style.display='none';}
  document.getElementById('hbrow').textContent='\u05d7\u05d9\u05e4\u05d5\u05e9';
  document.getElementById('htitle').textContent='\u201c'+q+'\u201d';
  var body=hits.length?hits.slice(0,80).map(function(r){var sp=_snip(r.txt,terms[0]);
      return '<button class="sr-item" data-t="'+r.tid+'" data-s="'+r.sid+'">'+
        '<div class="sr-top">'+esc(r.subj)+(r.subj?' \u00b7 ':'')+esc(r.topic)+'</div>'+
        '<div class="sr-sec">'+esc(r.sec)+'</div>'+
        '<div class="sr-snip">'+esc(sp.pre)+(sp.hit?'<mark>'+esc(sp.hit)+'</mark>':'')+esc(sp.post)+'</div></button>';
    }).join(''):'<div class="sr-empty">\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0\u05d5 \u05ea\u05d5\u05e6\u05d0\u05d5\u05ea \u05e2\u05d1\u05d5\u05e8 \u201c'+esc(q)+'\u201d.</div>';
  main.innerHTML='<div class="sr-head">'+hits.length+' \u05ea\u05d5\u05e6\u05d0\u05d5\u05ea</div>'+body;
  main.querySelectorAll('.sr-item').forEach(function(b){b.onclick=function(){openTopic(b.getAttribute('data-t'),b.getAttribute('data-s'));};});
  main.scrollIntoView({behavior:'smooth',block:'start'});
}
function openTopic(id,gotoSec){
  const D=SITE.topics.find(t=>t.id===id)||SITE.topics[0];
  deriveTopic(D); ASK_SCOPE='topic';
  document.querySelector('.grid').classList.remove('home');
  var _ch=_chelek(D),_sm=_simanOnly(D),_sj=D.subject||'';
  document.getElementById('hbrow').innerHTML=(_ch?esc(_ch)+' · ':'')+(_sj?'<span class="subj-link" data-homesubject="'+esc(_sj)+'">'+esc(_sj)+'</span>':'');
  var _slk=document.querySelector('#hbrow .subj-link');
  if(_slk)_slk.onclick=function(e){e.preventDefault();showHome(this.getAttribute('data-homesubject'));};
  document.getElementById('site-name').style.display='flex';
  document.getElementById('htitle').textContent=D.topic.title+(_sm?' ('+_sm+')':'');
  document.title=D.topic.title+' · '+(SITE.title||'סיכומי הלכה');
  document.getElementById('home-link').style.display=SITE.topics.length>1?'inline-block':'none';
  buildNav(); ((INTRO.body||'').replace(/\s/g,'')?showIntro():(SECORDER.length?showSection(SECORDER[0]):showIntro())); buildTopicbar(); if(gotoSec&&SECTIONS[gotoSec])showSection(gotoSec);
}
function showHome(openSubject){
  document.querySelector('.grid').classList.add('home');
  tree.innerHTML='';
  document.getElementById('home-link').style.display='none';
  document.getElementById('site-name').style.display='none';
  {const _tb=document.getElementById('topicbar'); if(_tb)_tb.style.display='none';}
  document.getElementById('hbrow').textContent='';
  document.getElementById('htitle').textContent='';
  document.title=SITE.title||'סיכומי הלכה';
  // group topics by exam subject (מקצוע), preserving order
  const groups=[],byId={};
  SITE.topics.forEach(t=>{const s=t.subject||'כללי'; if(!byId[s]){byId[s]={subject:s,topics:[]};groups.push(byId[s]);} byId[s].topics.push(t);});
  const simanNum=t=>parseInt((t.topic.siman||'').split('.').pop())||0;
  groups.forEach(g=>g.topics.sort((a,b)=>simanNum(a)-simanNum(b)));
  const card=t=>{const n=Object.keys(t.sections).length; const eb=(t.topic.eyebrow||'').split('·').slice(-1)[0].trim();
    const rec=t.recommendedOrder?' rec':'';
    const badge=t.recommendedOrder?'<span class="rec-badge">'+t.recommendedOrder+'</span>':'';
    return '<a class="topic-card'+rec+'" data-topic="'+t.id+'">'+badge+'<div class="tc-eyebrow">'+esc(eb)+'</div>'+
      '<div class="tc-title">'+esc(t.topic.title)+'</div><div class="tc-meta">'+n+' יחידות</div></a>';};
  const recStrip=g=>{const recs=g.topics.filter(t=>t.recommendedOrder).sort((a,b)=>a.recommendedOrder-b.recommendedOrder);
    if(!recs.length) return '';
    return '<div class="rec-strip"><span class="rec-lbl">◆ סדר לימוד מומלץ</span><span class="rec-seq">'+
      recs.map(t=>'<a class="rec-chip" data-topic="'+t.id+'">'+esc(t.topic.title)+'</a>').join('<span class="rec-arrow" dir="ltr">&#8592;</span>')+
      '</span></div>';};
  main.innerHTML=HOMEHERO+'<div class="subjects">'+groups.map(g=>
    '<div class="subject-group'+((openSubject&&g.subject===openSubject)?'':' collapsed')+'">'+
      '<button class="subject-head"><span class="sh-caret">▾</span><span class="sh-title">'+esc(g.subject)+'</span><span class="sh-count">'+g.topics.length+' נושאים</span></button>'+
      '<div class="subject-topics">'+recStrip(g)+g.topics.map(card).join('')+'</div>'+
    '</div>').join('')+'</div>';
  main.querySelectorAll('.topic-card').forEach(c=>c.onclick=()=>openTopic(c.dataset.topic));
  main.querySelectorAll('.rec-chip').forEach(c=>c.onclick=()=>openTopic(c.dataset.topic));
  main.querySelectorAll('.subject-head').forEach(b=>b.onclick=()=>b.closest('.subject-group').classList.toggle('collapsed'));
  ASK_SCOPE='all';
  var _askBox=document.createElement('div'); _askBox.innerHTML=askHTML(); main.appendChild(_askBox); wireAsk();
  if(openSubject){var _og=Array.prototype.slice.call(main.querySelectorAll('.subject-group')).filter(function(x){var t=x.querySelector('.sh-title');return t&&t.textContent===openSubject;})[0];
    if(_og)_og.scrollIntoView({behavior:'smooth',block:'start'});}
}
document.getElementById('home-link').onclick=e=>{e.preventDefault();showHome();};
document.getElementById('site-name').onclick=e=>{e.preventDefault();showHome();};
(function(){var inp=document.getElementById('q-search'),box=document.getElementById('searchbox'),cl=document.getElementById('sb-clear');
  if(!inp)return; var tm=null;
  inp.addEventListener('input',function(){box.classList.toggle('has',!!inp.value);clearTimeout(tm);
    var v=inp.value.trim(); tm=setTimeout(function(){ if(v.length>=2)runSearch(v); else if(!v)showHome(); },220);});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){clearTimeout(tm);var v=inp.value.trim();if(v)runSearch(v);}
    if(e.key==='Escape'){inp.value='';box.classList.remove('has');showHome();}});
  if(cl)cl.onclick=function(){inp.value='';box.classList.remove('has');inp.focus();showHome();};})();
// --- הלוגו בסרגל: שכפול מהכותרת + חשיפה לפי גלילה ---
function fillBarLogo(){
  var host=document.getElementById('tb-logo'); if(!host||host.firstChild) return;
  var src=document.querySelector('#site-name .sl-lockup svg'); if(!src) return;
  var c=src.cloneNode(true); c.removeAttribute('id'); c.setAttribute('aria-hidden','true');
  host.appendChild(c);
}
function wireLogoReveal(){
  var hdr=document.getElementById('site-name'), bar=document.getElementById('topicbar');
  if(!hdr||!bar||!('IntersectionObserver' in window)) return;
  if(window._logoRevealObs) window._logoRevealObs.disconnect();
  window._logoRevealObs=new IntersectionObserver(function(es){
    var vis=es[0].isIntersecting;
    var on = !vis && bar.style.display!=='none' && hdr.style.display!=='none';
    bar.classList.toggle('tb-logo-on', on);
  },{threshold:0});
  window._logoRevealObs.observe(hdr);
}
document.addEventListener('keydown',function(e){
  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.id==='tb-logo'){
    e.preventDefault(); showHome();}
});
if(SITE.topics.length===1){openTopic(SITE.topics[0].id);}else{showHome();}
wireLogoReveal();
</script>
