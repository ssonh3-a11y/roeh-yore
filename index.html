<title>רואֶה יורֶה - סיכומים ברורים למבחני הרבנות</title>
<meta name="description" content="סיכומי הלכה אינטראקטיביים למבחני הרבנות הראשית">
<meta property="og:type" content="website">

<meta property="og:description" content="סיכומי הלכה אינטראקטיביים למבחני הרבנות הראשית">

<style>
:root{
  --paper:#EBE6DB; --card:#F8F4EB; --card-2:#F2EDE1;
  --ink:#211C15; --ink-soft:#6B6153; --ink-faint:#9A9083;
  --rule:#D7CEBC; --line:#E2DACA;
  --pasuk:#8C6D2C; --mishna:#2F4C86; --gemara:#3E6BA6; --rishon:#4B7C6E;
  --shulchan:#211C15; --rama:#6A4A86; --acharon:#9A6A3A; --zman:#B0562E;
  --pesak:#8A2E3B; --gilt:#A9812F;
  --brand:#2A3346;
  --display:'Suez One','Frank Ruhl Libre',serif;
  --body:'Frank Ruhl Libre','Noto Serif Hebrew','Times New Roman',serif;
  --ui:'Heebo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{direction:rtl;background:var(--paper);color:var(--ink);
  font-family:var(--body);font-size:18px;line-height:1.72;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

header.top{border-bottom:1px solid var(--rule);background:linear-gradient(180deg,#F1ECE1,var(--paper))}
.eyebrow{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.14em;color:var(--ink-soft)}
h1.topic{font-family:var(--display);font-weight:400;font-size:clamp(34px,6vw,58px);margin:.18em 0 .1em;line-height:1.02}
.subtitle{font-family:var(--ui);color:var(--ink-soft);font-size:15px;margin:0 0 20px}
.header-inner{padding:26px 0 22px}

.grid{display:grid;grid-template-columns:250px 1fr;gap:34px;align-items:start;padding:30px 0 90px}
nav.rail{position:sticky;top:16px;font-family:var(--ui);background:rgba(248,244,235,.8);border:1px solid var(--line);border-radius:14px;padding:14px 13px;box-shadow:0 2px 10px rgba(45,33,12,.05)}
.rail-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--ink-faint);margin:0 0 9px;padding:0 4px 8px;border-bottom:1px solid var(--line)}
.node{margin:1px 0}
.node .row{display:flex;align-items:stretch;gap:2px}
.node a.lbl{
  display:block;flex:1;text-decoration:none;color:var(--ink-soft);font-size:14.5px;
  padding:8px 12px;border-radius:8px;line-height:1.3;border:1px solid transparent;
  transition:background .15s,color .15s;cursor:pointer}
.node a.lbl:hover{background:var(--card-2);color:var(--ink)}
.node a.lbl.active{background:var(--card);color:var(--ink);border-color:var(--line);font-weight:600}
.node a.lbl .seif{color:var(--gilt);font-weight:700;font-size:12px;margin-inline-end:6px}
.node.group>.row>a.lbl{font-weight:600;color:var(--ink)}
.node a.lbl.accent{color:var(--pesak);font-weight:700}
.node a.lbl.accent:hover{background:#F4E9E6}
.node a.lbl.accent .accent-glyph{margin-inline-end:5px}
.caret{width:26px;border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:12px;
  border-radius:7px;display:flex;align-items:center;justify-content:center}
.caret:hover{background:var(--card-2);color:var(--ink)}
.children{margin-inline-start:14px;border-inline-start:1px solid var(--line);padding-inline-start:6px;
  overflow:hidden;transition:max-height .22s ease}
.children.collapsed{max-height:0!important}
.children a.lbl{font-size:13.5px;color:var(--ink-soft)}

main{min-width:0}

/* intro (collapsible) */
details.intro-strip{background:var(--card-2);border:1px solid var(--line);border-radius:11px;margin:0 0 20px}
details.intro-strip>summary{font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:.06em;
  color:var(--ink-soft);padding:11px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
details.intro-strip>summary::-webkit-details-marker{display:none}
details.intro-strip>summary::before{content:"▸";color:var(--gilt);transition:transform .15s}
details.intro-strip[open]>summary::before{transform:rotate(90deg)}
.intro-body{padding:2px 18px 16px;font-size:17px;color:#2c261d}
/* standalone intro page — on a distinct card, not the bare interface background */
.intro-full .intro-body{padding:20px 24px;background:linear-gradient(180deg,#f4efe4,#f1ebdd);
  border:1px solid var(--line);border-radius:13px;box-shadow:0 1px 0 #e6ddc9}
.intro-body .ib-p{margin:0 0 13px;text-align:justify}
.intro-body .ib-p:last-child{margin-bottom:0}
.intro-lead{font-family:var(--display);font-size:20px;color:var(--pasuk);margin:0 0 10px}
.intro-lead-line{margin:0 0 12px;color:#2c261d;text-align:justify}
.intro-lead-line .intro-quote{color:#4a4235}
sup.fn{color:var(--gilt);cursor:pointer;font-size:.7em;margin-inline-start:1px;font-weight:700;user-select:none}
sup.fn:hover{color:var(--pesak)}
.abbr{cursor:help}
.src-conn{font-weight:400;color:var(--ink-soft);font-size:.92em}
.src-ref{font-family:var(--ui);font-size:12.5px;font-weight:500;color:var(--ink-soft)}
.src-ref .srclink{color:var(--gemara);border-bottom-color:#c3b48f}
.srclink.iref{color:inherit;border:none;background:none;font:inherit;text-decoration:none;cursor:pointer;padding:0}
.srclink.iref:hover{text-decoration:underline;text-decoration-style:dotted}

.sec-head{margin:0 0 4px}
.sec-kicker{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.1em;color:var(--gilt)}
h2.sec-title{font-family:var(--display);font-weight:400;font-size:clamp(26px,4vw,36px);margin:.1em 0 .3em;line-height:1.1}
.spanning{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);margin:-2px 0 10px}

.sugya{font-family:var(--ui);font-size:13.5px;color:var(--ink-soft);
  margin:2px 0 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sugya .pin{color:var(--gemara);font-weight:700}
.srclink{color:var(--gemara);font-weight:600;cursor:pointer;border-bottom:1px dashed #9db7d6}
.srclink:hover{border-bottom-style:solid}

.summary-card{background:linear-gradient(180deg,#f6efdf,#f1e8d3);border:1px solid #e2d3ad;border-radius:12px;padding:14px 18px;margin:10px 0 16px}
.summary-card .sum-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--gilt);margin-bottom:6px}
.summary-card .sum-txt{font-size:16.5px;line-height:1.72;color:#332b1c}
.summary-card .sum-txt b{font-weight:700;color:#1c1811}
.summary-card .sum-txt .term{border-bottom-color:var(--rishon)}
.sec-lead{font-family:var(--body);font-size:17.5px;line-height:1.72;color:#4a4235;border-inline-start:3px solid var(--gilt);background:transparent;padding:3px 15px;margin:8px 0 15px}
.sec-flow{font-family:var(--body);font-size:17.5px;line-height:1.78;color:var(--ink);background:transparent;padding:2px 2px;margin:6px 0 16px}
.op-prose{background:#FCFAF5;border:1px solid #ECE4D2;border-radius:9px;padding:13px 17px;margin:11px 0;box-shadow:0 1px 2px rgba(90,74,40,.04)}
.op-prose .prose-lbl{font-family:var(--ui);font-size:11.5px;letter-spacing:.02em;color:var(--ink-faint);font-weight:600;margin-bottom:6px}
.op-prose .prose-body{font-family:var(--body);font-size:17px;line-height:1.8;color:#2b2419}
.op-prose.under{margin-inline-start:20px}
details.op-prose-x{padding:0}
details.op-prose-x>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 15px}
details.op-prose-x>summary::-webkit-details-marker{display:none}
details.op-prose-x>summary::before{content:'▸';color:var(--gilt);font-size:11px}
details.op-prose-x[open]>summary::before{content:'▾'}
details.op-prose-x>summary .xp-hint{font-family:var(--ui);font-size:11px;color:var(--ink-faint)}
details.op-prose-x>.prose-body{padding:0 15px 12px}
.sec-lead .lead-q{color:var(--ink);font-weight:700}
.sec-lead b{font-weight:700;color:#1c1811}
.sec-lead .term{border-bottom-color:var(--rishon)}

/* flowing reference text (no box) — for מושגים / קיצור וכד' */
.flow-block{margin:6px 0 20px}
.flow-block+.flow-block{margin-top:10px}
.flow-head{font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--gilt);
  margin:0 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.flow-body{white-space:pre-wrap;font-family:var(--body);font-size:16.5px;line-height:1.62;color:#2c261d}
.flow-body b{font-weight:700;color:#1c1811}
.t-alot{color:#B07D12;font-weight:700}    /* עלות / עמוד השחר */
.t-hanetz{color:#1C8A55;font-weight:700}   /* הנץ החמה */

/* in-page sub-heading divider (e.g. שעת הדחק, האיר פני המזרח) */
.op-subhead{margin:30px 0 10px;padding-top:16px;border-top:1px solid var(--rule);
  display:flex;align-items:baseline;gap:11px;flex-wrap:wrap}
.op-subhead .ost{font-family:var(--display);font-weight:400;font-size:21px;color:var(--ink);line-height:1.2}
.op-subhead-src{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft)}
.op-subhead-src .srclink{color:var(--gemara);font-weight:600}
.op-subsubhead{margin:15px 0 4px;padding-inline-start:17px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.op-subsubhead .sst{font-family:var(--display);font-weight:400;font-size:16.5px;color:var(--ink-soft);line-height:1.25}
.op-subsubhead .sst::before{content:"●";color:var(--gilt);font-size:7px;margin-inline-end:8px;vertical-align:middle}
.op-subsubhead-src{font-family:var(--ui);font-size:11.5px;color:var(--ink-soft)}
.op-subsubhead-src .srclink{color:var(--gemara);font-weight:600}

.op{position:relative;background:var(--card);border:1px solid var(--line);
  border-right:4px solid var(--rule);border-radius:10px;padding:13px 18px 14px;margin:9px 0}
.op-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:3px}
.op-lbl::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.op .src{font-family:var(--ui);font-weight:700;font-size:14.5px;margin-bottom:2px}
.op .src .srclink{border-bottom:1px dashed #c3b48f}
.op .txt{margin-top:2px}
.op .txt b,.pesak b,.intro-body b{font-weight:700;color:#1c1811}

.L-pasuk{color:var(--pasuk)} .L-pasuk.op{border-right-color:var(--pasuk)}
.L-mishna{color:var(--mishna)} .L-mishna.op{border-right-color:var(--mishna)}
.L-gemara{color:var(--gemara)} .L-gemara.op{border-right-color:var(--gemara)}
.L-rishon{color:var(--rishon)} .L-rishon.op{border-right-color:var(--rishon)}
.L-acharon{color:var(--acharon)} .L-acharon.op{border-right-color:var(--acharon)}
.L-zman{color:var(--zman)} .L-zman.op{border-right-color:var(--zman)}
/* SA & RMA — the halachic spine, stronger */
.L-shulchan{color:var(--shulchan)}
.L-shulchan.op{border-right:6px solid var(--shulchan);background:#f3ebd8;box-shadow:0 1px 0 #e5dcc4}
.L-shulchan.op .src{font-size:15.5px}
.L-rama{color:var(--rama)}
.L-rama.op{border-right:6px solid var(--rama);background:#f0eaf4}
.L-rama.op .src{font-size:15.5px}

.op.under{margin-inline-start:26px;border-right-width:2px;background:color-mix(in srgb,var(--card) 55%,transparent);opacity:.94;position:relative}
.op.under::before{content:"↳";position:absolute;inset-inline-start:-20px;top:12px;color:var(--ink-faint);font-size:15px}
.op.op-collapsed{padding:0;background:var(--card-2)}
.op.op-collapsed>summary{cursor:pointer;list-style:none;padding:11px 18px;display:flex;align-items:center;gap:9px;font-family:var(--ui)}
.op.op-collapsed>summary::-webkit-details-marker{display:none}
.op.op-collapsed>summary::before{content:"▸";color:var(--ink-faint);font-size:12px;transition:transform .15s}
.op.op-collapsed[open]>summary::before{transform:rotate(90deg)}
.op.op-collapsed>summary .op-more{color:var(--ink-soft);font-family:var(--ui);font-size:13.5px;font-weight:600}
.op.op-collapsed>.src{padding:0 18px}
.op.op-collapsed>.txt{padding:2px 18px 14px}
.op.op-collapsed .op-lbl{margin-bottom:0}
.op.op-expand{padding:0}
.op.op-expand>summary{cursor:pointer;list-style:none;padding:12px 18px;display:flex;align-items:center;gap:10px;font-family:var(--ui)}
.op.op-expand>summary::-webkit-details-marker{display:none}
.op.op-expand>summary .src{padding:0;margin:0}
.op.op-expand>summary .xp-hint{margin-inline-start:auto;color:var(--ink-faint);font-size:12px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.op.op-expand:not([open])>summary .xp-hint::after{content:" ▸"}
.op.op-expand[open]>summary .xp-hint{color:var(--pesak)}
.op.op-expand[open]>summary .xp-hint::after{content:" ▾"}
.op.op-expand>.txt{padding:0 18px 15px}
/* prev/next section pager */
.pager{display:flex;justify-content:space-between;gap:12px;margin:28px 0 6px}
.pg-cell{flex:1 1 0;min-width:0;display:flex;align-items:center;gap:11px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:12px 15px;cursor:pointer;font-family:var(--ui);transition:background .12s,border-color .12s}
.pg-cell:hover{background:#efe9dc;border-color:var(--gilt)}
.pg-empty{visibility:hidden;cursor:default;pointer-events:none}
.pg-next{justify-content:flex-end}
.pg-arrow{color:var(--gilt);font-size:19px;font-weight:700;line-height:1;flex:none}
.pg-t{display:flex;flex-direction:column;gap:2px;min-width:0}
.pg-next .pg-t{text-align:end}
.pg-role{font-size:11px;color:var(--ink-faint);font-weight:600}
.pg-name{font-size:15px;color:var(--ink);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-seif{color:var(--gilt)}
/* sticky topic bar — jump between topics in the same subject */
.topicbar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--line);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--ui);
  box-shadow:0 2px 10px rgba(60,50,30,.06)}
.tb-subjdd{position:relative;flex:none}
.tb-subj{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--gilt);white-space:nowrap;letter-spacing:.02em;
  background:transparent;border:0;cursor:pointer;font-family:var(--ui);padding:4px 2px}
.tb-subj:hover{text-decoration:underline}
.tb-subj-caret{font-size:9px;opacity:.75}
.tb-subj-panel{position:absolute;top:calc(100% + 5px);inset-inline-start:0;z-index:61;background:var(--card);
  border:1px solid var(--line);border-radius:11px;box-shadow:0 8px 26px rgba(60,50,30,.17);padding:5px;min-width:150px}
.tb-subj-panel[hidden]{display:none}
.tb-subj-item{width:100%;display:block;background:transparent;border:0;cursor:pointer;font-family:var(--ui);
  font-size:14px;font-weight:600;color:var(--ink);text-align:start;padding:9px 12px;border-radius:8px;white-space:nowrap}
.tb-subj-item:hover{background:var(--card-2)}
.tb-subj-item.cur{background:#f3ecdb;color:var(--gilt)}
.tb-topic{display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.tb-dd{position:relative;flex:1;min-width:0}
.tb-dd-btn{width:100%;display:flex;align-items:center;gap:8px;justify-content:center;font-family:var(--ui);
  background:var(--card-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer}
.tb-dd-btn:hover{border-color:var(--gilt)}
.tb-sim{color:var(--gilt);font-weight:700;font-size:13px;white-space:nowrap}
.tb-ttl{color:var(--ink);font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tb-dd-caret{margin-inline-start:auto;color:var(--ink-soft);font-size:11px;transition:transform .15s}
.tb-dd-btn.open .tb-dd-caret{transform:rotate(180deg)}
.tb-dd-panel{position:absolute;top:calc(100% + 5px);inset-inline:0;z-index:60;background:var(--card);
  border:1px solid var(--line);border-radius:11px;box-shadow:0 8px 26px rgba(60,50,30,.17);
  max-height:60vh;overflow:auto;padding:5px}
.tb-dd-panel[hidden]{display:none}
.tb-dd-item{width:100%;display:flex;align-items:baseline;gap:8px;background:transparent;border:0;cursor:pointer;
  font-family:var(--ui);text-align:start;padding:9px 11px;border-radius:8px}
.tb-dd-item:hover{background:var(--card-2)}
.tb-dd-item.cur{background:#f3ecdb}
.tb-dd-item .tb-ttl{font-weight:600;font-size:14.5px}
.tb-arrow{flex:none;width:36px;height:36px;border:1px solid var(--line);border-radius:9px;background:var(--card-2);
  color:var(--gilt);font-size:19px;font-weight:700;cursor:pointer;line-height:1}
.tb-arrow:disabled{opacity:.3;cursor:default}
.tb-arrow:not(:disabled):hover{background:#efe9dc;border-color:var(--gilt)}
.tb-sec{display:none;align-items:center;gap:6px;width:100%;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
.tbs-cell{flex:1;min-width:0;display:flex;align-items:center;gap:6px;background:transparent;border:0;cursor:pointer;
  font-family:var(--ui);font-size:13px;color:var(--ink-soft);padding:2px 4px}
.tbs-next{justify-content:flex-end;text-align:end}
.tbs-arrow{color:var(--gilt);font-weight:700;font-size:16px;flex:none}
.tbs-name{font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbs-empty{visibility:hidden;pointer-events:none}
.tb-collapse{flex:none;width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:var(--card-2);
  color:var(--ink-soft);cursor:pointer;font-size:12px;line-height:1;font-weight:700}
.tb-collapse:hover{background:#efe9dc;color:var(--ink)}
.tb-mini{display:none;font-size:13px;font-weight:700;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* --- חץ הכיווץ בצד שמאל --- */
.topicbar .tb-collapse{order:99;margin-inline-start:auto}
/* --- לוגו שמתגלה בסרגל בעת גלילה --- */
.tb-logo{flex:none;display:flex;align-items:center;line-height:0;cursor:pointer;overflow:hidden;
  max-width:0;opacity:0;margin-inline-end:0;transform:translateY(-5px) scale(.94);
  transition:max-width .34s cubic-bezier(.22,.9,.3,1),opacity .24s ease .07s,
             transform .34s cubic-bezier(.22,.9,.3,1),margin-inline-end .34s ease}
.tb-logo svg{height:21px;width:auto;display:block}
.topicbar.tb-logo-on .tb-logo{max-width:180px;opacity:1;margin-inline-end:9px;transform:none}
.topicbar.tb-logo-on .tb-logo:hover{opacity:.72}
.topicbar.tb-collapsed .tb-logo svg{height:17px}
@media (max-width:820px){.tb-logo svg{height:18px}.topicbar.tb-logo-on .tb-logo{max-width:128px}}

<script id="content" type="application/json">{"title": "רואה יורה", "subtitle": "סיכומי הלכה אינטראקטיביים · מבחני הרבנות", "topics": [{"topic": {"title": "זמן תפילת שחרית", "eyebrow": "מבחני הרבנות · תפילה · סימן פ״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.89", "intro": {"lead": {"t": "'זמן תפילת השחר — משיעלה עמוד השחר, ומצותה עם הנץ החמה'", "ref": ""}, "body": "סימן פ״ט עוסק בשני עניינים: זמן תפילת שחרית — מאימתי ועד מתי — והדברים שאין לעשותם קודם התפילה.\nתחילה מתבארים המושגים והזמנים (שעות זמניות, עלות השחר, הנץ החמה וכו׳); לאחריהם נידונים זמני התפילה עצמם, ולבסוף הדברים שאסור לעשותם לפניה."}}, "sections": {"musagim": {"title": "ביאור מושגים", "seif": null, "sugya": null, "flow": [{"head": "חלוקת התוכן", "body": "בב״י (א׳) שני דיונים הלכתיים:\n   א.  זמן תפילה המוקדם — עמוד השחר או הנץ החמה?\n   ב.  זמן התפילה המאוחר — המוקד בשאלת שכר תפילה בזמנה."}, {"head": "מושגים מקדימים", "body": "**חלוקת היום ו׳שעות זמניות׳:**\nאנו עובדים עם ׳שעות זמניות׳. בשונה מהחלוקה שרגילים בה העולם, בה מחלקים את כל היממה ל־24 שעות, בשעות זמניות אנו מחלקים רק את היום (בלי הלילה), ול־12 חלקים.\nאין החלוקה של יום ולילה שווה. כלומר, היום אינו 12 שעות רגילות, ואין חפיפה בין שעה זמנית לשעה רגילה. אנו מגדירים ׳יום׳ עפ״י זמני האור, ולכן, היחס בין יום ללילה יישתנה בין חורף לקיץ:\n   בקיץ  - היום יותר ארוך מהלילה.\n   בחורף – היום יותר קצר מהלילה.\nובהתאמה:  בקיץ  - שעה זמנית > שעת 60 דקות\n               בחורף - שעה זמנית \u003c שעת 60 דקות\nיש מחלוקת מה בדיוק ההגדרה של יום; מתי היום מתחיל ומתי מסתיים (דהיינו, איזה טווח זמן אנו מחלקים ל־12):\n   גר״א:  תחילת היום – הנץ החמה\n              סוף היום – שקיעה\n   מג״א:  תחילת היום – עלות השחר\n              סוף היום – צאת הכוכבים\nכלומר, למג״א היום ארוך יותר, וכך גם כל שעה זמנית.\n\n**זמני היום הרלוונטיים עפ״י סדר:**\nעלות השחר  ←  הנץ החמה (זריחה)  ←  שליש היום (4 שעות זמנ׳)  ←  חצות היום  ←  צאת הכוכבים\n   שליש היום = סוף זמן תפילה  ·  חצות היום = סוף זמן תפילה בדיעבד\nעמוד השחר – התבהרות השמיים. ׳האיר פני המזרח׳ (מ״ב מדקדק בזה)\nהנץ החמה – עליית קרני השמש"}]}, "tehila": {"title": "תחילת זמן שחרית", "seif": "סעיף א׳,ח׳", "sugya": {"label": "ברכות · פרק תפלת השחר · כו.", "ref": "Berakhot.26a"}, "summary": "תחילת זמן תפילת שחרית מתברר לנו דווקא מהדיון ב**משנה** על סופה. יתרה מכך, **הגמרא** מתעמתת עם **ברייתא** שלפיה אין בכלל מושגים של תחילה וסוף, אלא 'מצוותה עם הנץ החמה'. הגמרא משייכת את הזמן המוקדם יותר — 'עם הנץ החמה' — לוותיקין, ואת הזמן של ר' יהודה וחכמים למאחרים, ובכך מייצרת טווח זמן שיש בו תחילה וסוף, ולא שעה ספציפית.\nגם לאחר שלקחה הגמרא את 'מצוותה עם הנץ החמה' והפכה אותה ל'תחילת זמן תפילה', **הראשונים** (רא\"ש, תוס', רמב\"ם) מזכירים כי בכלל תפילות כנגד קורבנות. לכן תחילת זמן התפילה כתחילת זמן קרבן התמיד — משיעלה עמוד השחר!\nלכן, בעקבות הברייתא של 'מצוותה עם הנץ החמה', מייצרים הראשונים מדרג כזה: לכתחילה, ראוי להתייחס להנץ החמה כתחילת זמן תפילה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. וכן פוסק **הש\"ע**.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מחלוקת **חכמים** ו**רבי יהודה** גבי זמן תפילת שחרית:\nחכמים: עד חצות\nרבי יהודה: עד 4 שעות"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**ורמינהו**: מצוותה (של ק\"ש) עם הנץ החמה (ותו לא. כדי שיסמוך גאולה לתפלה).\nכלומר: מכך שכדי לסמוך ק\"ש לתפילה צריך לקרוא ק\"ש בהנץ החמה — גם תפלה בהנץ החמה! אז איך חכמים ורבי יהודה מדברים על 'עד חצות' ו'4 שעות'?\n**תירוץ**: הברייתא מדברת לותיקין (**רש\"י**: המקדימים למצוות ומחזרים לעשותן בזמנן). ובמשנה — ה'עד חצות' של חכמים וה־4 שעות של רבי יהודה למאחרים.\n(כלומר, כל הסיבה שהראשונים הולכים להסתבך עם לכתחילה־בדיעבד ולתעדף את הנץ החמה על אף שכבר בעמוד השחר מתחיל זמן שחרית — זה בעקבות הברייתא על ק\"ש.)\n**מסיקים**: הלכה כרבי יהודה (כי במשנה בעדויות כוותיה).\nלכן: למאחרים — סוף זמן תפלה סוף 4 שעות זמניות מתחילת היום; למקדימים — מתפללים עם הנץ החמה."}, {"layer": "rishon", "src": "רא\"ש · רמב\"ם · תוס'", "srcRef": null, "txt": "תחילת זמן שחרית — משיעלה עמוד השחר (כזמן קרבן התמיד).\nעיקר מצוות שחרית — עם הנץ החמה (כברייתא).\nבדיעבד אם התפלל — משיעלה עמוד השחר."}, {"layer": "gemara", "src": "ריו\"ח", "srcRef": null, "txt": "הנץ החמה — מצווה מן המובחר.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "זמן 'מצוותה' של תפלת שחרית מתחיל עם הנץ החמה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. (**רא\"ש, רמב\"ם, תוס'**)"}, {"subhead": "'האיר פני המזרח'"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מ\"ב**: 'האיר פני המזרח' = כל המזרח, ולא רק נקודה.\n**רע\"א**: אפילו אם יש עוד כוכבים בשמיים — העיקר שיאיר פני המזרח.\n**מג\"א**: יוצא בדיעבד אפילו אם לא 'האיר פני המזרח', כל שעלה עמוד השחר.\n**מ\"ב ואחרונים**: אם לא האיר פני המזרח — לא יוצא."}, {"subhead": "זמנים מיוחדים"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מהרש\"ל**: בימי הסליחות ראוי להיזהר מלהקדים ולהתפלל לפני הנץ החמה.\n**מג\"א**: אולי סמכו על זה שיש טורח לציבור ללכת אחר הסליחות הביתה ולבוא שוב לשחרית.\n**פמ\"ג**: בשבועות — אחרי שערים כל הלילה — מותר להתפלל קודם הנץ (טורח הציבור ללכת ולחזור)."}, {"subhead": "שעת הדחק (ס׳ ח׳)", "src": "ברכות · ל.", "srcRef": "Berakhot.30a"}, {"layer": "lead", "srcRef": null, "txt": "בשעת הדחק, אפילו לכתחילה אפשר להתפלל קודם הנץ החמה. אבל לק\"ש מחכים ל'משיכיר' (סי' נח).\nכלומר, יש כאן שתי משוואות:\nכוונה > עיקר זמן תפלה (הנץ החמה)\nכוונה > סמיכת גאולה לתפילה"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "**ת\"ק**: מי שהשכים לצאת לדרך לפני הנץ החמה — מתפלל, ואח\"כ משלים ק\"ש בזמן ('משיכיר').\n**ר' שמעון בן אלעזר**: לא יתפלל לפני זמן ק\"ש. ממילא צריך לסמוך גאולה לתפילה.\n**אבוה דשמואל ולוי**: נהגו כת\"ק — יצאו מוקדם לדרך, והקדימו והתפללו לפני הנץ החמה, ואח\"כ קראו ק\"ש בזמנה."}, {"layer": "gemara", "src": "שורש המחלוקת", "srcRef": null, "txt": "**לת\"ק** — יותר חשוב תפילה בכוונה (בדרך לא יוכלו לכוון, לכן מתיר להתפלל לפני היציאה).\n**לר' שמעון ב\"א** — יותר חשוב סמיכת גאולה לתפילה.", "under": true}, {"layer": "rishon", "src": "ר\"ח · רא\"ש · רב האי גאון", "srcRef": null, "txt": "כת\"ק, אבוה דשמואל ולוי."}, {"layer": "rishon", "src": "בה\"ג · תוספות", "srcRef": null, "txt": "כר' שמעון בן אלעזר.", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אם מדובר בדרך שממש לא יכול לכוון בה — הרי שגם ק\"ש יכול להקדים!\nההיתר של הברייתא מדבר בדרך בה יכול לכוון לפחות בפס' ראשון ק\"ש, אבל לא בעמידה.\n(וכך פוסקים בסי' נח)", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ח׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.8", "txt": "בשעת הדחק, כגון מי שהשכים לצאת לדרך — מותר להתפלל עמידה כבר משעלה עמוד השחר.\nאבל בלי ק\"ש, וישלים אח\"כ ק\"ש בזמנה ('משיכיר').\nולמרות שלא סומך גאולה לתפלה — עדיף שיכוון בתפילה בביתו משיסמוך. (**ת\"ק, ר\"ח, רא\"ש, רב האי גאון**)"}, {"layer": "acharon", "src": "מג\"א · ערוה\"ש", "srcRef": null, "txt": "העולם לא נוהגים כן — הם מתפללים בדרך בהנץ החמה. אולי כי היום א\"א לכוון כ\"כ."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "שאפשר להתפלל כבר מעמוד השחר = משהאיר המזרח.", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם יהיה אנוס כך שלא יכול לכוון אפילו בפס' ראשון של ק\"ש — יגיד גם ק\"ש בע\"ה. (**רשב\"א**)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם האיר המזרח — נוטה יותר להגיד גם ק\"ש לפני זמנה, מאשר לפצל (נ\"ל שאפילו אם יוכל לכוון בפס' ראשון בדרך).", "under": true}, {"subhead": "מהי 'שעת הדחק'?"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**בברייתא** — מדובר על 'המשכים לצאת לדרך'.\n**טור**: מי שהוא אנוס.\n**ש\"ע**: שעת הדחק, כגון שצריך להשכים לדרך. (**מ\"ב**: והולך עם שיירה שלא ממתינה לו)\n**מ\"ב** (וכן משמע בסוגיה, ראשונים וב\"י): כל סיטואציה בה לא יכול לכוון בתפילתו.\n**ערוה\"ש**: מי שאינו יכול להתעכב ומוכרח לצאת לפני הנץ החמה. (פשיטא שגם בנסיעה, ולאו דווקא הליכה)"}, {"subhead": "מי שכבר בדרך"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מג\"א**: לפי מה שאנחנו מעדיפים כוונה על סמיכת גאולה לתפילה — מי שנמצא בדרך ועדיין לא התפלל, עדיף שיפצל ויגיד ק\"ש כשיכול (אף בלא תפילין), אבל יתפלל ש\"ע רק כשיוכל לכוון.\n**פמ\"ג**: אך אם רואה שיעבור זמן תפילה לכתחילה (4 שעות) — יתפלל בדרך (על אף שיתקשה לכוון)."}], "pesak": null}, "sof": {"title": "סוף זמן שחרית", "seif": "סעיף א׳", "sugya": {"label": "ברכות · פרק תפלת השחר · כו.", "ref": "Berakhot.26a"}, "ops": [{"layer": "gemara", "src": "משנה · גמרא", "srcRef": null, "txt": "חכמים: עד חצות; רבי יהודה: עד 4 שעות. ומסיקים: הלכה כרבי יהודה."}, {"layer": "shulchan", "src": "שולחן ערוך (לכתחילה) · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "סוף זמן שחרית — סוף 4 שעות, שהוא שליש היום (כרבי יהודה)."}, {"layer": "rishon", "src": "רבנו ירוחם", "srcRef": null, "txt": "לא התפלל עד 4 שעות והתפלל עד חצות — יצא ידי חובת תפילה, אך לא ידי 'תפילה בזמנה'."}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "'בדיעבד' — אף אם הזיד, לא רק נאנס או טעה.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך (בדיעבד) · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "התפלל אחר 4 שעות אך עד חצות — יצא (שכר תפילה, לא בזמנה), בין במזיד בין בשוגג (רבנו ירוחם, ב״י)."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "אחר חצות היום — אסור להתפלל שחרית."}, {"layer": "acharon", "src": "פמ״ג · פר״ח · ט״ז", "srcRef": null, "txt": "בין 4 שעות לחצות — פמ״ג: מותר לכתחילה. פר״ח: רק בדיעבד. ט״ז: אף בין 4 שעות למנחה יוצא, ואף לכתחילה (חולק על הרמ״א).", "under": true, "collapsed": true}], "pesak": "לכתחילה עד סוף 4 שעות; בדיעבד עד חצות (יצא, אך לא בזמנה); אחר חצות — אסור (רמ״א).", "summary": "לכתחילה סוף זמן שחרית — סוף 4 שעות זמניות (שליש היום, כרבי יהודה, שהלכה כמותו). בדיעבד — אם התפלל עד חצות יצא ידי 'תפילה', אך לא 'תפילה בזמנה'. ונחלקו האם בין 4 שעות לחצות מותר להתפלל אף לכתחילה."}, "kitzur": {"title": "קיצור הלכה", "seif": null, "sugya": null, "navAccent": true, "flow": [{"body": "**תחילת זמן תפילת שחרית:**\n   ׳מצוותה׳ (לכתחילה)   –  עם הנץ החמה (זריחה)\n   בדיעבד / שעת דחק     –  משעלה עמוד השחר\n\n**סוף זמן תפילת שחרית:**\n   לכתחילה  –  עד סוף 4 שעות (שליש היום)   (שכר תפילה בזמנה)\n   בדיעבד   –  עד חצות ה לה בשבת", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן של״א", "siman": "Shulchan_Arukh,_Orach_Chayim.331", "intro": {"lead": {"t": "\"וביום השמיני ימול בשר עורלתו\" (ויקרא)", "ref": ""}, "body": "ברית המילה צריכה להיעשות ביום השמיני. אך מה קורה אם היום השמיני יוצא בשבת?\n\nבפרק רבי אליעזר דמילה, מובא בגמרא כי מילה דוחה את השבת ('וביום השמיני ימול בשר ערלתו – אפילו בשבת')\\cite{בבלי, שבת קלב ע\"א}{Shabbat.132a}.\n\nולפיכך, נאמר במשנה כי עושים כל צרכי מילה בשבת\\cite{בבלי, שבת קלג ע\"א}{Shabbat.133a}. היינו שמותר 'לחלל' את השבת בעשיית כל מעשי המילה.\n\nאולם, דווקא את המילה עצמה מותר לעשות בשבת. אך מכשיריה – אשר ניתן להכין מערב שבת – לא דוחים השבת אפילו בדרבנ. (לכן אסור להביא סכין בשבת או לשחוק כמון וכו')\n\n-לפיכך, כתבו הפוסקים, שאם אדם לא הכין לשבת את הדברים הנצרכים למילה, יש לדחות אותה; ואסור לחלל את השבת כלל על מנת להשיגם. אולם, אם יש לו גוי, מותר לומר לו לעבור על דרבנן לשם כך (למשל, שיביא סכין מרשות בדרבנן. ולדעת הרמ\"א במקום צורך גדול -כגון כאן- מותר אף להגיד לו לעבור בדאורייתא).\nוגם, מותר להכין את הכשרי המילה שבהכנתם עוברים בדרבנן בשינוי (משום שקיי\"ל שהתירו שבות ע\"י שינוי לצורך זה)\n\nבעצם, זה שלא מחללים על מכשירי מילה אלא רק לצרכה ממש, אין זה אומר שהמילה חשובה פחות משאר פיקוחי נפש מהבחינה הזאת. אלא שהיא דבר שאנו יודעים עליו מראש, לכן יש להתכונן בהתאם ולהמנע מחילול שבת שאינו נצרך בכל מידה שניתן. ניתן לדרג את ענייני פיקוח נפש, יולדת ומילה במדרג זה: פיקוח נפש ← יולדת ← מילה."}}, "sections": {"tzorchei": {"title": "צרכי ומכשירי מילה", "seif": "סעיף א׳", "sugya": null, "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "עושין כל צרכי מילה בשבת. מוהלים, פורעים ומוצצים. ונותנים תחבושת\n(מוהלים = חותכים את הערלה (החיצונית); פורעים= קורעים את העור שמתחת לערלה; מוצצים= את דם הפצע. ואע\"ג שנחשב לעשיית חבּורה )", "ref": {"label": "שבת · פרק ר\"א דמילה · קלג", "ref": "Shabbat.133a"}}, {"layer": "gemara", "src": "גמרא · רב פפא", "srcRef": null, "txt": "**רב פפא** אומר שמותר למצוץ למרות שבכך הדם ניתק ממקומו ויש בכך עשיית חבורה.\n   ומתבאר גם שעם נתינת התחבושת על האיבר, שמים עליה כמון לרפואה (ועל אף שיש בכך חשש שמא ישחק סממנים)", "ref": {"label": "שם", "ref": "Shabbat.133a"}}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.1", "txt": "כתב עפ\"י המשנה שעושים כל צרכי המילה, מוהלין ופורעין ומוצצין ונותנין עליו כמון."}, {"layer": "acharon", "src": "והמשנ\"ב בשם שו\"ת בני ציון", "srcRef": null, "txt": "סבר שהמציצה מותר לעשות דווקא בפה."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "ובסעיף ו', כתב שמכשירי מילה לא דוחים את השבת משום שאפשר לעשותם מער\"ש. לכן, אסור להביא סכין מילה מרשות אחרת, או לחמם מים וכו'. ואפילו אם זה רק בדרבנן.\n(כרבי עקיבא במשנה: כל מלאכה שאפשר לעשותה מער\"ש – אינה דוחה שבת)"}], "pesak": null}, "rechitza": {"title": "רחיצה", "seif": "סעיף ט׳", "sugya": null, "intro": "(גם צורך מילה)", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מותר לרחוץ את התינוק במים חמים הן לפני המילה והן אחרי המילה, אבל רק בידיים, ולא בכלי. (כלומר, זה נחשב מצרכי המילה, גם לפני וגם אחרי; וחשוב לרפואת התינוק)\nולדעת **רבי אלעזר בן עזריה**, אף ביום השלישי למילה מותר לרחוץ אותו (אם יוצא בשבת. וזה עפי\"ה הפס' 'ויהי ביום השלישי בהיותם כואבים')", "ref": {"label": "שבת · פרק ר\"א דמילה · קלד", "ref": "Shabbat.134a"}}, {"layer": "gemara", "src": "ובגמרא", "srcRef": null, "txt": "פסקו כרבי אלעזר בן עזריה.\nיוצא אם כן, שמותר אפילו לחלל שבת ע\"מ לחמם מים לצורך רחיצה לפני המילה, לאחר המילה וביום השלישי.", "ref": {"label": "שם", "ref": "Shabbat.134a"}}, {"layer": "lead", "srcRef": null, "txt": "אבל מה לגבי היום השני? האם היום השלישי הוא היום השלישי דווקא? או שהוא מן הסתם לרבותא גם את היום השני?"}, {"layer": "rishon", "src": "הרב המגיד ברמב\"ם", "srcRef": null, "txt": "משמע שדווקא היום השלישי. לכן אסור לחמם מים בשבת ליום השני."}, {"layer": "rishon", "src": "הרמב\"ן", "srcRef": null, "txt": "סבר שאף ביום השני מותר."}, {"layer": "rishon", "src": "אך בכל מקרה, הב\"י", "srcRef": null, "txt": "כותב בסוף שכל זה נכון לזמן הגמרא, שאז היה זה סכנה לתינוק אם לא היו רוחצים אותו בימים הנ\"ל. אולם בימינו שלנו, שאין זה מסוכן אם לא נעשה כן – אסור לחלל על כך את השבת; ודינו כדין סתם רחיצה של גדול."}, {"layer": "shulchan", "src": "ולפיכך כתב בשו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.9", "txt": "שהאידנא לא נחשבת רחיצת התינוק לפני ואחרי המילה וביום השלישי כדבר הנחוץ לתינוק; ולכן אסור לחלל לשם כך את השבת (ואף לא נחשב הכשר מילה)."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "סבר, שבמדינות אשכנז נהגו בשטיפת הוולד לפני המילה בימים הנ\"ל וביום השלישי אם הוחמו מער\"ש (כלומר למרות שעפ\"י שכ\"ו מותר רק פניו ידיו ורגליו. נחשב צורך גדול, אבל עדיין לא חיללו שבת). אבל לאחר המילה – חיכו עד מוצ\"ש."}, {"layer": "lead", "srcRef": null, "txt": "וכמובן שאם רואים שיש לתינוק סכנה ויש צורך בשטיפתו – מותר אף לחלל את השבת ולחמם. וראיתי עפ\"י הרב מרדכי הלפרין, שיש כיום מודעות למחלות באיבר המין הנפוצות במדינות שונות, אשר מצריכות שטיפה במים חמים לאחר המילה כנ\"ל. וכן הוא בארץ ישראל"}, {"layer": "acharon", "src": "והמשנ\"ב בשם התשב\"ץ", "srcRef": null, "txt": "שתינוק שהיה חולה ונתרפא, אסור למול אותו ביום חמישי, משום שיש חשש שתהא בו סכנה בשבת, שהיא היום השלישי למילה – ואז ייצטרכו לחלל עליו את השבת. ובגלל שמילה שאינה בזמנה אינה דוחה את השבת.", "under": true, "collapsed": true}, {"layer": "acharon", "src": "אך הש\"ך (ומג\"א)", "srcRef": null, "txt": "חלק על כך, וסבר שוודאי שמותר למול שלא בזמנו ביום ה' כנ\"ל.", "under": true, "collapsed": true}], "pesak": null}, "goy": {"title": "באמירה לגוי", "seif": "סעיף ו׳", "sugya": null, "ops": [{"layer": "shulchan", "src": "השו\"ע (ש\"ז)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.307", "txt": "לגבי אמירה המותרת לגוי בשבת, פסק בסימן ש\"ז כדעת הרמב\"ם, שאמירה מותרת בשבות דשבות לצורך מצווה. כלומר, האמירה עצמה היא שבות, ואיסור דרבנן הוא שבות. לפיכך, מותר להגיד לגוי לעבור על איסור דרבנן לצורך מצווה."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "ולפי זאת נקט גם בעניין דידן, שמכשירי מילה – אשר אסור
