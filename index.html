<title>מילה בשבת · סיכום אינטראקטיבי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Frank+Ruhl+Libre:wght@400;500;700;800&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#EBE6DB; --card:#F8F4EB; --card-2:#F2EDE1;
  --ink:#211C15; --ink-soft:#6B6153; --ink-faint:#9A9083;
  --rule:#D7CEBC; --line:#E2DACA;
  --pasuk:#8C6D2C; --mishna:#2F4C86; --gemara:#3E6BA6; --rishon:#4B7C6E;
  --shulchan:#211C15; --rama:#6A4A86; --acharon:#9A6A3A; --zman:#B0562E;
  --pesak:#8A2E3B; --gilt:#A9812F;
  --display:'Suez One','Frank Ruhl Libre',serif;
  --body:'Frank Ruhl Libre','Noto Serif Hebrew','Times New Roman',serif;
  --ui:'Heebo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{direction:rtl;background:var(--paper);color:var(--ink);
  font-family:var(--body);font-size:18px;line-height:1.72;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

header.top{border-bottom:1px solid var(--rule);background:linear-gradient(180deg,#F1ECE1,var(--paper))}
.eyebrow{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.14em;color:var(--ink-soft)}
h1.topic{font-family:var(--display);font-weight:400;font-size:clamp(34px,6vw,58px);margin:.18em 0 .1em;line-height:1.02}
.subtitle{font-family:var(--ui);color:var(--ink-soft);font-size:15px;margin:0 0 20px}
.header-inner{padding:26px 0 22px}

.grid{display:grid;grid-template-columns:250px 1fr;gap:34px;align-items:start;padding:30px 0 90px}
nav.rail{position:sticky;top:16px;font-family:var(--ui)}
.rail-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--ink-faint);margin:0 0 10px 4px}
.node{margin:1px 0}
.node .row{display:flex;align-items:stretch;gap:2px}
.node a.lbl{
  display:block;flex:1;text-decoration:none;color:var(--ink-soft);font-size:14.5px;
  padding:8px 12px;border-radius:8px;line-height:1.3;border:1px solid transparent;
  transition:background .15s,color .15s;cursor:pointer}
.node a.lbl:hover{background:var(--card-2);color:var(--ink)}
.node a.lbl.active{background:var(--card);color:var(--ink);border-color:var(--line);font-weight:600}
.node a.lbl .seif{color:var(--gilt);font-weight:700;font-size:12px;margin-inline-end:6px}
.node.group>.row>a.lbl{font-weight:600;color:var(--ink)}
.node a.lbl.accent{color:var(--pesak);font-weight:700}
.node a.lbl.accent:hover{background:#F4E9E6}
.node a.lbl.accent .accent-glyph{margin-inline-end:5px}
.caret{width:26px;border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:12px;
  border-radius:7px;display:flex;align-items:center;justify-content:center}
.caret:hover{background:var(--card-2);color:var(--ink)}
.children{margin-inline-start:14px;border-inline-start:1px solid var(--line);padding-inline-start:6px;
  overflow:hidden;transition:max-height .22s ease}
.children.collapsed{max-height:0!important}
.children a.lbl{font-size:13.5px;color:var(--ink-soft)}

main{min-width:0}

/* intro (collapsible) */
details.intro-strip{background:var(--card-2);border:1px solid var(--line);border-radius:11px;margin:0 0 20px}
details.intro-strip>summary{font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:.06em;
  color:var(--ink-soft);padding:11px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
details.intro-strip>summary::-webkit-details-marker{display:none}
details.intro-strip>summary::before{content:"▸";color:var(--gilt);transition:transform .15s}
details.intro-strip[open]>summary::before{transform:rotate(90deg)}
.intro-body{padding:2px 18px 16px;font-size:17px;color:#2c261d}
/* standalone intro page — on a distinct card, not the bare interface background */
.intro-full .intro-body{padding:20px 24px;background:linear-gradient(180deg,#f4efe4,#f1ebdd);
  border:1px solid var(--line);border-radius:13px;box-shadow:0 1px 0 #e6ddc9}
.intro-body .ib-p{margin:0 0 13px;text-align:justify}
.intro-body .ib-p:last-child{margin-bottom:0}
.intro-lead{font-family:var(--display);font-size:20px;color:var(--pasuk);margin:0 0 10px}
.intro-lead-line{margin:0 0 12px;color:#2c261d;text-align:justify}
.intro-lead-line .intro-quote{color:#4a4235}
sup.fn{color:var(--gilt);cursor:pointer;font-size:.7em;margin-inline-start:1px;font-weight:700;user-select:none}
sup.fn:hover{color:var(--pesak)}
.abbr{cursor:help}
.src-conn{font-weight:400;color:var(--ink-soft);font-size:.92em}
.src-ref{font-family:var(--ui);font-size:12.5px;font-weight:500;color:var(--ink-soft)}
.src-ref .srclink{color:var(--gemara);border-bottom-color:#c3b48f}

.sec-head{margin:0 0 4px}
.sec-kicker{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.1em;color:var(--gilt)}
h2.sec-title{font-family:var(--display);font-weight:400;font-size:clamp(26px,4vw,36px);margin:.1em 0 .3em;line-height:1.1}
.spanning{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);margin:-2px 0 10px}

.sugya{font-family:var(--ui);font-size:13.5px;color:var(--ink-soft);
  margin:2px 0 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sugya .pin{color:var(--gemara);font-weight:700}
.srclink{color:var(--gemara);font-weight:600;cursor:pointer;border-bottom:1px dashed #9db7d6}
.srclink:hover{border-bottom-style:solid}

.summary-card{background:linear-gradient(180deg,#f6efdf,#f1e8d3);border:1px solid #e2d3ad;border-radius:12px;padding:14px 18px;margin:10px 0 16px}
.summary-card .sum-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--gilt);margin-bottom:6px}
.summary-card .sum-txt{font-size:16.5px;line-height:1.72;color:#332b1c}
.summary-card .sum-txt b{font-weight:700;color:#1c1811}
.summary-card .sum-txt .term{border-bottom-color:var(--rishon)}
.sec-lead{font-family:var(--body);font-size:17.5px;line-height:1.72;color:#4a4235;border-inline-start:3px solid var(--gilt);background:transparent;padding:3px 15px;margin:8px 0 15px}
.sec-lead .lead-q{color:var(--ink);font-weight:700}
.sec-lead b{font-weight:700;color:#1c1811}
.sec-lead .term{border-bottom-color:var(--rishon)}

/* flowing reference text (no box) — for מושגים / קיצור וכד' */
.flow-block{margin:6px 0 20px}
.flow-block+.flow-block{margin-top:10px}
.flow-head{font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--gilt);
  margin:0 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.flow-body{white-space:pre-wrap;font-family:var(--body);font-size:16.5px;line-height:1.62;color:#2c261d}
.flow-body b{font-weight:700;color:#1c1811}
.t-alot{color:#B07D12;font-weight:700}    /* עלות / עמוד השחר */
.t-hanetz{color:#1C8A55;font-weight:700}   /* הנץ החמה */

/* in-page sub-heading divider (e.g. שעת הדחק, האיר פני המזרח) */
.op-subhead{margin:30px 0 10px;padding-top:16px;border-top:1px solid var(--rule);
  display:flex;align-items:baseline;gap:11px;flex-wrap:wrap}
.op-subhead .ost{font-family:var(--display);font-weight:400;font-size:21px;color:var(--ink);line-height:1.2}
.op-subhead-src{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft)}
.op-subhead-src .srclink{color:var(--gemara);font-weight:600}
.op-subsubhead{margin:15px 0 4px;padding-inline-start:17px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.op-subsubhead .sst{font-family:var(--display);font-weight:400;font-size:16.5px;color:var(--ink-soft);line-height:1.25}
.op-subsubhead .sst::before{content:"●";color:var(--gilt);font-size:7px;margin-inline-end:8px;vertical-align:middle}
.op-subsubhead-src{font-family:var(--ui);font-size:11.5px;color:var(--ink-soft)}
.op-subsubhead-src .srclink{color:var(--gemara);font-weight:600}

.op{position:relative;background:var(--card);border:1px solid var(--line);
  border-right:4px solid var(--rule);border-radius:10px;padding:13px 18px 14px;margin:9px 0}
.op-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:3px}
.op-lbl::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.op .src{font-family:var(--ui);font-weight:700;font-size:14.5px;margin-bottom:2px}
.op .src .srclink{border-bottom:1px dashed #c3b48f}
.op .txt{margin-top:2px}
.op .txt b,.pesak b,.intro-body b{font-weight:700;color:#1c1811}

.L-pasuk{color:var(--pasuk)} .L-pasuk.op{border-right-color:var(--pasuk)}
.L-mishna{color:var(--mishna)} .L-mishna.op{border-right-color:var(--mishna)}
.L-gemara{color:var(--gemara)} .L-gemara.op{border-right-color:var(--gemara)}
.L-rishon{color:var(--rishon)} .L-rishon.op{border-right-color:var(--rishon)}
.L-acharon{color:var(--acharon)} .L-acharon.op{border-right-color:var(--acharon)}
.L-zman{color:var(--zman)} .L-zman.op{border-right-color:var(--zman)}
/* SA & RMA — the halachic spine, stronger */
.L-shulchan{color:var(--shulchan)}
.L-shulchan.op{border-right:6px solid var(--shulchan);background:#f3ebd8;box-shadow:0 1px 0 #e5dcc4}
.L-shulchan.op .src{font-size:15.5px}
.L-rama{color:var(--rama)}
.L-rama.op{border-right:6px solid var(--rama);background:#f0eaf4}
.L-rama.op .src{font-size:15.5px}

.op.under{margin-inline-start:26px;border-right-width:2px;background:color-mix(in srgb,var(--card) 55%,transparent);opacity:.94;position:relative}
.op.under::before{content:"↳";position:absolute;inset-inline-start:-20px;top:12px;color:var(--ink-faint);font-size:15px}
.op.op-collapsed{padding:0;background:var(--card-2)}
.op.op-collapsed>summary{cursor:pointer;list-style:none;padding:11px 18px;display:flex;align-items:center;gap:9px;font-family:var(--ui)}
.op.op-collapsed>summary::-webkit-details-marker{display:none}
.op.op-collapsed>summary::before{content:"▸";color:var(--ink-faint);font-size:12px;transition:transform .15s}
.op.op-collapsed[open]>summary::before{transform:rotate(90deg)}
.op.op-collapsed>summary .op-more{color:var(--ink-soft);font-family:var(--ui);font-size:13.5px;font-weight:600}
.op.op-collapsed>.src{padding:0 18px}
.op.op-collapsed>.txt{padding:2px 18px 14px}
.op.op-collapsed .op-lbl{margin-bottom:0}
.op.op-expand{padding:0}
.op.op-expand>summary{cursor:pointer;list-style:none;padding:12px 18px;display:flex;align-items:center;gap:10px;font-family:var(--ui)}
.op.op-expand>summary::-webkit-details-marker{display:none}
.op.op-expand>summary .src{padding:0;margin:0}
.op.op-expand>summary .xp-hint{margin-inline-start:auto;color:var(--ink-faint);font-size:12px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.op.op-expand:not([open])>summary .xp-hint::after{content:" ▸"}
.op.op-expand[open]>summary .xp-hint{color:var(--pesak)}
.op.op-expand[open]>summary .xp-hint::after{content:" ▾"}
.op.op-expand>.txt{padding:0 18px 15px}
/* prev/next section pager */
.pager{display:flex;justify-content:space-between;gap:12px;margin:28px 0 6px}
.pg-cell{flex:1 1 0;min-width:0;display:flex;align-items:center;gap:11px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:12px 15px;cursor:pointer;font-family:var(--ui);transition:background .12s,border-color .12s}
.pg-cell:hover{background:#efe9dc;border-color:var(--gilt)}
.pg-empty{visibility:hidden;cursor:default;pointer-events:none}
.pg-next{justify-content:flex-end}
.pg-arrow{color:var(--gilt);font-size:19px;font-weight:700;line-height:1;flex:none}
.pg-t{display:flex;flex-direction:column;gap:2px;min-width:0}
.pg-next .pg-t{text-align:end}
.pg-role{font-size:11px;color:var(--ink-faint);font-weight:600}
.pg-name{font-size:15px;color:var(--ink);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-seif{color:var(--gilt)}
/* sticky topic bar — jump between topics in the same subject */
.topicbar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--line);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--ui);
  box-shadow:0 2px 10px rgba(60,50,30,.06)}
.tb-subjdd{position:relative;flex:none}
.tb-subj{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--gilt);white-space:nowrap;letter-spacing:.02em;
  background:transparent;border:0;cursor:pointer;font-family:var(--ui);padding:4px 2px}
.tb-subj:hover{text-decoration:underline}
.tb-subj-caret{font-size:9px;opacity:.75}
.tb-subj-panel{position:absolute;top:calc(100% + 5px);inset-inline-start:0;z-index:61;background:var(--card);
  border:1px solid var(--line);border-radius:11px;box-shadow:0 8px 26px rgba(60,50,30,.17);padding:5px;min-width:150px}
.tb-subj-panel[hidden]{display:none}
.tb-subj-item{width:100%;display:block;background:transparent;border:0;cursor:pointer;font-family:var(--ui);
  font-size:14px;font-weight:600;color:var(--ink);text-align:start;padding:9px 12px;border-radius:8px;white-space:nowrap}
.tb-subj-item:hover{background:var(--card-2)}
.tb-subj-item.cur{background:#f3ecdb;color:var(--gilt)}
.tb-topic{display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.tb-dd{position:relative;flex:1;min-width:0}
.tb-dd-btn{width:100%;display:flex;align-items:center;gap:8px;justify-content:center;font-family:var(--ui);
  background:var(--card-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer}
.tb-dd-btn:hover{border-color:var(--gilt)}
.tb-sim{color:var(--gilt);font-weight:700;font-size:13px;white-space:nowrap}
.tb-ttl{color:var(--ink);font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tb-dd-caret{margin-inline-start:auto;color:var(--ink-soft);font-size:11px;transition:transform .15s}
.tb-dd-btn.open .tb-dd-caret{transform:rotate(180deg)}
.tb-dd-panel{position:absolute;top:calc(100% + 5px);inset-inline:0;z-index:60;background:var(--card);
  border:1px solid var(--line);border-radius:11px;box-shadow:0 8px 26px rgba(60,50,30,.17);
  max-height:60vh;overflow:auto;padding:5px}
.tb-dd-panel[hidden]{display:none}
.tb-dd-item{width:100%;display:flex;align-items:baseline;gap:8px;background:transparent;border:0;cursor:pointer;
  font-family:var(--ui);text-align:start;padding:9px 11px;border-radius:8px}
.tb-dd-item:hover{background:var(--card-2)}
.tb-dd-item.cur{background:#f3ecdb}
.tb-dd-item .tb-ttl{font-weight:600;font-size:14.5px}
.tb-arrow{flex:none;width:36px;height:36px;border:1px solid var(--line);border-radius:9px;background:var(--card-2);
  color:var(--gilt);font-size:19px;font-weight:700;cursor:pointer;line-height:1}
.tb-arrow:disabled{opacity:.3;cursor:default}
.tb-arrow:not(:disabled):hover{background:#efe9dc;border-color:var(--gilt)}
.tb-sec{display:none;align-items:center;gap:6px;width:100%;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
.tbs-cell{flex:1;min-width:0;display:flex;align-items:center;gap:6px;background:transparent;border:0;cursor:pointer;
  font-family:var(--ui);font-size:13px;color:var(--ink-soft);padding:2px 4px}
.tbs-next{justify-content:flex-end;text-align:end}
.tbs-arrow{color:var(--gilt);font-weight:700;font-size:16px;flex:none}
.tbs-name{font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbs-empty{visibility:hidden;pointer-events:none}
.tb-collapse{flex:none;width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:var(--card-2);
  color:var(--ink-soft);cursor:pointer;font-size:12px;line-height:1;font-weight:700}
.tb-collapse:hover{background:#efe9dc;color:var(--ink)}
.tb-mini{display:none;font-size:13px;font-weight:700;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topicbar.tb-collapsed{padding:4px 14px}
.topicbar.tb-collapsed .tb-topic,.topicbar.tb-collapsed .tb-sec{display:none}
.topicbar.tb-collapsed .tb-subj{font-size:11px;opacity:.85}
.topicbar.tb-collapsed .tb-mini{display:inline}
body.nav-B .tb-sec{display:flex}
body.nav-B .topicbar.tb-collapsed .tb-sec{display:none}
body.nav-B .pager{display:none}
/* desktop: keep the bar compact and centered, not full-width */
@media (min-width:760px){
  .topicbar{justify-content:center;gap:14px}
  .tb-topic{flex:0 1 440px}
  .topicbar.tb-collapsed{justify-content:center}
}
.pesak{background:linear-gradient(180deg,#fbf4ee,#f7ece4);border:1px solid #e6cdbf;
  border-right:5px solid var(--pesak);border-radius:11px;padding:15px 20px;margin:16px 0 6px}
.pesak .plbl{font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);letter-spacing:.05em;
  display:flex;align-items:center;gap:7px;margin-bottom:4px}
.pesak .plbl .dia{color:var(--gilt)}
.pesak .txt{color:#2b211d;font-size:17.5px}

.term{color:inherit;border-bottom:1.5px dotted var(--rishon);cursor:help}
.dim{color:#8f8676}
/* preserved-layout table (author's comparison tables) */
.optable{margin:6px 0 2px;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-family:var(--body)}
.optable table{width:100%;border-collapse:collapse;direction:rtl}
.optable caption{caption-side:top;background:linear-gradient(180deg,#f4efe4,#f1ebdd);
  font-family:var(--ui);font-weight:700;font-size:14px;color:var(--ink);padding:9px 12px;border-bottom:1px solid var(--line)}
.optable th,.optable td{border:1px solid var(--line);padding:9px 12px;vertical-align:top;text-align:start;white-space:pre-wrap;font-size:15px;line-height:1.5}
.optable thead th{background:#efe7d6;font-family:var(--ui);font-weight:700;color:var(--ink);text-align:center}
.optable th.rowhead{background:#f3dfe0;font-weight:700;color:#7a2e34;font-family:var(--ui);text-align:center;width:26%}
.optable td b{color:#1c1811}
.secref{color:var(--pesak);border-bottom:1.5px dotted var(--pesak);cursor:pointer;font-weight:600;font-family:var(--ui);font-size:.92em}

/* popovers */
#pop{position:fixed;z-index:60;max-width:290px;background:var(--ink);color:#f3ede0;
  font-family:var(--ui);font-size:13.5px;line-height:1.55;padding:11px 14px;border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .12s}
#pop b{color:var(--gilt);display:block;margin-bottom:3px;font-size:13px}
#pop.on{opacity:1}
#src{position:fixed;z-index:61;width:330px;max-width:92vw;background:var(--card);color:var(--ink);
  border:1px solid var(--rule);border-radius:12px;box-shadow:0 14px 40px rgba(30,20,10,.25);
  padding:14px 16px 12px;display:none}
#src.on{display:block}
#src .sref{font-family:var(--ui);font-weight:700;font-size:13.5px;color:var(--gemara);margin-bottom:7px}
#src .stext{font-family:var(--body);font-size:16px;line-height:1.7;max-height:230px;overflow:auto;color:#2b241b}
#src .srow{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}
#src .open{font-family:var(--ui);font-weight:700;font-size:13px;text-decoration:none;color:#fff;
  background:var(--gemara);padding:7px 13px;border-radius:8px}
#src .close{font-family:var(--ui);font-size:12px;color:var(--ink-faint);background:none;border:none;cursor:pointer}

.ask{margin-top:38px;background:#1f2a24;color:#eef0ea;border-radius:16px;padding:22px 22px 20px;font-family:var(--ui)}
.ask h3{margin:0 0 3px;font-weight:700;font-size:18px}
.ask .hint{color:#a9b6ac;font-size:13.5px;margin:0 0 14px;line-height:1.5}
.ask .chips{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.ask .chip{background:#2b3a31;border:1px solid #3c4f43;color:#d7e0d6;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer}
.ask .chip:hover{background:#35473b}
.ask .row{display:flex;gap:9px}
.ask input{flex:1;background:#141b17;border:1px solid #37473d;color:#f2f4ef;border-radius:10px;
  padding:12px 14px;font-family:var(--ui);font-size:15px;direction:rtl}
.ask input:focus{outline:none;border-color:#5c7a67}
.ask button.send{background:var(--gilt);color:#20160a;border:none;border-radius:10px;padding:0 20px;
  font-family:var(--ui);font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap}
.ask button.send:disabled{opacity:.55;cursor:default}
.answer{margin-top:15px;background:#182019;border:1px solid #2e3d33;border-radius:11px;padding:15px 17px;
  font-size:15.5px;line-height:1.75;color:#e8ece6;white-space:pre-wrap;font-family:var(--body);display:none}
.answer.on{display:block}
.answer .secref{color:#e9b45a;border-bottom-color:#e9b45a}
.answer .note{font-family:var(--ui);font-size:12px;color:#8fa093;margin-top:11px;border-top:1px solid #2e3d33;padding-top:9px;white-space:normal}
.spin{display:inline-block;width:15px;height:15px;border:2px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-inline-start:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* flashcards */
.fc-sub{font-family:var(--ui);color:var(--ink-soft);font-size:14.5px;margin:0 0 16px}
.fc-filters{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:var(--ui);font-size:14px;margin-bottom:18px}
.fc-filters label{color:var(--ink-soft);font-weight:600}
.fc-filters select{font-family:var(--ui);font-size:14px;padding:6px 10px;border:1px solid var(--rule);border-radius:8px;background:var(--card);color:var(--ink);margin-inline-start:6px}
.fc-types{display:flex;gap:7px;flex-wrap:wrap}
.fc-t{font-family:var(--ui);font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--rule);background:var(--card);color:var(--ink-soft);cursor:pointer}
.fc-t.on{background:var(--ink);color:#f3ede0;border-color:var(--ink)}
.fc-start{margin-inline-start:auto;font-family:var(--ui);font-weight:700;font-size:14px;background:var(--gilt);color:#20160a;border:none;border-radius:9px;padding:9px 16px;cursor:pointer}
.fc-progress{display:flex;align-items:center;gap:12px;font-family:var(--ui);font-size:13px;color:var(--ink-soft);margin-bottom:12px}
.fc-bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.fc-bar i{display:block;height:100%;background:var(--gilt);transition:width .25s}
.fc-card{background:var(--card);border:1px solid var(--rule);border-radius:16px;min-height:210px;padding:26px 26px 30px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;cursor:pointer;box-shadow:0 4px 18px rgba(40,30,15,.06)}
.fc-card.flip{cursor:default;background:#f6f1e6}
.fc-tag{position:absolute;top:12px;inset-inline-end:14px;font-family:var(--ui);font-size:11px;font-weight:700;color:var(--gilt);letter-spacing:.05em}
.fc-face{max-width:620px}
.fc-q{font-family:var(--display);font-size:23px;line-height:1.35;color:var(--ink)}
.fc-a{font-family:var(--body);font-size:18px;line-height:1.7;color:#2b241b;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
.fc-a b{font-weight:700;color:#1c1811}
.fc-hint{font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);margin-top:18px}
.fc-jump{display:inline-block;margin-top:12px;font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);cursor:pointer;border-bottom:1.5px dotted var(--pesak)}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fc-controls button{font-family:var(--ui);font-weight:700;font-size:15px;border:none;border-radius:10px;padding:11px 22px;cursor:pointer}
.fc-flip{background:var(--ink);color:#f3ede0}
.fc-yes{background:#3f7d5f;color:#fff}
.fc-no{background:#a24b4b;color:#fff}
.fc-end{text-align:center;padding:34px;background:var(--card);border:1px solid var(--rule);border-radius:16px}
.fc-score{font-family:var(--display);font-size:28px;color:var(--ink);margin-bottom:16px}
.fc-perfect{color:var(--gilt);font-family:var(--ui);font-weight:700;margin-bottom:16px}
.fc-again,.fc-restart{font-family:var(--ui);font-weight:700;font-size:14px;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;margin:0 5px}
.fc-again{background:var(--gilt);color:#20160a}
.fc-restart{background:var(--card-2);color:var(--ink);border:1px solid var(--rule)}
.fc-empty{padding:20px;color:var(--ink-soft);font-family:var(--ui)}

footer{border-top:1px solid var(--rule);font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);padding:18px 0 40px;text-align:center}

.home-link{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--ink-soft);text-decoration:none;display:inline-block;margin-bottom:10px;border:1px solid var(--rule);border-radius:8px;padding:5px 12px;background:var(--card)}
.home-link:hover{background:var(--card-2);color:var(--ink)}
.grid.home{grid-template-columns:1fr}
.grid.home nav.rail{display:none}
.subjects{padding:8px 0 44px;display:flex;flex-direction:column;gap:16px}
.subject-head{width:100%;display:flex;align-items:center;gap:12px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:13px 18px;cursor:pointer;font-family:var(--display);font-size:23px;color:var(--ink);text-align:start}
.subject-head:hover{background:#efe9dc}
.sh-caret{color:var(--gilt);font-size:15px;transition:transform .15s}
.subject-group.collapsed .sh-caret{transform:rotate(-90deg)}
.sh-title{flex:1}
.sh-count{font-family:var(--ui);font-size:12.5px;font-weight:600;color:var(--ink-faint)}
.subject-topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:14px 4px 2px}
.subject-group.collapsed .subject-topics{display:none}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:8px 0 40px}
.topic-card{display:block;text-decoration:none;background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:20px 22px;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 10px rgba(40,30,15,.05)}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(40,30,15,.1);border-color:var(--gilt)}
.tc-eyebrow{font-family:var(--ui);font-size:11.5px;font-weight:600;letter-spacing:.08em;color:var(--gilt);margin-bottom:8px}
.tc-title{font-family:var(--display);font-size:26px;color:var(--ink);line-height:1.1;margin-bottom:12px}
.tc-meta{font-family:var(--ui);font-size:12.5px;color:var(--ink-faint)}
@media(max-width:820px){
  body{font-size:17px}
  .grid{grid-template-columns:1fr;gap:8px;padding:14px 0 70px}
  nav.rail{position:static;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:10px}
}

<script id="content" type="application/json">{"title": "רואה יורה", "subtitle": "סיכומי הלכה אינטראקטיביים · מבחני הרבנות", "topics": [{"topic": {"title": "זמן תפילת שחרית", "eyebrow": "מבחני הרבנות · תפילה · סימן פ״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.89", "intro": {"lead": {"t": "'זמן תפילת השחר — משיעלה עמוד השחר, ומצותה עם הנץ החמה'", "ref": ""}, "body": "סימן פ״ט עוסק בשני עניינים: זמן תפילת שחרית — מאימתי ועד מתי — והדברים שאין לעשותם קודם התפילה.\nתחילה מתבארים המושגים והזמנים (שעות זמניות, עלות השחר, הנץ החמה וכו׳); לאחריהם נידונים זמני התפילה עצמם, ולבסוף הדברים שאסור לעשותם לפניה."}}, "sections": {"musagim": {"title": "ביאור מושגים", "seif": null, "sugya": null, "flow": [{"head": "חלוקת התוכן", "body": "בב״י (א׳) שני דיונים הלכתיים:\n   א.  זמן תפילה המוקדם — עמוד השחר או הנץ החמה?\n   ב.  זמן התפילה המאוחר — המוקד בשאלת שכר תפילה בזמנה."}, {"head": "מושגים מקדימים", "body": "**חלוקת היום ו׳שעות זמניות׳:**\nאנו עובדים עם ׳שעות זמניות׳. בשונה מהחלוקה שרגילים בה העולם, בה מחלקים את כל היממה ל־24 שעות, בשעות זמניות אנו מחלקים רק את היום (בלי הלילה), ול־12 חלקים.\nאין החלוקה של יום ולילה שווה. כלומר, היום אינו 12 שעות רגילות, ואין חפיפה בין שעה זמנית לשעה רגילה. אנו מגדירים ׳יום׳ עפ״י זמני האור, ולכן, היחס בין יום ללילה יישתנה בין חורף לקיץ:\n   בקיץ  - היום יותר ארוך מהלילה.\n   בחורף – היום יותר קצר מהלילה.\nובהתאמה:  בקיץ  - שעה זמנית > שעת 60 דקות\n               בחורף - שעה זמנית \u003c שעת 60 דקות\nיש מחלוקת מה בדיוק ההגדרה של יום; מתי היום מתחיל ומתי מסתיים (דהיינו, איזה טווח זמן אנו מחלקים ל־12):\n   גר״א:  תחילת היום – הנץ החמה\n              סוף היום – שקיעה\n   מג״א:  תחילת היום – עלות השחר\n              סוף היום – צאת הכוכבים\nכלומר, למג״א היום ארוך יותר, וכך גם כל שעה זמנית.\n\n**זמני היום הרלוונטיים עפ״י סדר:**\nעלות השחר  ←  הנץ החמה (זריחה)  ←  שליש היום (4 שעות זמנ׳)  ←  חצות היום  ←  צאת הכוכבים\n   שליש היום = סוף זמן תפילה  ·  חצות היום = סוף זמן תפילה בדיעבד\nעמוד השחר – התבהרות השמיים. ׳האיר פני המזרח׳ (מ״ב מדקדק בזה)\nהנץ החמה – עליית קרני השמש"}]}, "tehila": {"title": "תחילת זמן שחרית", "seif": "סעיף א׳,ח׳", "sugya": {"label": "ברכות · פרק תפלת השחר · כו.", "ref": "Berakhot.26a"}, "summary": "תחילת זמן תפילת שחרית מתברר לנו דווקא מהדיון ב**משנה** על סופה. יתרה מכך, **הגמרא** מתעמתת עם **ברייתא** שלפיה אין בכלל מושגים של תחילה וסוף, אלא 'מצוותה עם הנץ החמה'. הגמרא משייכת את הזמן המוקדם יותר — 'עם הנץ החמה' — לוותיקין, ואת הזמן של ר' יהודה וחכמים למאחרים, ובכך מייצרת טווח זמן שיש בו תחילה וסוף, ולא שעה ספציפית.\nגם לאחר שלקחה הגמרא את 'מצוותה עם הנץ החמה' והפכה אותה ל'תחילת זמן תפילה', **הראשונים** (רא\"ש, תוס', רמב\"ם) מזכירים כי בכלל תפילות כנגד קורבנות. לכן תחילת זמן התפילה כתחילת זמן קרבן התמיד — משיעלה עמוד השחר!\nלכן, בעקבות הברייתא של 'מצוותה עם הנץ החמה', מייצרים הראשונים מדרג כזה: לכתחילה, ראוי להתייחס להנץ החמה כתחילת זמן תפילה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. וכן פוסק **הש\"ע**.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מחלוקת **חכמים** ו**רבי יהודה** גבי זמן תפילת שחרית:\nחכמים: עד חצות\nרבי יהודה: עד 4 שעות"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**ורמינהו**: מצוותה (של ק\"ש) עם הנץ החמה (ותו לא. כדי שיסמוך גאולה לתפלה).\nכלומר: מכך שכדי לסמוך ק\"ש לתפילה צריך לקרוא ק\"ש בהנץ החמה — גם תפלה בהנץ החמה! אז איך חכמים ורבי יהודה מדברים על 'עד חצות' ו'4 שעות'?\n**תירוץ**: הברייתא מדברת לותיקין (**רש\"י**: המקדימים למצוות ומחזרים לעשותן בזמנן). ובמשנה — ה'עד חצות' של חכמים וה־4 שעות של רבי יהודה למאחרים.\n(כלומר, כל הסיבה שהראשונים הולכים להסתבך עם לכתחילה־בדיעבד ולתעדף את הנץ החמה על אף שכבר בעמוד השחר מתחיל זמן שחרית — זה בעקבות הברייתא על ק\"ש.)\n**מסיקים**: הלכה כרבי יהודה (כי במשנה בעדויות כוותיה).\nלכן: למאחרים — סוף זמן תפלה סוף 4 שעות זמניות מתחילת היום; למקדימים — מתפללים עם הנץ החמה."}, {"layer": "rishon", "src": "רא\"ש · רמב\"ם · תוס'", "srcRef": null, "txt": "תחילת זמן שחרית — משיעלה עמוד השחר (כזמן קרבן התמיד).\nעיקר מצוות שחרית — עם הנץ החמה (כברייתא).\nבדיעבד אם התפלל — משיעלה עמוד השחר."}, {"layer": "gemara", "src": "ריו\"ח", "srcRef": null, "txt": "הנץ החמה — מצווה מן המובחר.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "זמן 'מצוותה' של תפלת שחרית מתחיל עם הנץ החמה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. (**רא\"ש, רמב\"ם, תוס'**)"}, {"subhead": "'האיר פני המזרח'"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מ\"ב**: 'האיר פני המזרח' = כל המזרח, ולא רק נקודה.\n**רע\"א**: אפילו אם יש עוד כוכבים בשמיים — העיקר שיאיר פני המזרח.\n**מג\"א**: יוצא בדיעבד אפילו אם לא 'האיר פני המזרח', כל שעלה עמוד השחר.\n**מ\"ב ואחרונים**: אם לא האיר פני המזרח — לא יוצא."}, {"subhead": "זמנים מיוחדים"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מהרש\"ל**: בימי הסליחות ראוי להיזהר מלהקדים ולהתפלל לפני הנץ החמה.\n**מג\"א**: אולי סמכו על זה שיש טורח לציבור ללכת אחר הסליחות הביתה ולבוא שוב לשחרית.\n**פמ\"ג**: בשבועות — אחרי שערים כל הלילה — מותר להתפלל קודם הנץ (טורח הציבור ללכת ולחזור)."}, {"subhead": "שעת הדחק (ס׳ ח׳)", "src": "ברכות · ל.", "srcRef": "Berakhot.30a"}, {"layer": "lead", "srcRef": null, "txt": "בשעת הדחק, אפילו לכתחילה אפשר להתפלל קודם הנץ החמה. אבל לק\"ש מחכים ל'משיכיר' (סי' נח).\nכלומר, יש כאן שתי משוואות:\nכוונה > עיקר זמן תפלה (הנץ החמה)\nכוונה > סמיכת גאולה לתפילה"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "**ת\"ק**: מי שהשכים לצאת לדרך לפני הנץ החמה — מתפלל, ואח\"כ משלים ק\"ש בזמן ('משיכיר').\n**ר' שמעון בן אלעזר**: לא יתפלל לפני זמן ק\"ש. ממילא צריך לסמוך גאולה לתפילה.\n**אבוה דשמואל ולוי**: נהגו כת\"ק — יצאו מוקדם לדרך, והקדימו והתפללו לפני הנץ החמה, ואח\"כ קראו ק\"ש בזמנה."}, {"layer": "gemara", "src": "שורש המחלוקת", "srcRef": null, "txt": "**לת\"ק** — יותר חשוב תפילה בכוונה (בדרך לא יוכלו לכוון, לכן מתיר להתפלל לפני היציאה).\n**לר' שמעון ב\"א** — יותר חשוב סמיכת גאולה לתפילה.", "under": true}, {"layer": "rishon", "src": "ר\"ח · רא\"ש · רב האי גאון", "srcRef": null, "txt": "כת\"ק, אבוה דשמואל ולוי."}, {"layer": "rishon", "src": "בה\"ג · תוספות", "srcRef": null, "txt": "כר' שמעון בן אלעזר.", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אם מדובר בדרך שממש לא יכול לכוון בה — הרי שגם ק\"ש יכול להקדים!\nההיתר של הברייתא מדבר בדרך בה יכול לכוון לפחות בפס' ראשון ק\"ש, אבל לא בעמידה.\n(וכך פוסקים בסי' נח)", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ח׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.8", "txt": "בשעת הדחק, כגון מי שהשכים לצאת לדרך — מותר להתפלל עמידה כבר משעלה עמוד השחר.\nאבל בלי ק\"ש, וישלים אח\"כ ק\"ש בזמנה ('משיכיר').\nולמרות שלא סומך גאולה לתפלה — עדיף שיכוון בתפילה בביתו משיסמוך. (**ת\"ק, ר\"ח, רא\"ש, רב האי גאון**)"}, {"layer": "acharon", "src": "מג\"א · ערוה\"ש", "srcRef": null, "txt": "העולם לא נוהגים כן — הם מתפללים בדרך בהנץ החמה. אולי כי היום א\"א לכוון כ\"כ."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "שאפשר להתפלל כבר מעמוד השחר = משהאיר המזרח.", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם יהיה אנוס כך שלא יכול לכוון אפילו בפס' ראשון של ק\"ש — יגיד גם ק\"ש בע\"ה. (**רשב\"א**)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם האיר המזרח — נוטה יותר להגיד גם ק\"ש לפני זמנה, מאשר לפצל (נ\"ל שאפילו אם יוכל לכוון בפס' ראשון בדרך).", "under": true}, {"subhead": "מהי 'שעת הדחק'?"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**בברייתא** — מדובר על 'המשכים לצאת לדרך'.\n**טור**: מי שהוא אנוס.\n**ש\"ע**: שעת הדחק, כגון שצריך להשכים לדרך. (**מ\"ב**: והולך עם שיירה שלא ממתינה לו)\n**מ\"ב** (וכן משמע בסוגיה, ראשונים וב\"י): כל סיטואציה בה לא יכול לכוון בתפילתו.\n**ערוה\"ש**: מי שאינו יכול להתעכב ומוכרח לצאת לפני הנץ החמה. (פשיטא שגם בנסיעה, ולאו דווקא הליכה)"}, {"subhead": "מי שכבר בדרך"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מג\"א**: לפי מה שאנחנו מעדיפים כוונה על סמיכת גאולה לתפילה — מי שנמצא בדרך ועדיין לא התפלל, עדיף שיפצל ויגיד ק\"ש כשיכול (אף בלא תפילין), אבל יתפלל ש\"ע רק כשיוכל לכוון.\n**פ ef": "Shulchan_Arukh,_Orach_Chayim.89.3", "txt": "אסור לצאת לדרך קודם שיתפלל שמונה עשרה (משהגיע זמן תפילה) (גמרא + טור)."}, {"layer": "acharon", "src": "מ״ב", "srcRef": null, "txt": "נכון אף במנחה וערבית; ואף אם במקום שהולך יוכל להתפלל במניין ובזמן — יתפלל קודם."}, {"layer": "acharon", "src": "מג״א · מ״ב", "srcRef": null, "txt": "אינם תופסים כב״י שאין מדובר בשיירה — ולכן ההולך עם שיירה שלא תמתין לו, ילך בלא להתפלל.", "under": true}], "pesak": "אסור לצאת לדרך קודם תפילה; ההולך עם שיירה שלא תמתין (מג״א, מ״ב) — ילך ויתפלל בדרך."}, "achila": {"title": "אכילה ושתייה", "seif": "סעיפים ג׳-ה׳", "sugya": null, "ops": [{"subsubhead": "עיקר הדין (ג׳)"}, {"layer": "gemara", "src": "ר׳ אליעזר בן יעקב", "srcRef": null, "txt": "אסור לאכול ולשתות קודם התפילה; והאוכל ושותה ואח״כ מתפלל — עליו נאמר 'ואותי השלכת אחרי גֵּויך' (אל תקרי גֵויך אלא גֵּאיך)."}, {"layer": "rishon", "src": "ראבי״ה · מהר״י אבוהב", "srcRef": null, "txt": "מותר לשתות מים — לא שייך בהם גאווה."}, {"layer": "rishon", "src": "סמ״ג", "srcRef": null, "txt": "צמא שמצטער — מותר לשתות מים (עדיף משיצטער בתפילתו).", "under": true}, {"layer": "rishon", "src": "כלבו", "srcRef": null, "txt": "י״א שאף מים אסור — יש בהם קצת גאווה.", "under": true}, {"layer": "rishon", "src": "מהר״י אבוהב · ב״י (כח חז״ל)", "srcRef": null, "txt": "מהר״י אבוהב: חז״ל אסרו רק דברי גאווה, וצורך הגוף התירו — ולכן שינו הפסוק ממשמעו. ב״י: האיסור דרבנן והפסוק אסמכתא, ולכן יכלו לשנותו.", "collapsed": true}, {"layer": "rishon", "src": "רא״ש (שבת)", "srcRef": null, "txt": "היה שותה מים בשבת בבוקר קודם התפילה (אין בעיית קידוש — עדיין לא הגיע זמנו).", "under": true}, {"layer": "rishon", "src": "מהר״י אבוהב (לרפואה)", "srcRef": null, "txt": "לראבי״ה, לרפואה — מותר אף לאכול ולשתות (לא רק מים).", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ג׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.3", "txt": "משהגיע זמן תפילה — אסור לאכול ולשתות קודם שמתפלל (ראב״י); אך מותר מים (ראבי״ה), ולאכול ולשתות לרפואה (מהר״י אבוהב), וגם בשבת מים (רא״ש)."}, {"layer": "acharon", "src": "מ״ב · מג״א", "srcRef": null, "txt": "מ״ב: אף לטעום אסור. מג״א/מ״ב: היתר הרפואה אף למי שאינו חולה, ואף במאכלים טעימים — ובלבד שעושה לרפואה ולא להנאה בלבד."}, {"layer": "acharon", "src": "שערי תשובה · מ״ב · ערוה״ש (משקאות)", "srcRef": null, "txt": "שעה״ת/מ״ב: אסור מים עם סוכר. מ״ב: המתקשה בלא קפה — מותר, בלא סוכר וחלב (=גאווה); סוכר בפה מותר, לא במשקה. ערוה״ש: מתיר סוכר (והעולם נוהגים אף בחלב, ואף לימונדה).", "collapsed": true}, {"subsubhead": "סברת הרמב״ם ההפוכה (ד׳)"}, {"layer": "rishon", "src": "רמב״ם", "srcRef": null, "txt": "הצמא והרעב כחולים; ואם אינם יכולים לכוון — אסור להם להתפלל עד שיאכלו וישתו."}, {"layer": "rishon", "src": "טור (צ״ח) · בית יוסף", "srcRef": null, "txt": "היום אי אפשר לכוון כראוי; אין חובה לאכול קודם, אך הרעב הרוצה לסמוך על הרמב״ם — אם אינו יכול לכוון, לא יתפלל עד שיאכל.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ד׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.4", "txt": "צמא/רעב — אם יכול לכוון, יתפלל; אם אינו יכול, רשאי שלא להתפלל עד שיאכל/ישתה (עפ״י הרמב״ם וטור בצ״ח)."}, {"layer": "acharon", "src": "ערוה״ש", "srcRef": null, "txt": "אם אי־האכילה תזיק לו — אסור לו להתפלל קודם שיאכל וישתה.", "under": true}, {"subsubhead": "התחיל לפני עלות השחר (ה׳)"}, {"layer": "lead", "srcRef": null, "txt": "ראינו (בסעיף ג׳ בש״ע) שהאיסור על אכילה ושתייה לפני התפילה שייך רק מרגע שהתחיל זמנה. דהיינו — עלות השחר. ומה לגבי מי שהתחיל באכילה בזמן המותר הנ״ל, ועלה עמוד השחר?"}, {"layer": "rishon", "src": "רשב״א · טור (בשם רמב״ם)", "srcRef": null, "txt": "התחיל לאכול לפני עלות השחר — אינו צריך להפסיק משהגיע.", "under": true}, {"layer": "rishon", "src": "רא״ש · ר״י", "srcRef": null, "txt": "צריך להפסיק."}, {"layer": "rishon", "src": "בית יוסף · ערוה״ש", "srcRef": null, "txt": "ב״י: לטור כנראה גרסה משובשת — הרמב״ם התיר שלא להפסיק רק במנחה. ערוה״ש: הטור לא טעה, וכוונתו לרמב״ם בהלכות ק״ש.", "collapsed": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ה׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.5", "txt": "התחיל לאכול לפני עלות השחר ואז הגיע ע״ה — צריך להפסיק (רא״ש, ר״י). וי״א שאינו צריך (רשב״א)."}, {"layer": "acharon", "src": "מ״ב", "srcRef": null, "txt": "אף בחצי שעה שלפני עלות השחר אסורה אכילת קבע (כרמ״א תרנ״ב), אך אכילת ארעי מותרת.", "under": true}, {"layer": "acharon", "src": "מג״א · ערוה״ש", "srcRef": null, "txt": "מג״א: לדעה שצריך להפסיק — אם יודע שהארוחה תימשך עד ע״ה, עדיף שלא יתחילנה. ערוה״ש: רוב הדעות שאין צריך, וכן המנהג בחתונות קיץ.", "collapsed": true}], "pesak": null}, "limud": {"title": "ללמוד/ללמד תורה", "seif": "סעיף ו׳", "sugya": {"label": "ברכות · פרק קמא · ה:", "ref": "Berakhot.5b"}, "ops": [{"layer": "gemara", "src": "אבא בנימין (ברייתא)", "srcRef": null, "txt": "'כל ימי הייתי מצטער על תפילתי שתהא סמוכה למיטתי.'"}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "אבא בנימין הקפיד שלא ללמוד תורה משקם ממיטתו עד שהתפלל."}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "תמהו על רש״י, והביאו ראיה שמותר ללמוד קודם התפילה.", "under": true}, {"layer": "rishon", "src": "רא״ש", "srcRef": null, "txt": "אף הוא תמה; ואולי כוונת רש״י למתפלל בביהמ״ד (בלא מניין), שעלול להימשך בלימודו עד שיעברו הזמנים.", "under": true}, {"layer": "rishon", "src": "ר׳ יונה", "srcRef": null, "txt": "לרש״י — האיסור ללמוד לבד; אך ללמד אחרים מותר (לעצמו קובע הזמן; באחרים ספק אם יוכלו אחר התפילה).", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ו׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.6", "txt": "משהגיע זמן תפילה — אסור למי שרגיל להתפלל בביהמ״ד להתחיל ללמוד שם, שמא יעברו הזמנים (רש״י + רא״ש); אך הרגיל ללכת לביהכ״נ — מותר (רא״ש); וכן המלמד אחרים — מותר, מפני זכות הרבים (ר׳ יונה)."}, {"layer": "acharon", "src": "מג״א · מ״ב", "srcRef": null, "txt": "אסור להתחיל ללמוד, אך אם התחיל לפני ע״ה — מותר להמשיך (א״ר: יעצור לק״ש; לבוש: אין צריך). ומ״ב: יש מתירים להתחיל בין ע״ה להנץ, ופתרון־היתר לומר לחבר שיזכירנו.", "collapsed": true}], "pesak": "משהגיע זמן תפילה — הרגיל להתפלל בביהמ״ד לא יתחיל ללמוד; הרגיל בביהכ״נ, והמלמד אחרים — מותר."}, "tisporet": {"title": "תספורת ורחצה", "seif": "סעיף ז׳", "sugya": null, "ops": [{"layer": "rishon", "src": "רמב״ם", "srcRef": null, "txt": "מותר להסתפר ולהיכנס למרחץ סמוך לשחרית — שלא גזרו אלא סמוך למנחה (המצוי), ולא בשחרית."}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ז׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.7", "txt": "פוסק כרמב״ם."}, {"layer": "acharon", "src": "ערוה״ש · פמ״ג", "srcRef": null, "txt": "ערוה״ש: כל שאסור סמוך למנחה — מותר לפני שחרית (חוץ מאכילה). פמ״ג: בורסקי אסור אף סמוך לשחרית.", "under": true}, {"layer": "acharon", "src": "א״ר · מ״ב", "srcRef": null, "txt": "ההיתר רק לפני עלות השחר; לאחר ע״ה — אסור. ובמלאכות המצויות לפני ע״ה — יש מחמירים אף בחצי שעה שלפניו.", "under": true}], "pesak": "מותר להסתפר ולרחוץ סמוך לשחרית — אך רק לפני עלות השחר (א״ר, מ״ב)."}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "group", "title": "זמן תפילת שחרית", "spans": "סעיפים א׳,ח׳", "children": ["musagim", "tehila", "sof", "kitzur"]}, {"type": "group", "title": "עשיית דברים קודם התפילה", "spans": "סעיפים ב׳-ז׳", "children": ["yesodot", "shlom", "chafatzim", "derech", "achila", "limud", "tisporet"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"שעות זמניות": "חלוקת יום האור (מהזריחה/עה״ש עד השקיעה) ל־12 חלקים שווים; שעה זמנית משתנה לפי אורך היום.", "עלות השחר": "תחילת האור במזרח, כ־72 דקות לפני הנץ; ממנו מתחיל בדיעבד זמן שחרית.", "הנץ החמה": "זריחת השמש; זמן 'מצוותה' של שחרית לכתחילה.", "ותיקין": "המקדימים למצוות ומדקדקים לקיימן בזמנן — מתפללים עם הנץ החמה.", "מצוותה": "הזמן המובחר לקיום המצווה (בשחרית — הנץ החמה).", "סמיכת גאולה לתפילה": "לסמוך את ברכת 'גאל ישראל' (סוף ק״ש) לתפילת עמידה בלא הפסק.", "משיכיר": "הזמן שבו מכיר את חברו הרגיל ברחוק ד׳ אמות — זמן ק״ש לכתחילה.", "שעת הדחק": "מצב אילוץ (כמשכים לדרך) שבו הקילו להתפלל מעלות השחר.", "צפרא דמרי טב": "'בוקר טוב לאדוני' — נוסח ברכת שלום המותר (שאינו לשון 'שלום').", "מלאכת מחשבת": "מלאכה מכוונת ומתוכננת; דין הקובע חיוב במקצת מלאכות שבת."}, "subject": "תפילה וברכות", "id": "tefila"}, {"topic": {"title": "מילה בשבת", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן של״א", "siman": "Shulchan_Arukh,_Orach_Chayim.331", "intro": {"lead": {"t": "\"וביום השמיני ימול בשר עורלתו\" (ויקרא)", "ref": ""}, "body": "ברית המילה צריכה להיעשות ביום השמיני. אך מה קורה אם היום השמיני יוצא בשבת?\n\nבפרק רבי אליעזר דמילה, מובא בגמרא כי מילה דוחה את השבת ('וביום השמיני ימול בשר ערלתו – אפילו בשבת')\\cite{בבלי, שבת קלב ע\"א}{Shabbat.132a}.\n\nולפיכך, נאמר במשנה כי עושים כל צרכי מילה בשבת\\cite{בבלי, שבת קלג ע\"א}{Shabbat.133a}. היינו שמותר 'לחלל' את השבת בעשיית כל מעשי המילה.\n\nאולם, דווקא את המילה עצמה מותר לעשות בשבת. אך מכשיריה – אשר ניתן להכין מערב שבת – לא דוחים השבת אפילו בדרבנ. (לכן אסור להביא סכין בשבת או לשחוק כמון וכו')\n\n-לפיכך, כתבו הפוסקים, שאם אדם לא הכין לשבת את הדברים הנצרכים למילה, יש לדחות אותה; ואסור לחלל את השבת כלל על מנת להשיגם. אולם, אם יש לו גוי, מותר לומר לו לעבור על דרבנן לשם כך (למשל, שיביא סכין מרשות בדרבנן. ולדעת הרמ\"א במקום צורך גדול -כגון כאן- מותר אף להגיד לו לעבור בדאורייתא).\nוגם, מותר להכין את הכשרי המילה שבהכנתם עוברים בדרבנן בשינוי (משום שקיי\"ל שהתירו שבות ע\"י שינוי לצורך זה)\n\nבעצם, זה שלא מחללים על מכשירי מילה אלא רק לצרכה ממש, אין זה אומר שהמילה חשובה פחות משאר פיקוחי נפש מהבחינה הזאת. אלא שהיא דבר שאנו יודעים עליו מראש, לכן יש להתכונן בהתאם ולהמנע מחילול שבת שאינו נצרך בכל מידה שניתן. ניתן לדרג את ענייני פיקוח נפש, יולדת ומילה במדרג זה: פיקוח נפש ← יולדת ← מילה."}}, "sections": {"tzorchei": {"title": "צרכי ומכשירי מילה", "seif": "סעיף א׳", "sugya": null, "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "עושין כל צרכי מילה בשבת. מוהלים, פורעים ומוצצים. ונותנים תחבושת\n(מוהלים = חותכים את הערלה (החיצונית); פורעים= קורעים את העור שמתחת לערלה; מוצצים= את דם הפצע. ואע\"ג שנחשב לעשיית חבּורה )", "ref": {"label": "שבת · פרק ר\"א דמילה · קלג", "ref": "Shabbat.133a"}}, {"layer": "gemara", "src": "גמרא · רב פפא", "srcRef": null, "txt": "**רב פפא** אומר שמותר למצוץ למרות שבכך הדם ניתק ממקומו ויש בכך עשיית חבורה.\n   ומתבאר גם שעם נתינת התחבושת על האיבר, שמים עליה כמון לרפואה (ועל אף שיש בכך חשש שמא ישחק סממנים)", "ref": {"label": "שם", "ref": "Shabbat.133a"}}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.1", "txt": "כתב עפ\"י המשנה שעושים כל צרכי המילה, מוהלין ופורעין ומוצצין ונותנין עליו כמון."}, {"layer": "acharon", "src": "והמשנ\"ב בשם שו\"ת בני ציון", "srcRef": null, "txt": "סבר שהמציצה מותר לעשות דווקא בפה."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "ובסעיף ו', כתב שמכשירי מילה לא דוחים את השבת משום שאפשר לעשותם מער\"ש. לכן, אסור להביא סכין מילה מרשות אחרת, או לחמם מים וכו'. ואפילו אם זה רק בדרבנן.\n(כרבי עקיבא במשנה: כל מלאכה שאפשר לעשותה מער\"ש – אינה דוחה שבת)"}], "pesak": null}, "rechitza": {"title": "רחיצה", "seif": "סעיף ט׳", "sugya": null, "intro": "(גם צורך מילה)", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מותר לרחוץ את התינוק במים חמים הן לפני המילה והן אחרי המילה, אבל רק בידיים, ולא בכלי. (כלומר, זה נחשב מצרכי המילה, גם לפני וגם אחרי; וחשוב לרפואת התינוק)\nולדעת **רבי אלעזר בן עזריה**, אף ביום השלישי למילה מותר לרחוץ אותו (אם יוצא בשבת. וזה עפי\"ה הפס' 'ויהי ביום השלישי בהיותם כואבים')", "ref": {"label": "שבת · פרק ר\"א דמילה · קלד", "ref": "Shabbat.134a"}}, {"layer": "gemara", "src": "ובגמרא", "srcRef": null, "txt": "פסקו כרבי אלעזר בן עזריה.\nיוצא אם כן, שמותר אפילו לחלל שבת ע\"מ לחמם מים לצורך רחיצה לפני המילה, לאחר המילה וביום השלישי.", "ref": {"label": "שם", "ref": "Shabbat.134a"}}, {"layer": "lead", "srcRef": null, "txt": "אבל מה לגבי היום השני? האם היום השלישי הוא היום השלישי דווקא? או שהוא מן הסתם לרבותא גם את היום השני?"}, {"layer": "rishon", "src": "הרב המגיד ברמב\"ם", "srcRef": null, "txt": "משמע שדווקא היום השלישי. לכן אסור לחמם מים בשבת ליום השני."}, {"layer": "rishon", "src": "הרמב\"ן", "srcRef": null, "txt": "סבר שאף ביום השני מותר."}, {"layer": "rishon", "src": "אך בכל מקרה, הב\"י", "srcRef": null, "txt": "כותב בסוף שכל זה נכון לזמן הגמרא, שאז היה זה סכנה לתינוק אם לא היו רוחצים אותו בימים הנ\"ל. אולם בימינו שלנו, שאין זה מסוכן אם לא נעשה כן – אסור לחלל על כך את השבת; ודינו כדין סתם רחיצה של גדול."}, {"layer": "shulchan", "src": "ולפיכך כתב בשו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.9", "txt": "שהאידנא לא נחשבת רחיצת התינוק לפני ואחרי המילה וביום השלישי כדבר הנחוץ לתינוק; ולכן אסור לחלל לשם כך את השבת (ואף לא נחשב הכשר מילה)."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "סבר, שבמדינות אשכנז נהגו בשטיפת הוולד לפני המילה בימים הנ\"ל וביום השלישי אם הוחמו מער\"ש (כלומר למרות שעפ\"י שכ\"ו מותר רק פניו ידיו ורגליו. נחשב צורך גדול, אבל עדיין לא חיללו שבת). אבל לאחר המילה – חיכו עד מוצ\"ש."}, {"layer": "lead", "srcRef": null, "txt": "וכמובן שאם רואים שיש לתינוק סכנה ויש צורך בשטיפתו – מותר אף לחלל את השבת ולחמם. וראיתי עפ\"י הרב מרדכי הלפרין, שיש כיום מודעות למחלות באיבר המין הנפוצות במדינות שונות, אשר מצריכות שטיפה במים חמים לאחר המילה כנ\"ל. וכן הוא בארץ ישראל"}, {"layer": "acharon", "src": "והמשנ\"ב בשם התשב\"ץ", "srcRef": null, "txt": "שתינוק שהיה חולה ונתרפא, אסור למול אותו ביום חמישי, משום שיש חשש שתהא בו סכנה בשבת, שהיא היום השלישי למילה – ואז ייצטרכו לחלל עליו את השבת. ובגלל שמילה שאינה בזמנה אינה דוחה את השבת.", "under": true, "collapsed": true}, {"layer": "acharon", "src": "אך הש\"ך (ומג\"א)", "srcRef": null, "txt": "חלק על כך, וסבר שוודאי שמותר למול שלא בזמנו ביום ה' כנ\"ל.", "under": true, "collapsed": true}], "pesak": null}, "goy": {"title": "באמירה לגוי", "seif": "סעיף ו׳", "sugya": null, "ops": [{"layer": "shulchan", "src": "השו\"ע (ש\"ז)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.307", "txt": "לגבי אמירה המותרת לגוי בשבת, פסק בסימן ש\"ז כדעת הרמב\"ם, שאמירה מותרת בשבות דשבות לצורך מצווה. כלומר, האמירה עצמה היא שבות, ואיסור דרבנן הוא שבות. לפיכך, מותר להגיד לגוי לעבור על איסור דרבנן לצורך מצווה."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "ולפי זאת נקט גם בעניין דידן, שמכשירי מילה – אשר אסור לחלל עליהם שבת כלל – אסור אף לאמר לגוי לחלל עליהם את השבת. אלא שבאיסורי דרבנן - שאז הווי שבות דשבות לצורך מצוות המילה – מותר."}, {"layer": "rama", "src": "ולדעת הרמ\"א", "srcRef": null, "txt": "שבמקום צורך גדול ניתן להקל באמירה לגוי לצורך מצווה אף בדאורייתא (עפ\"י מה שכתב בש\"ז, ה' כדעת העיטור)"}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "ונראה שלעניין מילה אפשר להקל יותר בדאורייתא, שהרי יש מי שסבר (תוספות שם) שמותר אמירה לגוי לצורך מילה ויישוב הארץ בכל גווני. וכן כתב המשנ\"ב\nולעניין טלטול - לדעת רוב הפוסקים אין רה\"ר דאורייתא בזמן הזה. אז בכך וודאי ניתן.", "under": true}], "pesak": null}, "tzorech": {"title": "מתי נחשב צורך מילה", "seif": "סעיף ב׳", "sugya": null, "intro": "למדנו שכל צורכי מילה דוחים את השבת. והסוגייה שם מלמדתנו עפ\"י ברייתא, כי זמן החלון לעשות צרכי המילה (אפילו הורדת חתיכות העור שאינן מעכבות לכשרות המילה) – הוא מהרגע בו התחיל המוהל את המילה, וכל זמן שלא סילק ידו מהעיסוק במילה. אז, עדיין יכול לחזור ולחתוך אפילו הציצין שאינם מעכבין. אבל מרגע שסילק ידו – יכול לחזור רק לשם הציצין המעכבים.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "כל זמן שהוא עוסק במילה – חוזר אף לציצין שאינם מעכבים. פירש מן המילה – חוזר רק לצורך ציצין המעכבין. (משום שאין צורך בהורדתם ואינם צורך מצווה)", "ref": {"label": "שבת · פרק ר\"א דמילה · קכג ע\"ב", "ref": "Shabbat.123b"}}, {"layer": "gemara", "src": "ובגמרא", "srcRef": null, "txt": "מוסבר שהציצין המעכבין הם הבשר המכסה את רוב העטרה. היינו, את הגיד סביב ומטה."}, {"layer": "rishon", "src": "הטור (יו\"ד רסו) בשם העיטור", "srcRef": null, "txt": "סבר שאפילו אם פירש מעיסוקו במילה חוזר אף לצורך ציצין שאינם מעכבים. והב\"י הסביר שטעמו הוא שסובר שהגמרא דחתה את הברייתא להלכה."}, {"layer": "rishon", "src": "אבל הרא\"ש והטור", "srcRef": null, "txt": "סברו כפשט הברייתא"}, {"layer": "shulchan", "src": "וכן נקט השו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.2", "txt": "כל זמן שלא סילק ידו מן המילה, חוזר אפילו על ציצין שאינם מעכבין. אך אם סילק ידו – אינו חוזר, אלא רק על ציצין המעכבין. ואילו הם המעכבין – בשר החופה אפילו רוב גובהה של עטרה."}, {"layer": "rishon", "src": "והר\"ן", "srcRef": null, "txt": "סבר שזמן העיסוק הוא אפילו אם הפסיק את החיתוך, אבל הסתפק לגבי שלב המציצה, אם נחשב עדיין עיסוק ומותר לחזור לציצין אלו.", "under": true}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "סבר שנחשב שעוסק במצוות המילה, ויכול לחזור.", "under": true}], "pesak": null}, "safek": {"title": "ספק צריך מילה / ספק נולד בחודש שמיני", "seif": "סעיף ג׳", "sugya": null, "intro": "בסימן ש\"ל, ראינו עפ\"י הברייתא בקל\"ה, שאין מחללין את השבת על תינוק שנולד בחודש השמיני או שספק אם נולד בחודש השמיני (ככה\"נ מנק' הנחה שהוא בוודאי ימות, וזה אפילו לא ספק פיקוח נפש). אולם, אם גמרו שערותיו וציפורניו, נחשב שנולד בחודש השביעי ולכן מותר. וכן, שהה שלושים יום ויותר – מחללים.\nלפיכך, נפקא מינא גם לגבי מילה. שהרי אם אין מחללים את השבת על בן חודש ח'/ספק בן חודש ח' - משמע שגם לא מלים אותו.", "ops": [{"layer": "gemara", "src": "ברייתא · גמרא · רב אדא בר אהבה", "srcRef": null, "txt": "**ברייתא**: אין מחללין את השבת על תינוק שנולד בחודש ה-8/ספק חודש 8\n**גמרא**: **רב אדא בר אהבה** סובר שספק נולד בחודש 8, מותר למול, וממאי נפשך? אם הוא בן שבעה ויחייה– וודאי מותר למול; אם בן שמונה – אז רק חתך בבשר (ולא חבורה, האסורה בשבת).\nובאמת מסבירים שרק מכשירי מילה אסורים לצורך מילת ספק 8.", "ref": {"label": "שבת · פרק ר\"א דמילה · קלה", "ref": "Shabbat.135a"}}, {"layer": "lead", "srcRef": null, "txt": "האם קיי\"ל כרב אדא בר אהבה, או שאסור עפ\"י פשט הברייתא?"}, {"layer": "rishon", "src": "רי\"ף ורא\"ש", "srcRef": null, "txt": "מביאים רק את הברייתא, ולא את הסברא של רב אדא להתיר"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "לכן משמע שהרי\"ף אוסר למול ספק בן שמונה (ואם היה מתיר היה מוריד את הברייתא ומביא את רב אדא בר אהבה)", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "חולק על קריאת הר\"ן ברי\"ף שלפיה משתמע שאוסר בכל ספק 8.\nמעמיד את מה שאסרה הברייתא למול דווקא בשלא גמרו שערותיו וציפורניו. אבל אם גמרו – מותר למול את הוולד אפילו אם הוא נולד בחודש שמיני בוודאות. ואין צורך להעמיד כרב אדא.\nלכן: ספק נולד לשמונה – אסור, אלא אם גמרו שערותיו ציפורניו. וכך סובר גם בדעת הרמב\"ם", "under": true}, {"layer": "shulchan", "src": "וכן פסק בשו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.3", "txt": "בן שמונה- אסור למול אותו. ספק בן שמונה – מותר אם גמרו שערותיו וציפורניו"}, {"layer": "rama", "src": "והרמ\"א (יו\"ד רסו)", "srcRef": null, "txt": "סובר כדעת הטור והר\"ן שמלין כל ספק בן שמונה (אפילו לא גמרו)"}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "'נהרא נהרא ופשטיה'. כלומר, כל אחד ומנהגו."}, {"layer": "lead", "srcRef": null, "txt": "ובכל מקרה, כיום וודאי שדין נולד לחודש שמיני אינו רלוונטי, כאשר יש לנו רפואה מתקדמת וכו'. אולם, לא נמול פג בכל מקרה משום שיש לו בכך סכנה."}], "pesak": null}, "mahul": {"title": "מהול, אנדרוגינוס ונולד בבין השמשות", "seif": "סעיף ה׳", "sugya": null, "intro": "שתי קבוצות נוספות של וולדים שאין מחללים עליהם את השבת במילתם:\n1) ספק אם חייבים במילה בשבת: אנדרוגינוס, מהול, ונולד בבינה\"ש\n2) לא צריכים מילה ביום השמיני משום שהיולדת לא נטמאה", "ops": [{"layer": "gemara", "src": "בברייתא", "srcRef": null, "txt": "למדים שרק מי שחייב במילה בוודאות דוחים בעבור מילתו את השבת. אבל אם הוא בספק אם חייב במילה – לא מחללים עליו.\nוהם: אנדרוגינוס (שספק אם הוא זכר או נקבה); נולד בבין השמשות (ספק אם נולד בשישי או בשבת, לכן ספק אם היום ה-8 הוא שבת או ראשון); נולד מהול (ספק אם צריך להטיף ממנו דם ברית)"}, {"layer": "gemara", "src": "רבי אסי", "srcRef": null, "txt": "לא צריכים מילה ביום ה-8 (מחלוקת אביי ורבי אסי): יוצא דופן; תינוק שאמו הייתה נכרית כשנולד ולאחמ\"כ התגיירה.\nולדעת רבי אסי, הסמיכות של 'אשה כי תזריע וילדה ונטמאה' ו'ביום השמיני ימול בשר עורלתו', מלמדת שרק אם היולדת נטמאה בלידתה מלים את התינוק ביום השמיני ומחללים עליו את השבת.\nומאחר ותינוק יוצא דופן לא יצא מן הפתח וטימא את היולדת, ותינוק של נכרית אין לה מה להטמא – אין מלים אותם ביום השמיני, וכל שכן שלא מחללים את השבת על מילתם."}, {"layer": "rishon", "src": "אנדרוגינוס — ת\"ק · ר' יהודה", "srcRef": null, "txt": "במשנה מחלוקת ת\"ק ור' יהודה. ור' יהודה מתיר באנדרוגינוס. הרמב\"ם פוסק כת\"ק, והר\"י פוסק כרבי יהודה."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.5", "txt": "פוסק כרמב\"ם, שאין מילתו של אנדרוגינוס דוחה את השבת.\nוכן, פסק לגבי כל המקרים עפ\" הברייתא והגמרא, לגבי מילה של מהול ונולד בבינה\"ש, שלא מחללים עליהם את השבת מספק.\nוגם עפ\"י דברי רבי אסי, שוולד שאמו לא נטמאה בלידתו – אין מילתו דוחה את השבת (משום שאינה חייבת להעשות ביום השמיני)"}, {"subhead": "מתי נחשב שנולד התינוק (כדי לבדוק את הספק)?"}, {"layer": "gemara", "src": "במסכת נידה", "srcRef": null, "txt": "למדים ממעשה של רבא אם התינוק הוציא ראשו מן הפרוזדור (היינו פתח גופה) – נחשב שנולד."}, {"layer": "acharon", "src": "הבה\"ל", "srcRef": null, "txt": "כתב, שאם יודעים מתי הוציא הוולד את הראש – סופרים שמונה ימים מרגע זה."}], "pesak": null}, "shelo": {"title": "מילה שלא בזמנה", "seif": "סעיף ד׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא · שו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.4", "txt": "רק מילה בזמנה דוחה את השבת. ומילה שלא בזמנה – אינה דוחה. וכך בברייתא בפרקנו (קלב:). זאת משום שהמילה מותרת בשבת בגלל הדווקאיות של יום השמיני. אבל אם אין המילה תעשה ביום השמיני (מסיבות רפואיות כאלו ואחרות), וודאי שאין היא דוחה. מה גם, שאפשר למול אותו בכל זמן אחר. וכן להלכה בשו\"ע.", "ref": {"label": "שבת · פרק ר\"א דמילה · קלב ע\"ב", "ref": "Shabbat.132b"}}, {"layer": "acharon", "src": "התשב\"ץ", "srcRef": null, "txt": "ולפיכך, כתב (וראינו דבריו בסעיף ט') שאין למול את וולד שמילתו לא תתקיים בזמנה ביום חמישי; כדי שהיום השלישי לא ייצא בשבת ויהיה צורך לחלל עליו (שהרי מאחר וכבר אין המילה תתקיים ביום השלישי, אין עניין ביום מסוים; ולכן יש להמנע מכניסה למצב של חילול שבת שאינו מתחייב)."}, {"layer": "acharon", "src": "והמג\"א והש\"ך", "srcRef": null, "txt": "חולקים על כך.", "under": true}, {"layer": "zman", "src": "והרב עובדיה", "srcRef": null, "txt": "סבר שיש להחמיר כדעת התשב\"ץ. וציין שהיו מי שהקלו כדעת המג\"א והש\"ך"}], "pesak": null}, "mi": {"title": "למי מותר למול", "seif": "סעיף י׳", "sugya": null, "ops": [{"layer": "lead", "srcRef": null, "txt": "**לגבי ניסיון מילה:** עפ\"י סוגיה בביצה, שמבארת שאסור לטרוח שלא לצורך מצווה או היתר"}, {"layer": "rishon", "src": "המרדכי", "srcRef": null, "txt": "שאסור לאדם שלא מל לעולם למול בשבת, משום שעלול להכשל במילתו, ולקלקל שלא לצורך מצווה"}, {"layer": "rishon", "src": "ותרומת הדשן", "srcRef": null, "txt": "כתב שאם מל פעם אחת -סגי"}, {"layer": "lead", "srcRef": null, "txt": "**לגבי אביו:**"}, {"layer": "rishon", "src": "רבי אליעזר הלוי (הטור, יו\"ד רסו)", "srcRef": null, "txt": "עדיף שהאבא של התינוק לא ימול אותו, משום שבעבורו זה פסיק רישא, שהרי מתכוון לתקן את בנו."}, {"layer": "rishon", "src": "אך תרומת הדשן", "srcRef": null, "txt": "סבר שאין בעיה שימול אביו (מ\"ב: ובוודאי שיש פ\"ר דנ\"ל; גם למוהל זה פ\"ר דנ\"ל. פשוט מותר למול)"}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.10", "txt": "נקט עפ\"י המרדכי שאסור למי שלא מל לעולם למול בשבת. וכתב עפ\"י תרומת הדשן שאם מל פעם אחת – יכול למול. ולגבי אביו, מתיר כתרומת הדשן (כל עוד מל פעם אחת)."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "כתב שמוהל שאומר שכבר מל פעם אחת ומותר לו למול – נאמן להגיד זאת"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "tzorchei"}, {"type": "sec", "id": "rechitza"}, {"type": "sec", "id": "goy"}, {"type": "sec", "id": "tzorech"}, {"type": "sec", "id": "safek"}, {"type": "sec", "id": "mahul"}, {"type": "sec", "id": "shelo"}, {"type": "sec", "id": "mi"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"מוהלים": "חיתוך הערלה החיצונית.", "פורעים": "קריעת העור הדק שמתחת לערלה.", "מוצצים": "מציצת דם הפצע — אף שנחשבת עשיית חבורה.", "ציצין המעכבין": "רצועות בשר החופות את רוב גובה העטרה; כל עוד לא הוסרו, המילה פסולה.", "מכשירי מילה": "הכלים והפעולות שמכינים למילה (סכין, מים חמים). מאחר שאפשר להכינם מערב שבת — אינם דוחים את השבת.", "שבות דשבות": "צירוף שני איסורי דרבנן (למשל אמירה לגוי — שהיא שבות — על מלאכה דרבנן). הותר לצורך מצווה.", "מילה בזמנה": "מילה הנעשית ביום השמיני. רק היא דוחה את השבת.", "פסיק רישא": "פעולה מותרת שמלאכה אסורה נעשית ממנה בהכרח, גם בלי כוונה."}, "subject": "שבת", "id": "mila-bshabbat"}, {"topic": {"title": "בורר", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.319", "intro": {"lead": {"t": "", "ref": ""}, "body": "+הפרדת דבר רצוי מדבר שאינו רצוי (כגון אוכל מפסולת), ע\"י כלי או ביד\n+כן להפך (דבר שאינו רצוי ממה שכן)\n+הפרדת שני מיני אוכל האחד מן השני (למרות ששניהם לא 'פסולת')\n\n**מתי מותר**: ברירה **ביד** של **אוכל מתוך פסולת** לאכילה **לאלתר** מותרת (אבל בנפה אסור דרבנן, ובכברה חייב; אעפ\"י שאוכל מיד) משום שיש בכך **דרך אכילה** ולא דרך ברירה\n\nחלקו אם היא מלאכה שאינה צריכה לגופה\n\n**שיעורה**: כגרוגרת (נלמד ממידות בשאר אוכלין)"}}, "sections": {"hagdarot": {"title": "הגדרות", "seif": null, "sugya": null, "ops": [{"subhead": "ריבוי מלאכות ברירה (לא מעיקר החומר)"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "-זורה בורר ומרקד זה אותו דבר! (רש\"י: והלא כולן מלאכה אחת הן דמפריש אוכל מן הפסולת)\n**-אביי ורבא**: יש מלאכה על כל מעשה שנעשה במקדש, גם אם יש כמה דומות.\n-אז למה אין כותש? (רש\"י: ולא מנו כותש משום דמיונה לדש)\n**-אביי**: עני אוכל פתו בלא כתישה", "ref": {"label": "שבת · פרק כלל גדול · עג ע\"ב", "ref": "Shabbat.73b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "למרות שהיה כותש במקדש, הסתפק התנא בדמיונו לדש. הוא העדיף להכניס את כל מלאכות הברירה משום שכולן שלב חשוב ונצרך ב'סידורא דפת', בעוד כותש לא נצרכת, והרי עניים מוותרים על שלב זה לעיתים (בעוד שעל מלאכות סידורא דפת לא מדלגים)\n(בדומה לכך אמר על בישול, שהעדיפו את הלש והאופה)"}, {"layer": "rishon", "src": "הרמב\"ם בפ\"ח, הי\"א", "srcRef": null, "txt": "מציין דברי אביי ורבא (וזהו): \"ומפני מה מנו אותן בשלשה מפני שכל מלאכה שהיתה במשכן מונין אותה בפני עצמה\""}, {"subhead": "מלאכה שאינה צריכה לגופה (לא מעיקר החומר)"}, {"layer": "rishon", "src": "בעל המאור", "srcRef": null, "txt": "הבורר והזורה הן מלשצ\"ג. כל שאר המלאכות הן מלאכות שצריך לגופן."}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "אף הן מלאכות שצריך לגופן, כי וודאי שצריך שהמלאכה תקרה. ואעפ\"י שאינו צריך לגוף הדבר שעליו נעשתה המלאכה. כך גם לגבי הנוטל ציפורניו שנחשב גוזז ואינו צריך לציפורניים"}, {"layer": "acharon", "src": "בה\"ל בשם ישועות יעקב", "srcRef": null, "txt": "עניין מלאכת בורר הוא שהפסולת לא ראויה לאכילה, וגם האוכל אין ראוי כ\"כ לאכילה עם הפסולת שבתוכו, ולכן הוא מפריד הפסולת מן האוכל. וא\"כ המלאכה אינה נקראת על ברירת הפסולת, רק שמתקן האוכל שיהיה ראוי לאכילה. וזהו מלאכה הצריכה לגוף האוכל.\nאבל בשני מיני אוכלין, חשוב משאצ\"ל, כיוון שאין תיקון של אף מאכל, אלא רק שמעוניין כרגע באחד מהם."}], "pesak": null}, "sugya": {"title": "הסוגיה המרכזית", "seif": null, "sugya": null, "intro": "ברייתא ושיטות לברירה אסורה ומותרת.", "ops": [{"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**ברייתא** - היו לפניו (שני) מיני אוכלין בורר ואוכל בורר ומניח. ולא יברור ואם בירר חייב.\n**בגמרא** – מתקשים, שהרי בהתחלה לשון הברייתא להתיר ברירה ולאחמ\"כ לאסור. משבשתא.\nהאמוראים מציעים שיטות שונות לתרץ, ומחלקים מתי מותר ומתי אסור לברור\n   **רב יוסף** - מה שמותר: ברירה ביד\n   מה שאסור (דרבנן): בקנון ובתמחוי\n   מה שמתחייב (דאורייתא): בנפה ובכברה\n   **רב המנונא** - מה שמותר: ברירת אוכל מתוך הפסולת\n   מה שמתחייב: ברירת פסולת מתוך האוכל\n   **אביי** - מה שמותר: ברירה לאלתר.\n   מה שמתחייב: ברירה לאוצר.\nובסוגיה לאחמ\"כ, חלקו רב אשי ורבי ירמיה מדפתי על בורר שני מיני אוכל.", "ref": {"label": "בבלי · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}], "pesak": null}, "ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳-ב׳", "sugya": null, "intro": "יש דעות שונות בראשונים לאילו שיטות באמוראים להתייחס. באופן מסורבל, השו\"ע מאמץ עפ\"י רוב הראשונים את שלושת ההגדרות המרכזיות: אוכל מתוף פסולת, ביד, ולאלתר.", "ops": [{"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כל עוד בורר לאלתר, אפילו בנפה ובכברה מותר (כלומר, בעיקר אביי)"}, {"layer": "rishon", "src": "תוס', ר\"ח, ר\"ן, רמב\"ם", "srcRef": null, "txt": "אסור אף פעם בכלי. ורק אם ברר ביד לאלתר מותר."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.1", "txt": "וכן נקט השו\"ע. ולשיטתו צריך גם שיברור אוכל מתוך פסולת."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "כתב, שכאשר בקיום 3 התנאים הללו, אז וודאי הווי דרך אכילה"}], "pesak": null}, "tnaim": {"title": "הגדרת תנאי ההיתר", "seif": null, "sugya": null, "intro": "(לא תמיד עפ\"י ס' מסוים)", "ops": [{"layer": "lead", "srcRef": null, "txt": "**מ\"ב, הקדמה לסימן שיט** - מותר לברור אם מקיימים את 3 תנאי ההיתר, \"שאז לאו דרך ברירה היא אלא דרך אכילה\""}, {"subhead": "א. יד"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כותב כי ברירה ביד 'לא דמי לבורר כלל'"}, {"layer": "rama", "src": "הרמ\"א (שכ\"א, ס' יב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.321.12", "txt": "לעניין טוחן - סבר שהחותך ירק דק חייב בטוחן רק אם לא אוכלו מיד", "under": true}, {"layer": "acharon", "src": "והבה\"ל עליו", "srcRef": null, "txt": "כותב כי הסיבה שברירה מותרת כשאוכל ביד היא משום שכך דרך האכילה לאלתר בבורר. לכן בטוחן, לא אוסרים ע\"א השימוש בכלי, כי דרך האכילה לאלתר היא בסכין.", "under": true}, {"layer": "acharon", "src": "מ\"ב, שש\"כ", "srcRef": null, "txt": "התייחסו לסכו\"ם כדרך אכילה, למרות שאין הם 'יד' שכן הם כ'ידא אריכתא'.\nוכן, שסכו\"ם אינו מועיל למלאכה."}, {"subhead": "ב. לאלתר (ס' א')"}, {"layer": "lead", "srcRef": null, "txt": "מה גדר לאלתר?"}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "מיד ממש. ללא השתאות"}, {"layer": "rishon", "src": "ר\"ח ור\"ן", "srcRef": null, "txt": "כל זמן שנמצא בסעודה (ואפילו מאריך בה)"}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "'לאותה סעודה'", "under": true}, {"layer": "rishon", "src": "והב\"י הבין בו", "srcRef": null, "txt": "כל שבורר לסעודה הקרובה - מותר אפילו זמן רב (ואם השאיר ממנו לסעודה אחרת חייב)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא דעת ר\"ח וסובר בו שמותר לפני הסעודה, אך רק ממש סמוך."}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "אסור לברור בתוך הארוחה כדי שיישאר, אלא רק לצורך אותה אכילה\nאבל אם לא עשה לשם כך לכתחילה מותר (מ\"ב)"}, {"layer": "lead", "srcRef": null, "txt": "מי שלא בֶסעודה מסוימת?"}, {"layer": "zman", "src": "אגלי טל", "srcRef": null, "txt": "אסור לברור אוכל מפסולת ולהשאירו לשעה"}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "60 דקות"}, {"layer": "zman", "src": "אג\"מ", "srcRef": null, "txt": "לשון 'שעה' פירושה זמן שהאישה מסדרת את המאכלים לסעודה, שזה פחות משעה"}], "pesak": null}, "shnei": {"title": "שני מיני אוכלים", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "בברייתא כתוב 'היו לפני (שני) מיני אוכלים'.\nרב אשי אוסר מדרבנן, ורבי ירמיה מדיפתי מחייב.\nוהראשונים מבררים טעם האיסור גם בזה (ולא רק פסולת מאוכל)", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "בירושלמי", "srcRef": null, "txt": "ברר אוכל מאוכל. חזקיה: חייב. ר יוחנן: פטור"}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "מביאים, שלמרות שמדובר בשני אוכלים, בהוצאת אוכל מאוכל אחר יש העדפה לאחד מהם והאוכל השני נחשב כפסולת (לכן יהא מותר רק להוציא את הרצוי מהאחד שלא)"}, {"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "בלשונו לא לגמרי בהיר ונחלקים פוסקים על שיטתו."}, {"layer": "lead", "srcRef": null, "txt": "פוסקים חולקים – רמב\"ם כתוספות או לא?"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "כתוספות"}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "לא כתוספות. אלא הרמב\"ם סבר שעניין בורר הוא בתיקון המאכל. ובהפרדת שני מינים המעורבבים זה בזה - נעשה תיקונו.\n   נפק\"מ: להוציא את האוכל שאינו מעוניין בו מתוך האחד שכן מעוניין ויאכל מיד – לשיטת התוס' והפמ\"ג ברמב\"ם, יהיה אסור משום שהאוכל שמוציא הוא פסולת.\n   להבנת הבה\"ל ברמב\"ם יהיה מותר משום שהאוכל שתיקן נאכל מיד (בדרך היתר)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.3", "txt": "נוקט לשון הרמב\"ם\nלפיכך, הפמ\"ג סובר שכוונת השולחן ערוך ברמב\"ם כדעת התוס'\nוהבה\"ל שדעת השו\"ע ברמב\"ם שהוא חולק על התוס'"}, {"layer": "acharon", "src": "ובסוף סובר הבה\"ל", "srcRef": null, "txt": "שצריך לחוש לשתי האפשרויות, כלומר:\nכשיש שני מיני אוכל, לא להוציא מין שאינו מעוניין בו ולאכול את המין שמשאיר (אלא רק להפך. כתוס')\nוכן, לא הפקיד שני המינים זה מזה אפילו שלא מעוניין באף אחד כרגע (שזה תיקון שניהם. כהבנת בה\"ל)", "under": true}], "pesak": null}, "echad": {"title": "מין אחד", "seif": null, "sugya": null, "intro": "(תרוה\"ד; רמ\"א בס' ג)", "ops": [{"layer": "rishon", "src": "תרומת הדשן", "srcRef": null, "txt": "מדייק מלשון התנא 'שני מיני אוכלין', משמע שהאיסור הוא דווקא בשניים, אבל במין אחד לא נחשב בורר. לכן, אסור להפריד שני מינים זה מזה ואפילו הם גדולים וניכרים (אלא רק לאוכלם מיד). כך, שני סוגי דגים נחשב שני מינים.\nאך אם מפריד חתיכה גדולה או מוצלחת יותר מאותו מין - מותר (אפילו להשאיר את שני המינים לאח\"כ)"}, {"layer": "rama", "src": "הרמ\"א (הגהה לס' ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.3", "txt": "הביא את תה\"ד. לכן ציין שבמין אחד מותר 'לברור' חתיכות גדולות מקטנות בכל דרך."}, {"layer": "acharon", "src": "הט\"ז (שיט, ג', ב)", "srcRef": null, "txt": "החמיר בשיטה זו וסבר שאף הפרדה ממין אחד נחשב ברירה. לפיו, אפילו הפרדה של חתיכות גדולות מקטנות שלא אותו מאכל – אסור (אלא בדרך היתר)."}, {"layer": "acharon", "src": "המ\"ב", "srcRef": null, "txt": "ונראה שרוב האחרונים, וכך המ\"ב צידדו בדעת הרמ\"א ותה\"ד\nוכתב המ\"ב שמיני עופות או בשר צלי/מבושל נחשב שני מינים לזה"}], "pesak": null}, "kiluf": {"title": "קילוף פירות", "seif": null, "sugya": null, "intro": "(סוף סימן שכ\"א, ס' יט)", "ops": [{"layer": "gemara", "src": "בירושלמי", "srcRef": null, "txt": "מובא שהקולף שום מקליפתו חייב בבורר"}, {"layer": "rishon", "src": "סמ\"ג סמ\"ק", "srcRef": null, "txt": "סברו שבירושלמי מדובר באכילה לאחר זמן. לכן מותר לקלף שום אם אוכלו מיד"}, {"layer": "rama", "src": "רמ\"א (שכא, יט)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.321.19", "txt": "הביא דבריהם: \"אסור לקלוף שומים ובצלים כשקולף להניח, אבל לאכול לאלתר, שרי\""}, {"layer": "rishon", "src": "המרדכי", "srcRef": null, "txt": "הסביר שהטעם לכך הוא שאי אפשר לאכול את השום בלי הוצאת המאכל מהפסולת, וממילא זו דרך האכילה. והביאו הבה\"ל"}, {"subhead": "קליפות הראויות לאכילה"}, {"layer": "lead", "srcRef": null, "txt": "הרמ\"א סבר עפ\"י הסמ\"ג והסמ\"ק להתיר קילוף של שום מאחר ואי אפשר לאוכלו בלי לעשות כן, וכי זה וודאי דרך אכילה.\nאבל מה נגיד לגבי פירות שהקליפה שלהם נאכלת לפעמים?\nממאי נפשך? אם הוא אוכל לאלתר וחשיב כפסולת, מותר כדעת הרמ\"א. אם מניח - מותר כדעת הפמ\"ג"}, {"layer": "acharon", "src": "משנ\"ב (שכא)", "srcRef": null, "txt": "כמו שום. מותר רק אם אוכל התפוח מיד (משום שהקליפה היא פסולת)"}, {"layer": "acharon", "src": "שעה\"צ בשם פמ\"ג", "srcRef": null, "txt": "מביא דעת הפמ\"ג (עפ\"י תוספות), מבין שבגלל שהקליפות ראויות למאכל, דינן כהפרדת שני מאכלין זה מזה לזמן. אין באף אחד מהם פסולת ולכן מותר."}], "pesak": null}, "sheeino": {"title": "בורר בדברים שאינם אוכל", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "בגמרא (עד, ב)", "srcRef": null, "txt": "מובא כי מי שעושה חבית חרס וכוורת של קנים מתחייב על כמה מלאכות\nורש\"י מפרט את המלאכות. בעשיית החבית מופיע בורר את החתיכות הגסות של האדמה. בכוורת בורר את הקנים הטובים מהרעים.", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"ב", "ref": "Shabbat.74b"}}, {"layer": "acharon", "src": "הט\"ז", "srcRef": null, "txt": "מתוך כך הבין כי גם בדברים שאינם אוכל שייך בורר."}, {"layer": "acharon", "src": "המ\"ב (טו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.15", "txt": "כתב כי בכלים ובבגדים שייך בורר, ולכן יש להוציא את הכלי/בגד שמעוניין בו, ולא להפך."}, {"layer": "acharon", "src": "האור שמח", "srcRef": null, "txt": "עמד על כך שבורר הוא רק בדברים הבלוּלים ומעורבבים זה בזה, ולכן אין בורר בכלים ובגדים; ומה שהט\"ז כתב שיש בורר גם בדברים שאינם אוכל, הוא בדברים קטנים כמו עץ וברזל ששייך בהם ערבוב."}, {"layer": "acharon", "src": "ערוך השולחן", "srcRef": null, "txt": "ובדומה לכך, כתב שדבר גדול הנראה לעין לא שייך בו בורר."}, {"layer": "lead", "srcRef": null, "txt": "מתוך כך, תהו פוסקי זמננו לגבי מיון מיני סכו\"ם מעורבבים לאחר הארוחה, וכן סידור ספרים במקומם."}, {"layer": "zman", "src": "שו\"ת אור לציון", "srcRef": null, "txt": "חשש לדעות האוסרים וכן לשיטת הבה\"ל לבורר בשני מינים (ברמב\"ם) שהפרדה שלהם אסורה אף אם בשני המינים מעוניין לאחר זמן."}, {"layer": "zman", "src": "הרב עובדיה ב'יביע אומר'", "srcRef": null, "txt": "הביא דברי האור שמח וכתב כי 'אין כל חשש של איסור ברירה'."}], "pesak": null}, "lach": {"title": "בורר בלח, וברירת אוכל עם הפסולת", "seif": "סעיף ט\"ז", "sugya": null, "ops": [{"layer": "rishon", "src": "הרא\"ש", "srcRef": null, "txt": "מתיר שתיית מים שיש בהם תולעים עם מפה (כמעין מסננת)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט\"ז)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.16", "txt": "מעתיק את הרא\"ש. מים שיש בהם תולעים מותר לשים עליהם מפה ולשתות ואין בכך בורר. על כן, מותר לדחות בשעת שתיה את הפסולת שלא תכנס לפיו.\nובב\"י דן אם אין חשש של סוחט משום מלבן בהרטבת המפה; וסבר שאין לגזור שמא יסחוט משום ש'אין זו שרייה הצריכה סחיטה'"}, {"layer": "lead", "srcRef": null, "txt": "לפיכך, דנו אם יש בורר בלח."}, {"layer": "acharon", "src": "מהריט\"ץ", "srcRef": null, "txt": "'אין ברירה בלח וגם את הצרעה ישלח'. אפילו זבוב מותר להוציא בידו למרות שלא זמן השתייה ממש.\nמה שהרא\"ש 'כתב שיש ברירה בלח' (תולעים במים) הוא בכלי שכך דרך ברירתם"}, {"layer": "acharon", "src": "ט\"ז שם", "srcRef": null, "txt": "הוצאת פסולת מותרת רק אם מוציאה עם המזון: אם נפל זבוב לכוס מים מותר להוציאו רק עם מוציאו יחד עם המים. יש ברירה בלח."}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "פסק כמהריט\"ץ לקולא, אך מוטב להחמיר כט\"ז."}], "pesak": null}, "tircha": {"title": "אוכל מפסולת בטורח מרובה", "seif": "סעיף ד׳", "sugya": null, "intro": "(ס' ד' ברמ\"א)", "ops": [{"layer": "mishna", "src": "משנה (ביצה)", "srcRef": null, "txt": "מחלוקת ב\"ה וב\"ש לגבי ברירת פסולת מאוכל ביו\"ט\n**ב\"ש**: (כמו בשבת) – רק אוכל מפסולת\n**ב\"ה**: מתירים ביו\"ט אף להוציא פסולת מתוך אוכל"}, {"layer": "gemara", "src": "גמרא · רבן גמליאל", "srcRef": null, "txt": "בד\"א? כשהאוכל מרובה על הפסולת.\nאבל אם הפסולת מרובה מהאוכל אף ב\"ה יגידו שמותר להוציא רק את האוכל מהפסולת.\n(כלומר רק כשהאוכל מרובה ויש טורח בברירתו סבורים ב\"ה שאפשר לברור פסולת. כשהוא מעט – לא)\nולאחמ\"כ הקשו בסוגיה על רבן גמליאל ושאלו על פסולת מרובה מאוכל 'מי איכא מאן דשרי?'"}, {"layer": "lead", "srcRef": null, "txt": "שתי שיטות בפירוש, ומתוך כך גם בהלכה"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "'האם יש מי שמתיר בהוצאת פסולת אם הפסולת מרובה?' הרי הפסולת היא מוקצה וכשהיא הרוב, גם האוכל נחשב מוקצה. לכן אסור להוציא כלום אם הפסולת מרובה.\nוהתירוץ של הסוגיה 'לא צריכא דנפיש בטרחא וזוטר בשיעורא' – הוא שבאמת מדובר באוכל המרובה על הפסולת, והלשון שכתוב 'פסולת מרובה על האוכל' כוונתה שהטורח בהוצאת הפסולת.\nמתירים כשהרוב הוא אוכל משום שיש פחות טרחה בהוצאת הפסולת (כדרכו)"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "בשבת: תמיד בורר את האוכל.\nביו\"ט: אם הפסולת מרובה ← בורר את האוכל / דרך ברירה\nאם האוכל מרובה ויש טורח בברירת האוכל ← בורר את הפסולת / כי יש טורח\nאם האוכל מרובה ואין טורח בברירת האוכל ← בורר את האוכל / עדיף אוכל\nכלומר שיטת הרמב\"ם (כמו שהב\"י מדייק ממנו) ביו\"ט: עדיף להקפיד על דרך ברירה שמוציאים אוכל מהפסולת, אבל אם יש טורח מוותרים לטובת טורח ביו\"ט. ובשבת לא מתחשבים בגורם הטרח ולכן תמיד מוציאים אוכל מפסולת."}, {"layer": "lead", "srcRef": null, "txt": "**נפק\"מ בין רש\"י לרמב\"ם** – לרש\"י אסור לברור כשיש פסולת מרובה בכלל (מוקצה. יו\"ט ושבת)\nולרמב\"ם מותר לברור את האוכל מן הפסולת. ובשבת תמיד בורר את האוכל"}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "נראה שדעתו כרמב\"ם (טרחה ביו\"ט וכו')"}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.4", "txt": "מביא בשם הב\"י וכותב \"אפילו האוכל מרובה ויש יותר טורח בברירת האוכל, לא יברר הפסולת\"\nכלומר, הרמ\"א נקט את הדין של שבת, שבכל מקרה בוררים את האוכל מתוך הפסולת אפילו כשהאוכל מרובה ויש בברירתו טורח, מאחר ורק בשמחת יו\"ט נמעט בטרחה. בשבת - דרך ברירה תמיד. וכ\"כ המ\"ב"}], "pesak": null}, "mishmeret": {"title": "משֵמרת (סינון)", "seif": "סעיפים ט׳-י׳", "sugya": null, "intro": "סינון יין משמריו אסור (כשיטת חכמים וכן הלכה), גם אם המשמרת תלויה כבר מער\"ש\n-ונחלקו רבה ורבי זירא אם משום בורר או משום מרקד\n-ורש\"י ותוס' חלקו אם יודה רבה לרבי זירא שחייב משום שניהם או לא (נפק\"מ: איך אפשר להתרות)\n-דעת הרמב\"ם שנויה במחלוקת (ב\"י: כרש\"י; בה\"ל: כתוספות)\n-ובשו\"ע (ט') התייחס רק לעיקר איסור חכמים לשמר", "ops": [{"layer": "lead", "srcRef": null, "txt": "ומתי עובר הגבול בין מה שאסור למה שמותר? אם אסור לברור יין משמריו בגלל שזה בורר (כרבה), מתי לא חשיב בורר? עפ\"י זעירי והמשנה בפרקנו, למדים שמותר למשמרת משקים צלולים, ולסודר קצת עכורים\nמשמרת: רק צלול — מהו צלול? ר\"ן: רוב אנשים שותים | ב\"ח: כולם שותים\nסודרים (בגד): אפילו עכור קצת — ר\"ן: אך ללא שמרים כלל\nטור: במים אסור בסודר משום ליבון\nרמב\"ם: אוסר משמרת. ובסודרים עכור. מתיר רק מים ויין צלולים בסודר (כנראה קרא למשמרת סודר)\nשו\"ע: הביא ר\"ן (פשט סוגיה) וגם רמב\"ם; וטור לעניין מלבן — מותר: מים ויין צלולים למשמרת; יין שאינו עכור לסודר\nמ\"ב: (עכור לגמרי אסור. אבל עכור קצת -שו\"ע מתיר)"}, {"layer": "mishna", "src": "משנה · ר' אליעזר · חכמים", "srcRef": null, "txt": "מסננת התלויה מערב שבת. האם מותר לסנן בה יין משמריו בשבת?\n**רבי אליעזר** – מותר\n**חכמים** – אסור\n(וכולם מסכימים שאסור לתת אותה לכתחילה)", "ref": {"label": "שבת · פרק תולין · קלז", "ref": "Shabbat.137b"}}, {"layer": "gemara", "src": "גמרא · רב כהנא", "srcRef": null, "txt": "**רב כהנא** – אם שימר - חייב מהתורה\nמשום מה חייב?\n**רבה** – משום בורר\n**רבי זירא** – משום מרקד", "ref": {"label": "שם", "ref": "Shabbat.137b"}}, {"layer": "acharon", "src": "שולחן ערוך הרב", "srcRef": null, "txt": "אם בורר אוכל מפסולת למה חייב? בגלל שמשתמש בכלי המיוחד לברירה (רב יוסף)", "under": true, "collapsed": true}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "רבה מודה לרבי זירא שהמשמר חייב גם משום מרקד", "under": true}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "חולקים: רבה לא מודה לרבי זירא. שימור יין לא דומה למרקד. מרקד היא מלאכה שפועלת גם בפסולת וגם באוכל ע\"י ניעור הכלי. במשמר אין זה כך.", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "לא ברור כמי מכריע (\"הבורר שמרים מתוך המשקין הרי זה תולדת בורר או תולדת מרקד וחייב\")", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "רמב\"ם סובר כרש\"י (שרבה מודה שמשמר חייב אף משום מרקד. ואפשר להתרות במי שעומד לשמר על כל אחד מהם)", "under": true}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "רמב\"ם כתוס' (רבה לא מודה לר' זירא), וציין בלשונו שחייב באחד משתי המלאכות משום שלא ידע אם להכריע כרבה או כרבי זירא (ומכל מקום מוכח מלשונו שלא מחייב בשניהם)", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.9", "txt": "מביא דין חכמים מהמשנה שאסור לתת יין עם שמרים במשמרת התלויה מער\"ש; אך לא מכריע כאחד האמוראים או הראשונים"}, {"layer": "acharon", "src": "שאלה/דיון אפשרי", "srcRef": null, "txt": "כמה חטאות חייב מי ששימר כנ\"ל? אם כשיטת רש\"י=2. אם תוס=1. ולדעת המנחת חינוך חייב 2. לדעת האגלי טל לא סומכים על כך שהמחבר סבר בב\"י שרמב\"ם סבר כרש\"י; וחייב רק חטאת 1 בגלל שעשה מעשה 1", "collapsed": true}, {"subhead": "דף קלט (פ' תולין) – סינון המותר במשמרת/סודרים"}, {"layer": "gemara", "src": "מימרא של ר' זעירי", "srcRef": null, "txt": "מותר לסנן יין צלול ומים צלולין במשמרת בשבת (ואין בכך בורר)\nובמשנה כתוב: מסננין את היין בסודרין (בגדים) ובכפיפה מצרית מהקמחים שלהם\nומשמע מכך שבסודרים מותר אפילו משקה שאינו צלול והוא עכור קצת (וכן נקטו הראשונים והב\"י)", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "ולדעת הר\"ן", "srcRef": null, "txt": "רק אם אין בו שמרים כלל אפשר עכור בסודרים.", "under": true}, {"layer": "lead", "srcRef": null, "txt": "ומה נחשב צלול, שמותר אפילו במשמרת?"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "אם רוב האנשים לא מקפידים בלכלוכיו כלל"}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "רק אם כולם לא מקפידים והיו שותים אותו כך"}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "לעניין מלבן: כתב שלמרות שמותר לסנן מים (
