יתא."}, {"layer": "acharon", "src": "ריצב\"א, ש\"ך", "srcRef": null, "txt": "אם לא נמצא דם על השפופרת בכלל – גם מותרת (כי אם היה מן המקור – בוודאי היה נמצא על ראש המכחול)", "under": true}, {"subsubhead": "האם נטמאת וצריכה 7 נקיים?"}, {"layer": "acharon", "src": "מהר\"י הורוביץ", "srcRef": null, "txt": "אם נמצא על הצדדים - לא צריכה שבעה נקיים (שהרי הדם לא מהמקור)"}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "כן צריכה שבעה נקיים (כי החמירו בנות ישראל אפילו על טיפת דם כחרדל)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אם נמצא דם על צדדי השפופרת – תשמור 7 נקיים; אם לא נמצא כלל – לא צריכה"}, {"subsubhead": "בדיקה חוזרת"}, {"layer": "acharon", "src": "נודע ביהודה", "srcRef": null, "txt": "אם בדקה ויש דם - לא יעזור לבדוק שוב. אסורה."}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "זה נכון רק בבדיקה אחר הפעם השלישית של הבעל השלישי, אבל בבעל הראשון - מועיל לבדוק שוב", "under": true}, {"subhead": "חומר השפופרת (ב')"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "צריך שלא יהיה חומר שורט כמו עץ (כדי שלא תדמם בגללו), אלא שפופרת של אבר.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "של אבר (עור)"}, {"layer": "acharon", "src": "ש\"ך בשם משאת בנימין", "srcRef": null, "txt": "כל מתכת או ברזל שלא שורטים"}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "אם בדקה בשל עץ – מועיל בדיעבד אם אין דם (אז ברור שאין דם מקור, ומותרת)", "under": true}, {"subhead": "איך מבצעים? (ב')"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "מכניסה עד צוואר הרחם."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "עד מקום שהאבר מגיע"}, {"layer": "acharon", "src": "ש\"ך בשם משאת בנימין", "srcRef": null, "txt": "האשה יודעת עד איזה מקום האבר מגיע. לא צריך לחוש שלא תבדוק טוב (התורה לא נתנה למלאכי השרת)"}, {"layer": "acharon", "src": "תשובת הב\"ח", "srcRef": null, "txt": "לא להגזים. הבדיקה גם ככה קשה. איך שהנשים עושות – עושות טוב.", "under": true}, {"subhead": "תוקף הבדיקה כיום (ב\"י, רמ\"א ב')"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "האידנא לא סומכים על הבדיקה להתיר, כי אין בקיאין בה. וגם החמירו על עצמן בנות ישראל שכל דם אוסר."}, {"layer": "rishon", "src": "רא\"ש (ר\"ר)", "srcRef": null, "txt": "סומכים על הבדיקה (לא צריך להיות בקיאים; וחומרת בנות ישראל רלוונטית רק לראייה שגרתית).\n(לשונו נפלאה: \"אבל לא ניתן לכתוב בספר להורות בו לדורות הבאים, כי מצינו הרבה בתלמוד שחשו חכמים לתקנת עגונות והקלו מאד\")"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "סומכים על הבדיקה אף בזמן הזה (רא\"ש ר\"ר) — ופשוט שגם הב\"י מצדד בזה"}, {"subhead": "מתי מועיל לבצעה (ג')"}, {"layer": "gemara", "src": "גמרא · ריש לקיש · ר' יוחנן", "srcRef": null, "txt": "**ר\"ל** ל**ר' יוחנן**: ותבדוק עצמה בביאה שלישית של בעל הראשון! **ר' יוחנן**: לפי שאין כל האצבעות שוות (רש\"י: מוטב שתתגרש שלא תבוא לידי כרת).", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רש\"י (לפי רא\"ש ותוס')", "srcRef": null, "txt": "לא יכולה לבדוק בבעל הראשון. צריכה להתגרש (שלא תבוא לידי כרת)", "under": true}, {"layer": "rishon", "src": "הגהות מיימ', רא\"ש, רשב\"א, טור, ר\"ת", "srcRef": null, "txt": "מתירים לה לבדוק בבעל הראשון (ואם הבדיקה טובה - יכולה להשאר עם בעלה). נימוק המ\"מ: לשון 'תתגרש' היא אופציה, ולא ציווי."}, {"layer": "rishon", "src": "ריצב\"א", "srcRef": null, "txt": "אם היה לה צער וכאב בשעת תשמיש - משמע שאולי חולי או מכה, ואף רש\"י יתיר.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.3", "txt": "אשה הרואה מחמת תשמיש – רשאית לבדוק עצמה בשפופרת גם בבעל הראשון, אחר שלוש פעמים ששימשו וראו. ואם יוצאת מותרת – מותרת לו (רא\"ש וסיעתו)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "יש לסמוך על המקלים להתיר. ואם הרגישה כאב וצער – אפילו לדעת רש\"י (ריצב\"א)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מצדד לאסור (כי רש\"י; וכי הראב\"ד לא סומך אבדיקה בזמן הזה), אבל מסכים עם הריצב\"א להתיר אם יש כאב. ואם בדקה תחת הבעל הראשון ומצאה דם – אסורה לכולם (סמ\"ג)."}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "להתיר (מביא הרבה שו\"תים)", "under": true}], "pesak": null}, "tliya": {"title": "תליית הדם בסיבה אחרת", "seif": "סעיפים ד׳-ז׳, י\"ג", "sugya": null, "ops": [{"subhead": "תלייה בוסתה (ד')"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "אשה שבדקה אחר תשמיש ומצאה דם – אם יש לה וסת, תולה את הדם בוסת ולא בתשמיש.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "'אם יש לה וסת' – למי שיש לה וסת קבוע מחמת תשמיש (וסת מורכב, לפי זמן מסוים)"}, {"layer": "rishon", "src": "רמב\"ם, רמב\"ן", "srcRef": null, "txt": "כפשוטו: אם שימשו בזמן שהוסת הקבוע אמור להגיע, תולים בעונת הוסת ולא בתשמיש"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "שני הפירושים לא חולקים, ואין הבדל להלכה", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.4", "txt": "אשה ששמשה סמוך לזמן חשש וסתה, ולאחר התשמיש ראתה - תולין ראייתה משום וסתה, ולא אמרינן שהתשמיש גרם (עפ\"י הברייתא, רמב\"ם, אך לכו\"ע). ובסע' יא פוסק כרש\"י לגבי קביעת וסת רמ\"ת מורכב."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הפרישה אוחז החבל משני קצותיו: אם אפשר לתלות את הדם בוסת – שימשו באיסור (שהרי דין פרישה בעונת הוסת); ואם שימשו בהיתר – א\"א לתלות בוסת."}, {"subhead": "תלייה במכה (ה-ז)"}, {"subsubhead": "עיקר ההיתר (ה, ז)"}, {"layer": "gemara", "src": "ברייתא · רבי · רשב\"ג", "srcRef": null, "txt": "**ברייתא**: אם יש שם מכה - תולה את הדם במכה ולא בתשמיש. ואם הדם שרואה שונה מדם המכה – אינה תולה.\n**רבי**: נאמנת אשה לומר מכה יש לי במקור שממנה דם יוצא.\n**רשב\"ג**: דם הבא מן המקור (בין מחמת מכה בין לא) – טמא; ורבותינו העידו על דם המכה הבא מן המקור שהוא טהור.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אם יש שם מכה ודאית – אפילו אם אינה מרגישה שמשם הדם זב, תולים במכה (מוכיח מלשון התוספתא)"}, {"layer": "rishon", "src": "רשב\"א, רא\"ש", "srcRef": null, "txt": "רק אם מתברר בוודאות שהדם משונה - לא תולים (בסתם נוטים לתלות; 'כל הנשים בחזקת טהרה')"}, {"layer": "rishon", "src": "הגהות מיימ', מרדכי", "srcRef": null, "txt": "לא מספיק לדעת שיש מכה. צריכה לדעת שהדם יורד מהמכה", "under": true}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "מחלק: אם אין לה וסת קבוע - צריך לדעת בוודאות שהדימום מהמכה (או ע\"י בדיקה בחורים ובסדקים). אם יש לה וסת קבוע ואינה בזמנו - תולה במכה גם בלי וודאות."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ה', ז')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.5", "txt": "אם יש לה מכה שם - תולים במכה ולא בתשמיש. ואם דם מכתה שונה – אינה תולה (רשב\"א, רא\"ש). ובסע' ז' עפ\"י תרוה\"ד כיצד ניתן לדעת שיש מכה: אם בבדיקה מוצאת רק בצדדים ובמקום מסוים; או אם המקום שממנו הדם כואב."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם וסתה אינו קבוע: אם יש ספק אם הדם מהמקור או מהצדדים - תולים במכה (ס\"ס); אם בוודאות מהמקור - צריכה וודאות שהמכה מוציאה דם. אם וסתה קבוע (וראתה שלא בשעתו) – תולים במכה גם בלי וודאות."}, {"layer": "acharon", "src": "ש\"ך / ב\"ח / ט\"ז", "srcRef": null, "txt": "**ש\"ך**: כתרוה\"ד. **ב\"ח, ט\"ז**: כרשב\"א, אך רק בוסת קבוע. **ט\"ז**: אפשר לתלות במכה רק אם יודעת שהמכה מוציאה דם או אם מתקיימים דברי תרוה\"ד."}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "דעת הרמ\"א היא דעת עצמו; מקלים רק כשיש עוד קולא בנוסף למכה (וסת קבוע שלא בזמנו, או ס\"ס)", "under": true}, {"subsubhead": "האידנא"}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "היום אין תולים דם במכה (הדין תלוי ביכולת להבחין בין דם מכה לדם וסת, ואין אנו בקיאין)"}, {"layer": "rishon", "src": "רא\"ש, ר\"ן", "srcRef": null, "txt": "חולק: בסתם - תולים במכה; וכל אחד יכול להבחין בין דם מכה לדם וסת"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "תולים גם תולים (רא\"ש ודעימיה)"}, {"layer": "acharon", "src": "ש\"ך / ט\"ז", "srcRef": null, "txt": "האם צריך להראות לחכם? ש\"ך: לא. ט\"ז: כן."}, {"subsubhead": "תלייה במכה כשרואה ב-ז' נקיים"}, {"layer": "acharon", "src": "פת\"ש בשם דגול מרבבה", "srcRef": null, "txt": "ברמ\"ת עיקר הדין פשוט (אם קיימו יחסים היא בחזקת טהרה). אבל אם אינה בחזקת טהרה (אלא שבעה נקיים)? **נו\"ב**: ז' נקיים – חזקת טומאה. **ברית אברהם**: ז' נקיים – בחזקת טהורה."}, {"subsubhead": "בכתמים (רמ\"א ה')"}, {"layer": "rama", "src": "מרדכי, רמ\"א", "srcRef": null, "txt": "כתם (לעומת דם של ממש) אפשר לתלות במכה בכל עניין"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כתם אפשר לתלות במכה אפילו בשעת חשש לוסת ואפילו אם אין ידוע שהמכה מוציאה דם", "under": true}, {"subsubhead": "נאמנות האשה במכה (ו')"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.6", "txt": "נאמנת אשה לומר 'מכה יש לי באותו מקום (במקור) שהדם יוצא ממנה' (רבי בברייתא)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אשה נאמנת גם להגיד שהדם בכלל לא בא מן המקור (וטהורה) (מהר\"י וויל)"}, {"layer": "acharon", "src": "דגול מרבבה, חוו\"ד", "srcRef": null, "txt": "מפקפקים ברמ\"א. אפילו על דם שמהצדדים צריך לחשוש שנזל מהמקור וטמא.", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כוונת הרמ\"א: כשיש לה וסת קבוע וזה לא זמן הוסת, שאז ברי לה שלא אמור להיות דימום מן המקור", "under": true}, {"subhead": "תלייה בבתולים (י\"ג)"}, {"layer": "lead", "srcRef": null, "txt": "מן הגמרא (דף יא) והתוספתא עולה כי אשה המוצאת דם בבדיקה אחר התשמישים הראשונים לנישואיה יכולה לתלותו בבתולים. וזה כל עוד בכל תשמיש מאז נישואיהם ראתה דם; אבל אחר שישמשו פעם בלי דם בסמוך – כבר ייחשב רמ\"ת."}, {"layer": "gemara", "src": "תוספתא / ב\"י עפ\"י סמ\"ג", "srcRef": null, "txt": "**תוספתא**: בתולה דמיה טהורים, ואין בודקים אותה בשפופרת. **ב\"י עפ\"י סמ\"ג**: בתולה שרואה דם אחר התשמיש - תולים בבתולים, עד שלפחות פעם ישמשו ולא תראה (עפ\"י שמואל בדף יא).", "ref": {"label": "נדה · פרק כל היד · יא ע\"א", "ref": "Niddah.11a"}}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ י\"ג)", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.13", "txt": "בתולה שראתה דם אחר התשמיש – תולים בדם הבתולים, עד שישמשו פעם אחת בלי דם. (ואז אם יראו 3 פעמים – חשיב רמ\"ת)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אבל אם אין לה צער בשעת התשמיש – נחשב דם מחמת התשמיש (ולא בתולים, משום שבדם בתולים יש צער)"}, {"layer": "acharon", "src": "ב\"ח / ט\"ז", "srcRef": null, "txt": "**ב\"ח**: חולק על הרמ\"א; אפילו בלי צער נחשבת בתולה. **ט\"ז, משאת בנימין**: מצדדים ברמ\"א ומהר\"ם פדאווה."}, {"subsubhead": "החובה לבדוק עצמה"}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "התנאי לתלות בבתולים הוא שבדקה עצמה אחר כל תשמיש. אם לא בדקה – נחשב כאילו לא ראתה בפעם זו."}, {"layer": "acharon", "src": "טהרת הבית", "srcRef": null, "txt": "גם אם לא בדקה עצמה פעם אחת יכולה להמשיך לתלות בבתולים. רק אם בדקה ומצאה נקייה נחשב כפעם שלא ראתה.", "under": true}, {"subhead": "תלייה בלידה (רמ\"א י')"}, {"layer": "lead", "srcRef": null, "txt": "עיין בכותרת 'רמ\"ת בזמן מסוים' — שם מביא הרמ\"א את תשובת ר' יוחנן מ\"מ המציע לתלות ראייה אחר תשמיש בדם הלידה."}, {"subhead": "תלייה בדימום של הגבר (רמ\"א י\"ג, ק\"צ כ')"}, {"layer": "rama", "src": "ב\"י עפ\"י רשב\"א, רמ\"א", "srcRef": null, "txt": "אשה שאחר תשמיש מצאה דם, אך לבעלה יש דימום מהשמש - תולה בו את הדימום (לעיין בק\"צ סע' כ)"}], "pesak": null}, "akira": {"title": "עקירת חזקת רמ\"ת", "seif": "סעיפים ח׳-ט׳", "sugya": null, "intro": "שתי שאלות: הסבירות של היכולת הרפואית להירפא מהתופעה; ונאמנותו של הרופא.", "ops": [{"subhead": "היכולת להירפא מרמ\"ת (ח')"}, {"layer": "gemara", "src": "סיפור בגמרא · רבי", "srcRef": null, "txt": "אשה שהפילה חררת דם ואמר שהתרפאה.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "תרומה, סמ\"ג, סמ\"ק", "srcRef": null, "txt": "אם תרצה להוכיח שכבר לא רואה מחמת תשמיש – צריכה לעשות כן לפני שראתה 3 פעמים ונעשתה חזקה."}, {"layer": "rishon", "src": "ריצב\"א", "srcRef": null, "txt": "אם רופא יהודי אומר לה לשמש – משמשת (אפילו שיש חזקה). רופא גוי – קשה להאמינו. ואם בדקה בשפופרת ולא מצאה דם - סומכת עליו לגמרי."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ח')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.8", "txt": "לפני חזקה של שלוש ראיות – סומכת על כל רפואה. לאחר חזקה: יש מסתפקים (תרומה, סמ\"ק, סמ\"ג); יש מתיר לסמוך על רופא ישראל שאמר לה לשמש (ריצב\"א); ואם ראתה שרפואות עוזרות – סומכת אף על רופא גוי (ב\"י בריצב\"א)."}, {"layer": "acharon", "src": "שבט הלוי (בעקבות החת\"ס)", "srcRef": null, "txt": "מדרג: חזקה (וודאות) של רמ\"ת; ספק; וודאות שאינה רמ\"ת. **חתם סופר**: רופאים יכולים רק להטיל ספק (לא להביא מחזקה לוודאות). אם רופא אומר שהדימום מכה – מתערערת החזקה ומוטלת בספק, וצריך לברר.", "expandable": true}, {"subhead": "להירפא מרמ\"ת ע\"י הפחדה (ט')"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "סיפור של רבי שהורה לאבדן להפחיד אשה שרואה מחמת תשמיש; אבדן הפחידה, ונפלה ממנה חררת דם. **רבי**: התרפאה זאת.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.9", "txt": "אשה הרמ\"ת שהפחידוה ונפל ממנה חררת דם – התרפאה ומותרת לבעלה. אם ראתה עוד פעם – סימן שלא נתרפאה. אבל בזמן הזה אין מתירין רמ\"ת ע\"י הפחדה (עפ\"י רמב\"ן, ראב\"ד)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "לכתחילה לא מתירין ע\"י הפחדה, אבל בדיעבד - כן.", "under": true}], "pesak": null}, "zman": {"title": "רמ\"ת בזמן מסוים (וסת הרמ\"ת)", "seif": "סעיפים י׳-י\"א", "sugya": null, "ops": [{"subhead": "רמ\"ת בזמן קבוע אחר טבילה (י')"}, {"layer": "lead", "srcRef": null, "txt": "**רש\"י** על הברייתא (סו) מפרש: אם יש לראייה מחמת תשמיש מועד קבוע - חשיב כוסת (לקולא ולחומרא). דברי **המהרמ\"מ** הם יישום פירוש רש\"י — וסת מורכב על תשמיש. אלא שגורם הזמן פה הוא ביחס למועד הטבילה."}, {"layer": "acharon", "src": "עיון — טבילה כגורם", "srcRef": null, "txt": "בעיה של גרסאות: בחלקן גורסים שהראייה היא בליל הטבילה, ויש הנועצים את הראייה בטבילה עצמה (שהטבילה גורמת, והיא וסת המעשה). הפוסקים חולקים אם אלו וסתות הגוף או המעשה. **ערוה\"ש** סובר שלא שייך לדבר על וסת כאן כלל, אלא זה ביטוי מושאל, שהרי לדעתו רמ\"ת היא חולי; לכן חוששים לכל דבר שיכול לגרום לסימפטום (דימום), ובכללו הטבילה.", "expandable": true}, {"layer": "rishon", "src": "הגהות מיימ' בשם מהרמ\"מ", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.10", "txt": "אשה שראתה מחמת תשמיש פעם/פעמיים, על אף שלא קבעה וסת - חוששת בפעם הבאה מתשמיש בזמן הדומה (ביחס לטבילה). ואחר שפרשו ולא שימשו ביום המסוים – בפעם הבאה לא צריכים לחוש. וכ\"פ בש\"ע."}, {"layer": "acharon", "src": "מנחת יעקב", "srcRef": null, "txt": "אם ראתה ביום הטבילה 3 פעמים – תולים בטבילה, ולא מוחזקת רמ\"ת גורף אלא רק ליום הטבילה", "under": true}, {"layer": "acharon", "src": "סדרי טהרה, ערוה\"ש", "srcRef": null, "txt": "חולקים: אחרי 3 פעמים כבר נחשוש לכל זמן, ותוחזק רמ\"ת. (ובכל מקרה, היום השלישי לטבילה חשיב רחוק)", "under": true}, {"subsubhead": "הרמ\"א"}, {"layer": "rishon", "src": "רשב\"א בתשובה", "srcRef": null, "txt": "אשה שראתה מחמת תשמיש ג' פעמים - צריכים להתגרש, ולא יכולים להשאר יחד אפילו בלא תשמיש (חשש שיקלו ויעברו, ווסתות דרבנן). ואם יש אדם שלישי – יכול להשאירה."}, {"layer": "rama", "src": "רמ\"א · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.10", "txt": "אשה שראתה ג' פעמים אחר טבילתה מחמת תשמיש, כל פעם בביאה הראשונה שאחרי הטבילה – אסורה לבעלה כאילו ראתה 3 פעמים רצופות (שהרי רואה תמיד אחר טבילה, ולא יכולים להימנע)."}, {"layer": "acharon", "src": "ש\"ך, חוו\"ד", "srcRef": null, "txt": "הרמ\"א מתכוון לאסור בכל יום שהוא, ולא רק ביום הטבילה (צריכים להתגרש אא\"כ תעשה בדיקת שפופרת)"}, {"layer": "acharon", "src": "כרתי ופלתי", "srcRef": null, "txt": "חולק: איך נאסור מישהי עולמית אם היו ביאות היתר בינתיים??", "under": true}, {"layer": "acharon", "src": "באר הגולה, ט\"ז", "srcRef": null, "txt": "כוונת הרמ\"א: אפילו אם לא היו ג' פעמים רצופים ממש - אלא אם היה תשמיש שלא ראתה בו בין לבין, עדיין נחשבים הפעמים שראתה (בתשמיש הראשון שאחר הטבילה) כרצופים.", "under": true}, {"subhead": "רמ\"ת אחר לידה (רמ\"א י')"}, {"layer": "rishon", "src": "דרכ\"מ · ר\"ח", "srcRef": null, "txt": "שיוך הדם לתשמיש - רק אם לא היו בכלל ביאות ללא דם (אם היו - מוכח שלא התשמיש גורם)"}, {"layer": "rishon", "src": "תשובת ר' יוחנן ל מהרי סגל", "srcRef": null, "txt": "אשה שאחרי לידה ראתה ג' פעמים מחמת תשמיש, ואז ראתה שלא מחמת תשמיש, ומאז לא ראתה – וכך שלוש פעמים (בשלוש הריונות). **מהרי\"ל**: מחמיר. **מהרי יוחנן**: תולים בלידה (דמי לידה), ולא בתשמיש."}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.10", "txt": "אם אשה הייתה בהריון ג' פעמים, ואחר כל הריון ראתה מחמת תשמיש בביאה הראשונה בלבד (או 3 פעמים אך לא מהתשמיש הראשון) – יש שכתבו להקל ולהתירה, תולים בחולשת הלידה. אבל אם מהתשמיש הראשון שאחר הלידה ראו 3 פעמים רצופים – רמ\"ת. ובכל מצב – אם שימשו ולא ראתה, הוכח שיש מציאות שאינה רמ\"ת, ומותרים (עדיף מבדיקת שפופרת)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הדגש: תשמיש ללא ראייה - אף אם נעשה באיסור - מתיר ('דעדיף מבדיקת שפופרת').", "under": true}, {"subhead": "רמ\"ת בהפלגה (י\"א)"}, {"layer": "shulchan", "src": "ש\"ע עפ\"י מהרמ\"מ", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.11", "txt": "יש וסת רמ\"ת בהפלגה: אם רואה מחמת תשמיש, ולאחר חצי שנה (למשל) רואה שוב באותה עונה – תחשוש חצי שנה נוספת לאותה עונה. ואם קבעה וסת כזו ע\"י 3 הפלגות (4 ראיות) – אסורה, אך רק בזמן ההפלגה; בשאר הזמן מותרים בלי בדיקה."}, {"subhead": "רמ\"ת בחודש (ש\"ך על י\"א)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "יש וסת רמ\"ת בחודש: אם רואה מחמת תשמיש ביום א' בחודש – חוששת מיד בחודש הבא באותו יום ועונה. וכמו כל וסת, אם לא קבעה - נשבר אחרי פעם אחת שלא ראתה. ומי שקבעה וסת רמ\"ת בהפלגה צריכה לחוש גם לוסת רמ\"ת החודש."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "shfoferet"}, {"type": "sec", "id": "tliya"}, {"type": "sec", "id": "akira"}, {"type": "sec", "id": "zman"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"רואה מחמת תשמיש": "אשה שרואה דם בעקבות התשמיש — נאסרת אחר שלוש פעמים רצופות.", "בדיקת השפופרת": "שפופרת עם מכחול ומוך המדמה תשמיש, לברר אם הדם מן המקור או מן הצדדים.", "מן המקור": "דם היוצא מן הרחם — דם נידה האוסר.", "מן הצדדים": "דם שאינו מן הרחם (כגון ממכה) — אינו אוסר.", "וסת אונס": "וסת הנקבע לפי סיבה (כגון תשמיש), הצריך צירוף זמן כדי להיקבע.", "תלייה": "ייחוס הדם לסיבה אחרת (וסת/מכה/בתולים/לידה) כדי שלא ייחשב מחמת תשמיש.", "חזקת טהרה": "ההנחה שאשה טהורה עד שיתברר אחרת — בסיס להקלות בתליית הדם.", "ס\"ס": "ספק ספיקא — שני ספקות המצטרפים להקל.", "הפלגה": "מרווח קבוע בין ראייה לראייה, שעל פיו נקבע וסת."}, "subject": "נידה", "id": "roeh"}, {"topic": {"title": "דברים שאינם בטלים", "eyebrow": "מבחני הרבנות · איסור והיתר · סימנים ק׳, ק\"א, ק\"ב, ק\"י", "siman": "Shulchan_Arukh,_Yoreh_De'ah.100", "intro": {"lead": {"t": "", "ref": ""}, "body": ""}}, "sections": {"bria-hagdara": {"title": "הגדרת ברייה וביטולה", "seif": "סעיף א׳", "sugya": null, "intro": "ראשית נציין שדינה של ברייה הוא שהיא אינה בטלה אפילו באלף. אבל טעמה – בטל כרגיל (בשישים). הנימוק של המקרים אליהם זה רלוונטי נמצא בסעיף ב'.", "ops": [{"subhead": "הגדרת ברייה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "הגדרתה של ברייה יסודה מתוך מחלוקתם של רבי שמעון וחכמים במשנה במכות (פ' אלו הן הלוקין).\nשם, הם חולקים על שיעור חיוב במלקות באכילת טבל, כאשר לרבי שמעון מתחייבים במלקות בכל שהוא, ולחכמים - בכזית. רבי שמעון שולף את הקלף: 'אי אתם מודים לי באוכל נמלה [שיהיה חייב במלקות]?', וחכמים עונים: 'מפני שהיא כברייתה'. \n\nובגמרא על אתר מתבאר שלשיטת חכמים ברייה היא נשמה חשובה (ולכן נמלה נחשבת, אך לא חיטה).\n\nלפיכך, נראה שבריה היא מה שחשוב כשלעצמו, על אף שהוא פחות משיעור חיוב (כך ניתן להבין מדוע בריה לא תתבטל בשום שיעור, שהרי, היא 'מחוץ למשחק' של שיעורים. כך למשל בדברי רבנן פ' ג\"ה בחולין; רבי שמעיה בנזיר). \n\nהסוגיה במכות היא לא היחידה שמתעסקת בברייה ובהגדרתה, ומן המקומות השונים בש\"ס שעוסקים בה עולות הבנות נוספות שונות להגדרתה. כך, ישנם גם 'ארכיטיפים' שונים המייצגים מודל של ברייה (ראה 'דברים הנחשבים ברייה', לקמן).\n\nלפיכך, נחלקו ראשונים בהגדרה. \n\nנראה כי המשותף לרוב ההגדרות: 'דבר בעל חשיבות עצמאית ללא קשר לשיעור'."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "דעות הראשונים והשו\"ע:"}, {"layer": "rishon", "src": "תוספות, רא\"ש", "srcRef": null, "txt": "דבר שלם, שע\"י שנחתך אובד שמו"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "א. אסור מיום שנברא   ב. מן החיים   ג. מקובץ כאחד"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.1", "txt": "נקט את כל התנאים; ואת הרשימה לקמן, בהוספת ביצה שיש בה אפרוח"}, {"layer": "note", "src": "דברים הנחשבים ברייה", "srcRef": null, "txt": "נמלה (מכות)\nגיד הנשה  (חולין צ\"ו, צ\"ט, פ' ג\"ה)\nאבר מן החי  (חולין ק\"ב, פ' ג\"ה)\nעוף טמא  (חולין ק\"ב, פ' ג\"ה)\nביצה שיש בה אפרוח (שו\"ע, )"}, {"subsubhead": "סוגיות"}, {"layer": "mishna", "src": "משנה (מכות)", "srcRef": null, "txt": "מהו שיעור שמתחייב?\n\tרבי שמעון: כל שהוא\n\tחכמים: כזית\n\tרבי שמעון: אין אתם מודים לי באוכל נמלה?\n\tחכמים: מפני שהיא כברייתה\n\tרבי שמעון: אבל גם חיטה כברייתה!", "ref": {"label": "מכות · פרק אלו הן הלוקין · יז ע\"א", "ref": "Makkot.17a"}}, {"layer": "gemara", "src": "גמרא (דף יז)", "srcRef": null, "txt": "רב ביבי בשם רבי שמעון בן לקיש: המחלוקת היא דווקא בחיטה. אבל בקמח מודה ר' שמעון לחכמים\nרבי ירמיה בשם רבי שמעון בן לקיש: המחלוקת היא גם בקמח\nולשיטת חכמים: ברייה של נמלה - נשמה חשובה, אבל של חטה לא", "ref": {"label": "מכות · פרק אלו הן הלוקין · יז ע\"א", "ref": "Makkot.17a"}}, {"layer": "gemara", "src": "נזיר", "srcRef": null, "txt": "חכמים שיערו שיעור טומאה בכעדשה. לפיכך, משמע שצריך שיעור ברייה כולה כדי לטמא/להתחייב\nרבי שמעיה: שיעור עדשה הוא רק אם אין בבריה נשמה. אם יש בבריה נשמה - אף אם קטנה מעדשה חייב", "ref": {"label": "נזיר", "ref": ""}}, {"layer": "gemara", "src": "גמרא · חולין צו", "srcRef": null, "txt": "מחלוקת גבי גיד הנשה.\nמשמע מרבנן: מתחייב בכזית גם אם לא אכל כל הגיד. אכל כולו – מתחייב גם אם אין בו כזית", "ref": {"label": "חולין · פרק גיד הנשה · צו ע\"א", "ref": "Chullin.96a"}}, {"layer": "gemara", "src": "גמרא · חולין צט", "srcRef": null, "txt": "גיד הנשה שנתבשל. וליבטול ברובא! \nבריה שאני", "ref": {"label": "חולין · פרק גיד הנשה · צט ע\"א", "ref": "Chullin.99a"}}, {"layer": "gemara", "src": "גמרא · חולין קב", "srcRef": null, "txt": "צפור טהורה: בחייה – בכל שהוא (אבר מן החי); במיתתה - בכזית \nצפור טמאה: בין בחייה בין במיתתה – בכל שהוא (משום שעוף טמא חשיב בריה.)\n\tרש\"י מקשה: הרי נבלה לא היה עליה שם נבלה כשנבראה", "ref": {"label": "חולין · פרק גיד הנשה · קב ע\"א", "ref": "Chullin.102a"}}, {"subsubhead": "שיטות הראשונים"}, {"layer": "rishon", "src": "תוספות (מכות), רא\"ש", "srcRef": null, "txt": "דבר שלם, שעל ידי שנחתך אובד שמו (כך: נבלה מקרי נבלה גם אחר חיתוכה)"}, {"layer": "rishon", "src": "ר\"ן, או\"ה", "srcRef": null, "txt": "שלושה תנאים:\n1.  כל דבר שאסור מיום שנברא (רש\"י חולין ק\"ב)  (כגון: עוף טמא;  לאפוקי: עוף טהור שנתנבל)\n2.  מן החיים (מכות)  (כגון: גיד הנשה ועוף טמא;  לאפוקי: חיטה של איסור)\n3.  מקובצת כאחת   (לאפוקי: חֶלב)"}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "מונה את ארבע הדוגמאות העולות מן הסוגיות שהן חשובות ברייה (ג\"ה, אבמ\"ה, עוף טמא, נמלה) \nונקט עפ\"י לשון התוספות שההגדרה לכל אלו היא שאם יחלק אותם – אין שמם עליהם."}, {"layer": "rishon", "src": "דרכ\"מ בשם או\"ה", "srcRef": null, "txt": "כתב שגיד הנשה של בהמה – לאו דווקא כל הגיד, אלא:\n\t\t\t\tבשור: מה שעל הכף בלבד, ברוחב ארבע אצבעות\n\t\t\t\tבשה: מה שעל הכף בלבד, ברוחב שתי אצבעות"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.1", "txt": "נקט גם את תנאַי התוספות והרא\"ש וגם את תנאֶי הר\"ן; וציין אחר כל טעם 'לאפוקי מאי' (חוץ מתנאי התוס', שם הביא נימוקם 'שאם יחלק אין שמו עליו')\nהביא את הדוגמאות מן הסוגיות: נמלה, גיד הנשה, עוף טמא, אבר מן החי\nהוסיף גם 'ביצה שיש בה אפרוח'  (ככה\"נ עפ\"י רשב\"א ברמב\"ם בסי' ק\"י)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מה שהשו\"ע מציין גם ביצה שיש בה אפרוח כדוגמא, הוא מאחר שסבר בסימן ק\"י שחשיב ברייה. והספק הוא גבי ביצה שיש בה דם. אך כאן הוא לא פירש, והדבר נתון למחלוקת. \nש\"ך סובר שמכאן משמע שביצה שיש בה דם לא הווי ברייה, שהרי כתב 'ביצת אפרוח', דייקא", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "עיקר גיד הנשה הנקרא ברייה שלמה – כף בלבד. והוא כרוחב 4 אצבעות (או\"ה)"}, {"subhead": "ביטול ברייה בתערובת"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "בסוגיה בחולין צט מפורש שגיד הנשה שנתבשל לא מתבטל ברוב משום ש'בריה שאני'\t\nומן המשנה והסוגיה בצ\"ו משמע שאם אין מכירין את הברייה בתערובת – אינה בטלה כלל; אבל אם מכירים – בטלה בשישים (והפירוט לכך בדיון הבא לקמן, גבי ברייה שנתבשלה עם היתר, סע' ב')."}, {"layer": "gemara", "src": "בבלי שבועות כא", "srcRef": null, "txt": "גבי נמלה, אמרינן שבריה שאני\nומהשוואה לנשבע המפרש 'שלא אוכל כל שהוא', משמע שלשון הפסוקים כאילו מפרשים 'לא תאכלנו בכל שהוא'", "ref": {"label": "שבועות · כא ע\"א", "ref": "Shevuot.21a"}}, {"layer": "rishon", "src": "רא\"ש, ר\"ן", "srcRef": null, "txt": "יש מי שסובר (רשב\"א, ר' שמשון) שבריה בטלה ב960. וסברתם היא מר' יוסי בר בון בירושלמי תרומה, שנראה שביטל עכבר באלף ושמשמע שם שהוא הדין אם היה 960. אך הרא\"ש דוחה זה."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "מאחר ונראה שזו דעת מיעוט – בריה אינה בטל אפילו באלף", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "וכך, פסקו הטור ושו\"ע שכל בריה - אפילו באלף לא מתבטלת"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "דין זה שברייה לא בטילה בתערובת הוא מדרבנן, אבל מן התורה היא בטילה. ונפק\"מ למקרה של ספק, שאז הווי ספק דרבנן, ויתבטל. אבל אם הספק אינו אם הווי ברייה, אלא הספק באיסור (למשל: לא בטוח שהבריה נפלה לתערובת) – לא בטל.", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מביא ראשונים וסברות נוספים לסמוך על כך שניתן לבטל בריה 960 (אולי אפילו ב60? לחזור לבדוק) בשעת דחק גדולה", "under": true}, {"subsubhead": "טעם הדין"}, {"layer": "acharon", "src": "ערוה\"ש בשם האו\"ה", "srcRef": null, "txt": "כיוון שמתחייב באכילת בריה במלקות, החמירו חכמים גם בביטולה"}], "pesak": null}, "bria-heter": {"title": "ברייה שנתבשלה עם היתר", "seif": "סעיף ב׳", "sugya": null, "intro": "על אף שברייה אינה בטלה אפילו באלף, ישנם שני יוצאי דופן בהם יש מקום לדיון בביטל מסוים:", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "\tא) רוטב התבשיל – אם יש 60 היתר כנגד הבריה – מותר הרוטב (ע\"י סינון)\n\tב) הבריה הוצאה – אם יש 60 היתר כנגד הבריה – הכל מותר"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "בכך, דינו של גיד הנשה שונה משאר הבריות. על אף שבמשנה חולין (פ' ג\"ה) נאמר שמשערין גיד בנותן טעם,\nבגמרא (שם) נפסק שאין בגידים בנותן טעם.\nלפיכך, בשני המקרים החריגים לעיל, כאשר הבריה היא גיד – לא צריך 60 כנגדו כדי להתיר הרוטב/תבשיל."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "      ולגבי השומן של גיד הנשה, נחלקו הראשונים אם דינו כג\"ה בגמרא ואינו נ\"ט, או שמא כן נ\"ט וצריך 60 כנגדו. ודעת הרוב (רש\"י, רר\"ר, טור-שו\"ע) היא שהוא כן נ\"ט, וצריך 60 כנגדו."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כאשר הרוטב מותר, זה רק ע\"י סינון משאר התבשיל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "תרשים זרימה המסכם את המקרים להלכה (טור-שו\"ע. מכירה = יודע איזו היא מבין שאר החתיכות):"}, {"layer": "table", "table": {"title": "תבשיל היתר עם בריה", "cols": ["מכירה", "לא מכירה"], "rows": [{"head": "בריה רגילה", "cells": ["זורק הבריה. אם יש 60 כנגדה – הכל מותר", "אם יש 60 כנגד הבריה – רק הרוטב מותר ע\"י סינון"]}, {"head": "גיד הנשה", "cells": ["זורק הגיד. צריך 60 כנגד השומן שלו והכל מותר", "צריך 60 כנגד השומן – רק הרוטב מותר (ע\"י סינון)"]}]}}, {"layer": "mishna", "src": "משנה · חולין צט", "srcRef": null, "txt": "משערין גיד שנתבשל בירך בנותן טעם; כבשר בלפת (כמו שבשר נותן טעם בלפת, כך צריך להיות מורגש הטעם שהגיד נותן בירך)", "ref": {"label": "חולין · פרק גיד הנשה · צט ע\"א", "ref": "Chullin.99a"}}, {"layer": "gemara", "src": "גמרא · חולין צט", "srcRef": null, "txt": "מחלוקת תנאים ואמוראים אם גידים נותנים טעם \nוהלכתא: אין בגידין בנותן טעם", "ref": {"label": "חולין · פרק גיד הנשה · צט ע\"א", "ref": "Chullin.99a"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ראשונים חולקים אם שומן גיד הנשה כגיד הנשה לעניין זה"}, {"layer": "rishon", "src": "רש\"י, רי\"ף, רמב\"ם, רא\"ש", "srcRef": null, "txt": "שומן כן נ\"ט (ומשערין ב60)"}, {"layer": "rishon", "src": "תוס' (ר\"מ)", "srcRef": null, "txt": "שומן כג\"ה ואינו נ\"ט"}, {"layer": "rishon", "src": "הרמב\"ם מנמק", "srcRef": null, "txt": "שומן הגיד הוא מדרבנן.ומאחר שמן התורה דברים בטלים ברוב, ורק מדרבנן גזרו שיהיו בטלים ב60, היינו אומרים שבגלל שיש תרי דרבנן - שייתבטל שומן הגיד ברוב. אבל מאחר וגיד הנשה הוא בריה – החמירו בשומן שבו כאיסור תורה", "expandable": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.2", "txt": "סבר כרוב הראשונים\n \tוכתב  כלשון הטור (תרשים לעיל)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "המקרים בהם הרוטב מותר בביטול ב60, זה רק לאחר שיסננו אותו משאר התבשיל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מה שצריך נגד פליטת הבריה (הן להתיר התבשיל כולו והן אם רק הרוטב), זה דווקא בבריות כמו עוף טמא. אבל בריה מאוסה – כמו נמלה – אין צריך לבטל פליטתם"}], "pesak": null}, "bria-marak": {"title": "מרק שנפלה בו בריה", "seif": "סעיף ג׳", "sugya": null, "intro": null, "ops": [{"layer": "rishon", "src": "שו\"ת הרשב\"א", "srcRef": null, "txt": "מה שצריך ביטול ב60 אחר הוצאת ברייה, זה דווקא בברייה שאינה מאוסה. אבל בריה מאוסה – הווי נטל\"פ, ואין צריך ביטול כנגדה כלל.\nלפיכך: קדרה של מרק שנפל בה בריה (בריה מאוסה) ונאבד – אסור. אבל אם מזג מהמרק לקערה ולא נמצא הבריה -  מותר."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "משמיט את העובדה שהרשב\"א דיבר דווקא בברייה מאוסה, ומביא את ההיתר ללא נימוק", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.3", "txt": "קדרה של מרק שנפל שם בריה ונאבדה – אסור הכל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "זה דווקא כשאי אפשר לסנן מן המרק את הבריה אבל אם אפשר – מותר", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "סבר שבריה מאוסה הווי נטל\"פ ויש לה עצמה ביטול ככל דבר (ושלא כשאר בריות)", "under": true}], "pesak": null}, "bria-tolaim": {"title": "ירקות מבושלים שנמצאו בהם תולעים", "seif": "סעיף ד׳", "sugya": null, "intro": null, "ops": [{"layer": "rishon", "src": "שו\"ת הרשב\"א", "srcRef": null, "txt": "ירקות שנבדקו ונמצאו בהם 3 תולעים, ולאחמ\"כ נשלקו – אסורים\nלמה? כי יש חזקה שיש תולעים, לכן צריך לבדוק את הירקות יפה. אבל בירקות מבושלים אי אפשר לבדוק  (מבולבלין).\tאבל מי השלקות מותרים – כי אפשר לסננם;  ובשר שבישל במים אלו - אפשר גם כן לנקותו ולבודקו"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.100.4", "txt": "ירקות מבושלים שנמצאו בהם שלוש תולעים – אסורים. אבל מי השלקות מסננם ומותרים. והבשר ירחצנו ומותר."}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "הב\"י הביא כאן רשב\"א שאומר שהחזקה היא ב-3, וכרשב\"ג (במחלוקת לעניין חזקה). אבל בסימן פ\"ד, מביא לשון רשב\"א שהחזקה היא ב-2, כרֶבי. ונראה לב\"ח להחמיר ב-2."}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "ברור שצריך לנקוט כרשב\"ג, ורק בנשואין ומילה קיי\"ל כרֶבי. וכן נראה שנקט בפ\"ד השו\"ע"}, {"subsubhead": "ופירות?"}, {"layer": "acharon", "src": "כף החיים", "srcRef": null, "txt": "אפשר לבדוק פירות גם אחרי שליקה"}], "pesak": null}, "chal-yesod": {"title": "יסודות ועיקר הדין", "seif": "סעיף א׳", "sugya": null, "intro": "ננסה לסכם:", "ops": [{"layer": "lead", "src": "ה'סתירה' בין הסוגיות", "srcRef": null, "txt": "במשנה בחולין (פ' ג\"ה) נבלה ודג טמא כדין ג\"ה באם חתיכה מהן מתבשלת עם חתיכות מותרות– אינה מתבטלת ברוב \n(ואם מכירה: מוציאה והשאר מותר בנ\"ט;  לא מכירה – כל החתיכות אסורות, והרוטב בנ\"ט) \nובגמרא: הטעם לכך שחתיכה מאלו אינה מתבטלת – דבר שדרכו להימנות (פירוט הלמ\"ד לקמן)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אך בעבודה זרה (פ' השוכר את הפועלים) \nבמשנה: רשימה של דברים שאינם בטלים\nובגמרא: הרשימה היא של דברים שהם דבר שבמניין ואסורים בהנאה "}, {"layer": "lead", "src": null, "srcRef": null, "txt": "נראה שיש בפנינו שתי סוגיות שלא עולות יפה יחד. כאשר במשנה בחולין מוזכרים דברים שבמניין ועליהם נאמר שאינם בטלים, בעוד במשנה בע\"ז הדברים שאינם מתבטלים הם דברים עם שני קריטריונים: דבר שבמניין ואסורים בהנאה.\nובגמרא שם אומרת הסוגיה שהתנא בא להוציא דברים בעלי קריטריון אחד בלבד. דהיינו: מה שבחולין. \nהראשונים (תוספות ורא\"ש) נדחקים בכך, שהרי בוודאי שגם דג טמא ונבלה שבחולין אינם בטלים. הצעות: מדובר בשני תַנַאים חולקים (תוס'); מיעוט התנא הוא רק מן הרשימה, אך אינו מתיר (רא\"ש)."}, {"layer": "rishon", "src": "הרי\"ף", "srcRef": null, "txt": "משמיט את המשנה בחולין, ולכן נ\"ל שסובר שרק מה שבע\"ז אינו מתבטל ברוב."}, {"layer": "rishon", "src": "שאר הראשונים · תוס', רא\"ש, רמב\"ם", "srcRef": null, "txt": "אוסרים גם דברים שבמניין"}, {"layer": "note", "src": "דבר שבמניין", "srcRef": null, "txt": "דבר שבמניין – שבגלל חשיבותו סופרים אותו אחד אחד, ולא במשקל"}, {"layer": "mishna", "src": "משנה · חולין ק", "srcRef": null, "txt": "כמו ג\"ה, גם חתיכת נבלה ודגים טמאים שנתבשלו עם חתיכות מותרות – \nמכירן: בנ\"ט;  לא מכירן – כל החתיכות אסורות, והרוטב בנ\"ט", "ref": {"label": "חולין · פרק גיד הנשה · ק ע\"א", "ref": "Chullin.100a"}}, {"layer": "gemara", "src": "גמרא · חולין ק", "srcRef": null, "txt": "למה חתיכה של נבלה/דגים טמאים אינה מתבטלת?\n• למ\"ד שכל דבר שישנם אנשים הנוהגים למנותו משום שהם מקפידים על חשיבותו אינו מתבטל – חתיכה גם לא תתבטל מטעם זה. כי לעיתים עשוי כל אדם למנותה, לקראת אורחים (דהיינו – חשובה)\n• למ\"ד שדווקא דבר שנמנה אינו בטל, אבל דבר שניתן במשקל/אומדן בטל – חתיכה גם לא תתבטל משום שהיא ראויה להתכבד בפני אורחים ולפיכך – היא נחשבת 'שדרכו להימנות'\nכלומר, כך או כך, משום ש'דרכן להמנות', דהיינו, בגלל חשיבותן", "ref": {"label": "חולין · פרק גיד הנשה · ק ע\"א", "ref": "Chullin.100a"}}, {"layer": "rishon", "src": "רי\"ף", "srcRef": null, "txt": "סובר שרק אם הווי גם דבר שבמניין וגם איסורו הנאה אסור (השמיט את משנת חולין)"}, {"layer": "rishon", "src": "תוס', רא\"ש רמב\"ם ורוב הראשונים", "srcRef": null, "txt": "אוסרים גם דברים שהם רק דבר שבמניין"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "לגבי דבר שהוא איסור הנאה? (זה ממש לא ברור מה הכוונה בטור)\nמשמע מהתוס' והרא\"ש שגם זה נאסר מפני שאם תתבטל – תהיה ראויה להתכבד"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.1", "txt": "חה\"ל דינה כבריה ואינה מתבטלת אפילו באלף (כסוגיה בחולין; תוס', רא\"ש ושאר פוסקים)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "ואם מדובר בחה\"ל שגם אסורה בהנאה, היא אוסרת את כל התערובת בהנאה", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "ואפילו אם היא אסורה רק מדרבנן לא בטלה (ב\"י בשם.. )"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tואם ספק אם ראויה להתכבד – אזלינן לקולא, גם אם אסורה מדאורייתא (או\"ה) "}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "זאת משום שזה שחה\"ל אינה בטלה הוא רק מדרבנן, וספק דרבנן לקולא\n\t      אבל אם החתיכה וודאי ראויה להתכבד, והספק הוא רק אם היא חה\"ל של איסור – לא בטלה", "under": true}], "pesak": null}, "chal-hagdara": {"title": "עוד בהגדרת 'חה\"ל'", "seif": "סעיפים ב׳-ה׳", "sugya": null, "intro": "הטור והשו\"ע הקדישו חלק נכבד מן הסימן לעיסוק בגדרי חה\"ל וכן, במקרים ספציפיים. זאת, בעיקר בעקבות הרא\"ש שהאריך בדבר, והביא גם מגוון דעות אשר עליהן הוא חולק.\nהשו\"ע גם ראה לנכון להוסיף ולהרחיב על כך מראשונים נוספים, וכתב לגבי איברים מסוימים כמו 'הדרא דכנתא' (מעיים המלופפים על שומן ה'כנתא'), וקורקבן (קיבת השרירים).\nובתמצות:", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "אסורה מחמת עצמה (ב') – שאותה חתיכה שהיא ראויה להתכבד, תהיה גם חתיכת איסור. ודווקא מחמת עצמה, ולא משום שבלעה מדבר מה אחר ואסַרה (רא\"ש)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "גדר 'ראויה להתכבד' (ג') – בעיקר מחלוקת הרא\"ש מול ראשונים אחרים המקלים (רשב\"א, סמ\"ק וש\"ד). נראה כי עיקרה הוא בכך שהרא\"ש סובר שעיקר ההגדרה שלפיה יש לדבר חשיבות היא 'דבר שדרכות למנות', בעוד למקלים כל עוד זה לא דבר שהייתי מגיש לאורח אס איט איז – זה לא נחשב חה\"ל."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "השו\"ע סובר להקל כאלו האחרונים, מאחר וחה\"ל הוא דרבנן, והרמ\"א חושש לרא\"ש וסיעתו, אך מחריג\n מכך מקרים בהם דברים 'מחוסרי מעשה גדול'."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הפוסק צריך לבדוק את החשיבות ומה נחשב 'מחוסר מעשה גדול' לפי הזמן והמקום, וכראות עיניו. ואם יש לו ספק בכך - הולכים להקל בגלל שהווי מדרבנן  (וכ\"כ ערוה\"ש. והוא נוטה לסיעת הרא\"ש)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "     איברים פנימיים (ד'-ה') – בגמרא בנדרים נאמר ש'בני מעיים – אוכליהם לאו אינשי'. לפיכך פסק ה\"ר\n          יהודה שבני מעיים (איברי העיכול הפנימיים), וקורקבן בפרט, אינם עשויים להתכבד. וכן בשו\"ע.\n          אך נראה שיש שסוברים שכבד, ריאה וטחול, אינם בכלל בני מעיים, והם כן עשויים להתכבד (של\"ג). "}, {"subhead": "אסורה בפני עצמה (ב')"}, {"layer": "rishon", "src": "רא\"ש (וכן נראה מהרשב\"א, ר\"ן בשם רבותינו הצרפתים, סמ\"ג)", "srcRef": null, "txt": "דין חה\"ל הוא דווקא בדברים שאסורים בפני עצמם, כמו נבלה, או בשר בחלב. אבל לא דבר שנאסר בגלל שספג טעם ממשהו אחר  (בב\"ח הוא בדיוק מקרה בו עלולים להתבלבל, ולהגיד שהחלב אסור בגלל הבשר או להפך, אבל משמע כאן מכל הפוסקים שיש להתייחס לבב\"ח כחתיכה עצמאית, משום שבבישול נעשו לגוף אחד. וכ\"כ בב\"י)"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "הטעם לכך – משום שאין האיסור שנתערב ראוי להתכבד בפני אורחים כשלעצמו", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.2", "txt": "דין חה\"ל הוא דווקא בדברים האסורים בפני עצמם, ולא בגלל דבר אחר (רא\"ש וכו')"}, {"subsubhead": "גבינת גויים"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "גבינות שמעמידים בקיבת/חלב בהמה טריפה חשיב חה\"ל."}, {"layer": "rishon", "src": "דרכ\"מ", "srcRef": null, "txt": "זה אינו. שהרי לא אסורות מחמת עצמן, אלא רק בגלל הטריפה שבלעה (כסברת הרא\"ש)", "under": true}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "עיקר כדעת האו\"ה (והראה שיש סתירה בדברי הרמ\"א בשני מקומות בתורת חטאת)", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אם הגבינה ממש נעשתה מחלב טמא/טריפה – חשיבא חה\"ל; \n \t        אם רק הועמדה ע\"י חלב טמא/טריפה – לא חשיבא חה\"ל, והווי כמו איסור בלוע"}, {"subsubhead": "בשר שלא נמלח"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "בשר שלא נמלח לא יכול להיות חה\"ל, אלא רק הדם הוא שאוסרו וחשיב בלוע"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פסק כן"}, {"subsubhead": "כדי קליפה"}, {"layer": "rama", "src": "הרמ\"א", "srcRef": null, "txt": "פסק שאם דבר נאסר רק כדי קליפה, ודאי שיכול להתבטל, שהרי הקליפה עצמה אינה ראויה להתכבד (ש\"ד)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הביא את הלחם חמודות (על הרא\"ש) שתמה, הרי כשמשהו נאסר כדי קליפה זה כי הואבולע ממשהו אחר\nרי\"ו סבר להפך.                    והש\"ך עצמו סבר להחמיר דווקא בבב\"ח, ובשאר איסורים קליפה\nחשיב כאיסור הבלוע", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מאחר והקליפה עצמה אינה ראויה להתכבד, אף בבב\"ח\n \t   ניתן להתיר. והפלתי הקל בזה.", "under": true}, {"subhead": "גדר 'ראוי להתכבד' ואיברים מסוימים (ג'-ה')"}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "הולכים אחר השם, ולא אחר המצב הנוכחי ממש. כלומר, גם אם חתכתי אותה ועתה אינה ראויה להתכבד בפני אורחים. אלא כל שהווי 'דבר שדרכו לימנות' מפני חשיבותו."}, {"layer": "rishon", "src": "ר\"ש ור\"י (הביאם הרא\"ש)", "srcRef": null, "txt": "אף תרנגולת בנוצתה או כבש שלם חשיב חה\"ל"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "חה\"ל בפני אורחים היא בהכרח בינונית. לא גדולה מדי ולא קטנה מדי (כסיעת הי\"א ברא\"ש)"}, {"layer": "rishon", "src": "סמ\"ק", "srcRef": null, "txt": "בהמה עם הצמר או עוף עם הנוצות – אין קרוי ראויה להתכבד (ופשוט שזה משתמע גם לדעת\n \tהרשב\"א. וכ\"כ ערוה\"ש)"}, {"layer": "rishon", "src": "שערי דורא", "srcRef": null, "txt": "ר\"ת התיר תרנגולת נבלה שנתערבה בכשרות משום שהייתה בנוצותיה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "העניין כאן הוא שהרא\"ש כשיטתו מבדיל בין חה\"ל ל'דבר שדרכו למנות'\n\t\t\t  ולדידו כל שדרכו למנות חשיב חה\"ל ויש לאוסרו. \n \t\t\tאבל דעת הטור-שו\"ע כאן קשה, משום שבסי' זה, משמע שנוקטים לגבי חיה\n \t\t\tדהעיקר אם הווי חה\"ל, ובסי' ק\"י משמע שנוקטים אם חשובה כבעל חי (ובק\"י\n \t\t\tאם נשחטה אינה חשובה)", "under": true}, {"layer": "rishon", "src": "דרכ\"מ", "srcRef": null, "txt": "  מהרא\"י: רגליים שלא הוסר שערן ורגליים של אווז שלא הוסר עורן – לא נחשבים חה\"ל\n\t    אבל הטלפיים של הרגליים, אי הורדתן לא גורמת לכך של יחשבו הרגליים חה\"ל"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.3", "txt": "נראה שדוחה את דעת הרא\"ש וסובר ככל המתירים שאחריו (רשב\"א, סמ\"ק, ש\"ד)\n\t    אבל כתב שיש חולקים בזה (הרא\"ש)\n\t\tובבדק הבית כתב שהקל מאחר וחה\"ל הוא מדרבנן"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "סבר שנוהגים כרא\"ש, חוץ מכל אלו, שסובר שנחשבים 'מחוסרי מעשה גדול'\n• תרנגולת בנוצתה (ר\"ת)\n• רגליים שלא הוסרו שערותיהן\n• ראש שלא הוסרו שערותיו\n• במדינות 'האלו' רגליים וראש של עופות אף אם הוסרו שערותיהם"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "גם ראש של בהמה אינו חשוב (אף אם הוסרו שערותיו). ורק ראש של עגל", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אף ראש של עגל אינו חשוב בימינו (אף אם הוסרו שערותיו). \n \t\tאבל לשון של בהמה כן חשובה, משום שאברהם כיבד בה מלאכים, ואם היא בראש\n \t\tהבהמה – חשיב חה\"ל", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "כל הפוסקים כותבים שכל הדברים האלו של חשיבות תלויים בזמן והמקום, וכראות הפוסק. ואם יש לו ספק בכך – הולכים להקל בגלל שהווי מדרבנן  (וכ\"כ ערוה\"ש. והוא טורח להחזיר שהקריטריון\n \t\t\t\t\t            החשוב בזה זה דבר שדרכו להמנות)"}, {"subsubhead": "שומן הכנתא ובני מעיים (ד'-ה')"}, {"layer": "rishon", "src": "הגהות ש\"ד (תה\"ד)", "srcRef": null, "txt": "הדרא דכנתא אינו ראוי להתכבד. לא מגישים אותו. אנשים לא אוכלים שומן לבדו."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.4", "txt": "פסק כן"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "עור שומן אווז כן ראוי להתכבד"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מתקשה בכוונת הש\"ד והשו\"ע. אם הכוונה לשומן לבדו - הרי פשוט שמותר, שהרי בני\nאדם לא אוכלים שומן לבד. ואם הכוונה לשומן עם הכנתא – הוא ראויה להתכבד, שהרי עושים מהמנה מאכלים כשממלאים אותה בקמח. \nמציע: הכוונה שהשומן עם הכנתא, ללא מילוי כלל – לא ראויים להתכבד\nולגבי הרמ\"א סבר: כנראה שבימיהם היו מפשיטים כל העור ומבשלים אותו כחתיכה אחת\n \t\t   גדולה. אבל בימינו לא שייך, משום שמטגנים אותו בחתיכות קטנות ", "expandable": true}, {"layer": "rishon", "src": "ב\"י (ה') בשם ה\"ר יהודה", "srcRef": null, "txt": "הטור בסימן ק\"י הביא בשם ה\"ר יהודה:\n קורקבן (קיבת הבהמה) אינו חשיבה חה\"ל, עפ\"י המימרא בנדרים: 'בני מעיים – אוכליהם לאו אינשי'"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.5", "txt": "(גם לגבי 'שאר בני מעיים')"}, {"layer": "rishon", "src": "של\"ג", "srcRef": null, "txt": "יש שסוברים שכבד, ריאה וטחול, אינם בכלל בני מעיים, והם כן עשויים להתכבד.", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "למהרש\"ל קורקבן אווז חשיב ראוי להתכבד. ומשמע ששל תרנגולת לא"}, {"layer": "acharon", "src": "לבוש", "srcRef": null, "txt": "כבד של אווזות מפוטמות, שמלבינה מרוב שומן, חשיבה ראויה להתכבד", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "וגם כאן כמובן שייך שיקול הזמן והמקום "}], "pesak": null}, "chal-bitul": {"title": "ביטול חשיבות חה\"ל/בריה", "seif": "סעיפים ו׳-ז׳", "sugya": null, "intro": "ברגע שחה\"ל או בריה מאבדים מחשיבותם – בטלים הם כשאר כל איסורים. אזי, שייך בהם הדיון שבסימן צ\"ט, לגבי ביטול איסור. אולם, נראה כי כאן הדיון מעט שונה, שכן, כאן מעשה הביטול ושאלה הכוונה (מזיד/שוגג) לעשותו אינה בערבוב האיסור או בהוספת היתר, אלא בפגימת החשיבות מן הבריה/חה\"ל כך שתוכל להתבטל. וגם זה עפ\"י הרא\"ש, על מה שכתב לגבי בריה, והטור-שו\"ע הסיקו כן בהתאמה על חה\"ל.\n\nואכן, כמו בצ\"ט (ובדומה למעשה שבת בשי\"ח, רשב\"א-רמב\"ם-ר' יהודה), סובר רא\"ש בברייה שדווקא אם נתפרקה מחשיבותה בשוגג מתבטלת, אבל במזיד – התערובת אסורה. ודווקא למי שפירק בעבורו.\n\nובסעיף ז', הטור והשו\"ע הביאו מקרה של ספק הנוגע בדין זה. לפיו, כאשר חה\"ל/בריה שנתערבה בתערובת ואינה ניכרת, ולאחר מכן נחתכה חתיכה כלשהי ובטלה חשיבותה – אין להניח שמדובר בחה\"ל, וכל שאר החתיכות עדיין אסורות. אך החתיכה הזו מותרת (יש לכך שני צדדים, ולשניהם היא מותרת. מפורט לקמן)", "ops": [{"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "כותב עפ\"י הסוגיה במכות שבריה שנתרסקה/נחתך ממנה קצת - לא חשיבא ברייה ובטלה ברוב (תשעה נמלים שרסקן שלוקה רק משום שנצטרפו לכזית)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "ובהתאמה לגבי חה\"ל – אם נפרסה (נתפרקה), בטלה חשיבותה והיא בטלה ב60 (אגוזי פרך,\n        גיטין. וכ\"כ רשב\"א ור\"ן)"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "ואפילו אם נתבטלה החשיבות אחר שנתערבה (גבי בריה)", "under": true}, {"layer": "rishon", "src": "שערי דורא", "srcRef": null, "txt": "   יש מפרשים בדג, שגם אם נתפרק, אם רובו עדיין שלם – חשיב בריה. וזה עפ\"י אהלות, שם אמרינן\n   שהאברים אין להם שיעור.\n   ויש להם דוחים, שאומרים שזה דווקא לעניין טומאה (אבל לאכילה - לא חשיב בריה, ומתבטל)"}, {"layer": "rishon", "src": "הגהות שערי דורא (תרוה\"ד)", "srcRef": null, "txt": "   מהרא\"י: אם הוא שלם ונפל ממנו קצת ע\"י בישול – עדיין חשיב בריה \nהגהות: אבל אם נפרד ממנו קצת מגופו ושדרתו וכד', אפשר לסמוך על דעות המקלים והדוחים"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.6", "txt": "בריה או חה\"ל שנחתכה/נתפרקה – בטלה (עפ\"י הרא\"ש גבי מכות, ב\"י, רשב\"א ור\"ן)\n\t     ואפילו אם נתרסקה לאחר שנתערבה (רשב\"א)\n\t     ודווקא בשוגג. אבל במזיד – אסור למי שבעבורו רוסק (רא\"ש, כסי' צ\"ט)\n\t(ונראה שלא התייחס למה שהש\"ד והגש\"ד דנו גבי רובו שלם)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אין חילוק בין נתערבו במינם או שלא במינם (לא נראה שייך כאן. וכ\"כ ט\"ז. אלא לסי' ק\"ב, א')"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז", "srcRef": null, "txt": "דברי הרמ\"א קאי על פשט הדין של חה\"ל ובריה שאינן בטלות דאפילו באלף", "under": true}, {"layer": "acharon", "src": "ערוה\"ש, פר\"ח", "srcRef": null, "txt": "חומר בחה\"ל מבריה - אפשר להוריד ממנה חתיכה ועדיין תהיה ראויה להכתבד, ואסורה אפילו באלף. לעומת בריה, שברגע שיורדת ממנה חתיכה, לרוב הדעות כבר אינה בריה.\nוחומר בבריה מחה\"ל - שאפילו אם היא נסרחת עדיין חשיבי ברייה (השו\"ע לא כותב זאת. אלא ערוה\"ש)", "expandable": true}, {"subhead": "שוגג"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "הטור והשו\"ע (ו') כותבים לפי הרא\"ש, בדומה לצ\"ט, שדין זה הוא דווקא באם נתרסקה ונתבטלה הבריה/חה\"ל בשוגג \nואם עשה כן במזיד – אסור למבטל עצמו (אבל לאחרים מותר, אם לא עשה כן בשבילם)"}, {"layer": "rishon", "src": "האו\"ה", "srcRef": null, "txt": "סובר שגם כאן, בדומה לדעות בצ\"ט, מיקרי 'שוגג' דווקא אם נתפרקה הבריה/חה\"ל כשעוד לא נודע שנפלה לתערובת. "}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פסק שלא כמותו, וכתב שאף אם נתפרק לאחר שנודע על העירבוב"}, {"subhead": "ספק בחתיכה שבטלה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "בסעיף ז', כתבו הטור והשו\"ע עפ\"י הרא\"ש, לגבי מקרה בו נחתכה חתיכה ואין יודעים אם היא של איסור – שאם כן, הייתה ברייה/חה\"ל ועתה בטלה חשיבותה – לא משערים שאכן כך. אבל החתיכה עצמה בכל מקרה מותרת; וממאי נפשך? "}, {"layer": "note", "src": "ממאי נפשך", "srcRef": null, "txt": "   אם היא החה\"ל – אזי נתפרקה מאיסורה וכולן מותרות.  \n   אם היא לא – אזי מותרת בכל מקרה (אם מוציאה מהתערובת)."}], "pesak": null}, "chal-tref": {"title": "זיהוי טריפה אחר שנתערבה", "seif": "סעיפים ח׳-ט׳", "sugya": null, "intro": "באופן שקצת לא שייך לכאן, השו\"ע מביא כאן הלכה לעניין זיהוי טריפה שנתערבה בתערובת ואין יודעים איזו היא (אולי בגלל העיסוק בסע' ז' בחתיכה שאין יודעים אם היא החה\"ל, או לא). ", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "השו\"ע פוסק עפ\"י הגהות מיימוניות (בשם או\"ז) ותרומת הדשן, כי בתוך תערובת של תרנגולות או של כבשים, כאשר התברר כי אחד מהם טרף ואוסר את כולם (כל הקורקבנים של התרנגולות וכן הראשים של הכבשים אינם בתערובת ונמצאים בידינו, ולפיהם ניתן לדעת אם התרנגולת/כבש טריפה), ניתן לזהות ע\"י התאמת שומן הקורקבן/ראש לבעליו מי מהם הטריפה. ואז, מוציאים את הטריפה ובכך מתירים את השאר.\nזאת עפ\"י ברייתא בע\"ז, שם רשב\"ג התיר גרב מלאה חתיכות דג כאשר נמצא סימן באחד מהם. "}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "בשומן הקורקבן אמנם נסתפק בהשוואה והתאמה ע\"י מראה, אך בכבש ושאר דברים צריך גם צורה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "יש פוסקים שהקשו על לשון השו\"ע, שהרי כאן משמע שהכבש/תרנגול הווי חה\"ל, ובס' ג' פסק שלא. והתירוצים בכך שונים. כגון: כאן השו\"ע פשוט נקט כדוגמתם של ההגהות ות\"ה, אבל העיקר הוא מה שכתב 'וכן כל כיוצא בזה'. \nלדעתי: השו\"ע מדבר בס' ג' על תרנגולת בנוצותיה, וכן על כבש שהוא שלם או גדול מדי. פשוט צ\"ל שכאן מיירי בכך שאינם כנ\"ל."}, {"layer": "gemara", "src": "ברייתא · ע\"ז", "srcRef": null, "txt": "ברייתא ע\"ז: \nגוי שהביא גרב מלאה חתיכות דגים ונמצא באחת החתכיות סימן – התיר רשב\"ג את כל החתיכות. \nורב פפא: זה כי ניתן להתאים את כל החתיכות יחד (כמו פאזל) ולראות שהן שייכות זו לזו", "ref": {"label": "ברייתא · עבודה זרה", "ref": ""}}, {"layer": "rishon", "src": "הגהות מיימוניות", "srcRef": null, "txt": "רַבי (האו\"ז) התאים שומן קורקבן של תרנגולת טריפה (נקוב) לתרנגולת אחת מתוך תערובת של תרנגולות, וכך אימת שהיא הטריפה, והתיר בכך את האחרות (ככה\"נ ע\"י כך שהוציאה)."}, {"layer": "rishon", "src": "תרומה\"ד", "srcRef": null, "txt": "ניתן להתאים ראש כבש טרף לכבש אחד מתוך תערובת של כבשים ע\"י הקפת ראשו, ולהתיר האחרים."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ח'-ט')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.101.8", "txt": "פסק כדברי שניהם, הן לגבי תרנגולת ושומן קורקבן שלה, והן לגבי כבש וראש שלו. וכתב שכן כל כיוצא בזה."}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "בשומן הקורקבן אמנם מסתפקים בהשוואה והתאמה ע\"י מראה, אך בכבש ובשאר דברים צריך גם צורה וגם מראה", "under": true}], "pesak": null}, "min-ikar": {"title": "דבר שבמניין (בגלל חשיבותו)", "seif": "סעיף א׳", "sugya": null, "intro": "ראינו בסימן ק' כי אחד מן המושגים המרכזיים שמגדירים את חה\"ל הוא 'דבר שבמניין'. כך, לפי הסוגיה בחולין דבר שבמניין הווי חה\"ל, בעוד בסוגיה בע\"ז רק דבר שהוא גם דבר שבמניין וגם איסורו איסור הנאה חשיב חה\"ל. ולהלכה רוב הראשונים (מלבד הרי\"ף) והשו\"ע הסכימו כי גם דברים שהם רק במניין חשובים הם, והווי חה\"ל בפני אורחים. אם כן מה קורה בסעיפים הללו? האם אנו באים להגדיר את דבר שבמניין באופן נפרד לחה\"ל?", "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "הרא\"ש תולה את עיקר החשיבות של דבר במושג זה, דהיינו, בדברים שדרכם להמנות (עפ\"י ר' מאיר לקמן), וכי לפיכך נמדוד אם חתיכה ראויה להתכבד בפני אורחים.\n\nאך נראה ששאר הראשונים שהשו\"ע מאמץ להלכה ב ק\"א, ג' לא רואים כך את הדברים, ומבחינתם יש לבחון לא רק את עניין הספירה והעצמאיות של החתיכה, כי אם גם לשאול 'האם הדבר באמת ראוי להתכבד בפני אורחים? האם אגיש את החתיכה לאורח כמו שהיא עכשיו?'.\n\nאולם כאן, השו\"ע מייצר לנו תת-קטגוריה נוספת לדברים שאינם בטלים: דבר שדרכו לימנות בגלל חשיבותו. הוא מבהיר לנו כי העניין הוא החשיבות, ולא כל דבר שבמניין (כחכמים, ולא כר' מאיר ולא כהרא\"ש). ועל אף שאין זה כהרא\"ש, זה בוודאי מתקרב לשיטתו."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אך הרמ\"א פוסק כאן כדעת ר' יוחנן והפוסקים הסוברים כמוהו (כל דבר שמונים אותו תמיד)\nהט\"ז, הש\"ך ומהרש\"ל אף סוברים להחמיר יותר כדעת הראשונים הסוברים כר\"ל (דבר שמונים לעיתים)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "זו הרחבה לדברים שאינם בטלים, ונכנסים לקטגוריה זו דברים נוספים, שאינם נכנסים לקטגוריית חה\"ל. כך למשל הטור-שו\"ע מביאים כדוגמא בעל-חיים, אשר מוכח בזבחים שהם חשובים ולא בטלים: \nלפני שחיטתו חשיב דבר חשוב שבמניין, אך לא חה\"ל (שהרי הוא שלם וכו'), ולאחר שחיטתו אין בו חשיבות בע\"ח, אך דווקא יכול להיות חה\"ל (תלוי לדעת מי)."}, {"layer": "mishna", "src": "משנה ערלה (פ\"ג, ו'-ח')", "srcRef": null, "txt": "מחלוקת ר' מאיר וחכמים לגבי חבילי תלתן. \nר' מאיר – את שדרכו למנות מקדש  \nחכמים – בטלים. ולדעתם רק שש דברים נחשבים חשובים (אגוזי פרך, רמוני בדן וכו')\nר' עקיבא – מוסיף לחם של בעל הבית", "ref": {"label": "משנה ערלה · פרק ג׳ (ו׳-ח׳)", "ref": "Mishnah_Orlah.3.6"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "כלומר, לפי ר' מאיר נגיד שכל שדרכו למנות אוסר אפילו באלף"}, {"layer": "note", "src": "הבנת פניני הלכה והב\"י", "srcRef": null, "txt": "פניני הלכה מבין שההבדל בין חכמים לר' מאיר הוא שלחכמים הרשימה היא גם דברים שבמניין, אבל שהסיבה שמוכרים אותם במניין היא בגלל חשיבותם. אבל דברים שרגילים למוכרם במניין לצורך חישוב מחירם ולא מפני חשיבותם – לא נחשבים. כ\"כ בערוה\"ש.\n\nובב\"י באמת כתב שאין הרשימה באה להוציא את כל הדברים, אלא להדגים מה הווי חשוב+במניין, ולהוציא את דברי ר' מאיר, שהם רק במניין. וכן משמע בדעת הרמב\"ם לקמן, וכן בערוה\"ש", "expandable": true}, {"layer": "gemara", "src": "גמרא (ביצה · פ' קמא)", "srcRef": null, "txt": "ר' יוחנן וריש לקיש חולקים בדעת ר' מאיר, מה פירוש 'שדרכו למנות'\nר' יוחנן: דברים שתמיד סופרים אותם\nריש לקיש: אפילו דברים שרק לפעמים סופרים אותם (דוגמתי: תפוחים. על אף שבד\"כ במשקל,\n \t\t\t\t\t\tלפעמים פשוט רוצים לקנות מס' מסויים) ", "ref": {"label": "ביצה · ג ע\"ב", "ref": "Beitzah.3b"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "כדעת מי במשנה פוסקים?"}, {"layer": "rishon", "src": "ר\"י, רי\"ו, סמ\"ג", "srcRef": null, "txt": "כר' יוחנן בר' מאיר (מוכח שכר' מאיר משום שנחלקו אמוראים בדעתו)"}, {"layer": "rishon", "src": "ס' התרומה, או\"ה", "srcRef": null, "txt": "כריש לקיש בר' מאיר"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "כר' עקיבא וחכמים. הוא מסביר שכל הרשימה שלו (ושל חכמים) הם דברים חשובים. לכן, כל דבר שהוא חשוב אוסר ואינו בטל. אבל כל זה הוא שאלה של זמן ומקום מה נחשב חשוב (ואלו שברשימה הם דוגמא)."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.110.1", "txt": "+פוסק בעיקר כלשון הרמב\"ם (כ\"כ ש\"ך). כל דבר חשוב  שהוא במניין אוסר בכל שהוא. אבל שאר שדרכם לימנות - לא. ומביא את הרשימה שבדעת ר' עקיבא במשנה. \n+מביא שגם בע\"ח חשובים ואינם בטלים (גם זה בלשון הרמב\"ם, עפ\"י רב אשי בזבחים)"}, {"layer": "rama", "src": "רמ\"א · (סע׳ א')", "srcRef": null, "txt": "+י\"א דכל דבר שבמניין שדרכו למנותו תמיד. וכן דעתו. (ר\"י, רי\"ו, ר' יוחנן)\n+כל הדין הזה שדבר חשוב לא בטיל זה מדרבנן, לכן בספק מקלים (רמב\"ם)"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז, מהרש\"ל", "srcRef": null, "txt": "סוברים להחמיר כתרומה"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אך במקום הפסד אפשר 'להקל' כרמ\"א וכר' יוחנן", "under": true}, {"layer": "zman", "src": "מר\"ן עובדיה", "srcRef": null, "txt": "לספרדים בזמן הזה העיקר כדעת השו\"ע (רמב\"ם); ולכן, אף ביצה בטלה \n \tמשום שאינה חשובה, ועל אף שתמיד נמכרת במניין"}], "pesak": null}, "min-bitul": {"title": "ביטול חשיבות דבר שבמניין", "seif": "סעיף ב׳", "sugya": null, "intro": "בדומה לחה\"ל ובריה שראינו בס' ק\"א, ס' ו', גם דבר שבמניין אשר מאבד מחשיבותו - בטל כשאר כל איסורים. וגם כאן, מגדירים הטור-שו\"ע דזה דווקא בשוגג, כמו בסי' צ\"ט, דנפסק שם כהרשב\"א כדעת ר\"י גבי קנס במזיד במעשה שבת.", "ops": [{"layer": "rishon", "src": "רשב\"א (ת\"ה)", "srcRef": null, "txt": "דבר שבטל חשיבותו חוזר ובטל ברוב או בשישים כשאר איסורים. אבל דווקא בשוגג.\nוזה גם במשנה בערלה: נתפצעו האגוזים, נפרדו הרמונים – יעלו באחד ומאתים."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.110.2", "txt": "בעלי חיים שנתערבו באחרים – לאחר שנשחטו בטלה חשיבותה (רשב\"א"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "עפ\"י האו\"ה, כותב שזה דווקא בב\"ח קטנים, שלאחר שחיטתם לא חשיבי חה\"ל (ולפיכך משמע שלשיטתו אינו מבדיל בין דבר שבמניין לחה\"ל)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הרמ\"א מדבר על חה\"ל. אבל משום דבר שבמניין - אפילו בע\"ח גדולים בטלים אחר שחיטתם", "under": true}], "pesak": null}, "dashilm-ikar": {"title": "סוגיות ועיקר הדין", "seif": "סעיף א׳", "sugya": null, "intro": "דבר שיש לו מתירין דינו דומה לשאר דברים חשובים, וגם הוא אינו בטל אפילו באלף אם נתערב. \nהמקור לדינו הוא ממרחב די גדול של סוגיות בש\"ס, ולענ\"ד הקדום שביניהם הוא רבי שמעון, בברייתא בנדרים.", "ops": [{"layer": "note", "src": "הגדרתו והתנאים לו", "srcRef": null, "txt": "   1) דבר שבוודאי יותר מעצמו מתישהו, או לחלופין, שהתרתו באופן אקטיבי לא תגרור הפסד (רשב\"א,\n \t\t\t\t\t\t\t\t\t  שו\"ע ביש מי שאומר)\n   2) כשיוּתר הדבר הוא בהכרח עוד יהיה כשיר לאכילה ולא יתקלקל (רשב\"א, שו\"ע ביש מי שאומר)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אולם, דשיל\"מ דומה בעיקר הדין לדברים חשובים, אך במספר דברים דינו שונה:"}, {"layer": "note", "src": "שלושה הבדלים מדברים חשובים", "srcRef": null, "txt": "   1) הוא לא באמת חשוב, ודינו רק זהה לדברים חשובים שאינם בטלים. והטעם לדינו: מאחר וניתן\n      לאוכלו בהיתר גמור, אין סיבה לאוכלו בהיותו איסור (אפילו בביטול. ביטול הוא רק בדיעבד) (רש\"י)\n   2) דינו חל רק בתערובת של מין במינו (הראשונים ושו\"ע. לבד מהראבי\"ה; ומשמע בירושלמי נד')\n   3) על אף שגם בו וגם בשאר דברים חשובים הדין חל גם לגבי איסורי דרבנן, בדשיל\"מ מחמירים גם\n      בספק דרבנן (כגון ביצה שספק אי נולדה ביו\"ט) (ב\"י סובר דזה פשוט בברייתא בריש ביצה. וכן בשו\"ע)"}, {"subsubhead": "סוגיות"}, {"layer": "gemara", "src": "ברייתא · נדרים נח", "srcRef": null, "txt": "רבי שמעון: כל דבר שיש לו מתירים – לא נתנו בו חכמים שיעור (ולא בטל אפילו באלף) \nכל דבר שאין לו מתירים – נתנו בו חכמים שיעור (ובטל כרגיל בנ\"ט/ברוב/שישים) ", "ref": {"label": "נדרים · פרק הנודר מן הירק · נח ע\"א", "ref": "Nedarim.58a"}}, {"layer": "gemara", "src": "גמרא · ביצה ג", "srcRef": null, "txt": "ביצה שספק אם נולדה ביו\"ט אם בחול –הווי דבר שיש לו מתירין ולכן לא תתבטל באפילו באלף ", "ref": {"label": "ביצה · ג ע\"א", "ref": "Beitzah.3a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "ואף על גב דמדאורייתא חד בתרי בטיל - אחמור רבנן, הואיל ויש לו מתירין לאחר זמן - לא יאכלנו באיסור על ידי ביטול.", "under": true}, {"layer": "gemara", "src": "גמרא · ביצה לח", "srcRef": null, "txt": "איסורא - בטיל, ממונא - לא בטיל. וטעמא מאי? \nאביי אמר: גזרה שמא תעשה עיסה בשותפות, \nרבא אמר: תבלין לטעמא עבידי, וטעמא לא בטיל.\nרב אשי: משום דהוי ליה דבר שיש לו מתירין, וכל דבר שיש לו מתירין - אפילו באלף לא בטיל.", "ref": {"label": "ביצה · לח ע\"א", "ref": "Beitzah.38a"}}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "דבר שיש לו מתירים, רק במין במינו שייך שאינו בטל אפילו באלף\n \t\tאבל במין בשאינו מינו – אוסר רק בנותן טעם]", "under": true}, {"layer": "gemara", "src": "גמרא · ע\"ז עג (טבל)", "srcRef": null, "txt": "ר' יוחנן וריש לקיש: כל איסורים שבתורה – בין במינו בין שלא במינו אוסרים בנותן טעם\n     אבל טבל ויין נסך – רק שלא במינו אוסר בנ\"ט; במינו – במשהו\nוהטעם לכך: כהיתירו כך איסורו (כמו שטבל מספיק חשוב כדי להתיר בהפרשה, כך מספיק חשוב כדי לאסור)", "ref": {"label": "עבודה זרה · עג ע\"א", "ref": "Avodah_Zarah.73a"}}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.1", "txt": "מביא את עיקר דין דשיל\"מ עפ\"י הסוגיות: דשיל\"מ כגון ביצה שנולדה ביו\"ט, אינה בטלה אפילו באלף"}, {"subhead": "הטעם לדין"}, {"layer": "rishon", "src": "רש\"י (דשיל\"מ)", "srcRef": null, "txt": "מאחר שאפשר להתירו לאחר זמן, עדיף לאוכלו בהיתר ולא באיסור (והביאו הט\"ז)"}, {"layer": "note", "src": "טבל — הטעם לדינו", "srcRef": null, "txt": "בגמרא בע\"ז: 'כהיתירו כך איסורו' \nירושלמי: דבר שיש לו מתירין\nהתוס': מתרצים לגבי טבל ששני הטעמים נצרכים, משום שאם הבעלים לא בעיר, אז דשיל\"מ לא תופס"}, {"subhead": "ספק דרבנן"}, {"layer": "rishon", "src": "הב\"י והתוספות", "srcRef": null, "txt": "בסוגיה בריש ביצה סוברים שפשוט בברייתא שאפילו ספק נולדה ביו\"ט אוסרת התערובת"}, {"layer": "rishon", "src": "הרב המגיד", "srcRef": null, "txt": "יש מי שהורה שכולן מותרות בספקה נולדה ביו\"ט"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.1", "txt": "כותב שאפילו בספק דרבנן נקטינן שאסור (מאחר וגם בספק יש לו מתירים)"}, {"layer": "acharon", "src": "ט\"ז, ש\"ך", "srcRef": null, "txt": "מה שמחמירים בספק דרבנן הוא חומר בדשיל\"מ על פני שאר דברים חשובים, אשר\n \t\t   בהם מקילים בספק דרבנן", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מכיוון שיש מי שהורה להתיר, אפשר לסמוך אדעתו במקום צורך גדול", "under": true}, {"subhead": "מין במינו — מין בשאינו מינו"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "נראה שלרוב הדעות הדין הוא דווקא במין במינו, אבל במין בשאינו מינו – בטיל בנ\"ט (בשישים).\nאך הראבי\"ה (הטור מביאו 'אבי העזרי') סובר שגם בשאינו מינו שייך דשיל\"מ\nבסוגיות עצמן, למיטב ידיעתי, אין חילוק בדין בין מין במינו לשאינו במינו בדשיל\"מ, ורק בסוגיה על טבל יש חילוק כזה. זה מביא לשתי שיטות בזה (שלא נ\"ל שיש בהן נפק\"מ):"}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "בסוגיה בביצה (רב אשי) מחלקים בין מין במינו לשאינו במינו. לפיכך, הם מתקשים בסוגיה של טבל, שהרי שם נאמר טעם אחר 'כהיתרו כך איסורו'. לכן נדחקים לומר שטבל ספציפית שייך בו שני הטעמים."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "באמת מעיקר הדין, דבר שיש לו מתירין – בין במינו בין שאינו במינו אוסר במשהו. אבל בגלל שטבל הוא בעצם גם דבר שיש לו מתירין, שהרי אפשר לתקנו, וטבל רק במינו אוסר במשהו בגלל 'כהיתירו כך איסורו', לכן סובר שגם בדבר שיש לו מתירין בשאינו מינו יאסור רק בנ\"ט, כדי שלא יהיה דבר שיש לו מתירין חמור מטבל."}, {"layer": "rishon", "src": "רי\"ו", "srcRef": null, "txt": "זה מפורש בירושלמי נדרים (פ\"ו,ה\"ד)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.1", "txt": "סובר כדעת רוב הראשונים שדין דשיל\"מ הוא דווקא במין במינו"}, {"subsubhead": "למה בדשיל\"מ מקלים במין בשאינו מינו?"}, {"layer": "acharon", "src": "ש\"ך (טעם האו\"ה)", "srcRef": null, "txt": "  \t\tכי בשונה משאר דברים חשובים (בריה,חה\"ל וכו'), ההחמרה בדשיל\"מ אינה בגלל\n \t\tחשיבותו, אלא בגלל שניתן להתירו בלא ביטול בתערובת. אבל אם הוא מתערב בשלא\n \t\tבמינו – אין זה ממש נקרא שמבטלים אותו בתערובת, כי הרי השם של התערובת יהיה\n \t\tלפי מה שנתערב בו שהרי הווי מין בשאינו מינו, וזה כאילו הוא ממש אינו בכל מקרה."}, {"layer": "acharon", "src": "ט\"ז (וטעם הר\"ן)", "srcRef": null, "txt": "טעם זה לא מספק. וטעם הר\"ן:\n\t\tזה נעוץ במחלוקת ר' יהודה וחכמים לגבי מין במינו בכללי. \n \t\tלר' יהודה, יש להחמיר במין במינו בגלל שמין מחזק את טעם מינו, כאשר במין בשאינו\n \t\tמינו הוא מחלישו. \n \t\tאבל חכמים סוברים שיש להתיר אף מין במינו, משום שאינם דומים זה לזה.\n \t\tובדשיל\"מ מודים חכמים לר' יהודה."}, {"layer": "note", "src": "לפי הרמב\"ם", "srcRef": null, "txt": "\t[נזכור שלפי הרמב\"ם שפרטנו לעיל, מקלים בדשיל\"מ רק בגלל טבל, וכדי שלא יהיה חמור ממנו"}, {"subsubhead": "בהגדרת מין במינו (רמ\"א)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "משמע בסוגיה בביצה לח שכל דבר שצריך זה לזה, כמו מים ומלח בעיסה – חשוב מין במינו"}, {"layer": "rishon", "src": "ש\"ד, הגהות ש\"ד בשם מהרא\"י (בדרכ\"מ א')", "srcRef": null, "txt": "אם הכניסו ביצה אסורה לתבשיל כדי ללבּנו, או לתרנגולת  – חשוב מין במינו"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "דברי ההגהות ש\"ד הם עפ\"י סברת הב\"י, דהיינו, 'דבר שצריך זה לזה'", "under": true}, {"layer": "rama", "src": "רמ\"א · (סע׳ א')", "srcRef": null, "txt": "מביא דברי הגש\"ד ומהרא\"י.\nונראה כן בשו\"ע או\"ח תקי\"ג. שם גם מפרט דזהו משום שהוסיפו הביצה לשם המראה והטעם"}, {"layer": "acharon", "src": "מג\"א (או\"ח תקי\"ג)", "srcRef": null, "txt": "משמע מהשו\"ע שאם ניכר רק בטעם – אינו נחשב מין במינו, ובטל", "under": true}, {"layer": "acharon", "src": "ש\"ך (ג')", "srcRef": null, "txt": "כאן כדי לקבוע אי הוי מין במינו - הולכים אחר השם, ולא אחר הטעם"}], "pesak": null}, "dashilm-tnaim": {"title": "תנאים נוספים", "seif": "סעיפים ב׳-ד׳", "sugya": null, "intro": null, "ops": [{"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "דבר שיש לו מתירין – דווקא אם בוודאי יבוא ההיתר או האדם יכול להתירו בלא הפסד"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "הטור קיצר בזה לשון הרשב\"א, ובתנאי השני כתב רק 'יכול להתירו')", "under": true}, {"layer": "rishon", "src": "ר\"ש מפליזא בשם ר\"ת", "srcRef": null, "txt": "אם כשיוּתר הדבר הוא כבר לא יהיה כשיר לאכילה ויתקלקל – לא חשיב דשיל\"מ (כ\"כ רשב\"א)\nדבר שיחזור לאיסורו מאליו (כמו חמץ) – לא חשיב דשיל\"מ (אך הרמב\"ם כפי שראינו, סובר שחמץ כן)"}, {"layer": "rishon", "src": "ריו\"ח", "srcRef": null, "txt": "דבר שלמישו מסוים אין לו דרך היתר (כגון המבשל בשבת במזיד, שהתבשיל אסור לו לעולמים) – לא חשיב דשיל\"מ"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב', ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.2", "txt": "+ יש מי שאומר שדשיל\"מ הוא רק אם היתרו יבוא בכל מקרה או אם אפשר להתירו בלא הפסד (רשב\"א)\n+ יש מי שאומר שדשיל\"מ הוא רק אם היתרו הוא בלא קלקול (רש\"מ בשם ר\"ת, רשב\"א)"}, {"layer": "rama", "src": "רמ\"א · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.4", "txt": "כל שאמרנו שדשיל\"מ אינו בטל זה רק אם האיסור בעין או שיש לו ממשות (הבנתו בטור או\"ח תקי\"ג)  ואם רק טעמו ישנו - בטל"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "סובר שגם טעם חשיב בהכי. וכל הכוונה שבמין בשאינו מינו – אפילו בטעם בטל", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tוכן, רק אם אסור מחמת עצמו (בתה\"ד)"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז", "srcRef": null, "txt": "זה רק בחה\"ל. ומוכח שכן בתה\"ד. וגם לפי הטעם שדשיל\"מ לא בטל לא שייך\n          לחלק בזה (כי סוף סוף, הווי איסור, ולא רצו חז\"ל שנאכלו אם יבוא להיתר)", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tוכן, אם היה ניכר עוד קודם שנתערב (או\"ה בשם סמ\"ג)"}, {"layer": "acharon", "src": "ש\"ך, ט\"ז", "srcRef": null, "txt": "מביאים כדוגמא יין שהענבים שבו נסחטו עוד במהלך השבת", "under": true}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tדבר שיש לו היתר, אך ישוב להיאסר (כמו חמץ) לא מקרי דשיל\"מ (רש\"מ)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "\tדבר שלא לכולם יש לו דרך היתר, כגון, דבר שבושל במזיד בשבת, לא מקרי דשיל\"מ (ריו\"ח) "}, {"subhead": "כלי טרף שהתערבב במותרים (ג')"}, {"layer": "rishon", "src": "הרשב\"א", "srcRef": null, "txt": "עפ\"י מה שכתב בהגדרת דשיל\"מ - שאם יבוא ההיתר מאליו או האדם יכול להתירו בלא הפסד – אם כלי שבלע איסור התערבב בכלי כשרים ואינו ניכר – בטל ברוב (למרות שאפשר להגעילו, משום שההיתר לא יבוא מאליו, וצריך להוציא כסף כדי להתירו)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.102.3", "txt": "פוסק כן."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא את הנימוק של הרשב\"א (שצריך להוציא עליו הוצאות להגעילו)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מביא מספר חולקים על פסק זה של הרשב\"א- \n \tמהרי\"ל סובר שדווקא כשההפסד הוא מרובה. וכאן בהגעלה, ההפסד לא מרובה\n\tוהש\"ך מוסיף גם שמדובר כאן בדבר שהיתרו יבוא, כגון, אם נמתין שלא יהיה בן יומו"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "חושש גם לאוסרים. ולכן כדי להכשיר את כל הכלים מספק", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "group", "title": "ק׳ · בריה", "spans": "סעיפים א׳-ד׳", "children": ["bria-hagdara", "bria-heter", "bria-marak", "bria-tolaim"]}, {"type": "group", "title": "ק\"א · חתיכה הראויה להתכבד", "spans": "סעיפים א׳-ט׳", "children": ["chal-yesod", "chal-hagdara", "chal-bitul", "chal-tref"]}, {"type": "group", "title": "ק\"י · דבר שבמניין", "spans": "סעיפים א׳-ב׳", "children": ["min-ikar", "min-bitul"]}, {"type": "group", "title": "ק\"ב · דבר שיש לו מתירין", "spans": "סעיפים א׳-ד׳", "children": ["dashilm-ikar", "dashilm-tnaim"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"בריה": "דבר בעל חשיבות עצמאית ללא קשר לשיעור (למשל נמלה, גיד הנשה, עוף טמא) — אינו בטל אפילו באלף.", "חה\"ל": "חתיכה הראויה להתכבד — חתיכת איסור שלמה שראוי להגישה לאורח; מחמת חשיבותה אינה בטלה.", "דבר שבמניין": "דבר שמחמת חשיבותו נמנה אחד-אחד (ולא נשקל); מחמת כך אינו בטל.", "דשיל\"מ": "דבר שיש לו מתירין — דבר שיהיה מותר לאחר זמן (כגון ביצה שנולדה ביו\"ט), ולכן אינו בטל אפילו באלף.", "נטל\"פ": "נותן טעם לפגם — טעם שפוגם את התבשיל; אינו אוסר.", "מין במינו": "תערובת של איסור והיתר מאותו המין; בדשיל\"מ דווקא בה אינו בטל.", "שדרכו להימנות": "דבר שנהוג למנותו (בגלל חשיבותו) — הקריטריון המרכזי לאי-ביטול.", "הדרא דכנתא": "מעיים המלופפים על שומן ה'כנתא'.", "קורקבן": "קיבת השרירים של העוף/בהמה; נחשב מבני המעיים שאינם ראויים להתכבד.", "טבל": "פירות שלא הופרשו מהם תרומות ומעשרות; במינו אוסר במשהו ('כהיתירו כך איסורו')."}, "subject": "איסור והיתר", "id": "batelim"}, {"topic": {"title": "מוקצה", "eyebrow": "מבחני הרבנות · הלכות שבת · סימנים ש\"ח–שי\"א", "siman": "Shulchan_Arukh,_Orach_Chayim.308", "intro": {"lead": {"t": "", "ref": ""}, "body": "**חלוקת הב\"י**\nסימנים ש\"ח-שי\"א בשו\"ע מוקדשים לעיסוק במוקצה ובטלטולו. אולם, לא לחינם הנושא מחולק לארבעה סימנים. אלא כל סימן מתרכז בשאלה אחרת.\n**סימן ש\"ח**: טלטול כלים ואוכל ומה נקרא כלי.\nמותר לטלטל כלים ואוכל. ור' יהודה ור' שמעון מסכימים על זה. לכן אין בש\"ח התעסקות במוקצה באמת. פשוט כשבמקרה מסוים דבר אינו נחשב כלי, יש בדיקה מאיזו סיבה אסור לטלטלו, ואיך כן יהיה מותר. בכל המקרים האלו, מודה ר\"ש לר\"י.\nוהם:\n**ממח\"כ (מפורש בסוגיה בדף קנז. במחלוקת רב אחא ורבינא. ופשוט ממשנת כל הכלים)\nממ\"ג (לומדים מהסוגיה של מוכני שיש עליה מעות)\nכשמל\"א (דאי לא תימא הכי, קשיא הלכתא אהלכתא)**\n\n**סימנים ש\"ט-ש\"י**: מחלוקת ר' שמעון ור' יהודה על מוקצה\nמאחר ור' שמעון 'מודה' על כל המוקצה שהוזכר לעיל, המחלוקת שעולה כאן היא על:\n**מוקצה מחמת איסור** (מחלוקת רב אחא ורבינא ב-קנז. וקיי\"ל כר' יהודה שיש מוקצה מחמת איסור. אבל 'הא דאין מוקצה לר\"ש באוכל אלא בגרוגרות וצמוקים, דוקא בתלוש; אבל במידי דמחובר אפילו לר\"ש הוי מוקצה')\n**בסיס לדבר האסור** (מהא דקיי\"ל כר' יהודה דיש מוקצה דבינה\"ש)\n**מוקצה מחמת מיאוס** (קיי\"ל כר' שמעון שמותר)\n\n**עבודת הב\"י — י\"ג מקרים שהותר לטלטל מוקצה מחמת גופו**\n\n**קבוצה א' – ראויים לשימוש ונחשבים כלים**\n**הא'** [הפיכת מוקצה לכלי על ידי חשיבה]\nיש דברים שמותר לטלטלם על ידי מחשבה כמו חריות של דקל ונסרים של אומן וחבילי קש ועצים שהתקינן למאכל בהמה ולבנים שנשארו מהבנין:\n**הב'** יש דברים שצריכים הכנסה ויחוד מקום כמו שאמרו (שבת נ.) מכניס אדם מלא קופתו עפר ועושה בה צרכיו והוא שייחד לו קרן זוית:\n**הג'** [הפיכת מוקצה לכלי ע\"י מעשה]\nיש דברים שצריכים שפשוף או למוד כמו שאמרו בגמרא (שבת קכה:) על נדבך של אבנים ואף על פי שלא הזכיר רבינו זה אני אזכירנו בע\"ה (סה. ד\"ה חריות):\n**הד'** כיסוי בור ודות ניטלים אם יש להם בית אחיזה:\n**הי\"ב** התירו לטלטל שברי כלים אף על פי דדמו לצרורות ובלבד שיהו עושין מעין מלאכה:\n\n**קבוצה ב' – מקום צורך גדול**\n[צורך בית הכסא וכבוד הבריות]\n**הה'** התירו לטלטל אבנים מקורזלות לצורך בית הכסא:\n**הו'** התירו לטלטל גרף של רעי כלומר כלי המיוחד לרעי ואין בו רעי מותר לטלטלו על ידי מים שנותן בו:\n**הי'** [גרף של רעי]\nהתירו לטלטל גרף של רעי כלומר הרעי עצמו מותר לטלטלו בין על ידי כלי בין שלא על ידי כלי:\n[מת. מפני הדליקה, וע\"י כיכר/תינוק]\n**הז'** התירו לטלטל המת מפני הדליקה:\n**הח'** התירו לטלטל המת מפני החמה על ידי ככר או תינוק:\n[היזק ברה\"ר]\n**הט'** התירו לטלטל קוץ המונח במקום שרבים דורסים בו כדי שלא יזוקו:\n\n**קבוצה ג' – באופן עקיף (בגופו, מן הצד, ניעור בסיס)**\n**הי\"א** התירו לטלטל קליפי אגוזים על ידי שמסלק הטבלא ונוערה וענין סילוק זה יתבאר לקמן (סה: ד\"ה ומ\"ש ופרורין):\n**הי\"ג** [בגופו או מן הצד]\nהתירו לטלטל האיסור בגופו שלא בנענוע ידיו כדתנן (שבת קמא.) קש שעל המטה מנענעו בגופו, אבל אם על ידי נענוע ידיו מטלטל האיסור ואפילו אם אינו נוגע בו זה נקרא טלטול מן הצד ואסור כל שהוא צריך לדבר האסור:\n\n**היתרים של בסיס לדבר האסור**\nכלי שמלאכתו להיתר שמונח עליו אחד מהדברים המוקצים מחמת גופם כגון חבית שיש עליה אבן וכר שיש עליו מעות יש בו גם כן דרכי היתר ומספרם ה':\n**דוגמא 1 - שלא הונח מדעת**\n**הא'** אם לא הונחו שם מדעת אלא ששכחם שם מותר להטות החבית כדי שתפול האבן ולנער הכר והמעות נופלות דטלטול מן הצד לצורך דבר המותר שרי\nומטעם זה צנון שטמנו בקרקע אם מקצת עליו מגולות נוטלו אף על פי שבנטילתו מזיז עפר ממקומו וכן פגה שטמנה בתבן מותר לתחוב בה מחט וליטלה:\n**הב'** אם היתה חבית זו בין החביות שאינו יכול להטותה או שהיה צריך למקום החבית והכר מגביהן כמו שהן עם האבן והמעות עליהם ומניחם במקום אחר כיון שלא הונחו שם מדעת:\n**דוגמא 2 - נעשה חלק מהכלי**\n**הד'** אבן שבקרויה שממלאין בה מים אם היא מהודקת מותר לטלטלה עם האבן מפני שהיא כדופן וכן כלכלה נקובה ונסתם הנקב באבן מותר לטלטלה עם האבן מזה הטעם:\n**דוגמא 3 - בסיס לדבר האסור ולדבר המותר שחשוב יותר**\n**הג'** אם יש ביד בנו שיש לו געגועין עליו אבן מותר ליטלו והאבן בידו ודוקא אבן אבל דינר לא:\n**הה'** כלי שמלאכתו להיתר שיש בו דבר איסור ודבר היתר ואי אפשר לנערם כגון כלכלה שיש בה אבן ופירות רטובים שאם ינערם יפסדו מותר לטלטלם וכן כנונא אגב קיטמא אף על גב דאיכא עליה שברי עצים משום דאי אפשר למינקט קיטמא לחודיה אפילו אי שדי ליה מכנונא והוא שדבר המותר חשוב מדבר האסור והוא שצריך לגוף דבר המותר או למקום הכלכלה והכנונא. ואחר שהצעתי לפניך כל זה אבוא לבאר דברי רבינו ואז תבין יראת יי' ודעת קדושים תמצא:"}}, "sections": {"yesodot_1": {"title": "מקור (דאורייתא/דרבנן)", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "רבה במסכת ביצה", "srcRef": null, "txt": "**רבה במסכת ביצה**, סבר שמוקצה הוא דאורייתא, ולמד זאת מן הפסוקים על ליקוט המן בשמות, שלפיהם עמ\"י 'הכינו את אשר הביאו'. לפיכך סבר שכל דבר שניטל בשבת צריך להיות מוכן לכך מער\"ש. ולפיכך כתב רש\"י שמה שנשאל במסכת פסחים אם מוקצה דאורייתא הוא..."}, {"layer": "rishon", "src": "רוב הראשונים", "srcRef": null, "txt": "אולם, **רוב הראשונים** לא מקבלים עמדה זו, וסוברים שהפסוקים בשמות הם רק אסמכתא בעלמא. ואת המקור למוקצה הם למדים מן הפסוקים **בנחמיה** (וכך **בברייתא** במסכתנו). וכן, **בירושלמי** הביא רבי אבהו (ברייתא המופיעה גם בבבלי דידן) שבתחילה היו כל הכלים ניטלים בשבת ומותרים לטלטול. אולם, מאחר ונחשדו להיות מחללים שבת בעקבות כך (כגון בכלי שמלאכתו לאיסור), נאסרו בטלטול כל הכלים, מלבד מספר כלים שהיו ככה\"נ נחוצים ממש;\nמקצוע של דבילה (סכין שחותכין בו דבלים)\nזוהמא לסטרן (כף שמסלקים בה הלכלוך מן הקדרה)\nסכין קטנה שע\"ג השולחן (ללחם ובשר)\nולאחמ\"כ חזרו והתירו וחזרו והתירו;  עד ש'בימי נחמיה בן חכליה נשנתה' המשנה בנ\"ל דבפרקנו: כל  הכלים ניטלין בשבת חוץ מן המסר הגדול ויתד המחרשה"}, {"layer": "gemara", "src": "ובגמרא", "srcRef": null, "txt": "**ובגמרא** מבואר שאלו כלים שאדם חס עליהם וקפיד עלייהו ומייחד להם מקום.\nועוד, מבואר בגמרא שם דהוא הדין לגבי סכינא דאשכבתא. וכן קורנס של בשמים (אולם קורנס של נפחים הוא כלי שמלאכתו לאיסור, משום שהוא ראוי לפצוע בו אגוזים ולכן ניתן לטלטלו לצורך גופו ומקומו)."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ולגבי סכינא דאשכבתא, נחלקו ראשונים מהו."}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "ולדעת **רש\"י**, הוא סכין של קצבים. (ומשום שהוא יקר וקפיד עלייהו כנ\"ל מייחד לו מקום ואין רצונו להשתמש בו לשום דבר אחר)"}, {"layer": "rishon", "src": "הרא\"ש", "srcRef": null, "txt": "ולדעת **הרא\"ש**, הוא סכין של מילה."}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "ולדעת **התוספות** סכין של שחיטה"}, {"layer": "note", "src": "סיכום", "srcRef": null, "txt": "וכל הני, הם מוקצה מחמת חסרון כיס ואסור לטלטלם כלל אפילו לצורך גופו ומקומו (אלא אם מטלטלם בגופו או מן הצד)"}], "pesak": null}, "yesodot_2": {"title": "טעמים", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "**רמב\"ם**\n1) שלא יהיו מתעסקים בכלי מלאכה ויבואו לעבור באיסור\n2) שמאחר ואנשים בטלו ממלאכה בשבת, יבואו לחפש במה להתעסק ונמצא ואין שבת\n3) שהיו אנשים שהיו בטלים בימות השבוע מעשייה ומלאכה, ולא ניכר בשביתתם ששבת. והרי בשבת הזהירו הנביאים שלא יהא הילוכך בשבת כהילוכך בחול"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "**ראב\"ד**\nשמא יטלטל מרשות לרשות (הוצאה)"}, {"layer": "acharon", "src": "מ\"מ", "srcRef": null, "txt": "**מ\"מ**\nהרמב\"ם מודה לראב\"ד, אלא שבתחילה היו אסורים מטעמו של הראב\"ד ולאחמ\"כ נצרכו הטעמים הנוספים של הרמב\"ם"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "נפק\"מ בין הטעמים"}, {"layer": "rishon", "src": "ולפי דעת הראב\"ד", "srcRef": null, "txt": "ולפי דעת הראב\"ד, וודאי שיהיה מותר לטלטל ביו\"ט מוקצה, משום שאין שייך בו איסור הוצאה מרשות לרשות"}, {"layer": "rishon", "src": "לדעת הרמב\"ם", "srcRef": null, "txt": "לדעת הרמב\"ם שייך וודאי גם ביו\"ט טפי, שהרי נמצינו שבתים ממלאכה אף בו."}], "pesak": null}, "yesodot_3": {"title": "היתרים", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "טלטול בגופו --"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "טלטול מן הצד --"}, {"layer": "acharon", "src": "מרדכי, רי\"ו, רמ\"א / מג\"א", "srcRef": null, "txt": "מותר לנגוע במוקצה (**ש\"ח מב**) ובלבד שלא ינענעו (**מרדכי, רי\"ו**, **רמ\"א**).\nו**המג\"א** כתב שנגיעה שלצורך המוקצה אסורה (עפ\"י גמרא שדנה על נר)"}, {"layer": "rishon", "src": "י\"א / הרא\"ש", "srcRef": null, "txt": "י\"א שכשמל\"א מותר לטלטל ע\"י דבר היתר שעליו, אפילו מחמה לצל. (ש\"ח ה; **הרא\"ש**).\nולשאר סוברים שרק מת ניתן לטלטל כך; וע\"י הנחת כיכר/תינוק.\nאולם, לכו\"ע אם יש שם דבר המיועד לו (כדין מדוכה שיש בה שום שבגמרא) מותר, משום שהווי כבסיס לדבר המותר (כמו שקדרה מתבטלת ביחס לתבשיל)"}], "pesak": null}, "yesodot_4": {"title": "סוגיות מרכזיות", "seif": null, "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "ר' יהודה סובר שיש מוקצה ור' שמעון סובר שאין מוקצה 'אלא גרוגרות וצימוקים (שדחאם בידיים)\nאבל מתבאר כי ר' שמעון 'מודה' לר' יהודה בכל מיני מקרים וסוגים של מוקצה.\nבמחח\"כ, מחמת מיאוס, ומחמת איסור:"}, {"layer": "gemara", "src": "רב אחא ורבינא", "srcRef": null, "txt": "פליגי בה **רב אחא ורבינא**.\nחד אמר: כל השבת כולה כר' שמעון שאין מוקצה (אלא גרוגרות וצימוקים)\nחוץ ממוקצה מחמת איסור, שאז כר' יהודה\nחד אמר: כל השבת כולה כר' שמעון שאין מוקצה (אלא גרוגרות וצימוקים)\nחוץ ממוקצה מחמת מיאוס, שאז כר' יהודה\n\nאבל מוקצה מחח\"כ אפילו ר' שמעון מודה (דתנן, כל הכלים ניטלים בשבת חוץ מן המסר הגדול..)", "ref": {"label": "שבת · פרק מי שהחשיך · קנז", "ref": "Shabbat.157a"}}, {"layer": "shulchan", "src": "בטושו\"ע (ש\"י: א', ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.310.1", "txt": "מכאן גם נפסק כדעת המקל ברי\"ף וברא\"ש (בכל מקום שנחלקו רב אחא ורבינא הלכה כמקל)\nוכן **בטושו\"ע** (**ש\"י: א,ג'**), פסקו שקיי\"ל כר' שמעון במוקצה מחמת מיאוס שמותר\nושקיי\"ל כר' יהודה שמוקצה מחמת איסור כר' יהודה שאסור\nומוקצה מחח\"כ נאמר לנו שר' שמעון מודה (הוסק כן עפ\"י המשנה בכל הכלים)"}], "pesak": null}, "memhak_1": {"title": "עיקר הדין ודוגמאות", "seif": null, "sugya": null, "ops": [{"subsubhead": "דוגמאות"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "מסר הגדול (במשנה כל הכלים)\nיתד המחרשה (במשנה כל הכלים)\nסכינא דאשכבתא (אביי, בסוגייה. 3 דעות ראשונים. מילה, שחיטה, קצבים)\nחרבא דאושכפי (סכין הרצענים; אביי, בסוגיה)\nקורנס של בשמים (בסוגיה)\nעורות יבשים של אומן (מותר) (ש\"ח, כה')\nנסרים של אומן (ש\"ח, כו')"}, {"layer": "rishon", "src": "המשנה בקכג · ר' יוסי / רש\"י", "srcRef": null, "txt": "עפ\"י **המשנה בקכג (כל הכלים),** בדברי **ר' יוסי**. שאלו הדברים שלאחר שחזרו והתירו (עפ\"י הברייתא), ונאמר דכל הכלים ניטלים - נאסרו לטלטול בכל זאת. כגון מסר הגדול ויתד המחרשה. וביאר **רש\"י** עפ\"י הגמרא דכל הנך קפיד עלייהו ומשום יוקרתם חס עליהם ומקצה אותם משימוש בשבת.", "ref": {"label": "שבת · פרק כל הכלים · קכג", "ref": "Shabbat.123a"}}, {"layer": "gemara", "src": "אביי", "srcRef": null, "txt": "ועוד **בגמרא**, מביא **אביי** דוגמאות נוספות למוקצה ממח\"כ שדינם כדין מסר הגדול ויתד המחרשה שהובאו במשנה: **סכינא דאשכבתא** ו**חרבא דאושכפי**."}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "וחרבא דאושכפי כתב **רש\"י** שהיא סכין של רצענים."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ולגבי סכינא דאשכבתא נחלקו ראשונים מה הוא."}, {"layer": "rishon", "src": "רש\"י · תוס' · הרא\"ש", "srcRef": null, "txt": "ולדעת **רש\"י** הוא סכין של קצבים.\n**התוס'** פירשו שהוא סכין של שחיטה.\nולדעת **הרא\"ש** מדובר בסכין של מילה."}, {"layer": "shulchan", "src": "שו\"ע · (ס' א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.308.1", "txt": "ו**בשו\"ע** (**ס' א'**) כתב את דינו של מוקצה מחמת חסרון כיס עפ\"י לשון המשנה והגמרא. וכתב כי 'כל הכלים ניטלים בשבת חוץ ממוקצה מחמת חסרון'. ולאחמ\"כ פירט ונקט כדעת כל הראשונים שציינו לעיל לגבי סכינא דאשכבתא וכתב 'כגון סכין של שחיטה, סכין של קצבים, וסכין של מילה'. ולפיכך כל אלו אסורים בטלטול בשבת ואף לצורך גו\"מ. וכן קורנס של בשמים."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "וכן הדין לגבי כל דבר שאדם מקפיד עליו שלא לעשות בו שימוש שאינו השימוש שלו אסור בשבת  - אסור לטלטלו כלל (אולם כלי שמלאכתו לאיסור, שעל אף ששימושו העיקרי אסור בשבת, מותר לטלטל בשבת לצורך גופו ומקומו משום שאין האדם מקפיד על שימושו רק לשימוש איסור, אלא גם לשימוש המותר בשבת כגון קורנס של נפחים לפצוע בו אגוזים.\nוכן בגמרא. וכן פירש **המשנ\"ב**."}, {"layer": "rama", "src": "והרמ\"א · עפ\"י המהרי\"ל", "srcRef": null, "txt": "**והרמ\"א** כתב עפ\"י **המהרי\"ל**, שנדן של סכיני מוקצה מח\"כ, אסור לטלטלו אפילו אם יש שם סכינים שאינם ממח\"כ."}], "pesak": null, "intro": "רוב הדוגמאות נחשבות כממח\"כ, חוץ מאלו שצויין שאינן, אך הייתה הווה אמינא שכן '(מותר)'."}, "memhak_2": {"title": "דברים העומדים לסחורה", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "**הרמב\"ם** ציין יחד עם הדוגמאות של מסר הגדול ויתד המחרשה גם דברים שאינם בהכרח יקרים. אלא שמקפיד עליהם בגלל חשיבותם. כגון דברים העומדים לסחורה."}, {"layer": "acharon", "src": "הב\"י בשם המ\"מ", "srcRef": null, "txt": "ו**הב\"י** הביא בשם המ\"מ שדברים העומדים לסחורה
