srcRef": null, "txt": "אסור להניח כד מלח ליד כד כותח\nאבל כד של חומץ מותר ליד כד כותח\nמאי שנא? האי איתיה לאיסור בעיניה, ואי ליתיה איסורא בעיניה."}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "חיישינן שמא יפול מן הכותח במלח ולא ידעו מכך, ואז ישתמשו בו למלוח בשר\nוכשכותח נופל במלח הוא לא בטל מפני שעבה. אבל בחומץ – לא נראה, ובטל בשישים"}, {"layer": "rishon", "src": "תוס', רא\"ש", "srcRef": null, "txt": "על אף טעם זה (דרש\"י), אפשר לשים כד של בשר וכד של חלב יחד באותה תיבה"}, {"layer": "rishon", "src": "רמב\"ם, ר\"ח", "srcRef": null, "txt": "נראה מדבריו שסובר שההנחה סמוכה ממש. ושואב המלח מן כותח (אף בלי שיפול הכותח למלח, כמו שמפרש רש\"י)"}, {"layer": "rishon", "src": "הר\"ן", "srcRef": null, "txt": "טעמם של הרמב\"ם והר\"ח (שאיבת המלח) לא מסתדר עם נימוק הגמרא 'איתיה/ליתיה בעיניה)", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.5", "txt": "מביא את הדין על פי רב נחמן (מלח אסור, חומץ מותר)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.6", "txt": "מביא עפ\"י התוס' והרא\"ש שמותר לשים בתוך תיבה אחת כד של בשר וכד של חלב"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ז')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.7", "txt": "(ב\"י של זה בק\"ה). ובתמצות: מלח הנמצא בקערה בשרית, מותר להשתמש בו לחלב\nאך יש לזה עניין גם פה, כי מלח הוא חריף, ובחריף אין נ\"ט בר נ\"ט (ובכל זאת מתיר השו\"ע)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "המחמיר בזה – תבוא עליו ברכה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מנהג ישראל להחזיק כלי למלח לארוחות בשריות וכלי מלח לחלביות", "under": true}], "pesak": null}, "dvash": {"title": "נ\"ט בר נ\"ט דהיתרא בדבש (צ\"ד – ס' ט')", "seif": null, "sugya": null, "intro": "(בין נ\"ט לפגם לנ\"ט בר נ\"ט דהיתרא)", "ops": [{"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "(הובא גם בדיון על נטל\"פ): ר\"י שהתיר דבש שבשלו במחבת בשרית בת יומא והוריקוהו לקערה חלבית משום שהשמנונית בדבש הווי נטל\"פ."}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "סובר שניתן להתיר בזה אפילו אי הווי טעם לשבח, משום שהווי נ\"ט בר נ\"ט דהיתרא"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "הביא עפ\"י המרדכי, ונימק כטעמו בב\"י – נ\"ט בר נ\"ט דהיתרא"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "הנו\"כים מתקשים בסברתו זו של השו\"ע. שהרי, המקרה הזה דומה לדגים שבושלו בקערה\nבפשטות: השו\"ע חושב שטעמו טוב יותר, משום שלעניין נ\"ט בר נ\"ט יש היתר גם בנותן טעם לשבח\nאבל בכך הוא מוותר על הנימוק של נטל\"פ של המרדכי. ובנטל\"פ היתרון הוא שמותר אפילו רק בנ\"ט אחד, ולא רק בנ\"ט בר נ\"ט.\nלפיכך, הט\"ז כתב שהפסיד השו\"ע שהשמיט טעם המרדכי"}], "pesak": null}, "kitzur": {"title": "קיצור הלכה", "seif": null, "sugya": null, "navAccent": true, "flow": [{"body": "חולין (פ' כל הבשר): רב ושמואל – דגים שעלו בקערה\n**רב**: אסור (נ\"ט)\n**שמואל**: מותר (נ\"ט בר נ\"ט)\n**תוס' ורא\"ש** (וריב\"ן ועוד): אם רק הכלי/המאכל חם – מותר בחלב; שניהם חמים/בישול – אסור בחלב\n**רש\"י, תרומה** (רשב\"א רמב\"ם וכו'): אפילו אם שניהם חמים (כגון שמתבשל הדגים בכלי הבשרי)\n**רשב\"א, ר\"ן, רמב\"ם**: אפילו הדגים נצלים בקערה (למרות שאין מים)\n**ריו\"ח**: אם שניהם חמים - רק אם הכלי אינו ב\"י\n   אם הכלי ב\"י – מותר עם חלב רק בדיעבד (ב\"י חולק אשני הדברים)\n**שו\"ע**: רמב\"ם רשב\"א (מאכל פרווה שבושל בכלי בשרי – מותר לאוכלו עם חלב. אפילו בן יומו)\n**רמ\"א**: רק בדיעבד (מאכל פרווה שבושל בכלי בשרי - מותר לאוכלו עם חלב בדיעבד, אבל אסור לבשל לכתחילה במטרה זאת)\n**ש\"ך**: שו\"ע גם בדיעבד\n**הרב עובדיה**: שו\"ע אף לכתחילה"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "kitzur"}, {"type": "sec", "id": "isura"}, {"type": "sec", "id": "charif"}, {"type": "sec", "id": "mikli"}, {"type": "sec", "id": "melach"}, {"type": "sec", "id": "dvash"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"נ\"ט בר נ\"ט": "נותן טעם בר נותן טעם — טעם שעבר דרך כלי (ולא ישירות), ולכן נקלש; בהיתר (בשר/חלב) מקילים בו.", "נטל\"פ": "נותן טעם לפגם — טעם שפוגם את המאכל; אינו אוסר. יתרונו: מתיר אף בנתינת טעם אחת.", "כותח": "מאכל חלבי (ממרח שהכיל חלב) — הדוגמה הקלאסית לאכילת מאכל 'בשרי' עם חלב.", "אגב חורפיה בלע": "מחמת החריפות המאכל בולע טעם ממשי (לא רק קלוש) — ולכן החריף אוסר.", "הידס\"ב": "יד סולדת בו — החום שבו היד נרתעת; השיעור המפליט/מבליע טעם.", "כלי ראשון": "הכלי שבושל בו על האש; מפליט ומבליע טעם כל עוד יד סולדת בו.", "כלי שני": "הכלי שאליו הועבר החם; כוחו להפליט/להבליע חלש יותר, ונחלקו בו.", "בת יומא": "כלי שבישלו בו בתוך מעת־לעת האחרון; טעמו הבלוע עדיין 'לשבח'.", "כותח בעיניה": "האיסור נמצא בעינו (ממשי), להבדיל מ'ליתיה בעיניה' — שאינו ניכר ובטל."}, "subject": "איסור והיתר", "id": "netbarnet"}, {"topic": {"title": "הרחקות בשר בחלב", "eyebrow": "מבחני הרבנות · איסור והיתר · סימנים פ\"ח-פ\"ט", "siman": "Shulchan_Arukh,_Yoreh_De'ah.88", "intro": {"lead": {"t": "", "ref": ""}, "body": "סימן פ\"ח וסימן פ\"ט שאחריו הם בעצם המשך לסימן פ\"ז ולענייני בישול בשר בחלב.\n\nעיקרם של סימנים אלו הוא בגדרי הרחקה מאכילת בשר וחלב (שהרי כמו שראינו בסימן פ\"ז, עיקר האיסור הוא באכילה ולא בבישול (נפקא אכילה בלשון בישול)).\n\nפ\"ח עוסק בבשר וגבינה על שולחן אחד. פ\"ט עוסק בשהייה באכילה ובהרחקות נוספות (קינוח, הדחה, המתנה, מפה וסכו\"ם)."}}, "sections": {"din": {"title": "דין ההרחקה וטעם", "seif": "סעיף א׳", "sugya": null, "intro": "בסימן פ\"ח, פוסק השו\"ע עפ\"י המשנה כדעת בית הלל, כי אין להעלות בשר וגבינה על שולחן אחד. ואפילו בשר עוף האסור באכילה רק מדרבנן (סימן פ\"ז). ועפ\"י המשנה גם מסייג ומתיר להעלותם על שולחן שאינו שולחן אכילה.\nבעניין טעם האיסור, התקשו בגמרא, דהרי אכילת עוף בחלב אסורה מדרבנן, ואם גוזרים כאן להעלות עוף וגבינה על אותו שולחן שמא יאכלם יחד – מדובר בגזרה על גזרה!\nלדעת רש\"י, מדובר בעצם בגזרה אחת (עפ\"י אביי: שמא יעלם יחד באלפס רותח). ולדעת התוספות והרמב\"ם, מדובר בשתי גזרות, ובכוחם של חכמים לעשות כן בעת הצורך.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "+אסור להעלות בשר וגבינה על אותו השולחן\n+מחלוקת ב\"ה וב\"ש לגבי עוף:\n   **ב\"ש** מתירים להעלות עוף\n   **ב\"ה** אוסרים להעלות אף עוף על אותו שולחן עם הגבינה\nבבא מסייגת\\note{על מה הבבא המסייגת מוסבת? על האיסור הכללי? או על ב\"ה?}: באיזה שולחן אסור - בשולחן שאוכל עליו. אבל שולחן שסודר עליו התבשיל - מותר.", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**קושי 1** - על גזרת ב\"ה: עוף הוא דרבנן, אז אמאי לגזור שלא להעלותו? תשובה: אי שרי להעלות עוף וגבינה - יעלה בשר ויאכל בגבינה (באיסור תורה). יענו: צריך את הגזרה אגזרה\n**קושי 2**, על התשובה, **רב ששת**: סוף סוף, צונן בצונן הוא (היינו: בצונן - אפילו אכילת בשר בהמה בגבינה – הוא מדרבנן, כי אינה דרך בישול)\nתשובה, **אביי**: גזירה שמא יבשל (יעלה באילפס רותח)", "ref": {"label": "שם", "ref": "Chullin.104b"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "הטעם הוא שמא יבוא לאכול העוף והחלב יחד (וכן לשון הטור והשו\"ע)."}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "~~הקשה על הרמב\"ם וטוש\"ע - הרי לפי הסוגיה אנו חוששים שמא יעלה בשר בהמה ויאכלו, ולפי אביי, אנו חוששים אף שיבוא לבשל את הבשר הבהמה והחלב באלפס רותח!~~\n~~והציע שאולי דרכם הייתה לקצר ולהתייחס רק לגזרה הראשונה משום שאין נפקא מינא, ובוודאי שמתכוונים לכך שחיישינן שמתוך אכילת עוף בחלב יבוא לאכול בשר בהמה וחלב ואף יבשלם~~", "under": true, "collapsed": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.88.1", "txt": "אסור להעלות בשר וחלב כולל עוף על אותו שולחן (המשנה, וכדעת ב\"ה)\n   זה כאשר מדובר בשולחן אכילה. אבל בשולחן שרק 'סודר' עליו התבשיל - מותר. (המשנה)\n   ~~(משמיט ריש לשונו של הטור)~~ אולי הוא פוסק במשנה שהבבא מוסבת על דעת ב\"ה. ואז האוקימתא היא רק על עוף. ולכן קיצץ מתחילת לשון הטור 'כל הבשר שאסור לאוכלו בחלב'.\n   כלומר: אסור להעלות בשר וחלב על אותו שולחן. כל שולחן. עוף אסור רק בשולחן אכילה. שאר שולחנות מותר עוף."}, {"subhead": "גזרה לגזרה (ס׳ א׳)"}, {"layer": "lead", "srcRef": null, "txt": "על אף שהסוגיה ניסתה לתת מענה על שאלת הגזירה אגזירה, גם הראשונים נידרשו לה:"}, {"layer": "rishon", "src": "תוספות ורמב\"ם", "srcRef": null, "txt": "בכה\"ג גזרינן גזירה לגזירה. וכן הט\"ז"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "נראה שסובר שמדובר בגזירה אחת"}, {"layer": "lead", "srcRef": null, "txt": "למה מחמירים כ\"כ בבשר בחלב? (בעוד שנבלות ויין נסך אם גוי מעלם על השולחן, אין בעיה לאכול על אותו שולחן)"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "בגלל שיש היתר לאכול כל אחד מהם בנפרד, קיים חשש סביר יותר שיאכלו אותם יחדיו (וכן הביא הש\"ך)"}], "pesak": null}, "motar": {"title": "מתי מותר", "seif": "סעיף ב׳", "sugya": null, "intro": "מן המשנה, בדברי רשב\"ג, מסתבר ששני אכסנאים מותר לאחד להעלות בשר ולשני חלב על שולחן אחד. ובגמרא, שמואל מתנה זאת בכך שהם אינם מכירים זה את זה.\nומן הברייתא השונה לשון אחרת בדברי רשב\"ג, עולה גם האפשרות שסימן היכר מועיל. וזה תלוי בפרשנות הראשונים.", "ops": [{"layer": "mishna", "src": "משנה · רשב\"ג", "srcRef": null, "txt": "**רשב\"ג**: שני אכסנאים מותר שיאכלו על שולחן אחד זה בשר וזה גבינה (משום שהם זרים ואין סיכוי שיערבבו)", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "גמרא · שמואל", "srcRef": null, "txt": "**שמואל**: אם הם מכירים זה את זה אסור (ההיתר הוא משום שהם זרים ולא יאכלו אחד משל השני)\nשני אחים השונאים זה את זה? מחמירים ואסור. זה נחשב אכילה יחד.\nבהמשך הגמרא, מובאת תניא נמי הכי על דברי רשב\"ג: שני אכסנאים מותר שיאכלו על שולחן אחד. 'ולא אסרו אלא בתפיסה אחת'.", "ref": {"label": "שם", "ref": "Chullin.104b"}}, {"layer": "lead", "srcRef": null, "txt": "ובידינו שני פירושים להבנת מהלך הסוגיה וההיתר:\nלפי הפירוש הראשון: אם יש סימן היכר מותר אפילו למכרים\nלפי הפירוש השני: אסור למכרים אף פעם"}, {"layer": "rishon", "src": "רש\"י ותוספות א'", "srcRef": null, "txt": "-ולא אסרו אלא בתפיסה אחת. חלב ובשר כרוכים זה בזה\n-תפיסה אחת סלקא דעתך? פשיטא! זה אסור אפילו בלי קשר לאותו שולחן\n-אלא כעין תפיסה אחת על שולחן אחד. אבל אם יש דבר היכר (שתי תפיסות) - מותר\nכלומר, הברייתא מלמדת אותנו ששני אכסנאים אסורים באכילה של בשר וחלב על אותו השולחן כל עוד הם קרובים ואין הפסק. אבל אם יש הפסק כלשהו, כגון לחם או קנקנן – מותר."}, {"layer": "rishon", "src": "יש מפרשים (תוס' ב')", "srcRef": null, "txt": "תפיסה אחת = שניים שיש להם שותפות כלכלית. ו'כעין תפיסה אחת' = מכירים זה את זה. כלומר, שיש ביניהם קרבה בכל זאת, ועל אף שהם שני אכסנאים, אינם זרים זה לזה. ולזה אין פתרון היתר.", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "שני מכרים לא יכולים לאכול על שולחן אחד בשר וחלב. רק זרים (ולא מדבר על אוקימתות)\\note{ובב\"י כתב שנראה שגם הרי\"ף סבר ככה. אך באמת, לא מצאתי ראיה לכך שכן סבר. ואולי זו הסיבה לכך שלא פסק עפ\"י רוב עמודי הוראה}"}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "הביא את שני הפירושים, אבל סבר להקל שהיכר מועיל. וכן נראה באו\"ח קעג, וכן דעת הרשב\"א."}, {"layer": "shulchan", "src": "ובשו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.88.2", "txt": "מותר ע\"י סימן היכר (וק\"ו אם לא מכירים זא\"ז) (תוס' א, רש\"י, רשב\"א).\nופסק ששניים המכירים אסור בשום צורה. אפילו שונאים/מקפידים."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "+לחם ההיכר צריך להיות לחם שלא אוכלים. ואם אוכלים ממנו וודאי לא חשיב היכר (דהרי נחשב חלק מן הארוחה) (עפ\"י הגהות אשיר\"י)\n+והביא גם עפ\"י הב\"י (באו\"ח קע\"ג) שקנקנן שאין דרכו להיות על השולחן בזמן סעודה, על אף שמשמש לשתייה - חשיב היכר\n+צריך שההיכר יהיה בין הסועדים."}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "חולק על הב\"י וסובר שאם שותים מן הקנקן עכשיו – לא נחשב היכר.", "under": true}, {"layer": "acharon", "src": "והש\"ך", "srcRef": null, "txt": "צידד בדעת הרמ\"א והב\"י", "under": true}, {"layer": "zman", "src": "ילקו\"י", "srcRef": null, "txt": "בקבוקים שלנו שדרכם להיות על השולחן לא נחשבים לסימן היכר.", "under": true}, {"layer": "acharon", "src": "לדעת המהרש\"ל", "srcRef": null, "txt": "אם אינם אחים ושונאים זא\"ז – מותר", "under": true}, {"layer": "acharon", "src": "ש\"ך וט\"ז", "srcRef": null, "txt": "חולקים וסוברים כדעת השו\"ע שכל שני מכרים אסור, אפילו שונאים", "under": true}], "pesak": null}, "hafrada": {"title": "כמה הלכות בעניין הפרדה", "seif": null, "sugya": null, "intro": "(דרכ\"מ. לא לגמרי קשורות לכאן. אולי יובאו בסימנים אחרים.)", "ops": [{"layer": "rishon", "src": "רשב\"א (דרכ\"מ)", "srcRef": null, "txt": "אסור לאכול גבינה על מפה שאכלו עליה בשר משום שהבשר נדבק במפה ואז יידבק בגבינה\n-   אסור לחתוך גבינה -אפילו צוננת- בסכין שחתכו בה בשר\n-   אפילו את הלחם שאוכלים עם הגבינה אסור לחתוך בסכין הזה (כי רוב הסכינים השומן קרוש בהם ונדבק עליהן)"}, {"layer": "rishon", "src": "ב\"י בשם א\"ח", "srcRef": null, "txt": "סבר שאין להחמיר ומותר לחתוך את הפת שיאכל בה גבינה עם סכין בשרית. והוי נ\"ט בר נ\"ט.", "under": true}, {"layer": "acharon", "src": "והדרכ\"מ", "srcRef": null, "txt": "סובר כדעת הרשב\"א, וחושב שאם רואים את השומן והוא ניכר, לא שייך נ\"ט בר נ\"ט."}], "pesak": null}, "chalav_basar": {"title": "חלב אחר בשר", "seif": "סעיף א׳", "sugya": null, "intro": "סימן פ\"ט – שהייה באכילה והרחקות נוספות. הדיון בגבינה אחר בשר הוא בשאלה אחת: ההמתנה. שאלה זו מתפרטת לתת שאלות: טעם ההמתנה (רש\"י-רמב\"ם), זמן ההמתנה (שפע דעות ומנהגים), ועוף (תוס' ור\"ן שמתירים בלא המתנה).", "ops": [{"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**רבי יוחנן**: לא צריך לחכות בין בשר לגבינה\n**רב חסדא**: אסור לאכול גבינה אחר בשר; מותר לאכול בשר אחר גבינה ~~(רש\"י: משום שבשר מוציא שומן, ו טעמו נשאר לאורך זמן)~~\n**רב אחא**: דין בשר שבין השיניים כבשר ממש (\"הבשר עודנו בין שיניהם\")\n**אבא של מר עוקבא**: היה מחכה אחר בשר למחר ~~(רש\"י: מעת לעת – 24 שעות)~~\n**מר עוקבא**: אחרי בשר, היה אוכל בסעודה שלאחמ\"כ חלב", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"subhead": "טעם ההמתנה"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "צריך לחכות בגלל הבשר בשיניים שאינו יורד בקינוח הפה (ט\"ז: מקרי בשר עד 6 שעות, ואח\"כ הוי כמעוכל).\nלאחר אכילת בשר, בהמה או עוף, יש לחכות שיעור סעודה שהוא 'כמו' 6 שעות מפני בשר השיניים שאינו יורד בקינוח."}, {"layer": "rishon", "src": "טור, רש\"י", "srcRef": null, "txt": "צריך לחכות בגלל שהבשר מוציא שומן והטעם נשאר לאורך זמן (באכילה).\nהטור: צריך לחכות 6 שעות אחרי בשר בהמה/עוף (זמן בין סעודת בוקר לסעודת ערב). בנוסף, צריך להסיר הבשר מבין שיניו. וכ\"כ הרשב\"א והעיטור. סובר שטוב לאחוז גם בטעם הרמב\"ם."}, {"layer": "rishon", "src": "הטור (נפק\"מ)", "srcRef": null, "txt": "הנפק\"מ ביניהם היא שלרמב\"ם אם עברו 6 שעות, אם נשאר בשר בשיניו מותר. וכן, אם לעס לתינוק ולא אכל, לפי רש\"י לא צריך לחכות (ולא נשאר טעם) רק להוציא הבשר משיניו; ולרמב\"ם צריך לחכות.", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.89.1", "txt": "פוסק כסיעת הטור שצריך גם להמתין 6 שעות, וגם להוציא הבשר מבין השיניים. אבל לעניין מי שלעס לתינוק, סבר שצריך לחכות"}, {"layer": "acharon", "src": "עטרת זהב", "srcRef": null, "txt": "למה? לא פסק בזה כהרמב\"ם, אלא סבר שכל עוד לעס – וודאי שהטעם מהשמן נמשך ונשאר", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "תמהה על כך. אולי אימץ את עצתו של הטור לאחוז בשני הטעמים בזה לחומרא", "under": true}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "לעיסה לא תמיד מושכת טעם. אבל צריך להמתין ו' שעות כדי לא לפרוץ גדר ולנקוט כשני הטעמים לחומרא", "under": true}, {"subhead": "זמן ההמתנה"}, {"layer": "rishon", "src": "ר\"ת, בה\"ג", "srcRef": null, "txt": "לא צריך להמתין אפילו אחרי בשר בהמה, רק לקנח ולהדיח (כאגרא + רב חסדא)"}, {"layer": "rishon", "src": "תוספות, ראבי\"ה", "srcRef": null, "txt": "העולם נוהגים שלא לאכול גבינה אחר בשר בהמה/עוף (באותה סעודה)\\note{ב\"י: ונראה לי שזה שנהגו העולם שלא לאכול גבינה אחר בשר כלל, לא מטעם גדר וסייג הוא שנהגו כן, אלא משום דסבירא להו כדעת הרמב\"ם שמפרש דהא דאמר רב חסדא אכל בשר אסור לאכול גבינה אפילו בקינוח הפה ובנטילת ידים קאמר}. אבל מותר לאכול בסעודה הבאה; אפילו אם רק בירך יכול מיד חלב לאלתר"}, {"layer": "rishon", "src": "רא\"ש, ר\"ח, רי\"ף, רמב\"ם", "srcRef": null, "txt": "צריך לחכות מסעודה לסעודה. לא מועיל קינוח ונטילה.", "under": true}, {"layer": "rishon", "src": "רמב\"ם וטור", "srcRef": null, "txt": "6 שעות (כאשר לרמב\"ם סגי המתנה ולטור לא)"}, {"layer": "rishon", "src": "מנהג רש\"י (עפ\"י או\"ה לר' ירוחם)", "srcRef": null, "txt": "3 שעות", "under": true}, {"layer": "rishon", "src": "הגש\"ד, או\"ה", "srcRef": null, "txt": "נוהגים העולם להמתין שעה אחת אחר ברהמ\"ז אפילו בלא קינוח והדחה אפילו אחר בשר בהמה (מעין פשרה בין שיטת תוס' לרמב\"ם)", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "6 שעות (+להסיר בשר משיניו אם יש)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "-בי\"א – צירוף של התוס' ור\"ת: ע\"י שסילק הסעודה + קינח והדיח\n-ופשט המנהג כדעת הש\"ד ואו\"ה - לחכות שעה אחת\n-ומסיים שנכון לחכות שש שעות"}, {"layer": "acharon", "src": "מהרש\"ל, ש\"ך, ט\"ז", "srcRef": null, "txt": "מי שיש בו ריח תורה - 6 שעות", "under": true}, {"layer": "acharon", "src": "פר\"ח", "srcRef": null, "txt": "בימי חורף ימים קצרים סגי בארבע שעות מחצות היום עד ערב", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "בשעת הדחק אפשר להקל כחצי שעה מתחת לשש שעות (פעם לא היה שעון ולא יכלו לאמוד)", "under": true}, {"subhead": "חלב אחר עוף או חיה"}, {"layer": "shulchan", "src": "להלכה, שו\"ע", "srcRef": null, "txt": "פסק עפ\"י הטור והרמב\"ם, שלעניין אכילת חלב אחר בשר, יש להמתין 6 שעות ולהוציא חתיכות מבין השיניים גם אחר עוף או חיה."}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "מבינים שעוף שונה מבשר, ולאחר אכילתו לא צריך לחכות. (מהא דנקט אגרא עוף וגבינה נאכלין באפיקורין, ונקט דווקא את העוף תחילה). אבל העולם נוהגים שלא לאכול ללא המתנה."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "עוף כבהמה (לא מזכיר חיה)"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "חיה ועוף נאכלין באפיקורין לפני גבינה (אינם מן התורה)"}], "pesak": null}, "basar_chalav": {"title": "בשר אחר חלב", "seif": "סעיף ב׳", "sugya": null, "intro": "בדיון בבשר אחר גבינה ד' שאלות: א) המתנה. ב) קינוח הפה ושטיפתו. ג) הדחת הידיים ביום (לעומת הלילה). ד) עוף לעומת בשר בהמה וחיה.", "ops": [{"layer": "gemara", "src": "גמרא · אגרא · רב יצחק · ב\"ש · ב\"ה", "srcRef": null, "txt": "**אגרא**: עוף וגבינה נאכלין באפיקורין (ואין להקפיד בשטיפת ידיים או הפה באכילתם זה אחר זה)\n**רב יצחק** הגיע לבית רב אשי, אכל גב }, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "סבר להחמיר כר' פרץ לרחוץ אף ביום.", "under": true}, {"layer": "acharon", "src": "פר\"ח", "srcRef": null, "txt": "במזלג, לא צריך הדחה אף בלילה (לא משתמש בידיים)", "under": true}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "טוב להחמיר בזה (כי אין בכך טורח)", "under": true}, {"layer": "zman", "src": "יביע אומר, עפ\"י רש\"ש", "srcRef": null, "txt": "לחלב לא צריך נטילה כי לא אוכלים בידיים. סגי הדחת פה בלבד (ולא צריך קינוח)", "under": true}, {"subhead": "עוף / חיה / בשר"}, {"layer": "gemara", "src": "בסוגיה", "srcRef": null, "txt": "קאי דדווקא בעוף אחר גבינה אין צריך להדיח ולקנח, אבל בבהמה כן"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "וגם בחיה צריך"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "חיה כעוף, ולא צריך", "under": true}, {"layer": "shulchan", "src": "כל לשון שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.89.2", "txt": "אכל גבינה ורוצה לאכול בשר:\n**עוף** – יאכל מיד\n**בהמה/חיה** (רמב\"ם) –\n   בלילה - לנקות\n   ביום – להסתכל, ורק אם מלוכלך לנקות (רא\"ש, טור)\nלקנח את הפה ע\"י כל דבר שהוא לא תמר וקמח וירקות (פשוט בגמרא)\nלשטוף גם הפה עם מים או יין (תוס', רא\"ש, טור)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "והחמירו כן גבי חיה כמו בהמה אעפ\"י שהיא דרבנן משום שדומה לה בבשרה"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "הביא ב'יש מחמירין' את דעת המרדכי במהרמ\"מ לא לאכול מיד אחרי גבינה בשר (והט\"ז: כלומר, לחכות 6 שעות). ויש מקלים. ומיהו, אין מוחין בפני המקלים וכדאי לפחות לקנח ולהדיח הפה, ולשטוף הידיים"}, {"layer": "acharon", "src": "ולש\"ך", "srcRef": null, "txt": "אין עניין להחמיר כדעת המרהממ (שבדידו נכשל)", "under": true}], "pesak": null}, "tavshilim": {"title": "תבשילים", "seif": "סעיף ג׳", "sugya": null, "intro": "כשמדברים על תבשיל (לפחות מן הטור והלאה), וודאי שלא מדברים על בשר ממש. אלא מדובר רק בתבשיל שיש בו בשר, ומה הדין אם אכל רק מהתבשיל, בלא הבשר. (המושג 'מים אמצעיים' כוונתו לנטילת הידיים בין מאכל למאכל)", "ops": [{"layer": "note", "srcRef": null, "src": "המקרים להלכה", "txt": "**תבשיל בשר ← גבינה ממש** = שו\"ע: נטילה (ללא הדחה/קינוח). רמ\"א עפ\"י ב\"י באו\"ח: כדין בשר\n**תבשיל גבינה ← בשר ממש** = כנ\"ל (ללא הרמ\"א)\n**תבשיל בשר ← תבשיל גבינה** = שו\"ע: נטילה רשות; רמ\"א בי\"א: חובה (רשב\"ם)\n**תבשיל גבינה ← תבשיל בשר** = שו\"ע: ק\"ו. רמ\"א: חובה ליטול (הגש\"ד; דתבשיל נדבק)"}, {"layer": "gemara", "src": "בגמרא · רב נחמן", "srcRef": null, "txt": "בין תבשיל לתבשיל לא צריך לשטוף ידיים. בין תבשיל לגבינה של ממש – צריך.", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"layer": "rishon", "src": "רשב\"ם", "srcRef": null, "txt": "גם בין גבינה לתבשיל בשר/תבשיל בשר לגבינה – צריך נטילה"}, {"layer": "rishon", "src": "ר\"ת, טור", "srcRef": null, "txt": "לא צריך נטילה בין גבינה לתבשיל בשר. רק בין תבשיל של בשר לגבינה. ובין תבשיל לתבשיל לא צריך.", "under": true}, {"layer": "rishon", "src": "דרכ\"מ בשם הגש\"ד", "srcRef": null, "txt": "תבשיל גבינה ואז בשר: צריך נטילה (תבשיל גבינה נדבק בידים יותר מגבינה עצמה). ואם צריך להקל זה בגבינה עצמה, שהיא קשה. ולא להפך. אבל נוהגים בתבשיל של בשר כבשר עצמו."}, {"layer": "rishon", "src": "הגהות מיימוניות בשם סמ\"ק", "srcRef": null, "txt": "רוטב של בשר שיש בו בשר מושך המים בפה. כלומר, הא דשרי לאכול גבינה אחר תבשיל של בשר - דוקא בכגון ביצים מטוגנים בשומן שאינם מושכים המים בפה כל כך. אבל גבינה אחר רוטב של בשר - לא."}, {"layer": "rishon", "src": "ר' יונה", "srcRef": null, "txt": "אחרי מרק של בשר ודאי מותר לאכול גבינה בקינוח והדחה. הצריכו שהייה רק כשאוכל בשר מפני הבשר שבין השינים. אבל במרק שאין חשש זה - מותר.", "under": true}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "זה רק במרק צלול. אם הוא עב - יש ספק שיש בו בשר, ואסור לאכול אח\"כ גבינה אף אם ידיח ויקנח.", "under": true}, {"layer": "rishon", "src": "מרדכי בשם מהרמ\"מ", "srcRef": null, "txt": "אסור לאכול גבינה אחרי ביצים מטוגנים בשומן בשר"}, {"layer": "rishon", "src": "ב\"י (או\"ח קעג)", "srcRef": null, "txt": "שנהגו העולם שלא לאכול גבינה אחר תבשיל של בשר כלל ואין לפרוץ גדר. אבל, אם אין בשר בתבשיל (אעפ\"י שנתבשל בקדרה בשרית) - לא נהגו להחמיר ומותר לאכול אחריו גבינה"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.89.3", "txt": "פסק גם כדעת ר\"ת שצריך רק ליטול ידיים אחר תבשיל בשר ואפשר לאכול גבינה (על אף שבב\"י נראה שסבר להחמיר)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "+מביא עפ\"י הרשב\"א והמרדכי ששומן בשר דינו כבשר עצמו (ולכן אסור לאכול גבינה אחריו) (ש\"ך: וגם שומן עוף דינו כן)\n+והביא עפ\"י הב\"י שאין לאכול גבינה אחר תבשיל בשר כמו שאסור אחר בשר עצמו.\n+וגם הביא מה שכתב בב\"י שאם אין בשר בתבשיל, מותר אחריו גבינה על אף שבושל בקדרה בשרית\n+עפ\"י ש\"ד: צריך נטילה אף בין תבשיל לתבשיל (אם נגע בידיו)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "ומותר אפילו עם גבינה ממש. כי בתבשיל בשר הוא נ\"ט בר נ\"ט. ואפילו הקדרה לא הודחה יפה מאז שבושל בה בשר עד שבישלו בה תבשיל", "under": true}], "pesak": null}, "mapa": {"title": "החלפת מפה וסכו\"ם", "seif": "סעיף ד׳", "sugya": null, "ops": [{"subhead": "מפה, נקיון שולחן (צונן)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "צורר אדם בשר וגבינה במטפחת אחת ושלא יגעו זה בזה", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "גמרא · אביי", "srcRef": null, "txt": "מאחר ואם יגעו - צריך הדחה אפילו צונן בצונן", "ref": {"label": "שם", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "ירושלמי (פסחים) · א\"ר יוסה", "srcRef": null, "txt": "ההין דאוכל חובץ ובדעתיה מיכול קופד צריך מבער פיסת"}, {"layer": "rishon", "src": "טור (צא)", "srcRef": null, "txt": "מהירוש' מבין שצריך להוריד מהשולחן את הלחם שנשאר מארוחה עם גבינה אם רוצה לאכול בשר"}, {"layer": "rishon", "src": "הגהות אשרי בשם או\"ז", "srcRef": null, "txt": "מוסיף שצריך להוריד כל מה שהיה על השולחן בארוחה החלבית", "under": true}, {"layer": "rishon", "src": "שו\"ת הרשב\"א המיוחסות לרמב\"ן", "srcRef": null, "txt": "אם אכלו בשר ורוצים לאכול גבינה - לא מספיק לנקות. ואפילו גבינה קרה (משום שזה בגלל הלכלוך והשאריות. אם זה היה בגלל שבלוע היה מותר קר)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.89.4", "txt": "צריך להוריד אחר אכילת גבינה שיורי פת מהשולחן (טור), וכשו\"ת הרשב\"א שאם אכלו בשר ורוצים לאכול גבינה - יש להחליף מפה"}, {"layer": "acharon", "src": "והפת\"ש בשם רדב\"ז", "srcRef": null, "txt": "דאם אוכלים בקערה - אין מתלכלכת המפה, ולא צריך כלום. אבל אפילו לצאת לדעת הרשב\"א, צריך רק להפוך המפה", "under": true}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "סבר עפ\"י האו\"ה שגם הפוך (אם אוכלים גבינה צריך להחליף מפה בשביל בשר. ולא להסתפק בהורדת שיורי הפת)"}, {"layer": "acharon", "src": "ערוך השולחן", "srcRef": null, "txt": "מצווה מן המובחר להחליף את כל מה שהיה על המפה בארוחה החלבית ולפרוס מפה אחרת ולחם אחר וכלים אחרים, ואז יאכל בשר. וכן המנהג פשוט ברוב תפוצות ישראל"}, {"subhead": "סכין (נדון בה בצ\"ו)"}, {"layer": "lead", "srcRef": null, "txt": "ועיקר הדברים:"}, {"layer": "gemara", "src": "חזקיה בשם אביי", "srcRef": null, "txt": "דגים שהיו בקערה של בשר מותר לאכול בכותח (משום שהווי נ\"ט הבא מן נ\"ט)\nסכין שחתכו בה בשר:\n   חתכו בה צנון - אסור לאכול בכותח (כי הוא חריף, לכן בולע את טעם הבשר מהסכין. והווי נ\"ט בכותח)\n   חתכו בה קישוא - יכול להוריד את החלק שחתך בו ולאכול עם הכותח (כי השמנוניות לא נבלעת. אבל בכל זאת הווי נ\"ט הבא מן הממש, לכן יש להוריד את החלק כדי שלא יפגוש את החלב)", "ref": {"label": "חולין · פרק כל הבשר · קיא ע\"ב", "ref": "Chullin.111b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מדובר בכלים שניקו. הפער בין סכין לקערה הוא בגלל שהשומן נשמר ונקרש על הסכין, והווי נ\"ט הבא מן הממש. ובקערה לא נקרש, ואין בה ממש של שומן. לכן יש בקערה רק טעם (ובכותח - נ\"ט בר נ\"ט)\nועוד, דברים חריפים כמו צנון בולעים יותר מדגים על אף שהם רותחים", "under": true}, {"layer": "lead", "srcRef": null, "txt": "אז נראה מההתיחסות לסכין בחולין, כי בשונה משאר הכלים (לפחות מקערה), סכין בד\"כ מלוכלת יותר והשומן נקרש עליה. לכן נתייחס אליה כנותנת טעם מן הממש (ומה שפוגש אותה - נ\"ט).\nכיצד ניתן לנקות סכין לגמרי כדי שלא תתן טעם כ\"כ? בעבודה זרה מצינו כך:"}, {"layer": "gemara", "src": "בעבודה זרה · רב עוקבא · רב כהנא · רב הונא", "srcRef": null, "txt": "במשנה דורשים לשפשף את הסכין על מנת לטהרה. **רב עוקבא** דורש אף לנעוץ הסכין עשר פעמים בקרקע ע\"מ לטהרה. **רב כהנא**: זה דווקא בסכין חלקה ושטוחה שאין בה גומות. **רב הונא בריה דרב יהושע**: זאת ע\"מ לאכול בה צונן. אבל ע\"מ לאכול/לחתוך בה חם - יש להגעיל."}, {"layer": "rishon", "src": "שו\"ת הרשב\"א (בשם הרמב\"ן), והביאו הב\"י", "srcRef": null, "txt": "אסור לחתוך גבינה (אפילו קרה) בסכין שחותכים בה בשר בד\"כ, וגם לא את הפת שיאכל עם הגבינה. ולגבי הצנון, אם הסכין נקיה ואין בה טעם בשר, וחתך בה הצנון – מותר לאכול את הצנון בכותח (ועל אף החריפות - הווי בר נ\"ט)"}, {"layer": "rishon", "src": "ובעל התרומה בשם ר\"ש", "srcRef": null, "txt": "התיר לחתוך את הלחם, ולדידו הווי רק נ\"ט בר נ\"ט כשיאכלו עם הגבינה, כל עוד ינגבו היטב.", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "הביא דברי שו\"ת הרשב\"א, שאין לחתוך גבינה בסכין שחותכים בה בשר; וכן לגבי הלחם שיאכל איתה"}, {"layer": "rama", "src": "ורמ\"א", "srcRef": null, "txt": "הביא בשם א\"ח שכן הפוך (אסור לחתוך בשר בסכין שחותכים בה גבינה; ואת הלחם שלה). וכי ע\"י נעיצת הסכין בקרקע – מותר. אך סיים שנהגו ישראל שיהיה להם סכין לכל דבר – בשרי וחלבי"}, {"layer": "lead", "srcRef": null, "txt": "ונחלקו הפוסקים מה סבר הרמ\"א שנעיצת הסכין תתיר לחתוך:"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "לאחר נעיצתה מותר לחתוך את הלחם שיאכל עם הגבינה"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אפילו את הגבינה עצמה מותר יהיה לחתוך. והוכיח מר\"ש שללחם סגי בקינוח. אבל סבר ממה שכתב הרמ\"א גבי מנהג ישראל להחזיק 2 סכינים - להחמיר ולא לחתוך גבינה אף בסכין שנעצה. מ\"מ, כן אפשר להסתפק בקינוח בשביל חיתוך הלחם.", "under": true}, {"layer": "acharon", "src": "המרהש\"ל", "srcRef": null, "txt": "נעיצת הסכין בקרקע לא מועילה אף לחיתוך הלחם שיאכל עם הגבינה.", "under": true}, {"layer": "acharon", "src": "וערוה\"ש", "srcRef": null, "txt": "ניגוב היטב/נעיצת בקרקע של סכין שחותכים בה בשר – מועיל רק ללחם, ולא לגבינה עצמה.", "under": true}, {"layer": "acharon", "src": "הפר\"ח", "srcRef": null, "txt": "הביא, שיש מדקדקים שמחזיקים אף סכין מיוחדת ללחם (פרווה). (וכמובן שמותר להשתמש בסכין של בשר לחתוך בה לחם ולאכול בו חלב עם הסכין נקייה כנ\"ל)"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "group", "title": "פ\"ח · בשר וגבינה על שולחן אחד", "spans": "סעיפים א׳-ב׳", "children": ["din", "motar", "hafrada"]}, {"type": "group", "title": "פ\"ט · שהייה והרחקות", "spans": "סעיפים א׳-ד׳", "children": ["chalav_basar", "basar_chalav", "tavshilim", "mapa"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"נ\"ט בר נ\"ט": "נותן טעם בר נותן טעם — טעם שעבר דרך כלי (ולא ישירות) ולכן נקלש; בהיתר מקילים בו.", "כותח": "מאכל חלבי — הדוגמה הקלאסית לאכילת מאכל 'בשרי' עם חלב.", "אכסנאים": "אורחים המתארחים יחד; אם זרים זה לזה — הותר להם להעלות בשר וחלב על שולחן אחד.", "תפיסה אחת": "קרבה בין הסועדים (שותפות/היכרות); בה נאסרה העלאת בשר וחלב יחד.", "סימן היכר": "דבר המפריד על השולחן (לחם/קנקן שאין אוכלים ממנו) — מתיר למכרים לאכול יחד.", "גזרה לגזרה": "גזירה שנועדה למנוע איסור שהוא עצמו כבר מדרבנן; נחלקו אם גוזרים כן.", "קינוח": "ניגוב הפה בפת וכד' לסילוק שיירי המאכל.", "הדחה": "שטיפת הפה במים/יין.", "מאב\"ד": "מאכל בן דרוסאי — כשליש/כחצי בישול.", "אפיקורין": "'בקינוח' — עוף וגבינה נאכלים בזה אחר זה בלא הקפדה."}, "subject": "איסור והיתר", "id": "harchakot"}, {"topic": {"title": "תשלומים", "eyebrow": "מבחני הרבנות · תפילה וברכות · סימן ק\"ח", "siman": "Shulchan_Arukh,_Orach_Chayim.108", "intro": {"lead": {"t": "", "ref": ""}, "body": "מי שטעה או נאנס ולא התפלל תפילה בזמנה — משלים אותה בתפילה הסמוכה (\"מתפלל בזו שאחריה שתים\"). הדין נלמד ממימרת ר' יוחנן בברכות, והוא דווקא בשוגג או אונס; במזיד — 'מעוות לא יוכל לתקון'."}}, "sections": {"yesod": {"title": "הדין ביסודו", "seif": "סעיפים א׳-ב׳", "sugya": null, "ops": [{"layer": "gemara", "src": "גמרא · ר' יוחנן", "srcRef": null, "txt": "**ר' יוחנן**: טעה ולא התפלל שחרית– מתפלל במנחה שתים\nטעה לא התפלל מנחה – מתפלל בערבית שתים\nטעה ולא התפלל ערבית – מתפלל בשחרית שתים\nואסיקנא לפי ר' יוחנן: בשוגג - יש תפילת תשלומים. במזיד - לא.\nביטויים: יש תשלומים ממנחה לערבית - לא אמרינן 'עבר יומו בטל קורבנו'. מזיד – \"מעוות לא יוכל לתקון\"", "ref": {"label": "ברכות · פרק תפילת השחר · כו ע\"א", "ref": "Berakhot.26a"}}, {"layer": "rishon", "src": "טור עפ\"י הסוגיה", "srcRef": null, "txt": "קודם תפילה של עכשיו, ואז תשלומים. (בסוגיה, גבי טעה במנחה של שבת – במוצש מבדיל. עשה הפוך – לא יצא בתשלומים. בראשונה. הבדיל בשנייה – רק השנייה עלתה לו)"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.1", "txt": "טעה/נאנס ופספס תפילה - מתפלל בזו שאחריה שתים: קודם זו של עכשיו, ואח\"כ תשלומין.\nאם לא עשה בסדר זה – בזו של עכשיו - יצא.\n   התשלומין – לא יצא. ישלים (גמרא)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "חולק על עניין הסדר: כל עוד אין הבדל בתפילות (דוגמת ערבית של מוצש) - הסדר לא משנה", "under": true}, {"layer": "acharon", "src": "פר\"ח, פמ\"ג ומשנ\"ב", "srcRef": null, "txt": "אין לנו אלא דברי המחבר", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם עשה בסדר הנכון, אבל טעה בתוכן של זו של עכשיו (=ראשונה) – יצא בשתיהן"}], "pesak": null}, "bein": {"title": "בין התפילות", "seif": null, "sugya": null, "intro": "לדרכ\"מ מחד, יש עניין בהפרדה בין התפילות, וזה טעמו לסמ\"ק שפוסק שאומרים אשרי. ומאידך, נטיית המ\"ב: לסמוך בין התפילות כמה שיותר. לא לאכול, לא ללמוד תורה. שיהיה מעין המשך תפילה.", "ops": [{"subhead": "ש\"ץ"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אם אני ש\"ץ – חזרת הש\"ץ נחשבת לי תשלומין"}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אבל לשמוע מהש\"ץ - לא תופס (זה רק למי שאינו בקי). אבל בשביל תשלומין של ערבית (בשחרית) – תופס"}, {"subhead": "אשרי"}, {"layer": "rishon", "src": "הסמ\"ק, ריב\"ש", "srcRef": null, "txt": "צריך לומר אשרי בין התפילה שמתפלל עכשיו לתשלומין (גם אם היא לא מנחה)"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "פוסק כן. 18 ◄ אשרי ◄ 18 (אולי סובר שרק במשלים בשחרית את ערבית. ט\"ז דוחה זאת)"}, {"layer": "rishon", "src": "רקנטי", "srcRef": null, "txt": "אחרי מנחה – לא יאמר אשרי", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מעיקר הדין – אין צריך הפסקה", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "~~מביא שצריך לומר אשרי כנ\"ל גם כשמשלים מנחה בערבית~~"}, {"layer": "lead", "srcRef": null, "txt": "**הטעם 'לאשרי'** — דרכ\"מ: שיהיה הפסק בין תפילה לתפילה. ט\"ז, גר\"א: לעמוד מתוך דברי תורה"}, {"subhead": "תחנון"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "צריך להצמיד תחנון לש\"ע: 18 ◄ תחנון ◄ אשרי ◄ 18"}, {"layer": "acharon", "src": "לבוש, מג\"א", "srcRef": null, "txt": "לא להצמיד (כי אז למה צריך אשרי אם התחנון מפריד): 18 ◄ אשרי ◄ 18 ◄ תחנון", "under": true}, {"subhead": "לאכול / לשמוע חזרת הש\"ץ"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אסור לאכול בין התפילות. אם כבר התחיל – לא יפסיק"}, {"layer": "acharon", "src": "מחצה\"ש", "srcRef": null, "txt": "אם התחיל לאכול צריך להפסיק", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "לשמוע חזרת הש\"ץ — מותר"}], "pesak": null}, "anus": {"title": "הגדרות — מיהו אנוס / שוגג?", "seif": "סעיף ח׳", "sugya": null, "ops": [{"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "ההבדל בין אנוס למי שפטור לגמרי - אנוס: היה צריך להתפלל, לא היה יכול להתפלל בגלל זמן, נסיעה, חולי, שכרות וכו'. פטור: לא היה צריך להתפלל מעיקרא.\nדוג': אונס - שיכור, חולה, העוסק בצרכי ציבור וכד', הטרוד אצל פקיד מחמת החוב (למרות שזה ממון)"}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אם לא התפלל כי לא יכל לכוון, למרות שלא עשה נכון - יכול להשלים בתשלומים. חשב שמותר. (דומיא דסי' צח סע' ב'. שם נקטינן שלא ייתפלל כשלא יכול לכוון, אבל גם עפ\"י המהרמ\"מ – שאין מקפידים בזה כבר)"}, {"subhead": "הדיון בב\"י-ש\"ע (ח')"}, {"layer": "rishon", "src": "נמוק\"י עפ\"י רמ\"ה", "srcRef": null, "txt": "מי שהתעסק בדבר וסבר שיסיימו לפני זמן התפילה, אך בסוף עבר הזמן - חשיב שוגג"}, {"layer": "rishon", "src": "דוחה", "srcRef": null, "txt": "בתפילה חיישינן יותר מנזיקין. חשיב מזיד.", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "נוקט כהו\"א של הנמוק\"י - כל עוד פספס כי היה עסוק וטרוד - חשיב שוגג. פספס כי היה בשאט נפש ולא טרוד – חשיב מזיד", "under": true}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "הטרוד אצל פקיד מחמת חוב – שוגג ('המבטל מצווה לצורך ממונו - אונס')"}, {"layer": "acharon", "src": "דרכ\"מ", "srcRef": null, "txt": "משמע מתרוה\"ד - דווקא בדיעבד", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "מי שהיה טרוד וע\"י כך לא התפלל – יש לה תשלומין"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ח')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.8", "txt": "אנוס: + מי שהתעסק בדבר וחשב שיהיה לו זמן להתפלל אח\"כ (ובסוף לא התפלל) (נימוק\"י עפ\"י רמ\"ה)\n+ מי שהיה טרוד בענייני הפסד ממון\n+ שיכור (סמ\"ק בסימן צט)"}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אפילו אם התעסק בדברים שמזהירים שלא לעשות בער\"ש לפני המנחה – חשיב שוגג. כי הרי סוף סוף לא בטל בשאט נפש, אלא רצה להתפלל אח\"כ.\nשיכור שוגג רק אם שתה קודם זמן התפילה או סבר שיש שהות וייתפקח עד סוף הזמן (צט)"}], "pesak": null}, "hatzmada": {"title": "עת ההשלמה (בהצמדה)", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אי אפשר להשלים תפילה אלא בהצמדה לתפילה אחרת\n   לשון אחר: דווקא בזמן התפילה הנוכחית אפשר לפלל שתיים. כי הרי כל מה שקורה פה הוא שאני מתפלל למשל מנחה שתיים, ולא מנחה ואיתה משלים שחרית; כלשון ר' יוחנן: טעה ולא התפלל X – מתפלל ב-Y שתיים. לכן – אי אפשר פשוט להשלים באמצע החיים."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.3", "txt": "פוסק כן להלכה (רק בזמן שמתפלל יכול להשלים)"}, {"layer": "acharon", "src": "אחרונים (פמ\"ג ועוד)", "srcRef": null, "txt": "מבינים שאולי הרשב\"א מיירי בזמן תפילה, דהיינו, שאפשר להשלים רק בזמן תפילה ההלכתי (אבל לא שחייב בעת התפילה שמתפלל ממש). ועיין עוד בחיי אדם כלל כז ונשמת אדם שם", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "לכתחילה, אם לא השלים בהצמדה – ייתפלל בהתניה: אם מותר לא בהצמדה – זו תשלומין; אם אסור לא בהצמדה – זו נדבה"}], "pesak": null}, "smucha": {"title": "תשלומים רק בתפילה הסמוכה, ותשלומים רבים", "seif": "סעיפים ד׳-ה׳", "sugya": null, "ops": [{"layer": "rishon", "src": "בה\"ג", "srcRef": null, "txt": "טעה ולא התפלל ערבית ושחרית – מתפלל במנחה שלוש\n(שמעינן מכאן שני דינים: 1  אם לא עשיתי תשלומין לתפילה א' בתפילה ב' – יכול להשלים גם בתפילה ג'. 2  אם פספסתי כמה תפילות – אפשר לעשות כמה תשלומין בבת אחת)"}, {"layer": "rishon", "src": "ר' יונה בשם י\"א, רשב\"א", "srcRef": null, "txt": "אפשר להשלים תפילות הרבה (מי שמשתחרר מבית האסורים – ישלים כל התפילות שהפסיד)\\note{עיין בהערה. בהגהות והערות שם. רשב\"א בעצם מסכים בפירוש רק אם 1, אבל הב\"י מסיק ממנו גם את 2}"}, {"layer": "rishon", "src": "רמב\"ם, רשב\"ם", "srcRef": null, "txt": "אין תשלומים אלא לתפילה הסמוכה (חולקים על 1, ומתוך כך גם על 2)", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.4", "txt": "אם פספס שתי תפילות – לא יכול להשלים את שתיהן. רק את האחרונה שפספס (רמב\"ם, רשב\"ם)"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "גם אם פספסתי את שחרית ואת מנחה לא פספסתי - לא יכול להשלים שחרית בערבית. השלמה – רק בתפילה הסמוכה", "under": true}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אם פספס בשבת שחרית – יכול להשלים אותה במנחה, למרות מוסף שבאמצע (כי גם ככה אי אפשר להשלים בה)", "under": true}, {"layer": "lead", "srcRef": null, "txt": "אז מה יעשה מי שפספס את הסמוכה?"}, {"layer": "rishon", "src": "ר' יונה", "srcRef": null, "txt": "אם רוצה - ייתפלל בתורת נדבה. וטוב לעשות כן."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.5", "txt": "פוסק כן (נזכור שתנאי נדבה: חידוש + יכול לכוון בכולה)"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "לכן, היוצא מבית האסורים או חולה שהבריא - ראוי שיתפלל כל התפילות שהפסיד בנדבה"}], "pesak": null}, "mezid": {"title": "אם פספס תפילה במזיד", "seif": "סעיפים ז׳-ח׳", "sugya": null, "intro": "בסוגיה דידן פשוט שתשלומים הם רק בפספס בשוגג/אונס; ובמזיד אמרינן ד'מעוות לא יכול לתקון' (כלומר, אי אפשר להתפלל מתי שבא לך; על אף שיש מובן שבו תפילה רחמי). ומה יעשה המזיד?", "ops": [{"layer": "lead", "srcRef": null, "txt": "הרא\"ש מביא בשם גאון את ה'מסלול' השני של תפילה שלא במועד – נדבה. אלא שהב\"י מציע כאן מבצע מיוחד בהתחשבות בנסיבות: על אף שבדיני נדבה פסק שאין להתפלל תפילת נדבה בלי שיחדש בה איזה דבר, כאן מציע למי שהפסיד תפילה במזיד, שייתפלל נדבה בלי שיחדש בה דבר. מבצע זה תקף רק לתפילה הסמוכה.\nטעם הב\"י: אם היה מפספס בשוגג, היה צריך להשלים תשלומין בתפילה הסמוכה. אז למרות שהזיד ומתפלל בתורת נדבה-רשות, הרי שנמצא באותה משבצת (בתפילה הסמוכה). ולא סתם מתפלל נדבה באיזה זמן אקראי."}, {"layer": "rishon", "src": "הרא\"ש בשם גאון", "srcRef": null, "txt": "פספס תפילה במזיד - לא יוכל לתקון.\n   אך אם רוצה - יכול להתפלל בסמוכה לה נדבה, ובלי שיחדש בה דבר (בשכר רחמי בעלמא).\n   (אבל אם לא מתפלל בסמוכה – צריך חידוש, ככל נדבה)"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ז')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.7", "txt": "פספס תפילה במזיד – יכול בתפילה הסמוכה להתפלל נדבה, בלי חידוש."}, {"layer": "acharon", "src": "ב\"ח, גר\"א", "srcRef": null, "txt": "צריך לחדש", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "על פניו היה צריך לחדש בתפילתו בנדבה, אבל הוא מתפלל אותה נדבה רק בגלל שהוא הזיד, ואם לא היה מזיד אלא שוגג היה יכול להתפלל תשלומים. ועצם העובדה שהוא בכל זאת רוצה להשלים הופכת את המזיד שלו לשגגה, ולכן לא צריך לחדש\n('גדולה תשובה שזדונות נהפכות לו לשגגות'. מה שהופך את זדון לשוגג כאן זהו עצם הרצון להתפלל בכל זאת. היינו – תשובה)"}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "תשובה = אין לך חידוש גדול מזה (התשובה היא החידוש)", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "זה בדיוק הכוונה של הסוגיה ב'מעוות לא יוכל לתקון'. המצווה והחובתיות כבר הלכה."}], "pesak": null}, "eizo": {"title": "איזו תפילה?", "seif": "סעיפים ו׳, ט׳-י\"א", "sugya": null, "ops": [{"subhead": "תשלומין במוסף ועל מוסף (ו')"}, {"layer": "lead", "srcRef": null, "txt": "**על מוסף**: תפילת מוסף זמנה כל היום, לכן אפשר לכתחילה להתפלל אותה כל עוד לא חשך היום (\"ושל מוספין כל היום\"). ההלכה שאין תשלומין למוסף פירושה שאם חשך היום ועבר זמן מוסף – אי אפשר להשלימה בערבית."}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "מוסף היא יותר 'קרבנית' משאר תפילות, לכן לגביה כן שייך לומר ד'עבר זמנו בטל קרבנו'"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.6", "txt": "פוסק על פיהם: אין למוסף תשלומים"}, {"layer": "acharon", "src": "ט\"ז, מג\"א", "srcRef": null, "txt": "הטעם לכך הוא משום שמוסף אין לה רחמי. ועוד: איך יגיד קורבנות שלא בזמן מוסף?", "under": true}, {"layer": "acharon", "src": "שערי תשובה ואחרונים", "srcRef": null, "txt": "**במוסף**: אם פספסתי שחרית ביום שיש בו מוסף – א\"א להשלים במוסף"}, {"subhead": "מנחה של ער\"ש ← ערבית של שבת (ט')"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.9", "txt": "פספס מנחה של ערב שבת – מתפלל ערבית של שבת פעמיים (פשוט בברייתא)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "היה נכון להשלים של חול! אלא שלא הטריחוהו רבנן 18 ברכות. וגם: אין תפילת שבת בלי הזכרת שבת.\nאם עשה התשלומים של חול? מ\"ב: יצא. ט\"ז: לא יצא"}, {"subhead": "מנחה של שבת ← ערבית של מוצ\"ש (י')"}, {"layer": "gemara", "src": "פשוט בסוגיה", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.10", "txt": "במוצ\"ש פעמיים של חול. אבל בתשלומין בלי הבדלה. (הבדלה שונה בזה משבת ור\"ח)\n**פאשלה1** - בראשונה לא הזכיר הבדלה, בשנייה כן → לא יצא (גילה שהתשלומין היא הראשונה). מ\"ב: אך אם כיוון בפירוש שהראשונה היא של עכשיו והשנייה תשלומין – יצא.\n**פאשלה2** – בשתיהן הזכיר/לא הזכיר הבדלה → יצא (לא היה הבדל בין התפילות)"}, {"subhead": "מנחה של ערב ר\"ח (רמ\"א י')"}, {"layer": "rama", "src": "רמ\"א · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.10", "txt": "פספס מנחה רגילה, וההשלמה בערבית של ר\"ח → יתפלל ערבית של ר\"ח פעמיים.\n**פאשלה1** - בראשונה לא 'יעלה ויבוא' ובשנייה כן → התשלומין לא עלתה (גילה דעתו שהיא תשלומין). ט\"ז: אם כיוון בפירוש – יצא.\n**פאשלה2** – בשתיהן לא הזכיר יעלה ויבוא → יצא"}, {"layer": "acharon", "src": "מ\"ב (ס\"ק כז)", "srcRef": null, "txt": "**מנחה של ר\"ח שאחריו ר\"ח**: לא הזכיר בראשונה יעלה ויבוא - יצא (כי בשתיהן צריך). לא הזכיר בשנייה יעלה ויבוא – יצא (כי לא צריך לחזור בערבית בגלל יעלה ויבוא)"}, {"subhead": "טעה במנחה של שבת/ר\"ח ← ערבית של חול"}, {"layer": "rishon", "src": "תוס' בשם ר\"י", "srcRef": null, "txt": "שייתפלל ערבית רגיל פעמיים (ראשונה הבדלה)"}, {"layer": "rishon", "src": "חכמי פרובינציה", "srcRef": null, "txt": "לא שייך תשלומים בכלל (כי מחד – אמור להשלים עפ\"י התפילה של עכשיו. מאידך – כל הסיבה שצריך להשלים זה לא כי לא התפלל, אלא טעה ביעלה ויבוא/נוסח שבת. אז מה יעזור להתפלל התפילה של עכשיו?)", "under": true}, {"layer": "rishon", "src": "תלמידי ר' יונה", "srcRef": null, "txt": "יעשה את השנייה נדבה בלי חידוש דבר"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "יעשה את השנייה נדבה בלי חידוש דבר"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אבל אם שכח משיב הרוח/טל ומטר (וכל דבר שמצריך להתפלל שוב כמו יעלה ויבא) – כן ייתפלל תשלומין. כי כן יכול לתקן בתפילה הבאה (גם בה צריך להזכיר תן טל וכו')"}], "pesak": null}, "maore": {"title": "המזכיר מאורע שאר ימים שלא בזמנה", "seif": "סעיף י\"ב", "sugya": null, "ops": [{"layer": "rishon", "src": "אורחות חיים", "srcRef": null, "txt": "מכך שאם טעה במנחה של שבת, ובמוצש כשהשלים אמר בטעות בשניהם הבדלה – יצא, לומד: אם הזכרתי בטעות משהו שלא היה צריך להזכיר (דומיא דהבדלה) וכד' - לא הווי הפסק, והתפילה הייתה בסדר"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.12", "txt": "פוסק כן."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אבל אם נזכר - יש להפסיק אפילו באמצע הברכה"}, {"layer": "acharon", "src": "ט\"ז, גר\"א", "srcRef": null, "txt": "חולקים על הש\"ע. אין מה להשוות. הבדלה כן שייכת במוצש, פשוט לא בתפילה שמשלים. להזכיר פתאום על הניסים זה בוודאי הפסק.", "under": true}], "pesak": null}, "harchava": {"title": "הרחבה — מהלך הגמרא", "seif": null, "sugya": null, "intro": "מהלך הגמרא מעניין כשלעצמו.", "ops": [{"layer": "gemara", "src": "הסוגיה (ברכות כו)", "srcRef": null, "txt": "~~**איבעיא להו**\\note{לדעתי כל האיבעיא להו הזה הוא מהלך מלאכותי של הגמרא. שהרי, קיימת מימרא של ר' יוחנן שעונה על שאלה זו של מנחה בפשטות בדיוק כמו השאלה של ערבית ושחרית. וכן, יש גם ברייתא בריש עמוד ב שקובעת בדיוק אותו דבר ואפילו לער\"ש. לדעתי, מטרתו של המהלך היא להניח בדברי רבי יוחנן את הביטוי 'עבר יומו בטל קורבנו'. כך, אנחנו נשארים בשפה הקורבנית.}: טעה ולא התפלל מנחה, מהו שיתפלל ערבית שתים?~~\n~~   אם תמצא לומר טעה ולא התפלל ערבית מתפלל שחרית שתים - משום דחד יומא הוא, דכתיב ויהי ערב ויהי בקר יום אחד, אבל הכא - תפלה במקום קרבן היא, וכיון דעבר יומו בטל קרבנו;~~\n~~   או דילמא, כיון דצלותא רחמי היא - כל אימת דבעי מצלי ואזיל? –~~\n~~**אמר רב הונא בר יהודה אמר רבי יצחק אמר רבי יוחנן**: טעה ולא התפלל מנחה - מתפלל ערבית שתים, ואין בזה משום דעבר יומו בטל קרבנו.~~\n~~**מיתיבי**: מעות לא יוכל לתקן וחסרון לא יוכל להמנות. מעות לא יוכל לתקן - זה שבטל קריאת שמע של ערבית וקריאת שמע של שחרית, או תפלה של ערבית, או תפלה של שחרית...~~\n~~**אמר רבי יצחק אמר רבי יוחנן**: הכא במאי עסקינן - שבטל במזיד.~~\n~~**אמר רב אשי**: דיקא נמי דקתני בטל ולא קתני טעה - שמע מינה.~~", "collapsed": true, "ref": {"label": "ברכות · פרק תפילת השחר · כו", "ref": "Berakhot.26a"}}, {"layer": "acharon", "src": "בשיעור (בעקבות הרב שג\"ר)", "srcRef": null, "txt": "~~הרחבנו כאן בסוגיה על המתח הנוצר ע\"י הסתמא: התפילה נמתחת בין מובן שבו היא דבר שיש לו תחום זמן מסויים ומוגבל (כקרבן, עבר יומו בטל קרבנו), לבין רחמי – הזמן נזיל, ואין לי הגבלות בטווח התפילה שלי.~~\n~~אלא שאנו רואים כי על אף שעמדת ר' יוחנן כי יש להשלים ואין בזה משום עבר זמנו בטל קרבנו, על אף זאת צריך להשלים! כלומר, יש פה מורכבות, ואנחנו לא נמצאים באחד מהצדדים. ויש אפילו לדייק ולומר בסוגייה, כי הצורך/אפשרות להשלים נקנים דווקא מכח העובדה שתפילה רחמי, ואין ההכרעה לטובת רחמי מפרקת את כל מבנה של זמני תפלות והדימוי כנגד קרבנות.~~\n~~בעצם, אנו מונחים בין שני קטבים. מתח דומה ניתן אולי לזהות בסוגיה שמגיעה מיד אח\"כ, במחלוקת אם תפילות אבות תקנו או כקרבנות.~~", "collapsed": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "yesod"}, {"type": "sec", "id": "bein"}, {"type": "sec", "id": "anus"}, {"type": "sec", "id": "hatzmada"}, {"type": "sec", "id": "smucha"}, {"type": "sec", "id": "mezid"}, {"type": "sec", "id": "eizo"}, {"type": "sec", "id": "maore"}, {"type": "sec", "id": "harchava"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"תשלומין": "השלמת תפילה שהוחמצה, ע\"י התפללות התפילה הסמוכה פעמיים.", "עבר יומו בטל קרבנו": "קרבן שעבר זמנו — בטל; ההשוואה לתפילה (כנגד קרבן) היא צד אחד במתח שבסוגיה.", "צלותא רחמי היא": "תפילה היא בקשת רחמים (ולא רק כנגד קרבן) — הצד השני במתח שבסוגיה.", "בהצמדה": "תשלומין נעשים דווקא צמוד לתפילת הזמן הנוכחי, לא בכל עת.", "נדבה": "תפילת רשות; מי שהזיד או פספס את הסמוכה יכול להתפלל נדבה (לרוב בתנאי חידוש).", "מעוות לא יוכל לתקון": "הכתוב שממנו למדו שהמזיד (שביטל תפילה) אינו משלים בתשלומין.", "אנוס": "מי שהיה צריך להתפלל ונמנע ממנו (זמן, חולי, טרדת ממון) — דינו כשוגג ומשלים.", "מוסף": "תפילת מוסף — אין לה תשלומין (זמנה כל היום; משעבר, בטל)."}, "subject": "תפילה וברכות", "id": "tashlumin"}, {"topic": {"title": "דם חימוד", "eyebrow": "מבחני הרבנות · נידה · סימן קצ\"ב", "siman": "Shulchan_Arukh,_Yoreh_De'ah.192", "intro": {"lead": {"t": "", "ref": ""}, "body": "אשה שנקבע מועד נישואיה ('תבעוה להנשא ונתפיסה') צריכה לשבת שבעה נקיים קודם החופה, מחשש 'דם חימוד' — שמא מתוך התשוקה וההתרגשות לקראת הנישואין ראתה טיפת דם.\n\nסימן זה עוסק בגדרי הספירה (ממתי, כמה בדיקות), בשאלת הגורם לחימוד (ההודעה על החתונה או ההתקרבות אליה), בדחיית הנישואין ובחימוד מחודש, וכן בדיני זוג האסורים להתייחד אחר חופתם (שעבר וכנס, או שפרסה נדה קודם ששימשו)."}}, "sections": {"ikar": {"title": "עיקר הדין", "seif": "סעיף א׳", "sugya": null, "ops": [{"layer": "gemara", "src": "גמרא · רבא", "srcRef": null, "txt": "**רבא**: אשה שתבעוה להנשא ונתפיסה (שנקבע לה תאריך להנשא) - צריכה לשבת 7 נקיים בשבוע שקודם החתונה.\nוהגמרא מנמקת שהטעם הוא משום דם חימוד.\n(ההנחה היא שעצם הקביעה של הנישואין, הרעיון שהיא הולכת להתחתן, גורם ליציאת דם חימוד ותשוקה.)", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"subhead": "אם הייתה טהורה בזמן שתבעוה?"}, {"layer": "lead", "srcRef": null, "txt": "הגזרה של רבא עוקפת את ההגיון הפשוט. כמו חשש שכבת זרע (קצו, סע' יא) כך כותב הרשב\"א:"}, {"layer": "rishon", "src": "רשב\"א וכל הפוסקים", "srcRef": null, "txt": "גם אם בזמן התביעה בדקה עצמה ונמצאה טהורה - צריכה 7 נקיים. יש חשש שראתה טיפת דם כחרדל ונאבד (ב\"י: פשיטא. אחרת מה רבא גוזר)"}, {"layer": "rishon", "src": "ראבי\"ה", "srcRef": null, "txt": "אם בדקה עצמה ביום התביעה ואין דם – לא צריכה 7 נקיים", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "דוחה. כל הראשונים חולקים על זה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.1", "txt": "אשה שתבעוה להנשא והסכימה – צריכה לשבת 7 נקיים (רבא בגמרא), ואפילו אם בדקה עצמה ב'יום התביעה' (רשב\"א; ולא כראבי\"ה)"}, {"subhead": "מה צריכה כדי להתחיל את ה-7 נקיים?"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "לא צריכה לא הפסק טהרה, ולא בדיקה, רק להמתין ולספור 7 נקיים"}, {"layer": "rishon", "src": "רא\"ש, רמב\"ן", "srcRef": null, "txt": "צריכה בדיקה (אבל לא הפסקת טהרה)"}, {"layer": "rishon", "src": "ב\"י ברא\"ש", "srcRef": null, "txt": "לרא\"ש ורמב\"ן, כמה בדיקות צריכה? לכתחילה צריכה בדיקה בכל יום; בדיעבד מספיקה רק בדיקה אחת (ב\"י: אין סיבה שיחמיר בה יותר מרואה ודאית; ב-קצו, הש\"ע סבר שבדיעבד סגי לרואה בבדיקה אחת בכל התקופה)", "under": true}, {"layer": "rishon", "src": "ב\"י ברמב\"ן", "srcRef": null, "txt": "לכתחילה צריכה רק בדיקה אחת בכל התקופה", "under": true}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "גם לרמב\"ן צריכה בכל יום", "under": true}, {"layer": "rishon", "src": "ר\"ן בשם י\"א", "srcRef": null, "txt": "צריכה 7 נקיים, בדיקה וגם הפסק טהרה."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.1", "txt": "אשה שתבעוה להנשא וצריכה לשבת 7 נקיים על דם חימוד -\n+ מתחילה את הספירה ממחרת 'יום התביעה' (רשב\"א)\n+ לא צריכה הפסק טהרה, אבל צריכה בדיקה במהלך הספירה (רא\"ש, רמב\"ן)\n+ (ומשמע שמתכוון שצריך בדיקה אחת בכל השבעה, ולא כל יום; כהבנתו ברמב\"ן)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "לכתחילה צריכה בדיקה בכל יום במהלך הספירה, ובדיעבד אם בדקה רק פעם אחת - סגי (ב\"י ברא\"ש)"}, {"layer": "acharon", "src": "ב\"ח, מהרש\"ל, ש\"ך", "srcRef": null, "txt": "המנהג האידנא לעשות הפסק טהרה. וכרמ\"א (לכתחילה בדיקה כל יום)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "במובן מסוים, גזירת רבא יושבת על אותו חשש של גזירת כתמים. שניהם יושבים על החשש שאשה יכולה לדמם בלי להרגיש. (משמע מדבריו שתכלס מדובר בטומאה דרבנן. כי ברור שלא ראתה)"}, {"subhead": "נימוקי הדעות"}, {"layer": "lead", "srcRef": null, "txt": "למה בעצם נחלקו הראשונים אם צריך בדיקה/הפסק טהרה? הנימוקים עמוקים — לחצו להרחבה."}, {"layer": "rishon", "src": "רשב\"א — הנימוק", "srcRef": null, "txt": "מתבסס על שיטת רב חביבא (באופן קצת לא ברור). לדידו, צריכה רק להמתין ז' נקיים. צריך רק שלא תרגיש דם בז' ימים האלו. נ\"ל שהרשב\"א – בדומה למה שינמק הרא\"ש – רואה בדברי רבא דבר מנותק לגמרי מר' זירא. לפיכך, לא רואה עניין אפילו בבדיקה.\nהוא תמה על שיטת הרמב\"ן (והרא\"ש). או שמסתכלים על אשה כזו כמי שראתה – ואז צריכה גם הפסק טהרה - או שלא. אין משמעות שרק תספור ותבדוק בלי הפסק טהרה.", "expandable": true}, {"layer": "rishon", "src": "רא\"ש — הנימוק", "srcRef": null, "txt": "הסתמכותו של הרשב\"א על מעשה דרבינא אינה מחזיקה. בנוסף, אין משמעות לישיבה של 7 נקיים בלי שתבדוק שהיא נקייה.\nהרא\"ש סובר שכל הדיון במעשה קורה עוד בערב התביעה, ושום דבר לא קורה בדיעבד. לפיכך, ר' חביבא משתכנע מראש מדברי רבי חנינא שאין הבדל בין גדולה לקטנה, ולכן מפריש את בתו הקטנה 7 ימים קודם החופה (ולכן אין 'שיטת ר' חביבא', כמו שהרשב\"א סובר).\nהרא\"ש מנמק מדוע לא צריך הפסק טהרה: המימרא של רבא היא קדם-חומרת דרבי זירא. לפיכך, אין לה דרישה של ז' נקיים כמו שרבי זירא דורש, ולכן אין צורך בהפסק טהרה. לא מדובר באשה שראתה (שעליה מוחלת חומרת דר' זירא), אלא עניין ה-7 נקיים של רבא הוא נטו מחשש שתראה בעקבות החימוד. זה לא ז' נקיים באמת. המספר המשותף, לרא\"ש, יכול להיות אקראי. רבא חושש לדם חימוד, וקובע כי החשש הזה חל 7 ימים לפני, אבל אין קשר ל-7 נקיים.", "expandable": true}, {"layer": "rama", "src": "דרכ\"מ בשם הגהש\"ד", "srcRef": null, "txt": "קודם שחתן נוגע בכלתו – צריך לשאול אותה אם שמרה 7 נקיים. וכ\"פ רמ\"א (סע' ב')"}], "pesak": null}, "mesulakot": {"title": "אצל מסולקות דמים", "seif": null, "sugya": null, "ops": [{"subhead": "קטנה"}, {"layer": "gemara", "src": "גמרא · רבינא בשם רבא", "srcRef": null, "txt": "הסיפור של רבינא ורבי חביבא. בעקבותיו אומר רבינא בשם רבא: אין הבדל בדין בין גדולה לקטנה", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.1", "txt": "בין גדולה בין קטנה שתבעוה להנשא - צריכה לשבת 7 נקיים (רבינא בשם רבא, גמרא)"}, {"subhead": "זקנה"}, {"layer": "acharon", "src": "גבעת שאול", "srcRef": null, "txt": "גם זקנה מסולקת דמים צריכה לשבת 7 נקיים"}, {"subhead": "מעוברת"}, {"layer": "acharon", "src": "תורת השלמים", "srcRef": null, "txt": "אשה שהיתה מעוברת, ואח\"כ החליטה להנשא – צריכה למנות 7 נקיים"}], "pesak": null}, "matai": {"title": "מתי מתחילה הספירה?", "seif": "סעיפים א׳-ב׳", "sugya": null, "intro": "השאלה הזאת משמעותית, מפני שהיא נוגעת בשאלה: מה בעצם גורם לדם החימוד? הקביעה עצמה של החתונה? והאם ההתקרבות לחתונה לא מגדילה את החשש? אם כן, מה ייקרה כאשר יש הפרש של יותר משבוע מיום התביעה ועד החתונה? האם נגיד שהיא צריכה להמשיך לשבת למרות שנגמרו ה-7 נקיים?\nהש\"ע פוסק בפשטות בסע' א' כרשב\"א כי הספירה מתחילה יום אחרי התביעה, אך בסע' ב' הוא והרמ\"א מעמיקים בשאלה זו.", "ops": [{"layer": "acharon", "src": "מה גורם לחימוד? — עיון", "srcRef": null, "txt": "מסתבר שהרא\"ש מייצג את העמדה שהקרבה לחופה גורמת לחימוד, ולא ההודעה על החופה. החמוד מתחיל שבוע לפני החופה.\nוהרשב\"א וריב\"א סוברים שההודעה על החתונה וההכנות לחופה גורמים לחימוד (גם אם זה יותר משבוע לפני החופה).\n(לכן, לדעת ריב\"א, אם ההודעה על החתונה היא יותר משבוע לפני החופה - אין שום צורך ב-7 נקיים)\n(זו לא בדיוק שאלה שיש בה הכרעה של הפוסקים. אבל ייתכן שהש\"ע נוטה לרשב\"א (הודעה), והרמ\"א לרא\"ש (קרבה לחופה), עפ\"י פסיקתם לקמן. אך מסע' א' משמע שהש\"ע חושש כרא\"ש. וכ\"כ הט\"ז)", "expandable": true}, {"layer": "rishon", "src": "ריב\"א", "srcRef": null, "txt": "רק אם המרחק בין ההסכמה לנישואין לחופה הוא קצר - צריכה לשבת 7 נקיים. אם יש פער של יותר מ-7 ימים בין ההסכמה לחופה - לא צריכה 7 נקיים (!)."}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "כולם דוחים את הריב\"א. הרשב\"א אומר בדיוק ההפך.", "under": true}, {"layer": "lead", "srcRef": null, "txt": "(שווה לעיין ברב מלמד. יענה על מתי צריך את ה-7 נקיים. נראה שמייצר איזון מעניין בין הרא\"ש לרשב\"א.)"}, {"subhead": "ממתי מתחילה לספור? (ביחס לחופה)"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "הספירה מתחילה יום אחר התביעה (התביעה גורמת, אבל יום התביעה עצמו לא נספר). וכן פסק בש\"ע.\nומתחילים לספור את ה-7 נקיים משעה שמתחילים להכין את החופה ('מכי רמו שערי באסינתא')"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.2", "txt": "מתחילים למנות את ה-7 נקיים בשעה ש'סומכת בדעתה ומכינה עצמה לחופה', אעפ\"י שלא נתקדשה עדיין (רשב\"א).\n(הרשב\"א כתב גם שמתחילה את הספירה יום אחר התביעה, וכן פסק הש\"ע בסע' א. נ\"ל שצריך לומר שמדובר מבחינתם באותו דבר)"}, {"subhead": "כמה סמוך לחופה צריכה לסיים לספור? (רמ\"א ב')"}, {"layer": "rishon", "src": "דרכ\"מ ברשב\"א", "srcRef": null, "txt": "ה-7 נקיים לא בהכרח אמורים להסתיים סמוך לחופה. יכולה לסיים לפני."}, {"layer": "rishon", "src": "מרדכי, רשב\"ם, רוקח", "srcRef": null, "txt": "הספירה צריכה להתחיל 7 ימים בדיוק מן הבעילה הראשונה. לכן, הטבילה צריכה להיות בלילה שקודם לכן (ההתקרבות לחופה גורמת לחימוד)"}, {"layer": "rishon", "src": "הגהות מיימ'", "srcRef": null, "txt": "אם אחר ה-7 נקיים, לאחר שטבלה, לא נבעלה - צריכה להבדק כל יום עד שתבעל (כי סוברים כרא\"ש: שכל עוד לא נבעלה, כל יום שמתקרבת לקראת הבעילה יש חשש חימוד)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "רק לכתחילה צריכה להבדק כל יום (אם יש פער בין הטבילה לתשמיש). בדיעבד – מסתפקת אפילו בבדיקה שעשתה ב-7 נקיים", "under": true}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.2", "txt": "+ הטבילה לקראת בעילת מצווה צריכה להעשות כמה שיותר קרוב (מרדכי, רוקח).\n+ והמנהג הוא שאם כלה מתחתנת ביום ד', תטבול אז, למרות שלא ישמשו עד מוצ\"ש (כלומר גג 3 ימים הפרש בין הטבילה לבעילה).\n+ אם בעילת מצווה לא תקרה עד 3 ימים אחר ה-7 נקיים – לכתחילה צריכה לבדוק כל יום (הגהות מיימ'). אבל בדיעבד יכולה להסתפק אפילו בבדיקה שעשתה ב-7 נקיים (ב\"י)"}], "pesak": null}, "dachu": {"title": "אם דחו את הנישואין", "seif": "סעיף ג׳", "sugya": null, "intro": "נקדים שהדיון פה הוא השלכה מתבקשת של שאלת הגורם לדם החימוד. בדברי המהרמ\"מ בשם הרשב\"ם אין ממש נטייה לרשב\"א או לרא\"ש, אלא פשוט יישום של עיקר הדין.", "ops": [{"layer": "acharon", "src": "עיון — הגורם לחימוד מחודש", "srcRef": null, "txt": "בעז\"ה אכתוב יותר באריכות, אף כי אולי לא מאוד נצרך.\nלקמן אציע מדברי הט\"ז כי מוצע כאן גורם חדש לדם החימוד: התרגשות מחודשת מהחופה (לאחר שהבטחון נשמט).\nעל אף שהרשב\"ם לא בהכרח מביע נטייה לרשב\"א או הרא\"ש בשאלת הגורם לחימוד, זו כן שאלה טובה כיצד יש להבין את המהרמ\"מ ברשב\"ם. את שימושו של הט\"ז בביטוי 'סומכת בדעתה' המופיע בלשון הרשב\"ם, ניתן להבין כבטחון בכך שהחופה אכן תקרה. לפיכך, המקרה עליו מדבר המהרמ\"מ צריך לשאת התפתחות לפיה יש לכלה חשש שהחתונה לא תקרה. שכן, אם כך יהיה, כאשר לבסוף יישתנו שוב העניינים, ויחליטו במחודש על קיום החתונה – תתרגש כ\"כ הכלה במידה שתגרום לחימוד. לכן סובר הט\"ז שרק שינוי שפירושו ביטול של החתונה יכול להיות שינוי כזה.\nנראה שהלבוש נצרך לדחוק פחות בלשון המהרמ\"מ, ומבין כי 'סומכת בדעתה' הוא מושג שמתכוון לסמיכות האירוע. הוא סובר שהחימוד אינו בריגוש מעצם התכנות החתונה וההודעה עליה, אלא בהתקרבות לחופה עצמה ולמועד שלה (ובדומה לרא\"ש). לכן, גם דחייה פשוטה של תאריך תיצור בהמשך התרגשות נוספת, כששוב ייתקרב האירוע.\nנראה לי שניתן להציע הבנה של רק דחייה של התאריך, ולא ביטול של ממש, תוך אחיזה בסברת הט\"ז שההודעה על החתונה והקביעה שלה גורמת לחימוד. הבנה כזו אפשרית במקרה בו למרות שמדובר 'רק' בדחייה, הרי שהיא מערערת את התכנות החתונה. עיון בלשון המרדכי בפנים מאשר אפשרות זו: הוא מציג מקרה בו הדחייה מגיעה מפני שההורים של בני הזוג לא מגיעים להסכמה בענייני הנדוניה או ההוצאות על החתונה. מובן אם כן כי דחייה מסיבות כאלו מערערת את ההתכנות של החתונה, וגורמת לייאוש אצל הכלה.\nלשון הש\"ע קרובה יותר להבנת הט\"ז (ובלשון המרדכי-מהרמ\"מ בפנים) שמדובר בספק ממשי על התכנות החתונה, שכן כותב ש\"דחו את הנישואין מאיזו סבה.. כשיתפשרו לעשות הנשואין\".", "expandable": true}, {"layer": "rishon", "src": "מהרמ\"מ (בשם רשב\"ם)", "srcRef": null, "txt": "אם קבעו נישואין, ישבה 7 נקיים, אבל לאחמ\"כ דחו את התאריך – צריכה לשבת שוב שבעה נקיים (משום שלא 'סומכת בדעתה' שהנישואין אכן ייקרו, וכשנקבע)"}, {"layer": "rishon", "src": "מהרי\"ק", "srcRef": null, "txt": "מביא מחלוקת שונה: אם דחו את החופה ביום יומיים (באמצע או בסוף ה-7 נקיים), האם יכולה להמשיך בבדיקות עד החופה, או שצריכה לספור שוב 7 מההתחלה? (נפק\"מ אם יוכלו לשמש סמוך לחופה או שיחכו כמה ימים)"}, {"layer": "rishon", "src": "י\"א (מחמירים)", "srcRef": null, "txt": "לא יעזור לה להשלים ולהמשיך לבדוק ביומיים האלו, גם אם בדקה בכל התקופה כדין. משום שבגלל שדחו את הנישואין, חלק מהבדיקות שלה לא היו טובות. לכן צריכה מחדש ז' נקיים.", "under": true}, {"layer": "rishon", "src": "י\"א (מקילים)", "srcRef": null, "txt": "אם בדקה כל התקופה כדין – אין סיבה שלא תמשיך ותבדוק עד החופה. רק אם בגלל הדחייה הפסיקה לבדוק (מתוך ייאוש), אז תצטרך להתחיל לספור 7 מחדש.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.3", "txt": "אשה שלקראת חתונתה כבר ישבה שבעה נקיים, אך מסיבה כלשהי דחו את הנשואין, אם וכאשר יחליטו מחדש ויסכימו על קיום החתונה – תצטרך שוב לשבת שבעה נקיים (מהרמ\"מ עפ\"י רשב\"ם)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "גם אם האשה המשיכה בבדיקות מיום שסיימה את ה-7 נקיים הראשונים – הבדיקות לא מועילות. צריכה להתחיל ספירה חדשה של 7 נקיים (עפ\"י הי\"א המחמירים במהרי\"ק)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "(כך מבין גם בכל הנו\"כים) מעמיד מעין שילוב בין הש\"ע (במהרמ\"מ)-ט\"ז לי\"א המקלים במהרי\"ק:\nאם דחו ועדיין לא קבעו זמן אחר (ספק ממשי שלא תהיה חתונה) – רק אז חוששים גם שלא בדקה יפה, וגם שיחזור חימוד כשייקבעו מחדש.\nאבל אם דחו לתאריך קונקרטי אחר (ואין ספק לקיום החתונה) – בוודאי שגם הקפידה על בדיקותיה, וגם לא היה חידוש חימוד. ולא צריכה שוב 7 נקיים.\nאבל אם דחו לתאריך רחוק – אז יהיה חידוש חימוד בכל מקרה. וצריכה שוב ז' נקיים."}], "pesak": null}, "mechudash": {"title": "מה ייגרום לחימוד מחודש?", "seif": null, "sugya": null, "intro": "(הדיון בפוסקים הוא המשך ישיר לדעת המהרמ\"מ ברשב\"ם ואף מדייק את ההבנה בו, שההתרגשות היא שגורמת לחימוד.) אם כבר ישבה 7 נקיים – מה ייגרום לה שוב להתרגשות וחימוד, כך שנדרוש שוב 7 נקיים?", "ops": [{"layer": "acharon", "src": "לבוש", "srcRef": null, "txt": "אפילו אם רק דוחים - צריכה שוב שבעה נקיים. (תופס שהחופה וסביב לה הם מה שמרגש. ואז ברגע שדוחים – כשייתקרב המועד החדש, תתרגש ותתחמד שוב) (ב\"ח וט\"ז כמובן חולקים)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אך ורק אם ממש מבטלים את החתונה, אז קביעה מחדש תגרום להתרגשות. הוא תופס שעצם ההכרזה-הודעה על הנישואין היא המרגשת וגורמת לחימוד. אבל אם רק דוחים קצת, או שרק צד אחד רוצה לבטל, עדיין הכלה 'סומכת דעתה' שבסוף הכל ייסתדר; לכן, כאשר הכל באמת ייסתדר, לא תתרגש כל כך. בנוסף, גם לגבי ביטול הוא סובר שרק אם שהו במצב של ביטול יום-יומיים, תצטרך שוב שבעה נקיים."}, {"layer": "acharon", "src": "ט\"ז — לשון המקור", "srcRef": null, "txt": "~~\"ע\"פ שזה נמשך יום או יומים לא מקרי זה דחיית הנשואין דהכלה דעתה סומכת תמיד באותו זמן שיתפתה החתן בכך דאי תימא דאף בזה שייך חימוד חדש כשיצא הספק מלבה ונעשה ודאי הא גם ביום הנשואין עצמו זמנין הרבה שהחתן מעקש ואומר בפירוש שלא ירצה לישאנה עד לאחר איזה שעות שנעשה שלום ביניהם וכי תצטרך הכלה לישב שבעה נקיים מחדש וזה לא נשמע ולא נראה אדרבה מעשה בכל יום שאין משגיחין בזה\"~~", "expandable": true}, {"layer": "acharon", "src": "ערוה\"ש (שיא)", "srcRef": null, "txt": "\"אם החופה היתה בדרך והכלה באה לזמן המוגבל והחתן לא בא... אם ימים שנים או שלשה לא בא לזמן המוגבל ואין ידיעה ממנו בוודאי לבה דופקה והייאוש גובר\"."}, {"layer": "acharon", "src": "ט\"ז (נוסף)", "srcRef": null, "txt": "אם החתן מבריז מהחופה, היא בוודאי בטוחה שהוא פשוט לא רוצה אותה. לכן, כשיחזרו ובסוף תגלה הכלה שהם כן מתחתנים - וודאי גורם שוב לחימוד וצריך עוד 7 נקיים."}, {"layer": "acharon", "src": "באר היטב (ס\"ק ג)", "srcRef": null, "txt": "'נתפרקה החבילה' — כאשר התפרק השידוך ושב.", "collapsed": true}, {"layer": "acharon", "src": "ערוה\"ש (יג)", "srcRef": null, "txt": "כאשר האשה מבטלת (לא החתן), ומתרצה - צריכה שוב 7 נקיים. שהרי רצתה באמת לבטל."}, {"subhead": "עוד מקרים"}, {"layer": "acharon", "src": "חתם סופר", "srcRef": null, "txt": "נשאל ע\"י רב לגבי אשה שלא פגשה את השידוך שלה. השואל סבר להחמיר שה-7 נקיים לא תופסים, מפני שאין כ\"כ חימוד כשאינה מכירה אותו (סוטה: אין יצר הרע שולט אלא במה שעיניו רואות).\nהחתם סופר עצמו סבר להתיר, ולדעתו ההרהור והחימוד הוא לא על גוף מסוים."}], "pesak": null}, "machzir": {"title": "המחזיר גרושתו", "seif": "סעיף ה׳", "sugya": null, "ops": [{"layer": "shulchan", "src": "הר\"ש בן הרשב\"ץ, ש\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.5", "txt": "המחזיר גרושתו – צריכה לשבת שבעה נקיים (מסתדר עם כל הדיון ברשב\"ם ובט\"ז בעניין 'סומכת דעתה' והתרגשות. כי איחוד מחודש כזה לאחר גירושין יוצר חימוד ותשוקה)"}], "pesak": null}, "asurim": {"title": "כשזוג אסורים אחר חופתם", "seif": "סעיף ד׳", "sugya": null, "intro": "דין מי שעבר וכנס בזמן שבעה נקיים; ומי שפרסה נדה לפני ששימשו לראשונה. העקרון שמגדיר אם ייחוד מותר או לא - האם יצרו תוקפו או לא.", "ops": [{"subhead": "מי שעבר וכנס אשה בלי שספרה 7 נקיים"}, {"layer": "lead", "srcRef": null, "txt": "לפי הדין של סע' א' אסור להתחתן עם מי שלא סיימה לספור 7 נקיים של חשש חימוד."}, {"layer": "gemara", "src": "יבמות (פ' החולץ)", "srcRef": null, "txt": "רב שנשא נשים לימים שהיה בדרדשיר. איך מסתדר עם גזרת רבא? יכול להיות שהתחתן בלי 7 נקיים? ומשמע שאולי לת\"ח יש היתר בזה.", "ref": {"label": "יבמות · פרק החולץ", "ref": "Yevamot.37b"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "ת\"ח יכול להתחתן ב-7 נקיים האלו (ב\"י: ואחרי החתונה יחיו בנפרד)"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "גם לת\"ח אסור להתחתן ב-7 נקיים האלו", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.4", "txt": "לא חילק בין ת\"ח לאדם רגיל, ונראה שאוסר לכולם להתחתן ב-7 נקיים."}, {"layer": "rishon", "src": "רשב\"א, רי\"ף, רא\"ש", "srcRef": null, "txt": "מי שעבר והתחתן (לפני שספרה 7 נקיים מהתביעה) - אסור להתייחד עמה"}, {"layer": "rishon", "src": "רשב\"א, סמ\"ג תרומה", "srcRef": null, "txt": "מה עניין הדין? הרי אינה נדה! אלא חוששים שיצרו יגבור עליו ויבוא עליה", "under": true}, {"layer": "rishon", "src": "מ\"מ ברמב\"ם", "srcRef": null, "txt": "ת\"ח שעבר וכנס: מתיר לת\"ח גם להתייחד אחר החתונה (ת\"ח יודע שאסור לבוא עליה)", "under": true}, {"layer": "rishon", "src": "ב\"י ברמב\"ם", "srcRef": null, "txt": "על אף שמתיר לת\"ח להתחתן, אסור לו להתייחד", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.4", "txt": "חתן שפשע והתחתן עם אשה בלי שסיימה לספור שבעה נקיים – אסורים להתייחד, וישן עם הגברים, והיא עם הנשים (ולא חילק בין ת\"ח לעם הארץ) (רשב\"א, רי\"ף, רא\"ש)"}, {"subhead": "מי שאשתו פרסה נדה אחר החתונה, לפני שהספיקו לשמש"}, {"layer": "gemara", "src": "ברייתא (כתובות)", "srcRef": null, "txt": "מי שפרסה אשתו נדה - הוא ישן בין הגברים והיא ישנה בין הנשים (אסור להם להתייחד)", "ref": {"label": "כתובות · פרק אף על פי", "ref": "Ketubot.61a"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "אם כבר בא עליה פעם אחת, ורק אח\"כ נטמאת – מותר להם להתייחד (ב\"י: כי אין יצרו תוקפו יותר)"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "חתן שכלתו פרסה נדה עוד לפני שהספיק לבוא עליה – אסור להם להתייחד (כברייתא, וכרמב\"ם). ומשמע שאם כבר שימשו – מותר להם להתייחד, כרמב\"ם. וכ\"כ הש\"ך"}, {"subhead": "אם הייתה טהורה, לא שמשו, ואח\"כ פרסה נדה"}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "זוג שלא שכבו לאחר שהתחתנו כמה ימים למרות שהיתה טהורה:\n**אחד מן הגדולים** – אסורים להתייחד. שהרי עדיין לא בא עליה ויצרו תוקפו.\n**חד מרבוותא** – מותרים להתייחד. אם עד עכשיו לא בא עליה למרות שיכלו - ברור שיצרו לא כ\"כ גדול.\nתרוה\"ד מצדד להקל, אך המחמיר תבוא עליו הברכה"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "י\"א שאשה שהייתה טהורה כשהתחתנו, ולא שימשו כמה ימים, ואח\"כ פרסה נדה - יכולים להתייחד ('חד מרבוותא'), והמחמיר תבוא עליו הברכה (תרוה\"ד)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "חולק. זה איסור גמור.", "under": true}, {"layer": "acharon", "src": "ש\"ך בנקה\"כ", "srcRef": null, "txt": "מצדד בתרוה\"ד והרמ\"א (אבל לא בהכרח להלכה)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "האידנא המנהג לא לשמש, אלא רק אחרי יומיים שלשה. במקרה זה, ברור שאם פרסה נדה אחרי יומיים שלשה שאסורים להתייחד (שהרי אין הטעם של 'אין יצרו תוקפו' נכון. הם לא שכבו רק בגלל המנהג). (אבל דעת הש\"ך עצמו ביחס למנהג של לא לשמש ביומיים-שלושה - מנהג שטות)"}, {"subhead": "אלמן / אלמנה (זוג שאחד מהם כבר קיים)"}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "אלמן - אין לחוש שיבוא על נדה. גם אם הוא ואשתו החדשה לא שימשו עדיין (ההתנסות מורידה את היצר)"}, {"layer": "rishon", "src": "רמ\"ה", "srcRef": null, "txt": "קצת שונה מהדיון. הוא מדבר על הדם, ולא על הנסיון והיצר (לראות ס\"ק יג)", "under": true}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "אין הבדל בין רווק לאלמן, ולא בין בתולה לאלמנה"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "ר' ירוחם"}, {"subhead": "השגחה על האסורים להתייחד"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "צריך שומרים לאחד מהם (ולא לשניהם. עפ\"י ראב\"ד ורשב\"א). אבל אם ישנים בחדרים נפרדים - לא צריכים שומרים (ב\"י ברשב\"א). וי\"א שבלילה צריך שומרים גם לחתן וגם לכלה (ראב\"ד)"}, {"subhead": "ביום לעומת לילה"}, {"layer": "rishon", "src": "ר' ירוחם, ראב\"ד", "srcRef": null, "txt": "רק בלילה אסורים להתייחד יותר מברגיל. ביום - כדין ייחוד רגיל (של שאר נשים)"}, {"layer": "rishon", "src": "רא\"ש, רז\"ה", "srcRef": null, "txt": "גם ביום וגם בלילה אסורים יותר מברגיל. הם בתקופה להוטה (עדיין לא בא עליה מאז הנישואין)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "י\"א שרק בלילה אסורים בייחוד וביום לא (ר' ירוחם, ראב\"ד); וי\"א שאסורים בייחוד ביום כמו בלילה (רא\"ש, רז\"ה). והמנהג שביום מתייחדים רק בנוכחות קטן או קטנה"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "mesulakot"}, {"type": "sec", "id": "matai"}, {"type": "sec", "id": "dachu"}, {"type": "sec", "id": "mechudash"}, {"type": "sec", "id": "machzir"}, {"type": "sec", "id": "asurim"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"דם חימוד": "דם הנגרם (לחשש חכמים) מתוך תשוקה והתרגשות לקראת הנישואין.", "תבעוה להנשא": "הציעו לה להינשא והסכימה ונקבע מועד — מכאן מתחיל חשש דם חימוד.", "נתפיסה": "נקבע מועד/הוסכם על הנישואין.", "שבעה נקיים": "שבעה ימים נקיים מדם שצריכה לספור קודם החופה.", "הפסק טהרה": "בדיקה בסוף הראייה המפסיקה את ימי הטומאה ומאפשרת תחילת ספירת הנקיים.", "מסולקות דמים": "נשים שאינן רואות דם (קטנה, זקנה, מעוברת) — ואעפ\"כ צריכות שבעה נקיים.", "סומכת בדעתה": "בטוחה שהחופה תתקיים — ביטוי מפתח במחלוקת הגורם לחימוד.", "יצרו תוקפו": "העיקרון המתיר/אוסר ייחוד — אם יצרו גובר (טרם שימשו) אסורים להתייחד.", "מכי רמו שערי באסינתא": "'משעה ששורים שעורים בעריבה' — כלומר משמתחילים בהכנות החופה."}, "subject": "נידה", "id": "dam"}, {"topic": {"title": "רואה מחמת תשמיש", "eyebrow": "מבחני הרבנות · נידה · סימן קפ\"ז", "siman": "Shulchan_Arukh,_Yoreh_De'ah.187", "intro": {"lead": {"t": "", "ref": ""}, "body": "אשה הרואה דם מחמת תשמיש שלוש פעמים רצופות – נאסרת לבעלה, מחשש שהדם דם נידה הבא מן המקור בעקבות התשמיש. לאחר שלושה בעלים – אסורה לכל, עד שתבדוק בשפופרת ומכחול.\n\nסימן זה עוסק בהגדרת הראייה האוסרת (זמן ואופן הבדיקה), בבדיקת השפופרת, בתליית הדם בסיבה אחרת (וסת, מכה, בתולים, לידה), בעקירת החזקה (רפואה, הפחדה), וב'וסת רמ\"ת' (זמן קבוע)."}}, "sections": {"ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳, י\"ב", "sugya": null, "intro": "בקצרה: אשה שראתה דם מחמת תשמיש 3 פעמים רצופות - אסורה לשמש עם אותו האיש.\nולש\"ע, רק אם האשה מבצעת את הבדיקה (ומוצאת בה דם) מיד אחר התשמיש, אבל לאחמ\"כ - כבר נגיד שאולי הדם הגיע אחר התשמיש.\nולרמ\"א כל עוד הבדיקה נעשית 'סמוך לתשמיש' - נחשבת כדי להספר.\nלרוב הפוסקים (ש\"ך, ט\"ז, חוו\"ד) הספירה היא 3 תשמישים של ראיית דם; אך לראב\"ד ותורת השלמים נאסרת רק לאחר 4 ראיות.", "ops": [{"layer": "gemara", "src": "גמרא · ברייתא", "srcRef": null, "txt": "**ברייתא**: הרואה דם מחמת תשמיש - משמשת פעם ראשונה ושניה ושלישית. מכאן ואילך - לא תשמש, עד שתתגרש ותנשא לאחר.\nניסת לאחר וראתה דם מחמת תשמיש - משמשת פעם ראשונה ושניה ושלישית, מכאן ואילך לא תשמש עד שתבדוק עצמה.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "הדין הוא רק אם ראתה 3 פעמים רצופות"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.1", "txt": "אשה שרואה דם מחמת תשמיש 3 פעמים רצופות – אסורה לבעלה, ותתגרש.. וכן הלאה עד 3 בעלים (כברייתא + רשב\"א).\nואחר 3 בעלים שנאסרה כנ\"ל - אסורה לכל העולם, אא\"כ תבדוק את עצמה בשפופרת"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "גם אם הדם נראה על עד של הבעל – נחשב לראייה האוסרת"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אבל אם הם בודקים מיד, ואצלה אין דם ואצלו יש – תולים את הדם בו, ולכן לא נספר לאסור אותה"}, {"subsubhead": "דין רמ\"ת אצל 3 בעלים"}, {"layer": "lead", "srcRef": null, "txt": "אחר כמה בעלים אנו אומרים שאשה רואה תמיד מחמת תשמיש, ונאסור עליה לשמש עם כל אדם (עד שתבדק בשפופרת)?"}, {"layer": "gemara", "src": "יבמות · רבי · רשב\"ג", "srcRef": null, "txt": "**בברייתא שלנו בנדה סו**: אחר 3 בעלים שאתם נמצאה רמ\"ת.\nביבמות מחלוקת: **רבי** – אחר 2 בעלים; **רשב\"ג** – אחר 3 בעלים.\n**סמ\"ג**: הלכה כרבי.\n**רמב\"ם, ראב\"ד** ורוב הפוסקים: כברייתא שלנו (אחר 3 בעלים)", "ref": {"label": "יבמות · פרק הבא על יבמתו", "ref": "Yevamot.64b"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "אשה שראתה מחמת תשמיש 3 פעמים רצופות, עם 3 בעלים שונים - נאסרת (לתשמיש עם כל אדם)"}, {"subhead": "האם רמ\"ת הוא וסת או חולי?"}, {"layer": "acharon", "src": "ש\"ך, נודע ביהודה", "srcRef": null, "txt": "רמ\"ת הוא וסת. ותו: וסת אונס (וסת סיבה, שהרי מעשה התשמיש גורם).\nלהגדירה כוסת אונס נותן קולא: למדנו (בקפ\"ט סע' יז) שוסת אונס אי אפשר לקבוע רק על בסיס הסיבה, אלא רק בצירוף ימים מסוימים. לכן, אם אשה רואה מחמת תשמיש אך לא לפי זמן מסוים, מספיק שתקבע וסת כלשהו - ובכך 'תעקור' את 'וסת התשמיש'."}, {"layer": "acharon", "src": "חוו\"ד, ערוה\"ש", "srcRef": null, "txt": "רמ\"ת זה לא וסת. זו מעין תופעת חולי (\"חולה ממלאה ונופצת\").\nלכן, גם אם קבעה וסת אחר - ממשיכה לחשוש למחלה."}, {"subsubhead": "נפק\"מ: כשמעוברת / מניקה"}, {"layer": "lead", "srcRef": null, "txt": "אם אשה ראתה מחמת תשמיש 3 פעמים, אך אחרי התשמיש השלישי – התעברה. האם מותרים לשמש בזמן ההריון וההנקה?"}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "אפילו אם נתעברה - אסורה (כי זה חולי, וככזה יכול לבוא גם בהריון/הנקה)"}, {"layer": "acharon", "src": "נודע ביהודה", "srcRef": null, "txt": "אם נתעברה - מותרת כשתהיה מסולקת דמים (הוכר עוברה; ימי ההנקה); אבל אח\"כ חוזרת לאיסורה"}, {"layer": "acharon", "src": "סדרי טהרה", "srcRef": null, "txt": "לא חוזרת אחר הלידה וההנקה לאיסורה. מותרת (שהרי ימי ההריון/הנקה הוכיחו שלא רמ\"ת! שהרי שימשו בהם ולא ראתה)", "under": true}, {"subhead": "דיונים נוספים"}, {"subsubhead": "רמ\"ת פעמיים, ובפעם השלישית לא בדקה"}, {"layer": "lead", "srcRef": null, "txt": "אם אשה ראתה פעמיים מחמת תשמיש, אבל אח\"כ שימשו בלי לבדוק, ואז שוב שימשו וראתה מחמת תשמיש."}, {"layer": "acharon", "src": "חוו\"ד", "srcRef": null, "txt": "נחשב כשלוש פעמים רצוף, ונאסרת (כי גם כשלא בדקו דיממה, אך לא ידעה)"}, {"layer": "acharon", "src": "המהרש\"ם, טהרת הבית", "srcRef": null, "txt": "לא נחשב כ-3 פעמים רצופות, ולא נאסרת לבעלה"}, {"subsubhead": "ראתה דם בשפע"}, {"layer": "acharon", "src": "נודע ביהודה", "srcRef": null, "txt": "אשה שרמ\"ת 3 פעמים ונאסרת, אלא שכשראתה - ראתה דם בשפע: אסור לה אפילו להתחתן עם אחר (מפני שההיתר להנשא עם אחר הוא ספק ספקא: שמא ראתה מהצדדים ולא מהמקור, ושמא האצבע של האיש הבא לא תהיה שווה. ואם הדם יוצא בשפע - בוודאי מן המקור)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "הטעם – שאולי עם אחר התשמיש לא ייגרום לדימום", "under": true}, {"layer": "acharon", "src": "שבות יעקב", "srcRef": null, "txt": "זקנה: מי שהפסיקה לראות דם מחמת זקנותה, ועכשיו בשעת התשמיש התחילה לראות ומרגישה כאבים – אינה צריכה בדיקת שפופרת. אין זה דם נידה אלא מכה (תולים בזקנותה)."}, {"subhead": "מה נחשב ראייה (א')"}, {"layer": "lead", "srcRef": null, "txt": "לא כל ראייה לאחר התשמיש נחשבת כראייה מחמת התשמיש, אלא רק ראייה שאנו בטוחים שקרתה בעקבות התשמיש. תנאי ראשוני הוא זמן הבדיקה: רק אם הבדיקה נעשית בסמיכות של ממש לתשמיש, נתאים בין הדם לתשמיש."}, {"layer": "gemara", "src": "גמרא · רב אשי", "srcRef": null, "txt": "**רב אשי**: אם אין עד בידה - כדי שתושיט ידה לתחת הכר/הכסת ותקח עד ותבדוק בו. אם יש עד בידה – כדי שתרד מהמיטה ותדיח פניה. שהוא אותו שיעור זמן.", "ref": {"label": "נדה · פרק כל היד · יד ע\"א", "ref": "Niddah.14a"}}, {"layer": "shulchan", "src": "ש\"ע, רמב\"ם, רשב\"א", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.1", "txt": "כדי שתושיט ידה מתחת לכר/הכסת ותטול עד ותבדוק בו"}, {"layer": "rishon", "src": "טור, סמ\"ג", "srcRef": null, "txt": "בכדי שתרד מהמיטה ותדיח פניה"}, {"layer": "rama", "src": "רמ\"א, ראב\"ד בשם י\"א", "srcRef": null, "txt": "כל בדיקה סמוך לתשמיש (כי אנו לא בקיאין בשיעורין)"}, {"subsubhead": "סמיכות הבדיקה (הראייה)"}, {"layer": "gemara", "src": "משנה · ברייתא · גמרא", "srcRef": null, "txt": "**משנה**: נמצא על עד שלה אותיום (מיד) - טמאין וחייבין קרבן; לאחר זמן - טמאין מספק ופטורין מקרבן. איזהו אחר זמן? כדי שתרד מן המטה ותדיח פניה.\n**ר' אליעזר ברבי צדוק** (ברייתא): כדי שתושיט ידה לתחת הכר/הכסת ותקח עד ותבדוק בו.\n**רב אשי**: מבחינת הזמן זה אותו שיעור; יותר מזה – לא ייספר להחשיב כרמ\"ת.", "ref": {"label": "נדה · פרק כל היד · יד ע\"א", "ref": "Niddah.14a"}}, {"layer": "rishon", "src": "רשב\"א, רמב\"ם (ב\"י)", "srcRef": null, "txt": "כדי שתושיט ידה מתחת לכר/הכסת ותטול עד ותבדוק בו (ב\"י: זמן קצר יותר)"}, {"layer": "rishon", "src": "תרומה, סמ\"ק, סמ\"ג, טור", "srcRef": null, "txt": "בכדי שתרד מהמיטה ותדיח פניה (ב\"י: זמן ארוך יותר)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "מצדד ברמ\"א והי\"א בראב\"ד. ואם בתוך השיעור בדקה ולא ראתה ואח\"כ שוב וראתה - לא נחשב שרמ\"ת."}, {"layer": "acharon", "src": "טה\"ב / דר\"ט", "srcRef": null, "txt": "טה\"ב: סמוך לסיעת הרמ\"א - עד 3 דקות. דר\"ט: אפילו אם מצאה תוך חצי שעה – נחשבת שרמ\"ת."}, {"subsubhead": "אופן הבדיקה"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "הבדיקה שצריך לעשות היא רק בדיקה חיצונית (קינוח), ולא בחורים ובסדקים.", "ref": {"label": "נדה · פרק כל היד · יד ע\"א", "ref": "Niddah.14a"}}, {"layer": "shulchan", "src": "רשב\"א, רמב\"ם, ש\"ע", "srcRef": null, "txt": "קינוח"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "גם אם מוצאים על העד של הגבר – נחשב מחמת תשמיש"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "אם מצאו על העד שלו - אפילו אחר זמן מופלג חשיב רמ\"ת (שהרי לגבר אין סיבות אחרות לראות דם, אלא רק מחמת אותו התשמיש)", "under": true}, {"subsubhead": "הראייה הראשונה (3 או 4)"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "הראייה הראשונה לא נחשבת (נאסרת אחר 4 תשמישים שבהם ראתה)"}, {"layer": "rishon", "src": "רמב\"ם, רמב\"ן, האשכול", "srcRef": null, "txt": "הראייה הראשונה נחשבת (נאסרת אחר 3 תשמישים)"}, {"layer": "acharon", "src": "החת\"ס", "srcRef": null, "txt": "אם מישהי תגיע אלינו אחר פעם/פעמיים - הפעם השלישית תאסור. בדיעבד, אשה שהגיעה לשאול כבר אחר 3 ראיות - ניתן לה פעם נוספת."}, {"subsubhead": "מיד אחר נישואים?"}, {"layer": "rishon", "src": "ר\"ח", "srcRef": null, "txt": "דין רמ\"ת הוא רק אם 3 הראיות היו ב-3 התשמישים הראשונים של הזוג. אם היה אפילו תשמיש אחד ללא ראייה - לא תיאסר."}, {"layer": "rishon", "src": "תוספות, מרדכי, רמ\"א", "srcRef": null, "txt": "דין רמ\"ת קיים תמיד, גם אם בתשמישים הראשונים לא ראתה."}, {"subhead": "האם ניתן לזוג להשאר נשואים כשהוחזקה רמ\"ת? (י\"ב)"}, {"layer": "rishon", "src": "מהרמ\"מ, רשב\"א בתשובה", "srcRef": null, "txt": "זוג שרואים מחמת תשמיש (3 פעמים) ואסורים לשמש - אסור להם להשאר יחד, מחשש שיעברו וישמשו. ודווקא בגלל שהאיסור רק דרבנן (רמ\"ת זה וסת, וחשש וסתות דרבנן) - יזלזלו וישמשו."}, {"layer": "rishon", "src": "מהרמ\"מ", "srcRef": null, "txt": "אם יש אדם שלישי (שיוסר החשש), ויהיו יחד רק בנוכחותו – יכול להשאירה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.12", "txt": "אשה שרמ\"ת 3 פעמים ונאסרה – אסור לו להשאירה (וצריכים להתגרש), אא\"כ ידאג לאדם שלישי שתמיד יהיה שם."}, {"layer": "acharon", "src": "מהר\"ם פדאווה, ערוה\"ש", "srcRef": null, "txt": "אם לא גרים יחד – לא צריך עדים (המרחק נחשב לעדים). אבל אם לא קיימו פרו ורבו – צריכים להתגרש."}, {"layer": "acharon", "src": "פת\"ש בשם רמ\"א באה\"ע", "srcRef": null, "txt": "מצד שלא קיימו פו\"ר - לא אכפת לנו, כי בזמן הזה נהגו שלא לכוף על פרייה ורבייה", "under": true}], "pesak": null}, "shfoferet": {"title": "בדיקת השפופרת", "seif": "סעיפים ב׳-ג׳", "sugya": null, "intro": "לאחר שראתה 3 פעמים מחמת תשמיש עם 3 בעלים היא נאסרת. אולם בדיקת שפופרת (שעל גבה מכחול ומוך) יכולה להתירה. הבדיקה מדמה תשמיש: אם יימצא דם על ראש המוך – הדם מן המקור, וכל תשמיש יגרום לדימום, ואסורה לכולם. אם לא – מדובר בדם מכה, ומותרת.\nהש\"ך: אם הבדיקה יוצאת טוב, מותרת אף לגבר השלישי. ורוב הראשונים: הבדיקה מועילה גם בשלבים מוקדמים (להצילה מגירושין מבעלה הראשון).", "ops": [{"subhead": "עיקר הדין (ב')"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "אשה שראתה מחמת תשמיש 3 פעמים עם 3 בעלים - אסורה לכל העולם, עד שתבדוק עם שפופרת ומכחול עם מוך. אם יימצא דם על ראש המכחול – דם מן המקור, ואסורה לאחרים. אם לא - דם מן הצדדים, ומותרת.", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.187.2", "txt": "כתב הדין כדברי הברי
