רית.", "הנץ החמה": "זריחת השמש; זמן 'מצוותה' של שחרית לכתחילה.", "ותיקין": "המקדימים למצוות ומדקדקים לקיימן בזמנן — מתפללים עם הנץ החמה.", "מצוותה": "הזמן המובחר לקיום המצווה (בשחרית — הנץ החמה).", "סמיכת גאולה לתפילה": "לסמוך את ברכת 'גאל ישראל' (סוף ק״ש) לתפילת עמידה בלא הפסק.", "משיכיר": "הזמן שבו מכיר את חברו הרגיל ברחוק ד׳ אמות — זמן ק״ש לכתחילה.", "שעת הדחק": "מצב אילוץ (כמשכים לדרך) שבו הקילו להתפלל מעלות השחר.", "צפרא דמרי טב": "'בוקר טוב לאדוני' — נוסח ברכת שלום המותר (שאינו לשון 'שלום').", "מלאכת מחשבת": "מלאכה מכוונת ומתוכננת; דין הקובע חיוב במקצת מלאכות שבת."}, "subject": "תפילה וברכות", "id": "tefila"}, {"topic": {"title": "מילה בשבת", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן של״א", "siman": "Shulchan_Arukh,_Orach_Chayim.331", "intro": {"lead": {"t": "וְבַיּוֹם הַשְּׁמִינִי יִמּוֹל בְּשַׂר עׇרְלָתוֹ (ויקרא)", "ref": "Leviticus.12.3"}, "body": "ברית המילה צריכה להיעשות ביום השמיני. אך מה קורה אם היום השמיני יוצא בשבת?\n\nבפרק רבי אליעזר דמילה, מובא בגמרא כי מילה דוחה את השבת ('וביום השמיני ימול בשר ערלתו – אפילו בשבת')\\cite{בבלי · שבת · קלב ע\"א}{Shabbat.132a}.\n\nולפיכך, נאמר במשנה כי עושים כל צרכי מילה בשבת\\cite{בבלי · שבת · קלג ע\"א}{Shabbat.133a}. היינו שמותר 'לחלל' את השבת בעשיית כל מעשי המילה.\n\nאולם, דווקא את המילה עצמה מותר לעשות בשבת. אך מכשיריה – אשר ניתן להכין מערב שבת – לא דוחים השבת אפילו בדרבנן. (לכן אסור להביא סכין בשבת או לשחוק כמון וכו')\n\nלפיכך, כתבו הפוסקים, שאם אדם לא הכין לשבת את הדברים הנצרכים למילה, יש לדחות אותה; ואסור לחלל את השבת כלל על מנת להשיגם. אולם, אם יש לו גוי, מותר לומר לו לעבור על דרבנן לשם כך (למשל, שיביא סכין מרשות בדרבנן. ולדעת הרמ\"א במקום צורך גדול -כגון כאן- מותר אף להגיד לו לעבור בדאורייתא).\n\nוגם, מותר להכין את הכשרי המילה שבהכנתם עוברים בדרבנן בשינוי (משום שקיי\"ל שהתירו שבות ע\"י שינוי לצורך זה).\n\nבעצם, זה שלא מחללים על מכשירי מילה אלא רק לצרכה ממש, אין זה אומר שהמילה חשובה פחות משאר פיקוחי נפש מהבחינה הזאת. אלא שהיא דבר שאנו יודעים עליו מראש, לכן יש להתכונן בהתאם ולהימנע מחילול שבת שאינו נצרך בכל מידה שניתן. ניתן לדרג את ענייני פיקוח נפש, יולדת ומילה במדרג זה: פיקוח נפש → יולדת → מילה."}}, "sections": {"tzorchei": {"seif": "סעיף א׳", "title": "צרכי ומכשירי מילה", "sugya": null, "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "עושין כל צרכי מילה בשבת: מוהלים, פורעים ומוצצים, ונותנים תחבושת.\n(מוהלים = חותכים את הערלה החיצונית; פורעים = קורעים את העור שמתחת לערלה; מוצצים = את דם הפצע, ואע\"ג שנחשב לעשיית חבּורה.)", "ref": {"label": "שבת · פרק ר״א דמילה · קלג ע״א", "ref": "Shabbat.133a"}}, {"layer": "gemara", "src": "גמרא · רב פפא", "srcRef": null, "txt": "רב פפא אומר שמותר למצוץ למרות שבכך הדם ניתק ממקומו ויש בכך עשיית חבורה.\nומתבאר גם שעם נתינת התחבושת על האיבר, שמים עליה כמון לרפואה (ועל אף שיש בכך חשש שמא ישחק סממנים).", "ref": {"label": "שם", "ref": "Shabbat.133a"}}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ א׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.1", "txt": "כתב עפ\"י המשנה שעושים כל צרכי המילה: מוהלין ופורעין ומוצצין ונותנין עליו כמון."}, {"layer": "acharon", "src": "מ\"ב בשם שו\"ת בני ציון", "srcRef": null, "txt": "שהמציצה מותר לעשותה דווקא בפה.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ו׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "מכשירי מילה לא דוחים את השבת, משום שאפשר לעשותם מער\"ש. לכן אסור להביא סכין מילה מרשות אחרת, או לחמם מים וכו' — ואפילו אם זה רק בדרבנן.\n(כרבי עקיבא במשנה: כל מלאכה שאפשר לעשותה מער\"ש — אינה דוחה שבת.)"}, {"subhead": "רחיצה · צורך מילה (סע׳ ט׳)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מותר לרחוץ את התינוק במים חמים, הן לפני המילה והן אחרי המילה, אבל רק בידיים, ולא בכלי. (כלומר, זה נחשב מצרכי המילה, גם לפני וגם אחרי; וחשוב לרפואת התינוק.)", "ref": {"label": "שבת · פרק ר״א דמילה · קלד ע״א", "ref": "Shabbat.134"}}, {"layer": "mishna", "src": "רבי אלעזר בן עזריה", "srcRef": null, "txt": "אף ביום השלישי למילה מותר לרחוץ אותו (אם יוצא בשבת. עפ\"י הפס' 'ויהי ביום השלישי בהיותם כואבים')."}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "פסקו כרבי אלעזר בן עזריה.\nיוצא אם כן, שמותר אפילו לחלל שבת ע\"מ לחמם מים לצורך רחיצה — לפני המילה, לאחר המילה וביום השלישי.", "ref": {"label": "שם", "ref": "Shabbat.134"}}, {"layer": "lead", "srcRef": null, "txt": "אבל מה לגבי היום השני? האם 'היום השלישי' הוא היום השלישי דווקא? או שהוא מן הסתם לרבותא גם את היום השני?"}, {"layer": "rishon", "src": "הרב המגיד ברמב\"ם", "srcRef": null, "txt": "משמע שדווקא היום השלישי. לכן אסור לחמם מים בשבת ליום השני."}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "אף ביום השני מותר.", "under": true}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "כל זה נכון לזמן הגמרא, שאז היה זה סכנה לתינוק אם לא היו רוחצים אותו בימים הנ\"ל. אולם בימינו שלנו, שאין זה מסוכן אם לא נעשה כן — אסור לחלל על כך את השבת; ודינו כדין סתם רחיצה של גדול."}, {"layer": "shulchan", "src": "שולחן ערוך", "srcRef": null, "txt": "האידנא לא נחשבת רחיצת התינוק לפני ואחרי המילה וביום השלישי כדבר הנחוץ לתינוק; ולכן אסור לחלל לשם כך את השבת (ואף לא נחשב הכשר מילה)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "במדינות אשכנז נהגו בשטיפת הוולד לפני המילה בימים הנ\"ל וביום השלישי אם הוחמו מער\"ש (כלומר למרות שעפ\"י שכ\"ו מותר רק פניו ידיו ורגליו; נחשב צורך גדול, אבל עדיין לא חיללו שבת). אבל לאחר המילה — חיכו עד מוצ\"ש."}, {"layer": "zman", "src": "הרב מרדכי הלפרין", "srcRef": null, "txt": "וכמובן שאם רואים שיש לתינוק סכנה ויש צורך בשטיפתו — מותר אף לחלל את השבת ולחמם. ויש כיום מודעות למחלות באיבר המין הנפוצות במדינות שונות, המצריכות שטיפה במים חמים לאחר המילה כנ\"ל; וכן הוא בארץ ישראל."}, {"layer": "acharon", "src": "מ\"ב בשם תשב\"ץ", "srcRef": null, "txt": "תינוק שהיה חולה ונתרפא — אסור למול אותו ביום חמישי, משום שיש חשש שתהא בו סכנה בשבת, שהיא היום השלישי למילה, ואז יצטרכו לחלל עליו את השבת; ובגלל שמילה שאינה בזמנה אינה דוחה את השבת.\n(אך הש\"ך ומג\"א חלקו, וסברו שוודאי מותר למול שלא בזמנו ביום ה'.)", "collapsed": true}, {"subhead": "אמירה לגוי (סע׳ ו׳)"}, {"layer": "shulchan", "src": "שולחן ערוך · ש\"ז", "srcRef": "Shulchan_Arukh,_Orach_Chayim.307", "txt": "פסק בסימן ש\"ז כדעת הרמב\"ם, שאמירה לגוי מותרת בשבות דשבות לצורך מצווה. כלומר, האמירה עצמה היא שבות, ואיסור דרבנן הוא שבות; לפיכך מותר להגיד לגוי לעבור על איסור דרבנן לצורך מצווה."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ו׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "ולפי זה נקט גם בעניין דידן: מכשירי מילה — אשר אסור לחלל עליהם שבת כלל — אסור אף לומר לגוי לחלל עליהם את השבת. אלא שבאיסורי דרבנן, שאז הווי שבות דשבות לצורך מצוות המילה — מותר."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "במקום צורך גדול ניתן להקל באמירה לגוי לצורך מצווה אף בדאורייתא (עפ\"י מה שכתב בש\"ז, כדעת העיטור)."}, {"layer": "acharon", "src": "מ\"ב בשם תוספות", "srcRef": null, "txt": "ונראה שלעניין מילה אפשר להקל יותר בדאורייתא, שהרי יש מי שסבר (תוספות שם) שמותרת אמירה לגוי לצורך מילה ויישוב הארץ בכל גווני.\nולעניין טלטול — לדעת רוב הפוסקים אין רה\"ר דאורייתא בזמן הזה, אז בכך ודאי ניתן."}, {"subhead": "מתי נחשב 'צורך מילה' (סע׳ ב׳)"}, {"layer": "lead", "srcRef": null, "txt": "למדנו שכל צורכי מילה דוחים את השבת. והסוגייה מלמדתנו עפ\"י ברייתא, כי זמן החלון לעשות צרכי המילה (אפילו הורדת חתיכות העור שאינן מעכבות לכשרות המילה) — הוא מהרגע בו התחיל המוהל את המילה, וכל זמן שלא סילק ידו מהעיסוק במילה. אז עדיין יכול לחזור ולחתוך אפילו הציצין שאינם מעכבין; אבל מרגע שסילק ידו — יכול לחזור רק לשם הציצין המעכבים."}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "כל זמן שהוא עוסק במילה — חוזר אף לציצין שאינם מעכבים. פירש מן המילה — חוזר רק לצורך ציצין המעכבין. (משום שאין צורך בהורדתם ואינם צורך מצווה.)", "ref": {"label": "שבת · פרק ר״א דמילה · קכג ע״ב", "ref": "Shabbat.123b"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מוסבר שהציצין המעכבין הם הבשר המכסה את רוב העטרה. היינו, את הגיד סביב ומטה.", "ref": {"label": "שם", "ref": "Shabbat.123b"}}, {"layer": "rishon", "src": "העיטור", "srcRef": null, "txt": "הטור הביא ביו\"ד (רסו) את העיטור, שסבר שאפילו אם פירש מעיסוקו במילה חוזר אף לצורך ציצין שאינם מעכבים. (ב\"י: טעמו שסובר שהגמרא דחתה את הברייתא להלכה.)"}, {"layer": "rishon", "src": "רא\"ש · טור", "srcRef": null, "txt": "סברו כפשט הברייתא.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ב׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.2", "txt": "כל זמן שלא סילק ידו מן המילה — חוזר אפילו על ציצין שאינם מעכבין. אך אם סילק ידו — אינו חוזר, אלא רק על ציצין המעכבין. ואילו הם המעכבין — בשר החופה אפילו רוב גובהה של עטרה."}, {"layer": "acharon", "src": "ר\"ן", "srcRef": null, "txt": "זמן העיסוק הוא אפילו אם הפסיק את החיתוך; אבל הסתפק לגבי שלב המציצה, אם נחשב עדיין עיסוק ומותר לחזור לציצין אלו.", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "נחשב שעוסק במצוות המילה, ויכול לחזור.", "under": true}], "pesak": null}, "safek8": {"seif": "סעיף ג׳", "title": "ספק נולד בחודש שמיני", "sugya": null, "intro": "בסימן ש\"ל, ראינו עפ\"י הברייתא בקל\"ה (פרקנו, ר\"א דמילה) שאין מחללין את השבת על תינוק שנולד בחודש השמיני, או שספק אם נולד בחודש השמיני (כי מנקודת הנחה שהוא בוודאי ימות, וזה אפילו לא ספק פיקוח נפש). אולם, אם גמרו שערותיו וציפורניו — נחשב שנולד בחודש השביעי, ולכן מותר. וכן, שהה שלושים יום ויותר — מחללים.\nלפיכך, נפקא מינא גם לגבי מילה: שהרי אם אין מחללים את השבת על בן חודש ח'/ספק בן חודש ח' — משמע שגם לא מלים אותו.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "אין מחללין את השבת על תינוק שנולד בחודש השמיני, או ספק חודש שמיני.", "ref": {"label": "שבת · פרק ר״א דמילה · קלה ע״א", "ref": "Shabbat.135"}}, {"layer": "gemara", "src": "גמרא · רב אדא בר אהבה", "srcRef": null, "txt": "סובר שספק נולד בחודש שמיני מותר למול, וממה נפשך: אם הוא בן שבעה ויחיה — ודאי מותר למול; ואם בן שמונה — אז רק חתך בבשר (ולא חבורה, האסורה בשבת).\nובאמת מסבירים שרק מכשירי מילה אסורים לצורך מילת ספק בן 8.", "ref": {"label": "שם", "ref": "Shabbat.135"}}, {"layer": "lead", "srcRef": null, "txt": "האם קיי\"ל כרב אדא בר אהבה, או שאסור עפ\"י פשט הברייתא?"}, {"layer": "rishon", "src": "רי\"ף · רא\"ש", "srcRef": null, "txt": "מביאים רק את הברייתא, ולא את הסברא של רב אדא להתיר."}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "לכן משמע שהרי\"ף אוסר למול ספק בן שמונה (שאם היה מתיר, היה מוריד את הברייתא ומביא את רב אדא בר אהבה).", "under": true}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "חולק על קריאת הר\"ן ברי\"ף. מעמיד את מה שאסרה הברייתא למול דווקא בשלא גמרו שערותיו וציפורניו; אבל אם גמרו — מותר למול את הוולד אפילו אם נולד בחודש שמיני בוודאות, ואין צורך להעמיד כרב אדא. [וכן סובר גם בדעת הרמב\"ם.]"}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ג׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.3", "txt": "בן שמונה — אסור למול אותו. ספק בן שמונה — מותר אם גמרו שערותיו וציפורניו."}, {"layer": "rama", "src": "רמ\"א · יו\"ד רסו", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.266", "txt": "כדעת הטור והר\"ן, שמלין כל ספק בן שמונה (אפילו לא גמרו)."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "'נהרא נהרא ופשטיה' — כלומר, כל אחד ומנהגו.", "collapsed": true}, {"layer": "zman", "src": "פוסקי זמננו", "srcRef": null, "txt": "בכל מקרה, כיום ודאי שדין נולד לחודש שמיני אינו רלוונטי, כאשר יש לנו רפואה מתקדמת וכו'. אולם, לא נמול פג בכל מקרה, משום שיש לו בכך סכנה."}], "pesak": null}, "safek-chiyuv": {"seif": "סעיף ה׳", "title": "מהול, אנדרוגינוס ונולד בבין השמשות", "sugya": null, "intro": "שתי קבוצות נוספות של וולדים שאין מחללים עליהם את השבת במילתם:\n(1) ספק אם חייבים במילה בשבת: אנדרוגינוס, מהול, ונולד בבינה\"ש.\n(2) לא צריכים מילה ביום השמיני משום שהיולדת לא נטמאה.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "למדים שרק מי שחייב במילה בוודאות — דוחים בעבור מילתו את השבת. אבל אם הוא בספק אם חייב במילה — לא מחללים עליו.\nוהם: אנדרוגינוס (ספק אם הוא זכר או נקבה); נולד בבין השמשות (ספק אם נולד בשישי או בשבת, ולכן ספק אם היום ה-8 הוא שבת או ראשון); נולד מהול (ספק אם צריך להטיף ממנו דם ברית).", "ref": {"label": "שבת · פרק ר״א דמילה · קלה ע״א", "ref": "Shabbat.135"}}, {"layer": "gemara", "src": "גמרא · רבי אסי", "srcRef": null, "txt": "הסמיכות של 'אשה כי תזריע וילדה ונטמאה' ו'ביום השמיני ימול בשר עורלתו' מלמדת שרק אם היולדת נטמאה בלידתה — מלים את התינוק ביום השמיני ומחללים עליו את השבת.\nומאחר ותינוק יוצא דופן לא יצא מן הפתח וטימא את היולדת, ותינוק של נכרית אין לה במה להיטמא — אין מלים אותם ביום השמיני, וכל שכן שלא מחללים את השבת על מילתם.", "ref": {"label": "שם", "ref": "Shabbat.135"}}, {"layer": "rishon", "src": "רמב\"ם · ר\"י", "srcRef": null, "txt": "אנדרוגינוס — במשנה מחלוקת ת\"ק ור' יהודה (המתיר). הרמב\"ם פוסק כת\"ק, והר\"י פוסק כרבי יהודה."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ה׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.5", "txt": "פוסק כרמב\"ם, שאין מילתו של אנדרוגינוס דוחה את השבת. וכן פסק לגבי מהול ונולד בבינה\"ש, שלא מחללים עליהם את השבת מספק. וגם עפ\"י דברי רבי אסי — שוולד שאמו לא נטמאה בלידתו, אין מילתו דוחה את השבת (משום שאינה חייבת להיעשות ביום השמיני)."}, {"layer": "acharon", "src": "ביאור הלכה · נידה", "srcRef": null, "txt": "מתי נחשב שנולד התינוק (כדי לבדוק את הספק)? במסכת נידה למדים ממעשה של רבא, שאם התינוק הוציא ראשו מן הפרוזדור (פתח הגוף) — נחשב שנולד. ולכן, אם יודעים מתי הוציא הוולד את הראש — סופרים שמונה ימים מרגע זה."}], "pesak": null}, "shelo-bizmana": {"seif": "סעיף ד׳", "title": "מילה שלא בזמנה", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "רק מילה בזמנה דוחה את השבת; ומילה שלא בזמנה — אינה דוחה. וכך בברייתא בפרקנו (קלב:). זאת משום שהמילה מותרת בשבת בגלל הדווקאיות של יום השמיני; אבל אם אין המילה נעשית ביום השמיני (מסיבות רפואיות כאלו ואחרות) — ודאי שאינה דוחה, מה גם שאפשר למולו בכל זמן אחר.", "ref": {"label": "שבת · פרק ר״א דמילה · קלב ע״ב", "ref": "Shabbat.132b"}}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ד׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.4", "txt": "וכן להלכה — מילה שלא בזמנה אינה דוחה את השבת."}, {"layer": "acharon", "src": "תשב\"ץ", "srcRef": null, "txt": "אין למול ולד שמילתו לא תתקיים בזמנה ביום חמישי, כדי שהיום השלישי לא ייצא בשבת ויהיה צורך לחלל עליו (שהרי מאחר וכבר אין המילה מתקיימת ביום מסוים, אין עניין ביום מסוים; ולכן יש להימנע ממצב של חילול שבת שאינו מתחייב). [וראינו דבריו בסעיף ט'.]"}, {"layer": "acharon", "src": "מג\"א · ש\"ך", "srcRef": null, "txt": "חולקים על כך.", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "סבר שיש להחמיר כדעת התשב\"ץ. [וציין שהיו מי שהקלו כדעת המג\"א והש\"ך.]"}], "pesak": null}, "lemi-mutar": {"seif": "סעיף י׳", "title": "למי מותר למול", "sugya": null, "ops": [{"subhead": "ניסיון מילה"}, {"layer": "gemara", "src": "גמרא · ביצה", "srcRef": null, "txt": "עפ\"י סוגיה בביצה, שמבארת שאסור לטרוח שלא לצורך מצווה או היתר."}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "אסור לאדם שלא מל לעולם למול בשבת, משום שעלול להיכשל במילתו ולקלקל שלא לצורך מצווה."}, {"layer": "rishon", "src": "תרומת הדשן", "srcRef": null, "txt": "אם מל פעם אחת — סגי.", "under": true}, {"subhead": "אבי התינוק"}, {"layer": "rishon", "src": "הטור בשם רבי אליעזר הלוי", "srcRef": null, "txt": "בסימן רסו ביו\"ד — עדיף שאבי התינוק לא ימול אותו, משום שבעבורו זה פסיק רישא (שהרי מתכוון לתקן את בנו)."}, {"layer": "rishon", "src": "תרומת הדשן", "srcRef": null, "txt": "אין בעיה שימול אביו. (מ\"ב: ובוודאי שיש פ\"ר דניחא ליה; גם למוהל זה פ\"ר דניחא ליה — פשוט מותר למול.)", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י׳)", "srcRef": null, "txt": "נקט עפ\"י המרדכי, שאסור למי שלא מל לעולם למול בשבת; וכתב עפ\"י תרומת הדשן שאם מל פעם אחת — יכול למול. ולגבי אביו — מתיר כתרומת הדשן (כל עוד מל פעם אחת)."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מוהל שאומר שכבר מל פעם אחת ומותר לו למול — נאמן להגיד זאת."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "tzorchei"}, {"type": "group", "title": "ספק צריך מילה / לא מלים ביום השמיני", "spans": "סעיפים ג׳, ה׳", "children": ["safek8", "safek-chiyuv"]}, {"type": "sec", "id": "shelo-bizmana"}, {"type": "sec", "id": "lemi-mutar"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"מוהלים": "חיתוך הערלה החיצונית.", "פורעים": "קריעת העור הדק שמתחת לערלה.", "מוצצים": "מציצת דם הפצע — אף שנחשבת עשיית חבורה.", "ציצין המעכבין": "רצועות בשר החופות את רוב גובה העטרה; כל עוד לא הוסרו, המילה פסולה.", "מכשירי מילה": "הכלים והפעולות שמכינים למילה (סכין, מים חמים). מאחר שאפשר להכינם מערב שבת — אינם דוחים את השבת.", "שבות דשבות": "צירוף שני איסורי דרבנן (למשל אמירה לגוי — שהיא שבות — על מלאכה דרבנן). הותר לצורך מצווה.", "מילה בזמנה": "מילה הנעשית ביום השמיני. רק היא דוחה את השבת.", "פסיק רישא": "פעולה מותרת שמלאכה אסורה נעשית ממנה בהכרח, גם בלי כוונה."}, "subject": "שבת", "id": "mila-bshabbat"}, {"topic": {"title": "בורר", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.319", "intro": {"lead": {"t": "", "ref": ""}, "body": "+הפרדת דבר רצוי מדבר שאינו רצוי (כגון אוכל מפסולת), ע\"י כלי או ביד\n+כן להפך (דבר שאינו רצוי ממה שכן)\n+הפרדת שני מיני אוכל האחד מן השני (למרות ששניהם לא 'פסולת')\n\n**מתי מותר**: ברירה **ביד** של **אוכל מתוך פסולת** לאכילה **לאלתר** מותרת (אבל בנפה אסור דרבנן, ובכברה חייב; אעפ\"י שאוכל מיד) משום שיש בכך **דרך אכילה** ולא דרך ברירה\n\nחלקו אם היא מלאכה שאינה צריכה לגופה\n\n**שיעורה**: כגרוגרת (נלמד ממידות בשאר אוכלין)"}}, "sections": {"hagdarot": {"title": "הגדרות", "seif": null, "sugya": null, "ops": [{"subhead": "ריבוי מלאכות ברירה (לא מעיקר החומר)"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "-זורה בורר ומרקד זה אותו דבר! (רש\"י: והלא כולן מלאכה אחת הן דמפריש אוכל מן הפסולת)\n**-אביי ורבא**: יש מלאכה על כל מעשה שנעשה במקדש, גם אם יש כמה דומות.\n-אז למה אין כותש? (רש\"י: ולא מנו כותש משום דמיונה לדש)\n**-אביי**: עני אוכל פתו בלא כתישה", "ref": {"label": "שבת · פרק כלל גדול · עג ע\"ב", "ref": "Shabbat.73b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "למרות שהיה כותש במקדש, הסתפק התנא בדמיונו לדש. הוא העדיף להכניס את כל מלאכות הברירה משום שכולן שלב חשוב ונצרך ב'סידורא דפת', בעוד כותש לא נצרכת, והרי עניים מוותרים על שלב זה לעיתים (בעוד שעל מלאכות סידורא דפת לא מדלגים)\n(בדומה לכך אמר על בישול, שהעדיפו את הלש והאופה)"}, {"layer": "rishon", "src": "הרמב\"ם בפ\"ח, הי\"א", "srcRef": null, "txt": "מציין דברי אביי ורבא (וזהו): \"ומפני מה מנו אותן בשלשה מפני שכל מלאכה שהיתה במשכן מונין אותה בפני עצמה\""}, {"subhead": "מלאכה שאינה צריכה לגופה (לא מעיקר החומר)"}, {"layer": "rishon", "src": "בעל המאור", "srcRef": null, "txt": "הבורר והזורה הן מלשצ\"ג. כל שאר המלאכות הן מלאכות שצריך לגופן."}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "אף הן מלאכות שצריך לגופן, כי וודאי שצריך שהמלאכה תקרה. ואעפ\"י שאינו צריך לגוף הדבר שעליו נעשתה המלאכה. כך גם לגבי הנוטל ציפורניו שנחשב גוזז ואינו צריך לציפורניים"}, {"layer": "acharon", "src": "בה\"ל בשם ישועות יעקב", "srcRef": null, "txt": "עניין מלאכת בורר הוא שהפסולת לא ראויה לאכילה, וגם האוכל אין ראוי כ\"כ לאכילה עם הפסולת שבתוכו, ולכן הוא מפריד הפסולת מן האוכל. וא\"כ המלאכה אינה נקראת על ברירת הפסולת, רק שמתקן האוכל שיהיה ראוי לאכילה. וזהו מלאכה הצריכה לגוף האוכל.\nאבל בשני מיני אוכלין, חשוב משאצ\"ל, כיוון שאין תיקון של אף מאכל, אלא רק שמעוניין כרגע באחד מהם."}], "pesak": null}, "sugya": {"title": "הסוגיה המרכזית", "seif": null, "sugya": null, "intro": "ברייתא ושיטות לברירה אסורה ומותרת.", "ops": [{"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**ברייתא** - היו לפניו (שני) מיני אוכלין בורר ואוכל בורר ומניח. ולא יברור ואם בירר חייב.\n**בגמרא** – מתקשים, שהרי בהתחלה לשון הברייתא להתיר ברירה ולאחמ\"כ לאסור. משבשתא.\nהאמוראים מציעים שיטות שונות לתרץ, ומחלקים מתי מותר ומתי אסור לברור\n   **רב יוסף** - מה שמותר: ברירה ביד\n   מה שאסור (דרבנן): בקנון ובתמחוי\n   מה שמתחייב (דאורייתא): בנפה ובכברה\n   **רב המנונא** - מה שמותר: ברירת אוכל מתוך הפסולת\n   מה שמתחייב: ברירת פסולת מתוך האוכל\n   **אביי** - מה שמותר: ברירה לאלתר.\n   מה שמתחייב: ברירה לאוצר.\nובסוגיה לאחמ\"כ, חלקו רב אשי ורבי ירמיה מדפתי על בורר שני מיני אוכל.", "ref": {"label": "בבלי · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}], "pesak": null}, "ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳-ב׳", "sugya": null, "intro": "יש דעות שונות בראשונים לאילו שיטות באמוראים להתייחס. באופן מסורבל, השו\"ע מאמץ עפ\"י רוב הראשונים את שלושת ההגדרות המרכזיות: אוכל מתוף פסולת, ביד, ולאלתר.", "ops": [{"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כל עוד בורר לאלתר, אפילו בנפה ובכברה מותר (כלומר, בעיקר אביי)"}, {"layer": "rishon", "src": "תוס', ר\"ח, ר\"ן, רמב\"ם", "srcRef": null, "txt": "אסור אף פעם בכלי. ורק אם ברר ביד לאלתר מותר."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.1", "txt": "וכן נקט השו\"ע. ולשיטתו צריך גם שיברור אוכל מתוך פסולת."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "כתב, שכאשר בקיום 3 התנאים הללו, אז וודאי הווי דרך אכילה"}], "pesak": null}, "tnaim": {"title": "הגדרת תנאי ההיתר", "seif": null, "sugya": null, "intro": "(לא תמיד עפ\"י ס' מסוים)", "ops": [{"layer": "lead", "srcRef": null, "txt": "**מ\"ב, הקדמה לסימן שיט** - מותר לברור אם מקיימים את 3 תנאי ההיתר, \"שאז לאו דרך ברירה היא אלא דרך אכילה\""}, {"subhead": "א. יד"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כותב כי ברירה ביד 'לא דמי לבורר כלל'"}, {"layer": "rama", "src": "הרמ\"א (שכ\"א, ס' יב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.321.12", "txt": "לעניין טוחן - סבר שהחותך ירק דק חייב בטוחן רק אם לא אוכלו מיד", "under": true}, {"layer": "acharon", "src": "והבה\"ל עליו", "srcRef": null, "txt": "כותב כי הסיבה שברירה מותרת כשאוכל ביד היא משום שכך דרך האכילה לאלתר בבורר. לכן בטוחן, לא אוסרים ע\"א השימוש בכלי, כי דרך האכילה לאלתר היא בסכין.", "under": true}, {"layer": "acharon", "src": "מ\"ב, שש\"כ", "srcRef": null, "txt": "התייחסו לסכו\"ם כדרך אכילה, למרות שאין הם 'יד' שכן הם כ'ידא אריכתא'.\nוכן, שסכו\"ם אינו מועיל למלאכה."}, {"subhead": "ב. לאלתר (ס' א')"}, {"layer": "lead", "srcRef": null, "txt": "מה גדר לאלתר?"}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "מיד ממש. ללא השתאות"}, {"layer": "rishon", "src": "ר\"ח ור\"ן", "srcRef": null, "txt": "כל זמן שנמצא בסעודה (ואפילו מאריך בה)"}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "'לאותה סעודה'", "under": true}, {"layer": "rishon", "src": "והב\"י הבין בו", "srcRef": null, "txt": "כל שבורר לסעודה הקרובה - מותר אפילו זמן רב (ואם השאיר ממנו לסעודה אחרת חייב)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא דעת ר\"ח וסובר בו שמותר לפני הסעודה, אך רק ממש סמוך."}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "אסור לברור בתוך הארוחה כדי שיישאר, אלא רק לצורך אותה אכילה\nאבל אם לא עשה לשם כך לכתחילה מותר (מ\"ב)"}, {"layer": "lead", "srcRef": null, "txt": "מי שלא בֶסעודה מסוימת?"}, {"layer": "zman", "src": "אגלי טל", "srcRef": null, "txt": "אסור לברור אוכל מפסולת ולהשאירו לשעה"}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "60 דקות"}, {"layer": "zman", "src": "אג\"מ", "srcRef": null, "txt": "לשון 'שעה' פירושה זמן שהאישה מסדרת את המאכלים לסעודה, שזה פחות משעה"}], "pesak": null}, "shnei": {"title": "שני מיני אוכלים", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "בברייתא כתוב 'היו לפני (שני) מיני אוכלים'.\nרב אשי אוסר מדרבנן, ורבי ירמיה מדיפתי מחייב.\nוהראשונים מבררים טעם האיסור גם בזה (ולא רק פסולת מאוכל)", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "בירושלמי", "srcRef": null, "txt": "ברר אוכל מאוכל. חזקיה: חייב. ר יוחנן: פטור"}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "מביאים, שלמרות שמדובר בשני אוכלים, בהוצאת אוכל מאוכל אחר יש העדפה לאחד מהם והאוכל השני נחשב כפסולת (לכן יהא מותר רק להוציא את הרצוי מהאחד שלא)"}, {"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "בלשונו לא לגמרי בהיר ונחלקים פוסקים על שיטתו."}, {"layer": "lead", "srcRef": null, "txt": "פוסקים חולקים – רמב\"ם כתוספות או לא?"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "כתוספות"}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "לא כתוספות. אלא הרמב\"ם סבר שעניין בורר הוא בתיקון המאכל. ובהפרדת שני מינים המעורבבים זה בזה - נעשה תיקונו.\n   נפק\"מ: להוציא את האוכל שאינו מעוניין בו מתוך האחד שכן מעוניין ויאכל מיד – לשיטת התוס' והפמ\"ג ברמב\"ם, יהיה אסור משום שהאוכל שמוציא הוא פסולת.\n   להבנת הבה\"ל ברמב\"ם יהיה מותר משום שהאוכל שתיקן נאכל מיד (בדרך היתר)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.3", "txt": "נוקט לשון הרמב\"ם\nלפיכך, הפמ\"ג סובר שכוונת השולחן ערוך ברמב\"ם כדעת התוס'\nוהבה\"ל שדעת השו\"ע ברמב\"ם שהוא חולק על התוס'"}, {"layer": "acharon", "src": "ובסוף סובר הבה\"ל", "srcRef": null, "txt": "שצריך לחוש לשתי האפשרויות, כלומר:\nכשיש שני מיני אוכל, לא להוציא מין שאינו מעוניין בו ולאכול את המין שמשאיר (אלא רק להפך. כתוס')\nוכן, לא הפקיד שני המינים זה מזה אפילו שלא מעוניין באף אחד כרגע (שזה תיקון שניהם. כהבנת בה\"ל)", "under": true}], "pesak": null}, "echad": {"title": "מין אחד", "seif": null, "sugya": null, "intro": "(תרוה\"ד; רמ\"א בס' ג)", "ops": [{"layer": "rishon", "src": "תרומת הדשן", "srcRef": null, "txt": "מדייק מלשון התנא 'שני מיני אוכלין', משמע שהאיסור הוא דווקא בשניים, אבל במין אחד לא נחשב בורר. לכן, אסור להפריד שני מינים זה מזה ואפילו הם גדולים וניכרים (אלא רק לאוכלם מיד). כך, שני סוגי דגים נחשב שני מינים.\nאך אם מפריד חתיכה גדולה או מוצלחת יותר מאותו מין - מותר (אפילו להשאיר את שני המינים לאח\"כ)"}, {"layer": "rama", "src": "הרמ\"א (הגהה לס' ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.3", "txt": "הביא את תה\"ד. לכן ציין שבמין אחד מותר 'לברור' חתיכות גדולות מקטנות בכל דרך."}, {"layer": "acharon", "src": "הט\"ז (שיט, ג', ב)", "srcRef": null, "txt": "החמיר בשיטה זו וסבר שאף הפרדה ממין אחד נחשב ברירה. לפיו, אפילו הפרדה של חתיכות גדולות מקטנות שלא אותו מאכל – אסור (אלא בדרך היתר)."}, {"layer": "acharon", "src": "המ\"ב", "srcRef": null, "txt": "ונראה שרוב האחרונים, וכך המ\"ב צידדו בדעת הרמ\"א ותה\"ד\nוכתב המ\"ב שמיני עופות או בשר צלי/מבושל נחשב שני מינים לזה"}], "pesak": null}, "kiluf": {"title": "קילוף פירות", "seif": null, "sugya": null, "intro": "(סוף סימן שכ\"א, ס' יט)", "ops": [{"layer": "gemara", "src": "בירושלמי", "srcRef": null, "txt": "מובא שהקולף שום מקליפתו חייב בבורר"}, {"layer": "rishon", "src": "סמ\"ג סמ\"ק", "srcRef": null, "txt": "סברו שבירושלמי מדובר באכילה לאחר זמן. לכן מותר לקלף שום אם אוכלו מיד"}, {"layer": "rama", "src": "רמ\"א (שכא, יט)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.321.19", "txt": "הביא דבריהם: \"אסור לקלוף שומים ובצלים כשקולף להניח, אבל לאכול לאלתר, שרי\""}, {"layer": "rishon", "src": "המרדכי", "srcRef": null, "txt": "הסביר שהטעם לכך הוא שאי אפשר לאכול את השום בלי הוצאת המאכל מהפסולת, וממילא זו דרך האכילה. והביאו הבה\"ל"}, {"subhead": "קליפות הראויות לאכילה"}, {"layer": "lead", "srcRef": null, "txt": "הרמ\"א סבר עפ\"י הסמ\"ג והסמ\"ק להתיר קילוף של שום מאחר ואי אפשר לאוכלו בלי לעשות כן, וכי זה וודאי דרך אכילה.\nאבל מה נגיד לגבי פירות שהקליפה שלהם נאכלת לפעמים?\nממאי נפשך? אם הוא אוכל לאלתר וחשיב כפסולת, מותר כדעת הרמ\"א. אם מניח - מותר כדעת הפמ\"ג"}, {"layer": "acharon", "src": "משנ\"ב (שכא)", "srcRef": null, "txt": "כמו שום. מותר רק אם אוכל התפוח מיד (משום שהקליפה היא פסולת)"}, {"layer": "acharon", "src": "שעה\"צ בשם פמ\"ג", "srcRef": null, "txt": "מביא דעת הפמ\"ג (עפ\"י תוספות), מבין שבגלל שהקליפות ראויות למאכל, דינן כהפרדת שני מאכלין זה מזה לזמן. אין באף אחד מהם פסולת ולכן מותר."}], "pesak": null}, "sheeino": {"title": "בורר בדברים שאינם אוכל", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "בגמרא (עד, ב)", "srcRef": null, "txt": "מובא כי מי שעושה חבית חרס וכוורת של קנים מתחייב על כמה מלאכות\nורש\"י מפרט את המלאכות. בעשיית החבית מופיע בורר את החתיכות הגסות של האדמה. בכוורת בורר את הקנים הטובים מהרעים.", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"ב", "ref": "Shabbat.74b"}}, {"layer": "acharon", "src": "הט\"ז", "srcRef": null, "txt": "מתוך כך הבין כי גם בדברים שאינם אוכל שייך בורר."}, {"layer": "acharon", "src": "המ\"ב (טו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.15", "txt": "כתב כי בכלים ובבגדים שייך בורר, ולכן יש להוציא את הכלי/בגד שמעוניין בו, ולא להפך."}, {"layer": "acharon", "src": "האור שמח", "srcRef": null, "txt": "עמד על כך שבורר הוא רק בדברים הבלוּלים ומעורבבים זה בזה, ולכן אין בורר בכלים ובגדים; ומה שהט\"ז כתב שיש בורר גם בדברים שאינם אוכל, הוא בדברים קטנים כמו עץ וברזל ששייך בהם ערבוב."}, {"layer": "acharon", "src": "ערוך השולחן", "srcRef": null, "txt": "ובדומה לכך, כתב שדבר גדול הנראה לעין לא שייך בו בורר."}, {"layer": "lead", "srcRef": null, "txt": "מתוך כך, תהו פוסקי זמננו לגבי מיון מיני סכו\"ם מעורבבים לאחר הארוחה, וכן סידור ספרים במקומם."}, {"layer": "zman", "src": "שו\"ת אור לציון", "srcRef": null, "txt": "חשש לדעות האוסרים וכן לשיטת הבה\"ל לבורר בשני מינים (ברמב\"ם) שהפרדה שלהם אסורה אף אם בשני המינים מעוניין לאחר זמן."}, {"layer": "zman", "src": "הרב עובדיה ב'יביע אומר'", "srcRef": null, "txt": "הביא דברי האור שמח וכתב כי 'אין כל חשש של איסור ברירה'."}], "pesak": null}, "lach": {"title": "בורר בלח, וברירת אוכל עם הפסולת", "seif": "סעיף ט\"ז", "sugya": null, "ops": [{"layer": "rishon", "src": "הרא\"ש", "srcRef": null, "txt": "מתיר שתיית מים שיש בהם תולעים עם מפה (כמעין מסננת)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט\"ז)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.16", "txt": "מעתיק את הרא\"ש. מים שיש בהם תולעים מותר לשים עליהם מפה ולשתות ואין בכך בורר. על כן, מותר לדחות בשעת שתיה את הפסולת שלא תכנס לפיו.\nובב\"י דן אם אין חשש של סוחט משום מלבן בהרטבת המפה; וסבר שאין לגזור שמא יסחוט משום ש'אין זו שרייה הצריכה סחיטה'"}, {"layer": "lead", "srcRef": null, "txt": "לפיכך, דנו אם יש בורר בלח."}, {"layer": "acharon", "src": "מהריט\"ץ", "srcRef": null, "txt": "'אין ברירה בלח וגם את הצרעה ישלח'. אפילו זבוב מותר להוציא בידו למרות שלא זמן השתייה ממש.\nמה שהרא\"ש 'כתב שיש ברירה בלח' (תולעים במים) הוא בכלי שכך דרך ברירתם"}, {"layer": "acharon", "src": "ט\"ז שם", "srcRef": null, "txt": "הוצאת פסולת מותרת רק אם מוציאה עם המזון: אם נפל זבוב לכוס מים מותר להוציאו רק עם מוציאו יחד עם המים. יש ברירה בלח."}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "פסק כמהריט\"ץ לקולא, אך מוטב להחמיר כט\"ז."}], "pesak": null}, "tircha": {"title": "אוכל מפסולת בטורח מרובה", "seif": "סעיף ד׳", "sugya": null, "intro": "(ס' ד' ברמ\"א)", "ops": [{"layer": "mishna", "src": "משנה (ביצה)", "srcRef": null, "txt": "מחלוקת ב\"ה וב\"ש לגבי ברירת פסולת מאוכל ביו\"ט\n**ב\"ש**: (כמו בשבת) – רק אוכל מפסולת\n**ב\"ה**: מתירים ביו\"ט אף להוציא פסולת מתוך אוכל"}, {"layer": "gemara", "src": "גמרא · רבן גמליאל", "srcRef": null, "txt": "בד\"א? כשהאוכל מרובה על הפסולת.\nאבל אם הפסולת מרובה מהאוכל אף ב\"ה יגידו שמותר להוציא רק את האוכל מהפסולת.\n(כלומר רק כשהאוכל מרובה ויש טורח בברירתו סבורים ב\"ה שאפשר לברור פסולת. כשהוא מעט – לא)\nולאחמ\"כ הקשו בסוגיה על רבן גמליאל ושאלו על פסולת מרובה מאוכל 'מי איכא מאן דשרי?'"}, {"layer": "lead", "srcRef": null, "txt": "שתי שיטות בפירוש, ומתוך כך גם בהלכה"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "'האם יש מי שמתיר בהוצאת פסולת אם הפסולת מרובה?' הרי הפסולת היא מוקצה וכשהיא הרוב, גם האוכל נחשב מוקצה. לכן אסור להוציא כלום אם הפסולת מרובה.\nוהתירוץ של הסוגיה 'לא צריכא דנפיש בטרחא וזוטר בשיעורא' – הוא שבאמת מדובר באוכל המרובה על הפסולת, והלשון שכתוב 'פסולת מרובה על האוכל' כוונתה שהטורח בהוצאת הפסולת.\nמתירים כשהרוב הוא אוכל משום שיש פחות טרחה בהוצאת הפסולת (כדרכו)"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "בשבת: תמיד בורר את האוכל.\nביו\"ט: אם הפסולת מרובה ← בורר את האוכל / דרך ברירה\nאם האוכל מרובה ויש טורח בברירת האוכל ← בורר את הפסולת / כי יש טורח\nאם האוכל מרובה ואין טורח בברירת האוכל ← בורר את האוכל / עדיף אוכל\nכלומר שיטת הרמב\"ם (כמו שהב\"י מדייק ממנו) ביו\"ט: עדיף להקפיד על דרך ברירה שמוציאים אוכל מהפסולת, אבל אם יש טורח מוותרים לטובת טורח ביו\"ט. ובשבת לא מתחשבים בגורם הטרח ולכן תמיד מוציאים אוכל מפסולת."}, {"layer": "lead", "srcRef": null, "txt": "**נפק\"מ בין רש\"י לרמב\"ם** – לרש\"י אסור לברור כשיש פסולת מרובה בכלל (מוקצה. יו\"ט ושבת)\nולרמב\"ם מותר לברור את האוכל מן הפסולת. ובשבת תמיד בורר את האוכל"}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "נראה שדעתו כרמב\"ם (טרחה ביו\"ט וכו')"}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.4", "txt": "מביא בשם הב\"י וכותב \"אפילו האוכל מרובה ויש יותר טורח בברירת האוכל, לא יברר הפסולת\"\nכלומר, הרמ\"א נקט את הדין של שבת, שבכל מקרה בוררים את האוכל מתוך הפסולת אפילו כשהאוכל מרובה ויש בברירתו טורח, מאחר ורק בשמחת יו\"ט נמעט בטרחה. בשבת - דרך ברירה תמיד. וכ\"כ המ\"ב"}], "pesak": null}, "mishmeret": {"title": "משֵמרת (סינון)", "seif": "סעיפים ט׳-י׳", "sugya": null, "intro": "סינון יין משמריו אסור (כשיטת חכמים וכן הלכה), גם אם המשמרת תלויה כבר מער\"ש\n-ונחלקו רבה ורבי זירא אם משום בורר או משום מרקד\n-ורש\"י ותוס' חלקו אם יודה רבה לרבי זירא שחייב משום שניהם או לא (נפק\"מ: איך אפשר להתרות)\n-דעת הרמב\"ם שנויה במחלוקת (ב\"י: כרש\"י; בה\"ל: כתוספות)\n-ובשו\"ע (ט') התייחס רק לעיקר איסור חכמים לשמר", "ops": [{"layer": "lead", "srcRef": null, "txt": "ומתי עובר הגבול בין מה שאסור למה שמותר? אם אסור לברור יין משמריו בגלל שזה בורר (כרבה), מתי לא חשיב בורר? עפ\"י זעירי והמשנה בפרקנו, למדים שמותר למשמרת משקים צלולים, ולסודר קצת עכורים\nמשמרת: רק צלול — מהו צלול? ר\"ן: רוב אנשים שותים | ב\"ח: כולם שותים\nסודרים (בגד): אפילו עכור קצת — ר\"ן: אך ללא שמרים כלל\nטור: במים אסור בסודר משום ליבון\nרמב\"ם: אוסר משמרת. ובסודרים עכור. מתיר רק מים ויין צלולים בסודר (כנראה קרא למשמרת סודר)\nשו\"ע: הביא ר\"ן (פשט סוגיה) וגם רמב\"ם; וטור לעניין מלבן — מותר: מים ויין צלולים למשמרת; יין שאינו עכור לסודר\nמ\"ב: (עכור לגמרי אסור. אבל עכור קצת -שו\"ע מתיר)"}, {"layer": "mishna", "src": "משנה · ר' אליעזר · חכמים", "srcRef": null, "txt": "מסננת התלויה מערב שבת. האם מותר לסנן בה יין משמריו בשבת?\n**רבי אליעזר** – מותר\n**חכמים** – אסור\n(וכולם מסכימים שאסור לתת אותה לכתחילה)", "ref": {"label": "שבת · פרק תולין · קלז", "ref": "Shabbat.137b"}}, {"layer": "gemara", "src": "גמרא · רב כהנא", "srcRef": null, "txt": "**רב כהנא** – אם שימר - חייב מהתורה\nמשום מה חייב?\n**רבה** – משום בורר\n**רבי זירא** – משום מרקד", "ref": {"label": "שם", "ref": "Shabbat.137b"}}, {"layer": "acharon", "src": "שולחן ערוך הרב", "srcRef": null, "txt": "אם בורר אוכל מפסולת למה חייב? בגלל שמשתמש בכלי המיוחד לברירה (רב יוסף)", "under": true, "collapsed": true}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "רבה מודה לרבי זירא שהמשמר חייב גם משום מרקד", "under": true}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "חולקים: רבה לא מודה לרבי זירא. שימור יין לא דומה למרקד. מרקד היא מלאכה שפועלת גם בפסולת וגם באוכל ע\"י ניעור הכלי. במשמר אין זה כך.", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "לא ברור כמי מכריע (\"הבורר שמרים מתוך המשקין הרי זה תולדת בורר או תולדת מרקד וחייב\")", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "רמב\"ם סובר כרש\"י (שרבה מודה שמשמר חייב אף משום מרקד. ואפשר להתרות במי שעומד לשמר על כל אחד מהם)", "under": true}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "רמב\"ם כתוס' (רבה לא מודה לר' זירא), וציין בלשונו שחייב באחד משתי המלאכות משום שלא ידע אם להכריע כרבה או כרבי זירא (ומכל מקום מוכח מלשונו שלא מחייב בשניהם)", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.9", "txt": "מביא דין חכמים מהמשנה שאסור לתת יין עם שמרים במשמרת התלויה מער\"ש; אך לא מכריע כאחד האמוראים או הראשונים"}, {"layer": "acharon", "src": "שאלה/דיון אפשרי", "srcRef": null, "txt": "כמה חטאות חייב מי ששימר כנ\"ל? אם כשיטת רש\"י=2. אם תוס=1. ולדעת המנחת חינוך חייב 2. לדעת האגלי טל לא סומכים על כך שהמחבר סבר בב\"י שרמב\"ם סבר כרש\"י; וחייב רק חטאת 1 בגלל שעשה מעשה 1", "collapsed": true}, {"subhead": "דף קלט (פ' תולין) – סינון המותר במשמרת/סודרים"}, {"layer": "gemara", "src": "מימרא של ר' זעירי", "srcRef": null, "txt": "מותר לסנן יין צלול ומים צלולין במשמרת בשבת (ואין בכך בורר)\nובמשנה כתוב: מסננין את היין בסודרין (בגדים) ובכפיפה מצרית מהקמחים שלהם\nומשמע מכך שבסודרים מותר אפילו משקה שאינו צלול והוא עכור קצת (וכן נקטו הראשונים והב\"י)", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "ולדעת הר\"ן", "srcRef": null, "txt": "רק אם אין בו שמרים כלל אפשר עכור בסודרים.", "under": true}, {"layer": "lead", "srcRef": null, "txt": "ומה נחשב צלול, שמותר אפילו במשמרת?"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "אם רוב האנשים לא מקפידים בלכלוכיו כלל"}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "רק אם כולם לא מקפידים והיו שותים אותו כך"}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "לעניין מלבן: כתב שלמרות שמותר לסנן מים (אפילו במשמרת, אם הם צלולים) – אסור בסודרים משום מלבן, אבל עם יין אין בעיה (משום שסבר כר\"ת שלא שייך מלבן במשקים שאינם יין)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.10", "txt": "כתב עפ\"י זעירי (ר\"ן) שמותר לסנן במשמרת יין או מים צלולים, אך הביא בסוף גם את דעת הרמב\"ם שאסר כל סינון במשמרת, והתיר רק צלול בסודרין.\nוכתב שבסודרים מותר רק יין שאינו עכור (על פניו היה אמור כדעת הר\"ן להתיר. מ\"ב תירץ שהם עכורים לגמרי, אבל בעכורים קצת -מתיר)\nהביא את הטור שאסור מים בכל מקרה בסודר בגלל מלבן"}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "הביא את שיטות הר\"ן והב\"ח למה נחשב צלול", "under": true}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "סובר כדעת הר\"ן לעניין זה שצלול הוא מה שרוב האנשים שותים בלא להקפיד.\nאבל כתב שמי שהוא אסטניס ומקפיד על הסינון - אסור לו"}], "pesak": null}, "shaar": {"title": "שאר סעיפים והערות עליהם", "seif": null, "sugya": null, "ops": [{"subhead": "סעיף ה' – הבורר תורמוסין מפסולתיהן"}, {"layer": "shulchan", "src": "בשו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.5", "txt": "הבורר תורמוסין מתוך פסולת שלהן חייב מפני שהפסולת שלהם ממתקת אותם ונמצא בורר פסולת מתוך אוכל.\n- אז בגלל שלא מתקיים התנאי של רב המנונא (אוכל מפסולת), אסור. אבל איך? הרי אני מוציא את התורמוסים מתוך הפסולת?"}, {"layer": "acharon", "src": "המ\"ב", "srcRef": null, "txt": "התורמוס עצמו מאוד מר, ואפילו הקליפה שלו פחות מרה. לכן נחשב התורמוס פסולת לעומתה."}, {"subhead": "סעיף י\"א – סינון יין צלול בסודר"}, {"layer": "lead", "srcRef": null, "txt": "למדנו בסעיף ט' שיש בעיה עם סינון יין משמריו במשמרת משום בורר ו/או מרקד\nבסעיף י' ראינו שמותר לשפוך יין צלול למשמרת, אבל אם הוא עכור ויש בו קמחים או עובד - אסור.\nובסודר מותר אף יין עכור קצת, וק\"ו שגם יין צלול (ולרמב\"ם אסור במשמרת אף צלול, ובסודר אסור אף עכור)"}, {"layer": "gemara", "src": "רב שימי בר חייא", "srcRef": null, "txt": "ההיתר לסנן יין בסודרים הוא בתנאי שלא יעשה בה גומא (שקע)", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "shulchan", "src": "ראשונים ושו\"ע · (סע׳ י\"א)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.11", "txt": "הטעם הוא שיהיה 'שינוי', משום עובדין דחול"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מה ששו\"ע כותב שצריך שינוי ואסור לעשות גומא, הוא מדבר רק על יין עכור. כי אם הוא התיר יין צלול אפילו במשמרת ולא הצריכו לשם כך שינוי, אז וודאי שבסודר אין צורך בשינוי בשביל יין צלול.\n(מהמ\"ב משתמע שאולי סובר שבמשמרת מותר אפילו יין עכור אם עושים 'שינוי' מעובדין דחול)"}, {"subhead": "סעיף י\"ב – דין כפיפה מצרית כדין סודר. לא להגביה הכפיפה מהכלי"}, {"layer": "gemara", "src": "רב חייא בשם רב", "srcRef": null, "txt": "היתר סינון יין בכפיפה מצרית הוא בתנאי שלא יגביה הסל מקרקעית הכלי טפח.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "משום אוהל", "under": true}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "משום שינוי. עובדין דחול", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.12", "txt": "נקט בלשונו כר\"ן"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם אינו מכסה עם הכפיפה את כל חלל הכלי – לכו\"ע מותר אף להגביה טפח. כי אין לא אוהל ולא עובדין דחול."}, {"subhead": "סעיף י\"ג – מיחזי כמשמרת"}, {"layer": "gemara", "src": "רב פפא, עפ\"י רש\"י", "srcRef": null, "txt": "אסור להצמיד קשים וקיסמים לפיו של כלי ובשבת לשפוך לשם יין כדי לסנן ממנו קיסמים משום שמחזי כמשמרת.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ג)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.13", "txt": "פוסק כן"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "סובר שהשו\"ע מדבר על יין עכור דווקא; וכי ביין צלול מותר אפילו במשמרת אם מסנן רק קיסמים דקים."}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "כל זה מיירי אם מהדק את הקיסמים לפה הכלי בחוזקה. אבל אם לא מהדקם כך שהקיסמים שביין יוכלו לעבור דרכם – מותר."}, {"subhead": "עירוי (שיט, יד)"}, {"layer": "gemara", "src": "בגמרא קלט", "srcRef": null, "txt": "בבית רב פפא היו מערים יין מחבית לחבית למרות שנשארו שמרים שהם פסולת\nורב אחא מדיפתי הקשה שיש טיפות קטנות בסוף שמעורבבות עם פסולת השמרים\nרבינא מתרץ שלרב פפא הטיפות לא היו חשובות משום שהיה לו הרבה.\nאם כן, בגלל שהיין בסוף החבית מעורבב עם השמרים יש בעיה של בורר לשופכו.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "הרוקח", "srcRef": null, "txt": "הביא שמותר להגביה את החבית ולשים אותה על משהו כדי לערות יותר טוב"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ד)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.14", "txt": "העתיק דין הסוגיה וכתב שמותר לערות יין מחבית לחבית רק שצריך להיזהר לקראת הסוף כשמגיע לחלק שמעורב עם שמרים"}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "הביא את הרוקח"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אמנם מוזר דין זה. שהרי זה ברירת אוכל מתוך פסולת.\nמתרץ שהחשש המדובר הוא שהמזיגה היא לאחר זמן והביא כך המ\"ב"}, {"layer": "acharon", "src": "שו\"ע הרב", "srcRef": null, "txt": "מכיוון שמחזיק החבית בה נשארים השמרים, נחשב כאילו הוציא הפסולת מהמאכל.", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "hagdarot"}, {"type": "sec", "id": "sugya"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "tnaim"}, {"type": "sec", "id": "shnei"}, {"type": "sec", "id": "echad"}, {"type": "sec", "id": "kiluf"}, {"type": "sec", "id": "sheeino"}, {"type": "sec", "id": "lach"}, {"type": "sec", "id": "tircha"}, {"type": "sec", "id": "mishmeret"}, {"type": "sec", "id": "shaar"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"אוכל מתוך פסולת": "אחד משלושת תנאי ההיתר — לברור את הרצוי (האוכל) ולהותיר את הפסולת, ולא להפך.", "לאלתר": "לברור סמוך לאכילה, ולא לאיחסון (לאוצר). אחד משלושת התנאים.", "דרך אכילה": "בהתקיים שלושת התנאים, הברירה נחשבת חלק מדרך האכילה — ולא מלאכת ברירה.", "נפה": "כלי ניפוי דק לברירה; הבורר בו חייב.", "כברה": "כלי ברירה גס; הבורר בו חייב מן התורה.", "משמרת": "כלי או בגד לסינון משקים משמריהם.", "מרקד": "מלאכת ניפוי קמח בנפה; נידונה לצד בורר בעניין הסינון.", "ידא אריכתא": "'יד ארוכה' — כינוי לכלי אכילה (סכו\"ם) הנחשב כהמשך היד ולא ככלי ברירה.", "מלאכה שאינה צריכה לגופה": "מלאכה הנעשית שלא לצורך התוצאה הרגילה שלה; נחלקו אם הבורר בכללהּ.", "עובדין דחול": "מעשה של חול; ולכן דרשו בו 'שינוי' בשבת."}, "subject": "שבת", "id": "borer"}, {"topic": {"title": "בישול", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ח", "siman": "Shulchan_Arukh,_Orach_Chayim.318", "intro": {"lead": {"t": "'תנא דידן שבק בישול סממנין ונקט סידורא דפת'", "ref": ""}, "body": "בישול אינה אחת מל\"ט אבות מלאכה, ואינה נמנית במשנת אבות המלאכה, אלא 'תנא דידן שבק בישול סממנין ונקט סידורא דפת'."}}, "sections": {"kitzur": {"title": "קיצור כלים — מדרג קלות הבישול", "seif": null, "sugya": null, "intro": "מפה תמציתית של היררכיית הכלים ומדרג קלות הבישול — לחזור אליה בכל נושא. (המושגים מקושרים גם למילון.)", "ops": [{"layer": "note", "srcRef": null, "src": "כלי ראשון שעל האש", "txt": "אסור בבישול מן התורה. (רבי לרב יצחק: לא לשפוך שמן לאמבטי שהיא כלי ראשון; ואין נותנים ביצה בצד המיחם שתתגלגל.)"}, {"layer": "note", "srcRef": null, "src": "כלי ראשון שהורד מהאש", "txt": "שו״ע (רש״י): מבשל כל עוד יד סולדת בו. מרדכי: מבשל כל עוד רותח, אף אם כבר אין יד סולדת בו. (לכו״ע תבלינים מתבשלים אף לאחר שירד מחום שהידס״ב.)"}, {"layer": "note", "srcRef": null, "src": "עירוי מכלי ראשון", "txt": "רשב״ם: אינו מבשל. ר״ת: מבשל (כדי קליפה). תוס׳ (ר״י): עירוי אף מכלי שני מבשל קלי בישול ודברים שהדחתם גמר מלאכתם. שו״ע: כר״ת — עירוי מכלי ראשון מבשל."}, {"layer": "note", "srcRef": null, "src": "כלי שני", "txt": "עפ״י פשט הסוגיה — אינו מבשל. תוס׳ (ר״י): אינו מבשל, אך אסור משום מיחזי כמבשל. יראים: כל כלי שהידס״ב אסור לבשל בו. שו״ע: לא הכריע (משנ״ב מיקל). רמ״א: מחמיר. ערוך השולחן: מחמיר רק בקלי הבישול."}, {"layer": "note", "srcRef": null, "src": "מצקת — ראשון או שני?", "txt": "שהתה בסיר — ככלי ראשון. לא: פרי חדש — כלי שני; ט״ז — רק מה שמערים עליו מכלי ראשון; שש״כ — ככלי ראשון; מנחת יצחק — כלי שני."}, {"layer": "note", "srcRef": null, "src": "מדרג קלות הבישול", "txt": "קשה בישול — רק בכלי ראשון שעל האש. רגיל — בכלי ראשון שהורד (בהידס״ב). תבלין — בכלי ראשון שהורד אף בלא הידס״ב, לא בכלי שני. קלי בישול — אף בכלי שני (תוס׳: אף בעירוי; יראים/רא״מ: אף בכלי שלישי)."}, {"layer": "note", "srcRef": null, "src": "מלח", "txt": "שו״ע (רי״ף, רמב״ם, רא״ש): אינו מתבשל אף בכלי ראשון שהורד. רמ״א: קל בישול, מתבשל אף בכלי שני. ר״ן: בכלי ראשון שעל האש — מתבשל לכו״ע."}, {"layer": "note", "srcRef": null, "src": "תה", "txt": "עלי תה אינם מבושלים בייצור. כלי ראשון/עירוי — אסור לשו״ע ולרמ״א. כלי שני: לרמ״א אסור; לשו״ע לא הוכרע (משנ״ב מיקל). ולכו״ע מותר לבשל העלים לפני שבת ולהכין תה בשבת (אין בא״ב ביבש)."}], "pesak": null}, "maase": {"title": "הגדרת מעשה הבישול (ריכוך או הקשייה)", "seif": null, "sugya": null, "intro": "מהו 'מעשה בישול' — ריכוך, הקשייה, או כל התקנת מאכל בחום?", "ops": [{"layer": "gemara", "src": "גמרא · רב פפא", "srcRef": null, "txt": "התנא עבר מ'בישול סממנין' ל'אופה' — כי הסידור במשנה הוא של מלאכות יצירת הפת (זורע, חורש, קוצר...), ואפייה היא בישול הפת.", "collapsed": true, "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "רב אחא בר רב עוירא", "srcRef": null, "txt": "הזורק סיכתא (יתד) לכבשן שתתקשה — חייב. ובסוגיה: החיוב משום שהיתד מתרככת קודם ורק אז מתקשה ('מירפא רפי והדר קמיט').", "ref": {"label": "שם", "ref": "Shabbat.74a"}}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "היתד מתרככת בחום ואז מתקשה — 'וכי רפי ברישא הוי בישולו'. בישול הוא ריכוך (ושייך אף בדברים שאינם אוכל)."}, {"layer": "rishon", "src": "רמב״ם", "srcRef": null, "txt": "'כללו של דבר: בין שריפה גוף קשה באש או שהקשה גוף רך — הרי זה חייב משום מבשל.' משמע שכל התקנת מאכל בחום נאסרת, לא רק ריכוך."}, {"layer": "acharon", "src": "משנה ברורה", "srcRef": null, "txt": "הרמב״ם אינו חולק על רש״י שעיקר בישול הוא ריכוך — אלא שבכל הקשייה ודאי יש ריכוך תחילה.", "under": true}], "pesak": null}, "shiur_mutzak": {"title": "שיעור בישול במוצק — כמאב״ד", "seif": "סעיף ב׳", "sugya": null, "intro": "מהו שיעור הבישול המחייב במאכל מוצק?", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "אין צולין בשר בצל וביצה בערב שבת אלא כדי שיצולו מבעוד יום (אסור להניחם להתבשל אלא אם יספיקו להתבשל לפני שבת).", "ref": {"label": "שבת · פרק יציאות השבת · יט ע\"ב", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "גמרא · רבי אלעזר", "srcRef": null, "txt": "שיעור הבישול — כמאכל בן דרוסאי.", "ref": {"label": "שם", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "חנניה", "srcRef": null, "txt": "כל שמבושל כמאב״ד — מותר להשהותו על גבי כירה (שכבר מבושל; אך ודאי יש חשש חיתוי).", "collapsed": true}, {"layer": "rishon", "src": "רש״י · רמב״ם", "srcRef": null, "txt": "מהו שיעור מאב״ד? רש״י: שליש בישול. רמב״ם: חצי בישול."}, {"layer": "rishon", "src": "הר״ן (קושיה ותירוץ)", "srcRef": null, "txt": "הקשה: מהסוגיה משמע שמותר להשהות מבושל כמאב״ד, ולרמב״ם (רנג,א) רק כל צרכו. ותירץ: לעניין שהייה חוששים 'שמא יחתה', והחשש בטל בכל צרכו; וכאן (בשר על הגחלים בלא קדרה) — אם יחתה ייחרך, ולכן לא חוששים.", "collapsed": true}, {"layer": "rishon", "src": "בית יוסף (ברמב״ם)", "srcRef": null, "txt": "ההיתר להשהות מבושל כמאב״ד על הגחלים — רק אם מבושל כך משני צדדיו.", "collapsed": true}, {"layer": "shulchan", "src": "שולחן ערוך · רנ״ד · (סע׳ ב׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.254.2", "txt": "כרמב״ם — שיעור מאב״ד הוא חצי בישולו; ואסור לצלות בשר בצל וביצה על הגחלים אלא כדי שיצלו משני הצדדים כמאב״ד מבעוד יום."}, {"layer": "acharon", "src": "משנה ברורה", "srcRef": null, "txt": "אף בשר גדי (שבס׳ א מותר להשהות אף שאינו כמאב״ד) — על הגחלים ממש אסור, שדואג שיתבשל מהר ויש חשש שמא יחתה.", "under": true}], "pesak": null}, "shiur_nozel": {"title": "שיעור בישול בנוזל — יד סולדת בו", "seif": "סעיף י״ד", "sugya": null, "intro": "בנוזל, האיסור מדאורייתא אינו במידת בישול אלא בדרגת חום — חום שהיד סולדת בו.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "מניח אדם קיתון מים כנגד מדורה — לא כדי שיחמו, אלא כדי שיפשירו מצינתם.", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "שמואל", "srcRef": null, "txt": "אחד שמן ואחד מים — יד סולדת בו, אסור.", "ref": {"label": "שם", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מהו 'יד סולדת בו'? כל שכריסו של תינוק נכווית בו. וכן נקט השו״ע."}, {"layer": "zman", "src": "פוסקי זמננו", "srcRef": null, "txt": "הגדרה משתנה: הדעות נעות מ־45° (הגרש״ז אויערבך) ועד 71° (הרב פיינשטיין)."}], "pesak": null}, "makor": {"title": "מקור החום — חמה ותולדותיה", "seif": "סעיף ג׳", "sugya": null, "intro": "מדאורייתא אסור לבשל באש ובתולדותיה; בחמה ותולדותיה מותר מן התורה — אך תולדות חמה נאסרו מדרבנן (אטו תולדות האש).", "ops": [{"layer": "mishna", "src": "משנה · ת״ק · רבי יוסי", "srcRef": null, "txt": "אין נותנים ביצה בצד המיחם (תולדות האש) שתתגלגל, ואין מטמינה בחול. ובתולדות חמה — נחלקו ת״ק ורבי יוסי אם מותר לשבור ביצה על בגד שהוחם בשמש.", "ref": {"label": "שבת · פרק כירה · לח ע\"ב", "ref": "Shabbat.38b"}}, {"layer": "gemara", "src": "גמרא · רב נחמן", "srcRef": null, "txt": "לכו״ע מותר בחמה ואסור באוּר. ת״ק ורבי יוסי נחלקו בתולדות חמה — ת״ק אוסר שמא יבשל בתולדות האוּר.", "ref": {"label": "שם", "ref": "Shabbat.38b"}}, {"layer": "rishon", "src": "ראשונים", "srcRef": null, "txt": "פסקו כת״ק — אסור מדרבנן לבשל בתולדות חמה."}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "בחמה מותר, שאין זו דרך בישול; ולא גוזרים אטו, שאין סיבה להתבלבל.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ג׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.3", "txt": "כת״ק — אסור לבשל בתולדות חמה (שמא י rishon", "src": "יראים", "srcRef": null, "txt": "מכאן שיש בישול אחר אפייה — הבישול ביטל את האפייה ושינה את המצה. וכן בישול אחר צלייה."}, {"layer": "rishon", "src": "ראבי״ה", "srcRef": null, "txt": "חלק — מהות המצה לא השתנתה, רק טעמה; ולצאת י״ח מצה בעינן טעם מצה. ואין בישול אחר אפייה.", "under": true}, {"layer": "rishon", "src": "סמ״ק · סמ״ג (בדעת היראים)", "srcRef": null, "txt": "עד איזה כלי נאסרת נתינת פת? סמ״ק (רא״מ): רק כלי ראשון (בשני מותר). סמ״ג: אף כלי שני, שהלחם מקלי הבישול."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ה׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.5", "txt": "הביא היראים ב'יש אומרים' כהבנת הסמ״ג (אף כלי שני), וכתב 'ויש מי שמתיר'."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "ה'יש מתירים' כסמ״ק — בכלי שני; אך בכלי ראשון לכו״ע אסור. והביא שיש מתירים אף בכלי ראשון (כראבי״ה), וסבר להחמיר כסמ״ג."}, {"layer": "acharon", "src": "באר הגולה", "srcRef": null, "txt": "ה'יש מתירים' שבשו״ע מכוון לראבי״ה — ומשמע שהשו״ע מיקל שאין בישול אחר אפייה כלל.", "under": true}, {"layer": "zman", "src": "הרב עובדיה (יחוה דעת)", "srcRef": null, "txt": "אין בישול אחר אפייה; ובכך תירץ את הקושי מס׳ טו (שם משמע שיש בא״ב רק בנוזל).", "under": true, "collapsed": true}, {"layer": "acharon", "src": "פרטים נוספים", "srcRef": null, "txt": "לכו״ע אין אפייה אחר אפייה וצלייה אחר צלייה. שש״כ: יש בישול אחר טיגון ולהיפך (אלא בטיגון עמוק). בה״ל: מכמה תהליכים — האחרון נחשב. פמ״ג: כל עוד נעשה תהליך — לא שייך בו יותר.", "collapsed": true}, {"layer": "lead", "srcRef": null, "txt": "קלוי — ולשו״ע (אין בא״א) מותר אף בעירוי מכלי ראשון. אור לציון: קלייה אינה אפייה גמורה, ולכן דינו כתבלין (אסור בעירוי מכלי״ר) או כקל בישול (רק מכלי שלישי). הרב עובדיה: אבקת קפה ראויה כמות שהיא, ומותר. קפה נמס — מותר לרוב (עבר בישול, ואין בא״ב ביבש).", "src": "קפה"}], "pesak": null}, "hadacha": {"title": "'הדחתו היא גמר מלאכתו', כלי ראשון וקלי הבישול", "seif": "סעיף ד׳", "sugya": null, "intro": "מה שלא בושל — מותר רק להדיחו בחמין להפיג צינתו, חוץ מדברים ש'הדחתם היא גמר מלאכתם'.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כל שבא בחמין מער״ש שורין אותו בשבת; ומה שלא — אין שורין, אך מותר להדיחו בחמין, חוץ מן המליח הישן וקולייס האיספנין, שהדחתן היא גמר מלאכתן.", "ref": {"label": "שבת · פרק חבית · קמה ע\"א", "ref": "Shabbat.145a"}}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "מליח הישן וקולייס האיספנין = דגים מלוחים."}, {"layer": "rishon", "src": "ספר הפרדס", "srcRef": null, "txt": "קולייס = דג מלוח; ומליח הישן = בשר מלוח הרבה (שאינו נאכל בלא הדחה).", "collapsed": true}, {"subhead": "שיטת בעלי התוס׳ בהדחה (סע׳ י׳)"}, {"layer": "rishon", "src": "רשב״ם", "srcRef": null, "txt": "מותר עירוי מכלי ראשון.", "under": true}, {"layer": "rishon", "src": "ר״ת", "srcRef": null, "txt": "עירוי מכלי ראשון חשיב ככלי ראשון — ולכן מותר רק בכלי שני.", "under": true}, {"layer": "rishon", "src": "ר״י (בתוס׳)", "srcRef": null, "txt": "רק עירוי מכלי שני מותר; ושרייה בכלי שני אסורה משום מיחזי כמבשל. ורק בדבר ש'הדחתו גמר מלאכתו' (וקלי בישול) אסור אף בעירוי מכלי שני; בסתם דברים — עירוי מכלי שני אינו מבשל."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.10", "txt": "עירוי מכלי ראשון מבשל (ובס׳ יג — בישול בכלי שני)."}, {"layer": "acharon", "src": "פוסקים", "srcRef": null, "txt": "דבר שהדחתו גמר מלאכתו — אסור להדיחו אף בכלי שני, שגם בחום זה שטיפתו מכשירתו."}, {"layer": "acharon", "src": "ט״ז", "srcRef": null, "txt": "דגים מלוחים (הרינג) — מותר להדיחם רק במים צוננים, שאין בהדחתם גמר מלאכה.", "under": true}, {"layer": "acharon", "src": "אליה רבה · מחצית השקל", "srcRef": null, "txt": "מותר אף לערות מים חמים מכלי שני — שדבר שהדחתו בצוננים מכשירתו, משמע שבחמים אינה בישול.", "under": true}, {"layer": "acharon", "src": "פמ״ג · נשמת אדם", "srcRef": null, "txt": "אסרו אף במים צוננים — שכל שטיפה המכשירתו אסורה משום 'מכה בפטיש', בין חם בין קר.", "under": true}, {"layer": "acharon", "src": "ביאור הלכה", "srcRef": null, "txt": "לא שייך מכה בפטיש באוכלים (ראיה מהטמנת ביצה בחול — דרבנן); ומה שאסור בחמים משום בישול. ולכן מותר מכלי שני בחמים (כא״ר ומחצה״ש).", "under": true}, {"subhead": "מלח וקלי הבישול (סע׳ ט׳)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "האילפס והקדרה שהעבירן מרותחין (הורדו מהאש) — אסור לתת לתוכם תבלין, אבל נותנים לקערה או לתמחוי. (כלי ראשון מבשל אף שהורד; כלי שני אינו מבשל.)", "ref": {"label": "שבת · פרק כירה · מב ע\"א", "ref": "Shabbat.42a"}}, {"layer": "gemara", "src": "רב יוסף · אביי · רב נחמן", "srcRef": null, "txt": "רב יוסף: מלח כתבלין. אביי (לשון א'): מלח אינו כתבלין ומתבשל אף בכלי שני (קל בישול); רב נחמן חולק — 'צריכא מילחא בישולא כבשרא דתורא'. אביי (לשון ב'): מלח אינו מתבשל אף בכלי ראשון; ורב נחמן מסכים."}, {"layer": "rishon", "src": "רי״ף · רמב״ם · רא״ש", "srcRef": null, "txt": "כלשון השנייה — מלח קשה בבישולו, ואינו מתבשל אף בכלי ראשון (שהורד), ולכן מותר."}, {"layer": "rishon", "src": "הגהות אשרי · תוספות", "srcRef": null, "txt": "כך, אך המחמיר שלא לתת מלח אף בכלי שני — תבוא עליו הברכה.", "under": true}, {"layer": "rishon", "src": "ריטב״א", "srcRef": null, "txt": "יש להחמיר כלשון הראשונה, ולא לתת מלח אף בכלי שני (בדאורייתא — כלישנא מחמירה).", "under": true}, {"layer": "rishon", "src": "הר״ן", "srcRef": null, "txt": "הלשון המקילה רק בכלי ראשון שהורד; אך בעודו על האש — לכו״ע אף מלח (ואף בשר השור) מתבשל.", "under": true}, {"layer": "rishon", "src": "שיבולי הלקט", "srcRef": null, "txt": "עבר ונתן מלח באיסור (אף במזיד) — אין לאסור המאכל, שבטל המלח.", "collapsed": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ט׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "כרי״ף וסיעתו — מותר לתת מלח בכלי ראשון שהורד מהאש."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "יש אוסרים (כריטב״א) אף בכלי שני; ו'המחמיר תבוא עליו הברכה'. ומי שעבר ונתן מלח בכלי ראשון שעל האש — מותר לאכול (שיבולי הלקט)."}, {"layer": "acharon", "src": "משנה ברורה (סוכר)", "srcRef": null, "txt": "עדיף להחמיר בסוכר ולא לבשלו אלא בכלי שני (אף שנתבשל בייצורו)."}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "מיקל בסוכר — דינו כמלח, ולמלח קיי״ל כשו״ע שמותר אף בכלי ראשון (שהורד).", "under": true}, {"layer": "rishon", "src": "ר״ן · רמב״ם (קלי בישול)", "srcRef": null, "txt": "אין חשש לקלי בישול — מותר הכול בכלי שני.", "collapsed": true}, {"subhead": "כח החימום של כלי ראשון (סע׳ ט׳)"}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "כל עוד יד סולדת בו — דינו ככלי ראשון."}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "כל עוד לא נח מרתיחתו — אף אם כבר אין יד סולדת בו."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ט׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "כרש״י — כלי ראשון מבשל אף לאחר שהורד, כל עוד יד סולדת בו (ולכן אסור לתת בו תבלין, אך מלח מותר)."}], "pesak": null}, "hafshara": {"title": "הפשרת נוזלים, בא״ב בלח (יד-טו, יז)", "seif": "סעיף י״ד", "sugya": null, "intro": "עד היכן מותר לקרב נוזל לאש כדי להפשירו?", "ops": [{"layer": "gemara", "src": "ברייתא · שמואל", "srcRef": null, "txt": "מניח קיתון מים כנגד מדורה כדי שיפשירו מצינתם; ו'אחד שמן אחד מים — יד סולדת בו, אסור' ('יד סולדת' — כל שכריסו של תינוק נכווית).", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "מותר לשים אף קרוב למדורה, ובלבד שיוציאם לפני שיגיעו לחום שהידס״ב.", "under": true}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "אסור להניח קרוב, שמא יגיעו לחום שהידס״ב; אלא רק במרחק שלא יגיעו לחום זה אף אם ישכחם. (וכן על מיחם.)"}, {"layer": "rishon", "src": "רשב״א", "srcRef": null, "txt": "כל זה בדבר צונן שלא נתבשל; אך דבר שכבר נתבשל ונצטנן — מותר אף כנגד המדורה.", "under": true}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "אף פירות הנאכלים חיים — חימומם 'בישול', ולכן מותר רק להפשירם, לא לחממם.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י״ד)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.14", "txt": "כתוספות — מותר להניח נוזלים להפשיר כנגד אש, אך רחוק דיו שלא יגיעו לחום שהידס״ב. (ס׳ יז: הנחה ע״ג מיחם = כנגד מדורה.)"}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "כמרדכי — הדין כן אף בפירות הנאכלים חיים: מותר להפשיר, לא לחמם."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ט״ו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.15", "txt": "דבר שנתבשל כראוי ונצטנן — מותר להניחו כנגד האש אף במקום שיגיע לחום שהידס״ב (מ״ב: לא קרוב יותר, שמא יחתה). אך בלח — אסור, שיש בא״ב בלח."}, {"layer": "rama", "src": "רמ״א · (ס׳ ט״ו)", "srcRef": null, "txt": "מיקל בתבשיל לח — כל עוד לא נצטנן לגמרי, מותר. (נפק״מ: לשו״ע אסור כל נוזל שירד מ־71°; לרמ״א רק נוזל קר.)", "under": true}], "pesak": null}, "irbuv": {"title": "ערבוב מים חמים וקרים (יא-יג)", "seif": "סעיף י״א-י״ג", "sugya": null, "intro": "שתי סוגיות — 'מיחם שפינהו' ומחלוקת ב״ש וב״ה בערבוב חמים וקרים — נפסקות יחד.", "ops": [{"layer": "gemara", "src": "משנה · רב אדא בר מתנה · אביי", "srcRef": null, "txt": "מיחם ש'פינהו' — אסור לתת בו מעט מים קרים (שיירתחו), ומותר הרבה (שרק יפשירו). רב אדא: פינה את המים החמים. אביי: פינה מן האש.", "ref": {"label": "שבת · פרק כירה · מא ע\"א", "ref": "Shabbat.41a"}}, {"layer": "mishna", "src": "ברייתא · ב״ש · ב״ה", "srcRef": null, "txt": "ב״ש: מותר חמים לקרים, לא קרים לחמים. ב״ה: גם וגם. ת״ק: דברי ב״ה בכוס; אך באמבטי מודים ב״ה לב״ש (רק חמים לקרים).", "ref": {"label": "שם · מב ע\"א", "ref": "Shabbat.42a"}}, {"layer": "rishon", "src": "רי״ף", "srcRef": null, "txt": "כת״ק בדעת ב״ה — בכוס לכאן ולכאן, ובאמבטי רק חמים לקרים."}, {"layer": "rishon", "src": "ר״ן", "srcRef": null, "txt": "האמבטי כלי ראשון (מבשל); ואף שבמיחם שפינהו מותר קרים לחמים בהרבה — באמבטי מקפידים על חומה ולא יתן די, ולכן גזרו.", "under": true}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "כוס ואמבטי שניהם כלי שני; אך באמבטי, שרותחת, הרואה יחשוב שהיא כלי ראשון והשופך עושה איסור.", "under": true}, {"layer": "rishon", "src": "רש״י · תוס׳ · ר״ן ורשב״א", "srcRef": null, "txt": "למה חמים לקרים מותר לכו״ע (הרי עירוי מכלי ראשון מבשל)? רש״י: 'תתאה גבר'. תוס׳: אין תתאה גבר, אך בקרים מרובים. ר״ן ורשב״א: בעירוי המים מתערבבים ולעולם לא יחממו (אף במעט קרים).", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י״א-י״ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.12", "txt": "כרב אדא בר מתנה: מיחם שפינה ממנו מים חמים — מותר לתת בו קרים (הרבה) שיפשירו. מותר חמים לקרים; וקרים לחמים — רק לכלי שני. (מ״ב: לחמים לקרים כרשב״א, אף במעט קרים.)"}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "כתוספות/אביי — קרים לחמים מותר אף בכלי ראשון אם נותן הרבה; ובחמים לקרים — רק אם הקרים מרובים.", "under": true}], "pesak": null}, "meicham": {"title": "מיחם על מיחם (ו-ח)", "seif": "סעיף ו׳-ח׳", "sugya": null, "intro": "הנחת כלי חם על כלי חם לשמירת חום — מתי מותר?", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "מותר להניח מיחם ע״ג מיחם וקדרה ע״ג קדרה לשמור חומם, אך לא כדי שייתבשלו.", "ref": {"label": "שבת · פרק במה טומנין · נא ע\"א", "ref": "Shabbat.51a"}}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "מותר רק במקום שלא יגיע לחום שהידס״ב (שמא יישכח) — כשיטתם בקיתון. (רש״י מיקל כל עוד מוריד לפני הבישול — לא נפסק.)"}, {"layer": "rishon", "src": "ר׳ ירוחם (רנ״ח)", "srcRef": null, "txt": "א) יש אומרים שההיתר רק כשהתחתון אינו על האש; ויש אומרים אף על האש. ב) יש שדימו מיחם ע״ג מיחם שעל האש להנחה כנגד מדורה (ובא״ב ביבש מותר); ויש שדימוהו להנחה ע״ג כירה (ואף בא״ב אסור, מיחזי כמבשל).", "collapsed": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ו׳-ח׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.8", "txt": "ס׳ ו: העתיק הברייתא. ס׳ ז: הביא מחלוקת ראשונה ולא הכריע. ס׳ ח: פסק כמקילה — נחשב כהנחה כנגד המדורה, ומותר בא״ב ביבש."}], "pesak": null}, "megis": {"title": "מגיס (יח)", "seif": "סעיף י״ח", "sugya": null, "intro": "הגסה (ערבוב תבשיל) מסייעת לבישול ואסורה — מתי?", "ops": [{"layer": "gemara", "src": "ברייתא (ביצה לד)", "srcRef": null, "txt": "'אחד מביא את המים, אחד את האור... ואחד מגיס — כולם חייבים.' חייבים בהגסה משום בישול.", "ref": {"label": "ביצה · לד ע\"א", "ref": "Beitzah.34a"}}, {"layer": "gemara", "src": "גמרא · ר״ן", "srcRef": null, "txt": "יורה עקורה (שהורדה) שבישלו בה — 'ניחוש שמא מגיס'. הר״ן: כל שאינו מבושל (לשונו כמאב״ד; ולשו״ע כ״צ) — חייב משום מגיס אף שהורד; ומבושל כשיעור — מותר.", "ref": {"label": "שבת · יח ע\"א", "ref": "Shabbat.18a"}}, {"layer": "rishon", "src": "כלבו", "srcRef": null, "txt": "על האש — אף מבושל כל צרכו אסור מן התורה להגיס.", "under": true}, {"layer": "rishon", "src": "הרב המגיד", "srcRef": null, "txt": "על האש — אסור רק מדרבנן משום מיחזי כמבשל.", "under": true}, {"layer": "rishon", "src": "מהר״י וייל", "srcRef": null, "txt": "אוסר כל הגסה, אף בדבר המבושל כ״צ שירד מהאש.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י״ח)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.18", "txt": "דבר שירד מהאש — מותר להגיס רק אם מבושל כל צרכו (כר״ן); ואף הוצאה בכף נחשבת הגסה."}, {"layer": "acharon", "src": "משנה ברורה", "srcRef": null, "txt": "על האש ומבושל כל צרכו — מותר להוציא בכף, ולא שייך מיחזי כמבשל.", "under": true}, {"layer": "acharon", "src": "אליה רבה", "srcRef": null, "txt": "יש לחוש לכלבו — על האש אף בכ״צ יש איסור דאורייתא, לא רק מיחזי.", "under": true}], "pesak": null}, "yishum": {"title": "יישום למעשה", "seif": null, "sugya": null, "intro": "כיצד נוהגים בשבת בפועל — לפי סוג המאכל ומצבו?", "ops": [{"layer": "lead", "srcRef": null, "txt": "לשו״ע (ס׳ טו) מותר להניחו 'כנגד האש' אף במקום שיגיע לחום שהידס״ב — אך לא על מקור החום עצמו (חשש 'שמא יחתה'). בפלטה שאי אפשר לשנות חומה, לרוב הפוסקים אין חשש חיתוי ואפשר אף עליה. נשאר חשש מיחזי כמבשל: לרב עובדיה בפלטה (שעיקרה לשבת) בטל; ואם לא — מניחים קדרה ריקנית/הפוכה (במחלוקת המרדכי/רשב״א ברנ״ג, והפמ״ג/מג״א).", "src": "דבר יבש שנתבשל"}, {"layer": "lead", "srcRef": null, "txt": "אסור לבשלו; באוּר/תולדותיו/תולדות חמה אסור להביאו אף לשיעור כמאב״ד, ובנוזלים אסור להניחם במקום שיגיעו לחום שהידס״ב. וכל שטיפה המכשירתו ('הדחתו גמר מלאכתו') אסורה; ומכלי שני — מחלוקת: א״ר ומחצה״ש מתירים בחמין, ט״ז רק בצונן, פמ״ג אף בצונן אוסר.", "src": "דבר שלא נתבשל כלל"}, {"layer": "lead", "srcRef": null, "txt": "בושל כ״צ ונצטנן — שו״ע אוסר; רמ״א מיקל במצטמק־ויפה־לו/שלא נצטנן לגמרי (סמוך לכירה, לא עליה). ולהפשיר נוזל קר — מותר אף לשו״ע, בהנחה במרחק שלא יגיע לחום שהידס״ב (ולחומרא 45°).", "src": "דבר לח/נוזל"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "kitzur"}, {"type": "group", "title": "הגדרות היסוד", "spans": "מעשה · שיעור · מקור החום", "children": ["maase", "shiur_mutzak", "shiur_nozel", "makor"]}, {"type": "sec", "id": "bab"}, {"type": "sec", "id": "baa"}, {"type": "sec", "id": "hadacha"}, {"type": "sec", "id": "hafshara"}, {"type": "sec", "id": "irbuv"}, {"type": "sec", "id": "meicham"}, {"type": "sec", "id": "megis"}, {"type": "sec", "id": "yishum"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"יד סולדת בו": "החום שבו היד נרתעת מלגעת (כ־45°C ומעלה) — השיעור שממנו יש בישול. בקיצור: הידס״ב.", "כלי ראשון": "הכלי שהתבשל בו על האש; מבשל כל עוד יד סולדת בו, אף לאחר שהורד מן האש.", "עירוי": "שפיכת נוזל חם מכלי ראשון; לשו״ע (כר״ת) מבשל את פני הדבר כדי קליפה.", "כלי שני": "הכלי שאליו הועבר הנוזל מכלי ראשון; לפי פשט הסוגיה אינו מבשל (מלבד קלי בישול).", "כלי שלישי": "הכלי שאחרי כלי שני; מיקל עוד יותר (יש שהתירו בו אף קלי בישול).", "קלי בישול": "מאכלים המתבשלים בקלות — אף בכלי שני (ולתוס׳ אף בעירוי מכלי שני).", "תבלין": "מתבשל בכלי ראשון שהורד מהאש אף בלא יד סולדת בו, אך אינו מתבשל בכלי שני.", "מדרג קלות בישול": "סולם עד כמה מאכל מתבשל בקלות (קשה בישול ← רגיל ← תבלין ← קלי בישול), הקובע באיזה כלי נאסר בישולו.", "מצקת": "כף גדולה לשאיבת נוזל; ספק אם דינה ככלי ראשון או ככלי שני.", "מאכל בן דרוסאי": "כשליש (או כחצי) בישול — השיעור שממנו המאכל נחשב מבושל. בקיצור: מאב״ד.", "בישול אחר בישול": "האם יש איסור לחמם דבר שכבר התבשל; ביבש אין (לרוב), ובלח — מחלוקת.", "מעשה בישול": "ריכוך דבר קשה או הקשיית דבר רך על ידי חום.", "מגיס": "ערבוב תבשיל; מסייע לבישול ולכן אסור בתבשיל שאינו מבושל כל צרכו.", "מצטמק ויפה לו": "תבשיל לח שהצטמקותו משביחה אותו; רק בו סובר הרמ״א שיש בישול אחר בישול."}, "subject": "שבת", "id": "bishul"}, {"topic": {"title": "נ\"ט בר נ\"ט", "eyebrow": "מבחני הרבנות · איסור והיתר · סימן צ\"ה", "siman": "Shulchan_Arukh,_Yoreh_De'ah.95", "intro": {"lead": {"t": "", "ref": ""}, "body": "למדנו כי טעם כעיקר. בסימן זה, נראה מקרה פרטי בו נגלה כי למרות שישנו טעם, מאחר והוא נקלש, לא מתייחסים אליו. מקרה זה מתקיים בסיטואציה המכונה 'נותן טעם בר נותן טעם'; היינו, כאשר מאכל אינו נותן טעם במאכל אחר ישירות, כמו שאנו מכירים בד\"כ, אלא נותן טעם בכלי, ואזי הכלי נותן טעם במאכל האחר. או אז, טעם המאכל הראשון נקלש בדרכו למאכל האחר, וככזה – כטעם קלוש - אין בו חשיבות (ערוה\"ש)\n\nנעמוד גם על כך שיש הבדל קריטי בדיון זה בין היתר - בשר או חלב - לבין איסור. כך, להלכה נפסק כי למרות שבנתינת טעם שאינה ישירה הטעם נקלש, כאשר מדובר באיסור אנו לא מקלים בכך, ועדיין חשיב טעם כדי לאסור. ורק בטעם של היתר נקל כך (ר\"ן). זאת משום שטעם של איסור חשיבותו תמיד נוכחת."}}, "sections": {"ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳-ב׳", "sugya": null, "ops": [{"subhead": "דגים שעלו בקערה"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**רב ושמואל** – דגים שעלו בקערה של בשר.\n**רב** - אסור לאוכלם בכותח\n**שמואל** – מותר לאוכלם בכותח\nוהגמרא מנסחת שלֶ-\n   רב אסור משום שהווי נותן טעם,\n   ולשמואל מותר משום שהווי נ\"ט בר נ\"ט (הבשר בקערה והקערה בדגים)\n~~(והגמרא אומרת שסיבת עמדת רב נלמדת מכללא, ומחפשת אחר זה סיפור שממנו נלמד כן)~~\n~~חזקיה משום אביי:~~\n   ~~דגים שעלו בקערה, מותר לאוכלן בכותח~~\n   ~~צנון שחתכו בסכין שחתך בה בשר – אסור לאוכלו בכותח דאגב חורפיה בלע~~", "ref": {"label": "חולין · פרק כל הבשר · קיא ע\"ב", "ref": "Chullin.111b"}}, {"layer": "rishon", "src": "תוס' ורא\"ש", "srcRef": null, "txt": "'עלו בקערה' – הדגים רותחים והעלו אותם על קערה צוננת (וכן להפך)\nכלומר: נ\"ט בר נ\"ט דהיתרא – האוכל חם הכלי צונן/להפך; נ\"ט בר נ\"ט דאיסורא – שניהם חמים"}, {"layer": "rishon", "src": "רש\"י, תרומה", "srcRef": null, "txt": "אפילו אם שניהם חמים או בושלו יחד - מותר לאכול בחלב (כי יש פיזור טעם במים). אסור רק אם בושל עם הבשר ממש"}, {"layer": "rishon", "src": "רשב\"א, ר\"ן, ראבי\"ה רמב\"ם", "srcRef": null, "txt": "אפילו נצלו בכלי הבשרי"}, {"layer": "rishon", "src": "ריו\"ח", "srcRef": null, "txt": "1)  אם גם המאכל הפרווה וגם הכלי הבשרי חמים (בושל בכלי) –\n    א.  מותר בחלב רק אם הכלי לא ב\"י\n    ב.  אם הכלי ב\"י – מותר רק בדיעבד (כבר בושל)\n2)  חם וקר כנ\"ל (הקערה/הדגים) צריך לקלוף (כמו בצ\"א, בדין קר וחם שנגעו ממש)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "חולק בשניהם – גם אם הכלי ב\"י ואפילו לכתחילה\nחולק. שטויות. אז בשביל מה יש לנו נ\"ט בר נ\"ט? זה דין רק בנ\"ט ממש.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.1", "txt": "דגים שבושלו או נצלו בכלי בשרי נקי (שאין בו שאריות) – מותר לאוכלו בכותח (רשב\"א ר\"ן רמב\"ם)"}, {"layer": "zman", "src": "הרב מלמד", "srcRef": null, "txt": "מצדד, אבל לא בגלל נ\"ט בר נ\"ט, אלא כי כיום כלי מתכת וזכוכית נקיים אינם פולטים כלל", "under": true}, {"layer": "lead", "srcRef": null, "txt": "הרמ\"א פה עשוי לבלבל. הוא כביכול פוסק תוס' ורא\"ש, אך רק לכתחילה. ובדיעבד מתיר כדעה המקלה דרשב\"א והרמב\"ם. כלומר: אין לבשל פרווה בבשרי לכתחילה במטרה לאוכלו עם חלב, אבל מותר בדיעבד"}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.2", "txt": "לכתחילה כתוס' ורא\"ש (אין לבשל ולצלות פרווה בכלי בשרי ע\"מ לאכול עם חלב), אך בדיעבד מותר כרשב\"א (סמ\"ק)"}, {"layer": "acharon", "src": "מהרש\"ל", "srcRef": null, "txt": "אם נצלו – אפילו בדיעבד אסור עם חלב (כי אין מים)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הרמ\"א לא מתיר לאכול לכתחילה אם בדיעבד בישל, אלא רק אם כבר התערבב הפרווה עם החלב – בדיעבד מותר", "under": true}, {"subhead": "לכתחילה או בדיעבד?"}, {"layer": "lead", "srcRef": null, "txt": "בסוגריים ציינתי מה פירוש בדיעבד ולכתחילה, אבל רק כדי לסבר את האוזן.. יש גם בזה מחלוקת בין הפוסקים (בעיקר דעת הש\"ך על הרמ\"א)"}, {"layer": "rishon", "src": "סמ\"ק, הגהות מיימ'", "srcRef": null, "txt": "כל מה שמותר, הוא רק בדיעבד (כלומר, כבר בושל הפרווה בסיר בשרי)"}, {"layer": "rishon", "src": "תרומה", "srcRef": null, "txt": "אפילו לכתחילה (מותר לבשל את הפרווה בסיר בשרי לכתחילה כדי לאכלו עם חלב)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "נקט כדעה המקלה רק בדיעבד, שזה בעצם לפסוק סמ\"ק."}, {"layer": "rishon", "src": "הב\"י", "srcRef": null, "txt": "הביא מחלוקת זו. אבל לא הכריע בה במפורש להלכה בשו\"ע\nלשונו בשו\"ע היא די בדיעבדית \"דגים שבושלו\"\nמצד שני, על ריו\"ח (שסבר כסמ\"ק) חלק וכתב במפורש אפילו לבשל מותר (ואפילו בב\"י)"}, {"layer": "acharon", "src": "ש\"ך, כו\"פ", "srcRef": null, "txt": "שו\"ע סובר כסמ\"ק שכל הדיון הוא רק בדיעבד"}, {"layer": "acharon", "src": "בן איש חי", "srcRef": null, "txt": "אבל בכלי שאינו ב\"י מותר אפילו לכתחילה", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "שו\"ע סובר שמותר לבשל אף לכתחילה פרווה כדי לאכול עם חלב"}, {"layer": "acharon", "src": "מנחת כהן", "srcRef": null, "txt": "אסור לבשל לכתחילה ע\"מ לאכול עם חלב, וקונסים את מי שעושה כן לא לאכול עם חלב"}, {"layer": "acharon", "src": "פר\"ח", "srcRef": null, "txt": "חולק. לא קונסים ('דגים שעלו' – אפילו במזיד)", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "דעת המ\"כ נראית; שלא להרגיל באיסור", "under": true}, {"subhead": "כשהכלי שבושל בו אינו ב\"י"}, {"layer": "lead", "srcRef": null, "txt": "בסוגיה עצמה אין כל חילוק בין אם הדגים עלו בכלי בן יומו לשאינו בן יומו. אך מובן כי ניתן לשלוף חילוק זה ולבחון האם נוכל לעדן את השיטות המחמירות יותר כאשר מדובר בכלי שאינו ב\"י, שהרי הווי נטל\"פ."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם הכלי שבושלו/ניצלו בו הדגים אינו ב\"י – מותר אף לכתחילה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "לשו\"ע אין חילוק, כי גם ככה מתיר (לא מדייק אם דעת השו\"ע בדיעבד או לכתחילה)", "under": true}, {"layer": "table", "table": {"title": "לאכול פרווה שבושל בכלי בשרי עם חלב", "cols": ["שו\"ע", "רמ\"א"], "rows": [{"head": "הכלי הבשרי\n**בן יומו**", "cells": ["מותר\n(לא פירש אם לכתחילה או בדיעבד)\n**ש\"ך**: דעתו בדיעבד (רק אם בושל)\n**רע\"י**: דעתו לכתחילה (מותר לבשל)", "אסור לכתחילה\nמותר בדיעבד\n**ש\"ך, ערוה\"ש**:\n   לכתחילה לרמ\"א = לערבב עם חלב\n   בדיעבד לרמ\"א = אם כבר התערב עם חלב - מותר לאכול"]}, {"head": "הכלי הבשרי\n**אינו בן יומו**", "cells": ["אין התייחסות.\nלרע\"י ק\"ו שמותר לכתחילה\n**בן איש חי**: מותר לכתחילה\nלש\"ך שסובר שבבן יומו דעת ש\"ע בדיעבד – אפשר להציע שסובר כבן איש חי", "מותר אף לכתחילה"]}]}}, {"layer": "zman", "src": "פניני הלכה", "srcRef": null, "txt": "כל הטַבלה נכונה לגבי כלי חרס ועץ / כלי מתכת זכוכית שאינם נקיים\nכלי מתכת וזכוכית נקיים כיום – אינם פולטים טעם כלל, וכל בני העדות יכולים לבשל לכתחילה פרווה בסיר בשרי (נקי) כדי לאכול עם חלב"}, {"layer": "acharon", "src": "עיון (הערת המסכם)", "srcRef": null, "txt": "בחזרה לסימן בשבט תשפ\"ב, מרגיש שדעת הש\"ך וערוה\"ש ברמ\"א לגבי מהו בדיעבד נכונה בו. ושזה מובהק מלשון האו\"ה שבדרכ\"מ. עוד ראיה להבנתם היא מכך שהוא מתיר כן בכלי שאינו בן יומו, כלומר, נטל\"פ. הרי שהוא סומך פשוט על הדין של נטל\"פ, שמותר בדיעבד.\nבנוסף, בעקבות הלימוד שלי עם החבורה את סימן צ\"ג, והניסיון להבין את סברת נ\"ט בר נ\"ט כאן, ואת המשמעות של לכתחילה ובדיעבד, נוטה יותר לדעת הרמ\"א לש\"ך להלכה. אם הבדיעבד כאן מותר, למה לאסור לכתחילה? כמו שדיברנו בסי' צ\"ג (ואני רואה שבדומה לכך אומר הרב מלמד), אכן הטעם לא משמעותי ברמה שאפשר להתירו. אלא שמאחר ויש רצון לשמור על הפרדת המטבח (ברמה מסוימת ויותר חד משמעית) – אז אוסרים לכתחילה.", "collapsed": true}, {"subhead": "בכלי חלבי (לא חלב ממש)"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "מה שאסור לאכול דגים שבושלו/נצלו בכלי בשרי עם חלב (תוס', רא\"ש) – חלב ממש. לאכלם בכלי חלבי מותר"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פוסק כן: מאכל פרווה שבושל בכלי בשרי - מותר לאכול בכלי חלבי"}, {"subhead": "בשני מאכלים"}, {"layer": "lead", "srcRef": null, "txt": "דגים שעלו בקערה זו דוגמא די ספציפית לנ\"ט בר נ\"ט: הטעם הראשון בכלי והשני במאכל (הדגים). אבל מה אם גם הטעם הראשון במאכל, ולא בכלי? האם עדיין אמרינן שהטעם נקלש?"}, {"layer": "rishon", "src": "תרומה, פמ\"ג", "srcRef": null, "txt": "נ\"ט בר נ\"ט בשני אוכלים אינו מותר"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כי הטעם לא נקלש באוכלים", "under": true}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "גם נ\"ט בר נ\"ט ע\"י שני אוכלים מותר"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אין טעם בדבריו", "under": true}], "pesak": null}, "isura": {"title": "נ\"ט בר נ\"ט דאיסורא", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "ר\"ן, רשב\"א", "srcRef": null, "txt": "(ב\"י: ונראה שדעת כל הפוסקים שווה לזה):\nמה שמתירים נ\"ט בר נ\"ט זה רק בבשר/חלב, אבל באיסור – אפילו אם יש המון נ\"ט בר נ\"טים אסור כל עוד יש טעם (כלומר, זה לא שאין טעם בנ\"ט בר נ\"ט ובגלל זה זה מותר, אלא שלמרות שיש טעם הוא מותר (!). אבל טריפה תמיד טעמה אסור. השערי דורא קורא לזה חילוק בין נ\"ט של היתרא, לנ\"ט של איסור)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "בהיתר אנו מתירים טעם שנקלש משום שאין בו חשיבות, אבל באיסור – למרות שנקלש עדיין יש בו חשיבות", "under": true}], "pesak": null}, "charif": {"title": "נ\"ט בר נ\"ט בדבר חריף", "seif": "סעיף ב׳", "sugya": null, "intro": "ראינו במקומות רבים כי חריפות מאכל מקשה על העניינים, וכך למשל בנטל\"פ, השו\"ע הביא דעת המרדכי הסובר שחריף שמתבשל בכלי שאינו בן יומו מעורר את הטעם לשבח; וכן פוסק הרמ\"א כאן על פיו. (ועיין עוד בסי' צ\"ו)\n\nבנ\"ט בר נ\"ט עולה דבר דומה, ואנו רואים כי הרמ\"א סובר עפ\"י האו\"ה שאם המאכל הפרווה שמבשלים בכלי הבשרי הוא חריף – אסור אפילו בדיעבד ('בדיעבד' – עפ\"י הטבלה לעיל, בדעת הרמ\"א)\n\nמקרה של חריף שבושל בכלי בשרי יש לבחון מבחינת שתי הקולות המרכזיות שלנו בנתינת טעם: מצד נ\"ט בר נ\"ט, ומצד נטל\"פ.", "ops": [{"layer": "acharon", "src": "דרכ\"מ · או\"ה", "srcRef": null, "txt": "בחריף לא מועיל נ\"ט בר נ\"ט"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כי החריפות הופכת את טעם הבשר לממשית יותר (מחזקת)", "under": true}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.2", "txt": "דבר חריף שבושל בכלי בשרי – אין לאוכלו עם חלב, אפילו בדיעבד"}, {"layer": "note", "srcRef": null, "src": "חריף = ?", "txt": "חריף = מאכל שרובו או כולו חריף. מאכל שיש בו תבלין חריף – לא מִקרי חריף"}, {"layer": "acharon", "src": "הערה (הש\"ך בק\"ג)", "srcRef": null, "txt": "לשים לב: הרמ\"א מדבר באם הדבר החריף בושל. הש\"ך בק\"ג, גבי נטל\"פ מחייב תנאי זה לכך שחריף בכלי שאינו ב\"י יקבל טעם לשבח. ומן המיקס שהרמ\"א עושה כאן (הוא פוסק את המרדכי מק\"ג ומדבר על בישול), אפשר לראות תימוכין לדעת הש\"ך", "collapsed": true}, {"layer": "zman", "src": "פניני הלכה (אחרי סידור שלי)", "srcRef": null, "txt": "מצד נ\"ט בר נ\"ט: רמ\"א: עפ\"י או\"ה סובר שאין נ\"ט בר נ\"ט בחריף\n  שו\"ע: מקיש מדעת השו\"ע בסכין בצ\"ו לכאן, שיסכים עם הרמ\"א והאו\"ה שאם בושל חריף פרווה – אין נ\"ט בר נ\"ט.\nמצד נטל\"פ: רמ\"א: אוסר כאן שהכלי שבושל בו החריף אינו ב\"י\nשו\"ע: מניח שהוא לא פוסק כמו המרדכי בק\"ג שחריף בקדרה שאינה ב\"י מבטל את הפגם שבטעם (בק\"ג הוא דווקא מביא אותו ביש אומרים. אז אולי בגלל צ\"ו? לבדוק.)\nלפיכך, הרמ\"א יאסור בכל מקרה לאכול עם חלב, ושו\"ע יתיר כאשר הווי נטל\"פ, היינו בקדרה שאינה ב\"י\nובקצרה:\nאם הקדרה שבושל בה החריף בת יומא: גם לרמ\"א וגם לשו\"ע אסור לאוכלו עם חלב\nאם הקדרה שבושל בה החריף אינה בת יומא: לשו\"ע מותר לאוכלו עם חלב; לרמ\"א אסור\nדעת עצמו (טוען שיש אומרים. לברר איפה): רק כאשר לא מנקים יש להחמיר בחריף. אם מנקים: דין חריף כדין סתם מאכל פרווה (כלומר, הן מצד נ\"ט בר נ\"ט, והן מצד נטל\"פ), כי אין פליטת טעם כלל, ומותר לאכול עם חלב (וי\"ל לפי מה שפוסק בעיקר דין נ\"ט בר נ\"ט, שיתיר אף לכתחילה לבשל כן)\n(אם לא בישלו - כגון סלט עם בצל או סחוג קר – נ\"ל שאפשר להקל לכו\"ע, כדעת הש\"ך בק\"ג וכדפרשתי ברמ\"א)", "collapsed": true}], "pesak": null}, "mikli": {"title": "נ\"ט בר נ\"ט מכלי לכלי", "seif": "סעיף ג׳", "sugya": null, "intro": "[סע' ד' – שעליו אין אפילו ב\"י – שמתי בסיכום על נטל\"פ]\n\nעפ\"י הדיון של נ\"ט בר נ\"ט, עלתה השאלה מה דינם של פליטות כלים בשריים/חלביים בני יומם? ומה קורה אם פליטה של חמה כלי בשרי בן יומו פוגשת פליטה חמה של כלי חלבי בן יומו (כלומר, כגון כששוטפים כלי בשרי במים רותחים בתוך כלי חלבי)?", "ops": [{"layer": "rishon", "src": "תוספות, תרומה", "srcRef": null, "txt": "קערות בשריות (שבושל בהן בשר) שהודחו במחבת חלבית בכלי ראשון,\nאם שניהם בני יומן – אסור (הווי טעם שני באי
