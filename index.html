פירוש הדבר שיחרך, ואז קיים חשש שמא יחתה (ועיין בסיכום שהייה)"}], "pesak": null}, "shiur_nozel": {"title": "הגדרת שיעור בישול בנוזל – חום שהידס\"ב", "seif": "סעיף י\"ד", "sugya": null, "intro": "הבישול האסור מדאורייתא בנוזל הוא לא במידת בישול, אלא דרגת חום. והוא חום שהיד סולדת בו.", "ops": [{"layer": "gemara", "src": "ברייתא · שמואל", "srcRef": null, "txt": "**ברייתא**: מניח אדם קיתון מים כנגד מדורה לא בשביל שיחמו, אלא כדי שיפשירו מצינתם.\nאמר רב יהודה אמר **שמואל**: אחד שמן אחד מים – יד סולדת בו אסור", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מה זה בדיוק חום שהידס\"ב? באותה הסוגיה נשאל 'היכי דמי יד סולדת? כל שכריסו של תינוק נכווית'. וכן נקט השו\"ע בלשונו.", "ref": {"label": "שם", "ref": "Shabbat.40a"}}, {"layer": "zman", "src": "פוסקי זמננו", "srcRef": null, "txt": "אך כמובן שזו הגדרה משתנה ולא חד משמעית.\nהדעות נעות החל מ-45 מעלות (גרש\"ז אוירבעך), ועד 71 מעלות (הרב פיינשטיין).\nלהלכה, יש לנקוט לחומרא לשני הכיוונים. כלומר, שאסור לחמם נוזלים לחום של 45°, ותבשיל/נוזל לא נחשב שבושל אלא אם הגיע ל71° (למשל, לעניין בישול אחר בישול בדבר לח שנצטנן)."}], "pesak": null}, "makor": {"title": "מקור החום – חמה ותולדותיה, אוּר ותולדותיו", "seif": "סעיף ג׳", "sugya": null, "intro": "מדאורייתא אסור לבשל ע\"י אש תולדות האש (נוזל-ידס\"ב, מוצק-מאב\"ד/כ\"צ)\nאבל מותר לבשל ע\"י חמה ותולדות החמה\nאולם, נאסר מדרבנן לבשל בתולדות חמה, אטו תולדות האש (כלומר שמא יבוא לבשל בתולדות האש)", "ops": [{"layer": "mishna", "src": "משנה · ת\"ק · רבי יוסי", "srcRef": null, "txt": "אין נותנים ביצה בצד המיחם (תולדות האש) בשביל שתתגלגל (תתבשל), ואסור להטמינה בחול כדי שתיצלה (בגלל הטמנה).\nולגבי תולדות חמה – נחלקו **ת\"ק** ו**רבי יוסי** אם מותר לשבור את הביצה על בגד שהתחמם מהשמש כדי שהביצה תתבשל ממנו.", "ref": {"label": "שבת · פרק כירה · לח ע\"ב", "ref": "Shabbat.38b"}}, {"layer": "gemara", "src": "גמרא · רב נחמן", "srcRef": null, "txt": "**רב נחמן** – לכל הדעות מותר בחמה, ואסור באוּר. ת\"ק ור' יוסי נחלקו על תולדות חמה. ות\"ק אסר בתולדות חמה שמא יבשל בתולדות האוּר.\nוהראשונים פסקו כתנא קמא, שאסור מדרבנן לבשל בתולדות החמה.", "ref": {"label": "שם", "ref": "Shabbat.38b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מסביר שמותר בחמה בגלל שאין בכך דרך בישול; ולא גזרינן 'אטו', משום שאין סיבה להתבלבל.", "under": true}, {"layer": "shulchan", "src": "והשו\"ע (שיח, ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.3", "txt": "פסק כדברי הגמרא בת\"ק שאסור לבשל בתולדות חמה מגזירה שמא יבשל בתולדות האש. ושמותר לבשל בחום החמה עצמה.\n(והתייחס שם גם לעניין ההטמנה בחול, שאסור אפילו מבעוד יום, משום שהוא דבר המוסיף הבל)"}, {"layer": "acharon", "src": "המהרש\"ל", "srcRef": null, "txt": "סבר שלמרות שאסור בתולדות חמה, מותר לבשל על גג רותח, משום שלא יבוא ממנו לבשל בתולדות האור.", "collapsed": true}, {"layer": "zman", "src": "דוד שמש (הרב עובדיה)", "srcRef": null, "txt": "כאשר הוא מתחמם מהשמש, הרי הוא תולדות חמה. ויש מי שסובר שאף חמה ממש, וכי הקולטים רק מנתבים את חום השמש.\nהרב עובדיה פוסק להקל, משום שחימום זה של המים הוא פסיק רישא, משום שאין האדם מתכוון לחימומם. ועל אף שהווי פ\"ר דניחא ליה, בגלל שמדובר בדרבנן – ניתן להקל.\n(ובוודאי שדוד חשמל אסור, והווי באוּר)"}], "pesak": null}, "bab": {"title": "בישול אחר בישול", "seif": "סעיף ד׳", "sugya": null, "intro": "תבשיל יבש שהתבשל כל צרכו – לכו\"ע מותר לחממו אם נצטנן\nתבשיל לח שהתבשל כל צרכו – שו\"ע: אסור לחממו אם נצטנן. רק אם עדיין רותח. רמ\"א: מקל לגבי מצור\"ל שמותר, ומצוי\"ל שעדיין לא התקרר. רמב\"ם: סובר שאין בישול אחר בישול אפילו בלח שנצטנן\n(ועל כל פנים, מה שמותר הוא רק בכלי ראשון שהורד מהאש)", "ops": [{"layer": "shulchan", "src": "שו\"ע בס' ח'", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.8", "txt": "דן במיחם שעל האש אם דינו כהנחה כנגד המדורה (מותר אם נתבשל כ\"צ, ובלח אם מצור\"ל), או שדינו כהנחה ע\"ג כירה (אסור אף אם נתבשל כ\"צ ואפילו מצור\"ל - שמא יחתה). וסובר כדעה הראשונה."}, {"subhead": "יבש"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כל שבא בחמין מערב שבת, שורין אותו בחמין בשבת. וכל שלא בא בחמין, אין שורין אותו בשבת – אבל מותר להדיחו בחמין. חוץ מן המליח הישן וקולייס האיספנין, שהדחתן היא היא גמר מלאכתן", "ref": {"label": "שבת · פרק חבית · קמה ע\"א", "ref": "Shabbat.145a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "כגון מה? כגון תרנוגלתא דר' אבא\nכלומר, שדבר שבושל כבר בערב שבת מותר לבשלו בשבת. ומה שלא – מותר רק להפיג צינתו בשטיפה בחמים. אבל דברים ששטיפה זו תכשיר אותם למאכל – אסור (דגים מלוחים).", "ref": {"label": "שם", "ref": "Shabbat.145a"}}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "'בא בחמין מערב שבת' – כתבו שבישול גמור, כלומר – כל צרכו (תרנגולתא דרבי אבא)."}, {"layer": "rishon", "src": "רשב\"א ורא\"ש", "srcRef": null, "txt": "אפילו כמאב\"ד (עפ\"י מימרת רבי אליעזר בדף יט, ששיעור בישול כמאב\"ד)", "under": true}, {"layer": "rishon", "src": "הב\"י", "srcRef": null, "txt": "הבין ברמב\"ם - כל דבר שבא בחמין בער\"ש, אפילו לא נתבשל. ובב\"י לומד מתרנגולתא דר' אבא, שמדובר בדבר יבש.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.4", "txt": "ונראה בשו\"ע שפסק כתוספות, שדבר יבש שנתבשל כבר כל צרכו – מותר לשרותו בחמין בשבת\nאבל, נזכור שאסור מדרבנן להניח דבר יבש שנתבשל כ\"צ בכלי ראשון העומד על האש. מחזי כמבשל."}, {"subhead": "בלח"}, {"layer": "rishon", "src": "רא\"ש וסמ\"ק", "srcRef": null, "txt": "כתב עפ\"י רש\"י שתבשיל שנצטנן ויש בו נוזל – שייך בו בישול אחר בישול (ללא מצור\"ל/מצוי\"ל)"}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "כל דבר שנצטנן (אפילו בושל כ\"צ) ויש בו רוטב והוא מצטמק ויפה לו – שייך בו בישול אחר בישול."}, {"layer": "rishon", "src": "הב\"י בשם ר' יונה", "srcRef": null, "txt": "למד מכך – שאם התבשיל הלח מצטמק ורע לו – אין בו בישול אחר בישול אף אם נצטנן", "under": true}, {"layer": "rishon", "src": "והרמב\"ם", "srcRef": null, "txt": "סבר שאין בישול אחר בישול לעולם, אפילו בלח. וכן הרשב\"א"}, {"layer": "shulchan", "src": "השו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.4", "txt": "נקט בס' ד' כדברי הרא\"ש שתבשיל לח שבושל כ\"צ ונצטנן – יש בו משום בישול אחר בישול (ולא פירש לגבי מצור\"ל-מצוי\"ל)"}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "הגיה כיש אומרים את דברי ר' ירוחם, שדווקא אם התבשיל מצטמק ויפה לו שייך בא\"ב."}, {"layer": "acharon", "src": "והמג\"א", "srcRef": null, "txt": "כתב שדעת השו\"ע כדבריו בב\"י, שמצטמק ורע לו מותר בא\"ב. וכך כתב בדבריו בס' ח'.", "under": true}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "חלק, וסבר שהמחבר חזר בו ממה שכתב בב\"י. ובסע' ח' כתב סתם כלשון ר' ירוחם.", "under": true, "collapsed": true}, {"layer": "acharon", "src": "והט\"ז", "srcRef": null, "txt": "כתב שהטעם לסברת מצטמק ורע לו הוא שאין בכך מלאכת מחשבת, שהרי לא מעוניין בשינוי ובצימוק המתרחש בתבשיל, אלא רק בחימום (וזה מותר).", "under": true}, {"layer": "rama", "src": "רמ\"א · (ס' ט\"ו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.15", "txt": "ובס' טו' (הנחה במקום חום שהידס\"ב), כתב הרמ\"א שיש מקלים לגבי תבשיל לח, שעל אף שהתקרר מחום רתיחתו, כל עוד לא נצטנן לגמרי – מותר (במצוי\"ל. מצור\"ל מקל גם אם נצטנן לגמרי עפ\"י רי\"ו)."}, {"subsubhead": "מה נחשב 'לח'?"}, {"layer": "zman", "src": "יביע אומר", "srcRef": null, "txt": "תבשיל שיש ברובו רוטב"}, {"layer": "zman", "src": "אור לציון", "srcRef": null, "txt": "תבשיל שיש בו רוטב כלשהו"}, {"layer": "zman", "src": "הגרש\"ז והרב אלישיב", "srcRef": null, "txt": "והפוסקים פסקו שיש לרוקן הרוטב, אך אפשר להקל במעט לחות או שמן שעל התבשיל"}, {"layer": "zman", "src": "הרב פיינשטיין", "srcRef": null, "txt": "לגבי מצבי ביניים, כגון מזון שקשה להכריע אם הוא מוצק או נוזלי — כתב שכל אוכל שיעמוד במקומו בלי כלי – נחשב מוצק."}, {"subsubhead": "דבר יבש הנעשה לח (ס' ט\"ז)"}, {"layer": "lead", "srcRef": null, "txt": "מה יהיה דינו של מאכל שכרגע נחשב מוצק, אך במהלך חימומו יהפוך לנוזלי? כגון, רוטב קרוש, פשטידה.."}, {"layer": "rishon", "src": "הב\"י (ספר התרומה)", "srcRef": null, "txt": "הביא את דברי ספר התרומה שהתיחס לאינפאנדה, וכתב שאסור לחממה אפילו במרחק מהאש (כלומר, אפילו במקום שמותר להפשיר בו נוזלים), בגלל השומן שהופך לנוזל. וכתב שהטעם לזה הוא מוליד. וכמו שכתב לעניין ריסוק ברד וכו', שאסור משום מוליד."}, {"layer": "rishon", "src": "הרשב\"א והר\"ן", "srcRef": null, "txt": "אולם לגבי ריסוק (ש\"כ, ט), סברו שהאיסור לריסוק ברד הוא משום שדומה לסוחט (חשש שמא); וכך כתב כאן הב\"י.\nלפיכך, לשיטת הרשב\"א והר\"ן יהיה מותר להניחו להפשיר, משום שהחשש רלוונטי רק אם מרסק את הברד בידיים. ואף לריסוק אין חשש; שהרי הוא משום סוחט, ולא שייך סוחט בפירות שלא עומדים לסחיטה (פשטידה כמובן אינה).", "under": true}, {"layer": "shulchan", "src": "וכך, פסק השו\"ע בס' ט\"ז", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.16", "txt": "שמותר להניח אינפאנדה כנגד האש במקום שהידס\"ב, ואעפ\"י שהשומן שבה נימוח."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "כתב שיש לחשוש ולהחמיר לדעת ספר התרומה, אך שניתן להקל במקום הצורך"}, {"layer": "lead", "srcRef": null, "txt": "ויש לשאול: מדוע התיר השו\"ע אף בחום שהידס\"ב? לגבי המוצק אין בעיה, שהרי אין בא\"ב ביבש. אבל ברגע שהשומן בה נימוח, יש כאן בישול בלח!"}, {"layer": "acharon", "src": "הלבוש", "srcRef": null, "txt": "סבר שיש טעות סופר בלשון המחבר, וכי צריך לקרוא שמותר להניח.. במקום שאין הידס\"ב', ואסור לחממו בחום שהידס\"ב", "under": true}, {"layer": "acharon", "src": "המג\"א", "srcRef": null, "txt": "סבר שאין בעיה אף במקום שהידס\"ב, משום שהולכים אחר מצב התבשיל בתחילת החימום, ונחשב כמוצק", "under": true}, {"layer": "acharon", "src": "ובֶסוף הב\"י", "srcRef": null, "txt": "כתב שאף לדעת התרומה יהיה מותר לחמם פשטידה שהשומן שלה אינו ניכר בעצמו, אלא מתערבב עם שאר הקדרה; משום שדומה לנתינת קרח בכוס, המותרת לכו\"ע (משום שנמחה מאליו ואין ניכר)", "collapsed": true}], "pesak": null}, "baa": {"title": "בישול אחר אפייה", "seif": "סעיף ה׳", "sugya": null, "intro": "על פניו, דין בישול אחר אפייה אמור להיות זהה לבישול אחר בישול במוצק, המותר לכל הדעות.\nאולם, בעקבות סברא של היראים (רא\"מ) מברייתא בפסחים, יש לנו גם התייחסות הלכתית ייחודית למקרה זה של בישול אחר אפייה/צלייה, וכן, לבישולם בכלי ראשון ושני.", "ops": [{"layer": "gemara", "src": "ברייתא · רבי יוסי", "srcRef": null, "txt": "**רבי יוסי** אומר שלא יוצאים בפסח ידי חובת אכילת מצה אם אוכלים מצה שהתבשלה (לאחר אפייתה)", "ref": {"label": "פסחים · פרק כל שעה · מא ע\"א", "ref": "Pesachim.41a"}}, {"layer": "rishon", "src": "היראים", "srcRef": null, "txt": "לומד מכאן שיש בישול אחר אפייה, שהרי הבישול פעל על המצה וביטל את אפייתה, כך שהיה כאן שינוי של ממש במצה והיא כבר לא נחשבת אפויה. וכן הדין לבישול אחר צלייה."}, {"layer": "rishon", "src": "הראבי\"ה", "srcRef": null, "txt": "חלק על סברא זו, וכתב שמהות המצה לא השתנתה לגמרי, אלא שטעמה נשתנה. וכדי לצאת ידי חובת אכילת מצה בעינן טעם מצה. ולא שהוא שינה את מהות המצה. ובוודאי שלא שייך להגיד שיש בישול אחר אפייה.", "under": true}, {"layer": "rishon", "src": "סמ\"ג וסמ\"ק", "srcRef": null, "txt": "חלקו בדעת היראים על נתינת פת במרק – עד איזה כלי אסור?\n**סמ\"ק** – רק כלי ראשון אסור, אבל בשני התיר רא\"מ לתת פת\n**הסמ\"ג** – אסר נתינת פת גם בכלי שני, משום שלחם הוא מקלי הבישול"}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.5", "txt": "הביא את דעת היראים ב'יש אומרים' כהבנת הסמ\"ג (אפילו כלי שני), וכתב שיש מי שמתיר"}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "כתב ש'היש מתירים' שבלשון השו\"ע הוא על חומרת הסמ\"ג בכלי שני, כלומר שיש מי שמתירים בכלי שני כסמ\"ק, אבל לכו\"ע אסור לתת פת בכלי ראשון.\nאולם, הביא בעצמו שיש מתירים אפילו בכלי ראשון, היינו כראבי\"ה, אך סבר להחמיר כסמ\"ג"}, {"layer": "acharon", "src": "באר הגולה", "srcRef": null, "txt": "אבל לפי באר הגולה, מסתבר שסבר כי דעת ה'יש מתירים' שבלשון השו\"ע מכוון לראבי\"ה. ואז יש סברא שהשו\"ע מקל שאין בישול אחר אפייה כלל.", "under": true}, {"layer": "zman", "src": "הרב עובדיה (יחווה דעת)", "srcRef": null, "txt": "וכך גם סבר ותירץ באמצעות כך את הקושי שהעלו פוסקים ביחס לס' טו'. שם משתמע מהשו\"ע שיש בישול אחר בישול רק בנוזל, ומשמע שאין בישול אחר אפייה.", "under": true, "collapsed": true}, {"layer": "acharon", "src": "פרטים נוספים", "srcRef": null, "txt": "ובכל מקרה, לכו\"ע אין אפייה אחר אפייה, וצלייה אחר צלייה.\nוהשש\"כ סבר ששייך גם בישול אחר טיגון ולהיפך, אלא אם הטיגון עמוק.\nהבה\"ל סבר שאם נעשים על מאכל מספר תהליכים שונים – האחרון נחשב (לקולא ולחומרא)\nוהפמ\"ג חלק וסבר שכל עוד נעשה תהליך מסוים – לא שייך בו יותר (אם בושל לא שייך בישול. אם נאפה לא שייך אפייה.)", "collapsed": true}, {"subhead": "קפה"}, {"layer": "lead", "srcRef": null, "txt": "על פניו, בגלל שכבר קלוי, וקיי\"ל כשו\"ע שאין בישול אחר אפייה – מותר לבשל אף בעירוי מכלי ראשון."}, {"layer": "zman", "src": "האור לציון", "srcRef": null, "txt": "סבר שהקלייה לא נחשבת לאפייה גמורה, לכן לא נחשב בישול אחר אפייה; ואם כך יחשב כתבלין ואסור בעירוי מכלי ראשון (אפילו אינם רותחים). ואם נתייחס אליו כקל בישול - אסור לערות מים רותחים על קפה אפילו מכלי שני, אלא מכלי שלישי (כדעת רוב הפוסקים והט\"ז לעניין הדחה שהיא גמר מלאכה)."}, {"layer": "zman", "src": "אבל הרב עובדיה", "srcRef": null, "txt": "סבר שאבקת קפה ראויה לאכילה כמו שהעא, לכן אין בעירוי המים גמר מלאכה או בישול, ובגלל שקיי\"ל כשו\"ע שאין בישול אחר אפייה – מותר.\nאולם, וודאי שקפה נמס יהיה מותר לרוב הדעות, שהרי עבר בישול ביצירתו, ואין בא\"ב ביבש.\nאבל יש מי שנהגו להחמיר, בגלל שלאחר הבישול עובר גם קלייה; ולפי הבה\"ל שסובר שהתהליך האחרון הוא שנחשב – משמע שנחשב בישול אחר אפייה (כלומר כרמ\"א)."}], "pesak": null}, "hadacha": {"title": "'הדחתו היא גמר מלאכתו' וקלי הבישול", "seif": "סעיף ד׳", "sugya": null, "intro": "במשנה מלמדים אותנו שרק מה שבושל כבר בער\"ש מותר להשרותו שוב. אולם, גם מה שלא – מותר לקלחו במים חמים, חוץ מדברים שהדתחם תהיה גמר מלאכתם.\nוהראשונים דנו עד כמה נשמר חומם של מים כשמעבירים אותם מכלי לכלי, ולפיכך– האם וכיצד ניתן לשטוף דברים ששטיפתם (במים חמים) תהיה גמר מלאכתם.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כל שבא בחמין מערב שבת, שורין אותו בחמין בשבת. וכל שלא בא בחמין, אין שורין אותו בשבת – אבל מותר להדיחו בחמין. חוץ מן המליח הישן וקולייס האיספנין, שהדחתן היא היא גמר מלאכתן", "ref": {"label": "שבת · פרק חבית · קמה ע\"א", "ref": "Shabbat.145a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "פירש שמליח הישן וקולייס האיספנין פירושו דגים מלוחים"}, {"layer": "rishon", "src": "ספר הפרדס", "srcRef": null, "txt": "קולייס= דג מלוח. אבל מליח הישן הוא בשר מלוח הרבה (שלא יאכלנו ללא הדחה)", "collapsed": true}, {"subhead": "שיט' בעלי התוס' בהדחה מכלי ראשון (שיח י')"}, {"layer": "lead", "srcRef": null, "txt": "לעניין תוקף חמימות המים והיותם מבשלים, התוספות מביאים כך:"}, {"layer": "rishon", "src": "רשב\"ם", "srcRef": null, "txt": "מותר עירוי מכלי ראשון", "under": true}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "עירוי מכלי ראשון חשיב ככלי ראשון. לכן מותר רק כלי שני.", "under": true}, {"layer": "rishon", "src": "ר\"י", "srcRef": null, "txt": "ועל כך, כותבים התוס' שאולי אף לשרות בכלי שני מותר, אבל דוחים ומביאים כר\"י: רק עירוי מכלי שני, ואסורה שרייה בכלי שני משום שמחזי כמבשל (כי המים חמים)\nובֶסוף התוס', כותבים שרק בדבר שהדחתו היא גמר מלאכתו (וקלי בישול) אסור אף בעירוי כלי שני. אבל בסתם דברים – עירוי מכלי שני לא מבשל.", "under": true}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.10", "txt": "סתם בס' י' שעירוי מכלי ראשון מבשל. (ובס' יג' מתייחס לבישול בכלי שני)"}, {"layer": "acharon", "src": "הפוסקים", "srcRef": null, "txt": "לפי זה, כתבו כי דברים שהדחתם במים חמים היא גמר מלאכתם – אסור להדיחם אף בכלי שני; משום שגם בחום זה, שטיפתם תכשירם לאכילה."}, {"layer": "acharon", "src": "הט\"ז", "srcRef": null, "txt": "סבר שמותר להדיח דגים מלוחים כגון הרינג רק במים צוננים, משום שאין בהדחתו גמר מלאכתו.", "under": true}, {"layer": "acharon", "src": "הא\"ר ומחצה\"ש", "srcRef": null, "txt": "חלקו וסברו שמותר אף לערות מים חמים מכלי שני, משום שדבר שהדחתו במים צוננים תכשירו לאכילה – משמע שהדחתו במים חמים לא נחשבת בישול.", "under": true}, {"layer": "acharon", "src": "הפמ\"ג והנשמת אדם", "srcRef": null, "txt": "אסרו אף במים צוננים, משום שלדעתם דבר שהדחתו היא גמר מלאכתו – כל שטיפה שמכשירה אותו אסורה משום מכה בפטיש. ואין זה משנה אם הם חמים או קרים.", "under": true}, {"layer": "acharon", "src": "אבל הבה\"ל", "srcRef": null, "txt": "הביא שלא שייך מכה בפטיש באוכלים (וראייתו מכך שהטמנת ביצה בחול כדי שתתבשל בתולדות חמה אסורה רק מדרבנן, ואם זה היה מכה בפטיש – היתה אסור מדאורייתא) ומה שאסור הדחה בחמים הוא משום בישול. (לכן מותר מכלי שני במים חמים, כדעת הא\"ר ומחצה\"ש)", "under": true}, {"subhead": "מלח וקלי הבישול (שיח ט')"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "האילפס והקדרה שהעבירן מרותחין (הוריד מהאש) אסור לתת לתוכם תבלין בשבת, אבל נותנים לקערה או לתמחוי.\nמכאן למדים שכלי ראשון מבשל על אף שהורד מהאש; וכן, שכלי שני (הקערה/תמחוי) אינו מבשל ומותר", "ref": {"label": "שבת · פרק כירה · מב ע\"א", "ref": "Shabbat.42a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "לענייננו, בגמרא לאחמ\"כ דנים ראשונים אם מלח כתבלין, ומותר לבשלו בכלי שני (ולא בכלי ראשון שהורד מהאש) או לא.\n**רב יוסף**: מלח כתבלין\n**אביי (לשון א')**: מלח לא כתבלין, והוא מתבשל אף בכלי שני – קלי בישול\n**רב נחמן** חולק: צריכא מילחא בישולא כבשרא דתורא – המלח קשה בבישולו\n**אביי (לשון ב')**: מלח לא כתבלין, והוא לא מתבשל אף בכלי ראשון\n**רב נחמן** מסכים: צריכא מילחא בישולא כבשרא דתורא", "ref": {"label": "שם", "ref": "Shabbat.42a"}}, {"layer": "rishon", "src": "הרי\"ף, הרמב\"ם והרא\"ש", "srcRef": null, "txt": "פסקו עפ\"י הלשון השניה, שמלח קשה בבישולו, ואינו מתבשל אף בכלי ראשון ולכן מותר."}, {"layer": "rishon", "src": "הגהות אשרי והתוס'", "srcRef": null, "txt": "כתבו כך, אך הוסיפו שהמחמיר שלא לתת מלח אף בכלי שני – תבוא עליו הברכה", "under": true}, {"layer": "rishon", "src": "ריטב\"א", "srcRef": null, "txt": "כתב שיש להחמיר כלשון הראשונה, ולא לתת מלח אפילו בכלי שני (כשיש שתי לישנות בסוגייה, אם מדובר בדאורייתא – כלישנא המחמירה; אם בדרבנן – כלישנא המקילה)", "under": true}, {"layer": "rishon", "src": "הר\"ן", "srcRef": null, "txt": "הלשון המקלה נכונה רק לגבי כלי ראשון שהורד מהאש, אבל בעודו על האש לכו\"ע אסור אפילו מלח (ואפילו בשר השור יתבשל)", "under": true}, {"layer": "rishon", "src": "שיבולי הלקט", "srcRef": null, "txt": "ציין, שאם עבר אדם – אפילו במזיד – ונתן מלח באיסור, אין לאסור את המאכל משום שבטל המלח ביחס אליו.", "collapsed": true}, {"layer": "shulchan", "src": "השו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "לעניין נתינת המלח, פסק כדברי הרי\"ף וסיעתו שמותר לתת מלח בכלי ראשון שהורד מהאש."}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "הביא שיש אוסרים, כריטב\"א, אפילו בכלי שני; וסיים כמו התוס' ש'המחמיר תבוא עליו הברכה'\nובסוף הדברים הביא הרמ\"א את שיבולי הלקט שמי שעבר ונתן מלח בכלי ראשון שעל האש – מותר לאכול התבשיל."}, {"layer": "acharon", "src": "המשנ\"ב (סוכר)", "srcRef": null, "txt": "ולגבי סוכר, סבר שעדיף להחמיר עמו ולא לבשלו אלא בכלי שני (על אף שנתבשל בייצורו)"}, {"layer": "zman", "src": "והרב עובדיה", "srcRef": null, "txt": "סבר להתיר, משום שוודאי שדינו כמלח, ולגבי מלח קיי\"ל כשו\"ע שמותר אף בכלי ראשון (אם הוסר מהאש)", "under": true}, {"layer": "rishon", "src": "ר\"ן, רמב\"ם", "srcRef": null, "txt": "דעות נוספות לגבי קלי הבישול: אין חשש לקלי בישול – מותר הכל בכלי שני", "collapsed": true}, {"subhead": "כח החימום של כלי ראשון (רש\"י ומרדכי)"}, {"layer": "lead", "srcRef": null, "txt": "כאמור, אנו לומדים מהמשנה גם כי כלי ראשון שהורד מהאש עדיין מבשל (בהשרייה). והרי כמובן שאין כלי ראשון שהורד מהאש מבשל תמיד. הב\"י הביא את המרדכי ורש\"י שמציעים מתי:"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כל עוד הידס\"ב – כלי ראשון"}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "כל עוד לא נח מרתיחתו. אפילו אם הידס\"ב."}, {"layer": "shulchan", "src": "השו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.9", "txt": "נקט בס' ט' כרש\"י: כלי ראשון אפילו לאחר שהעבירוהו מעל האש מבשל, כל זמן שהיד סולדת בו. לפיכך אסור ליתן לתוכו תבלין, אבל מלח מותר ליתן לתוכו"}], "pesak": null}, "hafshara": {"title": "הפשרת נוזלים, בישול אחר בישול בלח", "seif": "סעיפים י\"ד-ט\"ו, י\"ז", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא · שמואל", "srcRef": null, "txt": "**ברייתא**: מניח אדם קיתון מים כנגד מדורה לא בשביל שיחמו, אלא כדי שיפשירו מצינתם.\nאמר רב יהודה אמר **שמואל**: אחד שמן אחד מים – יד סולדת בו אסור\nובהמשך הסוגיה, היכי דמי יד סולדת בו? כל שכריסו של תינוק נכווית.", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "lead", "srcRef": null, "txt": "אז מה בדיוק מותר עפ\"י הברייתא?"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מותר לשים את המים אפילו קרוב למדורה, רק צריך להוציאם משם לפני שיגיעו לחום שהידס\"ב", "under": true}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "אסור להניח את המים קרוב למדורה, שמא יגיעו לחום שהידס\"ב. אלא מותר להניחם רק במרחק כזה שלא יגיעו לחום שהידס\"ב אפילו אם ישכחם.\nוהדין זהה לגבי הנחה על מיחם (או כל דבר שהנחה עליו/לידו לזמן תביא לחום שהידס\"ב).", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "כל זה הוא בדבר צונן שלא נתבשל אף פעם. מכל מקום, וודאי שדבר שכבר נתבשל פעם ואח\"כ הצטנן – מותר אפילו כנגד המדורה.", "under": true}, {"layer": "rishon", "src": "המרדכי", "srcRef": null, "txt": "כתב שכמו שאסור להניח כנגד האש נוזלים כדי שיגיעו לחום שהידס\"ב, אלא רק שיפשירו – כך גם לגבי פירות הנאכלים חיים. שלמרות שהם נאכלים חיים, החימום שלהם טוב להם ונחשב כבישול. לכן, מותר רק להניחם שיפשירו, אבל לא כדי שתחממו ויתבשלו.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ד)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.14", "txt": "-מביא כתוס', שמותר להניח נוזלים להפשיר כנגד אש, אבל רחוק מספיק כדי שלא יוכלו להתחמם לחום שהידס\"ב. (ס' יז' – הנחה ע\"ג מיחם= הנחה כנגד מדורה)\n-מביא כדברי הגמרא שחום שהידס\"ב הוא חום שכירסו של תינוק נכווית בו"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא את דברי המרדכי שהדין של הנחה כנגד חום האש הוא גם לגבי פירות הנאכלים חיים, שמותר רק להפשירם אבל לא לחממם מאוד משום שנחשב כבישול"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט\"ו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.15", "txt": "-מביא שדבר שכבר התבשל כראוי אך נצטנן – מותר להניחו כנגד האש (אפילו במקום שיגיע לחום שהידס\"ב.) (משנ\"ב: אבל קרוב יותר לא, שמא יחתה).\nאולם, מוסיף שבלח אסור; שהרי סובר שיש בישול אחר בישול בלח (ועיין במחלוקת לעניין מצור\"ל ס' ד')."}, {"layer": "rama", "src": "רמ\"א · (ס' ט\"ו)", "srcRef": null, "txt": "מקל לגבי תבשיל לח, שעל אף שהתקרר מחום רתיחתו, כל עוד לא נצטנן לגמרי – מותר.\n(נפק\"מ: לשו\"ע יהיה אסור לחמם כל נוזל שירד מ71°; לרמ\"א יהיה אסור רק נוזל קר)", "under": true}, {"layer": "lead", "srcRef": null, "txt": "להלכה: מרק שהיה במקרר – אסור לחממו לחום שהידס\"ב כל הדעות, וכן, אסור להניחו במקום שיוכל להגיע לחום כזה, אלא רק להפיג את צינתו"}], "pesak": null}, "irbuv": {"title": "ערבוב מים חמים וקרים", "seif": "סעיפים י\"א-י\"ג", "sugya": null, "intro": "סעיפים יא' יב' קשורים בשתי סוגיות. הראשונה - מיחם שפינהו. והשנייה – מחלוקת ב\"ה ובית שמאי בשפיכת מים חמים לצוננים ולהיפך. הפסיקה מערבבת בין השתיים בגלל שלדעת אביי, מיחם שפינהו הוא מיחם שהורידו מהאש והמשנה מלמדת אותנו שמותר לשפוך אליו מים רותחים אם עושים זאת בכמות גדולה.", "ops": [{"layer": "note", "srcRef": null, "src": "נתינת חמים לקרים", "txt": "מותר. (**רש\"י** – תתאה גבר. **רשב\"א** – בנתינה מכלי ראשון מים לא יתחממו משום שמתערבבים. **תוס'** – רק אם המים הקרים מרובים) **מ\"ב**: שו\"ע כרשב\"א; ואז מותר גם כשהקרים מעטים\n**רמ\"א** כדעת תוס' (רק אם הקרים מרובים)"}, {"layer": "note", "srcRef": null, "src": "נתינת קרים לחמים", "txt": "**שו\"ע**: רק לכלי שני. **רמ\"א** (עפ\"י תוס'): כלי שאינו מקפיד על חומו (כדי שיישפוך הרבה)"}, {"layer": "gemara", "src": "משנה · רב אדא בר מתנה · אביי", "srcRef": null, "txt": "**משנה**: מיחם ש'פינהו', אסור לתת לתוכו מים קרים כדי שירתחו (כי אז יתבשלו), אבל מותר לתת לתוכו מים כדי שיפשירו, או לתת לתוך הכוס.\n**רב אדא בר מתנה**: מדובר במיחם שפינה ממנו את המים החמים. אסור להכניס לתוכו קצת מים קרים, כי אז הם יירתחו ויתבשלו מדפנות המיחם. אבל מותר הרבה מים קרים, שאז החום רק יפשירם. (ועל אף שיש בכך משום 'מכה בפטיש' בחיזוק הדפנות, זה דבר שאינו מתכוון וקיי\"ל כר' שמעון שמותר)\n**אביי**: מדובר במיחם שפינה אותו מן האש. אז, אסור לשפוך לתוכו קצת מים קרים, כי אז הם ייתרתחו מהמים הרותחים שבמיחם. אבל מותר לתת הרבה מים קרים כך שהם רק יפשירו. ומה שרב אדא ב\"מ אומר – אסור; משום שהמים הקרים מחזקים את הדפנות וזה 'מכה בפטיש'. וקיי\"ל כר' יהודה שדבר שאינו מתכוון אסור.", "ref": {"label": "שבת · פרק כירה · מא ע\"א", "ref": "Shabbat.41a"}}, {"layer": "mishna", "src": "ברייתא · ב\"ש · ב\"ה", "srcRef": null, "txt": "**ב\"ש**: מותר לשפוך מים חמים לקרים אבל לא קרים לחמים\n**ב\"ה**: מותר גם וגם\n**ת\"ק**: במה דברי ב\"ה אמורים? בכוס. אבל באמבטי – מודים ב\"ה לב\"ש שמותר רק חמים לקרים.\n**ר' שמעון בן מנסיא**: אוסר כב\"ש גם בכוס.", "ref": {"label": "שבת · פרק כירה · מב ע\"א", "ref": "Shabbat.42a"}}, {"layer": "rishon", "src": "רי\"ף", "srcRef": null, "txt": "פוסק כת\"ק בדעת ב\"ה – מותר מחמים לקרים ולהפך בכוס, אבל באמבטי רק חמים לקרים."}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "האמבטי היא כלי ראשון, וכלי ראשון מבשל. ולמרות שלפי משנת 'מיחם שפינהו' (אביי) מותר קרים לחמים אם הם הרבה, באמבטי מקפידים על חום המים (רחצה). לכן וודאי שכשיישפוך לתוכו קרים, לא יתן מספיק כך שיהיה בהיתר ולא יתבשלו. אז זו גזירה.", "under": true}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "גם הכוס וגם האמבטי כלי שני ובשניהם אין בישול אם שופכים קרים לחמים. אבל בגלל שמקפידים על חום האמבטי יותר, היא רותחת, והרואה יחשוב שהיא כלי ראשון; וכי השופך מים קרים אליה עושה איסור.", "under": true}, {"layer": "rishon", "src": "למה מותר חמים לקרים?", "srcRef": null, "txt": "רש\"י: תתאה גבר (המים התחתונים גוברים על העליונים. אז כשהקרים למטה – אין בישול)\nתוס': אין תתאה גבר בנוזל. מדובר כאן כשהמים הקרים מרובים, ולא ייתבשלו מהחמים. אבל אם שופך יותר מים חמים – וודאי אסור. (לפיכך צריך שיהיו הרבה קרים)\nר\"ן רשב\"א: אין תתאה גבר. אבל זה לא משנה כמה מים חמים נותנים, פשוט בגלל שבעירוי המים מתערבבים ממש, הם אף פעם לא יוכלו לחמם. (לכן אפילו במעט קרים מותר)", "collapsed": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"א-י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.12", "txt": "נקט כלשונו של רב אדא ב\"מ, שמיחם שפינה אותו ממים חמים מותר לתת לתוכו מים קרים כך שיפשירו.\nס' יא – מותר לשפוך מים חמים לאמבטי של צונן. אסור לשפוך מים צונן לאמבטי של חמים.\nס' יב – כתב שמותר לשפוך חמים לצונן (לדעת המשנ\"ב השו\"ע סובר כרשב\"א שאפילו במעט קרים אפשר), ושמותר לשפוך קרים לחמים רק אם נמצאים בכלי שני (ככה\"נ עפ\"י דעת הר\"ן)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "סבר (עפ\"י אביי) שאם ייתן הרבה מים קרים – אפשר אפילו בכלי ראשון, משום שלא יתבשלו מהחמים", "under": true}], "pesak": null}, "meicham": {"title": "מיחם על מיחם", "seif": "סעיפים ו׳-ח׳", "sugya": null, "intro": "בפשטות, אין בעיה להניח מיחם שחם כל צרכו ע\"ג מיחם מוטמן, כדי שהתחתון ישמור על חומו של העליון. אלא שאם העליון אינו חם שהידס\"ב, והתחתון יכול לחממו כך שייתבשל בדרגה זו – אסור. וכך דנו לגבי הנחת נוזלים על יד האש וע\"ג מיחם.\nאולם, אם מדובר בדבר יבש שבושל כ\"צ והצטנן, עפ\"י השו\"ע יהא מותר – וכך הדבר עומד במחלוקת פוסקים.", "ops": [{"layer": "gemara", "src": "הברייתא", "srcRef": null, "txt": "מותר להניח מיחם ע\"ג מיחם או קדרה על קדרה וכו' כדי שישמרו את חומם, אבל לא כדי שייתבשלו.\nלפיכך, כל עוד התחתון אינו יביא את העליון לחום שהידס\"ב – מותר.", "ref": {"label": "שבת · פרק במה טומנין · נא ע\"א", "ref": "Shabbat.51a"}}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "(שראינו לגבי הנחת קיתון כנגד האש), שמותר רק איפה שלא יוכל להגיע לחום שהידס\"ב. שמא יישכח.", "under": true}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "(גם לעניין קיתון) מתיר כל עוד מוריד לפני שמגיע לחום הבישול (לא נפסק להלכה)", "under": true}, {"layer": "rishon", "src": "ר' ירוחם (רנ\"ח)", "srcRef": null, "txt": "בסימן רנ\"ח הב\"י הביא את ר' ירוחם, שכתב שיש מחלוקת מפרשים:\nחלק אומרים שכל מה שמותר מיחם ע\"ג מיחם (וקדירה וכו') זה רק אם התחתון שביניהם לא על האש. חלק אומרים להיפך, ואפילו אם התחתון מונח ישר על האש – מותר.\nעוד כתב ר' ירוחם מחלוקת נוספת: סיעה אחת אומרת שהנחת מיחם ע\"ג מיחם שעל האש – כמו הנחה כנגד המדורה במקום שהידס\"ב (ובישול אחר בישול ביבש המותר שם, מותר כאן). אך לדעת סיעה אחרת – מיחם ע\"ג מיחם נחשב כהנחה ע\"ג כירה ממש, ואפילו בא\"ב אסור משום מיחזי כמבשל", "collapsed": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו׳-ח׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.8", "txt": "סעיף ו' – העתיק את דברי הברייתא\nסעיף ז' – הביא את דעות המחלוקת הראשונה ולא פירש דעתו\nסעיף ח' – הביא את דעות המחלוקת השנייה (הנחה ע\"ג מיחם שעל האש = כנגד מדורה או ע\"ג כירה) ופסק כדעה המקלה שנחשב כהנחה כנגד המדורה. ומותר בישול אחר בישול ביבש שם."}], "pesak": null}, "megis": {"title": "מגיס", "seif": "סעיף י\"ח", "sugya": null, "intro": "הגסה - ערבוב בתבשיל - אסורה מדאורייתא ונחשבת כבישול. זאת משום שפעולת הערבוב עוזרת להליך הבישול. לכן, אסור לערבב כל תבשיל שירד מהאש ואינו מבושל כל צרכו. אבל אם התבשיל כבר מבושל כל צרכו, אין בכך איסור כלל (משום שלעניין בישול אחר בישול, המידה היא כ\"צ, עפ\"י התוס' שם והשו\"ע).\nגם להוציא את האוכל עם הכף נחשב הגסה לענייין זה, ואסור בדבר שאינו מבושל כ\"צ. ואם הוא על האש – אסור אפילו אם מבושל כ\"צ.", "ops": [{"layer": "note", "srcRef": null, "src": "סיכום מצבי ההגסה", "txt": "**על האש ואינו מבושל כ\"צ** – אסור להגיס (פשט ברייתא)\n**על האש ומבושל כ\"צ** – כלבו: אסור מהתורה להגיס. מ\"מ: רק מדרבנן משום מיחזי כמבשל\n**ירד מהאש ואינו מבושל כ\"צ** – אסור להגיס (עפ\"י ר\"ן בגמרא)\n**ירד מהאש ומבושל כ\"צ** – שו\"ע מתיר. אסור למהר\"י וייל\n**הוצאה בכף** – רמב\"ם ושו\"ע סברי שנחשב הגסה (חוץ ממשנ\"ב, בכ\"צ)"}, {"layer": "gemara", "src": "ברייתא (ביצה לד)", "srcRef": null, "txt": "אחד מביא את המים, אחד מביא את האור... ואחד מגיס. כולם חייבים.\nמכאן שחייבים בהגסה משום בישול.\nאולם, הברייתא מדבר על תבשיל שעל האש. מה לגבי תבשיל שהורד ממנה?", "ref": {"label": "ביצה · פרק המביא · לד ע\"א", "ref": "Beitzah.34a"}}, {"layer": "gemara", "src": "גמרא (שבת יח)", "srcRef": null, "txt": "יורה עקורה (שהורדה מהאש) ובישלו בה סממנים – ניחוש שמא מגיס!", "ref": {"label": "שבת · פרק יציאות השבת · יח ע\"א", "ref": "Shabbat.18a"}}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "כותב שכל דבר שאינו מבושל (לשונו: מאב\"ד. אבל שו\"ע ייפסוק כ\"צ) - חייב משום מגיס אפילו הורד מהאש. אבל אם הוא מבושל כשיעור – לא שייך ומותר."}, {"layer": "rishon", "src": "כלבו (הובא בב\"י רנ\"ג)", "srcRef": null, "txt": "אם הוא על האש – אפילו מבושל כל צרכו אסור מהתורה להגיס.", "under": true}, {"layer": "rishon", "src": "הרב המגיד", "srcRef": null, "txt": "אם הוא על האש, אסור רק מדרבנן משום מחזי כמבשל", "under": true}, {"layer": "rishon", "src": "מהר\"י ווייל", "srcRef": null, "txt": "אוסר כל הגסה. אפילו בדבר המבושל כ\"צ שירד מהאש.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ח)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.18", "txt": "דבר שירד מהאש – מותר רק אם מבושל כ\"צ (ר\"ן). ואפילו הוצאה בכף נחשבת הגסה."}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אם הוא על האש ומבושל כל צרכו - מותר להוציא בכף. ולא שייך מחזי כמבשל בזה.", "under": true}, {"layer": "acharon", "src": "א\"ר", "srcRef": null, "txt": "יש לחשוש לדעת הכלבו שיש בזה איסור דאורייתא, ולא רק חשש מחזי כמבשל מדרבנן", "under": true}], "pesak": null}, "yishum": {"title": "יישום למעשה", "seif": null, "sugya": null, "intro": "אז איך נעשה בשבת למעשה?", "ops": [{"subhead": "דבר יבש שנתבשל (לסמוך – טו')"}, {"layer": "lead", "srcRef": null, "txt": "יוצא, שלפי השו\"ע דבר יבש שכבר נתבשל מותר להניח 'כנגד האש', אפילו במקום שיכול להגיע לחום שהידס\"ב. אבל לא אצל האש (אין בעיית בישול, אלא שמא יחתה בשביל החום. ההרחקה מהאש היא היכר שאסור לחתות). אצלנו זה יהיה לסמוך את המאכל לפלטה או לכירה. אבל אם אנו מבטלים את חשש החיתוי – ולרוב הפוסקים כך הוא כשמדובר בפלטה שאי אפשר לשנות את החום שלה – אז אפשר אפילו על מקור החום.\nאולם אנו כן צריכים להתמודד עם חשש מיחזי כמבשל. לדעת הרב עובדיה, בפלטה שעיקר שימושה הוא בשבת, ולא לבישול – חשש זה מתבטל מטבעו. אך אם לא נקבל סברא זו, נצטרך להניח קדרה ריקנית/מלאה (זאת עפ\"י סעיפים ג' ו-ה' בסימן רנ\"ג במחלוקת המרדכי והרשב\"א).\nאבל – עכשיו בפנינו שני מכשולים:\n1) הפמ\"ג סובר שקדרה ריקנית אסור, וכי השו\"ע פסק כמרדכי.\n2) אפילו אם נקבל את דעת המג\"א שהשו\"ע פסק כרשב\"א, וכי אין בעיה אם קדרה ריקנית – יש פוסקים שסוברים שהמרווח שבין גוף החימום שבפלטה למשטח לא נחשב כקדרה ריקנית כלל!"}, {"subhead": "דבר שלא נתבשל כלל"}, {"layer": "lead", "srcRef": null, "txt": "בס' ד דנו עפ\"י המשנה שכל שבא בחמין מער\"ש שורין אותו בחמין בשבת. ובוודאי שאסור לבשל בשבת דבר שלא בושל כלל. שהרי אין צולין בשר בצל וביצה אלא כדי שייצולו מבעוד יום, והוא כמאב\"ד (רמב\"ם – חצי וכן שו\"ע). וזה רק באור, תולדות האור ותולדות חמה. אבל מותר לבשל בשבת דבר שלא בושל בחמה.\nובוודאי שכל שטיפה במים חמים שתכשיר את המאכל שקודם לא היה נאכל – אסורה גם. שהרי הדחתו היא גמר מלאכתו.\nומה לגבי הדחה כזו מכלי שני? השאלה היא אם האיסור הוא משום בישול או מכה בפטיש. אם משום בישול, עפ\"י הפסק של השו\"ע בס' י':\nא\"ר ומחצה\"ש – מותר לשטוף במים חמים מכלי שני.\nט\"ז – גם בכלי שני אסור, אלא רק במים קרים.\nפמ\"ג – אסור אף במים קרים. משום מכה בפטיש."}, {"subhead": "דבר לח/נוזל"}, {"layer": "lead", "srcRef": null, "txt": "אם התבשל כל צרכו והתקרר – השו\"ע אוסר. רמ\"א מקל אם הנוזל מצור\"ל. לפי הרמ\"א יהיה מותר כנגד האש – סמוך לכירה, אך לא עליהם (שמא יחתה)\nאולם, ניתן להפשיר דבר לח קר אף לדעת השו\"ע (ואף מצוי\"ל לרמ\"א) בהנחתו במרחק מה ממקור החום כך שלא ייתבשל. נקודת ההנחה צריכה להיות ממקום שאין הנוזל יוכל להגיע לחום שהידס\"ב (פן נשכח אותו ויתבשל) ולעניין חום זה יש להחמיר ל45°."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "kitzur"}, {"type": "group", "title": "הגדרות היסוד", "spans": "מעשה · שיעור · מקור החום", "children": ["maase", "shiur_mutzak", "shiur_nozel", "makor"]}, {"type": "sec", "id": "bab"}, {"type": "sec", "id": "baa"}, {"type": "sec", "id": "hadacha"}, {"type": "sec", "id": "hafshara"}, {"type": "sec", "id": "irbuv"}, {"type": "sec", "id": "meicham"}, {"type": "sec", "id": "megis"}, {"type": "sec", "id": "yishum"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"יד סולדת בו": "החום שבו היד נרתעת מלגעת (כ־45°C ומעלה) — השיעור שממנו יש בישול. בקיצור: הידס״ב.", "כלי ראשון": "הכלי שהתבשל בו על האש; מבשל כל עוד יד סולדת בו, אף לאחר שהורד מן האש.", "עירוי": "שפיכת נוזל חם מכלי ראשון; לשו״ע (כר״ת) מבשל את פני הדבר כדי קליפה.", "כלי שני": "הכלי שאליו הועבר הנוזל מכלי ראשון; לפי פשט הסוגיה אינו מבשל (מלבד קלי בישול).", "כלי שלישי": "הכלי שאחרי כלי שני; מיקל עוד יותר (יש שהתירו בו אף קלי בישול).", "קלי בישול": "מאכלים המתבשלים בקלות — אף בכלי שני (ולתוס׳ אף בעירוי מכלי שני).", "תבלין": "מתבשל בכלי ראשון שהורד מהאש אף בלא יד סולדת בו, אך אינו מתבשל בכלי שני.", "מדרג קלות בישול": "סולם עד כמה מאכל מתבשל בקלות (קשה בישול ← רגיל ← תבלין ← קלי בישול), הקובע באיזה כלי נאסר בישולו.", "מצקת": "כף גדולה לשאיבת נוזל; ספק אם דינה ככלי ראשון או ככלי שני.", "מאכל בן דרוסאי": "כשליש (או כחצי) בישול — השיעור שממנו המאכל נחשב מבושל. בקיצור: מאב״ד.", "בישול אחר בישול": "האם יש איסור לחמם דבר שכבר התבשל; ביבש אין (לרוב), ובלח — מחלוקת.", "מעשה בישול": "ריכוך דבר קשה או הקשיית דבר רך על ידי חום.", "מגיס": "ערבוב תבשיל; מסייע לבישול ולכן אסור בתבשיל שאינו מבושל כל צרכו.", "מצטמק ויפה לו": "תבשיל לח שהצטמקותו משביחה אותו; רק בו סובר הרמ״א שיש בישול אחר בישול."}, "subject": "שבת", "id": "bishul"}, {"topic": {"title": "נ\"ט בר נ\"ט", "eyebrow": "מבחני הרבנות · איסור והיתר · סימן צ\"ה", "siman": "Shulchan_Arukh,_Yoreh_De'ah.95", "intro": {"lead": {"t": "", "ref": ""}, "body": "למדנו כי טעם כעיקר. בסימן זה, נראה מקרה פרטי בו נגלה כי למרות שישנו טעם, מאחר והוא נקלש, לא מתייחסים אליו. מקרה זה מתקיים בסיטואציה המכונה 'נותן טעם בר נותן טעם'; היינו, כאשר מאכל אינו נותן טעם במאכל אחר ישירות, כמו שאנו מכירים בד\"כ, אלא נותן טעם בכלי, ואזי הכלי נותן טעם במאכל האחר. או אז, טעם המאכל הראשון נקלש בדרכו למאכל האחר, וככזה – כטעם קלוש - אין בו חשיבות (ערוה\"ש)\n\nנעמוד גם על כך שיש הבדל קריטי בדיון זה בין היתר - בשר או חלב - לבין איסור. כך, להלכה נפסק כי למרות שבנתינת טעם שאינה ישירה הטעם נקלש, כאשר מדובר באיסור אנו לא מקלים בכך, ועדיין חשיב טעם כדי לאסור. ורק בטעם של היתר נקל כך (ר\"ן). זאת משום שטעם של איסור חשיבותו תמיד נוכחת."}}, "sections": {"ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳-ב׳", "sugya": null, "ops": [{"subhead": "דגים שעלו בקערה"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**רב ושמואל** – דגים שעלו בקערה של בשר.\n**רב** - אסור לאוכלם בכותח\n**שמואל** – מותר לאוכלם בכותח\nוהגמרא מנסחת שלֶ-\n   רב אסור משום שהווי נותן טעם,\n   ולשמואל מותר משום שהווי נ\"ט בר נ\"ט (הבשר בקערה והקערה בדגים)\n~~(והגמרא אומרת שסיבת עמדת רב נלמדת מכללא, ומחפשת אחר זה סיפור שממנו נלמד כן)~~\n~~חזקיה משום אביי:~~\n   ~~דגים שעלו בקערה, מותר לאוכלן בכותח~~\n   ~~צנון שחתכו בסכין שחתך בה בשר – אסור לאוכלו בכותח דאגב חורפיה בלע~~", "ref": {"label": "חולין · פרק כל הבשר · קיא ע\"ב", "ref": "Chullin.111b"}}, {"layer": "rishon", "src": "תוס' ורא\"ש", "srcRef": null, "txt": "'עלו בקערה' – הדגים רותחים והעלו אותם על קערה צוננת (וכן להפך)\nכלומר: נ\"ט בר נ\"ט דהיתרא – האוכל חם הכלי צונן/להפך; נ\"ט בר נ\"ט דאיסורא – שניהם חמים"}, {"layer": "rishon", "src": "רש\"י, תרומה", "srcRef": null, "txt": "אפילו אם שניהם חמים או בושלו יחד - מותר לאכול בחלב (כי יש פיזור טעם במים). אסור רק אם בושל עם הבשר ממש"}, {"layer": "rishon", "src": "רשב\"א, ר\"ן, ראבי\"ה רמב\"ם", "srcRef": null, "txt": "אפילו נצלו בכלי הבשרי"}, {"layer": "rishon", "src": "ריו\"ח", "srcRef": null, "txt": "1)  אם גם המאכל הפרווה וגם הכלי הבשרי חמים (בושל בכלי) –\n    א.  מותר בחלב רק אם הכלי לא ב\"י\n    ב.  אם הכלי ב\"י – מותר רק בדיעבד (כבר בושל)\n2)  חם וקר כנ\"ל (הקערה/הדגים) צריך לקלוף (כמו בצ\"א, בדין קר וחם שנגעו ממש)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "חולק בשניהם – גם אם הכלי ב\"י ואפילו לכתחילה\nחולק. שטויות. אז בשביל מה יש לנו נ\"ט בר נ\"ט? זה דין רק בנ\"ט ממש.", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.1", "txt": "דגים שבושלו או נצלו בכלי בשרי נקי (שאין בו שאריות) – מותר לאוכלו בכותח (רשב\"א ר\"ן רמב\"ם)"}, {"layer": "zman", "src": "הרב מלמד", "srcRef": null, "txt": "מצדד, אבל לא בגלל נ\"ט בר נ\"ט, אלא כי כיום כלי מתכת וזכוכית נקיים אינם פולטים כלל", "under": true}, {"layer": "lead", "srcRef": null, "txt": "הרמ\"א פה עשוי לבלבל. הוא כביכול פוסק תוס' ורא\"ש, אך רק לכתחילה. ובדיעבד מתיר כדעה המקלה דרשב\"א והרמב\"ם. כלומר: אין לבשל פרווה בבשרי לכתחילה במטרה לאוכלו עם חלב, אבל מותר בדיעבד"}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.2", "txt": "לכתחילה כתוס' ורא\"ש (אין לבשל ולצלות פרווה בכלי בשרי ע\"מ לאכול עם חלב), אך בדיעבד מותר כרשב\"א (סמ\"ק)"}, {"layer": "acharon", "src": "מהרש\"ל", "srcRef": null, "txt": "אם נצלו – אפילו בדיעבד אסור עם חלב (כי אין מים)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "הרמ\"א לא מתיר לאכול לכתחילה אם בדיעבד בישל, אלא רק אם כבר התערבב הפרווה עם החלב – בדיעבד מותר", "under": true}, {"subsubhead": "לכתחילה או בדיעבד?"}, {"layer": "lead", "srcRef": null, "txt": "בסוגריים ציינתי מה פירוש בדיעבד ולכתחילה, אבל רק כדי לסבר את האוזן.. יש גם בזה מחלוקת בין הפוסקים (בעיקר דעת הש\"ך על הרמ\"א)"}, {"layer": "rishon", "src": "סמ\"ק, הגהות מיימ'", "srcRef": null, "txt": "כל מה שמותר, הוא רק בדיעבד (כלומר, כבר בושל הפרווה בסיר בשרי)"}, {"layer": "rishon", "src": "תרומה", "srcRef": null, "txt": "אפילו לכתחילה (מותר לבשל את הפרווה בסיר בשרי לכתחילה כדי לאכלו עם חלב)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "נקט כדעה המקלה רק בדיעבד, שזה בעצם לפסוק סמ\"ק."}, {"layer": "rishon", "src": "הב\"י", "srcRef": null, "txt": "הביא מחלוקת זו. אבל לא הכריע בה במפורש להלכה בשו\"ע\nלשונו בשו\"ע היא די בדיעבדית \"דגים שבושלו\"\nמצד שני, על ריו\"ח (שסבר כסמ\"ק) חלק וכתב במפורש אפילו לבשל מותר (ואפילו בב\"י)"}, {"layer": "acharon", "src": "ש\"ך, כו\"פ", "srcRef": null, "txt": "שו\"ע סובר כסמ\"ק שכל הדיון הוא רק בדיעבד"}, {"layer": "acharon", "src": "בן איש חי", "srcRef": null, "txt": "אבל בכלי שאינו ב\"י מותר אפילו לכתחילה", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "שו\"ע סובר שמותר לבשל אף לכתחילה פרווה כדי לאכול עם חלב"}, {"layer": "acharon", "src": "מנחת כהן", "srcRef": null, "txt": "אסור לבשל לכתחילה ע\"מ לאכול עם חלב, וקונסים את מי שעושה כן לא לאכול עם חלב"}, {"layer": "acharon", "src": "פר\"ח", "srcRef": null, "txt": "חולק. לא קונסים ('דגים שעלו' – אפילו במזיד)", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "דעת המנחת כהן נראית; שלא להרגיל באיסור", "under": true}, {"subsubhead": "כשהכלי שבושל בו אינו ב\"י"}, {"layer": "lead", "srcRef": null, "txt": "בסוגיה עצמה אין כל חילוק בין אם הדגים עלו בכלי בן יומו לשאינו בן יומו. אך מובן כי ניתן לשלוף חילוק זה ולבחון האם נוכל לעדן את השיטות המחמירות יותר כאשר מדובר בכלי שאינו ב\"י, שהרי הווי נטל\"פ."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם הכלי שבושלו/ניצלו בו הדגים אינו ב\"י – מותר אף לכתחילה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "לשו\"ע אין חילוק, כי גם ככה מתיר (לא מדייק אם דעת השו\"ע בדיעבד או לכתחילה)", "under": true}, {"layer": "table", "table": {"title": "לאכול פרווה שבושל בכלי בשרי עם חלב", "cols": ["שו\"ע", "רמ\"א"], "rows": [{"head": "הכלי הבשרי\n**בן יומו**", "cells": ["מותר\n(לא פירש אם לכתחילה או בדיעבד)\n**ש\"ך**: דעתו בדיעבד (רק אם בושל)\n**רע\"י**: דעתו לכתחילה (מותר לבשל)", "אסור לכתחילה\nמותר בדיעבד\n**ש\"ך, ערוה\"ש**:\n   לכתחילה לרמ\"א = לערבב עם חלב\n   בדיעבד לרמ\"א = אם כבר התערב עם חלב - מותר לאכול"]}, {"head": "הכלי הבשרי\n**אינו בן יומו**", "cells": ["אין התייחסות.\nלרע\"י ק\"ו שמותר לכתחילה\n**בן איש חי**: מותר לכתחילה\nלש\"ך שסובר שבבן יומו דעת ש\"ע בדיעבד – אפשר להציע שסובר כבן איש חי", "מותר אף לכתחילה"]}]}}, {"layer": "zman", "src": "פניני הלכה", "srcRef": null, "txt": "כל הטַבלה נכונה לגבי כלי חרס ועץ / כלי מתכת זכוכית שאינם נקיים\nכלי מתכת וזכוכית נקיים כיום – אינם פולטים טעם כלל, וכל בני העדות יכולים לבשל לכתחילה פרווה בסיר בשרי (נקי) כדי לאכול עם חלב"}, {"layer": "acharon", "src": "עיון (הערת המסכם)", "srcRef": null, "txt": "בחזרה לסימן בשבט תשפ\"ב, מרגיש שדעת הש\"ך וערוה\"ש ברמ\"א לגבי מהו בדיעבד נכונה בו. ושזה מובהק מלשון האו\"ה שבדרכ\"מ. עוד ראיה להבנתם היא מכך שהוא מתיר כן בכלי שאינו בן יומו, כלומר, נטל\"פ. הרי שהוא סומך פשוט על הדין של נטל\"פ, שמותר בדיעבד.\nבנוסף, בעקבות הלימוד שלי עם החבורה את סימן צ\"ג, והניסיון להבין את סברת נ\"ט בר נ\"ט כאן, ואת המשמעות של לכתחילה ובדיעבד, נוטה יותר לדעת הרמ\"א לש\"ך להלכה. אם הבדיעבד כאן מותר, למה לאסור לכתחילה? כמו שדיברנו בסי' צ\"ג (ואני רואה שבדומה לכך אומר הרב מלמד), אכן הטעם לא משמעותי ברמה שאפשר להתירו. אלא שמאחר ויש רצון לשמור על הפרדת המטבח (ברמה מסוימת ויותר חד משמעית) – אז אוסרים לכתחילה.", "collapsed": true}, {"subsubhead": "בכלי חלבי (לא חלב ממש)"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "מה שאסור לאכול דגים שבושלו/נצלו בכלי בשרי עם חלב (תוס', רא\"ש) – חלב ממש. לאכלם בכלי חלבי מותר"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "פוסק כן: מאכל פרווה שבושל בכלי בשרי - מותר לאכול בכלי חלבי"}, {"subsubhead": "בשני מאכלים"}, {"layer": "lead", "srcRef": null, "txt": "דגים שעלו בקערה זו דוגמא די ספציפית לנ\"ט בר נ\"ט: הטעם הראשון בכלי והשני במאכל (הדגים). אבל מה אם גם הטעם הראשון במאכל, ולא בכלי? האם עדיין אמרינן שהטעם נקלש?"}, {"layer": "rishon", "src": "תרומה, פמ\"ג", "srcRef": null, "txt": "נ\"ט בר נ\"ט בשני אוכלים אינו מותר"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כי הטעם לא נקלש באוכלים", "under": true}, {"layer": "acharon", "src": "פת\"ש", "srcRef": null, "txt": "גם נ\"ט בר נ\"ט ע\"י שני אוכלים מותר"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "אין טעם בדבריו", "under": true}], "pesak": null}, "isura": {"title": "נ\"ט בר נ\"ט דאיסורא", "seif": null, "sugya": null, "ops": [{"layer": "rishon", "src": "ר\"ן, רשב\"א", "srcRef": null, "txt": "(ב\"י: ונראה שדעת כל הפוסקים שווה לזה):\nמה שמתירים נ\"ט בר נ\"ט זה רק בבשר/חלב, אבל באיסור – אפילו אם יש המון נ\"ט בר נ\"טים אסור כל עוד יש טעם (כלומר, זה לא שאין טעם בנ\"ט בר נ\"ט ובגלל זה זה מותר, אלא שלמרות שיש טעם הוא מותר (!). אבל טריפה תמיד טעמה אסור. השערי דורא קורא לזה חילוק בין נ\"ט של היתרא, לנ\"ט של איסור)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "בהיתר אנו מתירים טעם שנקלש משום שאין בו חשיבות, אבל באיסור – למרות שנקלש עדיין יש בו חשיבות", "under": true}], "pesak": null}, "charif": {"title": "נ\"ט בר נ\"ט בדבר חריף", "seif": "סעיף ב׳", "sugya": null, "intro": "ראינו במקומות רבים כי חריפות מאכל מקשה על העניינים, וכך למשל בנטל\"פ, השו\"ע הביא דעת המרדכי הסובר שחריף שמתבשל בכלי שאינו בן יומו מעורר את הטעם לשבח; וכן פוסק הרמ\"א כאן על פיו. (ועיין עוד בסי' צ\"ו)\n\nבנ\"ט בר נ\"ט עולה דבר דומה, ואנו רואים כי הרמ\"א סובר עפ\"י האו\"ה שאם המאכל הפרווה שמבשלים בכלי הבשרי הוא חריף – אסור אפילו בדיעבד ('בדיעבד' – עפ\"י הטבלה לעיל, בדעת הרמ\"א)\n\nמקרה של חריף שבושל בכלי בשרי יש לבחון מבחינת שתי הקולות המרכזיות שלנו בנתינת טעם: מצד נ\"ט בר נ\"ט, ומצד נטל\"פ.", "ops": [{"layer": "acharon", "src": "דרכ\"מ · או\"ה", "srcRef": null, "txt": "בחריף לא מועיל נ\"ט בר נ\"ט"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כי החריפות הופכת את טעם הבשר לממשית יותר (מחזקת)", "under": true}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.2", "txt": "דבר חריף שבושל בכלי בשרי – אין לאוכלו עם חלב, אפילו בדיעבד"}, {"layer": "note", "srcRef": null, "src": "חריף = ?", "txt": "חריף = מאכל שרובו או כולו חריף. מאכל שיש בו תבלין חריף – לא מִקרי חריף"}, {"layer": "acharon", "src": "הערה (הש\"ך בק\"ג)", "srcRef": null, "txt": "לשים לב: הרמ\"א מדבר באם הדבר החריף בושל. הש\"ך בק\"ג, גבי נטל\"פ מחייב תנאי זה לכך שחריף בכלי שאינו ב\"י יקבל טעם לשבח. ומן המיקס שהרמ\"א עושה כאן (הוא פוסק את המרדכי מק\"ג ומדבר על בישול), אפשר לראות תימוכין לדעת הש\"ך", "collapsed": true}, {"layer": "zman", "src": "פניני הלכה (אחרי סידור שלי)", "srcRef": null, "txt": "מצד נ\"ט בר נ\"ט: רמ\"א: עפ\"י או\"ה סובר שאין נ\"ט בר נ\"ט בחריף\n  שו\"ע: מקיש מדעת השו\"ע בסכין בצ\"ו לכאן, שיסכים עם הרמ\"א והאו\"ה שאם בושל חריף פרווה – אין נ\"ט בר נ\"ט.\nמצד נטל\"פ: רמ\"א: אוסר כאן שהכלי שבושל בו החריף אינו ב\"י\nשו\"ע: מניח שהוא לא פוסק כמו המרדכי בק\"ג שחריף בקדרה שאינה ב\"י מבטל את הפגם שבטעם (בק\"ג הוא דווקא מביא אותו ביש אומרים. אז אולי בגלל צ\"ו? לבדוק.)\nלפיכך, הרמ\"א יאסור בכל מקרה לאכול עם חלב, ושו\"ע יתיר כאשר הווי נטל\"פ, היינו בקדרה שאינה ב\"י\nובקצרה:\nאם הקדרה שבושל בה החריף בת יומא: גם לרמ\"א וגם לשו\"ע אסור לאוכלו עם חלב\nאם הקדרה שבושל בה החריף אינה בת יומא: לשו\"ע מותר לאוכלו עם חלב; לרמ\"א אסור\nדעת עצמו (טוען שיש אומרים. לברר איפה): רק כאשר לא מנקים יש להחמיר בחריף. אם מנקים: דין חריף כדין סתם מאכל פרווה (כלומר, הן מצד נ\"ט בר נ\"ט, והן מצד נטל\"פ), כי אין פליטת טעם כלל, ומותר לאכול עם חלב (וי\"ל לפי מה שפוסק בעיקר דין נ\"ט בר נ\"ט }, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "או שתהה על האש, או שחום המים שבה הוא הידס\"ב"}, {"layer": "rishon", "src": "ב\"י (וכ\"פ הארוך)", "srcRef": null, "txt": "רק אם הידס\"ב אוסרת. ואפילו אם היא על האש (וכך יש להבין את הטור)", "under": true}, {"layer": "lead", "srcRef": null, "txt": "אם עירה המים מכלי שני –"}, {"layer": "rishon", "src": "י\"א", "srcRef": null, "txt": "שרק חום של כלי ראשון מפליט (אעפ\"י שהידס\"ב), ולכן מותר"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אף חום כלי שני מבליע ומפליט, ואפילו אין הידס\"ב, ולכן אסור", "under": true}, {"layer": "acharon", "src": "דרכ\"מ", "srcRef": null, "txt": "אנו נוהגים היתר בכלי שני בדיעבד", "under": true}, {"layer": "rishon", "src": "ש\"ד", "srcRef": null, "txt": "עירוי מכלי\"ר ככלי ראשון. לכן יש להזהר לתת את המים תחילה ליורה, ואז להכניס הקערות"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "עירוי מכלי\"ר ככלי שני, לכל הנוגע לענייננו. ואפילו אם כל הכלים מלוכלים שרי"}, {"layer": "rishon", "src": "או\"ה", "srcRef": null, "txt": "אין אומרין שכף היא בהכרח כלי שני. לכן, אם רחץ כף בכף – חשבינן ככלי\"ר"}, {"layer": "rishon", "src": "ש\"ד", "srcRef": null, "txt": "אם נמצאה קערה של איסור/בשר ביורה חלבית – מחזקינן להיתרא, ולא לאיסורא"}, {"layer": "rishon", "src": "ש\"ד בשם מהרי\"ח", "srcRef": null, "txt": "כלי שני מבליע אף בחרס, אך לא מפליט.\nלפיכך, אם מעורב חרס בסיפור, אם הן מלוכלכות – אסור (כי מבליע), אבל אי נקיות - מותר"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "כותב כדיוקו בב\"י - רק אם הידס\"ב"}], "pesak": null}, "melach": {"title": "מלח וכותח", "seif": "סעיפים ה׳-ז׳", "sugya": null, "intro": "[שייך יותר לסימן ק\"ה – מליח וכבוש. לשקול להעביר לשם.]\n\nסעיף ה'-ו' – אסור להניח כלי שיש בו כותח אצל כלי שיש בו מלח (דרישה: מסתברא בב\"י שהסיבה היא משום שהמלח סופג מן הכותח, וחיישינן שישתמש במלח לבשל את הבשר.)\n\nלעומת זאת – להניח כלי שבו כותח ליד כלי שיש בו חומץ מותר (משום שאין החומץ סופג מן הכותח)", "ops": [{"layer": "gemara", "src": "רב נחמן לרב דימי", "srcRef": null, "txt": "אסור להניח כד מלח ליד כד כותח\nאבל כד של חומץ מותר ליד כד כותח\nמאי שנא? האי איתיה לאיסור בעיניה, ואי ליתיה איסורא בעיניה."}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "חיישינן שמא יפול מן הכותח במלח ולא ידעו מכך, ואז ישתמשו בו למלוח בשר\nוכשכותח נופל במלח הוא לא בטל מפני שעבה. אבל בחומץ – לא נראה, ובטל בשישים"}, {"layer": "rishon", "src": "תוס', רא\"ש", "srcRef": null, "txt": "על אף טעם זה (דרש\"י), אפשר לשים כד של בשר וכד של חלב יחד באותה תיבה"}, {"layer": "rishon", "src": "רמב\"ם, ר\"ח", "srcRef": null, "txt": "נראה מדבריו שסובר שההנחה סמוכה ממש. ושואב המלח מן כותח (אף בלי שיפול הכותח למלח, כמו שמפרש רש\"י)"}, {"layer": "rishon", "src": "הר\"ן", "srcRef": null, "txt": "טעמם של הרמב\"ם והר\"ח (שאיבת המלח) לא מסתדר עם נימוק הגמרא 'איתיה/ליתיה בעיניה)", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.5", "txt": "מביא את הדין על פי רב נחמן (מלח אסור, חומץ מותר)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.6", "txt": "מביא עפ\"י התוס' והרא\"ש שמותר לשים בתוך תיבה אחת כד של בשר וכד של חלב"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ז')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.95.7", "txt": "(ב\"י של זה בק\"ה). ובתמצות: מלח הנמצא בקערה בשרית, מותר להשתמש בו לחלב\nאך יש לזה עניין גם פה, כי מלח הוא חריף, ובחריף אין נ\"ט בר נ\"ט (ובכל זאת מתיר השו\"ע)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "המחמיר בזה – תבוא עליו ברכה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "מנהג ישראל להחזיק כלי למלח לארוחות בשריות וכלי מלח לחלביות", "under": true}], "pesak": null}, "dvash": {"title": "נ\"ט בר נ\"ט דהיתרא בדבש (צ\"ד – ס' ט')", "seif": null, "sugya": null, "intro": "(בין נ\"ט לפגם לנ\"ט בר נ\"ט דהיתרא)", "ops": [{"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "(הובא גם בדיון על נטל\"פ): ר\"י שהתיר דבש שבשלו במחבת בשרית בת יומא והוריקוהו לקערה חלבית משום שהשמנונית בדבש הווי נטל\"פ."}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "סובר שניתן להתיר בזה אפילו אי הווי טעם לשבח, משום שהווי נ\"ט בר נ\"ט דהיתרא"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "הביא עפ\"י המרדכי, ונימק כטעמו בב\"י – נ\"ט בר נ\"ט דהיתרא"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "הנו\"כים מתקשים בסברתו זו של השו\"ע. שהרי, המקרה הזה דומה לדגים שבושלו בקערה\nבפשטות: השו\"ע חושב שטעמו טוב יותר, משום שלעניין נ\"ט בר נ\"ט יש היתר גם בנותן טעם לשבח\nאבל בכך הוא מוותר על הנימוק של נטל\"פ של המרדכי. ובנטל\"פ היתרון הוא שמותר אפילו רק בנ\"ט אחד, ולא רק בנ\"ט בר נ\"ט.\nלפיכך, הט\"ז כתב שהפסיד השו\"ע שהשמיט טעם המרדכי"}], "pesak": null}, "kitzur": {"title": "קיצור הלכה", "seif": null, "sugya": null, "navAccent": true, "flow": [{"body": "חולין (פ' כל הבשר): רב ושמואל – דגים שעלו בקערה\n**רב**: אסור (נ\"ט)\n**שמואל**: מותר (נ\"ט בר נ\"ט)\n**תוס' ורא\"ש** (וריב\"ן ועוד): אם רק הכלי/המאכל חם – מותר בחלב; שניהם חמים/בישול – אסור בחלב\n**רש\"י, תרומה** (רשב\"א רמב\"ם וכו'): אפילו אם שניהם חמים (כגון שמתבשל הדגים בכלי הבשרי)\n**רשב\"א, ר\"ן, רמב\"ם**: אפילו הדגים נצלים בקערה (למרות שאין מים)\n**ריו\"ח**: אם שניהם חמים - רק אם הכלי אינו ב\"י\n   אם הכלי ב\"י – מותר עם חלב רק בדיעבד (ב\"י חולק אשני הדברים)\n**שו\"ע**: רמב\"ם רשב\"א (מאכל פרווה שבושל בכלי בשרי – מותר לאוכלו עם חלב. אפילו בן יומו)\n**רמ\"א**: רק בדיעבד (מאכל פרווה שבושל בכלי בשרי - מותר לאוכלו עם חלב בדיעבד, אבל אסור לבשל לכתחילה במטרה זאת)\n**ש\"ך**: שו\"ע גם בדיעבד\n**הרב עובדיה**: שו\"ע אף לכתחילה"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "kitzur"}, {"type": "sec", "id": "isura"}, {"type": "sec", "id": "charif"}, {"type": "sec", "id": "mikli"}, {"type": "sec", "id": "melach"}, {"type": "sec", "id": "dvash"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"נ\"ט בר נ\"ט": "נותן טעם בר נותן טעם — טעם שעבר דרך כלי (ולא ישירות), ולכן נקלש; בהיתר (בשר/חלב) מקילים בו.", "נטל\"פ": "נותן טעם לפגם — טעם שפוגם את המאכל; אינו אוסר. יתרונו: מתיר אף בנתינת טעם אחת.", "כותח": "מאכל חלבי (ממרח שהכיל חלב) — הדוגמה הקלאסית לאכילת מאכל 'בשרי' עם חלב.", "אגב חורפיה בלע": "מחמת החריפות המאכל בולע טעם ממשי (לא רק קלוש) — ולכן החריף אוסר.", "הידס\"ב": "יד סולדת בו — החום שבו היד נרתעת; השיעור המפליט/מבליע טעם.", "כלי ראשון": "הכלי שבושל בו על האש; מפליט ומבליע טעם כל עוד יד סולדת בו.", "כלי שני": "הכלי שאליו הועבר החם; כוחו להפליט/להבליע חלש יותר, ונחלקו בו.", "בת יומא": "כלי שבישלו בו בתוך מעת־לעת האחרון; טעמו הבלוע עדיין 'לשבח'.", "כותח בעיניה": "האיסור נמצא בעינו (ממשי), להבדיל מ'ליתיה בעיניה' — שאינו ניכר ובטל."}, "subject": "איסור והיתר", "id": "netbarnet"}, {"topic": {"title": "הרחקות בשר בחלב", "eyebrow": "מבחני הרבנות · איסור והיתר · סימנים פ\"ח-פ\"ט", "siman": "Shulchan_Arukh,_Yoreh_De'ah.88", "intro": {"lead": {"t": "", "ref": ""}, "body": "סימן פ\"ח וסימן פ\"ט שאחריו הם בעצם המשך לסימן פ\"ז ולענייני בישול בשר בחלב.\n\nעיקרם של סימנים אלו הוא בגדרי הרחקה מאכילת בשר וחלב (שהרי כמו שראינו בסימן פ\"ז, עיקר האיסור הוא באכילה ולא בבישול (נפקא אכילה בלשון בישול)).\n\nפ\"ח עוסק בבשר וגבינה על שולחן אחד. פ\"ט עוסק בשהייה באכילה ובהרחקות נוספות (קינוח, הדחה, המתנה, מפה וסכו\"ם)."}}, "sections": {"din": {"title": "דין ההרחקה וטעם", "seif": "סעיף א׳", "sugya": null, "intro": "בסימן פ\"ח, פוסק השו\"ע עפ\"י המשנה כדעת בית הלל, כי אין להעלות בשר וגבינה על שולחן אחד. ואפילו בשר עוף האסור באכילה רק מדרבנן (סימן פ\"ז). ועפ\"י המשנה גם מסייג ומתיר להעלותם על שולחן שאינו שולחן אכילה.\nבעניין טעם האיסור, התקשו בגמרא, דהרי אכילת עוף בחלב אסורה מדרבנן, ואם גוזרים כאן להעלות \\ul{עוף וגבינה} על אותו שולחן שמא יאכלם יחד – מדובר בגזרה על גזרה!\nלדעת רש\"י, מדובר בעצם בגזרה אחת (עפ\"י אביי: שמא יעלם יחד באלפס רותח). ולדעת התוספות והרמב\"ם, מדובר בשתי גזרות, ובכוחם של חכמים לעשות כן בעת הצורך.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "+אסור להעלות בשר וגבינה על אותו השולחן\n+מחלוקת ב\"ה וב\"ש לגבי עוף:\n   **ב\"ש** מתירים להעלות עוף\n   **ב\"ה** אוסרים להעלות אף עוף על אותו שולחן עם הגבינה\nבבא מסייגת\\note{על מה הבבא המסייגת מוסבת? על האיסור הכללי? או על ב\"ה?}: באיזה שולחן אסור - בשולחן שאוכל עליו. אבל שולחן שסודר עליו התבשיל - מותר.", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**קושי 1** - על גזרת ב\"ה: עוף הוא דרבנן, אז אמאי לגזור שלא להעלותו? תשובה: אי שרי להעלות \\ul{עוף וגבינה} - יעלה בשר ויאכל בגבינה (באיסור תורה). יענו: צריך את הגזרה אגזרה\n**קושי 2**, על התשובה, **רב ששת**: סוף סוף, צונן בצונן הוא (היינו: בצונן - אפילו אכילת בשר בהמה בגבינה – הוא מדרבנן, כי אינה דרך בישול)\nתשובה, **אביי**: גזירה שמא יבשל (יעלה באילפס רותח)", "ref": {"label": "שם", "ref": "Chullin.104b"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "הטעם הוא שמא יבוא לאכול העוף והחלב יחד (וכן לשון הטור והשו\"ע)."}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "~~הקשה על הרמב\"ם וטוש\"ע - הרי לפי הסוגיה אנו חוששים שמא יעלה בשר בהמה ויאכלו, ולפי אביי, אנו חוששים אף שיבוא לבשל את הבשר הבהמה והחלב באלפס רותח!~~\n~~והציע שאולי דרכם הייתה לקצר ולהתייחס רק לגזרה הראשונה משום שאין נפקא מינא, ובוודאי שמתכוונים לכך שחיישינן שמתוך אכילת עוף בחלב יבוא לאכול בשר בהמה וחלב ואף יבשלם~~", "under": true, "collapsed": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.88.1", "txt": "אסור להעלות בשר וחלב כולל עוף על אותו שולחן (המשנה, וכדעת ב\"ה)\n   זה כאשר מדובר בשולחן אכילה. אבל בשולחן שרק 'סודר' עליו התבשיל - מותר. (המשנה)\n   ~~(משמיט ריש לשונו של הטור)~~ אולי הוא פוסק במשנה שהבבא מוסבת על דעת ב\"ה. ואז האוקימתא היא רק על עוף. ולכן קיצץ מתחילת לשון הטור 'כל הבשר שאסור לאוכלו בחלב'.\n   כלומר: אסור להעלות בשר וחלב על אותו שולחן. כל שולחן. עוף אסור רק בשולחן אכילה. שאר שולחנות מותר עוף."}, {"subhead": "גזרה לגזרה (ס׳ א׳)"}, {"layer": "lead", "srcRef": null, "txt": "על אף שהסוגיה ניסתה לתת מענה על שאלת הגזירה אגזירה, גם הראשונים נידרשו לה:"}, {"layer": "rishon", "src": "תוספות ורמב\"ם", "srcRef": null, "txt": "בכה\"ג גזרינן גזירה לגזירה. וכן הט\"ז"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "נראה שסובר שמדובר בגזירה אחת"}, {"layer": "lead", "srcRef": null, "txt": "למה מחמירים כ\"כ בבשר בחלב? (בעוד שנבלות ויין נסך אם גוי מעלם על השולחן, אין בעיה לאכול על אותו שולחן)"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "בגלל שיש היתר לאכול כל אחד מהם בנפרד, קיים חשש סביר יותר שיאכלו אותם יחדיו (וכן הביא הש\"ך)"}], "pesak": null}, "motar": {"title": "מתי מותר", "seif": "סעיף ב׳", "sugya": null, "intro": "מן המשנה, בדברי רשב\"ג, מסתבר ששני אכסנאים מותר לאחד להעלות בשר ולשני חלב על שולחן אחד. ובגמרא, שמואל מתנה זאת בכך שהם אינם מכירים זה את זה.\nומן הברייתא השונה לשון אחרת בדברי רשב\"ג, עולה גם האפשרות ש\\ul{סימן היכר} מועיל. וזה תלוי בפרשנות הראשונים.", "ops": [{"layer": "mishna", "src": "משנה · רשב\"ג", "srcRef": null, "txt": "**רשב\"ג**: שני אכסנאים מותר שיאכלו על שולחן אחד זה בשר וזה גבינה (משום שהם זרים ואין סיכוי שיערבבו)", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "גמרא · שמואל", "srcRef": null, "txt": "**שמואל**: אם הם מכירים זה את זה אסור (ההיתר הוא משום שהם זרים ולא יאכלו אחד משל השני)\nשני אחים השונאים זה את זה? מחמירים ואסור. זה נחשב אכילה יחד.\nבהמשך הגמרא, מובאת תניא נמי הכי על דברי רשב\"ג: שני אכסנאים מותר שיאכלו על שולחן אחד. '\\ul{ולא אסרו אלא בתפיסה אחת'}.", "ref": {"label": "שם", "ref": "Chullin.104b"}}, {"layer": "lead", "srcRef": null, "txt": "ובידינו שני פירושים להבנת מהלך הסוגיה וההיתר:\nלפי הפירוש הראשון: אם יש \\ul{סימן היכר} מותר אפילו למכרים\nלפי הפירוש השני: אסור למכרים אף פעם"}, {"layer": "rishon", "src": "רש\"י ותוספות א'", "srcRef": null, "txt": "-ולא אסרו אלא בתפיסה אחת. חלב ובשר כרוכים זה בזה\n-תפיסה אחת סלקא דעתך? פשיטא! זה אסור אפילו בלי קשר לאותו שולחן\n-אלא כעין תפיסה אחת על שולחן אחד. אבל \\ul{אם יש דבר היכר} (שתי תפיסות) - מותר\nכלומר, הברייתא מלמדת אותנו ששני אכסנאים אסורים באכילה של בשר וחלב על אותו השולחן כל עוד הם קרובים ואין הפסק. אבל אם יש הפסק כלשהו, כגון \\ul{לחם או קנקנן} – מותר."}, {"layer": "rishon", "src": "יש מפרשים (תוס' ב')", "srcRef": null, "txt": "תפיסה אחת = שניים שיש להם שותפות כלכלית. ו'כעין תפיסה אחת' = מכירים זה את זה. כלומר, שיש ביניהם קרבה בכל זאת, ועל אף שהם שני אכסנאים, אינם זרים זה לזה. ו\\ul{לזה אין פתרון היתר}.", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "שני מכרים לא יכולים לאכול על שולחן אחד בשר וחלב. רק זרים (ולא מדבר על אוקימתות)\\note{ובב\"י כתב שנראה שגם הרי\"ף סבר ככה. אך באמת, לא מצאתי ראיה לכך שכן סבר. ואולי זו הסיבה לכך שלא פסק עפ\"י רוב עמודי הוראה}"}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "הביא את שני הפירושים, אבל \\ul{סבר להקל שהיכר מועיל}. וכן נראה באו\"ח קעג, וכן דעת הרשב\"א."}, {"layer": "shulchan", "src": "ובשו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.88.2", "txt": "מותר ע\"י \\ul{סימן היכר} (וק\"ו אם לא מכירים זא\"ז) (תוס' א, רש\"י, רשב\"א).\nופסק ששניים המכירים אסור בשום צורה. \\ul{אפילו שונאים/מקפידים.}"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "+לחם ההיכר צריך להיות לחם שלא אוכלים. ואם אוכלים ממנו וודאי לא חשיב היכר (דהרי נחשב חלק מן הארוחה) (עפ\"י הגהות אשיר\"י)\n+והביא גם עפ\"י הב\"י (באו\"ח קע\"ג) שקנקנן שאין דרכו להיות על השולחן בזמן סעודה, על אף שמשמש לשתייה - חשיב היכר\n+צריך שההיכר יהיה בין הסועדים."}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "חולק על הב\"י וסובר שאם שותים מן הקנקן עכשיו – לא נחשב היכר.", "under": true}, {"layer": "acharon", "src": "והש\"ך", "srcRef": null, "txt": "צידד בדעת הרמ\"א והב\"י", "under": true}, {"layer": "zman", "src": "ילקו\"י", "srcRef": null, "txt": "בקבוקים שלנו שדרכם להיות על השולחן לא נחשבים ל\\ul{סימן היכר}.", "under": true}, {"layer": "acharon", "src": "לדעת המהרש\"ל", "srcRef": null, "txt": "אם אינם אחים ושונאים זא\"ז – מותר", "under": true}, {"layer": "acharon", "src": "ש\"ך וט\"ז", "srcRef": null, "txt": "חולקים וסוברים כדעת השו\"ע שכל שני מכרים אסור, אפילו שונאים", "under": true}], "pesak": null}, "hafrada": {"title": "כמה הלכות בעניין הפרדה", "seif": null, "sugya": null, "intro": "(דרכ\"מ. לא לגמרי קשורות לכאן. אולי יובאו בסימנים אחרים.)", "ops": [{"layer": "rishon", "src": "רשב\"א (דרכ\"מ)", "srcRef": null, "txt": "אסור לאכול גבינה על מפה שאכלו עליה בשר משום שהבשר נדבק במפה ואז יידבק בגבינה\n-   אסור לחתוך גבינה -אפילו צוננת- ב\\ul{סכין שחתכו בה בשר}\n-   אפילו את הלחם שאוכלים עם הגבינה אסור לחתוך בסכין הזה (כי רוב הסכינים השומן קרוש בהם ונדבק עליהן)"}, {"layer": "rishon", "src": "ב\"י בשם א\"ח", "srcRef": null, "txt": "סבר שאין להחמיר ומותר לחתוך את הפת שיאכל בה גבינה עם סכין בשרית. והוי נ\"ט בר נ\"ט.", "under": true}, {"layer": "acharon", "src": "והדרכ\"מ", "srcRef": null, "txt": "סובר כדעת הרשב\"א, וחושב ש\\ul{אם רואים את השומן והוא ניכר, לא שייך נ\"ט בר נ\"ט}."}], "pesak": null}, "chalav_basar": {"title": "חלב אחר בשר", "seif": "סעיף א׳", "sugya": null, "intro": "סימן פ\"ט – שהייה באכילה והרחקות נוספות. הדיון בגבינה אחר בשר הוא בשאלה אחת: ההמתנה. שאלה זו מתפרטת לתת שאלות: טעם ההמתנה (רש\"י-רמב\"ם), זמן ההמתנה (שפע דעות ומנהגים), ועוף (תוס' ור\"ן שמתירים בלא המתנה).", "ops": [{"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**רבי יוחנן**: לא צריך לחכות בין בשר לגבינה\n**רב חסדא**: אסור לאכול גבינה אחר בשר; מותר לאכול בשר אחר גבינה ~~(רש\"י: משום שבשר מוציא שומן, ו טעמו נשאר לאורך זמן)~~\n**רב אחא**: דין בשר שבין השיניים כבשר ממש (\"הבשר עודנו בין שיניהם\")\n**אבא של מר עוקבא**: היה מחכה אחר בשר למחר ~~(רש\"י: מעת לעת – 24 שעות)~~\n**מר עוקבא**: אחרי בשר, היה אוכל בסעודה שלאחמ\"כ חלב", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"subhead": "טעם ההמתנה"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "צריך לחכות בגלל הבשר בשיניים שאינו יורד בקינוח הפה (ט\"ז: מקרי בשר עד 6 שעות, ואח\"כ הוי כמעוכל).\nלאחר אכילת בשר, בהמה או עוף, יש לחכות שיעור סעודה שהוא 'כמו' 6 שעות מפני בשר השיניים שאינו יורד בקינוח."}, {"layer": "rishon", "src": "טור, רש\"י", "srcRef": null, "txt": "צריך לחכות בגלל שהבשר מוציא שומן והטעם נשאר לאורך זמן (באכילה).\n yer": "rishon", "src": "ב\"י (או\"ח קעג)", "srcRef": null, "txt": "שנהגו העולם שלא לאכול גבינה אחר תבשיל של בשר כלל ואין לפרוץ גדר. אבל, אם אין בשר בתבשיל (אעפ\"י שנתבשל בקדרה בשרית) - לא נהגו להחמיר ומותר לאכול אחריו גבינה"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.89.3", "txt": "פסק גם כדעת ר\"ת שצריך רק ליטול ידיים אחר תבשיל בשר ואפשר לאכול גבינה (על אף שבב\"י נראה שסבר להחמיר)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "+מביא עפ\"י הרשב\"א והמרדכי ששומן בשר דינו כבשר עצמו (ולכן אסור לאכול גבינה אחריו) (ש\"ך: וגם שומן עוף דינו כן)\n+והביא עפ\"י הב\"י שאין לאכול גבינה אחר תבשיל בשר כמו שאסור אחר בשר עצמו.\n+וגם הביא מה שכתב בב\"י שאם אין בשר בתבשיל, מותר אחריו גבינה על אף שבושל בקדרה בשרית\n+עפ\"י ש\"ד: צריך נטילה אף בין תבשיל לתבשיל (אם נגע בידיו)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "ומותר אפילו עם גבינה ממש. כי בתבשיל בשר הוא נ\"ט בר נ\"ט. ואפילו הקדרה לא הודחה יפה מאז שבושל בה בשר עד שבישלו בה תבשיל", "under": true}], "pesak": null}, "mapa": {"title": "החלפת מפה וסכו\"ם", "seif": "סעיף ד׳", "sugya": null, "ops": [{"subhead": "מפה, נקיון שולחן (צונן)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "צורר אדם בשר וגבינה במטפחת אחת ושלא יגעו זה בזה", "ref": {"label": "חולין · פרק כל הבשר", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "גמרא · אביי", "srcRef": null, "txt": "מאחר ואם יגעו - \\ul{צריך הדחה אפילו צונן בצונן}", "ref": {"label": "שם", "ref": "Chullin.104b"}}, {"layer": "gemara", "src": "ירושלמי (פסחים) · א\"ר יוסה", "srcRef": null, "txt": "ההין דאוכל חובץ ובדעתיה מיכול קופד צריך מבער פיסת"}, {"layer": "rishon", "src": "טור (צא)", "srcRef": null, "txt": "מהירוש' מבין שצריך להוריד מהשולחן את הלחם שנשאר מארוחה עם גבינה אם רוצה לאכול בשר"}, {"layer": "rishon", "src": "הגהות אשרי בשם או\"ז", "srcRef": null, "txt": "מוסיף שצריך להוריד כל מה שהיה על השולחן בארוחה החלבית", "under": true}, {"layer": "rishon", "src": "שו\"ת הרשב\"א המיוחסות לרמב\"ן", "srcRef": null, "txt": "אם אכלו בשר ורוצים לאכול גבינה - לא מספיק לנקות. ואפילו גבינה קרה (משום שזה בגלל הלכלוך והשאריות. אם זה היה בגלל שבלוע היה מותר קר)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.89.4", "txt": "צריך להוריד אחר אכילת גבינה שיורי פת מהשולחן (טור), וכשו\"ת הרשב\"א שאם אכלו בשר ורוצים לאכול גבינה - יש להחליף מפה"}, {"layer": "acharon", "src": "והפת\"ש בשם רדב\"ז", "srcRef": null, "txt": "דאם אוכלים בקערה - אין מתלכלכת המפה, ולא צריך כלום. אבל אפילו לצאת לדעת הרשב\"א, צריך רק להפוך המפה", "under": true}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "סבר עפ\"י האו\"ה שגם הפוך (אם אוכלים גבינה צריך להחליף מפה בשביל בשר. ולא להסתפק בהורדת שיורי הפת)"}, {"layer": "acharon", "src": "ערוך השולחן", "srcRef": null, "txt": "מצווה מן המובחר להחליף את כל מה שהיה על המפה בארוחה החלבית ולפרוס מפה אחרת ולחם אחר וכלים אחרים, ואז יאכל בשר. וכן המנהג פשוט ברוב תפוצות ישראל"}, {"subhead": "סכין (נדון בה בצ\"ו)"}, {"layer": "lead", "srcRef": null, "txt": "ועיקר הדברים:"}, {"layer": "gemara", "src": "חזקיה בשם אביי", "srcRef": null, "txt": "דגים שהיו בקערה של בשר מותר לאכול בכותח (משום שהווי נ\"ט הבא מן נ\"ט)\n\\ul{סכין שחתכו בה בשר}:\n   חתכו בה צנון - אסור לאכול בכותח (כי הוא חריף, לכן בולע את טעם הבשר מהסכין. והווי נ\"ט בכותח)\n   חתכו בה קישוא - יכול להוריד את החלק שחתך בו ולאכול עם הכותח (כי השמנוניות לא נבלעת. אבל בכל זאת הווי נ\"ט הבא מן הממש, לכן יש להוריד את החלק כדי שלא יפגוש את החלב)", "ref": {"label": "חולין · פרק כל הבשר · קיא ע\"ב", "ref": "Chullin.111b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מדובר בכלים שניקו. הפער בין סכין לקערה הוא בגלל שהשומן נשמר ונקרש על הסכין, והווי נ\"ט הבא מן הממש. ובקערה לא נקרש, ואין בה ממש של שומן. לכן יש בקערה רק טעם (ובכותח - נ\"ט בר נ\"ט)\nועוד, דברים חריפים כמו צנון בולעים יותר מדגים על אף שהם רותחים", "under": true}, {"layer": "lead", "srcRef": null, "txt": "אז נראה מההתיחסות לסכין בחולין, כי בשונה משאר הכלים (לפחות מקערה), סכין בד\"כ מלוכלת יותר והשומן נקרש עליה. לכן נתייחס אליה כנותנת טעם מן הממש (ומה שפוגש אותה - נ\"ט).\nכיצד ניתן לנקות סכין לגמרי כדי שלא תתן טעם כ\"כ? בעבודה זרה מצינו כך:"}, {"layer": "gemara", "src": "בעבודה זרה · רב עוקבא · רב כהנא · רב הונא", "srcRef": null, "txt": "במשנה דורשים לשפשף את הסכין על מנת לטהרה. **רב עוקבא** דורש אף לנעוץ הסכין עשר פעמים בקרקע ע\"מ לטהרה. **רב כהנא**: זה דווקא בסכין חלקה ושטוחה שאין בה גומות. **רב הונא בריה דרב יהושע**: זאת ע\"מ לאכול בה צונן. אבל ע\"מ לאכול/לחתוך בה חם - יש להגעיל."}, {"layer": "rishon", "src": "שו\"ת הרשב\"א (בשם הרמב\"ן), והביאו הב\"י", "srcRef": null, "txt": "אסור לחתוך גבינה (אפילו קרה) בסכין שחותכים בה בשר בד\"כ, וגם לא את הפת שיאכל עם הגבינה. ולגבי הצנון, אם הסכין נקיה ואין בה טעם בשר, וחתך בה הצנון – מותר לאכול את הצנון בכותח (ועל אף החריפות - הווי בר נ\"ט)"}, {"layer": "rishon", "src": "ובעל התרומה בשם ר\"ש", "srcRef": null, "txt": "התיר לחתוך את הלחם, ולדידו הווי רק נ\"ט בר נ\"ט כשיאכלו עם הגבינה, \\ul{כל עוד ינגבו היטב}.", "under": true}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "הביא דברי שו\"ת הרשב\"א, שאין לחתוך גבינה בסכין שחותכים בה בשר; וכן לגבי הלחם שיאכל איתה"}, {"layer": "rama", "src": "ורמ\"א", "srcRef": null, "txt": "הביא בשם א\"ח שכן הפוך (אסור לחתוך בשר בסכין שחותכים בה גבינה; ואת הלחם שלה). וכי ע\"י נעיצת הסכין בקרקע – מותר. אך סיים שנהגו ישראל שיהיה להם סכין לכל דבר – בשרי וחלבי"}, {"layer": "lead", "srcRef": null, "txt": "ונחלקו הפוסקים מה סבר הרמ\"א שנעיצת הסכין תתיר לחתוך:"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "לאחר נעיצתה מותר לחתוך את הלחם שיאכל עם הגבינה"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "אפילו את הגבינה עצמה מותר יהיה לחתוך. והוכיח מר\"ש שללחם סגי בקינוח. אבל סבר ממה שכתב הרמ\"א גבי מנהג ישראל להחזיק 2 סכינים - להחמיר ולא לחתוך גבינה אף בסכין שנעצה. מ\"מ, כן אפשר להסתפק בקינוח בשביל חיתוך הלחם.", "under": true}, {"layer": "acharon", "src": "המרהש\"ל", "srcRef": null, "txt": "נעיצת הסכין בקרקע לא מועילה אף לחיתוך הלחם שיאכל עם הגבינה.", "under": true}, {"layer": "acharon", "src": "וערוה\"ש", "srcRef": null, "txt": "ניגוב היטב/נעיצת בקרקע של סכין שחותכים בה בשר – מועיל רק ללחם, ולא לגבינה עצמה.", "under": true}, {"layer": "acharon", "src": "הפר\"ח", "srcRef": null, "txt": "הביא, שיש מדקדקים שמחזיקים אף סכין מיוחדת ללחם (פרווה). (וכמובן שמותר להשתמש בסכין של בשר לחתוך בה לחם ולאכול בו חלב עם הסכין נקייה כנ\"ל)"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "group", "title": "פ\"ח · בשר וגבינה על שולחן אחד", "spans": "סעיפים א׳-ב׳", "children": ["din", "motar", "hafrada"]}, {"type": "group", "title": "פ\"ט · שהייה והרחקות", "spans": "סעיפים א׳-ד׳", "children": ["chalav_basar", "basar_chalav", "tavshilim", "mapa"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"נ\"ט בר נ\"ט": "נותן טעם בר נותן טעם — טעם שעבר דרך כלי (ולא ישירות) ולכן נקלש; בהיתר מקילים בו.", "כותח": "מאכל חלבי — הדוגמה הקלאסית לאכילת מאכל 'בשרי' עם חלב.", "אכסנאים": "אורחים המתארחים יחד; אם זרים זה לזה — הותר להם להעלות בשר וחלב על שולחן אחד.", "תפיסה אחת": "קרבה בין הסועדים (שותפות/היכרות); בה נאסרה העלאת בשר וחלב יחד.", "סימן היכר": "דבר המפריד על השולחן (לחם/קנקן שאין אוכלים ממנו) — מתיר למכרים לאכול יחד.", "גזרה לגזרה": "גזירה שנועדה למנוע איסור שהוא עצמו כבר מדרבנן; נחלקו אם גוזרים כן.", "קינוח": "ניגוב הפה בפת וכד' לסילוק שיירי המאכל.", "הדחה": "שטיפת הפה במים/יין.", "מאב\"ד": "מאכל בן דרוסאי — כשליש/כחצי בישול.", "אפיקורין": "'בקינוח' — עוף וגבינה נאכלים בזה אחר זה בלא הקפדה."}, "subject": "איסור והיתר", "id": "harchakot", "recommendedOrder": 2}, {"topic": {"title": "בשר וחלב", "eyebrow": "מבחני הרבנות · איסור והיתר · סימן פ\"ז", "siman": "Shulchan_Arukh,_Yoreh_De'ah.87", "intro": {"lead": {"t": "", "ref": ""}, "body": ""}}, "sections": {"mavo": {"title": "מבוא — \"לא תבשל\"", "seif": "סעיף א׳", "sugya": null, "intro": "**\"לא תבשל גדי בחלב אמו\"**\nבפסוקים, כל האיסור הוא בבישול.\nהוא מופיע שלוש פעמים בתורה, וזה הביא את התנאים לדרוש דינים שונים על כך, הנוגעים במהות הציווי, ומרחיבים את האיסור.", "ops": [{"layer": "note", "src": "טעם אפשרי במו\"נ", "srcRef": null, "txt": "אין רחוק אצלי ש\\ul{יש בו ריח עבודה זרה}, אולי כך היו עושין בעבודה מעבודתיה או בחג מחגיהם, וממה שמחזק זה אצלי זכר התורה אותו שני פעמים, תחלת מה שצותה עליו עם מצות החג שלש פעמים בשנה יראה כל זכורך, כאלו אמר בעת חגיכם ובואכם לפני לא תבשל מה שתבשל שם על דרך פלוני כמו שהיו הם עושים, זהו הטעם החזק אצלי בענין, ואמנם לא ראיתי זה כתוב", "collapsed": true}, {"layer": "lead", "srcRef": null, "txt": "ראשית, **אונקלוס** תרגם: \"לא תיכלון בשר וחלב\"\nאכילה – דרך בישול – מהתורה\nלא דרך בישול – דרבנן (רשב\"א)\nבישול – דרבנן\nהנאה – דרבנן (רבי ישמעאל)"}, {"layer": "mishna", "src": "מכילתא דרבי ישמעאל", "srcRef": null, "txt": "לא תבשל גדי בחלב אמו.\n**רבי יאשיה** אומר: אחת ל**בהמה** ואחת ל**חיה** ואחת ל**עוף**.", "ref": {"label": "מכילתא דרבי ישמעאל · משפטים", "ref": ""}}, {"layer": "mishna", "src": "משנה חולין", "srcRef": null, "txt": "**ר' עקיבא**: להדגיש את הגדי **בניגוד** לעוף וחיה (והם מדרבנן)", "ref": {"label": "משנה · חולין · פרק כל הבשר", "ref": "Mishnah_Chullin.8.4"}}, {"layer": "gemara", "src": "בבלי חולין קטו (פ' כל הבשר)", "srcRef": null, "txt": "**דבי רבי ישמעאל**: \"לא תבשל..\" ג' פעמים: ראשון - **אכילה**, השני – **הנאה**, והשלישי - **בישול**\n~~ברייתא: לימוד על איסור בשר בחלב. הקבלה על קדושה בשני פסוקים המלמדים על טרפות בשר.~~", "ref": {"label": "חולין · פרק כל הבשר · קטו", "ref": "Chullin.115b"}}, {"layer": "rishon", "src": "רשב\"א (ת\"ה)", "srcRef": null, "txt": "... נאמר בתורה ג' פעמים. ומפי השמועה למדו שהאחד לאיסור אכילה, ואחד לאיסור הנאה, ואחד לאיסור בישול. ולמה הוציאו הכתוב בלשון בישול? לומר לך ש\\ul{שלא כדרך בישול אינו אסור מן התורה אלא מדברי סופרים}."}, {"layer": "shulchan", "src": "שו\"ע · (סע' א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.87.1", "txt": "ג' פעמים ד\"לא תבשל\" – בישול, אכילה והנאה (**דבי ר' ישמעאל בכל הבשר**)\nבישול האסור מן התורה – דרך בישול. לא דרך בישול – דרבנן (**רשב\"א**)\n(בשלב מסוים – כבר בגמרא - ישנה החלפה בין בישול לאכילה. דהיינו: אכילה – מהתורה, בישול - מדרבנן)"}, {"layer": "lead", "srcRef": null, "txt": "לסיכום:"}], "pesak": null}, "bishul_hanaa": {"title": "בישול והנאה", "seif": "סעיפים א׳, ג׳", "sugya": null, "intro": "למדנו שהאיסור של בשר בחלב מן התורה הוא רק באכילה ובדרך בישול, וחז\"ל למדו משילוש הפסוקים גם איסור בישול והנאה: מדרבנן.", "ops": [{"layer": "rishon", "src": "הרשב\"א (וטור, שו\"ע ס' א')", "srcRef": null, "txt": "ולפיכך, סבר **הרשב\"א** (וכן נקטו הטור והשו\"ע בס' א'), שכל שאסור מן התורה הוא רק \\ul{דרך בישול}, ואפילו הכנת מאכל שהיא בדרך אחרת אסורה רק מדרבנן (כגון מליחה וכבוש. ועל דרכי התקנת מאכל השונים ודיניהם נפרט לקמן)."}, {"layer": "lead", "srcRef": null, "txt": "כאן כי מותר שילוב של שני דרבנן: הבשר והפעולה. כגון: הנאה ובישול של בשר שאסור מדרבנן (חיה ועוף)"}, {"layer": "gemara", "src": "בבלי חולין (קיד)", "srcRef": null, "txt": "שבשר שאסור מדרבנן, מותר בבישול והנאה", "ref": {"label": "חולין · פרק כל הבשר · קיד", "ref": "Chullin.114a"}}, {"layer": "lead", "srcRef": null, "txt": "(עפ\"י המשנה) האיסור מהתורה - בטהורה (הבהמה+החלב).\n אבל שילוב של טמא+טהור - אסור מדרבנן.\nלכן **בישול** ו**הנאה** מותר בהם.\nוכן, בשר חיה ועוף עם חלב טהורה הוא מדרבנן ומותר בבישול והנאה (מוזר)."}, {"layer": "rishon", "src": "דרכ\"מ", "srcRef": null, "txt": "**מרדכי**: יש מקום להתיר בשר בחלב (במליחה וכבישה) בהנאה (כי הוא דרבנן)\n**מ\"מ**: יש אוסרין בשר עוף בחלב בהנאה אעפ\"י שהוא דרבנן\n**או\"ה הארוך**: כל דרבנן מותר בהנאה"}, {"layer": "lead", "srcRef": null, "txt": "(נראה שמקלים יותר בהנאה במקרים של איסור דרבנן. כי הנאה יותר דחוק)"}, {"layer": "acharon", "src": "מהר\"י וייל", "srcRef": null, "txt": "~~אוסר בהנאה גם מים ששטפו בהם כלי חלב ומים ששטפו בהם כלי בשר בהנאה (להשקות בהמה)~~"}, {"layer": "rama", "src": "רמ\"א סע' א'", "srcRef": null, "txt": "כתב עפ\"י האו\"ה הארוך והטור שכל בשר וחלב שאסור מדרבנן, מותר בהנאה"}, {"layer": "shulchan", "src": "שו\"ע ס' ג'", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.87.3", "txt": "מנסח בדומה לטור (בשר טהורה בחלב טמאה/בשר טמאה בחלב טהורה/בשר חיה ועוף מותר בהנאה)\n   ~~אולם, מלשונו משתמע שאולי סובר שאכילה של בשר טהורה בחלב טמאה/להפך אינה אסורה מדרבנן, אלא מדאורייתא. ורק בשר חיה ועוף הוא מדרבנן~~"}, {"layer": "acharon", "src": "ט\"ז (על הרמ\"א)", "srcRef": null, "txt": "**מהרש\"ל** חולק על זה וסובר שיש להחמיר בהנאה אף בדברים שאסורים בבשר וחלב מדרבנן.\nוהט\"ז סובר שאין הלכה כמותו."}], "pesak": null}, "hagdarat_bishul": {"title": "הגדרת 'בישול'", "seif": "סעיפים א׳, ח׳", "sugya": null, "ops": [{"subhead": "סדר בישול", "ref": {"label": "ידון בסימן צא · עיקר הדיון בצונן בצונן", "ref": ""}}, {"layer": "gemara", "src": "חולין קד", "srcRef": null, "txt": "מחלוקת רב ששת ואביי על כלי ראשון שלא על האש.\n**רב ששת**: אסור לערבב בשר בחלב רק בכלי שעל האש. בכלי שאינו על האש – מותר (צונן)\n**אביי**: אסור גם שלא על האש וגם בכלי שני שמא יעלהו על האש", "ref": {"label": "חולין · פרק כל הבשר · קד", "ref": "Chullin.104b"}}, {"layer": "zman", "src": "ילקוט יוסף", "srcRef": null, "txt": "נקטינן לחומרא כאביי"}, {"subhead": "טיגון"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "מטוגן = בישול"}, {"layer": "rishon", "src": "רש\"י תוס', מנוחת יעקב, ערוה\"ש", "srcRef": null, "txt": "לא בישול (ולכן יהיה מותר בהנאה)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "כדאי להיזהר בזה משום שאף אם מבשל לשם הנאה, נראה כבישול."}, {"subhead": "עירוי"}, {"layer": "acharon", "src": "פר\"ח", "srcRef": null, "txt": "נחשב בישול (דאורייתא)"}, {"subhead": "צלייה"}, {"layer": "acharon", "src": "פר\"ח", "srcRef": null, "txt": "נחשב בישול דאורייתא"}, {"layer": "acharon", "src": "רע\"א", "srcRef": null, "txt": "צלייה לא הווי בישול והוא \\ul{דרבנן} (ומותר בהנאה)"}, {"subhead": "מעושן ומבושל בחמי טבריה"}, {"layer": "gemara", "src": "ירושלמי נדרים", "srcRef": null, "txt": "לא איפשטא", "ref": {"label": "ירושלמי · נדרים", "ref": ""}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "דרבנן"}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "הביא את הרמב\"ם"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "סובר שמאחר ולא איפשטא בירושלמי גבי מעושן וחמי טבריה, ישן להחמיר דספק דאורייתא לחומרא"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": null, "txt": "המעושן והמבושל בחמי טבריא – אסור מדרבנן (ולא לוקים עליו)"}, {"subhead": "כבישה ומליחה"}, {"layer": "gemara", "src": "פסחים מד", "srcRef": null, "txt": "\\ul{טעם כעיקר} - בשר בחלב שונה משאר טעם כעיקר. אם משרים בשר בחלב – אפילו מקבל טעם, אינו אסור מהתורה. אלא רק אם בושל ממש. אבל אסור מדרבנן (כדאמר הרשב\"א לעיל).", "ref": {"label": "פסחים · מד", "ref": "Pesachim.44b"}}, {"layer": "shulchan", "src": "שו\"ע (קה)", "srcRef": null, "txt": "איסור שנכבש עם היתר מעת לעת נחשב מבושל ואסור כולו. ומסיים בדין הגמרא שבשר בחלב שאני ואפילו אם מקבל טעם – אינו אסור מן התורה אלא רק מדרבנן."}, {"subhead": "(סימן צ\"א)"}, {"layer": "rishon", "src": "מרדכי, אגור", "srcRef": null, "txt": "(ראינו למעלה): בשר בחלב הנאסר ע\"י כבישה/מליחה אסור מדרבנן באכילה; לכן בהנאה - מותר."}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "בשר ששהה בחלב יותר מיום – כבוש; אסור מדרבנן ('אי שרו כולי יומא' מותר – לפיכך יותר מיום אחד אסור)\nשייך גם לגבי צונן בצונן. ואפילו ללא חומץ"}, {"layer": "shulchan", "src": "שו\"ע (ח')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.87.8", "txt": "נקט עפ\"י דברי המרדכי. וכמו שהביא הדרכ\"מ באות א' אצלנו בסימן פ\"ז"}, {"subhead": "חם בחם (בלא רוטב)"}, {"layer": "acharon", "src": "פמ\"ג, מהרש\"ל", "srcRef": null, "txt": "לא נחשב דרך בישול ואסור מדרבנן (ומותר בהנאה)"}, {"subhead": "בישול אחר בישול"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "בשר וחלב שכבר בושלו יחד – מותר לבשל שוב. אין בא\"ב\nלא בושלו יחד, אלא כל אחד לחוד – אסור לבשלם שוב, ואסור אפילו בהנאה (כי נחשב בישול)"}, {"layer": "acharon", "src": "שו\"ת שבות יעקב", "srcRef": null, "txt": "אפילו בשר וחלב שבושלו כבר יחד - אסור מן התורה"}, {"layer": "acharon", "src": "פמ\"ג ש\"ד", "srcRef": null, "txt": "שו\"ת שער אפרים: יש בא\"ב (חמאה שהייתה בסיר בשר בן יומו ועשו ממנה נר. ואז בהדלקת הנר מתבשלים)"}], "pesak": null}, "basar_skira": {"title": "מ'גדי' לכלל הבשר", "seif": "סעיפים א׳-ג׳",
