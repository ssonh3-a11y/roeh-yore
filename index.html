<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מילה בשבת · סיכום אינטראקטיבי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Frank+Ruhl+Libre:wght@400;500;700;800&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#EBE6DB; --card:#F8F4EB; --card-2:#F2EDE1;
  --ink:#211C15; --ink-soft:#6B6153; --ink-faint:#9A9083;
  --rule:#D7CEBC; --line:#E2DACA;
  --pasuk:#8C6D2C; --mishna:#2F4C86; --gemara:#3E6BA6; --rishon:#4B7C6E;
  --shulchan:#211C15; --rama:#6A4A86; --acharon:#9A6A3A; --zman:#B0562E;
  --pesak:#8A2E3B; --gilt:#A9812F;
  --display:'Suez One','Frank Ruhl Libre',serif;
  --body:'Frank Ruhl Libre','Noto Serif Hebrew','Times New Roman',serif;
  --ui:'Heebo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{direction:rtl;background:var(--paper);color:var(--ink);
  font-family:var(--body);font-size:18px;line-height:1.72;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

header.top{border-bottom:1px solid var(--rule);background:linear-gradient(180deg,#F1ECE1,var(--paper))}
.eyebrow{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.14em;color:var(--ink-soft)}
h1.topic{font-family:var(--display);font-weight:400;font-size:clamp(34px,6vw,58px);margin:.18em 0 .1em;line-height:1.02}
.subtitle{font-family:var(--ui);color:var(--ink-soft);font-size:15px;margin:0 0 20px}
.header-inner{padding:26px 0 22px}

.grid{display:grid;grid-template-columns:250px 1fr;gap:34px;align-items:start;padding:30px 0 90px}
nav.rail{position:sticky;top:16px;font-family:var(--ui)}
.rail-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--ink-faint);margin:0 0 10px 4px}
.node{margin:1px 0}
.node .row{display:flex;align-items:stretch;gap:2px}
.node a.lbl{
  display:block;flex:1;text-decoration:none;color:var(--ink-soft);font-size:14.5px;
  padding:8px 12px;border-radius:8px;line-height:1.3;border:1px solid transparent;
  transition:background .15s,color .15s;cursor:pointer}
.node a.lbl:hover{background:var(--card-2);color:var(--ink)}
.node a.lbl.active{background:var(--card);color:var(--ink);border-color:var(--line);font-weight:600}
.node a.lbl .seif{color:var(--gilt);font-weight:700;font-size:12px;margin-inline-end:6px}
.node.group>.row>a.lbl{font-weight:600;color:var(--ink)}
.node a.lbl.accent{color:var(--pesak);font-weight:700}
.node a.lbl.accent:hover{background:#F4E9E6}
.node a.lbl.accent .accent-glyph{margin-inline-end:5px}
.caret{width:26px;border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:12px;
  border-radius:7px;display:flex;align-items:center;justify-content:center}
.caret:hover{background:var(--card-2);color:var(--ink)}
.children{margin-inline-start:14px;border-inline-start:1px solid var(--line);padding-inline-start:6px;
  overflow:hidden;transition:max-height .22s ease}
.children.collapsed{max-height:0!important}
.children a.lbl{font-size:13.5px;color:var(--ink-soft)}

main{min-width:0}

/* intro (collapsible) */
details.intro-strip{background:var(--card-2);border:1px solid var(--line);border-radius:11px;margin:0 0 20px}
details.intro-strip>summary{font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:.06em;
  color:var(--ink-soft);padding:11px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
details.intro-strip>summary::-webkit-details-marker{display:none}
details.intro-strip>summary::before{content:"▸";color:var(--gilt);transition:transform .15s}
details.intro-strip[open]>summary::before{transform:rotate(90deg)}
.intro-body{padding:2px 18px 16px;font-size:17px;color:#2c261d}
/* standalone intro page — on a distinct card, not the bare interface background */
.intro-full .intro-body{padding:20px 24px;background:linear-gradient(180deg,#f4efe4,#f1ebdd);
  border:1px solid var(--line);border-radius:13px;box-shadow:0 1px 0 #e6ddc9}
.intro-body .ib-p{margin:0 0 13px;text-align:justify}
.intro-body .ib-p:last-child{margin-bottom:0}
.intro-lead{font-family:var(--display);font-size:20px;color:var(--pasuk);margin:0 0 10px}
.intro-lead-line{margin:0 0 12px;color:#2c261d;text-align:justify}
.intro-lead-line .intro-quote{color:#4a4235}
sup.fn{color:var(--gilt);cursor:pointer;font-size:.7em;margin-inline-start:1px;font-weight:700;user-select:none}
sup.fn:hover{color:var(--pesak)}
.abbr{cursor:help}
.src-conn{font-weight:400;color:var(--ink-soft);font-size:.92em}
.src-ref{font-family:var(--ui);font-size:12.5px;font-weight:500;color:var(--ink-soft)}
.src-ref .srclink{color:var(--gemara);border-bottom-color:#c3b48f}

.sec-head{margin:0 0 4px}
.sec-kicker{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.1em;color:var(--gilt)}
h2.sec-title{font-family:var(--display);font-weight:400;font-size:clamp(26px,4vw,36px);margin:.1em 0 .3em;line-height:1.1}
.spanning{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);margin:-2px 0 10px}

.sugya{font-family:var(--ui);font-size:13.5px;color:var(--ink-soft);
  margin:2px 0 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sugya .pin{color:var(--gemara);font-weight:700}
.srclink{color:var(--gemara);font-weight:600;cursor:pointer;border-bottom:1px dashed #9db7d6}
.srclink:hover{border-bottom-style:solid}

.summary-card{background:linear-gradient(180deg,#f6efdf,#f1e8d3);border:1px solid #e2d3ad;border-radius:12px;padding:14px 18px;margin:10px 0 16px}
.summary-card .sum-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--gilt);margin-bottom:6px}
.summary-card .sum-txt{font-size:16.5px;line-height:1.72;color:#332b1c}
.summary-card .sum-txt b{font-weight:700;color:#1c1811}
.summary-card .sum-txt .term{border-bottom-color:var(--rishon)}
.sec-lead{font-family:var(--body);font-size:17.5px;line-height:1.72;color:#4a4235;border-inline-start:3px solid var(--gilt);background:transparent;padding:3px 15px;margin:8px 0 15px}
.sec-lead .lead-q{color:var(--ink);font-weight:700}
.sec-lead b{font-weight:700;color:#1c1811}
.sec-lead .term{border-bottom-color:var(--rishon)}

/* flowing reference text (no box) — for מושגים / קיצור וכד' */
.flow-block{margin:6px 0 20px}
.flow-block+.flow-block{margin-top:10px}
.flow-head{font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--gilt);
  margin:0 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.flow-body{white-space:pre-wrap;font-family:var(--body);font-size:16.5px;line-height:1.62;color:#2c261d}
.flow-body b{font-weight:700;color:#1c1811}
.t-alot{color:#B07D12;font-weight:700}    /* עלות / עמוד השחר */
.t-hanetz{color:#1C8A55;font-weight:700}   /* הנץ החמה */

/* in-page sub-heading divider (e.g. שעת הדחק, האיר פני המזרח) */
.op-subhead{margin:30px 0 10px;padding-top:16px;border-top:1px solid var(--rule);
  display:flex;align-items:baseline;gap:11px;flex-wrap:wrap}
.op-subhead .ost{font-family:var(--display);font-weight:400;font-size:21px;color:var(--ink);line-height:1.2}
.op-subhead-src{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft)}
.op-subhead-src .srclink{color:var(--gemara);font-weight:600}

.op{position:relative;background:var(--card);border:1px solid var(--line);
  border-right:4px solid var(--rule);border-radius:10px;padding:13px 18px 14px;margin:9px 0}
.op-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:3px}
.op-lbl::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.op .src{font-family:var(--ui);font-weight:700;font-size:14.5px;margin-bottom:2px}
.op .src .srclink{border-bottom:1px dashed #c3b48f}
.op .txt{margin-top:2px}
.op .txt b,.pesak b,.intro-body b{font-weight:700;color:#1c1811}

.L-pasuk{color:var(--pasuk)} .L-pasuk.op{border-right-color:var(--pasuk)}
.L-mishna{color:var(--mishna)} .L-mishna.op{border-right-color:var(--mishna)}
.L-gemara{color:var(--gemara)} .L-gemara.op{border-right-color:var(--gemara)}
.L-rishon{color:var(--rishon)} .L-rishon.op{border-right-color:var(--rishon)}
.L-acharon{color:var(--acharon)} .L-acharon.op{border-right-color:var(--acharon)}
.L-zman{color:var(--zman)} .L-zman.op{border-right-color:var(--zman)}
/* SA & RMA — the halachic spine, stronger */
.L-shulchan{color:var(--shulchan)}
.L-shulchan.op{border-right:6px solid var(--shulchan);background:#f3ebd8;box-shadow:0 1px 0 #e5dcc4}
.L-shulchan.op .src{font-size:15.5px}
.L-rama{color:var(--rama)}
.L-rama.op{border-right:6px solid var(--rama);background:#f0eaf4}
.L-rama.op .src{font-size:15.5px}

.op.under{margin-inline-start:26px;border-right-width:2px;background:color-mix(in srgb,var(--card) 55%,transparent);opacity:.94;position:relative}
.op.under::before{content:"↳";position:absolute;inset-inline-start:-20px;top:12px;color:var(--ink-faint);font-size:15px}
.op.op-collapsed{padding:0;background:var(--card-2)}
.op.op-collapsed>summary{cursor:pointer;list-style:none;padding:11px 18px;display:flex;align-items:center;gap:9px;font-family:var(--ui)}
.op.op-collapsed>summary::-webkit-details-marker{display:none}
.op.op-collapsed>summary::before{content:"▸";color:var(--ink-faint);font-size:12px;transition:transform .15s}
.op.op-collapsed[open]>summary::before{transform:rotate(90deg)}
.op.op-collapsed>summary .op-more{color:var(--ink-soft);font-family:var(--ui);font-size:13.5px;font-weight:600}
.op.op-collapsed>.src{padding:0 18px}
.op.op-collapsed>.txt{padding:2px 18px 14px}
.op.op-collapsed .op-lbl{margin-bottom:0}
.pesak{background:linear-gradient(180deg,#fbf4ee,#f7ece4);border:1px solid #e6cdbf;
  border-right:5px solid var(--pesak);border-radius:11px;padding:15px 20px;margin:16px 0 6px}
.pesak .plbl{font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);letter-spacing:.05em;
  display:flex;align-items:center;gap:7px;margin-bottom:4px}
.pesak .plbl .dia{color:var(--gilt)}
.pesak .txt{color:#2b211d;font-size:17.5px}

.term{color:inherit;border-bottom:1.5px dotted var(--rishon);cursor:help}
.dim{color:#8f8676}
/* preserved-layout table (author's comparison tables) */
.optable{margin:6px 0 2px;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-family:var(--body)}
.optable table{width:100%;border-collapse:collapse;direction:rtl}
.optable caption{caption-side:top;background:linear-gradient(180deg,#f4efe4,#f1ebdd);
  font-family:var(--ui);font-weight:700;font-size:14px;color:var(--ink);padding:9px 12px;border-bottom:1px solid var(--line)}
.optable th,.optable td{border:1px solid var(--line);padding:9px 12px;vertical-align:top;text-align:start;white-space:pre-wrap;font-size:15px;line-height:1.5}
.optable thead th{background:#efe7d6;font-family:var(--ui);font-weight:700;color:var(--ink);text-align:center}
.optable th.rowhead{background:#f3dfe0;font-weight:700;color:#7a2e34;font-family:var(--ui);text-align:center;width:26%}
.optable td b{color:#1c1811}
.secref{color:var(--pesak);border-bottom:1.5px dotted var(--pesak);cursor:pointer;font-weight:600;font-family:var(--ui);font-size:.92em}

/* popovers */
#pop{position:fixed;z-index:60;max-width:290px;background:var(--ink);color:#f3ede0;
  font-family:var(--ui);font-size:13.5px;line-height:1.55;padding:11px 14px;border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .12s}
#pop b{color:var(--gilt);display:block;margin-bottom:3px;font-size:13px}
#pop.on{opacity:1}
#src{position:fixed;z-index:61;width:330px;max-width:92vw;background:var(--card);color:var(--ink);
  border:1px solid var(--rule);border-radius:12px;box-shadow:0 14px 40px rgba(30,20,10,.25);
  padding:14px 16px 12px;display:none}
#src.on{display:block}
#src .sref{font-family:var(--ui);font-weight:700;font-size:13.5px;color:var(--gemara);margin-bottom:7px}
#src .stext{font-family:var(--body);font-size:16px;line-height:1.7;max-height:230px;overflow:auto;color:#2b241b}
#src .srow{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}
#src .open{font-family:var(--ui);font-weight:700;font-size:13px;text-decoration:none;color:#fff;
  background:var(--gemara);padding:7px 13px;border-radius:8px}
#src .close{font-family:var(--ui);font-size:12px;color:var(--ink-faint);background:none;border:none;cursor:pointer}

.ask{margin-top:38px;background:#1f2a24;color:#eef0ea;border-radius:16px;padding:22px 22px 20px;font-family:var(--ui)}
.ask h3{margin:0 0 3px;font-weight:700;font-size:18px}
.ask .hint{color:#a9b6ac;font-size:13.5px;margin:0 0 14px;line-height:1.5}
.ask .chips{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.ask .chip{background:#2b3a31;border:1px solid #3c4f43;color:#d7e0d6;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer}
.ask .chip:hover{background:#35473b}
.ask .row{display:flex;gap:9px}
.ask input{flex:1;background:#141b17;border:1px solid #37473d;color:#f2f4ef;border-radius:10px;
  padding:12px 14px;font-family:var(--ui);font-size:15px;direction:rtl}
.ask input:focus{outline:none;border-color:#5c7a67}
.ask button.send{background:var(--gilt);color:#20160a;border:none;border-radius:10px;padding:0 20px;
  font-family:var(--ui);font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap}
.ask button.send:disabled{opacity:.55;cursor:default}
.answer{margin-top:15px;background:#182019;border:1px solid #2e3d33;border-radius:11px;padding:15px 17px;
  font-size:15.5px;line-height:1.75;color:#e8ece6;white-space:pre-wrap;font-family:var(--body);display:none}
.answer.on{display:block}
.answer .secref{color:#e9b45a;border-bottom-color:#e9b45a}
.answer .note{font-family:var(--ui);font-size:12px;color:#8fa093;margin-top:11px;border-top:1px solid #2e3d33;padding-top:9px;white-space:normal}
.spin{display:inline-block;width:15px;height:15px;border:2px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-inline-start:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* flashcards */
.fc-sub{font-family:var(--ui);color:var(--ink-soft);font-size:14.5px;margin:0 0 16px}
.fc-filters{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:var(--ui);font-size:14px;margin-bottom:18px}
.fc-filters label{color:var(--ink-soft);font-weight:600}
.fc-filters select{font-family:var(--ui);font-size:14px;padding:6px 10px;border:1px solid var(--rule);border-radius:8px;background:var(--card);color:var(--ink);margin-inline-start:6px}
.fc-types{display:flex;gap:7px;flex-wrap:wrap}
.fc-t{font-family:var(--ui);font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--rule);background:var(--card);color:var(--ink-soft);cursor:pointer}
.fc-t.on{background:var(--ink);color:#f3ede0;border-color:var(--ink)}
.fc-start{margin-inline-start:auto;font-family:var(--ui);font-weight:700;font-size:14px;background:var(--gilt);color:#20160a;border:none;border-radius:9px;padding:9px 16px;cursor:pointer}
.fc-progress{display:flex;align-items:center;gap:12px;font-family:var(--ui);font-size:13px;color:var(--ink-soft);margin-bottom:12px}
.fc-bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.fc-bar i{display:block;height:100%;background:var(--gilt);transition:width .25s}
.fc-card{background:var(--card);border:1px solid var(--rule);border-radius:16px;min-height:210px;padding:26px 26px 30px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;cursor:pointer;box-shadow:0 4px 18px rgba(40,30,15,.06)}
.fc-card.flip{cursor:default;background:#f6f1e6}
.fc-tag{position:absolute;top:12px;inset-inline-end:14px;font-family:var(--ui);font-size:11px;font-weight:700;color:var(--gilt);letter-spacing:.05em}
.fc-face{max-width:620px}
.fc-q{font-family:var(--display);font-size:23px;line-height:1.35;color:var(--ink)}
.fc-a{font-family:var(--body);font-size:18px;line-height:1.7;color:#2b241b;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
.fc-a b{font-weight:700;color:#1c1811}
.fc-hint{font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);margin-top:18px}
.fc-jump{display:inline-block;margin-top:12px;font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);cursor:pointer;border-bottom:1.5px dotted var(--pesak)}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fc-controls button{font-family:var(--ui);font-weight:700;font-size:15px;border:none;border-radius:10px;padding:11px 22px;cursor:pointer}
.fc-flip{background:var(--ink);color:#f3ede0}
.fc-yes{background:#3f7d5f;color:#fff}
.fc-no{background:#a24b4b;color:#fff}
.fc-end{text-align:center;padding:34px;background:var(--card);border:1px solid var(--rule);border-radius:16px}
.fc-score{font-family:var(--display);font-size:28px;color:var(--ink);margin-bottom:16px}
.fc-perfect{color:var(--gilt);font-family:var(--ui);font-weight:700;margin-bottom:16px}
.fc-again,.fc-restart{font-family:var(--ui);font-weight:700;font-size:14px;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;margin:0 5px}
.fc-again{background:var(--gilt);color:#20160a}
.fc-restart{background:var(--card-2);color:var(--ink);border:1px solid var(--rule)}
.fc-empty{padding:20px;color:var(--ink-soft);font-family:var(--ui)}

footer{border-top:1px solid var(--rule);font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);padding:18px 0 40px;text-align:center}

.home-link{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--ink-soft);text-decoration:none;display:inline-block;margin-bottom:10px;border:1px solid var(--rule);border-radius:8px;padding:5px 12px;background:var(--card)}
.home-link:hover{background:var(--card-2);color:var(--ink)}
.grid.home{grid-template-columns:1fr}
.grid.home nav.rail{display:none}
.subjects{padding:8px 0 44px;display:flex;flex-direction:column;gap:16px}
.subject-head{width:100%;display:flex;align-items:center;gap:12px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:13px 18px;cursor:pointer;font-family:var(--display);font-size:23px;color:var(--ink);text-align:start}
.subject-head:hover{background:#efe9dc}
.sh-caret{color:var(--gilt);font-size:15px;transition:transform .15s}
.subject-group.collapsed .sh-caret{transform:rotate(-90deg)}
.sh-title{flex:1}
.sh-count{font-family:var(--ui);font-size:12.5px;font-weight:600;color:var(--ink-faint)}
.subject-topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:14px 4px 2px}
.subject-group.collapsed .subject-topics{display:none}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:8px 0 40px}
.topic-card{display:block;text-decoration:none;background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:20px 22px;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 10px rgba(40,30,15,.05)}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(40,30,15,.1);border-color:var(--gilt)}

<script id="content" type="application/json">{"title": "רואה יורה", "subtitle": "סיכומי הלכה אינטראקטיביים · מבחני הרבנות", "topics": [{"topic": {"title": "זמן תפילת שחרית", "eyebrow": "מבחני הרבנות · תפילה · אורח חיים סימן פ״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.89", "intro": {"lead": {"t": "'זמן תפילת השחר — משיעלה עמוד השחר, ומצותה עם הנץ החמה'", "ref": ""}, "body": "סימן פ״ט עוסק בשני עניינים: זמן תפילת שחרית — מאימתי ועד מתי — והדברים שאין לעשותם קודם התפילה.\nתחילה מתבארים המושגים והזמנים (שעות זמניות, עלות השחר, הנץ החמה וכו׳); לאחריהם נידונים זמני התפילה עצמם, ולבסוף הדברים שאסור לעשותם לפניה."}}, "sections": {"musagim": {"title": "ביאור מושגים", "seif": null, "sugya": null, "flow": [{"head": "חלוקת התוכן", "body": "בב״י (א׳) שני דיונים הלכתיים:\n   א.  זמן תפילה המוקדם — עמוד השחר או הנץ החמה?\n   ב.  זמן התפילה המאוחר — המוקד בשאלת שכר תפילה בזמנה."}, {"head": "מושגים מקדימים", "body": "**חלוקת היום ו׳שעות זמניות׳:**\nאנו עובדים עם ׳שעות זמניות׳. בשונה מהחלוקה שרגילים בה העולם, בה מחלקים את כל היממה ל־24 שעות, בשעות זמניות אנו מחלקים רק את היום (בלי הלילה), ול־12 חלקים.\nאין החלוקה של יום ולילה שווה. כלומר, היום אינו 12 שעות רגילות, ואין חפיפה בין שעה זמנית לשעה רגילה. אנו מגדירים ׳יום׳ עפ״י זמני האור, ולכן, היחס בין יום ללילה יישתנה בין חורף לקיץ:\n   בקיץ  - היום יותר ארוך מהלילה.\n   בחורף – היום יותר קצר מהלילה.\nובהתאמה:  בקיץ  - שעה זמנית > שעת 60 דקות\n               בחורף - שעה זמנית < שעת 60 דקות\nיש מחלוקת מה בדיוק ההגדרה של יום; מתי היום מתחיל ומתי מסתיים (דהיינו, איזה טווח זמן אנו מחלקים ל־12):\n   גר״א:  תחילת היום – הנץ החמה\n              סוף היום – שקיעה\n   מג״א:  תחילת היום – עלות השחר\n              סוף היום – צאת הכוכבים\nכלומר, למג״א היום ארוך יותר, וכך גם כל שעה זמנית.\n\n**זמני היום הרלוונטיים עפ״י סדר:**\nעלות השחר  ←  הנץ החמה (זריחה)  ←  שליש היום (4 שעות זמנ׳)  ←  חצות היום  ←  צאת הכוכבים\n   שליש היום = סוף זמן תפילה  ·  חצות היום = סוף זמן תפילה בדיעבד\nעמוד השחר – התבהרות השמיים. ׳האיר פני המזרח׳ (מ״ב מדקדק בזה)\nהנץ החמה – עליית קרני השמש"}]}, "tehila": {"title": "תחילת זמן שחרית", "seif": "סעיף א׳,ח׳", "sugya": {"label": "ברכות · פרק תפלת השחר · כו.", "ref": "Berakhot.26a"}, "summary": "תחילת זמן תפילת שחרית מתברר לנו דווקא מהדיון ב**משנה** על סופה. יתרה מכך, **הגמרא** מתעמתת עם **ברייתא** שלפיה אין בכלל מושגים של תחילה וסוף, אלא 'מצוותה עם הנץ החמה'. הגמרא משייכת את הזמן המוקדם יותר — 'עם הנץ החמה' — לוותיקין, ואת הזמן של ר' יהודה וחכמים למאחרים, ובכך מייצרת טווח זמן שיש בו תחילה וסוף, ולא שעה ספציפית.\nגם לאחר שלקחה הגמרא את 'מצוותה עם הנץ החמה' והפכה אותה ל'תחילת זמן תפילה', **הראשונים** (רא\"ש, תוס', רמב\"ם) מזכירים כי בכלל תפילות כנגד קורבנות. לכן תחילת זמן התפילה כתחילת זמן קרבן התמיד — משיעלה עמוד השחר!\nלכן, בעקבות הברייתא של 'מצוותה עם הנץ החמה', מייצרים הראשונים מדרג כזה: לכתחילה, ראוי להתייחס להנץ החמה כתחילת זמן תפילה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. וכן פוסק **הש\"ע**.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מחלוקת **חכמים** ו**רבי יהודה** גבי זמן תפילת שחרית:\nחכמים: עד חצות\nרבי יהודה: עד 4 שעות"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**ורמינהו**: מצוותה (של ק\"ש) עם הנץ החמה (ותו לא. כדי שיסמוך גאולה לתפלה).\nכלומר: מכך שכדי לסמוך ק\"ש לתפילה צריך לקרוא ק\"ש בהנץ החמה — גם תפלה בהנץ החמה! אז איך חכמים ורבי יהודה מדברים על 'עד חצות' ו'4 שעות'?\n**תירוץ**: הברייתא מדברת לותיקין (**רש\"י**: המקדימים למצוות ומחזרים לעשותן בזמנן). ובמשנה — ה'עד חצות' של חכמים וה־4 שעות של רבי יהודה למאחרים.\n(כלומר, כל הסיבה שהראשונים הולכים להסתבך עם לכתחילה־בדיעבד ולתעדף את הנץ החמה על אף שכבר בעמוד השחר מתחיל זמן שחרית — זה בעקבות הברייתא על ק\"ש.)\n**מסיקים**: הלכה כרבי יהודה (כי במשנה בעדויות כוותיה).\nלכן: למאחרים — סוף זמן תפלה סוף 4 שעות זמניות מתחילת היום; למקדימים — מתפללים עם הנץ החמה."}, {"layer": "rishon", "src": "רא\"ש · רמב\"ם · תוס'", "srcRef": null, "txt": "תחילת זמן שחרית — משיעלה עמוד השחר (כזמן קרבן התמיד).\nעיקר מצוות שחרית — עם הנץ החמה (כברייתא).\nבדיעבד אם התפלל — משיעלה עמוד השחר."}, {"layer": "gemara", "src": "ריו\"ח", "srcRef": null, "txt": "הנץ החמה — מצווה מן המובחר.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "זמן 'מצוותה' של תפלת שחרית מתחיל עם הנץ החמה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. (**רא\"ש, רמב\"ם, תוס'**)"}, {"subhead": "'האיר פני המזרח'"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מ\"ב**: 'האיר פני המזרח' = כל המזרח, ולא רק נקודה.\n**רע\"א**: אפילו אם יש עוד כוכבים בשמיים — העיקר שיאיר פני המזרח.\n**מג\"א**: יוצא בדיעבד אפילו אם לא 'האיר פני המזרח', כל שעלה עמוד השחר.\n**מ\"ב ואחרונים**: אם לא האיר פני המזרח — לא יוצא."}, {"subhead": "זמנים מיוחדים"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מהרש\"ל**: בימי הסליחות ראוי להיזהר מלהקדים ולהתפלל לפני הנץ החמה.\n**מג\"א**: אולי סמכו על זה שיש טורח לציבור ללכת אחר הסליחות הביתה ולבוא שוב לשחרית.\n**פמ\"ג**: בשבועות — אחרי שערים כל הלילה — מותר להתפלל קודם הנץ (טורח הציבור ללכת ולחזור)."}, {"subhead": "שעת הדחק (ס׳ ח׳)", "src": "ברכות · ל.", "srcRef": "Berakhot.30a"}, {"layer": "lead", "srcRef": null, "txt": "בשעת הדחק, אפילו לכתחילה אפשר להתפלל קודם הנץ החמה. אבל לק\"ש מחכים ל'משיכיר' (סי' נח).\nכלומר, יש כאן שתי משוואות:\nכוונה > עיקר זמן תפלה (הנץ החמה)\nכוונה > סמיכת גאולה לתפילה"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "**ת\"ק**: מי שהשכים לצאת לדרך לפני הנץ החמה — מתפלל, ואח\"כ משלים ק\"ש בזמן ('משיכיר').\n**ר' שמעון בן אלעזר**: לא יתפלל לפני זמן ק\"ש. ממילא צריך לסמוך גאולה לתפילה.\n**אבוה דשמואל ולוי**: נהגו כת\"ק — יצאו מוקדם לדרך, והקדימו והתפללו לפני הנץ החמה, ואח\"כ קראו ק\"ש בזמנה."}, {"layer": "gemara", "src": "שורש המחלוקת", "srcRef": null, "txt": "**לת\"ק** — יותר חשוב תפילה בכוונה (בדרך לא יוכלו לכוון, לכן מתיר להתפלל לפני היציאה).\n**לר' שמעון ב\"א** — יותר חשוב סמיכת גאולה לתפילה.", "under": true}, {"layer": "rishon", "src": "ר\"ח · רא\"ש · רב האי גאון", "srcRef": null, "txt": "כת\"ק, אבוה דשמואל ולוי."}, {"layer": "rishon", "src": "בה\"ג · תוספות", "srcRef": null, "txt": "כר' שמעון בן אלעזר.", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אם מדובר בדרך שממש לא יכול לכוון בה — הרי שגם ק\"ש יכול להקדים!\nההיתר של הברייתא מדבר בדרך בה יכול לכוון לפחות בפס' ראשון ק\"ש, אבל לא בעמידה.\n(וכך פוסקים בסי' נח)", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ח׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.8", "txt": "בשעת הדחק, כגון מי שהשכים לצאת לדרך — מותר להתפלל עמידה כבר משעלה עמוד השחר.\nאבל בלי ק\"ש, וישלים אח\"כ ק\"ש בזמנה ('משיכיר').\nולמרות שלא סומך גאולה לתפלה — עדיף שיכוון בתפילה בביתו משיסמוך. (**ת\"ק, ר\"ח, רא\"ש, רב האי גאון**)"}, {"layer": "acharon", "src": "מג\"א · ערוה\"ש", "srcRef": null, "txt": "העולם לא נוהגים כן — הם מתפללים בדרך בהנץ החמה. אולי כי היום א\"א לכוון כ\"כ."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "שאפשר להתפלל כבר מעמוד השחר = משהאיר המזרח.", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם יהיה אנוס כך שלא יכול לכוון אפילו בפס' ראשון של ק\"ש — יגיד גם ק\"ש בע\"ה. (**רשב\"א**)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם האיר המזרח — נוטה יותר להגיד גם ק\"ש לפני זמנה, מאשר לפצל (נ\"ל שאפילו אם יוכל לכוון בפס' ראשון בדרך).", "under": true}, {"subhead": "מהי 'שעת הדחק'?"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**בברייתא** — מדובר על 'המשכים לצאת לדרך'.\n**טור**: מי שהוא אנוס.\n**ש\"ע**: שעת הדחק, כגון שצריך להשכים לדרך. (**מ\"ב**: והולך עם שיירה שלא ממתינה לו)\n**מ\"ב** (וכן משמע בסוגיה, ראשונים וב\"י): כל סיטואציה בה לא יכול לכוון בתפילתו.\n**ערוה\"ש**: מי שאינו יכול להתעכב ומוכרח לצאת לפני הנץ החמה. (פשיטא שגם בנסיעה, ולאו דווקא הליכה)"}, {"subhead": "מי שכבר בדרך"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מג\"א**: לפי מה שאנחנו מעדיפים כוונה על סמיכת גאולה לתפילה — מי שנמצא בדרך ועדיין לא התפלל, עדיף שיפצל ויגיד ק\"ש כשיכול (אף בלא תפילין), אבל יתפלל ש\"ע רק כשיוכל לכוון.\n**פמ\"ג**: אך אם רואה שיעבור זמן תפילה לכתחילה (4 שעות) — יתפלל בדרך (על אף שיתקשה לכוון)."}], "pesak": null}, "sof": {"title": "סוף זמן שחרית", "seif": "סעיף א׳", "sugya": {"label": "ברכות · פרק תפלת השחר · כו.", "ref": "Berakhot.26a"}, "ops": [{"layer": "gemara", "src": "משנה · גמרא", "srcRef": null, "txt": "חכמים: עד חצות; רבי יהודה: עד 4 שעות. ומסיקים: הלכה כרבי יהודה."}, {"layer": "shulchan", "src": "שולחן ערוך (לכתחילה) · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "סוף זמן שחרית — סוף 4 שעות, שהוא שליש היום (כרבי יהודה)."}, {"layer": "rishon", "src": "רבנו ירוחם", "srcRef": null, "txt": "לא התפלל עד 4 שעות והתפלל עד חצות — יצא ידי חובת תפילה, אך לא ידי 'תפילה בזמנה'."}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "'בדיעבד' — אף אם הזיד, לא רק נאנס או טעה.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך (בדיעבד) · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "התפלל אחר 4 שעות אך עד חצות — יצא (שכר תפילה, לא בזמנה), בין במזיד בין בשוגג (רבנו ירוחם, ב״י)."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "אחר חצות היום — אסור להתפלל שחרית."}, {"layer": "acharon", "src": "פמ״ג · פר״ח · ט״ז", "srcRef": null, "txt": "בין 4 שעות לחצות — פמ״ג: מותר לכתחילה. פר״ח: רק בדיעבד. ט״ז: אף בין 4 שעות למנחה יוצא, ואף לכתחילה (חולק על הרמ״א).", "under": true, "collapsed": true}], "pesak": "לכתחילה עד סוף 4 שעות; בדיעבד עד חצות (יצא, אך לא בזמנה); אחר חצות — אסור (רמ״א).", "summary": "לכתחילה סוף זמן שחרית — סוף 4 שעות זמניות (שליש היום, כרבי יהודה, שהלכה כמותו). בדיעבד — אם התפלל עד חצות יצא ידי 'תפילה', אך לא 'תפילה בזמנה'. ונחלקו האם בין 4 שעות לחצות מותר להתפלל אף לכתחילה."}, "kitzur": {"title": "קיצור הלכה", "seif": null, "sugya": null, "navAccent": true, "flow": [{"body": "**תחילת זמן תפילת שחרית:**\n   ׳מצוותה׳ (לכתחילה)   –  עם הנץ החמה (זריחה)\n   בדיעבד / שעת דחק     –  משעלה עמוד השחר\n\n**סוף זמן תפילת שחרית:**\n   לכתחילה  –  עד סוף 4 שעות (שליש היום)   (שכר תפילה בזמנה)\n   בדיעבד   –  עד חצות היום   (שכר תפילה)\n      פר״ח:         בדיעבד = התפלל כבר, במזיד או בשוגג.\n      פמ״ג, ט״ז:  בדיעבד = אפילו לא התפלל; יכול להתפלל לכתחילה."}]}, "yesodot": {"title": "עשיית דברים קודם התפילה — שני יסודות", "seif": null, "sugya": null, "summary": "הערה על עשיית צרכים ושאילת שלום:\nעל אף כי שני העניינים דומים ועיקרם בעשיית מעשה קודם התפילה, נראה כי מקורם שונה וכן, מהותם.\nבשיעור, עמדנו על כך (דרך הראשונים) ש'איסור' אמירת שלום לחברו קודם התפילה יסודו בביכור והעדפה של ישות אחרת על פני הקב\"ה. היינו: ע\"ז. במות.\nלעומת זאת, מובן (מסוים, של חלק מן הראשונים) העיסוק בחפצי האדם קודם התפילה – הוא בחשש שכחת התפילה (מפני הטרדה בעיסוק).\nאך אצל הרמב\"ם מובן שונה עולה. לפיו, העיסוק בחפצים הוא דין בהכנה לתפילה. היינו, העיסוק בחפצים מעמיס על האדם טרדות שיקלקלו את איכותה של תפילתו.", "ops": [], "pesak": null}, "shlom": {"title": "שאילת שלום", "seif": "סעיף ב׳", "sugya": {"label": "ברכות · פרק היה קורא · יד.", "ref": "Berakhot.14a"}, "ops": [{"layer": "gemara", "src": "רב · רב ששת · רבי אבא", "srcRef": null, "txt": "רב: האומר שלום לחברו קודם התפילה — כאילו עשאו במה. רב ששת הקשה מק״ש (שמותר לשאול בשלום מפני הכבוד). רבי אבא העמיד: רב אוסר רק 'במשכים לפתחו'; נתקל בדרך — מותר."}, {"layer": "rishon", "src": "רבני פרובינציא", "srcRef": null, "txt": "אף במשכים לפתחו — אסור רק 'שלום' (ששמו של הקב״ה שלום); 'צפרא דמרי טב' מותר.", "under": true}, {"layer": "rishon", "src": "תלמידי ר׳ יונה", "srcRef": null, "txt": "ההולך להקביל פני חברו — אף 'צפרא דמרי טב' אסור.", "under": true}, {"layer": "rishon", "src": "רשב״א", "srcRef": null, "txt": "אף אם נתקל — ישנה ויאמר 'צפרא דמרי טב' (שיזכור שהתפילה בראש מעייניו).", "under": true}, {"layer": "rishon", "src": "ר׳ ירוחם · אורחות חיים", "srcRef": null, "txt": "ר׳ ירוחם: במשכים לפתחו אסור רק לכרוע; שלום מותר; נתקל — הכול מותר. אורחות חיים: אסור רק כריעה; שלום מותר בכל לשון; ואם אמר ברכות ק״ש — אף כריעה.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ב׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.2", "txt": "משהגיע זמן תפילה — אסור לה
