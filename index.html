לגמרי - אנוס: היה צריך להתפלל, לא היה יכול להתפלל בגלל זמן, נסיעה, חולי, שכרות וכו'. פטור: לא היה צריך להתפלל מעיקרא.\nדוג': אונס - שיכור, חולה, העוסק בצרכי ציבור וכד', הטרוד אצל פקיד מחמת החוב (למרות שזה ממון)"}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אם לא התפלל כי לא יכל לכוון, למרות שלא עשה נכון - יכול להשלים בתשלומים. חשב שמותר. (דומיא דסי' צח סע' ב'. שם נקטינן שלא ייתפלל כשלא יכול לכוון, אבל גם עפ\"י המהרמ\"מ – שאין מקפידים בזה כבר)"}, {"subhead": "הדיון בב\"י-ש\"ע (ח')"}, {"layer": "rishon", "src": "נמוק\"י עפ\"י רמ\"ה", "srcRef": null, "txt": "מי שהתעסק בדבר וסבר שיסיימו לפני זמן התפילה, אך בסוף עבר הזמן - חשיב שוגג"}, {"layer": "rishon", "src": "דוחה", "srcRef": null, "txt": "בתפילה חיישינן יותר מנזיקין. חשיב מזיד.", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "נוקט כהו\"א של הנמוק\"י - כל עוד \\ul{פספס כי היה עסוק וטרוד - חשיב שוגג}. פספס כי \\ul{היה בשאט נפש ולא טרוד – חשיב מזיד}", "under": true}, {"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "הטרוד אצל פקיד מחמת חוב – שוגג ('המבטל מצווה לצורך ממונו - אונס')"}, {"layer": "acharon", "src": "דרכ\"מ", "srcRef": null, "txt": "משמע מתרוה\"ד - דווקא בדיעבד", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "מי שהיה טרוד וע\"י כך לא התפלל – יש לה תשלומין"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ח')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.8", "txt": "אנוס: + מי שהתעסק בדבר וחשב שיהיה לו זמן להתפלל אח\"כ (ובסוף לא התפלל) (נימוק\"י עפ\"י רמ\"ה)\n+ מי שהיה טרוד בענייני הפסד ממון\n+ שיכור (סמ\"ק בסימן צט)"}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אפילו אם התעסק בדברים שמזהירים שלא לעשות בער\"ש לפני המנחה – חשיב שוגג. כי הרי סוף סוף \\ul{לא בטל בשאט נפש, אלא רצה להתפלל אח\"כ}.\nשיכור שוגג רק אם \\ul{שתה קודם זמן התפילה} או \\ul{סבר שיש שהות וייתפקח עד סוף הזמן} (צט)"}], "pesak": null}, "hatzmada": {"title": "עת ההשלמה (בהצמדה)", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אי אפשר להשלים תפילה אלא בהצמדה לתפילה אחרת\n   לשון אחר: דווקא בזמן התפילה הנוכחית אפשר לפלל שתיים. כי הרי כל מה שקורה פה הוא שאני מתפלל למשל מנחה שתיים, ולא מנחה ואיתה משלים שחרית; כלשון ר' יוחנן: טעה ולא התפלל X – מתפלל ב-Y שתיים. לכן – אי אפשר פשוט להשלים באמצע החיים."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.3", "txt": "פוסק כן להלכה (רק בזמן שמתפלל יכול להשלים)"}, {"layer": "acharon", "src": "אחרונים (פמ\"ג ועוד)", "srcRef": null, "txt": "מבינים שאולי הרשב\"א מיירי בזמן תפילה, דהיינו, שאפשר להשלים רק בזמן תפילה ההלכתי (אבל לא שחייב בעת התפילה שמתפלל ממש). ועיין עוד בחיי אדם כלל כז ונשמת אדם שם", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "לכתחילה, אם לא השלים בהצמדה – ייתפלל בהתניה: אם מותר לא בהצמדה – זו תשלומין; אם אסור לא בהצמדה – זו נדבה"}], "pesak": null}, "smucha": {"title": "תשלומים רק בתפילה הסמוכה, ותשלומים רבים", "seif": "סעיפים ד׳-ה׳", "sugya": null, "ops": [{"layer": "rishon", "src": "בה\"ג", "srcRef": null, "txt": "טעה ולא התפלל ערבית ושחרית – מתפלל במנחה שלוש\n(שמעינן מכאן שני דינים: 1  אם לא עשיתי תשלומין לתפילה א' בתפילה ב' – יכול להשלים גם בתפילה ג'. 2  אם פספסתי כמה תפילות – אפשר לעשות כמה תשלומין בבת אחת)"}, {"layer": "rishon", "src": "ר' יונה בשם י\"א, רשב\"א", "srcRef": null, "txt": "אפשר להשלים תפילות הרבה (מי שמשתחרר מבית האסורים – ישלים כל התפילות שהפסיד)\\note{עיין בהערה. בהגהות והערות שם. רשב\"א בעצם מסכים בפירוש רק אם 1, אבל הב\"י מסיק ממנו גם את 2}"}, {"layer": "rishon", "src": "רמב\"ם, רשב\"ם", "srcRef": null, "txt": "אין תשלומים אלא לתפילה הסמוכה (חולקים על 1, ומתוך כך גם על 2)", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ד')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.4", "txt": "אם פספס שתי תפילות – לא יכול להשלים את שתיהן. רק את האחרונה שפספס (רמב\"ם, רשב\"ם)"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "גם אם פספסתי את שחרית ואת מנחה לא פספסתי - לא יכול להשלים שחרית בערבית. השלמה – רק בתפילה הסמוכה", "under": true}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אם פספס בשבת שחרית – יכול להשלים אותה במנחה, למרות מוסף שבאמצע (כי גם ככה אי אפשר להשלים בה)", "under": true}, {"layer": "lead", "srcRef": null, "txt": "אז מה יעשה מי שפספס את הסמוכה?"}, {"layer": "rishon", "src": "ר' יונה", "srcRef": null, "txt": "אם רוצה - ייתפלל בתורת נדבה. וטוב לעשות כן."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.5", "txt": "פוסק כן (נזכור שתנאי נדבה: חידוש + יכול לכוון בכולה)"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "לכן, היוצא מבית האסורים או חולה שהבריא - ראוי שיתפלל כל התפילות שהפסיד בנדבה"}], "pesak": null}, "mezid": {"title": "אם פספס תפילה במזיד", "seif": "סעיפים ז׳-ח׳", "sugya": null, "intro": "בסוגיה דידן פשוט שתשלומים הם רק בפספס בשוגג/אונס; ובמזיד אמרינן ד'מעוות לא יכול לתקון' (כלומר, אי אפשר להתפלל מתי שבא לך; על אף שיש מובן שבו תפילה רחמי). ומה יעשה המזיד?", "ops": [{"layer": "lead", "srcRef": null, "txt": "הרא\"ש מביא בשם גאון את ה'מסלול' השני של תפילה שלא במועד – נדבה. אלא שהב\"י מציע כאן מבצע מיוחד בהתחשבות בנסיבות: על אף שבדיני נדבה פסק שאין להתפלל תפילת נדבה בלי שיחדש בה איזה דבר, כאן מציע למי שהפסיד תפילה במזיד, שייתפלל נדבה בלי שיחדש בה דבר. מבצע זה תקף רק לתפילה הסמוכה.\nטעם הב\"י: אם היה מפספס בשוגג, היה צריך להשלים תשלומין בתפילה הסמוכה. אז למרות שהזיד ומתפלל בתורת נדבה-רשות, הרי שנמצא באותה משבצת (בתפילה הסמוכה). ולא סתם מתפלל נדבה באיזה זמן אקראי."}, {"layer": "rishon", "src": "הרא\"ש בשם גאון", "srcRef": null, "txt": "פספס תפילה במזיד - לא יוכל לתקון.\n   אך אם רוצה - יכול להתפלל \\ul{בסמוכה לה נדבה, ובלי שיחדש בה דבר} (בשכר רחמי בעלמא).\n   (אבל אם לא מתפלל בסמוכה – צריך חידוש, ככל נדבה)"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ז')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.7", "txt": "פספס תפילה במזיד – יכול בתפילה הסמוכה להתפלל נדבה, בלי חידוש."}, {"layer": "acharon", "src": "ב\"ח, גר\"א", "srcRef": null, "txt": "צריך לחדש", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "על פניו היה צריך לחדש בתפילתו בנדבה, אבל הוא מתפלל אותה נדבה רק בגלל שהוא הזיד, ואם לא היה מזיד אלא שוגג היה יכול להתפלל תשלומים. ועצם העובדה שהוא בכל זאת רוצה להשלים הופכת את המזיד שלו לשגגה, ולכן לא צריך לחדש\n('גדולה תשובה שזדונות נהפכות לו לשגגות'. מה שהופך את זדון לשוגג כאן זהו עצם הרצון להתפלל בכל זאת. היינו – תשובה)"}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "תשובה = אין לך חידוש גדול מזה (התשובה היא החידוש)", "under": true}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "זה בדיוק הכוונה של הסוגיה ב'מעוות לא יוכל לתקון'. המצווה והחובתיות כבר הלכה."}], "pesak": null}, "eizo": {"title": "איזו תפילה?", "seif": "סעיפים ו׳, ט׳-י\"א", "sugya": null, "ops": [{"subhead": "תשלומין במוסף ועל מוסף (ו')"}, {"layer": "lead", "srcRef": null, "txt": "**על מוסף**: תפילת מוסף זמנה כל היום, לכן אפשר לכתחילה להתפלל אותה כל עוד לא חשך היום (\"ושל מוספין כל היום\"). ההלכה שאין תשלומין למוסף פירושה שאם חשך היום ועבר זמן מוסף – אי אפשר להשלימה בערבית."}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "מוסף היא יותר 'קרבנית' משאר תפילות, לכן \\ul{לגביה כן שייך לומר ד'עבר זמנו בטל קרבנו'}"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ו')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.6", "txt": "פוסק על פיהם: אין למוסף תשלומים"}, {"layer": "acharon", "src": "ט\"ז, מג\"א", "srcRef": null, "txt": "הטעם לכך הוא משום שמוסף אין לה רחמי. ועוד: איך יגיד קורבנות שלא בזמן מוסף?", "under": true}, {"layer": "acharon", "src": "שערי תשובה ואחרונים", "srcRef": null, "txt": "**במוסף**: אם פספסתי שחרית ביום שיש בו מוסף – א\"א להשלים במוסף"}, {"subhead": "מנחה של ער\"ש ← ערבית של שבת (ט')"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.9", "txt": "פספס מנחה של ערב שבת – מתפלל ערבית של שבת פעמיים (פשוט בברייתא)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "היה נכון להשלים של חול! אלא שלא הטריחוהו רבנן 18 ברכות. וגם: אין תפילת שבת בלי הזכרת שבת.\nאם עשה התשלומים של חול? מ\"ב: יצא. ט\"ז: לא יצא"}, {"subhead": "מנחה של שבת ← ערבית של מוצ\"ש (י')"}, {"layer": "gemara", "src": "פשוט בסוגיה", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.10", "txt": "במוצ\"ש פעמיים של חול. אבל בתשלומין בלי הבדלה. (הבדלה שונה בזה משבת ור\"ח)\n**פאשלה1** - בראשונה לא הזכיר הבדלה, בשנייה כן → לא יצא (גילה שהתשלומין היא הראשונה). מ\"ב: אך אם כיוון בפירוש שהראשונה היא של עכשיו והשנייה תשלומין – יצא.\n**פאשלה2** – בשתיהן הזכיר/לא הזכיר הבדלה → יצא (לא היה הבדל בין התפילות)"}, {"subhead": "מנחה של ערב ר\"ח (רמ\"א י')"}, {"layer": "rama", "src": "רמ\"א · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.10", "txt": "פספס מנחה רגילה, וההשלמה בערבית של ר\"ח → יתפלל ערבית של ר\"ח פעמיים.\n**פאשלה1** - בראשונה לא 'יעלה ויבוא' ובשנייה כן → התשלומין לא עלתה (גילה דעתו שהיא תשלומין). ט\"ז: אם כיוון בפירוש – יצא.\n**פאשלה2** – בשתיהן לא הזכיר יעלה ויבוא → יצא"}, {"layer": "acharon", "src": "מ\"ב (ס\"ק כז)", "srcRef": null, "txt": "**מנחה של ר\"ח שאחריו ר\"ח**: לא הזכיר בראשונה יעלה ויבוא - יצא (כי בשתיהן צריך). לא הזכיר בשנייה יעלה ויבוא – יצא (כי לא צריך לחזור בערבית בגלל יעלה ויבוא)"}, {"subhead": "טעה במנחה של שבת/ר\"ח ← ערבית של חול"}, {"layer": "rishon", "src": "תוס' בשם ר\"י", "srcRef": null, "txt": "שייתפלל ערבית רגיל פעמיים (ראשונה הבדלה)"}, {"layer": "rishon", "src": "חכמי פרובינציה", "srcRef": null, "txt": "לא שייך תשלומים בכלל (כי מחד – אמור להשלים עפ\"י התפילה של עכשיו. מאידך – כל הסיבה שצריך להשלים זה לא כי לא התפלל, אלא טעה ביעלה ויבוא/נוסח שבת. אז מה יעזור להתפלל התפילה של עכשיו?)", "under": true}, {"layer": "rishon", "src": "תלמידי ר' יונה", "srcRef": null, "txt": "יעשה את השנייה נדבה בלי חידוש דבר"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": null, "txt": "יעשה את השנייה נדבה בלי חידוש דבר"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אבל אם שכח משיב הרוח/טל ומטר (וכל דבר שמצריך להתפלל שוב כמו יעלה ויבא) – כן ייתפלל תשלומין. כי כן יכול לתקן בתפילה הבאה (גם בה צריך להזכיר תן טל וכו')"}], "pesak": null}, "maore": {"title": "המזכיר מאורע שאר ימים שלא בזמנה", "seif": "סעיף י\"ב", "sugya": null, "ops": [{"layer": "rishon", "src": "אורחות חיים", "srcRef": null, "txt": "מכך שאם טעה במנחה של שבת, ובמוצש כשהשלים אמר בטעות בשניהם הבדלה – יצא, לומד: \\ul{אם הזכרתי בטעות משהו שלא היה צריך להזכיר (דומיא דהבדלה) וכד' - לא הווי הפסק}, והתפילה הייתה בסדר"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.108.12", "txt": "פוסק כן."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אבל אם נזכר - יש להפסיק אפילו באמצע הברכה"}, {"layer": "acharon", "src": "ט\"ז, גר\"א", "srcRef": null, "txt": "חולקים על הש\"ע. אין מה להשוות. הבדלה כן שייכת במוצש, פשוט לא בתפילה שמשלים. להזכיר פתאום על הניסים זה בוודאי הפסק.", "under": true}], "pesak": null}, "harchava": {"title": "הרחבה — מהלך הגמרא", "seif": null, "sugya": null, "intro": "מהלך הגמרא מעניין כשלעצמו.", "ops": [{"layer": "gemara", "src": "הסוגיה (ברכות כו)", "srcRef": null, "txt": "~~**איבעיא להו**\\note{לדעתי כל האיבעיא להו הזה הוא מהלך מלאכותי של הגמרא. שהרי, קיימת מימרא של ר' יוחנן שעונה על שאלה זו של מנחה בפשטות בדיוק כמו השאלה של ערבית ושחרית. וכן, יש גם ברייתא בריש עמוד ב שקובעת בדיוק אותו דבר ואפילו לער\"ש. לדעתי, מטרתו של המהלך היא להניח בדברי רבי יוחנן את הביטוי 'עבר יומו בטל קורבנו'. כך, אנחנו נשארים בשפה הקורבנית.}: טעה ולא התפלל מנחה, מהו שיתפלל ערבית שתים?~~\n~~   אם תמצא לומר טעה ולא התפלל ערבית מתפלל שחרית שתים - משום דחד יומא הוא, דכתיב ויהי ערב ויהי בקר יום אחד, אבל הכא - תפלה במקום קרבן היא, וכיון דעבר יומו בטל קרבנו;~~\n~~   או דילמא, כיון דצלותא רחמי היא - כל אימת דבעי מצלי ואזיל? –~~\n~~**אמר רב הונא בר יהודה אמר רבי יצחק אמר רבי יוחנן**: \\ul{טעה ולא התפלל מנחה - מתפלל ערבית שתים, ואין בזה משום דעבר יומו בטל קרבנו}.~~\n~~**מיתיבי**: מעות לא יוכל לתקן וחסרון לא יוכל להמנות. מעות לא יוכל לתקן - זה שבטל קריאת שמע של ערבית וקריאת שמע של שחרית, או תפלה של ערבית, או תפלה של שחרית...~~\n~~**אמר רבי יצחק אמר רבי יוחנן**: הכא במאי עסקינן - שבטל במזיד.~~\n~~**אמר רב אשי**: דיקא נמי דקתני בטל ולא קתני טעה - שמע מינה.~~", "collapsed": true, "ref": {"label": "ברכות · פרק תפילת השחר · כו", "ref": "Berakhot.26a"}}, {"layer": "acharon", "src": "בשיעור (בעקבות הרב שג\"ר)", "srcRef": null, "txt": "~~הרחבנו כאן בסוגיה על המתח הנוצר ע\"י הסתמא: התפילה נמתחת בין מובן שבו היא דבר שיש לו תחום זמן מסויים ומוגבל (כקרבן, עבר יומו בטל קרבנו), לבין רחמי – הזמן נזיל, ואין לי הגבלות בטווח התפילה שלי.~~\n~~אלא שאנו רואים כי על אף שעמדת ר' יוחנן כי יש להשלים ואין בזה משום עבר זמנו בטל קרבנו, על אף זאת צריך להשלים! כלומר, יש פה מורכבות, ואנחנו לא נמצאים באחד מהצדדים. ויש אפילו לדייק ולומר בסוגייה, כי הצורך/אפשרות להשלים נקנים דווקא מכח העובדה שתפילה רחמי, ואין ההכרעה לטובת רחמי מפרקת את כל מבנה של זמני תפלות והדימוי כנגד קרבנות.~~\n~~בעצם, אנו מונחים בין שני קטבים. מתח דומה ניתן אולי לזהות בסוגיה שמגיעה מיד אח\"כ, במחלוקת אם תפילות אבות תקנו או כקרבנות.~~", "collapsed": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "yesod"}, {"type": "sec", "id": "bein"}, {"type": "sec", "id": "anus"}, {"type": "sec", "id": "hatzmada"}, {"type": "sec", "id": "smucha"}, {"type": "sec", "id": "mezid"}, {"type": "sec", "id": "eizo"}, {"type": "sec", "id": "maore"}, {"type": "sec", "id": "harchava"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"תשלומין": "השלמת תפילה שהוחמצה, ע\"י התפללות התפילה הסמוכה פעמיים.", "עבר יומו בטל קרבנו": "קרבן שעבר זמנו — בטל; ההשוואה לתפילה (כנגד קרבן) היא צד אחד במתח שבסוגיה.", "צלותא רחמי היא": "תפילה היא בקשת רחמים (ולא רק כנגד קרבן) — הצד השני במתח שבסוגיה.", "בהצמדה": "תשלומין נעשים דווקא צמוד לתפילת הזמן הנוכחי, לא בכל עת.", "נדבה": "תפילת רשות; מי שהזיד או פספס את הסמוכה יכול להתפלל נדבה (לרוב בתנאי חידוש).", "מעוות לא יוכל לתקון": "הכתוב שממנו למדו שהמזיד (שביטל תפילה) אינו משלים בתשלומין.", "אנוס": "מי שהיה צריך להתפלל ונמנע ממנו (זמן, חולי, טרדת ממון) — דינו כשוגג ומשלים.", "מוסף": "תפילת מוסף — אין לה תשלומין (זמנה כל היום; משעבר, בטל)."}, "subject": "תפילה וברכות", "id": "tashlumin"}, {"topic": {"title": "איך מגיעים לתפילה", "eyebrow": "מבחני הרבנות · תפילה וברכות · סימן צ\"ג", "siman": "Shulchan_Arukh,_Orach_Chayim.93", "intro": {"lead": {"t": "", "ref": ""}, "body": ""}}, "sections": {"shehiya": {"title": "שהייה", "seif": "סעיף א׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברכות (פ' אין עומדין)", "srcRef": null, "txt": "**משנה**: ~~אין עומדין להתפלל אלא מתוך כובד ראש~~\nחסידים הראשונים היו שוהים שעה אחת מתפללים, כדי שיכוונו לבם\n**בברייתא**: חסידים היו שוהים גם \\ul{שעה לפני} התפילה\n     וגם \\ul{שעה אחרי} התפילה", "ref": {"label": "ברכות · פרק אין עומדין · ל", "ref": "Berakhot.30b"}}, {"subhead": "הטעם לשהייה"}, {"layer": "lead", "srcRef": null, "txt": "לפני – כדי שיכוונו לבם לאבינו שבשמיים\nאחרי – כדי שלא תראה על האדם התפילה כמשאוי, שממהר לצאת ממנה"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.93.1", "txt": "לפני התפילה – ישהה שעה אחת, כדי שיכוון לבו בתפילה\n     אחרי התפילה – ישהה גם שעה אחת, כדי שלא תראה עליו כמשאוי (**משנה וברייתא**)"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "חסידים – שעה זמנית\n     שאר אנשים – שעה מועטת (כדי הילוך ח' טפחים)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "טוב להשאר בביהכנ\"ס אחרי כולם"}], "pesak": null}, "matzav_nafshi": {"title": "מצב נפשי", "seif": "סעיף ב׳", "sugya": null, "ops": [{"layer": "note", "src": "הערה", "srcRef": null, "txt": "לא סתם המשנה מביאה על חסידים הראשונים שהיו שוהים אחרי האמירה שאין עומדים להתפלל אלא מתוך כובד ראש. מסתמא כוונתה לומר שהשהייה הביאתם לעמוד לתפילה בכובד ראש", "collapsed": true}, {"layer": "gemara", "src": "ברכות (פ' אין עומדין)", "srcRef": null, "txt": "**משנה**: אין עומדין להתפלל אלא מתוך \\ul{כובד ראש}\n**ברייתא**: אין עומדין להתפלל מתוך עצבות\n     שחוק\n     קלות ראש\n     דברים בטלים\nאלא מתפללים מתוך \\ul{שמחה}", "ref": {"label": "ברכות · פרק אין עומדין · ל", "ref": "Berakhot.30b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "מתוך שמחה – כגון דברי תנחומין שבתורה, למשל, סמוך לגאולת מצרים, סמוך לתהלה לדוד"}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "כובד ראש = אימה והכנעה"}, {"layer": "rishon", "src": "תוספות, רא\"ש", "srcRef": null, "txt": "כדי לעמוד מתוך שמחה – נוהגים לומר 'אשרי' ופסוקי דזמרה לפני התפילה"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.93.2", "txt": "אין עומדים להתפלל מתוך שחוק, קלות ראש ודברים בטלים\nעומדים להתפלל באימה ובהכנעה, ומתוך שמחה, כגון דברי תנחומין שבתורה (**משנה+ברייתא, רש\"י**)"}, {"layer": "acharon", "src": "ב\"ח, מ\"ב", "srcRef": null, "txt": "אימה ובהכנעה - זו מצווה מן המובחר. לא כל אחד יכול.\n     אם לא יכול – לפחות לא יתפלל מתוך שחוק, אלא מתוך שמחה של מצווה."}, {"layer": "lead", "srcRef": null, "txt": "סעיפים ג'-ד' הם מעין בירור לשאלה של כניסה מתוך שמחה."}], "pesak": null}, "halacha_psuka": {"title": "כניסה מתוך דבר הלכה", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא (פ' אין עומדין)", "srcRef": null, "txt": "אין עומדים להתפלל מתוך דין או דבר הלכה, אלא מתוך הלכה פסוקה\n     כי הלכה שאינה פסוקה גורמת להרהור וטרדה בתפילה.", "ref": {"label": "ברכות · פרק אין עומדין · לא", "ref": "Berakhot.31a"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.93.3", "txt": "פוסק כן"}, {"layer": "rama", "src": "טור, רמ\"א", "srcRef": null, "txt": "להכנס מתוך הלכה פסוקה קשור גם לשמחה שצריך"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "כלומר, לפני התפילה אסור לפלפל. אבל אם פלפל והציבור מתחילים מנחה - יתפלל"}], "pesak": null}, "tzorchei_tzibur": {"title": "העוסק בצרכי ציבור", "seif": "סעיף ד׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ירושלמי", "srcRef": null, "txt": "העוסק בצרכי ציבור כעוסק בתורה דמי", "ref": {"label": "ירושלמי · ברכות", "ref": ""}}, {"subhead": "במה הדמיון?"}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "שניהם נכנסים לתפילה מתוך שמחה"}, {"layer": "rishon", "src": "יש מפרשים", "srcRef": null, "txt": "שניהם לא צריכים להפסיק מעיסוקם לתפילה"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.93.4", "txt": "העוסק בצרכי ציבור והעוסק בתורה דומים, כי שניהם נכנסים לתפילה מתוך שמחה\n     יש מפרשים: שניהם לא צריכים להפסיק עיסוקם כדי להתפלל"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "מי שהעיסוק בצרכי ציבור מטריד אותו – כהלכה לא פסוקה"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מאחר והעוסק בצ\"צ פטור מהתפילה – לא צריך להשלים בתשלומין"}], "pesak": null}}, "nav": [{"type": "sec", "id": "shehiya"}, {"type": "sec", "id": "matzav_nafshi"}, {"type": "sec", "id": "halacha_psuka"}, {"type": "sec", "id": "tzorchei_tzibur"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"כובד ראש": "רצינות, אימה והכנעה שבהן יש לעמוד לתפילה.", "כמשאוי": "כמשא כבד — שלא תיראה התפילה על האדם כמעמסה שממהר להיפטר ממנה.", "הלכה פסוקה": "הלכה מוכרעת שאין בה ספק; רק ממנה נכנסים לתפילה, שלא תטריד הכרעה פתוחה.", "פסוקי דזמרה": "פרקי שבח (אשרי והלל שלפני קריאת שמע) שאומרים כדי לבוא לתפילה מתוך שמחה.", "עוסק בצרכי ציבור": "מי שעוסק בצורכי הרבים — דומה לעוסק בתורה, ונכנס לתפילה מתוך שמחה."}, "subject": "תפילה וברכות", "id": "hachana-tefila"}, {"topic": {"title": "כוונה בתפילה, תחנונים, קרבן", "eyebrow": "מבחני הרבנות · תפילה וברכות · סימן צ\"ח", "siman": "Shulchan_Arukh,_Orach_Chayim.98", "intro": {"lead": {"t": "", "ref": ""}, "body": "**היום אין יכולים לכוון כ\"כ**\nאחת האמירות החשובות פה, שיש לה נפק\"מ בכל מיני מקומות – דברי הטור בשם המהרמ\"מ, \\ul{שהיום אין אנו יכולים לכוון כ\"כ בתפילותנו}. עוד כמה ראשונים אומרים אותה בהקשרים אחרים (תוספות, מרדכי, הגהות מיימ' ועוד).\nבא לידי ביטוי לדוגמא בסימן פט סע' ה', ביחס לשיטת הרמב\"ם לאכילה לפני התפילה מפני כוונה.\nבסוף סימן צט, ביחס לתפילת שיכור, שם מצרפים את האמירה הזאת כדי להתיר לשתוי קצת להתפלל כשתכף עובר זמן התפילה (**מהרש\"ל, מ\"ב**).\n\n**חשיבות אבות בכוונה**\nמפני העיסוק בכוונה, נכנס כאן גם סעיף א' של סימן קא, העוסק בכוונה בחלקים ספציפיים (אבות לעומת שאר עמידה). אבות הכי חשובה מבחינת כוונה. אם לא כיוון בה, אעפ\"י שכיוון בכל שאר הברכות – לא עלתה תפילתו, וצריך להתפלל שוב. וכן להפך (אם כיוון רק באבות ובשאר הברכות לא – תפילתו תפילה).\nחשיבותה של אבות על פני הברכות האחרות באה גם היא לידי ביטוי במקומות אחרים. למשל, לגבי המתפלל בדרכו, **ר' יונה** סובר שצריך לעצור לפחות לברכת אבות, כדי להצליח לכוון בה, והב\"י סובר להסכים איתו כאשר לא מדובר במקום סכנה (וכן נוקט **בש\"ע**)."}}, "sections": {"kavana_milim": {"title": "כוונה במילים ובמחשבות", "seif": "סעיף א׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברכות (פ' אין עומדין)", "srcRef": null, "txt": "**ברייתא**: המתפלל צריך שיכוון את לבו (\"תכין לבם - תקשיב אזנך\") (נלמד גם מחנה)", "ref": {"label": "ברכות · פרק אין עומדין · לא", "ref": "Berakhot.31a"}}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "לכוון בלבו – יכוון פירוש המילים שמוציא בשפתיו"}, {"layer": "lead", "srcRef": null, "txt": "**הטור** האריך כאן עוד בלשונו בעניין. הרוב דברים שלו."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.98.1", "txt": "המתפלל צרכיך שיכוון בלבו פירוש המילים שמוציא בשפתיו (**ברייתא + טור**)\n• יסיר כל המחשבות הטורדות אותו (**טור**)\n• יחשוב כאילו שכינה כנגדו (**טור**)\n• יחשוב כאלו מדבר לפני מלך בשר ודם (**טור**)\n• יחשוב בדברים המכניעים את הלב, ולא בדברים של קלות ראש (**אורחות חיים**)\n• אם תבוא לו מחשבה אחרת בתפלה – ישתוק עד שתתבטל (**טור**)\n• חסידים ואנשי מעשה היו מתבודדים ומכוונים בתפילתם, עד שהיו מגיעים להתפשטות הגשמות, והתגברות כח השכלי, עד שהיו מגיעים קרוב למעלת הנבואה (**טור**)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "לא צריך לעשות שמות ולייחד ייחודים. רק להבין בלב פשט המילים", "under": true}, {"layer": "acharon", "src": "פני יהושע", "srcRef": null, "txt": "כל הדברים של מחשבות – לפני התפילה. בתפילה עצמה – לכוון פירוש המילים.", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Orach_Chayim.98.1", "txt": "• קודם התפילה - יחשוב רוממות האל ושפלות האדם (**ר' יונה**)\n• לא לנשק את הילדים בביהכנ\"ס. אין אהבה כאהבת המקום (**אגודה, בנימין זאב**)"}, {"layer": "acharon", "src": "של\"ה", "srcRef": null, "txt": "קורא תגר על המבאים ילדים \\ul{שלא הגיעו לחינוך} לבהכנ\"ס. מפריעים לכוונה", "under": true}], "pesak": null}, "kavana_zman": {"title": "כוונה בעקבות זמן ומקום", "seif": "סעיף ב׳", "sugya": null, "ops": [{"layer": "shulchan", "src": "טור, ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.98.2", "txt": "לא יתפלל \\ul{במקום} או \\ul{בזמן} המבטל כוונתו"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מקום – כגון שיש ריח שסוחפו (נ\"ל פשוט שגם מקום רועש וכד')\nזמן – כגון שחזר כעוס או טרוד מהדרך וכד'", "under": true}, {"layer": "rishon", "src": "טור בשם מהר\"מ מהרוטנבורג", "srcRef": null, "txt": "היום אנו לא יכולים לכוון כ\"כ בתפילה. לכן לא מקפידים בכל זה."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.98.2", "txt": "פוסק כן. כלומר: מתפללים בכל זאת"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "ולמרות זאת, מה שאפשר להשתדל - משתדלים"}], "pesak": null}, "kavana_brachot": {"title": "כוונה בברכות מסוימות", "seif": "קא · א׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא פ' אין עומדין", "srcRef": null, "txt": "המתפלל צריך שיכוון את לבו בכל הברכות.\nאם לא יכול לכוון בכולן – יכוון באחת\n**בגמרא**: זו אבות", "ref": {"label": "ברכות · פרק אין עומדין · לד", "ref": "Berakhot.34a"}}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "אבות הכי חשובה כי היא סידור שבחו של מקום"}, {"layer": "gemara", "src": "רבי אלעזר בשילוב הברייתא", "srcRef": null, "txt": "אם אדם משער שלא יוכל לכוון באבות – לא ייתפלל (קרדיט לרא\"ש)", "collapsed": true}, {"subhead": "אם לא כיוון באבות?"}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "מהסיפור של **רבי ינאי** שחזר והתפלל לומדים: מי שלא כיוון באבות – צריך להתפלל שוב"}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "האידנא לא מתפללים שוב בעקבות חסרון כוונה. סביר שגם בזו לא יכוון"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.101.1", "txt": "+ המתפלל צריך שיכוון לבו בכל הברכות.\n     אם אינו יכול לכוון בכולן – יכוון לפחות באבות (**ברייתא + גמרא**)\n+ אם לא כיוון באבות – יחזור ויתפלל (אפילו אם כיוון בשאר) (מסקנת **הרא\"ש והטור מרבי ינאי**)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם לפני התפילה משער שלא יוכל לכוון באבות – לא ייתפלל (ר' אלעזר בגמרא)", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "ירגיל עצמו אדם לכוון לפחות בחתימת בחתימה של כל ברכה (**הרוקח**)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Orach_Chayim.101.1", "txt": "+ אבל האידנא לא מתפללים שוב בגלל חוסר כוונה, שהרי סביר שגם בפעם נוספת לא יכוון (**טור**)"}, {"layer": "acharon", "src": "חיי אדם", "srcRef": null, "txt": "עושה פשרה – אם לפני שחתם את אבות שם לב שלא כיוון – יחזור לתחילתה (ברוך אתה..) ('אלקי אברהם..)", "under": true}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אבל על חוסר כוונה בקריאת שמע כן חוזרים. זה כולה פס' אחד לכוון בו", "under": true}], "pesak": null}, "tachanunim": {"title": "תפילת תחנונים", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "gemara", "src": "תנן בפ' תפלת השחר", "srcRef": null, "txt": "העושה תפלתו קבע - אין תפלתו תחנונים\nמאי קבע?\n     **ר' הושעיא**: מי שתפילתו דומה עליו כמשאוי\n     **רבנן**: כל שאינו אומרה בלשון תחנונים", "ref": {"label": "ברכות · פרק תפלת השחר · כט", "ref": "Berakhot.29b"}}, {"layer": "shulchan", "src": "טור ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.98.3", "txt": "נקטו שניהם: ייתפלל דרך תחנונים, ושלא תראה עליו כמשאוי"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "בדיעבד אם לא אמר לשון תחנונים - יצא", "under": true}], "pesak": null}, "korban": {"title": "תפילה במקום קרבן", "seif": "סעיף ד׳", "sugya": null, "ops": [{"layer": "lead", "srcRef": null, "txt": "כל מה שנקטו הטור והש\"ע בסימן עד כאן – דבוק לעובד שהתפילה כקרבן (**ב\"ח**)"}, {"layer": "shulchan", "src": "טור-ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.98.4", "txt": "התפילה היא במקום קרבן. לכן:\n• כוונה = כוונה בקרבן (בקרבנות – כוונה שגויה פוסלת)\n• עמידה\n• קביעות מקום (לכל קרבן מקום קבוע)\n• בגדים מיוחדים לתפילה (לא לכל אדם יש כסף. לפחות מכנסיים מיוחדים)\n• שלא ייחץ דבר בינו לבין הקיר"}, {"layer": "acharon", "src": "טור ט\"ז", "srcRef": null, "txt": "שייעמוד על הקרקע עצמה, ולא על דבר המגביה (**ט\"ז**: אפשר עד ג' טפחים)"}], "pesak": null}, "hitkablut": {"title": "התקבלות התפילה", "seif": "סעיף ה׳", "sugya": null, "ops": [{"layer": "rishon", "src": "סמ\"ק וטור עפ\"י ראש השנה", "srcRef": null, "txt": "אל יחשוב אדם שבגלל שהוא כיוון הקב\"ה יעשה תפילתו. בחסדו הוא עושה.", "ref": {"label": "ראש השנה · יח", "ref": "Rosh_Hashanah.18a"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.98.5", "txt": "וכן כותב."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "group", "title": "כוונה", "spans": "סעיפים א׳-ב׳, קא · א׳", "children": ["kavana_milim", "kavana_zman", "kavana_brachot"]}, {"type": "group", "title": "אופי התפילה", "spans": "סעיפים ג׳-ה׳", "children": ["tachanunim", "korban", "hitkablut"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"כובד ראש": "רצינות ואימה שבהן עומדים לתפילה.", "אבות": "הברכה הראשונה בעמידה ('מגן אברהם') — החשובה ביותר לכוונה.", "כמשאוי": "כמשא כבד שממהרים להיפטר ממנו — כך אין לעשות את התפילה.", "תחנונים": "בקשת רחמים; יש להתפלל דרך בקשה ולא כחובה שגרתית.", "התפשטות הגשמות": "התנתקות מן החומר עד קרוב למעלת הנבואה, כדרך חסידים ואנשי מעשה.", "האידנא": "בזמן הזה — שבו אין יכולים לכוון כבעבר."}, "subject": "תפילה וברכות", "id": "kavana-tefila"}, {"id": "harchakot-nida", "topic": {"title": "הרחקות", "eyebrow": "מבחני הרבנות · הלכות נידה · סימן קצ\"ה", "siman": "Shulchan_Arukh,_Yoreh_De'ah.195", "intro": {"lead": {"t": "", "ref": ""}, "body": "עד כה ראינו כי בימי הטומאה וההיטהרות (כולל ימי 'פולטת שכבת זרע'), האיש והאשה אסורים זה לזה בתשמיש. זאת, עד שהאשה תפסוק בטהרה, ותספור 7 נקיים כדין (בכך עוסק סי' קצו), ולאחמ\"כ תטבול כדין (בכך עוסקים סימנים קצז-קצט). מלבד איסור התשמיש, בחלק מהתקופה קיימים גם איסורי קרבה והרחקות נוספים. הרחקות אלו יסודן בפסוק: \"ואל אשה בנדת טמאתה לא תקרב\" (ויקרא יח, יט), אך נחלקו ראשונים האם ההרחקות הן מדאורייתא (**רמב\"ם**), או שמא הן מדרבנן, ורק תשמיש אסור מהתורה, ופסוק זה הוא אסמכתא בעלמא (**רמב\"ן**).\n\nנראה כי מטרתן של הרחקות אלו כשמן: להרחיק בין בני הזוג, כדי שלא להגיע לתשמיש בזמן שבני הזוג אסורים. אולם הערתי במהלך הסיכום כי ייתכן וניתן לראות בחלק מן ההרחקות מעמד עצמאי, שאמנם מטרתו ליצור ריחוק בין האיש והאשה בתקופה זו, אך לא בהכרח כדי למנוע תשמיש, אלא לשם הריחוק עצמו.\n\nחשוב לזכור כי הריחוק הנדרש הוא בסך הכל ריחוק פיזי, ולא איסור בזוגיות. שכן, האיסורים והגדרים הם איסורים וגדרים פיזיים, ולא איסור בזוגיות. מובן מאליו כי ריחוק פיזי מייצר תחושה של ריחוק רגשי וזוגי, אך זו תופעת לוואי, ולא אידיאל. וברוח זו כתב הרב מלמד ב**פניני הלכה**: בכל הקשור להרחקות, יש לנהוג בדרך אמצע. להיזהר שלמרות ההרחקות לא ליצור ריחוק גדול מדי.\n\nצריך לשים לב בין הרחקות משום חיבה וקירבה, הרחקות ממגע, וסימנים לעצם המצב. וכן, מה האיסורים (תשמיש, נגיעה)."}}, "sections": {"prisha": {"title": "פרישה מתשמיש בימי הטומאה", "seif": "א׳", "sugya": null, "intro": "בפתיחת הסימן, מזכירים הטור והש\"ע את עצם חיוב הגבר לפרוש מאשתו עד שתגמר טומאתה, תספור שבעה נקיים ותטבול כדין. כלומר, איסור התשמיש חל כל עוד האשה אינה נטהרת בטבילה.", "ops": [{"subhead": "טומאת האשה עד שתטבול"}, {"layer": "gemara", "src": "גמרא שבת סד · ספרא", "srcRef": null, "txt": "**גמרא שבת סד**, **ספרא**: \"והדוה בנדתה\" – בנדתה תהא עד שתבוא במים", "ref": {"label": "שבת · פרק במה אשה · סד", "ref": "Shabbat.64b"}}, {"layer": "rishon", "src": "רוב הראשונים · הטור · הש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.1", "txt": "ולפיכך פסקו **רוב הראשונים** (גאונים, רשב\"א, רמב\"ם) הטור ו**הש\"ע** כי \\ul{האשה טמאה ואסורים בתשמיש כל עוד לא טבלה; ואפילו בימי ליבונה}, כלומר, כשכבר אינה רואה, אך עוברת לטהרה על ידי 7 נקיים."}, {"layer": "rama", "src": "רמ\"א מגיהה", "srcRef": null, "txt": "**רמ\"א מגיהה**: אפילו אם עבר זמן ארוך אחרי ימי ליבונה – כל עוד לא טבלה - טמאה"}, {"layer": "note", "src": "הערה", "srcRef": null, "txt": "(ולקמן נראה כי זה נכון גם בהרחקות. ושאין הבדל בין ימי טומאה, ימי ליבונה ואחרי ימי ליבונה. טמאה כל עוד לא טבלה)"}], "pesak": null}, "ikar": {"title": "עיקר דיני הרחקות", "seif": "א׳, י״ד", "sugya": null, "ops": [{"subhead": "יסוד ההרחקות (א')"}, {"layer": "gemara", "src": "ויקרא יח · אבות דרבי נתן", "srcRef": null, "txt": "**ויקרא יח**: \"ואל אשה בנדת טמאתה לא תקרב\"\n**אבות דרבי נתן**: הפסוק הזה הוא סייג של התורה לעצמה.\nוממנו נלמד: \"לא תקרב\" - כלומר, שלא יחבקנה וינשקנה וידבר דברים בטלים עמה."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.1", "txt": "**ש\"ע**: אדם חייב לפרוש מאשתו ולנהוג בהרחקות בכל זמן שהיא טמאה (עפ\"י הפסוק ואבות דרבי נתן)\nולכן לא יקל ראש ולא ידברו דברים בטלים, כדי שלא ירגילו לעבירה (עפ\"י אבות דר\"נ)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך** מדייק: רק אם הדברים הבטלים מרגילים לערווה (ונ\"ל שרוצה לומר שאם הם לא מרגילים - אין בעיה)"}, {"layer": "acharon", "src": "ברכי יוסף", "srcRef": null, "txt": "**ברכי יוסף**: אסור להריח בושם של אשתו כשהיא נדה (מקיש מאו\"ח לגבי איסור הרחה של בושם של מי שהיא ערווה עליו, לגבי מי שאשתו נדה; שלמרות שבסתם היא מותרת לו - עכשיו היא נדה ואסור להריחו) (דורש הפוך לגמרי את 'סוגה בשושנים'. במקום עדות לכך שישראל לא עוברי עבירה, רואה בכך סמך ליצירת סייגים)"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "**ערוה\"ש**: מתיר להריח בושם של אשתו כשהיא נדה", "under": true}, {"subhead": "ייחוד"}, {"layer": "gemara", "src": "כתובות ד · רבא", "srcRef": null, "txt": "**כתובות ד**: מי שפירסה אשתו נדה – הוא ישן בין האנשים והיא בין הנשים..\nרב יוסף בשם **רבא**: רק אם לא שמשו, אבל אם שמשו (פעם) - ישנה עמו.", "ref": {"label": "כתובות · פרק ד", "ref": "Ketubot.4b"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.1", "txt": "**ש\"ע**: למרות שאדם צריך לפרוש מאשתו בימי טומאתה ולהתרחק מדבר עבירה - מותר להם להתייחד משום שכבר שמשו (ולכן ייצרו לא תוקפו)"}, {"subhead": "בין ימי נידה/זבה לימי ליבונה (י״ד)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "לרוב המוחלט של הדעות (מלבד מה שעולה מדברי **ר\"ח**, **רש\"י** ו**ר\"ת**) ההרחקות - כמו האיסור בתשמיש - רלוונטיות גם לימי הטומאה עצמה וגם לימי ההיטהרות ממנה (שבעה נקיים) בצורה שווה. אולם הרמ\"א הזכיר כי בהרחקה של אכילה יחד באותה קערה, יש מי שנהגו להקל בימי ליבונה, אך לדינא דוחה זאת.\n[ימי ליבונה = ימי השבעה נקיים]"}, {"layer": "rishon", "src": "ר\"ח · רש\"י", "srcRef": null, "txt": "**משמע מרבנו חננאל ורש\"י**: בחלק מההרחקות, אפשר להקל בימי ליבונה (כך פרשו לגבי אשתו של שמואל, לגבי הרחקת מזיגת הכוס)", "under": true}, {"layer": "rishon", "src": "ר\"ת", "srcRef": null, "txt": "**ר\"ת**: היו שנהגו לטבול שתי טבילות: אחת אחרי טומאת דאורייתא (עם תום הנדה), ואחת אחרי השבעה נקיים (דרבנית). אחרי הטבילה הראשונה היו מותרות בהרחקות, ואסורות רק בתשמיש; ואחרי הטבילה השנייה (אחר השבעה נקיים) היו מותרות גם בתשמיש (וכך נהג הת\"ח בסיפור עם אליהו).\n(כלומר, הן סברו שחומרת בנות ישראל היא רק על תשמיש, אך לא על הרחקות)\nור\"ת עצמו דוחה: \"קבלה היא בידם בלא טעם ולא ישר בעיני\"", "under": true}, {"layer": "acharon", "src": "דרכ\"מ בשם ראבי\"ה", "srcRef": null, "txt": "**דרכ\"מ** בשם **ראבי\"ה**: מקל בהרחקות אחר ימי ליבונה בלא טבילה (כדי שתתרצה לטבול)\n**דרכ\"מ**: ראה המנהג של אנשים שמקלים אפילו בימי ליבונה ממש, אך סבר שאין לסמוך על זה"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.14", "txt": "**ש\"ע**: תוקפן של כל ההרחקות הוא גם לימי הנידה וגם ימי ליבונה (ה-7 נקיים)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: י\"א, ויש נוהגין שבימי ליבונה - אין איסור אכילה יחד בקערה; אבל יש להחמיר בזה"}, {"layer": "acharon", "src": "ב\"ח · ט\"ז · ש\"ך", "srcRef": null, "txt": "**ב\"ח**, **ט\"ז**, **ש\"ך**: חולקים הן על הראבי\"ה והן על המקלים בהרחקות בימי ליבונה. אין להם על מי לסמוך.", "under": true}, {"subhead": "כשנטמאת מכתם (י״ד)"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "**רשב\"א**: ההרחקות רלוונטיות גם אם ראתה דם (או בעד), וגם אם רק כתם"}, {"layer": "shulchan", "src": "טור · ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.14", "txt": "טור-**ש\"ע**: ואין הבדל בין אם היא רואה דם לבין אם נטמאה מחמת כתם"}], "pesak": null}, "negia": {"title": "איסור נגיעה והושטה", "seif": "ב׳", "sugya": null, "ops": [{"layer": "gemara", "src": "תנא דבי אליהו", "srcRef": null, "txt": "**בתנא דבי אליהו** מובא סיפור (קשוח) של ת\"ח שמת בחצי ימיו. ואליהו חוקר את אלמנתו כיצד נהגו בהרחקות. כששואלה על ימי ליבונה, מסתבר כי הם ישנו ואכלו יחד בימי ליבונה. על כן, אליהו מברך את המקום על כך שהת\"ח מת בחצי ימיו.\nלגבי נגיעה - האשה אומרת שלא נגע בה אפילו באצבע קטנה (בימי נדתה, אך הם לא נהגו בכך בימי ליבונה)"}, {"layer": "rishon", "src": "רמב\"ם · רשב\"א", "srcRef": null, "txt": "**רמב\"ם, רשב\"א** וכו': אסור לגעת בנדה אפילו באצבע קטנה"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.2", "txt": "**ש\"ע**: \\ul{לא יגע איש באשתו נדה אפילו באצבע קטנה} (**רמב\"ם**, **וכדמשמע בתנא דבי אליהו**)"}, {"subhead": "איסור הושטת דבר"}, {"layer": "note", "src": "הערת סידור", "srcRef": null, "txt": "סידרתיו כאן מפני שלרוב הדעות מדובר כהרחקה מפני נגיעה, ולא כהרחקה עצמאית."}, {"layer": "gemara", "src": "תנא דבי אליהו", "srcRef": null, "txt": "ה**תנא דבי אליהו** לעיל (המדבר על נגיעה, ולא על מסירה)"}, {"layer": "rishon", "src": "מ\"מ ברמב\"ם", "srcRef": null, "txt": "**מ\"מ ברמב\"ם**: אסור להעביר ספציפית כוס יין (מצד הרחקת עשיית מלאכה לבעלה, כבסע' י')"}, {"layer": "rishon", "src": "רשב\"א · מנהג רש\"י · ריו\"ח", "srcRef": null, "txt": "**רשב\"א, מנהג רש\"י** (באשתו): \\ul{לא להעביר שום דבר לאשתו בנידותה}. גזרה שמא ייגע בה.\n**ריו\"ח**: ונראה להחמיר אפילו בדבר ארוך (שכביכול יכולים להעביר בלי לגעת), שמא לא יזהר מספיק ויגע בה."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.2", "txt": "**ש\"ע**: לא יושיט שום דבר שמא יגע בה (**רשב\"א; וכעדות על רש\"י**)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: אפילו דבר ארוך (ריו\"ח)", "under": true}, {"subhead": "מסירה בזריקה"}, {"layer": "acharon", "src": "בנימין זאב · הגש\"ד", "srcRef": null, "txt": "**בנימין זאב, הגש\"ד**: ראוי לגעור במוסרים מפתח מיד ליד"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א** לפי זה: אסור לזרוק מידו לידה דבר"}, {"layer": "acharon", "src": "פלתי", "srcRef": null, "txt": "**פלתי**: מותר לזרוק באוויר כלפי מעלה, שלא אחד לעבר השני", "under": true}, {"layer": "zman", "src": "טהרת הבית", "srcRef": null, "txt": "**טהרת הבית**: למנהג הספרדים מותרת כל זריקה, אפילו ישירה", "under": true}, {"subhead": "דינים דומים"}, {"layer": "rishon", "src": "תשב\"ץ", "srcRef": null, "txt": "**תשב\"ץ**: מותר להעביר תינוק"}, {"subsubhead": "הדלקת אש"}, {"layer": "acharon", "src": "יד אליהו", "srcRef": null, "txt": "**יד אליהו**: אסור לאשה להחזיק נר כדי שבעלה ידליק ממנו סיגריה, יתחמם ממנו, או ידליק נר אחר"}, {"layer": "zman", "src": "דרכי טהרה", "srcRef": null, "txt": "**דרכי טהרה**: מחלק: סיגריה אסור, להתחמם מהאש מותר. האחרון לא מחבר בין בני הזוג"}, {"subsubhead": "לעזור לאשתו לטבול כשאין נשים אחרות"}, {"layer": "acharon", "src": "נודע ביהודה", "srcRef": null, "txt": "**נודע ביהודה**: במקרה מאוד ספציפי של זוג שהם היהודים היחידים בכפר – מתיר לבעל לראות את אשתו בטבילתה, וגם לגעת בה ולעזור לה לרדת מתחת למים"}, {"subsubhead": "לנשוף ברוח (כדי להוריד משהו)"}, {"layer": "acharon", "src": "תורת השלמים", "srcRef": null, "txt": "**תורת השלמים**: אסור"}, {"layer": "acharon", "src": "הר הכרמל · פלתי", "srcRef": null, "txt": "**הר הכרמל**, **פלתי**: מותר", "under": true}, {"layer": "zman", "src": "הרב עובדיה (טהרת הבית)", "srcRef": null, "txt": "**הרב עובדיה** (טהרת הבית): מותר להוריד נוצה מאשתו על ידי רוח מפיו, אך המחמיר תבוא עליו הברכה."}], "pesak": null}, "achila_1": {"title": "עיקר הדין ומבוא", "seif": null, "sugya": null, "flowtext": true, "intro": "יסודו של הדיון ההלכתי בעניין זה הוא ב\\ref{משנה בשבת (פרק ראשון)}{Shabbat.11a}, לפיה \"לא יאכל הזב עם הזבה מפני הרגל עבירה\". כלומר, למרות שכששניהם זבין אין באמת איסור אכילה יחד, זוהי מעין גזירה שמטרתה למנוע את הרגל האכילה יחד כאשר רק היא זבה. היא מעודדת להרגיל הרחקה בין האיש לאשה בימי נידותה. לפיכך, נראה כי לפחות ביסודו של הדין במשנה, עניינו הרחקה כמו זו הנידונה מתחילת סימן זה (ועצם סידורו של הטור דין זה כאן מלמד שכך הוא תופס זאת, וכך כותב הב\"י במפורש). אכילה ושתייה הן פעולות שכאשר הן נעשות במרחב המשותף והזוגי, הן מסוגלות להפוך לאינטימיות ורומנטיות. לייצר קרבה וחיבה. משום שכך, פעולות אלו וההתנהגויות שבהן מסומנות כאשר רוצים ליצור הרחקה בימי הטומאה.\n[כאן עולה כמובן השאלה אודות טיבה של ההרחקה בסימן זה. האם מטרתה למנוע את המדרון החלקלק לתשמיש של האיש והאשה כשהיא נדה? או שיש לה מעמד עצמאי? (כרגע אין בכוחי להאריך בכך מפני שהדיון מוכר לי, אך אם ארצה להרחיב – מתאים יותר למקם לפני כל הסימן, או לפחות לפני הסעיפים הראשונים. רק אעיר, שפשיטא לי שכדרכה של הלכה, בגלגולה היא מעניקה לגזירות מעמד עצמאי, גם אם לא כך היה במקור. ובמקרה שלנו, נראה שיש יסוד משמעותי כבר בפסוק לראות בהרחקות מעמד עצמאי. \"ואל אשה בנדת טמאתה לא תקרב\" יכול להיות מובן כציווי שאין עניינו למנוע איסור תשמיש, אלא ליצור מרחב של ריחוק מנדה. זהו מתח שרואים לאורך כל הדיון בהרחקות. וכך יש להבין את התפתחותם של הדינים שמזכיר הדרכי משה המרחיקים את האשה ממרחבי הקדושה כבית הכנסת ולימוד תורה).]\nלמרות שלשון המשנה בשבת היא על אכילה, ישנו דיון גם על שתייה. הקשר בין השניים מתבקש, ו**היראים** אף זיהה לו סמך בסיפור על אליהו ואשת הת\"ח שנפטר. שם, האשה מעידה בפני אליהו שבימי ליבונה בעלה אכל ושתה עמה. אולם יש מן הראשונים (**סמ\"ק**, ו**הב\"י** תולה בשתיקתם של ראשונים אחרים שגם סוברים כמותו) הסוברים שיש הבדל בין אכילה לשתייה, וכי השתייה מותרת. זאת גם מן העובדה הפשוטה שבניגוד לאכילה מאותו הכלי, השתייה לא יכולה להיעשות מאותו הכלי במקביל, אלא רק האיש אחר האשה או להפך, מה שבוודאי פחות מעורר קרבה.\n**הדרכ\"מ** מביא דעה המושכת לכיוון ההפוך, לפיה לא רק שהשתייה מאותו כלי אסורה גם אחד אחר השני, אלא אף אכילה אחד אחר השני אסורה (דבר שלא מצינו אצל ראשונים אחרים או הש\"ע, אלא רק אכילה באותו זמן). לענ\"ד, עמדה זו שמביא הדרכ\"מ היא של **הראבי\"ה** (שהזכיר המרדכי)\\note{כ\"כ המהדיר של שירת דבורה, ומוכיח כן מכך שלשון המרדכי בשם הראבי\"ה שם לגבי שתיה של האיש מהכוס של אשתו הנדה כשאינה שם היא: \"..דאין זה שותה עמה ממש, דבאכילה ושתיה אין קרובי ביאה יותר מהצעת המיטה\". הרי שגם מזכיר אכילה עם שתייה (כפעולות שוות), וגם לשון הדרכ\"מ מזכירה בדיוק את ההיתר של הראבי\"ה אם האשה לא שם.}. לפיכך, שיטתו של הראבי\"ה ייחודית היא: היא רואה שוויון בין אכילה לשתייה לקולא ולחומרא. את שתי הפעולות הוא אוסר אחד אחר השני, ומצריך שיעביר לכלי אחר; אך בשני המקרים, אם היא אינה בחדר כעת – מותר להשתמש בכלי כמו שהוא. כלומר, מבחינתו הנוכחות של אשתו בחדר היא המשמעותית מבחינת תחושת הקרבה והחיבה.\nדעת **הש\"ע** היא בצד של האוסרים. למרות שלשון הש\"ע תמציתית, ב**ב\"י** הוא מרחיב יותר, ובעת צידודו בעמדת האוסרים הוא מסביר כי כך העולם נוהגים. הוא עוד מרחיב ומציין מנהג נוסף על גבי עיקר הדין לרחוץ את הכוס אחר ששתתה האשה, מנהג שאינו מזכיר בש\"ע.", "ops": [], "pesak": null}, "achila_2": {"title": "אכילה", "seif": "ג׳", "sugya": null, "ops": [{"layer": "note", "src": "שאלות", "srcRef": null, "txt": "מה טיב ההרחקה? ממה היא מרחיקה?\nלדעות שמתירות בהיכר - מה משמעותו? האם הוא פשוט סימן, או שהוא מתפקד בצורה מהותית? אפשרות לתפקוד מהותי - יצירה של ריחוק."}, {"layer": "mishna", "src": "שבת פ' קמא · משנה", "srcRef": null, "txt": "**שבת פ' קמא**:\n**משנה**: לא יאכל הזב עם הזבה מפני הרגל עבירה\n(כלומר למרות שכששניהם זבים אין באמת איסור שיאכל עמה, הרי שלאחמ\"כ, כשהוא לא יהיה זב והיא כן - יש בעיה. ולכן אסור שיתרגלו בדבר)", "ref": {"label": "שבת · פרק ראשון", "ref": "Shabbat.13a"}}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "**רמב\"ם**: האיסור הוא דווקא לאכול מאותה קערה"}, {"layer": "rishon", "src": "רב אחאי גאון · רשב\"א · ראב\"ד", "srcRef": null, "txt": "**רב אחאי גאון**, **רשב\"א, ראב\"ד**: גם על שלחן אחד אסור"}, {"layer": "rishon", "src": "רשב\"א · רמב\"ן · הגהות מיימ'", "srcRef": null, "txt": "**רשב\"א**, **רמב\"ן, הגהות מיימ'**: אבל אם יש סימן היכר - מותר (למה?)", "under": true}, {"layer": "rishon", "src": "ריו\"ח", "srcRef": null, "txt": "**ריו\"ח**: אפשר לפרוס מפה להיכר, כמו בשר בחלב\nיש המתירים על ידי שתשנה האשה מקום ישיבתה"}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "**רא\"ש**: פעם לא אכלו על שלחן אחד כי היה קטן והיה בזה דרך חיבה (כאן גם מתבאר מה טעם האיסור. קרבה, כמו בסע' א');\nהיום על שלחנות גדולים מותר מפני שאין בכך קרבה וחיבה"}, {"layer": "acharon", "src": "דרכ\"מ", "srcRef": null, "txt": "**דרכ\"מ**: במדינות האלו נהגו לאכול על שלחן אחד (לא הזכיר היכר), אבל לא באותה קערה"}, {"layer": "acharon", "src": "הגהה בשל\"ג", "srcRef": null, "txt": "**הגהה בשל\"ג**:\nהיכר לפי ההרגל: אם רגילים לאכול באותה קערה – יכולים לאכול על אותו שלחן בקערות נפרדות\nאם רגילים לאכול בקערות נפרדות – לא יכולים לאכול על אותו שלחן"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.3", "txt": "**ש\"ע**: כשהאשה נדה, אסור לזוג לאכול על אותו שלחן.\nאבל אם יש שינוי כלשהו שמפסיק ביניהם (לחם, קנקן וכו')\nאו שיאכלו כל אחד במפה שלו –\nמותר להם לאכול על אותו שלחן (**רשב\"א, רמב\"ן, הגהות מיימ' וכו'**)\n(נ\"ל לדייק מזה שהש\"ע פוסק גם שינוי המפסיק וגם שכל אחד במפה שלו, שהוא אוחז גם בדבר המייצר ריחוק, וגם בסימן היכר 'אקראי' שמהווה תזכורת לריחוק)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: י\"א כדברי ההגהה בשל\"ג, וכן נוהגין"}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "**ב\"ח**: לא מספיק להפריד קערות (למרות שבד\"כ אוכלים בנפרד)", "under": true}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: חולק על הב\"ח", "under": true}], "pesak": null}, "achila_3": {"title": "שתייה מאותה הכוס", "seif": "ד׳", "sugya": null, "ops": [{"layer": "rishon", "src": "סמ\"ק · טור", "srcRef": null, "txt": "**סמ\"ק**, **טור**: איש ואשה נדה - מותר להם לשתות מאותה הכוס"}, {"layer": "rishon", "src": "סמ\"ק / ר' פרץ", "srcRef": null, "txt": "**סמ\"ק**/**ר' פרץ**: נוהגים שאדם אחר יישתה ביניהם (אשתו→איש→הוא)\\note{מופיע בסמ\"ק, אבל בכלבו כתב את זה בשם ר' פרץ, והרי ר' פרץ כתב הגהותיו על הסמ\"ק, וקורה באמת שיש בלבול בין הגהותיו לסמ\"ק עצמו. הרבה יותר מסתדר שזה ר' פרץ.}", "under": true}, {"layer": "note", "src": "דיוק", "srcRef": null, "txt": "אנו מעלים שזו פסיקה הלכתית הנמדדת לעומת אכילה מאותה קערה האסורה. מכך שהשתייה מאותה כוס מותרת אנו מדייקים שאפשר ללמוד שבקערה לא מדובר בטומאה וכד', אלא באמת בהרחקה מקרבה אינטימית, ובכוס מותר מפני שאי אפשר לשתות ממנה במקביל."}, {"layer": "acharon", "src": "מרדכי בשם ראבי\"ה", "srcRef": null, "txt": "**מרדכי** בשם **ראבי\"ה**:\n- גם בשתייה וגם באוכל – לא יאכל אחרי אשתו הנדה מאותה קערה, אלא יעביר לאחרת (ויכול להחזיר)\n- אבל, גם בקערה וגם בכוס, ההעברה הזו נצרכת רק אם היא איתו שם; אם היא לא שם - לא צריך להעביר. (משווה לדין הצעת המיטה שלא בפניו. משמע שהוא מדבר על סיטואציה שהם לא יחד פיזית אפילו. כוס שנשארה בבית על השלחן..)"}, {"layer": "rishon", "src": "היראים · מרדכי", "srcRef": null, "txt": "**היראים**, **מרדכי**: לא יאכלו וישתו יחד מפני הרגל עבירה [כלומר, שזה נטו הרחקה מקירוב]\nולא ישתה אחריה, אך היא יכולה אחריו\nאבל אם מעבירים מכוס לכוס אחרת - מותר\nהטעם: יצרו של הגבר גדול. ויהרהר הרהורי עבירה בעקבות השתיה אחר אשתו מאותה כוס"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: העולם נוהגים שלא לשתות משאריות שתייה של אשתו נדה\nוגם נהגו לשטוף את הכוס אחר ששתתה. ומנהג כשר הוא [קצת מייבא חששות מטומאה וכד', ולא קרבה]\nהטעם – יש קרבה אם הוא שותה אחריה, אבל לא להפך (למה?)"}, {"layer": "rishon", "src": "אורחות חיים", "srcRef": null, "txt": "**אורחות חיים**: באכילה מותר לאכול זה אחר זה מאותה קערה (שלא כמו הקונטרס לקמן)", "under": true}, {"layer": "acharon", "src": "דרכ\"מ", "srcRef": null, "txt": "**דרכ\"מ**: לא צריך להדיח.\nמנהגנו כסמ\"ק (/ר' פרץ) – צריך אדם אחר שיישתה באמצע.\nאבל אם אין אחר – מספיק להעביר לכוס אחרת (ואח\"כ אפשר אפילו להחזיר לכוס הראשונה)."}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.4", "txt": "**ש\"ע**: לא ישתה אדם משיורי כוס ששתתה אשתו נדה (**הגהות מיימ' בשם יראים**, **מרדכי**)"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: גם אם הוסיפו על מה שהשאירה – לא ישתה. רק אם סיימה לגמרי ואז הוסיפו; אבל אין צורך להדיח", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "**הרב עובדיה**: חולק אש\"ך... ועל הש\"ע – לשונו היא רק מנהג. זה לא איסור מוחלט. וכל ההיתרים הם לכתחילה", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: מותר לשתות מאותה הכוס אם אדם אחר שותה ביניהם (**ר' פרץ**)\nי\"א: שאסור לשתות מאותה הכוס כשהם ביחד בחדר, אך אם לא – מותר (בשם **ראבי\"ה**)\n(למרות הפער בעמדה הפורמלית, גם הרמ\"א וגם הש\"ע מחזיקים שהטעם הוא ריחוק מחיבה, במפורש)"}, {"layer": "acharon", "src": "יד אליהו", "srcRef": null, "txt": "**יד אליהו**: אם נכנסת תוך כדי ששותה – יכול להמשיך", "under": true}, {"layer": "acharon", "src": "ט\"ז (ד')", "srcRef": null, "txt": "**ט\"ז** (ד): אם הפסיק אחר ביניהם באכילה מותר", "under": true}, {"subsubhead": "אם האיש לא יודע"}, {"layer": "rishon", "src": "הגהות מיימ'", "srcRef": null, "txt": "**הגהות מיימ'**: אם שתתה מכוס מסוימת והוא לא יודע - לא צריכה להגיד לו לא לשתות (כי האיסור הוא מצד חיבה, ואם לא יודע - אין חיבה)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: פסק כן."}], "pesak": null}, "sheina": {"title": "הרחקות בחדר השינה", "seif": "ה׳–ו׳", "sugya": null, "ops": [{"subhead": "לשבת על מטתה (ה')"}, {"layer": "rishon", "src": "ראב\"ד · רמב\"ן", "srcRef": null, "txt": "**ראב\"ד, רמב\"ן**: אסור לאיש לישון במיטה של אשתו כשהיא נדה, אפילו אם היא לא במיטה (ק\"ו מזה שאסור לה להציע את המיטה בפניו)"}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "**טור**: אפילו אם היא לא בחדר אסור; ואפילו לשבת אסור\n(\\ul{הטעם של כולם: הרהור שמביא להרגל עבירה}. למרות שהיא לא שם (שונה מהראבי\"ה גבי אכילה ושתייה, שמבחינתו העיקר זה אם היא שם או לא))"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.5", "txt": "**ש\"ע**: לא יישב איש במטתו של אשתו הנדה, אפילו כשהיא לא שם (**ראב\"ד, רמב\"ן + טור**)"}, {"layer": "acharon", "src": "ב\"ח · ש\"ך", "srcRef": null, "txt": "**ב\"ח**, **ש\"ך**: לשבת מותר. אסור רק לישון (יש ט\"ס בטור)", "under": true}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "**ט\"ז**: מצדד בכך שהאיסור הוא גם על ישיבה", "under": true}, {"layer": "zman", "src": "שבט הלו ר ב'דרך חיבה', שהולכים לטיול; אבל לצרכים ועסקים, אפילו אם זה רק שניהם בעגלה - מותר (**תרוה\"ד**)\n+ וכל זה בתנאי שלא יגעו זה בזה (אוקימתתו ב**דרכ\"מ על תרוה\"ד**)"}], "pesak": null}, "levush_1": {"title": "הרחקות צניעות", "seif": "ז׳", "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "היוצא למעשה מהלכה זו, בעצם, הוא שהאשה צריכה להתלבש ליד בעלה כמו שמתלבשת מחוץ לבית. אולם לגבי כיסוי ראש, ישנה מחלוקת בין הפוסקים."}, {"layer": "gemara", "src": "נדרים כ", "srcRef": null, "txt": "**נדרים כ**:\n**רבי אחא ברבי יאשיה**: כל המסתכל בעקבה של אשה - הויין לו בנים שאינן מהוגנין.\n**רב יוסף**: ובאשתו נדה.\n**רבי שמעון בן לקיש**: עקבה = במקום הטנופת, שהוא מכוון כנגד העקב", "ref": {"label": "נדרים · כ", "ref": "Nedarim.20a"}}, {"layer": "note", "src": "הערה", "srcRef": null, "txt": "(יש ראשונים שחולקים חזיתית בהבנת הגמרא, האם האיסור הוא דווקא בבית התורפה, או בכל מקום מכוסה. עיין תורת השלמים בזה)"}, {"layer": "rishon", "src": "רשב\"א · טור", "srcRef": null, "txt": "**רשב\"א**, טור: מן העקב נלמד לכל מקום המכוסה (שנחשב כמקום טנופת)"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: אבל שאר מקומות ברור שמותר לו להסתכל (שהרי מותר לנדה להתקשט כדי שלא תתגנה על בעלה)", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "**רמב\"ם**: מותר להסתכל באשתו נדה למרות שיש לו הנאה מזה, משום שהיא מותרת לו בעתיד ולכן לא יכשל", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.7", "txt": "**ש\"ע**: לא יסתכל אדם בעקבה ובמקומות המכוסים של אשתו כשהיא נדה"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: אבל מותר להסתכל במקומות הגלויים, למרות שנהנה בראייתם (עפ\"י ב\"י וקצת רמב\"ם)"}, {"subsubhead": "כיסוי ראש"}, {"layer": "zman", "src": "שבט הלוי · דרכי טהרה", "srcRef": null, "txt": "**שבט הלוי**, **דרכי טהרה**: \\ul{השער שלה נחשב כמקום המכוסה} (שהרי מכסה אותו כשיוצאת מהבית מפני צניעות). ולמרות שבבית היא בלי כיסוי ראש – כשהיא נדה צריכה לכסות."}, {"layer": "zman", "src": "אגרות משה · פניני הלכה", "srcRef": null, "txt": "**אגרות משה**, **פניני הלכה**: אם בד\"כ היא בלי כיסוי ראש בבית - לא חייבת לכסות בביתה כשהיא נדה, אבל טוב להחמיר. (בימי האיסור היא צריכה להיות כמו שהיא בבית, ולא כמו בחוץ)", "under": true}, {"layer": "zman", "src": "טהרת הבית · בדי השלחן", "srcRef": null, "txt": "**טהרת הבית**, **בדי השלחן**: [בסיעת האג\"מ. אך לא הספקתי לעיין בפנים]", "under": true}, {"subsubhead": "שמיעת שירה"}, {"layer": "acharon", "src": "ערוה\"ש · בדי השלחן", "srcRef": null, "txt": "**ערוה\"ש**, **בדי השלחן**: אסור לשמוע קול זמר שלה; כמו כל הרחקה מערווה"}, {"layer": "zman", "src": "מנחת יצחק", "srcRef": null, "txt": "**מנחת יצחק**: אם מזמרת לעצמה – יש מקום להתיר; אבל אסור שתשיר לבעלה (הרגל עבירה-אינטימיות)", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "**הרב עובדיה**: המחמיר תבוא עליו הברכה, אך המקל לא הפסיד (ההיקש לערווה הוא אסמכתא בעלמא, ולא היקש ממש. לכן אין להקיש כל איסורי ערווה)", "under": true}], "pesak": null}, "levush_2": {"title": "בגדים מיוחדים (כסימן)", "seif": "ח׳", "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "נעיר, כי להבנת הש\"ע, בשונה מרוב ההרחקות שראינו בסימן, עניין ייחוד הבגדים לימי הנדה הוא פשוט לתת סימן ותזכורת לכך שהם אסורים; ואין מדובר כאן בסיטואציה של חיבה ואינטימיות."}, {"layer": "gemara", "src": "כתובות · רב יהודה", "srcRef": null, "txt": "**כתובות**:\n**רב יהודה**: הוחזקה נדה בשכנותיה - בעלה לוקה עליה\n**רש\"י**: שכנותיה ראוה לובשת בגדי נדות [אבל לבעלה אמרה שהיא טהורה]", "ref": {"label": "כתובות · עב", "ref": "Ketubot.72a"}}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "**טור**: ראוי לאשה שתייחד בגדים לימי נדותה"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: נראה שלמד כן ממה שכתב רש\"י", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.8", "txt": "**ש\"ע**: ראוי לאשה שתייחד בגדים לימי נדותה, כדי שיהיו שניהם זוכרים שהיא נדה (**טור**, ו**סברתו**)"}, {"layer": "zman", "src": "שבט הלוי", "srcRef": null, "txt": "**שבט הלוי**: אין צורך בסימנים שלא במקום אינטימיות וחיבה! למה שייזכרו כל הזמן שהיא נדה?\nמשיב: אכן אין צורך, אך ישראל קדושים"}, {"layer": "note", "src": "הערה", "srcRef": null, "txt": "[באתר **'יועצות'** נכתב שאכן ישנם זוגות הבוחרים ליצור סימנים שונים כדי לזכור את מצב האיסור, וביניהם לבוש מיוחד ותכשיטים]"}], "pesak": null}, "levush_3": {"title": "התקשטות", "seif": "ט׳", "sugya": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "כמו סעיף ח', גם סעיף זה אינו עוסק בהרחקה מסיטואציה של קרבה וחיבה, אלא דן בהיתר של האשה להתקשט בימים האסורים. ערוה\"ש רואה כאן מתח בשאלה של גורמים שונים להתגנות האשה על הבעל."}, {"layer": "gemara", "src": "שבת סד (פ' במה אשה יוצאת) · ברייתא", "srcRef": null, "txt": "**שבת סד (פ' במה אשה יוצאת)**\n**ברייתא**: **זקנים הראשונים** דרשו מ\"והדוה בנדתה\" - שלא תתקשט ותתאפר (למדו שהיא צריכה להיות רחוקה, ולכן שלא תתקשט)\n**ר' עקיבא** חלק: אם כן אתה מגנה על בעלה, ונמצא בעלה מגרשה (ולכן מותרת להתקשט)", "ref": {"label": "שבת · פרק במה אשה · סד", "ref": "Shabbat.64b"}}, {"layer": "note", "src": "הערה", "srcRef": null, "txt": "[**ערוה\"ש**: ב**כתובות** (פ' אעפ\"י) משמע דווקא שאם הנדה תתקשט - אז תתגנה על בעלה]"}, {"layer": "rishon", "src": "רמב\"ם · רי\"ף", "srcRef": null, "txt": "**רמב\"ם**, **רי\"ף**: מותר לאשה להתקשט בנדתה, כדי שלא תתגנה על בעלה"}, {"layer": "shulchan", "src": "טור · ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.9", "txt": "**טור-ש\"ע**: בקושי התירו לנדה להתקשט, אלא כדי שלא תתגנה על בעלה"}, {"layer": "acharon", "src": "ערוה\"ש", "srcRef": null, "txt": "**ערוה\"ש**: סעיפים ח' ו-ט' מביעים שני קולות סותרים. ח' – הקול של זקנים ראשונים, לפיו טוב שהאשה לא תתקשט ותהיה דוה בנדתה, ואם היא תתקשט – תתגנה על בעלה. לכן תשים בגדי נידות (מתוך הנחה שהם בגדים בלויים שאינם נחשבים קישוט)\nסעיף ט' – הקול של ר' עקיבא. שמותר לנדה להתקשט כדי לא להתגנות.\nיש אנשים שטבעם כזקנים הראשונים, ולראות את האשה מתקשטת בנדותה גורם להם לגינוי; יש אנשים שטבעם כר' עקיבא, שלראות את האשה בבגדים פשוטים – מתגנה עליו.\nהטור והש\"ע חושבים שבבסיס, ראוי לבחור בדרך של זקנים ראשונים, וליייחד בגדי נידות פחות טובים; אך בעקבות ר' עקיבא, התירו ('בקושי') לאנשים שטבעם כמותו להתקשט.", "expandable": true}, {"layer": "note", "src": "אתר יועצות", "srcRef": null, "txt": "איסור התקשטות שייך מצד הרחקות כדי שלא ליצור משיכה יוצאת דופן, אבל חשוב שהאשה לא תתגנה ותתלבש בצורה פחות נאותה מאשר ביום-יום. כנ\"ל לגבי אירוע."}, {"layer": "zman", "src": "פניני הלכה", "srcRef": null, "txt": "**פניני הלכה**: \"על בני הזוג לנהוג בימי האיסור בדרך האמצע, מצד אחד ייזהרו שלא לעורר את התשוקה שביניהם, ומאידך, ייזהרו שלא להפריז בריחוק זה מזה... שאחד הטעמים לימי האיסור הוא לחדש את הגעגועים והאהבה (\"תהא טמאה שבעה ימים, כדי שתהא חביבה על בעלה כשעת כניסתה לחופה\". נדה לא, ב). ואם בימי האיסור האשה תתגנה על בעלה או האיש יתגנה על אשתו, או ירגישו ריחוק רב מדי זה מזה, לא יזכו להתחדשות האהבה כשיחזרו להיות מותרים. לפיכך מותר לאשה להתקשט בימי נידתה, תוך זהירות שלא יעוררו את תשוקתם ויגיעו לידי עבירה.\""}], "pesak": null}, "melachot_1": {"title": "עשיית מלאכותיה לבעלה", "seif": "י׳–י״ב", "sugya": null, "ops": [{"subsubhead": "יסוד הדין (י')"}, {"layer": "gemara", "src": "כתובות סא (פ' אעפ\"י)", "srcRef": null, "txt": "**כתובות סא (פ' אעפ\"י)**:\n**רב הונא**: נדה יכולה לעשות מלאכות לבעלה, חוץ ממספר מלאכות: מזיגת הכוס, הצעת מיטה, רחיצת פניו ידיו רגליו\n**רש\"י**: כל מלאכות אלו אינטימיות (\"דברים של קירוב וחיבה, המביאים לידי הרגל דבר\")\n**רבא**: רק בפניו אסור שתעשה מלאכות אלו לבעלה; שלא בפניו - מותר\n**אשתו של שמואל** הייתה מוזגת ביד שמאל (בשינוי) — רש\"י: אבל רק בימי ליבונה, ולא בנדתה\n**אשתו של אביי**: הייתה מניחה ממרחק\n**אשתו של רבא**: הייתה מניחה למראשותיו (נ\"ל על הכרית)\n**אשתו של רב פפא**: הייתה מניחה לו על הספסל (=שלחן/מגש)", "ref": {"label": "כתובות · סא", "ref": "Ketubot.61a"}}, {"layer": "rishon", "src": "הרחבה — מה טעם ההרחקות?", "srcRef": null, "txt": "**מה טעם ההרחקות בעשייתה מלאכה לבעלה?**\n**סמ\"ג**: הכל פה הרחקה מחיבה ואינטימיות, ולא הרחקה מנגיעה.\n**רא\"ש**: זה כן משום מגע", "expandable": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.10", "txt": "**ש\"ע**: כל המלאכות שהאשה עושה לבעלה, יכולה לעשות נדה חוץ ממזיגה, הצעת מיטה ורחיצת פניו ידיו רגליו (**רב הונא בכתובות**)"}, {"layer": "acharon", "src": "של\"ה (בפת\"ש)", "srcRef": null, "txt": "**של\"ה** (בפת\"ש): המחמיר שומר מצרות נפשו", "under": true}, {"subsubhead": "מזיגת הכוס (י')"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "מה האיסור?"}, {"layer": "rishon", "src": "סמ\"ג · יראים", "srcRef": null, "txt": "**סמ\"ג**, **יראים**: רק הושטה מיד ליד. כי היא דרך חיבה"}, {"layer": "rishon", "src": "רא\"ש · רשב\"א", "srcRef": null, "txt": "**רא\"ש**, **רשב\"א**: אף מזיגה של הכוס והנחה לפניו היא דרך חיבה (וכל השינויים בגמרא - למזיגה והנחה)\n(אשתו של שמואל הייתה מוזגת בשמאל, ואז מניחה לפניו, ולא מושיטה)", "under": true}, {"layer": "note", "src": "רמב\"ם", "srcRef": null, "txt": "[**רמב\"ם**: לשונו בהלכות איסורי ביאה לא מכריעה, והב\"י פירשה שאוסר שינוי בכל מקרה. אבל לא התייחס הב\"י לכך שבהלכות אישות כותב במפורש כסמ\"ג: ברגיל - הושטה מיד ליד; שינוי – הנחה] (כסמ\"ג, ולא עובד עם הרא\"ש, כי לרא\"ש אסור הושטה לבד)"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "איך יהיה מותר?"}, {"layer": "rishon", "src": "הגהות בשם יראים", "srcRef": null, "txt": "**הסיעה שאוסרה רק הושטה**\n**הגהות בשם יראים**: רק מושיטה/מוזגת – מותר אפילו בלי שינוי; מושיטה + מוזגת – צריך שינוי"}, {"layer": "rishon", "src": "הגהות מיימ' · רשב\"א · מ\"מ · ב\"י", "srcRef": null, "txt": "**הסיעה שאוסרת אף מזיגה**\n**הגהות מיימ'**: רק 'מזיגה במים' אסורה ומצריכה שינוי; מזיגה 'מן הכלי' – על השלחן – צריך שינוי; לא על השלחן - אין חיבה ולא צריך שינוי\n**רשב\"א**, **מ\"מ**: רק מזיגת יין (ואלכוהול) אסורה; מזיגת מים מותרת\n**ב\"י**: כל מזיגה מותרת שלא בפניו (עפ\"י רבא)", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.11", "txt": "(נראה שהש\"ע לא פוסק כאחת מהשיטות האלו. אלא פשוט נוקט כגמרא ששינוי מועיל)\n**ש\"ע**: מותר לה למזוג הכוס ע\"י שתעשה שינוי להיכר\nכגון: שתניח הכוס על השלחן ביד שמאל; או: שתניחה על הכר או על הכסת (**עפ\"י הגמרא; כאשתו של שמואל ואשתו של רבא**)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: מגיהה בש\"ע: כל מזיגה שלא בפניו - מותרת (**ב\"י עפ\"י רבא**)"}, {"layer": "acharon", "src": "ט\"ז · ערוה\"ש", "srcRef": null, "txt": "**ט\"ז**, **ערוה\"ש**: האיסור הוא רק במזיגת יין (**רשב\"א**)", "under": true}, {"subsubhead": "הגשה"}, {"layer": "acharon", "src": "מהר\"ש מאוסטרייך", "srcRef": null, "txt": "**מהר\"ש מאוסטרייך**: אסור לה להגיש אוכל לשלחן שבת"}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: חולק, על סמך היראים: הגשה לשלחן זה רק פעולה אחת. היא לא שמה לו אישית בצלחת; בנוסף, אם הם לא לבד - אפילו שתשים בצלחת האישית שלו מותר.", "under": true}, {"subsubhead": "אם המזיגה לא בפניו אבל ההגשה כן"}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "**ב\"ח**: אסור. נחשב כפעולה אחת שנעשתה בפניו."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: חולק. מותר (כאמור, על סמך היראים)", "under": true}, {"subsubhead": "הצעת המיטה (יא')"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "עיקר הדין"}, {"layer": "gemara", "src": "רב הונא (כתובות) · רבא", "srcRef": null, "txt": "**רב הונא בגמרא בכתובות**: שאסור שנדה תעשה 3 מלאכות לבעלה ובניהן הצעת המיטה.\n**רבא**: אבל שלא בפניו מותר.", "ref": {"label": "כתובות · סא", "ref": "Ketubot.61a"}}, {"layer": "lead", "src": null, "srcRef": null, "txt": "מה אסור?"}, {"layer": "rishon", "src": "תוספות · רא\"ש", "srcRef": null, "txt": "**תוספות**, **רא\"ש**: רק פריסת סדינים והמכסה אסורה (רק זה דרך חיבה); אבל הצעת הכרים והכסתות מותרת (יש בזה טורח וזה לא דרך חיבה)"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.11", "txt": "**ש\"ע**: מותרת הצעת הכרים והכסתות אפילו בפניו; אבל פריסת הסדינים והמכסה מותרת רק שלא בפניו. (**רב הונא ורבא; תוספות רא\"ש**)"}, {"subsubhead": "רחיצת פנים וגפיים (יב')"}, {"layer": "gemara", "src": "רב הונא (כתובות) · רבא", "srcRef": null, "txt": "**רב הונא בגמרא בכתובות**: שאסור שנדה תעשה 3 מלאכות לבעלה ובניהן רחיצת פניו ידיו ורגליו.\n**רבא**: אבל שלא בפניו מותר (לא כ\"כ רלוונטי במלאכה הזו)", "ref": {"label": "כתובות · סא", "ref": "Ketubot.61a"}}, {"layer": "rishon", "src": "סמ\"ג · סמ\"ק · הגהות מיימ'", "srcRef": null, "txt": "**סמ\"ג, סמ\"ק, הגהות מיימ'**: האיסור תקף אפילו אם היא לא נוגעת בו ('יוצקת'. כי פשיטא שנגיעה אסור)"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "**רשב\"א**: אפילו במים קרים אסור", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.12", "txt": "וכן פסק **הש\"ע**: אסור לה לצקת מים על ידיו כשהיא נדה אפילו בלי שייגעו ואפילו מים קרים (**רב הונא + סמ\"ג וסמ\"ק + רשב\"א**)"}, {"subsubhead": "מותר לה להגיש לו כלי עם מים כדי שיירחץ בהם?"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "**ט\"ז**: כן"}, {"layer": "rishon", "src": "ר' יונה · ש\"ך", "srcRef": null, "txt": "**ר' יונה**, **ש\"ך**: אסור אפילו להגיש כלי עם מים (זה דרך חיבה)", "under": true}], "pesak": null}, "melachot_2": {"title": "מזיגתו כוס יין לה", "seif": "י״ג", "sugya": null, "ops": [{"layer": "note", "src": "הערה", "srcRef": null, "txt": "(אצל הש\"ע יש התייחסות לעשייתו מלאכות אלו לה רק לגבי מזיגת הכוס)."}, {"layer": "shulchan", "src": "רשב\"א · ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.13", "txt": "**רשב\"א, ש\"ע**: אסור לו למזוג לה יין כשם שאסור לה למזוג לו."}, {"subsubhead": "שליחת כוס של ברכה"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**גמרא**: המשגר כוס של ברכה לאשה שלא מדעת בעלה – חייב מיתה (כי זה רומנטי)"}, {"layer": "rishon", "src": "ראב\"ד", "srcRef": null, "txt": "**ראב\"ד** לפי זה: אסור לשלוח (בדרך חיבה) כוס של יין או כוס של ברכה לאשתו כשהיא נדה.\nוכן פסק **הש\"ע**."}], "pesak": null}, "cholim_2": {"title": "כשהוא חולה", "seif": "ט״ו", "sugya": null, "intro": "**ערוה\"ש · שבט הלוי:** כל הדיון פה – שלא בשעת פקוח נפש. בשעת פקוח נפש וסכנה – כולם מתירים הכל, כולל הש\"ע.\n\n**שורת הדין (ש\"ע עפ\"י הב\"י):** כשהוא חולה מותר לה לעשות הצעת המיטה ורחיצת פי\"ר, אבל צריכה להזהר בהן יותר. **ש\"ך:** גם מזיגה מותרת.", "ops": [{"layer": "rishon", "src": "רא\"ש בתשובה", "srcRef": null, "txt": "**רא\"ש בתשובה**: כשהאיש חולה, יכולה אשתו לשמשו אף אם היא נדה; אבל תזהר כמה שתוכל בהצעת המיטה וברחיצת פניו ידיו רגליו"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: מקשה - מה החידוש של הרא\"ש? הרי בכל אופן הלכה כרב הונא שנדה יכולה לעשות מלאכות לבעלה, חוץ מהשלושה (האינטימיות). מציע מספר תירוצים, אך נראה שנשאר בצ\"ע.\nתירוץ א: כשחולה, הרא\"ש מתיר גם הצעת המיטה ורחיצת פניו וגפיו. (\"שתזהר ביותר שתוכל\")\nתירוץ ב: כשחולה, מתיר את כל ההרחקות (כולל להושיט דבר אחד לשני וכו')"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.15", "txt": "**ש\"ע**: אם האיש חולה ואין מי שתשמשו מלבד אשתו, יכולה לשמשו נדה, \"רק שתזהר ביותר שתוכל\" מרחיצת פניו וגפיו והצעת המיטה (לשון **הרא\"ש**, ונראה שדק בתיבת 'שתוכל', כתירוצו הראשון)\\note{שכן, הטור השמיט תיבת 'שתוכל' והב\"י העיר על כך ונעץ בזה את תירוצו. לכן, מכך שהחזירה, אפשר לשער שאולי התכוון לכך. מה גם שכלל לא היה פוסק את דברי הרא\"ש אם לא היה מתרצה שיש בהם חידוש.}"}, {"layer": "acharon", "src": "ש\"ך · טהרת הבית", "srcRef": null, "txt": "**ש\"ך**, **טהרת הבית**: גם מזיגת הכוס מותרת (למרות שלא הזכירוה הרא\"ש והש\"ע)", "under": true}, {"layer": "zman", "src": "טהרת הבית · בדה\"ש", "srcRef": null, "txt": "**טהרת הבית, בדה\"ש**: שאר הדברים שמותרים – להשכיבו, לסומכו וכו' – עדיף שתעשה בלא מגע של ממש, אבל אם אי אפשר – יכולה אפילו במגע", "under": true}, {"layer": "acharon", "src": "ערוך השלחן", "srcRef": null, "txt": "**ערוך השלחן**: אם יש הכרח – מותר הכל (גם ה-3 מלאכות)", "under": true}, {"layer": "zman", "src": "דרכי תשובה", "srcRef": null, "txt": "**דרכי תשובה**: דין הסעיף כאן הוא בחושאב\"ס. אך מאחר וקשה להבחין בין חושאב\"ס לחושיב\"ס – יש המתירים גם את המלאכות שיש בהן חיבה.", "under": true}], "pesak": null}, "cholim_3": {"title": "כשהיא חולה", "seif": "ט״ז–י״ז", "sugya": null, "intro": "**ערוה\"ש · שבט הלוי:** כל הדיון פה – שלא בשעת פקוח נפש. בשעת פקוח נפש וסכנה – כולם מתירים הכל, כולל הש\"ע.", "ops": [{"layer": "rishon", "src": "תרוה\"ד", "srcRef": null, "txt": "**תרוה\"ד**: אסור לבעלה לעשות לה שום דבר שכרוך במגע (להקימה להשכיבה ולסומכה). ההיתר של הרא\"ש הוא רק לגבר חולה, ולא להפך (כי כשהגבר חולה ייצרו חלש, אבל להפך - ייצרו חזק וגובר עליו)."}, {"layer": "acharon", "src": "מהרמ\"מ · הגש\"ד", "srcRef": null, "txt": "**בשם מהרמ\"מ**, **הגש\"ד**: ההיתר של הרא\"ש הוא גם אם היא חולה, שמותר לאיש לשמשה\n**בשם מהרמ\"מ**: אותן שנזהרים מלגעת בנשותיהם החולות כשהן נדות - חסידות של שטות.", "under": true}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.16", "txt": "**ש\"ע**: כשהאשה חולה ונדה - אסור לבעלה לגעת בה כדי לשמשה, כגון להקימה או לסמכה (**תרוה\"ד**)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: **י\"א**: אם אין מי שישמש אותה - מותר לאיש הכל (דעתו על סמך הגש\"ד, מהרמ\"מ); וכן נוהגים אם 'צריכה הרבה' לעזרתו"}, {"layer": "acharon", "src": "רדב\"ז", "srcRef": null, "txt": "**רדב\"ז**: מותר הכל חוץ מה-3 מלאכות, ואפילו אם היא רק חושאב\"ס. ואם החולי שלה מצריך רחיצה - יכול להשליך עליה מים. ואם לא יכול לעשות כך - יכול לרחוץ ממש", "under": true}, {"layer": "zman", "src": "תורת הטהרה", "srcRef": null, "txt": "**תורת הטהרה**: מותר לשמשה בכל שימוש שאין בו מגע. כולל מסירה ומזיגה וכו'.", "under": true}, {"subsubhead": "כשבעלה רופא (יז)"}, {"layer": "rishon", "src": "תרוה\"ד · תשובות הרשב\"א המיוחסות לרמב\"ן", "srcRef": null, "txt": "**תרוה\"ד**, **תשובות הרשב\"א המיוחסות לרמב\"ן**: אסור לרופא לבדוק את הדופק של אשתו כשהיא נדה.\nבתשובה המיוחסת לרמב\"ן המקרה הוא שיש עוד רופאים, ואז אולי משמע שאסור לו לבדוק אותה רק כשיש אופציה אחרת."}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "**ב\"י**: גם תרוה\"ד וגם הרמב\"ן/רשב\"א אוסרים גם כשאין רופאים אחרים.\n**ב\"י**: אבל אם מדובר בחולי מסוכן, ואין רופא אחר, אולי יכול לבדוק אותה"}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.195.17", "txt": "**ש\"ע**: אם בעלה רופא – אסור לו לבדוק לאשתו נדה את הדופק (**הבנתו בתרוה\"ד ותשובת הרשב\"א**)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "**רמ\"א**: לפי מה שכתבתי על שימושה אם היא חולה – ק\"ו שיכול לבדוק את הדופק שלה (אבל רק אם אין רופא אחר, וצריכה הרבה, וזהו חולי שיש בו סכנה)."}, {"layer": "acharon", "src": "ש\"ך", "srcRef": null, "txt": "**ש\"ך**: מצדד ברמ\"א. אבל באמת, אם אין סכנה - אסור לבעלה לבדוק.", "under": true}, {"layer": "acharon", "src": "רדב\"ז", "srcRef": null, "txt": "**רדב\"ז** (דלעיל): מתיר לבודקה אפילו אם רק חושאב\"ס", "under": true}, {"layer": "acharon", "src": "מקור חיים", "srcRef": null, "txt": "**מקור חיים**: אפשר להתיר (גם לש\"ע) ע\"י שישים בגד, ולא ייגע ישר בגופה", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "פתיחה"}, {"type": "sec", "id": "prisha"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "negia"}, {"type": "group", "title": "הרחקות באכילה ושתייה", "spans": "ג׳–ד׳", "children": ["achila_1", "achila_2", "achila_3"]}, {"type": "sec", "id": "sheina"}, {"type": "sec", "id": "merchav"}, {"type": "group", "title": "לבוש והתקשטות", "spans": "ז׳–ט׳", "children": ["levush_1", "levush_2", "levush_3"]}, {"type": "group", "title": "עשיית מלאכות זה לזה", "spans": "י׳–י״ג", "children": ["melachot_1", "melachot_2"]}, {"type": "group", "title": "הרחקות כשחולים", "spans": "ט״ו–י״ז", "children": ["cholim_2", "cholim_3"]}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"ימי ליבונה": " — ימי השבעה נקיים שאחרי הפסקת הראייה, שבהם האשה עוברת לטהרה; ההרחקות והאיסור בתשמיש חלים בהם כבימי הנידה עצמה.", "הרחקות": " — גדרים של ריחוק פיזי בין האיש לאשתו בימי טומאתה, שיסודם בפסוק \"ואל אשה בנדת טמאתה לא תקרב\"; נחלקו אם מדאורייתא (רמב\"ם) או מדרבנן (רמב\"ן).", "היכר": " — סימן או שינוי (לחם, קנקן, מפה נפרדת) המונח בשעת אכילה יחד, כתזכורת למצב האיסור וכיוצר ריחוק.", "דרך חיבה": " — פעולה או מצב שיש בהם קרבה ואינטימיות (ולא רק מגע); אבן הבוחן להרבה מן ההרחקות.", "חושאב\"ס": " — חולה שאין בו סכנה.", "חושיב\"ס": " — חולה שיש בו סכנה.", "מזיגת הכוס": " — מזיגת כוס יין/משקה והנחתה לפני הבעל; אחת מ-3 המלאכות האינטימיות שאסור לנדה לעשות לבעלה בפניו.", "בגדי נידות": " — בגדים מיוחדים שראוי לאשה לייחד לימי נדותה, כסימן ותזכורת לשני בני הזוג שהיא נדה."}, "subject": "נידה"}, {"topic": {"title": "דם חימוד", "eyebrow": "מבחני הרבנות · נידה · סימן קצ\"ב", "siman": "Shulchan_Arukh,_Yoreh_De'ah.192", "intro": {"lead": {"t": "", "ref": ""}, "body": "אשה שנקבע מועד נישואיה ('תבעוה להנשא ונתפיסה') צריכה לשבת שבעה נקיים קודם החופה, מחשש 'דם חימוד' — שמא מתוך התשוקה וההתרגשות לקראת הנישואין ראתה טיפת דם.\n\nסימן זה עוסק בגדרי הספירה (ממתי, כמה בדיקות), בשאלת הגורם לחימוד (ההודעה על החתונה או ההתקרבות אליה), בדחיית הנישואין ובחימוד מחודש, וכן בדיני זוג האסורים להתייחד אחר חופתם (שעבר וכנס, או שפרסה נדה קודם ששימשו)."}}, "sections": {"ikar": {"title": "עיקר הדין", "seif": "סעיף א׳", "sugya": null, "ops": [{"layer": "gemara", "src": "גמרא · רבא", "srcRef": null, "txt": "**רבא**: אשה שתבעוה להנשא ונתפיסה (שנקבע לה תאריך להנשא) - צריכה לשבת 7 נקיים בשבוע שקודם החתונה.\nוהגמרא מנמקת שהטעם הוא משום דם חימוד.\n(ההנחה היא שעצם הקביעה של הנישואין, הרעיון שהיא הולכת להתחתן, גורם ליציאת דם חימוד ותשוקה.)", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"subhead": "אם הייתה טהורה בזמן שתבעוה?"}, {"layer": "lead", "srcRef": null, "txt": "הגזרה של רבא עוקפת את ההגיון הפשוט. כמו חשש שכבת זרע (קצו, סע' יא) כך כותב הרשב\"א:"}, {"layer": "rishon", "src": "רשב\"א וכל הפוסקים", "srcRef": null, "txt": "גם אם בזמן התביעה בדקה עצמה ונמצאה טהורה - צריכה 7 נקיים. יש חשש שראתה טיפת דם כחרדל ונאבד (ב\"י: פשיטא. אחרת מה רבא גוזר)"}, {"layer": "rishon", "src": "ראבי\"ה", "srcRef": null, "txt": "אם בדקה עצמה ביום התביעה ואין דם – לא צריכה 7 נקיים", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "דוחה. כל הראשונים חולקים על זה.", "under": true}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.1", "txt": "אשה שתבעוה להנשא והסכימה – צריכה לשבת 7 נקיים (רבא בגמרא), ואפילו אם בדקה עצמה ב'יום התביעה' (רשב\"א; ולא כראבי\"ה)"}, {"subhead": "מה צריכה כדי להתחיל את ה-7 נקיים?"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "לא צריכה לא הפסק טהרה, ולא בדיקה, רק להמתין ולספור 7 נקיים"}, {"layer": "rishon", "src": "רא\"ש, רמב\"ן", "srcRef": null, "txt": "צריכה בדיקה (אבל לא הפסקת טהרה)"}, {"layer": "rishon", "src": "ב\"י ברא\"ש", "srcRef": null, "txt": "לרא\"ש ורמב\"ן, כמה בדיקות צריכה? לכתחילה צריכה בדיקה בכל יום; בדיעבד מספיקה רק בדיקה אחת (ב\"י: אין סיבה שיחמיר בה יותר מרואה ודאית; ב-קצו, הש\"ע סבר שבדיעבד סגי לרואה בבדיקה אחת בכל התקופה)", "under": true}, {"layer": "rishon", "src": "ב\"י ברמב\"ן", "srcRef": null, "txt": "לכתחילה צריכה רק בדיקה אחת בכל התקופה", "under": true}, {"layer": "acharon", "src": "ב\"ח", "srcRef": null, "txt": "גם לרמב\"ן צריכה בכל יום", "under": true}, {"layer": "rishon", "src": "ר\"ן בשם י\"א", "srcRef": null, "txt": "צריכה 7 נקיים, בדיקה וגם הפסק טהרה."}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.1", "txt": "אשה שתבעוה להנשא וצריכה לשבת 7 נקיים על דם חימוד -\n+ מתחילה את הספירה ממחרת 'יום התביעה' (רשב\"א)\n+ לא צריכה הפסק טהרה, אבל צריכה בדיקה במהלך הספירה (רא\"ש, רמב\"ן)\n+ (ומשמע שמתכוון שצריך בדיקה אחת בכל השבעה, ולא כל יום; כהבנתו ברמב\"ן)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "לכתחילה צריכה בדיקה בכל יום במהלך הספירה, ובדיעבד אם בדקה רק פעם אחת - סגי (ב\"י ברא\"ש)"}, {"layer": "acharon", "src": "ב\"ח, מהרש\"ל, ש\"ך", "srcRef": null, "txt": "המנהג האידנא לעשות הפסק טהרה. וכרמ\"א (לכתחילה בדיקה כל יום)"}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "במובן מסוים, גזירת רבא יושבת על אותו חשש של גזירת כתמים. שניהם יושבים על החשש שאשה יכולה לדמם בלי להרגיש. (משמע מדבריו שתכלס מדובר בטומאה דרבנן. כי ברור שלא ראתה)"}, {"subhead": "נימוקי הדעות"}, {"layer": "lead", "srcRef": null, "txt": "למה בעצם נחלקו הראשונים אם צריך בדיקה/הפסק טהרה? הנימוקים עמוקים — לחצו להרחבה."}, {"layer": "rishon", "src": "רשב\"א — הנימוק", "srcRef": null, "txt": "מתבסס על שיטת רב חביבא (באופן קצת לא ברור). לדידו, צריכה רק להמתין ז' נקיים. צריך רק שלא תרגיש דם בז' ימים האלו. נ\"ל שהרשב\"א – בדומה למה שינמק הרא\"ש – רואה בדברי רבא דבר מנותק לגמרי מר' זירא. לפיכך, לא רואה עניין אפילו בבדיקה.\nהוא תמה על שיטת הרמב\"ן (והרא\"ש). או שמסתכלים על אשה כזו כמי שראתה – ואז צריכה גם הפסק טהרה - או שלא. אין משמעות שרק תספור ותבדוק בלי הפסק טהרה.", "expandable": true}, {"layer": "rishon", "src": "רא\"ש — הנימוק", "srcRef": null, "txt": "הסתמכותו של הרשב\"א על מעשה דרבינא אינה מחזיקה. בנוסף, אין משמעות לישיבה של 7 נקיים בלי שתבדוק שהיא נקייה.\nהרא\"ש סובר שכל הדיון במעשה קורה עוד בערב התביעה, ושום דבר לא קורה בדיעבד. לפיכך, ר' חביבא משתכנע מראש מדברי רבי חנינא שאין הבדל בין גדולה לקטנה, ולכן מפריש את בתו הקטנה 7 ימים קודם החופה (ולכן אין 'שיטת ר' חביבא', כמו שהרשב\"א סובר).\nהרא\"ש מנמק מדוע לא צריך הפסק טהרה: המימרא של רבא היא קדם-חומרת דרבי זירא. לפיכך, אין לה דרישה של ז' נקיים כמו שרבי זירא דורש, ולכן אין צורך בהפסק טהרה. לא מדובר באשה שראתה (שעליה מוחלת חומרת דר' זירא), אלא עניין ה-7 נקיים של רבא הוא נטו מחשש שתראה בעקבות החימוד. זה לא ז' נקיים באמת. המספר המשותף, לרא\"ש, יכול להיות אקראי. רבא חושש לדם חימוד, וקובע כי החשש הזה חל 7 ימים לפני, אבל אין קשר ל-7 נקיים.", "expandable": true}, {"layer": "rama", "src": "דרכ\"מ בשם הגהש\"ד", "srcRef": null, "txt": "קודם שחתן נוגע בכלתו – צריך לשאול אותה אם שמרה 7 נקיים. וכ\"פ רמ\"א (סע' ב')"}], "pesak": null}, "mesulakot": {"title": "אצל מסולקות דמים", "seif": null, "sugya": null, "ops": [{"subhead": "קטנה"}, {"layer": "gemara", "src": "גמרא · רבינא בשם רבא", "srcRef": null, "txt": "הסיפור של רבינא ורבי חביבא. בעקבותיו אומר רבינא בשם רבא: אין הבדל בדין בין גדולה לקטנה", "ref": {"label": "נדה · פרק תינוקת · סו ע\"א", "ref": "Niddah.66a"}}, {"layer": "shulchan", "src": "ש\"ע", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.1", "txt": "בין גדולה בין קטנה שתבעוה להנשא - צריכה לשבת 7 נקיים (רבינא בשם רבא, גמרא)"}, {"subhead": "זקנה"}, {"layer": "acharon", "src": "גבעת שאול", "srcRef": null, "txt": "גם זקנה מסולקת דמים צריכה לשבת 7 נקיים"}, {"subhead": "מעוברת"}, {"layer": "acharon", "src": "תורת השלמים", "srcRef": null, "txt": "אשה שהיתה מעוברת, ואח\"כ החליטה להנשא – צריכה למנות 7 נקיים"}], "pesak": null}, "matai": {"title": "מתי מתחילה הספירה?", "seif": "סעיפים א׳-ב׳", "sugya": null, "intro": "השאלה הזאת משמעותית, מפני שהיא נוגעת בשאלה: מה בעצם גורם לדם החימוד? הקביעה עצמה של החתונה? והאם ההתקרבות לחתונה לא מגדילה את החשש? אם כן, מה ייקרה כאשר יש הפרש של יותר משבוע מיום התביעה ועד החתונה? האם נגיד שהיא צריכה להמשיך לשבת למרות שנגמרו ה-7 נקיים?\nהש\"ע פוסק בפשטות בסע' א' כרשב\"א כי הספירה מתחילה יום אחרי התביעה, אך בסע' ב' הוא והרמ\"א מעמיקים בשאלה זו.", "ops": [{"layer": "acharon", "src": "מה גורם לחימוד? — עיון", "srcRef": null, "txt": "מסתבר שהרא\"ש מייצג את העמדה שהקרבה לחופה גורמת לחימוד, ולא ההודעה על החופה. החמוד מתחיל שבוע לפני החופה.\nוהרשב\"א וריב\"א סוברים שההודעה על החתונה וההכנות לחופה גורמים לחימוד (גם אם זה יותר משבוע לפני החופה).\n(לכן, לדעת ריב\"א, אם ההודעה על החתונה היא יותר משבוע לפני החופה - אין שום צורך ב-7 נקיים)\n(זו לא בדיוק שאלה שיש בה הכרעה של הפוסקים. אבל ייתכן שהש\"ע נוטה לרשב\"א (הודעה), והרמ\"א לרא\"ש (קרבה לחופה), עפ\"י פסיקתם לקמן. אך מסע' א' משמע שהש\"ע חושש כרא\"ש. וכ\"כ הט\"ז)", "expandable": true}, {"layer": "rishon", "src": "ריב\"א", "srcRef": null, "txt": "רק אם המרחק בין ההסכמה לנישואין לחופה הוא קצר - צריכה לשבת 7 נקיים. אם יש פער של יותר מ-7 ימים בין ההסכמה לחופה - לא צריכה 7 נקיים (!)."}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "כולם דוחים את הריב\"א. הרשב\"א אומר בדיוק ההפך.", "under": true}, {"layer": "lead", "srcRef": null, "txt": "(שווה לעיין ברב מלמד. יענה על מתי צריך את ה-7 נקיים. נראה שמייצר איזון מעניין בין הרא\"ש לרשב\"א.)"}, {"subhead": "ממתי מתחילה לספור? (ביחס לחופה)"}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "הספירה מתחילה יום אחר התביעה (התביעה גורמת, אבל יום התביעה עצמו לא נספר). וכן פסק בש\"ע.\nומתחילים לספור את ה-7 נקיים משעה שמתחילים להכין את החופה ('מכי רמו שערי באסינתא')"}, {"layer": "shulchan", "src": "ש\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.2", "txt": "מתחילים למנות את ה-7 נקיים בשעה ש'סומכת בדעתה ומכינה עצמה לחופה', אעפ\"י שלא נתקדשה עדיין (רשב\"א).\n(הרשב\"א כתב גם שמתחילה את הספירה יום אחר התביעה, וכן פסק הש\"ע בסע' א. נ\"ל שצריך לומר שמדובר מבחינתם באותו דבר)"}, {"subhead": "כמה סמוך לחופה צריכה לסיים לספור? (רמ\"א ב')"}, {"layer": "rishon", "src": "דרכ\"מ ברשב\"א", "srcRef": null, "txt": "ה-7 נקיים לא בהכרח אמורים להסתיים סמוך לחופה. יכולה לסיים לפני."}, {"layer": "rishon", "src": "מרדכי, רשב\"ם, רוקח", "srcRef": null, "txt": "הספירה צריכה להתחיל 7 ימים בדיוק מן הבעילה הראשונה. לכן, הטבילה צריכה להיות בלילה שקודם לכן (ההתקרבות לחופה גורמת לחימוד)"}, {"layer": "rishon", "src": "הגהות מיימ'", "srcRef": null, "txt": "אם אחר ה-7 נקיים, לאחר שטבלה, לא נבעלה - צריכה להבדק כל יום עד שתבעל (כי סוברים כרא\"ש: שכל עוד לא נבעלה, כל יום שמתקרבת לקראת הבעילה יש חשש חימוד)"}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "רק לכתחילה צריכה להבדק כל יום (אם יש פער בין הטבילה לתשמיש). בדיעבד – מסתפקת אפילו בבדיקה שעשתה ב-7 נקיים", "under": true}, {"layer": "rama", "src": "רמ\"א · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.192.2", "txt": "+ הטבילה לקראת בעילת מצווה צריכה להעשות כמה שיותר קרוב (מרדכי, רוקח).\n+ והמנהג הוא שאם כלה מתחתנת ביום ד', תטבול אז, למרות שלא ישמשו עד מוצ\"ש (כלומר גג 3 ימים הפרש בין הטבילה לבעילה).\n+ אם בעילת מצווה לא תקרה עד 3 ימים אחר ה-7 נקיים – לכתחילה צריכה לבדוק כל יום (הגהות מיימ'). אבל בדיעבד יכולה להסתפק אפילו בבדיקה שעשתה ב-7 נקיים (ב\"י)"}], "pesak": null}, "dachu": {"title": "אם דחו את הנישואין", "seif": "סעיף ג׳", "sugya": null, "intro": "נקדים שהדיון פה הוא השלכה מתבקשת של שאלת הגורם לדם החימוד. בדברי המהרמ\"מ בשם הרשב\"ם אין ממש נטייה לרשב\"א או לרא\"ש, אלא פשוט יישום של עיקר הדין.", "ops": [{"layer": "acharon", "src": "עיון — הגורם לחימוד מחודש", "srcRef": null, "txt": "בעז\"ה אכתוב יותר באריכות, אף כי אולי לא מאוד נצרך.\nלקמן אציע מדברי הט\"ז כי מוצע כאן גורם חדש לדם החימוד: התרגשות מחודשת מהחופה (לאחר שהבטחון נשמט).\nעל אף שהרשב\"ם לא בהכרח מביע נטייה לרשב\"א או הרא\"ש בשאלת הגורם לחימוד, זו כן שאלה טובה כיצד יש להבין את המהרמ\"מ ברשב\"ם. את שימושו של הט\"ז בביטוי 'סומכת בדעתה' המופיע בלשון הרשב\"ם, ניתן להבין כבטחון בכך שהחופה אכן תקרה. לפיכך, המקרה עליו מדבר המהרמ\"מ צריך לשאת התפתחות לפיה יש לכלה חשש שהחתונה לא תקרה. שכן, אם כך יהיה, כאשר לבסוף יישתנו שוב העניינים, ויחליטו במחודש על קיום החתונה – תתרגש כ\"כ הכלה במידה שתגרום לחימוד. לכן סובר הט\"ז שרק שינוי שפירושו ביטול של החתונה יכול להיות שינוי כזה.\nנראה שהלבוש נצרך לדחוק פחות בלשון המהרמ\"מ, ומבין כי 'סומכת בדעתה' הוא מושג שמתכוון לסמיכות האירוע. הוא סובר שהחימוד אינו בריגוש מעצם התכנות החתונה וההודעה עליה, אלא בהתקרבות לחופה עצמה ולמועד שלה (ובדומה לרא\"ש). לכן, גם דחייה פשוטה של תאריך תיצור בהמשך התרגשות נוספת, כששוב ייתקרב האירוע.\nנראה לי שניתן להציע הבנה של רק דחייה של התאריך, ולא ביטול של ממש, תוך אחיזה בסברת הט\"ז שההודעה על החתונה והקביעה שלה גורמת לחימוד. הבנה כזו אפשרית במקרה בו למרות שמדובר 'רק' בדחייה, הרי שהיא מערערת את התכנות החתונה. עיון בלשון המרדכי בפנים מאשר אפשרות זו: הוא מציג מקרה בו הדחייה מגיעה מפני שההורים של בני הזוג לא מגיעים להסכמה בענייני הנדוניה או ההוצאות על החתונה. מובן אם כן כי דחייה מסיבות כאלו מערערת את ההתכנות של החתונה, וגורמת לייאוש אצל הכלה.\nלשון הש\"ע קרובה יותר להבנת הט\"ז (ובלשון המרדכי-מהרמ\"מ בפנים) שמדובר בספק ממשי על התכנות החתונה, שכן כותב ש\"דחו את הנישואין מאיזו סבה.. כשיתפשרו לעשות הנשואין\".", "expandable": true}, {"layer": "rishon", "src": "מהרמ\"מ (בשם רשב\"ם)", "srcRef": null, "txt": "אם קבעו נישואין, ישבה 7 נקיים, אבל לאחמ\"כ דחו את התאריך – צריכה לשבת שוב שבעה נקיים (משום שלא 'סומכת בדעתה' שהנישואין אכן ייקרו, וכשנקבע)"}, {"layer": "rishon", "src": "מהרי\"ק", "srcRef": null, "txt": "מביא מחלוקת שונה: אם דחו את החופה ביום יומיים (באמצע או בסוף ה-7 נקיים), האם יכולה להמשיך בבדיקות עד החופה, או שצריכה לספור שוב 7 מההתחלה? (נפק\"מ אם יוכלו לשמש סמוך לחופה או שיחכו כמה ימים)"}, {"la
