כבין. ואילו הם המעכבין – בשר החופה אפילו רוב גובהה של עטרה."}, {"layer": "rishon", "src": "והר\"ן", "srcRef": null, "txt": "סבר שזמן העיסוק הוא אפילו אם הפסיק את החיתוך, אבל הסתפק לגבי שלב המציצה, אם נחשב עדיין עיסוק ומותר לחזור לציצין אלו.", "under": true}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "סבר שנחשב שעוסק במצוות המילה, ויכול לחזור.", "under": true}], "pesak": null}, "safek": {"title": "ספק צריך מילה / ספק נולד בחודש שמיני", "seif": "סעיף ג׳", "sugya": null, "intro": "בסימן ש\"ל, ראינו עפ\"י הברייתא בקל\"ה, שאין מחללין את השבת על תינוק שנולד בחודש השמיני או שספק אם נולד בחודש השמיני (ככה\"נ מנק' הנחה שהוא בוודאי ימות, וזה אפילו לא ספק פיקוח נפש). אולם, אם גמרו שערותיו וציפורניו, נחשב שנולד בחודש השביעי ולכן מותר. וכן, שהה שלושים יום ויותר – מחללים.\nלפיכך, נפקא מינא גם לגבי מילה. שהרי אם אין מחללים את השבת על בן חודש ח'/ספק בן חודש ח' - משמע שגם לא מלים אותו.", "ops": [{"layer": "gemara", "src": "ברייתא · גמרא · רב אדא בר אהבה", "srcRef": null, "txt": "**ברייתא**: אין מחללין את השבת על תינוק שנולד בחודש ה-8/ספק חודש 8\n**גמרא**: **רב אדא בר אהבה** סובר שספק נולד בחודש 8, מותר למול, וממאי נפשך? אם הוא בן שבעה ויחייה– וודאי מותר למול; אם בן שמונה – אז רק חתך בבשר (ולא חבורה, האסורה בשבת).\nובאמת מסבירים שרק מכשירי מילה אסורים לצורך מילת ספק 8.", "ref": {"label": "שבת · פרק ר\"א דמילה · קלה", "ref": "Shabbat.135a"}}, {"layer": "lead", "srcRef": null, "txt": "האם קיי\"ל כרב אדא בר אהבה, או שאסור עפ\"י פשט הברייתא?"}, {"layer": "rishon", "src": "רי\"ף ורא\"ש", "srcRef": null, "txt": "מביאים רק את הברייתא, ולא את הסברא של רב אדא להתיר"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "לכן משמע שהרי\"ף אוסר למול ספק בן שמונה (ואם היה מתיר היה מוריד את הברייתא ומביא את רב אדא בר אהבה)", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "חולק על קריאת הר\"ן ברי\"ף שלפיה משתמע שאוסר בכל ספק 8.\nמעמיד את מה שאסרה הברייתא למול דווקא בשלא גמרו שערותיו וציפורניו. אבל אם גמרו – מותר למול את הוולד אפילו אם הוא נולד בחודש שמיני בוודאות. ואין צורך להעמיד כרב אדא.\nלכן: ספק נולד לשמונה – אסור, אלא אם גמרו שערותיו ציפורניו. וכך סובר גם בדעת הרמב\"ם", "under": true}, {"layer": "shulchan", "src": "וכן פסק בשו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.3", "txt": "בן שמונה- אסור למול אותו. ספק בן שמונה – מותר אם גמרו שערותיו וציפורניו"}, {"layer": "rama", "src": "והרמ\"א (יו\"ד רסו)", "srcRef": null, "txt": "סובר כדעת הטור והר\"ן שמלין כל ספק בן שמונה (אפילו לא גמרו)"}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "'נהרא נהרא ופשטיה'. כלומר, כל אחד ומנהגו."}, {"layer": "lead", "srcRef": null, "txt": "ובכל מקרה, כיום וודאי שדין נולד לחודש שמיני אינו רלוונטי, כאשר יש לנו רפואה מתקדמת וכו'. אולם, לא נמול פג בכל מקרה משום שיש לו בכך סכנה."}], "pesak": null}, "mahul": {"title": "מהול, אנדרוגינוס ונולד בבין השמשות", "seif": "סעיף ה׳", "sugya": null, "intro": "שתי קבוצות נוספות של וולדים שאין מחללים עליהם את השבת במילתם:\n1) ספק אם חייבים במילה בשבת: אנדרוגינוס, מהול, ונולד בבינה\"ש\n2) לא צריכים מילה ביום השמיני משום שהיולדת לא נטמאה", "ops": [{"layer": "gemara", "src": "בברייתא", "srcRef": null, "txt": "למדים שרק מי שחייב במילה בוודאות דוחים בעבור מילתו את השבת. אבל אם הוא בספק אם חייב במילה – לא מחללים עליו.\nוהם: אנדרוגינוס (שספק אם הוא זכר או נקבה); נולד בבין השמשות (ספק אם נולד בשישי או בשבת, לכן ספק אם היום ה-8 הוא שבת או ראשון); נולד מהול (ספק אם צריך להטיף ממנו דם ברית)"}, {"layer": "gemara", "src": "רבי אסי", "srcRef": null, "txt": "לא צריכים מילה ביום ה-8 (מחלוקת אביי ורבי אסי): יוצא דופן; תינוק שאמו הייתה נכרית כשנולד ולאחמ\"כ התגיירה.\nולדעת רבי אסי, הסמיכות של 'אשה כי תזריע וילדה ונטמאה' ו'ביום השמיני ימול בשר עורלתו', מלמדת שרק אם היולדת נטמאה בלידתה מלים את התינוק ביום השמיני ומחללים עליו את השבת.\nומאחר ותינוק יוצא דופן לא יצא מן הפתח וטימא את היולדת, ותינוק של נכרית אין לה מה להטמא – אין מלים אותם ביום השמיני, וכל שכן שלא מחללים את השבת על מילתם."}, {"layer": "rishon", "src": "אנדרוגינוס — ת\"ק · ר' יהודה", "srcRef": null, "txt": "במשנה מחלוקת ת\"ק ור' יהודה. ור' יהודה מתיר באנדרוגינוס. הרמב\"ם פוסק כת\"ק, והר\"י פוסק כרבי יהודה."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.5", "txt": "פוסק כרמב\"ם, שאין מילתו של אנדרוגינוס דוחה את השבת.\nוכן, פסק לגבי כל המקרים עפ\" הברייתא והגמרא, לגבי מילה של מהול ונולד בבינה\"ש, שלא מחללים עליהם את השבת מספק.\nוגם עפ\"י דברי רבי אסי, שוולד שאמו לא נטמאה בלידתו – אין מילתו דוחה את השבת (משום שאינה חייבת להעשות ביום השמיני)"}, {"subhead": "מתי נחשב שנולד התינוק (כדי לבדוק את הספק)?"}, {"layer": "gemara", "src": "במסכת נידה", "srcRef": null, "txt": "למדים ממעשה של רבא אם התינוק הוציא ראשו מן הפרוזדור (היינו פתח גופה) – נחשב שנולד."}, {"layer": "acharon", "src": "הבה\"ל", "srcRef": null, "txt": "כתב, שאם יודעים מתי הוציא הוולד את הראש – סופרים שמונה ימים מרגע זה."}], "pesak": null}, "shelo": {"title": "מילה שלא בזמנה", "seif": "סעיף ד׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא · שו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.4", "txt": "רק מילה בזמנה דוחה את השבת. ומילה שלא בזמנה – אינה דוחה. וכך בברייתא בפרקנו (קלב:). זאת משום שהמילה מותרת בשבת בגלל הדווקאיות של יום השמיני. אבל אם אין המילה תעשה ביום השמיני (מסיבות רפואיות כאלו ואחרות), וודאי שאין היא דוחה. מה גם, שאפשר למול אותו בכל זמן אחר. וכן להלכה בשו\"ע.", "ref": {"label": "שבת · פרק ר\"א דמילה · קלב ע\"ב", "ref": "Shabbat.132b"}}, {"layer": "acharon", "src": "התשב\"ץ", "srcRef": null, "txt": "ולפיכך, כתב (וראינו דבריו בסעיף ט') שאין למול את וולד שמילתו לא תתקיים בזמנה ביום חמישי; כדי שהיום השלישי לא ייצא בשבת ויהיה צורך לחלל עליו (שהרי מאחר וכבר אין המילה תתקיים ביום השלישי, אין עניין ביום מסוים; ולכן יש להמנע מכניסה למצב של חילול שבת שאינו מתחייב)."}, {"layer": "acharon", "src": "והמג\"א והש\"ך", "srcRef": null, "txt": "חולקים על כך.", "under": true}, {"layer": "zman", "src": "והרב עובדיה", "srcRef": null, "txt": "סבר שיש להחמיר כדעת התשב\"ץ. וציין שהיו מי שהקלו כדעת המג\"א והש\"ך"}], "pesak": null}, "mi": {"title": "למי מותר למול", "seif": "סעיף י׳", "sugya": null, "ops": [{"layer": "lead", "srcRef": null, "txt": "**לגבי ניסיון מילה:** עפ\"י סוגיה בביצה, שמבארת שאסור לטרוח שלא לצורך מצווה או היתר"}, {"layer": "rishon", "src": "המרדכי", "srcRef": null, "txt": "שאסור לאדם שלא מל לעולם למול בשבת, משום שעלול להכשל במילתו, ולקלקל שלא לצורך מצווה"}, {"layer": "rishon", "src": "ותרומת הדשן", "srcRef": null, "txt": "כתב שאם מל פעם אחת -סגי"}, {"layer": "lead", "srcRef": null, "txt": "**לגבי אביו:**"}, {"layer": "rishon", "src": "רבי אליעזר הלוי (הטור, יו\"ד רסו)", "srcRef": null, "txt": "עדיף שהאבא של התינוק לא ימול אותו, משום שבעבורו זה פסיק רישא, שהרי מתכוון לתקן את בנו."}, {"layer": "rishon", "src": "אך תרומת הדשן", "srcRef": null, "txt": "סבר שאין בעיה שימול אביו (מ\"ב: ובוודאי שיש פ\"ר דנ\"ל; גם למוהל זה פ\"ר דנ\"ל. פשוט מותר למול)"}, {"layer": "shulchan", "src": "והשו\"ע · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.10", "txt": "נקט עפ\"י המרדכי שאסור למי שלא מל לעולם למול בשבת. וכתב עפ\"י תרומת הדשן שאם מל פעם אחת – יכול למול. ולגבי אביו, מתיר כתרומת הדשן (כל עוד מל פעם אחת)."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "כתב שמוהל שאומר שכבר מל פעם אחת ומותר לו למול – נאמן להגיד זאת"}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "tzorchei"}, {"type": "sec", "id": "rechitza"}, {"type": "sec", "id": "goy"}, {"type": "sec", "id": "tzorech"}, {"type": "sec", "id": "safek"}, {"type": "sec", "id": "mahul"}, {"type": "sec", "id": "shelo"}, {"type": "sec", "id": "mi"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"מוהלים": "חיתוך הערלה החיצונית.", "פורעים": "קריעת העור הדק שמתחת לערלה.", "מוצצים": "מציצת דם הפצע — אף שנחשבת עשיית חבורה.", "ציצין המעכבין": "רצועות בשר החופות את רוב גובה העטרה; כל עוד לא הוסרו, המילה פסולה.", "מכשירי מילה": "הכלים והפעולות שמכינים למילה (סכין, מים חמים). מאחר שאפשר להכינם מערב שבת — אינם דוחים את השבת.", "שבות דשבות": "צירוף שני איסורי דרבנן (למשל אמירה לגוי — שהיא שבות — על מלאכה דרבנן). הותר לצורך מצווה.", "מילה בזמנה": "מילה הנעשית ביום השמיני. רק היא דוחה את השבת.", "פסיק רישא": "פעולה מותרת שמלאכה אסורה נעשית ממנה בהכרח, גם בלי כוונה."}, "subject": "שבת", "id": "mila-bshabbat"}, {"topic": {"title": "בורר", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.319", "intro": {"lead": {"t": "", "ref": ""}, "body": "+הפרדת דבר רצוי מדבר שאינו רצוי (כגון אוכל מפסולת), ע\"י כלי או ביד\n+כן להפך (דבר שאינו רצוי ממה שכן)\n+הפרדת שני מיני אוכל האחד מן השני (למרות ששניהם לא 'פסולת')\n\n**מתי מותר**: ברירה **ביד** של **אוכל מתוך פסולת** לאכילה **לאלתר** מותרת (אבל בנפה אסור דרבנן, ובכברה חייב; אעפ\"י שאוכל מיד) משום שיש בכך **דרך אכילה** ולא דרך ברירה\n\nחלקו אם היא מלאכה שאינה צריכה לגופה\n\n**שיעורה**: כגרוגרת (נלמד ממידות בשאר אוכלין)"}}, "sections": {"hagdarot": {"title": "הגדרות", "seif": null, "sugya": null, "ops": [{"subhead": "ריבוי מלאכות ברירה (לא מעיקר החומר)"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "-זורה בורר ומרקד זה אותו דבר! (רש\"י: והלא כולן מלאכה אחת הן דמפריש אוכל מן הפסולת)\n**-אביי ורבא**: יש מלאכה על כל מעשה שנעשה במקדש, גם אם יש כמה דומות.\n-אז למה אין כותש? (רש\"י: ולא מנו כותש משום דמיונה לדש)\n**-אביי**: עני אוכל פתו בלא כתישה", "ref": {"label": "שבת · פרק כלל גדול · עג ע\"ב", "ref": "Shabbat.73b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "למרות שהיה כותש במקדש, הסתפק התנא בדמיונו לדש. הוא העדיף להכניס את כל מלאכות הברירה משום שכולן שלב חשוב ונצרך ב'סידורא דפת', בעוד כותש לא נצרכת, והרי עניים מוותרים על שלב זה לעיתים (בעוד שעל מלאכות סידורא דפת לא מדלגים)\n(בדומה לכך אמר על בישול, שהעדיפו את הלש והאופה)"}, {"layer": "rishon", "src": "הרמב\"ם בפ\"ח, הי\"א", "srcRef": null, "txt": "מציין דברי אביי ורבא (וזהו): \"ומפני מה מנו אותן בשלשה מפני שכל מלאכה שהיתה במשכן מונין אותה בפני עצמה\""}, {"subhead": "מלאכה שאינה צריכה לגופה (לא מעיקר החומר)"}, {"layer": "rishon", "src": "בעל המאור", "srcRef": null, "txt": "הבורר והזורה הן מלשצ\"ג. כל שאר המלאכות הן מלאכות שצריך לגופן."}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "אף הן מלאכות שצריך לגופן, כי וודאי שצריך שהמלאכה תקרה. ואעפ\"י שאינו צריך לגוף הדבר שעליו נעשתה המלאכה. כך גם לגבי הנוטל ציפורניו שנחשב גוזז ואינו צריך לציפורניים"}, {"layer": "acharon", "src": "בה\"ל בשם ישועות יעקב", "srcRef": null, "txt": "עניין מלאכת בורר הוא שהפסולת לא ראויה לאכילה, וגם האוכל אין ראוי כ\"כ לאכילה עם הפסולת שבתוכו, ולכן הוא מפריד הפסולת מן האוכל. וא\"כ המלאכה אינה נקראת על ברירת הפסולת, רק שמתקן האוכל שיהיה ראוי לאכילה. וזהו מלאכה הצריכה לגוף האוכל.\nאבל בשני מיני אוכלין, חשוב משאצ\"ל, כיוון שאין תיקון של אף מאכל, אלא רק שמעוניין כרגע באחד מהם."}], "pesak": null}, "sugya": {"title": "הסוגיה המרכזית", "seif": null, "sugya": null, "intro": "ברייתא ושיטות לברירה אסורה ומותרת.", "ops": [{"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**ברייתא** - היו לפניו (שני) מיני אוכלין בורר ואוכל בורר ומניח. ולא יברור ואם בירר חייב.\n**בגמרא** – מתקשים, שהרי בהתחלה לשון הברייתא להתיר ברירה ולאחמ\"כ לאסור. משבשתא.\nהאמוראים מציעים שיטות שונות לתרץ, ומחלקים מתי מותר ומתי אסור לברור\n   **רב יוסף** - מה שמותר: ברירה ביד\n   מה שאסור (דרבנן): בקנון ובתמחוי\n   מה שמתחייב (דאורייתא): בנפה ובכברה\n   **רב המנונא** - מה שמותר: ברירת אוכל מתוך הפסולת\n   מה שמתחייב: ברירת פסולת מתוך האוכל\n   **אביי** - מה שמותר: ברירה לאלתר.\n   מה שמתחייב: ברירה לאוצר.\nובסוגיה לאחמ\"כ, חלקו רב אשי ורבי ירמיה מדפתי על בורר שני מיני אוכל.", "ref": {"label": "בבלי · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}], "pesak": null}, "ikar": {"title": "עיקר הדין", "seif": "סעיפים א׳-ב׳", "sugya": null, "intro": "יש דעות שונות בראשונים לאילו שיטות באמוראים להתייחס. באופן מסורבל, השו\"ע מאמץ עפ\"י רוב הראשונים את שלושת ההגדרות המרכזיות: אוכל מתוף פסולת, ביד, ולאלתר.", "ops": [{"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כל עוד בורר לאלתר, אפילו בנפה ובכברה מותר (כלומר, בעיקר אביי)"}, {"layer": "rishon", "src": "תוס', ר\"ח, ר\"ן, רמב\"ם", "srcRef": null, "txt": "אסור אף פעם בכלי. ורק אם ברר ביד לאלתר מותר."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.1", "txt": "וכן נקט השו\"ע. ולשיטתו צריך גם שיברור אוכל מתוך פסולת."}, {"layer": "acharon", "src": "המשנ\"ב", "srcRef": null, "txt": "כתב, שכאשר בקיום 3 התנאים הללו, אז וודאי הווי דרך אכילה"}], "pesak": null}, "tnaim": {"title": "הגדרת תנאי ההיתר", "seif": null, "sugya": null, "intro": "(לא תמיד עפ\"י ס' מסוים)", "ops": [{"layer": "lead", "srcRef": null, "txt": "**מ\"ב, הקדמה לסימן שיט** - מותר לברור אם מקיימים את 3 תנאי ההיתר, \"שאז לאו דרך ברירה היא אלא דרך אכילה\""}, {"subhead": "א. יד"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כותב כי ברירה ביד 'לא דמי לבורר כלל'"}, {"layer": "rama", "src": "הרמ\"א (שכ\"א, ס' יב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.321.12", "txt": "לעניין טוחן - סבר שהחותך ירק דק חייב בטוחן רק אם לא אוכלו מיד", "under": true}, {"layer": "acharon", "src": "והבה\"ל עליו", "srcRef": null, "txt": "כותב כי הסיבה שברירה מותרת כשאוכל ביד היא משום שכך דרך האכילה לאלתר בבורר. לכן בטוחן, לא אוסרים ע\"א השימוש בכלי, כי דרך האכילה לאלתר היא בסכין.", "under": true}, {"layer": "acharon", "src": "מ\"ב, שש\"כ", "srcRef": null, "txt": "התייחסו לסכו\"ם כדרך אכילה, למרות שאין הם 'יד' שכן הם כ'ידא אריכתא'.\nוכן, שסכו\"ם אינו מועיל למלאכה."}, {"subhead": "ב. לאלתר (ס' א')"}, {"layer": "lead", "srcRef": null, "txt": "מה גדר לאלתר?"}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "מיד ממש. ללא השתאות"}, {"layer": "rishon", "src": "ר\"ח ור\"ן", "srcRef": null, "txt": "כל זמן שנמצא בסעודה (ואפילו מאריך בה)"}, {"layer": "rishon", "src": "ר' ירוחם", "srcRef": null, "txt": "'לאותה סעודה'", "under": true}, {"layer": "rishon", "src": "והב\"י הבין בו", "srcRef": null, "txt": "כל שבורר לסעודה הקרובה - מותר אפילו זמן רב (ואם השאיר ממנו לסעודה אחרת חייב)", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "מביא דעת ר\"ח וסובר בו שמותר לפני הסעודה, אך רק ממש סמוך."}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "אסור לברור בתוך הארוחה כדי שיישאר, אלא רק לצורך אותה אכילה\nאבל אם לא עשה לשם כך לכתחילה מותר (מ\"ב)"}, {"layer": "lead", "srcRef": null, "txt": "מי שלא בֶסעודה מסוימת?"}, {"layer": "zman", "src": "אגלי טל", "srcRef": null, "txt": "אסור לברור אוכל מפסולת ולהשאירו לשעה"}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "60 דקות"}, {"layer": "zman", "src": "אג\"מ", "srcRef": null, "txt": "לשון 'שעה' פירושה זמן שהאישה מסדרת את המאכלים לסעודה, שזה פחות משעה"}], "pesak": null}, "shnei": {"title": "שני מיני אוכלים", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "בברייתא כתוב 'היו לפני (שני) מיני אוכלים'.\nרב אשי אוסר מדרבנן, ורבי ירמיה מדיפתי מחייב.\nוהראשונים מבררים טעם האיסור גם בזה (ולא רק פסולת מאוכל)", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "בירושלמי", "srcRef": null, "txt": "ברר אוכל מאוכל. חזקיה: חייב. ר יוחנן: פטור"}, {"layer": "rishon", "src": "התוספות", "srcRef": null, "txt": "מביאים, שלמרות שמדובר בשני אוכלים, בהוצאת אוכל מאוכל אחר יש העדפה לאחד מהם והאוכל השני נחשב כפסולת (לכן יהא מותר רק להוציא את הרצוי מהאחד שלא)"}, {"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "בלשונו לא לגמרי בהיר ונחלקים פוסקים על שיטתו."}, {"layer": "lead", "srcRef": null, "txt": "פוסקים חולקים – רמב\"ם כתוספות או לא?"}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "כתוספות"}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "לא כתוספות. אלא הרמב\"ם סבר שעניין בורר הוא בתיקון המאכל. ובהפרדת שני מינים המעורבבים זה בזה - נעשה תיקונו.\n   נפק\"מ: להוציא את האוכל שאינו מעוניין בו מתוך האחד שכן מעוניין ויאכל מיד – לשיטת התוס' והפמ\"ג ברמב\"ם, יהיה אסור משום שהאוכל שמוציא הוא פסולת.\n   להבנת הבה\"ל ברמב\"ם יהיה מותר משום שהאוכל שתיקן נאכל מיד (בדרך היתר)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.3", "txt": "נוקט לשון הרמב\"ם\nלפיכך, הפמ\"ג סובר שכוונת השולחן ערוך ברמב\"ם כדעת התוס'\nוהבה\"ל שדעת השו\"ע ברמב\"ם שהוא חולק על התוס'"}, {"layer": "acharon", "src": "ובסוף סובר הבה\"ל", "srcRef": null, "txt": "שצריך לחוש לשתי האפשרויות, כלומר:\nכשיש שני מיני אוכל, לא להוציא מין שאינו מעוניין בו ולאכול את המין שמשאיר (אלא רק להפך. כתוס')\nוכן, לא הפקיד שני המינים זה מזה אפילו שלא מעוניין באף אחד כרגע (שזה תיקון שניהם. כהבנת בה\"ל)", "under": true}], "pesak": null}, "echad": {"title": "מין אחד", "seif": null, "sugya": null, "intro": "(תרוה\"ד; רמ\"א בס' ג)", "ops": [{"layer": "rishon", "src": "תרומת הדשן", "srcRef": null, "txt": "מדייק מלשון התנא 'שני מיני אוכלין', משמע שהאיסור הוא דווקא בשניים, אבל במין אחד לא נחשב בורר. לכן, אסור להפריד שני מינים זה מזה ואפילו הם גדולים וניכרים (אלא רק לאוכלם מיד). כך, שני סוגי דגים נחשב שני מינים.\nאך אם מפריד חתיכה גדולה או מוצלחת יותר מאותו מין - מותר (אפילו להשאיר את שני המינים לאח\"כ)"}, {"layer": "rama", "src": "הרמ\"א (הגהה לס' ג')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.3", "txt": "הביא את תה\"ד. לכן ציין שבמין אחד מותר 'לברור' חתיכות גדולות מקטנות בכל דרך."}, {"layer": "acharon", "src": "הט\"ז (שיט, ג', ב)", "srcRef": null, "txt": "החמיר בשיטה זו וסבר שאף הפרדה ממין אחד נחשב ברירה. לפיו, אפילו הפרדה של חתיכות גדולות מקטנות שלא אותו מאכל – אסור (אלא בדרך היתר)."}, {"layer": "acharon", "src": "המ\"ב", "srcRef": null, "txt": "ונראה שרוב האחרונים, וכך המ\"ב צידדו בדעת הרמ\"א ותה\"ד\nוכתב המ\"ב שמיני עופות או בשר צלי/מבושל נחשב שני מינים לזה"}], "pesak": null}, "kiluf": {"title": "קילוף פירות", "seif": null, "sugya": null, "intro": "(סוף סימן שכ\"א, ס' יט)", "ops": [{"layer": "gemara", "src": "בירושלמי", "srcRef": null, "txt": "מובא שהקולף שום מקליפתו חייב בבורר"}, {"layer": "rishon", "src": "סמ\"ג סמ\"ק", "srcRef": null, "txt": "סברו שבירושלמי מדובר באכילה לאחר זמן. לכן מותר לקלף שום אם אוכלו מיד"}, {"layer": "rama", "src": "רמ\"א (שכא, יט)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.321.19", "txt": "הביא דבריהם: \"אסור לקלוף שומים ובצלים כשקולף להניח, אבל לאכול לאלתר, שרי\""}, {"layer": "rishon", "src": "המרדכי", "srcRef": null, "txt": "הסביר שהטעם לכך הוא שאי אפשר לאכול את השום בלי הוצאת המאכל מהפסולת, וממילא זו דרך האכילה. והביאו הבה\"ל"}, {"subhead": "קליפות הראויות לאכילה"}, {"layer": "lead", "srcRef": null, "txt": "הרמ\"א סבר עפ\"י הסמ\"ג והסמ\"ק להתיר קילוף של שום מאחר ואי אפשר לאוכלו בלי לעשות כן, וכי זה וודאי דרך אכילה.\nאבל מה נגיד לגבי פירות שהקליפה שלהם נאכלת לפעמים?\nממאי נפשך? אם הוא אוכל לאלתר וחשיב כפסולת, מותר כדעת הרמ\"א. אם מניח - מותר כדעת הפמ\"ג"}, {"layer": "acharon", "src": "משנ\"ב (שכא)", "srcRef": null, "txt": "כמו שום. מותר רק אם אוכל התפוח מיד (משום שהקליפה היא פסולת)"}, {"layer": "acharon", "src": "שעה\"צ בשם פמ\"ג", "srcRef": null, "txt": "מביא דעת הפמ\"ג (עפ\"י תוספות), מבין שבגלל שהקליפות ראויות למאכל, דינן כהפרדת שני מאכלין זה מזה לזמן. אין באף אחד מהם פסולת ולכן מותר."}], "pesak": null}, "sheeino": {"title": "בורר בדברים שאינם אוכל", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "בגמרא (עד, ב)", "srcRef": null, "txt": "מובא כי מי שעושה חבית חרס וכוורת של קנים מתחייב על כמה מלאכות\nורש\"י מפרט את המלאכות. בעשיית החבית מופיע בורר את החתיכות הגסות של האדמה. בכוורת בורר את הקנים הטובים מהרעים.", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"ב", "ref": "Shabbat.74b"}}, {"layer": "acharon", "src": "הט\"ז", "srcRef": null, "txt": "מתוך כך הבין כי גם בדברים שאינם אוכל שייך בורר."}, {"layer": "acharon", "src": "המ\"ב (טו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.15", "txt": "כתב כי בכלים ובבגדים שייך בורר, ולכן יש להוציא את הכלי/בגד שמעוניין בו, ולא להפך."}, {"layer": "acharon", "src": "האור שמח", "srcRef": null, "txt": "עמד על כך שבורר הוא רק בדברים הבלוּלים ומעורבבים זה בזה, ולכן אין בורר בכלים ובגדים; ומה שהט\"ז כתב שיש בורר גם בדברים שאינם אוכל, הוא בדברים קטנים כמו עץ וברזל ששייך בהם ערבוב."}, {"layer": "acharon", "src": "ערוך השולחן", "srcRef": null, "txt": "ובדומה לכך, כתב שדבר גדול הנראה לעין לא שייך בו בורר."}, {"layer": "lead", "srcRef": null, "txt": "מתוך כך, תהו פוסקי זמננו לגבי מיון מיני סכו\"ם מעורבבים לאחר הארוחה, וכן סידור ספרים במקומם."}, {"layer": "zman", "src": "שו\"ת אור לציון", "srcRef": null, "txt": "חשש לדעות האוסרים וכן לשיטת הבה\"ל לבורר בשני מינים (ברמב\"ם) שהפרדה שלהם אסורה אף אם בשני המינים מעוניין לאחר זמן."}, {"layer": "zman", "src": "הרב עובדיה ב'יביע אומר'", "srcRef": null, "txt": "הביא דברי האור שמח וכתב כי 'אין כל חשש של איסור ברירה'."}], "pesak": null}, "lach": {"title": "בורר בלח, וברירת אוכל עם הפסולת", "seif": "סעיף ט\"ז", "sugya": null, "ops": [{"layer": "rishon", "src": "הרא\"ש", "srcRef": null, "txt": "מתיר שתיית מים שיש בהם תולעים עם מפה (כמעין מסננת)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט\"ז)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.16", "txt": "מעתיק את הרא\"ש. מים שיש בהם תולעים מותר לשים עליהם מפה ולשתות ואין בכך בורר. על כן, מותר לדחות בשעת שתיה את הפסולת שלא תכנס לפיו.\nובב\"י דן אם אין חשש של סוחט משום מלבן בהרטבת המפה; וסבר שאין לגזור שמא יסחוט משום ש'אין זו שרייה הצריכה סחיטה'"}, {"layer": "lead", "srcRef": null, "txt": "לפיכך, דנו אם יש בורר בלח."}, {"layer": "acharon", "src": "מהריט\"ץ", "srcRef": null, "txt": "'אין ברירה בלח וגם את הצרעה ישלח'. אפילו זבוב מותר להוציא בידו למרות שלא זמן השתייה ממש.\nמה שהרא\"ש 'כתב שיש ברירה בלח' (תולעים במים) הוא בכלי שכך דרך ברירתם"}, {"layer": "acharon", "src": "ט\"ז שם", "srcRef": null, "txt": "הוצאת פסולת מותרת רק אם מוציאה עם המזון: אם נפל זבוב לכוס מים מותר להוציאו רק עם מוציאו יחד עם המים. יש ברירה בלח."}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "פסק כמהריט\"ץ לקולא, אך מוטב להחמיר כט\"ז."}], "pesak": null}, "tircha": {"title": "אוכל מפסולת בטורח מרובה", "seif": "סעיף ד׳", "sugya": null, "intro": "(ס' ד' ברמ\"א)", "ops": [{"layer": "mishna", "src": "משנה (ביצה)", "srcRef": null, "txt": "מחלוקת ב\"ה וב\"ש לגבי ברירת פסולת מאוכל ביו\"ט\n**ב\"ש**: (כמו בשבת) – רק אוכל מפסולת\n**ב\"ה**: מתירים ביו\"ט אף להוציא פסולת מתוך אוכל"}, {"layer": "gemara", "src": "גמרא · רבן גמליאל", "srcRef": null, "txt": "בד\"א? כשהאוכל מרובה על הפסולת.\nאבל אם הפסולת מרובה מהאוכל אף ב\"ה יגידו שמותר להוציא רק את האוכל מהפסולת.\n(כלומר רק כשהאוכל מרובה ויש טורח בברירתו סבורים ב\"ה שאפשר לברור פסולת. כשהוא מעט – לא)\nולאחמ\"כ הקשו בסוגיה על רבן גמליאל ושאלו על פסולת מרובה מאוכל 'מי איכא מאן דשרי?'"}, {"layer": "lead", "srcRef": null, "txt": "שתי שיטות בפירוש, ומתוך כך גם בהלכה"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "'האם יש מי שמתיר בהוצאת פסולת אם הפסולת מרובה?' הרי הפסולת היא מוקצה וכשהיא הרוב, גם האוכל נחשב מוקצה. לכן אסור להוציא כלום אם הפסולת מרובה.\nוהתירוץ של הסוגיה 'לא צריכא דנפיש בטרחא וזוטר בשיעורא' – הוא שבאמת מדובר באוכל המרובה על הפסולת, והלשון שכתוב 'פסולת מרובה על האוכל' כוונתה שהטורח בהוצאת הפסולת.\nמתירים כשהרוב הוא אוכל משום שיש פחות טרחה בהוצאת הפסולת (כדרכו)"}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "בשבת: תמיד בורר את האוכל.\nביו\"ט: אם הפסולת מרובה ← בורר את האוכל / דרך ברירה\nאם האוכל מרובה ויש טורח בברירת האוכל ← בורר את הפסולת / כי יש טורח\nאם האוכל מרובה ואין טורח בברירת האוכל ← בורר את האוכל / עדיף אוכל\nכלומר שיטת הרמב\"ם (כמו שהב\"י מדייק ממנו) ביו\"ט: עדיף להקפיד על דרך ברירה שמוציאים אוכל מהפסולת, אבל אם יש טורח מוותרים לטובת טורח ביו\"ט. ובשבת לא מתחשבים בגורם הטרח ולכן תמיד מוציאים אוכל מפסולת."}, {"layer": "lead", "srcRef": null, "txt": "**נפק\"מ בין רש\"י לרמב\"ם** – לרש\"י אסור לברור כשיש פסולת מרובה בכלל (מוקצה. יו\"ט ושבת)\nולרמב\"ם מותר לברור את האוכל מן הפסולת. ובשבת תמיד בורר את האוכל"}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "נראה שדעתו כרמב\"ם (טרחה ביו\"ט וכו')"}, {"layer": "rama", "src": "רמ\"א", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.4", "txt": "מביא בשם הב\"י וכותב \"אפילו האוכל מרובה ויש יותר טורח בברירת האוכל, לא יברר הפסולת\"\nכלומר, הרמ\"א נקט את הדין של שבת, שבכל מקרה בוררים את האוכל מתוך הפסולת אפילו כשהאוכל מרובה ויש בברירתו טורח, מאחר ורק בשמחת יו\"ט נמעט בטרחה. בשבת - דרך ברירה תמיד. וכ\"כ המ\"ב"}], "pesak": null}, "mishmeret": {"title": "משֵמרת (סינון)", "seif": "סעיפים ט׳-י׳", "sugya": null, "intro": "סינון יין משמריו אסור (כשיטת חכמים וכן הלכה), גם אם המשמרת תלויה כבר מער\"ש\n-ונחלקו רבה ורבי זירא אם משום בורר או משום מרקד\n-ורש\"י ותוס' חלקו אם יודה רבה לרבי זירא שחייב משום שניהם או לא (נפק\"מ: איך אפשר להתרות)\n-דעת הרמב\"ם שנויה במחלוקת (ב\"י: כרש\"י; בה\"ל: כתוספות)\n-ובשו\"ע (ט') התייחס רק לעיקר איסור חכמים לשמר", "ops": [{"layer": "lead", "srcRef": null, "txt": "ומתי עובר הגבול בין מה שאסור למה שמותר? אם אסור לברור יין משמריו בגלל שזה בורר (כרבה), מתי לא חשיב בורר? עפ\"י זעירי והמשנה בפרקנו, למדים שמותר למשמרת משקים צלולים, ולסודר קצת עכורים\nמשמרת: רק צלול — מהו צלול? ר\"ן: רוב אנשים שותים | ב\"ח: כולם שותים\nסודרים (בגד): אפילו עכור קצת — ר\"ן: אך ללא שמרים כלל\nטור: במים אסור בסודר משום ליבון\nרמב\"ם: אוסר משמרת. ובסודרים עכור. מתיר רק מים ויין צלולים בסודר (כנראה קרא למשמרת סודר)\nשו\"ע: הביא ר\"ן (פשט סוגיה) וגם רמב\"ם; וטור לעניין מלבן — מותר: מים ויין צלולים למשמרת; יין שאינו עכור לסודר\nמ\"ב: (עכור לגמרי אסור. אבל עכור קצת -שו\"ע מתיר)"}, {"layer": "mishna", "src": "משנה · ר' אליעזר · חכמים", "srcRef": null, "txt": "מסננת התלויה מערב שבת. האם מותר לסנן בה יין משמריו בשבת?\n**רבי אליעזר** – מותר\n**חכמים** – אסור\n(וכולם מסכימים שאסור לתת אותה לכתחילה)", "ref": {"label": "שבת · פרק תולין · קלז", "ref": "Shabbat.137b"}}, {"layer": "gemara", "src": "גמרא · רב כהנא", "srcRef": null, "txt": "**רב כהנא** – אם שימר - חייב מהתורה\nמשום מה חייב?\n**רבה** – משום בורר\n**רבי זירא** – משום מרקד", "ref": {"label": "שם", "ref": "Shabbat.137b"}}, {"layer": "acharon", "src": "שולחן ערוך הרב", "srcRef": null, "txt": "אם בורר אוכל מפסולת למה חייב? בגלל שמשתמש בכלי המיוחד לברירה (רב יוסף)", "under": true, "collapsed": true}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "רבה מודה לרבי זירא שהמשמר חייב גם משום מרקד", "under": true}, {"layer": "rishon", "src": "תוס'", "srcRef": null, "txt": "חולקים: רבה לא מודה לרבי זירא. שימור יין לא דומה למרקד. מרקד היא מלאכה שפועלת גם בפסולת וגם באוכל ע\"י ניעור הכלי. במשמר אין זה כך.", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "לא ברור כמי מכריע (\"הבורר שמרים מתוך המשקין הרי זה תולדת בורר או תולדת מרקד וחייב\")", "under": true}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "רמב\"ם סובר כרש\"י (שרבה מודה שמשמר חייב אף משום מרקד. ואפשר להתרות במי שעומד לשמר על כל אחד מהם)", "under": true}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "רמב\"ם כתוס' (רבה לא מודה לר' זירא), וציין בלשונו שחייב באחד משתי המלאכות משום שלא ידע אם להכריע כרבה או כרבי זירא (ומכל מקום מוכח מלשונו שלא מחייב בשניהם)", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ט')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.9", "txt": "מביא דין חכמים מהמשנה שאסור לתת יין עם שמרים במשמרת התלויה מער\"ש; אך לא מכריע כאחד האמוראים או הראשונים"}, {"layer": "acharon", "src": "שאלה/דיון אפשרי", "srcRef": null, "txt": "כמה חטאות חייב מי ששימר כנ\"ל? אם כשיטת רש\"י=2. אם תוס=1. ולדעת המנחת חינוך חייב 2. לדעת האגלי טל לא סומכים על כך שהמחבר סבר בב\"י שרמב\"ם סבר כרש\"י; וחייב רק חטאת 1 בגלל שעשה מעשה 1", "collapsed": true}, {"subhead": "דף קלט (פ' תולין) – סינון המותר במשמרת/סודרים"}, {"layer": "gemara", "src": "מימרא של ר' זעירי", "srcRef": null, "txt": "מותר לסנן יין צלול ומים צלולין במשמרת בשבת (ואין בכך בורר)\nובמשנה כתוב: מסננין את היין בסודרין (בגדים) ובכפיפה מצרית מהקמחים שלהם\nומשמע מכך שבסודרים מותר אפילו משקה שאינו צלול והוא עכור קצת (וכן נקטו הראשונים והב\"י)", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "ולדעת הר\"ן", "srcRef": null, "txt": "רק אם אין בו שמרים כלל אפשר עכור בסודרים.", "under": true}, {"layer": "lead", "srcRef": null, "txt": "ומה נחשב צלול, שמותר אפילו במשמרת?"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "אם רוב האנשים לא מקפידים בלכלוכיו כלל"}, {"layer": "acharon", "src": "הב\"ח", "srcRef": null, "txt": "רק אם כולם לא מקפידים והיו שותים אותו כך"}, {"layer": "rishon", "src": "הטור", "srcRef": null, "txt": "לעניין מלבן: כתב שלמרות שמותר לסנן מים (אפילו במשמרת, אם הם צלולים) – אסור בסודרים משום מלבן, אבל עם יין אין בעיה (משום שסבר כר\"ת שלא שייך מלבן במשקים שאינם יין)"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.10", "txt": "כתב עפ\"י זעירי (ר\"ן) שמותר לסנן במשמרת יין או מים צלולים, אך הביא בסוף גם את דעת הרמב\"ם שאסר כל סינון במשמרת, והתיר רק צלול בסודרין.\nוכתב שבסודרים מותר רק יין שאינו עכור (על פניו היה אמור כדעת הר\"ן להתיר. מ\"ב תירץ שהם עכורים לגמרי, אבל בעכורים קצת -מתיר)\nהביא את הטור שאסור מים בכל מקרה בסודר בגלל מלבן"}, {"layer": "acharon", "src": "והמשנ\"ב", "srcRef": null, "txt": "הביא את שיטות הר\"ן והב\"ח למה נחשב צלול", "under": true}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "סובר כדעת הר\"ן לעניין זה שצלול הוא מה שרוב האנשים שותים בלא להקפיד.\nאבל כתב שמי שהוא אסטניס ומקפיד על הסינון - אסור לו"}], "pesak": null}, "shaar": {"title": "שאר סעיפים והערות עליהם", "seif": null, "sugya": null, "ops": [{"subhead": "סעיף ה' – הבורר תורמוסין מפסולתיהן"}, {"layer": "shulchan", "src": "בשו\"ע · (סע׳ ה')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.5", "txt": "הבורר תורמוסין מתוך פסולת שלהן חייב מפני שהפסולת שלהם ממתקת אותם ונמצא בורר פסולת מתוך אוכל.\n- אז בגלל שלא מתקיים התנאי של רב המנונא (אוכל מפסולת), אסור. אבל איך? הרי אני מוציא את התורמוסים מתוך הפסולת?"}, {"layer": "acharon", "src": "המ\"ב", "srcRef": null, "txt": "התורמוס עצמו מאוד מר, ואפילו הקליפה שלו פחות מרה. לכן נחשב התורמוס פסולת לעומתה."}, {"subhead": "סעיף י\"א – סינון יין צלול בסודר"}, {"layer": "lead", "srcRef": null, "txt": "למדנו בסעיף ט' שיש בעיה עם סינון יין משמריו במשמרת משום בורר ו/או מרקד\nבסעיף י' ראינו שמותר לשפוך יין צלול למשמרת, אבל אם הוא עכור ויש בו קמחים או עובד - אסור.\nובסודר מותר אף יין עכור קצת, וק\"ו שגם יין צלול (ולרמב\"ם אסור במשמרת אף צלול, ובסודר אסור אף עכור)"}, {"layer": "gemara", "src": "רב שימי בר חייא", "srcRef": null, "txt": "ההיתר לסנן יין בסודרים הוא בתנאי שלא יעשה בה גומא (שקע)", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "shulchan", "src": "ראשונים ושו\"ע · (סע׳ י\"א)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.11", "txt": "הטעם הוא שיהיה 'שינוי', משום עובדין דחול"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מה ששו\"ע כותב שצריך שינוי ואסור לעשות גומא, הוא מדבר רק על יין עכור. כי אם הוא התיר יין צלול אפילו במשמרת ולא הצריכו לשם כך שינוי, אז וודאי שבסודר אין צורך בשינוי בשביל יין צלול.\n(מהמ\"ב משתמע שאולי סובר שבמשמרת מותר אפילו יין עכור אם עושים 'שינוי' מעובדין דחול)"}, {"subhead": "סעיף י\"ב – דין כפיפה מצרית כדין סודר. לא להגביה הכפיפה מהכלי"}, {"layer": "gemara", "src": "רב חייא בשם רב", "srcRef": null, "txt": "היתר סינון יין בכפיפה מצרית הוא בתנאי שלא יגביה הסל מקרקעית הכלי טפח.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "משום אוהל", "under": true}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "משום שינוי. עובדין דחול", "under": true}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.12", "txt": "נקט בלשונו כר\"ן"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם אינו מכסה עם הכפיפה את כל חלל הכלי – לכו\"ע מותר אף להגביה טפח. כי אין לא אוהל ולא עובדין דחול."}, {"subhead": "סעיף י\"ג – מיחזי כמשמרת"}, {"layer": "gemara", "src": "רב פפא, עפ\"י רש\"י", "srcRef": null, "txt": "אסור להצמיד קשים וקיסמים לפיו של כלי ובשבת לשפוך לשם יין כדי לסנן ממנו קיסמים משום שמחזי כמשמרת.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ג)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.13", "txt": "פוסק כן"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "סובר שהשו\"ע מדבר על יין עכור דווקא; וכי ביין צלול מותר אפילו במשמרת אם מסנן רק קיסמים דקים."}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "כל זה מיירי אם מהדק את הקיסמים לפה הכלי בחוזקה. אבל אם לא מהדקם כך שהקיסמים שביין יוכלו לעבור דרכם – מותר."}, {"subhead": "עירוי (שיט, יד)"}, {"layer": "gemara", "src": "בגמרא קלט", "srcRef": null, "txt": "בבית רב פפא היו מערים יין מחבית לחבית למרות שנשארו שמרים שהם פסולת\nורב אחא מדיפתי הקשה שיש טיפות קטנות בסוף שמעורבבות עם פסולת השמרים\nרבינא מתרץ שלרב פפא הטיפות לא היו חשובות משום שהיה לו הרבה.\nאם כן, בגלל שהיין בסוף החבית מעורבב עם השמרים יש בעיה של בורר לשופכו.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139"}}, {"layer": "rishon", "src": "הרוקח", "srcRef": null, "txt": "הביא שמותר להגביה את החבית ולשים אותה על משהו כדי לערות יותר טוב"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ י\"ד)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.14", "txt": "העתיק דין הסוגיה וכתב שמותר לערות יין מחבית לחבית רק שצריך להיזהר לקראת הסוף כשמגיע לחלק שמעורב עם שמרים"}, {"layer": "rama", "src": "והרמ\"א", "srcRef": null, "txt": "הביא את הרוקח"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "אמנם מוזר דין זה. שהרי זה ברירת אוכל מתוך פסולת.\nמתרץ שהחשש המדובר הוא שהמזיגה היא לאחר זמן והביא כך המ\"ב"}, {"layer": "acharon", "src": "שו\"ע הרב", "srcRef": null, "txt": "מכיוון שמחזיק החבית בה נשארים השמרים, נחשב כאילו הוציא הפסולת מהמאכל.", "under": true}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "hagdarot"}, {"type": "sec", "id": "sugya"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "tnaim"}, {"type": "sec", "id": "shnei"}, {"type": "sec", "id": "echad"}, {"type": "sec", "id": "kiluf"}, {"type": "sec", "id": "sheeino"}, {"type": "sec", "id": "lach"}, {"type": "sec", "id": "tircha"}, {"type": "sec", "id": "mishmeret"}, {"type": "sec", "id": "shaar"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"אוכל מתוך פסולת": "אחד משלושת תנאי ההיתר — לברור את הרצוי (האוכל) ולהותיר את הפסולת, ולא להפך.", "לאלתר": "לברור סמוך לאכילה, ולא לאיחסון (לאוצר). אחד משלושת התנאים.", "דרך אכילה": "בהתקיים שלושת התנאים, הברירה נחשבת חלק מדרך האכילה — ולא מלאכת ברירה.", "נפה": "כלי ניפוי דק לברירה; הבורר בו חייב.", "כברה": "כלי ברירה גס; הבורר בו חייב מן התורה.", "משמרת": "כלי או בגד לסינון משקים משמריהם.", "מרקד": "מלאכת ניפוי קמח בנפה; נידונה לצד בורר בעניין הסינון.", "ידא אריכתא": "'יד ארוכה' — כינוי לכלי אכילה (סכו\"ם) הנחשב כהמשך היד ולא ככלי ברירה.", "מלאכה שאינה צריכה לגופה": "מלאכה הנעשית שלא לצורך התוצאה הרגילה שלה; נחלקו אם הבורר בכללהּ.", "עובדין דחול": "מעשה של חול; ולכן דרשו בו 'שינוי' בשבת."}, "subject": "שבת", "id": "borer"}, {"topic": {"title": "מעשה שבת", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי\"ח (סע' א'-ב')", "siman": "Shulchan_Arukh,_Orach_Chayim.318", "intro": {"lead": {"t": "", "ref": ""}, "body": "**מבוא:**\n'מעשה שבת' הוא כינוי לכל תוצר שהוא פרי יצירה של מלאכה האסורה בשבת. לדוגמא: תבשיל שבושל בשבת באיסור. הסוגיה במסכת חולין דנה מה יהא דינו של מעשה שבת, ואם יעשה זה בשוגג או במזיד (ושוכח נחשב שוגג לעניין זה [מ\"ב])\n\n**תמצית התוכן:**\n+עיקר הבירור מתחיל במשנה, הקובעת שעל אף שהשוחט בשבת חייב, שחיטתו כשרה. \n+לאחמ\"כ, אנו פוגשים בגמרא את שלוש הדעות המרכזיות של התנאים, ואת הדיון על עמדת רב; אשר בעיקרון סבר להקל כר' מאיר, אך לעמי הארץ פסק כדעת ר' יהודה \n+הראשונים חולקים במספר עניינים:\n  מחלוקת התנאים (ר\"י ותרומה | רר\"ר וגאונים;  שו\"ע פוסק ר' יהודה)\n  מתי מותר במוצ\"ש (רש\"י | רמב\"ם ורא\"ש;  שו\"ע פוסק שמותר מיד)\n  האם הדיון חל רק על בישול או כל מלאכה (תרומה | טור;  רמ\"א מביא שבכל מלאכה)\n+הפוסקים דנים במקרים נוספים:\n  כשמבשל אדם בעבור מישהו אחר, האם דינו כמי שבישל בעצמו ואסור לעולם \n(מג\"א ומ\"ב מקלים. אור לציון סובר שבמקרי קביעות כמסעדות וכד' יש לאסור)\n  האם חל גם במלאכה מדרבנן (גר\"א, מ\"ב, חיי אדם - רק דאוריייתא | פמ\"ג – גם דרבנן)\n  בישל במזיד ונתערבב עם תבשיל מותר (מג\"א אוסר לו לעולם ולאחרים למוצ\"ש. ר\"ע מתיר)"}}, "sections": {"din": {"title": "דין מעשה שבת", "seif": "סעיף א׳", "sugya": null, "intro": null, "ops": [{"layer": "mishna", "src": "משנה · תרומות", "srcRef": null, "txt": "המבשל בשבת: מזיד- לא יאכל; שוגג- יאכל\nהנוטע: שוגג-יקיים; מזיד-יעקור", "ref": {"label": "משנה תרומות · פ\"ב", "ref": "Mishnah_Terumot.2.3"}}, {"subsubhead": "סוגיית מסכת חולין יד (פ' הכל שוחטין) — מופיעה גם בבב\"ק"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "השוחט בשבת, אעפ\"י שחייב – שחיטתו כשרה", "ref": {"label": "חולין · פרק הכל שוחטין · יד ע\"א", "ref": "Chullin.14a"}}, {"layer": "gemara", "src": "גמרא · דעות התנאים", "srcRef": null, "txt": "רבי מאיר: בשוגג – מותר בשבת לכולם; במזיד – לכולם אסור בשבת, מותר במוצ\"ש (לכולם)\nרבי יהודה: בשוגג - מותר במוצ\"ש (לכולם); במזיד – אסור לו לעולם. לאחרים מותר\nר' יוחנן הסנדלר: בשוגג - מותר במוצ\"ש לאחרים;  במזיד - אסור לעולם לכולם", "ref": {"label": "חולין · פרק הכל שוחטין · יד ע\"א", "ref": "Chullin.14a"}}, {"layer": "table", "table": {"title": "", "align": "center", "cornerColor": "#FFFFFF", "cols": ["מזיד", "שוגג"], "colColors": ["#FABF8F", "#B8CCE4"], "rows": [{"head": "ר' מאיר", "headColor": "#D6E3BC", "cells": ["אסור בשבת.\nמותר במוצ\"ש לכולם", "מותר בשבת לכולם"]}, {"head": "ר' יהודה \n– קונס במזיד לעולם", "headColor": "#FBFDA3", "cells": ["אסור לו עולמית. \nלאחרים מותר במוצ\"ש", "אסור בשבת.\nמותר במוצ\"ש לכולם"]}, {"head": "ר' יוחנן הסנדלר \n– קונס גם בשוגג לעולם", "headColor": "#F9759E", "cells": ["אסור לכולם עולמית", "אסור לו עולמית. \nלאחרים מותר במוצ\"ש"]}]}}, {"layer": "note", "src": "בין שחיטה לבישול", "srcRef": null, "txt": "בין שחיטה לבישול: אם שייך מוקצה ולא היה ראוי לכוס. נפק\"מ: השוחט (בשוגג) אסור לבריא; המבשל בשוגג מותר"}, {"layer": "rishon", "src": "רי\"ף, רמב\"ם, רא\"ש, גאונים", "srcRef": null, "txt": "פוסקים ר' יהודה"}, {"layer": "rishon", "src": "ר\"י (תוס'), בעל התרומה", "srcRef": null, "txt": "פוסק כר' מאיר"}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "הטעם שפסקו כר' יהודה למרות שבעיקרון רב סבר כר' מאיר, משום שפסק כר' יהודה בעבור עמי הארץ. ואנן שכיחי לגבן עמי הארץ. שמא נזלזל בשבת. (היו משהין במזיד ואומרים 'שכחתי')"}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ א')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.1", "txt": "נוקט כרוב הראשונים (רר\"ר) כר' יהודה,שמי שבישל בשבת- \nבמזיד- אסור לו לעולם ולאחרים מותר במוצש\nבשוגג- אסור לכולם בשבת, ובמוצ\"ש מותר לכולם"}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "והמשנ\"ב כתב שבמקום צורך ניתן להקל בשוגג כדעת התרומה כר' מאיר לאכול בשבת", "under": true}, {"subsubhead": "מתי מותר במוצ\"ש — מיד / בכדי שיעשו"}, {"layer": "rishon", "src": "רמב\"ם, רא\"ש, גאונים", "srcRef": null, "txt": "מיד במוצ\"ש"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "בכדי שיעשו"}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.1", "txt": "נקט כרמב\"ם רא\"ש וגאונים שמותר מיד במוצ\"ש"}, {"layer": "acharon", "src": "ב\"י", "srcRef": null, "txt": "(ובב\"י כתב (בשם המ\"מ שרק בדבר שעשה גוי לישראל גוזרים בכדי שיעשו. משום שעשייה של גוי יותר נוחה וקלה; אבל וודאי שלא יעבור בידיו להבא. ובכל מקרה, אם עשה לחולה – לכו\"ע מותר לבריא במוצ\"ש מיד, ולא שייך לגזור בכדי שיעשו, שהרי עשה בהיתר)", "collapsed": true}, {"subsubhead": "ההיתר — לכל מעשה שבת או רק לבישול?"}, {"layer": "rishon", "src": "טור, רמב\"ם", "srcRef": null, "txt": "כל מעשה שבת עפ\"י ר\"י"}, {"layer": "rishon", "src": "בעל התרומה", "srcRef": null, "txt": "רק בישול. אבל שאר מלאכות יהיה אסור תמיד (לכן למרות שסובר כר' מאיר שהמבשל בשוגג מותר בשבת, בהדלקת נר או שאר מלאכות אסורות – יהיה אסור)"}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "רמ\"א הביא את דעת הטור שכל מעשה שבת מותר (כשמותר), ולא רק בישול"}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "ובה\"ל סבר שמוכח שזה גם דעת השו\"ע ממה שפסק כדעת הר\"י", "under": true}, {"subsubhead": "בישל בעבור אדם אחר"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "פסקנו כר' יהודה שבישול במזיד יהיה אסור בעבור המבשל לעולם, ובעבור אחרים יהיה מותר במוצ\"ש, ובשוגג יהיה מותר אף לו במוצ\"ש. \nכאשר אדם בישל את התבשיל בעבור מישהו מסוים, האם אין להתייחס אליו כמי שבישל בעצמו? שהרי, הוא היה מושא הבישול. הנפק\"מ לכך תהיה שאסור יהיה לו לאכול את זה לעולם (בשבת בכל מקרה יהיה אסור לכולם)."}, {"layer": "acharon", "src": "מג\"א, א\"ר", "srcRef": null, "txt": "המג\"א והא\"ר כתבו, שעדיין ישאר דינו כאחר ויהיה לו מותר במוצ\"ש. ולא אומרים שיש לגזור שמא יגיד לאחר לבשל בשבילו, משום שאין אדם חוטא בעבור מישהו אחר."}, {"layer": "zman", "src": "אור לציון", "srcRef": null, "txt": "סבר שלמרות המג\"א והא\"ר, יש לאסור לאכול במסעדות שבישלו בעבור אחרים וכד', משום שיש בזה סיוע לעוברי עבירה.\n(אולם נלענ\"ד שיש לדון באריכות לגבי הגדרת מזיד/שוגג באשר לחילונים; באשר יש מי שיגדירם כתינוקות שנשבו וצ\"ע ואכמ\"ל)"}, {"subsubhead": "מלאכה מדרבנן"}, {"layer": "acharon", "src": "פמ\"ג / משנ\"ב, גר\"א, חיי אדם", "srcRef": null, "txt": "הפמ\"ג סובר שכן. אבל שאר הפוסקים סוברים ששייך רק בדאורייתא (משנ\"ב, גר\"א, חיי אדם). ובדרבנן יהיה כדעת ר' מאיר, ובשוגג יהיה מותר אפילו בשבת; ובמזיד יהיה מותר במוצ\"ש לכולם."}, {"layer": "lead", "src": null, "srcRef": null, "txt": "ועוד, נראה שלכל הדעות, אם יש ספק אם עבר על מלאכה או לא, אין לאסור לעולם משום שהאיסור לעולם הוא מדרבנן וספיקא דרבנן לקולא."}, {"subsubhead": "התערבב עם תבשיל מותר"}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "מג\"א סובר שדין התבשיל המותר כדין התבשיל שבושל, ואסור למבשל לעולם; ולאחרים מותר במוצ\"ש"}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "הרב עובדיה סבר שמותר לאוכלו אפילו בשבת, ואין דינו כדין התבשיל שבושל בשבת"}, {"subsubhead": "דין הקדרה עצמה"}, {"layer": "acharon", "src": "מג\"א בשם הרשב\"א", "srcRef": null, "txt": "המג\"א הביא בשם הרשב\"א, שאם בישל במזיד בשבת (ודינו שאסור לו לעולם) – אף הקדרה אסורה בשימוש, מפני שהיא בלועה בדבר האסור."}], "pesak": null}, "chole": {"title": "השוחט והמבשל לחולה", "seif": "סעיף ב׳", "sugya": null, "intro": null, "ops": [{"layer": "lead", "src": null, "srcRef": null, "txt": "לגבי השוחט או המבשל לחולה שיש בו סכנה, אם מותר לאחר לאוכלו - דעות רב ורב דימי מנהרדעא הפוכות. זאת משום שטעם רב הוא לעניין מוקצה; ולפיו מותר לאכול תבשיל שבושל בשבת לחולה משום שהיה ראוי לאכילה בשבת גם לפני הבישול. לכן אין כאן מוקצה דבין השמשות. אבל בשר שישחט לחולה אסור, משום שאינו ראוי בשבת עד שתעשה הפעולה של השחיטה.\nאולם לדעת רב דימי מנהרדעא, אין פה בעיה של מוקצה. ובוודאי שהבשר הנשחט לחולה מותר לאדם אחר משום שנשחט בהיתר. והחשש היחיד הוא שמא ינצלו זאת להרבות את המלאכה בשבת תוך עשייה. לכן, בבישול יש חשש כזה, משום שתמיד יכול להרבות. אבל בשחיטה, שגם ככה שוחט כמות גדולה – אין חשש שירבה."}, {"layer": "gemara", "src": "גמרא · חולין טו · רב", "srcRef": null, "txt": "השוחט לחולה בשבת בהיתר – אסור לאחר להנות (מוקצה)\nהמבשל לחולה בשבת בהיתר – מותר לאחר לאכול (משום שראוי היה בשבת לכוס. ואינו מוקצה)", "ref": {"label": "חולין · פרק הכל שוחטין · טו ע\"א", "ref": "Chullin.15a"}}, {"layer": "gemara", "src": "רב דימי מנהרדעא", "srcRef": null, "txt": "המבשל לחולה בשבת בהיתר - אסור לבריא בשבת, גזירה שמא ירבה בשבילו\nהשוחט לחולה בהיתר – מותר לבריא לא חוששים שירבה משום שגם ככה שוחט את כל הבהמה", "ref": {"label": "חולין · פרק הכל שוחטין · טו ע\"א", "ref": "Chullin.15a"}}, {"layer": "rishon", "src": "רי\"ף, רמב\"ם, רא\"ש", "srcRef": null, "txt": "רי\"ף רמב\"ם ורא\"ש נקטו עפ\"י רב דימי מנהרדעא [שמותר למי שאינו חולה להנות מבשר שנשחט בעבור חולה, משום שאין בכך חשש שמא ירבה]"}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "והרא\"ש הסביר שהסיבה לכך שהלכה כרב דימי היא משום שעל אף שלרב יש בעיה של מוקצה מחמת איסור (בינה\"ש); קיי\"ל כר' שמעון שאין מוקצה זה אלא אם דחאו בידיים (כגון נר שהדליק עליו).", "under": true}, {"subsubhead": "האם רב ורב דימי חולקים לגמרי?"}, {"layer": "rishon", "src": "ר\"ן, רש\"י", "srcRef": null, "txt": "לדעת הר\"ן ורש\"י, גם רב דימי חושש למוקצה, ולא חלק על רב בעניין שחיטה ששייך חשש זה; אלא שהוא מדבר על חולה מבעוד יום, שאז הבהמה הנשחטת עמדה לשחיטה עוד מער\"ש."}, {"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "נראה שהרא\"ש סובר שהם חולקים לגמרי. והכריע כרב דימי שמותר בשחיטה בכל חולה (ב\"י); ולא צריך להעמיד את דברי רב דימי בחולה מבעוד יום."}, {"layer": "shulchan", "src": "שו\"ע · (סע׳ ב')", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.2", "txt": "והשו\"ע נקט עפ\"י הבנתו ברא\"ש (והרמב\"ם והרי\"ף) , וכתב שגם בעבור חולה מבעוד יום וגם בעבור חולה בשבת מותר לשחוט בשבת. אבל לבשל אסור משום שחיישינן שמא ירבה.\n\tוהמ\"ב והפמ\"ג סברו, שהתבשיל מותר לבריא במוצ\"ש מיד; דלא בעינן בכך בכדי שיעשו.\tוסבר שמותר לטעום בשביל החולה אם התבשיל יפה."}, {"subsubhead": "קצירת פירות"}, {"layer": "rama", "src": "רמ\"א בשם אורחות חיים", "srcRef": null, "txt": "הרמ\"א הביא בשם האורחות חיים, שפירות שקצר בשבת בעבור החולה, שייך בהם מוקצה. והם אסורים אפילו לחולה מבעו\"י, משום שהולכים וגודלים בשבת (ואז מה שהיה ראוי לחולה מער\"ש משתנה, וכבר אינו מותר)"}, {"layer": "acharon", "src": "גר\"א, משנ\"ב", "srcRef": null, "txt": "אך לדעת הגר\"א והמשנ\"ב, אף שהמשיך לגדול – בטל האיסור שגדל בשבת, ברוב שהיה מוכן מער\"ש. לכן יהיה מותר לחולה מבעו\"י (אבל לחלה בשבת אסור)."}, {"subsubhead": "מליחת הבשר הנשחט"}, {"layer": "gemara", "src": "גמרא · שבת עה", "srcRef": null, "txt": "מליחה ועיבוד יש בהן דבר דומה (עפ\"י הגמרא ב-עה פרק כלל גדול). \nורש\"י כתב שמליחה צורך עיבוד היא. \nובגמרא אמר רבה בר רבה הונא שהממלח בשר חייב משום מעבד אך לדעת רבא אין מעבד באוכלים (וכן הלכה); אך התוספות שם כותבים שלמרות זאת, שייך איסור למלוח אוכלים בשבת משום שדומה לעיבוד עורות.", "ref": {"label": "שבת · פרק כלל גדול · עה ע\"א", "ref": "Shabbat.75a"}}, {"layer": "rishon", "src": "ב\"י", "srcRef": null, "txt": "ולפיכך, כתב בב\"י שאסור למלוח את הבשר הנשחט לחולה (למרות שפסקנו שהוא מותר אף לאדם אחר). וכך כתבו גם התוספות אצלנו (חולין)."}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "וכך כתב המשנ\"ב."}, {"subsubhead": "לחולה שאין בו סכנה"}, {"layer": "lead", "src": null, "srcRef": null, "txt": "אז פסקנו שלשו\"ע מותר לאחר להנות משחיטה, אבל לא מבישול (שמא ירבה). \nומה לגבי חושאב\"ס? האם מותר לו להנות מהתבשיל או שדינו ככל אדם?"}, {"layer": "rishon", "src": "האגור", "srcRef": null, "txt": "האגור כתב שהמבשל בשבת לחולה שיש בו סכנה אסור אף לחולה שאין בו סכנה [משום שלחולה שאין בו סכנה אפשר לבשל על ידי גוי. ומאחר ועלול שלא למצוא גוי,] חיישינן שירבה בשביל החולה שאין בו סכנה (ממש כמו כל אדם)."}, {"layer": "shulchan", "src": "שו\"ע", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.2", "txt": "וכן נקט השו\"ע בסעיף שלנו."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא ותמצית"}, {"type": "sec", "id": "din"}, {"type": "sec", "id": "chole"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"מעשה שבת": "תוצר של מלאכה שנעשתה באיסור בשבת (כגון תבשיל שבושל בשבת); נחלקו מה דינו בשבת ובמוצ\"ש.", "בכדי שיעשו": "המתנה במוצ\"ש כשיעור הזמן שהיה נדרש לעשיית המלאכה, כדי שלא יצא נשכר.", "מוקצה מחמת איסור": "דבר שהוקצה מחמת שהיה אסור בבין השמשות; לר\"ש אינו מוקצה אלא אם דחאו בידיים.", "חשאב\"ס": "חולה שאין בו סכנה.", "קונס": "קנס חכמים — איסור שהטילו כדי שלא ייצא החוטא נשכר ממעשהו."}, "subject": "שבת", "id": "maaseshabat"}, {"topic": {"title": "בישול", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ח", "siman": "Shulchan_Arukh,_Orach_Chayim.318", "intro": {"lead": {"t": "'תנא דידן שבק בישול סממנין ונקט סידורא דפת'", "ref": ""}, "body": "בישול אינה אחת מל\"ט אבות מלאכה, ואינה נמנית במשנת אבות המלאכה, אלא 'תנא דידן שבק בישול סממנין ונקט סידורא דפת'."}}, "sections": {"kitzur": {"title": "קיצור כלים — מדרג קלות הבישול", "seif": null, "sugya": null, "intro": "מפה תמציתית של היררכיית הכלים ומדרג קלות הבישול — לחזור אליה בכל נושא.", "ops": [{"layer": "note", "srcRef": null, "src": "כלי ראשון שעל האש", "txt": "כמובן אסור בבישול מן התורה (רבי שאמר לרב יצחק שלא לשפוך שמן לאמבטי משום שהיא כלי ראשון וכלי ראשון מבשל) (אין נותנין ביצה בצד המיחם בשביל שתתגלגל)"}, {"layer": "note", "srcRef": null, "src": "כלי ראשון שהורד מהאש", "txt": "**שו\"ע (רש\"י)** – כלי ראשון שהורד מהאש מבשל כל עוד הידס\"ב\n**מרדכי** – כלי ראשון שהורד מהאש מבשל כל עוד הוא רותח (אפילו אם הידס\"ב)\n(לכו\"ע תבלינים מתבשלים אף לאחר שירד מחום שהידס\"ב)"}, {"layer": "note", "srcRef": null, "src": "עירוי מכלי ראשון", "txt": "**רשב\"ם**: עירוי מכלי ראשון לא מבשל\n**ר\"ת**: עירוי מכלי ראשון מבשל\n**תוס' עפ\"י ר\"י**: עירוי מכלי שני מבשל קלי בישול ודברים שהדחתם היא גמר מלאכתם\n**שו\"ע**: ר\"ת. עירוי מכלי ראשון מבשל (ס' י- אסור לערות מכלי\"ר על תבלין)"}, {"layer": "note", "srcRef": null, "src": "כלי שני", "txt": "עפ\"י פשט הסוגיה – לא מבשל\n**מרדכי**: לא מבשל אפילו אם הידס\"ב\n**תוס' (עפ\"י ר\"י)**: כלי שני לא מבשל, אבל אסור משום מחזי כמבשל\n**יראים**: אנו לא יודעים מה קל בישול ומה לא. כל כלי שהידס\"ב – אסור לבשל כלום.\n**שו\"ע**: לא מתייחס בפירוש. משנ\"ב חושב שהוא מקל בכלי שני\n**רמ\"א**: מחמיר בכלי שני (אוסר בישול אחר אפייה אפילו בכלי שני. ס' ה')\nשיטת ביניים של **ערוך השולחן**: להחמיר בכלי שני רק בקלי הבישול"}, {"layer": "note", "srcRef": null, "src": "מצקת — כלי ראשון או כלי שני?", "txt": "אם שהתה בסיר: וודאי נחשבת כמוהו ככלי ראשון (משום שחומה נשתמר באותה צורה)\n   אם לא, מחלוקת: פרי חדש – כלי שני\n   **ט\"ז** – רק מה שמערים עליו מכלי\"ר נחשב כלי שני\n   **מ\"ב** – סתירה בדבריו.\n   **שש\"כ** מיישב: נחשבת כלי\"ר, אבל בבישול אחר אפייה נקל ככלי שני\n   **מנחת יצחק**: כלי שני"}, {"layer": "note", "srcRef": null, "src": "מדרג קלות בישול", "txt": "**תבלינים** – לא מתבשלים בכלי שני. אבל מתבשלים בכלי ראשון שהורד מהאש אף אם ירד מחום שהידס\"ב\n**קלי בישול** – מתבשלים אף בכלי שני (עפ\"י הסוגיה). תוס': מתבשלים אפילו בעירוי מכלי שני. יראים: אפילו בכלי שלישי\n**מלח** – מחלוקת אם נחשב קל בישול, או שלא מתבשל אפילו בכלי ראשון שירד מהאש. שו\"ע – רי\"ף רמבם ראש - לא מתבשל אף בכלי\"ר. רמ\"א: קל בישול ומתבשל אף בכלי שני\n   ר\"ן: בכל מקרה מתבשל בכלי ראשון שעל האש\n\nקשה בישול (רק בכלי\"ר שעל האש)\nרגיל בישול (בכלי ראשון שירד מהאש והידס\"ב)\nתבלין (בכלי\"ר שירד מהאש אפילו אין הידס\"ב)\nקלי בישול (אפילו בכלי שני. תוס': אפילו בעירוי. רא\"מ: אפילו כלי שלישי)"}, {"layer": "note", "srcRef": null, "src": "תה", "txt": "איפה הוא במדרג מבחינת קלות בישולו? במציאות, עלי תה (תיון) אינם מבושלים במהלך הייצור, ולא שייך להגיד בהם בישול אחר בישול/אפייה וכו'\nבכלי ראשון או עירוי ממנו וודאי שאסור לדעת השו\"ע (שהחשיב עירוי ככלי\"ר) והרמ\"א\nכלי שני – לפי הרמ\"א וודאי אסור. שו\"ע לא הכריע בדעתו על בישול בכלי שני, ויש שיקלו (המשנ\"ב סבר שהשו\"ע הקל בכלי שני). ערוה\"ש סבר להקל בכלי שני, ולאסור בו רק בקלי הבישול.\nהאם נחשב קלי בישול? משנ\"ב: נחשב קל בישול. ואסור אף בעירוי מכלי שני (תוס'). מנוחת אהבה: אינו נחשב קל בישול + אפשר להקל בבישול בכלי שני\nולכו\"ע יהיה מותר לבשל עלי התה לפני שבת, ואז להכינם בהם תה בהיתר בשבת משום שאין בא\"ב ביבש"}], "pesak": null}, "maase": {"title": "הגדרת מעשה הבישול (ריכוך או הקשייה)", "seif": null, "sugya": null, "ops": [{"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "אמר רב פפא שהתנא במשנה במקום להמשיך את רצף המלאכות מהמשכן ולהמשיך בבישול סממנין, עבר לאופה!\nהסוגיה עונה על כך שהסידור שם הוא של מלאכות שיוצרות לחם (הזורע החורש הקוצר וכו'). ולפיכך אפייה היא בישול הפת\nמימרת **רב אחא בר רב עוירא**: הזורק סיכתא לאתונא (יתד לכבשן. כדי שתתקשה) חייב. ובסוגיה מבואר שהחיוב הוא משום שהיתד מתרככת קודם ורק אז מתקשה (מירפא רפי והדר קמיט).", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "היתד מתרככת ע\"י חום האש ואז מתקשה, וכי רפי ברישא הוי בישולו. בישול הוא ריכוך.\nמכאן שבישול הוא בריכוך, וגם שייך בדברים שאינם אוכל."}, {"layer": "lead", "srcRef": null, "txt": "אולם, נראה כי ההתיחסות היא לא תמיד כך וכי כל התקנת דבר מאכל ע\"י חום האש נאסרת (ולא רק ריכוך). וכך כותב הרמב\"ם:"}, {"layer": "rishon", "src": "הרמב\"ם", "srcRef": null, "txt": "\"כללו של דבר בין שריפה גוף קשה באש או שהקשה גוף רך הרי זה חייב משום מבשל.\""}, {"layer": "acharon", "src": "משנ\"ב", "srcRef": null, "txt": "הרמב\"ם לא חולק על רש\"י שעיקר בישול הוא ריכוך, אלא שבכל הקשייה ודאי יש ריכוך.", "under": true}], "pesak": null}, "shiur_mutzak": {"title": "הגדרת שיעור בישול במוצק - כמאב\"ד", "seif": "רנ\"ד ס\"ב", "sugya": null, "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "אין צולין בשר בצל וביצה בערב שבת אלא כדי שיצולו מבעוד יום. (כלומר שאסור להניחם להתבשל אלא אם הם יספיקו להיות מבושלים לפני שבת)", "ref": {"label": "שבת · פרק יציאות השבת · יט ע\"ב", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "גמרא · רבי אלעזר", "srcRef": null, "txt": "ובגמרא מבררים - מהו השיעור של בישול?\n**רבי אלעזר** אומר: כמאכל בן דרוסאי", "ref": {"label": "שם", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "חנניא", "srcRef": null, "txt": "(וכאן מובאת גם שיטת חנניא: כל שהוא מבושל כמאב\"ד מותר
