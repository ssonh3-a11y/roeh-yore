<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מילה בשבת · סיכום אינטראקטיבי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Frank+Ruhl+Libre:wght@400;500;700;800&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#EBE6DB; --card:#F8F4EB; --card-2:#F2EDE1;
  --ink:#211C15; --ink-soft:#6B6153; --ink-faint:#9A9083;
  --rule:#D7CEBC; --line:#E2DACA;
  --pasuk:#8C6D2C; --mishna:#2F4C86; --gemara:#3E6BA6; --rishon:#4B7C6E;
  --shulchan:#211C15; --rama:#6A4A86; --acharon:#9A6A3A; --zman:#B0562E;
  --pesak:#8A2E3B; --gilt:#A9812F;
  --display:'Suez One','Frank Ruhl Libre',serif;
  --body:'Frank Ruhl Libre','Noto Serif Hebrew','Times New Roman',serif;
  --ui:'Heebo',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{direction:rtl;background:var(--paper);color:var(--ink);
  font-family:var(--body);font-size:18px;line-height:1.72;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

header.top{border-bottom:1px solid var(--rule);background:linear-gradient(180deg,#F1ECE1,var(--paper))}
.eyebrow{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.14em;color:var(--ink-soft)}
h1.topic{font-family:var(--display);font-weight:400;font-size:clamp(34px,6vw,58px);margin:.18em 0 .1em;line-height:1.02}
.subtitle{font-family:var(--ui);color:var(--ink-soft);font-size:15px;margin:0 0 20px}
.header-inner{padding:26px 0 22px}

.grid{display:grid;grid-template-columns:250px 1fr;gap:34px;align-items:start;padding:30px 0 90px}
nav.rail{position:sticky;top:16px;font-family:var(--ui)}
.rail-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--ink-faint);margin:0 0 10px 4px}
.node{margin:1px 0}
.node .row{display:flex;align-items:stretch;gap:2px}
.node a.lbl{
  display:block;flex:1;text-decoration:none;color:var(--ink-soft);font-size:14.5px;
  padding:8px 12px;border-radius:8px;line-height:1.3;border:1px solid transparent;
  transition:background .15s,color .15s;cursor:pointer}
.node a.lbl:hover{background:var(--card-2);color:var(--ink)}
.node a.lbl.active{background:var(--card);color:var(--ink);border-color:var(--line);font-weight:600}
.node a.lbl .seif{color:var(--gilt);font-weight:700;font-size:12px;margin-inline-end:6px}
.node.group>.row>a.lbl{font-weight:600;color:var(--ink)}
.node a.lbl.accent{color:var(--pesak);font-weight:700}
.node a.lbl.accent:hover{background:#F4E9E6}
.node a.lbl.accent .accent-glyph{margin-inline-end:5px}
.caret{width:26px;border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:12px;
  border-radius:7px;display:flex;align-items:center;justify-content:center}
.caret:hover{background:var(--card-2);color:var(--ink)}
.children{margin-inline-start:14px;border-inline-start:1px solid var(--line);padding-inline-start:6px;
  overflow:hidden;transition:max-height .22s ease}
.children.collapsed{max-height:0!important}
.children a.lbl{font-size:13.5px;color:var(--ink-soft)}

main{min-width:0}

/* intro (collapsible) */
details.intro-strip{background:var(--card-2);border:1px solid var(--line);border-radius:11px;margin:0 0 20px}
details.intro-strip>summary{font-family:var(--ui);font-size:13px;font-weight:700;letter-spacing:.06em;
  color:var(--ink-soft);padding:11px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
details.intro-strip>summary::-webkit-details-marker{display:none}
details.intro-strip>summary::before{content:"▸";color:var(--gilt);transition:transform .15s}
details.intro-strip[open]>summary::before{transform:rotate(90deg)}
.intro-body{padding:2px 18px 16px;font-size:17px;color:#2c261d}
/* standalone intro page — on a distinct card, not the bare interface background */
.intro-full .intro-body{padding:20px 24px;background:linear-gradient(180deg,#f4efe4,#f1ebdd);
  border:1px solid var(--line);border-radius:13px;box-shadow:0 1px 0 #e6ddc9}
.intro-body .ib-p{margin:0 0 13px;text-align:justify}
.intro-body .ib-p:last-child{margin-bottom:0}
.intro-lead{font-family:var(--display);font-size:20px;color:var(--pasuk);margin:0 0 10px}
.intro-lead-line{margin:0 0 12px;color:#2c261d;text-align:justify}
.intro-lead-line .intro-quote{color:#4a4235}
sup.fn{color:var(--gilt);cursor:pointer;font-size:.7em;margin-inline-start:1px;font-weight:700;user-select:none}
sup.fn:hover{color:var(--pesak)}
.abbr{cursor:help}
.src-conn{font-weight:400;color:var(--ink-soft);font-size:.92em}
.src-ref{font-family:var(--ui);font-size:12.5px;font-weight:500;color:var(--ink-soft)}
.src-ref .srclink{color:var(--gemara);border-bottom-color:#c3b48f}

.sec-head{margin:0 0 4px}
.sec-kicker{font-family:var(--ui);font-size:12.5px;font-weight:600;letter-spacing:.1em;color:var(--gilt)}
h2.sec-title{font-family:var(--display);font-weight:400;font-size:clamp(26px,4vw,36px);margin:.1em 0 .3em;line-height:1.1}
.spanning{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);margin:-2px 0 10px}

.sugya{font-family:var(--ui);font-size:13.5px;color:var(--ink-soft);
  margin:2px 0 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sugya .pin{color:var(--gemara);font-weight:700}
.srclink{color:var(--gemara);font-weight:600;cursor:pointer;border-bottom:1px dashed #9db7d6}
.srclink:hover{border-bottom-style:solid}

.summary-card{background:linear-gradient(180deg,#f6efdf,#f1e8d3);border:1px solid #e2d3ad;border-radius:12px;padding:14px 18px;margin:10px 0 16px}
.summary-card .sum-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--gilt);margin-bottom:6px}
.summary-card .sum-txt{font-size:16.5px;line-height:1.72;color:#332b1c}
.summary-card .sum-txt b{font-weight:700;color:#1c1811}
.summary-card .sum-txt .term{border-bottom-color:var(--rishon)}
.sec-lead{font-family:var(--body);font-size:17.5px;line-height:1.72;color:#4a4235;border-inline-start:3px solid var(--gilt);background:transparent;padding:3px 15px;margin:8px 0 15px}
.sec-lead .lead-q{color:var(--ink);font-weight:700}
.sec-lead b{font-weight:700;color:#1c1811}
.sec-lead .term{border-bottom-color:var(--rishon)}

/* flowing reference text (no box) — for מושגים / קיצור וכד' */
.flow-block{margin:6px 0 20px}
.flow-block+.flow-block{margin-top:10px}
.flow-head{font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--gilt);
  margin:0 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.flow-body{white-space:pre-wrap;font-family:var(--body);font-size:16.5px;line-height:1.62;color:#2c261d}
.flow-body b{font-weight:700;color:#1c1811}
.t-alot{color:#B07D12;font-weight:700}    /* עלות / עמוד השחר */
.t-hanetz{color:#1C8A55;font-weight:700}   /* הנץ החמה */

/* in-page sub-heading divider (e.g. שעת הדחק, האיר פני המזרח) */
.op-subhead{margin:30px 0 10px;padding-top:16px;border-top:1px solid var(--rule);
  display:flex;align-items:baseline;gap:11px;flex-wrap:wrap}
.op-subhead .ost{font-family:var(--display);font-weight:400;font-size:21px;color:var(--ink);line-height:1.2}
.op-subhead-src{font-family:var(--ui);font-size:12.5px;color:var(--ink-soft)}
.op-subhead-src .srclink{color:var(--gemara);font-weight:600}

.op{position:relative;background:var(--card);border:1px solid var(--line);
  border-right:4px solid var(--rule);border-radius:10px;padding:13px 18px 14px;margin:9px 0}
.op-lbl{font-family:var(--ui);font-size:11.5px;font-weight:700;letter-spacing:.06em;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:3px}
.op-lbl::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}
.op .src{font-family:var(--ui);font-weight:700;font-size:14.5px;margin-bottom:2px}
.op .src .srclink{border-bottom:1px dashed #c3b48f}
.op .txt{margin-top:2px}
.op .txt b,.pesak b,.intro-body b{font-weight:700;color:#1c1811}

.L-pasuk{color:var(--pasuk)} .L-pasuk.op{border-right-color:var(--pasuk)}
.L-mishna{color:var(--mishna)} .L-mishna.op{border-right-color:var(--mishna)}
.L-gemara{color:var(--gemara)} .L-gemara.op{border-right-color:var(--gemara)}
.L-rishon{color:var(--rishon)} .L-rishon.op{border-right-color:var(--rishon)}
.L-acharon{color:var(--acharon)} .L-acharon.op{border-right-color:var(--acharon)}
.L-zman{color:var(--zman)} .L-zman.op{border-right-color:var(--zman)}
/* SA & RMA — the halachic spine, stronger */
.L-shulchan{color:var(--shulchan)}
.L-shulchan.op{border-right:6px solid var(--shulchan);background:#f3ebd8;box-shadow:0 1px 0 #e5dcc4}
.L-shulchan.op .src{font-size:15.5px}
.L-rama{color:var(--rama)}
.L-rama.op{border-right:6px solid var(--rama);background:#f0eaf4}
.L-rama.op .src{font-size:15.5px}

.op.under{margin-inline-start:26px;border-right-width:2px;background:color-mix(in srgb,var(--card) 55%,transparent);opacity:.94;position:relative}
.op.under::before{content:"↳";position:absolute;inset-inline-start:-20px;top:12px;color:var(--ink-faint);font-size:15px}
.op.op-collapsed{padding:0;background:var(--card-2)}
.op.op-collapsed>summary{cursor:pointer;list-style:none;padding:11px 18px;display:flex;align-items:center;gap:9px;font-family:var(--ui)}
.op.op-collapsed>summary::-webkit-details-marker{display:none}
.op.op-collapsed>summary::before{content:"▸";color:var(--ink-faint);font-size:12px;transition:transform .15s}
.op.op-collapsed[open]>summary::before{transform:rotate(90deg)}
.op.op-collapsed>summary .op-more{color:var(--ink-soft);font-family:var(--ui);font-size:13.5px;font-weight:600}
.op.op-collapsed>.src{padding:0 18px}
.op.op-collapsed>.txt{padding:2px 18px 14px}
.op.op-collapsed .op-lbl{margin-bottom:0}
.pesak{background:linear-gradient(180deg,#fbf4ee,#f7ece4);border:1px solid #e6cdbf;
  border-right:5px solid var(--pesak);border-radius:11px;padding:15px 20px;margin:16px 0 6px}
.pesak .plbl{font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);letter-spacing:.05em;
  display:flex;align-items:center;gap:7px;margin-bottom:4px}
.pesak .plbl .dia{color:var(--gilt)}
.pesak .txt{color:#2b211d;font-size:17.5px}

.term{color:var(--rishon);border-bottom:1.5px dotted var(--rishon);cursor:help;font-weight:500}
.secref{color:var(--pesak);border-bottom:1.5px dotted var(--pesak);cursor:pointer;font-weight:600;font-family:var(--ui);font-size:.92em}

/* popovers */
#pop{position:fixed;z-index:60;max-width:290px;background:var(--ink);color:#f3ede0;
  font-family:var(--ui);font-size:13.5px;line-height:1.55;padding:11px 14px;border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .12s}
#pop b{color:var(--gilt);display:block;margin-bottom:3px;font-size:13px}
#pop.on{opacity:1}
#src{position:fixed;z-index:61;width:330px;max-width:92vw;background:var(--card);color:var(--ink);
  border:1px solid var(--rule);border-radius:12px;box-shadow:0 14px 40px rgba(30,20,10,.25);
  padding:14px 16px 12px;display:none}
#src.on{display:block}
#src .sref{font-family:var(--ui);font-weight:700;font-size:13.5px;color:var(--gemara);margin-bottom:7px}
#src .stext{font-family:var(--body);font-size:16px;line-height:1.7;max-height:230px;overflow:auto;color:#2b241b}
#src .srow{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}
#src .open{font-family:var(--ui);font-weight:700;font-size:13px;text-decoration:none;color:#fff;
  background:var(--gemara);padding:7px 13px;border-radius:8px}
#src .close{font-family:var(--ui);font-size:12px;color:var(--ink-faint);background:none;border:none;cursor:pointer}

.ask{margin-top:38px;background:#1f2a24;color:#eef0ea;border-radius:16px;padding:22px 22px 20px;font-family:var(--ui)}
.ask h3{margin:0 0 3px;font-weight:700;font-size:18px}
.ask .hint{color:#a9b6ac;font-size:13.5px;margin:0 0 14px;line-height:1.5}
.ask .chips{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.ask .chip{background:#2b3a31;border:1px solid #3c4f43;color:#d7e0d6;font-size:13px;padding:6px 12px;border-radius:999px;cursor:pointer}
.ask .chip:hover{background:#35473b}
.ask .row{display:flex;gap:9px}
.ask input{flex:1;background:#141b17;border:1px solid #37473d;color:#f2f4ef;border-radius:10px;
  padding:12px 14px;font-family:var(--ui);font-size:15px;direction:rtl}
.ask input:focus{outline:none;border-color:#5c7a67}
.ask button.send{background:var(--gilt);color:#20160a;border:none;border-radius:10px;padding:0 20px;
  font-family:var(--ui);font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap}
.ask button.send:disabled{opacity:.55;cursor:default}
.answer{margin-top:15px;background:#182019;border:1px solid #2e3d33;border-radius:11px;padding:15px 17px;
  font-size:15.5px;line-height:1.75;color:#e8ece6;white-space:pre-wrap;font-family:var(--body);display:none}
.answer.on{display:block}
.answer .secref{color:#e9b45a;border-bottom-color:#e9b45a}
.answer .note{font-family:var(--ui);font-size:12px;color:#8fa093;margin-top:11px;border-top:1px solid #2e3d33;padding-top:9px;white-space:normal}
.spin{display:inline-block;width:15px;height:15px;border:2px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-inline-start:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* flashcards */
.fc-sub{font-family:var(--ui);color:var(--ink-soft);font-size:14.5px;margin:0 0 16px}
.fc-filters{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:var(--ui);font-size:14px;margin-bottom:18px}
.fc-filters label{color:var(--ink-soft);font-weight:600}
.fc-filters select{font-family:var(--ui);font-size:14px;padding:6px 10px;border:1px solid var(--rule);border-radius:8px;background:var(--card);color:var(--ink);margin-inline-start:6px}
.fc-types{display:flex;gap:7px;flex-wrap:wrap}
.fc-t{font-family:var(--ui);font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--rule);background:var(--card);color:var(--ink-soft);cursor:pointer}
.fc-t.on{background:var(--ink);color:#f3ede0;border-color:var(--ink)}
.fc-start{margin-inline-start:auto;font-family:var(--ui);font-weight:700;font-size:14px;background:var(--gilt);color:#20160a;border:none;border-radius:9px;padding:9px 16px;cursor:pointer}
.fc-progress{display:flex;align-items:center;gap:12px;font-family:var(--ui);font-size:13px;color:var(--ink-soft);margin-bottom:12px}
.fc-bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.fc-bar i{display:block;height:100%;background:var(--gilt);transition:width .25s}
.fc-card{background:var(--card);border:1px solid var(--rule);border-radius:16px;min-height:210px;padding:26px 26px 30px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;cursor:pointer;box-shadow:0 4px 18px rgba(40,30,15,.06)}
.fc-card.flip{cursor:default;background:#f6f1e6}
.fc-tag{position:absolute;top:12px;inset-inline-end:14px;font-family:var(--ui);font-size:11px;font-weight:700;color:var(--gilt);letter-spacing:.05em}
.fc-face{max-width:620px}
.fc-q{font-family:var(--display);font-size:23px;line-height:1.35;color:var(--ink)}
.fc-a{font-family:var(--body);font-size:18px;line-height:1.7;color:#2b241b;margin-top:16px;border-top:1px solid var(--line);padding-top:16px}
.fc-a b{font-weight:700;color:#1c1811}
.fc-hint{font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);margin-top:18px}
.fc-jump{display:inline-block;margin-top:12px;font-family:var(--ui);font-size:12.5px;font-weight:700;color:var(--pesak);cursor:pointer;border-bottom:1.5px dotted var(--pesak)}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fc-controls button{font-family:var(--ui);font-weight:700;font-size:15px;border:none;border-radius:10px;padding:11px 22px;cursor:pointer}
.fc-flip{background:var(--ink);color:#f3ede0}
.fc-yes{background:#3f7d5f;color:#fff}
.fc-no{background:#a24b4b;color:#fff}
.fc-end{text-align:center;padding:34px;background:var(--card);border:1px solid var(--rule);border-radius:16px}
.fc-score{font-family:var(--display);font-size:28px;color:var(--ink);margin-bottom:16px}
.fc-perfect{color:var(--gilt);font-family:var(--ui);font-weight:700;margin-bottom:16px}
.fc-again,.fc-restart{font-family:var(--ui);font-weight:700;font-size:14px;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;margin:0 5px}
.fc-again{background:var(--gilt);color:#20160a}
.fc-restart{background:var(--card-2);color:var(--ink);border:1px solid var(--rule)}
.fc-empty{padding:20px;color:var(--ink-soft);font-family:var(--ui)}

footer{border-top:1px solid var(--rule);font-family:var(--ui);font-size:12.5px;color:var(--ink-faint);padding:18px 0 40px;text-align:center}

.home-link{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--ink-soft);text-decoration:none;display:inline-block;margin-bottom:10px;border:1px solid var(--rule);border-radius:8px;padding:5px 12px;background:var(--card)}
.home-link:hover{background:var(--card-2);color:var(--ink)}
.grid.home{grid-template-columns:1fr}
.grid.home nav.rail{display:none}
.subjects{padding:8px 0 44px;display:flex;flex-direction:column;gap:16px}
.subject-head{width:100%;display:flex;align-items:center;gap:12px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:13px 18px;cursor:pointer;font-family:var(--display);font-size:23px;color:var(--ink);text-align:start}
.subject-head:hover{background:#efe9dc}
.sh-caret{color:var(--gilt);font-size:15px;transition:transform .15s}
.subject-group.collapsed .sh-caret{transform:rotate(-90deg)}
.sh-title{flex:1}
.sh-count{font-family:var(--ui);font-size:12.5px;font-weight:600;color:var(--ink-faint)}
.subject-topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:14px 4px 2px}
.subject-group.collapsed .subject-topics{display:none}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:8px 0 40px}
.topic-card{display:block;text-decoration:none;background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:20px 22px;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 10px rgba(40,30,15,.05)}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(40,30,15,.1);border-color:var(--gilt)}
.tc-eyebrow{font-family:var(--ui);font-size:11.5px;font-weight:600;letter-spacing:.08em;color:var(--gilt);margin-bottom:8px}
.tc-title{font-family:var(--display);font-size:26px;color:var(--ink);line-height:1.1;margin-bottom:12px}
.tc-meta{font-family:var(--ui);font-size:12.5px;color:var(--ink-faint)}
@media(max-width:820px){
  body{font-size:17px}
  .grid{grid-template-columns:1fr;gap:8px;padding:14px 0 70px}
  nav.rail{position:static;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:10px}
}
</style>

<script id="content" type="application/json">{"title": "רואה יורה", "subtitle": "סיכומי הלכה אינטראקטיביים · מבחני הרבנות", "topics": [{"topic": {"title": "זמן תפילת שחרית", "eyebrow": "מבחני הרבנות · תפילה · אורח חיים סימן פ״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.89", "intro": {"lead": {"t": "'זמן תפילת השחר — משיעלה עמוד השחר, ומצותה עם הנץ החמה'", "ref": ""}, "body": "סימן פ״ט עוסק בשני עניינים: זמן תפילת שחרית — מאימתי ועד מתי — והדברים שאין לעשותם קודם התפילה.\nתחילה מתבארים המושגים והזמנים (שעות זמניות, עלות השחר, הנץ החמה וכו׳); לאחריהם נידונים זמני התפילה עצמם, ולבסוף הדברים שאסור לעשותם לפניה."}}, "sections": {"musagim": {"title": "ביאור מושגים", "seif": null, "sugya": null, "flow": [{"head": "חלוקת התוכן", "body": "בב״י (א׳) שני דיונים הלכתיים:\n   א.  זמן תפילה המוקדם — עמוד השחר או הנץ החמה?\n   ב.  זמן התפילה המאוחר — המוקד בשאלת שכר תפילה בזמנה."}, {"head": "מושגים מקדימים", "body": "**חלוקת היום ו׳שעות זמניות׳:**\nאנו עובדים עם ׳שעות זמניות׳. בשונה מהחלוקה שרגילים בה העולם, בה מחלקים את כל היממה ל־24 שעות, בשעות זמניות אנו מחלקים רק את היום (בלי הלילה), ול־12 חלקים.\nאין החלוקה של יום ולילה שווה. כלומר, היום אינו 12 שעות רגילות, ואין חפיפה בין שעה זמנית לשעה רגילה. אנו מגדירים ׳יום׳ עפ״י זמני האור, ולכן, היחס בין יום ללילה יישתנה בין חורף לקיץ:\n   בקיץ  - היום יותר ארוך מהלילה.\n   בחורף – היום יותר קצר מהלילה.\nובהתאמה:  בקיץ  - שעה זמנית > שעת 60 דקות\n               בחורף - שעה זמנית < שעת 60 דקות\nיש מחלוקת מה בדיוק ההגדרה של יום; מתי היום מתחיל ומתי מסתיים (דהיינו, איזה טווח זמן אנו מחלקים ל־12):\n   גר״א:  תחילת היום – הנץ החמה\n              סוף היום – שקיעה\n   מג״א:  תחילת היום – עלות השחר\n              סוף היום – צאת הכוכבים\nכלומר, למג״א היום ארוך יותר, וכך גם כל שעה זמנית.\n\n**זמני היום הרלוונטיים עפ״י סדר:**\nעלות השחר  ←  הנץ החמה (זריחה)  ←  שליש היום (4 שעות זמנ׳)  ←  חצות היום  ←  צאת הכוכבים\n   שליש היום = סוף זמן תפילה  ·  חצות היום = סוף זמן תפילה בדיעבד\nעמוד השחר – התבהרות השמיים. ׳האיר פני המזרח׳ (מ״ב מדקדק בזה)\nהנץ החמה – עליית קרני השמש"}]}, "tehila": {"title": "תחילת זמן שחרית", "seif": "סעיף א׳,ח׳", "sugya": {"label": "ברכות · פרק תפלת השחר · כו.", "ref": "Berakhot.26a"}, "summary": "תחילת זמן תפילת שחרית מתברר לנו דווקא מהדיון ב**משנה** על סופה. יתרה מכך, **הגמרא** מתעמתת עם **ברייתא** שלפיה אין בכלל מושגים של תחילה וסוף, אלא 'מצוותה עם הנץ החמה'. הגמרא משייכת את הזמן המוקדם יותר — 'עם הנץ החמה' — לוותיקין, ואת הזמן של ר' יהודה וחכמים למאחרים, ובכך מייצרת טווח זמן שיש בו תחילה וסוף, ולא שעה ספציפית.\nגם לאחר שלקחה הגמרא את 'מצוותה עם הנץ החמה' והפכה אותה ל'תחילת זמן תפילה', **הראשונים** (רא\"ש, תוס', רמב\"ם) מזכירים כי בכלל תפילות כנגד קורבנות. לכן תחילת זמן התפילה כתחילת זמן קרבן התמיד — משיעלה עמוד השחר!\nלכן, בעקבות הברייתא של 'מצוותה עם הנץ החמה', מייצרים הראשונים מדרג כזה: לכתחילה, ראוי להתייחס להנץ החמה כתחילת זמן תפילה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. וכן פוסק **הש\"ע**.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מחלוקת **חכמים** ו**רבי יהודה** גבי זמן תפילת שחרית:\nחכמים: עד חצות\nרבי יהודה: עד 4 שעות"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "**ורמינהו**: מצוותה (של ק\"ש) עם הנץ החמה (ותו לא. כדי שיסמוך גאולה לתפלה).\nכלומר: מכך שכדי לסמוך ק\"ש לתפילה צריך לקרוא ק\"ש בהנץ החמה — גם תפלה בהנץ החמה! אז איך חכמים ורבי יהודה מדברים על 'עד חצות' ו'4 שעות'?\n**תירוץ**: הברייתא מדברת לותיקין (**רש\"י**: המקדימים למצוות ומחזרים לעשותן בזמנן). ובמשנה — ה'עד חצות' של חכמים וה־4 שעות של רבי יהודה למאחרים.\n(כלומר, כל הסיבה שהראשונים הולכים להסתבך עם לכתחילה־בדיעבד ולתעדף את הנץ החמה על אף שכבר בעמוד השחר מתחיל זמן שחרית — זה בעקבות הברייתא על ק\"ש.)\n**מסיקים**: הלכה כרבי יהודה (כי במשנה בעדויות כוותיה).\nלכן: למאחרים — סוף זמן תפלה סוף 4 שעות זמניות מתחילת היום; למקדימים — מתפללים עם הנץ החמה."}, {"layer": "rishon", "src": "רא\"ש · רמב\"ם · תוס'", "srcRef": null, "txt": "תחילת זמן שחרית — משיעלה עמוד השחר (כזמן קרבן התמיד).\nעיקר מצוות שחרית — עם הנץ החמה (כברייתא).\nבדיעבד אם התפלל — משיעלה עמוד השחר."}, {"layer": "gemara", "src": "ריו\"ח", "srcRef": null, "txt": "הנץ החמה — מצווה מן המובחר.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "זמן 'מצוותה' של תפלת שחרית מתחיל עם הנץ החמה. אך בדיעבד, גם אם התפלל לפני כן, בין 'עלות השחר' ל'הנץ החמה' — יצא. (**רא\"ש, רמב\"ם, תוס'**)"}, {"subhead": "'האיר פני המזרח'"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מ\"ב**: 'האיר פני המזרח' = כל המזרח, ולא רק נקודה.\n**רע\"א**: אפילו אם יש עוד כוכבים בשמיים — העיקר שיאיר פני המזרח.\n**מג\"א**: יוצא בדיעבד אפילו אם לא 'האיר פני המזרח', כל שעלה עמוד השחר.\n**מ\"ב ואחרונים**: אם לא האיר פני המזרח — לא יוצא."}, {"subhead": "זמנים מיוחדים"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מהרש\"ל**: בימי הסליחות ראוי להיזהר מלהקדים ולהתפלל לפני הנץ החמה.\n**מג\"א**: אולי סמכו על זה שיש טורח לציבור ללכת אחר הסליחות הביתה ולבוא שוב לשחרית.\n**פמ\"ג**: בשבועות — אחרי שערים כל הלילה — מותר להתפלל קודם הנץ (טורח הציבור ללכת ולחזור)."}, {"subhead": "שעת הדחק (ס׳ ח׳)", "src": "ברכות · ל.", "srcRef": "Berakhot.30a"}, {"layer": "lead", "srcRef": null, "txt": "בשעת הדחק, אפילו לכתחילה אפשר להתפלל קודם הנץ החמה. אבל לק\"ש מחכים ל'משיכיר' (סי' נח).\nכלומר, יש כאן שתי משוואות:\nכוונה > עיקר זמן תפלה (הנץ החמה)\nכוונה > סמיכת גאולה לתפילה"}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "**ת\"ק**: מי שהשכים לצאת לדרך לפני הנץ החמה — מתפלל, ואח\"כ משלים ק\"ש בזמן ('משיכיר').\n**ר' שמעון בן אלעזר**: לא יתפלל לפני זמן ק\"ש. ממילא צריך לסמוך גאולה לתפילה.\n**אבוה דשמואל ולוי**: נהגו כת\"ק — יצאו מוקדם לדרך, והקדימו והתפללו לפני הנץ החמה, ואח\"כ קראו ק\"ש בזמנה."}, {"layer": "gemara", "src": "שורש המחלוקת", "srcRef": null, "txt": "**לת\"ק** — יותר חשוב תפילה בכוונה (בדרך לא יוכלו לכוון, לכן מתיר להתפלל לפני היציאה).\n**לר' שמעון ב\"א** — יותר חשוב סמיכת גאולה לתפילה.", "under": true}, {"layer": "rishon", "src": "ר\"ח · רא\"ש · רב האי גאון", "srcRef": null, "txt": "כת\"ק, אבוה דשמואל ולוי."}, {"layer": "rishon", "src": "בה\"ג · תוספות", "srcRef": null, "txt": "כר' שמעון בן אלעזר.", "under": true}, {"layer": "rishon", "src": "רשב\"א", "srcRef": null, "txt": "אם מדובר בדרך שממש לא יכול לכוון בה — הרי שגם ק\"ש יכול להקדים!\nההיתר של הברייתא מדבר בדרך בה יכול לכוון לפחות בפס' ראשון ק\"ש, אבל לא בעמידה.\n(וכך פוסקים בסי' נח)", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ח׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.8", "txt": "בשעת הדחק, כגון מי שהשכים לצאת לדרך — מותר להתפלל עמידה כבר משעלה עמוד השחר.\nאבל בלי ק\"ש, וישלים אח\"כ ק\"ש בזמנה ('משיכיר').\nולמרות שלא סומך גאולה לתפלה — עדיף שיכוון בתפילה בביתו משיסמוך. (**ת\"ק, ר\"ח, רא\"ש, רב האי גאון**)"}, {"layer": "acharon", "src": "מג\"א · ערוה\"ש", "srcRef": null, "txt": "העולם לא נוהגים כן — הם מתפללים בדרך בהנץ החמה. אולי כי היום א\"א לכוון כ\"כ."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "שאפשר להתפלל כבר מעמוד השחר = משהאיר המזרח.", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "אם יהיה אנוס כך שלא יכול לכוון אפילו בפס' ראשון של ק\"ש — יגיד גם ק\"ש בע\"ה. (**רשב\"א**)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם האיר המזרח — נוטה יותר להגיד גם ק\"ש לפני זמנה, מאשר לפצל (נ\"ל שאפילו אם יוכל לכוון בפס' ראשון בדרך).", "under": true}, {"subhead": "מהי 'שעת הדחק'?"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**בברייתא** — מדובר על 'המשכים לצאת לדרך'.\n**טור**: מי שהוא אנוס.\n**ש\"ע**: שעת הדחק, כגון שצריך להשכים לדרך. (**מ\"ב**: והולך עם שיירה שלא ממתינה לו)\n**מ\"ב** (וכן משמע בסוגיה, ראשונים וב\"י): כל סיטואציה בה לא יכול לכוון בתפילתו.\n**ערוה\"ש**: מי שאינו יכול להתעכב ומוכרח לצאת לפני הנץ החמה. (פשיטא שגם בנסיעה, ולאו דווקא הליכה)"}, {"subhead": "מי שכבר בדרך"}, {"layer": "acharon", "src": null, "srcRef": null, "txt": "**מג\"א**: לפי מה שאנחנו מעדיפים כוונה על סמיכת גאולה לתפילה — מי שנמצא בדרך ועדיין לא התפלל, עדיף שיפצל ויגיד ק\"ש כשיכול (אף בלא תפילין), אבל יתפלל ש\"ע רק כשיוכל לכוון.\n**פמ\"ג**: אך אם רואה שיעבור זמן תפילה לכתחילה (4 שעות) — יתפלל בדרך (על אף שיתקשה לכוון)."}], "pesak": null}, "sof": {"title": "סוף זמן שחרית", "seif": "סעיף א׳", "sugya": {"label": "ברכות · פרק תפלת השחר · כו.", "ref": "Berakhot.26a"}, "ops": [{"layer": "gemara", "src": "משנה · גמרא", "srcRef": null, "txt": "חכמים: עד חצות; רבי יהודה: עד 4 שעות. ומסיקים: הלכה כרבי יהודה."}, {"layer": "shulchan", "src": "שולחן ערוך (לכתחילה) · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "סוף זמן שחרית — סוף 4 שעות, שהוא שליש היום (כרבי יהודה)."}, {"layer": "rishon", "src": "רבנו ירוחם", "srcRef": null, "txt": "לא התפלל עד 4 שעות והתפלל עד חצות — יצא ידי חובת תפילה, אך לא ידי 'תפילה בזמנה'."}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "'בדיעבד' — אף אם הזיד, לא רק נאנס או טעה.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך (בדיעבד) · ס׳ א׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.1", "txt": "התפלל אחר 4 שעות אך עד חצות — יצא (שכר תפילה, לא בזמנה), בין במזיד בין בשוגג (רבנו ירוחם, ב״י)."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "אחר חצות היום — אסור להתפלל שחרית."}, {"layer": "acharon", "src": "פמ״ג · פר״ח · ט״ז", "srcRef": null, "txt": "בין 4 שעות לחצות — פמ״ג: מותר לכתחילה. פר״ח: רק בדיעבד. ט״ז: אף בין 4 שעות למנחה יוצא, ואף לכתחילה (חולק על הרמ״א).", "under": true, "collapsed": true}], "pesak": "לכתחילה עד סוף 4 שעות; בדיעבד עד חצות (יצא, אך לא בזמנה); אחר חצות — אסור (רמ״א).", "summary": "לכתחילה סוף זמן שחרית — סוף 4 שעות זמניות (שליש היום, כרבי יהודה, שהלכה כמותו). בדיעבד — אם התפלל עד חצות יצא ידי 'תפילה', אך לא 'תפילה בזמנה'. ונחלקו האם בין 4 שעות לחצות מותר להתפלל אף לכתחילה."}, "kitzur": {"title": "קיצור הלכה", "seif": null, "sugya": null, "navAccent": true, "flow": [{"body": "**תחילת זמן תפילת שחרית:**\n   ׳מצוותה׳ (לכתחילה)   –  עם הנץ החמה (זריחה)\n   בדיעבד / שעת דחק     –  משעלה עמוד השחר\n\n**סוף זמן תפילת שחרית:**\n   לכתחילה  –  עד סוף 4 שעות (שליש היום)   (שכר תפילה בזמנה)\n   בדיעבד   –  עד חצות היום   (שכר תפילה)\n      פר״ח:         בדיעבד = התפלל כבר, במזיד או בשוגג.\n      פמ״ג, ט״ז:  בדיעבד = אפילו לא התפלל; יכול להתפלל לכתחילה."}]}, "yesodot": {"title": "עשיית דברים קודם התפילה — שני יסודות", "seif": null, "sugya": null, "summary": "הערה על עשיית צרכים ושאילת שלום:\nעל אף כי שני העניינים דומים ועיקרם בעשיית מעשה קודם התפילה, נראה כי מקורם שונה וכן, מהותם.\nבשיעור, עמדנו על כך (דרך הראשונים) ש'איסור' אמירת שלום לחברו קודם התפילה יסודו בביכור והעדפה של ישות אחרת על פני הקב\"ה. היינו: ע\"ז. במות.\nלעומת זאת, מובן (מסוים, של חלק מן הראשונים) העיסוק בחפצי האדם קודם התפילה – הוא בחשש שכחת התפילה (מפני הטרדה בעיסוק).\nאך אצל הרמב\"ם מובן שונה עולה. לפיו, העיסוק בחפצים הוא דין בהכנה לתפילה. היינו, העיסוק בחפצים מעמיס על האדם טרדות שיקלקלו את איכותה של תפילתו.", "ops": [], "pesak": null}, "shlom": {"title": "שאילת שלום", "seif": "סעיף ב׳", "sugya": {"label": "ברכות · פרק היה קורא · יד.", "ref": "Berakhot.14a"}, "ops": [{"layer": "gemara", "src": "רב · רב ששת · רבי אבא", "srcRef": null, "txt": "רב: האומר שלום לחברו קודם התפילה — כאילו עשאו במה. רב ששת הקשה מק״ש (שמותר לשאול בשלום מפני הכבוד). רבי אבא העמיד: רב אוסר רק 'במשכים לפתחו'; נתקל בדרך — מותר."}, {"layer": "rishon", "src": "רבני פרובינציא", "srcRef": null, "txt": "אף במשכים לפתחו — אסור רק 'שלום' (ששמו של הקב״ה שלום); 'צפרא דמרי טב' מותר.", "under": true}, {"layer": "rishon", "src": "תלמידי ר׳ יונה", "srcRef": null, "txt": "ההולך להקביל פני חברו — אף 'צפרא דמרי טב' אסור.", "under": true}, {"layer": "rishon", "src": "רשב״א", "srcRef": null, "txt": "אף אם נתקל — ישנה ויאמר 'צפרא דמרי טב' (שיזכור שהתפילה בראש מעייניו).", "under": true}, {"layer": "rishon", "src": "ר׳ ירוחם · אורחות חיים", "srcRef": null, "txt": "ר׳ ירוחם: במשכים לפתחו אסור רק לכרוע; שלום מותר; נתקל — הכול מותר. אורחות חיים: אסור רק כריעה; שלום מותר בכל לשון; ואם אמר ברכות ק״ש — אף כריעה.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · ס׳ ב׳", "srcRef": "Shulchan_Arukh,_Orach_Chayim.89.2", "txt": "משהגיע זמן תפילה — אסור לה רית.", "הנץ החמה": "זריחת השמש; זמן 'מצוותה' של שחרית לכתחילה.", "ותיקין": "המקדימים למצוות ומדקדקים לקיימן בזמנן — מתפללים עם הנץ החמה.", "מצוותה": "הזמן המובחר לקיום המצווה (בשחרית — הנץ החמה).", "סמיכת גאולה לתפילה": "לסמוך את ברכת 'גאל ישראל' (סוף ק״ש) לתפילת עמידה בלא הפסק.", "משיכיר": "הזמן שבו מכיר את חברו הרגיל ברחוק ד׳ אמות — זמן ק״ש לכתחילה.", "שעת הדחק": "מצב אילוץ (כמשכים לדרך) שבו הקילו להתפלל מעלות השחר.", "צפרא דמרי טב": "'בוקר טוב לאדוני' — נוסח ברכת שלום המותר (שאינו לשון 'שלום').", "מלאכת מחשבת": "מלאכה מכוונת ומתוכננת; דין הקובע חיוב במקצת מלאכות שבת."}, "subject": "תפילה וברכות", "id": "tefila"}, {"topic": {"title": "מילה בשבת", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן של״א", "siman": "Shulchan_Arukh,_Orach_Chayim.331", "intro": {"lead": {"t": "וְבַיּוֹם הַשְּׁמִינִי יִמּוֹל בְּשַׂר עׇרְלָתוֹ (ויקרא)", "ref": "Leviticus.12.3"}, "body": "ברית המילה צריכה להיעשות ביום השמיני. אך מה קורה אם היום השמיני יוצא בשבת?\n\nבפרק רבי אליעזר דמילה, מובא בגמרא כי מילה דוחה את השבת ('וביום השמיני ימול בשר ערלתו – אפילו בשבת')\\cite{בבלי · שבת · קלב ע\"א}{Shabbat.132a}.\n\nולפיכך, נאמר במשנה כי עושים כל צרכי מילה בשבת\\cite{בבלי · שבת · קלג ע\"א}{Shabbat.133a}. היינו שמותר 'לחלל' את השבת בעשיית כל מעשי המילה.\n\nאולם, דווקא את המילה עצמה מותר לעשות בשבת. אך מכשיריה – אשר ניתן להכין מערב שבת – לא דוחים השבת אפילו בדרבנן. (לכן אסור להביא סכין בשבת או לשחוק כמון וכו')\n\nלפיכך, כתבו הפוסקים, שאם אדם לא הכין לשבת את הדברים הנצרכים למילה, יש לדחות אותה; ואסור לחלל את השבת כלל על מנת להשיגם. אולם, אם יש לו גוי, מותר לומר לו לעבור על דרבנן לשם כך (למשל, שיביא סכין מרשות בדרבנן. ולדעת הרמ\"א במקום צורך גדול -כגון כאן- מותר אף להגיד לו לעבור בדאורייתא).\n\nוגם, מותר להכין את הכשרי המילה שבהכנתם עוברים בדרבנן בשינוי (משום שקיי\"ל שהתירו שבות ע\"י שינוי לצורך זה).\n\nבעצם, זה שלא מחללים על מכשירי מילה אלא רק לצרכה ממש, אין זה אומר שהמילה חשובה פחות משאר פיקוחי נפש מהבחינה הזאת. אלא שהיא דבר שאנו יודעים עליו מראש, לכן יש להתכונן בהתאם ולהימנע מחילול שבת שאינו נצרך בכל מידה שניתן. ניתן לדרג את ענייני פיקוח נפש, יולדת ומילה במדרג זה: פיקוח נפש → יולדת → מילה."}}, "sections": {"tzorchei": {"seif": "סעיף א׳", "title": "צרכי ומכשירי מילה", "sugya": null, "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "עושין כל צרכי מילה בשבת: מוהלים, פורעים ומוצצים, ונותנים תחבושת.\n(מוהלים = חותכים את הערלה החיצונית; פורעים = קורעים את העור שמתחת לערלה; מוצצים = את דם הפצע, ואע\"ג שנחשב לעשיית חבּורה.)", "ref": {"label": "שבת · פרק ר״א דמילה · קלג ע״א", "ref": "Shabbat.133a"}}, {"layer": "gemara", "src": "גמרא · רב פפא", "srcRef": null, "txt": "רב פפא אומר שמותר למצוץ למרות שבכך הדם ניתק ממקומו ויש בכך עשיית חבורה.\nומתבאר גם שעם נתינת התחבושת על האיבר, שמים עליה כמון לרפואה (ועל אף שיש בכך חשש שמא ישחק סממנים).", "ref": {"label": "שם", "ref": "Shabbat.133a"}}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ א׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.1", "txt": "כתב עפ\"י המשנה שעושים כל צרכי המילה: מוהלין ופורעין ומוצצין ונותנין עליו כמון."}, {"layer": "acharon", "src": "מ\"ב בשם שו\"ת בני ציון", "srcRef": null, "txt": "שהמציצה מותר לעשותה דווקא בפה.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ו׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "מכשירי מילה לא דוחים את השבת, משום שאפשר לעשותם מער\"ש. לכן אסור להביא סכין מילה מרשות אחרת, או לחמם מים וכו' — ואפילו אם זה רק בדרבנן.\n(כרבי עקיבא במשנה: כל מלאכה שאפשר לעשותה מער\"ש — אינה דוחה שבת.)"}, {"subhead": "רחיצה · צורך מילה (סע׳ ט׳)"}, {"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "מותר לרחוץ את התינוק במים חמים, הן לפני המילה והן אחרי המילה, אבל רק בידיים, ולא בכלי. (כלומר, זה נחשב מצרכי המילה, גם לפני וגם אחרי; וחשוב לרפואת התינוק.)", "ref": {"label": "שבת · פרק ר״א דמילה · קלד ע״א", "ref": "Shabbat.134"}}, {"layer": "mishna", "src": "רבי אלעזר בן עזריה", "srcRef": null, "txt": "אף ביום השלישי למילה מותר לרחוץ אותו (אם יוצא בשבת. עפ\"י הפס' 'ויהי ביום השלישי בהיותם כואבים')."}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "פסקו כרבי אלעזר בן עזריה.\nיוצא אם כן, שמותר אפילו לחלל שבת ע\"מ לחמם מים לצורך רחיצה — לפני המילה, לאחר המילה וביום השלישי.", "ref": {"label": "שם", "ref": "Shabbat.134"}}, {"layer": "lead", "srcRef": null, "txt": "אבל מה לגבי היום השני? האם 'היום השלישי' הוא היום השלישי דווקא? או שהוא מן הסתם לרבותא גם את היום השני?"}, {"layer": "rishon", "src": "הרב המגיד ברמב\"ם", "srcRef": null, "txt": "משמע שדווקא היום השלישי. לכן אסור לחמם מים בשבת ליום השני."}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "אף ביום השני מותר.", "under": true}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "כל זה נכון לזמן הגמרא, שאז היה זה סכנה לתינוק אם לא היו רוחצים אותו בימים הנ\"ל. אולם בימינו שלנו, שאין זה מסוכן אם לא נעשה כן — אסור לחלל על כך את השבת; ודינו כדין סתם רחיצה של גדול."}, {"layer": "shulchan", "src": "שולחן ערוך", "srcRef": null, "txt": "האידנא לא נחשבת רחיצת התינוק לפני ואחרי המילה וביום השלישי כדבר הנחוץ לתינוק; ולכן אסור לחלל לשם כך את השבת (ואף לא נחשב הכשר מילה)."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "במדינות אשכנז נהגו בשטיפת הוולד לפני המילה בימים הנ\"ל וביום השלישי אם הוחמו מער\"ש (כלומר למרות שעפ\"י שכ\"ו מותר רק פניו ידיו ורגליו; נחשב צורך גדול, אבל עדיין לא חיללו שבת). אבל לאחר המילה — חיכו עד מוצ\"ש."}, {"layer": "zman", "src": "הרב מרדכי הלפרין", "srcRef": null, "txt": "וכמובן שאם רואים שיש לתינוק סכנה ויש צורך בשטיפתו — מותר אף לחלל את השבת ולחמם. ויש כיום מודעות למחלות באיבר המין הנפוצות במדינות שונות, המצריכות שטיפה במים חמים לאחר המילה כנ\"ל; וכן הוא בארץ ישראל."}, {"layer": "acharon", "src": "מ\"ב בשם תשב\"ץ", "srcRef": null, "txt": "תינוק שהיה חולה ונתרפא — אסור למול אותו ביום חמישי, משום שיש חשש שתהא בו סכנה בשבת, שהיא היום השלישי למילה, ואז יצטרכו לחלל עליו את השבת; ובגלל שמילה שאינה בזמנה אינה דוחה את השבת.\n(אך הש\"ך ומג\"א חלקו, וסברו שוודאי מותר למול שלא בזמנו ביום ה'.)", "collapsed": true}, {"subhead": "אמירה לגוי (סע׳ ו׳)"}, {"layer": "shulchan", "src": "שולחן ערוך · ש\"ז", "srcRef": "Shulchan_Arukh,_Orach_Chayim.307", "txt": "פסק בסימן ש\"ז כדעת הרמב\"ם, שאמירה לגוי מותרת בשבות דשבות לצורך מצווה. כלומר, האמירה עצמה היא שבות, ואיסור דרבנן הוא שבות; לפיכך מותר להגיד לגוי לעבור על איסור דרבנן לצורך מצווה."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ו׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.6", "txt": "ולפי זה נקט גם בעניין דידן: מכשירי מילה — אשר אסור לחלל עליהם שבת כלל — אסור אף לומר לגוי לחלל עליהם את השבת. אלא שבאיסורי דרבנן, שאז הווי שבות דשבות לצורך מצוות המילה — מותר."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "במקום צורך גדול ניתן להקל באמירה לגוי לצורך מצווה אף בדאורייתא (עפ\"י מה שכתב בש\"ז, כדעת העיטור)."}, {"layer": "acharon", "src": "מ\"ב בשם תוספות", "srcRef": null, "txt": "ונראה שלעניין מילה אפשר להקל יותר בדאורייתא, שהרי יש מי שסבר (תוספות שם) שמותרת אמירה לגוי לצורך מילה ויישוב הארץ בכל גווני.\nולעניין טלטול — לדעת רוב הפוסקים אין רה\"ר דאורייתא בזמן הזה, אז בכך ודאי ניתן."}, {"subhead": "מתי נחשב 'צורך מילה' (סע׳ ב׳)"}, {"layer": "lead", "srcRef": null, "txt": "למדנו שכל צורכי מילה דוחים את השבת. והסוגייה מלמדתנו עפ\"י ברייתא, כי זמן החלון לעשות צרכי המילה (אפילו הורדת חתיכות העור שאינן מעכבות לכשרות המילה) — הוא מהרגע בו התחיל המוהל את המילה, וכל זמן שלא סילק ידו מהעיסוק במילה. אז עדיין יכול לחזור ולחתוך אפילו הציצין שאינם מעכבין; אבל מרגע שסילק ידו — יכול לחזור רק לשם הציצין המעכבים."}, {"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "כל זמן שהוא עוסק במילה — חוזר אף לציצין שאינם מעכבים. פירש מן המילה — חוזר רק לצורך ציצין המעכבין. (משום שאין צורך בהורדתם ואינם צורך מצווה.)", "ref": {"label": "שבת · פרק ר״א דמילה · קכג ע״ב", "ref": "Shabbat.123b"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מוסבר שהציצין המעכבין הם הבשר המכסה את רוב העטרה. היינו, את הגיד סביב ומטה.", "ref": {"label": "שם", "ref": "Shabbat.123b"}}, {"layer": "rishon", "src": "העיטור", "srcRef": null, "txt": "הטור הביא ביו\"ד (רסו) את העיטור, שסבר שאפילו אם פירש מעיסוקו במילה חוזר אף לצורך ציצין שאינם מעכבים. (ב\"י: טעמו שסובר שהגמרא דחתה את הברייתא להלכה.)"}, {"layer": "rishon", "src": "רא\"ש · טור", "srcRef": null, "txt": "סברו כפשט הברייתא.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ב׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.2", "txt": "כל זמן שלא סילק ידו מן המילה — חוזר אפילו על ציצין שאינם מעכבין. אך אם סילק ידו — אינו חוזר, אלא רק על ציצין המעכבין. ואילו הם המעכבין — בשר החופה אפילו רוב גובהה של עטרה."}, {"layer": "acharon", "src": "ר\"ן", "srcRef": null, "txt": "זמן העיסוק הוא אפילו אם הפסיק את החיתוך; אבל הסתפק לגבי שלב המציצה, אם נחשב עדיין עיסוק ומותר לחזור לציצין אלו.", "under": true}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "נחשב שעוסק במצוות המילה, ויכול לחזור.", "under": true}], "pesak": null}, "safek8": {"seif": "סעיף ג׳", "title": "ספק נולד בחודש שמיני", "sugya": null, "intro": "בסימן ש\"ל, ראינו עפ\"י הברייתא בקל\"ה (פרקנו, ר\"א דמילה) שאין מחללין את השבת על תינוק שנולד בחודש השמיני, או שספק אם נולד בחודש השמיני (כי מנקודת הנחה שהוא בוודאי ימות, וזה אפילו לא ספק פיקוח נפש). אולם, אם גמרו שערותיו וציפורניו — נחשב שנולד בחודש השביעי, ולכן מותר. וכן, שהה שלושים יום ויותר — מחללים.\nלפיכך, נפקא מינא גם לגבי מילה: שהרי אם אין מחללים את השבת על בן חודש ח'/ספק בן חודש ח' — משמע שגם לא מלים אותו.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "אין מחללין את השבת על תינוק שנולד בחודש השמיני, או ספק חודש שמיני.", "ref": {"label": "שבת · פרק ר״א דמילה · קלה ע״א", "ref": "Shabbat.135"}}, {"layer": "gemara", "src": "גמרא · רב אדא בר אהבה", "srcRef": null, "txt": "סובר שספק נולד בחודש שמיני מותר למול, וממה נפשך: אם הוא בן שבעה ויחיה — ודאי מותר למול; ואם בן שמונה — אז רק חתך בבשר (ולא חבורה, האסורה בשבת).\nובאמת מסבירים שרק מכשירי מילה אסורים לצורך מילת ספק בן 8.", "ref": {"label": "שם", "ref": "Shabbat.135"}}, {"layer": "lead", "srcRef": null, "txt": "האם קיי\"ל כרב אדא בר אהבה, או שאסור עפ\"י פשט הברייתא?"}, {"layer": "rishon", "src": "רי\"ף · רא\"ש", "srcRef": null, "txt": "מביאים רק את הברייתא, ולא את הסברא של רב אדא להתיר."}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "לכן משמע שהרי\"ף אוסר למול ספק בן שמונה (שאם היה מתיר, היה מוריד את הברייתא ומביא את רב אדא בר אהבה).", "under": true}, {"layer": "rishon", "src": "בית יוסף", "srcRef": null, "txt": "חולק על קריאת הר\"ן ברי\"ף. מעמיד את מה שאסרה הברייתא למול דווקא בשלא גמרו שערותיו וציפורניו; אבל אם גמרו — מותר למול את הוולד אפילו אם נולד בחודש שמיני בוודאות, ואין צורך להעמיד כרב אדא. [וכן סובר גם בדעת הרמב\"ם.]"}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ג׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.3", "txt": "בן שמונה — אסור למול אותו. ספק בן שמונה — מותר אם גמרו שערותיו וציפורניו."}, {"layer": "rama", "src": "רמ\"א · יו\"ד רסו", "srcRef": "Shulchan_Arukh,_Yoreh_De'ah.266", "txt": "כדעת הטור והר\"ן, שמלין כל ספק בן שמונה (אפילו לא גמרו)."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "'נהרא נהרא ופשטיה' — כלומר, כל אחד ומנהגו.", "collapsed": true}, {"layer": "zman", "src": "פוסקי זמננו", "srcRef": null, "txt": "בכל מקרה, כיום ודאי שדין נולד לחודש שמיני אינו רלוונטי, כאשר יש לנו רפואה מתקדמת וכו'. אולם, לא נמול פג בכל מקרה, משום שיש לו בכך סכנה."}], "pesak": null}, "safek-chiyuv": {"seif": "סעיף ה׳", "title": "מהול, אנדרוגינוס ונולד בבין השמשות", "sugya": null, "intro": "שתי קבוצות נוספות של וולדים שאין מחללים עליהם את השבת במילתם:\n(1) ספק אם חייבים במילה בשבת: אנדרוגינוס, מהול, ונולד בבינה\"ש.\n(2) לא צריכים מילה ביום השמיני משום שהיולדת לא נטמאה.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "למדים שרק מי שחייב במילה בוודאות — דוחים בעבור מילתו את השבת. אבל אם הוא בספק אם חייב במילה — לא מחללים עליו.\nוהם: אנדרוגינוס (ספק אם הוא זכר או נקבה); נולד בבין השמשות (ספק אם נולד בשישי או בשבת, ולכן ספק אם היום ה-8 הוא שבת או ראשון); נולד מהול (ספק אם צריך להטיף ממנו דם ברית).", "ref": {"label": "שבת · פרק ר״א דמילה · קלה ע״א", "ref": "Shabbat.135"}}, {"layer": "gemara", "src": "גמרא · רבי אסי", "srcRef": null, "txt": "הסמיכות של 'אשה כי תזריע וילדה ונטמאה' ו'ביום השמיני ימול בשר עורלתו' מלמדת שרק אם היולדת נטמאה בלידתה — מלים את התינוק ביום השמיני ומחללים עליו את השבת.\nומאחר ותינוק יוצא דופן לא יצא מן הפתח וטימא את היולדת, ותינוק של נכרית אין לה במה להיטמא — אין מלים אותם ביום השמיני, וכל שכן שלא מחללים את השבת על מילתם.", "ref": {"label": "שם", "ref": "Shabbat.135"}}, {"layer": "rishon", "src": "רמב\"ם · ר\"י", "srcRef": null, "txt": "אנדרוגינוס — במשנה מחלוקת ת\"ק ור' יהודה (המתיר). הרמב\"ם פוסק כת\"ק, והר\"י פוסק כרבי יהודה."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ה׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.5", "txt": "פוסק כרמב\"ם, שאין מילתו של אנדרוגינוס דוחה את השבת. וכן פסק לגבי מהול ונולד בבינה\"ש, שלא מחללים עליהם את השבת מספק. וגם עפ\"י דברי רבי אסי — שוולד שאמו לא נטמאה בלידתו, אין מילתו דוחה את השבת (משום שאינה חייבת להיעשות ביום השמיני)."}, {"layer": "acharon", "src": "ביאור הלכה · נידה", "srcRef": null, "txt": "מתי נחשב שנולד התינוק (כדי לבדוק את הספק)? במסכת נידה למדים ממעשה של רבא, שאם התינוק הוציא ראשו מן הפרוזדור (פתח הגוף) — נחשב שנולד. ולכן, אם יודעים מתי הוציא הוולד את הראש — סופרים שמונה ימים מרגע זה."}], "pesak": null}, "shelo-bizmana": {"seif": "סעיף ד׳", "title": "מילה שלא בזמנה", "sugya": null, "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "רק מילה בזמנה דוחה את השבת; ומילה שלא בזמנה — אינה דוחה. וכך בברייתא בפרקנו (קלב:). זאת משום שהמילה מותרת בשבת בגלל הדווקאיות של יום השמיני; אבל אם אין המילה נעשית ביום השמיני (מסיבות רפואיות כאלו ואחרות) — ודאי שאינה דוחה, מה גם שאפשר למולו בכל זמן אחר.", "ref": {"label": "שבת · פרק ר״א דמילה · קלב ע״ב", "ref": "Shabbat.132b"}}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ד׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.331.4", "txt": "וכן להלכה — מילה שלא בזמנה אינה דוחה את השבת."}, {"layer": "acharon", "src": "תשב\"ץ", "srcRef": null, "txt": "אין למול ולד שמילתו לא תתקיים בזמנה ביום חמישי, כדי שהיום השלישי לא ייצא בשבת ויהיה צורך לחלל עליו (שהרי מאחר וכבר אין המילה מתקיימת ביום מסוים, אין עניין ביום מסוים; ולכן יש להימנע ממצב של חילול שבת שאינו מתחייב). [וראינו דבריו בסעיף ט'.]"}, {"layer": "acharon", "src": "מג\"א · ש\"ך", "srcRef": null, "txt": "חולקים על כך.", "under": true}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "סבר שיש להחמיר כדעת התשב\"ץ. [וציין שהיו מי שהקלו כדעת המג\"א והש\"ך.]"}], "pesak": null}, "lemi-mutar": {"seif": "סעיף י׳", "title": "למי מותר למול", "sugya": null, "ops": [{"subhead": "ניסיון מילה"}, {"layer": "gemara", "src": "גמרא · ביצה", "srcRef": null, "txt": "עפ\"י סוגיה בביצה, שמבארת שאסור לטרוח שלא לצורך מצווה או היתר."}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "אסור לאדם שלא מל לעולם למול בשבת, משום שעלול להיכשל במילתו ולקלקל שלא לצורך מצווה."}, {"layer": "rishon", "src": "תרומת הדשן", "srcRef": null, "txt": "אם מל פעם אחת — סגי.", "under": true}, {"subhead": "אבי התינוק"}, {"layer": "rishon", "src": "הטור בשם רבי אליעזר הלוי", "srcRef": null, "txt": "בסימן רסו ביו\"ד — עדיף שאבי התינוק לא ימול אותו, משום שבעבורו זה פסיק רישא (שהרי מתכוון לתקן את בנו)."}, {"layer": "rishon", "src": "תרומת הדשן", "srcRef": null, "txt": "אין בעיה שימול אביו. (מ\"ב: ובוודאי שיש פ\"ר דניחא ליה; גם למוהל זה פ\"ר דניחא ליה — פשוט מותר למול.)", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י׳)", "srcRef": null, "txt": "נקט עפ\"י המרדכי, שאסור למי שלא מל לעולם למול בשבת; וכתב עפ\"י תרומת הדשן שאם מל פעם אחת — יכול למול. ולגבי אביו — מתיר כתרומת הדשן (כל עוד מל פעם אחת)."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מוהל שאומר שכבר מל פעם אחת ומותר לו למול — נאמן להגיד זאת."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "tzorchei"}, {"type": "group", "title": "ספק צריך מילה / לא מלים ביום השמיני", "spans": "סעיפים ג׳, ה׳", "children": ["safek8", "safek-chiyuv"]}, {"type": "sec", "id": "shelo-bizmana"}, {"type": "sec", "id": "lemi-mutar"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"מוהלים": "חיתוך הערלה החיצונית.", "פורעים": "קריעת העור הדק שמתחת לערלה.", "מוצצים": "מציצת דם הפצע — אף שנחשבת עשיית חבורה.", "ציצין המעכבין": "רצועות בשר החופות את רוב גובה העטרה; כל עוד לא הוסרו, המילה פסולה.", "מכשירי מילה": "הכלים והפעולות שמכינים למילה (סכין, מים חמים). מאחר שאפשר להכינם מערב שבת — אינם דוחים את השבת.", "שבות דשבות": "צירוף שני איסורי דרבנן (למשל אמירה לגוי — שהיא שבות — על מלאכה דרבנן). הותר לצורך מצווה.", "מילה בזמנה": "מילה הנעשית ביום השמיני. רק היא דוחה את השבת.", "פסיק רישא": "פעולה מותרת שמלאכה אסורה נעשית ממנה בהכרח, גם בלי כוונה."}, "subject": "שבת", "id": "mila-bshabbat"}, {"topic": {"title": "בורר", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ט", "siman": "Shulchan_Arukh,_Orach_Chayim.319", "intro": {"lead": {"t": "\"היו לפניו שני מיני אוכלין — בורר ואוכל, בורר ומניח\" (שבת עד.)", "ref": "Shabbat.74a"}, "body": "הפרדת דבר רצוי מדבר שאינו רצוי (כגון אוכל מפסולת), ע\"י כלי או ביד; וכן להפך (דבר שאינו רצוי ממה שכן); וכן הפרדת שני מיני אוכל האחד מן השני (למרות ששניהם לא 'פסולת').\n\nמתי מותר: ברירה ביד של אוכל מתוך פסולת לאכילה לאלתר — מותרת (אבל בנפה אסור דרבנן, ובכברה חייב; אעפ\"י שאוכל מיד), משום שיש בכך דרך אכילה ולא דרך ברירה. וחלקו אם היא מלאכה שאינה צריכה לגופה.\n\nשיעורה: כגרוגרת (נלמד ממידות בשאר אוכלין)."}}, "sections": {"hagdarot": {"title": "הגדרות ויסודות", "seif": null, "sugya": null, "intro": "בורר הוא אחת מל\"ט המלאכות: הפרדת דבר רצוי מדבר שאינו רצוי — אוכל מפסולת, פסולת מאוכל, או הפרדת שני מיני אוכל זה מזה. שיעורה כגרוגרת.", "ops": [{"layer": "note", "src": "עיקרון ההיתר", "srcRef": null, "txt": "ברירה ביד של אוכל מתוך פסולת, לאכילה לאלתר — מותרת, משום שהיא דרך אכילה ולא דרך ברירה. (בנפה אסור דרבנן, ובכברה חייב — אף שאוכל מיד.)"}, {"subhead": "ריבוי מלאכות ברירה"}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "זורה, בורר ומרקד — נראות כמלאכה אחת (רש\"י: והלא כולן מלאכה אחת הן, דמפריש אוכל מן הפסולת).\nאביי ורבא: יש מלאכה על כל מעשה שנעשה במשכן, גם אם יש כמה דומות.\n(ולמה אין 'כותש'? אביי: עני אוכל פתו בלא כתישה — לכן דילגו עליה, בעוד שעל מלאכות 'סידורא דפת' לא מדלגים.)", "ref": {"label": "שבת · פרק כלל גדול · עג ע\"ב", "ref": "Shabbat.73b"}}, {"layer": "rishon", "src": "רמב\"ם (פ\"ח הי\"א)", "srcRef": null, "txt": "מביא כאביי ורבא: 'ומפני מה מנו אותן בשלושה? מפני שכל מלאכה שהיתה במשכן מונין אותה בפני עצמה.'"}, {"subhead": "מלאכה שאינה צריכה לגופה"}, {"layer": "rishon", "src": "בעל המאור", "srcRef": null, "txt": "הבורר והזורה הן מלאכות שאינן צריכות לגופן; כל שאר המלאכות — צריך לגופן."}, {"layer": "rishon", "src": "רמב\"ן", "srcRef": null, "txt": "אף הן מלאכות שצריך לגופן, כי ודאי שצריך שהמלאכה תיקרה — ואף שאינו צריך לגוף הדבר שעליו נעשתה (כנוטל ציפורניו, שנחשב גוזז ואינו צריך את הציפורניים).", "under": true}, {"layer": "acharon", "src": "בה\"ל בשם ישועות יעקב", "srcRef": null, "txt": "עניין מלאכת בורר הוא תיקון האוכל שיהיה ראוי לאכילה (שהרי הפסולת אינה ראויה, וגם האוכל אינו ראוי כ\"כ עם הפסולת שבתוכו) — ולכן צריכה לגוף האוכל.\nאבל בשני מיני אוכלין — חשוב מלאכה שאינה צריכה לגופה, כיוון שאין תיקון של אף מאכל, אלא רק שמעוניין כרגע באחד מהם."}], "pesak": null}, "sugya": {"title": "הסוגיה המרכזית", "seif": null, "sugya": null, "intro": "הברייתא נראית סותרת — פותחת בהיתר ברירה ומסיימת באיסור. שלושה אמוראים מיישבים, וכל אחד מגדיר בקו־חלוקה אחר מה מותר ומה אסור.", "ops": [{"layer": "mishna", "src": "ברייתא", "srcRef": null, "txt": "היו לפניו (שני) מיני אוכלין — בורר ואוכל, בורר ומניח; ולא יברור, ואם בירר חייב.", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מתקשים: בהתחלה לשון הברייתא להתיר ברירה, ולאחמ\"כ לאסור — 'משבשתא'. והאמוראים מציעים שיטות שונות לתרץ, ומחלקים מתי מותר ומתי אסור לברור:", "ref": {"label": "שם", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "רב יוסף", "srcRef": null, "txt": "מותר: ביד. אסור (דרבנן): בקנון ובתמחוי. חייב (דאורייתא): בנפה ובכברה."}, {"layer": "gemara", "src": "רב המנונא", "srcRef": null, "txt": "מותר: ברירת אוכל מתוך הפסולת. חייב: ברירת פסולת מתוך האוכל."}, {"layer": "gemara", "src": "אביי", "srcRef": null, "txt": "מותר: ברירה לאלתר. חייב: ברירה לאוצר (לזמן מאוחר)."}, {"layer": "gemara", "src": "רב אשי · רבי ירמיה מדיפתי", "srcRef": null, "txt": "ובסוגיה לאחמ\"כ, חלקו על בורר שני מיני אוכל: רב אשי אוסר מדרבנן, ורבי ירמיה מדיפתי מחייב."}], "pesak": null}, "ikar": {"title": "עיקר הדין", "seif": "סעיף א׳", "sugya": null, "intro": "יש דעות שונות בראשונים לאילו שיטות באמוראים להתייחס. באופן מסורבל, השו\"ע מאמץ עפ\"י רוב הראשונים את שלושת ההגדרות המרכזיות: אוכל מתוך פסולת, ביד, ולאלתר.", "ops": [{"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כל עוד בורר לאלתר — אפילו בנפה ובכברה מותר (כלומר, בעיקר כאביי)."}, {"layer": "rishon", "src": "תוס׳ · ר\"ח · ר\"ן · רמב\"ם", "srcRef": null, "txt": "אסור אף פעם בכלי; ורק אם ברר ביד לאלתר — מותר."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ א׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.1", "txt": "וכן נקט, ולשיטתו צריך גם שיברור אוכל מתוך פסולת. (כלומר שלושת התנאים כאחד.)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "כאשר מקיימים את שלושת התנאים הללו — אז ודאי הווי דרך אכילה."}], "pesak": null}, "tnaim": {"title": "הגדרת תנאי ההיתר", "seif": null, "sugya": null, "ops": [{"layer": "lead", "srcRef": null, "txt": "מ\"ב, הקדמה לסימן שי\"ט: מותר לברור אם מקיימים את שלושת תנאי ההיתר, 'שאז לאו דרך ברירה היא אלא דרך אכילה'."}, {"subhead": "א. יד (ולא כלי)"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "ברירה ביד 'לא דמי לבורר כלל'."}, {"layer": "acharon", "src": "רמ\"א (שכ\"א) · בה\"ל", "srcRef": null, "txt": "לעניין טוחן: הרמ\"א (שכ\"א ס׳ יב) — החותך ירק דק חייב בטוחן רק אם אינו אוכלו מיד. והבה\"ל: הסיבה שברירה ביד מותרת היא שכך דרך האכילה לאלתר בבורר; ולכן בטוחן אין אוסרים שימוש בסכין, שדרך האכילה לאלתר היא בסכין.", "under": true}, {"layer": "acharon", "src": "מ\"ב · שש\"כ", "srcRef": null, "txt": "סכו\"ם נחשב דרך אכילה, אף שאינו 'יד', שהוא כ'ידא אריכתא'; וכן אינו מועיל למלאכת ברירה."}, {"subhead": "ב. לאלתר (סע׳ א׳)"}, {"layer": "lead", "srcRef": null, "txt": "מה גדר 'לאלתר'?"}, {"layer": "rishon", "src": "מרדכי", "srcRef": null, "txt": "מיד ממש, ללא שהייה."}, {"layer": "rishon", "src": "ר\"ח · ר\"ן", "srcRef": null, "txt": "כל זמן שנמצא בסעודה (ואפילו מאריך בה)."}, {"layer": "rishon", "src": "ר׳ ירוחם · בית יוסף", "srcRef": null, "txt": "ר׳ ירוחם: 'לאותה סעודה'. והב\"י הבין בו: כל שבורר לסעודה הקרובה — מותר אפילו זמן רב (ואם השאיר ממנו לסעודה אחרת — חייב).", "under": true}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "כר\"ח — מותר לברור לפני הסעודה, אך רק ממש סמוך."}, {"layer": "rishon", "src": "טור · מ\"ב", "srcRef": null, "txt": "הטור: אסור לברור בתוך הארוחה כדי שיישאר, אלא רק לצורך אותה אכילה. ומ\"ב: אבל אם לא עשה לשם כך לכתחילה — מותר."}, {"layer": "zman", "src": "אגלי טל · הרב עובדיה · אג\"מ", "srcRef": null, "txt": "מי שאינו לסעודה מסוימת: אגלי טל — אסור לברור אוכל מפסולת ולהשאירו לשעה. הרב עובדיה — 60 דקות. אג\"מ — לשון 'שעה' היינו זמן שמסדרים בו את המאכלים לסעודה, פחות משעה."}], "pesak": null}, "shnei": {"title": "שני מיני אוכלים", "seif": "סעיף ג׳", "sugya": null, "ops": [{"layer": "mishna", "src": "ברייתא · רב אשי · רבי ירמיה מדיפתי", "srcRef": null, "txt": "'היו לפניו (שני) מיני אוכלין'. רב אשי אוסר מדרבנן, ורבי ירמיה מדיפתי מחייב. והראשונים מבררים את טעם האיסור גם בזה (ולא רק פסולת מאוכל).", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "ירושלמי", "srcRef": null, "txt": "ברר אוכל מאוכל — חזקיה: חייב; רבי יוחנן: פטור."}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "למרות שמדובר בשני אוכלים, בהוצאת אוכל מאוכל אחר יש העדפה לאחד מהם, והאוכל השני נחשב כפסולת; לכן מותר רק להוציא את הרצוי מן השני (שאינו רצוי)."}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "לשונו אינה בהירה לגמרי, ונחלקים הפוסקים על שיטתו."}, {"layer": "acharon", "src": "פמ\"ג", "srcRef": null, "txt": "הרמב\"ם כתוספות.", "under": true}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "לא כתוספות — אלא הרמב\"ם סבר שעניין בורר הוא בתיקון המאכל, וב ס׳ יט)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.321.19", "txt": "'אסור לקלוף שומים ובצלים כשקולף להניח, אבל לאכול לאלתר — שרי'."}, {"layer": "rishon", "src": "מרדכי · בה\"ל", "srcRef": null, "txt": "הטעם: אי אפשר לאכול את השום בלי הוצאתו מן הקליפה, וממילא זו דרך האכילה."}, {"subhead": "קליפות הראויות לאכילה"}, {"layer": "lead", "srcRef": null, "txt": "ומה בפירות שהקליפה שלהם נאכלת לפעמים (תפוח וכד')? [ממה נפשך: אם אוכל לאלתר והקליפה חשובה כפסולת — מותר כרמ\"א; אם מניח — מותר כפמ\"ג.]"}, {"layer": "acharon", "src": "מ\"ב (שכ\"א)", "srcRef": null, "txt": "כמו שום — מותר לקלף רק אם אוכל את הפרי מיד (שהקליפה נחשבת פסולת)."}, {"layer": "acharon", "src": "שעה\"צ בשם פמ\"ג", "srcRef": null, "txt": "עפ\"י תוס׳: כיוון שהקליפות ראויות למאכל, דינן כהפרדת שני מאכלין זה מזה — ואין באף אחד פסולת; ולכן מותר אף לאורך זמן."}], "pesak": null}, "sheeino": {"title": "בורר בדברים שאינם אוכל", "seif": null, "sugya": null, "intro": "האם מלאכת בורר קיימת גם בדברים שאינם אוכל?", "ops": [{"layer": "gemara", "src": "גמרא · רש\"י", "srcRef": null, "txt": "מי שעושה חבית חרס וכוורת של קנים — מתחייב על כמה מלאכות. ורש\"י מפרט שבתוכן 'בורר': בחבית — את חתיכות האדמה הגסות; בכוורת — את הקנים הטובים מן הרעים.", "ref": {"label": "שבת · פרק כלל גדול · עד ע\"ב", "ref": "Shabbat.74b"}}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "מכאן שגם בדברים שאינם אוכל שייך בורר."}, {"layer": "acharon", "src": "מ\"ב (טו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.15", "txt": "בכלים ובבגדים שייך בורר; ולכן יש להוציא את הכלי/בגד שמעוניין בו, ולא להפך."}, {"layer": "acharon", "src": "אור שמח", "srcRef": null, "txt": "בורר הוא רק בדברים הבלולים ומעורבבים זה בזה; ואין בורר בכלים ובגדים. ומה שכתב הט\"ז — בדברים קטנים כמו עץ וברזל, ששייך בהם ערבוב."}, {"layer": "acharon", "src": "ערוך השולחן", "srcRef": null, "txt": "דבר גדול הנראה לעין — אין בו בורר."}, {"layer": "zman", "src": "אור לציון · יביע אומר", "srcRef": null, "txt": "פוסקי זמננו תהו על מיון מיני סכו\"ם מעורבבים לאחר הארוחה, וכן סידור ספרים. אור לציון חשש לאוסרים ולשיטת הבה\"ל; והרב עובדיה ב'יביע אומר', עפ\"י האור שמח — 'אין כל חשש של איסור ברירה'."}], "pesak": null}, "lach": {"title": "בורר בלח", "seif": "סעיף ט\"ז", "sugya": null, "intro": "האם יש דין בורר במשקים (לח)?", "ops": [{"layer": "rishon", "src": "רא\"ש", "srcRef": null, "txt": "מתיר שתיית מים שיש בהם תולעים דרך מפה (כמעין מסננת)."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ט\"ז)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.16", "txt": "מעתיק את הרא\"ש: מים שיש בהם תולעים — מותר לשים עליהם מפה ולשתות, ואין בכך בורר; ומותר לדחות בשעת שתייה את הפסולת שלא תיכנס לפיו. [ובב\"י דן בחשש סוחט משום מלבן בהרטבת המפה, וסבר שאין לגזור, ש'אין זו שרייה הצריכה סחיטה'.]"}, {"layer": "acharon", "src": "מהריט\"ץ", "srcRef": null, "txt": "'אין ברירה בלח' — ואף זבוב מותר להוציא בידו, אף שלא בשעת שתייה ממש. ומה שהרא\"ש כתב שיש ברירה בלח (תולעים במים) — בכלי, שכך דרך ברירתם."}, {"layer": "acharon", "src": "ט\"ז", "srcRef": null, "txt": "הוצאת פסולת מן הלח מותרת רק אם מוציאהּ עם המזון: נפל זבוב לכוס — מותר להוציאו רק יחד עם המים סביבו. יש ברירה בלח."}, {"layer": "zman", "src": "הרב עובדיה", "srcRef": null, "txt": "פסק כמהריט\"ץ לקולא, אך מוטב להחמיר כט\"ז."}], "pesak": null}, "tircha": {"title": "אוכל מפסולת בטורח מרובה", "seif": "סעיף ד׳", "sugya": null, "intro": "מתי מותר לברור פסולת מאוכל? נלמד ממחלוקת ביו\"ט (ביצה), והשלכתה לשבת.", "ops": [{"layer": "mishna", "src": "משנה (ביצה) · ב\"ש · ב\"ה", "srcRef": null, "txt": "מחלוקת בברירת פסולת מאוכל ביו\"ט: ב\"ש — כשבת, רק אוכל מפסולת; ב\"ה — מתירים ביו\"ט אף להוציא פסולת מתוך אוכל."}, {"layer": "gemara", "src": "גמרא · רבן גמליאל", "srcRef": null, "txt": "בד\"א? כשהאוכל מרובה על הפסולת (ויש טורח בברירתו); אבל כשהפסולת מרובה — אף ב\"ה מודים שמוציאים רק אוכל מפסולת. (והקשו: 'פסולת מרובה — מי איכא מאן דשרי?')"}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "כשהפסולת מרובה היא מוקצה, וכשהיא הרוב אף האוכל נעשה מוקצה — ולכן אסור להוציא כלום. ומתירים כשהרוב אוכל, מפני שיש פחות טורח בהוצאת הפסולת."}, {"layer": "rishon", "src": "רמב\"ם · בית יוסף", "srcRef": null, "txt": "בשבת — תמיד בורר את האוכל. ביו\"ט: פסולת מרובה → בורר את האוכל (דרך ברירה); אוכל מרובה ויש טורח → בורר את הפסולת (מפני הטורח, שהתירו משום שמחת יו\"ט); אוכל מרובה בלא טורח → בורר את האוכל. והב\"י נראה כרמב\"ם."}, {"layer": "rama", "src": "רמ\"א · מ\"ב", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.4", "txt": "בשם הב\"י: 'אפילו האוכל מרובה ויש יותר טורח בברירת האוכל — לא יברור הפסולת'. כלומר בשבת דרך ברירה תמיד (אוכל מפסולת), שרק ביו\"ט ממעטים בטורח. וכן המ\"ב."}], "pesak": null}, "mishmeret": {"title": "משמרת (סינון)", "seif": "סעיף ט׳", "sugya": null, "intro": "סינון יין משמריו אסור (כחכמים, וכן הלכה), אף במשמרת התלויה מער\"ש. נחלקו האם משום בורר או מרקד, ומה מותר לסנן.", "ops": [{"layer": "mishna", "src": "משנה · ר\"א · חכמים", "srcRef": null, "txt": "מסננת התלויה מער\"ש — האם מותר לסנן בה יין משמריו בשבת? ר' אליעזר מתיר; חכמים אוסרים (וכן הלכה). וכולם מודים שאסור לתלותה לכתחילה.", "ref": {"label": "שבת · פרק תולין · קלז", "ref": "Shabbat.137b"}}, {"layer": "gemara", "src": "גמרא · רב כהנא · רבה · רבי זירא", "srcRef": null, "txt": "רב כהנא: אם שימר — חייב מן התורה. משום מה? רבה — משום בורר; רבי זירא — משום מרקד."}, {"layer": "acharon", "src": "שולחן ערוך הרב", "srcRef": null, "txt": "אם בורר אוכל מפסולת, למה חייב? בגלל שמשתמש בכלי המיוחד לברירה (כרב יוסף).", "under": true, "collapsed": true}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "רבה מודה לרבי זירא, שהמשמר חייב גם משום מרקד.", "under": true}, {"layer": "rishon", "src": "תוספות", "srcRef": null, "txt": "חולקים: רבה אינו מודה. שימור יין אינו דומה למרקד, שהמרקד פועל על אוכל ופסולת בניעור הכלי — ובמשמר אין כן.", "under": true}, {"layer": "rishon", "src": "רמב\"ם", "srcRef": null, "txt": "'הבורר שמרים מתוך המשקין — הרי זה תולדת בורר או תולדת מרקד וחייב'. לא הכריע. (ב\"י: כרש\"י; בה\"ל: כתוס׳.)", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ט׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.9", "txt": "הביא דין חכמים מן המשנה — שאסור לתת יין עם שמרים במשמרת התלויה מער\"ש; ולא הכריע כאחד האמוראים או הראשונים."}, {"layer": "acharon", "src": "מנחת חינוך · אגלי טל", "srcRef": null, "txt": "כמה חטאות חייב המשמר? לרש\"י שתיים (בורר ומרקד), לתוס׳ אחת. מנחת חינוך: שתיים. אגלי טל: אחת בלבד (שעשה מעשה אחד).", "collapsed": true}, {"subhead": "סינון המותר במשמרת / בסודר (קלט)"}, {"layer": "gemara", "src": "זעירי (קלט)", "srcRef": null, "txt": "מותר לסנן יין צלול ומים צלולים במשמרת בשבת — ואין בכך בורר. ובמשנה: מסננין את היין בסודרין ובכפיפה מצרית; ומשמע שבסודרים מותר אף משקה עכור קצת.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139b"}}, {"layer": "rishon", "src": "ר\"ן · ב\"ח", "srcRef": null, "txt": "מהו 'צלול' (המותר אף במשמרת)? ר\"ן: שרוב האנשים שותים בלא להקפיד. ב\"ח: שכולם שותים כך. ובסודרים מותר אף עכור קצת — ולר\"ן ובלבד שאין בו שמרים כלל."}, {"layer": "rishon", "src": "טור", "srcRef": null, "txt": "לעניין מלבן: מים אסור לסנן בסודר (משום מלבן), אבל יין מותר (כר\"ת, שאין מלבן במשקים שאינם יין)."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.10", "txt": "כזעירי (ר\"ן): מותר לסנן במשמרת יין או מים צלולים; והביא גם הרמב\"ם שאסר כל סינון במשמרת והתיר רק צלול בסודרין; ובסודרים — רק יין שאינו עכור; והטור שאסר מים בסודר משום מלבן."}, {"layer": "acharon", "src": "מ\"ב · בה\"ל", "srcRef": null, "txt": "מ\"ב: עכור לגמרי — אסור, אך עכור קצת — השו\"ע מתיר. בה\"ל: 'צלול' הוא מה שרוב האנשים שותים בלא להקפיד; ומי שאסטניס ומקפיד — אסור לו."}], "pesak": null}, "shaar": {"title": "שאר סעיפים והערות", "seif": null, "sugya": null, "ops": [{"subhead": "ס׳ ה׳ · הבורר תורמוסין מפסולתן"}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ה׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.5", "txt": "הבורר תורמוסין מתוך פסולתן — חייב, מפני שהפסולת שלהם ממתקת אותם, ונמצא בורר פסולת מתוך אוכל. (ואף שלכאורה מוציא את התורמוסים מן הפסולת — כיוון שאין מתקיים תנאי 'אוכל מפסולת', אסור.)"}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "התורמוס עצמו מר מאוד, ואף הקליפה פחות מרה ממנו — ולכן נחשב התורמוס 'פסולת' לעומתה."}, {"subhead": "ס׳ י\"א · סינון יין צלול בסודר"}, {"layer": "gemara", "src": "רב שימי בר חייא (קלט)", "srcRef": null, "txt": "ההיתר לסנן יין בסודרים — בתנאי שלא יעשה בו גומא (שקע).", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139b"}}, {"layer": "rishon", "src": "ראשונים · שולחן ערוך", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.11", "txt": "הטעם — שיהיה 'שינוי', משום עובדין דחול."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "מה שצריך 'שינוי' ואסור לעשות גומא — מדובר רק ביין עכור; אך ביין צלול, שהתירוהו אף במשמרת בלא שינוי — ודאי שבסודר אין צורך בשינוי. (ומשתמע שאולי אף במשמרת מותר עכור אם עושים 'שינוי'.)"}, {"subhead": "ס׳ י\"ב · כפיפה מצרית כדין סודר"}, {"layer": "gemara", "src": "רב חייא בשם רב (קלט)", "srcRef": null, "txt": "היתר סינון יין בכפיפה מצרית — בתנאי שלא יגביה את הסל טפח מקרקעית הכלי.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139b"}}, {"layer": "rishon", "src": "רש\"י", "srcRef": null, "txt": "הטעם — משום אוהל.", "under": true}, {"layer": "rishon", "src": "ר\"ן", "srcRef": null, "txt": "הטעם — משום 'שינוי', עובדין דחול.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י\"ב)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.12", "txt": "נקט בלשונו כר\"ן."}, {"layer": "acharon", "src": "מ\"ב", "srcRef": null, "txt": "אם אין הכפיפה מכסה את כל חלל הכלי — לכו\"ע מותר אף להגביה טפח, שאין כאן לא אוהל ולא עובדין דחול."}, {"subhead": "ס׳ י\"ג · מיחזי כמשמרת"}, {"layer": "gemara", "src": "רב פפא (עפ\"י רש\"י)", "srcRef": null, "txt": "אסור להצמיד קשים וקיסמים לפי הכלי ולשפוך לתוכו יין כדי לסנן מהם קיסמים — משום שמיחזי כמשמרת.", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139b"}}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י\"ג)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.13", "txt": "פוסק כן."}, {"layer": "acharon", "src": "מג\"א", "srcRef": null, "txt": "השו\"ע מדבר ביין עכור דווקא; אך ביין צלול מותר אף במשמרת אם מסנן רק קיסמים דקים."}, {"layer": "acharon", "src": "בה\"ל", "srcRef": null, "txt": "כל זה כשמהדק את הקיסמים לפי הכלי בחוזקה; אך אם אינו מהדקם, כך שהקיסמים שביין יכולים לעבור — מותר."}, {"subhead": "ס׳ י\"ד · עירוי"}, {"layer": "gemara", "src": "גמרא · רבינא (קלט)", "srcRef": null, "txt": "בבית רב פפא היו מערים יין מחבית לחבית אף שנשארו שמרים; רב אחא מדיפתי הקשה שיש טיפות בסוף המעורבות בשמרים; רבינא תירץ שלרב פפא לא היו הטיפות חשובות (שהיה לו הרבה).", "ref": {"label": "שבת · פרק תולין · קלט", "ref": "Shabbat.139b"}}, {"layer": "rishon", "src": "הרוקח", "srcRef": null, "txt": "מותר להגביה את החבית ולהניחה על משהו כדי לערות טוב יותר."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ י\"ד)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.319.14", "txt": "העתיק דין הסוגיה: מותר לערות יין מחבית לחבית, ובלבד שייזהר לקראת הסוף כשמגיע לחלק המעורב בשמרים."}, {"layer": "rama", "src": "רמ\"א", "srcRef": null, "txt": "הביא את הרוקח (להגביה החבית)."}, {"layer": "acharon", "src": "מג\"א · מ\"ב", "srcRef": null, "txt": "מוזר לכאורה (הרי זו ברירת אוכל מתוך פסולת) — ותירצו שהחשש הוא שהמזיגה לאחר זמן. ושו\"ע הרב: כיוון שהשמרים נשארים בחבית, נחשב כמוציא פסולת מן האוכל."}], "pesak": null}}, "nav": [{"type": "intro", "title": "מבוא לנושא"}, {"type": "sec", "id": "hagdarot"}, {"type": "sec", "id": "sugya"}, {"type": "sec", "id": "ikar"}, {"type": "sec", "id": "tnaim"}, {"type": "sec", "id": "shnei"}, {"type": "sec", "id": "echad"}, {"type": "sec", "id": "kiluf"}, {"type": "sec", "id": "sheeino"}, {"type": "sec", "id": "lach"}, {"type": "sec", "id": "tircha"}, {"type": "sec", "id": "mishmeret"}, {"type": "sec", "id": "shaar"}, {"type": "cards", "title": "כרטיסיות תרגול"}], "glossary": {"אוכל מתוך פסולת": "אחד משלושת תנאי ההיתר — לברור את הרצוי (האוכל) ולהותיר את הפסולת, ולא להפך.", "לאלתר": "לברור סמוך לאכילה, ולא לאיחסון (לאוצר). אחד משלושת התנאים.", "דרך אכילה": "בהתקיים שלושת התנאים, הברירה נחשבת חלק מדרך האכילה — ולא מלאכת ברירה.", "נפה": "כלי ניפוי דק לברירה; הבורר בו חייב.", "כברה": "כלי ברירה גס; הבורר בו חייב מן התורה.", "משמרת": "כלי או בגד לסינון משקים משמריהם.", "מרקד": "מלאכת ניפוי קמח בנפה; נידונה לצד בורר בעניין הסינון.", "ידא אריכתא": "'יד ארוכה' — כינוי לכלי אכילה (סכו\"ם) הנחשב כהמשך היד ולא ככלי ברירה.", "מלאכה שאינה צריכה לגופה": "מלאכה הנעשית שלא לצורך התוצאה הרגילה שלה; נחלקו אם הבורר בכללהּ.", "עובדין דחול": "מעשה של חול; ולכן דרשו בו 'שינוי' בשבת."}, "subject": "שבת", "id": "borer"}, {"topic": {"title": "בישול", "eyebrow": "מבחני הרבנות · הלכות שבת · סימן שי״ח", "siman": "Shulchan_Arukh,_Orach_Chayim.318", "intro": {"lead": {"t": "'תנא דידן שבק בישול סממנין ונקט סידורא דפת'", "ref": ""}, "body": "בישול אינה אחת מל\"ט אבות מלאכה, ואינה נמנית במשנת אבות המלאכה, אלא 'תנא דידן שבק בישול סממנין ונקט סידורא דפת'."}}, "sections": {"kitzur": {"title": "קיצור כלים — מדרג קלות הבישול", "seif": null, "sugya": null, "intro": "מפה תמציתית של היררכיית הכלים ומדרג קלות הבישול — לחזור אליה בכל נושא. (המושגים מקושרים גם למילון.)", "ops": [{"layer": "note", "srcRef": null, "src": "כלי ראשון שעל האש", "txt": "אסור בבישול מן התורה. (רבי לרב יצחק: לא לשפוך שמן לאמבטי שהיא כלי ראשון; ואין נותנים ביצה בצד המיחם שתתגלגל.)"}, {"layer": "note", "srcRef": null, "src": "כלי ראשון שהורד מהאש", "txt": "שו״ע (רש״י): מבשל כל עוד יד סולדת בו. מרדכי: מבשל כל עוד רותח, אף אם כבר אין יד סולדת בו. (לכו״ע תבלינים מתבשלים אף לאחר שירד מחום שהידס״ב.)"}, {"layer": "note", "srcRef": null, "src": "עירוי מכלי ראשון", "txt": "רשב״ם: אינו מבשל. ר״ת: מבשל (כדי קליפה). תוס׳ (ר״י): עירוי אף מכלי שני מבשל קלי בישול ודברים שהדחתם גמר מלאכתם. שו״ע: כר״ת — עירוי מכלי ראשון מבשל."}, {"layer": "note", "srcRef": null, "src": "כלי שני", "txt": "עפ״י פשט הסוגיה — אינו מבשל. תוס׳ (ר״י): אינו מבשל, אך אסור משום מיחזי כמבשל. יראים: כל כלי שהידס״ב אסור לבשל בו. שו״ע: לא הכריע (משנ״ב מיקל). רמ״א: מחמיר. ערוך השולחן: מחמיר רק בקלי הבישול."}, {"layer": "note", "srcRef": null, "src": "מצקת — ראשון או שני?", "txt": "שהתה בסיר — ככלי ראשון. לא: פרי חדש — כלי שני; ט״ז — רק מה שמערים עליו מכלי ראשון; שש״כ — ככלי ראשון; מנחת יצחק — כלי שני."}, {"layer": "note", "srcRef": null, "src": "מדרג קלות הבישול", "txt": "קשה בישול — רק בכלי ראשון שעל האש. רגיל — בכלי ראשון שהורד (בהידס״ב). תבלין — בכלי ראשון שהורד אף בלא הידס״ב, לא בכלי שני. קלי בישול — אף בכלי שני (תוס׳: אף בעירוי; יראים/רא״מ: אף בכלי שלישי)."}, {"layer": "note", "srcRef": null, "src": "מלח", "txt": "שו״ע (רי״ף, רמב״ם, רא״ש): אינו מתבשל אף בכלי ראשון שהורד. רמ״א: קל בישול, מתבשל אף בכלי שני. ר״ן: בכלי ראשון שעל האש — מתבשל לכו״ע."}, {"layer": "note", "srcRef": null, "src": "תה", "txt": "עלי תה אינם מבושלים בייצור. כלי ראשון/עירוי — אסור לשו״ע ולרמ״א. כלי שני: לרמ״א אסור; לשו״ע לא הוכרע (משנ״ב מיקל). ולכו״ע מותר לבשל העלים לפני שבת ולהכין תה בשבת (אין בא״ב ביבש)."}], "pesak": null}, "maase": {"title": "הגדרת מעשה הבישול (ריכוך או הקשייה)", "seif": null, "sugya": null, "intro": "מהו 'מעשה בישול' — ריכוך, הקשייה, או כל התקנת מאכל בחום?", "ops": [{"layer": "gemara", "src": "גמרא · רב פפא", "srcRef": null, "txt": "התנא עבר מ'בישול סממנין' ל'אופה' — כי הסידור במשנה הוא של מלאכות יצירת הפת (זורע, חורש, קוצר...), ואפייה היא בישול הפת.", "collapsed": true, "ref": {"label": "שבת · פרק כלל גדול · עד ע\"א", "ref": "Shabbat.74a"}}, {"layer": "gemara", "src": "רב אחא בר רב עוירא", "srcRef": null, "txt": "הזורק סיכתא (יתד) לכבשן שתתקשה — חייב. ובסוגיה: החיוב משום שהיתד מתרככת קודם ורק אז מתקשה ('מירפא רפי והדר קמיט').", "ref": {"label": "שם", "ref": "Shabbat.74a"}}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "היתד מתרככת בחום ואז מתקשה — 'וכי רפי ברישא הוי בישולו'. בישול הוא ריכוך (ושייך אף בדברים שאינם אוכל)."}, {"layer": "rishon", "src": "רמב״ם", "srcRef": null, "txt": "'כללו של דבר: בין שריפה גוף קשה באש או שהקשה גוף רך — הרי זה חייב משום מבשל.' משמע שכל התקנת מאכל בחום נאסרת, לא רק ריכוך."}, {"layer": "acharon", "src": "משנה ברורה", "srcRef": null, "txt": "הרמב״ם אינו חולק על רש״י שעיקר בישול הוא ריכוך — אלא שבכל הקשייה ודאי יש ריכוך תחילה.", "under": true}], "pesak": null}, "shiur_mutzak": {"title": "שיעור בישול במוצק — כמאב״ד", "seif": "סעיף ב׳", "sugya": null, "intro": "מהו שיעור הבישול המחייב במאכל מוצק?", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "אין צולין בשר בצל וביצה בערב שבת אלא כדי שיצולו מבעוד יום (אסור להניחם להתבשל אלא אם יספיקו להתבשל לפני שבת).", "ref": {"label": "שבת · פרק יציאות השבת · יט ע\"ב", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "גמרא · רבי אלעזר", "srcRef": null, "txt": "שיעור הבישול — כמאכל בן דרוסאי.", "ref": {"label": "שם", "ref": "Shabbat.19b"}}, {"layer": "gemara", "src": "חנניה", "srcRef": null, "txt": "כל שמבושל כמאב״ד — מותר להשהותו על גבי כירה (שכבר מבושל; אך ודאי יש חשש חיתוי).", "collapsed": true}, {"layer": "rishon", "src": "רש״י · רמב״ם", "srcRef": null, "txt": "מהו שיעור מאב״ד? רש״י: שליש בישול. רמב״ם: חצי בישול."}, {"layer": "rishon", "src": "הר״ן (קושיה ותירוץ)", "srcRef": null, "txt": "הקשה: מהסוגיה משמע שמותר להשהות מבושל כמאב״ד, ולרמב״ם (רנג,א) רק כל צרכו. ותירץ: לעניין שהייה חוששים 'שמא יחתה', והחשש בטל בכל צרכו; וכאן (בשר על הגחלים בלא קדרה) — אם יחתה ייחרך, ולכן לא חוששים.", "collapsed": true}, {"layer": "rishon", "src": "בית יוסף (ברמב״ם)", "srcRef": null, "txt": "ההיתר להשהות מבושל כמאב״ד על הגחלים — רק אם מבושל כך משני צדדיו.", "collapsed": true}, {"layer": "shulchan", "src": "שולחן ערוך · רנ״ד · (סע׳ ב׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.254.2", "txt": "כרמב״ם — שיעור מאב״ד הוא חצי בישולו; ואסור לצלות בשר בצל וביצה על הגחלים אלא כדי שיצלו משני הצדדים כמאב״ד מבעוד יום."}, {"layer": "acharon", "src": "משנה ברורה", "srcRef": null, "txt": "אף בשר גדי (שבס׳ א מותר להשהות אף שאינו כמאב״ד) — על הגחלים ממש אסור, שדואג שיתבשל מהר ויש חשש שמא יחתה.", "under": true}], "pesak": null}, "shiur_nozel": {"title": "שיעור בישול בנוזל — יד סולדת בו", "seif": "סעיף י״ד", "sugya": null, "intro": "בנוזל, האיסור מדאורייתא אינו במידת בישול אלא בדרגת חום — חום שהיד סולדת בו.", "ops": [{"layer": "gemara", "src": "ברייתא", "srcRef": null, "txt": "מניח אדם קיתון מים כנגד מדורה — לא כדי שיחמו, אלא כדי שיפשירו מצינתם.", "ref": {"label": "שבת · פרק כירה · מ ע\"א", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "שמואל", "srcRef": null, "txt": "אחד שמן ואחד מים — יד סולדת בו, אסור.", "ref": {"label": "שם", "ref": "Shabbat.40a"}}, {"layer": "gemara", "src": "גמרא", "srcRef": null, "txt": "מהו 'יד סולדת בו'? כל שכריסו של תינוק נכווית בו. וכן נקט השו״ע."}, {"layer": "zman", "src": "פוסקי זמננו", "srcRef": null, "txt": "הגדרה משתנה: הדעות נעות מ־45° (הגרש״ז אויערבך) ועד 71° (הרב פיינשטיין)."}], "pesak": null}, "makor": {"title": "מקור החום — חמה ותולדותיה", "seif": "סעיף ג׳", "sugya": null, "intro": "מדאורייתא אסור לבשל באש ובתולדותיה; בחמה ותולדותיה מותר מן התורה — אך תולדות חמה נאסרו מדרבנן (אטו תולדות האש).", "ops": [{"layer": "mishna", "src": "משנה · ת״ק · רבי יוסי", "srcRef": null, "txt": "אין נותנים ביצה בצד המיחם (תולדות האש) שתתגלגל, ואין מטמינה בחול. ובתולדות חמה — נחלקו ת״ק ורבי יוסי אם מותר לשבור ביצה על בגד שהוחם בשמש.", "ref": {"label": "שבת · פרק כירה · לח ע\"ב", "ref": "Shabbat.38b"}}, {"layer": "gemara", "src": "גמרא · רב נחמן", "srcRef": null, "txt": "לכו״ע מותר בחמה ואסור באוּר. ת״ק ורבי יוסי נחלקו בתולדות חמה — ת״ק אוסר שמא יבשל בתולדות האוּר.", "ref": {"label": "שם", "ref": "Shabbat.38b"}}, {"layer": "rishon", "src": "ראשונים", "srcRef": null, "txt": "פסקו כת״ק — אסור מדרבנן לבשל בתולדות חמה."}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "בחמה מותר, שאין זו דרך בישול; ולא גוזרים אטו, שאין סיבה להתבלבל.", "under": true}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ג׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.3", "txt": "כת״ק — אסור לבשל בתולדות חמה (שמא יבשל בתולדות האש), ומותר בחום החמה עצמה. (וההטמנה בחול אסורה אף מבעוד יום, כמוסיף הבל.)"}, {"layer": "acharon", "src": "מהרש״ל", "srcRef": null, "txt": "אף שאסור בתולדות חמה — מותר לבשל על גג רותח, שלא יבוא ממנו לבשל בתולדות האוּר.", "collapsed": true}, {"layer": "zman", "src": "הרב עובדיה (דוד שמש)", "srcRef": null, "txt": "מים בדוד שמש הם תולדות חמה. ומי ", "src": "בית יוסף בשם ר׳ יונה", "srcRef": null, "txt": "מכלל דברי ר׳ ירוחם: תבשיל לח 'מצטמק ורע לו' — אין בו בא״ב אף אם נצטנן.", "under": true}, {"layer": "rishon", "src": "רמב״ם · רשב״א", "srcRef": null, "txt": "אין בישול אחר בישול לעולם, אפילו בלח שנצטנן."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ד׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.4", "txt": "כרא״ש — תבשיל לח שבושל כ״צ ונצטנן, יש בו בישול אחר בישול (ולא פירש לגבי מצטמק)."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "הגיה כ'יש אומרים' את ר׳ ירוחם — דווקא ב'מצטמק ויפה לו' שייך בא״ב."}, {"layer": "acharon", "src": "מגן אברהם", "srcRef": null, "txt": "דעת השו״ע כדבריו בב״י — 'מצטמק ורע לו' מותר בא״ב (וכן בס׳ ח).", "under": true}, {"layer": "acharon", "src": "ב״ח", "srcRef": null, "txt": "חלק — המחבר חזר בו מהב״י, ובס׳ ח כתב סתם כלשון ר׳ ירוחם.", "under": true, "collapsed": true}, {"layer": "acharon", "src": "ט״ז", "srcRef": null, "txt": "טעם היתר 'מצטמק ורע לו': אין בו מלאכת מחשבת, שאינו מעוניין בצימוק אלא בחימום.", "under": true}, {"layer": "rama", "src": "רמ״א · (ס׳ ט״ו)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.15", "txt": "יש מקילים בתבשיל לח: אף שהתקרר מרתיחתו, כל עוד לא נצטנן לגמרי — מותר (ובמצטמק ויפה לו אף אם נצטנן לגמרי, עפ״י ר׳ ירוחם)."}, {"subhead": "מה נחשב 'לח'?"}, {"layer": "zman", "src": "יביע אומר", "srcRef": null, "txt": "תבשיל שרובו רוטב."}, {"layer": "zman", "src": "אור לציון", "srcRef": null, "txt": "תבשיל שיש בו רוטב כלשהו."}, {"layer": "zman", "src": "הגרש״ז · הרב אלישיב", "srcRef": null, "txt": "יש לרוקן את הרוטב; ואפשר להקל במעט לחות/שמן שעל התבשיל."}, {"layer": "zman", "src": "הרב פיינשטיין", "srcRef": null, "txt": "מצבי ביניים: כל אוכל שיעמוד במקומו בלי כלי — נחשב מוצק."}, {"subhead": "דבר יבש הנעשה לח (סע׳ ט״ז)"}, {"layer": "lead", "srcRef": null, "txt": "מאכל מוצק שבחימומו הופך לנוזלי (רוטב קרוש, פשטידה) — מה דינו?"}, {"layer": "rishon", "src": "ספר התרומה (בב״י)", "srcRef": null, "txt": "אסור לחמם אינפאנדה אף במרחק מהאש, משום שהשומן ההופך לנוזל — , "srcRef": null, "txt": "עד איזה כלי נאסרת נתינת פת? סמ״ק (רא״מ): רק כלי ראשון (בשני מותר). סמ״ג: אף כלי שני, שהלחם מקלי הבישול."}, {"layer": "shulchan", "src": "שולחן ערוך · (סע׳ ה׳)", "srcRef": "Shulchan_Arukh,_Orach_Chayim.318.5", "txt": "הביא היראים ב'יש אומרים' כהבנת הסמ״ג (אף כלי שני), וכתב 'ויש מי שמתיר'."}, {"layer": "rama", "src": "רמ״א", "srcRef": null, "txt": "ה'יש מתירים' כסמ״ק — בכלי שני; אך בכלי ראשון לכו״ע אסור. והביא שיש מתירים אף בכלי ראשון (כראבי״ה), וסבר להחמיר כסמ״ג."}, {"layer": "acharon", "src": "באר הגולה", "srcRef": null, "txt": "ה'יש מתירים' שבשו״ע מכוון לראבי״ה — ומשמע שהשו״ע מיקל שאין בישול אחר אפייה כלל.", "under": true}, {"layer": "zman", "src": "הרב עובדיה (יחוה דעת)", "srcRef": null, "txt": "אין בישול אחר אפייה; ובכך תירץ את הקושי מס׳ טו (שם משמע שיש בא״ב רק בנוזל).", "under": true, "collapsed": true}, {"layer": "acharon", "src": "פרטים נוספים", "srcRef": null, "txt": "לכו״ע אין אפייה אחר אפייה וצלייה אחר צלייה. שש״כ: יש בישול אחר טיגון ולהיפך (אלא בטיגון עמוק). בה״ל: מכמה תהליכים — האחרון נחשב. פמ״ג: כל עוד נעשה תהליך — לא שייך בו יותר.", "collapsed": true}, {"layer": "lead", "srcRef": null, "txt": "קלוי — ולשו״ע (אין בא״א) מותר אף בעירוי מכלי ראשון. אור לציון: קלייה אינה אפייה גמורה, ולכן דינו כתבלין (אסור בעירוי מכלי״ר) או כקל בישול (רק מכלי שלישי). הרב עובדיה: אבקת קפה ראויה כמות שהיא, ומותר. קפה נמס — מותר לרוב (עבר בישול, ואין בא״ב ביבש).", "src": "קפה"}], "pesak": null}, "hadacha": {"title": "'הדחתו היא גמר מלאכתו', כלי ראשון וקלי הבישול", "seif": "סעיף ד׳", "sugya": null, "intro": "מה שלא בושל — מותר רק להדיחו בחמין להפיג צינתו, חוץ מדברים ש'הדחתם היא גמר מלאכתם'.", "ops": [{"layer": "mishna", "src": "משנה", "srcRef": null, "txt": "כל שבא בחמין מער״ש שורין אותו בשבת; ומה שלא — אין שורין, אך מותר להדיחו בחמין, חוץ מן המליח הישן וקולייס האיספנין, שהדחתן היא גמר מלאכתן.", "ref": {"label": "שבת · פרק חבית · קמה ע\"א", "ref": "Shabbat.145a"}}, {"layer": "rishon", "src": "רש״י", "srcRef": null, "txt": "מליח הישן וקולייס האיספנין = ד
